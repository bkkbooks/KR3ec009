body:
  text: 卷第三己酉新增衍義丹砂味甘微寒無毒主身體五臟百病養精神安魂魄益氣明目通血脈止煩滿消渴益精神悅澤人面殺精魅邪惡鬼除中惡腹痛毒氣疥瘻諸瘡久服通神明不老輕身神仙能化為汞作末名真朱光色如雲母可析者良生符陵山谷採無時惡磁石畏鹹水陶隱居云按此化為汞及名真朱者即是今硃砂也俗醫皆別取武都仇池雄黃夾雌黃者名為丹砂方家亦往往俱用此為謬矣符陵是涪州接巴郡南今無復採者乃出武陵西川諸蠻夷中皆通屬巴地故謂之巴砂仙經亦用越砂即出廣州臨漳者此二處並好唯須光明瑩徹為佳如雲母片者謂雲母砂如樗蒲子紫石英形者謂馬齒砂亦好如大小豆及大塊圓滑者謂豆砂細末碎者謂末砂此二種粗不入藥用但可畫用爾採砂皆鑿坎入數丈許雖同出一郡縣亦有好惡地有水井勝火井也煉餌之法備載仙方最為長生之寶唐本注云丹砂大略二種有土砂石砂其土砂復有塊砂末砂體並重而色黃黑不任畫用療瘡疥亦好但不入心腹之藥爾然可燒之出水銀乃多其石砂便有十數種最上者光明砂云一顆別生一石龕內大者如雞卵小者如棗栗形似芙蓉破之如雲母光明照徹在龕中石臺上生得此者帶之辟惡為上其次或出石中或出水內形塊大者如拇指小者如杏仁光明無雜名馬牙砂一名無重砂入藥及畫俱善俗間亦少有之其有磨嵯新井別井水井火井芙蓉石末石堆豆末等砂形類頗相似入藥及畫當擇去其雜土石便可用矣南有越砂大者如拳小者如雞鵝卵形雖大其雜土石不如細明淨者經言末之名真朱謬矣豈有一物而以全末為殊名者也今注今出辰州錦州者藥用最良余皆次焉陶云出西川非也蠻夷中或當有之臣禹錫等謹按藥性論云丹砂君有大毒鎮心主尸疰抽風日華子云涼微毒潤心肺治瘡疥痂息肉服並塗用圖經曰丹砂生符陵山谷今出辰州宜州階州而辰州者最勝謂之辰砂生深山石崖間土人採之穴地數十尺始見其苗乃白石耳謂之硃砂床砂生石上其塊大者如雞子小者如石榴子狀若芙蓉頭箭鏃連床者紫黯若鐵色而光明瑩徹碎之嶄岩作牆壁又似雲母片可析者真辰砂也無石者彌佳過此皆淘土石中得之非生於石床者陶隱居注謂出武陵西川諸蠻中今辰州乃武陵故地雖號辰砂而本州境所出殊少往往在蠻界中溪漵錦州得之此地蓋陶所謂武陵西川者是也而後注謂出西川為非是不曉武陵之西川耳宜砂絶有大塊者碎之亦作牆壁但罕有類物狀而色亦深赤為不及辰砂蓋出土石間非白石床所生也然宜州近地春州融州皆有砂故其水盡赤每煙霧鬱蒸之氣亦赤黃色土人謂之硃砂氣尤能作瘴癘深為人患也階砂又次都不堪入藥唯可畫色耳凡砂之絶好者為光明砂其次謂之顆塊其次謂之鹿蔌其下謂之末砂而醫方家唯用光明砂余並不用採無時謹按鄭康成注周禮以丹砂石膽雄黃礜石磁石為五毒古人唯以攻創瘍而本經以丹砂為無毒故人多煉治服食鮮有不為藥患者豈五毒之説勝乎服餌者當以為戒雷公云凡使宜須細認取諸般尚有百等不可一一論之有妙硫砂如拳許大或重一鎰有十四面面如鏡若遇陰沉天雨即鏡面上有紅漿汁出有梅柏砂如梅子許大夜有光生照見一室有白庭砂如帝珠子許大面上有小星現有神座砂又有金座砂玉座砂不經丹灶服之而自延壽命次有白金砂澄水砂陰成砂辰錦砂芙蓉砂鏡面砂箭鏃砂曹末砂土砂金星砂平面砂神末砂以上不可一一細述也夫修事硃砂先於一靜室內焚香齋沐然後取砂以香水浴過了拭乾即碎搗之後向鉢中更研三伏時竟取一瓷鍋子著研了砂於內用甘草紫背天葵五方草各銼之著砂上下以東流水煮亦三伏時勿令水火缺失時候滿去三件草又以東流水淘令淨干曬又研如粉用小瓷瓶子盛又入青芝草山須草半兩蓋之下十斤火鍛從巳至子時方歇候冷再研似粉如要服則入熬蜜丸如細麻子許大空腹服一丸如要入藥中用則依此法凡煅自然住火五兩硃砂用甘草二兩紫背天葵一鎰五方草自然汁一鎰若東流水取足外臺祕要傷寒時氣溫疫頭痛壯熱脈盛始得一二日者取真砂一兩以水一斗煮取一升頓服覆衣被取汗又方闢瘟疫取上等硃砂一兩細研以白蜜和丸如麻子大常以太歲日平旦一家大小勿食諸物面向東立各吞三七丸永無疫疾又方療心腹宿症及卒得症取硃砂細研搜飯令朱勻以雄雞一隻先餓二日後以朱飯飼之著雞於板上收取糞曝燥為末溫清酒服方寸匕至五錢日三服若病困者晝夜可六服一雞少更飼一雞取足服之俟愈即止斗門方治小兒未滿月驚著似中風欲死者用硃砂以新汲水濃磨汁塗五心上立瘥最有神驗十全博救療子死腹中不出用硃砂一兩以水煮數沸末之然後取酒服之立出姚和衆小兒初生六日溫腸胃壯血氣方煉成硃砂如大豆許細研以蜜一棗大熟調以綿搵取令小兒吮之一日令盡太上八帝玄變經三皇真人煉丹方丹砂一斤色發明者研末重絹篩之令靡靡以醇酒不見水者沃丹撓之令如葑泥狀盛以銅盤中置高閣上勿令婦人見曝之身自起居數撓燥復沃之當令如泥若陰雨疾風復藏之無人處天晏出曝之盡酒三斗而成能長曝之三百日當紫色握之不汙手如著手未乾可丸欲服時沐浴蘭香齋戒七日勿令婦人近藥過旁丸如麻子大常以平旦向日吞三丸服之一月三蟲出服之五六月腹內諸病皆瘥服之一年眉發更黑歲加一丸服之三年神人至張潞云烏髭鬢大效方以小雌雞一對別處各養喂不得令食蟲並雜物只與烏油麻一件並與水吃使雞長大放卵時專覷取出先放者卵收取及別處更放卵絶卻收先放者卵細研好硃砂一兩擊破卵巔些些作竅入砂於卵內安置用紙黏損處數重候乾用後放者卵一齊令雞抱候雞子出為度其藥在卵內自然結實打破取出爛研如粉用蒸餅丸如緑豆大不計時候酒下五七丸不惟變白亦愈疾矣青霞子丹砂自然不死若以氣衰血散體竭骨枯人石之功稍能添益若欲長生久視保命安神須餌丹砂且八石見火悉成灰燼丹砂伏火化為黃銀能重能輕能神能靈能黑能白能暗能明一斛人擎力難升舉萬斤遇火輕速上騰鬼神尋求莫知所在太清服煉靈砂法丹砂外包八石內含金精先稟氣於甲受氣於丙出胎見壬結魄成庚增光歸戊陰陽升降各本其原且如礦石五金俱受五陰神之氣結亦分為五類之形形質頑惡志性沉滯寶藏論硃砂若草伏住火胎包在橐成汁可點銀為金次點銅為銀別説云謹按金商州亦見出一種作土氣色微黃陝西河東河北京東京西等路併入藥及畫家亦用長安蜀中研以代水銀硃作漆器又信州近年出一種極有大者光芒牆壁略類宜州所産然皆有砒氣破之多作生砒色入藥用見火恐殺人今浙中市肆所貨往往多是用者宜審諦之晟近得武林陳承編次本草圖經本參對陳於圖經外又以別説附著於後其言皆可稽據不妄因增入之衍義曰丹砂今人謂之硃砂辰州硃砂多出蠻洞錦州界狤獠洞老鴉井其井深廣數十丈先聚薪於井滿則縱火焚之其青石壁迸裂處即有小龕龕中自有白石床其石如玉床上乃生丹砂小者如箭鏃大者如芙蓉其光明可鑑研之鮮紅砂泊床大者重七八兩至十兩者晃州亦有形如箭鏃帶石者得自土中非此之比也此物鎮養心神但宜生使煉服少有不作疾者亦不減硫黃輩又一醫流服伏火者數粒一旦大熱數夕而斃李善勝嘗煉硃砂為丹經歲余沐浴再入鼎誤遺下一塊其徒丸服之遂發懵冒一夕而斃生硃砂初生兒便可服因火力所變遂能殺人可不謹也雲母味甘平無毒主身皮死肌中風寒熱如在車船上除邪氣安五臟益子精明目下氣堅肌續絶補中療五勞七傷虛損少氣止痢久服輕身延年悅澤不老耐寒暑志高神仙一名云珠色多赤一名雲華五色具一名雲英色多青一名雲液色多白一名云砂色青黃一名磷石色正白生泰山山谷齊廬山及琅邪北定山石間二月採澤瀉為之使畏鮀甲及流水陶隱居云按仙經雲母乃有八種向日視之色青白多黑者名雲母色黃白多青名雲英色青黃多赤名云珠如冰露乍黃乍白名云砂黃白皛皛名雲液皎然純白明徹名磷石此六種並好服而各有時月其黯黯純黑有紋斑斑如鐵者名云膽色雜黑而強肥者名地涿此二種並不可服煉之有法唯宜精細不爾入腹大害人今虛勞家丸散用之並只搗篩殊為未允琅邪在彭城東北青州亦有今江東唯用廬山者為勝以砂土養之歲月生長今煉之用礬石則柔爛亦便是相畏之效百草上露乃勝東流水亦用五月茅屋溜水臣禹錫等謹按藥性論云雲母粉君惡徐長卿忌羊血粉有六等白色者上有小毒主下痢腸癖補腎冷楊損之云青赤白黃紫者並堪服餌唯黑者不任用害人日華子云凡有數種通透輕薄者為上也圖經曰雲母生泰山山谷齊廬山及琅邪北定山石間今兗州雲夢山及江州濠州杭越間亦有之生土石間作片成層可折明滑光白者為上江南生者多青黑色不堪入藥二月採其片絶有大而瑩潔者今人或以飾燈籠亦古屏扇之遺事也謹按方書用雲母皆以白澤者為貴唯中山衛叔卿單服法雲母五色具者蓋本經所謂一名雲華者是一物中而種類有別耳葛洪抱朴子內篇云雲母有五種而人不能別也當舉以向日看其色詳占視之乃可知正爾於陰地視之不見其雜色也五色並具而多青者名雲英宜以春服之五色並具而多赤者名云珠宜以夏服之五色並具而多白者名雲液宜以秋服之五色並具而多黑者名雲母宜以冬服之但有青黃二色者名云砂宜以季夏服之皛皛純白者名磷石四時可服也然則醫方所用正白者乃磷石一種耳古之服五云之法甚多陶隱居所撰太清諸石藥變化方言之備矣今道書中有之然修煉節度恐非文字可詳誠不可輕餌也又西南天竺等國出一種石謂之火齊亦云母之類也色如紫金離析之如蟬翼積之乃如紗谷重沓又云琉璃類也亦堪入藥雷公云凡使色黃黑者厚而頑赤色者經婦人手把者並不中用須要光瑩如冰色者為上凡修事一斤先用小地膽草紫背天葵生甘草地黃汁各一鎰乾者細銼濕者取汁了於瓷鍋中安雲母並諸藥了下天池水三鎰著火煮七日夜水火勿令失度其雲母自然成碧玉漿在鍋底卻以天池水猛投其中將物攪之浮如蝸涎者即去之如此三度淘淨了取沉香一兩搗作末以天池水煎沉香湯三升以來分為三度再淘雲母漿了日中曬任用之聖惠方治火瘡敗壞用雲母粉同生羊髓和如泥塗之千金方治風疹遍身百計治不瘥者煅雲母粉以清水調服之看人大小以意酌量與之多少服千金翼治熱風汗出心悶水和雲母服之不過再服立瘥又方治帶下溫水和服三方寸匕立見神效瘥又方治赤白痢積年不瘥飲調服方寸匕兩服立見神效又方治金瘡並一切惡瘡用雲母粉敷之絶妙又方治淋疾溫水和服三錢匕經效方青城山丈人觀主康豐傳治百病煅制雲母粉法雲母一斤折開揉碎入一大瓶內築實上澆水銀一兩封固以十斤頂火煅通赤取出卻拌香蔥紫引翹草二件合搗如泥後以夾絹袋盛於大水盆內搖取粉余滓未盡再添草藥重搗如前法取粉沉水乾以小木盤一面於灰上印一淺坑鋪紙傾粉在內直候乾移入火焙焙之取出細研以麵糊丸如梧桐子大遇有病者服之無不效知成都府辛諫議曾患大風衆醫不效遇此道士進得此方服之有神驗食醫心鏡治小兒赤白痢及水痢雲母粉半大兩研作粉煮白粥調空腹食之抱朴子服五云之法或以桂蔥水玉化之以為水或以露於鐵器中以元水熬之為水或以硝石合於筒中埋之為水或以蜜搜為酪或以秋露漬之百日𥯤囊挻以為粉或以無巔草摴血合餌之服之一年百病除三年久服返老成童五年不缺服可役使鬼神入火不燒入水不濡踐棘而不傷膚與仙人相見他物埋地物朽著火即焦而五云內猛火中經時終不焦埋之永不腐故能令人長生也服經十年雲氣常覆其上夫服其母以致其子其理之自然明皇雜録開元中有名醫紀朋者觀人顏色談笑知病深淺不待診脈帝聞之召於掖庭中看一宮人每日昃則笑歌啼號若狂疾而足不能履地朋視之曰此必因食飽而大促力頓僕於地而然乃飲以雲母湯令熟寐覺而失所苦問之乃言因太華公主載誕宮中大陳歌吹某乃主謳懼其聲不能清且長吃豚蹄羹飽而當筵歌大麴曲罷覺胸中甚熱戲於砌臺上高而墜下久而方蘇病狂足不能及地丹房鏡源雲母粉制汞伏丹砂亦可食之神仙傳宮嵩服雲母數百歲有童子顏色青霞子雲母久服寒暑難侵衍義曰雲母古雖有服煉法今人服者至少謹之至也市廛多折作花朵以售之今唯合雲母膏治一切癰毒瘡等惠民局別有法玉屑味甘平無毒主除胃中熱喘息煩悶止渴屑如麻豆服之久服輕身長年生藍田採無時惡鹿角陶隱居云此云玉屑亦是以玉為屑非應別一種物也仙經服玨玉有搗如米粒乃以苦酒輩消令如泥亦有合為漿者凡服玉皆不得用已成器物及冢中玉璞也好玉出藍田及南陽徐善亭部界中日南盧容水中外國於闐疏勒諸處皆善仙方名玉為玄真潔白如豬膏叩之鳴者是真也其比類甚多相似宜精別之所以燕石入笥卞氏長號也唐本注云餌玉當以消作水者為佳屑如麻豆服之取其精潤臟腑滓穢當完出也又為粉服之者使人淋壅屑如麻豆其義殊深臣禹錫等謹按抱朴子云玉屑服之與水餌之懼令人不死所以不及金者令人數數發熱似寒食散狀也若服玉屑者宜十日輒一服雄黃丹砂各一刀圭散發洗沐寒水迎風而行則不發熱也日華子云玉潤心肺明目滋毛髮助聲喉圖經曰玉按本經玉泉生藍田山谷玉屑生藍田陶隱居注云好玉出藍田及南陽徐善亭部界中日南盧容水中外國於闐疏勒諸處皆善今藍田南陽日南不聞有玉禮器及乘輿服御多是于闐國玉晉金州防禦判官平居誨天福中為鴻臚卿張鄴本二名上一字犯太祖廟諱上字使于闐判官回作行程記載其國採玉之地云玉河在於闐城外其源出崑山西流一千三百里至於闐界牛頭山乃疏為三河一曰白玉河在城東三十里二曰緑玉河在城西二十里三曰烏玉河在緑玉河西七里其源雖一而其玉隨地而變故其色不同每歲五六月大水暴漲則玉隨流而至玉之多寡由水之大小七八月水退乃可取彼之謂之撈玉其國之法官未採玉禁人輒至河濱者故其國中器用服飾往往用玉今中國所有多自彼來耳陶隱居云玉泉是玉之精華白者質色明徹可消之為水故名玉泉世人無復的識者唯通呼為玉爾玉屑是以玉為屑非應別是一物仙經服玨玉有搗如米粒乃以苦酒輩消令如泥亦有合為漿者蘇恭云玉泉者玉之泉液也以仙室池中者為上其以法化為玉漿者功劣於自然泉液也餌玉當以消作水者為佳又屑如麻豆服之取其精潤臟腑滓穢當完出若為粉服之即使人淋壅周禮玉府王齊則供食玉鄭康成注云玉是陽精之純者食之以御水氣王齊當食玉屑正義云玉屑研之乃可食然則玉泉今固無有玉屑醫方亦稀用祥符中先帝嘗令工人碎玉如米豆粒製作皆如陶蘇之説然亦不聞以供膳餌其云研之乃食如此恐非益人誠不可輕服也方書中面膏有用玉屑者此恐是研粉之乃可用既非服餌用之亦不害也書傳載玉之色曰赤如雞冠黃如蒸栗白如截肪黑如純漆謂之玉符而青玉獨無説焉又其質溫潤而澤其聲清越以長所以為貴也今五色玉清白者常有黑者時有黃赤者絶無雖禮之六器亦不能得其真今儀州出一種石如蒸栗色彼人謂之栗玉或云亦黃玉之類但少潤澤又聲不清越為不及耳然服玉食玉唯貴純白它色亦不取焉海藥云按異物志云出崑崙又淮南子云出鐘山又云藍田出美玉燕口出壁玉味鹹寒無毒主消渴滋養五臟止煩躁宜共金銀麥門冬等同煎服之甚有所益仙經云服玉如玉化水法在淮南三十六水法中載又別寶經云凡石韞玉但夜將石映燈看之內有紅光明如初出日便知有玉楚記卞和三獻玉不鑑所以遭刖足後有辨者映燈驗之方知玉在石內乃為玉璽價可重連城也李預每羡古人餐玉之法乃採訪藍田躬往掘得若環壁雜器形者大小百餘枚稍粗黑皆光潤可玩預乃捶七十枚成屑日食之經年云有效驗而世事寢息並不禁節又加之以好酒損志及疾篤謂妻子曰服玉當屏居山林排棄嗜欲或當有大神力而吾酒色不絶自致於死非藥之過也尸體必當有異於人勿使速殯令後人知餐服之驗時七月中旬長安毒熱預停尸四宿而體色不變其妻常氏以玉珠二枚含之口閉因囑其口都無穢氣寶藏論玉玄真者餌之其命無極令人舉身輕飛不但地仙而已然其道遲成服一二百斤乃可知也玉可以烏米酒及地榆酒化之為水亦可以蔥漿水消之為黏亦可餌以為丸可燒為粉服一年以上入水中不濡王莽遺孔休玉休不受莽曰君面有疵美玉可以滅瘢休猶不受莽曰君嫌其價逐捶碎進休休方受之青霞子玉屑一升地榆草一升稻米一升三物取白露二升置銅器中煮米熟絞取汁玉屑化為水名曰玉液以藥納杯中美醴所謂神仙玉漿也天寶遺事唐貴妃含玉咽津以解肺渴葉天師枕中記玉屑味甘和無毒屑如麻豆久服輕身長壽惡鹿角馬鳴先生金丹訣玉屑常服令人精神不亂丹房鏡源玉末養丹砂玉泉味甘平無毒主五臟百病柔筋強骨安魂魄長肌肉益氣利血脈療婦人帶下十二病除氣癃明耳目久服耐寒暑不飢渴不老神仙輕身長年人臨死服五斤死三年色不變一名玉札生藍田山谷採無時畏款冬花陶隱居云藍田在長安東南舊出美玉此當是玉之精華白者質色明徹可消之為水故名玉泉今人無復的識者唯通呼為玉爾張華又云服玉用藍田玨音角玉白色者此物平常服之則應神仙有人臨死服五斤死經三年其色不變古來發冢見尸如生者其身腹內外無不大有金玉漢制王公葬皆用珠檽玉匣是使不朽故也煉服之法亦應依仙經服玉法水屑隨宜雖曰性平而服玉者亦多乃發熱如寒食散狀金玉既天地重寶不比余石若未深解節度勿輕用之今按別本注云玉泉者玉之泉液也以仙室玉池中者為上今仙經三十六水法中化玉為玉漿稱為玉泉服之長年不老然功劣於自然泉液也一名玉液一名瓊漿臣禹錫等謹按日華子云玉泉治血塊圖經文具玉屑條下別説云謹按圖經説儀州栗玉乃黃石之光瑩者凡玉之所以異於石者以其堅而有理火刃不可傷為別爾今儀州黃石雖彼人強名栗玉乃輕小刀刃便可雕刻與階州白石同體而異色恐不足繼諸玉類衍義曰玉泉經云生藍田山谷採無時今藍田山谷無玉泉泉水古今不言採又曰服五斤古今方水不言斤又曰一名玉札如此則不知定是何物諸家所解更不言泉但為玉立文陶隱居雖曰可消之為水故名玉泉誠如是則當言玉水亦不當言玉泉也蓋泉具流布之義別之則無所不通易又曰山下出泉蒙如此則誠非止水終未臻厥理今詳泉字乃是漿字於義方允漿中既有玉故曰服五斤去古既遠亦文字脫誤也採玉為漿斷無疑焉且如書篇尚多亡逸況本草又在唐堯之上理亦無怪謂如蛇含本草誤為蛇全唐本注云全字乃是合字陶見誤本改為含尚如此不定後有鐵漿其義同此又道藏經有金飯玉漿之文唐李商隱有瓊漿未飲結成冰之詩是知玉誠可以為漿又荊門軍界有玉泉寺中有泉與尋常泉水無異亦不能治病寺中日用此水又西洛有萬安山山腹間有寺曰玉泉嘗兩登是山質玉泉之疑寺僧皆懵不能答寺前有泉一派供寺中用泉竇皆青石與諸井水無異若按別本注玉泉玉之泉液也以仙室玉池中者為上如此則舉世不能得亦漫立此名故知別本所注為不可取又有燕玉出燕北體柔脆如油和粉色不入藥當附於此石鐘乳味甘溫無毒主咳逆上氣明目益精安五臟通百節利九竅下乳汁益氣補虛損療腳弱疼冷下焦傷竭強陰久服延年益壽好顏色不老令人有子不煉服之令人淋一名公乳一名蘆石一名夏石生少室山谷及泰山採無時蛇床為之使惡牡丹玄石牡蒙畏紫石英蘘草陶隱居云第一齣始興而江陵及東境名山石洞亦皆有唯通中輕薄如鵝翎管碎之如爪甲中無雁齒光明者為善長挺乃有一二尺者色黃以苦酒洗刷則白仙經用之少而俗方所重亦甚貴唐本注云鍾乳第一始興其次廣連澧朗郴等州者雖厚而光潤可愛餌之並佳今峽州青溪房州三洞出者亞於始興自余非其土地不可輕服多發淋渴只可搗篩白練裹之合諸藥草浸酒服之陶云鍾乳一二尺者謬説今按別本注云凡乳生於深洞幽穴皆龍蛇潛伏或龍蛇毒氣或洞口陰陽不勻或通風氣雁齒澀或黃或赤乳無潤澤或其煎煉火色不調一煎以後不易水則生火毒即令服人發淋又乳有三種有石乳竹乳茅山之乳石乳者以其山洞純石以石津相滋陰陽交備蟬翼文成謂為石乳竹乳者以其山洞遍生小竹以竹津相滋乳如竹狀謂為竹乳茅山之乳者山有土石相雜遍生茅草以茅津相滋為乳乳色稍黑而滑潤石乳性溫竹乳性平茅山之乳微寒一種之中有上中下色余處亦有不可輕信凡乳光澤為好也臣禹錫等謹按吳氏云鍾乳一名虛中神農辛桐君黃帝醫和甘扁鵲甘無毒生山谷陰處岸下溜汁成如乳汁黃白色空中相通二月三月採陰乾藥性論云鍾乳亦名黃石砂有大毒主泄精寒嗽壯元氣建益陽事能通聲忌羊血蕭炳云如蟬翅者上爪甲者次鵝管者下明白薄者可服日華子云補五勞七傷通亮者為上更有蟬翼乳功亦同前凡將合鎮駐藥須是一氣研七周時點末臂上便入肉不見為度慮人歇即將鈴繫於捶柄上研常鳴為驗圖經曰石鐘乳生少室山谷及泰山今道州江華縣及連英韶階峽州山中皆有之生巖穴陰處溜山液而成空中相通長者六七寸如鵝翎管狀碎之如爪甲中無雁齒光明者善色白微紅採無時舊説乳有三種有石鐘乳者其山純石以石津相滋狀如蟬翼為石乳石乳性溫有竹乳者其山多生篁竹以竹津相滋乳如竹狀謂之竹乳竹乳性平有茅山之乳者其山土石相雜遍生茅草以茅津相滋乳色稍黑而滑潤謂之茅山之乳茅山之乳性微寒凡此三種尤難識別而唐李補闕煉鍾乳法云取韶州鍾乳無問厚薄但令顏色明淨光澤者即堪入煉唯黃赤二色不任用柳宗元與崔連州論鍾乳書云取其色之美而已不必唯土之信是此藥所重唯明白者不必盡如上所説數種也今醫家但以鵝管中空者為最又本經中品載殷孽云鍾乳根也生趙國山谷又生梁山及南海又云孔公孽殷孽根也生梁山山谷又云石花石床並與殷孽同陶隱居云凡鍾乳之類有三種同一體從石室上汁溜積久盤結者為鍾乳床即此孔公孽也其以次小巃嵸者為殷孽今人呼為孔公孽殷孽復溜輕好者為鍾乳雖同一類而療體為異蘇恭云二孽在上床花在下陶謂孔公孽為乳床非也又有石腦云亦鍾乳之類凡此五種今醫家稀復用之但用鍾乳耳又觀二孽所出州郡不同陶云三種同根而所出各處當是隨其土地為勝既云是鍾乳同生則有孽處皆當有乳今並不聞有之豈用之既寡則採者亦稀乎抑時人不知孽中有乳故不盡採乎不能盡究也下品又有土陰孽經云生高山崖上之陰色白如脂陶隱居以為鍾乳孔公孽之類蘇恭云即土乳也出渭州生平地土窟中土人云服之亦同鍾乳而不發熱又云是土之脂液狀如殷孽故名之今亦不見用者雷公云凡使勿用頭粗厚並尾大者為孔公石不用色黑及經大火驚過並久在地上收者曾經藥物制者並不得用須要鮮明薄而有光潤者似鵝翎筒子為上有長五六寸者凡修事法以五香水煮過一伏時然後漉出又別用甘草紫背天葵汁漬再煮一伏時凡八兩鍾乳用沉香零陵藿香甘松白茅等各一兩以水先煮過一度了第二度方用甘草等二味各二兩再煮了漉出拭乾緩火焙之然後入臼杵如粉篩過卻入鉢中令有力少壯者三兩人不住研三日夜勿歇然後用水飛澄了以絹籠之於日中曬令乾又入鉢中研二萬遍後以瓷合子收貯用之傷寒類要治舌疸渴而數飲用鐘乳石主之柳宗元與崔連州書論石鐘乳直産於石石之精粗疏密尋尺特異而穴之上下土之薄厚不可知則其依而産者固不一性然由其精密而出者則油然而清炯然而輝其竅滑以夷其肌廉以微食之使人榮華溫柔其氣宣流生胃通腸壽考康寧其粗疏而下者則奔突結澀乍大乍小色如枯骨或類死灰淹悴不發叢齒積纇重濁頑璞食之使偃塞壅鬱泄火生風戟喉癢肺幽關不聰心煩喜怒肝舉氣剛不能平和故君子慎取其色之美而不必唯土之信以求其至精凡為此也太清石壁記煉鍾乳法太清經云取好細末置金銀甌器中瓦一片密蓋甌上勿令泄氣蒸之自然化作水丹房鏡源乳石可為外匱青霞子補髓添精衍義曰石鐘乳蕭炳云如蟬翼爪甲者為上如鵝管者下經既言乳今復不取乳此何義也蓋乳取性下不用如雁齒者謂如烏頭附子不用尖角之義同但明白光潤輕鬆色如煉硝石者佳服煉別有法礬石味酸寒無毒主寒熱泄痢白沃陰蝕惡瘡目痛堅骨齒除固熱在骨髓去鼻中息肉煉餌服之輕身不老增年歧伯云久服傷人骨能使鐵為銅一名羽涅一名羽澤生河西山谷及隴西武都石門採無時甘草為之使惡牡蠣陶隱居云今出益州北部西川從河西來色青白生者名馬齒礬已煉成絶白蜀人又以當硝石名白礬其黃黑者名雞屎礬不入藥唯堪鍍作以合熟銅投苦酒中塗鐵皆作銅色外雖銅色內質不變仙經單餌之丹方亦用俗中合藥皆先火熬令沸燥以療齒痛多即壞齒是傷骨之證而云堅骨齒誠為疑也唐本注云礬石有五種青礬白礬黃礬黑礬絳礬然白礬多入藥用青黑二礬療疳及諸瘡黃礬亦療瘡生肉兼染皮用之其絳礬本來緑色新出窟未見風者正如琉璃陶及今人謂之石膽燒之赤色故名絳礬矣出瓜洲今注陶云蜀人用白礬當硝石誤也臣禹錫等謹按藥性論云礬石使一名理石畏麻黃有小毒能治鼠漏瘰癧療鼻衄治齆鼻生含咽津治急喉痹日華子云白礬性涼除風去勞消痰止渴暖水臟治中風失音疥癬和桃仁蔥湯浴可出汗也圖經曰礬石生河西山谷及隴西武都石門今白礬則晉州慈州無為軍緑礬則隰州溫泉縣池州銅陵縣並煎礬處出焉初生皆石也採得碎之煎煉乃成礬凡有五種其色各異謂白礬緑礬黃礬黑礬絳礬也白礬則入藥及染人所用者緑礬亦入咽喉口齒藥及染色黃礬丹灶家所須時亦入藥黑礬唯出西戎赤謂之皂礬染須鬢藥或用之絳礬本來緑色亦謂之石膽燒之赤色故有絳名今亦稀見又有礬精礬蝴蝶皆煉白礬時候其極沸盤心有濺溢者如物飛出以鐵匕接之作蟲形者礬蝴蝶也但成塊光瑩如水晶者礬精也此二種入藥力緊於常礬也又有一種柳絮礬亦出礬處有之煎煉而成輕虛如綿絮故以名之今醫家用治痰壅及心肺煩熱甚佳劉禹錫傳信方治氣痢巴石丸取白礬一大斤以炭火淨地燒令汁盡則其色如雪謂之巴石取一大兩細研治以熟豬肝作丸空腹飲下丸數隨氣力加減水牛肝更佳如素食人蒸餅丸之亦通或云白礬中青黑者名巴石又治蛇咬蠍螫燒刀子頭令赤以白礬置刀上看成汁便熱滴咬處立瘥此極神驗得力者數十人正元十三年有兩僧流向南到鄧州俱為蛇齧令用此法救之敷藥了便瘥更無他苦又崔氏方治甲疽或因割甲傷肌或因甲長侵肉遂成瘡腫痛復緣窄靴研損四邊腫焮黃水出浸淫相染五指俱爛漸漸引上腳趺泡漿四邊起如火燒瘡日夜倍增醫方所不能療者緑礬石五兩形色似朴硝而緑色取此一物置於鐵板上聚炭封之囊袋吹令火熾其礬即沸流出色赤如融金汁者是真也看沸定汁盡去火待冷取出挪為末色似黃丹收之先以鹽湯洗瘡拭乾用散敷瘡上唯多為佳著藥訖以軟帛緩裹當日即汁斷瘡干若患痛急即塗少酥令潤每日一遍鹽湯洗濯有膿處常洗使淨其痂干處不須近每洗訖敷藥如初但急痛即塗酥五日即覺上痂漸剝起亦依前洗敷藥十日即瘡漸漸剝盡痂落軟處或更生白膿胞即擦破敷藥自然總瘥刑部張侍郎親嬰此病臥經六十日困頓不復可言京衆醫並經造問皆隨意處方無效驗唯此法得效如神故録之以貽好事者又有皂莢礬亦入藥或云即緑礬也傳信方治喉痹用之取皂莢礬入好米醋或常用釅醋亦通二物同研咽之立瘥如若喉中偏一旁痛即側臥就痛處含之勿咽云此法出於李謨甚奇黃礬入藥見崔元亮海上方滅瘢膏以黃礬石燒令汁出胡粉炒令黃各八分唯須細研以臘月豬脂和更研如泥先取生布揩令痛即用藥塗五度又取鷹糞白燕窠中草燒作灰等分和人乳塗之其瘢自滅肉平如故雷公云凡使須以瓷瓶盛於火中煅令內外通赤用鉗揭起蓋旋安石蜂窠於赤瓶子中燒蜂窠盡為度將鉗夾出放冷敲碎入鉢中研如粉後於屋下掘一坑可深五寸卻以紙裹留坑中一宿取出再研每修事十兩用石蜂窠六兩盡為度又云凡使要光明如水精酸咸澀味全者研如粉於瓷瓶中盛其瓶盛得三升以來以六一泥泥於火畔炙之令乾研了置白礬於瓶內用五方草紫背天葵二味自然汁各一鎰旋旋添白礬於中下火逼令藥汁干用蓋子蓋瓶口更以泥泥上下用火一百斤煅從巳至未去火取白礬瓶出放冷敲破取白礬若經大火一煅色如銀自然伏火銖纍不失搗細研如輕粉方用之聖惠方治小兒臍中汁出不止並赤腫用礬燒灰細研敷之外臺祕要療胸中多痰瘀癖礬石一兩以水二升煮取一升納蜜半合頓服須臾未吐當飲少熱湯又方主目翳及胬肉用礬石最白者內一黍米大於翳上及胬肉上即令淚出綿拭之令惡汁盡其疾日日減翳自消薄便瘥礬石須真白好者方可使用千金方治小兒舌上瘡飲乳不得以白礬和雞子置醋中塗兒足底二七即愈又方治鼻中息肉以礬石末面脂和綿裹塞鼻中數日息肉自隨其藥出又方治齒齦間津液血出不止以礬石一兩燒水三升煮取一升先拭齒乃含之千金翼治陰癢脫方燒礬石一味研為末每日空心酒調方寸匕服日三又方治腳氣衝心白礬二兩以水一斗五升煎三五沸浸洗腳良肘後方救卒死而壯熱者礬石半斤水一斗半煮消以浸腳及踝即得蘇也又方目中風腫赤眼方礬石二錢熬和棗丸如彈丸以摩上下食頃止日三度又方足大指角忽為甲所入肉便刺作瘡不可著履靴用礬石一物燒汁盡取末著瘡中食惡肉生好肉細細割去甲角旬日即瘥此方神效又方療猘犬咬人摻礬石末內瘡中裹之止痛其瘡速愈又方療耳卒腫出膿水方礬石燒末以筆管吹耳內日三四度或以綿裹塞耳中立瘥又方療人陰生瘡膿出作臼取高昌白礬一兩研作末用豬脂相和成膏槐白皮作湯洗瘡拭令乾即塗膏然後以楸葉貼其上不過三度瘥又方患歷齒積久碎壞欲盡常以綿裹礬石含嚼之吐汁也經驗方治大小便不通用白礬細研末令患人仰臥置礬末於臍中滿以新汲水滴之候患人覺冷透腹內即自然通如為曾灸無臍孔即於元灸盤上用紙作環子籠灸盤高一指半以來著礬末在內仍依前法用水滴之孫真人食忌主蠍螫以礬石一兩醋半升煎之投礬末於醋中浸螫處王氏博濟治驢涎馬汗毒所傷神效白礬飛過黃丹炒令紫色各等分相袞合調貼患處靈苑治折傷先用止痛湯法搗白礬為末每用一匙匕沸湯一碗沖了以手帕蘸乘熱尉傷處少時痛止然後排整筋骨貼藥孫用和治懸癰垂長咽中妨悶白礬一兩燒灰鹽花一兩上二味細研為散以箸頭點藥在上瘥子母祕録治小兒風疹不止白礬十二分暖熱酒投化用馬尾搵酒塗之姚和衆治小兒目睛上白膜白礬一分以水四合熟銅器中煎取半合下少白蜜調之以綿濾過每日三度點一芥子大又方初生小兒産下有皮膜如榴中膜裹舌或遍舌根可以指甲刺破令血出燒礬灰細研敷之半緑豆許若不摘去兒必啞御藥院治腳膝風濕虛汗少力多疼痛及陰汗燒礬作灰細研末一匙頭沸湯投之淋洗痛處丹房鏡源紫礬石可制汞異苑魏武北征踏頓升嶺眺矚見山岡不生百草王粲曰是古冢此人在世服礬石而石生熱蒸出外故卉木焦滅即令發看果得大墓內有礬石滿塋太平廣記壁鏡毒人必死用白礬治之簡要濟衆治牙齒腫痛白礬一兩燒灰大露蜂房一兩微炙為散每用二錢水一中盞煎十餘沸熱炸牙令吐之衍義曰礬石今坊州礬務以其火燒過石取以煎礬色唯白不逮晉州者皆不可多服損心肺卻水故也水化書紙上才幹水不能濡故知其性卻水治涎藥多須者用此意爾火枯為粉貼嵌甲牙縫中血出如衄者貼之亦愈硝石味苦辛寒大寒無毒主五臟積熱胃脹閉滌去蓄結飲食推陳致新除邪氣療五臟十二經脈中百二十疾暴傷寒腹中大熱止煩悶消渴利小便及瘻蝕瘡煉之如膏久服輕身天地至神之物能化成十二種石一名芒硝生益州山谷及武都隴西西羌採無時火為之使惡苦參苦菜畏女苑陶隱居云療病亦與朴硝相似仙經多用此消化諸石今無正識別此者頃來尋訪猶云與朴硝同山所以朴硝名硝石朴也如此則非一種物先時有人得一種物其色理與朴硝在大同小異朏朏如握鹽雪不冰強燒之紫青煙起仍成灰不停沸如朴硝云是真硝石也此又云一名芒硝今芒硝乃是煉朴硝作之與后皇甫説同並未得核研其驗須試效當更證記爾化硝石法在三十六水方中隴西蜀秦州在長安西羌中今宕昌以北諸山有鹹土處皆有之唐本注云此即芒硝是也朴硝一名硝石朴今煉粗惡朴硝淋取汁煎煉作芒硝即是硝石本經一名芒硝後人更出芒硝條謬矣今注此即地霜也所在山澤冬月地上有霜掃取以水淋汁後乃煎煉而成蓋以能消化諸石故名硝石非與朴硝芒硝同類而有硝名也一名芒硝者以其初煎煉時有細芒而狀若硝故有芒硝之號與後條芒硝全別舊經陶注引證多端蓋不的識之故也今不取焉臣禹錫等謹按蜀本云大黃為使按今硝石是煉朴硝或地霜為之狀如叉腳好者長五分以來能化七十二種石為水故名硝石吳氏云硝石神農苦扁鵲甘藥性論云硝石君惡曾青畏粥味鹹有小毒主項下瘰癧瀉得根出破血一名芒硝燒之即成硝石矣主破積散堅結一作苦硝甚治腹脹其硝石芒硝多川原人制作問之詳其理日華子云硝石畏杏仁竹葉含之治喉閉真者火上伏法用柳枝湯煎三周時如湯減少即入熱者伏火即止也圖經文具朴硝條下雷公云凡使先研如粉以磁瓶子於五斤火中煅令通赤用雞腸菜柏子仁和作一處分丸如小帝珠子許待瓶子赤時投硝石於瓶子內其硝石自然伏火每四兩硝石用雞腸菜柏子仁共十五個帝珠子盡為度聖惠方治眼赤痛用硝石研令極細每夜臨臥以銅箸取如黍米大點目眥頭至明旦以鹽漿水洗之外臺祕要療惡寒嗇嗇似欲發背或已生瘡腫癮疹起方硝石三兩以暖水一升和令硝待冷取故青布揲三重可似赤處方圓濕布拓之熱即換頻易立瘥靈苑方治五種淋疾勞淋血淋熱淋氣淋石淋及小便不通至甚者透格散用硝石一兩不夾泥土雪白者生研為細末每服二錢諸淋各依湯使如後勞淋勞倦虛損小便不出小腹急痛葵子末煎湯下通後便須服補虛丸散血淋小便不出時下血疼痛滿急熱淋小便熱赤色淋瀝不快臍下急痛並用冷水調下氣淋小腹滿急尿後常有餘瀝木通煎湯下石淋莖內痛尿不能出內引小腹膨脹急痛尿下砂石令人悶絶將藥末先入銚子內隔紙炒至紙焦為度再研令細用溫水調下小便不通小麥湯下卒患諸淋並只以冷水調下並空心先調使藥消散如水即服之更以湯送下服諸藥未效者服此立愈陳藏器拾遺序頭疼欲死鼻內吹消末愈兵部手集服丹石人有熱瘡疼不可忍方用紙環圍腫處中心填硝石令滿匙抄水淋之覺甚不熱疼即止寶藏論硝石若草伏而斤兩不折軟切金銀銅鐵硬物立軟史記淳于意災川王美人懷子而不乳來召意意往飲以莨菪藥一撮以酒飲之旋乳意復診其脈而脈躁躁者有餘病即飲以硝石一劑出血如豆比五六枚衍義曰硝石是再煎煉時已取訖芒硝凝結在下如石者精英既去但余滓而已故功力亦緩唯能發煙火唐本注蓋以能消化諸石故曰硝石煎柳枝湯煮三周時即伏火湯耗即又添柳枝湯芒硝味辛苦大寒主五臟積聚久熱胃閉除邪氣破留血腹中痰實結搏通經脈利大小便及月水破五淋推陳致新生於朴硝石韋為之使惡麥句薑陶隱居云按神農本經無芒硝只有硝石名芒硝爾後名醫別載此説其療與硝石正同疑此即是硝石舊出寧州黃白粒大味極辛苦頃來寧州道斷都絶今醫家多用煮煉作者色全白粒細而味不甚烈此云生於朴硝則作者亦好又皇甫士安解散硝石大凡説云無朴硝可用硝石生山之陰鹽之膽也取石脾與硝石以水煮之一斛得三斗正白如雪以水投中即消故名硝石其味苦無毒主消渴熱中止煩悶三月採於赤山朴硝者亦生山之陰有鹽鹹苦水則朴硝生於其陽其味苦無毒其色黃白主療熱腹中飽脹養胃消穀去邪氣亦得水而消其療與硝石小異按如此説是取芒硝合煮更成為真硝石但不知石脾復是何物本草乃有石脾石肺人無識者皇甫既是安定人又明醫藥或當詳煉之以朴硝作芒硝者但以暖湯淋朴硝取汁清澄煮之減半出著木盆中經宿即成狀如白石英皆六道也作之忌雜人臨視今益州人復煉礬石作硝石絶柔白而味猶是礬石爾孔氏解散方又云熬煉硝石令沸定汁盡如此硝石猶是有汁也今仙家須之能化他石乃用於理第一唐本注云晉宋古方多用硝石少用芒硝近代諸醫但用芒硝鮮言硝石豈古人昧於芒硝也本經云生於朴硝朴硝一名硝石朴硝石一名芒硝理既明白不合重出之今注此即出於朴硝以暖水淋朴硝取汁煉之令減半投於盆中經宿乃有細芒生故謂之芒硝也又有英硝者其狀若白石英作四五稜白色瑩徹可愛主療與芒硝頗同亦出於朴硝其煎煉自別有法亦呼為馬牙硝唐注以此為硝石同類深為謬矣臣禹錫等謹按蜀本又一説人若常煉石而服者至歿冢中生懸石名芒硝冷如雪能殺火毒與此不同舊注説朴硝硝石芒硝等互有得失乃云不合重有芒硝條也夫朴硝一名硝石朴即煉朴硝成硝石明矣故有硝石條焉又硝石一名芒硝即明芒硝亦是煉朴硝而成也凡藥雖為一體蓋同出而異名修煉之法既殊主治之功遂別矣藥性論云芒硝使味鹹有小毒能通女子月閉癥瘕下瘰癧黃疸病主墮胎患漆瘡汁敷之主時疾壅熱能散惡血陳藏器云石脾芒硝硝石並出於西戎鹵地鹹水結成所主亦以類相次圖經云文具朴硝條下雷公云凡使先以水飛過用五重紙滴過去腳於鐺中干之方入乳鉢研如粉任用芒硝是朴硝中煉出形似麥芒者號曰芒硝聖惠方治伐指用芒硝煎湯淋漬之千金方療漆瘡方用湯漬芒硝令濃塗之干即易之梅師方治火丹毒水調芒硝塗之又方治一切疹以水煮芒硝塗之又方治傷寒發豌豆瘡未成膿研芒硝用豬膽相和塗瘡上立效子母祕録小兒赤遊行於體上下至心即死以芒硝納湯中取濃汁以拭丹上百一方療關膈大小便不通脹滿欲死兩三日則殺人芒硝三兩紙裹三四重炭火燒之令內一升湯中盡服當先飲湯一升已吐出乃服之孫真人食忌主眼有翳取芒硝一大兩置銅器中急火上煉之放冷後以生絹細羅點眼角中每夜欲臥時一度點妙丹房鏡源芒硝伏雌黃衍義曰芒硝經云生於朴硝乃是朴硝以水淋汁澄清再經熬煉減半傾木盆中經宿遂結芒有廉稜者故其性和緩古今多用以治傷寒朴硝味苦辛寒大寒無毒主百病除寒熱邪氣逐六府積聚結固留癖胃中食飲熱結破留血閉絶停痰痞滿推陳致新能化七十二種石煉餌服之輕身神仙煉之白如銀能寒能熱能滑能澀能辛能苦能咸能酸入地千歲不變色青白者佳黃者傷人赤者殺人一名硝石朴生益州山谷有鹹水之陽採無時畏麥句薑陶隱居云今出益州北部故汶山郡西川蠶陵二縣界生山崖上色多青白亦雜黑斑俗人擇取白軟者以當硝石用之當燒令汁沸出狀如礬石也仙經唯云硝石能化他石今此亦云能化石疑必相似可試之唐本注云此物有二種有縱理縵理用之無別白軟者朴硝苗也虛軟少力煉為硝石所得不多以當硝石功力大劣也今注今出益州彼人採之以水淋取汁煎煉而成朴硝也一名硝石朴者硝即是本體之名石者乃堅白之號朴者即未化之義也以其芒硝英硝皆從此出故為硝石朴也其英硝即今俗間謂之馬牙硝者是也臣禹錫等謹按藥性論云朴硝君味苦咸有小毒能治腹脹大小便不通女子月候不通日華子云主通泄五臟百病及癥結治天行熱疾消腫毒及頭痛排膿潤毛髮凡入飲藥先安於盞內攪熱藥澆服圖經曰朴硝生益州山谷有鹹水之陽硝石生益州山谷及武都隴西西羌芒硝生於朴硝今南北皆有之而以西川者為佳舊説三物同種初採得其苗以水淋取汁煎煉而成乃朴硝也一名硝石朴以硝石出於其中又煉朴硝或地霜而成堅白如石者乃硝石也一名芒硝又取朴硝以暖水淋汁煉之減半投於盆中經宿而有細芒生乃芒硝也雖一體異名而修煉之法既殊則主治之功別矣然本經各載所出疑是二種而今醫方家所用亦不復能究其所來但以未煉成塊微青色者為朴硝煉成盆中上有芒者為芒硝亦謂之盆硝其芒硝底澄凝者為硝石朴硝力緊芒硝次之硝石更緩未知孰為真者又按蘇恭謂晉宋古方多用硝石少用芒硝近代諸醫但用芒硝鮮言硝石是不然也張仲景傷寒方承氣湯陷胸丸之類皆用芒硝葛洪肘後方傷寒時氣溫病亦多用芒硝唯治食膾胸膈中不化方用朴硝云無朴硝者以芒硝代皆可用也是晉宋以前通用朴硝芒硝矣又胡洽方十棗湯用芒硝大五飲丸用硝石亦云無硝石用芒硝是梁隋間通用芒硝硝石矣以此言之朴硝硝石為精芒硝為粗故陶隱居引皇甫士安煉硝石法云乃是取芒硝與石脾合煮成為真硝石然石脾無復識者又注礬石云生者名馬齒礬青白色已煉成絶白蜀人以當硝石是硝石當時已為難得其真矣故方書罕用通以相代若然今所用者雖非真識而其功效既相近亦可通用無疑矣其本經所以各載所出州土者乃方俗治煉之法有精粗故須分別耳至如芎藭之與蘼蕪大戟之與澤漆俱是一物本經亦各著州土者蓋根與苗土地各有所宜非別是一物則朴硝硝石別著所出亦其義也他同此比又有英硝者亦出於朴硝其狀若白石英作四五稜白色瑩徹可愛功用與芒硝頗同但不能下利力差小耳亦謂之馬牙硝蓋以類得名近世用之最多又金石凌法用馬牙硝芒硝朴硝硝石四種相參次第下之詳此法出於唐世不知當時如何分別也又下有生硝條云生茂州西山岩石間其形塊大小不常色青白鮮見用者而今醫家又用一種甜消彌更精好或疑是此乃云出於英硝煉治之法未聞又南方醫人論消或小異有著説云本草有朴硝硝石芒硝而無馬牙硝諸家所注本草三種竟無堅決或言芒硝硝石本是一物不合重出又言煎煉朴硝投於盆中經宿乃有細芒既如是自當為馬牙硝又云馬牙硝亦名英硝自是一物既以芒硝為朴硝所出不應更有英硝今諸硝之體各異理亦易明而至若此之惑也朴硝味苦而微咸本經言苦名醫別録以為辛蓋誤謂硝石也出蜀部者瑩白如冰雪內地者小黑皆蘇脆易碎風吹之則結霜泯泯如粉熬之煬沸亦可熔鑄以水合甘草豬膽煮之減半投大盆中又下凝水石屑同漬一宿則凝結如白石英者芒硝也掃地霜煎煉而成如解鹽而味辛苦燒之成焰都盡則硝石也能化金石又性畏火而能制諸石使拒火亦天地之神物也牙消則芒硝是也又有生硝不因煮煉而成亦出蜀道類朴硝而小堅也其論雖辨然與古人所説殊別亦未可全信也張仲景傷寒論療膀胱急小腹滿身盡黃額上黑及足下熱因作黑疸大便必黑腹臚脹滿如水狀大便溏者女勞得之非水也腹滿者難療硝石礬石散主之硝石熬黃礬石燒令汁盡二物等之合夾絹篩大麥粥汁和服方寸匕日三重衣覆取微汗病隨大小便去小便正黃大便正黑也大麥用無皮者千金方硝石用二分礬石用一分劉禹錫傳信方著石旻山人甘露飯療熱壅涼膈上嘔積滯蜀朴硝成末每一大斤用蜜冬用十三兩春夏秋用十二兩先搗篩朴硝成末後以白蜜和令勻便入新青竹筒隨小大者一節著藥得半筒以上即止不得令滿卻入炊甑中令有藥處在飯內其虛處出其上不妨甑簞即得候飯熟取出承熱綿濾入一瓷鉢中竹萆攪勿停手令至凝即藥成收入閣中如熱月即於冷水中浸鉢然後攪每食後或欲臥時含一匙半匙漸漸咽之如要通轉亦得聖惠方治時氣頭痛不止用朴硝二兩搗羅為散用生油調塗於頂上又方治乳石發動煩悶及諸風熱用朴硝煉成者半兩細研如粉每服以蜜水調下一錢匕日三四服外臺祕要療喉痹神驗朴硝一兩細細含咽汁頃刻立瘥孫真人食忌主口瘡取朴硝含之簡要濟衆治小便不通膀胱熱白花散朴硝不以多少研為末每服二錢匕溫茴香酒調下無時服衍義曰朴硝是初採掃得一煎而成者未經再煉治故曰朴硝其味酷澀所以力堅急而不和可以熟生牛馬皮及治金銀有偽葛洪治食膾不化取此以蕩逐之臘月中以新瓦罐滿注熱水用朴硝二升投湯中攪散挂北簷下俟硝滲出罐外羽收之以人乳汁調半錢掃一切風熱毒氣攻注目瞼外及發於頭面四肢腫痛應手神驗玄明粉味辛甘性冷無毒治心熱煩躁並五臟宿滯癥結明目退膈上虛熱消腫毒此即朴硝煉成者新補見藥性論並日華子仙經以朴硝制伏為玄明粉朴硝是太陰之精華水之子也陰中有陽之藥太陰號曰玄明粉內搜衆疾功莫大焉治一切熱毒風搜冷痃癖氣脹滿五勞七傷骨蒸傳尸頭痛煩熱搜除惡疾五臟祕澀大小腸不通三焦熱淋疰忤疾咳嗽嘔逆口苦幹澀咽喉閉塞心肝脾肺臟胃積熱驚悸健忘榮衛不調中酒中膾飲食過度腰膝冷痛手腳痠久冷久熱四肢壅塞背膊拘急眼昏目眩久視無力腸風痔病血癖不調婦人産後小兒疳氣陰毒傷寒表裡疫癘等疾並悉治之此藥久服令人身輕耳明駐顏延壽急解毒藥補益妙唐明皇帝聞説終南山有道士劉玄真服食此藥遂詔而問曰朕聞卿壽約三百歲服食何藥得住世間充悅如此玄真答曰臣按仙經修煉朴硝號玄明粉只服此藥遂無病長生其藥無滓性溫能除衆疾生餌尚能救急難性命何況修煉長服益精壯氣助陽證陰不拘丈夫婦人幼稚襁褓不問四時冷熱即食後冷熱俱治一兩分為十二服但臨時酌量加減似覺壅熱傷寒頭痛鼻塞四肢不舉飲食不下煩悶氣脹不論晝夜急疾要宣瀉求安即看年紀高下用藥一分或至半兩酌量加減用桃花湯下為使最上次用蔥湯下如未通宣更以湯一碗或兩碗投之即驗自然調補如常要微暢不祕澀但長服之稍稍得力朝服暮服應不搜刮人五臟怡怡自泰其藥初服之時每日空腹酒飲茶湯任下三錢匕食後良久更下三錢匕七日內常微瀉利黃黑水涎沫等此是搜淘諸疾根本出去勿用畏之七日後漸覺腹臟暖消食下氣唯忌食苦參或食諸魚藕菜飲食諸毒藥解法用蔥白煎湯一茶碗調玄明粉兩錢頓服之其諸毒藥立瀉下若女人身懷六甲長服安胎誕孩子生日無瘡腫疾病長服除故養新氣血日安如有偶中毒物取地膽一分薺苨犀角各半兩服之立解如長服用大麻湯下為使此藥偏暖水臟女人服補血脈及治骨蒸五勞驚悸健忘熱毒風等服之立愈令人悅澤開關健脾輕身延壽駐精神明目諸餘功效不可具載有傳在太陰經中朴硝二斤須是白淨者以瓷爐一個疊實卻以瓦一片蓋爐用十斤炭火一煅爐口不蓋著炭一條候沸定了方蓋之復以十五斤炭煅之放冷一伏時提爐出藥以紙攤在地上盆蓋之一伏時日曬取干入甘草二兩生熟用細搗羅為末馬牙硝味甘大寒無毒能除五臟積熱伏氣末篩點眼及點眼藥中用甚去赤腫障翳澀淚痛新補見藥性論並日華子圖經文已具朴硝條中經驗方治食物過飽不消遂成痞鬲馬牙硝一兩碎之吳茱萸半升陳者煎取茱萸濃汁投硝乘熱服良久未轉更進一服立愈竇群在常州此方得效又方退翳明目白龍散馬牙硝光淨者用厚紙裹令按實安在懷內著肉處養一百二十日取出研如粉入少龍腦同研細不計年歲深遠眼內生翳膜漸漸昏暗遠視不明但瞳仁不破散並醫得每點用藥末兩米許點目中簡要濟衆治小兒鵝口細研馬牙硝於舌上摻之日三五度姚和衆治小兒重舌馬牙硝塗舌下日三度太清伏煉靈砂法馬牙硝陰極之精能制伏陽精消化火石之氣丹房鏡源養丹砂制硇砂生硝味苦大寒無毒主風熱癲癇小兒驚邪瘛瘲風眩頭痛肺壅耳聾口瘡喉痹咽塞牙頷腫痛目赤熱痛多眵淚生茂州西山岩石間其形塊大小不定色青白採無時惡麥句薑今附圖經文附朴硝條下滑石味甘寒大寒無毒主身熱泄澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣通九竅六腑津液去留結止渴令人利中久服輕身耐飢長年一名液石一名共石一名脫石一名番石生赭陽山谷及泰山之陰或掖北白山或卷山採無時石韋為之使惡曾青陶隱居云滑石色正白仙經用之以為泥又有冷石小青黃性並冷利亦能尉油汙衣物今出湘州始安郡諸處初取軟如泥久漸堅強人多以作冢中明器物並散熱人用之不正入方藥赭陽縣先屬南陽漢哀帝置明本經所注郡縣必是後漢時也掖縣屬青州東萊卷縣屬司州榮陽唐本注云此石所在皆有嶺南始安出者白如凝脂極軟滑其出掖縣者理粗質青白黑點唯可為器不堪入藥齊州南山神通寺南谷亦大有色青白不佳至於滑膩猶勝掖縣者臣禹錫等謹按藥性論云滑石臣一名夕冷能療五淋主難産服其末又末與丹參蜜豬脂為膏入其月即空心酒下彈丸大臨産倍服令滑胎易生除煩熱心躁偏主石淋陳藏器云按始安及掖縣所出二石形質既異所用又殊陶云不知今北方有之否當陶之時北方阻絶不知之者曷足怪焉蘇恭引為一物深可嗟訝其始安者軟滑而白是滑石東萊者硬澀而青乃作器石也南越志云膋城縣出膋石膋石即滑石也土人以為燒器以烹魚日華子云滑石治乳癰利津液圖經曰滑石生赭陽山谷及泰山之陰或掖北白山或卷山今道永萊濠州皆有之此有二種道永州出者白滑如凝脂南越志云膋城縣出膋石膋石即滑石也土人以為燒器用以烹魚是也萊濠州出者理粗質青有白黑點亦謂之斑石二種皆可作器用甚精好初出軟爛如泥久漸堅強彼人皆就穴中乘其軟時製作用力殊少不然堅強費功本經所載土地皆是北方而今醫家所用多是色白者乃自南方來又按雷斆炮炙方滑石有五色當用白色如方解石者其緑色者性寒有毒不入藥又云凡滑石似冰白青色畫石上有白膩文者為真如此説則與今南中來者又皆相類用之無疑矣然雷斆雖名隋人觀其書乃有言唐以後藥名者或是後人增損之歟或云沂州出一種白滑石甚佳與本經所云泰山之陰相合然彼土不取為藥故醫人亦鮮知用之今濠州醫人所供青滑石云性微寒無毒主心氣澀滯與本經大同小異又吳録地理志及太康地記云鬱林州布山縣多虺其毒殺人有冷石可以解之石色赤黑味苦屑之著瘡中並以切齒立蘇一名切齒石今人多用冷石作粉治痱瘡或云即滑石也但味之甘苦不同耳按古方利小便治淋澀多單使滑石又與石韋同搗末飲服刀圭更快又主石淋發煩悶取滑石十二分研粉分兩服以水和攪令散頓服之煩熱定即停後服未已盡服必瘥雷公云凡使有多般勿誤使之有白滑石緑滑石烏滑石冷滑石黃滑石其白滑石如方解石色白於石上畫有白膩紋方使得滑石緑者性寒有毒不入藥中用烏滑石似黳色畫石上有青白膩紋入用妙也黃滑石色似金顆顆圓畫石上有青黑色者勿用殺人冷滑石青蒼色畫石上作白膩文亦勿用若滑石色似冰白青色畫石上有白膩文者真也凡使先以刀刮研如粉以牡丹皮同煮一伏時出去牡丹皮取滑石卻用東流水淘過於日中曬乾方用聖惠方治乳石發動躁熱煩渴不止滑石半兩細研如粉以水一中盞絞如白飲頓服之未瘥再服又方治婦人過忍小便致胞轉滑石末蔥湯調下二錢匕又方治膈上煩熱多渴通利九竅滑石二兩搗碎以水三大盞煎取二盞去滓下粳米二合煮粥溫溫食之效外臺祕要療妊娠不得小便滑石末水和泥臍下二寸廣利方治氣壅關格不通小便淋結臍下妨悶兼痛以滑石八分研如面以水五大合和攪頓服楊氏産乳療小便不通滑石末一升以車前汁和塗臍四畔方四寸熱即易之冬月水和亦得丹房鏡源滑石能制雄雌黃為外匱周禮以滑養竅注云滑石也凡諸物通利往來似竅衍義曰滑石今謂之畫石以其軟滑可寫畫淋家多用若暴得吐逆不下食以生細末二錢匕溫水服仍急以熱面半盞押定石膽味酸辛寒有毒主明目目痛金瘡諸癇痙女子陰蝕痛石淋寒熱崩中下血諸邪毒氣令人有子散症積咳逆上氣及鼠瘻惡瘡煉餌服之不老久服增壽神仙能化鐵為銅成金銀一名畢石一名黑石一名棋石一名銅勒生羌道山谷羌里句青山二月庚子辛丑日採水英為之使畏牡桂菌桂芫花辛夷白薇陶隱居云仙經有用此處俗方甚少此藥殆絶今人時有采者其色青緑狀如琉璃而有白紋易破折梁州信都無復有俗用乃以青色礬石當之殊無倣佛仙經一名立制石唐本注云此物出銅處有形似曾青兼緑相間味極酸苦磨鐵作銅色此是真者陶云色似琉璃此乃絳礬比來亦用絳礬為石膽又以醋揉青礬為之並偽矣真者出蒲州虞鄉縣東亭谷窟及薛集窟中有塊如雞卵者為真臣禹錫等謹按吳氏云石膽神農酸小寒季氏大寒桐君辛有毒扁鵲苦無毒藥性論云石膽君有大毒破熱毒陸英為使日華子云味酸澀無毒治蚛牙鼻內息肉通透清亮蒲州者為上也圖經曰石膽生羌道山谷羌里句青山今唯信州鉛山縣有之生於銅坑中採得煎煉而成又有自然生者尤為珍貴並深碧色入吐風痰藥用最快二月庚子辛丑日採蘇恭云真者出蒲州虞鄉縣東亭谷窟及薛集窟中有塊如雞卵者為真今南方醫人多使之又著其説云石膽最上出蒲州大者如拳小者如桃栗擊之縱橫解皆成疊紋色青見風久則緑擊破其中亦青也其次出上饒曲江銅坑間者粒細有廉稜如叉股米粒本草注言偽者以醋揉青礬為之今不然但取粗惡石膽合硝石銷溜而成今塊大色淺渾渾無脈理擊之則碎無廉稜者是也亦有挾石者乃削取石膽床溜造時投消汁中及凝則相著也唐本余下血赤白面黃女子臟寒外臺祕要療齒痛及落盡細研石膽以人乳汁和如膏擦所痛齒上或孔中日三四度止痛復生齒百日後復故齒每日以新汲水漱令淨梅師方治甲疽以石膽一兩於火上燒令煙盡碎研末敷瘡上不過四五度立瘥勝金方治一切毒以膽子礬為末用糯米糊丸如雞頭實大以硃砂衣常以硃砂養之冷水化一丸立瘥又方治口瘡衆療不效膽礬半兩入銀堝子內火煅通赤置於地上出火毒一夜細研每取少許敷瘡上吐酸水清涎甚者一兩上便瘥談氏小兒方治初中風癱緩一日內細研膽礬如面每使一字許用溫醋湯下立吐出涎漸輕太清伏煉靈砂法石膽所出嵩嶽蒲州稟靈石異氣形如瑟瑟沈存中筆談信州鉛山有苦泉流以為澗挹其水熬之則成膽礬烹膽礬即成銅熬膽礬鐵釜久之亦化為銅空青味甘酸寒大寒無毒主青盲耳聾明目利九竅通血脈養精神益肝氣療目赤痛去膚翳止淚出利水道下乳汁通關節破堅積久服輕身延年不老令人不忘志高神仙能化銅鐵鉛錫作金生益州山谷及越巂山有銅處銅精熏則生空青其腹中空三月中旬採亦無時陶隱居云越巂屬益州今出銅官者色最鮮深出始興者弗如益州諸郡無復有恐久不採之故也涼州西平郡有空青山亦甚多今空青但圓實如鐵珠無空腹者皆鑿土石中取之又以合丹成則化鉛為金矣諸石藥中唯此最貴醫方乃稀用之而多充畫色殊為可惜唐本注云此物出銅處有乃兼諸青但空青為難得今出蔚州蘭州宣州梓州宣州者最好塊段細時有腹中空者蔚州蘭州者片塊大色極深無空腹者今注今出饒信等州者亦好臣禹錫等謹按範子計然云空青出巴郡白青曾青出新淦青色者善藥性論云空青君畏菟絲子能治頭風鎮肝瞳仁破者再得見物蕭炳云腹中空如楊梅者勝日華子云空青大者如雞子小者如相思子其青厚如荔枝殼內有漿酸甜能點多年青盲內障翳膜養精氣其殼又可摩翳也圖經曰空青生益州山谷及越巂山有銅處銅精熏則生空青今信州亦時有之狀若楊梅故別名楊梅青其腹中空破之有漿者絶難得亦有大者如雞子小者如豆子三月中旬採亦無時古方雖稀用而今治眼翳障為最要之物又曾青所出與此同山療體頗相似而色理亦無異但其形纍纍如連珠相綴今極難得又有白青出豫章山谷亦似空青圓如鐵珠色白而腹不空亦謂之碧青以其研之色碧也亦謂之魚目青以其形似魚目也無空青時亦可用今不復見之千金方治眼䀮䀮不明以空青少許漬露一宿以水點之又方治口喎不正取空青一豆許含之即效肘後方治卒中風手臂不仁口喎僻取空青末一豆許著口中漸入咽即愈衍義曰空青功長於治眼仁廟朝嘗詔御藥院須中空有水者將賜近戚久而方得其楊梅青治翳極有功中亦或有水者其用與空青同弟有優劣耳今信州穴山而取世謂之楊梅青極難得曾青味酸小寒無毒主目痛止淚出風痹利關節通九竅破症堅積聚養肝膽除寒熱殺白蟲療頭風腦中寒止煩渴補不足盛陰氣久服輕身不老能化金銅生蜀中山谷及越巂採無時畏菟絲子陶隱居云此説與空青同山療體亦相似今銅官更無曾青唯出始興形纍纍如黃連相綴色理小類空青甚難得而貴仙經少用之化金之法事同空青唐本注云曾青出蔚州鄂州蔚州者好其次鄂州余州並不任用圖經文具空青條下雷公云凡使勿用夾石及銅青若修事一兩要紫背天葵甘草青芝草三件干濕各一鎰並細銼放於一瓷堝內將曾青於中以東流水二鎰並諸藥等緩緩煮之五晝夜勿令水火失時足取出以東流水浴過卻入乳鉢中研如粉用丹房鏡源曾青結汞制丹砂金氣之所生寶藏論曾青若住火成膏者可立制汞成銀轉得八石清霞子爽神氣禹餘糧味甘寒平無毒主咳逆寒熱煩滿下赤白血閉癥瘕大熱療小腹痛結煩疼煉餌服之不飢輕身延年一名白餘糧生東海池澤及山島中或池澤中陶隱居云今多出東陽形如鵝鴨卵外有殼重疊中有黃細末如蒲黃無砂者為佳近年茅山鑿地大得之極精好乃有紫華靡靡仙經服食用之南人又呼平澤中有一種藤葉如菝葜根作塊有節似菝葜而色赤根形似薯蕷謂為禹餘糧言昔禹行山乏食採此以充糧而棄其餘此云白餘糧也生池澤復有倣佛或疑今石者即是太一也張華云地多蓼者必有餘糧今廬江間便是也適有人於銅官採空青於石坎大得黃赤色石極似今之餘糧而色過赤好疑此是太一也彼人呼為雌黃試塗物正如雄黃色爾唐本注云陶云黃赤色石疑是太一既無殼裹未是餘糧疑謂太一殊非的稱臣禹錫等謹按藥性論云禹餘糧君味鹹主治崩中蕭炳云牡丹為使日華子云治邪氣及骨節疼四肢不仁痔瘻等疾久服耐寒暑又名太一餘糧圖經曰禹餘糧生東海池澤及山島中或池澤中今唯澤潞州有之舊説形如鵝鴨卵外有殼重疊中有黃細末如蒲黃今圖上者全是山石之形都不作卵狀與舊説小異採無時本經又有太一餘糧謹按陶隱居登真隱訣載長生四鎮丸云太一禹餘糧定六腑鎮五臟注云按本草有太一餘糧禹餘糧兩種治體猶同而今世唯有禹餘糧不復識太一此方所用遂合其二名莫辨何者的是而後小鎮直云禹餘糧便當用之耳餘糧多出東陽山岸間茅山甚有好者狀如牛黃重重甲錯其佳處乃紫色泯泯如面齧之無復磣雖然用之宜細研以水洮取汁澄之勿令有沙土也而蘇恭亦云太一餘糧與禹餘糧本一物而以精粗為別故一名太一禹餘糧其殼若瓷初在殼中未凝結者猶是黃水久凝乃有數色或青或白或赤或黃年多漸變紫色自赤及紫俱名太一其諸色通謂之餘糧也今醫家但用餘糧亦不能如此細分別耳張仲景治傷寒下痢不止心下痞鞕利在下焦者赤石脂禹餘糧湯主之赤石脂禹餘糧各一斤並碎之以水六升煮取二升去滓分再服又按張華博物志曰扶海洲上有草焉名曰篩草其實食之如大麥從七月稔熟民斂至冬乃訖名自然谷亦曰禹餘糧今藥中有禹餘糧者世傳昔禹治水棄其所餘食於江中而為藥也然則篩草與此異物而同名也其云棄之江中而為藥乃與生海池澤者同種乎經驗方治産後煩躁禹餘糧一枚狀如酸䭑者入地埋一半四面緊築用炭一稱發頂火一斤煅去火三分耗二為度用濕砂土罨一宿方取打去外面一重只使里內細研水淘澄五七度將紙襯干再研數千遍患者用甘草煎湯調二錢匕只一服立效勝金方治婦人帶下白下即禹餘糧一兩乾薑等分赤下禹餘糧一兩乾薑半兩上件禹餘糧用醋淬搗研細為末空心溫酒調下二錢匕別説云謹案越州會稽山中見出一種甚良彼人云昔大禹會稽於此地餘糧者本為此爾太一餘糧味甘平無毒主咳逆上氣癥瘕血閉漏下除邪氣肢節不利大飽絶力身重久服耐寒暑不飢輕身飛行千里神仙一名石腦生太山山谷九月採杜仲為之使畏貝母菖蒲鐵落陶隱居云今人唯總呼為太一禹餘糧自專是禹餘糧爾無復識太一者然療體亦相似仙經多用之四鎮丸亦總名太一禹餘糧唐本注云太一餘糧及禹餘糧一物而以精粗為名爾其殼若瓷方圓不定初在殼中未凝結者猶是黃水名石中黃子久凝乃有數色或青或白或赤或黃年多變赤因赤漸紫自赤及紫俱名太一其諸色通謂餘糧今太山不見採得者會稽王屋澤路州諸山皆有之臣禹錫等謹按吳氏太一禹餘糧一名禹哀神農歧伯雷公甘平季氏小寒扁鵲甘無毒生太山上有甲甲中有白白中有黃如雞子黃色九月採或無時圖經文已具禹餘糧條下陳藏器云蘇云禹餘糧及太一禹餘糧皆以精粗為名餘糧中黃子年多變赤從赤入紫俱名太一餘糧雜色者即禹餘糧按蘇恭此談只以紫色為名都無按據且太一者道之宗源太者大也一者道也大道之師即禹之理化神君禹之師也師常服之故有太一之名兼服混然張司空云還魂石中黃子鬼物禽獸守之不可妄得即其神物也會稽有地名蓼出餘糧土人掘之以物請買所請有數依數必得不可妄求此猶有神豈非太一也雷公云凡使勿誤用石中黃並卵石黃此二名石真似禹餘糧也其石中黃向里赤黑黃味淡微跙卵石黃味酸個個如卵內有子一塊不堪用也若誤餌之令人腸干太一禹餘糧看即如石輕敲便碎可如粉也兼重重如葉子雌黃此能益脾安臟氣凡修事四兩先用黑豆五合黃精五合水二斗煮取五升置於瓷堝中下禹餘糧著火煮旋添汁盡為度其藥氣自然香如新米搗了又研一萬杵方用白石英味甘辛微溫無毒主消渴陰痿不足咳逆胸膈間久寒益氣除風濕痹療肺痿下氣利小便補五臟通日月光久服輕身長年耐寒熱生華陰山谷及泰山大如指長二三寸六面如削白徹有光其黃端白稜名黃石英赤端名赤石英青端名青石英黑端名黑石英二月採亦無時惡馬目毒公陶隱居云今醫家用新安所出極細長白徹者壽陽八公山多大者不正用之仙經大小並有用唯須精白無瑕雜者如此説則大者為佳其四色英今不復用唐本注云白石英所在皆有今澤州虢州洛州山中俱出虢州者大徑三四寸長五六寸今通以澤州者為勝也臣禹錫等謹按吳氏云白石英神農甘歧伯黃帝雷公扁鵲無毒生太山形如紫石英白澤長者二三寸採無時又云青石英如白石英青端赤後者是赤石英赤端白後者是赤澤有光味苦補心氣黃石英黃色如金在端者是黑石英黑澤有光藥性論云白石英君能治肺癰吐膿治嗽逆上氣疸黃日華子云五色石英平治心腹邪氣女人心腹痛鎮心療胃冷氣益毛髮悅顏色治驚悸安魂定魄壯陽道下乳通亮者為上其補益隨臟色而治青者治肝赤者治心黃者治皮膚白者治肺黑者治腎圖經曰白石英生華陰山谷及泰山陶隱居以新安出者佳蘇恭以澤州者為勝今亦澤州出焉大抵長而白澤明徹有光六面如削者可用長五六寸者彌佳其黃色如金在端者名黃石英赤端白後者名赤石英青端赤後者名青石英黑澤而有光者名黑石英二月採亦云無時古人服食唯白石英為重紫石英但入五石散其黃赤青黑四種本經雖有名而方家都不見用者故乳石論以鍾乳為乳以白石英為石是六英之貴者唯白石也又曰乳者陽中之陰石者陰中之陽故陽生十一月後甲子服乳陰生五月後甲子服石然而相反畏惡動則為害不淺故乳石之發方治雖多而罕有能濟者誠不可輕餌也聖惠方治腹堅脹滿號石水方用白石英十兩捶如大豆大以瓷瓶盛用好酒二斗浸以泥重封瓶口將馬糞及粳火燒之長令酒小沸從卯至午即住火候次日暖一中盞飲日可三度如吃酒少隨性飲之其白石英可更一度燒之簡要濟衆方治心臟不安驚悸善忘上鬲風熱化痰白石英一兩硃砂一兩同研為散每服半錢食後夜臥前金銀湯調下衍義曰白石英狀如紫石英但差大而六稜白色如水精紫白二石英當攻疾可暫煮汁用未聞久服之益張仲景之意只令㕮咀不為細末者豈無意焉其久服更宜詳審紫石英味甘辛溫無毒主心腹咳逆邪氣補不足女子風寒在子宮絶孕十年無子療上氣心腹痛寒熱邪氣結氣補心氣不足定驚悸安魂魄填下焦止消渴除胃中久寒散癰腫令人悅澤久服溫中輕身延年生泰山山谷採無時長石為之使得茯苓人參芍藥共療心中結氣得天雄菖蒲共療霍亂畏扁青附子不欲鮀甲黃連麥句薑陶隱居云今第一用泰山石色重徹下有根次出雹零山亦好又有南城石無根又有青綿石色亦重黑不明徹又有林邑石腹裡必有一物如眼吳興石四面才有紫色無光澤會稽諸暨石形色如石榴子先時並雜用今丸散家採擇唯泰山最勝余處者可作丸酒餌仙經不正用而為俗方所重也臣禹錫等謹按吳氏云紫石英神農扁鵲味甘平季氏大寒雷公大溫歧伯甘無毒生泰山或會稽採無時欲令如削紫色達頭如樗蒲者藥性論云紫石英君女人服之有子主養肺氣治驚癇蝕膿虛而驚悸不安加而用之嶺南録異云隴州山中多紫石英其色淡紫其實瑩徹隨其大小皆五稜兩頭如箭鏃煮水飲之暖而無毒比北中白石英其力倍矣日華子云紫石英治癰腫毒等醋淬搗為末生薑米醋煎敷之摩亦得圖經曰紫石英生泰山山谷今嶺南及會稽山中亦有之謹按吳普本草云紫石英生泰山及會稽欲令如削紫色達頭如樗蒲者陶隱居云泰山石色重徹下有根最佳會稽石形色如石榴子最下先時並雜用今唯用泰山石余處者可作丸酒餌又按嶺表録異云今隴州山中多紫石英其色淡紫其實瑩徹隨其大小皆五稜兩頭如箭鏃煮水飲之暖而無毒比北中白石英其力倍矣然則泰山會稽嶺南紫石英用之亦久乳石論無單服紫石者唯五石散則通用之張文仲有鎮心單服紫石煮水法胡洽及千金方則多雜諸藥同用今方家用者唯治療婦人及治心病藥時有使者聖惠方補虛勞止驚悸令人能食紫石英五兩打碎如米豆大水淘一遍以水一斗煮取二升去滓澄清細細服或煮粥羹食亦得服盡更煎之青霞子紫石英輕身充肌衍義曰紫石英明徹如水精其色紫而不勻張仲景治風熱瘛瘲及驚癇瘛瘲風引湯紫石英白石英寒水石石膏乾薑大黃龍齒牡蠣甘草滑石等分混合㕮咀以水一升煎去三分食後量多少溫呷不用滓服之無不效者青石赤石黃石白石黑石脂等味甘平主黃疸泄痢腸澼膿血陰蝕下血赤白邪氣癰腫疽痔惡瘡頭瘍疥瘙久服補髓益氣肥健不飢輕身延年五石脂各隨五色補五臟生南山之陽山谷中臣禹錫等謹按蜀本云今義陽山甚有之一本南陽山谷中也青石脂味酸平無毒主養肝膽氣明目療黃疸泄痢腸澼女子帶下百病及疽痔惡瘡久服補髓益氣不飢延年生齊區山及海崖採無時別説云謹按唐注云出蘇州餘杭山今不採而蘇州今乃見貢赤白二種然入藥不甚佳唯延州山中所出最良揭兩石中取之延州每以蕃寇圍城苦無水乃撅地深廣三五丈以石脂密固貯水得經時久不滲漏宜以此為良赤石脂味甘酸辛大溫無毒主養心氣明目益精療腹痛泄澼下痢赤白小便利及癰疽瘡痔女子崩中漏下産難胞衣不出久服補髓好顏色益智不飢輕身延年生濟南射陽及泰山之陰採無時惡大黃畏芫花唐本注云此石濟南太山不聞出者今虢州盧氏縣澤州陵川縣及慈州呂鄉縣並有色理鮮膩宜州諸山亦有此五石脂中又有石骨似骨如玉堅潤服之力勝鍾乳臣禹錫等謹按藥性論云赤石脂君惡松脂補五臟虛乏圖經曰赤石脂生濟南射陽及泰山之陰蘇恭云濟南泰山不聞出者唯虢州盧氏縣澤州陵川縣慈州呂鄉縣並有及宜州諸山亦出今出潞州以色理鮮膩者為勝採無時古人亦有單服食者乳石論載服赤石脂發則心痛飲熱酒不解治之用蔥豉綿裹水煮飲之千金翼論曰治痰飲吐水無時節者其源以冷飲過度遂令脾胃氣羸不能消於飲食飲食入胃則皆變成冷水反吐不停皆赤石脂散主之赤石脂一斤搗篩服方寸匕酒飲自任稍稍加至三匕服盡一斤則終身不吐痰水又不下痢補五臟令人肥健有人淡飲服諸藥不效用此方遂愈其雜藥用者則張仲景治傷寒下痢不止便膿血者桃花湯主之其方用赤石脂一斤一半全用一半末用乾薑一兩粳米半升以水七升煮之米熟為準去滓每飲七合納赤石脂末方寸匕服日三愈止後服不爾盡之又有烏頭赤石脂丸主心痛徹背者烏頭一分附子二分並炮赤石脂乾薑蜀椒各四分五物同杵末以蜜和丸大如梧子先食服一丸不知稍增之斗門經治小兒疳瀉用赤石脂杵羅為末如面以粥飲調半錢服立瘥或以京芎等分同服更妙衍義曰赤石脂今四方皆有以舌試之黏著者為佳有人病大腸寒滑小便精出諸熱藥服及一斗二升未甚效後有人教服赤石脂乾薑各一兩胡椒半兩同為末醋糊丸如梧桐子大空心及飯前米飲下五七十丸終四劑遂愈黃石脂味苦平無毒主養脾氣安五臟調中大小小兒泄痢腸澼下膿血去白蟲除黃疸癰疽蟲久服輕身延年生嵩高山色如鶯雛採無時曾青為之使惡細辛畏蜚蠊唐本余畏黃連甘草蜚蠊雷公云凡使須研如粉用新汲水投於器中攪不住手了傾作一盆如此飛過三度澄者去之取飛過者任入藥中使用服之不問多少不得食卵味白石脂味甘酸平無毒主養肺氣厚腸補骨髓療五臟驚悸不足心下煩止腹痛下水小腸澼熱溏便膿血女子崩中漏下赤白沃排癰疽瘡痔久服安心不飢輕身長年生泰山之陰採無時得厚朴並米汁飲止便膿燕屎為之使惡松脂畏黃芩唐本注云白石脂今出慈州諸山勝於余處者泰山左側不聞有之臣禹錫等謹按蜀本及簫炳云畏黃連甘草飛廉藥性論云白石脂一名白符惡馬目毒公味甘辛澀大腸圖經曰白石脂生泰山之陰蘇恭云出慈州諸山泰山左側不聞有之今唯潞州有焉潞與慈相近此亦應可用古斷下方多用而今醫家亦稀使採無時五色石脂舊經同一條並生南山之陽山谷中主治並同後人各分之所出既殊功用亦別用之當依後條然今唯用赤白二種余不復識者唐韋宙獨行方治小兒臍中汁出不止兼赤腫以白石脂細末熬溫撲臍中日三良又斗門方治瀉痢用白石脂乾薑二物停搗以百沸湯和麵為稀糊搜勻並手丸如梧子曝乾飲下三十丸久痢不定更加三十丸霍亂煎漿水為使子母祕録治小兒水痢形羸不勝大湯藥白石脂半大兩研如粉和白粥空肚與食別説云謹按唐注云出蘇州餘杭山今不採而蘇州今乃見貢赤白二種然入藥不甚佳唯延州山中所出最良揭兩石中取之延州每以蕃寇圍城苦無水乃撅地深廣三五丈以石脂密固貯水得經時久不滲漏宜以此為良衍義曰白石脂有初生未滿月小兒多啼叫致臍中血出以白石脂細末貼之即愈未愈微微炒過放冷再貼仍不得剝揭黑石脂味鹹平無毒主養腎氣強陰主陰蝕瘡止腸澼泄痢療口瘡咽痛久服益氣不飢延年一名石涅一名石墨出潁川陽城採無時陶隱居云此五石脂如本經療體亦相似別録各條所以具載今俗用赤石白石二脂爾仙經亦用白石脂以塗丹釜好者出吳郡猶與赤石脂同源赤石脂多赤而色好唯可斷下不入五石散用好者亦出武陵建平義陽今五石散皆用義陽者出鄳縣界東八十里狀如豚腦色鮮紅可愛隨採復而生不能斷痢而不用之餘三色脂有而無正用黑石脂乃可畫用爾唐本注云義陽即申州也所出者名桃花石非五色脂色如桃花久服肥人土人亦以療下痢舊出蘇州餘杭山大有今不收採爾臣禹錫等謹按吳氏云五色石脂一名青赤黃白黑符青符神農甘雷公酸無毒桐君辛無毒李氏小寒生南山或海崖採無時赤符神農雷公甘黃帝扁鵲無毒李氏小寒或生少室或生泰山色絳滑如脂黃符季氏小寒雷公苦或生嵩山色如豚腦雁雛採無時白符一名隨岐伯雷公酸無毒季氏小寒桐君甘無毒扁鵲辛或生少室天婁山或泰山黑符一名石泥桐君甘無毒生洛西山空地日華子云五色石脂並溫無毒畏黃芩大黃治瀉痢血崩帶下吐血衄血並澀精淋癧安心鎮五臟除煩療驚悸排膿治瘡癤痔瘻養脾氣壯筋骨補虛損久服悅色紋理膩綴唇者為上也白青味甘酸咸平無毒主明目利九竅耳聾心下邪氣令人吐殺諸毒三蟲久服通神明輕身延年不老可消為銅劍闢五兵生豫章山谷採無時陶隱居云此醫方不復用市人亦無賣者唯仙經三十六水方中時有須處銅劍之法具在九元子術中唐本注云陶所云今空青圓如鐵珠色白而腹不空者是也研之色白如碧亦謂之碧青不入畫用無空青時亦用之名魚目青以形似魚目故也今出簡州梓州者好緑青味酸寒無毒主益氣療鼽鼻止泄痢生山之陰穴中色青白陶隱居云此即用畫緑色者亦出空青中相帶挾今畫工呼為碧青而呼空青作緑青正反矣唐本注云緑青即扁青也畫工呼為石緑其碧青即白青也不入畫用圖經曰緑青今謂之石緑舊不著所出州土但云生山之陰穴中本經次空青條上云生益州山谷及越巂山有銅處此物當是生其山之陰耳今出韶州信州其色青白即畫工用畫緑色者極有大塊其中青白花紋可愛信州人用琢為腰帶環及婦人服飾其人藥者當用顆塊如乳香不挾石者佳今醫家多用吐風痰其法揀取上色精好者先搗下篩更用水飛過至細乃再研治之如風痰眩悶取二三錢匕同生龍腦三四豆許研勻以生薄荷汁合酒溫調服使偃臥須臾涎自口角流出乃愈不嘔吐其功速於它藥今人用之比比皆效故以其法附之云又下條云扁青生朱崖山谷及武都朱提蘇恭云即緑青是也海南來者形塊大如拳其色又青腹中亦時有空者今未見此色武昌簡州梓州亦有今亦不用衍義曰緑青即石碌是也其石黑緑色者佳大者刻為物形或作器用又同硇砂作吐風涎藥驗則驗矣亦損心肺石中黃子味甘平無毒久服輕身延年不老此禹餘糧殼中未成餘糧黃濁水也出餘糧處有之陶云芝品中有石中黃子非也唐本先附臣禹錫等謹按日華子云功同上去殼研用即是殼內未乾凝者圖經曰石中黃子本經不載所生州土云出禹餘糧處有之今唯出河中府中條山谷內舊説是餘糧殼中未成餘糧黃濁水今云其石形如面劑紫黑色石皮內黃色者謂之中黃兩説小異謹按葛洪抱朴子云石中黃子所在有之近水之山尤多在大石中其石常潤濕不燥打石石有數十重見之赤黃溶溶如雞子之在殼得者即當飲之不爾便堅凝成石不中服也破一石中多者有一升少者數合法當正及未堅時飲之即堅凝亦可末服也若然舊説是初破取者今所用是久而堅凝者耳採無時衍義曰石中黃子此又字誤也子當作水況當條自言未成餘糧黃濁水焉得卻名之子也若言未乾者亦不得謂之子也子字乃水字無疑又曰太一餘糧者則是兼石言之者也今醫家用石中黃只石中乾者及細末者即便是若用禹餘糧石即用其殼故本條言一名石腦須火燒醋淬如此即是石中黃水為一等石中黃為一等太一餘糧為一等斷無疑焉無名異味甘平主金瘡折傷內損止痛生肌肉出大食國生於石上狀如黑石炭蕃人以油煉如黳石嚼之如餳今附臣禹錫等謹按日華子云無名異無毒圖經曰無名異出大食國生於石上今廣州山石中及宜州南八里龍濟山中亦有之黑褐色大者如彈丸小者如墨石子採無時本經云味甘平主金瘡折傷內損生肌肉今云味鹹寒消腫毒癰疣與本經所説不同疑別是一種又嶺南人云有石無名異絶難得有草無名異彼人不甚貴重豈本經説者為石而今所有者為草乎用時以醋磨塗敷所苦處又有婆娑石生南海解一切毒其石緑色無斑點有金星磨之成乳汁者為上胡人尤珍貴之以金裝飾作指彄帶之每欲食及食罷輒含吮數四以防毒今人有得指面許塊則價值百金人莫能辨但水磨涓滴點雞冠熱血當化成水乃真也俗謂之摩娑石衍義曰無名異今圖經曰本經云味甘平治金瘡折傷生肌肉今云味鹹寒消腫毒癰腫與本經所説不同疑別是一種今詳上文三十六字未審今云字下即不知是何處云也菩薩石平無毒解藥毒蠱毒及金石藥發動作癰疽渴疾消撲損瘀血止熱狂驚癇通月經解風腫除淋並水磨服蛇蟲蜂蠍狼犬毒箭等所傷並末敷之良新補見日華子楊文華談苑嘉州峨眉山有菩薩石人多采得之色瑩白若太山狼牙石上饒州水晶之類日光射之有五色如佛頂圓光衍義曰菩薩石出峨嵋山中如水精明徹日中照出五色光如峨嵋普賢菩薩圓光因以名之今醫家鮮用婆娑石主解一切藥毒瘴疫熱悶頭痛生南海胡人採得之無斑點有金星磨成乳汁者為上又有豆斑石雖亦解毒功力不及復有鄂緑有紋理磨鐵成銅色人多以此為之非真也凡欲驗真者以水磨點雞冠熱血當化成水是也此即俗謂之摩娑石也今附圖經文具無名異條下衍義曰婆娑石今則轉為磨娑石如淡色石緑間微有金星者佳磨之如淡乳汁其味淡又有豆斑石亦如此石但於石上有黑斑點無金星緑礬涼無毒治喉痹蚛牙口瘡及惡瘡疥癬釀鯽魚燒灰和服療腸風瀉血新補見日華子圖經文具礬石條下集驗方治小兒疳氣不可療神效丹緑礬用火煅通赤取出用釅醋淬過復煅如此三度細研用棗肉和丸如緑豆大溫水下日進兩三服柳絮礬冷無毒消痰治渴潤心肺新補見日華子圖經文具礬石條下扁青味甘平無毒主目痛明目折跌癰腫金瘡不瘳破積聚解毒氣利精神去寒熱風痹及丈夫莖中百病益精久服輕身不老生朱崖山谷武都朱提採無時陶隱居云仙經俗方都無用者朱崖郡先屬交州在南海中晉代省之朱提郡今屬寧州唐本注云此即前條陶謂緑青是也朱崖巴南及林邑扶南舶上來者形塊大如拳其色又青腹中亦時有空者武昌者片塊小而色更佳簡州梓州者形扁作片而色淺也臣禹錫等謹按吳氏云扁青神農雷公小寒無毒生蜀郡治丈夫內絶令人有子圖經文具緑青條下三種海藥余車渠韻集云生西國是玉石之類形似蚌蛤有紋理大寒無毒主安神鎮宅解諸毒藥及蟲螫以玳瑁一片車渠等同以人乳磨服極驗也又西域記云重堂殿梁簷皆以七寶飾之此其一也金線礬廣州志云生波斯國味鹹酸澀有毒主野雞瘻痔惡瘡疥癬等疾打破內有金線紋者為上多人燒家用波斯白礬廣州記云出大秦國其色白而瑩淨內有棘針紋味酸澀溫無毒主赤白漏下陰蝕泄痢瘡疥解一切蟲蛇等毒去目赤暴腫齒痛火煉之良惡牡礪多入丹灶家功力逾於河西石門者近日文州諸番往往亦有可用也三十五種陳藏器余金漿味辛平無毒主長生神仙久服腸中盡為金色古鏡味辛無毒主驚癇邪氣小兒諸惡煮取汁和諸藥煮服之文字彌古者佳爾勞鐵主賊風燒赤投酒中熱服之勞鐵經用辛苦者鐵是也神丹味辛溫有小毒主萬病有寒溫飛金石及諸藥隨寒溫共成之長生神仙鐵鏽主惡瘡疥癬和油塗之蜘蛛蟲等咬和蒜磨敷之此鐵上衣也鏽生鐵上者堪用布針主婦人橫産燒令赤納酒中七遍服之可取二七布針一時火燒粗者用縫布大針是也銅盆主尉霍亂可盛灰厚二寸許以炭火安其上令微熱下以衣藉患者腹漸漸尉之腹中通熱瘥釘棺下斧聲之時主人身胬肉可候有時專聽其聲聲發之時便下手速捺二七遍以後自得消平也産婦勿用枷上鐵及釘有犯罪者忽遇恩得免枷了取葉釘等後遇有人官纍帶之除得災黃銀銀注中蘇云作器辟惡瑞物也按瑞物黃銀載於圖經銀甕丹甑非人所為既堪為器明非瑞物今烏銀辟惡煮之工人以為器物養生者為器以煮藥兼於庭中高一丈夜承得醴投別器中飲長年今人作烏銀以琉黃熏之再宿寫之出即其銀黑矣此是假非真也石黃雄黃注中蘇云通名黃石按石黃今人敲取精明者為雄黃外黑者為薰黃主惡瘡殺蟲熏瘡疥蟣蝨和諸藥熏嗽其武都雄黃燒不臭薰黃中者燒則臭以此分別之蘇云通名未之是也石脾芒硝注中陶云取石脾為硝石以水煮之一斛得三斗正白如雪以石投中則消故名硝石按石脾芒硝硝石並生西戎鹵地鹹水結成所生次類相似諸金有毒生金有大毒藥人至死生嶺南夷獠洞穴山中如赤黑碎石金鐵屎之類南人云毒蛇齒脫在石中又云蛇著石上又鴆屎著石上皆碎取毒處為生金以此為雌黃有毒雄黃亦有毒生金皆同此類人中金藥毒者用蛇解之其候法在金蛇條中本經云黃金有毒誤甚也生金與彼金全別也水中石子無毒主食魚膾腹中脹滿成瘕痛悶飲食不下日漸瘦取水中石子數十枚火燒赤投五升水中各七遍即熱飲之如此三五度當利出瘕也石漆堪燃燭膏半缸如漆不可食此物水石之精固應有所主療檢諸方見有説博物志酒泉南山石出水其如肥肉汁取著器中如凝脂正黑與膏無異彼方人為之石漆今檢不見其方深所恨也燒石令赤投水中納鹽數合主風瘙癮疹及洗之又取石如鵝卵大猛火燒令赤納醋中十餘度至石碎盡取屑曝乾和醋塗腫上出北齊書醫人馬嗣明發背及諸惡腫皆愈此並是尋常石也石藥味苦寒無毒主折傷內損瘀血止煩悶欲死者酒消服之南方俚人以敷毒箭鏃及深山大蝮中人速取病者當頂上十字釐之令皮斷出血以藥末瘡上並敷所傷處其毒必攻上下泄之當出黃汁數升則悶解俚人重之帶於腰以防毒箭亦主惡瘡熱毒癰腫赤白遊瘻蝕等瘡北人呼腫名之曰遊並水和敷之出賀州石上山內似碎石硇砂之類土人以竹筒盛之研朱石槌主妒乳煮令熱尉乳上取二槌更互用之以巾覆乳上令熱徹內數十遍取瘥為度也暈石無毒主石淋磨服之亦燒令赤投酒中服生大海底如薑石紫褐色極緊似石是鹹水結成之自然有暈也硫黃香味辛溫無毒去惡氣除冷殺蟲似硫黃而香吳時外國傳云硫黃香出都昆國在扶南南三千里南洲異物志云硫黃香出南海邊諸國今中國用者從西戎來白獅子主白虎病向東人呼為歷節風置白獅子於病者前自愈此壓伏之義也白虎鬼古人言如貓在糞堆中亦云是糞神今時人掃糞莫置門下令人病此療之法以雞子揩病人痛咒願送著糞堆頭勿反顧玄黃石味甘平溫無毒主驚恐身熱邪氣鎮心久服令人眼明令人悅澤出淄川北海山谷土石中如赤土代赭之類又有一名零陵極細研服之如代赭土人用以當朱呼為赤石恐是代赭之類也人未用之石欄干味辛平無毒主石淋破血産後惡血磨服亦煮汁服亦火燒投酒中服生大海底高尺余如樹有眼莖莖上有孔如物點之漁人以網罾得之初從水出微紅後漸青玻璃味辛寒無毒主驚悸心熱能安心明目去赤眼尉熱腫此西國之寶也是水王或云千歲冰化為之應玉石之類生土石中未必是冰今水精珠精者極光明置水中不見珠也尉目除熱淚或云火燧珠向日取得火石髓味甘溫無毒主寒熱中羸瘦無顏色積聚心腹脹滿食飲不消皮膚枯稿小便數疾癖塊腹內腸鳴下利腰腳疼冷男子絶陽女子絶産血氣不調令人肥健能食合金瘡性擁宜寒瘦人生臨海蓋山石窟土人採取澄淘如泥作丸如彈子有白有黃彌佳矣霹靂針無毒主大驚失心恍惚不識人並下淋磨服亦煮服此物伺候震處掘地三尺得之其形非一或言是人所造納與天曹不知事實今得之亦有似斧刃者亦有如銼刃者亦有安二孔者一用人間石作也注出雷州並河東山澤間因雷震後時多似斧色青黑斑文至硬如玉作枕除魔夢闢不祥名霹靂屑也大石鎮宅主災異不起宅經取大石鎮宅四隅荊楚歲時記十二月暮日掘宅四角各埋一大石為鎮宅又鴻寶萬畢術云埋丸石於宅四隅槌桃核七枚則鬼無能殃也金石味甘無毒主久羸瘦不能食無顏色補腰腳冷令人健壯益陽有暴熱脫髮飛煉服之生五臺山清涼寺石中金屑作赤褐色玉膏味甘平無毒玉石主延年神仙術家取蟾蜍膏軟玉如泥以苦酒消之成水此則為膏之法今玉石間水飲之長生令人體潤以玉投朱草汁中化成醴朱草瑞物已出金水卷中十洲仙記瀛洲有玉膏泉如酒飲之數杯輒醉令人長生洲上多有仙家似吳兒雖仙境之事有可憑者故以引為證也溫石及燒磚主之得熱氣徹腰腹久患下部冷久痢腸腹下白膿燒磚並溫石尉及坐之並瘥但取堅石燒暖用之非別有溫石也印紙無毒主令婦人斷産無子剪有印處燒灰水服之一錢匕神效煙藥味辛溫有毒主瘰癧五痔瘻癭瘤瘡根惡腫石黃空青桂心並四兩乾薑一兩為末取鐵片闊五寸燒赤以藥置鐵上用瓷碗以豬脂塗碗底藥飛上待冷即開如此五度隨瘡孔大小以藥如鼠屎納孔中面封之三度根出也無孔者針破納之特蓬殺味辛苦溫小毒主飛金石用之煉丹亦須用生西國似石脂蠣粉之類能透金石鐵無礙下通出阿婆趙榮二藥有小毒主丁腫惡瘡出根蝕息肉肉刺齊人以白薑石犬屎緋帛棘針鉤等合成如墨硬土作丸又有阿婆趙榮藥功狀相同云石灰和諸蟲及緋帛棘針合成之並出臨淄齊州六月河中諸熱砂主風濕頑痹不仁筋骨攣縮腳疼冷風掣癱緩血脈斷絶取干沙日曝令極熱伏坐其中冷則更易之取熱徹通汗然後隨病進藥及食忌風冷勞役
