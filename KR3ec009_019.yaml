body:
  text: 卷第十九己酉新增衍義禽上丹雄雞味甘微溫微寒無毒主女人崩中漏下赤白沃補虛溫中止血久傷乏瘡通神殺毒闢不祥臣禹錫等謹按孟詵云主患白虎可鋪飯於患處使雞食之良又取熱糞封之取熱使伏於患人床下其肝入補腎方中用冠血和天雄四分桂心二分太陽粉四分丸服之益陽氣日華子云朱雄雞冠血療白癜風糞治白虎風並敷風痛頭主殺鬼東門上者尤良白雄雞肉味酸微溫主下氣療狂邪安五臟傷中消渴臣禹錫等謹按日華子云白雄雞調中除邪利小便去丹毒烏雄雞肉微溫主補中止痛膽微寒主療目不明肌瘡臣禹錫等謹按孟詵云烏雄雞主心痛除心腹惡氣又虛弱人取一隻治如食法五味汁和肉一器中封口重湯中煮之使骨肉相去即食之甚補益仍須空腹飽食之肉須爛生即反損亦可五味醃經宿炙食之分作兩頓又刺在肉中不出者取尾二七枚燒作灰以男子乳汁和封瘡刺當出又目淚出不止者以三年冠血敷目睛上日三度日華子云溫無毒止肚痛除風濕麻痹補虛羸安胎治折傷並癰疽生罯竹木刺不出者心主五邪血主踒折骨痛及痿痹臣禹錫等謹按踒折通用藥云烏雄雞血平肪主耳聾臣禹錫等謹按藥對云雞肪寒腸主遺溺小便數不禁肝及左翅毛主起陰冠血主乳難䏶胵里黃皮微寒主泄利小便利遺溺除熱止煩臣禹錫等謹按日華子云諸雞䏶胵平無毒止泄精並尿血崩中帶下腸風瀉痢此即是肫內黃皮屎白微寒主消渴傷寒寒熱破石淋及轉筋利小便止遺溺滅瘢痕黑雌雞主風寒濕痹五緩六急安胎血無毒主中惡腹痛及踒折骨痛乳難臣禹錫等謹按藥性論云黑雌雞味甘安胎通用藥云烏雌雞溫中惡通用藥云烏雌雞血平孟詵云產後血不止以雞子三枚醋半升好酒二升煎取一升分為四服如人行三二里微暖進之又新產婦可取一隻理如食法和五味炒熟香即投二升酒中封口經宿取飲之令人肥白又和烏油麻二升熬令黃香末之入酒酒盡極效日華子云烏雌雞溫無毒安心定志除邪辟惡氣治血邪破心中宿血及治癰疽排濃補新血補產後虛羸益色助氣膽治疣目耳瘑瘡日三敷腸治遺尿並小便多糞治中風失音痰逆消渴破石淋利小腸餘瀝敷瘡痍滅瘢痕炒服治小兒客忤蠱毒翼治小兒夜啼安席下勿令母知窠中草治頭瘡白禿和白頭翁草燒灰豬脂敷翮羽主下血閉黃雌雞味酸甘平主傷中消渴小便數不禁腸澼泄利利益五臟續絕傷療勞益氣臣禹錫等謹按日華子云黃雌雞溫無毒肋骨主小兒羸瘦食不生肌臣禹錫等謹按孟詵云黃雌雞主腹中水癖水腫以一隻理如食法和赤小豆一升同煮候豆爛即出食之其汁日二夜一每服四合補丈夫陽氣治冷氣瘦著床者漸漸食之良又先患骨熱者不可食之雞子動風氣不可多食又光粉諸石為末和飯與雞食之後取雞食之甚補益又子醋煮熟空腹食之治久赤白痢又人熱毒發可取三顆雞子白和蜜一合服之瘥日華子云黃雌雞止勞劣添髓補精助陽氣暖小腸止泄精補水氣雞子主除熱火瘡癇痙可作虎魄神物臣禹錫等謹按藥對云雞子平卵白微寒療目熱赤痛除心下伏熱止煩滿咳逆小兒下泄婦人產難胞衣不出醯漬之一宿療黃疸破大煩熱卵中白皮主久咳結氣得麻黃紫菀和服之立已雞白蠹肥脂生朝鮮平澤陶隱居云雞此例甚多又云雞子作虎魄用欲毈卵黃白混雜煮作之亦極相似唯不拾芥爾又煮白合銀口含須臾色如金雞又不可合葫蒜及李子食之烏雞肉不可合犬肝犬腎食之小兒食雞肉好生蛔蟲又雞不可合芥葉蒸食之朝鮮乃在玄兔樂浪不應總是雞所出今云白蠹不知是何物別恐一種爾唐本注云白雞距及腦主產難燒灰酒服之腦主小兒驚癇今注雞入藥用蓋取朝鮮者良又按陳藏器本草云雞主馬咬瘡及剝驢馬傷手熱雞血及熱浸之黃雌雞溫補益陽白雞寒利小便去丹毒風屎白雄雞三年者能為鬼神所使烏雌雞殺鬼物卵白解熱煩屎炒服之主蟲咬毒黃腳雞主白虎病布飯病處將雞來食飯亦可抱雞來壓之雄雞脅血塗白癜風癧瘍風雞子益氣多食令人有聲一枚以濁水攪煮兩沸合水服之主產後痢和蠟作煎餅與小兒食之止痢取二枚破著器中以白粉和如稀粥頓服之主婦人胎動腰臍下血又取一枚打開取白釅醋如白之半攪調吞之生產後血閉不下又取卵三枚醋半升酒二升攪和煮取二升分四服主產後血下不止又白虎病取雞子揩病處咒愿送糞堆頭不過三度瘥白虎是糞神愛吃雞子雞屎和黑豆炒浸酒主賊風風痹破血臣禹錫等謹按蜀本注云凡雞子及卵白等以黃雌產者良雞膽心肝腸肪肶胵及糞等以烏雄為良頭以丹雄為良翮以烏雄為良藥性論云雞子使味甘微寒無毒能治目赤痛黃和常山末為丸竹葉煎湯下治久瘧不瘥治漆瘡塗之醋煮治產後虛及痢主小兒發熱煎服主痢除煩熱煉之主嘔逆屎能破石淋利小便日華子云雞子鎮心安五臟止驚安胎治懷妊天行熱疾狂走男子陰囊濕癢及開聲喉卵醋煮治久痢和光粉炒乾止小兒疳痢及婦人陰瘡和豆淋酒服治賊風麻痹醋浸令壞敷疵皯作酒止產後血暈並暖水臟縮小便止耳鳴和蠟炒治疳痢耳鳴及耳聾黃炒取油和粉敷頭瘡殼研摩障翳圖經曰諸雞本經云雞白蠹肥脂出朝鮮平澤陶隱居云朝鮮不應總是雞所出而云白蠹不知何物恐別是一種耳開寶注便謂雞入藥用蓋取朝鮮者良今處處人家畜養甚多不聞自朝鮮來也雞之類最多丹雄雞白雄雞烏雄雌雞頭血冠腸肝膽肶胵里黃脂肪羽翮肋骨卵黃白屎白等併入藥古今方書用之尤多其肉雖有小毒而補虛羸最要故食治方中多用之素問心腹滿旦食則不能暮食名為鼓脹治之以雞矢醴一劑知二劑已注云今本草雞矢利小便微寒並不治鼓脹今方製法當取用處湯漬服之耳又張仲景治轉筋為病其人臂腳直脈上下行微弦轉筋入腹雞屎白散主之取雞屎白為末量方寸匕以水六合和溫服瘥雞子入藥最多而發煎方特奇劉禹錫傳信方云亂髮雞子膏主孩子熱瘡雞子五枚去白取黃亂髮如雞子許大二味相和於鐵銚子中炭火熬初甚干少頃即發焦遂有液出旋取置一瓷碗中以液盡為度取塗熱瘡上即以苦參末粉之頃在武陵生子蓐內便有熱瘡發於臀腿間初塗以諸藥及他藥無益日加劇蔓延半身狀候至重晝夜啼號不乳不睡因閱本草至發髲本經云合雞子黃煎之消為水療小兒驚熱下痢注云俗中嫗母為小兒作雞子煎用發雜熬良久得汁與小兒服去痰熱主百病用發皆取父梳頭亂者又檢雞子本經云療火瘡因是用之果如神立效其殼亦主傷寒勞復見深師方取雞子空殼碎之熬令黃黑搗篩熱湯和一合服之溫臥取汗出愈食療云治大人及小兒發熱可取卵三顆白蜜一合相和服之立瘥卵並不得和蒜食令人短氣又胞衣不出生吞雞子清一枚治目赤痛除心下伏熱煩滿咳逆動心氣不宜多食烏雌雞溫味酸無毒主除風寒濕痹治反胃安胎及腹痛踒折骨疼乳癰月蝕瘡繞耳根以烏雌雞膽汁敷之日三以烏油麻一升熬之令香末和酒服之即飽熱能食雞具五色者食之致狂肉和魚肉汁食之成心瘕六指玄雞白頭家雞及雞死足爪不伸者食並害人雞子和蔥食之氣短雞子白共鱉同食損人雞子共獺肉同食成遁屍注藥不能治雞兔同食成泄痢小兒五歲以下未斷乳者勿與雞肉食雷公云雞子凡急切要用勿便敲損恐得二十一日滿在內成形空打損後無用若要用先於溫湯中試之若動是成形也若不動即敲損取清者用黃即去之內有自潰者亦不用也聖惠方主蛐蟮咬人方以雞屎敷之外臺秘要主天行嘔逆不下食食即出以雞卵一枚煮三五沸出以水浸之外熟內熱則吞之良千金方鼠瘻以卵一枚米下蒸半日取出黃熬令黑先拭瘡上汁令乾以藥納瘡孔中三度即瘥又方小兒驚啼燒雞屎白米飲下又方治小兒瘧燒雞胵中黃皮為末乳服之男雄女雌肘後方治心痛以卵一個打破頭醋二合和攪令勻暖過頓服又方肝風虛轉筋入腹以屎白乾末熱酒調下一錢匕服又方自縊死定安心神徐緩解之慎勿割繩斷抱取心下猶溫者刺雞冠血滴口中即活男雌女雄又方以雞屎白如棗大酒半盞和灌之及鼻中佳又方救卒死或先病或常居寢臥奄忽而絕皆是中惡割雄雞冠取血塗其面干後復塗並以灰營死人一周又方卒得嗽烏雞一枚治如食法以好酒漬之半日出雞服酒一云苦酒一斗煮白雞取三升分三服食雞莫與鹽食良又方治卒得浸淫瘡轉有汁多起於心不早治之續身周匝則殺人以冠血敷之瘥葛氏方治卒乾嘔不息破卵去白吞黃數枚瘥又方蚰蜒入耳小雞一隻去毛足以油煎令黃筋穿作孔枕之又方卒腹痛下赤白痢數日不絕以卵一枚取出黃去白納胡粉令滿殼燒成屑以酒服一錢匕又方治小便不通卵黃一枚服之不過三又方卒腹痛安胎烏雞肝一具切過酒五合服令盡姚云肝勿令入水中又方中風寒痙直口噤不知人屎白一升熬令黃極熱以酒三升和攪去滓服又方被壓柞墮墜舟船車轢馬踏牛觸胸腹破陷四肢摧折氣悶欲死以烏雞一隻合毛杵一千二百杵好苦酒一升相和得所以新布拓病上取藥塗布以干易覺寒振欲吐不可輒去藥須臾復上一雞少則再作又方馬咬人瘡有毒腫疼痛以冠血著瘡中三下牡馬用雌牝馬用雄又方狐尿刺棘人腫痛欲死破雞拓之瘥又方食諸菜中毒發狂悶吐下欲死屎末燒研水服方寸匕經驗方治小兒疳痢肚脹方用雞子一個打破眼子如豆大納巴豆一粒去皮膩粉一錢用五十重紙裹於飯甑上蒸三度放冷打破取雞子肉同芭粉一時研入少麝添麵糊丸如米粒大食後夜臥溫湯下二丸至三丸經驗後方主婦人產後口乾舌縮渴不止打雞子一個水一盞沖之碟蓋少時服又方治齒痛不可忍取雞屎白燒末綿裹安痛處咬立瘥又方治諸癰不消已成膿懼針不得破令速決取白雞翅下第一毛兩邊各一莖燒灰研水調服之又方治因瘡中風腰脊反張牙關口噤四肢強直雞屎白一升大豆五升和炒令變色乘熱以酒沃之微煮令豆味出量性飲之覆身出汗慎勿觸風又方治蜈蚣咬人痛不止燒雞屎酒和服之佳又取雞屎和醋敷之孫真人家雞合水雞食作遁屍又云如小兒未斷乳食雞生蛔蟲又方卒中五屍遁屍其狀腹脹氣急衝心或磥塊踴起或牽腰脊者以卵一枚取白吞之困者搖頭令下又云雞味辛補肺主漆瘡雞子黃敷之食醫心鏡主脾胃氣虛腸滑下痢以炙雞散黃雌雞一隻治如食法以炭炙之槌了以鹽醋刷之又炙令極熬熟乾燥空腹食之又云主赤白痢食不下肥雌雞一隻治如常法細研為臛作面餛飩空心食之又云主消渴傷中小便數黃雌雞一隻治如常煮令熟去雞停冷渴即飲之肉亦可食若和米及鹽豉作粥及以五味作羹並得又云主小便數虛冷雞腸一具治如常炒作臛暖酒和飲之又云主風寒濕痹五緩六急烏雞一隻治如食法煮令極熟調作羹食之又云理狂邪癲癇不欲眠臥自賢自智驕倨妄行不休安五臟下氣白雄雞一隻煮令熟五味調和作羹粥食之又云勿食暴雞肉殺人發疽續十全方主子死腹中不出雄雞糞二十一枚水二升煎取五合下米作粥食即出勝金方主百蟲入耳不出以雞冠血滴入耳內即出集驗方主鱉症及心腹宿症及卒得症以白雌雞屎無多少小便和之於器中火上熬令燥末服方寸匕多服不限度以膏熬飯飼彌佳又方治遺尿取雄雞腸燒末三指撮朝報暮愈又方治尿床雞肶胵一具並腸服之男雌女雄又方治湯火燒瘡熟雞子一十個取黃炒取油入十文膩粉攪勻用雞翎掃瘡上永除瘢痕古今錄驗主腫大如斗取雞翅毛其毛一孔生兩毛者佳左腫取左翅右腫取右翅雙腫取兩邊翅並燒灰研飲服又方治蛔蟲攻心臍如刺口吐清水雞子一枚開頭去黃以好漆內殼中合和仰頭吞之蟲出又方治莖中淋石取屎白日中半乾熬令香末以路漿飯飲服方寸匕兵部手集主蛇蠍蜘蛛毒卵輕敲一小孔合咬處立瘥廣濟方主咽喉塞鼻中瘡出及乾嘔頭痛食不下生雞子一顆開頭取白去黃著米酢拌煻火頓沸起擎下沸定更頓三度成就熱飲酢盡不過一二瘥錢相公篋中方主蜈蚣蜘蛛毒以雞冠血敷之子母秘錄主妊娠得時疾令胎不傷以雞子七枚納井中令極冷破吞之又方治小兒心腹胸脅煩滿欲死燒雞子殼末酒服方寸匕又方治小兒下血雌雞翅下血服之又方小兒頭身諸瘡燒卵殼研和豬脂敷之又方兒頭上瘡及白禿髮不生汁出者雞子七個去白皮於銅器中熬和油敷之又方小兒鵝口不乳燒雞胵黃皮末乳和服又方妊娠下血不止名曰漏胎雞肝細銼以酒一升和服產寶產後小便不禁以屎燒作灰空心酒服方寸匕又方治妒乳及癰腫雞屎末服方寸匕須臾三服愈梅師亦治乳頭破裂方同楊氏產乳妊娠不得食雞子干鯉魚合食則令兒患瘡妊娠不得雞肉與糯米合食令兒多寸白譚氏方小兒卒驚似有痛處而不知疾狀取雄雞冠血臨兒口上滴少許瘥又方小兒急丹胤不止以雞子白和赤小豆末敷之治痢生雞子一個連紙一幅烏梅十個有肉者取雞子白攤遍連紙曬乾拓作四重包撮烏梅安熨斗中用白炭火燒煙欲盡取出以盞碗蓋覆候冷研令極細入水銀粉少許和勻如大人患分為二服小兒分三服不拘赤白痢空心井花水調服如覺臟腑微有疏利更不須再服衍義曰丹雄雞今言赤雞者是也蓋以毛色言之巽為雞為風雞鳴於五更者日將至巽位感動其氣而鳴也體有風人故不可食經所著其用甚備產後血暈身痙直帶眼口角與目外眵向上牽急不知人取子一枚去殼分清以荊芥末二錢調服遂安仍依次調治若無他疾則不須治甚敏捷烏雞子尤善經注皆不言雞發風今體有風人食之無不發作為雞為巽信可驗矣食雞者當審慎白鵝膏主耳卒聾以灌之臣禹錫等謹按耳聾通用藥云白鵝膏微寒毛主射工水毒肉平利五臟陶隱居云東川多溪毒養鵝以闢之毛羽亦佳中射工毒者飲血又以塗身鵝未必食射工蓋以威相制爾乃言鵝不食生蟲今鵝子亦啖蚯蚓輩唐本注云鵝毛主小兒驚癇極者又燒灰主噎今按陳藏器本草云鵝主消渴取煮鵝汁飲之臣禹錫等謹按陳藏器云蒼鵝食蟲白鵝不食蟲主射工當以蒼者良主渴以白者勝孟詵云脂可合面脂肉性冷不可多食令人易霍亂與服丹石人相宜亦發痼疾日華子云蒼鵝冷有毒發瘡膿糞可敷蛇蟲咬毒舍中養能闢蟲蛇白鵝涼無毒解五臟熱止渴脂潤皮膚尾罌治聤耳及聾納之亦療手足皴子補中益氣不可多食尾燒灰酒服下治噎食療卵溫補五臟亦補中益氣多發痼疾肘後方誤吞環若指驅燒鵝羽數枝末飲服之子母秘錄小兒鵝口不乳者白鵝矢汁灌口中鶩音牧肪味甘無毒主風虛寒熱臣禹錫等謹按陳牧士良云鶩肪大寒衍義曰鶩肪陶隱居云鶩即是鴨然有家鴨有野鴨陳藏器本草曰屍子云野鴨為鳧家鴨為鶩蜀本注云爾雅云野鳧鶩注云鴨也如此則鳧鶩皆是鴨也又云本經用鶩肪即家鴨也如此所說各不同其義不定又按唐王勃滕王閣記云落霞與孤鶩齊飛則明知鶩為野鴨也勃唐之名儒必有所據故知鶩為野鴨明矣白鴨屎名通主殺石藥毒解結縛散蓄熱肉補虛除熱和臟腑利水道陶隱居云鶩即是鴨鴨有家有野又本經云雁肪一名鶩肪其療小異此說則專是家鴨爾黃雌鴨為補最勝鴨卵不可合鱉肉食之凡鳥自死口不閉者皆不可食食之殺人唐本注云別錄云鴨肪主水腫血主解諸毒肉主小兒驚癇頭主水腫通利小便古方療水用鴨頭丸今按陳藏器本草云屍子云野鴨為鳧家鴨為鶩不能飛翔如庶人守耕稼而已臣禹錫等謹按蜀本注云爾雅云野鳧鶩注云鴨也本經用鶩肪即家鴨也野鴨與家鴨有相似者有全別者甚小小者名刀鴨味最重食之補虛孟詵云野鴨主補中益氣消食九月以後即中食全勝家者雖寒不動氣消十二種蟲平胃氣調中輕身又身上諸小熱瘡多年不可者但多食之即瘥又云白鴨肉補虛消毒熱利水道及小兒熱驚癇頭生瘡腫又和蔥豉作汁飲之去卒煩熱又糞主熱毒毒痢又取和雞子白封熱腫毒上消又黑鴨滑中發冷痢下腳氣不可食之子微寒少食之亦發氣令背膊悶日華子云野鴨涼無毒補虛助力和胃氣消食治熱毒風及惡瘡癤殺腹臟一切蟲九月後立春前採大補益病人不可與木耳胡桃豉同食家鴨冷微毒補虛消熱毒利小腸止驚癇解丹毒止痢綠頭者佳頭治水腫煮服糞治熱毒瘡並腫毒以雞子調敷內消卵治心腹胸膈熱多食發冷疾食療項中熱血解野葛毒飲之瘥卵小兒食之腳軟不行愛倒鹽淹食之即宜人屎可拓蚯蚓咬瘡外臺秘要解金銀銅鐵毒取鴨屎汁解之百一方卒大腹水病取青雄鴨以水五升煮取一升飲盡厚蓋之取汗佳又方石藥過劑者白鴨屎末和水調服之瘥食醫心鏡治十種水病不瘥垂死青頭鴨一隻治如食法細切和米並五味煮令極熟作粥空腹食之又云主水氣脹滿浮腫小便澀少白鴨一隻去毛腸湯洗饙飯半升以飯薑椒釀鴨腹中縫定如法蒸候熟食之孫真人蛐蟮咬以屎敷瘡又云鴨肉合鱉食之害人鷓鴣味甘溫無毒主嶺南野葛菌毒生金毒及溫瘴久欲死不可瘥者合毛熬酒漬之生搗取汁服最良生江南形似母雞鳴云鉤輈格磔者是唐本注云有鳥相似不為此鳴者則非也臣禹錫等謹按孟詵云鷓鴣能補五臟益心力聰明此鳥出南方不可與竹筍同食令人小腹脹自死者不可食一言此鳥天地之神每月取一隻饗至尊所以自死者不可食也日華子云微毒療蠱氣瘴疾欲死者酒服之圖經曰鷓鴣出江南今江西閩廣蜀夔州郡皆有之形似母雞臆前有白圓點背間有紫赤毛彼人亦呼為越雉又謂之隨陽之鳥南越志云鷓鴣雖東西徊翅然開翅之始必先南翥崔豹古今注云其鳴自呼此不然也其鳴若云鉤輈格磔者是矣亦有一種鳥酷相類但不作此鳴不可食之彼土人食鷓鴣云主野葛生金蛇菌等毒不可與竹筍同食自死者亦禁食之其脂膏手可以已瘴瘃令不龜裂衍義曰鷓鴣鄭谷所謂相呼相應湘天闊者南方專充庖然治瘴及菌毒甚效余悉如經雁肪味甘平無毒主風攣拘急偏枯氣不通利久服長毛髮鬚眉益氣不飢輕身耐老一名鶩肪生江南池澤取無時陶隱居云詩云大曰鴻小曰雁今雁類亦有大小皆同一形又別有野鵝大於雁猶似家蒼鵝謂之駕音加鵝雁肪自不多食其肉應亦好鶩作木音云是野鴨今此一名鶩肪則雁鶩皆相類爾此前又有鴨事注在前夫雁乃住江湖夏應產伏皆往北恐雁門北人不食此鳥故也中原亦重之爾雖採無時以冬月為好唐本注云雁喉下白毛療小兒癇有效夫雁為陽鳥冬則南翔夏則北徂時當春夏則孳音茲育於北豈謂北人不食之乎然雁與燕相反燕來則雁往燕往則雁來故禮云秋候雁來春去鳥至臣禹錫等謹按吳氏云雁肪神農歧伯雷公甘無毒殺諸石藥毒孟詵云雁膏可合生發膏仍治耳聾骨灰和淚洗頭長髮日華子云涼無毒治風麻痹久服助氣壯筋骨脂和豆黃作丸補勞瘦肥白人其毛自落者小兒帶之療驚癇梅師方治灸瘡腫痛取雁屎白人精相和研敷瘡孫真人六月七月勿食雁傷神食醫心鏡主風攣拘急偏枯血氣不通利雁肪四兩煉濾過每日空心暖酒一杯肪一匙頭飲之衍義曰雁肪人多不食者謂其知陰陽之升降分長少之行序世或謂之天厭亦道家之一說爾食之則治諸風唐本注曰雁為陽鳥其義未盡茲蓋得中和之氣熱則即北寒則即南以就和氣所以為禮幣者一以取其信二取其和禽中雀卵味酸溫無毒主下氣男子陰痿不起強之令熱多精有子腦主耳聾臣禹錫等謹按耳聾通用藥云雀腦平頭血主雀盲雄雀屎臣禹錫等謹按齒痛通用藥云雄雀屎溫療目痛決癰癤女子帶下溺不利除疝瘕五月取之良陶隱居云雀性利陰陽故卵亦然術云雀卵和天雄丸服之令莖大不衰人患黃昏間目無所見為之雀盲其頭血療之雄雀屎兩頭尖者是也亦療齲齒雀肉不可合李子食之亦忌合醬食之妊身人尤禁之唐本注云別錄云雀屎和男首子乳如薄泥點目中胬肉赤脈貫瞳子上者即消神效以蜜和為丸飲服主症癖久痼冷病或和少乾薑服之大肥悅人今按陳藏器本草云雀肉起陽道食之令人有子冬月者良臘月收雀屎俗呼為青丹主痃癖諸塊伏梁和乾薑桂心艾等為丸入腹能爛痃癖患癰苦不潰以一枚敷之立決又急黃欲死以兩枚細研水溫服之臣禹錫等謹按孟詵云其肉十月以後正月以前食之續五臟不足氣助陰道益精髓不可停息糞和天雄乾薑為丸令陰強腦塗凍瘡日華子云雀暖無毒壯陽益氣暖腰膝縮小便治血崩帶下糞頭尖及成梃者雄右掩左者亦是圖經曰雀舊不著所出州土今處處有之其肉大溫食之益陽冬月者良卵及腦頭血皆入藥雄雀屎臘月收之俗呼為青丹頭尖者為雄屎素問云胸脅支滿者妨於食病至則先聞臊臭出清液先唾血四肢青目眩時時前後血病名血枯得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來治之以烏賊骨藘茹二物併合之丸以雀卵大如小豆以五丸為後飯飲鮑魚汁以利腸中及傷肝也飯後藥先謂之後飯按古本草烏賊魚骨藘茹等並不治血枯然經法用之是攻其所生所起耳今人亦取雀肉以蛇床子熬膏和合眾藥丸服補下有效謂之驛馬丸此法起於唐世云明皇服之又下有燕屎條陶隱居云有胡越二種入藥用胡燕也胡洽治疰青羊脂丸中用之其窠亦入藥崔元亮海上方治濕瘑取胡燕窠最寬大者唯用其抱子處余處不用搗為末以漿水煎甘草入少許鹽成湯用洗瘡洗訖拭乾便以窠末貼其上三兩遍便愈若患惡刺以醋和窠末如泥裹之三兩日易便瘥食療卵白和天雄末菟絲子末為丸空心酒下五丸主男子陰痿不起女子帶下便溺不利除疝瘕決癰腫續五臟氣雷公云雀蘇凡使勿用雀兒糞其雀兒口黃未經淫者糞是蘇若底坐尖在上即曰雌兩頭圓者是雄陰人使雄陽人使雌凡採之先去兩畔有附子生者勿用然後於缽中研如粉煎甘草湯浸一宿傾上清甘草水盡焙乾任用外臺秘要療齒齲痛有蟲取雄雀糞以綿裹塞齒孔內日一二易之又方治咽喉閉塞口噤用雄雀糞細研每服溫水調灌半錢匕肘後方療目熱生膚赤白膜取雀屎細直者以人乳和敷上自消爛盡梅師方治諸癰不消已成膿懼針不得破令速決取雀屎塗頭上即易之雄雀屎佳堅者為雄簡要濟眾婦人吹奶獨勝散白丁香半兩搗羅為散每服一錢匕溫酒調下無時服廣利方妊娠食雀肉飲酒令子心淫亂又云妊娠食雀肉及豆醬令子面多䵟子母秘錄治小兒中風口噤乳不下雀屎白水丸如麻子大服二丸即愈又方治小兒凍瘡用雀兒腦髓塗之立瘥衍義曰雀卵孟詵云肉十月以後正月以前食之此蓋取其陰陽靜定未決泄之義卵亦取第一番者燕屎味辛平有毒主蠱毒鬼疰逐不祥邪氣破五癃利小便生高山平谷陶隱居云燕有兩種有胡有越紫胸輕小者是越燕不入藥用胸斑黑聲大者是胡燕俗呼胡燕為夏候其作窠喜長人言有容一疋絹者令家富窠亦入藥用與屎同多以作湯洗浴療小兒驚邪也窠戶有北向及尾倔求勿切色白者皆是數百歲燕食之延年凡燕肉不可食令人入水為蛟所吞亦不宜殺之唐本注云別錄云胡燕卵主水浮腫肉出痔蟲越燕屎亦療痔殺蟲去目翳也今按陳藏器草云燕屎有毒主瘧取方寸匕令患者發日平旦和酒一升攪調病人兩手捧碗當鼻下承取氣慎勿入口毒人又主蠱毒取屎三合熬令香獨頭蒜十枚去皮和搗為丸服三丸如梧桐子蠱當隨痢下而出臣禹錫等謹按孟詵云石燕在乳穴石洞中者冬月採之堪食余者不中只可治病食如常法取二十枚投酒一斗中漬之三日後取飲每服一二盞隨性多少甚益氣力日華子云石燕暖無毒壯陽暖腰膝添精補髓益氣潤皮膚縮小便御風寒嵐瘴瘟疫氣圖經文具雀卵條下外臺秘要治蠼螋尿瘡繞身匝即死以燕巢中土豬脂苦酒和敷之肘後方治卒大腹水病取胡燕卵中黃頓吞十枚葛氏方卒得浸淫瘡有汁多發於心不早療周匝身則殺人胡燕窠中土水和敷之又方若石淋者取燕屎末以冷水服五錢匕旦服至食時當尿石水賈相公牛經牛有非時吃著雜蟲腹脹滿取燕子糞一合以水漿二升相和灌之效伏翼味鹹平無毒主目瞑音冥癢痛療淋利水道明目夜視有精光久服令人喜樂媚好無憂一名蝙蝠生太山川穀及人家屋間立夏後採陰乾莧實雲實為之使陶隱居云伏翼目及膽術家用為洞視法自非白色倒懸者亦不可服之也唐本注云伏翼以其晝伏有翼爾李氏本草云即天鼠也又云西平山中別有天鼠十一月十二月取主女人生子余疾帶下病無子方言一名仙鼠在山孔中食諸乳石精汁皆千歲頭上有冠淳白大如鳩鵲食之令人肥健長年其大如鶉未白者皆已百歲而並倒懸其石孔中屎皆白如大鼠屎下條天鼠屎當用此也其屎灰酒服方寸匕主子死腹中其腦主女子面皰服之令人不忘也今按陳藏器本草云伏翼主蚊子五月五日取倒懸者曬乾和桂薰陸香為末燒之蚊子去取其血滴目令人不睡夜中見物自蟲魚部今移臣禹錫等謹按藥性論云伏翼微熱有毒服用治五淋日華子云蝙蝠久服解愁糞名夜明砂炒服治瘰癧圖經曰伏翼蝙蝠也出泰山川穀及人家屋間立夏後採陰乾用天鼠屎即伏翼屎也出合浦山谷十月十二月取蘇恭引方言伏翼一名仙鼠故知一物又云仙鼠在山孔中食諸乳石精汁皆千歲頭上有冠淳白大如鳩鵲其大如鶉未白者皆已百歲而並倒懸其石乳中此仙經所謂肉芝者也其屎皆白如大鼠屎入藥當用此然今蝙蝠多生古屋中白而大者蓋稀有屎亦有白色者料其出乳石處山中生者當應如此耳續傳信方療馬撲損痛不可忍者仙鼠屎三兩枚細研以熱酒一升投之取其清酒服之立可止痛更三兩服便瘥雷公曰凡使要重一斤者方採之每修事行拭去肉上毛去爪腸即留翅並肉腳及嘴然後用酒浸一宿漉出取黃精自然汁塗之炙令乾方用每修事重一斤一個用黃精自然汁五兩為度聖惠方治小兒生十餘月後母又有妊令兒精神不爽身體萎瘁名為鬾病用伏翼燒為灰細研以粥飲調下半錢日四五服效若炙令香熟嚼之哺兒亦效百一方治久咳嗽上氣十年二十年諸藥治不瘥方蝙蝠除翅足燒令焦末飲服之鬼遺方治金瘡出血內瘻蝙蝠二枚燒煙盡末以水調服方寸匕令一日服盡當下如水血消也抱朴子千歲蝙蝠色白如雪集則倒懸蓋腦重也得而陰乾末服令人壽千歲也衍義曰伏翼屎合疳藥白日亦能飛但畏鷙鳥不敢出此物善服氣故能壽冬月不食亦可驗矣天鼠屎味辛寒無毒主面癰腫皮膚洗洗時痛腹中血氣破寒熱積聚除驚悸去面黑皯一名鼠法一名石肝生合浦山谷十月十二月取惡白蘞白薇陶隱居云方家不復用俗不識也唐本注云李氏本草云即伏翼屎也伏翼條中不用屎是此明矣方言名仙鼠伏翼條已論也今注一名夜明砂簡要濟眾治五瘧方夜明砂搗為散每服一大錢用冷茶調下立瘥家傳驗方一歲至兩歲小兒無辜夜明砂熬搗為散任意拌飯並吃食與吃三歲號干無辜鷹屎白主傷撻滅瘢陶隱居云止單用白亦不能滅瘢復應合諸藥殭蠶衣魚之屬以為膏也唐本注云鷹屎灰酒服方寸匕主惡酒勿使飲人知今按陳藏器本草云鷹肉食之主邪魅野狐魅嘴及爪主五痔狐魅燒為末服之臣禹錫等謹按滅瘢通用藥云鷹屎白平藥性論云鷹屎臣微寒有小毒主中惡又頭燒灰和米飲服之治五痔又眼睛和乳汁研之夜三注眼中三日見碧霄中物忌菸熏外臺秘要主食哽雁鷹屎燒末服方寸匕虎狼雕屎亦得衍義曰鷹屎白兼他藥用之作潰虛積藥治小兒奶癖黃鷹糞白一錢密佗僧一兩舶上硫黃一分丁香二十一個上為末每服一字三歲以上半錢用乳汁或白麵湯調下並不轉瀉一復時取下青黑物後服補藥醋石榴皮半兩炙黑色伊祁一分木香一分麝香半錢同為末每服一字溫薄酒調下並吃二服凡小兒脅下硬如有物乃是癖氣俗謂之奶脾只服溫脾化積氣丸子藥不可取轉無不愈也取之多失雉肉味酸微寒無毒主補中益氣力止泄痢除蟻瘻陶隱居云雉雖非辰屬而正是離禽丙午日不可食者明王於火也唐本注云雉溫主諸瘻瘡臣禹錫等謹按孟詵云山雞主五臟氣喘不得息者食之發五痔和蕎麥麵食之生肥蟲卵不與蔥同食生寸白蟲又野雞久食令人瘦又九月至十二月食之稍有補他月即發五痔及諸瘡疥不與胡桃同食菌子木耳同食發五痔立下血日華子云雉雞平微毒有痼疾人不宜食秋冬益春夏毒圖經曰雉本經不載所出州土今南北皆有之多取以充庖廚周禮庖人共六禽雉是其一亦食品之貴然有小毒不宜常食九月以後至十一月以前食之即有補它月則發五痔及諸瘡疥又不可與胡桃菌蕈木耳之類同食亦發痔疾立下血須禁之爾雅所載雉名尤眾今人鮮能盡識江淮伊洛間有三種尾長而小者為山雞人多畜之樊中則所謂翟山雉者也江南又有一種白而背有細黑紋名白鷳亦堪畜養彼人食其肉亦雉之類也其餘不復用之食療云不與胡桃同食即令人發頭風如在船車內兼發心痛亦不與豉同食自死足爪不伸食之殺人食醫心鏡主消渴飲水無度小便多口乾渴雉一隻細切和鹽豉作羹食又云主脾胃氣虛下痢日夜不止腸滑不下食野雞一隻如食法細研著桔皮椒蔥鹽醬調和作餛飩熟煮空心食之又云治消渴舌焦口乾小便數野雞一隻以五味煮令極熟取二升半以來去肉取汁渴飲之肉亦可食又云治產後下痢腰腹痛野雞一隻作餛飩食之衍義曰雉其飛若矢一往而墮故今人取其尾置船車上意欲如此快速也漢呂太后名雉高祖字之曰野雞其實即雞屬也食之所損多所益少禽下孔雀屎微寒主女子帶下小便不利陶隱居云出廣益諸州方家不見用唐本注云孔雀交廣有劍南元無臣禹錫等謹按陳藏器云孔雀味鹹無毒日華子云孔雀涼微毒解藥毒蠱毒血治毒藥生飲良糞治崩中帶下及可敷惡瘡衍義曰孔雀尾不可入目昏翳人眼鴟尺脂切頭味鹹平無毒主頭風眩顛倒癇疾陶隱居云即俗人呼為老鵄者一名鳶又有雕鶚並相似而大雖不限雌雄恐雄者當勝今鴟頭酒用之當微炙不用蠹蟲者食療云頭燒灰主頭風目眩以飲服之肉食之治癲癇疾千金方治癲癇瘛瘲飛鴟頭二枚鉛丹一斤上二味末之蜜丸先食服三丸日三瘛者稍加之鸂鷘味甘平無毒治驚邪食之主短狐可養亦闢之今短狐處多有鸂鷘五色尾有毛如船舵小於鴨臨海異物志曰鸂鷘水鳥食短狐在山澤中無復毒氣也又杜臺卿淮賦云鸂鷘尋邪而逐害是也新補斑鵻味甘平無毒主明目多食其肉益氣助陰陽一名斑鳩範方有斑鵻丸是處有之春分則化為黃褐侯秋分則化為斑鵻又有青鵻平無毒安五臟助氣虛損排膿治血並一切瘡癤癰瘻又名黃褐鳥新補衍義曰斑鵻斑鳩也嘗養之數年並不見春秋分化有有斑者有無斑者有灰色者有小者有大者久病虛損人食之補氣雖有此數色其用即一也白鶴味鹹平無毒血主益氣力補勞乏去風益肺肫中砂石子摩服治蠱毒邪今鶴有玄有黃有白有蒼取其白者為良它者次之穆天子傳云天子至巨搜二氏獻白鶴之血以飲天子注云血益人氣力新補烏鴉平無毒治瘦咳嗽骨蒸勞臘月瓦缸泥煨燒為灰飲下治小兒癇及鬼魅目清注目中通治目新補圖經文具雄鵲條下聖惠方治土蜂瘻以鴉頭燒灰細研敷之練鵲味甘溫平無毒益氣治風疾冬春間取細銼炒令香袋盛於酒中浸每朝取酒溫服之似鴝鵒小黑褐色食槐子者佳新補鴝鵒肉味甘平無毒主五痔止血炙食或為散飲服之唐本注云鳥似鵙而有幘者是今按陳藏器本草云鴝鵒主吃取灸食之小兒不過一枚瘥也臘月得者主老嗽唐本先附臣禹錫等謹按日華子云治嗽及吃噫下氣炙食之作妖可通靈眼睛和乳點眼甚明陳藏器云目睛和乳汁研滴目瞳子能見云外之物五月五日取子去舌端能效人言又可使取火食療寒主五痔止血又食法臘日採之五味炙之治老嗽或作羹食之亦得或搗為散白蜜和丸並得治上件病取臘月臘日得者良有效非臘日得者不堪用雄鵲肉味甘寒無毒主石淋消結熱可燒作灰以石投中散解者是雄也陶隱居云五月五日鵲腦入術家用一名飛駁烏鳥之雌雄難別舊云其翼左覆右是雄右覆左是雌又燒毛作屑納水中沉者是雄浮者是雌今云投石恐止是鵲也余鳥未必爾今按陳藏器本草云雄鵲子下石淋燒作灰淋取汁飲之石即下臣禹錫等謹按日華子云雄鵲涼主消渴疾巢多年者療癲狂鬼魅及蠱毒等燒之仍呼祟物名號亦敷瘻瘡良圖經曰雄鵲舊不著所出州土今在處有之肉主風大小腸澀四肢煩熱胸膈痰結婦人不可食經云燒作灰以石投中散解者是雄也陶隱居云鳥之雌雄難別舊云翼左復右是雄右復左是雌又燒毛作屑納水沉者是雄浮者是雌今云投石恐止是鵲如此余鳥未必爾鵲一名飛駁烏又烏鴉今人多用而本經不著古方有用其翅羽者葛洪肘後方療從高墮下瘀血棖心面青短氣者以烏翅收七枚得右翅最良燒末酒服之當吐血便愈近世方家多用烏鴉之全者以治急風其法臘月捕取翅羽嘴足全者泥缶固濟大火燒煅入藥烏犀丸中用之鸕鷀屎一名蜀水花去面黑䵟黶痣頭微寒主鯁及噎燒服之陶隱居云溪谷間甚多見之當自取其屎擇用白處市賣不可信骨亦主魚鯁此鳥不卵生口吐其雛獨為一異臣禹錫等謹按陳藏器云鸕鷀本功外主易產臨時令產婦執之此鳥胎生仍從口出如兔吐兒二物產同其療亦一又其類有二種頭細身長頂上白者名魚蚊杜臺卿淮賦云鸕鷀吐雛於八九鵁鶄銜翼而低昂藥性論云蜀水花亦可單用鸕鷀鳥糞是有毒能去面上䵟疱日華子云冷微毒療面瘢疵及湯火瘡痕和脂油調敷疔瘡圖經曰鸕鷀屎本經不載所出州土今水鄉皆有之此鳥胎生從口中吐雛如兔子類故杜臺卿淮賦云鸕鷀吐雛於八九鵁鶄銜翼而低昂是也產婦臨蓐令執之則易生其屎多在山石上紫色如花就石上刮取用之南人用治小兒疳蛔干碾為末炙豬肉點與啖有奇功本經名蜀水花而唐面膏方有使鸕鷀屎又使蜀水花者安得一物而兩用未知其的別有一種似鸕鷀而頭細背長項上有白者名白鮫不堪藥用聖惠方治鼻面酒皶疱用鸕鷀糞一合研以臘月豬脂和每夜敷之外臺秘要治魚骨鯁口稱鸕鷀則下又方治斷酒鸕鷀糞灰水服方寸匕孫真人治噎欲發時銜鸕鷀嘴遂下外臺秘要同衍義曰鸕鷀陶隱居云此鳥不卵生口吐其雛今人謂之水老鴉巢於大木群集宿處有常久則木枯以其糞毒也懷妊者不敢食為其口吐其雛陳藏器復云使易產臨時令產婦執之與陶相戾嘗官於澧州公宇後有大木一株其上有三四十巢日夕觀之既能交合兼有卵殼布地其色碧豈得雛吐口中是全未考尋可見當日聽人之誤言也鸛骨味甘無毒主鬼蠱諸疰毒五屍心腹疾陶隱居云鸛亦有兩種似鵠而巢樹者為白鸛黑色曲頸者為烏鸛今宜用白者今按陳藏器本草云鸛腳骨及嘴主喉痹飛屍蛇虺咬及小兒閃癖大腹痞滿並煮汁服之亦燒為黑灰飲服有小毒殺樹木禿人毛髮沐湯中下少許發盡脫亦便不生人探巢取鸛子六十里旱能群飛激云云散雨歇其巢中以泥為池含水滿池中養魚及蛇以哺其子臣禹錫等謹按藥性論云鸛骨大寒亦可單用治屍疰鬼疰腹痛炙令黃末空心暖酒服方寸匕衍義曰鸛頭無丹項無烏帶身如鶴者是兼不善唳但以啄相擊而鳴作池養魚蛇以哺子之事豈可垂示後世此禽多在樓殿吻土作窠日夕人觀之故知其未審耳礜石條中亦著白鴿味鹹平無毒肉主解諸藥毒及人馬久患疥屎主馬疥一作犬疥鳩類也鴿鳩類翔集屋間人患疥食之立愈馬患疥入鬃尾者取屎炒令黃搗為末和草飼之又云鵓鴿暖無毒調精益氣治惡瘡疥並風瘙解一切藥毒病者食之雖益人緣恐食多減藥力白癜癧瘍風炒酒服敷驢馬疥瘡亦可新補聖惠方主頭極癢不痛生瘡用白鴿屎五合以好醋和如稀膏煮三兩沸日三二上敷之又方治白禿以糞搗細羅為散先以醋米泔洗了敷之立瘥外臺秘要救急治蠱以白鴿毛糞燒灰以飲和服之食醫心鏡治消渴飲水不知足白花鴿一隻切作小臠以土蘇煎含之咽汁衍義曰白鴿其毛羽色於禽中品第最多野鴿糞一兩炒微焦麝香別研吳白朮各一分赤芍藥青木香各半兩柴胡三分延胡索一兩炒赤色去薄皮七物同為末溫無灰酒空心調一錢服治帶下排膿候膿盡即止後服仍以他藥補血臟百勞平有毒毛主小兒繼病繼病母有娠乳兒兒有病如瘧痢他日亦相繼腹大或瘥或發他人相近亦能相繼北人未識此病懷妊者取毛帶之又取其蹋枝鞭小兒令速語鄭禮注云鵙博勞也新補楚詞云左見兮鳴鵙言具鳴惡也白澤圖云屋間鬥不祥月令云鵙始鳴鄭云博勞也鶉補五臟益中續氣實筋骨耐寒溫消結熱小豆和生薑煮食之止淺痢酥煎偏令人下焦肥與豬肉同食之令人生小黑子又不可和菌子食之令人發痔四月已煎未堪食是蝦蟆化為也新補楊文公談苑至道二年夏秋間京師鬻鶉者積於市門皆以大車載而入鶉才直二文是時雨水絕無蛙聲人有得於水次者半為鶉半為蛙列子天瑞篇曰蛙變為鶉張湛注云事見墨子斯不謬矣又田鼠亦為鶉蓋物之變非一揆也月令云田鼠化為鴽素問云鴽鶉也衍義曰鶉有雌雄從卵生何言化也其說甚容易嘗于田野屢得其卵初生謂之羅鶉至初秋謂之早秋中秋以後謂之白唐然一物四名當悉書之小兒患疳及下痢五色旦旦食之有效啄木鳥平無毒主痔瘻及牙齒疳䘌蚛牙燒為末納牙齒孔中不過三數此鳥有大有小有褐有斑褐者是雌斑者是雄穿木食蠹爾雅云鴷斫木荊楚歲時記云野人以五月五日得啄木貨之主齒痛古今異傳云本雷公採藥吏化為此鳥淮南子云斫木愈齲信哉又有青黑者黑者頭上有紅毛生山中土人呼為山啄木大如鵲新補姚大夫治瘻有頭出膿水不止以啄木一隻燒灰酒下二錢匕深師方治蛀牙有孔疼處以啄木鳥舌尖綿裹於痛處咬之慈鴉味酸咸平無毒補勞治瘦助氣止咳嗽骨蒸羸弱者和五味淹炙食之良慈鴉似烏而小多群飛作鴉鴉聲者是北土極多不作膻臭也今謂之寒鴉新補食療主瘦病咳嗽骨蒸者可和五味淹炙食之良其大鴉不中食肉澀只能治病不宜常食也以目睛汁注眼中則夜見神鬼又神通目法中亦要用此物又北帝攝鬼錄中亦用慈鴉卵鶻嘲味鹹平無毒助氣益脾胃主頭風目眩煮炙食之頓盡一枚至驗今江東俚人呼頭風為瘇頭先從兩項邊筋起直上入頭目眩頭悶者是大都此疾是下俚所患其鳥南北總有似鵲尾短黃色在深林間飛翔不遠北人名鸜鷜爾雅云鳲鳩似鵲鶻鵃似鵲尾短多聲東京賦云鶻嘲春鳴或呼為骨雕新補鵜鶘嘴味鹹平無毒主赤白久痢成疳者燒為黑末服一方寸匕鳥大如蒼鵝頤下有皮袋容二升物展縮由袋中盛水以養魚一名逃河身是水沫唯胸前有兩塊肉如拳云昔為人竊肉入河化為此鳥今猶有肉因名逃河詩云維鵜在梁不濡其咮鄭云鵜鴣咮喙也言愛其嘴新補鴛鴦味鹹平小毒肉主諸瘻疥癬病以酒浸炙令熱敷瘡上冷更易食其肉令人患大風新補食療其肉主瘻瘡以清酒炙食之食之則令人美麗又主夫婦不和作羹臛私與食之即立相憐愛也食醫心鏡主五痔瘻瘡鴛鴦一隻治如食法煮令極熟細細切以五味醋食之羹亦妙荊楚記云鄧木鳥主齒痛鴦是也二十六種陳藏器余鷸蝟注蘇云如蚌鷸按鷸如鶉嘴長色蒼在泥塗間作鷸鷸聲人取食之如鶉無別余功蘇恭云如蚌鷸之相持也新注云取用補虛甚暖村民云田雞所化亦鵪鶉同類也鷃蟬注陶云雀鷃蜩範按鷃是小鳥如鶉之類一名鴽鄭注禮記以鷃為鷃又云鴽鴾母也莊子云斥鷃人食之無別功用也陽烏鸛注陶云陽烏是鸛按二物殊不似陽烏身黑頸長白殊小鸛嘴主惡蟲咬作瘡者燒為末酒下亦名陽鴉出建州鳳凰臺味辛平無毒主勞損積血利血脈安神異志云驚邪癲癇雞癇發熱狂走水磨服之此鳳凰腳下物如白石也鳳雖靈鳥時或來儀候其棲止處掘土二三尺取之狀如圓石白似卵然鳳鳥非梧桐不棲非竹實不食不知棲息那復近地得臺入土正是物有自然之理不可識者今有鳳處未必有竹有竹處未必有鳳恐是諸國麟鳳洲有之如漢時所貢續絃膠即煎鳳髓所造有亦曷足怪乎今雞亦有白臺如卵硬中有白無黃云是牡雞所生名為父公臺本經雞白橐橐字似臺後人寫之誤耳書記云諸天國食鳳卵如此土人食雞卵也鸀鳿鳥主溪毒砂蝨水弩射工蟈短狐蝦鬚等病將鳥來病人邊則能唼人身訖以物承之當有砂石出也其砂即是含沙射人砂是此蟲之箭也亦可燒屎及毛作灰服之亦可籠以近人令鳥氣相吸山中水毒處即生此鳥當為食毒蟲所致以前數病大略相似俱是山水間蟲含沙射影亦有無水處患者防之發夜臥常以手摩身體覺辣痛處熟視當有赤點如針頭急捻之以芋葉入肉刮卻視有細沙石以蒜封瘡頭上不爾少即寒熱瘡漸深也其蝦鬚瘡桂嶺獨多著者十活一二唯有早覺者當用芋草及大芋甘蔗等葉屈角入肉鉤之深盡根蒜封可瘥須臾即根入至骨其根拔出如蝦鬚瘡號蝦鬚瘡有如疔腫最惡著人幽隱處自餘六病或如瘧及天行初著寒熱亦有瘡出者亦有無瘡者要當出得砂石遲緩易療不比蝦鬚鸀鳿鳥如鴨而大眼赤嘴斑好生山溪中巧婦鳥主婦人巧吞其卵小於雀在林藪間為窠窠如小囊袋亦取其窠燒女人多以熏手令巧爾雅云桃蟲鷦注云桃雀也俗呼為巧婦鳥也英雞味甘溫無毒主益陽道補虛損令人肥健悅澤能食不患冷常有實氣而不發也出澤州有石英處常食碎石英體熱無毛飛翔不遠人食之取其英之功也如雉尾短腹下毛赤腸中常有碎石瑛凡鳥食之石入腸必致銷爛終不出今人以末石瑛飼雞取其卵而食則不如英雞魚狗味鹹平無毒主鯁及魚骨入肉不可出痛甚者燒令黑為末頓服之煮取汁飲亦佳今之翠鳥也有大小小者是名魚狗大者名翠取其尾為飾亦有斑白者俱能水上取魚故曰魚狗爾雅云竭天狗注曰小鳥青似翠食魚江東呼為魚狗穴土為窠駝鳥屎無毒主人中鐵刀入肉食之立銷鳥如駝生西夷好食鐵永徽中吐火羅獻鳥高七尺如駝鼓翅行能食鐵也鵁鶄水鳥人家養之厭火災似鴨綠衣馴擾不去出南方池澤爾雅云鳽鳽音堅也鵁鶄畜之厭火災博物志云鵁鶄巢於高樹生子穴中銜其母翅飛下蒿雀味甘溫無毒食之益陽道取其腦塗凍瘡手足不皸似雀青黑在蒿間塞外彌多食之美於諸雀塞北突厥雀如雀身赤從北來當有賊下邊人候之食其肉極熱益人也鶡雞味甘無毒食肉令人勇健出上黨魏武帝賦云鶡雞猛氣其鬥終無負期於必死今人以歇曷渴二音為冠像此也山菌子味甘平無毒主野雞病殺蟲煮炙食之生江東山林間如小雞無尾百舌鳥主蟲咬炙食之亦主小兒久不語又取其窠及糞塗蟲咬處今之鶯一名反舌也黃褐侯味甘平無毒主蟻瘻惡瘡五味淹炙食之極美如鳩作綠褐色聲如小兒吹竽鷩雉主火災天竺法真登羅山疏云山海經曰鷩雉養之穰火災如雉五色鳥目無毒生吞之令人見諸魅或以目睛研注目中夜見鬼也肉及卵食之令人昏志毛把之亦然未必昏為其臭膻鸊扶黎反鷉天黎反膏主耳聾滴耳中又主刀劍令不鏽以膏塗之水鳥也如鳩鴨腳連尾不能陸行常在水中人至即沉或擊之便起爾雅注云膏主堪瑩劍續英華詩云馬銜苜蓿葉劍瑩鸊鷉膏是也布穀腳腦骨令人夫妻相愛五月五日收帶之各一男左女右云置水中自能相隨又江東呼為郭公北人云撥穀一名獲谷似鷂長尾爾雅云鳲鳩注云今之布穀也牝牡飛鳴以翼相拂禮記云鳴鳩拂其羽鄭注云飛且翼相擊蚊母鳥翅主作扇蚊即去矣鳥大如雞黑色生南方池澤茹藘中其聲如人嘔吐每口中吐出蚊一二升爾雅云鷏蚊母注云常說常吐蚊蚊雖是惡水中蟲羽化所生然亦有蚊母吐之猶如塞北有蚊母草嶺南有虻母草江東有蚊母鳥此三物異類而同功也杜鵑初鳴先聞者主離別學其聲令人吐血於廁溷上聞者不祥壓之法當為狗聲以應之俗作此說按荊楚歲時記亦云有此言乃復古今相會鳥小似鷂鳴呼不已蜀王本紀云杜宇為望帝淫其臣鱉靈妻乃亡去蜀人謂之望帝異苑云杜鵑先鳴者則人不敢學其聲有人山行見一群聊學之嘔血便殞楚詞云鶗鴂鳴而草木不芳人云口出血聲始止故有嘔血之事也鴞目無毒吞之令人夜中見物又食其肉主鼠瘻古人重其炙固當肥美內則云鵲鴞眸其一名梟一名𪀢吳人呼為𩴂魂惡聲鳥也賈誼云鵬似鴞其實一物入室主人當去此鳥盛午不見物夜則飛行常入人家捕鼠周禮哲蔟氏掌覆妖鳥之巢注云惡鳴之鳥若鴞𪀢也鉤鵅入城城空入宅宅空怪鳥也常在一處則無若聞其聲如笑者宜速去之鳥似鵄有角夜飛晝伏爾雅云鵅鵋欺注云江東人呼謂之鉤鵅音革北土有訓胡二物相似抑亦有其類訓胡聲呼其名兩目如貓兒大於鴝鵒乃云作笑聲當有人死又有𪀢鶹亦是其類微小而黃夜能入人家拾人手爪知人吉凶張司空云鵄鴞夜鳴人剪爪棄露地鳥拾之知吉凶鳴則有殃五行書云除手爪埋之戶內恐此鳥得之也爾雅云鵅鵋欺人獲之者於嗉中猶有爪甲莊子云鵄鴞夜撮蚤察毫釐晝則瞑目不見立山言殊性也姑獲能收人魂魄今人一云乳母鳥言產婦死變化作之能取人之子以為己子胸前有兩乳玄中記云姑獲一名天帝少女一名隱飛一名夜行遊女好取人小兒養之有小子之家則血點其衣以為志今時人小兒衣不欲夜露者為此也時人亦名鬼鳥荊楚歲時記云姑獲一名鉤星衣毛為鳥脫毛為女左傳云鳥鳴於亳杜注云嘻嘻音希是也周禮庭氏以救日之弓救月之矢射之嘻嘻即此鳥也鬼車晦暝則飛鳴能入人室收人魂氣一名鬼鳥此鳥昔有十首一首為犬所噬今猶餘九首其一常下血滴人家則凶夜聞其飛鳴則捩狗耳猶言其畏狗也亦名九頭鳥荊楚歲時記云姑獲夜鳴聞則捩耳乃非姑獲也鬼車鳥耳二鳥相似故有此同白澤圖云蒼鶊昔孔子與子夏所見故歌之其圖九首諸鳥有毒凡鳥自死目不閉者勿食鴨目白者殺人鳥三足四距殺人鳥六指不可食鳥死足不伸不可食白鳥玄首玄鳥白首不可食卵有八字不可食婦人妊娠食雀腦令子雀目凡鳥飛投人其口中必有物拔毛放之吉也
