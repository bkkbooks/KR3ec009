body:
  text: 卷第二十八己酉新增衍義蓼實味辛溫無毒主明目溫中耐風寒下水氣面目浮腫癰瘍葉歸舌除大小腸邪氣利中益志馬蓼去腸中蛭蟲輕身生雷澤川澤陶隱居云此類又多人所食有三種一是紫蓼相似而紫色名香蓼亦相似而香並不甚辛而好食一是青蓼人家常有其葉有園者尖者以園者為勝所用即是此干之以釀酒主風冷大良馬蓼生下濕地莖斑葉大有黑點亦有兩三種其最大者名籠薣音鼓即是葒草已在上卷中品唐本注云爾雅云葒一名蘢薣大者名蘬丘軌切則最大者不名籠薣陶誤呼之又有水蓼葉大似馬蓼而味辛主被蛇傷搗敷之絞取汁服止蛇毒入腹心悶者又水煮漬腳捋之消腳氣腫生下濕水旁今按陳藏器本草云蓼主痃癖每日取一握煮服之人霍亂轉筋多取煮湯及熱捋腳葉搗敷狐刺瘡亦主小兒頭瘡又云蓼蕺俱弱陽人為蝸牛蟲所咬毒遍身者以蓼子浸之立瘥不可近陰令弱也諸蓼並冬死唯香蓼宿根重生人為生菜最能入腰腳也臣禹錫等謹按蜀本圖經云蓼類甚多有紫蓼赤蓼青蓼馬蓼水蓼香蓼木蓼等其類有七種紫赤二蓼葉小狹而厚青香二蓼葉亦相似而俱薄馬水二蓼葉俱闊大上有黑點木蓼一名天蓼蔓生葉似柘葉諸蓼花皆紅白子皆赤黑木蓼花黃白子皮青滑爾雅云薔虞蓼釋曰薔一名虞蓼即蓼之生水澤者也周頌良耜云以薅荼蓼毛傳曰蓼水草是也藥性論云蓼實使歸鼻除腎氣兼能去癧陽葉主邪氣又云食之多發心痛令人寒熱損骨髓小兒頭瘡搗末和白蜜一雲和雞子白塗上蟲出不作瘢若霍亂轉筋取子一把香豉一升先切葉以水三升煮取二升納豉汁中更煮取一升半分三服又與大麥面相宜孟詵云蓼子多食令人吐水亦通五臟擁氣損陽氣日華子云水蓼性冷無毒蛇咬搗敷根莖並用又云赤蓼暖暴腳軟人燒灰淋汁浸持以蒸桑葉罯立愈圖經曰蓼實生雷澤川澤今在處有之蓼類甚多有紫蓼赤蓼一名紅蓼青蓼香蓼馬蓼水蓼木蓼等凡七種紫赤二種葉俱小狹而厚青香二種葉亦相似而懼薄馬水二種葉俱闊大上有黑點此六種花皆黃白子皆青黑木蓼一名天蓼亦有大小二種蔓生葉似柘葉花黃白子皮青滑陶隱居以青蓼入藥然其蓼俱堪食又以馬蓼為葒草已見上條余亦無用蘇恭以水蓼亦入藥水煮捋腳者多生水澤中周頌所謂以薅大羔切荼蓼爾雅所謂薔虞蓼是也又三茅君傳有作白蓼醬方白蓼藥譜無聞疑即青蓼也或云紅蓼亦可作醬聖惠方治肝虛轉筋用赤蓼莖葉切三合水一盞酒三合煎至四合去滓溫分二服又方治熱暍心悶用濃煮蓼汁一大盞分為二服飲之外臺秘要治夏月暍死取濃煮汁三升灌之經驗方治腳痛成瘡先銼漿蓼煮湯令溫熱得所頻頻淋洗候瘡干自安孫真人食忌二月勿食水蓼食之傷腎合魚膾食之則令人陰冷疼氣欲絕斗門方治血氣攻心痛不可忍以蓼根細銼酒浸服之瘥古今錄驗治霍亂轉筋取蓼一手把去兩頭以水二升半煮取一升半頓服之文選習蓼蟲之忘辛是知物莫辛於蓼也衍義曰蓼實即神農本經第十一卷中水蓼之子也彼言蓼則用莖此言實即用子故此復論子之功故分為二條春初以葫蘆盛水浸濕高掛於火上晝夜使暖遂生紅芽取以為蔬以備五辛盤又一種水紅與此相類但苗莖高及丈取子微炒碾為細末薄酒調二三錢服治瘰癧久則效效則已蔥實味辛溫無毒主明目補中不足其莖蔥白平可作湯主傷寒寒熱出汗中風面目腫傷寒骨肉痛喉痹不通安胎歸目除肝邪氣安中利五臟益目睛殺百藥毒蔥根主傷寒頭痛蔥汁平溫主溺血解藜蘆毒唐本注云蔥有數種山蔥曰茖蔥療病以胡蔥主諸惡蛓七吏切狐尿刺毒山溪中沙蝨射工等毒煮汁浸或搗敷大效亦兼小蒜茱萸輩不獨用也其人間食蔥又有二種有凍蔥即經冬不死分莖栽蒔而無子也又有漢蔥冬即葉枯食用入藥凍蔥最善氣味亦佳臣禹錫等謹按蜀本圖經云蔥有冬蔥漢蔥胡蔥茖蔥凡四種冬蔥夏衰冬盛莖葉俱軟美山南江左有之漢蔥冬枯其莖實硬而味薄胡蔥莖葉粗短根若金䔲能療腫毒茖蔥生於山谷不入藥用爾雅云茖山蔥釋曰說文云蔥生山中者名茖細莖大葉者是也孟詵云蔥溫根主瘡中有水風腫疼痛者冬蔥最善宜冬月食不宜多虛人患氣者多食發氣上衝人五臟閉絕虛人胃開骨節出汗故溫爾日華子云蔥治天行時疾頭痛熱狂通大小腸霍亂轉筋及賁豚氣腳氣心腹痛目眩及止心迷悶取其莖葉用鹽研罯蛇蟲傷並金瘡水入皸腫煨研罯敷中射工溪毒鹽研罯敷子溫中補不足益精明目根殺一切魚肉毒不可以蜜同食圖經曰蔥實本經不載所出州土今處處有之蔥有數種入藥用山蔥胡蔥食品用凍蔥漢蔥山蔥生山中細莖大葉食之香美於常蔥一名茖古百切蔥爾雅所謂茖山蔥是也胡蔥類食蔥而根莖皆細白又云莖葉微短如金燈者是也舊別有條云生蜀郡山谷似大蒜而小形圓皮赤稍長而銳凍蔥冬夏常有但分莖栽蒔而無子氣味最佳亦入藥用一名冬蔥又有一種樓蔥亦冬蔥類也江南人呼龍角蔥言其苗有八角故云爾淮楚間多種之漢蔥莖實硬而味薄冬即葉枯凡蔥皆能殺魚肉毒食品所不可缺也唐韋宙獨行方主水病兩足腫者銼蔥葉及莖煮令爛漬之日三五作乃佳煨蔥治打撲損見劉禹錫傳信方云得於崔給事取蔥新折者便入煻灰火煨趁熱剝皮擘開其間有涕便將罯損處仍多煨取續續易熱者崔云頃在澤潞與李抱真作判官李相方以球杖按球子其軍將以杖相格便乘勢不能止因傷李相指並爪甲擘裂遽索金創藥裹之強坐頻索酒吃至數盞已過量而面色愈青忍痛不止有軍吏言此方遂用之三易面色卻赤斯須云已不痛凡十數度用熱蔥並涕纏裹其指遂畢席笑語又蔥花亦入藥見崔元亮海上方治脾心痛痛則腹脹如錐刀刺者吳茱萸一升蔥花一升以水一大升八合煎七合去滓分二服立效食療葉溫白平主傷寒壯熱出汗中風面目浮腫骨節頭疼損髮鬢蔥白及須平通氣主傷寒頭痛又治瘡中有風水腫疼取青葉乾薑黃柏相和煮作湯浸洗之立愈冬月食不宜多只可和五味用之上衝人五臟閉絕虛人患氣者多食發氣為通和關節出汗之故也少食則得可作湯飲不得多食恐拔氣上衝人五臟悶絕切不得與蜜相和食之促人氣殺人又止血衄利小便外臺秘要治腸痔大便常血取蔥白三五斤煮作湯盆中坐立瘥又方治大小腸不通搗蔥白以酢和封小腹上又方治急氣淋陰腎腫泥蔥半斤煨過爛搗貼臍上千金方治中惡蔥心黃刺鼻孔中血出良肘後方腦骨破及骨折蔥白細研和蜜厚封損處立瘥經驗方治小便淋澀或有血以赤根樓蔥近根截一寸許安臍中上以艾灸七壯梅師方治胎動不安以銀器煮蔥白羹服之又方治驚金瘡出血不止取蔥炙令熱挪取汁敷瘡上即血止又方治霍亂後煩躁臥不安穩蔥白二十莖大棗二十枚以水三升煎取二升分服孫真人食忌正月勿多食生蔥食之發麵上游風若燒蔥和蜜食殺人食醫心鏡主赤白痢以蔥一握細切和米煮粥空心食之又方理眼暗補不足蔥實大半升為末每度取一匙頭水二升煮取一升半濾取滓葺米煮粥食良久食之又搗蔥實丸蜜和如梧子大食後飲汁服一二十丸日二三服亦甚明目又方主傷寒寒熱骨節碎痛出汗治中風面目浮腫喉咽不通安胎歸目除肝臟邪氣安中利五臟益目睛殺百藥葉作羹粥炸作齏食之良勝金方治鼻衄血以蔥白一握搗裂汁投酒少許抄三兩滴入鼻內瘥兵部手集治蜘蛛齧遍身成瘡青蔥葉一莖去小尖頭作孔子以蚯蚓一條入蔥葉中緊捏兩頭勿令通氣但搖動即化為水點咬處即差杜壬治喉中瘡腫蔥須陰乾為末蒲州膽礬一錢蔥末二錢研勻一字入竹管中吹病處傷寒類要治婦人妊娠七月若傷寒壯熱赤斑變為黑斑溺血以蔥一把水三升煮令熱服之取汗食蔥令盡楊氏產乳主胎動五六個月困篤難較者蔥白一大握水三升煎取一升去滓頓服又方主胎動腰痛搶心或下血取蔥白不限多少濃煮汁飲之三洞要錄神仙消金玉漿法蔥者菜之伯雖臭而有用消金玉錫石也又以冬至日取葫蘆盛蔥汁根莖埋於庭中到夏至發之盡為水以漬金玉銀青石各三分自消矣曝令乾如飴可休糧久服神仙亦曰金漿也衍義曰蔥實蔥初生名蔥針至夏則有花於秋月植作高溝壠旋壅起以備冬用曰冬蔥其實一也又有龍角蔥每莖上出歧如角皮赤者名樓蔥可煎湯渫下部子皆辛色黑有皺紋作三瓣此物大抵以發散為功多食昏人神韭味辛微酸溫無毒歸心安五臟除胃中熱利病人可久食子主夢泄精溺白根主養髮陶隱居云韭子入棘刺諸丸主漏精用根入生髮膏用葉以煮鯽魚鮓斷卒下痢多驗但此菜殊辛臭雖煮食之便出猶奇熏灼不如蔥薤熟即無氣最是養性所忌也今按陳藏器本草云韭溫中下氣補虛調和臟腑令人能食益陽止泄白膿腹冷痛並煮食之葉及根生搗絞汁服解藥毒療狂狗咬人慾發者亦殺諸蛇虺蠍惡蟲毒取根搗和醬汁灌馬鼻蟲顙又搗根汁多服主胸痹骨痛不可觸者俗云韭葉是草鍾乳言其宜人信然也臣禹錫等謹按爾雅云蒮山韭釋曰說文云菜名一種而久者故謂之韭山中生者名蒮韓詩云六月食鬱及蒮是也孟詵云熱病後十日不可食熱韭食之即發睏又胸痹心中急痛如錐刺不得俯仰自汗出或痛徹背上不治或至死可取生韭或根五斤洗搗汁灌少許即吐胸中惡血蕭炳云韭子合龍骨服甚補中小兒初生與韭根汁灌之即吐出惡水令無病日華子云韭熱下氣補虛和腑臟益陽止泄精尿血暖腰膝除心主腹痼冷胸中痹冷痃癖氣及腹痛等食之肥白人中風失音研汁服心脾骨痛甚生研服蛇犬咬並惡瘡搗敷多食昏神暗目酒後尤忌不可與蜜同食又云子暖腰膝治鬼交甚效入藥炒用圖經曰韭舊不著所出州土今處處有之謹按許慎說文解字云菜名一種而久者故謂之韭故圃人種蒔一歲而三四割之其根不傷至冬壅培之先春而復生信乎一種而久者也在菜中此物最溫而益人宜常食之易稽覽圖云政道得則陰物變為陽鄭康成注云若蔥變為韭是也然則蔥冷而韭溫可驗矣又有一種山韭形性亦相類但根白葉如燈心苗爾雅所謂蒮羊六切山韭韓詩云六月食鬱及藿皆謂此也山中往往有之而人多不識耳韭子得桑螵蛸龍骨主漏精葛洪孫思邈皆有方崔元亮海上方治腰腳韭子一升揀擇蒸兩炊以來曝乾簸去黑皮炒令黃搗成粉安息香二大兩水煮一二百沸訖緩火炒令赤色二物相和搗為丸如干入蜜亦得每日空腹以酒下二十丸以來訖以飯三五匙壓之大佳根亦入藥用陳藏器注云取子生吞三十粒空心鹽湯下止夢泄精及溺白大效食療亦可作菹空心食之甚驗此物炸熟以鹽醋空心吃一碟可十頓以上甚治胸膈嚥氣利胸膈甚驗初生孩子可搗根汁灌之即吐出胸中惡血永無諸病五月勿食韭若值時饉之年可與米同功種之一畝可供十口食聖惠方治虛勞腎損夢中泄精用韭子二兩微炒為散食前酒下二錢匕外臺秘要治虛勞尿精新韭子二升十月霜後採好酒八合漬一宿明旦日色好童子向南搗一萬杵平旦溫酒服方寸匕日再服立瘥佳千金方治百蟲入耳搗韭汁灌耳中即瘥又方治喉腫不下食以韭一把搗熬敷之冷即易之肘後方臥忽不寤勿以火照之殺人但痛齧拇指甲際而唾其面則活取韭搗汁吹鼻孔冬月用韭根取汁灌於口中又方卒上氣鳴息便欲絕搗韭絞汁飲一升愈又方男女夢與人交精便泄出此內虛邪氣感發熬韭子搗末酒漬稍稍服經驗方治五般瘡癬以韭根炒存性旋搗末以豬脂油調敷之三度瘥食醫心鏡止水穀痢作羹粥炸炒任食之又云韭能充肝氣又云正月之節食五辛以闢厲氣蒜蔥韭薤姜又方卒中惡搗韭汁灌鼻中斗門方治漆咬用韭葉研敷之食醫心鏡同子母秘錄治小兒患黃搗韭根汁滴兒鼻中如大豆許又方治小兒腹脹韭根搗汁和豬脂煎服一合又方卒刺手水腫搗韭及藍置上以火灸熱徹即瘥黃帝云霜韭凍不可生食動宿飲令人必吐水出五月勿食損人滋味令人乏氣力秦運副云有人消渴引飲無度或令食韭黃其渴遂止法要日吃三五兩或炒或作羹無入鹽極效但吃得十斤即佳過清明勿吃入醬無妨衍義曰韭春食則香夏食則臭多食則昏神子止精滑甚良未出糞土為韭黃最不益人食之滯氣蓋含噎郁未之氣故如是孔子曰不時不食正為此輩花食之動風薤味辛苦溫無毒主金瘡瘡敗輕身不飢耐老歸於骨菜芝也除寒熱去水氣溫中散結利病人諸瘡中風寒水腫以塗之生魯山平澤陶隱居云蔥薤異物而今共條本經既無韭以其同類故也今亦取為副品種數方家多用蔥白及葉中涕名蔥苒音冉無復用實者蔥亦有寒熱白冷青熱傷寒湯不得令有青也能消桂為水亦化五石仙方所用薤又溫補仙方及服食家皆須之偏入諸膏用不可生啖葷辛為忌唐本注云薤乃是韭類葉不似蔥今云同類不識所以然薤有赤白二種白者補而美赤者主金瘡及風苦而無味今別顯條於此也今按陳藏器本草云薤調中主久痢不瘥腹內常惡者但多煮食之赤痢取薤致黃柏煮服之瘥臣禹錫等謹按蜀本圖經云形似韭而無實山薤一名葝莖葉相似體性亦同葉皆冬枯春秋分蒔爾雅云葝山葝釋曰說文云䪥菜也生山中者名葝又云䪥鴻薈釋曰䪥一名鴻薈孟詵云薤療諸瘡中風水腫生搗熱塗上或煮之白色者最好雖有辛不葷五臟學道人長服之可通神安魂魄益氣續筋力日華子云輕身耐寒調中補不足食之能止久痢冷瀉肥健人生食引涕唾不可與牛肉同食令人作癥瘕四月不可食也圖經曰薤生魯山平澤今處處有之似韭而葉闊多白無實人家種者有赤白二種赤者療瘡生肌白者冷補皆春分蒔之至冬而葉枯爾雅云䪥與薤同鴻薈烏外切又云葝目盈切山䪥山䪥莖葉亦與家薤相類而根長葉差大僅若鹿蔥體性亦與家薤同然今少用薤雖辛而不葷五臟故道家長餌之兼補虛最宜人凡用蔥薤皆去青留白云白冷而青熱也故斷赤下方取薤白同黃柏煮服之言其性冷而解毒也唐韋宙獨行方主霍亂乾嘔不息取薤一虎口以水三升煮取半頓服不遇三作即已又卒得胸痛瘥而復發者取薤根五斤搗絞汁飲之立止食療輕身耐老療金瘡生肌肉生搗薤白以火封之更以火就灸令熱氣徹瘡中干則易之白色者最好雖有辛氣不葷人五臟又發熱病不宜多食三月勿食生者又治寒熱去水氣溫中散結氣可作羹又治女人赤白帶下學道人長服之可通神安魂魄益氣續筋力骨鯁在咽不去者食之即下肘後方救死或先病或常居寢臥奄忽而絕皆是中惡以薤汁鼻中灌又方手指赤隨月生死以生薤一把苦酒中煮沸熟出以敷之即愈葛氏方治疥瘡煮薤葉洗亦佳搗如泥敷之亦得又方諸魚骨鯁小嚼薤白令柔以繩系中吞薤到鯁處引之鯁即隨出又方誤吞釵取薤白曝令萎黃煮使熟勿切食一大束釵即隨出又方若已中水及惡露風寒腫痛杵薤以敷上炙熱拓瘡上便愈又方虎犬咬人杵汁敷又飲一升日三瘥又方食鬱肉脯此並有毒杵汁服二三升梅師方有傷手足而犯惡露殺人不可治以薤白爛搗以帛囊之著煻火使薤白極熱去帛以薤敷瘡以帛急裹之冷即易亦可搗作餅子以艾灸之使熱氣入瘡中水下瘥又方灸瘡腫痛薤白切一升豬脂一升細切以苦酒浸經宿微火煎三上三下去滓敷上食醫心鏡主赤白痢下薤白一握切煮作粥食之又方治諸瘡敗能生肌輕身不飢耐老宜心歸骨菜芝也除寒熱去氣溫中散結氣利病人諸瘡中風寒水腫生杵敷之鯁骨在咽煮食佳作羹粥食之炸作齏菹炒食並得黃帝云薤不可共牛肉食之成瘕疾冬月勿食生薤多涕唾範汪治目中風腫痛取薤白截仍以膚上令遍膜皆瘥頭卒痛者止之又方產後諸痢宜煮薤白食之唯多益好用肥羊肉去脂作灸食之或以羊腎脂炒薤白食尤佳楊氏產乳療疳痢薤白二握生搗如泥以粳米粉二物蜜調相和捏作餅炙取熟與吃不過三兩服衍義曰薤葉如金燈葉差狹而更光故古人言薤露者以其光滑難佇之義千金治肺氣喘急用薤白亦取其滑泄也與蜜同搗塗湯火傷其效甚速菾音甜菜味甘苦大寒主時行壯熱解風熱毒陶隱居云即今以作鮓蒸者菾作甜音亦作時忝時行熱病初得便搗汁皆飲得除瘥唐本注云此菜似升麻苗南人蒸缹音缶食之大香美今按別本注云夏月以其菜研作粥解熱又止熱毒痢搗敷灸瘡止痛易瘥又按陳藏器本草云菾菜搗絞汁服之主冷熱痢又止血生肌人及禽獸有傷折敷之立愈又收取子以醋浸之揩面令潤澤有光臣禹錫等謹按蜀本圖經云高三四尺莖若蒴藋有細稜夏盛冬枯孟詵云菾菜又搗汁與時疾人服瘥子煮半生搗取汁含治小兒熱陳士良云菾菜葉似紫菊而大花白食之宜婦人日華子云甜菜冷無毒炙作熟水飲開胃通心膈假蘇味辛溫無毒主寒熱鼠瘻瘰癧生瘡破結聚氣下瘀血除濕痹一名鼠蓂一名姜芥生漢中川澤陶隱居云方藥亦不復用唐本注云此藥即菜中荊芥是也薑荊聲訛耳先居草部中今人食之錄在菜部也今按陳藏器本草云荊芥去邪除勞渴出汗除冷風煮汁服之搗和醋敷疔腫臣禹錫等謹按蜀本注引吳氏本草云名荊芥葉似落藜而細蜀中生啖之藥性論云荊芥可單用治惡風賊風口面喎邪遍身𤸷痹心虛忘事益力添精主辟邪毒氣除勞久食動渴疾治疔腫取一握切以水五升煮取二升冷分二服主通利血脈傳送五臟不足氣能發汗除冷風又搗末和醋封毒腫孟詵云荊芥多食燻人五臟神陳士良云荊芥主血勞風氣壅滿背脊疼痛虛汗理丈夫腳氣筋骨煩疼及陰陽毒傷寒頭痛頭旋目眩手足筋急本草呼為假蘇假蘇又別按假蘇葉銳圓多野生以香氣似蘇故呼為蘇日華子云荊芥利五臟消食下氣醒酒作菜生熟食並煎茶治頭風並出汗豉汁煎治暴傷寒圖經曰假蘇荊芥也生漢中川澤今處處有之葉似落藜而細初生香辛可啖人取作生菜古方稀用近世醫家治頭風虛勞瘡疥婦人血風等為要藥並取花實成穗者曝乾入藥亦多單用效甚速又以一物治產後血暈築心眼倒風縮欲死者取干荊芥穗搗篩每用末二錢匕童子小便一酒盞調熱服立效口噤者挑齒閉者灌鼻中皆效近世名醫用之無不如神云醫官陳巽處江左人謂假蘇荊芥實兩物假蘇葉銳圓多野生以香氣似蘇故名之假蘇葉銳圓多野生以香氣似蘇故名之蘇恭以本經一名姜芥薑荊聲近便為荊芥非也又以胡荊芥俗呼新羅荊芥石荊芥體性相近入藥亦同陳藏器一名姜芥即今之荊芥是也薑荊語訛耳按張鼎食療云荊芥一名析蓂本經既有荊芥又有析蓂如此二種定非一物析蓂是大薺大薺是葶藶子陶蘇大誤與假蘇又不同張鼎亦誤爾荊芥本功外去邪除勞渴主疔腫出汗除風冷煮汁服之杵和酢敷疔腫新注云產後中風身強直取末酒和服瘥食療性溫辟邪氣除勞傳送五臟不足氣助脾胃多食熏五臟神通利血脈發汗動渴疾又杵為末醋和封風毒腫上患疔腫荊芥一把水五升煮取二升冷分二服經驗方產後中風眼反折四肢搐搦下藥可立待應效如聖散荊芥穗子為末酒服二錢必效集驗方同經驗後方治一切風口眼偏斜青荊芥一斤青薄荷一斤一處砂盆內研生絹絞汁於瓷器內看厚薄煎成膏余滓三分去一分漉滓不用將二分滓曬乾為末以膏和為丸如梧桐子大每服二十丸早至暮可三服忌動風物孫真人荊芥動渴疾衍義曰假蘇荊芥也只用穗治產後血暈及中風目帶上四膚強直為末二三錢童子小便一小盞調下咽良久即活甚有驗又治頭目風荊芥穗細辛川芎等為末飯後湯點二錢風搔遍身濃煎湯淋渫或坐湯中白蘘荷微溫主中蠱及瘧陶隱居云今人乃呼赤者為蘘荷白者為覆菹葉同一種爾於人食之赤者為勝藥用白者中蠱者服其汁並臥其葉即呼蠱主姓名亦主諸溪毒沙蝨輩多食損藥勢又不利腳人家種白蘘荷亦云闢蛇唐本注云根主諸惡瘡殺蠱毒根心主稻麥芒入目中不出者以汁注目中即出臣禹錫等謹按蜀本圖經云葉似初生甘蕉根似姜牙其葉冬枯藥性論云白蘘荷亦可單用味辛有小毒圖經曰白蘘荷舊不著所出州土今荊蘘江湖間多種之北地亦有春初生葉似甘蕉根似姜而肥其根莖堪為菹其性好陰在木下生者尤美潘岳閒居賦云蘘荷依陰時藿向陽是也宗懍荊楚歲時記曰仲冬以鹽藏蘘荷以備冬儲又以防蠱史游急就篇云蘘荷冬日藏其來遠矣干寶搜神記云其外姊夫蔣士先得疾下血言中蠱家人密以蘘荷置其席下忽大笑曰蠱我者張小也乃收小小走自此解蠱藥多用之周記庶氏以嘉草除蠱毒宗懍以謂嘉草即蘘荷是也陳藏器云蘘荷茜根為主蠱之最然有赤白二種白者入藥昔人呼為覆菹赤者堪啖及作梅果多用之古方亦乾末水服主喉痹雷公云凡使勿用革牛草真相似其革牛草腥澀凡使白蘘荷以銅刀刮上粗皮一重了細切入砂盆中研如膏只收取自然汁煉作煎卻於新盆器中攤令冷如干膠煎刮取研用聖惠方治風冷失聲咽喉不利以蘘荷根二兩研絞取汁酒一大盞相和令勻不計時候溫服半錢肘後方同外臺秘要喉中及口舌生瘡爛酒漬蘘荷根半日含漱其汁瘥肘後方治傷寒時氣溫病頭痛壯熱脈盛可取生蘘荷根葉合搗絞汁服三四升已又方治卒吐血亦治蠱毒及痔血婦人患腰痛向東者蘘荷根一把搗絞汁三升服之經驗方治月信滯蘘荷根細切煎取二升空心酒調服梅師方治卒中蠱毒下血如雞肝晝夜不絕臟腑敗壞待死葉密安病人席下亦自說之勿令病人知覺令病者自呼蠱姓名又方治喉中似物吞吐不出腹脹羸瘦取白蘘荷根絞汁服蟲立出荊楚歲時記蔣士先得疾下血言蠱密以根布席下忽自笑曰蠱食我者張小也乃收小小走衍義曰白蘘荷八九月間淹貯之以備冬月作蔬果治療只用白者蘇味辛溫主下氣除寒中其子尤良陶隱居云葉下紫色而氣甚香其無紫色不香似荏者名野蘇不堪用其子主下氣與桔皮相宜同療今注今俗呼為紫蘇臣禹錫等謹按爾雅云蘇桂荏釋曰蘇荏類之草也以其味辛類荏故一名桂荏也藥性論云紫蘇子無毒主上氣咳逆治冷氣及腰腳中濕風結氣將子研汁煮粥良長服令人肥白身香和高良薑桔皮等分蜜丸空心下十丸下一切宿冷氣及腳濕風葉可生食與一切魚肉作羹良孟詵云紫蘇除寒熱治冷氣日華子云紫蘇補中益氣治心腹脹滿止霍亂轉筋開胃下食並一切冷氣止腳氣通大小腸子主調中益五臟下氣止霍亂嘔吐反胃補虛勞肥健人利大小便破癥結消五膈止嗽潤心肺消痰氣圖經曰蘇紫蘇也舊不著所出州土今處處有之葉下紫色而氣甚香夏採莖葉秋採實其莖並葉通心經益脾胃煮飲尤勝與桔皮相宜氣方中多用之實主上氣咳逆研汁煮粥尤佳長食之令人肥健若欲宣通風毒則單用莖去節大良謹按爾雅謂蘇為桂荏蓋以其味辛而形類荏乃名之然而蘇有數種有水蘇白蘇魚蘇山魚蘇皆是荏類水蘇別條見下白蘇方莖圓葉不紫亦甚香實亦入藥魚蘇似茵陳大葉而香吳人以煮魚者一名魚𦺗生山石間者名山魚蘇主休息痢大小溲頻數乾末米飲調服之效又蘇主雞瘕本經不著南齊褚澄善醫為吳都太守百姓李道念以公事到郡澄見謂曰汝有重病答曰舊有冷病至今五年眾醫不瘥澄為診曰汝病非冷非熱當是食白瀹雞子過多所致令取蘇一升煮服仍吐一物如升涎裹之能動開看是雞雛羽翅爪距具足能行走澄曰此未盡更服所餘藥又吐得如曏者雞十三頭而病都瘥當時稱妙一說乃是用蒜煮服之雷公云凡使勿用薄荷根莖真似紫蘇莖但葉不同薄荷莖性燥紫蘇莖和凡使刀刮上青薄皮銼用也聖惠方治風順氣利腸以紫蘇子一升微炒杵以生絹袋盛納於三鬥清酒中浸三宿少少飲之又方治腳氣及風寒濕痹四肢攣急腳踵不可踐地用紫蘇二兩杵碎水二升研取汁以蘇子汁煮粳米二合作粥和蔥豉椒姜食之外臺秘要治夢失精以子一升熬杵為末酒服方寸匕日再服斗門方治失血紫蘇不限多少於大鍋納水煎令乾後去滓熬膏以赤豆炒熟杵為末調煎為丸如梧子大酒下三十丸至五十丸常服瘥金匱方治食蟹中毒紫蘇煮汁飲之三升以子汁飲之亦治凡蟹未經霜者多毒丹房鏡源紫蘇油柔朱金潤八石衍義曰蘇此紫蘇也背面皆紫者佳其味微辛甘能散其氣香令人朝暮湯其汁飲為無益醫家以謂芳草致豪貴之疾者此有一焉脾胃寒人飲之多泄滑往往人不覺子治肺氣喘急水蘇味辛微溫無毒主下氣殺穀除飲食闢口臭去毒辟惡氣久服通神明輕身耐老主吐血衄血血崩一名雞蘇一名勞祖一名芥蒩音祖一名芥苴七餘切生九真池澤七月採陶隱居云方藥不用俗中莫識九真遼遠亦無能訪之唐本注云此蘇生下濕水側苗似旋覆兩葉相當大香馥青齊河間人名為水蘇江左名為薺薴吳會謂之雞蘇主吐血衄血下氣消穀大效而陶更於菜部出雞蘇誤矣今以雞蘇之一名復申吐血衄血血崩六字也臣禹錫等謹按蜀本圖經云葉似白薇兩葉相當花生節間紫白色味辛而香六月採莖葉曬乾陳藏器云薺薴葉上有毛稍長氣臭除蟻瘻挪碎敷之亦主冷氣泄痢可為生菜除胃間酸水孟詵云雞蘇一名水蘇熟搗生葉綿裹塞耳療聾又頭風目眩者以清酒煮汁一升服產後中風服之彌佳可燒作灰汁及以煮汁洗頭令髮香白屑不生又收訖釀酒及漬酒常服之佳日華子云雞蘇暖治肺痿崩中帶下血痢頭風目眩產後中風及血不止又名臭蘇青白蘇圖經曰水蘇生九真池澤今處處有之多生水岸旁苗似旋覆兩葉相當大香馥青濟間呼為水蘇江左名為薺薴吳會謂之雞蘇南人多以作菜主諸氣疾及腳腫江北甚多而人不取食又江左人謂雞蘇水蘇是兩種陳藏器謂薺薴自是一物非水蘇水蘇葉有雁齒香薷氣辛薺薴葉上有毛稍長氣臭主冷氣泄痢可為生菜除胃間酸水亦可搗敷蟻瘻亦有石上生者名石薺薴紫花細葉高一二尺味辛溫無毒主風血冷氣並瘡疥痔漏下血並煮汁服山中人多用之梅師方治吐血及下血並婦人漏下雞蘇莖葉煎取汁飲之又方治鼻衄血不止生雞蘇五合香豉二合合杵研槎如棗核大納鼻中止又方卒漏血欲死煮一升服之衍義曰水蘇氣味與紫蘇不同辛而不和然一如蘇但面不紫及周圍槎牙如雁齒香少香薷音柔味辛微溫主霍亂腹痛吐下散水腫陶隱居云家家有此唯供生食十月中取干之霍亂煮飲無不瘥作煎除水腫尤良臣禹錫等謹按蕭炳云今新定新安有石上者彼人名石香葇細而辛更絕佳孟詵云香葇溫又云香戎去熱風生菜中食不可多食卒轉筋可煮汁頓服半升止又乾末止鼻衄以水服之日華子云無毒下氣除煩熱療嘔逆冷氣圖經曰香薷音柔舊不著所出州土陶隱居云家家有之今所在皆種但北土差少似白蘇而葉更細十月中採干之一作香葇俗呼香茸霍亂轉筋煮飲服之無不瘥者若四肢煩冷汗出而渴者加蓼子同切煮飲胡洽治水病洪腫香葇煎取干香葇五十斤一物銼納釜中以水淹之水出香葇上一寸煮使氣力都盡清澄之嚴火煎令可丸一服五丸如梧子日漸增之以小便利好壽春及新安有彼間又有一種石上生者莖葉更細而辛香彌甚用之尤佳彼人謂之石香薷本經出草部中品云生蜀郡陵榮資簡州及南中諸山岩石縫中生二月八月採苗莖花實俱亦主調中溫胃霍亂吐瀉今人罕用之故但附於此雷公云凡採得去根留葉細銼曝乾勿令犯火服至十兩一生不得食白山桃也外臺秘要治水病洪腫氣脹不消食干香薷五十斤焙用濕者亦得細銼納釜中水浸之出香薷上數寸煮使氣盡去滓清澄之漸微火煎令可丸服五丸如梧子大日三稍加之以小便利為度千金方治口臭香薷一把以水一斗煮取三升稍稍含之肘後方舌上忽出血如鑽孔者香薷汁服一升日三食醫心鏡主心煩去熱取煎湯作羹煮粥及生食並得子母秘錄小兒白禿髮不生汁出濿痛濃煮陳香薷汁少許脂和胡粉敷上衍義曰香薷生山野荊湖南北二川皆有兩京作圃種暑月亦作蔬菜治霍亂不可缺也用之無不效葉如茵陳花茸紫在一邊成穗凡四五十房為一穗如荊芥穗別是一種香余如經薄荷味辛苦溫無毒主賊風傷寒發汗惡氣心腹脹滿霍亂宿食不消下氣煮汁服亦堪生食人家種之飲汁發汗大解勞乏唐本注云莖葉似荏而尖長根莖冬不死又有蔓生者功用相似唐本先附臣禹錫等謹按藥性論云薄荷使能去憤氣發毒汗破血止痢通利關節尤與薤作菹相宜新病瘥人勿食令人虛汗不止陳士良云胡菝𦽅能引諸藥入營衛療陰陽毒傷寒頭痛四季宜食又云胡菝𦽅主風氣壅並攻胸膈作茶服之立效俗呼為新羅菝𦽅日華子云治中風失音吐痰除賊風療心腹脹下氣消宿食及頭風等圖經曰薄荷舊不著所出州土而今處處皆有之莖葉似荏而尖長經冬根不死夏秋採莖葉曝乾古方稀用或與薤作齏食近世醫家治傷風頭腦風通關格及小兒風涎為要切之藥故人家園庭間多蒔之又有胡薄荷與此相類但味少甘為別生江浙間彼人多以作茶飲之俗呼新羅薄荷近京僧寺亦或植一二本者天寶方名錢草者是石薄荷生江南山石上葉微小至冬而紫色此一種不聞有別功用凡新大病瘥人不可食薄荷以其能發汗恐虛人耳字書菝𦽅食療平解勞與薤相宜發汗通利關節杵汁服去心臟風熱外臺秘要治蜂螫挪貼之瘥經驗方治水入耳以汁點立效食醫心鏡煎豉湯暖酒和飲煎茶生食之並宜衍義曰薄荷世謂之南薄荷為有一種龍腦薄荷故言南以別之小兒驚風壯熱須此引藥貓食之即醉物相感爾治骨蒸熱勞用其汁與眾藥熬為膏秦荻梨葉辛溫無毒主心腹冷脹下氣消食人所啖者生下濕地所在有之唐本先附臣禹錫等謹按孟詵云秦荻梨於生菜中最香美甚破氣又末之和酒服療卒心痛悒悒塞滿氣又子末和大醋封腫氣日三易陳藏器云五辛菜味辛溫歲朝食之助發五臟氣常食溫中去惡氣消食下氣荊楚歲時記亦作此說熱病後不可食之損目食醫心鏡秦荻梨取和醬醋食之理心腹冷脹下氣消食空腹食之最佳醍醐菜雷公云凡使勿用諸件草形似牛皮蔓掐之有乳汁出香甜入頂採得用苦竹刀細切入砂盆中研如膏用生稀絹裹挪取汁出暖飲千金方治傷中崩絕赤醍醐杵汁拌酒煎沸空心服一盞又方治月水不利以菜絞汁和酒煎服一盞
