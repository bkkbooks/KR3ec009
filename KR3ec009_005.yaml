body:
  text: 卷第五己酉新增衍義伏龍肝味辛微溫主婦人崩中吐下血止咳逆止血消癰腫毒氣陶隱居云此灶中對釜月下黃土也取搗篩合葫塗癰甚效以灶有神故號為伏龍肝並以迂隱其名爾今人又用廣州鹽城屑以療漏血瘀血亦是近耳之土兼得火燒之義也臣禹錫等謹按藥性論云伏龍肝單用亦可味鹹無毒末與醋調塗癰腫蕭炳云釜月中墨一名釜臍上墨陳藏器云灶中土及四交道土合末以飲兒闢夜啼日華子云伏龍肝熱微毒治鼻洪腸風帶下血崩泄精尿血催生下胞及小兒夜啼圖經文具石灰條下雷公云凡使勿誤用灶下土其伏龍肝是十年以來灶額內火氣積自結如赤色石中黃其形貌八稜取得後細研以滑石水飛遇兩遍令乾用熟絹裹卻取子時安於舊額內一伏時重研了用聖惠方治小兒臍瘡久不瘥用伏龍肝敷之外臺祕要救急治心痛冷熱伏龍肝末煮水服方寸匕若冷以酒服又方治癰腫伏龍肝以蒜和作泥塗用布上貼之如干則再易千金方治風痱者卒不能語口噤手足不遂而強直方伏龍肝五升以水八升和攪取汁飲之能盡為善又方治諸腋臭伏龍肝燒作泥敷之立瘥又方治鬼魘不悟取伏龍肝末鼻中又方治中風心煩恍惚或腹中痛滿或時絶而復蘇者取釜下土五升搗末以冷水八升和之取汁盡服之口已噤者強開以筒灌之使得下入便愈甚效又方發背欲死方伏龍肝末以酒調厚敷其上瘡口乾即易不日平復又方小兒卒重舌釜下土苦酒和塗舌下又方灸瘡痛腫急痛灶中黃土水煮令熱淋泄之即良千金翼治狂癲不識人以水服伏龍肝方寸匕日進三肘後方治諸疽發背及乳房釜下土搗取末雞子中黃和塗之佳簡要濟衆治小兒丹毒從臍中起方伏龍肝是年深灶下黃土研為末以屋漏水和如糊敷患處干即再敷以瘥為度用新汲水調亦得廣利方治吐血鼻衄不止伏龍肝半升以新汲水一大升淘取汁和蜜頓服傷寒類要妊娠熟病方以水調伏龍肝一雞子許服之又方妊娠遭時疫熱病令子不墮灶下土水和塗臍干又塗之以酒調亦妙十全博救方治子死腹中其母氣欲絶不出方伏龍肝三錢匕以水調下其土當兒頭上戴出甚妙子母祕録小兒赤遊行於身上下至心即死伏龍肝末和雞子白塗干即易又方小兒尿灰瘡伏龍肝和雞子白塗之産寶治胞衣不出取灶下土一寸研碎用好醋調令相得納於臍中續取甘草湯三四合服之出賈相公進過牛經牛類血者取灶中黃土二兩酒一升煎候冷灌之立瘥楊氏産乳療患時行令胎不損伏龍肝末和水服塗臍方寸干即易丹房鏡源云伏龍肝或經十年者灶下掘深一尺下成片紫瓷者可用伏砂縮賀妙賀者錫也衍義曰伏龍肝婦人血露蠶砂一兩炒伏龍肝半兩阿膠一兩同為末溫酒調空肚服二三錢以知為度本條中有東壁土陳藏器云取其東壁土久干也今詳之南壁土亦向陽久干也何不取蓋東壁常先得曉日烘炙日者太陽真火故治瘟瘧或曰何不取午盛之時南壁土而取日初出東壁土者何也火生之時其氣壯故素問云少火之氣壯及其當午之時則壯火之氣衰故不取實用此義或曰何以知日者太陽真火以水精珠或心凹銅鑑向日射之以艾承接其光向聚處火出故知之石灰味辛溫主疽瘍疥瘙熱氣惡瘡癩疾死肌墮眉殺痔蟲去黑子息肉療髓骨疽一名惡灰一名希灰生中山川穀陶隱居云中山屬代郡今近山生石青白色作灶燒竟以水沃之即熱蒸而解末矣性至烈人以度酒飲之則腹痛下痢療金瘡亦甚良俗名石堊古方多以構冢用捍水而闢蟲故古冢中水洗諸瘡皆即瘥唐本注云別録及今人用療金瘡止血大效若五月五日采蘩蔞葛葉鹿活草槲葉芍藥地黃葉蒼耳葉青蒿葉合石灰搗為團如雞卵曝乾末以療瘡生肌大神驗今按別本注云燒青石為灰也有兩種風化水化風化為勝臣禹錫等謹按蜀本云有毒墮胎藥性論云石灰治瘑疥蝕惡肉不入湯服止金瘡血和雞子白敗船茹甚良日華子云味甘無毒生肌長肉止血並主白癜癧瘍瘢疵等療冷氣婦人粉刺痔瘻疽瘡癭贅疣子又治産後陰不能合濃煎汁熏洗解酒味酸令不壞治酒毒暖水藏倍勝爐灰又名煅石圖經曰石灰生中山川穀今所在近山處皆有之此燒青石為灰也又名石煅有兩種風化水化風化者取煅了石置風中自解此為有力水化者以水沃之則熱蒸而解力差劣古方多用合百草團末治金創殊勝今醫家或以臘月黃牛膽取汁搜和卻納膽中掛之當風百日研之更勝草葉者又敗船茹灰刮取用亦同又冬灰生方谷川澤浣衣黃灰燒諸蒿藜積聚煉作之今用灰多雜薪蒸乃不善唯桑薪灰純者入藥絶奇古方以諸灰雜石灰熬煎以點疣痣黑子等丹灶亦用之又煅鐵灶中灰主堅積古方二車丸用之灶中封釜月下黃土名伏龍肝灶額上墨名百草霜並主消化積滯今人下食藥中多用之鐺下墨梁上塵並主金創屋塵煤治齒齦腫出血東壁土主下部瘡脫肛皆醫家常用故並見此傷寒黑效丸用釜底墨灶突墨梁上塵三物同合諸藥蓋其功用亦相近矣雷公云凡使用醋浸一宿漉出待乾下火煅令腥穢氣出用瓶盛著密蓋放冷拭上灰令淨細研用聖惠方治螻蛄咬人用石灰醋和塗之又方治大腸久積虛冷每因大便脫肛挪不得入方炒石灰令熱故帛裹坐其上冷即易之外臺祕要元希聲侍郎治卒發疹祕驗方石灰隨多少和醋漿水調塗隨手即減千金方治眉發髭落石灰三升上以水拌令勻焰火炒令焦以絹袋貯使好酒一斗漬之密封冬十四日春秋七日取服一合常令酒氣相接服之百日即新髭發生不落又方治瘻瘡取古冢中石灰敷厚調塗之肘後方治産後陰道開不閉石灰一斗熬之以水二斗投灰中適寒溫入水中坐須臾更作又方治湯火灼瘡石灰細篩水和塗之干即易又方治金刃所傷急以石灰裹之既止痛又速愈無石灰灰亦可用瘡若深未宜速合者以滑石敷之經驗方治蚯蚓蟲咬其形如大風眉須皆落以石灰水浸身亦良梅師方治産後陰腫下脫腸出玉門不閉取石灰一斗熬令黃以水三斗投灰中放冷澄清取一斗三升暖洗又方治金瘡止血速瘥方炒石灰和雞子白和丸如彈子大炭火煅赤搗末以敷瘡上立瘥孫用和治誤吞金銀或錢在腹內不下方石灰一杏核大硫黃一皂子大同研為末酒調下不計時候服孫真人食忌治疥淋石灰汁洗之又方去靨子取石灰炭上熬令熱插糯米於灰上候米化即取米點之斗門方治刀斧傷用石灰上包定痛止血佳瘥又方治中風口面喎斜向右即於左邊塗之向左即於右邊塗之候才正如舊即須以水洗下大妙崔氏治血痢十年方石灰三升熬令黃以水一斗攪令清澄一服一升日三服抱朴子內篇古大墓中多石灰汁夏月行人有瘡者見墓中清水用自洗浴瘡自愈於是諸病者聞之悉住洗之傳有人飲之以中病新唐書李百藥傳百藥勸杜伏威朝京師既至歷陽中悔欲殺之飲以石灰酒因大利頓欲死既而宿病皆愈丹房鏡源云石灰伏硫黃去錫上暈制雄黃制硇砂可用之衍義曰石灰水調一盞如稠粥揀好糯米粒全者半置灰中半灰外經宿灰中米色變如水精若人手面上有黑黶子及紋刺先微微以針頭撥動置少許如水精者於其上經半日許黶汁自出剔去藥不用且不得著水三二日愈又取新硬石灰一合以醋炒調如泥於患偏風牽口喎邪人口唇上不患處一邊塗之立便牽正礜石味辛甘大熱生溫熟熱有毒主寒熱鼠瘻蝕瘡死肌風痹腹中堅癖邪氣除熱明目下氣除膈中熱止消渴益肝氣破積聚痼冷腹痛去鼻中息肉久服令人筋攣火煉百日服一刀圭不煉服則殺人及百獸一名青分石一名立制石一名固羊石一名白礜石一名太白石一名澤乳一名食鹽生漢中山谷及少室採無時得火良棘針為之使惡馬目毒公鶩屎虎掌細辛畏水陶隱居云今蜀漢亦有而好者出南康南野溪及彭城界中洛陽南塹常取少室生礜石納水中令水不冰如此則生亦大熱今以黃土泥包炭火燒之一日一夕則解碎可用療冷結為良丹方及黃白朮多用之此又湘東新寧及零陵皆有白礜石能柔金唐本注云此石能拒火久燒但解散不可奪其堅今市人乃取潔白細理石當之燒即為灰非也此藥攻擊積聚痼冷之病為良若以余物代之療病無效正為此也今漢川武當西遼阪名礜石谷此即是其真出處少室亦有粒細理不如漢中者也臣禹錫等謹按吳氏云白礜石一名鼠鄉神農岐伯辛有毒桐君有毒黃帝甘有毒季氏云或生魏興或生少室十二月採山海經云皋塗之山有白石焉名曰礜可以毒鼠郭注云今礜石殺鼠蠶食而肥也說文解字云礜毒石也博物志云鸛伏卵時取礜石周圍繞卵以助暖氣方術家取鸛巢中礜石為真也藥性論云礜石使鉛丹為之使味甘有小毒主除胸膈間積氣去冷濕風痹瘙癢皆積年者忌羊血蕭炳云不入湯圖經曰礜石生漢中山谷及少室令潞州亦有焉性大熱置水中令水不冰又堅而拒火燒之一日夕但解散而不奪其堅市人多取潔白石當之燒即為灰也此藥攻擊積聚痼冷之病為良用之須真者乃佳又有特生礜石生西域張華博物志云鸛伏卵取礜石周圍繞卵以助暖氣方術家用之取鸛巢中者為真即此特生礜石也然此以難得人多使漢中者外形紫赤內白如霜中央有臼形狀如齒其塊小於白礜石而肌粒大數倍乃如小豆許白礜石粒細才若粟米耳又有握雪礜石出徐州西宋里山入土丈餘生於爛土石間色白細軟如面色又下條蒼石生西城蘇恭云特生礜石一名蒼礜石而梁州特生亦有青者房陵漢川與白礜石同處亦有青色者多與特生同但不入方用而今醫家多隻用礜石即白礜石也形類相近如此尤宜詳擇之耳古方治寒冷積聚皆用礜石胡洽大露宿丸主寒冷百病方礜石煉乾薑桂心皂莢桔梗各三兩附子二兩六物搗篩蜜丸服如梧子五丸日三漸增以知為度又有胸奴露宿丸硫黃丸並主積聚及飲食不下心腹堅實皆用礜石近世乃少用者丹房鏡源云紅皮礜石能伏丹砂養汞衍義曰礜石並特生礜石博物志及陶隱居皆言此二石鸛取之以壅卵如此則是一物也隱居又言仙經不云特生則只是前白礜石今補注但隨文解義不見特生之意蓋二條只是一物但以特生不特生為異耳所謂特生者不附著他石為特耳今用者絶少唯兩字礜石入藥然極須慎用其毒至甚及至論鸛巢中者又卻從謬說鸛巢中皆無此石乃曰鸛常入水冷故取以壅卵如此則鸕鷀鵬鶩之類皆食於水亦自繁息生化復不用此二石其說往往取俗士之言未嘗究其實而窮其理也嘗官於順安軍親檢鸛巢率無石矧礜石焉得處處有之然治久積及久病胸腹冷有功直須慎用蓋其毒不可當砒霜味苦酸有毒主諸瘧風痰在胸膈可作吐藥不可久服能傷人飛煉砒黃而成造作別有法今附臣禹錫等謹按日華子云砒霜暖治婦人血氣衝心痛落胎又砒黃暖亦有毒畏緑豆冷水醋治瘧疾腎氣帶闢蚤蝨入藥以醋煮殺毒乃用圖經曰砒霜舊不著所出郡縣今近銅山處亦有之唯信州者佳其塊甚有大者色如鵝子黃明徹不雜此類本處自是難得之物每一兩大塊真者人競珍之市之不啻金價古服食方中亦或用之必得此類乃可入藥其市肆所蓄片如細屑亦夾土石入藥服之為害不淺誤中解之用冷水研緑豆漿飲之乃無也雷公云凡使用小瓷瓶子盛後入紫背天葵石龍芮二味三件便下火煅從巳至申便用甘草水浸從申至子出拭乾卻入瓶盛於火中煅別研三萬下用之聖惠方治卒中風昏憒若醉痰涎壅盛四肢不收方用砒霜如緑豆大研以新汲水調下少許用熟水投大吐即愈若未吐再服又方治惡刺方用砒霜細研和膠清塗之博濟方治小兒牙宣常有鮮血不止牙齦臭爛砒黃一錢麝香半錢同研細先用紙條子以生油塗之後摻藥末在上少用末剪作小片紙棋子大看大小用插在爛動處孫尚藥治痁疾信砒二兩別研如粉寒水石三兩別搗末上用一生鐵銚子先鋪石末一半後堆砒末在上又以石末蓋頭然後取厚盞蓋之周回醋糊紙條子密封約十重以炭火一斤以來安銚子在上候紙條子黑取出置冷地上候冷取開盞子淨刮取砒石末一處入乳鉢內細研以軟粟米飯和丸如梧子更別作小丸子一等以備小兒服以飛過辰砂為衣候乾入瓷合收每人服時於發日早臘茶清下一丸一日內不得食熱物合時先掃灑一淨室中合之不得令婦人貓犬雞鼠等見收得時亦如然若婦人患則男著在口中男子患亦然靈苑方治瘰癧用信州砒黃細研滴濃墨汁丸如梧桐子大於銚子內炒令乾後用竹筒子盛要用於所患處灸破或針將藥半丸敲碎貼之以自然蝕落為度覺藥盡時更貼少許青霞子寶藏論云砒霜若草伏住火煅色不變移熔成汁添得者點銅成銀若只質枯折者不堪用丹房鏡源云砒霜化銅干汞別說云謹按今信州玉山有砒井官中封禁甚嚴生不夾石者色赤甚如雄黃以冷水磨解熱毒治痰壅甚效近火即殺人圖經所謂不啻金價者此也若今市人通貨者即取山中夾砂石者燒煙飛作白霜乃碎屑而芒刺其傷火多者塊大而微黃則圖經所謂如鵝子色明徹者此也古方並不入藥唯見燒煉丹石家用近人多以治瘧然大意本以生者能解熱毒蓋瘧本傷暑故用今俗醫乃不究其理即以所燒霜用服之必吐下因此幸有安者遂為定法爾後所損極多不可不慎也初取飛燒霜時人在上風十餘丈外立下風所近草木皆死又多見以和飯毒鼠若貓犬食死鼠者亦死其毒過於射罔遠矣可不察之又衡山所出一種力差劣於信州者云衍義曰砒霜瘧家或用才過劑則吐瀉兼作須濃研緑豆汁仍兼冷水飲得石腦油即伏今信州鑿坑井下取之其坑常封鎖坑中有濁緑水先絞水盡然後下鑿取生砒謂之砒黃其色如牛肉或有淡白路謂石非石謂土非土磨研酒飲治癖積氣有功才見火更有毒不可造次服也取砒之法將生砒就置火上以器覆之令砒煙上飛著覆器遂凝結纍然下垂如乳尖長者為勝平短者次之圖經言大塊者其大塊者已是下等片如細屑者極下也入藥當用如乳尖長者直須詳謹鐺墨主蠱毒中惡血暈吐血以酒或水細研溫服之亦塗金瘡生肌止血瘡在面慎勿塗之黑入肉如印此鐺下墨是也今附臣禹錫等謹按蜀本云鐺墨無毒圖經文具石灰條下千金方臭氣鼻氣壅塞不通方水服釜墨末又方治舌卒腫如豬胞狀滿口不治須臾死以釜墨和酒塗舌下立瘥又方治心痛取鐺墨以熱小便調下二錢匕又方治逆生以手中指取釜下墨交畫兒足下頓生又方治中惡心痛欲絶用釜下墨半兩鹽一錢和研以熟水一盞調頓服肘後方治轉筋入腸中欲轉者釜底墨末和酒服之瘥經驗方治霍亂取鍋底墨煤少許只半錢以下又於灶額上取少許以百沸湯一盞投煤其中急攪數十下用碗蓋之汗出通口微呷一兩口吐瀉立止硇砂味鹹苦辛溫有毒不宜多服主積聚破結血爛胎止痛下氣療咳嗽宿冷去惡肉生好肌柔金銀可為焊藥出西戎形如牙硝光淨者良驢馬藥亦用今按陳藏器本草云硇砂主婦人丈夫羸瘦積病血氣不調腸鳴食飲不消腰腳疼冷痃癖痰飲喉中結氣反胃吐水令人能食肥健一飛為酸砂二飛為伏翼三飛為定精色如鵝兒黃和諸補藥為丸服之有暴熱飛煉有法亦能變鐵又按別本注云胡人謂為濃沙其性大熱今云溫恐有誤也唐本先附臣禹錫等謹按藥性論云硇砂有大毒畏漿水忌羊血味酸咸能銷五金八石腐壞人腸胃生食之化人心為血中者研生緑豆汁飲一二升解之道門中有伏煉法能除冷病大益陽事蕭炳云硇砂使生不宜多服光淨者良今生北庭為上日華子云北庭砂味辛酸暖無毒畏一切酸補水臟暖子宮消冷癖瘀血宿食不消氣塊痃癖及血崩帶下惡瘡息肉食肉飽脹夜多小便女人血氣心疼丈夫腰胯酸重四肢不任凡修制用黃丹石灰作匱煅赤使用並無毒世人自疑爛肉如人被刀刃所傷以北庭罯敷定當時生痂亦名狄鹽者圖經曰硇砂出西戎今西涼夏國及河東陝西近邊州郡亦有之然西戎來者顆塊光明大者有如拳重三五兩小者如指面入藥最緊邊界出者雜碎如麻豆粒又夾砂石用之須飛澄去土石訖亦無力彼人謂之氣砂此藥近出唐世而方書著古人單服一味伏火作丸子亦有兼硫黃馬牙硝輩合餌者不知方出何時殊非古法此本攻積聚之物熱而有毒多食腐壞人腸胃生用又能化人心為血固非平居可餌者而西土人用淹肉炙以當鹽食之無害蓋積習之久若魏武啖野葛不毒之義也又名北庭砂又名狄鹽本經云柔金銀可為焊藥今人作焊藥乃用硼砂硼砂出於南海性溫平今醫家治咽喉最為要切其狀甚光瑩亦有極大塊者諸方亦稀用陳藏器云有暴熱損發聖惠方治懸癰卒腫用硇砂半錢綿裹含咽津即瘥外臺祕要救急治魚骨哽在喉中以少許硇砂口中咀嚼咽之立下經驗方硇砂丸方硇砂不計多少用罐子內著硇砂上面更坐罐子一個用紙筋白土和上下俱埿了窨干後從辰初時便用蒼耳自在落下葉將來搗羅為末藥上鋪頭蓋底上面罐子內用水坐著水旋添火燒從罐子外五寸以來圍繞欲盡更添火移向前罐子周回火盡更旋燒促向前計一伏時為度更不移火卻閒雜人及婦人不得見一伏時住取來搗羅為末醋麵糊為丸如桐子大每服逐日十丸至十五丸溫酒或米飲下並無忌若燒吃三二斤進食無病陳巽治元臟虛冷氣攻臍腹疼痛硇砂一兩川烏頭生去皮臍杵為末取二兩硇砂生研用纖霞草末二兩與硇砂同研勻用一小砂罐子不固濟慢火燒通赤熱將拌了者硇砂入罐子內不蓋口加頂火一稱候火盡爐寒取出研與烏頭末同研勻湯浸蒸餅丸如桐子大每服三丸熱木香湯醋湯任下青霞子寶藏論硇砂若草伏住火不碎可轉製得諸石藥並引諸藥可治婦人久冷硇砂為五金賊也若石藥並灰霜伏得者不堪用也太清服煉靈砂法云北庭砂所稟陰石之氣性含陽毒之精功能消敗去穢益陽其功甚著丹房鏡源云硇砂性有大毒或沉冷之疾可服則愈久服有癰腫出北庭白黃者訣曰為五金賊能制合群藥藥中之使自制雄雌黃衍義曰硇砂金銀有僞投熔窩中其僞物盡消散矧人腹中有久積故可潰腐也合他藥治目中翳用之須水飛過入瓷器中於重湯中煮其器使自干殺其毒及去其塵穢鉛丹味辛微寒主吐逆胃反驚癇癲疾除熱下氣止小便利除毒熱臍攣金瘡溢血煉化還成九光久服通神明一名鉛華生於鉛生蜀郡平澤陶隱居云即今熬鉛所作黃丹也畫用者俗方亦稀用唯仙經塗丹釜所須云化成九光者當謂九光丹以為釜爾無別變煉法唐本注云丹白二粉俱炒錫作今經稱鉛丹陶云熬鉛俱誤矣今注此即今黃丹也與粉錫二物俱是化鉛為之按李含光音義云黃丹胡粉皆化鉛未聞用錫者故參同契云若胡粉投炭中色壞為鉛抱朴子內篇云愚人乃不信黃丹及胡粉是化鉛所作今唐注以三物俱炒錫大誤矣臣禹錫等謹按藥性論云鉛丹君主治驚悸狂走嘔逆消渴煎膏用止痛生肌蕭炳云臣不入湯日華子云黃丹涼無毒鎮心安神療反胃止吐血及嗽敷金瘡長肉及湯火瘡染鬚髮可煎膏圖經文具鉛錫條下外臺祕要集驗療逆産方真丹刀圭塗兒跖下肘後方客忤中惡之類多於道間門外得之令人心腹疼痛脹滿氣衝心胸不即治亦害人救之方真丹方寸匕蜜三合和服之口噤者折齒灌之又方治傷寒及時氣溫病頭痛壯熱脈盛真丹塗行身令遍向火坐令汗出又方蠍螫人黃丹醋調塗之經驗方碧霞丹治吐逆立效北來黃丹四兩篩過用好米醋半升同藥入銚內煎令乾卻用炭火三稱就銚內煅透紅冷取研細為末用粟米飯丸如桐子大煎酵湯下七丸不嚼只一服王氏博濟治風癇驅風散鉛丹二兩白礬二兩為末用磚一口以紙鋪磚上先以丹鋪紙上次以礬鋪丹上然後用紙捅卻將十斤柳木柴燒過為度取出細研每服一錢溫酒下劉氏治小兒瘧方黃丹兩錢匕以蜜水和與服冷即以酒和令服之良子母祕録治小兒重舌方黃丹如豆大內管中以安舌下治瘧百草霜黃丹等分細研每服二錢匕於發日空心米飲調服不過兩服愈衍義曰鉛丹本謂之黃丹化鉛而成別有法唐本注炒錫作然經稱鉛丹則炒錫之說誤矣亦不為難辨蓋錫則以黯暗鉛則明白以此為異治瘧及久積皆用鉛味甘無毒鎮心安神治傷寒毒氣反胃嘔噦蛇蜴所咬炙尉之新補見日華子圖經曰鉛生蜀郡平澤錫生桂陽山谷今有銀坑處皆有之而臨賀出錫尤盛亦謂之白錯鉛丹黃丹也粉錫胡粉也二物並是化鉛所作胡附於鉛鏡雖銅而皆用錫雜之乃能明白故鏡鼻附於錫謹按字書為錫為鑞鉛為青金雖相似而入用殊別也又有鉛霜亦出於鉛其法以鉛雜水銀十五分之一合煉作片置醋甕中密封經久成霜亦謂之鉛白霜性極冷人治風痰及嬰孺驚滯藥今醫家用之尤多凡鑄銅之物多和以錫考工記攻金之工金有六齊是也凡藥用銅弩牙古文錢之類皆以有錫故其用亦近之又鉛灰治瘰癧劉禹錫著其法云取鉛三兩鐵器中熬之久當有腳如黑灰和脂塗癧子上仍以舊帛貼之數數去帛拭惡汁又貼如此半月許亦不痛不破不作瘡但內消之為水瘥雖流過項亦瘥陳藏器云錫鉛及琅玕銅鏡鼻銅陶云琅玕殺錫毒按錫有黑有白黑錫寒小毒主癭瘤鬼氣疰忤錯為末和青木香敷風瘡腫惡毒本經雖有條皆以成丹及粉非專為鉛錫生文也錫為粉化鉛為丹本經云鉛丹錫粉是也蘇云鉛為丹錫為粉深誤經驗方治發背及諸般癰毒瘡黑鉛一斤甘草三兩微炙銼用酒一斗著空瓶在旁先以甘草置在酒瓶內然後熔鉛投在酒瓶中卻出酒在空瓶內取出鉛依前熔後投如此者九度並甘草去之只留酒令病者飲醉寢即愈勝金方烏髭鬢明目牢齒牙黑鉛半斤大鉛內熔成汁旋入桑條灰柳木攪令成沙上以熟絹羅為末每日早晨如常揩齒牙後用溫水漱在盂子內取用其水洗眼治諸般眼疾髭黃白者用之皆變黑也又方治金石藥毒用黑鉛一斤以坩堝中熔成汁投酒一升如此十數回候酒至半升去鉛頓服之瘥青霞子寶藏論云黑鉛草伏得成寶可點銅為銀並鑄作鼎養硃砂住得火養水銀住火斷粉霜住火太清服煉靈砂法錫鉛俱稟北方壬癸陰極之精也性濡滑服之而多陰毒傷人心胃丹房鏡源云鉛咸鉛者不出銀熟鉛是也嘉州隴阤利州出鉛精之葉深有變形之狀文曰紫背鉛鉛能碎金鋼砧草節鉛出嘉州打著碎如燒之有硫黃臭煙者信州鉛盧氏鉛此粗惡用時直須濾過陰平鉛出劍州是鐵之苗鉛黃花投汞中以文武火養自浮面上掠刮取炒作黃丹色釣腳鉛出雅州山洞溪砂中形如皂子又如蝌蚪子黑色炒鉛丹法鉛一斤土硫黃一兩硝石一兩上先熔鉛成汁下醋點之滾沸時下土硫黃一小塊並續更下硝石少許沸定再點醋依前下少許硝黃已硝沸盡黃亦盡炒為末成丹粉錫味辛寒無毒主伏尸毒螫殺三蟲去鱉瘕療惡瘡墮胎止小便利一名解錫陶隱居云即今化鉛所作胡粉也其有金色者療尸蟲彌良而謂之粉錫事與經乖唐本注云鉛丹胡粉實用錫造陶今言化鉛作之經云粉錫亦為誤矣今注按本經呼為粉錫然其實鉛粉也故英公序云鉛錫莫辨者蓋謂此也臣禹錫等謹按藥性論云胡粉使又名定粉味甘辛無毒能治積聚不消焦炒止小兒疳痢陳藏器云胡粉本功外主久痢成疳和水及雞子白服以糞黑為度為其殺蟲而止痢也日華子云光粉涼無毒治癰腫瘻爛嘔逆療癥瘕小兒疳氣圖經文具鉛條下外臺祕要誤吞錢並金銀物以胡粉一兩搗調之分再服食水銀金如泥吞金銀物在腹中服之令消洋出之千金方治瘡中水胡粉炭灰白等分脂和塗孔上水即止又方治諸腋臭胡粉三合以牛脂和煎令可丸塗之肘後方治篤病新起早勞食飲多致復欲死方水服胡粉少許傷寒類要同又方治卒從高落下瘀血搶心面青短氣欲死方胡粉一錢匕和水服之即瘥孫真人食忌治火燒瘡以胡粉羊髓和塗上封之食醫心鏡治小兒舌上瘡取胡粉末並豬𩩅骨中髓敷之日三度張文仲治乾溼癬等及陰下常濕且臭或作瘡但以胡粉一物粉之除即瘥止常用大驗肘後方同又方治寸白蟲熬胡粉令速燥平旦作肉臛以藥方寸匕納臛中服之有大效又方小兒疳瘡胡粉熬八分豬脂和塗之瘥為度油亦得子母祕録小兒夜啼胡粉服水調三豆大日三服又方小兒腹脹胡粉鹽熬色變以摩腹上兼治腹皮青若不理須臾死又方治小兒無辜痢赤白兼成疳胡粉熟蒸熬令色變以飲服之又方治小兒耳後月蝕瘡胡粉和土塗上丹房鏡源云胡粉可制硫黃亦可用外匱衍義曰粉錫胡粉也又名定粉止泄痢積聚及久痢東壁土主下部瘡脫肛陶隱居云此屋之東壁上土爾當取東壁之東邊謂常先見日光刮取用之亦療小兒風臍又可除油汙衣勝石灰滑石唐本注云此土摩干濕二癬極有效也臣禹錫等謹按藥性論云東壁土亦或單用性平刮末細篩點目中去翳又東壁土一蜆殼細末敷豌豆瘡及主溫瘧日華子云東壁土溫無毒陳藏器云好土味甘平無毒主泄痢冷熱赤白腹內熱毒絞結痛下血取入地乾土以水煮三五沸絞去滓適稀稠及暖服二升又解諸藥毒中肉毒合口椒毒野菌毒並解之取東壁土用之功亦小同止泄痢霍亂煩悶為要取其向陽壁久干也張司空云土三尺以上曰糞三尺以下曰土服之當去上惡物勿令入客水又食牛馬肉及肝中毒者先銼頭髮令寸長拌好土作溏泥二升合和飲之須臾發皆貫所食肝出牛馬獨肝者有大毒不可食漢武云文成食馬肝死又人卒患心痛畫地作五字以撮取中央土水和一升絞服之良也又云土消大寒無毒主傷寒時氣黃疸病煩熱湯淋取汁頓服之莊子云蛣蜣轉丸是也藏在土中掘地得之正圓如人捻作彌久者佳又云土檳榔主惡瘡諸蟲咬及瘰癧疥瘻等細研油塗之狀如檳榔於土穴中及階除間得之新者猶軟云蟾蜍屎也蟾食百蟲故特主惡瘡圖經文具石灰條下外臺祕要治肛門凸出故東壁土一升研皂莢三挺長一尺二寸壁土挹粉肛門其頭出處取皂莢炙暖更遞尉之瘥肘後方服藥過劑及中毒煩悶欲死刮東壁土以水一二升調飲之經驗方治背癰癤以多年煙燻壁土並黃柏二件等搗羅末用生薑汁拌成膏攤貼之更以茅香湯調下一錢匕服妙也子母祕録治小兒臍風瘡歷年不瘥方東壁土敷之衍義東壁土文具伏龍肝條下赤銅屑以醋和如麥飯袋盛先刺腋下脈去血封之攻腋臭神效又熬使極熱投酒中服五合日三主賊風反折又燒赤銅五斤內酒二斗中百遍服同煎主賊風其驗今按陳藏器本草云赤銅屑主折傷能焊人骨及六畜有損者取細研酒中溫服之直入骨損處六畜死後取骨視之猶有焊痕赤銅為佳熟銅不堪唐本先附臣禹錫等謹按日華子云銅屑味苦平微毒明目治風眼接骨焊齒療女人血氣及心痛又云銅器平治霍亂轉筋腎堂及臍下疰痛並衣被襯後貯火尉之外臺祕要治狐臭崔氏方先用清水淨洗又用清酢漿淨洗訖微揩使破取銅屑和酢熟揩又方赤銅屑以酢和銀器中炒極熱以布裹尉腋下冷復易瘥止甚驗太清服煉靈砂法云銅稟東方乙陰之氣結而成魄性利服之傷腎朝野僉載云定州人崔務墜馬折足醫者令取銅末和酒服之遂痊平及亡後十餘年改葬視其脛骨折處有銅束之丹房鏡源云武昌銅若作丹打之不裂拆錫銅鏡鼻臣禹錫等謹按月閉通用藥云錫銅鏡鼻平主女子血閉癥瘕伏腸絶孕及伏尸邪氣生桂陽山谷陶隱居云此物與胡粉異類而今共條當以其非只成一藥故以附見錫品中也古無純銅作鏡者皆用錫雜之別録用銅鏡鼻即是今破古銅鏡鼻爾用之當燒令赤內酒中飲之若置醯中出入百過亦可搗也鉛與錫本經云生桂陽今則乃出臨賀猶是分桂陽所置鉛與錫相似而入用大異唐本注云臨賀出者名鉛一名白鑞唯此一處資天下用其錫出銀處皆有之雖相似而入用大異也今按別本注云凡鑄鏡皆用錫和不爾即不明白故言錫銅鏡鼻今廣陵者為勝臣禹錫等謹按藥性論云銅鏡鼻微寒主治産後余疹刺痛三十六候取七枚投醋中熬過呷之亦可入當歸芍藥煎服之藥訣云鏡鼻味酸冷無毒日華子云古鑑平微毒闢一切邪魅女人鬼交飛尸蠱毒小兒驚癇百蟲入人耳鼻中將就彼敲其蟲即出又催生及治暴心痛並燒酒淬服之圖經文具鉛錫條下聖惠方治小兒卒中客忤用銅照子鼻燒令赤著少許酒中淬過少少與兒服之銅青平微毒治婦人血氣心痛合金瘡止血明目去膚赤息肉生銅皆有青青則銅之精華銅器上緑色是北庭罯者最佳治目時淘洗用新補見陳藏器日華子陳藏器云陶云青銅不入方用按青銅明目去膚赤合金瘡止血入水不爛令瘡青黑生熟銅皆有青即是銅之精華大者即空緑以次空青也銅青獨在銅器上緑色者是經驗方治痰涎潮盛卒中不語備急大效碧琳丹生碌二兩淨洗於乳鉢內研細以水化去石澄清同碌粉慢火熬令乾是取辰日辰時於辰位上修合再研勻入麝香一分同研以糯米糊和丸如彈子大陰乾如卒中者每丸作二服用薄荷酒研下癱緩一切風用硃砂酒研化下候吐涎出沫青碧色瀉下惡物又方治小兒緑雲丹不計分兩研細如粉用醋麵糊和丸如雞頭大每有中者才覺便用薄荷酒磨下一丸須臾便吐其涎如膠令人以手拔之候吐罷神效井底沙至冷主治湯火燒瘡用千金方蠍螫人以井底泥塗敷之溫則易之肘後方臥忽不寤勿以火照火照之殺人但痛齧其踵及足拇指甲際而多唾其面即活井底泥塗目畢令人垂頭於井中呼其姓名便起又方治妊娠得時疫病令胎不傷取井底泥敷心下代赭味苦甘寒無毒主鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣女子赤沃漏下帶下百病産難胞衣不出墮胎養血氣除五臟血脈中熱血痹血瘀大人小兒驚氣入腹及陰痿不起一名須丸出姑幕者名須丸出代郡者名代赭一名血師生齊國山谷赤紅青色如雞冠有澤染爪甲不渝者良採無時畏天雄陶隱居云舊說云是代郡城門下土江東久絶頃魏國所獻猶是彼間赤土爾非復真物此於俗用乃疏而為仙方之要並與戎鹽滷咸皆是急須唐本注云此石多從代州來雲山中採得非城門下土又言生齊地山谷今齊州亭山出赤石其色有赤紅青者其赤者亦如雞冠且潤澤土人唯採以丹楹柱而紫色且暗此物與代州出者相似古來用之今靈州鳴沙縣界河北平地掘深四五尺得者皮上赤滑中紫如雞肝大勝齊代所出者臣禹錫等謹按藥性論云代赭使雁門城土乾薑為使味甘平治女子崩中淋瀝不止療生子不落末溫服之闢鬼魅蕭炳云代赭臣日華子云代赭畏附子止吐血鼻衄腸風痔瘻月經不止小兒驚癇疳疾反胃止瀉痢脫精尿血遺溺金瘡長肉安胎健脾又治夜多小便圖經曰代赭生齊國山谷今河東京東山中亦有之以赤紅青色如雞冠有澤染爪甲不渝者良古方紫丸治小兒用代赭云無真者以左顧牡蠣代使乃知真者難得今醫家所用多擇取大塊其上文頭有如浮漚丁者為勝謂之丁頭代赭採無時次條又有白堊生邯鄲山谷即畫家所用者多而且賤一名白善土胡居士云始興小桂縣晉陽鄉有白善俗方稀用今處處皆有人家往往用以浣衣山海經西山經石䣀音跪之山其陰灌水出焉而北流於愚水其中有流赭以塗牛馬無病郭璞注云赭赤土也今人以朱塗牛角云以辟惡又云大次之山其陽多堊又北山經天池之山其中多黃堊又中山經蔥聾之山其中有大谷多白黑青黃堊注云言有雜色之堊也然則赭以西土者為貴堊有五色入藥唯白者耳雷公云凡使不計多少用蠟水細研盡重重飛過水面上有赤色如薄雲者去之然後用細茶腳湯煮之一伏時了取出又研一萬匝方入用淨鐵鐺一口著火得鐺熱底赤即下白蠟一兩於鐺底逡巡間便投新汲水沖之於中沸一二千度了如此放冷取出使之斗門方治小腸氣用血師一兩米醋一升以火燒血師通赤淬入醋中以淬竭為度搗羅如面用湯調下一大錢即瘥如神矣血師即代赭也御藥院治風疹疼癢不可忍赤土不計多少研碎空心溫酒調下一錢丹房鏡源云代赭出金色別說云謹按今處州歲貢數不啻萬斤其色亦丹鮮衍義曰代赭方士爐火中多用丁頭光澤堅實赤紫色者佳白堊即白善土京師謂之白土子方寸許切成段鬻於市人得以浣衣今人合王瓜等分為末湯點二錢服治頭痛赤土今公府用以飾椽柱者水調細末一二錢服以治風疹石燕以水煮汁飲之主淋有效婦人難産兩手各把一枚立驗出零陵唐本注云俗云因雷雨則從石穴中出隨雨飛墮者妄也永州祁陽縣西北百一十五里土岡上掘深丈餘取之形似蚶而小堅重如石也臣禹錫等謹按蜀本注云爾雅云螺小者蜬音含今按陳藏器本草云石燕主消渴取水牛鼻和煮飲之自死者鼻不如落崖死者良唐本先附臣禹錫等謹按蕭炳云別有乳洞中食乳有命者亦名石燕似蝙蝠口方生氣物也日華子云石燕涼無毒出南土穴中凝強似石者佳圖經曰石燕出零陵郡今永州祁陽縣江旁沙灘上有之形似蚶而小其實石也或云生山洞中因雷爾則飛出墮於沙上而化為石未審的否今人以催生令産婦兩手各握一枚須臾子則下採無時食療云在乳穴石洞中者冬月採之堪食余月採者只堪治病不堪食也又治法取石燕二七枚和五味炒令熟以酒一斗浸三日即每夜臥時飲一兩盞隨性也甚能補益能吃食令人健力也聖惠方治傷寒小腹脹滿小便不通用石燕搗羅為末不計時候蔥白湯調半錢得通為度簡要濟衆治淋疾石燕子七個搗如黍米粒大新桑根白皮三兩銼如豆粒同拌令勻分作七貼用水一盞煎一貼取七分去滓每服空心午前各一服靈苑方治久患腸風痔瘻一二十年不瘥面色虛黃飲食無味及患臟腑傷損多患泄瀉暑月常瀉不止及諸般淋瀝久患消渴婦人月候湛濁赤白帶下多年不瘥應是臟腑諸疾皆主之用石燕淨洗刷去泥土收之上每日空心取一枚于堅硬無油瓷器內以溫水磨服之如彈丸大者一個分三服大小以此為準晚食更一服若欲作散須先杵羅為末以磁石協去杵頭鐵屑後更入堅瓷鉢內以硬乳槌研細水飛過取白汁如泔乳者澄去水曝乾每服半錢至一錢清飯飲調下溫水亦得此方偏治久年腸風痔須常服勿令歇服至及一月諸疾皆愈衍義曰石燕今人用者如蜆蛤之狀色如土堅重則石也既無羽翼焉能自石穴中飛出何故只墮沙灘上此說近妄唐本注永州土岡上掘深丈餘取之形似蚶而小重如石則此自是一物余說不可取潰虛積藥中多用戎鹽味鹹寒無毒主明目目痛益氣堅肌骨去毒蠱心腹痛溺血吐血齒舌血出一名胡鹽生胡鹽山及西羌北地酒泉福祿城東南角北海青南海赤十月採陶隱居云今俗中不復見滷咸唯魏國所獻虜鹽即是河東大鹽形如結冰圓強味鹹苦夏月小潤液虜中鹽乃有九種白鹽食鹽常食者黑鹽主腹脹氣滿胡鹽主耳聾目痛柔鹽主馬脊瘡又有赤鹽駁鹽臭鹽馬齒鹽四種並不入食馬齒即大鹽黑鹽凝是滷咸柔鹽疑是戎鹽而此戎鹽又名胡鹽並主眼痛二三相亂今戎鹽虜中甚有從涼州來芮芮河南使及北部胡客從敦煌來亦得之自是稀少爾其形作塊片或如雞鴨卵或如菱米色紫白味不甚咸口嘗氣臭正如毈雞子臭者言真又河南鹽池泥中自有凝鹽如石片打破皆方青黑色善療馬脊瘡又凝世或是鹽雖多種而戎鹽滷咸最為要用又巴東朐䏰縣北岸大有鹽井鹽水自凝生粥子鹽方一二寸中央突張傘形亦有方如石膏博棋者李云戎鹽味苦臭是海潮水澆山石經久鹽凝著石取之北海者青南海者紫赤又云滷咸即是人煮鹽釜底凝強鹽滓如此二說並未詳唐本注云陶稱滷咸疑是黑鹽此是鹼土議如前說其戎鹽即胡鹽沙州名為禿登鹽廓州名為陰土鹽生河岸山阪之陰土石間塊大小不常堅白似石燒之不鳴灹爾臣禹錫等謹按陳藏器云鹽藥味鹹無毒主眼赤皆爛風赤細研水和點目中又入腹去熱煩痰滿頭痛明目鎮心水研服之又主蚖蛇惡蟲毒疥癬癰腫瘰癧以前入腹水消服之著瘡正爾摩敷生海西南雷羅諸州山谷似芒硝末細入口極冷南人多取敷瘡腫少有服者恐極冷入腹傷人且宜慎之日華子云戎鹽平助水臟益精氣除五臟癥結心腹積聚痛瘡疥癬等即西蕃所出食者號戎鹽又名羌鹽圖經文具食鹽條下陳藏器云戎鹽纍卵丹房鏡源云戎鹽赤黑二色纍卵干汞制丹砂衍義曰戎鹽成垛裁之如枕細白味甘咸亦功在卻血入腎治目中瘀赤澀昏大鹽味甘咸寒無毒主腸胃結熱喘逆胸中病令人吐生邯鄲及河東池澤漏蘆為之使唐本注云大鹽即河東印鹽也人之常食者是形粗於末鹽故以大別之臣禹錫等謹按蕭炳云大鹽臣圖經文具食鹽條下太平廣記梁四公子傳䨲𤇍曰交河之間平磧中掘深數尺有末鹽紅紫色鮮味甘食之止痛衍義曰大鹽新者不苦久則鹹苦今解州鹽池所出者皆成斗子其形大小不等久亦苦海水煎成者但味和二鹽互有得失入藥及金銀作多用大鹽及解鹽傍海之人多黑色蓋日食魚鹽此走血之驗也齒縫中血出鹽湯嗽之及接藥入腎北虜以鹽淹尸使不腐滷咸味苦咸寒無毒主大熱消渴狂煩除邪及下蠱毒柔肌膚去五臟腸胃留熱結氣心下堅食已嘔逆喘滿明目目痛生河東鹽池陶隱居云是煎鹽釜下凝滓唐本注云滷咸既生河東河東鹽不釜煎明非凝滓此是鹼土名滷咸今人熟皮用之斯則於鹼地掘取之圖經文具食鹽條下丹房鏡源云滷鹽純制四黃作焊藥漿水味甘酸微溫無毒主調中引氣宣和強力通關開胃止渴霍亂泄痢消宿食宜作粥薄暮啜之解煩去睡調理腑臟粟米新熟白花者佳煎令醋止嘔噦白人膚體如繒帛為其常用故人不齒其功冰漿至冷婦人懷妊不可食之食譜所忌也新補外臺祕要大妙去黑子方夜以暖漿水洗面以布揩黑子令赤痛水研白檀香取濃汁以塗之旦又復以漿水洗面仍以鷹糞粉黑子孫真人食忌手指腫方煎漿水和少鹽熱漬之冷即易又方食生脯臘過多筋痛悶絶煮細漿水粥以少鷹糞末攪和頓服三五合鷂子糞亦得兵部手集救人霍亂頗有神效漿水稍醋味者煎乾姜屑呷之夏月腹肚不調煎呷之瘥産寶云孕婦令易産酸漿水和水少許頓服立産楊氏産乳云妊娠不得食漿水粥令兒骨瘦不成人衍義曰漿水不可同李實飲令人霍亂吐利井華水味甘平無毒主人九竅大驚出血以水噀面亦主口臭正朝含之吐棄廁下數度即瘥又令好顏色和硃砂服之又堪煉諸藥石投酒醋令不腐洗目膚翳及酒後熱痢與諸水有異共功極廣此水井中平旦第一汲者本經注井苔條中略言之今此重細解也新補千金方治心悶汗出不識人新汲水和蜜飲之甚妙又方欲産時取井花水半升頓一服又方治馬汗及毛入人瘡腫毒熱痛入腹害人以冷水浸瘡頓易飲好酒立愈又云井華水服藥煉藥並用之梅師方治眼睛無故突一二寸者以新汲水灌漬睛中數易水睛自入又方治卒驚悸九竅血皆溢出以井華水噀面當止勿使知之衍義井華水文具半天河條下菊花水味甘溫無毒除風補衰久服不老令人好顏色肥健益陽道溫中去痼疾出南陽酈縣北潭水其源悉芳菊生被崖水為菊味盛洪之荊州記云酈縣菊水太尉胡廣久患風羸常汲飲此水後疾逐瘳此菊甘美廣後收此菊實播之京師處處傳植抱朴子云南陽酈縣山中有甘谷水所以甘者谷上左右皆生甘菊菊花墮其中歷世彌久故水味為變其臨此谷中居民皆不穿井悉食甘谷水食無不壽考故司空王暢太尉劉寬太傅袁隗皆為南陽太守每到官常使酈縣月送甘谷水四十斛以為飲食此諸公多患風痹及眩冒皆得愈新補衍義曰菊花水本條言南陽酈縣北潭水其源悉芳菊生被崖水為菊味此說甚怪且菊生於浮土上根深者不過尺百花之中此特淺露水泉莫非深遠而來況菊根亦無香其花當九月十月間只三兩旬中焉得香入水也若因花而香其無花之月合如何也殊不詳水自有甘淡咸苦焉知無有菊味者嘗官於永耀間沿干至洪門北山下古石渠中泉水清徹衆官酌而飲其味與惠山泉水等亦微香世皆未知之烹茶尤相宜由是知泉脈如此非緣浮土上所生菊能變泉味博識之士宜細詳之地漿寒主解中毒煩悶陶隱居云此掘地作坎以水沃其中攪令濁俄頃取之以解中諸毒山中有毒菌人不識煮食之無不死又楓樹菌食之令人笑不止唯飲土漿皆瘥余藥不能救矣今注唐本元在草部下品之下今移臣禹錫等謹按日華子云地漿無毒聖惠方治熱渴心悶服地漿一盞並妙梅師方食生肉中毒掘地深三尺取土三升以水五升煎五沸清之一升即愈臘雪味甘冷無毒解一切毒治天行時氣溫疫小兒熱癇狂啼大人丹石發動酒後暴熱黃疸仍小溫服之藏淹一切果實良春雪有蟲水亦便敗所以不收之新補見陳藏器及日華子別說云謹按霜治暑月汁漬腋下赤腫及痱瘡以和蚌粉敷之立瘥瓦木上以雞毛羽掃取收瓷瓶中時久不壞今宜附臘雪後衍義臘雪文具半天河條下泉水味甘平無毒主消渴反胃熱痢熱淋小便赤澀兼洗漆瘡射癰腫令散久服卻溫調中下熱氣利小便並多飲之又新汲水百一方云患心腹冷病者若男子病令女人以一杯與飲女子病令男子以一杯與飲又解合口椒毒又主食魚肉為骨所鯁取一杯水合口向水張口取水氣鯁當自下又主人忽被墜損腸出以冷水噴之令身噤腸自入也又臘日夜令人持椒井旁無與人語納椒井中服此水去溫氣博物志亦云凡諸飲水療疾皆取新汲清泉不用停汙濁暖非直無效固亦損人新補沈存中筆談東阿是濟水所經取其井水煮膠謂之阿膠用攪濁水則清人服之下膈疏痰止吐皆服濟水性趨下清而重故以治淤濁及逆上之疾半天河微寒主鬼疰狂邪氣惡毒陶隱居云此竹籬頭水也及空樹中水皆可飲並洗諸瘡用之今按陳藏器本草云半天河在槐樹間者主諸風及惡瘡風瘙疥癢亦溫取洗瘡今注唐本元在草部今移臣禹錫等謹按藥性論云半天河單用此竹籬頭水及高樹穴中盛天雨能殺鬼精恍惚妄語勿令知之與飲瘥日華子云平無毒主蠱毒外臺祕要治身體白駁取樹木孔中水洗之搗桂屑唾和敷駁上日再白駁者浸淫漸長似癬但無瘡也衍義曰半天河水一水也然用水之義有數種種各有理如半天河水在上天澤水也故治心病鬼疰狂邪氣惡毒臘雪水大寒水也故解一切毒治天行時氣溫疫熱癇丹石發酒後暴熱黃疸井華水清冷澄徹水也故通九竅洗目膚翳及酒後熱痢後世又用東流水者取其快順疾速通關下膈者也倒流水者取其回旋留止上而不下者也熱湯主忤死先以衣三重藉忤死人腹上乃取銅器若瓦器盛湯著衣上湯冷者去衣大冷者換湯即愈又霍亂手足轉筋以銅器若瓦器盛湯尉之亦可令踏器使腳底熱徹亦可以湯捋之冷則易用醋煮湯更良煮蓼子及吳茱萸汁亦好以錦絮及破氈角腳以湯淋之貴在熱徹又繅絲湯無毒主蛔蟲熱取一盞服之此煮繭汁為其殺蟲故也又燖豬湯無毒主産後血刺心痛欲死取一盞溫服之新補見抱朴子陳藏器陳藏器云凡初覺傷寒三日內但取熱湯飲之候吐則止可飲一二升隨吐汗出瘥重者亦減半又凍瘡不瘥者熱湯洗之效野人閒話朱真人靈驗篇有病者患風疾數年不較掘坑令患者解衣坐於坑內逐以熱湯上淋之良久復以簟蓋之瘥別說云謹按外臺祕要有作甘爛水法以木盆盛水杓揚千百下泡起作珠子五六千顆撇取治霍亂及入膀胱治奔豚藥用殊勝傷寒論第三卷亦有此法衍義曰熱湯助陽氣行經絡患風冷氣痹人多以湯泄腳至膝上厚覆使汗出周身然別有藥亦終假湯氣而行也四時暴泄利四肢冷臍腹疼深湯中坐浸至腹上頻頻作生陽佐藥無速於此虛寒人始坐湯中必戰仍常令人伺守白堊烏恪切味苦辛溫無毒主女子寒熱癥瘕月閉積聚陰腫痛漏下無子泄痢不可久服傷五臟令人羸瘦一名白善生邯鄲山谷採無時陶隱居云此即今畫用者甚多而賤俗方亦稀仙經不須臣禹錫等謹按唐本云胡居士言始興小桂縣晉陽鄉有白善藥性論云白堊使味甘平主女子血結月候不通能澀腸止痢溫暖蕭炳云不入湯日華子云白善味甘治瀉痢痔瘻泄精女子子宮冷男子水臟冷鼻洪吐血本名白堊入藥燒用圖經文具代赭條下唐本余注云此即今畫工用者甚易得方中稀用之近代以白瓷為之雷公云凡使勿用色青並底白者先單搗令細三度篩過了又入鉢中研之然後將鹽湯飛過浪干每修事白堊二兩用白鹽一分投於鬥水中用銅器物內沸十餘沸了然後用此沸了水飛過白堊免結澀人腸也衍義文具代赭條下冬灰味辛微溫主黑子去疣音尤息肉疽蝕疥瘙一名藜灰生方谷川澤陶隱居云此即今浣衣黃灰爾燒諸蒿藜積聚煉作之性亦烈又荻灰尤烈欲銷黑志疣贅取此三種灰和水蒸以點之即去不可廣用爛人皮肉唐本注云桑薪灰最入藥用療黑子疣贅功勝冬灰用煮小豆大下水腫然冬灰本是藜灰余草不真又有青蒿灰燒蒿作之柃灰燒木葉作併入染用亦堪蝕惡肉柃灰一作苓字臣禹錫等謹按陳藏器云桑灰本功外去風血症瘕塊又主水陰淋取釅汁作食服三五升又取鱉一頭治如食法以桑灰汁煎如泥和諸癥瘕藥重煎堪丸衆手捻成日服十五丸癥瘕痃癖無不瘥者其方文多不具載圖經文具石灰條下衍義曰冬灰諸家只解灰而不解冬亦其缺也諸灰一烘而成唯冬灰則經三四月方徹爐灰既曉夕曉灼其力得不全燥烈乎而又體益重今一爇而成者體輕蓋火力劣故不及冬灰耳若古緊面少容方中用九燒益母灰蓋取此義如或諸方中用桑灰自合依本法既用冬灰則須爾唐本注云冬灰本是藜灰未知別有何說又湯火灼以餅爐中灰細羅脂麻油調羽掃不得著水仍避風青琅玕味辛平無毒主身癢火瘡癰傷白禿疥瘙死肌侵淫在皮膚中煮煉服之起陰氣可化為丹一名石珠一名青珠生蜀郡平澤採無時殺錫毒得水銀良畏雞骨陶隱居云此蜀都賦所稱青珠黃環也黃環乃是草苟取名類而種族為乖琅玕亦是崑山上樹名又九真經中大丹名也此石今亦無用唯以療手足逆臚音閭化丹之事未的見其術唐本注云琅玕乃有數種色是琉璃之類火齊寶也且琅玕五色其以青者入藥為勝今出嶲音髓州以西烏白蠻中及於闐國也臣禹錫等謹按陳藏器云琉璃主身熱目赤以水浸令冷尉之韻集曰火齊珠也南州異物志云琉璃本是石以自然灰理之可為器車渠瑪瑙並玉石類是西國重寶佛經云七寶者謂金銀琉璃車渠瑪瑙玻璃真珠是也或云珊瑚琥珀今瑪瑙碗上刻鏤為奇工者皆以自然灰又昆吾刀治之自然灰今時以牛皮膠作假者非也日華子云玻璃冷無毒安心止驚悸明目摩翳障圖經曰青琅玕生蜀郡平澤蘇恭注云琅玕乃有數種是琉璃之類火齊寶也琅玕五色其以青者入藥為勝出嶲音隨州以西烏白蠻中及於闐國也今祕書中有異魚圖載琅玕青色生海中雲海人於海底以網掛得之初出水紅色久而青黑枝柯似珊瑚而上有孔竅如蟲蛀擊之有金石之聲乃與珊瑚相類其說不同人莫能的識謹按尚書禹貢雍州厥貢球琳琅玕爾雅云西北之美者有崑崙墟之球琳琅玕焉孔安國郭璞皆以為石之似珠者而山海經云崑崙山有琅玕若然是石之美者明瑩若珠之色而其狀森植耳大抵古人謂石之美者多謂之珠廣雅謂琉璃珊瑚皆為珠是也故本經一名青珠而左太衝蜀都賦云青珠黃環黃環是木然引以相併者亦謂其美如珠而其類實木也又如上所說皆出西北山中而今圖乃雲海底得之蓋珍瑰之物山海谷俱産焉今醫方家亦以難得而稀用也唐本余味甘衍義曰青琅玕書曰三危既宅三危西裔之山也厥貢唯球琳琅玕孔穎達以謂琅玕石似玉新書亦謂三苗西戎西域記云天竺國正出此物陶隱居謂為木名大丹名既是大丹名則本經豈可更言煮煉服之又曰可化為丹陶不合遠引非此琅玕也唐本注云是琉璃之類且琉璃火成之物琅玕又非火成經曰生蜀郡平澤安得同類言之其說愈遠且佛經所謂琉璃者正如鬼谷珠之類乃火成之物也今人絶不見用自然銅味辛平無毒療折傷散血止痛破積聚生雍州山岩中出銅處於坑中及石間採得方圓不定其色青黃如銅不從礦煉故號自然銅今附臣禹錫等謹按日華子云自然銅涼排膿消瘀血續筋骨治産後血邪安心止驚悸以酒摩服圖經曰自然銅生雍州山岩中出銅處今信州火山軍皆有之於銅坑中及石間採之方圓不定其色青黃如銅不從礦煉故號自然銅今信州出一種如亂銅絲狀云在銅礦中山氣熏蒸自然流出亦若生銀如老翁須之類入藥最好火山軍者顆塊如銅而堅重如石醫家謂之銗石用之力薄採無時今南方醫者說自然銅有兩三體一體大如麻黍或多方解纍纍相綴至如斗大者色煌煌明爛如黃金䃋石最上一體成塊大小不定亦光明而赤一體如薑鐵矢之類又有如不冶而成者形大小不定皆出銅坑中擊之易碎有黃赤有青黑者煉之乃成銅也據如此說雖分析頗精而未見似亂絲者耳又云今市人多以銗石為自然銅燒之皆成青焰如硫黃者是也此亦有二三種一種有殼如禹餘糧擊破其中光明如鑑色黃類硫石也一種青黃而有牆壁或紋如束針一種碎理如團砂者皆光明如銅色多青白而赤少者燒之皆成煙焰頃刻都盡今藥家多誤以此為自然銅市中所貨往往是此自然銅用多須煅此乃畏火不必形色只此可辨也雷公云石髓鉛即自然銅也凡使勿用方金牙其方金牙真似石髓鉛若誤餌吐煞人其石髓鉛色似干銀泥味微甘如採得先捶碎同甘草湯煮一伏時至明漉出攤令乾入臼中搗了重篩過以醋浸一宿至明用六一泥泥瓷合子約盛得二升以來於文武火中養三日夜才幹便用蓋蓋了泥用火煅兩伏時去土抉蓋研如粉用若修事五兩以醋兩鎰為度丹房鏡源云可食之自然銅出信州鉛山縣銀場銅坑中深處有銅礦多年礦氣結成似馬屌勃色紫重食之苦澀是真自然銅今人只以大碗石為自然銅誤也別說云謹按今辰州川澤中出一種形圓似蛇含大者如胡桃小者如栗外青皮黑色光潤破之與銗石無別但比銗石不作臭氣爾入藥用殊驗衍義曰自然銅有人飼折翅雁後遂飛去今人打撲損研極細水飛過同當歸沒藥各半錢以酒調頻服仍以手摩痛處金牙味鹹無毒主鬼疰毒蠱諸疰生蜀郡如金色者良陶隱居云今出蜀漢似粗金大如棋子而方又有銅牙亦相似但外色黑內色小淺不入藥用金牙唯合酒散及五疰丸余方不甚須此唐本注云金牙離本處入土水中久皆色黑不可謂之銅牙也此出漢中金牙湍湍兩岸入石間打出者內即金色岸摧入水久者皆黑近南山溪谷茂州雍州亦有勝於漢中者臣禹錫等謹按藥性論云金牙石君治一切風筋骨攣急腰腳不遂燒浸服之良日華子云金牙石味甘平治一切冷風氣暖腰膝補水臟驚悸小兒驚癇入藥並燒淬去粗汁乃用圖經曰金牙生蜀郡今雍州亦有之本經以如金色者良而此物出於溪谷在蜀漢江岸石間打出者內即金色岸摧入水年久者多黑葛洪治風毒厥有大小金牙酒但浸其汁而飲之古方亦有燒淬去毒入藥者孫思邈治風毒及鬼疰南方瘴氣傳尸等各有大小金牙散之類是也又有銅牙亦相似而外黑色方書少見用者小金牙酒主風疰百病虛勞濕冷緩不仁不能行步近人用之多效故著其法云金牙細辛地膚子莽草乾地黃蒴藋根防風附子茵芋續斷蜀椒各四兩獨活一斤十二物金牙搗末別盛練囊余皆薄切並金牙共內大絹囊以清酒四斗漬之密泥器口四宿酒成溫服二合日三漸增之衍義曰金牙今方家絶不用以此故商客無利不販賣醫者由是委而不用兼所唯蜀郡有之蓋亦不廣也余如經銅礦石味酸寒有小毒主丁腫惡瘡驢馬脊瘡臭腋石上水磨取汁塗之其丁腫末之敷瘡上良今按別本注云狀如姜石而有銅星熔取銅也唐本先附銅弩牙主婦人産難血閉月水不通陰陽隔塞陶隱居云即今人所用射者爾取燒赤納酒中飲汁得古者彌勝臣禹錫等謹按日華子云平微毒聖惠方治小兒吞珠錢而哽方燒銅弩牙赤納水中冷飲其汁立出千金方令易産銅弩牙燒令赤投醋三合服良久頓服立産金星石寒無毒主脾肺壅毒及主肺損吐血嗽血下熱涎解衆毒今多出濠州又有銀星石主療與金星石大體相似新定圖經曰金星石生並州濠州寒無毒主脾肺壅毒及肺損出血嗽血下熱涎解衆毒又有一種銀星石體性亦似採無時衍義曰金星石銀星石治大風疾別有法須燒用金星石於蒼石內外有金色麩片銀星石有如銀色麩片又一種深青色堅潤中有金色如麩片不入藥工人碾為器或婦人首飾余如經特生礜石味甘溫有毒主明目利耳腹內絶寒破堅結及鼠瘻殺百蟲惡獸久服延年一名蒼礜石一名鼠毒生西域採無時火煉之良畏水陶隱居云舊鸛巢中者最佳鸛常入水冷故取以壅卵令熱今不可得唯用出漢中者其外形紫赤色內白如霜中央有臼形狀如齒者佳大散方云又出荊州新城郡房陵縣縹白色為好用之亦先以黃土包燒之一日亦可納斧孔中燒之合玉壺諸丸用此仙經不云特生則只是前白礜石爾唐本注云陶所說特生云中如齒臼形者是今出梁州北馬道戍澗中亦有之形塊小於白礜石而肌粒大數倍乃如小豆許白礜石粒細若粟米爾圖經文具礜石條下握雪礜石味甘溫無毒主痼冷積聚輕身延年多食令人熱唐本注云出徐州西宋里山入土丈餘於爛土石間黃白色細軟如面一名化公石一名石腦煉服別有法唐本先附臣禹錫等謹按蜀本注云今據中品自有石腦一條主治與此甚別應似徐長卿一名鬼督郵之類也圖經文具礜石條下丹房鏡源握雪礜石干汞制汞並丹砂梁上塵主腹痛噎中惡鼻衄小兒軟瘡唐本先附臣禹錫等謹按藥對云梁上塵微寒日華子云平無毒雷公云凡使須去煙火遠高堂殿上者拂下篩用之外臺祕要治小便不通及胞轉取梁上塵三指撮以水服之又方治自縊死用梁上塵如大豆各納一個耳鼻中四處各一粒極力齊吹之即活千金方妒乳梁上塵醋和塗之亦治陰腫又方治婦人日月未足而欲産取梁上塵灶突煤二味合方寸匕酒服千金翼凡癰以梁上塵灰葵莖等分用醋和敷之子母祕録治橫生不可出梁上塵酒服方寸匕亦治倒生又方治小兒頭瘡梁上塵和油取瓶下滓以皂莢湯洗後塗上土陰孽味鹹無毒主婦人陰蝕大熱干痂生高山崖上之陰色白如脂採無時陶隱居云此猶似鍾乳孔公孽之類故亦有孽名但在崖上爾今時有之但不復採用唐本注云此即土乳是也出渭州鄣縣三交驛西北坡平地土窟中見有六十餘坎昔人採處土人云服之亦同鍾乳而不發熱陶及本經俱云在崖上此說非也今渭州不復採用今按別本注云此則土脂液也生於土穴狀如殷孽故名土陰孽臣禹錫等謹按蜀本注云今據本經所載既與陶注同而蘇說獨異恐蘇亦未是車脂主卒心痛中惡氣以溫酒調及熱攪服之又主婦人妒乳乳癰取脂熬令熱塗之亦和熱酒服今附臣禹錫等謹按陳藏器云車脂味辛無毒主鬼氣溫酒煬令熱服之聖惠方治蝦蟆及蝌蚪蠱得之心腹脹滿口乾思水不能食悶亂大喘而氣發方用車轄脂半升以來漸漸服之其蠱即出外臺祕要治聤耳膿血出取車轄脂綿裹塞耳中千金方治小兒驚啼車轄脂如小豆許納口中又臍中瘥別說云謹按車脂塗衣衣不可洗滌唯以生油方可解然後復以蜜湯洗則淨釭音工中膏主逆産以膏畫兒腳底即正又主中風發狂取膏如雞子大以熱醋攪令消服之今附千金方治妊娠婦熱病方取車釭脂服之大良隨意服又方治妊娠腹中痛燒車轄脂末納酒中隨意服之梅師方治諸蟲入耳取車釭脂塗耳孔中自出子母祕録治産後陰脫燒車釭頭脂納酒中分溫三服亦治咳嗽煅灶灰主癥瘕堅積去邪惡氣陶隱居云即今煅鐵灶中灰爾兼得鐵力以療暴症大有效臣禹錫等謹按唐本云二車丸用之陳藏器云灶突後黑土無毒主産後胞衣不下末服三指撮暖水及酒服之天未明時取至驗也又云灶中熱灰和醋尉心腹冷氣痛及血氣絞痛冷即易圖經文具石灰條下經驗方治婦人崩中用百草霜二錢狗膽汁一處拌勻分作兩服以當歸酒調下續十全方治暴瀉痢百草霜末米飲調下二錢杜壬方治逆生橫生瘦胎妊娠産前産後虛損月候不調崩中百草霜白芷等分末每服二錢童子小便醋各少許調勻更以熱湯化開服不過二服即瘥治瘡頭瘡及諸熱瘡先用醋少許和水淨洗去痂再用溫水洗裛干百草霜細研入膩粉少許生油調塗立愈淋石無毒主石淋此是患石淋人或於溺中出者如小石水磨服之當得碎石隨溺出今附臣禹錫等謹按日華子云淋石暖陳藏器云溺中出正如小石非他物也候出時收之淋為用最佳也又主噎病吐食俗云澀飯病者效方解石味苦辛大寒無毒主胸中留熱結氣黃疸通血脈去蠱毒一名黃石生方山採無時惡巴豆陶隱居云按本經長石一名方石療體亦相似疑是此也唐本注云此石性冷療熱不減石膏也今注此物大體與石膏相似唯不附石而生端然獨處形塊大小不定或在土中或生溪水得之敲破皆方解故以為名今沙州大鳥山出者佳圖經文具石膏條下礞石治食積不消留滯在臟腑宿食症塊久不瘥及小兒食積羸瘦婦人積年食症攻刺心腹得硇砂巴豆大黃京三稜余等良可作丸服用之細研為粉一名青礞石新定姜石味鹹寒無毒主熱豌豆瘡疔毒等腫生土石間狀如姜有五種色白者最良所在有之以爛不磣插荏切者好齊州歷城東者良唐本先附圖經曰姜石生土石間齊州歷城來者良所在亦有今唯出齊州其狀如姜有五種用色白者以爛而不磣者好採無時崔氏療疔腫單用白姜石末和雞子清敷之疔自出乳癰塗之亦善大凡石類多主癰疽北齊馬嗣明醫楊遵彥背瘡取粗理黃石如鵝卵大猛烈火燒令赤內鹼醋中因有屑落醋里頻燒淬石至盡取屑曝乾搗篩和醋塗之立愈劉禹錫謂之煉石法用之敷瘡腫無不愈者世人又傳麥飯石亦治發背瘡麥飯石者粗黃白類麥飯曾作磨磑者尤佳中嶽山人呂子華方云取此石碎如棋子炭火燒赤投米醋中浸之良久又燒如此十遍鹿角一具連腦骨者二三寸截之炭火燒令煙出即止白蘞末與石末等分鹿角倍之三物同杵篩令精細取三年米醋於鐺中煎如魚眼沸即下前藥調和令如寒食餳以篦敷於腫上唯留腫頭如指面勿令有藥使熱氣得泄如未有腫膿即當內消若已作頭即撮令小其病久得此膏直至肌肉爛落出筋骨者即於細布上塗之貼於瘡上干即易之但中隔不穴者即無不瘥其瘡腫時切禁手觸其效極神異此方孫思邈千金月令已有之與此大同小異但此本論說稍備耳又水中圓石治背上忽腫漸如碟子不識名者以水中圓石一兩碗燒令極熱瀉入清水中沸定後洗腫處立瘥外臺祕要救急治乳癰腫如碗大痛甚取白姜石搗末一二升用雞子白和如餳敷腫上干易之此方頻試驗佳衍義曰姜石所在皆有須不見日色旋取微白者佳治丁腫殊效井泉石大寒無毒主諸熱治眼腫痛解心臟熱結消去腫毒及療小兒熱疳雀目青盲得大黃梔子治眼瞼腫得決明菊花療小兒眼疳生翳膜甚良亦治熱嗽近道處處有之以出饒陽郡者為勝生田野間地中穿地深丈餘得之形如土色圓方長短大小不等內實而外則重重相疊採無時用之當細研為粉不爾使人淋又有一種如姜石時人多指以為井泉石者非是新定圖經曰井泉石生深州城西二十里劇家村地泉內深一丈許其石如土色圓方長短大小不等內實外圓作層重疊相交其性大寒無毒解心臟熱結消去腫毒及療小兒熱疳不拘時月採之蒼石味甘平有毒主寒熱下氣瘻蝕殺禽獸生西城採無時陶隱居云俗中不復用莫識其狀唐本注云特生礜一名蒼礜石而梁州特生亦有青者今房陵漢川與白礜石同處有色青者並毒殺禽獸與礜石同漢中人亦取以毒鼠不入方用此石出梁州均州房州與二礜石同處特生蒼石並生西城在漢川金州也圖經文具礜石條下花乳石主金瘡止血又療産婦血暈惡血出陝華諸郡色正黃形之大小方圓無定欲服者當以大火燒之金瘡止血正爾刮末敷之即合仍不作膿潰或名花蕊石新定圖經曰花乳石出陝州閿鄉縣體至堅重色如硫黃形塊有極大者人用琢器古方未有用者近世以合硫黃同煅研末敷金瘡其效如神又人倉猝中金刃不及煅合但刮石上取細末敷之亦效採無時別說云圖經玉石中品有花蕊石一種主治與此同是一物衍義曰花乳石其色如硫黃本經第五中已著今出陝華間於黃石中間有淡白點以此得花之名今惠民局花乳石散者是此物陝人又能鐫為器圖經第二卷中易其名為花蕊石是卻取其色黃也更無花乳名慮歲久為世所惑故書之石蠶無毒主金瘡止血生肌破石淋血結磨服之當下碎石生海岸石旁狀如蠶其實石也今附臣禹錫等謹按藥訣云石蠶味苦熱有毒石腦油主小兒驚風化涎可和諸藥作丸服宜以瓷器貯之不可近金銀器雖至完密直爾透之道家多用俗方亦不甚須新定圖經文具鐘乳石條下衍義曰石腦油真者難收多滲蝕器物今入藥最少燒煉或須也仍常用有油去聲器貯之又研生砒霜入石腦油再研如膏入坩堝子內用淨瓦片子蓋定置火上俟鍋子紅泣盡油出之又再研再入油再上火凡如此共兩次即砒霜伏白瓷瓦屑平無毒主婦人帶下白崩止嘔吐破血止血水磨塗瘡滅瘢定州者良余皆不如唐本先附經驗後方治鼻衄久不止定州白瓷細搗研為末每抄一剜耳許入鼻立止梅師方治人面目卒得赤黑丹如疥狀不急治遍身即死若白丹者方取白瓷瓦末豬膽和塗之烏古瓦寒無毒以水煮及漬汁飲止消渴取屋上年深者良唐本先附臣禹錫等謹按藥性論云烏古瓦亦可單用煎湯服解人中大熱日華子云冷並止小便煎汁服之陳藏器主湯火傷當取土底深者既古且潤三角瓦子灸牙痛法令三姓童子候星初出時指第一星下火三角瓦上灸之不灰木大寒主熱痱瘡和棗葉石灰為粉敷身出上黨如爛木燒之不燃石類也今附圖經曰不灰木出上黨今澤潞山中皆有之蓋石類也其色青白如爛木燒之不燃以此得名或云滑石之根也出滑石處皆有亦名無灰木採無時今處州山中出一種松石如松干而實石也或云松久化為石人家多取以飾山亭及琢為枕雖不入藥然與不灰木相類故附之陳藏器燒要成灰即斫破以牛乳煮了便燒黃牛糞燒之成灰中和二年於李宗處見傳丹房鏡源云不灰木煮汞蓬砂味苦辛暖無毒消痰止嗽破癥結喉痹及焊金銀用或名硼砂新補見日華子圖經文具硇砂條下衍義曰蓬砂含化咽津治喉中腫痛鬲上痰熱初覺便治不能成喉痹亦緩取效可也南番者色重褐其味和其效速西戎者其色白其味焦其功緩亦不堪作焊鉛霜冷無毒消痰止驚悸解酒毒療胸膈煩悶中風痰實止渴新補見日華子圖經文具鉛條下簡要濟衆治室女月露滯澀心煩恍惚鉛白霜細研為散每服一錢溫地黃汁一合調下生乾地黃煎湯調服亦得十全博救治鼻衄方鉛白霜為末取新汲水調一字衍義曰鉛霜圖經已著其法治上膈熱涎塞塗木瓜失酸味金剋木也古文錢平治翳障明目療風赤眼鹽滷浸用婦人橫逆産心腹痛月隔五淋燒以醋淬用新補見日華子圖經文具鉛條下陳藏器云大錢銀注中陶云不入用按錢青者是大錢煮汁服主五淋磨入目主盲瘴膚赤和薏苡根煮服主心腹痛煮比輪錢以新汲水投服之又主時氣含青錢又主口內熱瘡以二十文燒令赤投酒中服之立瘥又主婦人患橫産衍義曰古文錢古銅焦赤有毒治目中瘴瘀腐蝕壞肉婦人橫逆産五淋多用非特為有錫也此說非是今但取景王時大泉五十及寶貨秦半兩漢莢錢大小五銖吳大泉五百大泉當千宋四銖二銖及梁四柱北齊常平五銖爾後其品尚多如此類方可用少時常自患暴赤目腫痛數日不能開客有教以生薑一塊洗淨去皮以古青銅錢刮取薑汁就錢稜上點初甚苦熱淚薎面然終無損後有患者教如此點往往疑惑信士點之無不獲驗一點遂愈更不可再作有瘡者不可用蛇黃主心痛疰忤石淋産難小兒驚癇以水煮研服汁出嶺南蛇腹中得之圓重如錫黃黑青雜色今注蛇黃多赤色有吐出者野人或得之唐本先附臣禹錫等謹按日華子云冷無毒鎮心如入藥燒赤三四次醋淬飛研用之圖經曰蛇黃出嶺南今越州信州亦有之本經云是蛇腹中得之圓重如錫黃黑青雜色注云多赤色有吐出者野人或得之今醫家用者大如彈丸堅如石外黃內黑色二月採云是蛇冬蟄時所含土到春發蟄吐之而去與舊說不同未知執是三十五種陳藏器余玉井水味甘平無毒久服神仙令人體潤毛髮不白出諸有玉處山谷水泉皆有猶潤於草木何況於人乎夫人有發毛如山之草木故山有玉而草木潤身有玉而毛髮黑異類云崑崙山有一石柱柱上露盤盤上有玉水溜下土人得一合服之與天地同年又太華山有玉水人得服之長生玉既重寶水又靈長故能延生之望今人近山多壽者豈非玉石之津乎故引水為玉證碧海水味鹹不溫有小毒煮浴去風瘙疥癬飲一合吐下宿食臚脹夜行海中撥之有火星者鹹水色既碧故云碧海東方朔十洲記云千里水及東流水味平無毒主病後虛弱揚之萬過煮藥禁神驗二水皆堪蕩滌邪穢煎煮湯藥禁咒鬼神潢汙行潦尚可薦羞王公況其靈長者哉蓋取其潔誠也本經云東流水為雲母所畏煉雲母用之與諸水不同即其效也秋露水味甘平無毒在百草頭者愈百疾止消渴令人身輕不飢肌肉悅澤亦有化雲母成粉朝露未晞時拂取之柏葉上露主明目百花上露令人好顏色露即一般所在有異主療不同甘露水味甘美無毒食之潤五臟長年不飢神仙緣是感應天降祐兆人也繁露水是秋露繁濃時也作盤以收之煎令稠可食之延年不飢五月五日取露草一百種陰乾燒為灰和井花水重煉令白鹼醋為餅腋下挾之干即易主腋氣臭當抽一身間瘡出即以小便洗之續齊諧記云司農鄧沼八月朝入華山見一童子以五彩囊承取柏葉下露露皆如珠云赤松先生取以明目令人八月朝朝作露華明像此也漢武帝時有吉云國有吉云草食之不死日照草木有露著皆五色東方朔得玄露青黃二露各盛五合帝賜群臣老者皆少病者皆除東方朔曰日初出處露皆如糖可食漢武帝洞冥記所載今時人煎露亦如糖久服不飢呂氏春秋云水之美者有三危之露為水即味重於水也六天氣服之令人不飢長年美顏色人有急難阻絶之處用之如龜蛇服氣不死陽陵子明經言春食朝露日欲出時向東氣也秋食飛泉日沒時向西氣也冬食沆瀣北方夜半氣也夏食正陽南方日中氣也並天玄地黃之氣是為六氣亦言平明為朝露日中為正陽日入為飛泉夜半為沆瀣及天地玄黃為六氣皆令人不飢延年無疾者人有墮穴中穴中有蛇蛇每日作此氣服之其人既見蛇如此依蛇時節飢時便服又即仿蛇日日如之經久漸漸有驗即體輕健似能輕舉啓蟄之後人與蛇一時躍出焉梅雨水洗瘡疥滅瘢痕入醬令易熟沾衣便腐浣垢如灰汁有異他水江淮以南地氣卑濕五月上旬連下旬尤甚月令土潤溽暑是五月中氣過此節以後皆須曝書漢崔實七夕曝書阮咸焉能免俗蓋此謂也梅沾衣皆以梅葉湯洗之脫也余並不脫醴泉味甘平無毒主心腹痛疰忤鬼氣邪穢之屬並就泉空腹飲之時代升平則醴泉湧出讀古史大有此水亦以新汲者佳止熱消渴及反胃腹痛霍亂為上甘露蜜味甘平無毒主胸膈諸熱明目止渴生巴西絶域中如餳也漢武帝立金莖作仙人掌承露盤取雲表之露服食以求仙冬霜寒無毒團食者主解酒熱傷寒鼻塞酒後諸熱面赤者雹主醬味不正當時取一二升醬甕中即如本味也溫湯主諸風筋骨攣縮及皮頑痹手足不遂無眉發疥癬諸疾在皮膚骨節者入浴浴干當大虛憊可隨病與藥及飯食補養自非有他病人則無宜輕入又云下有硫黃即令水熱硫黃主諸瘡病水亦宜然水有硫黃臭故應愈諸風冷為上當其熱處大可燖豬羊夏冰味甘大寒無毒主去熱煩熱尉人乳石發熱腫暑夏盛熱食此應與氣候相反便非宜人或恐入腹冷熱相激卻致諸疾也食譜云凡夏用冰正可隱映飲食令氣冷不可打碎食之雖復當時暫快久皆成疾今冰井西陸朝覿出之頒賜官宰應悉此淮南子亦有作法又以凝水石為之皆非正冰也方諸水味甘寒無毒主明目定心去小兒熱煩止渴方諸大蚌也向月取之得三二合水亦如朝露陽燧向日方諸向月皆能致水火也周禮明諸承水於月謂之方諸陳饌明水以為玄酒酒水也乳穴中水味甘溫無毒久服肥健人能食體潤不老與乳同功近乳穴處人取水作食釀酒則大有益也其水濃者稱重他水煎上有鹽花此真乳液也所為穴中有魚出魚部中水花平無毒主渴遠行山無水處和苦栝蔞為丸朝預服二十丸永無渴亦入殺野獸藥和狼毒皂莢礬石為散揩安獸食余肉中當令不渴渴恐飲水藥解名水沫江海中間久沫成乳石故如石水沫猶軟者是也赤龍浴水小毒主瘕結氣諸瘕惡蟲入腹及咬人生瘡者此澤間小泉赤蛇在中者人或遇之經雨取水服及人浴蛇有大毒故以為用也糧罌中水味辛平小毒主鬼氣中惡疰忤心腹痛惡夢鬼神進一合多飲令人心悶又云洗眼見鬼未試害蚢蠱其清澄久遠者佳古冢文云蔗留余節瓜毒潰尸言此二物不爛余皆成水北人呼糧罌為食罌也甑氣水主長毛髮以物於炊飲飯時承取沐頭令髮長密黑潤不能多得朝朝梳小兒頭漸漸覺有益好井水及土石間新出泉水味甘平無毒主霍亂煩悶嘔吐腹空轉筋恐入腹及多服之名曰洗腸人皆懼此嘗試有效不令腹空空則更服如遇力弱身冷則恐臟胃悉寒寒則不能支持當以意消息兼及當時橫量灸脊骨三五十壯令暖氣徹內補胃氣間不然則危又主消渴反胃熱痢淋小便赤澀兼洗漆瘡射癰腫令散久服調中下熱氣傷胃利大小便並多飲之令至喉少即消下正月雨水夫妻各飲一杯還房當獲時有子神效也生熟湯味鹹無毒熱鹽投中飲之吐宿食毒惡物之氣臚脹欲為霍亂者覺腹內不穩即進一二升令吐得盡便愈亦主痰瘧皆須吐出痰及宿食調中消食又人大醉及食菰果過度以生熟湯浸身湯皆為酒及菰味博物志云浸至腰食菰可五十枚至脛頸則無限屋漏水主洗犬咬瘡以水澆屋檐承取用之以水滴檐下令土濕取土以敷犬咬處瘡上中大有毒誤食必生惡疾三家洗碗水主惡瘡久不瘥者煎令沸以鹽投中洗之不過三五度立效蟹膏投漆中化為水仙人用和藥博物志亦載又蚯蚓破之去泥以鹽塗之化成水大主天行諸熱小兒熱病癇癲等疾新注云塗丹毒並敷漆瘡效豬槽中水無毒主諸蠱毒服一杯主蛇咬可浸瘡皆有效驗者矣市門衆人溺坑中水無毒主消渴重者取一小盞服之勿令病人知之三度瘥鹽膽水味鹹苦有大毒主䘌蝕疥癬瘻蟲咬馬牛為蟲蝕毒蟲入肉生子毒六畜飲一合當時死人亦如之並鹽初熟槽中瀝黑汁也主瘡有血不可敷也水氣有毒能為風溫疼痹水腫面黃腹大初在皮膚腳手入漸至六腑令人大小便澀至五臟漸漸加至忽攻心便死急不旋踵無寬延歲月既是陰病復宜以陰物生類諸豬魚螺鱉之屬春夏秋宜瀉冬宜補藥尤宜浸酒中服之隨陰陽所行者昔馬援南征多載薏苡仁閔叔留寓常食豬肝蓋以為濕疾也江湖間露氣成瘴兩山夾水中氣瘧一冷一熱相激成病症此三疾俱是濕為能與人作寒熱消鑠骨肉南土尤甚若欲醫療須細分析其大略皆瘴類也人多一概醫之則不瘥冢井中水有毒人中之者立死欲入冢井者當先試之法以雞毛投井中毛直而下者無毒毛回旋而舞似不下者有毒以熱醋數斗投井穴中則可入矣凡冢井及灶中從夏至秋毒氣害人從冬至春則無毒氣凡秋露春水著草水亦能害人冬夏則無人素為物所傷並有諸瘡觸犯毒露及毒水覺瘡頑不癢痛當中風水所為身必反張似角弓主之法以鹽豉和麵作碗子蓋瘡上作大艾炷灸一百壯令抽惡水數升舉身覺癢瘡處知痛瘥也陰地流泉二月八月行途之間勿飲之令人夏發瘧瘴又損腳令軟五月六月勿飲澤中停水食著魚鱉精令人鱉瘕病也銅器蓋食器上汗滴食中令人發惡瘡內疽食性忌之也炊湯經宿洗面今人無顏色洗體令人成癬未經宿者洗面令人亦然諸水有毒水府龍宮不可觸犯水中亦有赤脈不可斷之井水沸不可食之以上並害人東晉溫嶠以物照水為神所怒楚詞云鱗屋貝闕言河伯所居國語云季桓子穿井獲土缶仲尼曰水之怪魍魎土之怪羵羊水有脈及沸並見白澤圖
