body:
  text: 卷第十三己酉新增衍義桑根白皮味甘寒無毒主傷中五勞六極羸瘦崩中脈絶補虛益氣去肺中水氣唾血熱渴水腫腹滿臚脹利水道去寸白可以縫金瘡採無時出土上者殺人續斷桂心麻子為之使葉主除寒熱出汗汁解蜈蚣毒桑耳味甘有毒黑者主女子漏下赤白汁血病症瘕積聚陰痛陰陽寒熱無子療月水不調其黃熟陳白者止久泄益氣不飢其金色者治癖飲積聚腹痛金瘡一名桑菌一名木麥蜀本麥作夋詮荀切五木耳名檽音軟益氣不飢輕身強志生犍為山谷六月多雨時採即曝乾陶隱居云東行桑根乃易得而江邊多出土不可輕信桑耳斷谷方云木檽又呼為桑上寄生此云五木耳而不顯四者是何木按老桑樹生燥耳有黃者赤白者又多雨時亦生軟濕者人採以作菹皆無復藥用唐本注云楮耳人常食槐耳用療痔榆柳桑耳此為五耳軟者並堪啖桑椹味甘寒無毒單食主消渴葉味苦甘寒有少毒水煎取濃汁除腳氣水腫利大小腸灰味辛寒有小毒蒸淋取汁為煎與冬灰等同滅志疵黑子蝕惡肉煮小豆大下水脹敷金瘡止血生肌也今按陳藏器本草云桑葉汁主霍亂腹痛吐下冬月用乾者濃煮服之研取白汁合金瘡又主小兒吻瘡細銼大釜中煎取如赤糖去老風及宿血葉丫者名雞桑最堪入用椹利五臟關節通血氣久服不飢多收曝乾搗末蜜和為丸每日服六十丸變白不老取黑椹一升和科斗子一升瓶盛封閉懸屋東頭一百日盡化為黑泥染白鬢如漆又取二七枚和胡桃脂研如泥拔去白髮點孔中即生黑者臣禹錫等謹按藥性論云桑白皮使平能治肺氣喘滿水氣浮腫主傷絶利水道消水氣虛勞客熱頭痛內補不足桑耳使一名桑臣又名桑黃味甘辛無毒能治女子崩中帶下月閉血凝産後血凝男子痃癖兼療伏血下赤血又云木耳亦可單用平孟詵云寒無毒利五臟宣腸胃氣擁毒氣不可多食唯益服丹石人熱發和蔥豉作羹蕭炳云桑葉炙煮飲止霍亂孟詵云桑根白皮煮汁飲利五臟又入散用下一切風氣水氣又云桑葉炙煎飲之止渴一如茶法又云桑皮煮汁可染褐色久不落柴燒灰淋汁入煉五金家用日華子云桑白皮溫調中下氣益五臟消痰止渴利大小腸開胃下食殺腹臟蟲止霍亂吐瀉此即出桑根皮又云家桑東行根暖無毒研汁治小兒天吊驚癇客忤及敷鵝口瘡大驗又云家桑葉暖無毒利五臟通關節下氣煎服除風痛出汗並撲損瘀血並蒸後蛇蟲蜈蚣咬鹽挪敷上春葉未開枝可作煎酒服治一切風又云桑耳溫微毒止腸風瀉血婦人心腹痛藥性論云菌耳亦可單用平古槐桑樹上者良能治破血益力其餘樹上多動風氣發痼疾令人肋下急損經絡背膊悶又煮漿粥安槐木上草覆之即生菌次柘木者良孟詵云菌子寒發五臟風擁經脈動痔病令人昏昏多睡背膊四肢無力又菌子有數般槐樹上生者良野田中者恐有毒殺人又多發冷氣令腹中微微痛圖經曰桑根白皮本經不著所出州土今處處有之採無時不可用出土上者用東行根益佳或云木白皮亦可用初採得以銅刀剝去上粗皮取其里白切焙乾其皮中青涎勿使刮去藥力都在其上惡鐵及鉛不可近之桑葉以夏秋再生者為上霜後採之煮湯淋泄手足去風痹殊勝桑耳一名桑黃有黃熟陳白者又有金色者皆可用碎切酒煎主帶下其實椹有白黑二種曝乾皆主變白髮皮上白蘚花亦名桑花狀似地錢刀削取炒乾以止衄吐血等其柴燒灰淋汁醫家亦多用之桑上蠹蟲主暴心痛金瘡肉生不足皮中白汁主小兒口瘡敷之便愈又以塗金刃所傷燥痛須臾血止更剝白皮裹之令汁得入瘡中良冬月用根皮皆驗白皮作線以縫金創腸出者更以熱雞血塗之唐安金藏剖腹用此法便愈桑條作煎見近效方云桑煎療水氣肺氣腳氣癰腫兼風氣桑條二兩用大稱七兩一物細切如豆以水一大升煎取三大合如欲得多造準此增加先熬令香然後煎每服肚空時吃或茶湯或羹粥每服半大升亦無禁忌也本方云桑枝平不冷不熱可以常服療遍體風癢乾燥腳氣風氣四肢拘攣上氣眼暈肺氣嗽消食利小便久服輕身聰明耳目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服出抱朴子本方桑枝一小升細切熬令香以水三大升煎取二大升一日服盡無問食前後此服只依前方也桑葉可常服神仙服食方以四月桑茂盛時採葉又十月霜後三分二分已落時一分在者名神仙葉即採取與前葉同陰乾搗末丸散任服或煎以代茶飲又採椹曝乾和蜜食之並令人聰明安魂鎮神又炙葉令微干和桑衣煎服治痢亦主金創及諸損傷止血方書稱桑之功最神在人資用尤多爾雅云桑辨有椹與椹同梔郭璞云辨半也一半有椹半無名曰梔又云女桑桋桑俗間呼桑木之小而條長者為女桑又山桑木堪弓弩檿桑絲中琴瑟皆材之美者也他木鮮及焉雷公云凡使十年以上向東畔嫩根採得後銅刀剝上青黃薄皮一重只取第二重白嫩青涎者於槐砧上用銅刀銼了焙令乾勿使皮上涎落涎是藥力此藥惡鐵並鉛也聖惠方治大風頭面髭發脫落以桑柴灰熱湯淋取汁洗頭面以大豆水研取漿解澤灰味彌佳次用熟水入緑豆麵濯之取淨不遇十度良三日一沐頭一日一洗面外臺祕要治偏風及一切風桑枝銼一大升用今年新嫩枝以水一大斗煎取二大升夏用井中沉恐酢壞每日服一盞空心服盡又煎服終身不患偏風若預防風能服一大升佳又方脈極寒髮鬢墮落令發潤生桑白皮二升以水淹浸煮五六沸去滓洗沐鬢髮自不落又方五痔以桑耳作羹空心下飯飽食之日三食之待孔卒痛如烏啄取大小豆各一升合搗作兩囊蒸之及熱更互坐之即瘥千金方治口瘡白漫漫取桑樹汁先以發拭口次以汁敷之又方八月九月中刺手足犯惡露腫多殺人以桑枝三條納煻灰中炮令極熱破斷以頭柱瘡口上令熱盡即易之盡二條則瘡自爛仍取韭白敷瘡上以布帛急裹之若有腫者更作用薤白佳肘後方治人少小鼻衄小勞輒出桑耳無多少熬令焦搗末每衄發輒以杏仁大塞鼻數度即可斷深師方同葛氏方卒小便多消渴入地三尺取桑根剝取白皮炙令黃黑銼以水煮之令濃隨意飲之亦可納少米勿入鹽又方産後下血不止炙桑白皮煮水飲之又方血露不絶鋸截桑根取屑五指撮取醇酒服之日三又方因瘡而腫者皆因中水浸中風寒所作其腫入腹則殺人多以桑灰淋汁漬冷復易取愈梅師方同又方飲食中蠱毒令人腹內堅痛面黃青淋露骨立病變無常取桑木心銼得一槲著釜中以水淹之令上有三斗水煮取二斗澄取清微火煎得五升宿勿食旦服五合則吐蠱毒出梅師方治水腫坐臥不得頭面身體悉腫取東引花桑枝燒灰淋汁煮赤小豆空心食令飽飢即食盡不得吃飲又方治金瘡止痛取桑柴灰研敷瘡上佳經驗方治咳嗽甚者或有吐血殷鮮桑根白皮一斤米泔浸三宿淨刮上黃皮銼細入糯米四兩焙乾一處搗為末每服米飲調下一兩錢又方治青盲此一法當依而用之視物如鷹鶻有此效正月八二月八三月六四月六五月五六月二七月七八月二十五九月十二十月十二十一月二十六十二月晦每遇上件神日用桑柴灰一合以煎湯沃之於瓷器中澄令極清以藥汁稍熱洗之如覺冷即重湯煮令得所不住手洗遇上件日不得不洗緣此神日本法也經驗後方治肺毒瘡如大風疾緑雲散以桑葉好者淨洗過熟蒸一宿候曬乾曝為末水調二錢匕服又方墜馬拗損以桑根白皮五斤為末水一升煎成膏敷於損處便止以後亦無宿血終不發動廣利方治瀉血不止桑耳一大兩熬令黑以水一大升三合煎取六大合去滓空心分溫三服又方治蛇咬瘡桑樹白皮汁敷之瘥又方治金瘡取新桑白皮燒灰和馬糞塗瘡上數易之勝金方治小兒渴用桑葉不拘多少用生蜜逐葉上敷過將線系葉蒂上繃陰乾細切用水煎汁服之瘥錢相公篋中方治蜈蚣及蜘蛛毒取桑白皮汁敷之效子母祕録治落胎下血不止以桑木中蠍蟲燒末酒服方寸匕日二服又方小兒重舌桑白皮煮汁塗乳飲之又方小兒鵝口桑白皮汁和胡粉敷之楊氏産乳凡子不得與桑椹子食令兒心寒宮氣方治小兒舌上生瘡如粥皮桑白皮汁敷之三兩度瘥仙方桑椹熟時收之曬乾為末蜜和丸桐子大空心酒服四十丸長服之良史記桑樹根旁行出地者各為伏蛇治心痛一絶本經云桑根出土者殺人此用治心痛宜更研訪毛詩泮水篇云食我桑椹懷我好音氓詩無食桑椹注椹桑實也食過則醉傷其性丹房鏡源桑灰結汞衍義曰桑根白皮條中言桑之用稍備然獨遺烏椹桑之精英盡在於此採摘微研以布濾去滓石器中熬成稀膏量多少入蜜再熬成稠膏貯瓷器中每抄一二錢食後夜臥以沸湯點服治服金石發熱渴生精神及小腸熱性微涼竹葉䈽音謹竹葉味苦平大寒無毒主咳逆上氣溢筋急惡瘍殺小蟲除煩熱風痙喉痹嘔吐根作湯益氣止渴補虛下氣消毒汁主風痓實通神明輕身益氣生益州淡竹葉味辛平大寒主胸中痰熱咳逆上氣瀝大寒療暴中風風痹胸中大熱止煩悶皮茹微寒主嘔啘溫氣寒熱吐血崩中溢筋苦竹葉及瀝療口瘡目痛明目利九竅竹筍蜀本作諸筍味甘無毒主消渴利水道益氣可久食陶隱居云竹類甚多此前一條云是䈽竹次用淡苦爾又一種薄殼者名甘竹葉最勝又有實中竹篁竹並以筍為佳於藥無用凡取竹瀝唯用淡苦䈽竹爾竹實出藍田舀而無實而頃來斑斑有實狀如小麥堪可為飯今按陳藏器本草云苦竹筍主不睡去面目並舌上熱黃消渴明目解酒毒除熱氣健人諸筍皆發冷血及氣淡竹根煮取汁主丹石發熱渴除煩熱臣禹錫等謹按藥性論云淡竹葉味甘無毒主吐血熱毒風壓丹石毒止消渴竹燒瀝治卒中風失音不語苦者治眼赤又云青竹茹使味甘能止肺痿唾血鼻衄治五痔日華子云淡竹並根味甘冷無毒消痰治熱狂煩悶中風失音不語壯熱頭痛頭風並懷妊人頭旋倒地止驚悸溫疫迷悶小兒驚癇天吊莖葉同用又云苦竹味苦冷無毒治不睡止消渴解酒毒除煩熱發汗治中風失音作瀝功用與淡竹同孟詵云筍寒主逆氣除煩熱動氣發冷症不可多食越有蘆及箭筍新者稍可食陳者不可食其淡竹及中母筍雖美然發背悶腳氣又云慈竹瀝療熱風和食飲服之良蜀本圖經云竹節間黃白者味甘名竹黃尤制石藥毒發熱圖經曰䈽竹淡竹苦竹本經並不載所出州土今處處有之竹之類甚多而入藥者唯此三種人多不能盡別謹按竹譜䈽字音斤其竹堅而促節體圓而質徑皮白如霜大者宜刺船細者可為笛苦竹有白有紫甘竹似篁而茂即淡竹也然今之刺船者多用桂竹作笛者有一種亦不名䈽竹苦竹亦有二種一種出江西及閩中本極粗大筍味殊苦不可啖一種出江浙近地亦時有肉厚而葉長闊筍微有苦味俗呼甜苦筍食品所最貴者亦不聞入藥用淡竹肉薄節間有粉南人以燒竹瀝者醫家只用此一品與竹譜所説大同而小異也竹實今不復用亦稀有之陳藏器序久渴心煩服竹瀝食療淡竹上甘竹次主咳逆消渴痰飲喉痹鬼疰惡氣殺小蟲除煩熱苦竹葉主口瘡目熱喑啞苦竹茹主下熱壅苦竹根細銼一斤水五升煮取汁一升分三服大下心肺五臟熱毒氣苦筍不發痰淡竹瀝大寒主中風大熱煩悶勞復淡竹茹主噎膈鼻衄竹實通神明輕身益氣䈽淡苦甘外余皆不堪不宜人外臺祕要療凡脫折折骨諸瘡腫者慎不可當風及多自扇若中風則發痓口噤殺人若已中風覺頸項強身中急速者急服此方竹瀝飲二三升若已口噤以物強發納之忌冷飲食及酒竹瀝卒煩難得可合十許束並燒中央承取投之可活千金方凡飲酒頭痛以竹茹三兩水五升煮取三升去滓令冷納破雞子三枚攪調更煮三沸飲之又方治齒齦間津液血出不止苦竹茹四兩以酢漬一宿含之又方治齒間血出以竹葉濃煮與鹽少許寒溫得所含之又方齒血不止刮生竹皮酢漬之令其人解衣乃別令一人含噀其背上三過並取茗草濃煮汁適寒溫含嗽之瘥又方治時氣五六日心神煩躁不解用竹瀝半盞新水半盞相和令勻非時服肘後方治霍亂轉筋心腹脹痛濃煮竹葉湯五六升令灼已轉筋處又方傷寒五六日以上者作青竹瀝小煎令減數數飲之厚覆取汗又方卒失聲聲噎不出濃煮苦竹葉服之又方小兒身中惡瘡煮取竹汁日澡洗葛氏方卒消渴小便多作竹瀝恣飲數日愈孫真人食忌卒得惡瘡不識者燒苦竹葉和雞子黃敷梅師方治産後身或強直口噤面青手足強反張飲竹瀝一二升醒又方主妊娠恆若煩悶此名子煩竹瀝湯茯苓三兩竹瀝一升水四升合竹瀝煎取二升分三服不瘥重作亦時時服竹瀝又方治目赤眥痛如刺不得開肝實熱所致或生障翳苦竹瀝五合黃連二分綿裹入竹瀝內浸一宿以點目中數度令熱淚出食醫心鏡理心煩悶益氣方止渴苦筍熟煮任性食之又苦竹筍主消渴利水道下氣理風熱腳氣取蒸煮食之又䈽竹筍主消渴風熱益氣力發氣脹蒸煮炒任食簡要濟衆頭瘡大筍竹葉燒為灰量瘡大小用灰調生油敷入少膩粉佳兵部手集治發背頭未成瘡及諸熱腫痛以青竹筒角之及掘地作坑貯水臥以腫處就坑子上角之如緑豆大戢戢然出不止遍匝腰肋又方治瘡慈竹筍籜灰油和塗之妙又方治中風口噤服淡竹瀝一升又方治湯火灼爛竹中蟲蚛末敷之良又方小兒口噤體熱者竹瀝二合暖之分三四服兒新生慎不可逆加針灸忍痛動其五脈因之成癇是以田舍小兒任其自然皆無此疾可審之又方治小兒大人咳逆短氣胸中吸吸咳出涕唾嗽出臭膿涕黏淡竹瀝一合服日三五服大人一升廣利方治金瘡中風口噤欲死竹瀝半大升微微暖服之姚氏方卒齒痛取苦竹燒一頭一頭得汁多揩齒上瘥傷寒類要治交接勞復卵腫腹中絞痛便欲死刮竹皮一升以水三升煮五沸絞去滓頓服梅師方同子母祕録治胎動取甘竹根煮汁服又方安胎取竹瀝服之又方治妊娠八月九月若墮樹或牛馬驚傷得心痛青竹茹五兩切以酒一升煎取五合頓服不瘥再服之又方小兒癇刮青竹茹三兩醋三升煎一升去滓服一合兼治小兒口噤體熱病又方小兒頭瘡耳上生瘡竹葉燒末和豬脂塗上又以雞子白敷之亦妙産書治妊娠誤有失墜忽推築著疼痛新青竹茹二合以好酒一升煮茹三五沸分作三度服産寶治妊娠因夫所動困絶以竹瀝飲一升立愈又方治産後血氣暴虛汗出淡竹瀝三合微暖服之須臾再服楊氏産乳療瘡疥燒竹葉為末以雞子白和之塗上不過三四次立瘥又方妊娠苦煩此子煩故也竹瀝不限多少細細服之又方療胎動安胎方甜竹根煮取濃汁飲之姚和衆小孩夜後狂語竹瀝每一歲兒連夜二合服令盡之李畋該聞集云爆竹闢妖氣鄰人有仲叟家為山魈所祟擲瓦石開戶牖不自安叟求禱之以佛經報謝而妖祟彌盛畋謂其叟曰翁旦夜於庭落中若除夕爆竹數十竿叟然其言爆竹至曉寂然安帖遂止別説云謹按舊稱竹實鸞鳳所食今近道竹間時見開花小白如棗花亦結實如小麥子無氣味而澀江浙人號為竹米以為荒年之兆及其竹即死信非鸞鳳之所食也近有江南余千人來言彼有竹實大如雞子竹葉層層包裹味甘勝蜜食之令人心膈清涼生深竹林茂盛蒙密處頃因得之但日以汁枯乾而味尚存爾因知鸞鳳之食必非常食物也衍義曰竹葉凡諸竹與筍性皆微寒故知葉其用一致本經不言筍及苦竹性若取瀝作油亦不必強擇也張仲景竹葉湯用淡竹筍難化不益脾鄰家一小兒方二歲偶失照管壯熱喘粗不食多睡仰頭呻吟微嘔逆瞑目多驚凡三五日醫作慢驚治之治不對病不愈忽然其母誤將有巴豆食藥作驚藥化五丸如麻子大灌之良久大吐有物噎於喉中乳媼以指摘出之約長三寸粗如小指乃三日前臨階曝者干箭筍是夜諸證皆定次日但以和氣藥調治遂安其難化也如此經曰問而知之者謂之工小兒不能問故為難治醫者當審慎也吳茱萸味辛溫大熱有小毒主溫中下氣止痛咳逆寒熱除濕血痹逐風邪開腠理去痰冷腹內絞痛諸冷實不消中惡心腹痛逆氣利五臟根殺三蟲根白皮殺蟯蟲治喉痹咳逆止泄注食不消女子經産余血療白癬一名藙生上谷川谷及冤句九月九日採陰乾蓼實為之使惡丹參硝石白堊畏紫石英陶隱居云禮記名藙而俗中呼為蔱音殺子當是不識藙字似蔱字仍以相傳其根南行東行者為勝道家去三尸方亦用之唐本注云爾雅釋木云椒𦬣醜梂陸氏草木疏云椒𦬣屬亦有𦬣名陶誤也臣禹錫等謹按藥性論吳茱萸味苦辛大熱有毒能主心腹疾積冷心下結氣疰心痛治霍亂轉筋胃中冷氣吐瀉腹痛不可勝忍者可愈療遍身𤸷痹冷食不消利大腸擁氣削皮能療漆瘡主中惡腹中刺痛下痢不禁治寸白蟲博雅云栲𦬣檔越椒茱萸也栲音考孟詵云茱萸主心痛下氣除嘔逆臟冷又皮止齒痛又患風瘙癢痛者取茱萸一升清酒五升和煮取一升半去滓以汁暖洗中賊風口偏不能語者取茱萸一升清酒一升和煮四五沸冷服之半升日三服得少汗瘥謹按殺鬼疰氣又開目者不堪食又魚骨在人腹中刺痛煮一盞汁服之止又骨在肉中不出者嚼封之骨當爛出腳氣衝心可和生薑汁飲之甚良日華子云健脾通關節治霍亂瀉痢消痰破症癖逐風治腹痛腎氣腳氣水腫下産後余血又云茱萸葉熱無毒治霍亂下氣止心腹痛冷氣內外腎釣痛鹽研罯神驗干即又浸復罯霍亂腳筋和艾以醋湯拌罯妙也陳藏器云梂子根濃煮浸痔有驗燒末服亦主痔病又爾雅云櫟實梂也其子房生為梂又赤爪草一名羊梂一名鼠查球此乃名同耳梂似小楂而赤人食之生高原圖經曰吳茱萸生上谷川谷及冤句今處處有之江浙蜀漢尤多木高丈餘皮青緑色葉似椿而闊厚紫色三月開花紅紫色七月八月結實似椒子嫩時微黃至成熟則深紫九月九日採陰乾風土記曰俗尚九月九日謂為上九茱萸到此日氣烈熟色赤可折其房以插頭云辟惡氣御冬又續齊諧記曰汝南桓景隨費長房學長房謂曰九月九日汝家有災厄宜令急去家各作絳囊盛茱萸以係臂上登高飲菊花酒此禍可消景如言舉家登高山夕還見雞犬牛羊一時暴死長房聞之曰此代之矣故世人每至此日登高飲酒戴茱萸囊由此耳世傳茱萸氣好上言其沖膈不可為服食之藥也張仲景治嘔而胸滿者茱萸湯主之吳茱萸一升棗二十枚生薑一大兩人參一兩以水五升煎取三升每服七合日三乾嘔吐涎沫而頭痛者亦主之又其南行枝主大小便卒關格不通取之斷度如手第二指中節含之立下出姚僧垣方根亦入藥用刪繁方療脾勞熱有白蟲在脾中為病令人好嘔者取東行茱萸根大者一尺大麻子八升桔皮二兩凡三物㕮咀以酒一斗浸一宿微火上薄暖之三下絞去滓平旦空腹服一升取盡蟲便下出或死或半爛或下黃汁凡作藥法禁聲勿語道作藥蟲便下驗雷公云凡使先去葉核並雜物了用大盆一口使鹽水洗一百轉自然無涎曬乾任入丸散中用修事十兩用鹽二兩研作末投東流水四斗中分作一百度洗別有大效若用醋煮即先沸醋三十餘沸後入茱萸特醋盡曬乾每用十兩使醋一溢為度食療微溫主痢止瀉厚腸胃肥健人不宜多食聖惠方治陰毒傷寒四肢逆冷宜尉茱萸一升酒和勻濕絹袋二隻盛蒸令極熱尉腳心候氣通暢勻暖即停尉纍用驗外臺祕要集驗尉症法茱萸三升碎之以酒和煮熟布裹尉症上冷更炒更番用之症移走逐尉之候消乃止也又方治癰疽發背及髮乳房茱萸一升搗之以苦酒和貼癰上又方陰下濕癢茱萸一升水三升煮三沸去滓洗癢瘥千金方治寸白蟲茱萸根洗去土四兩切以水酒各一升漬一宿平旦分再服凡茱萸皆用細根東北陰者良若稍大如指以上者皆不任用又方治心腹內外痛茱萸一升酒三升煎取半升空心頓服之千金翼産後虛羸盜汗時嗇嗇惡寒茱萸一雞子大以酒三升漬半日煮服又方主大人小兒風疹茱萸一升酒五升煮取一升帛染拭之又方主頭風沐頭茱萸二升水五升煮取三升以綿染拭髮根良肘後方治中風不能語豉茱萸各一升水五升煮取二升稍稍服之又方治腸痔大便常血下部癢痛如蟲咬者掘地作坑燒令赤酒沃中搗茱萸二升納中乘熱板開小孔以下部榻上冷乃下不過三四度即瘥孫真人備急方赤痢臍下痛茱萸一合黑豆湯吞之效經驗方治脾元氣發歇痛不可忍者茱萸一兩桃仁一兩和炒令茱萸焦黑後去茱萸取桃仁去皮尖研細蔥白三莖煨熟以酒浸溫分三服經驗後方補水氣藥赤茱萸二兩米醋煮爛細研為膏丸如梧桐子大椒湯下七丸空心服兵部手集治醋心每醋氣上攻如釅醋茱萸一合水三盞煎七分頓服縱濃亦須強服近有人心如蜇破服此方後二十年不發又方治中風腹痛或子腸脫出茱萸三升酒五升煎取二升分溫三服又方小兒火灼瘡一名瘭漿瘡一名火爛瘡用酒煎茱萸拭上楊氏産乳療中惡心痛吳茱萸五合以酒三升煮三沸分三服衍義曰吳茱萸須深湯中浸去苦烈汁凡六七過始可用今文與注及注中藥法皆不言亦漏落也此物下氣最速腸虛人服之愈甚檳榔味辛溫無毒主消穀逐水除痰癖殺三蟲伏尸療寸白生南海陶隱居云此有三四種出交州形小而味甘廣州以南者形大而味澀核亦有大者名豬檳榔作藥皆用之又小者南人名蒳子俗人呼為檳榔孫亦可食唐本注云檳榔生者極大停數日便爛今人北來者皆先灰汁煮熟仍火熏使干始堪停久其中仁主腹脹生搗末服利水穀道敷瘡生肌肉止痛燒為灰主口吻白瘡生交州愛州及崑崙臣禹錫等謹按藥性論云白檳榔君味甘大寒能主宣利五臟六腑擁滯破堅滿氣下水腫治心痛風血積聚廣志云木實白檳榔樹無枝略如柱其顛生檖而秀生棘針重疊其下彼方珍之以為口實陳藏器云蒳子小檳榔也生收火干中無人者功劣於檳榔顧徵廣州記云山檳榔形小而耎細蒳子土人呼為檳榔孫日華子云檳榔味澀除一切風下一切氣通關節利九竅補五勞七傷健脾調中除煩破癥結下五膈氣南海藥論云檳榔仁赤者味苦殺蟲兼補圖經曰檳榔生南海今嶺外州郡皆有之大如桄榔而高五七丈正直無枝皮似青桐節如桂竹葉生木巔大如楯頭又似甘蕉葉其實作房從葉中出旁有刺若棘針重疊其下一房數百實如雞子狀皆有皮殼肉滿殼中正白味苦澀得扶留藤與瓦屋子灰同咀嚼之則柔滑而甘美嶺南人啖之以當果實其俗云南方地溫不食此無以祛瘴癘其實春生至夏乃熟然其肉極易爛欲收之皆先以灰汁煮熟仍火焙熏干始堪停久此有三四種有小而味甘者名山檳榔有大而味澀核亦大者名豬檳榔最小者名蒳子其功用不説有別又云尖長而有紫紋者名檳圓而矮者名榔檳力小榔力大今醫家不復細分但取作雞心狀有坐正穩心不虛破之作錦紋者為佳其大腹所出與檳榔相似但莖葉根干小異並皮收之謂之大腹檳榔或云檳榔難得真者今賈人貨者多大腹也海藥謹按廣志云生東海諸國樹莖葉根干與大腹小異耳又云如棕櫚也葉茜似芭蕉狀隱弘景雲向陽曰檳榔向陰曰大腹味澀溫無毒主賁豚諸氣五膈氣風冷氣宿食不消腳氣論云以沙牛尿一盞磨一枚空心暖服治腳氣壅毒水腫浮氣秦醫云檳榔二枚一生一熟搗末酒煎服之善治膀胱諸氣也食療多食發熱南人生食閩中名橄欖子所來北者煮熟熏干將來雷公云凡使取好存坐穩心堅紋如流水碎破內紋如錦紋者妙半白半黑並心虛者不入藥用凡使須別檳與榔頭圓身形矮眥者是榔身形尖紫紋粗者是檳檳力小榔力大欲使先以刀刮去底細切勿經火恐無力效若熟使不如不用聖惠方治口吻生白瘡用二枚燒灰細研敷之妙又方治胎動腰痛搶心或有血下用一兩為末非時水煮蔥白濃汁調下一錢匕外臺祕要若腳氣非冷非熱老人弱人脹滿者檳榔仁為末以檳榔殼汁或茶飲或豉汁中調服方寸匕甚利經驗方治金瘡白檳榔黃連少許為末敷之即瘥梅師方治醋心檳榔四兩桔皮二兩細搗為散空心生蜜湯下方寸匕孫真人食忌治嘔吐以白檳一顆煨桔皮一分炙為末水一盞煎半盞服斗門方治腰重痛用檳榔為末酒下一錢又方治本藏氣以雞心檳榔小便濃磨半個服或用熱酒調一錢匕效簡要濟衆治諸蟲在臟腑久不瘥檳榔半兩炮搗為末每服一錢至二錢蔥蜜煎湯調下空心服又方治腳氣衝心白檳榔一個雞心大者為末用童子小便生薑汁溫酒共半盞調只作一服無時服廣利方治腳氣衝心致悶亂不識人白檳榔十二分為末分三服空心暖小便五大合調服日再服御藥院治痰涎檳榔為末白湯點一錢齊民要術檳榔下氣及宿食白蟲消穀痰飲衍義曰檳榔二書所説甚詳今人又取尖長者入藥言其快鋭速效屢嘗試之果如其説梔子味苦寒大寒無毒主五內邪氣胃中熱氣面赤酒疱渣鼻白癩赤癩瘡瘍療目熱赤痛胸心大小腸大熱心中煩悶胃中熱氣一名木丹一名越桃生南陽川穀九月採實曝乾陶隱居云解玉支毒處處有亦兩三種小異以七稜者為良經霜乃取之今皆入染用於藥甚稀玉支即羊躑躅也臣禹錫等謹按藥性論云山梔子殺蟅蟲毒去熱毒風利五淋主中惡通小便解五種黃病明目治時疾除熱及消渴口乾目赤腫病圖經曰梔子生南陽川穀今南方及西蜀州郡皆有之木高七八尺葉似李而厚硬又似樗蒲子二三月生白花花皆六出甚芬香俗説即西域詹匐也夏秋結實如訶子狀生青熟黃中仁深紅九月採實曝乾南方人競種以售利貨殖傳云卮茜千石亦比千乘之家言獲利之博也此亦有兩三種入藥者山梔子方書所謂越桃也皮薄而圓小刻房七稜至九稜為佳其大而長者乃作染色又謂之伏尸梔子不堪入藥用張仲景傷寒論及古今諸名醫治發黃皆用梔子茵陳香豉甘草等四物作湯飲又治大病起勞復皆用梔子鼠矢等湯並小利而愈其方極多不可悉載梔子亦療血痢挾毒熱下者葛洪方以十四枚去皮搗蜜丸服如梧子三丸日三大效又治霍亂轉筋燒梔子三枚末服立愈時行重病後勞發水煮十枚飲汁溫臥徹汗乃愈挾食加大黃別煮汁臨熟納之合飲微利遂瘥雷公云凡使勿用顆大者號曰伏尸梔子無力須要如雀腦並須長有九路赤色者上凡使先去皮須了取仁以甘草水浸一宿漉出焙乾搗篩如赤金末用食療主喑啞紫癜風黃疸積熱心躁又方治下鮮血梔子仁燒灰水和一錢匕服之量其大小多少服之千金方治火瘡未起梔子仁灰麻油和封厚乃佳已成瘡燒白糖灰粉之燥即瘥肘後方治霍亂心腹脹痛煩滿短氣未得吐下若轉筋燒梔子二七枚研末熟水調服梅師方治火丹毒搗和水調敷之又方治熱毒下血或因食物發動以三十枚擘水三升煎取一升去滓服又方治熱病新瘥早起及多食後發以十枚水三升煎取一升去滓溫服臥令微汗若食不消加大黃三兩又方治傷寒瘥後交接發動因欲死眼不開不能語梔子三十枚水三升煎取一升服又方治猘犬咬梔子皮燒末石硫黃等分同研為末敷瘡上日三二敷之瘥博濟方治冷熱氣不和不思飲食或腹痛㽱剌山梔子川烏頭等分生搗為末以酒糊丸如梧子大每服十五丸炒生薑湯下如小腹氣痛炒茴香蔥酒任下二十丸兵部手集治頭痛不可忍是多風痰所致梔子末和蜜濃敷舌上吐即止勝金方治婦人臨産痢不限多少燒灰細末空心熟水調一匙頭甚者不過五服孫尚藥治傷寒下痢後更煩按之心下耎者虛煩也梔子十四枚擘豉四合上二味以水四升煎梔子取二升半內豉更煎取一升去滓分再服得吐余勿服嘔有癰膿者膿者不可服嘔膿盡乃愈古今録驗秦王散胃疸食多喜飲梔子實主之丹房鏡源梔子柔金衍義曰梔子仲景治發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯治之虛故不用大黃有寒毒故也梔子雖寒無毒治胃中熱氣既亡血亡津液腑臟無潤養內生虛熱非此物不可去張仲景傷寒論已著又治心經留熱小便赤澀去皮山梔子火炮大黃連翹甘草炙等分末之水煎三二錢匕服之無不效紫礦騏驎竭味甘咸平有小毒主五臟邪氣帶下止痛破積血金瘡生肉與騏驎竭二物大同小異唐本注云紫色如膠作赤麖音京皮及寶鈿用為假色亦以膠寶物云蟻於海畔樹藤皮中為之紫礦樹名渴廩騏驎竭樹名渴留喻如蜂造蜜斫取用之吳録謂之赤膠者今按別本注云紫礦騏驎竭二物同條功效全別紫礦色赤而黑其葉大如盤礦從葉上出騏驎竭色黃而赤味鹹平無毒主心腹卒痛止金瘡血生肌肉除邪氣葉如櫻桃三角成竭從木中出如松脂唐本先附玉石部今移臣禹錫等謹按日華子云紫礦無毒治驢馬蹄漏可熔補又云騏驎竭暖無毒得密陀僧良治一切惡瘡疥癬久不合者敷此藥性急亦不可多使卻引膿圖經曰騏驎竭舊不載所生州土今出南蕃諸國及廣州木高數丈婆娑可愛葉似櫻桃而有三角其脂液從木中流出滴下如膠飴狀久而堅凝乃成竭赤作血色故亦謂之血竭採無時其味鹹而氣腥者是海母血不可用真竭微咸而甘作梔子氣味舊説與紫礦大都相類而別是一物功力亦殊今按段成式酉陽雜俎云紫礦出真臘國國人呼為勒佉亦出波斯國木高丈許枝幹繁郁葉似桔柚冬不凋落三月花開不結子每有霧露微雨沾濡其枝條則為紫礦波斯國使人呼及沙利兩人説如此而真臘國使人言是蟻運土上於木端作窠蟻壤為霧露所沾即化為紫礦又交州地志亦云本州歲貢紫礦出於蟻壤乃知與血竭雖俱出於木而非一物明矣今醫方亦罕用唯染家所須耳海藥紫礦謹按廣州記云生南海山谷其樹紫赤色是木中津液成也治濕癢瘡疥宜入膏用又可造胡燕脂余滓則主作家使也又騏驎竭謹按南越志云是紫礦樹之脂也其味甘溫無毒主打傷折損一切疼痛補虛及血氣攪刺內傷血聚並宜酒服欲驗真偽但嚼之不爛如蠟者上也雷公云騏驎竭凡使勿用海母血真似騏驎竭只是味鹹並腥氣其騏驎竭味微咸甘似梔子氣是也欲使先研作粉重篩過臨使安於丸散或膏中任使用勿與衆藥同搗化作飛塵也聖惠方産後血暈不知人及狂語麟竭一兩細研為末非時溫酒調二錢匕廣利方治金瘡血不止兼痛麟竭末敷之立止賈相牛經牛馬有漏蹄以紫礦少許和豬脂內入漏處燒鐵篦烙之酉陽雜俎紫礦樹出真臘國使沖都尉沙門陀沙尼拔陀陀言蟻運土於樹下作窠蟻壤得雨露結而成紫礦崑崙者善波斯次太清伏煉靈砂法騏麟竭出於西胡稟於熒惑之氣生於湯石之陰結而成質紫礦形若爛石其功亦能添益陽精消陰滯氣衍義曰紫礦如糖霜結於細枝上纍纍然紫黑色研破則紅今人用造綿煙脂邇來亦難得余如經龍腦香及膏香味辛苦微寒一云溫平無毒主心腹邪氣風濕積聚耳聾明目去日赤膚翳出婆律國形似白松脂作杉木氣明淨者善久經風日或如雀屎者不佳云合糯一作粳米炭相思子貯之則不耗膏主耳聾唐本注云樹形似杉木言婆律膏是樹根下清脂龍腦是根中干脂子似豆蔻皮有錯甲香似龍腦味辛尤下惡氣消食散脹滿香人口舊云出婆律國藥以國為名即杉脂也江南有杉木未經試或方土無脂猶甘蕉無實唐本先附臣禹錫等謹按段成式酉陽雜俎云龍腦香樹出婆利國呼為個不婆律亦出波斯國樹高八丈大可六七圍葉圓而背白無花實其樹有肥有瘦瘦者出龍腦香肥者出婆律膏香在木心中波斯斷其樹剪取之其膏於樹端流出斫樹作坎而承之入藥用有別法南海藥譜云龍腦油性溫味苦本出佛誓國此油從樹所取摩一切風陳藏器云相思子平有小毒通九竅治心腹氣令人香止熱悶頭痛風痰殺腹臟及皮膚內一切蟲又主蠱毒取二七枚末服當吐出生嶺南樹高丈餘子赤黑間者佳圖經曰龍腦香出婆律國今唯南海番舶賈客貨之相傳云其木高七八丈大可六七圍如積年杉木狀旁生枝葉正圓而背白結實如豆蔻皮有甲錯香即木中脂似白松脂作杉木氣膏乃根下清液耳亦謂之婆律膏段成式酉陽雜俎説此木有肥瘦瘦者出龍腦香其香在木心波斯斷其木剪取之肥者出婆律膏其膏於木端流出斫木作坎而承之兩説大同而小異亦云南海山中亦有此木唐天寶中交趾貢龍腦皆如蟬蠶之形彼人云老根節方有之然極難得時禁中呼為瑞龍腦帶之衣襟香聞十餘步外是後不聞有此今海南龍腦多用火成片其中亦容雜偽入藥唯貴生者狀若梅花瓣甚佳也海藥謹按陶弘景雲生西海律國是波津樹中脂也如白膠香狀味苦辛微溫無毒主內外障眼三蟲治五痔明目鎮心祕精又有蒼龍腦主風瘡皯𪒟入膏煎良用點眼則有傷名醫別録云婦人難産取龍腦研末少許以新汲水調服立瘥又唐太宗時西海律國貢龍腦香是知彼處出耳經驗方治急中風目瞑牙噤無門下藥者以中指點散子揩齒三二十揩大牙左右其口自開始得下藥龍腦天南星等分為末乳鉢內研自五月五日午時合出者只用一字至半錢名開關散經驗後方治時疾發豌豆瘡及赤瘡子未透心煩狂躁氣喘妄語或見鬼神龍腦一錢細研旋滴豬心血和丸如雞頭肉大每服一丸紫草湯下少時心神便定得睡瘡復發透依常將息取安衍義曰龍腦條中與圖經所説各未盡此物大通利關膈熱塞其清香為百藥之先大人小兒風涎閉壅及暴得驚熱甚濟用然非常服之藥獨行則勢弱佐使則有功於茶亦相宜多則掩茶氣味萬物中香無出其右者西主抹羅短吒國在南印度境有羯布羅香干如松株葉異濕時無香採干之後折之中有香狀類雲母色如冰雪此龍腦香也蓋西方亦有食茱萸味辛苦大熱無毒功用與吳茱萸同少為劣爾療水氣用之乃佳唐本注云皮薄開口者是雖名為食茱萸而不堪多啖之也今按顆粒大經久色黃黑乃是食茱萸顆粒緊小久色青緑即是吳茱萸今按陳藏器本草云食茱萸殺鬼魅及惡蟲毒起陽殺牙齒蟲痛唐本先附臣禹錫等謹按藥性論云食茱萸畏紫石英治冷痹腰腳軟弱通身刺痛腸風痔疾殺腸中三蟲去虛冷陳藏器云樹皮殺牙齒蟲止痛本經已有吳茱萸云是口折者且茱萸南北總有以吳地為好所以有吳之名兩處俱堪入食若充藥用要取吳者只可言漢之與吳豈得云食與不食其口拆者是曬乾不拆者是陰乾本經云吳茱萸又云生宛朐宛朐既非吳地以此為食者耳蘇重出一條圖經曰食茱萸舊不載所出州土云功用與吳茱萸同或云即茱萸中顆粒大經久色黃黑堪啖者是今南北皆有之其木亦甚高大有長及百尺者枝莖青黃上有小白點葉正類油麻花黃蜀人呼其子為艾子蓋禮記所謂藙者藙艾聲訛故云耳宜入食羹中能發辛香然不可多食多食沖眼兼又脫髮採無時食療溫主心腹冷氣痛中惡除咳逆去臟腑冷能溫中甚良又齒痛酒煎含之又殺鬼毒中賊風口偏不語者取子一升美豉三升以好酒五升和煮四五沸冷服半升日三四服得汗便瘥又皮肉癢痛酒二升水開升茱萸子半升煎取三升去滓微暖洗之立止又魚骨在腹中刺痛煮汁一盞服之其骨軟出又腳氣衝心和生薑煮汁飲之又魚骨刺入肉不出者搗封之其骨自爛而出又閉目者名檔子不堪食孫真人食忌云六月七月勿食傷人氣發瘡痍勝金方治蛇咬毒茱萸一兩為末冷水調分為三服立瘥蕪荑味辛平無毒主五內邪氣散皮膚骨節中淫淫溫行毒去三蟲化食逐寸白散腸中嗢嗢喘息一名無姑一名𦽄音殿䕋音唐生晉山川谷三月採實陰乾陶隱居云今唯出高麗狀如榆蘋氣臭如𤜢音信彼人皆以作醬食之性殺蟲置物中亦闢蛀但患其臭唐本注云爾雅云蕪荑一名蔱蘠今名𦽄䕋字之誤也今延州同州者最好今注蕪荑河東河西處處有之況經云生晉山川穀而陶以為唯出高麗蓋是不知其元也臣禹錫等謹按爾雅釋木云無姑其實夷注無姑姑榆也生山中葉圓而厚剝取皮合漬之其味辛香所謂蕪荑藥性論云蕪荑使味苦辛能主積冷氣心腹症痛除肌膚節中風淫淫如蟲行孟詵云主五臟皮膚肢節邪氣又熱瘡搗和豬脂塗瘥又和白蜜治濕癬和沙牛酪療一切瘡陳者良可少食之傷多發熱心痛為辛故也秋天食之尤宜人長食治五痔諸病不生日華子云治腸風痔瘻惡瘡疥癬圖經曰蕪荑生晉川山谷今近道亦有之大抵榆類而差小其實亦早成此榆乃大氣臭如𤜢爾雅釋木云無姑其實夷郭璞云無姑姑榆也生山中葉圓而厚剝取皮合漬之其味辛香所謂蕪荑也又釋草云莁荑蔱蘠注云一名白蕢而與本經一名𦽄音殿䕋音唐相近蘇恭云蔱蘠𦽄䕋字這誤也然莁荑草類無荑乃木也明是二物或氣類之相近歟三月採實陰乾殺蟲方中多用之今人又多取作屑以芼五味其用陳者良人收藏之多以鹽漬則失氣味此等不堪入藥但可作食品耳秋後尤宜食之續傳信方治久患脾胃氣泄不止蕪荑五兩搗末以飯丸每日空心午飯前各用陳米飲下三十丸增至四十丸久服去三尸益神駐顏云得之章鐐曾得力陳藏器作醬食之主五雞病除瘡癬其氣膻者良此山榆仁也海藥謹按廣州記云生大秦國是波斯蕪荑也味辛溫無毒治冷痢心氣殺蟲止痛又婦人子宮風虛孩子疳瀉得訶子豆蔻良食療散腹中氣痛又和馬酪可治癬作醬甚香美功尤勝於榆仁塵者良又殺中惡蟲毒外臺祕要治膀胱氣急宜下氣蕪荑搗和食鹽末二物等分以綿裹如棗大納下部或下水惡汁並下氣佳千金方主脾胃有蟲食即痛面黃無色疼痛無時必效以石州蕪荑仁二兩和麵炒令黃色為末非時米飲調二錢匕瘥衍義曰蕪荑有大小兩種小蕪荑即榆莢也揉取仁醞為醬味尤辛入藥當用大蕪荑別有種然小蕪荑醞造多假以外物相和不可不擇去也治大腸寒滑及多冷氣不可缺也枳殼味苦酸微寒無毒主風癢麻痹通利關節勞氣咳嗽背膊悶倦散留結胸膈痰滯逐水消脹滿大腸風安胃止風痛生商州川穀九月十月採陰乾用當去瓤核乃佳此與枳實主療稍別故特出此條今附臣禹錫等謹按藥性論云枳殼使味苦辛治遍身風疹肌中如麻豆惡癢主腸風痔疾心腹結氣兩脅脹虛關膈擁塞根浸酒煎含治齒痛消痰有氣加而用之日華子云健脾開胃調五臟下氣止嘔逆消痰治反胃霍亂瀉痢消食破癥結痃癖五膈氣除風明目及肺氣水腫利大小腸皮膚癢痔腫可炙尉入藥浸軟銼炒令熟圖經文具枳實條下陳藏器云根皮主野雞病末服方寸匕本經採實用九月十月不如七月八月既厚且辛書曰江南為桔江北為枳今江南俱有枳桔江北有枳無桔此自別種非干變易也雷公云凡使勿使枳實緣性效不同若使枳殼取辛苦腥並有隟油能消一切𤸷要塵久年深者為上用時先去瓤以麩炒過待麩焦黑遂出用布拭上焦黑遂出用布拭上焦黑然後單搗如粉用千金方主口僻眼急風枳茹刮取上青為末欲至瓤上者得茹五升微火灼去濕氣以酒三升漬微火暖令得藥味遂性飲之肘後方治中風身直不得屈伸反復者刮枳樹皮一升酒三升漬一宿服五合至一升酒盡再作良食醫心鏡治水氣皮膚癢及明目枳殼一兩杵末如茶法煎呷之經驗後方治風疹癢不止以枳殼三兩麩炒微黃去瓤為末每服二錢非時水一中盞煎至六分去滓服梅師方治一切疹以水煮枳殼為煎塗之干即又塗之博濟方治遠年日近腸風下血不止枳殼燒成黑灰存性羊脛炭為末枳殼末五錢炭末三錢和勻用濃米飲一中盞調下空心服五更初一服如人行五里再服當日見效必效方尉痔痔頭出或痛不可忍枳殼於煻灰中煨熱微尉盡七枚立定發即尉之杜壬方瘦胎散昔胡陽公主難産方士進枳殼四兩甘草二兩為末每服空心大錢匕如茶點服自五月後一日一服至臨月不唯易産仍無胎中惡病忌登高廁衍義曰枳殼文具枳實條下枳實味苦酸寒微寒無毒主大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五臟益氣輕身除胸脅痰癖逐停水破結實消脹滿心下急痞痛逆氣脅風痛安胃氣止溏泄明目生河內川澤九月十月採陰乾陶隱居云今處處有採破令乾用之除中核微炙令香亦如桔皮以陳者為良枳樹莖及皮療水脹暴風骨節疼急枳實俗方多用道家不須唐本注云枳實曬乾乃得陰便濕爛也用當去核及中瓤乃佳今或用枳殼乃爾若稱枳實須合核瓤用者殊不然也今按陳藏器本草云枳實根皮主痔末服方寸匕本經採實用九月十月不如七月八月既厚且辛舊云江南為桔江北為枳今江南俱有枳桔江北有枳無桔此自是種別非關變也臣禹錫等謹按藥性論云枳實臣味苦辛解傷寒結胸入陷胸湯用主上氣喘咳腎內傷冷陰痿而有氣加而用之圖經曰枳實生河內川澤枳殼生商州川穀今京西江湖州郡皆有之以商州者為佳如桔而小高亦五七尺葉如棖多刺春生白花至秋成實九月十月採陰乾舊説七月八月採者為實九月十月採者為殼今醫家多以皮厚而小者為枳實完大者為殼皆以翻肚如盆口唇狀須陳久者為勝近道所出者俗呼臭桔不堪用張仲景治心下堅大如盤水飲所作枳實術湯主之枳實七枚術三兩以水一斗煎取三升分三服腹中軟即稍減之又胸痹心中痞堅留氣結胸胸滿脅下逆氣搶心枳實薤白桂湯主之陳枳實四枚厚朴四兩薤白半斤切栝蔞一枚桂一兩以水五升先煎枳實厚朴取二升去滓納余藥於湯中煎三兩沸分溫三服當愈又有桔皮枳實湯桂生薑枳實湯皆主胸痹心痛葛洪治卒胸痹痛單用枳實一物搗末方寸匕日三夜一其根皮治大便下血末服之亦可煮汁常飲又治卒中急風身直不得屈伸反復者刮取枳木皮屑謂之枳茹一升酒一升漬一宿服五合至盡再作良外臺祕要塗風疹取枳實以醋漬令濕火炙令熱適寒溫用尉上即消千金方治胸痹氣壅滿心膈不利枳實二兩麩炒微黃為末非時以清粥飲調下二錢聖惠方同又方治積痢脫肛枳實石上磨令滑鑽著柄蜜塗火炙令暖更易尉肛取縮即止經驗方治腸風下血枳實半斤麩炒去瓤綿黃耆半斤洗銼為末米飲非時下二錢匕若難服以糊丸湯下三五十丸效集驗方治五痔不以年月日久新枳實為末煉蜜丸如桐子大空心飲下二十丸濟衆方治傷寒後卒胸膈閉痛枳實一味銼麩炒黃為末服二錢米飲調下一日二服廣利方治小兒久痢淋瀝水穀不調枳實六分搗末以飲汁調二錢匕二歲服一錢子母祕録方同子母祕録治婦人陰腫堅痛用半斤碎炒令熟故帛裹尉冷即易之衍義曰枳實枳殼一物也小則其性酷而速大則其性詳而緩故張仲景治傷寒倉卒之病承氣湯中用枳實此其意也皆取其疏通決泄破結實之義他方但導敗風壅之氣可常服者故用枳殼其意如此厚朴味苦溫大溫無毒主中風傷寒頭痛寒熱驚悸氣血痹死肌去三蟲溫中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止泄痢淋露除驚去留熱心煩滿厚腸胃一名厚皮一名赤朴其樹名榛其子名逐折療鼠瘻明目益氣生交址冤句三九十月採皮陰乾乾薑為之使惡澤瀉寒水石硝石陶隱居云今出建平宜都極厚肉紫色為好殼薄而白者不如用之削去上甲錯皮俗方多用道家不須也今注出梓州龍州者最佳臣禹錫等謹按吳氏云厚朴神農歧伯雷公苦無毒季氏小溫範子厚朴出洪農藥性論云厚朴臣忌豆食之者動氣味苦辛大熱能主療積年冷氣腹內雷鳴虛吼宿食不消除痰飲去結水破宿血消化水穀止痛大溫胃氣嘔吐酸水主心腹滿病人虛而尿白日華子云健脾主反胃霍亂轉筋冷熱氣瀉膀胱泄五臟一切氣婦人産前産後腹臟不安調關節殺腹臟蟲除驚去煩悶明耳目入藥去粗皮薑汁炙或薑汁炒用又名烈朴圖經曰厚朴出交址冤句今京西陝西江淮湖南蜀川山谷中往往有之而以梓州龍州者為上木高三四丈徑一二尺春生葉如槲葉四季不凋紅花而青實皮極鱗皴而厚紫色多潤者佳薄而白者不堪三月九月十月採皮陰乾廣雅謂之重皮方書或作厚皮張仲景治雜病厚朴三物湯主腹脹脈數厚朴半斤枳實五枚以水一斗二升煎二物取五升納大黃四兩再煎取三升溫服一升腹中轉動更服不動勿服又厚朴七物湯主腹痛脹滿厚朴半斤甘草大黃各三兩棗十枚大枳實五枚桂二兩生薑五兩以水一斗煎取四升去滓溫服八合日三嘔者加半夏五合下利者去大黃寒多者加生薑至半斤陶隱居治霍亂厚朴湯厚朴四兩炙桂心二兩枳實五枚生薑三兩四物切以水六升煎取二升分三服唐石泉公王方慶廣南方云此方不唯霍亂可醫至於諸病皆療並須預排比也此方與治中湯等並行其方見人參條中雷公云凡使要用紫色味辛為好或丸散便去粗皮用酥炙過每修一斤用酥四兩炙了細銼用若湯飲中使用自然薑汁八兩炙一升為度聖惠方治霍亂制之以薑汁火上炙令香為末非時新水調下二錢匕佳又方治痰壅嘔逆心胸滿悶不下飲食用一兩塗生薑汁炙令黃為末非時粥飲調下二錢匕梅師方治水穀痢久不瘥厚朴三兩黃連三兩銼水三升煎取一升空心服斗門方治男子女人久患氣脹心悶飲食不得因食不調冷熱相擊致令心腹脹滿厚朴火上炙令乾又蘸薑汁炙直待焦黑為度搗篩如面以陳米飲調下二錢匕日三服良亦治反胃止瀉甚妙子母祕録治月水不通厚朴三兩炙水三升煎取一升為三服空心不過三四劑瘥衍義曰厚朴今西京伊陽縣及商州亦有但薄而色淡不如梓州者厚而紫色有油味苦不以薑製則棘人喉舌平胃散中用最調中至今此藥盛行既能溫脾胃氣又能走冷氣為世所須也茗苦𣗪茗味甘苦微寒無毒主瘻瘡利小便去痰熱渴令人少睡春採之苦𣗪主下氣消宿食作飲加茱萸蔥薑等良唐本注云爾雅釋木云檟苦𣗪注樹小似梔子冬生葉可煮作羹飲今呼早採者為茶晚取者為茗一名荈蜀人名之苦荼生山南漢中山谷今按陳藏器本草云茗苦𣗪寒破熱氣除瘴氣利大小腸食之宜熱冷即聚痰𣗪是茗嫩葉搗成餅並得火良久食令人瘦去人脂使不睡唐本先附圖經曰茗苦𣗪舊不著所出州郡今閩浙蜀荊江湖淮南山中皆有之爾雅所謂檟苦𣗪郭璞云木小似梔子冬生葉可煮作羹飲今呼早採者為荼晚取者為茗茗荈蜀人謂之苦荼是也今通謂之茶茶荼聲近故呼之春中始生嫩葉蒸焙去苦水末之乃可飲與古所食殊不同也茶經曰茶者南方佳木自一尺二尺至數十尺其巴川峽山有兩人合抱者伐而掇之木如爪蘆葉如梔子花如白薔薇實如栟櫚蒂如丁香根如胡桃其名一曰荼二曰檟三曰蔎音設四曰茗五曰荈又曰茶之別者有枳殼芽枸杞芽枇杷芽皆治風疾又有皂莢芽槐芽柳芽乃上春摘其芽和茶作之故今南人輸官茶往往雜以衆葉唯茅蘆竹箬之類不可入自余山中草木芽葉皆可和合椿柿尤奇真茶性極冷惟雅州蒙山出者溫而主疾茶譜云蒙山有五頂頂有茶園其中頂曰上清峰昔有僧人病冷且久遇一老父謂曰蒙之中頂茶當以春分之先後多構人力俟雷之發聲並手採摘三日而止若獲一兩以本處水煎服即能祛宿疾二兩當限前無疾三兩固以換骨四兩即為地仙矣其僧如説獲一兩餘服未盡而病瘥其四頂茶園採摘不廢唯中峰草木繁密雲霧蔽虧鷙獸時出故人迹不到矣近歲稍貴此品製作亦精於他處其性似不甚冷大都飲茶少則醒神思過多則致疾病故唐母景茶飲序云釋滯消壅一日之利暫佳瘠氣侵精終身之纍斯大是也食療云茗葉利大腸去熱解痰煮取汁用煮粥良又茶主下氣除好睡消宿食當日成者良蒸搗經宿用陳故者即動風發氣市人有用槐柳初生嫩芽雜之外臺祕要治卒頭痛如破非中冷非中風其病是胸膈有痰厥氣上衝所致名為厥頭痛吐之即瘥單煮茗作飲二三升適冷暖飲一二升須臾吐吐畢又飲能如此數過劇者須吐膽汁乃止不損人待渴即瘥食醫心鏡主赤白痢及熱毒痢好茶一斤炙搗末濃煎一二盞吃瘥如久患痢亦宜服又主氣壅暨腰痛轉動不得煎茶五合投醋二合頓服經驗方治陰囊上瘡用蠟麵茶為末先以甘草煎水洗後用貼妙兵部手集治心痛不可忍十年五年者煎湖州茶以頭醋和服之良勝金方治蠼螋尿人成瘡初如糝粟漸大如豆更大如火烙漿疱疼痛至甚速用草茶並蠟茶俱可以生油調敷上其痛藥至立止妙別説云謹按唐本注引爾雅云葉可作羹恐非此也其嫩者是今之茶芽經年者又老硬二者安可作羹是知恐非此圖經今閩浙蜀荊江湖淮南山中皆有之然則性類各異近世蔡襄蜜學所述極備閩中唯建州北苑數處産此性味獨與諸方略不同今亦獨名臘茶研治作餅日得火愈良其他者或為芽葉或為末收貯微若見火便更不可以收其色味皆敗唯鼎州一種芽茶其性味略類建州今京師及河北京西等處磨為末亦冒臘茶名者是也近人以建茶治傷暑合醋治泄瀉甚效則余者皆可比用信之其不同者多矣今建州上供品第備見茶經衍義曰茗苦𣗪今茶也其文有陸羽茶經丁謂北苑茶録毛文錫茶譜蔡宗顏茶山節對其説甚詳然古人謂其芽為雀舌麥顆言其至嫩也又有新牙一發便長寸余微粗如針唯牙長為上品其根干水土力皆有餘故也如雀舌麥顆又下品前人未盡識誤為品題唐人有言曰釋滯消壅一日之利暫佳斯言甚當飲茶者宜原其始終又晉溫嶠上表貢茶千斤茗三百斤郭璞曰早採為茶晚採為茗茗或曰荈尺充切葉老者也秦皮味苦微寒大寒無毒主風寒濕痹洗洗寒氣除熱目中青翳白膜療男子少精婦人帶下小兒癇身熱可作洗目湯久服頭不白輕身皮膚光澤肥大有子一名岑皮一名石檀生廬江川穀及冤句二月八月採皮陰乾大戟為之使惡吳茱萸陶隱居云俗是樊槻音規皮而水漬以和墨書色不脫微青且亦殊薄恐不必爾俗方唯以療目道家亦有用處唐本注云此樹似檀葉細皮有白點而不粗錯取皮水漬便碧色書紙看皆青色者是俗見味苦名為苦樹亦用皮療眼有效以葉似檀故名石檀也臣禹錫等謹按藥性論云秦白皮平惡苦瓠防葵主明目去肝中久熱兩目赤腫疼痛風淚不止治小兒身熱作湯浴瘥皮一升水煎澄清冷洗赤眼極效日華子云洗肝益精明目小兒熱驚皮膚風痹退熱一名盆桂圖經曰秦皮生廬江川穀及冤句今陝西州郡及河陽亦有之其木大都似檀枝幹皆青緑色葉如匙頭許大而不光並無花實根似槐根二月八月採皮陰乾其皮有白點而不粗錯俗呼為自樳木取皮漬水便碧色書紙看之青色此為真也外臺祕要治赤眼及睛上瘡秦皮一兩清水一升於白碗中浸春夏一食時以上看碧色出即以箸頭纏綿仰臥點所患眼仍先從大眥中滿眼著微痛不畏良久三五飯間即側臥瀝卻熱汁每日十度以上著不過兩日瘥又方治眼因赤瘥後翳暈秦皮一兩切水一升五合煮取七合澄清用漬目中淮南子梣木色青翳而羸痛蝸脘此皆治目之藥也注梣苦歷木水浸皮青用洗眼效沈存中秦皮治天蛇毒似癩而非癩也天蛇即草間黃花蜘蛛是也人補其螫仍為露水所濡乃成此疾遂煮汁一斗飲之瘥秦椒味辛溫生溫熟寒有毒主風邪氣溫中除寒痹堅齒髮明目療喉痹吐逆疝瘕去老血産後余疾腹痛出汗利五臟久服輕身好顏色耐老增年通神生太山川穀及秦嶺上或琅邪八月九月採實惡栝蔞防葵畏雌黃陶隱居云今從西來形似椒而大色黃黑味亦頗有椒氣或呼為大椒又云即今樛居虯切樹而樛子是豬椒恐謬唐本注云秦椒樹葉及莖子都似蜀椒但味短實細藍田南秦嶺間大有也臣禹錫等謹按範子計然云蜀椒出武都赤色者善秦椒出天水隴西細者善藥性論云秦椒君味苦辛能治惡風遍身四肢𤸷痹口齒浮腫搖動主女人月閉不通治産後惡血痢多年痢主生髮療腹中冷痛孟詵云秦椒溫滅瘢長毛去血若齒痛醋煎含之又損瘡中風者以面作餛飩灰中燒之使熱斷使口開封其瘡上冷即易之又法去閉口者水洗面拌煮作粥空腹吞之以飯壓之重者可再服以瘥為度圖經曰秦椒生泰山川穀及秦嶺上或琅邪今秦鳳及明越金商州皆有之初秋生花秋末結實九月十月採陶隱居云似椒而大色黃黑或呼大椒蘇恭云葉及莖子都似蜀椒但實細味短爾雅云檓大椒郭璞云椒叢生生實大者名為檓詩唐風云椒聊且陸機疏云椒似茱萸有針刺莖葉堅而滑蜀人作茶吳人作茗皆合煮其葉以為香今成皋諸山謂之竹葉椒其木亦如蜀椒少毒熱不中合藥可著飲食中又用蒸雞豚最佳東海諸島上亦有椒枝葉皆相似子長而不圓甚香其味似橘皮島上獐鹿食其葉其肉自然作椒橘香而今南北所生一種椒其實大於蜀椒與陶及郭陸之説正相合當以實大者為秦椒其云蜀吳作茶茗皆煮其葉今不復如此蓋古人所食與今異者多矣故苦𣗪與茶同條云作飲加茱萸蔥薑等良是也相傳椒可以來水銀又云椒氣好下言餌之益下不上衝也服食藥當用蜀椒肘後方手足心風腫椒鹽末等分醋和敷之良傷寒類要治膏疸其人飲少小便多方秦椒一分出汗瓜蒂二分末水服方寸匕日三服續十全方治蟲入耳椒末一錢醋半盞浸良久少少灌耳蟲自耳出衍義曰秦椒此秦地所實者故言秦椒大率椒株皆相似秦椒但葉差大椒粒亦大而紋低不若蜀椒皺紋高為異也然秦地亦有蜀種椒如此區別山茱萸味酸平微溫無毒主心下邪氣寒熱溫中逐寒濕痹去三蟲腸胃風邪寒熱疝瘕頭風風氣去來鼻塞目黃耳聾面皰溫中下氣出汗強陰益精安五臟通九竅止小便利久服輕身明目強力長年一名蜀棗一名雞足一名鬾音妓實生漢中山谷及琅邪冤句東海承縣九月十月採實陰乾蓼實為之使惡桔梗防風防己陶隱居云出近道諸山中大樹子初熟未乾赤色如胡蘈子亦可啖既干皮甚薄當以合核為有爾臣禹錫等謹按藥性論云山茱萸使味鹹辛大熱治腦骨痛止月水不定補腎氣興陽道堅長陰莖添精髓療耳鳴除面上瘡主能發汗止老人尿不節日華子云暖腰膝助水臟除一切風逐一切氣破癥結治酒渣陳藏器云胡蘈子熟赤酢澀小兒食之當果子止水痢生平林間樹高丈餘葉陰白冬不凋冬花春熟最早諸果莖及葉煮汁飼狗主瘑又有一種大相似冬凋春實夏熟人呼為木半夏無別功根平無毒根皮煎湯洗惡瘡疥並馬瘑瘡圖經曰山茱萸生漢中山谷及琅邪冤句東海承縣今海州亦有之木高丈餘葉似榆花白子初熟未乾赤色似胡蘈子有核亦可啖既干皮甚薄九月十月採實陰乾吳普云一名鼠矢葉如梅有刺毛二月花如杏四月實如酸棗赤五月採實與此小異也舊説當合核為用而雷斆炮炙論云子一斤去核取肉皮用只稱成四兩半其核八稜者名雀兒蘇別是一物不可用也雷公云凡使勿用雀兒蘇真似山茱萸只是核八稜不入藥用使山茱萸須去內核每修事去核了一斤取肉皮用只稱成四兩以來緩火熬之方用能壯元氣祕精核能滑精衍義曰山茱萸與吳茱萸甚不相類山茱萸色紅大如枸杞子吳茱萸如川椒初結子時其大小亦不過椒色正青得名則一治療又不同未審當日何緣如此命名然山茱萸補養腎臟無一不宜經與注所説備矣紫薇音威味酸微寒無毒主婦人産乳余疾崩中癥瘕血閉寒熱羸瘦養胎莖葉味苦無毒主痿蹶益氣一名陵苕一名蕟華生西海川穀及山陽陶隱居云李云是瞿麥根今方用至少博物志云郝晦行音杏華草於太行山北得紫薇華必當奇異今瞿麥華乃可愛而處處有不應乃在太行山且有樹其莖葉恐亦非瞿麥根詩云有苕之華郭云凌霄亦恐非也唐本注云此即凌霄花也及莖葉俱用按爾雅釋草云苕一名陵苕黃花蔈必曜切白華蕟郭云一名陵時又名凌霄本經云一名陵苕蕟華即用花不用根也山中亦有白花者按瞿麥花紅無黃白者且紫薇瞿麥皆本經所載若用瞿麥根為紫薇何得復用莖葉體性既與瞿麥乖異生處亦不相關郭云凌霄此為真説也臣禹錫等謹按藥性論云紫薇臣一名女薇畏滷咸味甘主熱風風癇大小便不利腸中結實止産後奔血不定淋瀝安胎日華子云根治熱風身癢遊風風疹治瘀血帶下花葉功用同又云凌霄花治酒渣熱毒風刺風婦人血膈遊風崩中帶下圖經曰紫薇陵霄花也生西海川穀及山陽今處處皆有多生山中人家園圃亦或種蒔初作藤蔓生依大木歲久延引至巔而有花其花黃赤夏中乃盛陶隱居云詩有苕之華郭云陵霄又蘇恭引爾雅釋草云苕陵苕郭云又名陵霄按今爾雅注苕一名陵時本草云而無陵霄之説豈古今所傳書有異同邪又據陸機及孔穎達疏義亦云苕一名陵時陵時乃是鼠尾草之別名郭又謂苕為陵時本草云今紫薇無陵時之名而鼠尾草有之乃知陶蘇所引是以陵時作陵霄耳又陵霄非是草類益可明其誤矣今醫家多采其花干之入婦人血崩風毒藥又治少女血熱風毒四肢皮膚生癮疹並行經脈方陵霄花不以多少搗羅為散每服二錢溫酒調下食前服甚效斗門方治暴耳聾凌霄葉爛杵自然汁灌耳內瘥衍義曰紫薇今蔓延而生謂之為草又有木身謂之為木又須物而上然幹不逐冬斃亦得木之多也故分入木部為至當唐白樂天詩有木名凌霄擢秀非孤標由是益知非草也本經又云莖葉味苦是與瞿麥別一種甚明唐本注云且紫薇瞿麥皆本經所載若用瞿麥根為紫薇何得復用莖葉此説盡矣然其花赭黃色本條雖不言其花又卻言莖葉味苦則紫薇為花故可知矣胡桐淚味鹹苦大寒無毒主大毒熱心腹煩滿水和服之取吐又主牛馬急黃黑汗水研三二兩灌之立瘥又為金銀焊藥出肅州以西平澤及山谷中形似黃礬而堅實有夾爛木者云是胡桐樹滋淪入土石鹼音減鹵地作之其樹高大皮葉似白楊青桐桑輩故名胡桐木堪器用又名胡桐律律淚聲訛也西域傳云胡桐似桑而曲唐本先附草部今移臣禹錫等謹按蜀本圖經云涼州以西有之初生似柳大則似桑桐之間津下入地與土石相染狀如薑石極鹹苦得水便消若礬石類石類也冬採之日華子云治風蚛牙齒痛有二般木律不中入藥用石律形如小石片子黃土色者為上即中入齒藥用兼殺火毒並面毒圖經曰胡桐淚出肅州以西平澤及山谷中今西蕃亦有商人貨之者相傳其木甚高大皮似白楊青桐輩其藥初生似柳漸大則似桑桐輩其津液淪入地中與大石相著冬月採得之狀如黃礬薑石味極鹹苦得水便消如硝石也古方稀用今治口齒家為最要之物一名胡桐律律淚聲近也然有一種木律極相類不堪用也海藥謹按嶺表記云出波斯國是胡桐樹脂也名胡桐淚又有石淚在石上採也主風疳𧈟齒牙疼痛骨槽風勞能軟一切物多服令人吐也作律字非也通典西戎樓國多出柳柳胡桐白草白草牛馬所嗜也胡桐亦似蟲食其樹而津下流出者俗名為胡桐淚可以焊金銀俗訛呼淚為律墨棘刺花味苦平無毒主金瘡內漏冬至後百二十日採之實主明目心腹痿痹除熱利小便生道旁四月採一名菥蓂一名馬朐一名刺原又有棗針療腰痛喉痹不通陶隱居云此一條又相違越恐俚言多是然復道其花一名菥蓂此恐別是一物不關棗針也今俗人皆用天門冬苗吾亦不許門冬苗乃是好作飲益人正自不可當棘刺爾唐本注云棘有赤白二種亦猶諸棘色類非一後條用花斯不足怪以江南無棘李云用棘針天門冬苗一名顛棘南人以代棘針陶不許今用棘刺當用白者為佳花即棘花定無別物然刺有兩種有鉤者有直者補益宜用直者療腫宜用鉤者又云棘在棗部南人昧於棗棘之別所以同用棘條中也臣禹錫等謹按蜀本注云棘有赤白二種切韻曰棘小棗也田野間多有之叢高三二尺花葉莖實俱似棗也圖經文具白棘條下聖惠方治小兒一切疳用刺針瓜蒂等分末吹入鼻中日二豬苓味甘苦平無毒主痎音皆瘧解毒蠱疰不祥利水道久服輕身耐老一名豭豬屎生衡山山谷及濟陰冤句二月八月採陰乾陶隱居云是楓樹苓其皮至黑作塊似豬屎故以名之肉白而實者佳用之削去黑皮乃稱之臣禹錫等謹按吳氏云豬苓神農甘雷公苦無毒司馬彪注莊子云豕橐一名苓根似豬矢治渴藥性論云豬苓臣微熱解傷寒溫疫大熱發汗生腫脹滿腹急痛圖經曰豬苓生衡山山谷及濟陰冤句今蜀州眉州亦有之舊説是楓木苓今則不必楓根下乃有生土底皮黑作塊似豬糞故以名之又名地烏桃二月八月採陰乾削去皮肉白而實者佳莊子謂之豕橐司馬彪注云一名苓根似豬矢治渴張仲景治傷寒諸病在臟加渴者豬苓湯主之豬苓茯苓澤瀉滑石阿膠各一兩以水四升煮四物取二升內膠每服七合日三嘔而思水者亦主之又治消渴脈浮小便不利微熱者豬苓散發其汗病欲飲水而復吐之為水逆冬時寒嗽如瘧狀亦與豬苓散此即五苓散也豬苓朮茯苓各三分澤瀉五分桂二分細搗篩水服方寸匕日三多飲暖水汗出即愈利水道諸湯劑無若此快今人皆用之又黃疸病及狐惑病並豬苓散主之豬苓茯苓術等分杵末每服方寸匕與水調下今施州有一種刺豬苓蔓生春夏採根削皮焙乾彼土人用敷瘡毒殊效云味甘性涼無毒唐本余去邪氣雷公云凡採得用銅刀削上粗皮一重薄切下東流水浸一夜至明漉出細切以升麻對蒸一日出去升麻葉令淨曬乾用外臺祕要治妊娠患子淋豬苓五兩一味末以白湯三合服方寸匕漸至二匕日三夜二盡劑不瘥宜轉用之又方治小兒大便不通豬苓一兩以水少許煮雞屎白一錢調服立瘥子母祕録治妊娠從腳上至腹腫小便不利微渴引飲豬苓五兩末以熟水服方寸匕日三服楊氏産乳療通體遍身腫小便不利豬苓五兩搗篩煎水三合調服方寸匕加至二匕衍義曰豬苓行水之功多久服必損腎氣昏人目果欲久服者更宜詳審白棘味辛寒無毒主心腹痛癰腫潰膿止痛決刺結療丈夫虛損陰痿精自出補腎氣益精髓一名棘針一名棘刺生雍州川穀陶隱居云李云此是酸棗樹針今人用天門冬苗代之非是真也唐本注云白棘莖白如粉子葉與赤棘同棘中時復有之亦為難得也圖經曰白棘棘針也生雍州棘刺花生道旁今近京皆有之棘小棗也叢高三四尺花葉莖實都似棗而有赤白二種蘇恭云白棘莖白如粉子葉與赤棘同赤棘中時復有之亦為難得耳然有鉤直二種直者宜入補藥鉤者入癰腫藥針採無時花冬至後百二十日採實四月採又棗針療喉痹不通藥中亦用陳子昂觀玉篇云在張掖郡時有人以仙人杖為白棘同旅皆信之二物都不相類不知何故疑惑若此其説見枸杞條外臺祕要治齒蟲腐棘針二百枚以水三升煮取一升含之又方治尿血棘刺三升水五升煮取二升分三服千金方治諸惡腫失治有膿燒棘針作灰水服之經宿頭出又方蟲食齒根肉黑燒腐棘取瀝敷之十遍雄黃末敷之即愈子母祕録小兒天風口噤乳不下白棘燒末水服一錢匕又方癰疸痔漏瘡及小兒丹水煮棘根汁洗之出千金衍義曰白棘一名棘針一名棘刺按經如此甚明諸家之意強生疑惑今掠不取求其經而可矣其白棘乃是取其肥盛紫色枝土有皺薄白膜先剝起者故曰白棘取白之意不過如此其棘刺花乃是棘上所開花也余無他義今人燒枝取油塗垢發使垢解烏藥味辛溫無毒主中惡心腹痛蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲其葉及根嫩時採作茶片炙碾煎服能補中益氣偏止小便滑數生嶺南雍容州及江南樹生似茶高丈餘一葉三丫葉青陰白根色黑褐作車轂形狀似山芍藥根又似烏樟根自余直根者不堪一名旁其八月採根今附臣禹錫等謹按日華子云治一切氣除一切冷霍亂及反胃吐食瀉痢癰癤疥癩並解冷熱其功不可悉載貓犬百病並可摩服圖經曰烏藥生嶺南雍容州及江南今台州雷州衡州亦有之以天台者為勝木似茶𣗪高五七尺葉微圓而尖作三丫面青背白五月開細花黃白色六月結實如山芍藥而有極粗大者又似釣樟根然根有二種嶺南者黑褐色而堅硬天台者白而虛軟並八月採根以作車轂形如連珠狀者佳或云天台出者香白可愛而不及海南者力大斗門方治陰毒傷寒烏藥子一合炒令黑煙起投於水中煎取三五沸服一大盞候汗出回陽立瘥別説云謹按本草圖經及世稱以天台者為勝今比之衡州洪州者其香味唯天台者為劣入藥功效亦不及但肉色頗赤而差細小爾用者宜廣求而比試之衍義曰烏藥和來氣少走泄多但不甚剛猛與沉香同磨作湯點治胸腹冷氣甚穩當沒藥味苦平無毒主破血止痛療金瘡杖瘡諸惡瘡痔漏卒下血目中翳暈痛膚赤生波斯國似安息香其塊大小不定黑色今附臣禹錫等謹按藥性論云沒藥單用亦得味苦辛能主打搕損心腹血瘀傷折踒跌筋骨瘀痛金刃所損痛不可忍皆以酒投飲之良日華子云破癥結宿血消腫毒圖經曰沒藥生波斯國今海南諸國及廣州或有之木之根之株皆如橄欖葉青而密歲久者則有膏液流滴在地下凝結成塊或大或小亦類安息香採無時今方多用治婦人內傷痛楚又治血暈及臍腹㽱刺者沒藥一物研細溫酒調一錢便止又治歷節諸風骨節疼痛晝夜不可忍者沒藥半兩研虎脛骨三兩塗酥炙黃色先搗羅為散與沒藥同研令細溫酒調二錢日三服大佳海藥謹按徐表南州記生波斯國是彼處松脂也狀如神香赤黑色味苦辛溫無毒主折傷馬墜推陳置新能生好血凡服皆須研爛以熱酒調服近效墮胎心腹俱痛及野雞漏痔産後血氣痛並宜丸散中服爾衍義曰沒藥大概通滯血打撲損疼痛皆以酒化服血滯則氣壅淤氣壅淤則經絡滿急經絡滿急故痛且腫凡打撲著肌肉須腫脹者經絡傷氣血不行壅淤故如是龍眼味甘平無毒主五臟邪氣安志厭食除蟲去毒久服強魂聰明輕身不老通神明一名益智其大者似檳榔生南海山谷陶隱居云廣州別有龍眼似荔枝而小非益智恐彼人別名今者為益智爾食之並利人唐本注云益智似連翹子頭未開者味甘辛殊不似檳榔其苗葉花根與豆蔻無別唯子小爾龍眼一名益智而益智非龍眼也其龍眼樹似荔枝葉若林檎花白色子如檳榔有鱗甲大如雀卵味甘酸也今注按此樹高二丈餘枝葉凌冬不凋花白色七月始熟一名亞荔枝大者形似檳榔而小有鱗甲其肉薄於荔枝而甘美堪食本經云一名益智者蓋甘味歸脾而能益智非今益智子爾臣禹錫等謹按蜀本龍眼除蠱毒去三蟲圖經曰龍眼生南海山谷今閩廣蜀道出荔枝處皆有之木高二丈許似荔枝而葉微小凌冬不凋春末夏初生細白花七月而實成殼青黃色文作鱗甲形圓如彈丸核若無患而不堅肉白有漿甚甘美其實極繁每枝常三二十枚荔枝才過龍眼即熟故南人目為荔枝奴一名益智以其味甘歸脾而能益智耳下品自有益智子非此物也東觀漢記云南海舊獻龍眼荔枝十里一置五里一候奔馳險阻道路為患孝和時汝南唐羌為臨武長縣接南海上書言狀帝下詔太官勿復受獻由是而止其為世所貴重久矣今人亦甚珍之曝乾寄遠北中以為佳果亞於荔枝衍義曰龍眼經曰一名益智今專為果未見入藥補注不言神農本草編入木部中品果部中復不曾收入今除為果之外別無龍眼若謂為益智子則專調諸氣今為果者復不能也矧自有益智條遠不相當故知木部龍眼即便是今為果者按今注云甘味歸脾而能益智此説甚當安息香味辛苦平無毒主心腹惡氣鬼疰出西戎似松脂黃黑色為塊新者亦柔韌音刃唐本先附臣禹錫等謹按蕭炳云燒之去鬼來神段成式酉陽雜俎云安息香樹出波斯國波斯呼為辟邪樹長三丈皮色黃黑葉有四角經寒不凋二月開花黃色花心微碧不結實刻其樹皮其膠如飴名安息香六七月堅凝乃取之燒之通神闢衆惡日華子治邪氣魍魎鬼胎血邪闢蠱毒腎氣霍亂風痛治婦人血噤併産後血暈海藥謹按廣州記云生南海波斯國樹中脂也狀若桃膠以秋月採之又方云婦人夜夢鬼交以臭黃合為丸燒熏丹穴永斷又主男子遺精暖腎辟惡氣仙人杖味鹹平一云冷無毒主噦氣嘔逆闢痁小兒吐乳大人吐食並水煮服小兒驚癇及夜啼安身伴睡良又主痔病燒為末服方寸匕此是筍欲成竹時立死者色黑如漆五六月收之苦桂竹多生此又別一種仙人杖味甘小溫無毒久服長生堅筋骨令人不老作茹食之去痰癖除風冷生劍南平澤葉似苦苣叢生陳子昂觀玉篇序云夏四月次於張掖河州草木無他異者皆仙人杖往往叢生豫家世代服食者昔嘗餌之及此行也息意茲味戎人有薦嘉蔬者此物存焉豈非將欲扶吾壽也新補見陳藏器日華子圖經曰文具枸杞條下松羅毗梨勒味苦寒無毒功用與庵摩勒同出西域及嶺南交愛等州戎人謂之三果唐本注云樹似胡桃子形亦似胡桃核似訶梨勒而圓短無稜用亦同法唐本先附臣禹錫等謹按藥性論云毗梨勒使能溫暖腸腹兼去一切冷氣蕃中人以此作漿甚熱能染鬚髮變黑色日華子云下氣止瀉痢海藥謹按唐志云生南海諸國樹不與訶梨子相似即圓而毗也味苦帶澀微溫無毒主烏髭發燒灰乾血效庵音諳摩勒味苦甘寒無毒主風虛熱氣一名余甘生嶺南交廣愛等州唐本注云樹葉細似合歡花黃子似李奈青黃色核圓作六七稜其中仁亦入藥用今按陳藏器本草云庵摩勒主補益強氣力合鐵粉用一斤變白不老取子壓取汁和油塗頭生髮去風癢初塗發脫後生如漆人食其子先苦後甘故曰余甘唐本先附圖經曰庵摩勒余甘子也生嶺南交廣愛等州今二廣諸郡及西川蠻界山谷中皆有之木高一二丈枝條甚軟葉青細密朝開暮斂如夜合而葉微小春生冬凋三月有花著條而生如粟粒微黃隨即結實作莢每條三兩子至冬而熟如李子狀青白色連核作五六瓣干即並核皆裂其俗亦作果子啖之初覺味苦良久更甘故以名也海藥生西國大小如枳桔子狀梵云庵摩勒果是也味苦酸甘微寒無毒主丹石傷肺上氣咳嗽久服輕身延年長生凡服乳石之人常宜服也衍義曰庵摩勒余甘子也解金石毒為末作湯點服佛經中所謂庵摩勒果者是此蓋西度亦有之鬱金香味苦溫無毒主蠱野諸毒心氣鬼疰鴉鶻等臭陳氏云其香十二葉為百草之英按魏略云生秦國二月三月有花狀如紅藍四月五月採花即香也今附臣禹錫等謹按陳藏器云鬱金香平入諸香藥用之説文郁香芳草也十二葉為貫捋以煮之用為鬯為百草之英合而釀酒以降神也以此言之則草也不當附於木部陳藏器云味苦平無毒主一切臭除心腹間惡氣鬼疰入諸香藥用之生大秦國花如紅藍花即是香也衛矛味苦寒無毒主女子崩中下血腹滿汗出除邪殺鬼毒蠱疰中惡腹痛去白蟲消皮膚風毒腫令陰中解一名鬼箭生霍山山谷八月採陰乾陶隱居云山野處處有其莖有三羽狀如箭羽俗皆呼為鬼箭而為用甚稀用之削取皮羽今注醫家用鬼箭療婦人血氣大效臣禹錫等謹按藥性論云鬼箭使一名衛矛有小毒能破陳血能落胎主中惡腰腹痛及百邪鬼魅日華子云鬼箭羽味甘澀通月經破癥結止血崩帶下殺腹臟蟲及産後血咬肚痛圖經曰衛矛鬼箭也出霍山山谷今江淮州郡或有之三月以後生莖苗長四五尺許其干有三羽狀如箭翎葉亦似山茶青色八月十一月十二月採條莖陰乾其木亦名狗骨崔氏方療惡疰在心痛不可忍有鬼箭羽湯集驗方療卒暴心痛或中惡氣毒痛大黃湯亦用鬼箭皆大方也雷公云凡使勿用石茆根頭真似鬼箭只是上葉不同味各別採得後只使箭頭用拭上赤毛用酥緩炒過用之每修事一兩用酥一分炒酥盡為度外臺祕要治乳無汁鬼箭五兩水六升煮取四升一服八合日三亦可作灰水服方寸匕日三大效衍義曰衛矛所在山谷皆有之然未嘗於平陸地見也葉絶少其莖黃褐色若柏皮三面如鋒刃人家多燔之遣崇方家用之亦少海桐皮味苦平無毒主霍亂中惡赤白久痢除疳𧈟疥癬牙齒蟲痛並煮服及含之水浸洗目除膚赤堪作繩索入水不爛出南海已南山谷似梓一作桐白皮今附臣禹錫等謹按日華子云溫治血脈麻痹疼痛及目赤煎洗圖經曰海桐皮出南海以南山谷今雷州及近海州郡亦有之葉如手大作三花尖皮若梓白皮而堅軔可作繩入水不爛不拘時月採之古方多用浸酒治風蹶南唐筠州刺史王紹顏撰續傳信方著其法云頃年豫在姑熟之日得腰膝痛不可忍醫以腎臟毒攻刺諸藥莫療因覽傳信方備有此驗立修制一劑便減五分步履便輕故録之耳海桐皮二兩牛膝芎藭羌活地骨皮五加皮各一兩甘草半兩薏苡仁二兩生地黃十兩八物淨洗焙乾細銼生地黃以蘆刀子切用綿一兩都包裹入無灰酒二斗浸冬二七日夏一七日候熟空心食後日午晚臥時時一杯長令醺醺合時不用添減禁毒食海藥謹按廣志云生南海山谷中似桐皮黃白色故以名之味苦溫無毒主腰腳不遂頑痹腿膝疼痛霍亂赤白瀉痢血痢疥癬大腹微溫無毒主冷熱氣攻心腹大腸壅毒痰膈醋心並以薑鹽同煎入疏氣藥良所出與檳榔相似莖葉根干小異生南海諸國今附臣禹錫等謹按日華子云下一切氣止霍亂通大小腸健脾開胃調中圖經文具檳榔條下孫真人云檳榔皮鴆鳥多棲此樹上宜先酒洗仍以大豆汁洗方可用紫藤味甘微溫有小毒作煎如糖下水良花挪碎拭酒醋白腐壞子作角其中仁熬令香著酒中令不敗酒敗者用之亦正四月生紫花可愛人亦種之江東呼為招豆藤皮著樹從心重重有皮今附陳藏器癊病京都人亦種之以飾庭池合歡味甘平無毒主安五臟利心志令人歡樂無憂久服輕身明目得所欲生益州山谷陶隱居云按嵇康養生論云合歡蠲忿萱草忘憂也詩人又有萱草皆即今鹿蔥而不入藥用至於合歡俗間少識之者當以其非療病之功稍見輕略遂致永謝猶如長生之法人罕敦尚亦為遺棄唐本注云此樹生葉似皂莢槐等極細五月花發紅白色所在山澗中有之今東西京第宅山池間亦有種者名曰合歡或曰合昏秋實作莢子極薄細爾今按陳藏器本草云合歡皮殺蟲搗為末和鐺下墨生油調塗蜘蛛咬瘡及葉並去垢葉至暮即合故云合昏也臣禹錫等謹按蜀本音義云樹似梧桐枝弱葉繁互相交結每一風來輒似相解了不相牽綴樹之階庭使人不忿日華子云夜合皮殺蟲煎膏消癰腫並續筋骨葉可洗衣垢又名合歡樹圖經曰合歡夜合也生益州山谷今近京雍洛間皆有之人家多植於庭除間木似梧桐枝甚柔弱葉似皂莢槐等極細而繁密互相交結每一風來輒似相解了不相牽綴其葉至暮而合故一名合昏五月花發紅白色瓣上若絲茸然至秋而實作莢子極薄細採皮及葉用不枸時月崔豹古今注曰欲蠲人之憂則贈以丹棘丹棘一名忘憂欲蠲人之忿則贈以青裳青裳合歡也故嵇康種之舍前是也韋宙獨行方胸心甲錯是為肺癰黃昏湯治取夜合皮掌大一枚水三升煮取半分再服子母祕録小兒撮口病夜合花枝濃煮汁拭口並洗又方打搕損疼痛夜合花末酒調服二錢匕妙衍義曰合歡花其色如今之醮暈線上半白下半肉紅散垂如絲為花之異其緑葉至夜則合又謂之夜合花陳藏器日華子皆曰皮殺蟲又曰續筋骨經中不言虎杖根微溫主通利月水破留血症結陶隱居云田野甚多此狀如大馬蓼莖斑而葉圓極主暴瘕酒漬根服之也今按陳藏器本草云虎杖主風在骨節間及血瘀煮汁作酒服之葉搗敷蛇咬一名苦杖莖上有赤點者是臣禹錫等謹按蜀本圖經云生下濕地作樹高丈餘其莖赤根黃二月八月採根曬乾所在有之爾雅云蒤虎杖注云似紅草而粗大有細刺可以染赤藥性論云虎杖使一名大蟲杖也味甘平無毒主治大熱煩躁止渴利小便壓一切熱毒暑月和甘草煎色如琥珀可愛堪看嘗之甘美瓶置井中令冷徹如冰白瓷器及銀器中盛似茶啜之時人呼為冷飲子又且尊於茗能破女子經候不通搗以酒浸常服有孕人勿服破血日華子云治産後惡血不下心腹脹滿排膿主瘡癤癰毒婦人血運撲損瘀血破風毒結氣又名酸杖又名斑杖圖經曰虎杖一名苦杖舊不載所出州郡今處處有之三月生苗莖如竹筍狀上有赤斑點初生便分枝丫葉似小杏葉七月開花九月結實南中出者無花根皮黑色破開即黃似柳根亦有高丈餘者爾雅云蒤虎杖郭璞云似葒草而粗大有細刺可以染赤是也二月三月採根曝乾河東人燒根灰貼諸惡瘡浙中醫工取根洗去皴皮銼焙搗篩蜜丸如赤豆陳米飲下治腸痔下血甚佳俗間以甘草同煎為飲色如琥珀可愛瓶盛置井中令冷徹如冰極解暑毒其汁染米作糜糕益美雷公云凡使勿用天藍並斑柚根其二味根形味相似用之有誤採得後細銼卻用上虎枝葉裛一夜出曬乾用外臺祕要治卒暴症腹中有物硬如石痛刺晝夜若不治之百日內死取虎杖根勿令影臨水上可得石余許洗干搗作末稌米五升炊飯內攪之好酒五斗漬封候藥消飯浮可飲一升半勿食鮭魚鹽症當出亦可但取其一斗干搗酒漬飲之從少起日三亦佳此治症乃勝諸大藥肘後方治時疫傷寒毒攻手足腫疼痛欲斷方用虎杖根銼水煮適寒溫以漬手足令踝上有水尺許止之傷寒類要同集驗方治五淋苦杖不計多少為末每服二錢用飯飲下不拘時候衍義曰虎杖根微苦經不言味此草藥也蜀本圖經言作木高丈餘此全非虎杖大率皆似寒菊然花葉莖蕊差大為異仍莖葉有淡黑斑自六七月旋旋開花至九月中方已花片四出其色如桃花差大外微深陝西山麓水次甚多今天下暑月多煎根汁為飲不得甘草則不堪飲藥性論云和甘草煎嘗之甘美其味甘即是甘草之味非虎杖也論其攻治則甚當矣五倍子味苦酸平無毒療齒宣疳𧈟肺臟風毒流溢皮膚作風濕癬瘡瘙癢膿水五痔下血不止小兒面鼻疳瘡一名文蛤在處有其子色青大者如拳內多蟲一名百蟲倉圖經曰五倍子舊不著所出州土云在處有之今以蜀中者為勝生膚木葉上七月結實無花其木青黃色其實青至熟而黃大者如拳內多蟲九月採子曝乾生津液最佳陳藏器序云五倍子治腸虛泄痢熟湯服博濟方治風毒上攻眼腫癢澀痛不可忍者或上下瞼眥赤爛浮翳瘀肉侵睛神效驅風散五倍子一兩蔓荊子一兩半同杵末每服二錢水二盞銅石器內煎及一盞澄滓熱淋洗留滓二服又依前煎淋洗大能明眼目去澀癢經驗後方治小兒吐不定五倍子二個一生一熟甘草一握用濕紙裹炮過同搗末每服米泔調下半錢立瘥丹房鏡源五倍子佐鉛衍義曰五倍子今染家亦用口瘡以末摻之便可飲食伏牛花味苦甘平無毒療久風濕痹四肢拘攣骨肉疼痛作湯主風眩頭痛五痔下血一名隔虎刺花花黃色生蜀地所在皆有三月採圖經曰伏牛花生蜀地所在皆有今唯益蜀近郡有之多生川澤中葉青細似黃柏葉而不光莖赤有刺花淡黃色作穗似杏花而小三月採陰乾天竺黃味甘寒無毒主小兒驚風天吊鎮心明目去諸風熱療金瘡止血滋養五臟一名竹膏人多燒諸骨及葛粉等雜之按臨海志云生天竺國今諸竹內往往得之今附臣禹錫等謹按日華子云平治中風痰壅卒失音不語小兒客忤及癇痰此是南海邊竹內塵沙結成者耳衍義曰天竹黃自是竹內所生如黃土著竹成片涼心經去風熱作小兒藥尤宜和緩故也密蒙花味甘平微寒無毒主青盲膚翳赤澀多眵淚消目中赤脈小兒麩豆及疳氣攻眼生益州川穀樹高丈餘葉似冬青葉而厚背色白有細毛二月三月採花圖經曰密蒙花生益州川穀今蜀中州郡皆有之木高丈餘葉似冬青葉而厚背白色有細毛又似桔葉花微紫色二月三月採花曝乾用此木類而在草部不知何至於此雷公云凡使先揀令淨用酒浸一宿漉出候乾卻拌蜜令潤蒸從卯至酉出曬乾如此拌蒸三度又卻曬乾用每修事一兩用酒八兩浸待色變用蜜半兩蒸為度此元名小錦花衍義曰密蒙花利州路甚多葉冬亦不凋然不似冬青蓋柔而不光潔不深緑花細碎數十房成一朵冬生春開此木也今居草部恐未盡天竺桂味辛溫無毒主腹內諸冷血氣脹功用似桂皮薄不過烈生西胡國今附圖經文具桂條下海藥謹按廣州記云生南海山谷補暖腰腳破産後惡血治血痢腸風功力與桂心同方家少用衍義曰天竺桂與牡菌桂同但薄而已折傷木味甘咸平無毒主傷折筋骨疼痛散血補血産後血悶止痛酒水煮濃汁飲之生資州山谷唐本注云藤生繞樹上葉似𦱌草葉而光厚八月九月採莖曬乾唐本先附桑花暖無毒健脾澀腸止鼻洪吐血腸風崩中帶下此不是桑椹花即是桑樹上白癬如地錢花樣刀削取入藥微炒使新補見日華子圖經文具桑根白皮條下椋音良子木味甘咸平無毒主折傷破惡血養好血安胎止痛生肉唐本注云葉似柿兩葉相當子細圓如牛李子生青熟黑其木堅重煮汁赤色爾雅云椋即來是也郭注云椋材中車輞八月九月採木曬乾唐本先附每始王木味苦平無毒主傷折跌筋骨生肌破血止痛酒水煮濃汁飲之生資州山谷唐本注云藤生繞樹木上生葉似蘿摩葉二月八月採唐本先附四十五種陳藏器余必栗香味辛溫無毒主鬼氣煮服之並燒為香殺蟲魚葉搗碎置上流魚悉暴鰓一名化木香詹香也葉如椿生高山堪為書軸白魚不損書也海藥主鬼疰心氣斷一切惡氣葉落水中魚當暴死櫚木味辛溫無毒主破血血塊冷嗽並煮汁及熱服出安南及南海人作床幾似紫檀而色赤為枕令人頭痛為熱故也海藥謹按廣志云生安南及南海山谷胡人用為床坐性堅好主産後惡露衝心癥瘕結氣赤白漏下並銼煎服之研藥味苦溫無毒主霍亂下痢中惡腹內不調者服之出南海諸州根如烏藥圓小樹生也海藥葉如椒主赤白痢蠱毒中惡並銼煎服之黃龍眼味苦溫無毒主解金藥銀藥毒以水研取半合空心少少服經二十許日瘥出嶺南狀如龍眼黃色也海藥功力勝解毒子也箭竿及鏃主婦人産後腹中癢安所臥席下勿令婦人知元慈勒味甘無毒主心病流血合金瘡去腹內惡血血痢下血婦人帶下明目去障翳風淚努肉生波斯國似龍腦香海藥慈勒樹中脂也味甘平消翳破血止痢腹中惡血今少有都咸子及皮葉味甘平無毒主渴潤肺去煩除痰火干作飲服之生南方樹如李徐表南州記云都咸樹子大如指取子及皮作飲極香美海藥謹按徐表南州記云生廣南山谷味甘平無毒主煩躁心悶痰膈傷寒清涕咳逆上氣宜煎服子食之香大小如半夏鑿孔中木主難産取入鐵裹者燒末酒服下産也櫟木皮味苦平無毒根皮主惡瘡中風犯毒露者取煎汁洗瘡當令膿血盡止亦治痢南北總有作柴亦云櫪音同也千金方治諸瘡因風致腫以根皮三十斤銼以水三槲濃煮內鹽一把漬瘡當出膿血日日為之瘥止省藤味苦平無毒主蛔蟲煮汁服之又主齒痛打碎口中含之又取和米煮粥飼狗去瘑生南地深山皮赤如指堪縛物片片自解也松楊木皮味苦平無毒主水痢不問冷熱取皮濃煎令黑服一升生江南林落間大樹葉如梨江西人呼為涼木松楊縣以此樹為名也楊廬耳平無毒主老血結塊破血止血煮服之楊廬木上耳也出南山故甑蔽無毒主石淋燒灰末服三指撮用水下之又主盜汗書云止鹹味聖惠方治膀胱虛熱下砂石澀痛利水道燒灰研食前溫酒調下一錢匕梫木味苦平無毒破産後血煮服之葉搗闢封蛇咬亦洗瘡癬樹如石榴葉細高丈餘四月開花白如雪生江東林筤間象豆味甘平無毒主五野雞病蠱毒飛尸喉痹取子中仁碎為粉微熬水服一二匕亦和大豆藻面去皯生嶺南山林作藤著樹如通草藤三年一熟角如弓袋子若雞卵皮紫色剖中仁用之一名榼子一名合子主野雞病為上地主平無毒主鬼氣心痛酒煮服一合此土中古木腐爛者也腐木主蜈蚣咬末和醋敷之亦漬取汁敷咬處良石刺木根皮味苦平無毒主破血因産血不盡結瘕者煮汁服此木上寄生破血神驗不可得生南方林筤間江西人呼為靳刺亦種為籬院似棘而大枝上有逆鉤也楠木枝葉味苦溫無毒主霍亂煎汁服之木高大葉如桑出南方山中郭注爾雅云楠汝占切大木葉如桑也息王藤味苦溫無毒主産後腹痛血露不盡濃煮汁服之生嶺南山谷冬月不凋角落木皮味苦溫無毒主赤白痢皮煮汁服之生江西山谷似茱萸獨莖也鴆鳥漿味甘溫無毒主風血羸老山人浸酒用解諸毒故曰鴆鳥漿生江南林木下高一二尺葉陰紫色冬不凋有赤子如珠紫珠味苦寒無毒解諸毒物癰疽喉痹飛尸蠱毒毒腫下瘻蛇虺蟲螫狂犬毒並煮汁服亦煮汁洗瘡腫除血長膚一名紫荊樹似黃荊葉小無丫非田氏之荊也至秋子熟正紫圓如小珠生江東林澤間牛領藤味甘溫無毒主腹內冷腰膝疼弱小便白數陽道乏煮汁浸酒服之生嶺南高山形褊如牛領取之陰乾也枕材味辛小溫無毒主咳嗽痰飲積聚脹滿鬼氣注忤煮汁服之亦可作浴湯浸腳氣及小兒瘡疥生南海山谷作艟船次於樟木無藥處用之也鬼膊藤味苦溫無毒主癰腫搗莖葉敷之藤堪浸酒去風血生江南林澗中葉如梨子如楂子山人亦名鬼薄者也木戟味辛溫無毒主痃癖氣在臟腑生山中葉如梔子也奴柘味苦小溫無毒主老血瘕男子痃癖閃痞取刺和三稜草馬鞭草作煎如稠糖病在心食後在臍空心服當下惡物生江南山野似柘節有刺冬不凋溫藤味甘溫無毒主風血積冷浸酒服之生江南山谷不凋著樹生也鬼齒無毒主中惡注忤心腹痛此腐竹根先入地者煮服之亦名鬼針為其賊惡隱其名爾鐵槌柄無毒主鬼打及強鬼排突人致惡者和桃奴鬼箭等丸服之古櫬板無毒主鬼氣注忤中惡心腹痛背急氣喘惡夢悸常為鬼神所祟撓者水及酒和東引桃枝煎服當得吐下古冢中棺木也彌古者佳杉材最良千歲者通神作琴底爾雅注云杉生江南作棺埋之不腐慈母無毒取枝葉炙黃香作飯下氣止渴令人不睡主小兒痰痞生山林間葉如櫻桃而小樹高丈餘山人並識之飯籮燒作灰無毒主時行病後食勞取方寸匕服南方人謂筐也又籃耳燒作灰末敷狗咬瘡籃竹器也白馬骨無毒主惡瘡和黃連細辛白調牛膝雞桑皮黃荊等燒為末淋汁取治瘰癧惡瘡蝕息肉白癜風以物揩破塗之又單取莖葉煮汁服之止水痢生江東似石榴而短小對節紫衣味苦無毒主黃疸暴熱目黃沉重下水癊亦止熱痢煮服之作灰淋取汁沐頭長髮此古木錦花也石瓦皆有之堪染褐下水廣濟方云長髮也梳篦無毒主蝨病者汁服蝨病是活蝨入腹為病如癥瘕者又梳篦垢主小兒惡氣霍亂水和飲之倒挂藤味苦無毒主一切老血及産後諸疾結痛血上欲死煮汁服生深山如懸鉤有逆刺倒挂於樹葉尖而長也故木砧一名百味無毒主人病後食勞復取發當時來參病人行止腳下土如錢許男病左女病右和砧上垢及鼠頭一枚無即以鼠屎三七煮服之神效又卒心腹痛取砧上垢著人鞋履底悉穿又㭢几上屑燒敷吻上饞瘡古廁魍木主鬼魅傳尸溫疫魍魎神等取木以太歲所在日時當戶燒熏之又熏杖瘡冷風不入以木於瘡上熏之廁籌主難産及霍亂身冷轉筋於床下燒取熱氣徹上亦主中惡鬼氣此物雖微其功可録桃掘無毒主卒心腹痛鬼疰破血惡氣脹滿煮服之三載者良桃性去惡掘更辟邪桃符與桃掘同功也梭頭主失音不語吃病者刺手心令痛即語男左女右救月杖主月蝕瘡及月割耳燒為灰油和敷之杖即月蝕時救月擊物木也人亦取月桂子碎敷耳後月蝕耳瘡今江東諸處每至四五月後晦多於衢路間得之大如貍豆破之辛香古老相傳是月中下也山桂猶堪為藥況月桂乎正應不的識其功耳今江東處處有不知北地何意獨無為當非月路耶月感之矣餘杭靈隱寺僧云種得一株近代詩人多所論述漢武洞冥記云有遠飛雞朝往夕久還常銜桂實歸於南土所以北方無南方月路所以有也地龍藤味苦無毒主風血羸老腹內及腰腳諸冷食不作肌膚浸酒服之生天目山蟠屈如龍故號地龍藤繞樹木生似龍所生與此頗同小有異耳吳中亦有也火槽頭主蠍螫橫井上立愈上立炭主金瘡刮取敷瘡上止血生肉帶之辟邪惡鬼帶火內水底取得水銀著出
