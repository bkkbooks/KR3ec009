body:
  text: 卷第二十二己酉新增衍義下品蝦音遐蟆音麻味辛寒有毒主邪氣破症堅血癰腫陰瘡服之不患熱病療陰蝕疽癘音賴惡瘡猘犬傷瘡能合玉石一名蟾十占切蜍常餘切一名𪓰音秋一名去甫一名苦蠪音龍又音籠生江湖池澤五月五日取陰乾東行者良陶隱居云此是腹大皮上多痱蒲罪切磊來罪切者其皮汁甚有毒犬齧之口皆腫人得溫病斑出困者生食一兩枚無不瘥者五月五日取東行者五枚反縛著密室中閉之明旦視自解者取為術用能使人縛亦自解燒灰敷瘡立驗其肪塗玉則刻之如蠟故云能合玉石但肪不可多得取肥者銼煎膏以塗玉亦軟滑易截古玉器有奇特非雕琢人功者多是昆吾刀及蝦蟆肪所刻也唐本注云別録云腦主明目療青盲也臣禹錫等謹按蜀本圖經云今所在池澤皆有取曬乾及火干之一法刳去皮爪酒浸一宿又用黃精自然汁浸一宿塗酥炙乾用之蕭炳云腹下有丹書八字者以足畫地真蟾蜍也藥性論云蝦蟆亦可單用主闢百邪鬼魅塗癰腫及治熱結腫又云蟾蜍臣能殺疳蟲治鼠漏惡瘡端午日取眉脂以硃砂麝香為丸如麻子大小孩子疳瘦者空心一丸如腦疳以奶汁調滴鼻中燒灰敷一切有蟲惡癢滋胤瘡陳藏器云蝦蟆蟾蜍二物各別陶將蟾蜍功狀注蝦蟆條中遂使混然採取無別今藥家所賣亦以蟾蜍當蝦蟆且蝦蟆背有黑點身小能跳接百蟲解作呷呷聲在陂澤間舉動極急本經書功即是此也蟾蜍身大背黑無點多痱磊不能跳不解作聲行動遲緩在人家濕處本功外主溫病身斑者取一枚生搗絞取汁服之亦燒末服主狂犬咬發狂欲死作膾食之頻食數頓矢主惡瘡謂之土檳榔出下濕地處往往有之術家以肪軟壓及五月五日收取即是此也又有青蛙蛙蛤螻蟈長肱石榜蠼子之類或在水田中或在溝渠側未見別功故不具載周禮掌蟈氏去蛙黽焚牡菊灰灑之則死牡菊無花菊也本經云蝦蟆一名蟾蜍誤矣日華子云蝦蟆冷無毒治犬咬及熱狂貼惡瘡解煩熱色斑者是又云蟾涼微毒破癥結治疳氣小兒面黃癖氣燒灰油調敷惡瘡入藥並炙用又名蟾蜍眉酥治蚛牙和牛酥摩敷腰眼並陰囊治腰腎冷並助陽氣以吳茱萸苗汁調妙糞敷惡瘡疔腫雜蟲咬油調敷瘰癧痔瘻瘡圖經曰蝦蟆生江湖今處處有之腹大形小皮上多黑斑點能跳接百蟲食之時作呷呷聲在陂澤間舉動極急五月五日取陰乾東行者良本經云一名蟾蜍以為一物似非的也謹按爾雅鼁起據切𪓰蟾蜍郭璞注云似蝦蟆居陸地又科斗注云蝦蟆子也是非一物明矣且蟾蜍形大背上多痱磊行極遲緩不能跳躍亦不解鳴多在人家下濕處其腹下有丹書八字者真蟾蜍也陶隱居所謂能解犬毒及溫病斑生生食之並用蟾蜍也本經云主邪氣破堅血之類皆用蝦蟆二物雖一類而功用小別亦當分別而用之洽聞記云蝦蟆大者名田父能食蛇蛇行田父逐之蛇不得去田父銜其尾久之蛇死尾後數寸皮不損肉已盡也世傳蛇啖蛙今乃云田父食蛇其說頗怪當是別有一種如此耳韋宙獨行方治蠶咬取田父脊背上白汁和蟻子灰塗之瘥蟾蜍矢謂之土檳榔下濕處往往有之亦主惡瘡眉酥主蚛牙及小兒疳瘦藥所須又有一種大而黃色多在山石中藏蟄能吞氣飲風露不食雜蟲謂之山蛤山中人亦餐之此主小兒勞瘦及疳疾等最良雷公云有多般勿誤用有黑虎有䖲黃有黃𧋷有螻蟈有蟾其形各別其蝦蟆皮上腹下有斑點腳短即不鳴叫黑虎身小黑觜腳小斑䖲黃斑色前腳大後腿小有尾子一條黃𧋷遍身黃色腹下有臍帶長五七分以來所住立處帶下有自然汁出螻蟈即夜鳴腰細口大皮蒼黑色蟾即黃斑頭有肉角凡使蝦蟆先去皮並腸及爪了陰乾然後塗酥炙令乾每修事一個用牛酥一分炙盡為度若使黑虎即和頭尾皮爪並陰乾酒浸三日漉出焙乾用聖惠方治風邪蝦蟆燒灰硃砂等分每服一錢水調下日三四服甚有神驗又方治腹蛇螯方用生蝦蟆一枚爛杵碎敷之外臺祕要治卒狂言鬼語燒蝦蟆杵末酒服方寸匕日三又方治小兒初得月蝕瘡五月蝦蟆燒杵末豬膏和敷之又方治小兒患風臍及臍瘡久不瘥者燒蝦蟆杵末敷之日三四度瘥又方蟲已食下部肛盡腸穿者取長股蝦暮青背者一枚雞骨一分燒為灰合吹下部令深入又云數用大驗又方治癬瘡方取蟾蜍燒灰末以豬脂和敷之孫真人腸頭挺出以皮一片瓶內燒熏挺處梅師方治疳䘌無問去處皆治之以蝦蟆燒灰好醋和敷日三五度敷之瘥子母祕録小兒洞泄下痢燒蝦蟆末飲調方寸匕服又方治小兒口瘡五月五日蝦蟆炙杵末敷瘡上即瘥兼治小兒蓐瘡南北史張暢弟收嘗為猘犬所傷醫云宜食蝦蟆膾收甚難之暢含笑先嘗收因此乃食衍義曰蝦蟆多在人家渠塹下大腹品類中最大者是遇陰雨或昏夜即出食取眉間有白汁謂之蟾酥以油單裹眉裂之酥出單上入藥用有人病齒縫中血出以紙紝子蘸乾蟾酥少許於血出處按之立止世有人收三足枯蟾以罔衆但以水沃半日盡見其僞盡本無三足者牡鼠微溫無毒療踒折續筋骨搗敷之三日一易四足及尾主婦人墜胎易出臣禹錫等謹按藥訣云牡鼠味甘肉熱無毒主小兒哺露大腹炙食之糞微寒無毒主小兒癇疾大腹時行勞復陶隱居云牡鼠父鼠也其屎兩頭尖專療勞復鼠目主明目夜見書術家用之臘月鼠燒之辟惡氣膏煎之亦療諸瘡膽主目暗但才死膽便消故不可得之臣禹錫等謹按孟詵云牡鼠主小兒癇疾腹大貪食者可以黃泥裹燒之細揀去骨取肉和五味汁作羹與食之勿令食著骨甚瘦人又取臘月新死者一枚油一大升煎之使爛絞去滓重煎成膏塗凍瘡及折破瘡日華子云鼠涼無毒治小兒驚癇疾以油煎令消入蠟敷湯火瘡生搗罯折傷筋骨雄鼠糞頭尖硬者是治癇疾明目蔥豉煎服治勞復足燒食催生圖經文已附鼴鼠條下陳藏器序雄鼠脊骨未長齒多年不生者效外臺祕要治勞復方用鼠屎頭尖者二十枚豉五合水二升煮取一升頓服又方治鼻中外查瘤膿血出者正月取鼠頭燒作灰以臘月豬膏敷瘡上千金方治鼠瘻以新鼠屎一百粒以來收置密器中五六十日杵碎即敷瘡孔又方治癰瘡中冷瘡口不合用鼠皮一枚燒為灰細研封瘡口上又方治室女月水不通用鼠屎一兩燒灰研空心溫酒調下半錢又方醫針人而針折在肉中以鼠腦塗之肘後方耳卒聾取鼠膽納耳中不過三愈有人云側臥瀝一膽盡須臾膽汁從下邊出初出益聾半日須臾乃瘥治三十年老聾又方治人目澀喜睡取鼠目一枚燒作屑魚膏和注目眥則不眠兼取兩目縫囊盛帶之又方箭鏑及針刀刃在咽喉胸膈諸隱處不出方杵鼠肝及腦敷之又方蛇骨刺人毒痛方燒死鼠敷之又方治項強身中急者取活鼠破其腹去五臟就熱敷之即差經驗方靈鼠膏以大雄鼠一枚渾用清油一斤慢火煎鼠焦於水上拭油不散即以綿濾去滓澄清重拭銚子令淨再以慢火煎上件油次下黃丹五兩炒令色變用柳木篦子不住手攪令勻再於水上試滴候凝即下黃蠟一兩又熬帶黑色方成膏然後貯於瓷合器中候硬合地上出火毒三兩日敷貼瘡腫去痛而涼梅師方治食馬肝有毒殺人者以雄鼠屎三七枚和水研飲服之又方治從高墜下傷損筋骨疼痛叫喚不得瘀血著在肉以鼠屎燒末以豬脂和敷痛上急裹不過半日痛乃止又方臘月鼠向正旦朝所居處埋之闢溫疫又方治湯火燒瘡痛不可忍取鼠一頭油中浸煎之候鼠焦爛盡成膏研之仍以綿裹絞去滓待冷敷之日三度止痛又方治因瘡中風腰脊反張牙關口噤四肢強直鼠一頭和尾燒作灰細研以臘月豬脂敷之又方治狂犬咬人取鼠屎二升燒末研敷瘡上又方馬咬人踏破作瘡腫毒熱痛方鼠屎二七枚馬鞘五寸故者相和燒為末以豬脂和敷之食醫心鏡主水鼓石水腹脹身腫肥鼠一枚剝皮細切煮粥空心吃之頻食三兩度瘥斗門方治打傷瘡用老鼠一個自死臘月者和腸肚劈銼油半斤煎令焦黑用罐收之使時以雞翎惹油敷於瘡上即干立瘥姚和衆治小兒癥瘕煮老鼠肉汁煮粥與食子母祕録令子易産取鼠燒末以井花水服方寸匕日三服又方治乳無汁死鼠一頭燒作末以酒服方寸匕勿令婦人知又方治妊娠子死腹中雄鼠屎一七枚以水三升煮取一升去滓取汁以作粥食之胎即下楊氏産乳療小兒齒不生取雌鼠糞三七枚一日一枚拭齒令生雌糞用兩頭圓者又方治眼目晚不見物取鼠膽點之産書下乳汁以鼠作臛勿令知與食深師方治鐵棘竹木諸刺在肉中刺不出以鼠腦搗如膏厚塗即出馬刀味辛微寒有毒主漏下赤白寒熱破石淋殺禽獸賊鼠除五臟間熱肌中鼠𪖈蒲剝切止煩滿補中去闕痹利機關用之當煉得水爛人腸又云得水良一名馬蛤生江湖池澤及東海取無時陶隱居云李云生江漢中長六七寸江漢間人名為單音善姥音母亦食其肉肉似蚌今人多不識之大都似今蝏音亭䗒蒲辛切而非方用至少凡此類皆不可多食而不正入藥唯蛤蜊煮之醒酒蜆殼陳久者止痢車螯音敖蚶火甘切蠣𧍧乎咸切䗯音進之屬亦可為食無損益不見所主雉入大水變為蜄蜄音腎云是大蛤乃是蚌爾煮食諸蜊蝸與菜皆不利人也臣禹錫等謹按蜀本圖經云生江湖中細長小蚌也長三四寸闊五六分圖經曰馬刀生江湖池澤及東海今處處有之蝏䗒亦謂之蚌蚌與蚌同之類也長三四寸闊五六分以來頭小鋭多在沙泥中江漢間人名為單姥亦食其肉大類蚌方書稀用蚌蛤之類最多蚌肉壓丹石毒殼為粉以敷癰腫又可制石庭脂爛殼研飲主翻胃及胃中痰蛤蜊主老癖能為寒熱者蜆殼陳久者止痢蚶補中益陽所謂瓦屋是也𧍧䗯似蛤而長扁殼主痔蟶主胸中邪熱與丹石人相宜淡菜補五臟益陽浙江謂之殼菜此皆有益於人者余類實繁藥品所不取不可悉數也衍義曰馬刀京師謂之𤊿岸春夏人多食然發風痰性微冷又順安軍界河中亦出𧍧大抵與馬刀相類肉頗淡人作鮓以寄鄰左又不能致遠亦發風此等皆不可多食今蛤粉皆此等衆蛤灰也蛤蜊音梨冷無毒潤五臟止消渴開胃解酒毒主老癖能為寒熱者及婦人血塊煮食之此物性雖冷乃與丹石相反服丹石人食之令腹結痛新見陳藏器日華子圖經文具馬刀條下初虞世療湯火傷神妙蛤蜊殼灰火燒研為末油調塗之集驗同蜆音顯冷無毒治時氣開胃壓丹石藥及疔瘡下濕氣下乳糟煮服良生浸取汁洗疔瘡多食發嗽並冷氣消腎陳殼治陰瘡止痢蜆肉寒去暴熱明目利小便下熱氣腳氣濕毒解酒毒目黃浸取汁服主消渴爛殼溫燒為白灰飲下主反胃吐食除心胸痰水殼陳久療胃反及失精新見唐本注陳藏器日華子圖經文具馬刀條下陳藏器小於蛤黑色生水泥中候風雨能以殼為翅飛也聖惠方治卒咳嗽不止用白蜆殼不計多少搗研極細每服米飲調下一錢匕日三四服妙𧍧䗯殼燒作末服之主痔病新見陳藏器圖經文具馬刀條下陳藏器呼咸切音進一名生進有毛似蛤長扁殼燒作末服之主野雞病人食其肉無功用也蚌冷無毒明目止消渴除煩解熱毒補婦人虛勞下血並痔瘻血崩帶下壓丹石藥毒以黃連末納之取汁點赤眼並暗良爛殼粉飲下治反胃痰飲此即是寶裝大者又云蚌粉冷無毒治疳止痢並嘔逆癰腫醋調敷兼能制石亭脂新見日華子圖經文具馬刀條下陳藏器據陶云大蛤乃蚌按蚌寒煮之主婦人勞損下血明目除濕止消渴老蚌含珠殼堪為粉爛殼為粉飲下主反胃心胸間痰飲生江溪渠瀆間陶云大蛤誤耳食療云蚌大寒主大熱解酒毒止渴去眼赤動冷熱氣丹房鏡源蚌粉制硫黃車螯冷無毒治酒毒消渴酒渴並壅腫殼治瘡癤腫毒燒二度各以醋煅搗為末又甘草等分酒服以醋調敷腫上妙車螯是大蛤一名蜄能吐氣為樓臺海中春夏間依約島漵常有此氣新見陳藏器日華子圖經文具馬刀條下食療車螯蝤蝥類並不可多食之蚶溫主心腹冷氣膝脊冷風利五臟健胃令人能食每食了以飯壓之不爾令人口乾又云溫中消食起陽時最重出海中殼如瓦屋又云無毒益血色殼燒以米醋三度淬後埋令壞醋膏丸治一切血氣冷氣症癖新見陳藏器蕭炳孟詵日華子圖經文具馬刀條下蟶味甘溫無毒補虛主冷利煮食之主婦人産後虛損生海泥中長二三寸大如指兩頭開主胸中邪熱煩悶氣與服丹石人相宜天行病後不可食切忌之新見陳藏器蕭炳孟詵圖經文具馬刀條下淡菜溫補五臟理腰腳氣益陽事能消食除腹中冷氣消痃癖氣亦可燒令汁沸出食之多食令頭悶目暗可微利即止北人多不識雖形狀不典而甚益人又云溫無毒補虛勞損産後血結腹內冷痛治癥瘕腰痛潤毛髮崩中帶下燒一頓令飽大效又名殼菜常時頻燒食即苦不宜人與少米先煮熟後除肉內兩邊鎖及毛了再入蘿蔔或紫蘇或冬瓜皮同煮即更妙新見孟詵日華子圖經文具馬刀條下陳藏器東海夫人味甘溫無毒主虛羸勞損因産瘦瘠血氣結積腹冷腸鳴下痢腰疼帶下疝瘕久服令人發脫取肉作臛宜人發石令腸結生南海似珠母一頭尖中銜少毛海人亦名淡菜新注云此名殼菜大甘美南人好食治虛勞傷憊精血少者及吐血婦人帶下漏下丈夫久痢並煮食之任意出江湖蝦無須及煮色白者不可食謹按小者生水田及溝渠中有小毒小兒患赤白遊腫搗碎敷之鮓內者甚有毒爾新見孟詵陳藏器食主五野雞病小兒患赤白遊疹搗碎敷之煮熟色正赤小兒及雞狗食之腳屈不行江湖中者稍大煮之色白陶云白者殺人非也海中有大者已出拾遺條中以熱飯盛密器中作鮓食之毒人至死食療云平動風發瘡疥蚺音髯蛇膽味甘苦寒有小毒主心腹䘌痛下部䘌瘡目腫痛膏平有小毒主皮膚風毒婦人産後腹痛余疾陶隱居云此蛇出晉安大者三二圍在地行住不舉頭者是真舉頭者非真形多相似彼土以此別之膏膽又相亂也真膏纍纍如梨豆子相著他蛇膏皆大如梅李子真膽狹長通黑皮膜極薄舐之甜苦摩以注水即沉而不散其僞者並不爾此物最難得真真膏多所入藥用亦云能療伯牛疾唐本注云此膽剔取如米粟著淨水中浮游水上回旋行走者為真多著亦即沉散其少著徑沉者諸膽血並爾陶所說真僞正反今出桂廣以南高賀等州大有將肉為膾以為珍味難死似鼉稍截食之其形似鱧魚頭若鼉頭尾圓無鱗或言鱧魚變為之也臣禹錫等謹按蜀本圖經云出交廣二州嶺南諸州大者徑尺長丈許若蛇而粗短藥性論云蚺蛇膽臣渡嶺南食此膾瘴毒不侵世人皆知之膽主下部蟲殺小兒五疳孟詵云蚺蛇膏主皮肉間毒氣肉作膾食之除疳瘡小兒腦熱水漬注鼻中齒根宣露和麝香末敷之其膽難識多將諸膽代之可細切於水中走者真也又豬及大蟲膽亦走遲於此膽陳藏器云蚺蛇本功外膽主破血止血痢蠱毒下血小兒熱丹口瘡疳痢肉主飛尸遊蠱喉中有物吞吐不得出者作膾食之其膾著醋能卷人箸以芒草為箸不然終不可脫至難死開肋邊取膽放之猶能生三五年平復也段成式酉陽雜俎云蚺蛇長十丈嘗吞鹿鹿消盡乃繞樹出骨養瘡時肪腴甚美或以婦人衣投之則蟠而不起其膽上旬近頭中旬在心下旬近尾圖經曰蚺蛇膽本經不載所出州土陶隱居云出晉安蘇恭云出桂廣以南高賀等州今嶺南州郡皆有之此蛇極大彼土人多食其肉取其膽及膏為藥嶺表録異云雷州有養蛇戶每歲五月五日即擔舁蚺蛇入官以取膽每一蛇皆兩人擔舁致大籃籠中藉以軟草屈盤其中將取之則出置地上用杈拐十數翻轉蛇腹旋覆按之使不得轉側約分寸於腹間剖出肝膽膽狀若鴨子大切取之復納肝腹中以線縫合創口蛇亦復活舁歸放於川澤其膽曝乾以充土貢或云蛇被取膽它日見捕者則遠遠側身露腹瘡明已無膽以此自脫或云此蛇至難死剖膽復能活三年未知的否耳此物極多僞欲試之剔取如粟米許著淨水上浮游水上回旋行走者為真其徑沉者諸膽血也試之不可多多亦沉矣膏之真者纍纍如梨豆子他蛇膏皆大如梅李子此為別也下條又有蝮蛇膽其蛇黃黑色黃頷尖口毒最烈取其膽以為藥主䘌瘡肉釀作酒以治大風及諸惡風瘡瘡瘻瘰癧皮膚頑痹等然今人不復用此法此蛇多在人家屋間吞鼠子及雀雛見其腹大破取鼠干之療鼠瘻陳藏器說蛇中此蛇獨胎産形短鼻反錦紋其毒最猛著手斷手著足斷足不爾合身糜潰矣蝮蛇至七八月毒盛時常自齧木以泄其毒其木即死又吐口中沫於草木上著人身成瘡名曰蛇漠卒難療治所主與衆蛇同方又下蛇蛻條云生荊州川穀及田野五月五日十五日取之良今南中於木石上及人家屋栱間多有之古今方書用之最多或云蛇蛻無時但著不淨物則脫矣古今治蛇毒方甚多葛洪張文仲並言其形狀文仲云蝮蛇形乃不長頭扁口尖頭斑身赤紋斑亦有青黑色者人犯之頭足貼著是也東間諸山甚多草行不可不慎之又有一種狀如蝮而短有四腳能跳來齧人東人名為千歲蝮人或中之必死然其齧人已即跳上木作聲其聲云斫木斫木者不可救也若云博叔博叔者猶可急療之其療之方細辛雄黃等分末以納瘡中日三四易之諸蛇及虎傷亦主之又以桂栝蔞末著管中密塞之帶行中毒急敷之緩乃不救葛氏云青蝰蛇緣色喜緣木及竹上大者不過四五尺色與竹木一種其尾三四寸色異者名熇尾蛇最毒中之急灸瘡中三五壯毒則不行又用雄黃乾薑末以射罔和之敷瘡又闢衆蛇方云闢蛇之藥雖多唯以武都雄黃為上帶一塊古稱五兩者於肘間則莫敢犯他人中者便磨以療之又帶五蛅黃丸以其丸有蜈蚣故也其方至今傳之亦可單燒蜈蚣末敷著瘡上皆驗海藥云謹按徐表南州記云生嶺南正經云出晉安及高賀州彼人畜養而食之膽大寒毒主小兒八癇男子下部䘌欲認辨真假但割膽看內細如粟米水中浮走者是真也沉而散者非也食療膽主䘌瘡瘻目腫痛疳䘌肉主溫疫氣可作膾食之如無此疾及四月勿食之膏主皮膚間毒氣小兒疳痢以膽灌鼻中及下部聖惠方治小兒急疳瘡用蚺蛇膽細研水調敷之楊氏産乳療溫痢久不斷體瘦昏多睡坐則閉目食不下蚺蛇膽大如豆二枚煮通草汁研膽以意多少飲之並塗五心並下部又方療齒疳蚺蛇膽末敷之顧含養嫂失明含嘗藥視膳不冠不食嫂目疾須用蚺蛇膽含計盡求不得有一童子以一合授含含開乃蚺蛇膽也童子出門化為青鳥而去嫂目遂瘥朝野僉載泉州盧元欽患大風唯鼻未倒五月五日取蚺蛇膽欲進或云肉可治風遂一截蛇肉食之三五日頓覺漸可百日平復蛇蛻音稅味鹹甘平無毒主小兒百二十種驚癇瘛尺曳切瘲子用切癲疾寒熱腸痔蟲毒蛇癇弄舌搖頭大人五邪言語僻越惡瘡嘔咳明目火熬之良一名龍子衣一名蛇符一名龍子皮一名龍子單衣一名弓皮生荊州川穀及田野五月五日十五日取之良畏磁石及酒陶隱居云草中不甚見虺蝮蛇惟有長者多是赤練力建切黃頷輩其皮不可復識今往往得爾皆須完全石上者彌佳燒之甚療諸惡瘡也今按陳藏器本草云蛇蛻主瘧取正發日以蛻皮塞病人兩耳臨發又以手持少許並服一合鹽醋汁令吐也臣禹錫等謹按藥性論云蛇蛻皮臣有毒能主百鬼魅兼治喉痹日華子云治蠱毒辟惡止嘔逆治小兒驚悸客忤催生癧瘍白癜風煎汁敷入藥並炙用圖經文具蚺蛇膽條下雷公凡使勿用青黃蒼色者要用白如銀色者凡欲使先於屋下以地掘一坑可深一尺二寸安蛇皮於中一宿至卯時出用醋浸一時於火上炙乾用之食療蛇蛻皮主去邪明目治小兒一百二十種驚癇寒熱腸痔蠱毒諸䘌惡瘡安胎熬用之聖惠方治白駁用燒末醋調敷上佳又方治小兒重齶重斷腫痛燒末敷之效外臺祕要治身體白駁以皮熟摩之數百遍訖棄皮於草中千金方治諸腫失治有膿燒蛇蛻皮水和封腫上即蟲出又方治緊唇以燒灰先拭之敷上又方日月未足而欲産以全蛇蛻一條欲痛時絹袋盛繞腰又方治惡瘡十年不瘥似癩者燒全者一條為末豬脂和敷上肘後方小兒初生月蝕瘡及惡瘡燒末和豬脂敷上食醫心鏡小兒喉痹腫痛燒末以乳汁服一錢匕十全博救治橫生難産方蛇皮一條瓶子納鹽泥固濟存性燒為黑灰每服二錢用榆白皮湯調服立下必效方五痔肛脫以死蛇一枚指大者濕用掘地作坑燒蛇取有孔板覆坑坐上蟲盡出也孫真人主蛇露瘡用蛇蛻燒末和水調敷上杜壬方治纏喉風咽中如束氣不通蛇蛻炙黃以當歸等分為末溫酒調一錢匕得吐愈姚和衆云小兒重舌焦炙研末日三敷舌下一度著一豆許子母祕録治小兒吐血燒蛇蛻末以乳汁調服又方治小兒頭面身上生諸瘡燒末和豬脂敷上産書治産不順手足先見者蛇蛻皮燒作灰研面東酒服一錢匕更以藥末敷手足即順也楊氏産乳療兒吹著奶疼腫欲作急療方蛇蛻一尺七寸燒令黑細研以好酒一盞微溫頓服未甚效更服初虞世治陷甲生入肉常有血疼痛蛇皮一條燒存性雄黃一彈子同研以溫漿水洗瘡針破貼藥衍義曰蛇蛻從口翻退出眼睛亦退今閣眼藥多用取此義也入藥洗淨蜘蛛微寒主大人小兒㿉七月七日取其網療喜音戲忘陶隱居云蜘蛛類數十種爾雅只載七八種爾今此用懸網狀如魚罯者亦名䖦章悅切蟱音謀蜂及蜈蚣螫人取置肉上則能吸毒又以斷瘧及乾嘔霍亂術家取其網著衣領中闢忘有赤斑者俗名絡新婦亦入方術用之其餘雜種並不入藥詩云蠨音蕭蛸音鞘在戶正謂此也唐本注云別録云療小兒大腹疔奚三年不能行者又主蛇毒溫瘧霍亂止嘔逆劍南山東為此蟲齧瘡中出絲屢有死者其網纏贅之鋭切疣七日消爛有驗矣臣禹錫等謹按日華子云斑蜘蛛冷無毒治瘧疾疔腫網七夕朝取食令人巧去健忘又云壁錢蟲平微毒治小兒吐逆止鼻洪並瘡滴汁敷鼻中及瘡上並敷瘻瘡是壁上作繭蜘蛛也圖經曰蜘蛛舊不著生出州郡今處處有之其類極多爾雅云次蠹音秋蜘蛛音與知朱字同蜘蛛蛛蝥郭璞云江東呼蝃音蝃蝥者又云土蜘蛛在地布網者草蜘蛛絡幕草上者蠨音蕭蛸音鞘長踦小蜘蛛長腳者俗呼為喜子陶隱居云當用懸網狀如魚罾者亦名䖦蟱則爾雅所為蛛蝥郭璞所謂蝃蝥者是也古方主蛇蜂蜈蚣毒及小兒大腹疔奚贅疣今人蛇齧者塗其汁小兒腹疳者燒熟啖之贅疣者取其網絲纏之蜂及蜈蚣毒者生置痛處令吸其毒皆有驗然此蟲中人尤慘惟飲羊乳汁可制其毒出劉禹錫傳信方云張仲景治雜病方療陰狐疝氣偏有大小時時上下者蜘蛛散主之蜘蛛十四枚熬焦桂半兩二物為散每服八分一匕日再蜜丸亦通雷公凡使勿用五色者兼大身上有刺毛生者並薄小者以上並不堪用凡欲用要在屋西面有網身小尻大腹內有蒼黃膿者真也凡用去頭足了研如膏投入藥中用聖惠方治瘰癧無問有頭無頭用大蜘蛛五枚曬乾細研酥調如面脂日兩度貼之外臺祕要崔氏治疣目以蜘蛛網絲繞纏之自落千金方中風口喎僻取蜘蛛子摩其偏急頰車上候視正即止亦可向火摩之又方治背瘡彌驗方取戶邊蜘蛛杵以醋和先挑四畔令血出根稍露用藥敷干即易旦至夜拔根出大有神效又方治鼠瘻腫核痛若已有瘡口出膿水者燒蜘蛛二七枚敷良又方治人心孔昏塞多忘喜誤七月七日取蜘蛛網著領中勿令人知則永不忘也又方卒脫肛燒蜘蛛肚敷肛上經驗方孫真人備急治齒牙有孔蜘蛛殼一枚綿裹按其內廣利方治蠍螫人研蜘蛛汁敷之瘥乘閒方治瀉多時脫肛疼痛黑聖散大蜘蛛一個瓠葉重裹線系定合子內燒令黑色存性取出細研入黃丹少許同研凡有上件疾先用白礬蔥椒煎湯洗浴拭乾後將藥末糝在軟處帛上將手掌按托入收之妙談氏方係指並贅瘤方以花蜘蛛網上大網絲於黃丹中養之係指與瘤夜至旦自下孫真人蜈蚣咬取蜘蛛一枚咬處安當自飲毒蜘蛛死痛未止更著生者産寶方治産後咳逆經三五日不止欲死方煎壁錢窠三五個呷瘥衍義曰蜘蛛品亦多皆有毒經不言用是何種今人多用人家檐角籬頭陋巷之間空中作圓網大腹深灰色者遺尿著人作瘡癬蝮蛇膽味苦微寒有毒主䘌瘡肉釀作酒療癩疾諸瘻心腹痛下結氣除蠱毒其腹中吞鼠有小毒療鼠瘻陶隱居云蝮蛇黃黑色黃頷尖口毒最烈虺形短而扁毒不異於蚖中人不即療多死蛇類甚衆惟此二種及青蝰為猛療之並別有方蛇皆有足五月五日取燒地令熱以酒沃之置中足出術家所用赤連黃頷多在人家屋間吞鼠子雀雛見腹中大者破取干之唐本注云蛇屎療痔瘻器中養取之皮灰療疔腫惡瘡骨疽蛻皮主身癢瘑疥癬等蝮蛇作地色鼻反口又長身短頭尾相似大毒一名蚖蛇無二種也山南漢沔間足有之臣禹錫等謹按蜀本圖經云形粗短黃黑如土色白斑鼻反者山南金州房州均州皆有之陳藏器云蝮蛇按蛇既衆多入用非一本經雖載未能分析其蝮蛇形短鼻反錦文亦有與地同色者著足斷足著手斷手不爾合身糜潰其蝮蛇七八月毒盛時齧樹以泄其氣樹便死又吐口中涎沫於草木上著人身腫成瘡卒難主療名曰蛇漠瘡蝮所主略與虺同衆蛇之中此獨胎産本功外宣城間山人取一枚活著器中以醇酒一斗投之埋於馬溺處周年以後開取酒味猶存蛇已消化有患大風及諸惡風惡瘡瘰癧皮膚頑痹半身枯死皮膚手足臟腑間重疾並主之不過服一升以來當覺舉身習習服訖服他藥不復得力亦有小毒不可頓服腹中死鼠主鼠瘻脂磨著物皆透又主癩取一枚及他蛇亦得燒坐上當有赤蟲如馬尾出仍取蛇肉塞鼻中亦主赤痢取骨燒為黑末飲下三錢匕雜蛇亦得藥性論云蝮蛇膽君治下部蟲殺蟲良蛇主治五痔腸風瀉血圖經文具蚺蛇膽條下食療主諸䘌肉療癩諸瘻下結氣除蠱毒如無此疾者即不假食也肘後方治白癩大腹蛇一條勿令傷以酒漬之大者一斗小者五升以糠火溫令稍稍熱取蛇一寸許以臘月豬脂和敷上梅師方治臂腕痛取死蛇一條以水煮取濃汁浸腫痛冷易之白頸蚯蚓味鹹寒大寒無毒主蛇瘕去三蟲伏尸鬼疰蠱毒殺長蟲仍自化作水療傷寒伏熱狂謬大腹黃疸一名土龍生平土三月取陰乾陶隱居云白頸是其老者爾取破去土鹽之日曝須臾成水道術多用之溫病大熱狂言飲其汁皆瘥與黃龍湯療同也其屎呼為蚓螻音婁食細土無沙石入合丹泥釜用若服此干蚓應熬作屑去蛔蟲甚有驗也唐本注云別録云鹽沾為汁療耳聾鹽消蛔功同蚯蚓其屎封狂犬傷毒出犬毛神效臣禹錫等謹按蜀本注又云解射罔毒藥性論云蚯蚓亦可單用有小毒乾者熬末用之主蛇傷毒一名地龍子日華子云蚯蚓治中風並癇疾去三蟲治傳尸天行熱疾喉痹蛇蟲傷又名千人踏即是路行人踏殺者入藥燒用其屎治蛇犬咬並熱瘡並鹽研敷小兒陰囊忽虛熱腫痛以生甘草汁調輕輕塗之圖經曰白頸蚯蚓生平土今處處平澤皋壤地中皆有之白頸是老者耳三月採陰乾一雲鬚破去土鹽之曬乾方家謂之地龍治腳風藥必須此物為使然亦有毒曾有人因腳病藥中用此果得奇效病既愈服之不輟至二十餘日而覺躁憒亂但欲飲水不已遂至委頓凡攻病用毒藥已愈當便罷服也其矢呼為蚓螻並鹽敷瘡可去熱毒陳藏器蚯蚓糞土療赤白久熱痢取無沙者末一升炒令煙盡水沃取半大升濾去粗滓空肚服之雷公凡使收得後用糯米水浸一宿至明漉出以無灰酒浸一日至夜漉出焙令乾後細切取蜀椒並糯米及切了蚯蚓三件同熬之待糯米熟去水椒了揀淨用之凡修事二兩使米一分椒一分為準聖惠方治風赤眼以地龍十條炙乾為末夜臥以冷茶調下二錢匕又方洽蚰蜒入耳地龍一條納蔥葉中化水滴耳中其蚰蜒亦化為水又方治一切丹毒流腫用地龍屎水和敷之又方治代指用蚯蚓杵為泥敷之又方治小兒吐乳用田中地龍糞一兩研末空心以粥飲調下半錢匕不過二三服效外臺祕要治火丹取曲蟺糞水和泥敷之千金方治齒齦宣露蚯蚓屎水和為泥火燒令極赤研之如粉臘月豬脂和敷上日三永瘥千金翼治裂齒痛取死曲蟺末敷之止斗門方治小便不通用蚯蚓杵以冷水濾過濃服半碗立通兼大解熱疾不知人事欲死者服之立效勝金方治耳聾立效以乾地龍入鹽貯在蔥尾內為水點之子母祕録小兒耳後月蝕瘡燒蚯蚓屎合豬脂敷之談氏小兒治蜘蛛咬遍身瘡子以蔥一枝去尖頭作孔將蚯蚓入蔥葉中緊捏兩頭勿泄氣頻搖動即化為水點咬處瘥孫真人小兒患潰耳出膿水成瘡汙方以蚯蚓糞碾末敷之兼吹耳中立效百一方治交接勞復陰卵腫或縮入腹腹絞痛或便絶蚯蚓數條絞取汁服之良又方治中蠱毒或吐下血若爛肝取蚯蚓十四枚以苦酒三升漬之蚓死但服其汁已死者皆可活衍義曰白頸蚯蚓自死者良然亦應候而鳴此物有毒昔有病腹大夜聞蚯蚓鳴於身有人教用鹽水浸之而愈崇寧末年隴州兵士暑月中在倅廳前跣立廳下為蚯蚓所中遂不救後數日又有人被其毒敷識者教以先飲鹽湯一杯次以鹽湯浸足乃愈今入藥當去土了微炙若治腎臟風下疰病不可闕也仍須鹽湯送王荊公所謂藁壤太牢俱有味可能蚯蚓獨清廉者也蠮音噎螉烏紅切味辛平無毒主久聾咳逆毒氣出刺出汗療鼻窒陟栗切其土房主癰腫風頭一名土蜂生熊耳川穀及牂牁或人屋間陶隱居云此類甚多雖名土蜂不就土中為窟謂摙力展切土作房爾今一種黑色腰甚細銜泥於人室及器物邊作房如並竹管者是也其生子如粟米大置中乃捕取草上青蜘蛛十餘枚滿中仍塞口以擬其子大為糧也其一種入蘆竹管中者亦取草上青蟲一名蜾螺詩人云螟蛉有子蜾螺負之言細腰物無雌皆取青蟲教祝音咒便變成己子斯為謬矣造詩者乃可不詳未審夫子何為因其僻邪聖人有闕多皆類此唐本注云土蜂土中為窠大如烏蜂不傷人非蠮螉蠮螉不入土中為窠雖一名土蜂非蠮螉也今按李含光音義云咒變成子近亦數有見者非虛言也臣禹錫等謹按蜀本注云按爾雅果螺蒲盧注云即細腰蜂也俗呼為蠮螉詩云螟蛉有子蜾螺負之注曰螟蛉桑蟲也蜾螺蒲盧也言蒲盧負持桑蟲以成其子乃知蠮螉即蒲盧也蒲盧即細腰蜂也據此不獨負持桑蟲以他蟲入穴摙泥封之數日則成蜂飛去陶云是先生子如粟在穴然捕它蟲以為之食今人有候其封穴了壞而看之果見有卵如粟在死蟲之上則如陶說矣而詩人以為喻者蓋如其大而不知其細也陶又說此蜂黑色腰甚細能摙泥在屋壁間作房如並竹管者是也亦有入竹管中器物間作穴者但以泥封其穴口而已圖經云摙泥作窠或雙或只得處便作不拘土石竹木間今所在皆有之日華子云蠮螉有毒治嘔逆生研竹木刺入藥炒用圖經曰蠮螉生熊耳川穀及牂牁或人家屋間今處處有之黑色而腰細雖一名土蜂而不在土中作穴但摙土於人家壁間或器物旁作房如比竹管者是謹按郭璞注爾雅果螺蒲盧云即細腰蜂也俗呼為蠮螉又詩小雅云螟蛉有子蜾螺負之注螟蛉桑蟲也蜾螺蒲盧也言蒲盧取桑蟲之子負持而去嫗養之以成其子又楊雄法言云螟蛉之子殪而逢果螺祝之曰類我類我注云蜾螺遇螟蛉而受化久乃變成蜂爾據諸經傳皆言此蜂取他蟲而化為己子陶隱居乃謂生子如粟米大在其房中乃捕取草蟲以擬其子大為糧耳又有人壞其房而看之果見有卵如粟在死蟲之上皆如陶之說又段成式云書齊中多蠮螉好作窠於書卷或在筆管中祝聲可聽有時開卷視之悉是小蜘蛛大如蠅虎旋以泥隔之乃知不獨負桑蟲也數說不同人或疑之然物類變化固不可度蚱蟬生於轉丸衣魚生於瓜子龜生於蛇蛤生於雀白鶂之相視負螽之相應其類非一若桑蟲蜘蛛之變為蜂不為異矣如陶所說卵如粟者未必非祝蟲而成之也宋齊丘所謂蠮螉之蟲孕螟蛉之子傳其情交其精混其氣和其神隨物大小俱得其真蠢動無定情萬物無定形斯言得之矣陳藏器云土蜂蠮螉注蘇云土蜂土中為窠大如烏蜂按土蜂赤黑色燒末油和敷蜘蛛咬瘡此物能食蜘蛛亦取其相伏也聖惠方治小兒霍亂吐瀉方用蠮螉窠微炙為末以乳汁調下一字止衍義曰蠮螉諸家所論備矣然終不敢舍詩之意嘗析窠而視之果有子如半粟米大其色白而微黃所負蟲亦在其中乃青菜蟲卻在子下不與蟲相著又非葉蟲及草上青蟲應是諸蟲皆可也陶隱居所說近之矣人取此房研細醋調塗蜂蠆葛上亭長味辛微溫有毒主蠱毒鬼疰破淋結積聚墮胎七月取曝乾陶隱居云葛花時取之身黑而頭赤喻如人著玄衣赤幘故名亭長此一蟲五變為療皆相似二月三月在芫花上即呼芫青四月五月在王不留行上即呼王不留行蟲六月七月在葛花上即呼為葛上亭長八月在豆花上即呼斑蝥九月十月欲還地蟄即呼為地膽此是僞地膽爾為療猶同其類亭長腹中有卵白如米粒主療諸淋結也唐本注云今檢本草及古今諸方未見用王不留行蟲者若爾則四蟲專在一起今地膽出豳音邠州芫青出寧州亭長出雍州斑蝥所在皆有四蟲出四處其蟲可一處周遊四州乎且芫青斑蝥形段相似亭長地膽貌狀大殊豳州地膽三月至十月草萊上採非地中取陶之所言恐浪證之爾臣禹錫等謹按蜀本圖經云五月六月葛葉上採取之形似芫青而蒼黑色凡用斑蝥芫青亭長之類當以糯米同炒看米色黃黑即出去頭足及翅腳以亂髮裹懸屋棟上一宿然後入藥用圖經文附芫青條下蜈蚣味辛溫有毒主鬼疰蠱毒啖諸蛇蟲魚毒殺鬼物老精溫瘧去三蟲療心腹寒熱結聚墮胎去惡血生大吳川穀江南赤頭足者良陶隱居云今赤足者多出京口長山高麗山茅山亦甚有於腐爛積草處得之勿令傷曝乾之黃足者甚多而不堪用人多火炙令赤以當之非真也一名蝍蛆莊周云蝍蛆甘帶淮南子云騰蛇遊霧而殆於蝍蛆其性能制蛇勿見大蛇便緣而啖其腦蜈蚣亦齧人以桑汁白鹽塗之即愈唐本注云山東人呼蜘蛛一名蝍蛆亦能制蛇而蜘蛛條無制蛇語莊周云蝍蛆甘帶淮南云騰蛇殆於蝍蛆並言蜈蚣矣臣禹錫等謹按蜀本圖經云生山南谷土石間人家屋壁中亦有形似馬陸扁身長黑頭足赤者良今出安襄鄧隨唐等州七月八月採日華子云蜈蚣治症癖邪魅蛇毒入藥炙用圖經曰蜈蚣生吳中川穀及江南今江浙山南唐鄧間皆有之多在土石及人家屋壁間以頭足赤者為勝七八月取之黃足者最多人以火炙令赤以當之不堪用也其性能制蛇忽見大蛇便緣而啖其腦陶隱居及蘇恭皆以為莊子稱蝍蛆甘帶淮南子云騰蛇殆於蝍蛆並言蝍蛆是此蜈蚣也而郭注爾雅蒺藜蝍蛆云似蝗而大腹長角乃又似別種下有馬陸條亦與蜈蚣相類長三四寸斑色其死側臥狀如刀環故一名刀環蟲書傳云百足之蟲至死不僵此蟲足多寸寸斷之亦便寸行是也胡洽治尸疰惡氣諸方皆用蜈蚣今醫治初生兒口噤不開不收乳者用赤足蜈蚣去足炙末以豬乳二合調半錢分三四服溫灌之雷公云凡使勿用千足蟲真似只是頭上有白肉面並嘴尖若誤用並把著腥臭氣入頂致死夫使蜈蚣先以蜈蚣木末不然用柳蚛末於土器中炒令木末焦黑後去水末了用竹刀刮去足甲了用千金方大治射工水弩毒以蜈蚣大者一枚炙為末和苦酒敷之亦治口噤子母祕録治小兒撮口病但看舌上有瘡如粟米大是也以蜈蚣汁刮破指甲研敷兩頭肉瘥如無生者乾者亦得抱朴子云末蜈蚣以治蛇瘡衍義曰蜈蚣背光黑緑色足赤腹下黃有中其毒者以鳥雞屎水稠調塗咬處效大蒜塗之亦效復能治丹毒瘤蜈蚣一條幹者白礬皂子大雷丸一個百部二錢稱同為末醋調塗之又畏蛞蝓不敢過所行之路觸其身則蜈蚣死人故取以治蜈蚣毒桑汁白鹽亦效蛤蚧味鹹平有小毒主久肺癆傳尸殺鬼物邪氣療咳嗽下淋瀝通水道生嶺南山谷及城牆或大樹間身長四五寸尾與身等形如大守宮一雄一雌常自呼其名曰蛤蚧最護惜其尾或見人欲取之多自齧斷其尾人即不取之凡採之者須存其尾則用之力全故也方言曰桂林之中守宮能鳴者謂蛤蚧蓋相似也今附臣禹錫等謹按嶺表録異云蛤蚧首如蝦蟆背有細鱗如蠶子土黃色身短尾長多巢於榕樹中端州子牆內有巢於廳署城樓間者旦暮則鳴自呼蛤蚧或云鳴一聲是一年者俚人採之鬻於市為藥能治肺疾醫人云藥力在尾尾不具者無功日華子云無毒治肺氣止嗽並通月經下石淋及治血又名蛤蟹合藥去頭足洗去鱗鬣內不淨以酥炙用良圖經曰蛤蚧生嶺南山谷及城牆或大木間今嶺外亦有之首若蝦蟆背有細鱗如蠶子色黃如土長四五寸尾與身等蓋守宮蝘蜓之類也故揚雄方言云桂林之中守宮能鳴者俗謂之蛤蚧言其鳴自呼其名也藥力全在尾人捕之則自齧斷其尾因得釋去巢穴多依榕木亦有在古屋城樓間者人欲得其首尾完者乃以長柄兩股鐵叉如黏黍黐竿狀伺於榕木間以叉刺之皆一股中腦一股著尾故不能齧也行常一雄一雌相隨入藥亦須兩用之或云陽人用雌陰人用雄海藥云謹按廣州記云生廣南水中有雌雄狀若小鼠夜即居於榕樹上投一獲二嶺外録云首如蝦蟆背有細鱗身短尾長旦暮自鳴蛤蚧俚人採之割腹以竹開張曝乾鬻於市力在尾尾不全者無效彼人用療折傷近日西路亦出其狀雖小滋力一般無毒主肺痿上氣咯血咳嗽並宜丸散中使凡用炙令黃熟熟搗口舍少許奔走令人不喘者是其真也雷公云凡使須認雄雌若雄為蛤皮粗口大身小尾粗雌為蚧口尖身大尾小男服雌女服雄凡修事服之去甲上尾上並腹上肉毛毒在眼如斯修事了用酒浸才幹用紙兩重於火上緩隔焙紙炙待兩重紙干焦透後去紙取蛤蚧於瓷器中盛於東舍角畔懸一宿取用力可十倍勿傷尾效在尾也衍義曰蛤蚧補肺虛癆嗽有功治久嗽不愈肺間積虛熱久則成瘡故嗽出膿血曉夕不止喉中氣塞胸鬲噎痛蛤蚧阿膠生犀角鹿角膠羚羊角一兩除膠外皆為屑次入膠分四服每服用河水三升於銀石器中慢火煮至半升濾去滓臨臥微溫細細呷其滓候服盡再捶都作一服以水三升煎至半升如前服若病人久虛不喜水當遞減水張刑部子皋病極田樞密況送此方遂愈水蛭音質味鹹苦平微寒有毒主逐惡血瘀血月閉破血瘕積聚無子利水道又墮胎一名蚑一名至掌生雷澤池澤五月六月採曝乾陶隱居云蚑音蜞今復有數種此用馬蜞得齧人腹中有血者仍干為佳山蚑及諸小者皆不用楚王食寒菹所得而吞之果能去結積雖曰陰祐亦是物性兼然唐本注云此物有草蛭水蛭大者長尺名馬蛭一名馬蜞並能咂牛馬人血今俗多取水中小者用之大效不必要須食人血滿腹者其草蛭在深山草上人行即敷著脛股不覺遂於肉中産育亦大為害山人自有療法也臣禹錫等謹按蜀本云採得之當用䈽竹筒盛待乾又米泔浸一宿後曝乾以冬豬脂煎令焦黃然後用之勿誤採石蛭泥蛭用石泥二蛭頭尖腰粗色赤不入藥誤食之則令人眼中如生煙漸致枯損今用水中小者耳陳藏器云水蛭本功外人患赤白遊疹及癰腫毒腫取十餘枚令啖一作𫫠病處取皮皺肉白無不瘥也冬月無蛭蟲地中掘取暖水中養之令動先洗去人皮咸以竹筒盛蛭綴之須臾便咬血滿自脫更用飢者崔知悌令兩京無處預養之以防緩急收干蛭當展其身令長腹中有子者去之此物難死雖加火炙亦如魚子煙燻三年得水猶活以為楚王之病也藥性論云水蛭使主破女子月候不通欲成血癆症塊能治血積聚日華子云畏石灰破癥結然極難修制須細銼後用微火炒令色黃乃熟不爾入腹生子為害圖經曰水蛭生雷澤池澤今近處河池中多有之一名蜞此有數種生水中者名水蛭亦名螞蟥生山中者名石蛭生草中者名草蛭生泥中者名泥蛭並皆著人及牛馬股脛間齧咂其血甚者入肉中産育為害亦大水蛭有長尺者用之當以小者為佳六月採曝乾一云採得當以䈽竹筒盛之待乾又用米泔浸經宿然後出之曝已又用冬月豬脂煎令黃乃堪用干蛭當展令長腹中有子者去之古法有用水蛭啖瘡者緩急所須亦不可得崔知悌令預收養之以備用此物極難死加火炙經年得水猶可活也石蛭等並頭尖腹粗不堪入藥誤用之則令人目中生煙不已漸致枯損不可不辨也經驗方治折傷用水蛭新瓦上焙乾為細末熱酒調下一錢食頃痛可更一服痛止便將折骨藥封以物夾定直候至效初虞世治從高墜下及打擊內傷神效麝香水蛭各一兩銼碎炒令煙出二件研為末酒調一錢當下畜血未止再服其效如神衍義曰水蛭陳藏器日華子所說備矣大者京師又謂之馬鱉腹黃者謂之螞蟥畏鹽然治傷折有功經與注皆不言修制宜仔細不可忽也今人用者皆炒斑蝥味辛寒有毒主寒熱鬼疰蠱毒鼠瘻疥癬惡瘡疽蝕死肌破石癃血積傷人肌墮胎一名龍尾生河東川穀八月取陰乾馬刀為之使畏巴豆丹參空青惡膚青陶隱居云豆花時取之甲上黃黑斑色如巴豆大者是也臣禹錫等謹按蜀本圖經云七月八月大豆葉上甲蟲長五六分黃斑紋烏腹者今所在有之吳氏云斑蝥一名斑蠔音刺一名龍蠔一名斑菌一名腃發一名盤蛩一名晏青神農辛歧伯咸桐君有毒扁鵲甘有大毒生河內川穀或生水石藥性論云斑蝥使一名龍苗有大毒能治瘰癧通利水道日華子云惡豆花療淋疾敷惡瘡瘻爛入藥除翼足熟炒用生即吐瀉人圖經曰斑蝥生河東川穀今處處有之七月八月大豆盛時此蟲多在葉上長五六分甲上黃黑斑紋烏腹尖喙如巴豆大就葉上採之陰乾古方書多有用此其字或作斑蠡亦作斑蠔入藥不可令生生即吐瀉人外臺祕要救急治疔腫方斑蝥一枚捻破以針劃瘡上作米字封之即根乃出又方治乾癬積年生痂搔之黃水出每逢陰雨即癢用斑蝥半兩微炒為末蜜調敷之經驗方大治大人小兒瘰癧內消方斑蝥一兩去翅足用粟米一升同斑蝥炒令米焦黃去米不用細研入干薄荷末四兩同研令勻以烏雞子清丸如緑豆大空心臘茶下一丸加至五丸卻每日減一也減至一丸後每日服五丸肘後方治沙蝨毒斑蝥二枚一枚末服之一枚燒令煙絶研末以敷瘡中立瘥廣利方治瘰癧經久不瘥斑蝥一枚去翅足微炙以漿水一盞空腹吞之用蜜水下重者不過七枚瘥又方妊娠或已不活欲下胎燒斑蝥末服一枚即下衍義曰斑蝥須糯米中炒米黃為度妊身人不可服為能潰人肉治淋藥多用極苦人尤宜斟酌下條芫青其用與此不相遠故附於此田中螺汁大寒主目熱赤痛止渴陶隱居云生水田中及湖瀆岸側形圓大如梨桔者人亦煮食之煮汁亦療熱醒酒止渴患眼痛取珍珠並黃連納其中良久汁出取以注目中多瘥唐本注云別録云殼療尸疰心腹痛又主失精水漬飲汁止渴今按陳藏器本草云田中螺煮食之利大小便去腹中結熱目下黃腳氣衝上小腹急硬小便赤澀腳手浮腫生浸取汁飲之止消渴碎其肉敷熱瘡爛殼燒為灰末服主反胃臣禹錫等謹按蜀本圖經云生水田中大如桃李狀類蝸牛而尖長青黃色夏秋採之藥性論云田螺汁亦可單用主治肝熱目赤腫痛取大者七枚洗淨新汲水養去穢泥重換水一升浸洗仍旋取於乾淨器中著少鹽花於口上承取自出者用點目逐個如此用了卻放之日華子云田螺冷無毒治手足腫及熱瘡生研汁敷之陳藏器云在水田中圓大者是小小泥有稜名䗁螺亦止渴不能下水食之當先米泔浸去泥此物至難死有誤泥在壁中三十年猶活能伏氣飲露唯生穿散而出即死爛殼燒為灰末服主反胃胃冷去卒心痛食療云大寒汁飲療熱醒酒壓丹石不可常食聖惠方治連月飲酒咽喉爛舌上生瘡水中螺蚌肉蔥豉椒姜煮飲汁三兩盞瘥食醫心鏡主消渴飲水日夜不止口乾小便數田中螺五升水一斗浸經宿渴即飲之每日一度易水換生螺為妙又方云以水三升煮取汁渴即飲之螺即任吃貝子味鹹平有毒主目翳鬼疰蠱毒腹痛下血五癃利水道除寒熱溫疰解肌散結熱燒用之良一名貝齒生東海池澤陶隱居云此是今小小貝子人以飾軍容服物者乃出南海燒作細屑末以吹眼中療翳良又真馬珂搗末亦療盲翳臣禹錫等謹按蜀本圖經云蝸類也形若魚齒潔者良藥性論云貝子使能破五淋利小便治傷寒狂熱日華子云貝齒涼治翳障並鬼毒鬼氣下血又名白貝圖經曰貝子生東海池澤今南海亦有之貝類之最小者又若蝸狀而交州記曰大貝出日南如酒杯小貝貝齒也善治毒俱有紫色是也潔白如魚齒故一名貝齒古人用以飾軍容服物今稀用但穿之與小兒戲髰頭家以飾鑑帶畫家亦或使砑物採無時珂亦似此而大黃黑色其骨白可以飾馬海藥云雲南極多用為錢貨易主水氣浮腫及孩子疳蝕吐乳並燒過入藥中用雷公云凡使勿用花蟲殼其二味相似只是用之無效凡使先用苦酒與蜜相對稱二味相和了將貝齒於酒蜜中蒸取出卻於清酒中淘令淨研用聖惠方治射罔在諸肉中有毒及漏脯毒用貝子末水調半錢服效或食麵臛毒亦同用千金方點小兒黑花眼翳澀痛用貝齒一兩燒作灰研如面入少龍腦點之妙又方去目翳貝子十枚燒灰細篩取一胡豆大著翳上臥如炊一石米久乃滅息肉者加珍珠與貝子等分孫真人治食物中毒取貝子一枚含自吐衍義曰貝子今謂之貝齒亦如紫貝但長寸余故曰貝子色微白有深紫黑者治目中翳燒用北人用之氈帽上為飾及綴衣或作蹀躞下垂石蠶味鹹寒有毒主五癃破石淋墮胎肉解結氣利水道除熱一名沙蝨生江漢池澤陶隱居云李云江左無識此者謂為草根其實類蟲形如老蠶生附石傖助庚切人得而食之味鹹而微辛李之所言有理但江漢非傖地爾大都應是生氣物猶如海中蠣蛤輩附石生不動亦皆活物也今俗用草根黑色多角節亦似蠶恐未是實方家不用沙蝨自是東間水中細蟲人入水浴著人略不可見痛如針刺挑亦得之今此名或同爾非其所稱也唐本注云石蠶形似蠶細小有角節青黑色生江漢側石穴中岐隴間亦有北人不多用採者遂絶爾今隴州採送之臣禹錫等謹按蜀本注李云江左無識此者謂是草根生附石間其實如老蠶如此則合在草部矣今既在蟲部又一名沙蝨則是沙石間所生者一種蟲也陶云猶如蠣蛤輩附石而生近之矣蘇亦未識而云似蠶有節青黑生江漢石穴中此則半似說蟲半似草更云不採遂絶妄亦甚也按此蟲所在水石間有之取以為鉤餌者是也今馬湖石間出此最多彼人好啖之云咸微辛李蘇二說殆不足憑也圖經曰石蠶生江漢池澤舊注或以為草根生石上似蠶者或以為生氣物猶如海中蠣蛤輩又本經云一名沙蝨沙蝨自是水中細蟲都無定論蜀本草注云此蟲所在水石間有之人取以為鉤餌馬湖石間出此最多彼人亦好啖之云味鹹小辛今此類川廣中多有之草根之似蠶者亦名石蠶出福州及信州山石上四時常有其苗青亦有節三月採根焙乾主走注風散血止痛其節亦堪單用搗篩取末酒溫服之衍義曰石蠶謂之為草則繆矣經言肉解結氣注中更辨不定此物在處有附生水中石上作絲繭如叉股長寸許以蔽其身色如泥蠶在其中此所以謂之石蠶也今方家用者絶稀此亦水中蟲耳山河中多雀甕味甘平無毒主小兒驚癇寒熱結氣蠱毒鬼疰一名躁舍生漢中採蒸之生樹枝間蛅音髯蟴音斯房也八月取陶隱居云蛅蟴蠔七吏切蟲也此蟲多在石榴樹上俗為蠔蟲其背毛亦螫人生卵形如雞子大如巴豆今方家亦不用此蠔一作蠔七吏切爾唐本注云此物紫白間斑狀似硨磲紋可愛大者如雀卵在樹間似螵蛸蟲也臣禹錫等謹按蜀本注云雀好食之俗謂之雀兒飯甕陳藏器云雀癰本功外主小兒撮口病先剺小兒口旁令見血以癰碎取汁塗之亦生搗鼠婦並雀癰汁塗小兒多患此病漸漸以撮不得飲乳者是凡産育時開諸物口不令閉相厭之也打破絞取汁與平常小兒飲之令無疾本經云蛅蟴房蘇云蠔蟲卵也且蠔蟲身扁背上有刺大小如蠶安有卵如雀卵哉蘇為深誤耳雀癰一名雀甕為其形似甕而名之癰甕聲近耳其蟲好在果樹上背有五色襇毛刺人有毒欲老者口中吐白汁凝聚漸硬正如雀卵子在其中作蛹以甕為繭羽化而出作蛾放子如蠶子於葉間豈有蠔蟲卵如雀卵大也日華子云蠔毛蟲窠有毒圖經曰雀甕蛅蟴房也生漢中木枝上今處處有之蛅蟴蠔七吏切蟲也亦曰蠔與蠔同毛蟲好在石榴木上似蠶而短背上有五色斑刺螫人有毒欲老者口吐白汁凝聚漸堅硬正如雀卵故名之一名雀癰癰甕聲近耳其子在甕中作蛹如蠶之在繭也久而作蛾出枝間葉上放子如蠶子復為蟲舊注以甕為蟲卵非也一曰雀好食其甕中子故俗間呼為雀兒飯甕又名棘剛子又名天漿子八月採蒸之今醫家治小兒慢驚方以天漿子有蟲者白殭蠶乾蠍三物微炒各三枚搗篩為末煎麻黃湯調服一字日三隨兒大小加減之大有效衍義曰雀甕多在棘枝上故又名棘剛子研其間蟲出灌小兒治驚癇白花蛇味甘咸溫有毒主中風濕痹不仁筋脈拘急口面喎斜半身不遂骨節疼痛大風疥癩及暴風瘙癢腳弱不能久立一名褰鼻蛇白花者良生南地及蜀郡諸山中九月十月採捕之火干今附臣禹錫等謹按藥性論云白花蛇君主治肺風鼻塞身生白癜風癧瘍斑點及浮風癮疹圖經曰白花蛇生南地及蜀郡諸山中今黔中及蘄州鄧州皆有之其紋作方勝白花喜螫人足黔人有被螫者立斷之補養既愈或作木腳續之亦不妨行九月十月採捕之火干治風速於諸蛇然有大毒頭尾各一尺尤甚不可用只用中斷乾者以酒浸去皮骨炙過收之不復蛀壞其骨須遠棄之不然刺傷人與生者殆同此蛇入人室屋中忽作爛瓜氣者便不可向須速闢除之黔人有治疥癩遍體諸藥不能及者生取此蛇中劑火燒一大磚令通紅沃醋令熱氣蒸便置蛇於上以盆覆宿昔如此三過去骨取肉芼以五味令過熟與病者頓啖之瞑眩一晝夕乃醒瘡疕隨皮便退其人便愈用干蛇亦以眼不陷為真雷公云凡使即云治風元何治風緣蛇性竄即令引藥至於有風疾處因定號之為使凡一切蛇須認取雄雌及州土有蘄州烏蛇只重三分至一兩者妙也頭尾全眼不合如活者頭上有逆毛二寸一路可長半分以來頭尾相對使之入藥彼處若得此樣蛇多留供近重二兩三分者不居別處也乾寧記云此蛇不食生命只吸蘆花氣並南風並居蘆枝上最難採又不傷害人也又有重十兩至一鎰者其蛇身烏光頭圓尾尖邏眼目赤光用之中也蛇腹下有白腸帶子一條可長一寸以來即是雄也採得去之頭兼皮鱗帶子了二寸許銼之以苦酒浸之一宿至明漉出向柳木炭火焙之令乾卻以酥炙之酥盡為度炙乾後於屋下巳地掘一坑可深一尺以來安蛇於中一宿至明再炙令乾任用凡修事一切蛇並去膽並上皮了乾溼須酒煮過用之孫真人云四月勿食蛇肉害人太平廣記趙延禧云遭惡蛇所螫處貼蛇皮便於其上炙之引去毒氣即止衍義曰白花蛇諸蛇鼻向下獨此蛇鼻向上背有方勝花紋以此得名用之去頭尾換酒浸三日棄酒不用火炙仍盡去皮骨此物毒甚不可不防也烏蛇無毒主諸風瘙癮疹疥癬皮膚不仁頑痹諸風用之炙入丸散浸酒合膏背有三稜色黑如漆性善不噬物江東有黑梢蛇能纏物至死亦如其類生商洛山今附臣禹錫等謹按藥性論云烏蛇君味甘平有小毒能治熱毒風皮肌生瘡眉髭脫落瘑癢疥等圖經曰烏蛇生商洛山今蘄州黃州山中有之背有三稜色黑如漆性至善不噬物多在蘆叢中嗅其花氣亦乘南風而吸最難採捕多於蘆枝上得之至枯死而眼不陷稱之重三分至一兩者為上粗大者轉重力爾減也又頭有逆毛二寸一路可長半分以來頭尾相對用之入神此極難得也作僞者用他蛇生熏之至黑亦能亂真但眼不光為異爾聖惠方治面上瘡及䵟易容方用烏蛇二兩燒灰末以臘月豬脂調敷之千金方治耳聾以綿裹蛇膏塞耳中神效朝野僉載商州有人患大風家人惡之山中為起茅屋有烏蛇墜酒罌中病人不知飲酒漸瘥罌底尚有蛇骨方知其由也衍義曰烏蛇尾細長能穿小銅錢一百文者佳有身長一丈餘者蛇類中此蛇入藥最多嘗於須安軍塘濼堤上見一烏蛇長一丈餘有鼠狼齧蛇頭曳之而去是亦相畏伏爾市者多僞以他蛇燻黑色貨之不可不察也烏蛇脊高世謂之劍脊烏稍金蛇無毒解生金毒人中金藥毒者取蛇四寸炙令黃煮汁飲頻服之以瘥為度大如中指長尺許常登木飲露身作金色照日有光亦有銀蛇解銀藥毒人中金毒候之法合瞑取銀口中含至曉銀變為金色者是也令人肉作雞腳裂生賓澄州今附臣禹錫等謹按陳藏器云金蛇味鹹平圖經曰金蛇出賓澄州大如中指長尺許常登木飲露體作金色照日有光及能解金毒亦有銀蛇解銀毒今不見有捕得者而信州上饒縣靈山鄉出一種蛇酷似此彼人呼為金星地鱔冬月收捕之亦能解衆毒止瀉泄及邪熱衍義曰金蛇今方書往往不見用蜣螂味鹹寒有毒主小兒驚癇瘛瘲腹脹寒熱大人癲疾狂易音羊手足端寒肢滿賁豚一名蛣音詰蜣音羌火熬之良生長沙池澤五月五日取蒸藏之臨用當炙勿置水中令人吐畏羊角石膏陶隱居云莊子云蛣蜣之智在於轉丸其喜入人糞中取屎丸而卻推之俗名為推丸當取大者其類有三四種以鼻頭扁者為真唐本注云別録云搗為丸塞下部引痔蟲出盡永瘥臣禹錫等謹按蜀本圖經云此類多種取鼻高目深者名胡蜣螂今所在皆有之藥性論云蜣螂使主治小兒疳蟲蝕日華子云能墮胎治疰忤和乾薑敷惡瘡出箭頭其糞窒痔瘻出蟲入藥去足炒用圖經曰蜣螂生長沙池澤今處處有之其類極多取其大者又鼻高目深者名胡蜣螂用之最佳五月五日取蒸而藏之臨用當炙勿置水中令人吐小兒疳蟲方多用之蜣螂心主疔瘡而本經不著唐劉禹錫纂柳州救三死方云元和十一年得疔瘡凡十四日日益篤善藥敷之皆莫能知長樂賈方伯教用蜣螂心一夕而百苦皆已明年正月食羊肉又大作再用亦如神驗其法一味貼瘡半日許可再易血盡根出遂愈蜣螂心腹下度取之其肉稍白是也所以云食羊肉又大作者蓋蜣螂畏羊肉故耳用時須禁食羊肉其法蓋出葛洪肘後方又主箭鏃入骨不可拔者微熬巴豆與蜣螂並研勻塗所傷處斯須痛定必微癢且忍之待極癢不可忍便撼動箭鏃拔之立出此方傳於夏候鄆鄆初為閬州録事參軍有人額上有箭痕問之云隨馬侍中徵田悅中射馬侍中與此藥立可拔鏃出後以生肌膏藥敷之遂無苦因並方獲之云諸瘡亦可療鄆得方後至洪州逆旅主人妻患瘡呻吟方極以此藥試之立愈又主沙塵入眼不可出者取生蜣螂一枚手持其背遂於眼上影之沙塵自出陳藏器治蜂瘻燒死蜣螂末和醋敷之聖惠方治一切惡瘡及沙蝨水弩惡疽並皆治之用蜣螂十枚端午日收乾者佳杵末油調敷之外臺祕要治癧瘍風取塗中死蜣螂杵爛之當揩令熱封之一宿瘥肘後方若大赫瘡已炙之以蜣螂乾者末之和鹽水敷瘡四畔周回如韭葉闊狹子母祕録治小兒重舌燒蜣螂末和唾敷舌上又方小兒大人忽得惡瘡未辨識者取蜣螂杵絞取汁敷其上劉涓子治鼠瘻死蜣螂作末苦酒和敷之數過即愈先以鹽湯洗又方治附骨癰蜣螂七枚和大麥爛搗封之衍義曰蜣螂大小二種一種大者為胡蜣螂身黑光腹翼下有小黃子附母而飛行盡不出夜方飛出至人家庭戶中見燈光則來一種小者身黑暗盡方飛出夜不飛今當用胡蜣螂其小者研三十枚以水灌牛馬治脹結絶佳狐遇而必盡食之五靈脂味甘溫無毒主療心腹冷氣小兒五疳闢疫治腸風通利氣脈女子月閉出北地此是寒號蟲糞也今附臣禹錫等今據寒號蟲四足有肉翅不能遠飛所以不入禽部圖經曰五靈脂出北地今惟河東州郡有之云是寒號蟲糞色黑如鐵採無時然多是夾沙石絶難修治若用之先以酒研飛煉令去沙石乃佳治傷冷積聚及小兒女子方中多用之今醫治産婦血暈昏迷上衝悶絶不知人事者五靈脂二兩一半炒熟一半生用搗羅為散每服一錢溫熱水調下如口噤者以物斡開口灌之入喉即愈謂之獨勝散又治血崩不止五靈脂十兩搗羅為末以水五大盞煎至三盞去滓澄清再煎為膏入神麯末二兩合和丸如梧桐子大每服二十丸溫酒下空心服便止諸方用之極多經驗方治丈夫婦人味逆連日不止粥食湯藥不能下者可以應用此得效摩丸五靈脂不夾土石揀精好者不計多少搗羅為末研狗膽汁和為丸如雞頭大每服一丸煎熱生薑酒摩令極細更以少生薑酒化以湯湯藥令極熱須是先做下粥溫熱得所左手與患人藥吃不得嗽口右手急將粥與患人吃不令太多經效方治婦人心痛血氣刺不可忍失笑散五靈脂淨好者蒲黃等分為末每服二錢用好醋一杓熬成膏再入水一盞同煎至七分熱服立效又方治婦人經血不止五靈脂末炒令過熟出盡煙氣每服五兩錢用當歸兩片酒一中盞與藥末同煎至六分去滓熱服連三五服效衍義曰五靈脂行經血有功不能生血嘗有人病眼中翳往來不定如此乃是血所病也蓋心生血肝藏血肝受血則能視目病不治血為背理此物入肝最速一法五靈脂二兩沒藥一兩乳香半兩川烏頭一兩半炮去皮同為末滴水丸如彈子大每用一丸生薑溫酒磨服治風冷氣血閉手足身體疼痛冷麻又有人被毒蛇所傷良久之間已昏困有老僧以酒調藥二錢灌之遂蘇及以藥滓塗咬處良久復灌二錢其苦皆去問之乃五靈脂一兩雄黃半兩同為末只此耳後有中毒者用之無不驗此藥雖不甚貴然亦多有僞者蠍味甘辛有毒療諸風癮疹及中風半身不遂口眼喎斜語澀手足抽掣形緊小者良出青州者良今附臣禹錫等謹按蜀本云蠍緊小者名蛜𧌴段成式酉陽雜俎云鼠負蟲巨者多化為蠍蠍子多負於背嘗見一蠍負十餘子子色猶白才如稻粒陳州古倉有蠍形如錢螫人必死江南舊無蠍開元初嘗有主簿竹筒盛過江至今江南往往有之俗呼為主簿蟲蠍常為蝸所食先以跡規之不復去蠍前謂之螫後謂之蠆日華子云蠍平圖經曰蠍舊不著所出州土注云出青州者良今京東西及河陝州郡皆有之採無時用之欲緊小者今人捕得皆火逼乾死收之方書謂之蛜𧌴陶隱居集驗方云蠍有雌雄雄者螫人痛只在一處雌者痛牽諸處若是雄者用井泥敷之溫則易雌者當用瓦屋溝下泥敷之或不值天雨泥可汲新水從屋上淋下取泥用又可畫地作十字取上土水服五分匕又云曾經螫毒痛苦不可忍諸法療不效有人令以冷水漬指亦漬手即不痛水微暖復痛即易冷水余處不可用冷水浸則以故布榻之小暖則易之皆驗又有咒禁法今人亦能用之有應古今治中風抽掣手足及小兒驚搐方多用蠍篋中方治小兒風癇取蠍五枚以一大石榴割頭去子作甕子樣納蠍其中以頭蓋之紙筋和黃泥封裹以微火炙乾漸加火燒令通赤良久去火待冷去泥取中焦黑者細研乳汁調半錢匕灌之便定兒稍大則以防風湯調末服之經驗方治小兒驚風用蠍一個不去頭尾薄荷四葉裹合火上炙令薄荷焦同碾為末作四服湯下大人風涎只一服桂壬方治耳聾因腎虛所致十年內一服愈蠍至小者四十九枚生薑如蠍大四十九片二物銅器內炒至生薑干為度為末都作一服初夜溫酒下至二更盡儘量飲酒至醉不妨次日耳中如笙簧即效衍義曰蠍大人小兒通用治小驚風不可缺也有用全者有隻用稍者稍力尤功今青州山中石下捕得慢火逼或烈日中曬蠍渴熱時乃與青泥食之既滿腹以火逼殺之故其色多赤欲其體重而售之故也醫家用之皆悉去土如蠆人還能禁止之自嘗被其毒兄長禁而止及令故蜇終不痛翰林禁科具矣螻音婁蛄音姑味鹹寒無毒主産難出肉中刺潰癰腫下哽噎解毒除惡瘡一名蟪蛄一名天螻一名𧎅音斛生東城平澤夜出者良夏至取曝乾陶隱居云以自出者其自腰以前甚澀主止大小便從腰以後甚利主下大小便若出拔刺多用其腦此物頗協神鬼昔人獄中得其蟪力者今人夜忽見出多打殺之言為鬼所使也臣禹錫等謹按蜀本注云爾雅曰𧎅天螻是也圖經云夏至取今所在有之爾雅疏云一名碩鼠夏小正三月云𧎅則鳴是也日華子云冷有毒治惡瘡水腫頭面腫入藥炒用圖經曰螻蛄生東城平澤今處處有之穴地糞壤中而生夜則出求食人夜行忽見出多打殺之言其為鬼所使也夏至後取曝乾以夜出者良其自腰以前甚澀主止大小便或云止小便自腰以後甚利主下大小便若出拔刺多用其腦此一名𧎅爾雅云𧎅天螻夏小正篇云三月𧎅則鳴是也廣雅云一名碩鼠易晉如碩鼠孔穎達正義云有五能而不能成技之蟲也又引蔡雍勸學篇云碩鼠五能不成一技術注云能飛不能過屋能緣不能窮木能遊不能度谷能穴不能掩身能走不能免人荀子云梧鼠五技而窮併為此螻蛄也而魏詩碩鼠刺重斂傳注皆謂大鼠則爾雅所謂碩鼠關西呼為鼩音瞿鼠者陸機云今河東有大鼠能人立交見兩腳於頸上跳舞善鳴食人禾苗人逐則走木空中亦有五技或謂之雀鼠其形大然則螻蛄與此鼠二物而同名碩鼠者也螻蛄有技而窮此鼠技不窮故不同耳螻蛄又名梧鼠本經未見也今方家治石淋導水用螻蛄七枚鹽二兩同於新瓦上鋪蓋焙乾研末溫酒調一錢匕服之即愈聖惠方治十種水病腫滿喘促不得臥以螻蛄五枚干為末食前湯調半錢匕至一錢小便通效外臺祕要治鯁螻蛄腦一物吞亦治刺不出敷之刺即出孫真人治箭鏃在咽喉胸膈及針刺不出以螻蛄搗取汁滴上三五度箭頭自出衍義曰螻蛄此蟲當立夏後至夜則鳴月令謂之螻蟈鳴者是矣其聲如蚯蚓此乃是五技而無一長者馬陸味辛溫有毒主腹中大堅症破積聚息肉惡瘡白禿療寒熱痞結脅下滿一名百足一名馬軸生玄菟川穀陶隱居云李云此蟲形長五六寸狀如大蛩夏月登樹鳴冬則蟄今人呼為飛蚿音玄蟲也恐不必是馬陸爾今有一細黃蟲狀如蜈蚣而甚長俗名土蟲雞食之醉悶亦至死書云百足之蟲至死不僵居良切此蟲足甚多寸寸斷便寸行或欲相似方家既不復用市人亦無取者未詳何者的是唐本注云此蟲大如細筆管長三四寸斑色一如蚰蜒襄陽人名為馬蚿亦呼馬軸亦名刀環蟲以其死側臥狀如刀環也有人自毒服一枚便死也雷公云凡使收得後糠頭炒令糠頭焦黑取馬陸出用竹刮足去頭了研成末用之衍義曰馬陸即今百節蟲也身如槎節節有細蹙紋起紫黑色光潤百足死則側臥如環長二三寸尤者粗如小指西京上陽宮及內城磚牆中甚多入藥至鮮蛙味甘寒無毒主小兒赤氣肌瘡臍傷止痛氣不足一名長股生水中取無時陶隱居云凡蜂蟻蛙蟬其類最多大而青脊者俗名土鴨其鳴甚壯又一種黑色南人名為蛤子食之至美又一種小形善鳴喚名蛙子此則是也臣禹錫等謹按蜀本注云蝦蟆屬也居陸地青脊善鳴聲作蛙者是日華子云青蛙性冷治小兒熱瘡背有黃路者名金線殺尸疰病蟲去勞劣解熱毒身青緑者是圖經曰蛙本經不載所出州土云生水中今處處有之似蝦蟆而背青緑色俗謂之青蛙亦有背作黃紋者人謂之金線蛙陶隱居云蜂蟻蛙蟬其類最多大腹而脊青者俗名土鴨其鳴甚壯即爾雅所謂在水曰黽者是也黑色者南人呼為蛤子食之至美即今所謂之蛤亦名水雞是也閩蜀浙東人以為珍饌彼人云食之補虛損尤宜産婦即此也小形善鳴喚者名蛙子即藥中所用蛙是也其餘螻蟈長肱蠼子之類非藥中所須不復悉載也衍義曰蛙其色青腹細嘴尖後腳長故善躍大其聲則曰蛙小其聲則曰蛤月令所謂雀入大水化為蛤者也唐韓退之詩一夜青蛙啼到曉者是此食之性平解勞熱鯪鯉甲微寒主五邪驚啼悲傷燒之作灰以酒或水和方寸匕療蟻瘻陶隱居云其形似鼉而短小又似鯉魚有四足能陸能水出岸開鱗甲伏如死令蟻入中忽閉而入水開甲蟻皆浮出於是食之故主蟻瘻方用亦稀惟療瘡癩及諸疰疾爾臣禹錫等謹按蜀本圖經云生深大山谷中金房均等州皆有之藥性論云鯪鯉甲使有大毒治山瘴瘧惡瘡燒敷之日華子云涼有毒治小兒驚邪婦人鬼魅悲泣及痔漏惡瘡疥癬圖經曰鯪鯉甲舊不著所出州郡今湖嶺及金商均房間深山大谷中皆有之似鼉而短小色黑又似鯉魚而有四足能陸能水日中出岸開鱗甲如死令蟻入中蟻滿便祕而入水蟻皆浮出因接而食之故主蟻瘻為最亦主惡瘡疥癩燒其甲末敷之楊炎南行方主山瘴瘧有鯪鯉甲湯今人謂之穿山甲近醫亦用燒灰與少肉豆蔻末米飲調服療腸痔疾又治吹奶疼痛不可忍用穿山甲炙黃木通各一兩自然銅半兩生用三味搗羅為散每服二錢溫酒調下不計時候外臺祕要肘後治蟻入耳燒鯪鯉甲末以水調灌之即出千金翼治蟻漏取鯪鯉甲二七枚末豬膏和敷之簡要濟衆治産後血氣上衝心成血暈穿山甲一兩童子小便浸一宿取出慢火炙令黃為散每服一錢狗膽少許熱酒調下非時服之衍義曰鯪鯉甲穴山而居亦能水燒一兩存性肉豆蔻仁三個同為末米飲調二錢服治氣痔膿血甚者加蝟皮一兩燒入中病即已不必盡劑芫青味辛微溫有毒主蠱毒風疰鬼疰墮胎三月取曝乾陶隱居云芫花時取之青黑色亦療鼠瘻臣禹錫等謹按蜀本圖經云形大小如斑蝥純青緑色今出寧州也圖經曰芫青本經不載所出州土今處處有之其形頗與斑蝥相類但純青緑色背上一道黃紋尖喙三四月芫花發時乃生多就花上採之曝乾凡用斑蝥芫青亭長之類當以糯米同炒看米色黃黑即為熟便出之去頭足及翅翼更以亂髮裹之掛屋東營一宿然後用之則去毒矣舊說斑蝥芫青葛上亭長地膽皆一類而隨時變古方皆用之深師療淋用亭長說之最詳云取葛上亭長折斷腹腹中有白子如小米二三分取著白板子上陰乾燥二三日藥成若有人患十年淋服三枚八九年以還服二枚服時以水著小杯中水如棗許納藥盞中爪甲研當扁扁見於水中仰頭乃令人寫著咽喉中勿令近牙齒間藥雖微小下喉自覺當至下焦淋所有頃藥大作煩急不可堪者飲干麥飯汁則藥勢止也若無干麥飯但水亦可耳老小服三分之一當下淋疾如膿血連連爾石去者或如指頭或青或黃男女服之皆愈此蟲四月五月六月為葛上亭長七月為斑蝥九月十月為地膽隨時變耳亭長時頭當赤身黑若藥不快淋不下以意節度更增服之今醫家多隻用斑蝥芫青而亭長地膽稀有使者人亦少採捕既不得其詳故不備載雷公云芫青斑蝥亭長赤頭等四件其樣各不同所居所食所效各不同其芫青嘴尖背上有一畫黃斑蝥背上一畫黃一畫黑觜尖處一小點赤在豆葉上居食豆葉汁亭長形黑黃在蔓葉上居食蔓膠汁赤頭額上有大紅一點身黑用各有長處凡修事芫青斑蝥亭長赤頭並用糯米小麻子相拌同炒待米黃黑出去麻子等去兩翅足並頭用血餘裹懸於東牆角上一夜至明取用地膽味辛寒有毒主鬼疰寒熱鼠瘻惡瘡死肌破癥瘕墮胎蝕瘡中惡肉鼻中息肉散結氣石淋去子服一刀圭即下一名蚖青一名青蛙烏媧切生汶山川穀八月取惡甘草陶隱居云真者出梁州狀如大馬蟻有翼僞者即斑蝥所化狀如大豆大都療體略同必不能得真爾此亦可用故有蚖青之名蚖字乃異恐是相承誤矣唐本注云形如大馬蟻者今見出邠州者是也狀如大豆者未見也臣禹錫等謹按蜀本圖經云二月三月八月九月草菜上取之形倍黑色芫青所化也藥性論云地膽能宣出瘰癧根從小便出上亦吐之治鼻齆圖經文具芫青條下珂味鹹平無毒主目中翳斷血生肌貝類也大如鰒皮黃黑而骨白以為馬飾生南海採無時唐本先附海藥謹按名醫別録云生南海白如蚌主消翳膜及筋弩肉並刮點之此外無諸要用也雷公云要冬採得色白膩者並有白旋水紋勿令見火立無用處夫用以銅刀刮作末子細研用重絹羅篩過後研千餘下用此物不入婦人藥中用蜻音青蛉音零微寒強陰止精陶隱居云此有五六種今用青色大眼者一名諸乘俗呼胡蜊道家用以止精眼可化為青珠共余黃細及黑者不入藥用一名蜻蜓臣禹錫等謹按蜀本注云蜻蜓六足四翼好飛溪渠側日華子云蜻蜓涼無毒壯陽暖水臟入藥去翼足炒用良圖經曰蜻蛉舊不載所出州郡今所在水際多有之此有數種當用青色大眼者為良其餘黃赤及黑色者不入用俗間正名蜻蜓而不甚須也道家則多用之衍義曰蜻蛉其中一種最大京師名為馬大頭者是身緑色雌者腰間一遭碧色用則當用雄者陶隱居以謂青色大眼一類之中元無青者眼一類皆大此物生化於水中故多飛水上唐杜甫云點水蜻蜓款款飛鼠婦味酸溫微寒無毒主氣癃不得小便婦人月閉血瘕癇痓寒熱利水道一名負蟠音煩一名𧉅音伊蝛音威一名蜲𧑓生魏郡平谷及人家地上五月五日取陶隱居云一名鼠負言鼠多在坎中背則負之今作婦字如似乖理又一名鼠姑臣禹錫等謹按蜀本注云爾雅云蟠鼠負是也多在甕器底及土坎中常惹著鼠背故名之也俗亦謂之鼠黏猶如葈耳名羊負來也日華子云鼠婦蟲有毒通小便能墮胎圖經曰鼠婦生魏郡平谷及人家地上今處處有之多在下濕處甕器底及土坎中常惹著鼠背故名鼠負會作婦字謬耳爾雅云蟠鼠負郭璞云甕器底蟲又云𧉅威委黍詩東山云𧉅威在室鄭箋云此物家無人則生然本經亦有此名是今人所謂濕生蟲者也五月五日取古方有用者張仲景主久瘧大鱉甲丸中使之以其主寒熱也千金方治産後小便不利鼠婦七枚一味熬為屑作一服酒調下衍義曰鼠婦此濕生蟲也多足其色如蚓背有橫紋蹙起大者長三四分在處有之磚甃及下濕處多用處絶少螢火味辛微溫無毒主明目小兒火瘡傷熱氣蠱毒鬼疰通神精一名夜光一名放光一名熠以入切耀以灼切一名即照音照生階地池澤七月七日取陰乾陶隱居云此是腐草及爛竹根所化初猶未如蟲腹下已有光數日便變而能飛方術家捕取納酒中令死乃干之俗藥用之亦稀臣禹錫等謹按蜀本注云爾雅云螢火即照注曰夜飛腹下有火按此蟲是朽草所化也呂氏春秋云腐草化為螢是也藥性論云螢火亦可單用治青盲衍義曰螢常在大暑前後飛出是得大火之氣而化故如此明照也今人用者少月令雖曰腐草所化然非陰濕處終無甲香味鹹平無毒主心腹滿痛氣急止痢下淋生南海唐本注云蠡大如小拳青黃色長四五寸取黶燒灰用之南人亦煮其肉啖亦無損益也唐本先附圖經曰甲香生南海今嶺外閩中近海州郡及明州皆有之海蠡音螺之掩也南州異物志曰甲香大者如甌面前一邊直攙長數寸圍殼岨峿有刺其掩雜衆香燒之使益芳獨燒則臭一名流螺諸螺之中流最厚味是也其蠡大如小拳青黃色長四五寸人亦啖其肉今醫方稀用但合香家所須用時先以酒煮去腥及涎云可聚香使不散也傳信方載其法云每甲香一斤以泔一斗半於鐺中以微煻火煮經一復時即換新泔經三換即漉出衆手刮去香上惡物訖用白蜜三合水一斗又煻火煮一復時水乾又以蜜三合水一斗再煮都三復時以香爛止炭火熱燒地灑清酒令潤鋪香於其上以新瓷瓶蓋合密埿一復時待香冷硬即臼中用木杵搗令爛以沉香三兩麝香一分和合略搗令相亂入即香成以瓷瓶貯之更能埋之經久方燒尤佳凡燒此香須用大火爐多著熱灰及剛炭至合翻時又須換火猛燒令盡訖去之爐旁著火暖水即香不散甲香須用台州小者佳此法出於劉兗奉禮也凡蠡之類亦多絶有大者珠蠡瑩潔如珠鸚鵡蠡形似鸚鵡頭並堪酒杯者梭尾蠡如梭狀釋輩所吹者皆不入藥故不悉録海藥云和氣清神主腸風瘻痔陳氏云主甲疽瘻瘡蛇蠍蜂螫疥癬頭瘡饞瘡甲煎口脂用也廣州記云南人常食若龜鱉之類又有小甲香若螺子狀取其蒂而修成也雷公云凡使須用生茅香皂角二味煮半日卻漉出於石臼中搗用馬尾篩篩過用之經驗方甲香修製法不限多少先用黃土泥水煮一日以溫水浴過次用米泔或灰汁煮一日依前浴過後用蜜酒煮一日又浴過曝乾任用衍義曰甲香善能管香烟與沉檀龍麝用之甚佳衣魚味鹹溫無毒主婦人疝瘕小便不利小兒中風項強巨兩切背起摩之又療淋墮胎塗瘡滅瘢一名白魚一名蟫音談生咸陽平澤陶隱居云衣中乃有而不可常得多在書中亦可用小兒淋閉以摩臍及小腹即溺通也臣禹錫等謹按藥性論云衣中白魚使有毒利小便圖經曰衣魚生咸陽平澤今處處有之衣中乃少而多在書卷中爾雅所謂蟫潭尋二音白魚郭璞云衣書中蟲一名蛃音丙魚是也段成式云補闕張周封見壁上瓜子化為白魚因知列子朽瓜為魚之言不虛也古方主小兒淋閉取以摩臍及小腹溺即通又合鷹屎殭蠶同敷瘡瘢即滅今人謂之壁魚俗傳壁魚入道經函中因蠹食神仙字則身有五色人能得而吞之可致神仙唐張湯之少子惑其說乃多書神仙字碎剪置瓶中取壁魚投之冀其蠹食而不能得遂致心疾千金方治沙石草落目中眛不出白魚以乳汁和注目中外臺祕要主眼翳白魚末注少許於翳上孫真人猝患偏風口喎語澀取白魚摩耳下喎向左摩右向右摩左正即止子母祕録治婦人無故遺血溺衣中白魚三十個納陰中食醫心鏡小兒中客忤書中白魚十枚敷乳頭飲之瘥衍義曰衣魚多在故書中久不動帛中或有之不若故紙中多也身有厚粉手搐之則落亦齧毳衣用處亦少其形稍似魚其尾又分二歧世用以滅瘢痕三十六種陳藏器余海螺百一方治目痛纍年或三四十年方取生螺一枚洗之內燥抹螺口開以黃連一枚納螺口中令其螺飲黃連汁以綿注取汁著眥中孫真人合菜食治心痛海月味辛平無毒主消渴下氣令人能食利五臟調中生薑醬食之消腹中宿物令易飢止小便南海水沫所化煮時猶變為水似半月故以名之海蛤類也食療云平主消痰辟邪鬼毒以生椒醬調和食之良能消諸食使人易飢又其物是水沫化之煮時猶是水入腹中之後便令人不小便故知益人也又有食之人亦不見所損此看之將是有益耳亦名以下魚青蚨味辛溫無毒主補中益陽道去冷氣令人悅澤生南海狀如蟬其子著木取以塗錢皆歸本處一名蟱蝸廣雅云青蚨也搜神記曰南方有蟲名𧍡蠋如蟬大辛美可食其子如蠶種取其子歸則母飛來雖潛取必知處殺其母塗錢子塗貫用錢則自還淮南子萬畢云青蚨一名魚伯以母血塗八十一錢以子血塗八十一錢置子用母置母用子皆自還也海藥謹按異志云生南海諸山雄雌常處不相舍主祕精縮小便青金色相似人採得以法末之用塗錢以貨易晝用夜歸亦是人間難得之物也豉蟲有毒殺禽獸蝕息肉敷惡瘡百一方豉蟲主射工取一枚致口中便愈已死者亦起蟲有毒應不可吞云以白梅皮裹含之烏爛死蠶有小毒蝕瘡有根者亦主外野雞病並敷瘡上在簇上烏臭者白死蠶主白遊赤死蠶主赤遊並塗之遊一名疹也繭滷汁主百蟲入肉䘌蝕瘙疥及牛馬蟲瘡山蜍山蛭入肉蚊子諸蟲咬毒鹽繭甕下收之以竹筒盛滷浸瘡山行亦可預帶一筒取一蛭置中兼持一片乾海苔則闢諸蛭蘇恭注本經蛭條云山人自有療法豈非此乎亦可為湯浴小兒去瘡疥此汁是繭中蛹汁故能殺蟲非為滷咸也壁錢無毒主鼻衄及金瘡下血不止捺取蟲汁點瘡上及鼻中亦療外野雞病下血其蟲上錢幕主小兒嘔吐逆取二七煮汁飲之蟲似蜘蛛作白幕如錢在暗壁間此土人呼為壁繭針線袋主婦人産後腸中癢不可忍以袋安所臥褥下無令知之故錦燒作灰主小兒口中熱瘡研灰為末敷口瘡上煮汁服療蠱毒嶺南有食錦蟲屈如指環食故緋帛錦如蠶之食葉故緋帛主惡瘡疔腫毒腫諸瘡有根者作膏用帛如手大取露蜂房彎頭棘刺爛草節二七亂髮燒為末空腹服飲下方寸匕大主毒腫緋帛亦入諸膏主疔腫用為上又主兒初生臍未落時腫痛水出燒為末細研敷之又五色帛主盜汗拭訖棄五道頭赦日線主人在牢獄日經赦得出候赦日於所被囚枷上合取將為囚縫衣令犯罪經恩也苟印一名苟汁取膏滴耳中令左右耳徹出潮州似蛇有四足大主聾也溪鬼蟲取其角帶之主溪毒射工出有溪毒處山林間大如雞子似蛣蜣頭有一角長寸余角上有四岐黑甲下有翅能飛六月七月取之百一方射工蟲口邊有角人得帶之闢溪毒周禮壺涿氏掌除水蟲以炮土之鼓驅之以焚石投之注云投使驚去也今人過諸山溪先以石投水蟲當先去不著人也張司空云江南有射工蟲甲蟲類也口邊有弩以氣射人玄中記云水狐蟲也長四寸其色黑背上有甲其口有角向前如弩以氣射人江淮間謂之短狐射工通為溪病此既其蟲故能相壓伏也赤翅蜂有小毒主蜘蛛咬及疔腫疽病瘡燒令黑和油塗之亦取蜂窠土酢和為泥敷蜘蛛咬處當得瘥出嶺南如土蜂翅赤頭黑穿土為窠食蜘蛛大如螃蟹遙知蜂來皆狼狽藏隱蜂已預知其處相食如此者無遺也獨腳蜂所用同前似小蜂黑色一足連樹根不得去不能動搖五月採取出嶺南又有獨腳蟻功用同蜂亦連樹根下能動搖出嶺南蠟音䖳味鹹無毒主生氣及婦人勞損積血帶下小兒風疾丹毒湯火炸出以姜酢進之海人亦為常味一名水母一名樗蒲魚生東海如血䘓大者如床小者如斗無腹胃眼目以蝦為目蝦動䖳沉故曰水母目蝦如駏驉之與駏驉相假矣䖳除駕切盤蝥蟲蝥牟二音有小毒主傳尸鬼疰如夜行蟲而小亦未可輕用也螲音窒蟷音當有毒主一切疔腫附骨疽蝕等瘡宿肉贅瘤燒為末和臘月豬脂敷之亦可諸藥為膏主疔腫出根似蜘蛛穴土為窠爾雅云蛈音迭蜴音蕩郭注云螲蟷也穴上有蓋復穴口今呼為顛蟷蟲河北人呼為蛈蜴音蛭螳是處有之崔知悌方云主疔腫為上山蛩蟲有大毒主人嗜酒不已取一節燒成灰水下服之訖便不喜聞酒氣過一節則毒人至死此用療嗜酒人也亦主蠶白僵死取蟲燒作灰粉之以燒令黑敷惡瘡烏斑色長二三寸生林間如百足而大更有大者如指名馬陸能登木群吟已見本經溪狗有小毒主溪毒及遊蠱燒末服一二錢匕似蝦蟆生南方溪石間尾三四寸水黽有毒令人不渴殺雞犬長寸許四腳群游水上水涸即飛亦名水馬非海中主産難之水馬也飛生蟲無毒令人易産取角臨時執之亦得可燒末服少許蟲如齧發頭上有角蘆中蟲無毒主小兒飲乳後吐逆不入腹亦出破蘆節中取蟲二枚煮汁飲之蟲如小蠶小兒嘔逆與哯乳不同宜細詳之哯乳乳飽後哯出者是蓼螺無毒主飛尸遊蠱生食以薑醋進之彌佳生永嘉海中味辛辣如蓼故名蓼螺蛇婆味鹹平無毒主赤白毒痢蠱毒下血五野雞病惡瘡生東海一如蛇常在水中浮游炙食亦燒末服一二錢匕朱鱉帶之主刀刃不傷亦云令人有媚生南海山水中大如錢腹下赤如血云在水中著水馬腳皆令仆倒耳擔羅味甘平無毒主熱氣消食雜昆布為羹主結氣生新羅蛤之類羅人食之青腰蟲有大毒著皮肉腫起殺癬蟲食惡瘡息肉剝人面皮除印字印骨者亦盡蟲如中蟻大赤色腰中青黑似狗猲一尾尖有短翅能飛春夏時有蝨主腦裂人大熱發頭熱者令腦縫裂開取黑蝨三五百搗碎敷之又主疔腫以十枚置瘡上以荻箔繩作炷灸蝨上即根出反腳指間有肉刺瘡以黑蝨敷根出也太平廣記出酉陽雜俎人將死蝨離身或云取病蝨於床前可以卜病之將死蝨行向病者皆死枸杞上蟲味鹹溫無毒主益陽道令人悅澤有子作繭子為蛹時取之曝乾炙令黃和乾地黃為丸服之大起陽益精其蟲如蠶食枸杞葉大紅蝦鮓味甘平小毒主飛尸蛔蟲口中甘䘌風瘙身癢頭瘡牙齒去疥癬塗山蜍蚊子入人肉初食瘡發後而愈生臨海會稽大者長一尺須可為簪虞嘯父答晉帝云時尚溫未及以貢即會稽所出也盛密器及熱飯作鮓毒人至死崔豹云遼海間有蜚蟲如蜻蛉名紺翻七月群飛暗天夷人食之云是蝦化為之又杜臺卿淮賦云蝗化為雉入水為蜃木蠹味辛平小毒主血瘀勞積月閉不調腰脊痛有損血及心腹間痰桃木中有者殺鬼去邪氣桂中者辛美可啖去冷氣一如蠐螬節長足短生腐木中穿木如錐刀至春羽化一名蠍爾雅云蠍蛣𧌑注云木蠹也蘇恭證云蠐螬深誤也留師蜜味甘寒主牙齒䘌痛口中瘡含之蜂如小指大正黑色齧竹為窠蜜如稠糖酸甜好食方言云留師竹蜂也藍蛇頭大毒尾良當中有約從約斷之用頭合毒藥藥人至死嶺南人名為藍藥解之法以尾作脯與食之即愈藍蛇如蝮有約出蒼梧諸縣頭毒尾良也兩頭蛇見之令人不吉大如指一頭無目無口二頭俱能行出會稽人云是越王弩弦昔孫叔敖埋之恐後人見之將必死也人見蛇足亦云不佳蛇以桑薪燒之則足出見無可怪也活師主火飈熱瘡及疥瘡並搗碎敷之取青胡桃子上皮和為泥染髭發一染不變胡桃條中有法即蝦蟆兒生水中有尾如鮽音余魚漸大腳生尾脫卵主明目山海經云活師蝌蚪蟲也
