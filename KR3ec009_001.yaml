body:
  text: 卷第一己酉新增衍義序例上韓保升云按藥有玉石草木蟲獸直云本草者為諸藥中草類最多也嘉祐補注總敘舊説本草經神農所作而不經見漢書藝文志亦無録焉平帝紀云元始五年舉天下通知方術本草者在所為駕一封軺傳遣諸京師樓護傳稱護少誦醫經本草方術數十萬言本草之名蓋見於此而英公李世績等注引班固敘黃帝內外經云本草石之寒溫原疾病之深淺此乃論經方之語而無本草之名唯梁七録載神農本草三卷推以為始斯為失矣或疑其間所載生出郡縣有後漢地名者以為似張仲景華他輩所為是又不然也淮南子云神農嘗百草之滋味一日而七十毒由是醫方興焉蓋上世未著文字師學相傳謂之本草兩漢以來名醫益衆張機華他輩始因古學附以新説通為編述本草繇是見於經録然舊經才三卷藥只三百六十五種至梁陶隱居又進名醫別録亦三百六十五種因而注釋分為七卷唐顯慶中監門衛長史蘇恭又托其差謬表請刊定乃命司空英國公李世績等與恭參考得失又增一百一十四種分門部類廣為二十卷世謂之唐本草國朝開寶中兩詔醫工劉翰道士馬志等相與撰集又取醫家嘗用有效者一百三十三種而附益之仍命翰林學士盧多遜李肪王祐扈蒙等重為刊定乃有詳定重定之目並鏤板摹行由此醫者用藥遂知適從而偽蜀孟昶亦嘗命其學士韓保升等以唐本圖經參比為書稍或增廣世謂之蜀本草今亦傳行是書自漢迄今甫千歲其間三經撰著所增藥六百餘種收採彌廣可謂大備而知醫者猶以為傳行既久後來講求浸多參校近之所用頗亦漏略宜有纂録以備頤生驅疾之用嘉祐二年八月有詔臣禹錫臣億臣頌臣洞等再加校正臣等亦既被命遂更研核竊謂前世醫工原診用藥隨效輒記遂至增多概見諸方浩博難究雖屢加刪定而去取非一或本經已載而所述粗略或俚俗嘗用而太醫未聞向非因事詳著則遺散多矣乃請因其疏捂更為補注應諸家醫書藥譜所載物品功用並從採掇唯名近迂僻類乎怪誕則所不取自余經史百家雖非方餌之急其間或有參説藥驗較然可據者亦兼收載務從該洽以副詔意凡名本草者非一家今以開寶重定本為正其分布卷類經注雜糅間以朱墨並從舊例不復釐改凡補注並據諸書所説其意義與舊文相參者則從刪削以避重復其舊已著見而意有未完後書復言亦具存之欲詳而易曉仍每條並以朱書其端云臣等謹按某書云某事其別立條者則解於其末云見某書凡所引書以唐蜀二本草為先他書則以所著先後為次第凡書舊名本草者今所引用但著其所作人名曰某人唯唐蜀本則曰唐本云蜀本云凡字朱墨之別所謂神農本經者以朱字名醫因神農舊條而有增補者以墨字間於朱字余所增者皆別立條並以墨字凡陶隱居所進者謂之名醫別録並以其注附於末凡顯慶所增者亦注其末曰唐本先附凡開寶所增者亦注其末曰今附凡今所增補舊經未有者於逐條後開列云新補凡藥舊分上中下三品今之新補難於詳辨但以類附見如緑礬次於礬石山薑花次於豆蔻扶栘次於水楊之類是也凡藥有功用本經未見而舊注已曾引據今之所增但涉相類更不立條並附本注之末曰續注如地衣附於垣衣燕覆附於通草馬藻附於海藻之類是也凡舊注出於陶氏者曰陶隱居云出於顯慶者曰唐本注出於開寶者曰今注其開寶考據傳記者別曰今按今詳又按皆以朱字別於其端凡藥名本經已見而功用未備今有所益者亦附於本注之末凡藥有今世已嘗用而諸書未見無所辨證者如葫蘆巴海帶之類則請從太醫衆論參議別立為條曰新定舊藥九百八十三種新補八十二種附於注者不預焉新定一十七種總新舊一千八十二條皆隨類粗釋推以十五凡則補注之意可見矣舊著開寶英公陶氏三序皆有義例所不可去仍載於首篇云新舊藥合一千八十二種三百六十種神農本經一百八十二種名醫別録一百一十四種唐本先附一百三十三種今附一百九十四種有名未用八十二種新補一十七種新定本草圖經序昔神農嘗百草之滋味以救萬民之疾苦後世師祖由是本草之學興焉漢魏以來名醫相繼傳其書者則有吳普李當之藥録陶隱居蘇恭等注解國初兩詔近臣總領上醫兼集諸家之説則有開寶重定本草其言藥之良毒性之寒溫味之甘苦可謂備且詳矣然而五方物産風氣異宜名類既多贋偽難別以虺床當蘼蕪以薺苨亂人參古人猶且患之況今醫師所用皆出於市賈市賈所得蓋自山野之人隨時採獲無復究其所從來以此為療欲其中病不亦遠乎昔唐永徽中刪定本草之外復有圖經相輔而行圖以載其形色經以釋其同異而明皇御製又有天寶單方藥圖皆所以敘物真濫使人易知原診處方有所依據二書失傳且久散落殆盡雖鴻都祕府亦無其本天寶方書但存一卷類例粗見本末可尋宜乎聖君哲輔留意於搜輯也先是詔命儒臣重校神農本草等凡八書光祿卿直祕閣臣禹錫尚書祠部郎中祕閣校理臣億太常博士集賢校理臣頌殿中丞臣檢光祿寺丞臣保衡相次被選仍領醫官秦宗古朱有章等編繹纍年既而補注本草成書奏御又詔天下郡縣圖上所産藥本用永徽故事重命編述臣禹錫以謂考正群書資衆見則其功易就論著文字出異手則其體不一今天下所上繪事千名其解説物類皆據世醫之所聞見事有詳略言多鄙俚向非專一整比緣飾以文則前後不倫披尋難曉乃以臣頌向嘗刻意此書於是建言奏請俾專撰述臣頌既被旨則裒集衆説類聚詮次粗有條目其間玉石金土之名草木蟲魚之別有一物而雜出諸郡者有同名而形類全別者則參用古今之説互相發明其荄梗之細大華實之榮落雖與舊説相戾併兼存之崖略不備則稍援舊注以足成文意注又不足乃更旁引經史及方書小説以條悉其本原若陸英為蒴藋花則據爾雅之訓以言之諸香同本則用嶺表録異以證之之類是也生出郡縣則以本經為先今時所宜次之若菟絲生於朝鮮今則出於冤句奚毒生於少室今乃來自三蜀之類是也收採時月有不同者亦兩存其説若赤箭本經但著採根今乃並取莖苗之類是也生於外夷者則據今傳聞或用書傳所載若玉屑玉泉今人但云玉出於于闐不究所得之因乃用平居誨行程記為質之類是也藥有上中下品皆用本經為次第其性類相近而人未的識或出於遠方莫能形似者但於前條附之若溲疏附於枸杞琥珀附於茯苓之類是也又古方書所載簡而要者昔人已述其明驗今世亦常用之及今諸郡醫工所陳經效之藥皆並載其方用天寶之例也自余書傳所無今醫又不能解則不敢以臆説淺見附會其文故但闕而不録又有今醫所用而舊經不載者並以類次繫於末卷曰本經外類其間功用尤著與舊名附近者則次於逐條載之若通脫次於木通石蛇次於石蟹之類是也總二十卷目録一卷撰次甫就將備親覽恭唯主上以至仁厚德函養生類一物失所則為之惻然且謂札瘥荐臻四時代有救恤之惠無先醫術蚤歲屢敕近臣酬校歧黃內經重定針艾俞穴或範金揭石或鏤板聯編憫南方蠱惑之妖於是作慶曆善救方以賜之思下民資用之闕於是作簡要濟衆方以示之今復廣藥譜之未備圖地産之所宜物色萬殊指掌斯見將使合和者得十全之效飲餌者無未達之疑納斯民於壽康召和氣於穹壤太平之致茲有助焉臣學不該通職預編述仰奉宸旨深愧寡聞嘉祐六年九月日朝奉郎太常博士充集賢校理新差和穎州軍州兼管內勸農及管句開治溝洫河道事騎都尉借紫臣蘇頌謹上開寶重定序三墳之書神農預其一百藥既辨本草存其録舊經三卷世所流傳名醫別録互為編纂至粱正白先生陶景乃以別録參其本經朱墨雜書時謂明白而又考彼功用為之注釋列為七卷南國行焉逮乎有唐別加參校增藥八百餘味添注為二十一卷本經漏功則補之陶氏誤説則證之然而載歷年祀又逾四百朱字墨字無本得同舊注新注其文互闕非聖主撫大同之運永無疆之休其何以改而正之哉乃命盡考傳誤刊為定本類例非允從而革焉至如筆頭灰兔毫也而在草部今移附兔頭骨之下半天河地漿皆水也亦在草部今移附土石類之間敗鼓皮移附於獸皮胡桐淚改從於木類紫礦亦木也自玉石品而取焉伏翼實禽也由蟲魚部而移焉橘柚附於果實食鹽附於光明鹽生薑乾薑同歸一説至於雞腸蘩蔞陸英蒴藋以類相似從而附之仍採陳藏器拾遺李含光音義或討源於別本或傳效於醫家參而較之辨其臧否至如突屈白舊説灰類今是木根天麻根解似赤箭今又全異去非取是特立新條自余刊正不可悉數下采衆議定為印板乃以白字為神農所説墨字為名醫所傳唐附今附各加顯注詳其解釋審其形性證謬誤而辨之者署為今注考文記而述之者又為今按義既刊定理亦詳明今以新舊藥合九百八十三種並目録二十一卷廣頒天下傳而行焉唐本序禮部郎中孔志約撰蓋聞天地之大德曰生運陰陽以播物含靈之所保曰命資亭育以盡年蟄穴棲巢感物之情蓋寡範金揉木逐欲之道方滋而五味或爽時昧甘辛之節六氣斯沴易愆寒燠之宜中外交侵形神分戰飲食伺釁成腸胃之眚風濕侯隙構手足之災機當作幾纏膚腠莫知救止漸固膏肓期於夭折暨炎暉紀物識藥石之功云瑞名官窮診候之術草木鹹得其性鬼神無所遁情刳麝剸犀驅泄邪惡飛丹煉石引納清和大庇蒼生普濟黔首功侔造化恩邁財成日用不知於今是賴歧和彭緩騰絶軌於前李華張吳振英聲於後昔秦政煨燔茲經不預永嘉喪亂斯道尚存梁陶景雅好攝生研精藥術以為本草經者神農之所作不刊之書也惜其年代浸遠簡編殘蠹與桐雷衆記頗或踳駁與言撰緝勒成一家亦以雕琢經方潤色醫業然而時鐘鼎峙聞見闕於殊方事非僉議詮釋拘於獨學至如重建平之防己棄槐里之半夏秋採榆人冬收雲實謬粱米之黃白混荊子之牡蔓異繁蔞於雞腸合由跋於鳶尾防葵狼毒妄曰同根鉤吻黃精引為連類鉛錫莫辨橙柚不分凡此比例蓋亦多矣自時厥後以迄於今雖方技分鑣名醫繼軌更相祖述罕能釐正乃復採杜蘅於及己求忍冬於絡石舍陟釐而取莂藤退飛廉而用馬薊承疑行妄曾無有覺疾瘵多殆良深慨嘆既而朝議郎行右監門府長史騎都尉臣蘇恭托陶氏之乘違辨俗用之紕紊遂表請修定深副聖懷乃詔太尉揚州都督監修國史上柱國趙國公臣無忌太中大夫行尚藥奉御臣許孝崇等二十二人與蘇恭詳撰竊以動植形生因方舛性春秋節變感氣殊功離其本土則質同而效異乖於採摘乃物是而時非名實既爽寒溫多謬用之凡庶其欺已甚施之君父逆莫大焉於是上稟神規下詢衆議普頒天下營求藥物羽毛鱗介無遠不臻根莖花實有名咸萃遂乃詳探祕要博綜方術本經雖闕有驗必書別録雖存無稽必正考其同異擇其去取鉛翰昭章定群言之得失丹青綺煥備庶物之形容撰本草並圖經目録等凡成五十四卷臣禹錫等謹按蜀本草序作五十三卷及唐英公進本草表云勒成本草二十卷目録一卷藥圖二十五卷圖經七卷凡五十三卷又英公序云撰本草並圖經目録等凡成五十三卷據此三者合作五十三卷又據李含光本草音義云正經二十卷目録一卷又別立圖二十五卷目録一卷圖經七卷凡五十四卷二説不同今並注之庶以網羅為古開滌耳目盡醫方之妙極拯生靈之性命傳萬祀而無昧懸百王而不朽梁陶隱居序隱居先生在乎茅山岩嶺之上以吐納餘暇頗遊意方技覽本草藥性以為盡聖人之心故撰而論之舊説皆稱神農本經余以為信然昔神農氏之王天下也畫八卦以通鬼神之情造耕種以省殺生之弊宣藥療疾以拯天傷之命此三道者歷衆聖而滋彰文王孔子彖象繇辭幽贊人天后稷伊尹播厥百穀惠被群生岐黃彭扁振楊輔導恩流含氣並歲逾三千民到於今賴之但軒轅以前文字未傳如六爻指垂畫象稼穡即事成迹至於藥性所主當以識識相因不爾何由得聞至乎桐雷乃著在於編簡此書應與素問同類但後人多更修飾之爾秦皇所焚醫方卜術不預故猶得全録而遭漢獻遷徙晉懷奔迸文籍焚靡臣禹錫等謹按蜀本作糜音糜千不遺一今之所存有此四卷臣禹錫等謹按唐本亦作四卷韓保升又云神農本草上中下並序録合四卷今按四字當作三傳寫之誤也何則按梁七録云神農本草三卷又據本經陶序後朱書云本草經卷上卷中卷下卷上注云序藥性之源本論病名之形診卷中云玉石草木三品卷下云蟲獸果菜米食三品即不云三卷外別有序録明知韓保所云承據誤本妄生曲説今當從三卷為正是其本經所出郡縣乃後漢時制疑仲景元化等所記又云有桐君採藥録説其花葉形色藥對四卷論其佐使相須魏晉以來吳普臣禹錫等謹按蜀本注云普廣陵人也華他弟子撰本草一卷李當之臣禹錫等謹按蜀本注云華他弟子修神農舊經而世少行用等更復損益或五百九十五或四百四十一或三百一十九或三品混糅冷熱舛錯草石不分蟲獸無辨且所主治互有得失醫家不能備見則識智有淺深今輒苞綜諸經研括煩省以神農本經三品合三百六十五為主又進名醫副品亦三百六十五合七百三十種精粗皆取無復遺落分別科條區畛音軫物類兼注銘音瞑時用土地所出及仙經道術所須並此序録合為七卷雖未足追踵前良蓋亦一家撰制吾去世之後可貽諸知音爾本草經卷上序藥性之源本論病名之形診題記品録詳覽施用本草經卷中玉石草木三品本草經卷下蟲獸果萊米食三品有名未用三品右三卷其中下二卷藥合七百三十種名別有目録並朱墨雜書並子注今大書分為七卷唐本注漢書藝文志有黃帝內外經班固論云經方者本草石之寒溫原疾病之深淺乃班固論經方之語而無本草之名唯粱七録有神農本草三卷陶據此以別録加之為七卷序云三品混糅冷熱舛錯草石不分蟲獸無辨豈使草木同品蟲獸共條披覽既難圖繪非易今以序為一卷例為一卷玉石三品為三卷草三品為六卷木三品為三卷禽獸為一卷蟲魚為一卷果為一卷萊為一卷米穀為一卷有名未用為一卷合二十卷其十八卷中藥合八百五十種三百六十一種本經一百八十一種別録一百一十五種新附一百九十三種有名未用上藥一百二十種為君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者本上經中藥一百二十種為臣主養性以應人無毒有毒斟酌其宜欲遏病補虛羸者本中經下藥一百二十五種為佐使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經三品合三百六十五種法三百六十五度一度應一日以成一歲倍其數合七百三十名也臣禹錫等謹按本草例神農本經以朱書名醫別録以墨書神農本經藥三百六十五種今此言倍其數合七百三十名是並名醫別録副品而言也則此一節別録之文也當作墨書矣蓋傳寫浸久朱墨錯亂之所致耳遂令後世覽之者捃托此類以謂非神農之書乃後人附托之文者率以此故也上本説如此今按上品藥性亦皆能遣疾但其勢力和厚不為倉猝之效然而歲月常服必獲大益病既愈矣命亦兼申天道仁育故云應天一百二十種者當謂寅卯辰巳之月法萬物生榮時也中品藥性療病之辭漸深輕身之説稍薄於服之者祛患當速而延齡為緩人懷性情故云應人一百二十種者當謂午未申酉之月法萬物成熟時也下品藥性專主攻擊毒烈之氣傾損中和不可常服疾愈即止地體收殺故云應地一百二十五種者當謂戌亥子醜之月法萬物枯藏時也兼以閏之盈數加之凡合和之體不必偏用之自隨人患參而共行但君臣配隸依後所説若單服之者所不論爾藥有君臣佐使以相宣攝合和宜用一君二臣三佐五使又可一君三臣九佐使也上本説如此今按用藥猶如立人之制若多君少臣多臣少佐則氣力不周也而檢仙經世俗者方亦不必皆爾大抵養命之藥則多君養性之藥則多臣療病之藥則多佐猶依本性所主而兼復斟酌詳用此者益當為善又恐上品君中復各有貴賤譬如列國諸侯雖並得稱制而猶歸宗周臣佐之中亦當如此所以門冬遠志別有君臣甘草國老大黃將軍明其優劣皆不同秩自非農歧之徒孰敢詮正正應領略輕重為其分劑也藥有陰陽配合臣禹錫等謹按蜀本注云凡天地萬物皆有陰陽大小各有色類尋究其理並有法象故毛羽之類皆生於陽而屬於陰鱗介之類皆生於陰而屬於陽所以空青法木故色青而主肝丹砂法火故色赤而主心雲母法金故色白而主肺雌黃法土故色黃而主脾磁石法水故色黑而主腎余皆以此推之例可知也子母兄弟臣禹錫等謹按蜀本注云若榆皮為母厚朴為子之類是也根莖花實草石骨肉有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情合和視之當用相須相使者良勿用相惡相反者若有毒宜制可用相畏相殺者不爾勿合用也臣禹錫等謹按蜀本注云凡三百六十五種有單行者七十一種相須者十二種相使者九十種相畏者七十八種相惡者六十種相反者十八種相殺者三十六種凡此七情合和視之上本説如此今按其主療雖同而性理不和更以成患今檢舊方用藥亦有相惡相反者服之乃不為害或能有制持之者猶如寇賈輔漢程周佐吳大體既正不得以私情為害雖爾恐不如不用今仙方甘草丸有防己細辛俗方玉石散用栝蔞乾薑略舉大體如此其餘復有數十條別注在後半夏有毒用之必須生薑此是取其所畏以相制爾其相須相使者不必同類猶如和羹調食魚肉蔥豉各有所宜共相宣發也藥有酸咸甘苦辛五味又有寒熱溫涼四氣及有毒無毒陰乾曝乾採造時月生熟土地所出真偽陳新並各有法上本説如此又有分劑稱兩輕重多少皆須甄別若用得其宜與病相會入口必愈身安壽延若冷熱乖衷真假非類分兩違舛湯丸失度當瘥反劇以至殞命醫者意也古之所謂良醫者蓋善以意量得其節也諺云俗無良醫枉死者半拙醫療病不如不療喻如宰夫以鱔音善鱉為蓴羹食之更足成病豈充飢之可望乎故仲景云如此死者愚醫殺之也藥性有宜丸者宜散者宜水煮者宜灑漬者宜膏煎者亦有一物兼宜者亦有不可入湯酒者並隨藥性不得違越上本説如此又按病有宜服丸者服散者服湯者服酒者服膏煎者亦兼參用察病之源以為其制也欲療病先察其源先候病機五臟未虛六腑未竭血脈未亂精神未散服藥必活若病已成可得半愈病勢已過命將難全上本説如此按今自非明醫聽聲察色至乎診脈孰能知未病之病乎且未病之人亦無肯自療故桓侯怠於皮膚之微以致骨髓之痼今非但識悟之為難亦乃信受之弗易倉公有言曰病不肯服藥一死也信巫不信醫二死也輕身薄命不能將慎三死也夫病之所由來雖多端而皆關於邪邪者不正之因謂非人身之常理風寒暑濕飢飽勞逸皆各是邪非獨鬼氣疫癘者矣人生氣中如魚在水水濁則魚瘦氣昏則人病邪氣之傷人最為深重經絡既受此氣傳入臟腑隨其虛實冷熱結以成病病又相生故流變遂廣精神者本宅身以為用身既受邪精神亦亂神既亂矣則鬼靈斯入鬼力漸強神守稍弱豈得不致於死乎古人譬之植楊斯理當矣但病亦別有先從鬼神來者則宜以祈禱祛之雖曰可祛猶因藥療致愈昔李子豫有赤丸之例是也其藥療無益者是則不可祛晉景公膏肓之例是也大都鬼神之害則多端疾病之源唯一種蓋有輕重者爾真誥中有言曰常不能慎事上者自致百疴之本而怨咎於神靈乎當風臥濕反責他人於失覆皆癡人也夫慎事上者謂舉動之事必皆慎思若飲食恣情陰陽不節最為百疴之本致使虛損內起風濕外侵所以共成其害如此者豈得關於神明乎唯當勤於藥術療理爾若用毒藥療病先起如黍粟病去即止不去倍之不去十之取去為度上本説如此按今藥中單行一兩種有毒物只如巴豆甘遂之輩不可便令至劑爾如經所言一物一毒服一丸如細麻二物一毒服二丸如大麻三物一毒服三丸如胡豆四物一毒服四丸如小豆五物一毒服五丸如大豆六物一毒服六丸如梧子從此至十皆如梧子以數為丸而毒中又有輕重且如狼毒鉤吻豈同附子芫花輩邪凡此之類皆須量宜臣禹錫等謹按唐本舊云三物一毒服三丸如小豆四物一毒服四丸如大豆五物一毒服五丸如兔屎注云謹按兔屎大於梧子等差不類今以胡豆替小豆小豆替大豆大豆替兔屎以為折衷療寒以熱藥療熱以寒藥飲食不消以吐下藥鬼疰蠱毒以毒藥癰腫瘡瘤以瘡藥風濕以風濕藥各隨其所宜上本説如此又按藥性一物兼主十餘病者取其偏長為本復應觀人之虛實補瀉男女老少苦樂榮悴鄉壤風俗並各不同褚澄療寡婦尼僧異乎妻妾此是達其性懷之所致也病在胸膈以上者先食後服藥病在心腹以下者先服藥而後食病在四肢血脈者宜空腹而在旦病在骨髓者宜飽滿而在夜上本説如此按其非但藥性之多方其節適早晚復須條理今方家所云先食後食蓋此義也又有須酒服者飲服者冷服者暖服者服湯則有疏有數煮湯則有生有熟各有法用並宜審詳爾夫大病之主有中風傷寒寒熱溫瘧中惡霍亂大腹水腫腸澼下痢大小便不通奔豚上氣咳逆嘔吐黃疸消渴留飲癖食堅積癥瘕驚邪癲癇鬼疰喉痹齒痛耳聾目盲金瘡踒烏臥切折癰腫惡瘡痔瘻癭瘤男子五勞七傷虛乏羸瘦女子帶下崩中血閉陰蝕蟲蛇蠱毒所傷此大略宗兆其間變動枝葉各宜依端緒以取之上本説如此按今藥之所主只説病之一名假令中風乃有數十種傷寒證候亦有二十餘條更復就中求其類例大體歸其始終以本性為根宗然後配合諸證以合藥爾病之變狀不可一概言之所以醫方千卷猶未盡其理春秋以前及和緩之書蔑聞而道經略載扁鵲數法其用藥猶是本草家意至漢淳于意及華他等方今時有存者亦皆條理藥性唯張仲景一部最為衆方之祖又悉依本草但其善診脈明氣候以意消息之爾至於刳腸剖臆刮骨續筋之法乃別術所得非神農家事自晉代以來有張苗宮泰劉德史脫靳邵趙泉李子豫等一代良醫其貴勝阮德如張茂先裴逸民皇甫士安及江左葛洪蔡謨商仲堪諸名人等並研精藥術宋有羊欣元徽胡洽秦承祖齊有尚書褚澄徐文伯嗣伯群從兄弟療病亦十愈其八九凡此諸人各有所撰用方觀其指趣莫非本草者乎或時用別藥亦循其性度非相逾越範汪方百餘卷及葛洪肘後其中有細碎單行經用者或田舍試驗之法或殊域異識之術如藕皮散血起自庖人牽牛逐水近出野老餅店蒜齏乃是下蛇之藥路邊地菘而為金瘡所祕此蓋天地間物莫不為天地間用觸遇則會非其主封矣顏光祿亦云詮三品藥性以本草為主道經仙方服食斷谷延年卻老乃至飛丹煉石之奇云騰羽化之妙莫不以藥道為先用藥之理一同本草但制御之途小異世法猶如粱肉主於濟命華夷禽獸皆共仰資其為主理即同其為性靈則異爾大略所用不多遠至二十餘物或單行數種便致大益是其服食歲月深積即本草所云久服之效不如俗人微覺便止故能臻其所極以致遐齡豈但充體愈疾而已哉今庸醫處療皆恥看本草或倚約舊方或聞人傳説或遇其所憶便攬筆疏之俄然戴面以此表奇其畏惡相反故自寡昧而藥類違僻分兩參差亦不以為疑脫或偶爾值瘥則自信方驗若旬月未瘳則言病源深結了不反求諸已詳思得失虛構聲稱多納金帛非唯在顯宜責固將居幽貽譴矣其五經四部軍國禮服若詳用乖越者猶可矣止於事迹非宜爾至於湯藥一物有謬便性命及之千乘之君百金之長何不深思戒慎邪昔許太子侍藥不嘗招弒君之惡季孫饋藥仲尼有未達之辭知其藥性之不可輕信也晉時有一才人欲刊正周易及諸藥方先與祖訥異論祖云辨釋經典縱有異同不足以傷風教至於湯藥小小不達便致壽夭所由則後人受弊不少何可輕以裁斷祖之此言可為仁識足為龜鏡矣按論語云人而無恆不可以作巫醫明此二法不可以權飾妄造所以醫不三世不服其藥九折臂者乃成良醫蓋謂學功須深故也復患今之承藉者多恃衒名價亦不能精心研習實為可惜虛傳聲美聞風競往自有新學該明而名稱未播貴勝以為始習多不信用委命虛名諒可惜也京邑諸人皆尚聲譽不取實事余祖世以來務敦方藥本有範汪方一部斟酌詳用多獲其效內護家門傍及親族其有虛心告請者不限貴賤皆摩踵救之凡所救活數百千人自余投纓宅嶺猶不忘此日夜玩味常覺欣欣今亦撰方三卷並效驗方五卷又補葛氏肘後方三卷蓋欲承嗣善業令諸子侄不敢失墜可以輔身濟物者也今按諸藥採造之法既並用見成非能自採不復具論其事唯合藥須解節度列之如下按諸藥所生皆的有境界秦漢以前當言列國今郡縣之名後人所改爾江東以來小小雜藥多出近道氣力性理不及本邦假令荊益不通則全用歷陽當歸錢塘三建豈得相似所以療病不及往人亦當緣此故也蜀藥及北藥雖有去來亦非復精者且市人不解藥性唯尚形飾上黨人參世不復售華陰細辛棄之如芥且各隨俗相競不能多備諸族故往往遺漏今之所存二百許種爾衆醫都不識藥唯聽市人市人又不辨究皆委採送之家採送之家傳習造作真偽好惡並皆莫測所以鍾乳醋煮令白細辛水漬使直黃耆蜜蒸為甜當歸酒灑取潤螵蛸膠著桑枝蜈蚣朱足令赤諸有此等皆非事實俗用既久轉以成法非復可改末如之何又依方分藥不量剝除只如遠志牡丹才不收半地黃門冬三分耗一凡去皮除心之屬分兩皆不復相應病家唯依此用不知更稱取足又王公貴勝合藥之日悉付群下其中好藥貴石無不竊換乃有紫石英丹砂吞出洗取一片動經十數過賣諸有此例巧偽百端雖復監檢終不能覺以此療病固難即效如斯並是藥家之盈虛不得咎醫人之淺拙也凡採藥時月皆是建寅歲首則從漢太初後所記也其根物多以二月八月採者謂春初津潤始萌未沖枝葉勢力淳濃故也至秋枝葉乾枯津潤歸流於下今即事驗之春寧宜早秋寧宜晚花實莖葉乃各隨其成熟爾歲月亦有早晏不必都依本文也經説陰乾者謂就六甲陰中干之又依遁甲法甲子旬陰中在癸酉以藥著酉地也實謂不必然正是不露日曝於陰影處干之爾所以亦有云曝乾故也若幸可兩用益當為善今按本草採藥陰乾者皆多惡至如鹿茸經稱陰乾皆悉爛令壞今火干易得且良草木根苗陰之皆惡九月以前採者悉宜日乾十月以後採者陰乾乃好古稱唯有銖兩而無分名今則以十黍為一銖六銖為一分四分成一兩十六兩為一斤雖有子谷秬黍之制從來均之已久正爾依此用之臣禹錫等謹按唐本又云但古稱皆復今南稱是也晉稱始後漢末以來分一斤為二斤一兩為二兩耳金銀絲綿並與藥同無輕重矣古方唯有仲景而已涉今稱若用古稱作湯則水為殊少故知非復稱悉用今者耳今方家所云等分者非分兩之分謂諸藥斤兩多少皆同爾先視病之大小輕重所須乃以意裁之凡此之類皆是丸散丸散竟依度用之湯酒之中無等分也凡散藥有云刀圭者十分方寸之一準如梧桐子大也方寸匕者作匕正方一寸抄散取不落為度錢五匕者今五銖錢邊五字者以抄之亦令不落為度一撮者四刀圭也十撮為一勺十勺為一合以藥升分之者謂藥有虛實輕重不得用斤兩則以升平之藥升方作上徑一寸下徑六分深八分納散藥勿按抑之正爾微動令平調爾今人分藥不復用此凡丸藥有云如細麻者即胡麻也不必扁扁但令較略大小相稱爾如黍粟亦然以十六黍為一大豆也如大麻子者準三細麻也如胡豆者即今青斑豆是也以二大麻子準之如小豆者今赤小豆也粒有大小以三大麻子準之如大豆者以二小豆準之如梧子者以二大豆準之一方寸匕散蜜和得如梧子準十丸為度如彈丸及雞子黃者以十梧子準之唐本注云方寸匕散為丸如梧子得十六丸如彈丸一枚若雞子黃者準四十丸今彈丸同雞子黃此甚不等凡湯酒膏藥舊方皆云㕮方汝切咀子與切者謂稱畢搗之如大豆又使吹去細末此於事殊不允當藥有易碎難碎多末少末稱兩則不復均平今皆細切之較略令如㕮咀者乃得無末而又粒片調和也唐本注云㕮咀正謂商量斟酌之余解皆理外生精爾臣禹錫等看詳㕮咀即上文細切之義非商量斟酌也凡丸散藥亦先切細曝燥乃搗之有各搗者有合搗者並隨方所言其潤濕藥如天門冬乾地黃輩皆先切曝獨搗令偏碎更出細擘曝乾若逢陰雨亦以微火烘火工切之既燥小停冷乃搗之凡濕藥燥皆大耗當先增分兩須得屑乃稱之為正其湯酒中不須如此也凡篩丸藥用重密絹令細於蜜丸易熟若篩散草藥用輕疏絹於酒中服即不泥其石藥亦用細絹篩令如丸者凡篩丸散藥畢皆更合於臼中以杵搗之數百過視其色理和同為佳也凡湯酒膏中用諸石皆細搗之如粟米亦可以葛布篩令調並以新綿別裹內中其雄黃硃砂輩細末如粉凡煮湯欲微火令小沸其水數依方多少大略二十兩藥用水一斗煮取四升以此為準然則利湯欲生少水而多取補湯欲熟多水而少取好詳視之不得令水多少用新布兩人以尺木絞之澄去垽魚靳切濁紙覆令密溫湯勿令鐺器中有水氣於熟湯上煮令暖亦好服湯寧令小沸熱易下冷則嘔湧凡云分再服三服者要令勢力相及並視人之強羸病之輕重以為進退增減之不必悉依方説也凡漬藥酒皆須細切生絹袋盛之乃入酒密封隨寒暑日數視其濃烈便可漉出不必待至酒盡也滓可曝燥微搗更漬飲之亦可散服凡建中腎瀝諸補湯滓合兩劑加水煮竭飲之亦敵一劑新藥貧人可當依此用皆應先曝令燥凡合膏初以苦酒漬令淹浹不用多汁密覆勿泄云晬祖對切時者周時也從今旦至明旦亦有隻一宿者煮膏當三上三下以泄其熱勢令藥味得出上之使匝匝沸乃下之使沸靜良久乃止寧欲小小生其中有薤白者以兩頭微焦黃為候有白芷附子者亦令小黃色為度豬肪皆勿令經水臘月者彌佳絞膏亦以新布絞之若是可服之膏膏滓亦可酒煮飲之可摩之膏膏滓則宜以敷病上此蓋欲兼盡其藥力故也凡膏中有雄黃硃砂輩皆別搗細研如面須絞膏畢乃投中以物疾攪至於凝強勿使沉聚在下不調也有水銀者於凝膏中研令消散胡粉亦爾凡湯酒中用大黃不須細銼作湯者先以水浸令淹浹密覆一宿明旦煮湯臨熟乃內湯中又煮兩三沸便絞出則勢力猛易得快利丸散中用大黃舊皆蒸之今不須爾凡湯中用麻黃皆先別煮兩三沸掠去其沫更益水如本數乃內余藥不爾令人煩麻黃皆折去節令理通寸銼之小草瞿麥五分銼之細辛白前三分銼之丸散膏中則細銼也凡湯中用完物皆擘破干棗梔子栝蔞之類是也用細核物亦打破山茱萸五味子蕤核決明子之類是也細花之物正爾完用之旋覆花菊花地膚子葵子之類是也米麥豆輩亦完用之諸蟲先微炙之唯螵蛸當中破炙之生薑射干皆薄切之芒硝飴糖阿膠皆須絞湯畢納汁中更上火兩三沸煬盡乃服之凡用麥門冬皆微潤抽去心杏仁桃仁湯柔撻去皮巴豆打破剝其皮刮去心不爾令人悶石韋刮去毛辛夷去毛及心鬼箭削取羽皮藜蘆剔取根微炙枳實去其瓤亦炙之椒去實於鐺中微熬令汗出則有勢力礬石於瓦上若鐵物中熬令沸汁盡即止礜石皆以黃土泥包使燥燒之半日令熟而解散犀角羚羊角皆鎊刮作屑諸齒骨並炙搗碎之皂莢去皮子炙之凡湯並丸散用天雄附子烏頭烏喙側子皆煻灰中炮令微坼削去黑皮乃稱之唯薑附湯及膏酒中生用亦削皮乃稱之直理破作七八片隨其大小但削除處黑尖處令盡凡湯酒丸散膏中用半夏皆且完用熱湯洗去上滑以手挪之皮釋隨剝去更復易湯洗令滑盡不爾戟人咽喉舊方云二十許過今六七過便足亦可煮之一兩沸一易水如此三四過仍挪洗畢便曝乾隨其大小破為細片乃稱之以入湯若膏酒丸散皆須曝燥乃稱之凡丸散用阿膠皆先炙使通體沸起燥乃可搗有不沸處更炙之凡丸中用蠟皆煬投少蜜中攪調以和藥若用熟艾先細擘合諸藥搗令散不可篩者別搗納散中和之凡用蜜皆先火煎掠去其沫令色微黃則丸經久不壞掠之多少隨蜜精粗凡丸散用巴豆杏仁桃仁葶藶胡麻諸有膏膩藥皆先熬黃黑別搗令如膏指㩢莫結切視泯泯爾乃以向成散稍稍下臼中合研搗令消散仍復都以輕疏絹篩度之須盡又納臼中依法搗數百杵也湯膏中用亦有熬之者雖生並搗破之凡用桂心厚朴杜仲秦皮木蘭之輩皆削去上虛軟甲錯處取里有味者稱之茯苓豬苓削除黑皮牡丹巴戟天遠志野葛等皆槌破去心紫菀洗去土皆畢乃稱之薤白蔥白除青令盡莽草石南茵芋澤蘭皆剔取葉及嫩莖去大枝鬼臼黃連皆除根毛蜀椒去閉口者及目熬之凡狼毒枳實橘皮半夏麻黃吳茱萸皆欲得陳久者良其餘須精新也凡方云巴豆若干枚者粒有大小當先去心皮乃稱之以一分準十六枚附子烏頭若干枚者去皮畢以半兩準一枚枳實若干枚者去穰畢以一分準二枚橘皮一分準三枚棗有大小三枚準一兩云乾薑一纍者以重一兩為正凡方云半夏一升者洗畢稱五兩為正蜀椒一升者三兩為正吳茱萸一升者五兩為正菟絲子一升九兩為正庵䕡子一升四兩為正蛇床子一升三兩半為正地膚子一升四兩為正此其不同也云某子一升者其子各有虛實輕重不可通以稱準皆取平升為正凡方云用桂一尺者削去皮畢重半兩為正甘草一尺者重二兩為正云某草一束者以重三兩為正云一把者重二兩為正云蜜一斤者有七合豬膏一斤者有一升二合也上合藥分劑料理法則臣禹錫等謹按徐之才藥對孫思邈千金方陳藏器本草拾遺序例如後夫衆病積聚皆起於虛也虛生百病積者五臟之所積聚者六腑之所聚如斯等疾多從舊方不假增損虛而勞者其弊萬端宜應隨病增減古之善為醫者皆自採藥審其體性所主取其時節早晚早則藥勢未成晚則盛勢已歇今之為醫不自採藥且不委節氣早晚又不知冷熱消息分兩多少徒有療病之名永無必愈之效此實浮惑聊復審其冷熱記增損之主爾虛勞而頭痛復熱加枸杞萎蕤虛而欲吐加人參虛而不安亦加人參虛而多夢紛紜加龍骨虛而多熱加地黃牡蠣地膚子甘草虛而冷加當歸芎藭乾薑虛而損加鍾乳棘刺蓯蓉巴戟天虛而大熱加黃芩天門冬虛而多忘加茯神遠志虛而驚悸不安加龍齒沙參紫石英小草若冷則用紫石英小草若客熱即用沙參龍齒不冷不熱皆用之虛而口乾加麥門冬知母虛而吸吸加胡麻覆盆子柏子仁虛而多氣兼微咳加五味子大棗虛而身強腰中不利加磁石杜仲虛而多冷加桂心吳茱萸附子烏頭虛而勞小便赤加黃芩虛而客熱加地骨皮白水黃耆白水地名虛而冷用隴西黃耆虛而痰復有氣用生薑半夏枳實虛而小腸利加桑螵蛸龍骨雞䏶胵虛而小腸不利加茯苓澤瀉虛而損溺白加厚朴諸藥無有一一歷而用之但據體性冷熱的相主對聊敘增損之一隅夫處方者宜準此凡諸藥子仁皆去皮尖及雙仁者仍切之凡烏梅皆去核入丸散熬之大棗擘去核凡用麥蘖曲大豆黃卷澤蘭蕪荑殭蠶乾漆蜂房皆微炒凡湯中用麝香犀角鹿角羚羊角牛黃蒲黃丹砂須熟末如粉臨服納湯中攪令調和服之凡茯苓芍藥補藥須白者瀉藥唯赤者凡石蟹皆以槌極打令碎乃入臼不爾搗不可熟牛膝石斛等入湯酒拍碎用之凡菟絲子暖湯淘汰去沙土干漉暖酒漬經一宿漉出曝微白皆搗之不盡者更以酒漬經三五日乃出更曬微干搗之須臾悉盡極易碎凡斑貓等諸蟲皆去足翅微熬用牡蠣熬令黃凡諸湯用酒者皆臨熟下之凡用銀屑以水銀和成泥凡用鍾乳等諸石以玉槌水研三日三夜漂煉務令極細諸藥有宣通補泄輕重澀滑燥濕此十種者是藥之大體而本經都不言之後人亦所未述遂令調合湯丸有昧於此者至如宣可去壅即薑橘之屬是也通可去滯即通草防己之屬是也補可去弱即人參羊肉之屬是也泄可去閉即葶藶大黃之屬是也輕可去實即麻黃葛根之屬是也重可去怯即磁石鐵粉之屬是也澀可去脫即牡蠣龍骨之屬是也滑可去著即冬葵榆皮之屬是也燥可去濕即桑白皮赤小豆之屬是也濕可去枯即紫石英白石英之屬是也只如此體皆有所屬凡用藥者審而詳之則靡所遺失矣凡五方之氣俱能損人人生其中即隨氣受疾雖習成其性亦各有所資乃天生萬物以與人亦人窮急以致物今嶺南多毒足解毒藥之物即金蛇白藥之屬是也江湖多氣足破氣之物即薑橘吳茱萸之屬是也寒溫不節足療溫之藥即柴胡麻黃之屬是也涼氣多風足理風之物即防風獨活之屬是也濕氣多痹足主痹之物即魚鱉螺蜆之屬是也陰氣多血足主血之物即地錦石血之屬是也嶺氣多瘴足主瘴之物即常山鹽麩涪醋之屬是也石氣多毒足主毒之物即犀角麝香羚羊角之屬是也水氣多痢足主痢之物即黃連黃柏之屬是也野氣多蠱足主蠱之物即蘘荷茜根之屬是也沙氣多狐足主短狐之物即鸀鳿鸂鶒之屬是也大略如此各隨所生中央氣交兼有諸病故醫人之療亦隨方之能若易地而居即致乖舛矣故古方或多補養或多導泄或衆味或單行補養即去風導泄即去氣衆味則貴要單行乃貧下豈前賢之偏有所好或復用不遂其宜耳補注所引書傳補注本草所引書傳內醫書十六家援據最多今取撰人名氏及略述義例附於末卷庶使覽之者知所從來余非醫家所切不復存此具列如下開寶新詳定本草開寶六年詔尚藥奉御劉翰道士馬志翰林醫官翟煦張素王從蘊吳復圭王光祐陳昭遇安自良等九人詳校諸本仍取陳藏器拾遺諸書相參頗有刊正別名及增益品目馬志為之注解仍命左司員外郎知制誥扈蒙翰林學士盧多遜等刊定凡二十卷御製序鏤板於國子監開寶重定本草開寶七年詔以新定本草所釋藥類或有未允又命劉翰馬志等重詳定頗有增損仍命翰林學士李昉知制誥王祐扈蒙等重看詳凡神農所説以白字別之名醫所傳即以墨字並目録共二十一卷唐新修本草唐司空英國公李績等奉敕修初陶隱居因神農本經三卷增修為七卷顯慶中監門府長史蘇恭表請修定因命太尉趙國公長孫無忌尚藥奉御許孝崇與蘇恭等二十二人重廣定為二十卷今謂之唐本草蜀重廣英公本草偽蜀翰林學士韓保升等與諸醫工取唐本草並圖經相參校更加刪定稍增注釋孟昶自為序凡二十卷今謂之蜀本草吳氏本草魏廣陵人吳普撰普華他弟子修神農本草成四百四十一種唐經籍志尚存六卷今廣內不復有唯諸子書多見引據其説藥性寒溫五味最為詳悉藥總訣梁陶隱居撰論次藥品五味寒熱之性主療疾病及採蓄時月之法凡二卷一本題云藥像斆訣不著撰人名氏文字並相類藥性論不著撰人名氏集衆藥品類分其性味君臣主病之效凡四卷一本題曰陶隱居撰然所記藥性功狀與本草有相戾者疑非隱居所為藥對北齊尚書令西陽王徐之才撰以衆藥名品君臣佐使性毒相反及所主疾病分類而記之凡二卷舊本草多引以為據其言治病用藥最詳食療本草唐同州刺史孟詵撰張鼎又補其不足者八十九種並舊為二百二十七條凡三卷本草拾遺唐開元中京兆府三原縣尉陳藏器撰以神農本經雖有陶蘇補集之説然遺逸尚多故別為序例一卷拾遺六卷解紛三卷總曰本草拾遺共十卷四聲本草唐蘭陵處士蕭炳撰取本草藥名每上一字以四聲相從以便討閲凡五卷前進士王收撰序刪繁本草唐潤州醫博士兼節度隨軍楊損之撰以本草諸書所載藥類頗繁難於看檢刪去其不急並有名未用之類為五卷不著年代疑開元后人本草性事類京兆醫工杜善方撰不詳何代人以本草藥名隨類解釋刪去重復又附以諸藥制使畏惡解毒相反相宜者為一類共一卷南海藥譜不著撰人名氏雜記南方藥所産郡縣及療疾之驗頗無倫次似唐末人所作凡二卷食性本草為唐陪戎副尉劍州醫學助教陳士良撰以古有食醫之官因食養以治百病故取神農本經洎陶隱居蘇恭孟詵陳藏器諸藥關於飲食者類之附以己説又載食醫諸方及五時調養臟腑之術集賢殿學士徐鍇為之序日華子諸家本草國初開寶中四明人撰不著姓氏但云日華子大明序集諸家本草近世所用藥各以寒溫性味華實蟲獸為類其言近用功狀甚悉凡二十卷林樞密重廣本草圖經序良醫之不能以無藥愈疾猶良將不能以無兵勝敵也兵之形易見善用者能以其所以殺者生人藥之性難窮不善用者返以其所以生者殺人籲可畏哉寒熱溫涼辛甘緩急品類萬殊非一日而七十毒者孰能辨之彼玉函金匱肘後囊中千金之所傳外臺之所祕其為方不知其幾何由是言之則非獨察脈用方之為難而辨藥最其難者金石之珍草木之怪飛潛動植之廣且衆也風氣不同南北不通或非中國之所有或人力之所不可到乃欲真偽無逃於指掌之間則本草圖經二者何可須臾離也世所傳曰神農氏本草三卷梁陶隱居離以為七唐蘇恭李績之徒又附益為二十卷別圖藥形以為經其書略備矣開寶中太祖皇帝命盧多遜等考驗得失增藥尤多號為開寶本草仁宗皇帝嘉祐初又使掌禹錫林億蘇頌張洞為之補注因唐圖經別為繪畫復增藥至千有餘種於是收拾遺逸訂正訛繆刊在有司布之天下其為壽養生人之術無一不具然世之醫者習故守陋妄意穿鑿操數湯劑幸而數中自謂足以應無窮之病詰其論説則漠然不知顧本草與圖經殆虛文耳況偏州下邑雖有願見者何所售之閬中陳氏子承少好學尤喜於醫該通諸家之説嘗患二書傳者不博而學者不兼有也乃合為一又附以古今論説與己所見聞列為二十三卷名曰重廣補注神農本草並圖經書著其説圖見其形一啓帙而兩得之不待至乎殊方絶域山巔水涯而品類萬殊者森在目前譬夫談與地者觀於職方閲戰具者之入武庫也承之先世為將相歐陽子所謂四世六公者承其曾孫少孤奉其母江淮間閉門蔬食以為養君子稱其孝間有奇疾衆醫愕眙不知所出承徐察其脈曰當投某劑某刻良愈無不然者然則承之學雖出於圖書而精識超絶茲二者又安能域之哉鬼臾區岐伯遠矣吾不得而知也其視秦越人淳于倉公華他輩為何如識者當能知之元祐七年四月朔左朝請大夫充天章閣待制知杭州軍州事兼管內勸農事充兩浙西路兵馬鈐轄兼提舉本路兵馬巡檢公事上輕車都尉賜紫金魚袋長樂林希序雷公炮炙論序若夫世人使藥豈知自有君臣既辨君臣寧分相制只如栨毛今鹽草也沾溺立銷班腫之毒象膽揮黏乃知藥有情異鮭魚插樹立便乾枯用狗塗之以犬膽灌之插魚處立如故也卻當榮盛無名無名異形似玉柳石又如石灰味別止楚截指而似去甲毛聖石開盲明目而如雲離日當歸止血破血頭尾效各不同頭止血尾破血蕤子熟生足睡不眠立據弊箄淡滷常使者甑中箄能淡鹽味如酒沾交今蜜枳繳枝又云交加枝鐵遇神砂如泥似粉石經鶴糞化作塵飛栨見橘花似髓斷絃折劍遇鸞血而如初以鸞血煉作膠黏折處鐵物永不斷海竭江枯投遊波燕子是也而立泛令鉛拒火須仗修天今呼為補天石如要形堅豈忘紫背有紫背天葵如常食葵菜只是背紫面青能堅鉛形留砒住鼎全賴宗心別有宗心草今呼石竹不是食者棕恐誤其草出欻州生處多蟲獸雌得芹花其草名為立起其形如芍藥花色青可長三尺以來葉上黃斑色味苦澀堪用煮雌黃立住火立便成庚硇遇赤須其草名赤須今呼為虎鬚草是用煮硇砂即生火驗永留金鼎水中生火非猾髓而莫能海中有獸名曰猾以髓入在油中其油沾水水中火生不可救之用酒噴之即烶勿於屋下收長齒生牙賴雄鼠之骨末其齒若折年多不生者取雄鼠脊骨作末揩折處齒立生如故發眉墮落塗半夏而立生眉發墮落者以生半夏莖煉之取涎塗發落處立生目闢眼鸔有五花而自正五加皮是也其葉有雄雌三葉為雄五葉為雌須使五藥者作末酒浸飲之其目者正腳生肉栨裩系菪根腳有肉栨者取莨菪根於裩帶上系之感應永不痛囊皺旋多夜煎竹木多小便者夜煎萆薢一件服之永不夜起也體寒腹大全賴鸕鷀若患腹大如鼓米飲調鸕鷀末服立枯如故也血泛經過飲調瓜子甜瓜子內仁搗作末去油飲調服之立絶咳逆數數酒服熟雄天雄炮過以酒調一錢匕服立定也遍體疹風冷調生側附子傍生者曰側子作末冷酒服立瘥也腸虛瀉痢須假草零搗五倍子作末以熟水下之立止也久渴心煩宜投竹瀝除症去塊全仗硝硇硝硇即硇砂硝石二味於乳鉢中研作粉同鍛了酒服神效也益食加觴須煎蘆朴不食者並飲酒少者煎逆水蘆根並厚朴二味湯服強筋健骨須是蓯鱔蓯蓉並鱔魚二味作末以黃精汁丸服之可力倍常十也出乾寧記宰駐色延年精蒸神錦出顏色服黃精自然汁拌細研神錦於柳木甑中蒸七日了以木蜜丸服顏貌可如幼女之容色也知瘡所在口點陰膠陰膠即是甑中氣垢少許於口中即知臟腑所起直徹至住處知痛足可醫也産後肌浮甘皮酒服産後肌浮酒服甘皮立愈口瘡舌坼立愈黃蘇口瘡舌坼以根黃塗酥炙作末含之立瘥腦痛欲亡鼻投硝末頭痛者以硝石作末納鼻中立止心痛欲死速覓延胡以延胡索作散酒服之立愈也如斯百種是藥之功某忝遇明時謬看醫理雖尋聖法難可窮微略陳藥餌之功能豈溺仙人之要術其製藥炮熬煮炙不能記年月哉欲審元由須看海集某不量短見直録炮熬煮炙列藥制方分為上中下三卷有三百件名具陳於後凡方云丸如細麻子許者取重四兩鯉魚目比之云大麻子許者取重六兩鯉魚目比之云如小豆許者取重八兩鯉魚目比之云如大豆許者取重十兩鯉魚目比之云如兔菌俗云兔屎許者取重十二兩鯉魚目比之云如梧桐子許者取重十四兩鯉魚目比之云如彈子許者取重十六兩鯉魚目比之一十五個白珠為準是一彈丸也凡雲水一溢二溢至十溢者每溢稱之重十二兩為度凡云一兩一分一銖者正用今絲綿稱也勿得將四銖為一分有誤必所損兼傷藥力凡雲散只作散丸只作丸或酒煮或用醋或乳煎一如法則凡方煉蜜每一斤只煉得十二兩半或一分是數若火少若火過並用不得也凡膏煎中用脂先須煉去革膜了方可用也凡修事諸藥物等一一併須專心勿令交雜或先熬後煮或先煮後熬不得改移一依法則凡修合丸藥用蜜只用蜜用餳只用餳用糖只用糖勿交雜用必宣瀉人也新添本草衍義序通直郎添差充收買藥材所辨驗藥材寇宗奭編撰序例上衍義總序天地以生成為德有生所甚重者身也身以安樂為本安樂所可致者以保養為本世之人必本其本則本必固本既固疾病何由而生夭橫何由而至此攝生之道無逮於此夫草木無知猶假灌溉矧人為萬物之靈豈不資以保養然保養之義其理萬計約而言之其術有三一養神二惜氣三堤疾忘情去智恬憺虛無離事全真內外無寄如是則神不內耗境不外惑真一不雜則神自寧矣此養神也抱一元之本根固歸精之真氣三焦定位六賊忘形識界既空大同斯契則氣自定矣此惜氣也飲食適時溫涼合度出處無犯於八邪寤寐不可以勉強則身自安矣此堤疾也三者甚易行然人自以謂難行而不肯行如此雖有長生之法人罕專尚遂至永謝是以疾病交攻天和頓失聖人憫之故假以保救之術輔以蠲疴之藥俾有識無識咸臻壽域所以國家編撰聖惠校正素問重定本草別為圖經至於張仲景傷寒論及千金金匱外臺之類粲然列於書府今復考拾天下醫生補以名職分隸曹屬普救世人之疾苦茲蓋全聖至德之君合天地之至仁接物厚生大賚天下故野無遺逸之藥世無不識之病然本草二部其間撰著之人或執用己私失於商校致使學者撿據之間不得無惑今則並考諸家之説參之實事有未盡厥理者衍之以臻其理如東壁土倒流水冬灰之類隱避不斷者伸之以見其情如水自菊下過而水香鼴鼠溺精墜地而生子文簡誤脫者證之以明其義如玉泉石蜜之類諱避而易名者原之以存其名如山藥避本朝諱及唐避代宗諱使是非歸一治療有源撿用之際曉然無惑是以搜求訪緝者十有餘年採拾衆善蠌療疾苦和合收蓄之功率皆周盡矧疾為聖人所謹無常不可以為醫豈容易言哉宗奭常謂疾病所可憑者醫也醫可據者方也方可恃者藥也苟知病之虛實方之可否若不能達藥性之良毒辨方宜之早晚真偽相亂新陳相錯則曷由去道人陳宿之蠱唐甄立言仕為太常丞善醫術有道人心腹悶煩彌二歲診曰腹有蠱誤食發而然令餌雄黃一劑少選吐一蛇如拇指無目燒之有發氣乃愈生張果駢潔之齒唐張果召見元宗謂高力士曰吾聞飲堇無苦者奇士也時天寒取以飲三進頽然曰非佳酒乃寢頃視齒燋縮顧左右取鐵如意擊墮之藏帶中更出藥敷其齦良久齒已生粲然駢潔帝益神之此書之意於是乎作今則編次成書謹依二經類例分門條析仍衍序例為三卷內有名未用及意義已盡者更不編入其神農本經名醫別録唐本先附今附新補新定之目緣本經已著目録內更不聲説依舊作二十卷及目録一卷目之曰本草衍義若博愛衛生之士志意或同則更為詮修以稱聖朝好生之德時政和六年丙申歲記本草之名自黃帝歧伯始其補注總敘言舊説本草經者神農之所作而不經見平帝紀元始五年舉天下通知方術本草者所在軺傳遣詣京師此但見本草之名終不能斷自何代而作又樓護傳稱護少誦醫經本草方術數十萬言本草之名蓋見於此是尤不然也世本曰神農嘗百草以和藥濟人然亦不著本草之名皆未臻厥理嘗讀帝王世紀曰黃帝使歧伯嘗味草木定本草經造醫方以療衆疾則知本草之名自黃帝歧伯始其淮南子之言神農嘗百草之滋味一日七十毒亦無本草之説是知此書乃上古聖賢具生知之智故能辨天下品物之性味合世人疾病之所宜後之賢智之士從而和之者又增廣其品至一千八十二名補注本草稱一千八十二種然一種有分兩用者有三用者其種字為名字於義方允可謂大備然其間注説不盡或舍理別趣者往往多矣是以衍托余義期於必當非足以發明聖賢之意冀有補於缺疑夫天地既判生萬物者唯五氣爾五氣定位則五味生五味生則千變萬化至於不可窮已故曰生物者氣也成之者味也以奇生則成而耦以耦生則成而奇寒氣堅故其味可用以耎熱氣耎故其味可用以堅風氣散故其味可用以收燥氣收故其味可用以散土者沖氣之所生沖氣則無所不和故其味可用以緩氣堅則壯故苦可以養氣脈耎則和故咸可以養脈骨收則強故酸可以養骨筋散則不攣故辛可以養筋肉緩則不壅故甘可以養肉堅之而後可以耎收之而後可以散欲緩則用甘不欲則弗用用之不可太過太過亦病矣古方養生治疾者必先通乎此不通乎此而能已人之疾者蓋寡矣夫安藥之道在能保養者得之況招來和氣之藥少攻決之藥多不可不察也是知人之生須假保養無犯和氣以資生命才失將護便致病生苟或處治乖方旋見顛越防患須在間日故曰安不忘危存不忘亡此聖人之預戒也攝養之道莫若守中守中則無過與不及之害經曰春秋冬夏四時陰陽生病起於過用蓋不適其性而強云為逐強處即病生五臟受氣蓋有常分用之過耗是以病生善養生者既無過耗之弊又能保守真元何患乎外邪所中也故善服藥不若善保養不善保養不若善服藥世有不善保養又不善服藥倉猝病生而歸咎於神天噫是亦未嘗思也可不慎歟夫未聞道者放逸其心逆於生樂以精神徇智巧以憂畏徇得失以勞苦徇禮節以身世徇財利四徇不置心為之疾矣極力勞形躁暴氣逆當風縱酒食嗜辛鹹肝為之病矣飲食生冷溫涼失度久坐久臥大飽大飢脾為之病矣呼叫過常辨爭陪答冒犯寒暄恣食鹹苦肺為之病矣久坐濕地強力入水縱欲勞形三田漏溢腎為之病矣五病既作故未老而羸未羸而病病至則重重則必斃嗚呼是皆弗思而自取之也衛生之士須謹此五者可致終身無苦經曰不治已病治未病正為此矣夫善養生者養內不善養生者養外養外者實外以充快悅澤貪欲恣情為務殊不知外實則內虛也善養內者實內使臟腑安和三焦各守其位飲食常適其宜故莊周曰人之可畏者衽席飲食之間而不知為之戒者過也若能常如是畏謹疾病何緣而起壽考焉得不長賢者造形而悟愚者臨病不知誠可畏也夫柔情難綰而不斷不可不以智慧決也故幃箔不可不遠斯言至近易其事至難行蓋人之智慧淺陋不能勝其貪欲也故佛書曰諸若所因貪欲為本若滅貪欲何所依止是知貪欲不滅苦亦不滅貪欲滅苦亦滅聖人言近而指遠不可不思不可不懼善攝生者不勞神不若形神形既安禍患何由而致也夫人之生以氣血為本人之病未有不先傷其氣血者世有童男室女積想在心思慮過當多致勞損男則神色先散女則月水先閉何以致然蓋愁憂思慮則傷心心傷則血逆竭血逆竭故神色先散而月水先閉也火既受病不能榮養其子故不嗜食脾既虛則金氣虧故發嗽嗽既作水氣絶故四肢干木氣不充故多怒鬢髮焦筋痿俟五臟傳遍故卒不能死然終死矣此一種於諸勞中最為難治蓋病起於五臟之中無有已期藥力不可及也若或自能改易心志用藥扶接如此則可得九死一生舉此為例其餘諸勞可按脈與證而治之夫治病有八要八要不審病不能去非病不去無可去之術也故須審辨八要庶不違誤其一曰虛五虛是也脈細皮寒氣少泄利前後飲食不入此為五虛二曰實五實是也脈盛皮熱腹脹前後不通悶瞀此五實也三曰冷臟腑受其積冷是也四曰熱臟腑受其積熱是也五曰邪非臟腑正病也六曰正非外邪所中也七曰內病不在外也八曰外病不在內也既先審此八要參之六脈審度所起之源繼以望聞問切加諸病者豈有不可治諸疾也夫不可治者有六失失於不審失於不信失於過時失於不擇醫失於不識病失於不知藥六失之中有一於此即為難治非止醫家之罪亦病家之罪也矧又醫不慈仁病者猜鄙二理交馳於病何益由是言之醫者不可不慈仁不慈仁則招禍病者不可猜鄙猜鄙則招禍唯賢者洞達物情各就安樂亦治病之一説耳合藥分劑料理法則中言凡方云用桂一尺者削去皮畢重半兩為正既言廣而不言狹如何便以半兩為正且桂即皮也若言削去皮畢即是全無桂也今定長一尺闊一寸削去皮上粗虛無味者約為半兩然終不見當日用桂一尺之本意亦前人之失也序例藥有酸咸甘苦辛五味寒熱溫涼四氣今詳之凡稱氣者即是香臭之氣其寒熱溫涼則是藥之性且如鵝條中雲白鵝脂性冷不可言其氣冷也況自有藥性論其四氣則是香臭臊腥故不可以寒熱溫涼配之如蒜阿魏鮑魚汗襪則其氣臭雞魚鴨蛇則其氣腥腎狐貍白馬莖裩近隱處人中白則其氣臊沉檀龍麝則其氣香如此則方可以氣言之其序例中氣字恐後世誤書當改為性字則於義方允今人用巴豆皆去油訖生用茲必為本經言生溫熟寒故欲避寒而即溫也不知寒不足避當避其大毒矧本經全無去油之説故陶隱居云熬令黃黑然亦太過矣日華子云炒不如去心膜煮五度換水各煮一沸為佳其杏仁桃仁葶藶胡麻亦不須熬至黑但慢火炒令亦黃色斯可矣凡服藥多少雖有所説一物一毒服一丸如細麻之例今更合別論緣人氣有虛實年有老少病有新久藥有多毒少毒更在逐事斟量不可舉此為例但古人凡設例者皆是假令豈可執以為定法本草第一序例言犀角羚羊角鹿角一概末如粉臨服納湯中然今昔藥法中有生磨者煎取汗者且如丸藥中用蠟取其能固護藥之氣味勢力全備以過關鬲而作效也今若投之蜜相和雖易為丸劑然下咽亦易散化如何得到臟中若其間更有毒藥則便與人作病豈徒無益而又害之全非用蠟之本意至如桂心於得更有上虛軟甲錯可削之也凡此之類亦更加詳究今人用麻黃皆合搗諸藥中張仲景方中皆言去上沫序例中言先別煮三兩沸掠去其沫更益水如本數乃納余藥不爾令人發煩甚得用麻黃之意醫家可持此説然云折去節令通理寸銼之寸銼之不若碎銼如豆大為佳藥味易出而無遺力也陶隱居云藥有宣通補泄輕重澀滑燥濕此十種今詳之唯寒熱二種何獨見遺如寒可去熱大黃朴硝之屬是也如熱可去寒附子桂之屬是也今特補此二種以盡厥旨序例中人之生實陰陽之氣所聚耳若不能調和陰陽之氣則害其生故寶命全形篇論曰人以天地之氣生又曰天地合氣命之曰人是以陽化氣陰成形也夫遊魂為變者陽化氣也精氣為物者陰成形也陰陽氣合神在其中矣故陰陽應象大論曰天地之動靜神明為之綱紀即知神明不可以陰陽攝也易所以言陰陽不測之謂神蓋為此矣故曰神不可大用大用即竭形不可大勞大勞則斃是知精氣神人之大本不可不謹養智者養其神惜其氣以固其本世有不謹衛生之經者動皆觸犯既以犯養生之禁須假以外術保救不可坐以待斃本草之經於是興焉既知保救之理不可不窮保救之事衍義於是存焉二者其名雖異其理僅同欲使有知無知盡臻壽域率至安樂之鄉適是意者求其意而可矣養心之道未可忽也六欲七情千變萬化出沒不定其言至簡其義無窮而以一心對無窮之事不亦勞乎心苟不明不為物所病者未之有也故明達之士遂至忘心心既忘矣則六欲七情無能為也六欲七情無能為故內事不生內事不生故外患不能入外患不能入則本草之用實世之芻狗耳若未能達是意而至是地則未有不緣六欲七情而起憂患者憂患既作則此書一日不可缺也愚何人哉必欲斯文絶人之憂患乎陶隱居以謂凡篩丸散藥畢皆更合於臼中以杵搗數百過如此恐乾末湔蕩不可搗不若令力士合研為佳又曰凡湯酒膏中用諸石皆細搗之如粟亦可以葛布篩令調勻並以綿裹納中其雄黃硃砂輩細末如粉今詳之凡諸石雖是湯酒中亦須稍細藥力方盡出效亦速但臨服須澄濾後再上火不爾恐遺藥力不見效湯酒中尚庶幾若在服食膏中豈得更如粟也不合如此立例當在臨時應用詳酌爾又説㕮咀兩字唐本注謂為商量斟酌非也嘉祐復符陶隱居説為細切亦非也儒家以謂有含味之意如人以口齒咀齧雖破而不塵但使含味耳張仲景方多言㕮咀其義如此病人有既不洞曉醫藥復自行臆度如此則九死一生或醫人未識其病或以財勢所迫占奪強治如此之輩醫家病家不可不察也要在聰明賢達之士掌之則病無不濟醫無不功世間如此之事甚多故須一一該舉以堤或然夫人有貴賤少長病當別論病有新久虛實理當別藥蓋人心如面各各不同唯其心不同臟腑亦異臟腑既異乃以一藥治衆人之病其可得乎故張仲景曰又有土地高下不同物性剛柔餐居亦異是故黃帝興四方之問歧伯舉四治之能臨病之功宜須兩審如是則依方合藥一概而用亦以疏矣且如貴豪之家形樂志苦者也衣食足則形樂心慮多則志苦歧伯曰病生於脈形樂則外實志苦則內虛故病生於脈所養既與貧下異憂樂思慮不同當各逐其人而治之後世醫者直委此一節閉絶不行所失甚矣嘗有一醫官暑月與貴人飲貴人曰我昨日飲食所傷今日食減醫曰可餌消化藥他人當服十丸公當減其半下咽未久疏逐不已幾致斃以此較之虛實相遼不可不察故曰病當別論又一男子暑月患血痢醫妄以涼藥逆制專用黃連阿膠木香藥治之此藥始感便治則可今病久腸虛理不可服逾旬不已幾致委頓故曰理當別藥如是論之誠在醫之通變又須經歷則萬無一失引此為例余可效此凡用藥必須擇州土所宜者則藥力具用之有據如上黨人參川蜀當歸齊州半夏華州細辛又如東壁土冬月灰半天河水熱湯漿水之類其物至微其用至廣蓋亦有理若不推究厥理治病徒費其功終亦不能活人聖賢之意不易盡知然舍理何求哉凡人少長老其氣血有盛壯衰三等故歧伯曰少火之氣壯壯火之氣衰蓋少火生氣壯火散氣況復衰火不可不知也故治法亦當分三等其少日服餌之藥於壯老之時皆須別處之決不可忽也世有不留心於此者往往不信遂致困危哀哉今人使理中湯丸倉猝之間多不效者何也是不知仲景之意為必效藥蓋用藥之人有差殊耳如治胸痹心中痞堅氣結胸滿脅下逆氣搶心治中湯主之人參朮乾薑甘草四物等共一十二兩水八升煮取三升每服一升日三服以知為度或作丸須雞子黃大皆奇效今人以一丸如楊梅許服之病既不去乃曰藥不神非藥之罪用藥者之罪今引以為例他可效此然年高及素虛寒人當逐宜減甘草夫高醫以蓄藥為能倉猝之間防不可售者所須也若桑寄生桑螵蛸鹿角膠天靈蓋虎膽蟾酥野駝螢蓬藟空青婆娑石石蟹冬灰臘雪水松黃之類如此者甚多不能一一遍舉唐元淡字行沖嘗謂狄仁傑曰下之事上譬富家儲積以自資也脯臘膎胰以供滋膳參朮芝桂以防疾疢門下充旨味者多矣願以小人備一藥可乎仁杰笑曰公正吾藥籠中物不可一日無也然梁公因事而言獨譬之以藥則有以見天下萬物之中尤不可闕者也知斯道者知斯意而已凡為醫者須略通古今粗守仁義絶馳騖能所之心專博施救拔之意如此則心識自明神物來相又何必戚戚沽名齪齪求利也如或不然則曷以致薑撫沽譽之慚逋華他之矜能受戮乎嘗讀唐方技傳有云醫要在視脈唯用一物攻之氣純而愈速一藥偶得他藥相制弗能專力此難愈之驗也今詳之病有大小新久虛實豈可只以一藥攻之若初受病小則庶幾若病大多日或虛或實豈得不以他藥佐使如人用硫黃皆知此物大熱然石性緩倉卒之間下咽不易便作效故智者又以附子乾薑桂之類相佐使以發之將併力攻疾庶幾速效若單用硫黃其可得乎故知許嗣宗之言未可全信賢者當審度之夫用藥如用刑刑不可誤誤即幹人命用藥亦然一誤即便隔生死然刑有鞫司鞫成然後議定議定然後書罪蓋人命一死不可復生故須如此詳謹今醫人才到病家便以所見用藥若高醫識病知脈藥又相當如此即應手作效或庸下之流孟浪亂投湯劑逡巡便致困危如此殺人何太容易世間此事甚多良由病家不擇醫平日未嘗留心於醫術也可不懼哉序例下治婦人雖有別科然亦有不能盡聖人之法者今豪足之家居奧室之中處帷幔之內復以帛蒙手臂既不能行望色之神又不能殫切脈之巧四者有二缺焉黃帝有言曰凡治病察其形氣色澤形氣相得謂之可治色澤以浮謂之易已形氣相失謂之難治色夭不澤謂之難已又曰診病之道觀人勇怯骨肉皮膚能知其情以為診法若患人脈病不相應既不得見其形醫人只據脈供藥其可得乎如此言之烏能盡其術也此醫家之公患世不能革醫者不免盡理質問病家見所問繁還為醫業不精往往得藥不肯服似此甚多扁鵲見齊侯之色尚不肯信況其不得見者乎嗚呼可謂難也已又婦人病溫已十二日診之其脈六七至而澀寸稍大尺稍小發寒熱頰赤口乾不了了耳聾問之病後數日經水乃行此屬少陽熱入血室也若治不對病則必死乃按其證與小柴胡湯服之二日又與小柴胡湯加桂枝幹薑湯一日寒熱遂已又云我臍下急痛又與抵當丸微利臍下痛痊身漸涼和脈漸勻尚不了了乃復與小柴胡湯次日云我但胸中熱燥口鼻乾又少與調胃承氣湯不得利次日又云心下痛又與大陷胸丸半服利三行而次日虛煩不寧時妄有所見時復狂言雖知其尚有燥屎以其極虛不敢攻之遂與竹葉湯去其煩熱其夜大便自通至曉兩次中有燥屎數枚而狂言虛煩盡解但咳嗽唾沫此肺虛也若不治恐乘虛而成肺痿遂與小柴胡去人參大棗生薑加乾薑五味子湯一日咳減二日而病悉愈以上皆用張仲景方有婦人病吐逆大小便不通煩亂四肢冷漸無脈凡一日半與大承氣湯兩劑至夜半漸得大便通脈漸生翌日乃安此關格之病極難治醫者當審謹也經曰關則吐逆格則不得小便如此亦有不得大便者有小兒病虛滑食略化大便日十餘次四肢柴瘦腹大食訖又飢此疾正是大腸移熱於胃善食而瘦又謂之食㑊者時五六月間脈洪大按之則絶今六脈既單洪則夏之氣獨然按之絶則無胃氣也經曰夏脈洪洪多胃氣少曰病但洪無胃氣曰死夏以胃氣為本治療失於過時後不逾旬果卒有人病久嗽肺虛生寒熱以款冬花焚三兩芽俟煙出以筆管吸其煙滿口則咽之至倦則已凡數日之間五七作瘥有人病瘧月餘日又以藥吐下之氣遂弱疾未愈觀其病與脈乃夏傷暑秋又傷風乃與柴胡湯一劑安後又飲食不節寒熱復作此蓋前以傷暑今以飲食不慎遂致吐逆不食脅下牽急而痛寒熱無時病名痰瘧以十棗湯一服下痰水數升明日又與理中散二錢遂愈有人苦風痰頭痛顫掉吐逆飲食減醫以為傷冷物遂以藥溫之不愈又以丸藥下之遂厥復與金液丹後譫言吐逆顫掉不省人狂若見鬼循衣摸床手足冷脈伏此胃中有結熱故昏瞀不省人以陽氣不能布於外陰氣不持於內即顫掉而厥遂與大承氣湯至一劑乃愈方見仲景後服金箔丸方見刪繁有男子年六十一腳腫生瘡忽食豬肉不安醫以藥利之稍愈時出外中風汁出後頭面暴腫起紫黑色多睡耳輪上有浮泡小瘡黃汁出乃與小續命湯中加羌活一倍服之遂愈有人年五十四素羸多中寒近服菟絲有效小年常服生硫黃數斤脈左上二部右下二部弦緊有力五七年來病右手足筋急拘攣言語稍遲遂與仲景小續命湯加薏苡仁一兩以治筋急減黃芩人參芍藥各半以避中寒杏仁只用一百五枚後云尚覺大冷因令盡去人參芍藥黃芩三物卻加當歸一兩半遂安今人用小續命湯者比比皆是既不能逐證加減遂至危殆人亦不知今小續命湯世所須也故舉以為例可不謹哉夫八節之正氣生活人者也八節之虛邪殺人者也非正氣則為邪非真實則為虛所謂正氣者春溫夏熱秋涼冬寒此天之氣也若春在經絡夏在肌肉秋在皮膚冬在骨髓此人之氣也在處為實不在處為虛故曰若以身之虛逢時之虛邪不正之氣兩虛相感始以皮膚經絡次傳至臟腑逮於骨髓則藥力難及矣如此則醫家治病正宜用藥抵截散補防其深固而不可救也又嘗須保護胃氣舉斯為例余可效此
