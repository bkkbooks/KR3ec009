body:
  text: 卷第二己酉新增衍義序例下謹按諸藥一種雖主數病而性理亦有偏著立方之日或致疑混復恐單行經用赴急抄撮不必皆得研究今宜指抄病源所主藥名便可於此處療若欲的尋亦兼易解其甘苦之味可略有毒無毒易知唯冷熱須明今依本經別録注於本條之下其有不宜入湯酒宜入湯酒者今亦條於後矣今詳唐本以朱點為熱墨點為冷無點為平多有差互今於逐藥之下依本經別録而注焉凡墨蓋子下並唐慎微續添療風通用防風溫防己平溫秦艽平微溫獨活平微溫芎藭溫羌活平微溫麻黃溫微溫臣禹錫等謹按蜀本鹿藥溫天麻平海桐皮平蛜𧌴平威靈仙溫藥對楓香平治疹癢毒臣薏苡仁微寒主風筋攣急屈伸不得君萎蕤平治中風曝熱不能轉動者君巴戟天微溫治風邪氣君側子大熱治濕風大風拘急使鱉頭血治口僻臣山茱萸平治風氣臣淡竹瀝及葉大寒主風癔疾臣牛膝平主風攣急君細辛溫主風攣急君菖蒲溫君並桂心大熱吹鼻中主風喑君梁上塵微寒以小豆大吹鼻中治中風使葛根平主暴光中風臣白蘚皮寒治風不得屈伸風熱臣白薇大寒治曝風身熱四肢急滿不知人臣菊花平天門冬平大寒附子溫大熱杜若微溫麥門冬平微寒羚羊角溫微寒犀角寒微寒藁本溫微寒天雄溫大溫黃耆微溫蒺藜子溫微寒葈私以反耳實溫葉微寒狗脊平微溫莽草溫柏子仁平蔓荊實微寒微溫當歸溫大溫烏喙微溫萆薢平羊躑躅溫欒荊溫辛夷溫小天蓼溫乾蠍溫烏蛇溫天南星溫烏頭溫大熱白花蛇溫酸棗仁平鼠黏子平牛黃平枳殼微寒牡荊微寒平風眩菊花平飛廉平羊躑躅溫虎掌溫微寒杜若微溫茯神平茯苓平白芷溫鴟頭平臣禹錫等謹按蜀本茯牛花平藥對芎藭溫臣防風微溫主頭眩顛倒大風濕痹臣人參微溫主頭眩轉君兔頭骨平臣蔓荊實微寒薯蕷溫平術溫蘼蕪溫頭面風芎藭溫薯蕷溫平天雄溫大溫山茱萸平微溫莽草溫辛夷溫牡荊實溫蔓荊實微寒平溫藁本溫微溫微寒蘼蕪溫葈耳溫臣禹錫等謹按蜀本何首烏微溫藥對皂莢溫主風眩使巴戟天微溫主頭面風君白芷溫主頭面風臣防風溫治頭面來去風氣臣蜂子微寒微溫杜若微溫葈耳實溫葉微寒中風腳弱石斛平石鐘乳溫殷孽溫孔公孽溫石硫黃溫大熱附子溫大熱豉寒丹參微寒五加皮溫微寒竹瀝大寒大豆平天雄溫大溫側子大熱臣禹錫等謹按藥對木防己平治攣急臣獨活微溫主腳弱君松節溫治腳膝弱君牛膝平治痛痹君胡麻平久風濕痹菖蒲溫平茵芋溫微溫天雄溫大溫附子溫大熱烏頭溫大熱蜀椒溫大熱牛膝平天門冬平大寒術溫丹參微寒石龍芮平茵陳蒿平微寒細辛溫松節溫側子大熱松葉溫臣禹錫等謹按藥對薏苡仁微寒治中風濕痹筋攣君羊躑躅溫治風使柏子仁平治風濕痹君獨活微溫治風四肢無力拘急君天門冬平大寒葈耳實溫葉寒微蔓荊實微寒微溫賊風攣痛茵芋溫微溫附子溫大熱側子大熱麻黃溫微溫芎藭溫杜仲平溫萆薢平狗脊平微溫白蘚皮寒白芨平微寒葈耳溫豬椒溫石斛平漢防己平溫暴風瘙癢蛇床子平蒴藋溫烏喙微溫蒺藜子溫微寒景天平茺蔚子微溫微寒青葙子微寒楓香脂平藜蘆寒微寒臣禹錫等謹按蜀本烏蛇平藥對葶藶子寒主中暴風使枳實微寒主大風在皮膚中癢君谷莖主身癮疹煮水洗臣枳殼微寒傷寒麻黃溫微溫葛根平杏仁溫前胡微寒柴胡平微寒大青大寒龍膽寒大寒芍藥平微寒薰草平升麻平微寒牡丹寒微寒虎掌溫微寒術溫防己平溫石膏微寒大寒牡蠣平微寒貝母平微寒鱉甲平犀角寒微寒羚羊角寒微寒蔥白平生薑微溫豉寒人溺寒芒硝大寒臣禹錫等謹按藥對栝蔞寒主煩熱渴發黃臣蔥根寒主頭痛發表臣大黃大寒使雄黃平君白蘚皮寒主時病出汗臣射干微溫治時氣病鼻塞喉痹陰毒使茵陳蒿平微寒主發黃臣梔子大寒臣青竹茹微寒主頭痛臣寒水石大寒主五內大熱臣水牛角平主溫病使紫草寒主骨肉中痛臣葈耳微寒臣虎骨平主傷寒知母寒半夏平生微寒熟溫大熱凝水石寒大寒石膏微寒大寒滑石寒大寒黃芩平大寒知母寒白蘚皮寒玄參微寒大黃寒大寒沙參微寒苦參寒茵陳蒿平微寒鼠李根皮微寒竹瀝大寒梔子寒大寒蛇莓大寒壬改切人糞汁寒白頸蚯蚓寒大寒芒硝大寒臣禹錫等謹按藥對梓白皮寒除熱使地膚子寒主去皮膚中熱氣小麥微寒主胃中熱使木蘭皮寒主身大熱暴熱面皰臣水中萍寒主暴熱身癢理石寒君石膽寒主肝臟中熱臣牛黃平主小兒熱癇口不開君羚羊角微寒主熱在肌膚臣垣衣大寒主發瘡白薇大寒臣景天平主身熱小兒發熱驚氣君升麻微寒主熱毒君龍齒角平主小兒身熱臣葶藶寒主身暴熱利小便使藍葉實寒主五心煩悶君蜣螂寒主狂語頭髮熱使楝實寒作湯浴通身熱主溫病使荊瀝大寒主胸中痰熱臣勞復鼠屎微寒豉寒竹瀝大寒人糞汁寒臣禹錫等謹按蜀本大黃大寒蔥白平犀角寒防己平虎掌溫牡蠣微寒生薑微溫芒硝大寒鱉甲平柴胡平微寒麥門冬平微寒溫瘧常山寒微寒蜀漆平微溫牡蠣平微寒鱉甲平麝香溫麻黃溫微溫大青大寒防葵寒豬苓平防己平溫茵芋溫微溫巴豆溫生溫熟寒白頭翁溫女青平芫花溫微溫白薇平大寒松蘿平臣禹錫等謹按蜀本天靈蓋平蕘花寒茵陳蒿平藥對龜甲平臣小麥微寒羊躑躅溫使白蘞微寒主溫瘧寒熱使蒴藋根溫使當歸溫主瘧寒熱君竹葉平合常山煮主孩子久瘧極良雞子黃和常山為丸用竹葉湯下主久瘧桃仁平烏梅平雄黃平大溫菖蒲溫莽草溫中惡麝香溫雄黃平寒大溫丹砂微寒升麻平微寒乾薑溫大熱巴豆溫生溫熟寒當歸溫大溫芍藥平微寒吳茱萸溫大熱鬼箭寒桃梟微溫桃皮平桃膠微溫烏頭溫大