body:
  text: 卷第二十一己酉新增衍義中品蝟皮味苦平無毒主五痔陰蝕下血赤白五色血汁不止陰腫痛引腰背酒煮殺之又療腹痛疝積亦燒為灰酒服之生楚山川穀田野取無時勿使中濕得酒良畏桔梗麥門冬陶隱居云田野中時有此獸人犯近便藏頭足毛刺人不可得捉能跳入虎耳中而見鵲便自仰腹受啄物有相制不可思議爾其脂煬鐵注中納少水銀則柔如鉛錫矣唐本注云蝟極獰鈍大者如小豚小者猶瓜大或惡鵲聲故反腹令啄欲掩取之猶蚌鷸音聿爾虎耳不受雞卵且去地三尺蝟何能跳之而入野俗鄙説遂為雅記深可怪也今按陳藏器本草云蝟脂主耳聾可注耳中皮及肉主反胃炙黃食之骨食之令人瘦諸節漸縮小肉食之主瘻臣禹錫等謹按蜀本注云勿用山枳鼠皮正相似但山枳毛端有兩岐為別又有虎鼠皮亦相類但以味酸為別又有山犬追皮類兔皮頗相似其色褐其味甚苦亦不堪用圖經云狀如猯豚腳短多刺尾長寸余蒼白色取去肉火干良也藥性論云蝟皮臣味甘有小毒主腸風瀉血痔病有頭多年不瘥者炙末白飲下方寸匕燒末吹主鼻衄甚解一切藥力孟詵云蝟食之肥下焦理胃氣其脂可煮五金八石皮燒灰酒服治胃逆又煮汁服止反胃又可五味淹炙食之不得食骨令人瘦小日華子云開胃氣止血汗肚脹痛疝氣脂治腸風瀉血作豬蹄者妙鼠腳者次圖經曰蝟皮生楚山川穀田野今在處山林中皆有之狀類猯豚腳短多刺尾長寸余人觸近便藏頭足外皆刺不可向爾惟見鵲則反腹受啄或云惡鵲聲故欲掩取之猶蚌𧑐音聿也此類亦多惟蒼白色腳似豬蹄者佳鼠腳者次其毛端有兩歧者名山枳鼠肉味酸者名虎鼠味苦而皮褐色類兔皮者名山犬追凡此皆不堪用尤宜細識耳採無時勿使中濕肉與脂皆中用惟骨不可食誤食之則令人瘦劣食療云蝟肉可食以五味汁淹炙食之良不得食其骨也其骨能瘦人使人縮小也謹按主下焦弱理胃氣令人能食其皮可燒灰和酒服及炙令黃煮汁飲之主胃逆細銼炒令黑入丸中治腸風鼠奶痔效主腸風痔瘻可煮五金八石與桔梗麥門冬反惡又有一種村人謂之豪豬取其肚燒乾和肚屎用之搗末細羅每朝空心溫酒調二錢匕有患水病鼓脹者服此豪豬肚一個便消瘥此豬多食苦參不理冷脹只理熱風水脹形狀樣似蝟鼠聖惠方治鼻衄塞鼻散用蝟皮一大枚燒末研用半錢綿裹塞鼻外臺祕要治五痔蝟皮方三指大切熏黃如棗大熟艾上三味穿地作坑調和取便熏之取口中熏黃煙氣出為佳火氣稍盡即停三日將息更熏之三度永瘥勿犯風冷羹臛將補慎忌雞豬魚生冷二十日後補之千金翼治蠱毒下血蝟皮燒末水服方寸匕當吐蠱毒肘後方治腸痔大便血燒蝟皮敷之簡要濟衆治腸痔下部如蟲齧蝟皮燒末生油和敷之佳子母祕録小兒卒驚啼狀如物刺燒蝟皮三寸為末乳頭飲兒飲服亦得丹房鏡源云蝟皮脂伏雄黃衍義曰蝟皮取干皮兼刺用刺作刷治紕帛絶佳此物兼治胃逆開胃氣有功從蟲從胃有理焉膽治鷹食病世有養者去而復來久亦不去當縮身藏足之時人溺之即開合穿山甲等分燒存性治痔入肉豆蔻一半末之空肚熱米飲調二錢服隱居所説跳入虎耳及仰腹受啄之事唐本注見擯亦當然露蜂房味苦咸平有毒主驚癇瘛瘲寒熱邪氣癲疾鬼精蠱毒腸痔火熬之良又療蜂毒毒腫一名蜂腸一名百穿一名蜂𭄰音窠生牂牁山谷七月七日採陰乾惡乾薑丹參黃芩芍藥牡蠣陶隱居云此蜂房多在樹腹中及地中今此曰露蜂當用人家屋間及樹枝間苞裹者乃遠舉牂牁未解所以唐本注云此蜂房用樹上懸得風露者其蜂黃黑色長寸許躉馬牛人乃至欲死者用此皆有效非人家屋下小小蜂房也別録云亂髮蛇皮三味合燒灰酒服方寸匕日二主諸惡疽附骨癰根在臟腑歷節腫出疔腫惡脈諸毒皆瘥又水煮露蜂房一服五合汁下乳石熱毒壅悶服之小便中即下石末大效灰之酒服主陰痿水煮洗狐尿刺瘡服之療上氣赤白痢遺尿失禁也臣禹錫等謹按蜀本圖經云樹上大黃蜂窠也大者如甕小者如桶今所在有十一月十二月採藥性論云土蜂房亦可單用不入服食能治臃腫不消用醋水調塗干即便易日華子云露蜂房微毒治牙齒疼痢疾乳癰蜂叮惡瘡即煎洗入藥並炙用圖經曰露蜂房生牂牁山谷今處處山林中皆有之此木上大黃蜂窠也大者如甕小者如桶其蜂黑色長寸許螫牛馬及人乃至欲死者用此尤效人家屋間亦往往有之但小而力慢不堪用不若山林中得風露氣者佳古今方書治牙齒湯多用之七月七日採又云十一月十二月採者佳亦解蠱毒又主乳石發動頭痛煩熱口乾便旋赤少者取十二分炙以水二升煮取八合分溫再服當利小便諸惡毒隨便出又療熱病後毒氣衝目用半大兩水二升同煎一升重濾洗目三四過又瘰癧成痿作孔者取二枚炙末臘月豬脂和塗孔上瘥雷公云凡使其窠有四件一名革蜂窠二名石蜂窠三名獨蜂窠四名草蜂窠是也大者一丈二丈圍在大樹膊者內窠小膈六百二十個圍大者有一千二百四十個蜂其窠黏木蒂是七姑木汁蓋是牛糞沫隔是葉蕊石蜂窠只在人家屋上大小如拳色蒼黑內有青色蜂二十一個不然只有十四個其蓋是石垢黏處是七姑木汁隔是竹蛀次有獨蜂窠大小隻如鵝卵大皮厚蒼黃色是小蜂肉並蜂翅盛向里只有一個蜂大如小石燕子許人馬若遭螫著立亡凡使革蜂窠先須以鴉豆枕等同拌蒸從巳至未出去鴉豆枕了曬乾用之千金方蜂螫人用蜂房末豬膏和敷之楊氏産乳蜂房煎湯洗亦得又方崩中漏下青黃赤白使人無子蜂房末三指撮酒服之大神效又方猝癇蜂房大者一枚水三升煮令濃赤以浴小兒日三四佳外臺祕要治眼翳煮蜂房細辛各等分含之即瘥肘後方治苦鼻中外查瘤膿水血出蜂房火炙焦末酒服方寸匕日三又方治風瘻蜂房一枚炙令黃赤色為末每用一錢臘月豬脂勻調敷瘡上經驗方解藥毒上攻如聖散蜂房甘草等分用麩炒令黃色去麩為末水二碗煎至八分一碗令溫臨臥頓服明目取下惡物梅師方治風癮疹方以水煮蜂房取二升入芒硝敷上日五度即瘥食醫心鏡小兒喉痹腫痛蜂房燒灰以乳汁和一錢匕服簡要濟衆治婦人乳癰汁不出內結成膿腫名妒乳方蜂房燒灰研每服二錢水一中盞煎至六分去滓溫服又方小兒重舌蜂房燒灰細研酒和為膏敷兒舌下日三四次用之勝金方治小兒咳嗽蜂房二兩淨洗去蜂糞及泥土以快火燒為灰每服一字飯飲下廣利方治頭痛煩熱口乾小便赤少蜂房十二分炙水二升煎取八合分為二服當利小便諸惡石毒隨小便出又方治熱病後毒氣衝目痛蜂房半兩水二升煮取一升重濾洗目日三四度治赤白翳集驗方治風氣客於皮膚瘙癢不已蜂房炙過蟬蛻等分為末酒調一錢匕日三二服子母祕録小兒赤白痢蜂房燒末飲服又方小兒大小便不通蜂房燒末酒服三錢日再服又方小兒臍風濕腫久不瘥燒末敷之衍義曰露蜂房有兩種一種小而其色淡黃窠長六七寸至一尺者闊二三寸如蜜脾下垂一邊是房多在叢木鬱翳之中世謂之牛舌蜂又一種或在高木上或屋之下外作固如三四斗許小者亦一斗中有窠如瓠之狀由此得名蜂色赤黃其形大於諸蜂世謂之元本音犯聖祖諱今改為元瓠蜂蜀本圖經言十一月十二月採者應避生息之時也今人用露蜂房兼用此兩種鱉甲味鹹平無毒主心腹癥瘕堅積寒熱去痞息肉陰蝕痔惡肉療溫瘧血瘕腰痛小兒脅下堅肉味甘主傷中益氣補不足生丹陽池澤取無時惡礬石陶隱居云生取甲剔去肉為好不用煮脫者今看有連厭及干岩便好若上有甲兩邊骨出已被煮出用之當炙夏月銼鱉以赤莧包置濕地則變化生鱉人有裹鱉甲屑經五月皆能變成鱉子此其肉亦不足食多作癥瘕其目陷者及合雞子食之殺人不可合莧菜食之其厭下有如王字形者亦不可食唐本注云鱉頭燒為灰主小兒諸疾又主産後陰脫下墜尸疰心腹痛今按陳藏器本草云鱉主熱氣濕痹腹中激熱細擘五味煮食之當微泄膏脫人毛髮拔去塗孔中即不生若欲重生者以白犬乳汁塗拔處當出黑毛也頷下有軟骨如龜形食之令人患水病臣禹錫等謹按蜀本云以緑色仍重七兩以上者置醋五升於中緩火逼之令盡然後去裙搗入藥性論云鱉甲使惡理石能主宿食症塊痃癖氣冷瘕勞瘦下氣除骨熱骨節間勞熱結實擁塞治婦人漏下五色羸瘦者但燒甲令黃色末清酒服之方寸匕日二服又方訶梨勒皮乾薑末等分為丸空心下三十丸再服治症癖病又治痃癖氣可醋炙黃末牛乳一合散一匙調可朝朝服之又和琥珀大黃作散酒服二錢匕少時惡血即下若婦人小腸中血下盡即休服又白頭血塗脫肛孟詵云鱉主婦人漏下羸瘦中春食之美夏月有少腥氣其甲嶽州昌江者為上赤足不可食殺人日華子云鱉益氣調中婦人帶下治血瘕腰痛鱉甲去血氣破癥結惡血墮胎消瘡腫並撲損瘀血瘧疾腸癰頭燒灰療脫肛圖經曰鱉生丹陽池澤今處處有之以嶽州沅江其甲有九肋者為勝取無時仍生取甲剔去肉為好不用煮脫者但看有連厭及干岩便真若上兩邊骨出是已被煮也古今治瘕癖虛勞方中用之最多婦人漏下五色羸瘦者燒甲令黃色篩末酒服方寸匕日二又合訶梨勒皮乾薑三物等分為丸空腹三十丸治癖最良又醋炙令黃搗末以牛乳一合調一匙朝日服之主痃氣其肉良之亦益人補虛去血熱但不可久食則損人以其性冷耳當胸前有軟骨謂之醜食當去之不可與莧菜同食令生鱉瘕久則難治又其頭足不能縮及獨目者並大毒不可食食之殺人其頭燒灰主脫肛南人養魚池中多畜鱉云令魚不隨霧起鱉之類三足者為能奴來切大寒而有毒主折傷止痛化血生搗其肉及血敷之道家云可闢諸厭穢死氣畫像亦能止之無裙而頭足不縮者名魶食之令人昏塞誤中其毒以黃耆吳藍煎服之立解其殼亦主傳尸勞及女子經閉其最大者為黿江中或有闊一二丈者南人亦捕而食之云其肉有五色而白多卵大如雞鴨子一産一二百枚人亦掘取以鹽淹可食其甲亦主五臟邪氣婦人血熱又下有鮀音駝甲條云生南海池澤今江湖極多即鼉也形似守宮陵鯉輩而長一二丈背尾俱有鱗甲善攻崎岸夜則鳴吼舟人甚畏之南人食其肉云色白如雞但發冷氣痼疾其皮亦中冒鼓皮及骨燒灰研末米飲服主腸風痔疾甚者入紅雞冠花末白礬灰末和之空腹服便差今醫方鮮有用黿鮀甲者雷公曰凡使要緑色九肋多裙重七兩者為上治氣破塊消症定心藥中用之每個鱉甲以六一泥固濟瓶子底了干於大火以物搘於中與頭醋下火煎之盡三升醋為度仍去裙並肋骨了方炙乾然入藥中用又治勞去熱藥中用依前泥用童子小便煮晝夜盡小便一斗二升為度後去裙留骨於石上捶石臼中搗成粉了以雞肶皮裹之取東流水三兩鬥盆盛閣於盆上一宿至明任用力有萬倍也聖惠方治久患勞瘧瘴等方用鱉甲三兩塗酥炙令黃去裙為末臨發時溫酒調下二錢匕又方治小兒尸疰勞瘦或時寒熱方用鱉頭一枚燒灰杵末新汲水下半錢匕千金方妊娠勿食鱉肉令子項短又方治脫肛歷年不愈死鱉頭一枚燒令煙絶杵末以敷肛上手按挪之千金翼治丈夫陰頭癰師所不能醫鱉甲一枚燒令末之以雞子白和敷之良肘後方治篤病新起早勞食飲多致復欲死燒鱉甲服方寸匕又方治老瘧炙鱉甲杵末服方寸匕至時令三服盡用火炙無不斷又方猝腰痛不得俯仰鱉甲一枚搗末服方寸匕又方治人心孔昏塞多忘喜誤丙午日取鱉甲著衣帶上又方石淋者取鱉甲杵末以酒服方寸匕日二三下石子瘥梅師方鱉目凹陷者煞人不可食又方難産取鱉甲燒末服方寸匕立出孫真人鱉腹下成五字食之作瘕鱉肉合芥子作惡疾傷寒類要治沈唇緊方鱉甲及頭燒灰作末以敷之子母祕録治小兒癇鱉甲炙令黃搗為末取一錢乳服亦可蜜丸如小豆大服楊氏産乳療上氣急滿坐臥不得方鱉甲一大兩炙令黃細搗為散取燈心一握水二升煎取五合食前服一錢匕食後蜜水服一錢匕姚和衆小兒因痢脫肛鱉頭甲燒灰末取粉撲之左傳云三足謂之能不可食也衍義曰鱉甲九肋者佳煮熟者不如生得者仍以釅醋炙黃色用經中不言治勞唯蜀本藥性論云治勞瘦除骨熱後人遂用之然甚有據亦不可過劑頭血塗脫肛又燒頭灰亦治蟹味鹹寒有毒主胸中邪氣熱結痛喎僻面腫敗漆燒之致鼠解結散血愈漆瘡養筋益氣爪主破胞墮胎生伊洛池澤諸水中取無時殺莨菪毒漆毒陶隱居云蟹類甚多蝤音遒蛑音謀擁劍彭螖音越皆是並不入藥唯蟹最多有用仙方以化漆為水服之長生以黑犬血灌之三日燒之諸鼠畢至未被霜甚有毒云食水莨音建所為人中之不即療多死目相向者亦殺人服冬瓜汁紫蘇汁及大黃丸皆得瘥海邊又有彭蜞擁劍似彭螖而大似蟹而小不可食蔡謨初渡江不識而啖之幾死嘆曰讀爾雅不熟為勸學者所誤今按陳藏器本草云蟹腳中髓及腦並殼中黃並能續斷絶筋骨取碎之微熬納瘡中筋即連也八月腹內有芒食之無毒其芒是稻芒長寸許向東輸海神開腹中猶有海水本經云伊洛水中者石蟹形段不同其黃敷久疽瘡無不瘥者臣禹錫等謹按陳藏器云蝤蛑主小作閃痞煮食之大者長尺余兩螯至強八月能與虎鬥虎不如也隨大潮退殼一退一長擁劍一名桀步一螯極小以大者鬥小者食別無功彭蜞有小毒膏主濕癬疽瘡不瘥者塗之食其肉能令人吐下至困蔡謨渡江誤食者彭螖如小蟹無毛海人食之別無功孟詵云蟹主散諸熱治胃氣理經脈消食八月輸芒後食好未輸時為長未成就醋食之利肢節去五臟中煩悶氣其物雖形狀惡食甚宜人日華子云螃蟹涼微毒治産後肚痛血不下並酒服筋骨折傷生搗炒罯良腳爪破宿血止産後血閉肚痛酒及醋湯煎服良又云蝤蛑冷無毒解熱氣治小兒痞氣圖經曰蟹生伊洛池澤諸水中今淮海京東河北陂澤中多有之伊洛乃反難得也八足二螯大者箱角兩出足節屈曲行則旁橫今人以為食品之佳味獨熬獨目及兩目相向者皆有大毒不可食其黃能化漆為水故塗漆瘡用之黃並肉熬末以納金瘡中筋斷亦可續黃並螯燒煙可以集鼠於庭爪入藥最多胡洽療孕婦僵仆胎轉上搶心困篤有蟹爪湯之類是也經云取無時俗傳蟹八月一日取稻芒兩枚長一二寸許東行輸送其長故今南方捕得蟹瘥早則有銜稻芒者此後方可食之以前時長未成就其毒尤猛也蟹之類甚多六足者名蛫音跪四足者名北皆有大毒不可食誤食之急以豉汁可解闊殼而多黃者名蠘生南海中其螯最鋭斷物如芟刈焉食之行風氣扁而最大後足闊者為蝤蛑嶺南人謂之撥棹子以後腳形如棹也一名蟳隨潮退過一退一長其大者如升小者如盞碟兩螯無毛所在異於蟹其力至強能與虎鬥往往虎不能勝主小兒閃癖煮與食之良一螯大一螯小者名擁劍又名桀步常以大螯鬥小螯食物一名執火以其螯赤故也其最小者名彭螖音滑吳人語訛為彭越爾雅云螖蠌音澤小者蟧力刀切郭璞云即彭螖也似蟹而小其膏可以塗癬食之令人吐下至困彭蜞亦其類也蔡謨渡江誤食者是此也食療云蟹足斑目赤不可食殺人又堪治胃氣消食又八月前每個蟹腹內有稻穀一顆用輸海神待輸芒後過八月方食即好經霜更美未經霜時有毒又鹽淹之作𧓺有氣味和酢食之利肢節去五臟中煩悶氣其物雖惡形容食之甚益人爪能安胎百一方疥瘡杵蟹敷之亦效又方金瘡方續筋多取蟹黃及腦並足中肉熬末納瘡中孫真人十二月勿食蟹傷神簡要濟衆小兒解顱不合生蟹足骨半兩焙乾白蘞半兩為末用乳汁和貼骨縫上以瘥為度楊氏産乳妊娠人不得食螃蟹令兒橫生也荀卿雲蟹六跪而二螯非蛇鱔之穴無所寄託凡食鱔毒可食蟹解之鱔畏蟹蟹鱔類也類聚相解其效速於他耳沈存中筆談關中無螃蟹土人惡其形狀以為怪物秦州人家收得一干蟹有病瘧者則借去懸門上往往遂瘥不但人不識鬼亦不識衍義曰蟹伊洛絶少今多自京師來京師亦自河北置之今河北沿邊滄瀛州等處所出甚多徐州亦有但不及河北者小兒解顱以螯並白芨爛搗塗囟上顱合此物極動風體有風疾人不可食屢見其事河北人取之當八九月蟹浪之時直於塘濼岸上伺其出水而拾之又夜則以燈火照捕始得之時黃與白滿殼凡收藏十數日不死亦不食此物每至夏末秋初則如蟬蛻解當日名蟹之意必取此義蚱音笮又音側蟬味鹹甘寒無毒主小兒驚癇夜啼癲病寒熱驚悸婦人乳難胞衣不出又墮胎生楊柳上五月採蒸乾之勿令蠧陶隱居云蚱字音作笮即是啞烏下切蟬啞蟬雌蟬也不能鳴者蟬類甚多莊子云蟪蛄不知春秋則是今四月五月小紫青色者而離騷云蟪蛄鳴兮啾啾歲暮兮不自聊此乃寒螿爾九月十月中鳴甚淒急又二月中便鳴者名䗿音寧母似寒螿而小七月八月鳴者名蛁音雕蟟音遼色青今此云生楊柳樹上是詩云鳴蜩嚖嚖者形大而黑傴僂丈夫止是掇此昔人啖之故禮有雀鷃音晏蜩範範有冠蟬有緌亦謂此蜩此蜩復五月便鳴俗云五月不鳴嬰兒多災今其療亦專主小兒也唐本注云別録云殼名枯蟬一名伏蜟音育主小兒癇女人生子不出灰服之主久痢又云蚱者鳴蟬也主小兒癇絶不能言今云啞蟬啞蟬則雌蟬也極乖體用按諸蟲獸以雄者為良也臣禹錫等謹按蜀本圖經云此鳴蟬也六月七月收蒸乾之陶云是啞蟬不能鳴者雌蟬也二説既相矛盾今據玉篇云蚱者蟬聲也如此則非啞蟬明矣且蟬類甚多有蟪蛄寒螿之名又爾雅云蝒馬蜩霓寒蜩皆蟬也按禮記云仲夏之月蟬始鳴本經云五月採即是此也其餘不入藥用藥性論云蚱蟬使味酸主治小兒驚哭不止殺疳蟲去壯熱治腸中幽幽作聲又云蟬蛻使主治小兒渾身壯熱驚癇兼能止渴圖經曰蚱音笮又音側蟬本經不載所出州土但云生楊柳上今在處有之陶隱居以為啞蟬蘇恭以為鳴蟬二説不同按字書解蚱字云蟬聲也月令仲夏之月蟬始鳴言五月始有此蟬鳴也而本經亦云五月採正與月令所記始鳴者同時如此蘇説得之矣蟬類甚多爾雅云蝒馬蜩郭璞注云蜩中最大者為馬蟬今夏中所鳴者比衆蟬最大陶又引詩鳴蜩嘒嘒云是形大而黑昔人所啖者又禮冠之飾附蟬者亦黑而大皆此類也然則爾雅所謂馬蜩詩人所謂鳴蜩月令禮家所謂蟬本草所謂蚱蟬其實一種蟬類雖衆而為時用者獨此一種耳又醫方多用蟬殼亦此蟬所蛻殼也又名枯蟬本生於土中云是蜣螂所轉丸久而化成此蟲至復便登木而蛻採得當蒸熟令勿蠹今蜀中有一種蟬其蛻殼頭上有一角如花冠狀謂之蟬花西人有齎至都下者醫工云入藥最奇陳藏器蟪蛄寒螿蛁蟟寧母蜩範並蟬注陶云蟪蛄四月五月鳴小小紫色者而離騷云蟪蛄鳴兮啾啾此乃寒螿耳二月鳴者名寧母似寒螿而小七月鳴者名嚖嚖色青詩曰鳴蜩嚖嚖形大而黑古人食之古禮云雀鷃蜩範範有冠蟬有緌按蜩以上五蟲並蟬屬也本經云螻蛄一名蟪蛄本功外其腦煮汁服主産後胞不出自有正傳然蟪蛄非螻蛄二物名字參錯耳字林云蟬蟪蛄也蝘蟬屬也草木疏云蟬一名蛁蟟青徐間謂之螰螇楚人名之蟪蛄秦燕謂之蚗蛥郭璞注云俗呼之為蟬宋衛謂之蜩螳楚謂之蟪蛄關東謂之蚗蛥陶又注桑螵蛸云俗呼螳螂為蛁蟟螳螂即非蟬類陶誤也蜩蟟退皮研一錢匕井花水服主呀病寒螿蜩範月令謂霓也寧母亦小蟬禮注云蜩蟬也範蜂也已有本經自蜩以上並無別功也聖惠方治風頭旋用蟬殼一兩微炒為末非時溫酒下一錢匕集驗方治風氣客皮膚瘙癢不已蟬蛻薄荷葉等分為末酒調一錢匕日三服御藥院治頭風目眩蟬蛻末熟湯下衍義曰蚱蟬夏月身與聲皆大者是始終一般聲仍皆乘昏夜方出土中升高處背殼坼蟬出所以皆夜出者一以畏人二畏日炙干其殼而不能蛻也至時寒則墜地小兒蓄之雖數日亦不須食古人以謂飲風露信有之蓋不糞而溺亦可見矣西川有蟬花乃是蟬在殼中不出而化為花自頂中出又殼治目昏翳又水煎殼汁治小兒出瘡疹不快甚良蟬花味甘寒無毒主小兒天吊驚癇瘛瘲夜啼心悸所在皆有七月採生苦竹林者良花出土上圖經文具蚱蟬條下雷公云凡使要白花全者收得後於屋下東角懸干去甲土後用漿水煮一日至夜焙乾碾細用之衍義蟬花文具蚱蟬條下蠐螬味鹹微溫微寒有毒主惡血血瘀痹氣破折血在脅下堅滿痛月閉目中淫膚青翳白膜療吐血在胸腹不去及破骨踒折血結金瘡內塞産後中寒下乳汁一名蟦扶文切蠐一名蜰音肥齊一名勃齊生河內平澤及人家積糞草中取無時反行者良蜚蠊為之使惡附子陶隱居云大者如足大指以背行乃快於腳雜豬蹄作羹與乳母不能別之詩云領如蝤蠐今此別之名以蠐字在下恐此云此蠐螬倒爾唐本注云此蟲有在糞聚或在腐木中其在腐柳樹中者內外潔白土糞中者皮黃內黑黯形色既異土木又殊當以木中者為勝採雖無時亦宜取冬月為佳按爾雅一名蠍音曷一名蛣䖦一名蝤蠐今按陳藏器本草云蠐螬主赤白遊疹以物發疹破碎蠐螬取汁塗之臣禹錫等謹按蜀本注云今據爾雅蟦蠐螬注云在糞土中本經亦云一名蟦蠐又云生積糞草中則此外恐非也今諸朽樹中蠹蟲俗通謂之蠍莫如其主療唯桑樹中者近方用之治眼得效又爾雅蠍蛣䖦又蠍桑蠹注云即蛣䖦也又據有名未用存用未識部蟲類中有桑蠹一條云味甘無毒主心暴痛金瘡肉生不足即此是也蘇云當以木中者為勝今獨謂其不然者謂生出既殊主療亦別雖有毒無毒易見而相使相惡難知又蠍不共號蠐螬蟦不兼名蛣䖦幾以處療當自審之也藥性論云蠐螬臣汁主滴目中去翳障主血止痛日華子云蠐螬蟲治胸下堅滿障翳瘀膜治風疹桑柳樹內收者佳余處即不中糞土中者可敷惡瘡圖經曰蠐螬生河內平澤及人家積糞草中今處處有之大者有如足大指以背行反快於腳採無時反行者良此爾雅所謂蟦蠐螬郭璞云在糞土中者是也而諸朽木中蠹蟲形亦相似但潔白於糞土中者即爾雅所云蝤蠐蠍又云蠍蛣䖦又云蠍桑蟲郭云在木中雖通名蠍所在異者是此也蘇恭以謂入藥當用木中者乃與本經云生積糞草中相戾矣有名未用中自有桑蟲條桑蟲即蛣䖦也與此主療殊別今醫家與蓐婦下乳藥用之乃是掘糞土中者其效殊速乃知蘇説未可據也張仲景治雜病方大蟅蟲丸中用蠐螬以其主脅下堅滿也續傳信方治喉痹取蟲汁點在喉中下即喉開也陳藏器本經云生糞土中陶云能背行者蘇云在腐木中柳木中者皮白糞中者皮黃以木中者為勝按蠐螬居糞土中身短足長背有毛筋但從水入秋蛻為蟬飛空飲露能鳴高潔蠍在朽木中食木心穿如錐刀一名蠹身長足短口黑無毛節慢至春羽化為天牛兩角狀如水牛色黑背有白點上下緣木飛騰不遙二蟲出處既殊形質又別蘇乃混其狀總名蠐螬異乎蔡謨彭蜞幾為所誤蘇敬此注乃千慮一失矣爾雅云蟦蠐蝤蠐蠍郭注云蠐螬在糞土中蠍在木中桑蠹是也飾通名蠍所在異也又云齧桑注云似蠍牛長角有白點喜齧桑樹作孔也雷公云凡使桑樹柏樹中者妙凡收得後陰乾干後與糯米同炒待米焦黑為度然後去米取之去口畔並身上肉毛並黑塵了作三四截碾成粉用之外臺祕要刪繁丹走皮中浸淫名火丹方取蠐螬末敷之千金方治稻麥芒入眼取蠐螬以新布覆目上持蠐螬從布上摩之其芒出著布上良也百一方諸竹木刺在肉中不出蠐螬碎之敷刺上立出子母祕録治癰疽痔漏惡瘡及小兒丹末蠐螬敷上治口瘡截頭箸翻過拭瘡效衍義曰蠐螬此蟲諸腐木根下有之構木津甘故根下多有此蟲其木身未有完者亦有生於糞土中者雖肥大但腹中黑不若木中者雖瘦而稍白生研水絞汁濾清飲下奶烏賊魚骨味鹹微溫無毒主女子漏下赤白經汁血閉陰蝕腫痛寒熱癥瘕無子驚氣入腹腹痛環臍陰中寒腫令人有子又止瘡多膿汁不燥肉味酸平主益氣強志生東海池澤取無時惡白蘞白芨附子陶隱居云此是鸔音剝烏所化作今其口腳具存猶相似爾用其骨亦炙之其魚腹中有墨今作好墨用之唐本注云此魚骨療牛馬目中障翳亦療人目中翳用之良也今按陳藏器本草云烏賊魚骨主小兒痢下細研為末飲下之亦主婦人血瘕殺小蟲並水中蟲投骨於井中蟲死腹中墨主血刺心痛醋摩服之海人云昔秦王東遊棄算袋於海化為此魚其形一如算袋兩帶極長墨猶在腹也臣禹錫等謹按蜀本圖經云鸔烏所化也今目口尚在背上骨厚三四分今出越州蘇恭引音義云無鸔字言是鴨字乃以爾雅中鵯鶋一名雅烏小而多群腹下白者為之圖經又云背上骨厚三四分則非水烏也今據爾雅中自有鵅烏鸔是水烏似鶂短頸腹翅紫白背上緑色名字既與圖經相符則鸔烏所化明矣藥性論云烏賊魚骨使有小毒止婦人漏血主耳聾孟詵云烏賊骨主目中一切浮翳細研和蜜點之又骨末治眼中熱淚日華子云烏賊魚通月經骨療血崩殺蟲心痛甚者炒其墨醋調服也又名纜魚須腳悉在眼前風波稍急即以須黏石為纜圖經曰烏賊魚出東海池澤今近海州郡皆有之云是鸔音剝烏所化今其口腳猶存頗相似故名烏賊能吸波噀墨以溷水所以自衛使水匿不能為人所害又云性嗜烏每暴水上有飛烏過謂其已死便啄其腹則卷取而食之以此得名言為烏之賊害也形若革囊口在腹下八足聚生口旁只一骨厚三四分似小舟輕虛而白又有兩須如帶可以自纜故別名纜魚南越志云烏賊有碇遇風便虯前一須下碇而住碇亦纜之義也腹中血及膽正如墨中以書也世謂烏賊懷墨而知禮故俗謂是海若白事小吏其肉食之益人取無時其無骨者名柔魚又更有章舉石距二物與此相類而差大味更珍好食品所貴重然不入藥用故略焉食療云骨主小兒大人下痢炙令黃去皮細研成粉粥中調服之良其骨能消目中一切浮翳細研和蜜點之妙又點馬眼熱淚甚良久食之主絶嗣無子益精其魚腹中有墨一片堪用書字雷公云凡使勿用沙魚骨緣真相似只是上紋橫不入藥中用凡使要上紋順渾用血滷作水浸並煮一伏時了漉出於屋下掘一地坑可盛得前件烏賊魚骨多少先燒坑子去炭灰了盛藥一宿至明取出用之其效倍多聖惠方治傷寒熱毒氣攻眼生赤白翳用烏賊魚骨一兩不用大皮杵末入龍腦少許令細日三四度取少許點之外臺祕要治癧瘍風及三年酢磨烏賊魚骨先布磨肉赤即敷之千金方治婦人小戶嫁痛烏賊骨燒末酒下方寸匕日三服又方治丈夫陰頭癰師不能治烏賊骨末粉敷之良經驗方治疳眼烏賊魚骨牡蠣並等分為末糊丸如皂子大每服用豬子肝一具藥一丸清米泔內煮肝熟為度和肝食用煮肝泔水下三兩服子母祕録治小兒重舌燒烏賊魚骨和雞子黃敷之喉及舌上南越記烏賊魚自浮於水上烏見以為死往啄之乃卷取入水故謂烏賊今鴉烏化為之也素問云烏賊魚主女子血枯丹房鏡源烏賊魚骨淡鹽衍義曰烏賊魚干置四方人炙食之又取骨鏤為細研細水飛澄下比去水曬乾之熟蜜和得所點目中翳緩取效原蠶蛾雄者有小毒主益精氣強陰道交接不倦亦止精臣禹錫等謹按陰痿通用藥云原蠶蛾熱蜀本云原蠶蛾味鹹溫屎溫無毒主腸鳴熱中消渴風痹癮疹陶隱居云原蠶是重養者俗呼為魏蠶道家用其蛾止精其翁繭入術用屎名蠶沙多入諸方用不但尉風而已也今按陳藏器本草云原蠶屎一名蠶沙淨收取曬乾炒令黃袋盛浸酒去風緩諸節不隨皮膚頑痹腹內宿冷冷血瘀血腰腳疼冷炒令熱袋盛熱尉之主偏風筋骨癱緩手足不隨及腰腳軟皮膚頑痹臣禹錫等謹按日華子云晚蠶蛾壯陽事止泄精尿血暖水藏又蠶蛾平治暴風金瘡凍瘡湯火瘡並滅瘡瘢入藥炒用又云蠶布紙平治吐血鼻洪腸風瀉血崩中帶下赤白痢敷疔腫瘡入藥燒用又云蠶沙治風痹頑疾不仁腸鳴圖經曰原蠶蛾本經不載所出州土今東南州郡多養此蠶處皆有之此是重養者俗呼為晚蠶北人不甚復養惡其損桑而周禮禁原蠶者鄭康成注云為其傷馬傷馬亦是其一事耳淮南子曰原蠶一歲再登非不利也然王法禁之者為其殘桑是也人既稀養市中貨者亦多早蛾不可用也至於用蠶沙蠶退亦須用晚出者唯白殭蠶不著早晚但用白而條直者凡用蠶並須食桑蠶不用食柘者蠶蛾益陽方中多用之今方治小兒撮口及發噤者取二枚炙黃研末蜜和塗口唇內便瘥蠶沙蠶退併入治風及婦人藥中用蠶退醫家多用初出蠶殼在紙上者一説蠶眠時所退皮用之更有效聖惠方治風瘙癮疹遍身癢成瘡用蠶沙一升水二斗煮取一斗二升去滓溫熱得所以洗之宜避風千金方治婦人始覺妊娠轉女為男法取原蠶屎一枚井花水服之日三服斗門方始渴疾用晚蠶沙焙乾為末冷水下二錢不過數服勝金方治刀斧傷止血生肌天蛾散晚蠶蛾為末摻勻絹裹之隨手瘡合血止一切金瘡亦治簡要濟衆小兒撮口及發噤方晚蠶蛾二枚炙令黃為末蜜和敷兒口唇內子母祕録云倒産難生原蠶子燒末飲服三錢小兒宮氣方治小兒口瘡及風疳瘡等晚蠶蛾細研貼瘡上妙衍義曰原蠶蛾有原復敏速之義此則第二番蛾也白殭蠶條中已具屎飼牛代谷又以三升醇酒拌蠶屎五斗用甑蒸熱於暖室中鋪於油單上令患風冷氣閉及近感癱風人就所患一邊臥看溫熱厚蓋覆汗出為度若虛人須常在左右防大熱昏冒仍令頭面在外不得壅覆未全愈間再作蠶退主血風病益婦人一名馬鳴退近世醫家多用蠶退紙而東方諸醫用蠶欲老眠起所蛻皮雖二者之用各殊然東人所用者為正用之當微炒和諸藥可作丸散服新定集驗方治纏喉風及喉痹牙宣牙癰口瘡並小走馬疳蠶退紙不計多少燒成灰存性上煉蜜和丸如雞頭大含化咽津牙宣牙癰揩齦上口瘡干敷患處小兒走馬疳入麝香少許貼患處佳百一方凡狂發欲走或自高貴稱神皆應備諸火灸乃得永瘥耳若或悲泣呻吟者此為邪祟以蠶紙作灰酒水任下瘥療風癲也衍義曰蠶退治婦人血風此則眠起時所蛻皮是也其蠶退紙謂之蠶連亦燒灰用之治婦人血露緣桑螺主人患脫肛燒末和豬膏敷之脫肛立縮此螺全似蝸牛黃小雨後好緣桑葉範汪脫肛緑桑樹螺燒之以豬脂和敷之立縮亦可末敷之白殭蠶味鹹辛平無毒主小兒驚癇夜啼去三蟲滅黑皯令人面色好男子陰瘍音亦病女子崩中赤白産後余痛滅諸瘡瘢痕生穎川平澤四月取自死者勿令中濕濕有毒不可用陶隱居云人家養蠶時有合箔皆僵者即暴燥都不壞今見小白色似有鹽度者為好末以塗馬齒即不能食草以桑葉拭去乃還食此明蠶即馬類也唐本注云別録云末之封疔腫根當自出極效此白僵死蠶皆白色陶云似有鹽度此誤矣臣禹錫等謹按蜀本圖經云用僵死白色者再生一生俱用今所在有之藥性論云白殭蠶惡桑螵蛸桔梗茯苓茯神萆薢有小毒治口噤發汗主婦人崩中下血不止與衣中白魚鷹屎白等分治瘡滅瘢日華子云殭蠶治中風失音並一切風疾小兒客忤男子陰癢痛女子帶下入藥除綿絲並子盡勻炒用又云蠶蛹子食治風及勞瘦又研敷蠶瘑惡瘡等圖經曰白殭蠶生穎川平澤今所在養蠶處皆有之用自僵死白色而條直者為佳四月取勿令中濕濕則有毒不可用用時仍去綿絲及子炒過今醫家用治中風急喉痹欲死者搗篩細末生薑自然汁調灌之下喉立愈又合衣魚鷹屎白等分為末面膏和塗瘡瘢疵便滅雷公云凡使先須以糯米泔浸一日待蠶桑涎出如蝸牛涎浮於水面上然後漉出微火焙乾以布淨拭蠶上黃肉毛並黑口甲了單搗篩如粉用也外臺祕要治瘰癧白殭蠶為散水服五分匕日三十日瘥千金方治大風半身不遂蠶沙兩碩熟蒸作直袋三隻各受七斗熱盛一袋著患處如冷即取余袋一依前法數數換一日不禁瘥又須羊肚釀粳米蔥白薑豉椒等爛煮熱吃日食一枚十日即止肘後方治背瘡彌驗以針挑四畔白殭蠶為散水和敷之即拔出根經驗後方下奶藥白殭蠶末兩錢酒調下少頃以脂麻茶一錢熱投之梳頭數十遍奶汁如泉斗門方治卒頭痛白殭蠶碾為末去絲以熟水下二錢匕立瘥博濟方治喉閉如聖散子白殭蠶天南星刮皮等分並生為末每服一字以生薑汁下如咽喉大段開不得即以小竹筒子擘口灌之涎出後用大薑一塊略炙過含之小可只敷唇上立瘥勝金方治風痰白殭蠶七個直者細研以薑汁一茶腳溫水調灌之又方治風痔忽生痔頭腫痛又忽自消發歇不定者是也白殭蠶二兩洗銼令微黃為末烏梅肉為丸如梧桐子大每服薑蜜湯下五丸空心服之楊氏産乳療野火丹從背上兩脅起用殭蠶二七枚和慎火草搗塗之聖惠方治風遍身癮疹疼痛成瘡用白殭蠶焙令黃色細研為末用酒服之立瘥又方主偏正頭疼並夾腦風連兩太陽穴疼痛以白殭蠶細研為末用蔥茶調服方寸匕小兒宮氣方主小兒口瘡通白者及風疳瘡蝕透者以白殭蠶炒令黃色拭去蠶上黃肉毛為末用蜜和敷之立效又方治小兒撮口及發噤者以白殭蠶二枚為末用蜜和敷於小兒唇口內即瘥斗門方主黑皯令人面色好用白殭蠶並黑牽牛細辛等分為末如澡豆用之又浴小兒胎穢良又方治刀斧所傷及一切金瘡以白殭蠶不以多少炒令黃色細研為末敷之立愈又方治中風急喉痹欲死者用白殭蠶以火焙乾令黃色搗篩為末用生薑自然汁調灌喉中效千金方治婦人崩中下血不止以衣中白魚殭蠶等分為末以井花水服之日三服瘥又方主中風失音並一切風疾及小兒客忤男子陰癢痛女子帶下以白殭蠶七枚為末用酒調方寸匕立效衍義曰白殭蠶然蠶有兩三番唯頭番殭蠶最佳大而無蛆治小兒驚風白殭蠶蠍梢等分天雄尖附子尖共一錢微炮過為細末每服一字或半錢以生薑溫水調灌之其蠶蛾則第二番者以其敏於生育鰻音鰻鱺音黎魚味甘有毒主五痔瘡瘻殺諸蟲陶隱居云能緣樹食藤花形似鱔取作食之炙以熏諸木竹闢蛀蟲膏療諸瘻瘡又有鰍音秋亦相似而短也唐本注云此膏又療耳中有蟲痛者鯢魚有四腳能緣樹陶云鰻鱺便是謬證也臣禹錫等謹按孟詵云殺諸蟲毒乾末空腹食之三五度瘥又熏下部痔蟲盡死患諸瘡瘻及癧瘍風長食之甚驗腰腎間濕風痹常如水洗者可取五味米煮空腹食之甚補益濕腳氣人服之良又諸草石藥毒食之諸毒不能為害五色者其功最勝兼女人帶下百病一切風五色者出歙州頭似蝮蛇背有五色紋者是也陳士良云鰻鱺魚寒陳藏器云鰍魚短小常在泥中主狗及牛瘦取一二枚以竹筒從口及鼻生灌之立肥也日華子云海鰻平有毒治皮膚惡瘡疥疳𧈟痔瘻又名慈鰻猧狗魚又云鰻魚平微毒治勞補不足殺傳尸疰氣殺蟲毒惡瘡暖腰膝起陽療婦人産戶瘡蟲癢圖經曰鰻音鰻鱺音黎魚本經不載所出州土今在處有之似鱔而腹大青黃色云是蛟蜃之類善攻崎岸使輒頽陀近江河居人酷畏之此魚雖有毒而能補五臟虛損久病罷瘵人可和五味以米煮食之患諸瘡痔漏及有風者長食歙州出一種背有五色紋其功最勝出海中者名海鰻相類而大功用亦同海人又名慈鰻又名猧狗魚食療云殺蟲毒乾燒炙之令香食之三五度即瘥長服尤良又壓諸草石藥毒不能損傷人又五色者其功最勝也又療婦人帶下百病一切風瘙如蟲行其江海中難得五色者出歙州溪澤潭中頭似蝮蛇背有五色紋者是也又燒之熏氈中斷蛀蟲置其骨於箱衣中斷白魚諸蟲咬衣服又燒之熏舍屋免竹木生蛀蚛聖惠方治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶用鰻鱺魚淡炙令熟令患人三五度食之又方治蚊蟲以鰻鱺魚乾者於室燒之即蚊子化為水矣又方治骨蒸勞瘦及腸風下蟲以魚二斤治如食法切作段子入鐺內以酒二盞煮入鹽醋中食之外臺祕要必效治悁心痛取鰻鱺魚淡炙令熟與患人食之一二枚永瘥飽食彌佳經驗方治惡瘡用蛇魚骨杵末入諸色膏藥中相和合敷上紙花子貼之食醫心鏡主五痔瘻瘡殺蟲方鰻鱺魚一頭治如食法切作片炙著椒鹽醬調和食之集驗方治頸項及面上白駁浸淫漸長有似癬但無瘡可治鰻鱺魚脂敷之先拭剝上刮使燥痛後以魚脂敷之一度便愈甚者不過三度稽神録有人多得勞疾相因染死者數人取病者於棺中釘之棄於水永絶傳染之病流之於江金山有人異之引岸開視之見一女子猶活因取置漁舍多得鰻鱺魚食之病愈遂為漁人之妻衍義曰鰻鱺魚生剖曬乾取少許火上微炙俟油出塗白剝風以指擦之即時色轉凡如此五七次用即愈仍先於白處微微擦動鮀音駝魚甲味辛微溫有毒主心腹癥瘕伏堅積聚寒熱女子崩中下血五色小腹陰中相引痛瘡疥死肌五邪涕泣時驚腰中重痛小兒氣癃眥潰肉主少氣吸吸足不立地生南海池澤取無時蜀漆為之使畏狗膽芫花甘遂陶隱居云鮀即今鼉甲也用之當炙皮可以貫鼓肉至補益於物難死沸湯沃口入腹良久乃剝爾黿肉亦補食之如鼉法此等老者多能變化為邪魅自非急勿食之今按陳藏器本草云主惡瘡腹內癥瘕甲更佳炙浸酒服之口內涎有毒也臣禹錫等謹按蜀本圖經云生湖畔土窟中形似守宮而大長丈餘背尾俱有鱗甲今江南諸州皆有之藥性論云鼉甲臣味甘平有小毒主百邪鬼魅治婦人帶下除腹內血積聚伏堅相引結痛孟詵云鼉療驚恐及小腹氣疼日華子云鼉治齒疳𧈟宣露甲用同功入藥炙又云黿甲臣平無毒主五臟邪氣殺百蟲毒消百藥毒續人筋骨又脂塗鐵燒之便明準南王方術內用之陳藏器云黿甲功用同鱉甲炙燒浸酒主瘰癧殺蟲風瘻瘡風頑疥瘙肉主濕氣邪氣諸蠱張鼎云膏摩風及惡瘡圖經文具鱉甲條下陳藏器按鮀魚合作鼉字本經作鼉魚之別名已出本經今以鼉為鮀非也宜改為鼉字肉至美食之主惡瘡腹內癥瘕甲炙浸酒服之口內涎有毒長一丈者能吐氣成霧致雨力至猛能攻陷江岸性嗜睡恆目閉形如龍大長者自齧其尾極難死聲甚可畏人於穴中掘之百人掘亦須百人牽一人掘亦須一人牽不然終不可出梁周興嗣常食其肉後為鼉所噴便為惡瘡此物靈強不可食既是龍類宜去其魚肘後方治五尸鼉肝一具熟煮切食盡亦用蒜齏食之樗醜如切雞味苦平有小毒主心腹邪氣陰痿益精強志生子好色補中輕身又療腰痛下氣強陰多精不可近目生河內川穀樗樹上七月採曝乾陶隱居云形似寒螿而小今出梁州方用至稀唯合大麝香丸用之樗樹似漆而臭今以此樹上為好亦如芫菁亭長必以芫葛上為良矣唐本注云此物有二種以五色具者為雄良青黑質白斑者是雌不入藥用今出歧州河內無此物也圖經曰樗雞生河內川穀樗木上今近都皆有之形似寒螿而小七月採曝乾謹按爾雅云螒音翰天雞郭璞注云小蟲黑身赤頭一名莎雞又曰樗鳩李巡曰一名酸雞廣雅謂之樗雞蘇恭云五色具者為雄良青黑質白斑者是雌不入藥然今所謂莎雞者亦生樗木上六月後出飛而振羽索索作聲人或畜之樊中但頭方腹大翅羽外青內紅而身不黑頭不赤此殊不類蓋別一種而同名也今在樗木上者人呼為紅娘子頭翅皆赤乃如舊説然不名樗雞疑即是此蓋古今稱不同耳古今大麝香丸用之近人少用故亦鮮別衍義曰樗雞東西京界尤多形類蠶蛾但頭足微黑翅兩重外一重灰色下一重深紅五色皆具腹大此即樗雞也今人又用之行瘀血血閉蛞音闊蝓音俞味鹹寒無毒主賊風喎口乖切僻軼益音筋及脫肛驚癇攣縮一名陵蠡一名土蝸一名附蝸生太山池澤及陰地沙石垣下八月取陶隱居云蛞蝓無殼不應有蝸名其附蝸者復名蝸牛生池澤沙石則應是今山蝸或當言其頭形類猶似蝸牛蟲者俗名蝸牛者作瓜字則蝸字亦音瓜莊子所云戰於蝸角也蛞蝓入三十六禽限又是四種角蟲之類熒室星之精矣方家殆無復用乎唐本注云三十六禽亥上有三豕㺄豪豬亦名蒿豬毛如蝟簪搖而射人其肚合屎乾燒為灰主黃疸豬之類也陶謂為蝓誤極大矣又山海經云貐彘身人面音如嬰兒食人獸爾雅云猰烏八切貐類貙音樞迅走食人並非蛞蝓也蛞蝓乃無殼蝸蠡也臣禹錫等謹按蜀本注云此即蝸牛也而新附自有蝸牛一條雖數字不同而主療與此無別是後人誤剩出之亦如別録草部已有雞腸而新附又有繁蔞在菜部按爾雅云附螺螔蝓注云蝸牛也而玉篇蝓字下注亦云螔蝓蝸牛也此則一物明矣形似小螺白色生池澤草樹間頭有四角行則出驚之則縮首尾俱能藏入殼中而蘇注云無殼蝸牛非也今據本經一名陵蠡又有土蝸之名且蝸蠡者皆螺殼之屬也陶云若無殼則不合有蝸名是也又據今下濕處有一種蟲大於蝸牛無殼而有角云是蝸牛之老者圖經曰蛞音闊蝓音俞生泰山池澤及陰地沙石垣下蝸牛本經不載所出州土今並處處有之隱隱居注云蝸牛形如蛞蝓但背負殼耳則莊子所謂戰於蝸角是也又云俗名蝸牛者作瓜字形故蝸字亦音瓜本經蛞蝓一名附蝸蛞蝓無殼不應有蝸名或以其頭形類猶似蝸牛故以名之或云都是一物有二名如雞腸蘩蔞之比謹按郭璞注爾雅蚹螺螔蝓蝸牛也字書解蝓字亦云螔蝓蝸牛也如此是一物明矣然今下濕處有種大於蝸牛亦有角而無殼相傳云是蝸牛之老者若然本一物而久蛻殼者為異耳並八月採方書蝸牛涎主消渴崔元亮海上方著其法云取蝸牛十四枚以水三合浸之瓷甌中以器覆之一宿其蟲自沿器上取水飲不過三劑已凡用蝸牛以形圓而大者為勝久雨晴竹林池沼間多有出者其城牆陰處有一種扁而小者無力不堪用蝸牛入嬰糯藥為最勝其殼亦堪用韋丹主一切疳取舊死殼七枚皮薄色黃白者真淨洗不得小有塵滓漉干納酥於殼中以瓷盞盛之紙糊盞面置炊飯上蒸之下饙時即坐甑中裝飯又蒸飯熟即已取出細研如水澱漸漸與吃令一日盡為佳衍義曰蛞蝓蝸牛二物矣蛞蝓其身肉只一段蝸牛背上別有肉以負殼行顯然異矣若為一物經中焉得分為二條也其治療亦大同小異故知別類又謂蛞蝓是蝸牛之老者甚無謂蛞蝓有二角蠍牛四角兼背有附殼肉豈得為一物也蝸牛味鹹寒主賊風喎僻踠跌大腸下脫肛筋急及驚癇陶隱居云蝸牛字是力戈反而俗呼為瓜牛生山中及人家頭形如蛞蝓但背負殼爾前以注説之海邊又一種正相似火炙殼便走出食之益顏色名為寄居方家既不復用人無取者未詳何者的是也今注蝸牛條唐本編在田中螺之後今詳陶隱居云形似蛞蝓而背負殼唐本注云蛞蝓乃無殼蝸蠡即二種當近似一物主療頗同今移附蛞蝓之下臣禹錫等謹按藥性論云蝸牛亦可單用一名蠡牛有小毒能治大腸脫肛生研取服止消渴日華子云冷有毒治驚癇等入藥炒用此即負殼蜒蛐也圖經文具蛞蝓條下聖惠方治齒𧈟並有蟲用蝸牛殼二十枚燒灰細研每用揩齒良又方治蜈蚣咬方用蝸牛挎取汁滴入咬處又方治大腸久積虛冷每因大便脫肛收不得用蝸牛一兩燒灰豬脂和敷之立縮集驗方治發背以蝸牛一百個活者以一升淨瓶入蝸牛用新汲水一盞浸瓶中封系自晚至明取出蝸牛放之其水如涎將真蛤粉不以多少旋調敷以雞翎掃之瘡上日可十餘度其熱痛止瘡便愈小兒宮氣方治小兒一切疳疾取蝸牛殼七個淨洗不得有塵土令乾向酥蜜中瓷合盛卻用紙糊於飯甑內蒸之下饙即安之至飯熟取出細研漸漸吃一日食盡之衍義文具蛞蝓條下石龍子味鹹寒有小毒主五癃邪結氣破石淋下血利小便水道一名蜥音錫蜴音亦一名山龍子一名守宮一名石蜴生平陽川穀及荊山石間五月取著石上令乾惡硫黃斑蝥蕪荑陶隱居云其類有四種一大形純黃色為蛇醫母亦名蛇舅母不入藥次似蛇醫小形長尾見人不動名龍子次有小形而五色尾青碧可愛名蜥蜴並不螫人一種喜緣籬壁名蝘音偃蜓音電形小而黑乃言螫人必死而未常聞中人按東方朔雲是非守宮則蜥蜴如此蝘蜓名守宮矣以朱飼之滿三斤殺乾末以塗女子身有交接事便脫不爾如赤志故謂守宮今此一名守宮猶如野葛鬼臼之義也殊難分別唐本注云此言四種者蛇師生山谷頭大尾短小青黃或白斑者是蝘蜓似蛇師不生山谷在人家屋壁間荊楚及江淮人名蝘蜓河濟之間名守宮亦名榮螈音元又名蠍虎以其常在屋壁故名守宮亦名壁宮未必如術飼朱點婦人也此皆假釋爾其名龍子及五色者併名蜥蜴以五色者為雄而良色不備者為雌劣爾形皆細長尾與身相類似蛇著四足去足便直蛇形也蛇醫則不然按爾雅亦互言之並非真説又云朱飼滿三斤殊為謬矣臣禹錫等謹按蜀本圖經云長者一尺今出山南襄州安州申州以三月四月八月九月採去腹中物火干之圖經曰石龍子生平陽川穀及荊山山石間今處處有之一名蜥音錫蜴音亦謹按爾雅云蠑螈蜥蜴蜥蜴蜥蜓蝘蜓守宮也疏釋曰詩小雅正月云胡為虺蜴蜴為此也四者一物形狀相類而四名也字林云蠑螈蛇醫也説文云在草曰蜥蜴在壁曰蝘蜓方言云秦晉西夏謂之守宮或謂之蠦音盧𧔹音廛或謂之刺易南陽人呼蝘蜓其在澤中者謂之易蜥楚謂之蛇醫或謂之螈蠑又東方朔雲非守宮即蜥蜴按此諸文即是在草澤中者名蠑螈蜥蜴在壁者名蝘蜓守宮也然則入藥當用草澤者以五色具者為雄而良色不具者為雌乃劣耳五月取著石上令乾衍義曰石龍子蜥蜴也今人但呼為蜴蜥大者長七八寸身有金碧色仁廟朝有一蜥蠍在右掖門西浚溝廟中此真是蜥蜴也鄭狀元有詩有樵者於澗下行見一蜥蜴自石罅中出飲水訖而入良久凡百十次尚不已樵者疑不免翻石視之有冰雹一二升樵人訝而去行為三五里大雨至良久風雹暴作今之州縣依法用此祈雨經云治五癃破石淋利水道亦此義乎木虻音萌味苦平有毒主目赤痛眥傷淚出瘀血血閉寒熱酸𢠹音西無子一名魂常生漢中川澤五月取陶隱居云此虻不啖血狀似虻而小近道草中不見有市人亦少有賣者方家所用惟是蜚虻也唐本注云虻有數種並能啖血商淅音昔以南江嶺間大有木虻長大緑色殆如次蟬咂牛馬或至頓僕蜚虻狀如蜜蜂黃黑色今俗用多以此也又一種小虻名鹿虻大如蠅齧牛馬亦猛市人採賣之三種體以療血為本余療雖小有異同用之不為嫌何有木虻而不啖血木虻倍大蜚虻陶云似虻而小者未識之矣臣禹錫等謹按陳藏器云木虻陶云此虻不啖血似虻而小蘇云江嶺以南有木虻長大緑一作靘色者何有虻而不啖血陶誤耳按木虻從木葉中出卷葉如子形圓著葉上破中初出如白蛆漸大羽化坼破便飛即能齧物塞北亦有嶺南極多如古度花成蟻耳本經既出木虻又出蜚虻明知木虻是葉內之虻飛虻是已飛之蟲飛是羽化亦猶在蛹如蠶之與蛾爾既是一物不合二出應功用不同後人異注爾圖經曰木虻生漢中川澤蜚虻生江夏川穀今並處處有之而襄漢近地尤多虻有數種皆能啖牛馬血木虻最大而緑色幾若蜩蟬蜚虻狀如蜜蜂黃色醫方所用虻蟲即此也又有一種小虻名鹿虻大如蠅咂牛馬亦猛三種大抵同體俱能治血而方家相承只用蜚虻它不復用並五月採腹有血者良人伺其啖齧牛馬時腹紅者掩取干之用入藥須去翅足也淮南子曰虻散積血斫木愈齲丘主切此以類推之者也然今本草不著斫木之治病亦漏脫耳肘後方葛氏云蛇螫人九竅皆血出方取虻蟲初食牛馬血腹滿者三七枚燒服之楊氏産乳療母困篤恐不濟去胎方虻蟲十枚上搗為末酒服之即下衍義曰木虻大小有三種蜚虻今人多用之大如蜜蜂腹凹褊微黃緑色雄霸州順安軍沿塘濼界河甚多以其唯食牛馬等血故治瘀血血閉蜚虻味鹹微寒有毒主逐瘀血破下血積堅痞癥瘕寒熱通利血脈及九竅女子月水不通積聚除賊血在胸腹五臟者及喉痹結塞生江夏川穀五月取腹有血者良陶隱居云此即今啖牛馬血者伺其腹滿掩取干之方家皆呼為虻蟲矣唐本注云三虻俱食牛馬非獨此也但得即堪用何假血充然始掩取如以義求應如養鷹飢則為用若伺其飽何能除疾爾臣禹錫等謹按藥性論云虻蟲使一名蜚虻惡麻黃日華子云破癥結消積膿墜胎入丸散除去翅足炒用圖經文具木虻條下衍義文具木虻條下蜚蠊音廉味鹹寒有毒主血瘀症堅寒熱破積聚喉咽閉內塞無子通利血脈生晉陽川澤及人家屋間立秋採陶隱居云形亦似蟅蟲而輕小能飛本在草中八月九月知寒多入人家屋裡逃爾有兩三種以作廉薑氣者為真南人亦啖之唐本注云此蟲味辛辣而臭漢中人食之言下氣名曰石薑一名盧蜰音肥一名負盤別録云形似蠶蛾腹下赤二月八月採此即南人謂之滑蟲者也臣禹錫等謹按蜀本圖經云金州房州等山人啖之謂之石薑多在林樹間百十為聚爾雅云蜚蠦蜰注云蜰即負盤臭蟲圖經文具木虻條下蟅音拓蟲味鹹寒有毒主心腹寒熱洗洗血積癥瘕破堅下血閉生子大良一名地鱉一名土鱉生河東川澤及沙中人家牆壁下土中濕處十月曝乾畏皂莢菖蒲陶隱居云形扁扁如鱉故名土鱉而有甲不能飛小有臭氣今人家亦有之唐本注云此物好生鼠壤土中及屋壁下狀似鼠婦而大者寸余形小似鱉無甲但有鱗也臣禹錫等謹按藥性論云蟅蟲使畏屋遊味苦咸治月水不通破留血積聚圖經曰蟅蟲生河東川澤及沙中人家牆壁下土中濕處狀似鼠婦而大者寸余形扁如鱉但有鱗而無甲故一名土鱉今小兒多捕以負物為戲十月取曝乾張仲景治雜病方主久瘕積結有大黃蟅蟲丸又大鱉甲丸中並治婦人藥並用蟅蟲以其有破堅積下血之功也衍義曰蟅蟲今人謂之簸箕蟲為其像形也乳脈不行研一枚水半合濾清服勿使服藥人知鮫魚皮主蠱氣蠱疰方用之即裝刀靶音霸䱜音鵲魚皮也唐本注云出南海形似鱉無腳而有尾今按陳藏器本草云一名沙魚一名鰒魚皮主食魚中毒燒末服之唐本先附臣禹錫等謹按蜀本圖經云圓廣尺余尾長尺許惟無足背皮粗錯日華子云鮫魚平微毒圖經曰鮫魚皮舊不著所出州土蘇恭云出南海形似鱉無腳而有尾山海經云鮫沙魚其皮可以飾劍是也今南人但謂之沙魚然有二種其最大而長喙如鋸者謂之胡沙性善而肉美小而皮粗者曰白沙肉強而有小毒二種彼人皆鹽為修脯其皮刮治去沙翦為膾皆食品之美者食之益人然皆不類鱉蓋其種類之別耳胡洽治五尸鬼疰百毒惡氣等鮫魚皮散主之鮫魚皮炙硃砂雄黃金牙椒天雄細辛鬼臼麝香乾薑雞舌香桂心莽草各一兩貝母半兩蜈蚣炙蜴蜥炙各二枚凡十六物治下篩溫清酒服半錢匕日三漸增至五分匕亦可帶之中用蜈蚣蜴蜥皆此品類中故並載方陳藏器云皮主食魚中毒燒末服之鰒魚皮是裝刀靶者正是沙魚也石決明又名鰒魚甲一邊著石光明可愛此蟲族非魚類乃是同名耳沙魚一名鮫魚子隨母行驚即從口入母腹也其魚狀貌非一皮上有沙堪揩木如木賊也食療云平補五臟作膾食之亞於鯽魚作鮓鱐食之並同又如有大患喉閉取膽汁和白礬灰丸之如豆顆綿裹納喉中良久吐惡涎沫即喉嚨開臘月取之海藥謹按名醫別録云生南海味甘咸無毒主心氣鬼疰蠱毒吐血皮上有珍珠斑衍義曰鮫魚沙魚皮一等形稍異今人取皮飾鞍劍余如經白魚味甘平無毒主胃氣開胃下食去水氣令人肥健大者六七尺色白頭昂生江湖中今附臣禹錫等謹按孟詵云白魚主肝家不足氣不堪多食泥人心雖不發病終養𧈟所食新者好久食令人心腹諸病可煮炙於蔥醋中一兩沸食猶少調五臟氣理經脈日華子云助血脈補肝明目患瘡癤人不可食甚發膿炙瘡不發作膾食之良食療云和豉作羹一兩頓而已新鮮者好食若經宿者不堪食令人腹冷生諸疾或淹或糟藏猶可食又可炙了於蔥醋中重煮食之調五臟助脾氣能消食理十二經絡舒展不相及氣時人好作餅炙食之猶少動氣久亦不損人也鱖居衛切魚味甘平無毒主腹內惡血益氣力令人肥健去腹內小蟲背有黑點味尤重昔仙人劉憑常食石桂魚今此魚猶有桂名恐是此也生江溪間今附臣禹錫等謹按日華子云微毒益氣治腸風瀉血又名鱖豚水豚食療云平補勞益脾胃稍有毒勝金方治小兒大人一切骨鯁或竹木簽刺喉中不下方於臘月中取鱖魚膽懸北簷下令乾每有魚鯁即取一皂子許以酒煎化溫溫呷若得逆便吐骨即隨頑涎出若未吐更吃溫酒但以吐為妙酒即隨性量力也若更未出煎一塊子無不出者此藥應是鯁在臟腑中日久痛黃瘦甚者服之皆出若卒求鱖魚不得蠡魚鯇魚鯽魚俱可臘月收之甚佳青魚味甘平無毒肉主腳氣濕痹作鮓與服石人相反眼睛主能夜視頭中枕蒸取干代琥珀用之摩服主心腹痛膽主目暗滴汁目中並塗惡瘡生於江湖之間今附臣禹錫等謹按蕭炳云療卒氣研服止腹痛可白煮吃治腳氣腳弱日華子云作鯖字平微毒治腳軟煩悶益氣力枕用醋摩治水氣血氣心痛不可同葵蒜食之服術人亦勿啖也圖經曰青魚生江湖間今亦出南方北地或時之似鯉鯇而背正青色南人多以作鮓古作鯖字所謂五候鯖鮓是也頭中枕蒸令氣通曝乾狀如琥珀云可以代琥珀非也荊楚間取此魚枕煮拍作器皿甚佳膽與目睛併入藥用取無時古今方書多用其膽滴汁目中主目昏暗又可塗惡瘡余亦稀用食療云主腳氣煩悶又和韭白煮食之治腳氣腳弱煩悶益心力也又頭中有枕取之蒸令氣通曝乾狀如琥珀此物療卒心痛平水氣以水研服之良又膽眼睛益人眼取汁注目中主目暗亦塗熱瘡良海藥云青魚南方人以為酒器梳篦也孫真人云治喉閉及骨鯁方以臘月取青魚膽陰乾如患此及著骨鯁即以膽少許口中含咽津即便愈河豚音屯味甘溫無毒主補虛去濕氣理腰腳去痔疾殺蟲江河淮皆有今附臣禹錫等謹按日華子云河豚有毒又云胡夷魚涼有毒煮和禿菜食良毒以蘆根及橄欖等解之肝有大毒又名䲅魚規魚吹肚魚也陳藏器云如鮎魚口尖一名鮠魚也衍義曰河豚經言無毒此魚實有大毒味雖珍然修治不如法食之殺人不可不慎也厚生者不食亦好蘇子美云河豚於此時貴不數魚蝦此即詩家鄙諷之言未足全信也然此物多怒觸之則怒氣滿腹翻浮水上漁人就以物撩之遂為人獲橄欖並蘆根汁解其毒石首魚味甘無毒頭中有石如棋子主下石淋磨石服之亦燒為灰末服和蓴菜作羹開胃益氣候乾食之名為鯗音想炙食之主消瓜成水亦主卒腹脹食不消暴下痢初出水能鳴夜視有光又野鴨頭中有石云是此魚所化生東海今附臣禹錫等謹按陳士良云石首魚平日華子云取腦中枕燒為末飲下治淋也食療作干鯗消宿食主中惡不堪鮮食嘉魚味甘溫無毒食之令人肥健悅澤此乳穴中小魚常食乳水所以益人能久食之力強於乳有似英雞功用同乳今附陳藏器吳都賦云嘉魚出於丙穴李善注云丙日出穴今則不然丙者向陽穴也陽穴多生此魚魚復何能擇丙日耶此注誤矣新注云治腎虛消渴及勞損羸瘦皆煮食之又抱朴子云鸖知夜半燕知戊巳豈魚不知丙日也食療云微溫常於崖石下孔中吃乳石沫甚補益微有毒其味甚珍美也鯔魚味甘平無毒主開胃通利五臟久食令人肥健此魚食泥與百藥無忌似鯉身圓頭扁骨軟生江海淺水中今附紫貝明目去熱毒唐本注云形似貝圓大二三寸出東海及南海上紫斑而骨白唐本先附臣禹錫等謹按陳士良云紫貝平無毒圖經曰紫貝本經不載所出州土蘇恭注云出東海及南海上今南海多有之即砑螺也形似貝而圓大二三寸儋振夷黎採以為貨幣北人唯畫家用砑物謹按郭璞注爾雅云餘貾直其切黃白紋謂以黃為質白為紋點余泉白黃文謂以白為質黃為紋點今紫貝則以紫為質黑為紋點也貝之類極多古人以為寶貨而此紫貝尤為世所貴重漢文帝時南越王獻紫貝五百是也後世以多見賤而藥中亦稀使之又車螯之紫者海人亦謂之紫貝車螯近世治癰疽方中多用其殼燒煅為灰敷瘡南海北海皆有之採無時人亦食其肉云味鹹平無毒似蛤蜊而肉堅硬不及亦可解酒毒北中者殼粗不堪用也衍義曰紫貝大二三寸背上深紫有點但黑本經以此燒存性入點眼藥鱸魚平補五臟益筋骨和腸胃治水氣多食宜人作膾猶良又曝乾甚香美雖有小毒不至發病一云多食發痃癖及瘡腫不可與乳酪同食食療云平主安胎補中作膾尤佳衍義曰鱸魚益肝腎補五臟和腸胃食之宜人不甚發病宜然張干思之也鱟平微毒治痔殺蟲多食發嗽並瘡癬殼入香發衆香氣尾燒焦治腸風瀉血並崩中帶下及産後痢脂燒集鼠以上二種新補見孟詵日華子陳藏器味辛無毒主五野雞病殺蟲發嗽殼發衆香尾灰斷産後痢膏燒集鼠矣生南海大小皆牝牡相隨牝無目得牡始行牡去牝死以骨及尾尾長二尺燒為黑灰米飲下大主産後痢先服生地黃蜜等煎訖然後服尾無不斷也二種海藥余郎君子謹按異志云生南海有雄雌青碧色狀似杏仁欲驗真假先於口內含令熱然後放醋中雄雌相趁逡巡便合即下其卵如粟粒狀真也主婦人難産手把便生極有驗也乃是人是難得之物海蠶沙謹按南州記云生南海山石間其蠶形大如拇指沙甚白如玉粉狀每有節味鹹大溫無毒主虛勞冷氣諸風不遂久服令人光澤補虛羸輕身延年不老難得真者多隻被人以水搜葛粉石灰以梳齒隱成此即非也縱服無益反損人慎服之二十一種陳藏器余黿鱔魚注陶云黿肉補此老者能變化為魅按黿甲功用同鱉甲炙浸酒主瘰癧殺蟲逐風惡瘡瘻風頑疥瘙肉主濕氣諸邪氣蠱消百藥毒張鼎云膏塗鐵摩之便明膏摩風及惡瘡子如雞卵正圓煮之白不凝今時人謂藏卵為黿子似此非為木石機也至難死剔其肉盡頭猶咬物可以張鳶鳥食療云微溫主五臟邪氣殺百蟲蠱毒消百藥毒續人筋又膏塗鐵摩之便明淮南術方中有用處海馬謹按異志云生西海大小如守宮蟲形若馬形其色黃褐性溫平無毒主婦人難産帶之於身神驗圖經云生南海頭如馬形蝦類也婦人將産帶之或燒末飲服亦可手持之異魚圖云收之曝乾以雌雄為對主難産及血氣齊蛤遠志注陶云遠志畏齊蛤蘇云藥録下卷有蛤而不言功狀注又云蠟畏齊蛤按齊蛤如蛤兩頭尖小生海水中無別功用海人食之柘蟲屎詹糖注陶云詹糖偽者以柘蟲屎為之按即今之柘木蟲在木間食木注為屎其屎破血不香詹糖燒之香也既不相似不堪為類蚱蜢石蟹注陶云石蟹如蚱蜢形長小兩股如石蟹在草頭能飛蛗螽之類無別功與蚯蚓交在土中得之堪為媚藥入拾遺記寄居蟲蝸牛注陶云海邊大有似蝸牛火炙殼便走出食之益顏色按寄居在殼間而非螺也候螺蛤開當自出食螺蛤欲合已還殼中亦名寄生無別功用海族多被其寄又南海一種似蜘蛛入螺殼中負殼而走一名闢亦呼寄居無別功用也䖦音拙蟱蜘蛛注陶云懸網狀如魚者亦名䖦蟱按䖦蟱在孔穴中及草木稠密處作網如蠶絲為幕絡者就中開一門出入形段小似蜘蛛而斑小主疔腫出根作膏塗之陶云罾網此正蜘蛛也非為蜘蛛此物族類非一也負蠜葵注蘇云戎人重薰渠猶巴人重負蠜按飛廉一名負盤蜀人食之辛辣也已出本經左傳云蜚不為災杜注云蜚負蠜也如蝗蟲又夜行一名負盤即屁盤蟲也名字及蟲相似終非一物也蠜音煩蛗螽也蠼螋雞腸注陶云雞腸草主蠼螋溺按蠼螋能溺人影令發瘡如熱沸而大繞腰匝不可療蟲如小蜈蚣色青黑長足山蠼螋溺毒更猛諸方中大有主法其蟲無能惟扁豆葉敷即瘥蠱蟲敗鼓皮注陶云服敗鼓皮即喚蠱主姓名按古人愚質造蠱圖富皆取百蟲甕中盛經年間開之必有一蟲盡食諸蟲即此名為蠱能隱形似鬼神與人作禍然終是蟲鬼咬人至死者或從人諸竅中出信候取之曝乾有患蠱人燒為黑灰服少許立愈亦是其類自相伏耳新注云凡蠱蟲療蠱是知蠱名即可治之如蛇蠱用蜈蚣蠱蟲蜈蚣蠱用蝦蟆蠱蟲蛤蟆蠱病復用蛇蠱蟲是互相能伏者可取治之土蟲蚰蜒並馬陸注陶云今有一細黃蟲狀如蜈蚣俗呼為土蟲按土蟲無足如一條衣帶長四五寸身扁似韭葉背上有黃黑襇頭如鏟子行處有白涎生濕地有毒雞吃即死陶云如蜈蚣者正是蚰蜒非土蟲也蘇云馬陸如蚰蜒按蚰蜒色正黃不斑大者如叉股其足無數正是陶呼為土蟲者此蟲好脂油香能入耳及諸竅中以驢乳灌之化為水蘇云似馬陸誤也鱅魚鮑魚注陶云魚是臭者按鱅魚嶺南人作鮑魚劉元紹云其臭如尸正與陶公相背海人食之所謂海上有逐臭之夫也其魚以格額目旁有骨名乙禮云魚去乙鄭云東海鱅魚也只食之別無功用也豫脂有毒主風腫癰毒癮疹赤瘙瘑疥痔瘻皮膚頑痹踠跌折傷肉損瘀血以脂塗上炙手及熱摩之即透生嶺南蛇頭鱉身廣州記云豫蛇頭鱉身亦水宿亦樹棲俗謂之豫膏主蛭刺以銅及瓦器盛之浸出唯雞卵盛之不漏摩理毒腫大驗其透物甚於醍醐也砂挪子有毒殺飛禽走獸合射罔用之人亦生取置枕令夫妻相好生砂石中作旋孔有蟲子如大豆背有刺能倒行一名倒行狗子性好睡亦呼為睡蟲是處有之蛔蟲汁大寒主目膚赤熱痛取大者淨洗斷之令汁滴目中三十年膚赤亦瘥蛗螽蚯蚓二物異類同穴為雄雌令人相愛五月五日收取夫妻帶之蛗螽如蝗蟲東人呼為舴艋有毒有黑斑者候交時取之灰藥令人喜好相愛出嶺南陶家如青灰彼人以竹筒盛之云是蟯蟯音蛔蟲也所作以灰拭物皆可喜損小兒雞犬等不置家中未知此事虛實吉丁蟲功用同前人取帶之甲蟲背正緑有翅在甲下出嶺南賓澄州也腆顆蟲一作顒功用同前人取帶之似屁盤褐色身扁出嶺南人重之也鼷鼠有毒食人及牛馬等皮膚成瘡至死不覺此蟲極細不可卒見爾雅云有蟲毒食人至盡不知左傳曰食郊牛角者也博物志云食人死膚令人患惡瘡多是此蟲食主之法當以貍膏摩之及食貍肉凡正月食鼠殘多為鼠瘻小孔下血者是此病也諸蟲有毒不可食者鱉目白殺人腹下有卜字及五字不可食頷下有骨如鱉不利人蝦煮白食之腹中生蟲蟹腹下有毛兩目相向腹中有骨不利人鱉肉共雞肉食成瘕疾也
