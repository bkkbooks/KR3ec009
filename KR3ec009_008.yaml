body:
  text: 卷第八己酉新增衍義乾薑味辛溫大熱無毒主胸滿咳逆上氣溫中止血出汗逐風濕痹腸澼下痢寒冷腹痛中惡霍亂脹滿風邪諸毒皮膚間結氣止唾血生者尤良臣禹錫等謹按唐本又云治風下氣止血宣諸絡脈微汗久服令眼暗圖經文具生薑條下外臺秘要治瘧不痊乾薑高良薑等分為末每服一錢水一中盞煎至七分服又方治卒心痛乾薑為末米飲調下一錢千金方治鼻以乾薑末蜜和塞鼻中肘後方治身體重小腹急熱必沖胸膈頭重不能舉眼中生翳膝脛拘急乾薑四兩末湯和溫服覆取汗得解又方治寒痢切乾薑如大豆米飲服六七十枚日三夜一服痢青色者為寒痢累服得效又方治虎犬咬人乾薑末以納瘡中立瘥又方治蠍螫人嚼乾薑塗之王氏博濟方治瘧乾薑炒令黑色搗為末臨發時以溫酒調三錢服已發再服廣利方治諸蛇毒螫人慾死兼闢蛇乾薑雄黃等分同研用小絹袋盛係臂上男左女右蛇聞藥氣逆避人螫毒敷之又方治鼻衄出血乾薑削令頭尖微煨塞鼻中孫真人治水瀉無度乾薑末粥飲調一錢服立效集驗方治血痢神妙乾薑急於火內燒黑不令成灰瓷碗合放冷為末每服一錢米飲調下又方治咳嗽冷氣結脹乾薑為末熱酒調半錢服兼治頭旋眼眩立效傷寒類要治傷寒婦人得病雖瘥未滿百日不可與男交合為陰陽之病必拘急手足拳欲死丈夫病名為陰易婦人名為陽易速當汗之可愈滿四日不可療宜令服此藥乾薑四兩為末湯調頓服覆衣被出汗得解手足伸遂愈生薑味辛微溫主傷寒頭痛鼻塞咳逆上氣止嘔吐久服去臭氣通神明生犍為川穀及荊州揚州九月採秦椒為之使殺半夏茛菪毒惡黃芩黃連天鼠糞陶隱居云乾薑今唯出臨海章安兩三村解作之蜀漢姜舊美荊州有好姜而並不能作乾者凡作乾薑法水淹三日畢去皮置流水中六日更去皮然後曬乾置甕缸中謂之釀也又云生薑歸五臟去痰下氣止嘔吐除風邪寒熱以服少志少智傷心氣如此則不可多食長御有病者是所宜爾今人啖諸辛辣物唯此最常故論語云不徹姜食言可常啖但勿過多爾唐本注云姜久服通神明主風邪主痰氣生者尤良經云久服通神明即可常啖也今云少智少志傷心氣不可多食者謬為此說檢無所據今注陶注生薑別出菜部韭條下今並唐本注移在本條臣禹錫等謹按藥性論云乾薑臣味苦辛治腰腎中疼冷冷氣破血去風通四肢關節開五臟六腑去風毒冷痹夜多小便乾者治嗽主溫中用秦艽為使主霍亂不止腹痛消脹滿冷痢治血閉病人虛而冷宜加用之又云生薑使主痰水氣滿下氣生與干並治嗽療時疾止嘔逆不下食生和半夏主心下急痛若中熱不能食搗汁和蜜服之又汁和杏仁作煎下一切結氣實心胸擁隔冷熱氣神效蕭炳云生薑一名母姜孟詵云生薑溫去痰下氣多食少心智八九月食傷神又冷痢取椒烙之為末共乾薑末等分以醋和麵作小餛飩子服二七枚先以水煮更稀飲中重煮出停冷吞之以粥飲下空腹日一度作之良謹按止逆散煩悶開胃氣又姜屑末和酒服之除偏風汁作煎下一切結實沖胸膈惡氣神驗陳藏器云生薑本功外汁解毒藥自余破血調中去冷除痰開胃須熱即去皮要冷即留皮日華子云乾薑消痰下氣治轉筋吐瀉腹臟冷反胃乾嘔瘀血撲損止鼻洪解冷熱毒開胃消宿食圖經曰生薑生犍為山谷及荊州揚州今處處有之以漢溫池州者為良苗高二三尺葉似箭竹葉而長兩兩相對苗青根黃無花實秋採根於長流水洗過日曬為乾薑漢州乾薑法以水淹姜三日去皮又置流水中六日更刮去皮然後曝之令乾釀於甕中三日乃成也近世方有主脾胃虛冷不下食積久羸弱成瘵者以溫州白乾薑一物漿水煮令透心潤濕取出焙乾搗篩陳廩米煮粥飲丸如梧子一服三五十枚湯使任用其效如神又千金方主痰澼以姜附湯治之取生薑八兩附子生用四兩四破之二物以水五升煮取二升分再服亦主卒風禁豬肉冷水崔元亮集驗方載敕賜薑茶治痢方以生薑切如麻粒大和好茶一兩碗呷任意便瘥若是熱痢即留姜皮冷即去皮大妙劉禹錫傳信方李亞治一切嗽及上氣者用乾薑須是合州至好者皂莢炮去皮子取肥大無孔者桂心紫色辛辣者削去皮三物並別搗下篩了各秤等分多少任意和合後更搗篩一遍煉白蜜和搜又搗一二千杵每飲服三丸丸稍加大如梧子不限食之先後嗽發即服日三五服禁食蔥油咸腥熱面其效如神劉在淮南與李同幕府李每與人藥而不出方或譏其吝李乃情話曰凡人患嗽多進冷藥若見此方用藥熱燥即不肯服故但出藥多效試之信然李卿換白髮方云刮老生薑皮一大升於鐺中以文武火煎之不得令過沸其鐺唯得多油膩者尤佳更不須洗刷便以姜皮置鐺中密固濟勿令通氣令一精細人守之地色未分便須煎之緩緩不得令火急如其人稍疲即換人看火一復時即成置於瓷缽中極研之李云雖曰一復時若火候勻即至日西藥成矣使時先以小物點取如麻子大先於白鬚下點藥訖然後拔之再拔以手指熟拈之令入肉第四日當有黑者生神效食療生薑溫去痰下氣除壯熱治轉筋心滿去胸中臭氣通神明又胃氣虛風熱不能食薑汁半雞子殼生地黃汁少許蜜一匙頭和水三合頓服立瘥又皮寒性溫作屑末和酒服治偏風又薑汁和杏仁汁煎成膏酒調服或水調下善下一切結實沖胸膈外臺秘要治霍亂注痢不止轉筋入腹欲死生薑三兩搗破以酒一升煮三四沸頓服又方久患咳噫連咳四五十聲者取生薑汁半合蜜一匙頭煎令熟溫服如此三服立效又方治咳噫生薑四兩爛搗入蘭香葉二兩椒末一錢匕鹽和麵四兩裹作燒餅熟煨空心吃不過兩三度又方去燥糞生薑削如小指長二寸鹽塗之納下部中立通千金方治乾噦若手足厥冷宜食生薑此是嘔家聖藥又治心下痞堅不能食胸中嘔噦生薑八兩細切以水三升煮取一升半夏五合洗去滑以水五升煮取一升二味合煮取一升半稍稍服之又方治喉閉並毒氣生薑二斤搗汁好蜜五合慢火煎令相得每服一合日五服又方治產後穢汙下不盡腹滿生薑二斤以水煮取汁服即出肘後方治霍亂心腹脹痛煩滿短氣未得吐下生薑一斤切以水七升煮取二升分作三服經驗方善治狐臭用生薑汁塗腋下絕根本梅師方治霍亂吐下不止欲死生薑五兩牛兒屎一升切姜以水四升煎取二升分溫服又方治腹滿不能服藥煨生薑綿裹納下部中冷即易之孫真人治小兒咳嗽用生薑四兩煎湯沐浴孫真人食忌正月之節食五辛以闢癘氣一日姜又方八月九月食姜至春多眼患損壽減筋力食醫心鏡治嘔吐百藥不瘥生薑一兩切如綠豆大以醋漿七合於銀器中煎取四合空腹和滓旋呷之又生薑歸五臟理傷寒頭痛去痰下氣通汗除鼻塞咳逆上氣止嘔吐去骨熟胸膈中臭氣除風邪傷寒調和飲食湯壺居士云姜殺腹內長蟲久食令人少智惠傷心性兵部手集治反胃羸弱不欲動母姜二斤爛搗絞取汁作撥粥服作時如葛粉粥法楊氏產乳胎後血上衝心生薑五兩切以水八升煮三升分三服唐崔魏公鉉夜暴亡有梁新聞之乃診之曰食毒僕曰常好食竹雞多食半夏苗必是半夏毒命生薑捩汁折齒而灌之活衍義曰生薑治暴逆氣爵三兩皂子大下咽定屢服屢定初得寒熱痰嗽燒一塊齧之終日間嗽自愈暴赤眼無瘡者以古銅錢刮淨姜上取汁於錢唇點目熱淚出今日點來日愈但小兒甚懼不須疑已試良驗葈私以切耳實味苦甘溫葉味苦辛微寒有小毒主風頭寒痛風濕周痹四肢拘攣痛惡肉死肌膝痛溪毒久服益氣耳目聰明強志輕身一名胡葈一名地葵一名葹音施一名常思生安陸川穀及六安田野實熟時採陶隱居云此是常思菜傖士行切人皆食之以葉覆麥作黃衣者一名羊負來昔中國無此言從外國逐羊毛中來方用亦甚稀唐本注云蒼耳三月以後七月以前刈日乾為散夏水服冬酒服主大風癲癇頭風濕痹毒在骨髓日二服丸服二十三十丸散服一二匕服滿百日病當出如瘑疥或癢汁出或斑駁甲錯皮起後乃皮落肌如凝脂令人省睡除諸毒螫殺疳濕䘌久服益氣耳目聰明輕身強志主腰膝中風毒尤良忌食豬肉米泔亦主猘狗毒今按陳藏器本草云葈耳葉挪安舌下令涎出去目黃好睡子炒令香搗去刺使腹破浸酒去風補益又燒作灰和臘月豬脂封疔腫出根又氈中子七枚燒作灰投酒中飲之勿令知主嗜酒葉煮服之主狂狗咬臣禹錫等謹按爾雅云蒼耳苓耳注廣雅云葈耳也亦云胡葈江東為常葈或曰苓耳形似鼠耳叢生如盤釋曰詩周南云采采卷耳陸機疏云葉青白色似胡荽白華細莖蔓生可煮為茹滑而少味四月中生子如婦人耳璫幽州人謂之爵耳藥性論云葈耳亦可單用味甘無毒主肝家熱明目孟詵云蒼耳溫主中風傷寒頭痛又疔腫困重生搗蒼耳根葉和小兒尿絞取汁冷服一升日三度甚驗日華子云治一切風氣填髓暖腰腳治瘰癧疥癬及瘙癢入藥炒用圖經曰葈耳生安陸川穀及六安田野今處處有之謹按詩人謂之卷耳爾雅謂之苓耳廣雅謂之葈耳皆以實得名也陸機疏云葉青白似胡荽白華細莖蔓生可煮為茹滑而少味四月中生子正如婦人耳璫今或謂之耳璫草鄭康成謂是白鬍荽幽州人呼為爵耳郭璞云形似鼠耳叢生如盤今之所有皆類此但不作蔓生耳或曰此物本生蜀中其實多刺因羊過之毛中黏綴遂至中國故名羊負來俗呼為道人頭實熟時採之古今方書多單用治疔腫困甚者生搗根葉和小兒溺絞取汁令服一升日三又燒作灰和臘月豬脂封上須臾拔出根愈雷公云凡採得去心取黃精用竹刀細切拌之同蒸從已至亥去黃精取出陰乾用食療拔疔腫根腳又治一切風取嫩葉一石切搗和五升麥蘖團作塊於蒿艾中盛二十日狀成曲取米一斗炊作飯看冷暖入蒼耳麥蘖曲作三大升釀之封一十四日成熟取此酒空心暖服之神驗封此酒可兩重布不得全密密則溢出又不可和馬肉食聖惠方治婦人風瘙癮疹身癢不止用蒼耳花葉子等分搗羅為末豆淋酒調服二錢匕又方治產後諸痢神效蒼耳葉搗絞汁溫服半中盞日三四服外臺秘要療熱毒病攻手足腫疼痛欲脫方取蒼耳汁以漬之又方救急療齒風動痛蒼耳一握以漿水煮入鹽含千金方當以五月五日午時附地刈取葈耳葉洗曝燥搗下篩酒若漿水服方寸匕日三夜三散若吐逆可蜜和為丸准計一方寸匕數也風輕易治者日再服若身體有風處皆作粟肌出或如麻豆粒此為風毒出也可以針刺潰去之皆黃汁出乃止五月五日多取陰乾著大甕中稍取用之皆能辟惡若欲省病著疾者使服之令人無所畏若時氣不和舉家服之若病胃脹滿心悶發熱即服之並殺三蟲腸痔能進食一周年服之佳七月七九月九可採用千金翼治身體手足卒瘨腫搗蒼耳敷之立效春用心冬用子又方治牙痛以蒼耳子五升水一斗煮取五升熱含之疼即吐吐後復含不過三劑瘥莖葉亦得又方治一切疔腫取蒼耳根莖和葉燒作灰以醋泔澱和如泥塗上干即易不過十餘度即拔出其根又方治五痔方蒼耳莖葉以五月五日採干為末以水服方寸匕立效百一方治卒得惡瘡以蒼耳桃皮作屑納瘡中佳孫真人食忌蒼耳合豬肉食害人食醫心鏡除一切風濕痹四肢拘攣蒼耳子三兩搗末以水一升半煎取七合去滓呷斗門方治婦人血風攻腦頭旋悶絕忽死忽倒地不知人事者用喝起草取其嫩心不限多少陰乾為末以常酒服一大錢不拘時候其攻大效服之多連腦蓋善通頂門今蒼耳是也勝金方治毒蛇並射工沙蝨等傷眼黑口噤手腳強直毒攻腹內成塊逡巡不救宜用此方蒼耳嫩葉一握研取汁溫酒和灌之將滓厚罨所傷處楊氏產乳治誤吞錢葈耳頭一把以水一升浸水中十餘度飲水愈葛根味甘平無毒主消渴身大熱嘔吐諸痹起陰氣解諸毒療傷寒中風頭痛解肌發表出汗開腠理療金瘡止痛脅風痛生根汁大寒療消渴傷寒壯熱葛殼主下痢十歲以上葉主金瘡止血花主消酒一名雞齊根一名鹿藿一名黃斤生汶山川穀五月採根曝乾殺野葛巴豆百藥毒陶隱居云即今之葛根人皆蒸食之當取入土深大者破而日乾之生者搗取汁飲之解溫病發熱其花並小豆花乾末服方寸匕飲酒不知醉南康廬陵間最勝多肉而少筋甘美但為藥用之不及此間爾五月五日日中時取葛根為屑療金瘡斷血為要藥亦療瘧及瘡至良唐本注云葛殼即是實爾陶不言之葛雖除毒其根入土五六寸以上者名葛脰音豆脰頸也服之令人吐以有微毒也根末之主猘狗齧並飲其汁良蔓燒為灰水服方寸匕主喉痹今按陳藏器本草云葛根生者破血合瘡墮胎解酒毒身熱赤酒黃小便赤澀可斷谷不飢根堪作粉臣禹錫等謹按藥性論云乾葛臣能治天行上氣嘔逆開胃下食主解酒毒止煩渴熬屑治金瘡治時疾解熱日華子云葛冷治胸膈熱心煩悶熱狂止血痢通小腸排膿破血敷蛇蟲齧解罯毒箭乾者力同圖經曰葛根生汶山川穀今處處有之江浙尤多春生苗引藤蔓長一二丈紫色葉頗似楸葉而青七月著花似豌豆花不結實根形如手臂紫黑色五月五日午時採根曝乾以入土深者為佳今人多以作粉食之甚益人下品有葛粉條即謂此也古方多用根張仲景治傷寒有葛根及加半夏葛根黃芩黃連湯以其主大熱解肌開腠理故也葛洪治䐴古對切腰痛取生根嚼之咽其汁多益佳葉主金刃瘡山行傷刺血出卒不可得藥但挪葉敷之甚效正元廣利方金創中風痙欲死者取生根四大兩切以水三升煮取一升去滓分溫四服口噤者灌下即瘥食療葛根蒸食之消酒毒其粉亦甚妙聖惠方治時氣頭痛壯熱用生葛根淨洗搗取汁一大盞豉一合煎至六分去豉不計時候分作二服汗出即瘥未汗再服若心熱加梔子仁十枚同煎去滓服又方治小兒熱渴久不止用葛根半兩細銼水一中盞煎取六分去滓頻溫服外臺秘要治傷筋絕搗葛根汁飲之葛白屑熬令黃敷瘡止血千金方酒醉不醒搗葛根汁飲一二升便醒肘後方治卒乾嘔不息搗葛根絞取汁服一升瘥又方治金瘡中風痙欲死搗生葛根一斤㕮咀以水一斗煮取五升去滓取一升服若干者搗末溫酒調三指撮若口啉不開但多服竹瀝又方服生葛根自愈食亦妙又方服藥失度心中苦煩飲生葛根汁大良無生者搗乾葛末水服五合亦可煮服之又方食諸菜中毒發狂煩悶吐下欲死煮葛根汁飲之梅師方治金中經脈傷及諸大脈皆血出多不可止血冷則殺人用生葛根一斤銼以水九升煎取三升分作三服又方治虎傷人瘡取生葛根煮濃汁洗瘡兼搗葛末水服方寸匕日夜五六服又方治傷寒初患二三日頭痛壯熱葛根五兩香豉一升細銼以童子小便六升煎取二升分作三服取汗觸風食蔥豉粥又方治熱毒下血或因吃熱物發動用生葛根二斤搗取汁一升並藕汁一升相和服廣利方治心熱吐血不止生葛根汁半大升頓服立瘥傷寒類要治傷寒有數種庸人不能分別今取一藥兼治天行病若初覺頭痛內熱脈洪起至二日取葛根四兩水三升肉納一升煮取半升服搗生根汁尤佳又方治妊娠熱病心悶取葛根汁二升分作三服衍義曰葛根澧鼎之間冬月取生葛以水中揉出粉澄成垛先煎湯使沸後擘成塊下湯中良久色如膠其體甚韌以蜜湯中拌食之擦少生薑尤佳大治中熱酒渴疾多食行小便亦能使人利病酒及渴者得之甚良彼之人又切入煮茶中以待賓但甘而無益又將生葛根煮熟者作果賣虔吉州南安軍亦如此賣葛粉味甘大寒無毒主壓丹石去煩熱利大小便止渴小兒熱痞以葛根浸搗汁飲之良今附臣禹錫等謹按中品上卷葛根條功用與此相通圖經文具葛根條下陳藏器拾遺云用裛小兒熱瘡妙聖惠方治中鴆毒氣欲絕者用葛粉三合水三中盞調飲之如口噤者以物揭開灌之又方治胸中煩熱或渴心躁葛粉四兩先以水浸粟米半升經宿漉出與葛粉相拌令勻煮熟食之食醫心鏡治小兒壯熱嘔吐不住食驚癇方葛粉二大錢以水二合調令勻瀉向鏭鑼中傾側令遍重湯中煮令熟以糜飲相和食之栝蔞根味苦寒無毒主消渴身熱煩滿大熱補虛安中續絕傷除腸胃中痼熱八疸身面黃唇乾口燥短氣通月水止小便利一名地樓一名果裸一名天瓜一名澤姑實名黃瓜主胸痹悅澤人面莖葉療中熱傷暑生洪農川穀及山陰地入土深者良生鹵地者有毒二月八月採根曝乾三十日成枸杞為之使惡乾薑畏牛膝乾漆反烏頭陶隱居云出近道藤生狀如土瓜而葉有叉毛詩云果裸之實亦施於宇其實今以雜作手膏用根入土六七尺大二三圍者服食亦用之唐本注云今用根作粉大宜服石虛熱人食之作粉如作葛粉法潔白美好今出陝州者白實最佳臣禹錫等謹按爾雅云果裸之實栝蔞釋曰果裸之草其實名栝蔞郭云今齊人謂之天瓜日華子云栝蔞子味苦冷無毒補虛勞口乾潤心肺療手面皺吐血腸風瀉血赤白痢並炒用又栝蔞根通小腸排膿消腫毒生肌長肉消撲損瘀血治熱狂時疾乳癰發背痔瘻瘡癤圖經曰栝蔞生洪農山谷及山陰地今所在有之實名黃瓜詩所謂果裸之實是也根亦名白藥皮黃肉白三四月內生苗引藤蔓葉如甜瓜葉作叉有細毛七月開花似葫蘆花淺黃色實在花下大如拳生青至九月熟赤黃色二月八月採根刮去皮曝乾三十日成其實有正圓者有銳而長者功用皆同其根唯歲久入土深者佳鹵地生者有毒謹按栝蔞主消渴古方亦單用之孫思邈作粉法深掘大根厚削皮至白處寸切之水浸一日一易水經五日取出爛搗研以絹袋盛之澄濾令極細如粉去水服方寸匕日三四服亦可作粉粥乳酪中食之並宜卒患胸痹痛取大實一枚切薤白半升以白酒七升煮取二升分再服一方加半夏四兩湯洗去滑同煮服更善又唐崔元亮療箭鏃不出搗根敷瘡日三易自出又療時疾發黃心狂煩熱悶不認人者取大實一枚黃者以新汲水九合浸淘取汁下蜜半大合朴硝八分合攪令消盡分再服便瘥雷公云栝蔞凡使皮子莖根效各別其栝並蔞樣全別若栝自圓黃皮厚蒂小若蔞唯形長赤皮蒂粗是陰人服若修事去上殼皮革膜並油了使根待構二三圍去皮細搗作煎攪取汁冷飲任用也食療子下乳汁又治癰腫栝蔞根苦酒中熬燥搗篩之苦酒和塗紙上攤貼服金石人宜用聖惠方治熱病頭疼發熱進退方用栝蔞一枚大者取其瓤細銼置瓷碗中用熱湯一盞沃之蓋卻良久去滓不計時候頓服又方治中風口眼喎斜用栝蔞絞取汁和大麥面搜作餅炙令熱熨正便止勿令太過外臺秘要治消渴利方生栝蔞三十斤以水一碩煮取一斗半去滓以牛脂五合煎取水盡以暖酒先食服如雞子大日三服即炒又方主傷寒渴飲栝蔞根三兩以水五升煮取一升分二服清淡竹瀝一升水二升煮好銀二兩半去銀先與病人飲之然後服栝蔞湯其銀汁須冷服肘後方治耳卒得風覺耳中㤨㤨栝蔞根削令可入耳以臘月豬脂煎三沸出塞耳每用三七日即愈又方消渴小便多栝蔞薄切炙取五兩水五升煮取四升隨意飲之良又方折傷取栝蔞根以塗之重布裹之熱除痛即止又方治二三年聾耳方栝蔞根三十斤細切之以水煮用釀酒如常法久久服之甚良又方若腸隨肛出轉久不可收入搗生栝蔞取汁溫之豬肉汁中洗手隨挪之令暖自得入梅師方治諸癰發背乳房初起微赤搗栝蔞作末以井華水調方寸匕勝金方治太陽傷寒栝蔞根二兩水五升煮取一升半分二服小便利即瘥廣利方治小兒忽發黃面目皮肉並黃生栝蔞根搗取汁二合蜜一大匙二味暖相和分再服集驗方下乳汁栝蔞子淘洗控干炒令香熟瓦上焙令白色為末酒調下一匕合面臥少時杜壬治胸膈痛徹背心腹痞滿氣不得通及治痰嗽大栝蔞去穰取子熟炒別研和子皮麵糊為丸如梧桐子大米飲下十五丸傷寒類要治脾癉溺赤出少惕惕若恐栝蔞主之子母秘錄治乳腫痛栝蔞黃色老大者一枚熟搗以白酒一斗煮取四升去滓溫一升日三服若無大者小者二枚黃熟為上楊氏產乳治熱遊丹赤腫栝蔞末二大兩釅醋調塗之又方治乳無汁栝蔞根燒灰米飲服方寸匕產寶治產後乳無汁栝蔞末井花水服方寸匕日二服夜流出楊文蔚治痰嗽利胸膈方栝蔞肥實大者割開子淨洗捶破括皮細切焙乾半夏四十九個湯洗十遍捶破焙乾搗羅為末用洗栝蔞熟水並瓤同熬成膏研細為丸如梧子大生薑湯下二十丸又方治癰未潰栝蔞根赤小豆等分為末醋調塗衍義曰栝蔞實九月十月間取穰以乾葛粉拌焙乾銀石器中慢火炒熟為末食後夜臥以沸湯點一二錢服治肺燥熱渴大腸秘其根與貝母知母秦艽黃芩之類皆治馬熱苦參味苦寒無毒主心腹結氣癥瘕積聚黃疸溺有餘瀝逐水除癰腫補中明目止淚養肝膽氣安五臟定志益精利九竅除伏熱腸澼止渴醒酒小便黃赤療惡瘡下部䘌平胃氣令人嗜食輕身一名水槐一名苦𧄹音識一名地槐一名菟槐一名驕槐一名白莖一名虎麻一名岑莖一名祿白一名陵郎生汝南山谷及田野三月八月十月採根曝乾玄參為之使惡貝母漏蘆菟絲反藜蘆陶隱居云今出近道處處有葉極似槐樹故有槐名花黃子作莢根味至苦惡病人酒漬飲之多瘥患疥者一兩服亦除蓋能殺蟲唐本注云以十月收其實餌如槐子法久服輕身不老明目有驗臣禹錫等謹按藥性論云苦參能治熱毒風皮肌煩燥生瘡赤癩眉脫主除大熱嗜睡治腹中冷痛中惡腹痛除體悶治心腹積聚不入湯用日華子云殺疳蟲炒帶煙出為末飯飲下治腸風瀉血並熱痢圖經曰苦參生汝南山谷及田野今近道處處皆有之其根黃色長五七寸許兩指粗細三五莖並生苗高三二尺以來葉碎青色極似槐葉故有水槐名春生冬凋其花黃白七月結實如小豆子河北生者無花子五月六月八月十月採根曝乾用古今方用治瘡疹最多亦可治癩疾其法用苦參五斤切以好酒三斗漬三十日每飲一合日三常服不絕若覺痹即瘥取根皮末服之亦良唐本云治脛酸療惡蟲雷公云凡使不計多少先須用糯米濃泔汁浸一宿上有腥穢氣並在水面上浮並須重重淘過即蒸從巳至申出曬乾細銼用之聖惠方治傷寒四日已嘔吐更宜吐以苦參末酒下二錢得吐瘥外臺秘要治天行病四五日結胸滿痛壯熱身體熱苦參一兩銼以醋二升煮取一升二合盡飲之當吐即愈天行毒病非苦參醋藥不解及溫覆取汗愈又方治小兒身熱苦參湯浴兒良千金方治狂邪發惡或披頭大叫欲殺人不避水火苦參以蜜丸如桐子大每服十丸薄荷湯下又方治飲食中毒以苦參三兩酒二升半煮取一升服取吐愈肘後方治谷疸食勞頭旋心怫鬱不安而發黃由失飢大食胃氣衝熏所致苦參三兩龍膽一合為末牛膽丸如梧子大生大麥汁服五丸日三服又方治時氣垂死者苦參一兩㕮咀以酒二升半煮取一升半去滓適寒溫盡服之當聞苦參吐毒如溶膠便愈又方治卒心痛苦參三兩苦酒一升半煮取八合分二服梅師方治飲食中毒魚肉菜等苦參三兩以苦酒一升煎三五沸去滓服吐出即愈或取煮犀角汁一升亦佳又方治傷寒四五日頭痛壯熱胸中煩痛苦參五兩烏梅二十枚細銼以水二升煎取一升分服孫真人食忌治中惡心痛苦參一兩酒一升半煮取八合乘熱頓服勝金方治時疾熱病狂言心躁苦參不限多少炒黃色為末每服二錢水一盞煎至八分溫服連煎三服有汗無汗皆瘥集驗方治毒熱足腫疼欲脫酒煮苦參以漬之傷寒類要治瘟氣病欲死苦參二兩以水二升煮取一升頓服之吐則愈或汗愈子母秘錄治小腹疼青黑或赤不能喘苦參一兩醋一升半煎八合分二服太倉公淳于意醫齊中大夫病齲齒灸左手陽明脈苦參湯日漱三升出入慎風五六日愈沈存中筆談常患腰疼時以病齒用苦參後有太常少卿舒昭亮用苦參揩齒歲久亦病腰自後不用苦參腰疾遂愈衍義曰苦參有朝士苦腰重久坐旅拒十餘步然後能行有一將佐謂朝士曰見公日逐以藥揩齒得無用苦參否曰始以病齒用苦參已數年此病由苦參入齒其氣味傷腎故使人腰重後有太常少卿舒昭亮用苦參揩齒歲久亦病腰自後悉不用腰疾皆愈此皆方書舊不載者有人病遍身風熱細疹癢痛不可任連胸頸臍腹及近隱處皆然涎痰亦多夜不得睡以苦參末一兩皂角二兩水一升揉濾取汁銀石器熬成膏和苦參末為丸如梧桐子大食後溫水服二十至三十丸次日便愈當歸味甘辛溫大溫無毒主咳逆上氣溫瘧寒熱洗洗音癬在皮膚中婦人漏下絕子諸惡瘡癢音羊金瘡煮飲之溫中止痛除客血內塞中風痓汗不出濕痹中惡客氣虛冷補五臟生肌肉一名干歸生隴西川穀二月八月採根陰乾惡䕡茹畏菖蒲海藻牡蒙陶隱居云今隴西叨陽黑水當歸多肉少枝氣香名馬尾當歸稍難得西川北部當歸多根枝而細歷陽所出色白而氣味薄不相似呼為草當歸缺少時乃用之方家有云真當歸正謂此有好惡故也俗用甚多道方時須爾唐本注云當歸苗有二種於內一種似大葉芎藭一種似細葉芎藭唯莖葉卑下於芎藭也今出當州宕州翼州松州宕州最勝細葉者名蠶頭當歸大葉者名馬尾當歸今用多是馬尾當歸蠶頭者不如此不復用陶稱歷陽者是蠶頭當歸也臣禹錫等謹按爾雅云薜山蘄注廣雅曰山蘄當歸也當歸今似蘄而粗大吳氏云當歸神農黃帝桐君扁鵲甘無毒歧伯雷公辛無毒季氏小溫或生羌胡地範子云當歸無枯者善藥性論云當歸臣惡熱面止嘔逆虛勞寒熱破宿血主女子崩中下腸胃冷補諸不足止痢腹痛單煮飲汁治溫瘧主女人瀝血腰痛療齒疼痛不可忍患人虛冷加而用之日華子云治一切風一切血補一切勞破惡血養新血及主症癖圖經曰當歸生隴西川穀今川蜀陝西諸郡及江寧府滁州皆有之以蜀中者為勝春生苗綠葉有三瓣七八月開花似時羅淺紫色根黑黃色二月八月採根陰乾然苗有二種都類芎藭而葉有大小為異莖梗比芎藭甚卑下根亦二種大葉名馬尾當歸細葉名蠶頭當歸大抵以肉厚而不枯者為勝謹按爾雅云薜布革切山蘄古芹字巨斤切郭璞注引廣雅云山蘄當歸也似蘄而粗大釋曰說文云蘄草也生山中者名薜一名山蘄然則當歸芹類也在平地者名芹生山中而粗大者名當歸也雷公云凡使先去塵並頭尖硬處一分以來酒浸一宿若要破血即使頭一節硬實處若要止痛止血即用尾若一時用不如不使服食無效單使妙也外臺秘要治頭疼欲裂當歸二兩酒一升煮取六合飲至再服又方治心痛當歸為末酒服方寸匕肘後方治小兒多患胎寒好啼晝夜不止因此成癇當歸末一小豆大以乳汁灌之日夜三四度服瘥葛氏方治小便出血當歸四兩細銼酒三升煮取一升頓服之梅師方治胎動下血心腹疼死生不知服此湯活即安死即下用當歸四兩芎藭九兩細銼以酒三升水四升煎取三升分服子母秘錄治倒產子死腹中搗當歸末酒服方寸匕又方治小兒臍風瘡久不瘥用當歸末敷之賈相公進過牛經牛有尿血病當歸紅花各半兩為末以酒半升煎候冷灌之瘥支太醫方治婦人百病諸虛不足當歸四兩地黃二兩為末蜜和丸如梧子大食前米飲下十五丸別說云謹按當歸自古醫家方論用治婦人產後惡血上衝倉卒取效無急於此世俗多以謂唯能治血又外臺秘要金匱千金等方皆為大補不足決取立效之藥氣血昏亂者服之即定此蓋服之能使氣血各有所歸則可以於產後備急於補虛速效恐聖人立當歸之名必因此出矣衍義曰當歸廣雅云山蘄古芹切當歸也似芹而粗大說廣云蘄草也生山中者名薜音百新書圖經以謂當歸芹類也在平地者名芹生山中粗大者名當歸若然則今川蜀皆以平地作畦種尤肥好多脂肉不以平地山中為等差但肥潤不枯燥者佳今醫家用此一種為勝市人又以薄酒灑使肥潤不可不察也藥性論云補女子諸不足此說盡當歸之用也麻黃味苦溫微溫無毒主中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破症堅積聚五臟邪氣緩急風脅痛字乳余疾止好唾通腠理疏傷寒頭疼解肌泄邪惡氣消赤黑斑毒不可多服令人虛一名卑相一名龍沙一名卑鹽生晉地及河東立秋採莖陰乾令青厚朴為之使惡辛夷石葦陶隱居云今出青州彭城滎陽中牟者為勝色青而多沫蜀中亦有不好用之折除節節止汗故也先煮一兩沸去上沫沫令人煩其根亦止汗夏月雜粉用之俗用療傷寒解肌第一唐本注云鄭州鹿臺及關中沙苑河旁沙洲上太多其青徐者今不復用同州沙苑最多也今注今用中牟者為勝開封府歲貢焉臣禹錫等謹按藥性論云麻黃君味甘平能治身上毒風𤸷痹皮肉不仁主壯熱解肌發汗溫瘧治溫疫根節能止汗方曰並故竹扇杵末撲之又牡蠣粉粟粉並根等分末生絹袋盛盜汗出即撲手摩之段成式酉陽雜俎云麻黃莖端開花花小而黃蔟生子如覆盆子可食日華子云通九竅調血脈開毛孔皮膚逐風破症癖積聚逐五臟邪氣退熱御山嵐瘴氣圖經曰麻黃生晉地及河東今近京多有之以滎陽中牟者為勝苗春生至夏五月則長及一尺以來梢上有黃花結實如百合瓣而小又似皂莢子味甜微有麻黃氣外紅皮里仁子黑根紫赤色俗說有雌雄二種雌者於三月四月內開花六月內結子雄者無花不結子至立秋後收採其莖陰乾令青張仲景治傷寒有麻黃湯及大小青龍湯皆用麻黃治肺痿上氣有射干麻黃湯厚朴麻黃湯皆大方也古方湯用麻黃皆先煮去沫然後納諸藥今用丸散者皆不然也必效方治天行一二日者麻黃一大兩去節以水四升煮去沫取二升去滓著米一匙及豉為稀粥取強一升先作熟湯浴淋頭百餘碗然後服粥厚覆取汗於夜最佳千金方療傷寒雪煎以麻黃十斤去節杏仁四升去兩仁尖皮熬大黃一斤十三兩金色者先以雪水五碩四斗漬麻黃於東向灶釜中三宿後納大黃攪令調以桑薪煮之得二碩汁去滓復納釜中又搗杏仁納汁中復煮之可餘六七斗絞去滓置銅器中更以雪水三斗合煎令得二斗四升藥成丸如彈子有病者以沸白湯五合研一丸入湯中適寒溫服之立汗出若不愈者復服一丸封藥勿令泄也雷公云凡使去節並沫若不盡服之令人悶用夾刀剪去節並頭槐砧上用銅刀細銼煎三四十沸竹片掠去上沫盡漉出曬乾用之傷寒類要張仲景傷寒論云黃疸病以麻黃醇酒湯主之麻黃一把去節綿裹以美酒五升煮取半升去滓頓服又治傷寒表熱發疸宜汗之則愈冬月用酒春宜用水煮之良子母秘錄治產後腹痛及血下不盡麻黃去節杵末酒服方寸匕一日二三服血下盡即止澤蘭湯服亦妙衍義曰麻黃出鄭州者佳剪去節半兩以蜜一匙匕同炒良久以水半升煎俟沸去上沫再煎去三分之一不用滓病瘡疱倒黶黑者乘熱盡服之避風伺其瘡復出一法用無灰酒煎但小兒不能飲酒者難服然其效更速以此知此藥入表也通草味辛甘平無毒主去惡蟲除脾胃寒熱通利九竅血脈關節令人不忘療脾疸常欲眠心煩噦出音聲療耳聾散癰腫諸結不消及金瘡惡瘡鼠瘻踒折齆音甕鼻息肉墮胎去三蟲一名附支一名丁翁生石城山谷及山陽正月採枝陰乾陶隱居云今出近道繞樹藤生汁白莖有細孔兩頭皆通含一頭吹之則氣出彼頭者良或云即葍音福藤莖唐本注云此物大者徑三寸每節有二三枝枝頭有五葉其子長三四寸核黑穰白食之甘美南人謂為燕𧄏芳服切或名烏𧄏今言葍藤葍𧄏聲相近爾臣禹錫等謹按藥性論云木通臣微寒一名王翁萬年主治五淋利小便開關格治人多睡主水腫浮大除煩熱用根治項下瘤癭孟詵云燕𧄏子平厚腸胃令人能食下三焦除惡氣和子食之更好江北人多不識江南人多食又續五臟斷絕氣使語聲足氣通十二經脈其莖名通草食之通利諸經脈擁不通之氣北人但識通草不委子之功其皮不堪食陳士良云燕𧄏子寒無毒主胃口熱閉反胃不下食除三焦客熱此是木通實名桴棪子莖名木通主理風熱淋疾小便數急疼小腹虛滿宜煎湯並蔥食之有效野生日華子云木通安心除煩止渴退熱治健忘明耳目治鼻寒通小腸下水破積聚血塊排膿治瘡癤止痛催生下胞女人血閉月候不勻天行時疾頭痛目眩贏劣乳結及下乳子名𧄏子七八月採陳藏器云通脫木無毒花上粉主諸蟲瘡野雞病取粉納瘡中生山側葉似蓖麻心中有瓤輕白可愛女工取以飾物爾雅云離南活脫也一本云藥草生江南主蟲病今俗亦名通草圖經曰通草生石城山谷及山陽今澤潞漢中江淮湖南州郡亦有之生作藤蔓大如指其莖稈大者徑三寸每節有二三枝枝頭出五葉頗類石葦又似芍藥三葉相對夏秋開紫花亦有白花者結實如小木瓜核黑瓤白食之甘美南人謂之燕𧄏亦云烏𧄏正月二月採枝陰乾用或以為葡萄苗非也今人謂之木通而俗間所謂通草乃通脫木也此木生山側葉如蓖麻心空中有瓤輕白可愛女工取以飾物爾雅云離南活莌音脫釋云離南草也一名活莌山海經又名寇脫生江南高丈許大葉似荷而肥莖中有瓤正白者是也又名倚商主蠱毒其花上粉主諸蟲瘻惡瘡痔疾取粉納瘡中正元廣利方療瘰癧及李絳兵部療胸伏氣攻胃咽不散方中並用之今京師園圃間亦有種蒔者又按張氏燕吳行役記揚州大儀甘泉東院兩廊前有通草其形如椿少葉子垂梢際如苦楝與今所說殊別不知是木通邪通脫邪或別是一種也古方所用通草皆今之木通通脫稀有使者近世醫家多用利小便南人或以蜜煎作果食之甚美兼解諸藥毒陳藏器云本功外子味甘利大小便宣通去煩熱食之令人心寬止渴下氣江東人呼為畜葍子江西人呼為拿子如算袋穰黃子黑食之當去其皮蘇云色白乃猴葍也海藥云謹按徐表南州記云生廣州山谷味溫平主諸瘻瘡喉嚨痛及喉痹並宜煎服之磨亦得急即含之食療云煮飲之通婦人血氣濃煎三五盞即便通又除寒熱不通之氣消鼠瘻金瘡踒折煮汁釀酒妙芍藥味苦酸平微寒有小毒主邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣通順血脈緩中散惡血逐賊血去水氣利膀胱大小腸消癰腫時行寒熱中惡腹痛腰痛一名白木一名余容一名犁食一名解倉一名鋋生中嶽川穀及丘陵二月八月採根曝乾須丸為之使臣禹錫等謹按別本作雷丸惡石斛芒硝畏硝石鱉甲小薊反藜蘆陶隱居云今出白山蔣山茅山最好白而長大余處亦有而多赤赤者小利俗方以止痛乃不減當歸道家亦服食之又煮石用之今按別本注云此有兩種赤者利小便下氣白者止痛散血其花亦有紅白二色臣禹錫等謹按吳氏云芍藥神農苦桐君甘無毒歧伯咸季氏小寒雷公酸藥性論云芍藥臣能治肺邪氣腹中㽲痛血氣積聚通宣臟腑擁氣治邪痛敗血主時疾骨熱強五臟補腎氣治心腹堅脹婦人血閉不通消瘀血能蝕膿日華子云治風補勞主女人一切病併產前後諸疾通月水退熱除煩益氣天行熱疾瘟瘴驚狂婦人血暈及腸風瀉血痔瘻發背瘡疥頭痛明目目赤胬肉赤色者多補氣白者治血此便芍藥花根海鹽杭越俱好圖經曰芍藥生中嶽川穀及丘陵今處處有之淮南者勝春生紅芽作叢莖上三枝五葉似牡丹而狹長高一二尺夏開花有紅白紫數種子似牡丹子而小秋時採根根亦有赤白二色崔豹古今注云芍藥有二種有草芍藥木芍藥木者花大而色深俗呼為牡丹非也又云牛亨問曰將離相別贈以芍藥何也答曰芍藥一名何離故相贈猶相招召贈以文無文無一名當歸欲忘人之憂則贈以丹棘丹棘一免忘憂使忘憂也欲蠲人之忿則贈以青裳青裳一名合歡贈之使忘忿也張仲景治傷寒湯多用芍藥以其主寒熱利小便故也古人亦有單服食者安期生服煉法云芍藥二種一者金芍藥二者木芍藥救病用金芍藥色白多脂肉木芍藥色紫瘦多脈若取審看勿令差錯若欲服餌採得淨刮去皮以東流水煮百沸出陰乾停三日又於木甑內蒸之上覆以淨黃土一日夜熟出陰乾搗末以麥飲或酒服三錢匕日三滿三百日可以登嶺絕谷不飢正元廣利方治婦女赤白下年月深久不瘥者取白芍藥三大兩並乾薑半大兩細銼熬令黃搗下篩空肚和飲汁服二錢匕日再佳又金創血不止而痛者亦單搗白芍藥末敷上即止良驗唐本注益好血雷公云凡採得後於日中曬乾以竹刀刮上粗皮並頭土了銼之將蜜水拌蒸從巳至未曬乾用之經驗後方治風毒骨髓疼痛芍藥二分虎骨一兩炙為末夾絹袋盛酒三升漬五日每服三合日三服博濟方治五淋赤芍藥一兩檳榔一個麵裹煨為末每服一錢匕水一盞煎七分空心服廣利方治金瘡血不止痛白芍藥一兩熬令黃杵令細為散酒或米飲下二錢並得初三服漸加初虞世治咯血衄血白芍藥一兩犀角末一分為末新水服一錢匕血止為限別說云謹按本經芍藥生丘陵川穀今世所用者多是人家種植欲其花葉肥大必加糞壤每歲八九月取其根分削因利以為藥遂曝乾貨賣今淮南真陽尤多藥家見其肥大而不知香味絕不佳故人藥不可責其效今考用宜依本經所說川穀丘陵有生者為勝爾衍義曰芍藥全用根其品亦多須用花紅而單葉山中者為佳花葉多即根虛然其根多赤色其味澀苦或有色白粗肥者益好余如經然血虛寒人禁此一物古人有言曰減芍藥以避中寒誠不可忽蠡音禮實味甘平溫無毒主皮膚寒熱胃中熱氣風寒濕痹堅筋骨令人嗜食止心煩滿利大小便長肌膚肥大久服輕身花葉去白蟲療喉痹多服令人溏泄一名荔實一名劇草一名三堅一名豕首生河東川穀五月採實陰乾陶隱居云方藥不復用俗無識者天名精亦名豕首也唐本注云此即馬藺子也月令云荔挺出鄭注云荔馬薤也說文云荔似蒲根可為刷通俗文一名馬藺本經一名荔實子療金瘡血內流癰腫等病有效臣禹錫等謹按蜀經云蠡實寒日華子云馬藺治婦人血氣煩悶產後血運並經脈不止崩中帶下消一切瘡癤腫毒止鼻洪吐血通小腸消酒毒治黃病敷蛇蟲咬殺蕈毒亦可蔬菜食莖葉同用圖經曰蠡實馬藺子也北人音訛呼為馬楝子生河東川穀今陝西諸郡及鼎澧州亦有之近京尤多葉似薤而長厚三月開紫碧花五月結實作角子如麻大而赤色有稜根細長通黃色人取以為刷三月採花五月採實並陰乾用謹按顏氏家訓云月令曰荔挺出鄭康成云荔挺馬薤也易統驗玄圖云荔挺不出則國多少災說文云荔似蒲而小根可為刷廣雅云馬薤荔也蔡邕高誘皆云荔以挺出然則鄭以荔挺為名誤矣此物河北平澤率生之江東頗多種於階庭但呼為旱蒲故不誠馬薤講禮者乃以為馬莧且馬莧亦名豚耳俗曰馬齒者是也其花實皆入藥列仙傳寇先生者宋人也好種荔食其葩實焉今山人亦單服其實去大溫益下甚有奇效崔元亮治喉痹腫痛取荔花皮根共十二分以水一升煮取六合去滓含之細細嚥汁瘥止外臺秘要治睡死者杵蠡實根一握水絞取汁稍稍咽之口噤灌之又方治喉痹咽喉喘息不通須臾欲絕神驗以根葉二兩水一升半煮取一盞去滓細細吃立通千金方治中蠱下血如雞肝出其餘四臟悉壞唯心未毀或鼻破待死取馬藺根末水服方寸匕隨吐則出極神此苗似葛蔓綠紫生子似橘子肘後方治面及鼻病酒齇以馬藺子用六月六日面熬令黃各等分為末空心米飲服方寸匕如無六月六日面用常面或牛骨灰等分亦得又方治水痢白病以馬藺子乾薑黃連各等分為散熟煮湯取一合許和二方寸匕入腹即斷冷熱皆治常用神效不得輕之忌豬肉冷水衍義曰蠡實陶隱居云方藥不復用俗無識者本經諸家所注不相應若果是馬藺則日華子不當更言亦可為蔬菜食蓋馬藺其葉馬牛皆不食為才出土葉已硬況又無味豈可更堪人食也今不敢以蠡實為馬藺子更俟博識者瞿音劬麥味苦辛寒無毒主關格諸癃結小便不通出刺決癰腫明目去翳破胎墮子下閉血養腎氣逐膀胱邪逆止霍亂長毛髮一名巨句麥一名大菊一名大藍生泰山川穀立秋採實陰乾蘘草牡丹為之使惡螵蛸陶隱居云今出近道一莖生細葉花紅紫赤可愛合子葉刈取之子頗似麥故名瞿麥此類乃有兩種一種微大花邊有叉椏未知何者是今市人皆用小者復一種葉廣相似而有毛花晚而甚赤按經云採實中子至細燥熟便脫盡今市人唯合莖葉用而實正空殼無復子爾臣禹錫等謹按藥性論云瞿麥臣味甘主五淋日華子云瞿麥催生又名杜母草燕麥蘥麥又云石竹葉治痔瘻並瀉血作湯粥食並得子治月經不通破血塊排膿葉治小兒蛔蟲痔疾煎湯服丹石藥發並眼目腫痛及腫毒搗敷治浸淫瘡並婦人陰瘡圖經曰瞿麥生泰山川穀今處處有之苗高一尺以來葉尖小青色根紫黑色形如細蔓菁花紅紫赤色亦似映山紅二月至五月開七月結實作穗子頗似麥故以名之立秋後合子葉收採陰乾用河陽河中府出者苗可用淮甸出者根細村民取作刷帚爾雅謂之大菊廣雅謂之茈萎是也古今方通心經利小腸為最要張仲景治小便不利有水氣栝蔞瞿麥丸主之栝蔞根二兩大附子一個茯苓山芋各三兩瞿麥一分五物杵末蜜丸如梧子大一服三丸日三未知益至七八丸以小便利腹中溫為知也雷公云凡使只用蕊殼不用莖葉若一時使即空心令人氣咽小便不禁凡欲用先須以堇竹瀝浸一伏時漉出曬乾用外臺秘要治鯁以瞿麥為末水服方寸匕又方治石淋取子酒服方寸匕一二日當下石千金方治產經數日不出或子死腹中母欲死以瞿麥煮濃汁服之梅師方治竹木刺入肉中不出瞿麥為末水服方寸匕或煮瞿麥汁飲之日三千金同崔氏治魚臍瘡毒腫燒灰和油敷於腫上甚佳衍義曰瞿麥八正散用瞿麥今人為至要藥若心經雖有熱而小腸虛者服之則心熱未退而小腸別作病矣料其意者不過為心與小腸為傳送故用此入小腸藥按經瞿麥並不治心熱若心無大熱則當止治其心若或制之不盡須當求其屬以衰之用八正散者其意如此玄參味苦咸微寒無毒主腹中寒熱積聚女子產乳余疾補腎氣令人目明主暴中風傷寒身熱支滿狂邪忽忽不知人溫瘧洒洒血瘕下寒血除胸中氣下水止煩渴散頸下核癰腫心腹痛堅症定五臟久服補虛明目強陰益精一名重臺一名玄臺一名鹿腸一名正馬一名咸一名端生河間川穀及冤句三月四月採根曝乾惡黃耆乾薑大棗山茱萸反藜蘆陶隱居云今出近道處處有莖似人參而長大根甚黑亦微香道家時用亦以合香唐本注云玄參根苗並臭莖亦不似人參陶云道家亦以合香未見其理也今注詳此藥莖方大高四五尺紫赤色而有細毛葉如掌大而尖長根生青白干即紫黑新者潤膩合香用之俗呼為馥草酒漬飲之療諸毒鼠瘻陶云似人參莖唐本注言根苗並臭蓋未深識爾臣禹錫等謹按藥性論云玄參使一名逐馬味苦能治暴結熱主熱風頭痛傷寒勞復散瘤癭瘰癘日華子云治頭風熱毒遊風補虛勞損心驚煩躁劣乏骨蒸傳屍邪氣止健忘消腫毒圖經曰玄參生河間及冤句今處處有之二月生苗葉似脂麻又如槐柳細莖青紫色七月開花青碧色八月結子黑色亦有白花莖方大紫赤色而有細毛有節若竹者高五六尺葉如掌大而尖長如鋸齒其根尖長生青白干即紫黑新者潤膩一根可生五七枚三月八月九月採曝乾或云蒸過日乾陶隱居云道家時用合香今人有傳其法以玄參甘松香各杵末均秤分兩盛以大酒瓶中投白蜜漬令瓶七八分緊封系頭安釜中煮不住火一伏時止火候冷破瓶取出再搗熟如干更用熟蜜和瓷器盛陰埋地中旋取使入龍腦搜亦可以薰衣雷公云凡採得後須用蒲草重重相隔入甑蒸兩伏時後出干曬使用時勿令犯銅餌之後噎人喉喪人目揀去蒲草盡了用之經驗方治患勞人燒香法用玄參一斤甘松六兩為末煉蜜一斤和勻入瓷瓶內封閉地中埋窨十日取出更用灰末六兩更煉蜜六兩和令勻入瓶內封更窨五日取出燒令其鼻中常聞其香疾自愈廣利方治瘰癧經年久不瘥生玄參搗碎敷上日二易之秦艽膠字味苦辛平微溫無毒主寒熱邪氣寒濕風痹肢節痛下水利小便療風無問久新通身攣急生飛烏山谷二月八月採根曝乾菖蒲為之使陶隱居云飛烏或是地名今出甘松龍洞蠶陵長大黃白色為佳根皆作羅文相交中多銜土用之熟破除去方家多作秦膠字與獨活療風常用道家不須爾唐本注云今出涇州鄜州歧州者良本作札或作糾作膠正作艽也臣禹錫等謹按藥性論云秦艽解米脂人食谷不充悅畏牛乳點服之利大小便瘥五種黃病解酒毒去頭風蕭炳云本經名秦瓜世人以療酒黃黃疸大效日華子云味苦冷主傳屍骨蒸治疳及時氣又名秦瓜羅紋者佳圖經曰秦艽生飛烏山谷今河陝州軍多有之根土黃色而相交糾長一尺以來粗細不等枝稈高五六寸葉婆娑連莖梗俱青色如萵苣葉六月中開花紫色似葛花當月結子每於春秋採根陰乾正元廣利方療黃心煩熱口乾皮肉皆黃以秦艽十二分牛乳一大升同煮取七合去滓分溫再服瘥此方出於許仁則又崔元亮集驗方凡發背疑似者須便服秦艽牛乳煎當得快利三五行即瘥法並同此又治黃方用秦艽一大兩細銼作兩貼子以上好酒一升每貼半升酒絞取汁去滓空腹分兩服或利便止就中好酒人易治凡黃有數種傷酒曰酒黃夜食誤餐鼠糞亦作黃因勞發黃多痰涕目有赤脈日益憔悴或面赤噁心者是元亮用之及治人皆得力極效秦艽須用新好羅紋者雷公云凡使秦並艽須於腳文處認取左文列為秦即治疾艽即髮腳氣凡用秦先以布拭上黃肉毛盡然後用還元湯浸一宿至明出日乾用聖惠方治傷寒心神熱躁口乾煩渴秦艽一兩去苗細銼以牛乳一大盞煎至六分去滓不計時候分溫二服又方治小便難腹滿悶不急療之殺人用秦艽一兩去苗以水一大盞煎取七分去滓每於食後分為二服孫真人治黃疸皮膚眼睛如金色小便赤取秦艽五兩牛乳三升煮取一升去滓納芒硝一兩服百合味甘平無毒主邪氣腹脹心痛利大小便補中益氣除浮腫臚脹痞滿寒熱通身疼痛及乳難喉痹止涕淚一名重箱一名摩羅一名中逢花一名強瞿生荊州川穀二月八月採根曝乾陶隱居云近道處處有根如胡蒜數十片相累人亦蒸煮食之乃言初是蚯蚓相纏結變作之俗人皆呼為強仇仇即瞿也聲之訛爾亦堪服食唐本注云此藥有二種一種細葉花紅白色一種葉大莖長根粗花白宜入藥用臣禹錫等謹按藥性論云百合使有小毒主百邪鬼魅涕泣不止除心下急滿痛治腳氣熱咳逆吳氏云百合一名重邁一名中庭生冤朐及荊山日華子云白百合安心定膽益志養五臟治癲邪啼泣狂叫驚悸殺蠱毒氣脇乳癰發背及諸瘡腫並治產後血狂運又云紅百合涼無毒治瘡腫及療驚邪此是紅花者名連珠圖經曰百合生荊州川穀今近道處處有之春生苗高數尺稈粗如箭四面有葉如雞距又似柳葉青色葉近莖微紫莖端碧白四五月開紅白花如石榴觜而大根如胡蒜重疊生二三十瓣二月八月採根曝乾人亦蒸食之甚益氣又有一種花黃有黑斑細葉葉間有黑子不堪入藥徐鍇歲時廣記二月種百合法宜雞糞或云百合是蚯蚓所化而反好雞糞理不可知也又百合作面最益人取根曝乾搗細篩食之如法張仲景治百合病有百合知母湯百合滑石代赭湯百合雞子湯百合地黃湯凡四方病名百合而用百合治之不識其義食療云平主心急黃蒸過蜜和食之作粉尤佳紅花者名山丹不甚良聖惠方治肺臟壅熱煩悶新百合四兩蜜半盞和蒸令軟時時含一棗大咽津又方治傷寒腹中滿痛用百合一兩炒令黃色搗為散不計時候粥飲調下二錢服孫真人食忌治陰毒傷寒煮百合濃汁服一升良勝金方治耳聾疼痛以干百合為末溫水調下二錢匕食後服衍義曰百合張仲景用治傷寒壞後百合病須此也莖高三尺許葉如大柳葉四向攢枝而上其顛即有淡黃白花四垂向下覆長蕊花心有檀色每一枝顛須五六花子紫色圓如梧子生於枝葉間每葉一子不在花中此又異也根即百合其色白其形如松子殼四向攢生中間出苗知母味苦寒無毒主消渴熱中除邪氣肢體浮腫下水補不足益氣療傷寒久瘧煩熱脅下邪氣膈中惡及風汗內疸多服令人泄一名蚳音歧母一名連母一名野蓼一名地參一名水參一名水浚一名貨母一名蝭音匙又音提母一名女雷一名女理一名兒草一名鹿列一名韭逢一名兒踵草一名東根一名水須一名沉燔一名𧂇杜含切臣禹錫等謹按唐本一名昌支生河內川穀二月八月採根曝乾陶隱居云今出彭城形似菖蒲而柔潤葉至難死掘出隨生須枯燥乃止甚療熟結亦主瘧熱煩也臣禹錫等謹按爾雅云𧂇莐藩釋曰知母也一名𧂇一名莐藩郭云生山上葉如韭範子云提母出三輔黃白者善吳氏云知母神農桐君無毒補不足益氣藥性論云知母君性平主治心煩躁悶骨熱勞往來生產後蓐勞腎氣勞憎寒虛損患人虛而口乾加而用之日華子云味苦甘治熱勞傳屍疰病通小腸消痰止嗽潤心肺補虛乏安心止驚悸圖經曰知母生河內川穀今瀕河諸郡及解州滁州亦有之根黃色似菖蒲而柔潤葉至難死掘出隨生須燥乃止四月開青花如韭花八月結實二月八月採根曝乾用爾雅謂之𧂇徙南切又謂之莐直林切藩是也肘後方用此一物治溪毒大勝其法連根葉搗作散服之亦可投水搗絞汁飲一二升夏月出行多取此屑自隨欲入水先取少許投水上流便無畏兼闢射工亦可和水作湯浴之甚佳雷公云凡使先於砧上細銼焙乾木臼杵搗勿令犯鐵器聖惠方治妊娠月未足似欲產腹中痛用知母二兩末蜜丸如梧桐子大不計時候粥飲下二十丸楊氏產乳同貝母味辛苦平微寒無毒主傷寒煩熱淋瀝邪氣疝瘕喉痹乳難金瘡風痙療腹中結實心下滿洗洗惡風寒目眩項直咳嗽上氣止煩熱渴出汗安五臟利骨髓一名空草一名藥實一名苦花一名苦菜一名商草一名勤母生晉地十月採根曝乾厚朴白薇為之使惡桃花畏秦艽礜石莽草反烏頭陶隱居云今出近道形似聚貝子故名貝母斷谷服之不飢唐本注云此葉似大蒜四月蒜熟時採良若十月苗枯根亦不佳也出潤州荊州襄州者最佳江南諸州亦有味甘苦不辛按爾雅一名莔忙庚切也臣禹錫等謹按爾雅云莔貝母注根如小貝圓而白華葉似韭疏引陸機云其葉如栝蔞而細小其子在根下如芋子正白四方連累相著有分解也藥性論云貝母臣微寒治虛熱主難產作末服之兼治胞衣不出取七枚末酒下末點眼去膚翳主胸脅逆氣療時疾黃疸與連翹同主項下瘤癭疾日華子云消痰潤心肺末和沙糖為丸含止嗽燒灰油調敷人畜惡瘡圖經曰貝母生晉地今河中江陵府郢壽隨鄭蔡潤滁州皆有之根有瓣子黃白色如聚貝子故名貝母二月生苗莖細青色葉亦青似蕎麥葉隨苗出七月開花碧綠色形如鼓子花八月採根曬乾又云四月蒜熟時採之良此有數種鄜詩言採其莔音虻陸機疏云貝母也其葉如栝樓而細小其子在根下如芋子正白四方連累相著有分解今近道出者正類此郭璞注爾雅云白花葉似韭此種罕復見之此藥亦治惡瘡唐人記其事云江左嘗有商人左膊上有瘡如人面亦無它苦商人戲滴酒口中其面亦赤色以物食之亦能食食多則覺膊內肉脹起或不食之則一臂痹有善醫者教其歷試諸藥金石草木之類悉試之無苦至貝母其瘡乃聚眉閉口商人喜曰此藥可治也因以小葦筒毀其口灌之數日成痂遂愈然不知何疾也謹按本經主金瘡此豈金瘡之類歟雷公云凡使先於柳木灰中炮令黃擘破去內口鼻上有米許大者心一小顆後拌糯米於鏊上同炒待米黃熟然後去米取出其中有獨顆團不作兩片無皺者號曰丹龍精不入用若誤服令人筋脈永不收用黃精小藍汁合服立愈別說云謹按貝母能散心胸鬱結之氣殊有功則詩所謂言採其虻者是也蓋作詩者本以不得志而言之今用以治心中氣不快多愁郁者殊有功信矣白芷味辛溫無毒主女人漏下赤白血閉陰腫寒熱風頭侵目淚出長肌膚潤澤作面脂療風邪久渴吐嘔兩脅滿風痛頭眩目癢可作膏藥面脂潤顏色一名芳香一名白茞一名囂許驕切一名莞一名苻蘺一名澤芬葉名蒚音歷麻可作浴湯生河東川穀下澤二月八月採根曝乾當歸為之使惡旋覆花陶隱居云今出近道處處有近下濕地東間甚多葉亦可作浴湯道家以此香浴去屍蟲又用合香也臣禹錫等謹按範子計然云白芷出齊郡以春取黃澤者善也藥性論云白芷君能治心腹血刺痛除風邪主女人血崩及嘔逆明目止淚出療婦人瀝血腰痛能蝕膿日華子云治目赤胬肉及補胎漏滑落破宿血補新血乳癰發背瘰癧腸風痔瘻排膿瘡痍疥癬止痛生肌去面皯疵瘢圖經曰白芷生河東川穀下澤今所在有之吳地尤多根長尺余白色粗細不等枝稈去地五寸以上春生葉相對婆娑紫色闊三指許花白微黃入伏後結子立秋後苗枯二月八月採根曝乾以黃澤者為佳楚人謂之藥九歌云辛夷楣兮藥房王逸注云藥白芷是也雷公云凡採得後勿用四條作一處生者此名喪公藤兼勿用馬藺並不入藥中採得後刮削上皮細銼用黃精細銼以竹刀切二味等分兩度蒸一伏時後出於日中曬乾去黃精用之外臺秘要治丹癮疹白芷及根葉煮汁洗之效子母秘錄治小兒身熱白芷煮湯浴兒避風衍義曰白芷菹是也出吳地者良經曰能蝕膿今人用治帶下腸有敗膿淋露不已腥穢殊甚遂至臍腹更增冷痛此蓋為敗膿血所致卒無已期須以此排膿白芷一兩單葉紅蜀葵根二兩芍藥根白者白礬各半兩礬燒枯別研余為末同以蠟丸如梧子大空肚及飯前米飲下十丸或十五丸俟膿盡仍別以他藥補之淫羊藿味辛寒無毒主陰痿絕傷莖中痛利小便益氣力強志堅筋骨消瘰癧赤癰下部有瘡洗出蟲丈夫久服令人無子一名剛前生上郡陽山山谷薯蕷為之使陶隱居云服此使人好為陰陽西川北部有淫羊一日百遍合蓋食藿所致故名淫羊藿唐本注云此草葉形似小豆而圓薄莖細亦堅所在皆有俗名仙靈脾者是也臣禹錫等謹按蜀本云淫羊藿溫注云生處不聞水聲者良藥性論云淫羊藿亦可單用味甘平主堅筋益骨日華子云仙靈脾紫芝為使得酒良治一切冷風勞氣補腰膝強心力丈夫絕陽不起女人絕陰無子筋骨攣急四肢不任老人昏耄中年健忘又名黃連祖千兩金乾雞筋放杖草棄杖草圖經曰淫羊藿俗名仙靈脾生上郡陽山山谷今江東陝西泰山漢中湖湘間皆有之葉青似杏葉上有刺莖如粟稈根紫色有須四月開花白色亦有紫色碎小獨頭子五月採葉曬乾湖湘出者葉如小豆枝莖緊細經冬不凋根似黃連關中俗呼三枝九葉草苗高一二尺許根葉俱堪使雷公云凡使時呼仙靈脾須用夾刀夾去葉四畔花栨盡後細銼用羊脂相對拌炒過待羊脂盡為度每修事一斤用羊脂四兩為度也聖惠方治偏風手足不遂皮膚不仁宜服仙靈脾浸酒方仙靈脾一斤好者細銼以生絹袋盛於不津器中用無灰酒二斗浸之以厚紙重重密封不通氣春夏三日秋冬五日後旋開每日隨性暖飲之常令醺醺不得大醉若酒盡再合服之無不效驗合時切忌雞犬見之經驗方治瘡子入眼以仙靈脾威靈仙等分為末食後米湯下二錢匕小兒半錢匕食醫心鏡益丈夫興陽理腳膝冷淫羊藿一斤酒一斗浸經二日飲之佳黃芩味苦平大寒無毒主諸熱黃疸腸澼泄痢逐水下血閉惡瘡疽蝕火瘍療痰熱胃中熱小腹絞痛消穀利小腸女子血閉淋露下血小兒腹痛一名腐腸一名空腸一名內虛一名黃文一名經芩一名妒婦其子主腸澼膿血生秭歸川穀及冤句三月三日採根陰乾得厚朴黃連止腹痛得五味子牡蒙牡蠣令人有子得黃耆白蘞赤小豆療鼠瘻山茱萸龍骨為之使惡蔥實畏丹砂牡丹藜蘆陶隱居云秭歸屬建平郡今第一齣彭城郁州亦有之圓者名子芩為勝破者名宿芩其腹中皆爛故名腐腸唯取深色堅實者為好俗方多用道家不須唐本注云葉細長兩葉相對作叢生亦有獨莖者今出宜州鄜州涇州者佳兗州者大實亦好名豚尾芩也臣禹錫等謹按藥性論云黃芩臣味苦甘能治熱毒骨蒸寒熱往來腸胃不利破擁氣治五淋令人宣暢去關節煩悶解熱渴治熱腹中㽲痛心腹堅脹日華子云下氣主天行熱疾疔瘡排膿治乳癰發背圖經曰黃芩生秭歸山谷及冤句今川蜀河東陝西近郡皆有之苗長尺余莖稈粗如箸葉從地四面作叢生類紫草高一尺許亦有獨莖者葉細長青色兩兩相對六月開紫花根黃如知母粗細長四五寸二月八月採根曝乾用之吳普本草云黃芩又名印頭一名內虛二月生赤黃葉兩兩四四相值其莖空中或方圓高三四尺花紫紅赤五月實黑根黃二月九月採與今所有小異張仲景治傷寒心下痞滿瀉心湯四方皆用黃芩以其主諸熱利小腸故也又太陽病下之利下止有葛根黃芩黃連湯及主妊娠安胎散亦多用黃芩今醫家嘗用有效者因著之又千金方巴郡太守奏加減三黃丸療男子五勞七傷消渴不生肌肉婦人帶下手足寒熱者春三月黃芩四兩大黃三兩黃連四兩夏三月黃芩六兩大黃一兩黃連七兩秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩三兩大黃五兩黃連二兩三物隨時合搗下篩蜜丸大如烏豆米飲服五丸日三不知稍增七丸服一月病愈久服走及走奔馬近頻有驗食禁豬肉又陶隱居云黃芩圓者名子芩仲景治雜病方多用之千金翼治淋黃芩四兩袋貯之水五升煮三升分三服梅師治火丹杵黃芩末水調敷之狗脊味苦甘平微溫無毒主腰背強關機緩急周痹寒濕膝痛頗利老人療失溺不節男子腳弱腰痛風邪淋露少氣目暗堅脊利俯仰女子傷中關節重一名百枝一名強膂主名扶蓋一名扶筋生常山川穀二月八月採根曝乾萆薢為之使惡敗醬陶隱居云今山野處處有與菝葜相似而小異其莖葉小肥其節疏其莖大直上有刺葉圓有赤脈根凹烏交切凸徒結切巃嵸如羊角細強者是唐本注云此藥苗似貫眾根長多岐狀如狗脊骨其肉作青綠色今京下用者是陶所說乃有刺萆薢非狗脊也今江左俗猶用之臣禹錫等謹按吳氏云狗脊一名狗青一名赤節神農苦桐君黃帝歧伯雷公扁鵲甘無毒季氏小溫如萆薢莖節如竹有刺葉圓赤根黃白亦如竹根毛有刺歧伯經云莖無節葉端圓青赤皮白有赤脈藥性論云狗脊味苦辛微熱能治男子女人毒風軟腳邪氣濕痹腎氣虛弱補益男子續筋骨圖經曰狗脊生常山川穀今太行山淄溫眉州亦有根黑色長三四寸兩指許大苗尖細碎青色高一尺以來無花其莖葉似貫眾而細其根長而多歧似狗脊骨故以名之其肉青綠春秋採根曝乾用今方亦用金毛者雷公云凡使勿用透山藤其大脼根與透山藤一般只是入頂苦不可餌之凡修事細銼了酒拌蒸從巳至申出曬乾用石龍芮味苦平無毒主風寒濕痹心腹邪氣利關節止煩滿平腎胃氣補陰氣不足失精莖冷久服輕身明目不老令人皮膚光澤有子一名魯果能一名地椹一名石能一名彭根一名天豆生泰山川澤石邊五月五日採子二月八月採皮陰乾大戟為之使畏蛇蛻皮吳茱萸陶隱居云今出近道子形粗似蛇床子而扁非真好者人言是蓄菜子爾東山石上所生其葉芮芮短小其子狀如葶藶黃色而味小辛此乃實是也唐本注云今用者俗名水董音謹苗似附子實如桑椹故名地椹生下濕地五月熟葉子皆味辛山南者粒大如葵子關中河北者細如葶藶氣力劣於山南者陶以細者為真未為通論又別錄水董云主毒腫癰癤瘡蛔蟲齒齲臣禹錫等謹按藥性論云石龍芮能逐諸風主除心熱躁圖經曰石龍芮生泰山川澤石邊陶隱居云近道處處有之今唯出兗州一叢數莖莖青紫色每莖三葉其葉芮芮短小多刻缺子如葶藶而色黃五月採子二月八月採皮陰乾用能逐諸風除心熱躁蘇恭云俗名水堇苗如附子實如桑椹生下濕地此乃水堇非石龍芮也今兗州所生者正與本經陶說相合為得其真矣陳藏器云芮子味辛按蘇別錄云水堇主毒腫蛇蟲齒齲且水堇如蘇所注定是石龍芮更非別草爾雅云芨堇草郭注云烏頭苗也蘇又注天雄云石龍芮葉似堇草故名水堇如此則依蘇所注是水堇附子是堇草水堇堇草二物同名也衍義曰石龍芮今有兩種水中生者葉光而末圓陸生者葉有毛而末銳入藥須生水者陸生者又謂之天灸取少葉揉係臂上一夜作大泡如火燒者是唯陸生者補陰不足莖常冷失精余如經茅根味甘寒無毒主勞傷虛羸補中益氣除瘀血血閉寒熱利小便下五淋除客熱在腸胃止渴堅筋婦人崩中久服利人其苗主下水一名蘭根一名茹根一名地菅一名地筋一名兼杜生楚地山谷田野六月採根陶隱居云此即今白茅菅音奸詩云露彼菅茅其根如渣芹甜美服食此斷谷甚良俗方稀用唯療淋及崩中爾唐本注云菅花味甘溫無毒主衄血吐血灸瘡臣禹錫等謹按藥性論云白茅臣能破血主消渴根治五淋煎汁服之陳藏器云茅針味甘平無毒主惡瘡腫未潰者煮服之服一針一孔二針二孔生挪敷金瘡止血煮服之主鼻衄及暴下血成白花者功用亦同針即茅筍也又云屋茅主卒吐血細銼三升酒浸煮服一升屋上爛茅和醬汁研敷斑瘡蠶齧瘡一名百足蟲茅屋滴溜水殺雲母毒日華子云茅針涼通小腸癰毒軟癤不作頭濃煎和酒服花罯刀箭瘡止血並痛根主婦人月經不勻又云茅根通血脈淋瀝是白花茅根也又云屋四角茅平無毒主鼻洪圖經曰茅根生楚地山谷田野今處處有之春生苗布地如針俗間謂之茅針亦可啖甚益小兒夏生白花茸茸然至秋而枯其根至潔白亦甚甘美六月採根用今人取茅針挪以敷金瘡塞鼻洪止暴下血及溺血者殊效劉禹錫傳信方療癰腫有頭使必穴方取茅錐一莖正爾全煎十數沸服之立潰若兩莖即生兩孔或折斷一枝為二亦生兩穴白茅花亦主金瘡止血又有菅亦茅類也陸機草木疏云菅似茅而滑無毛根下五寸中有白粉者柔韌宜為索漚之尤善其未漚者名野菅詩所謂白茅菅兮是此也入藥與茅等其屋苫茅經久者主卒吐血細銼三升酒浸煮服一升良已肘後方療熱取白茅根四升銼之以水一斗五升煮取五升適冷暖飲之日三服又方諸竹木刺在肉中不出取白茅根燒末脂膏和塗之亦治因風致腫紫菀味苦辛溫無毒主咳逆上氣胸中寒熱結氣去蠱毒痿蹶安五臟療咳唾膿血止喘悸五勞體虛補不足小兒驚癇一名紫茜一名青苑生房陵山谷及真定邯鄲二月三月採根陰乾款冬為之使惡天雄瞿麥雷丸遠志畏茵陳蒿陶隱居云近道處處有生布地花亦紫本有白毛根甚柔細有白者名白菀不復用唐本注云白菀即女菀也療體與紫菀同無紫菀時亦用白菀陶云不復用或是未悉臣禹錫等謹按藥性論云紫菀臣味苦平能治屍疰補虛下氣及胸脅逆氣治百邪鬼魅勞氣虛熱日華子云調中及肺痿吐血消痰止渴潤肌膚添骨髓形似重臺根作節紫色潤軟者佳圖經曰紫菀生房陵山谷及真定邯鄲今耀成泗壽臺孟州興國軍皆有之三月內布地生苗葉其葉三四相連五月六月內開黃紫白花結黑子本有白毛根甚柔細二月三月內取根陰乾用又有一種白者名白菀蘇恭云白菀即女菀也療體並同無紫菀時亦可通用女菀下自有條今人亦稀用古今傳信方用之最要近醫療久嗽不瘥此方甚佳紫菀去蘆頭款冬花各一兩百部半兩三物搗羅為散每服三錢匕生薑三片烏梅一個同煎湯調下食後欲臥各一服唐本余治氣喘陰痿雷公云凡使先去髭有白如練色者號曰羊須草自然不同採得後去頭土了用東流水淘洗令淨用蜜浸一宿至明於火上焙乾用凡修一兩用蜜二分千金方治婦人卒不得小便紫菀末以井花水服三撮便通小便血服五撮立止斗門方治纏喉風喉閉飲食不通欲死者用返魂草根一莖淨洗納入喉中待取惡涎出即瘥神效更以馬牙硝津咽之即絕根本一名紫菀又南中呼為液牽牛是也衍義曰紫菀用根其根柔細紫色益肺氣經具言之唐本注言無紫菀時亦用白菀白菀即女菀也今本草無白菀之名蓋唐修本草時已刪去紫草味苦寒無毒主心腹邪氣五疸補中益氣利九竅通水道療腹腫脹滿痛以合膏療小兒瘡及面皻側加切一名紫丹一名紫芺衰老反生碭山山谷及楚地三月採根陰乾陶隱居云今出襄陽多從南陽新野來彼人種之即是今染紫者方藥家都不復用博物志云平氏陽山紫草特好魏國以染色殊黑比年東山亦種色小淺於北者唐本注云紫草所在皆有爾雅云一名藐苗似蘭香莖赤節青花紫白色而實白臣禹錫等謹按廣雅云紫草一名茈䓞藥性論云紫草亦可單用味甘平能治惡瘡瘑癬圖經曰紫草生碭山山谷及楚地今處處有之人家園圃中或種蒔其根所以染紫也爾雅謂之藐廣雅謂之茈䓞苗似蘭香莖赤節青二月有花紫白色秋實白三月採根陰乾古方稀見使今醫家多用治傷寒時疾發瘡疹不出者以此作藥使其發出韋宙獨行方治豌豆瘡煮紫草湯飲後人相承用之其效尤速雷公云凡使須用蠟水蒸之待水乾取去頭並兩畔髭細銼用每修事紫草一斤用蠟三兩於鐺中熔熔盡便投蠟水作湯用聖惠方治惡蟲咬人用紫草油塗之又方治卒小便淋瀝痛用紫草一兩搗羅為散每於食前以井花水調下二錢匕產寶治淋澀產後同經驗後方治嬰兒童子患疹豆疾用紫草二兩細銼以百沸湯一大盞泡便以物合定勿令氣漏放如人體溫量兒大小服半合至一合服此瘡雖出亦當輕減前胡味苦微寒無毒主療痰滿胸脅中痞心腹結氣風頭痛去痰實下氣治傷寒寒熱推陳致新明目益精二月八月採根曝乾半夏為之使惡皂莢畏藜蘆陶隱居云前胡似茈胡而柔軟為療殆欲同而本經上品有茈胡而無此晚來醫乃用之亦有畏惡明畏惡非盡出本經也此近道皆有生下濕地出吳興者為勝臣禹錫等謹按藥性論云前胡使味甘辛能去熱實下氣主時氣內外俱熱單煮服佳日華子云治一切勞下一切氣止嗽破癥結開胃下食通五臟主霍亂轉筋骨節煩悶反胃嘔逆氣喘安胎小兒一切疳氣越衢婺睦等處皆好七八月採外黑裡白圖經曰前胡舊不著所出州土今陝西梁漢江淮荊襄州郡及相州孟州皆有之春生苗青白色似斜蒿初出時有白芽長三四寸味甚香美又似芸蒿七月內開白花與蔥花相類八月結實根細青紫色二月八月採曝乾今鄜延將來者大與柴胡相似但柴胡赤色而脆前胡黃而軟不同耳一說今諸方所用前胡皆不同京師北地者色黃白枯脆絕無氣味江東乃有三四種一種類當歸皮斑黑肌黃而脂潤氣味濃烈一種色理黃白似人參而細短香味都微又有如草烏頭膚黑而堅有兩三歧為一本者食之亦戟人咽喉中破以薑汁漬搗服之甚下膈解痰實然皆非前胡也今最上者出吳中又壽春生者皆類柴胡而大氣芳烈味亦濃苦療痰下氣最要都勝諸道者雷公云凡使勿用野蒿根緣真似前胡只是味粗酸若誤用令人胃反不受食若是前胡味甘微苦凡修事先用刀刮上蒼黑皮並髭土了細銼用甜竹瀝浸令潤於日中曬乾用之外臺秘要治小兒夜啼前胡搗篩蜜丸如小豆日服一丸熟水下至五六丸以瘥為度敗醬味苦咸平微寒無毒主暴熱火瘡赤氣疥瘙疽痔馬鞍熱氣除癰腫浮腫結熱風痹不足產後疾痛一名鹿腸一名鹿首一名馬草一名澤敗生江夏川穀八月採根曝乾陶隱居云出近道葉似豨薟根形似茈胡氣如敗豆醬故以為名唐本注云此藥不出近道多生崗嶺間葉似水莨及薇銜叢生花黃根紫作陳醬色其葉殊不似豨薟也臣禹錫等謹按藥性論云鹿醬臣敗醬是也味辛苦微寒治毒風𤸷痹主破多年凝血能化膿為水及產後諸病止腹痛余疹煩渴日華子云味酸治赤眼障膜胬肉聤耳血氣心腹痛破癥結產前後諸疾催生落胞血暈排膿補瘻鼻洪吐血赤白帶下瘡痍疥癬丹毒又名酸益七八十月採圖經曰敗醬生江夏川穀今江東亦有之多生崗嶺間葉似水莨及薇銜叢生花黃根紫色似柴胡作陳敗豆醬氣故以為名八月採根曝乾用張仲景治腹癰腹有膿者薏苡仁附子敗醬湯薏苡仁十分附子二分敗醬五分三物搗為末取方寸匕以水二升煎取一升頓服之小便當下愈雷公云凡使收得後便粗杵入甘草葉相拌對蒸從巳至未出焙乾去甘草葉取用楊氏產乳治蠼螋尿繞腰者煎敗醬汁塗之瘥白蘚味苦咸寒無毒主頭風黃疸咳逆淋瀝女子陰中腫痛濕痹死肌不可屈伸起止行步療四肢不安時行腹中大熱飲水欲走大呼小兒驚癇婦人產後余痛生上谷川谷及冤句四月五月採根陰乾惡螵蛸桔梗茯苓萆薢陶隱居云近道處處有以蜀中者為良俗呼為白羊蘚音仙氣息正似羊膻或名白膻唐本注云此藥葉似茱萸苗高尺余根皮白而心實花紫白色根宜二月採若四月五月採便虛惡也臣禹錫等謹按藥性論云白蘚皮臣治一切熱毒風惡風風瘡疥癬赤爛眉發脫脆皮肌急壯熱惡寒主解熱黃酒黃急黃谷黃勞黃等良日華子云通關節利九竅及血脈並一切風痹筋骨弱乏通小腸水氣天行時疾頭痛眼疼根皮良花功用同上亦可作菜食又名金雀兒椒圖經曰白蘚生上谷川谷及冤句今河中江寧府滁州潤州亦有之苗高尺余莖青葉稍白如槐亦似茱萸四月開花淡紫色似小蜀葵根似蔓菁皮黃白而心實四月五月採根陰乾用又云宜二月採差晚則虛惡也其氣息都似羊膻故俗呼為白羊鮮又名地羊膻又名金爵兒椒其苗山人以為菜茹葛洪治鼠瘻已有口膿血出者白蘚皮煮汁服一升當吐鼠子乃愈李兵部手集方療肺嗽有白蘚皮湯方甚妙酸漿味酸平寒無毒主熱煩滿定志益氣利水道產難吞其實立產一名醋漿生荊楚川澤及人家田園中五月採陰乾陶隱居云處處人家多有葉亦可食子作房房中有子如梅李大皆黃赤色小兒食之能除熱亦主黃病多效臣禹錫等謹按蜀本云根如菹芹白色絕苦搗其汁治黃病多效爾雅云葴寒漿注今酸漿草江東人呼曰苦葴圖經曰酸漿生荊楚川澤及人家田園中今處處有之苗似水茄而小葉亦可食實作房如囊囊中有子如梅李大皆赤黃色小兒食之尤有益可除熱根似菹芹色白絕苦搗其汁飲之治黃病多效五月採陰乾爾雅所謂葴音針寒漿郭璞注云今酸漿草江東人呼為苦葴是也今醫方稀用千金方治婦人赤白帶下三葉酸草陰乾為末空心酒下三錢匕靈苑方治卒患諸淋遺瀝不止小便赤澀疼痛三葉酸漿草人家園林亭檻中著地開黃花味酸者是取嫩者淨洗研絞自然汁一合酒一合攪湯暖令空心服之立通衍義曰酸漿今天下皆有之苗如天茄子開小白花結青殼熟則深紅殼中子大如櫻亦紅色櫻中腹有細子如落蘇之子食之有青草氣此即苦耽也今圖經又立苦耽條顯然重複本經無苦耽紫參味苦辛寒微寒無毒主心腹積聚寒熱邪氣通九竅利大小便療腸胃大熱唾血衄血腸中聚血癰腫諸瘡止渴益精一名牡蒙一名眾戎一名童腸一名馬行生河西及冤句山谷三月採根火炙使紫色畏辛夷陶隱居云今方家皆呼為牡蒙用之亦少唐本注云紫參葉似羊蹄紫花青穗皮紫黑肉紅白肉淺皮深所在有之牡蒙葉似及己而大根長尺余皮肉亦紫色根苗並不相似雖一名牡蒙乃王孫也紫參京下見用者是出蒲州也臣禹錫等謹按吳氏云牡蒙神農黃帝苦季氏小寒生河西或商山圓聚生根黃赤有紋皮黑中紫五月華紫赤實黑大如豆藥性論云紫參使味苦能散瘀血主心腹堅脹治婦人血閉不通圖經曰紫參生河西及冤句山谷今河中解晉齊及淮蜀州郡皆有之苗長一二尺根淡紫色如地黃狀莖青而細葉亦青似槐葉亦有似羊蹄者五月開花白色似蔥花亦有紅紫而似水葒者根皮紫黑肉紅白色肉淺而皮深三月採根火炙令紫色又云六月採曬乾用張仲景治痢紫參湯主之紫參半斤甘草二兩以水五升煎紫參取二升納甘草煎取半升分溫三服藁本味辛苦溫微溫微寒無毒主婦人疝瘕陰中寒腫痛腹中急除風頭痛長肌膚悅顏色闢霧露潤澤療風邪嚲曳金瘡可作沐藥面脂實主風流四肢一名鬼卿一名地新一名微莖生崇山山谷正月二月採根曝乾三十日成惡䕡茹陶隱居云俗中皆用芎藭根鬚其形氣乃相類而桐君藥錄說芎藭苗似藁本論說花實皆不同所生處又異今東山別有藁本形氣甚相似唯長大爾唐本注云藁本莖葉根味與芎藭小別以其根上苗下似藁根故名藁本今出宕州者佳也臣禹錫等謹按藥性論云藁本臣微溫畏青葙子能治一百六十種惡風鬼疰流入腰痛冷能化小便通血去頭風䵟疱日華子云治癇疾並皮膚疵䵟酒䵟粉刺圖經曰藁本生崇山山谷今西川河東州郡及兗州杭州有之葉似白芷香又似芎藭但芎藭似水芹而大藁本葉細耳根上苗下似禾藁故以名之五月有白花七八月結子根紫色正月二月採根曝乾三十日成石葦味苦甘平無毒主勞熱邪氣五癃閉不通利小便水道止煩下氣通膀胱滿補五勞安五臟去惡風益精氣一名石䩾之夜切一名石皮用之去黃毛毛射人肺令人咳不可療生華陰山谷石上不聞水及人聲者良二月採葉陰乾滑石臣禹錫等謹按蜀本作絡石杏仁為之使得菖蒲良陶隱居云蔓延石上生葉如皮故名石葦今處處有以不聞水聲人聲者為佳出建平者葉長大而厚唐本注云此物叢生石旁陰處不蔓延生生古瓦屋上名瓦葦用療淋亦好也臣禹錫等謹按藥性論云石葦使微寒治勞及五淋胞囊結熱不通去膀胱熱滿日華子云治淋瀝遺溺入藥須微炙圖經曰石葦生華陰山谷石上今晉絳滁海福州江寧府皆有之叢生石上葉如柳背有毛而斑點如皮故以名以不聞水聲者良二月七月採葉陰乾用南中醫人炒末冷酒調服療發背皆甚效石葦一名石皮而福州自有一種石皮三月有花其月採葉煎浴湯主風又有生古瓦屋上者名瓦韋用治淋亦佳萆薢味苦甘平無毒主腰背痛強骨節風寒濕周痹惡瘡不瘳熱氣傷中恚怒陰痿失溺關節老血老人五緩一名赤節生真定山谷二月八月採根曝乾薏苡為之使畏葵根大黃茈胡牡蠣陶隱居云今處處有亦似菝葜而小異根大不甚有角節色小淺唐本注云此藥有二種莖有刺者根白實無刺者根虛軟內軟者為勝葉似薯蕷蔓生臣禹錫等謹按藥性論云萆薢能治冷風𤸷痹腰腳不遂手足驚掣主男子䐴腰痛久冷是腎間有膀胱宿水博物志云菝葜與萆薢相亂日華子云治癰緩軟風頭旋癇疾補水臟堅筋骨益精明目中風失音時人呼為白菝葜圖經曰萆薢生真定山谷今河陝京東荊蜀諸郡有之根黃白色多節三指許大苗葉俱青作蔓生葉作三叉似山芋又似綠豆葉花有黃紅白數種亦有無花結白子者春秋採根曝乾舊說此藥有二種莖有刺者根白實無刺者根虛軟以軟者為勝今成德軍所產者根亦如山芋體硬其苗引蔓葉似蕎麥子三稜不拘時月採其根用利刀切作片子曝乾用之正元廣利方療丈夫腰腳痹緩急行履不穩者以萆薢二十四分合杜仲八分搗篩每旦溫酒和服三錢匕增至五匕禁食牛肉又有萆薢丸大方功用亦同孫尚藥治腸風痔漏如聖散萆薢細銼貫眾逐葉擘下了去土等分搗羅為末每服二錢溫酒調下空心食前服杜衡味辛溫無毒主風寒咳逆香人衣體生山谷三月三日採根熟洗曝乾陶隱居云根葉都似細辛唯氣小異爾處處有之方藥少用唯道家服之令人身衣香山海經云可療癭唐本注云杜衡葉似葵形如馬蹄故俗云馬蹄香生山之陰水澤下濕地根似細辛白前等今俗以及己代之謬矣及己獨莖莖端四葉葉間白花殊無芳氣有毒服之令人吐唯療瘡疥不可亂杜衡也臣禹錫等謹按爾雅云杜土滷注杜衡也似葵而香山海經云天帝山有草狀如葵其臭如蘼蕪名曰杜衡可以走馬食之已癭郭璞注云帶之令人便馬或曰馬得之而健走藥性論云杜衡使能止氣奔喘促消痰飲破留血主項間瘤癭之疾圖經曰杜衡舊不著所出州土今江淮間皆有之苗葉都似細辛唯香氣小異而根亦粗黃白色葉似馬蹄故名馬蹄香三月三日採根熟洗曝乾謹按山海經云天帝之山有草狀如葵其臭如蘼蕪名曰杜衡可以走馬食之已癭郭璞注云帶之可以走馬或曰馬得之而健走爾雅謂之杜又名土滷然杜若亦名杜蘅或疑是杜若據郭叺璞注云似葵而香故知是此杜衡也今人用作浴湯及衣香甚佳衍義曰杜衡用根似細辛但根色白葉如馬蹄之下市者往往亂細辛須如此別之爾雅以謂似葵而香是也將杜衡與細辛相對便見真偽況細辛唯出華州者良杜衡其色黃白拳局而脆干則作團白薇味苦咸平大寒無毒主暴中風身熱肢滿忽忽不知人狂惑邪氣寒熱痠疼溫瘧洗洗發作有時療傷中淋露下水氣利陰氣益精一名白幕一名薇草一名春草一名骨美久服利人生平原川穀三月三日採根陰乾惡黃耆大黃大戟乾薑乾漆山茱萸大棗陶隱居云近道處處有根狀似牛膝而短小爾方家用多療驚邪風狂疰病臣禹錫等謹按藥性論云白薇臣能治忽忽睡不知人百邪鬼魅圖經曰白薇生平原川穀今陝西諸郡及滁舒潤遼州亦有之莖葉俱青頗類柳葉六七月開紅花八月結實根黃白色類牛膝而短小三月三日採根陰乾用今云八月採雷公云凡採得後用糯米泔汁浸一宿至明取出去髭了於槐砧上細銼蒸從巳至申出用菝蒲八切葜棄八切味甘平溫無毒主腰背寒痛風痹益血氣止小便利生山野二月八月採根曝乾陶隱居云此有三種大略根苗並相類菝葜莖紫短小多細刺小減萆薢而色深人用作飲唐本注云陶云三種相類非也萆薢有刺者葉粗相類根不相類萆薢細長而白菝葜根作塊結黃赤色殊非狗脊之流也臣禹錫等謹按日華子云治時疾瘟瘴葉治風腫止痛撲損惡瘡以鹽塗敷佳又名金剛根又名王瓜草圖經曰菝葜舊不載所出州土但云生山野今近京及江浙州郡多有之苗莖成蔓長二三尺有刺其葉如冬青烏藥葉又似菱葉差大秋生黃花結黑子櫻桃許大其根作塊赤黃色二月八月採根曝乾用江浙間人呼為金剛根浸赤汁以煮粉食云啖之可以闢瘴其葉以鹽搗敷風腫惡瘡等俗用有效田舍貧家亦取以釀酒以風毒腳弱痹滿上氣殊佳大青味苦大寒無毒主療時氣頭痛大熱口瘡三四月採莖陰乾陶隱居云療傷寒方多用此本經又無今出東境及近道長尺許紫莖除時行熱毒為良唐本注云大青用葉兼莖不獨用莖也臣禹錫等謹按藥性論云大青臣味甘能去大熱治溫疫寒熱日華子云治熱毒風心煩悶渴疾口乾小兒身熱疾風疹天行熱疾及金石藥毒兼塗罯腫毒圖經曰大青舊不載所出州土今江東州郡及荊南眉蜀濠淄諸州皆有之春生青紫莖似石竹苗葉花紅紫色似馬蓼亦似芫花根黃三月四月採莖葉陰乾用古方治傷寒黃汗黃疸等有大青湯又治傷寒頭身強腰脊痛葛根湯亦用大青大抵時疾藥多用之女萎味辛溫主風寒洒洒霍亂泄痢腸鳴遊氣上下無常驚癇寒熱百病出汗李氏本草云止下消食唐本注云其葉似白蘞蔓生花白子細荊襄之間名為女萎亦名蔓楚止痢有效用苗不用根與萎蕤全別今太常謬以為白頭翁者是也唐本先附圖經文具萎蕤條下雷公云凡採得陰乾去頭並白蕊於槐砧上銼拌豆淋酒蒸從巳至未出曬令乾用石香葇味辛香溫無毒主調中溫胃止霍亂吐瀉心腹脹滿臍腹痛腸鳴一名石蘇生蜀郡陵榮資簡州及南中諸處在山岩石縫中生二月八月採苗莖花實俱用今附衍義曰石香葇處處有之不必山岩石縫中但山中臨水附崖處或有之九月十月尚有花二十二種陳藏器余兜納香味甘溫無毒去惡氣溫中除暴冷廣志云生剽國魏略曰大秦國出兜納香海藥謹按廣志云生西海諸山味辛平無毒主惡瘡腫瘻止痛生肌併入膏用燒之能闢遠近惡氣帶之夜行壯膽安神與茅香柳枝合為湯浴小兒則易長風延母味苦寒無毒小兒發熱發強驚癇寒熱熱淋解煩利小便明目主蛇犬毒惡瘡癰腫黃疸並煮服之細葉蔓生纓繞草木南都賦云風衍蔓延于衡皋是也海藥謹按徐表南州記生南海山野中主三消五淋下痰小兒赤白毒痢蛇毒癉溪等毒一切瘡腫並宜煎服祗出南中諸無所出也耕香味辛溫無毒主臭鬼氣調中生烏滸國南方草木狀曰耕香莖生細葉大瓠藤水味甘寒無毒主煩熱止渴潤五臟利小便藤如瓠斷之水出生安南太康地記曰朱崖擔耳無水處種用此藤取汁用之海藥云謹按太原記云生安南朱崖上彼無水唯大瓠中有天生水味甘冷香美主解大熱止煩渴潤五臟利水道彼人造飲饌皆瓠也筋子根味苦溫無毒主心腹痛不問冷熱遠近惡鬼氣注刺痛霍亂蠱毒暴下血腹冷不調酒飲磨服生四明山苗高尺余葉圓厚光潤冬不凋根大如指亦名根子土芋味甘寒小毒解諸藥毒生研水服當吐出惡物盡便止煮食之甘美不飢厚人腸胃去熱嗽蔓如豆根圓如卵鶗鴂食後彌吐人不可食優殿味辛溫去惡氣溫中消食生安南人種為茹南方草木狀曰合浦有優殿人種之以豆醬汁食芳香好味土落草味甘溫無毒主腹冷疼氣痃癖作煎酒亦搗絞汁溫服葉細長生嶺南山谷土人服之㹿豬孝切菜味辛溫無毒主冷氣腹內久寒食飲不消令人能食字林曰㹿辛菜南人食之去冷氣必似勒味辛溫無毒主冷氣胃閉不消食心腹脹滿生崑崙似馬藺子胡南莽味甘溫去痃癖及冷氣止腹痛煮之生嶺南葉如地黃海蘊味鹹寒無毒主癭瘤結氣在喉間下水生大海中細葉如馬尾似海藻而短也百丈青味苦寒平無毒主解諸毒物天行瘴瘧疫毒並煮服亦生搗絞汁生江南林澤藤蔓緊硬葉如薯蕷對生根服令人下痢斫合子無毒主金瘡生膚止血搗碎敷瘡上葉主目熱赤挪碎滴目中云昔漢高帝戰時用此敷軍士金瘡故云斫合子籬落間藤蔓生至秋霜子如柳絮一名薰桑一名雞腸獨自草有大毒煎敷箭鏃人中之立死生西南夷中獨莖生續漢書曰出西夜國人中之輒死今西南夷獠中猶用此藥敷箭鏃解之法在拾遺石部鹽藥條中金釵股味辛平小毒解諸藥毒人中毒者煮汁服之亦生研更烈必大吐下如無毒亦吐去熱痰瘧瘴天行蠱毒喉閉生嶺南山谷根如細辛三四十莖一名三十根釵子股嶺南人用之博落回有大毒主惡瘡癭根瘤贅息肉白癜風蠱毒精魅溪毒以上瘡瘻者和百丈青雞桑灰等為末敷瘻瘡蠱毒精魅當有別法生江南山谷莖葉如蓖麻莖中空吹作聲如博落回折之有黃汁藥入立死不可入口也毛建草及子味辛溫有毒主惡瘡癰腫疼痛未潰煎搗葉敷之不得入瘡令人肉爛主瘧令病者取一握微碎縛臂上男左女右勿令近肉便即成瘡子和姜搗破破冷氣田野間呼為猴蒜生江東澤畔葉如芥而大上有毛花黃子如蒺藜又有建有毒生水旁葉似胡芹未聞余功大相似數低味甘溫無毒主冷風冷氣下宿食不消脹滿生西蕃北土亦無有似茴香胡人作羹食之仰盆味辛溫有小毒主蠱飛屍喉閉水磨服少許亦磨敷皮膚惡腫生東陽山谷苗似承露仙根圓如仰盆子大如雞卵離鬲草味辛寒有小毒主瘰癧丹毒小兒無辜寒熱大腹痞滿痰飲膈上熱生研絞汁服一合當吐出胸膈間宿物生人家階庭濕處高三二寸苗葉似冪䍥去瘧為上江東有之北土無廅藥味鹹溫無毒主折傷內損血瘀生膚止痛主產後血病治五臟除邪氣補虛損乳及水煮服之亦搗碎敷傷折處生胡國似干茅黃赤色
