body:
  text: 補注本草奏敕嘉祐二年八月三日詔朝廷纍頒方書委諸郡收掌以備軍民醫疾訪聞貧下之家難於檢用亦不能修合未副矜存之意今除在京已係逐年散藥外其三京並諸路自今每年京府節鎮及益並慶渭四州各賜錢二百貫余州軍監賜錢一百貫委長吏選差官屬監勒醫人體度時令按方合藥候有軍民請領畫時給付所有神農本草靈樞太素甲乙經素問之類及廣濟千金外臺祕要等方仍差太常少卿直集賢院掌禹錫職方員外郎祕閣校理林億殿中丞祕閣校理張洞殿中丞館閣校勘蘇頌同共校正聞奏臣禹錫等尋奏置局刊校並乞差醫官三兩人同共詳定其年十月差醫學秦宗古朱有章赴局祗應三年十月臣禹錫臣億臣頌臣洞又奏本草舊本經注中載述藥性功狀甚多疏略不備處已將諸家本草及書史中應系該説藥品功狀者採拾補注漸有次第及見唐顯慶中詔修本草當時修定注釋本經外又取諸般藥品繪畫成圖及別撰圖經等辨別諸藥最為詳備後來失傳罕有完本欲下諸路州縣應系産藥去處並令識別人仔細辨認根莖苗葉花實形色大小並蟲魚鳥獸玉石等堪入藥用者逐件畫圖並一一開説著花結實收採時月所用功效其番夷所産藥即令詢問榷場市舶商客亦依此供析並取逐味各一二兩或一二枚封角因入京人差齎送當所投納以憑照證畫成本草圖並別撰圖經所冀與今本草經並行使後人用藥知所依據奏可至四年九月又準敕差太子中舍陳檢同校正五年八月神注本草成書先上之十一月十五日準敕差光祿寺丞高保衡同共復校至六年十二月繕寫成版樣依舊並目録二十一卷仍賜名曰嘉祐補注神農本草嘉祐五年八月十二日進圖經本草奏敕嘉祐三年十月校正醫書所奏竊見唐顯慶中詔修本草當時修定注釋本經外又取諸藥品繪畫成圖別撰圖經辨別諸藥最為詳備後來失傳罕有完本欲望下應系産藥去處令識別人仔細詳認根莖苗葉花實形色大小並蟲魚鳥獸玉石等堪入藥用者逐件畫圖並一一開説著花結實收採時月及所用功效其番夷所産即令詢問榷場市舶商客亦依此供析並取逐味一二兩或一二枚封角因入京人差齎送當所投納以憑照證畫成本草圖並別撰圖經與今本草經並行使後人用藥有所依據奉詔旨宜令諸路轉運司指揮轄下州府軍監差逐處通判職官專切管句依應供申校正醫書所至六年五月又奏本草圖經系太常博士集賢校理蘇頌分定編撰將欲了當奉敕差知穎州所有圖經文字欲令本官一面編撰了當詔可其年十月編撰成書送本局修寫至七年十二月一日進呈奉敕鏤板施行證類本草校勘官敘政和六年七月二十九日奉敕校勘同校勘官太醫學內捨生編類聖濟經所點對方書官臣龔璧同校勘官登仕郎編類聖濟經所點對方書官臣丁阜同校勘官登仕郎編類聖濟經所點對方書官臣許璂同校勘官登仕郎編類聖濟經所點對方書官臣杜潤夫同校勘官翰林醫候入內內宿編類聖濟經所點對方書官臣朱永弼同校勘官翰林醫官編類聖濟經所點對方書官臣謝惇同校勘官奉議郎太醫學博士編類聖濟經所檢閲官臣劉植校勘官中衛大夫康州防禦使句當龍德宮總轄修建明堂所醫藥提舉入內醫官編類聖濟經提舉太醫學臣曹孝忠翰林學士宇文公書證類本草後唐慎微字審元成都華陽人貌寢陋舉措語言朴訥而中極明敏其治病百不失一語證候不過數言再問之輒怒不應其於人不以貴賤有所召必往寒暑雨雪不避也其為士人療病不取一錢但以名方祕録為請以此士人尤喜之每於經史諸書中得一藥名一方論必録以告遂集為此書尚書左丞蒲公傳正欲以執政恩例奏與一官拒而不受其二子五十一五十四偶忘其名及壻張宗説字岩老皆傳其藝為成都名醫元祐間虛中為兒童時先人感風毒之病審元療之如神又手緘一書約曰某年月日即啓封至期舊恙復作取所封開視之則所録三方第一療風毒再作第二療風毒攻注作瘡瘍第三療風毒上攻氣促欲作喘嗽如其言以次第餌之半月良愈其神妙若此皇統三年九月望成都宇文虛中書余讀沈明遠寓簡稱范文正公微時嘗慷慨語其友曰吾讀書學道要為宰輔得時行道可以活天下之命時不我與則當讀黃帝書深究醫家奧旨是亦可以活人也未嘗不三復其言而大其有濟世志又讀蘇眉山題東皋子傳後云人之至樂莫若身無病而心無憂我則無是二者然人之有是者接於豫前則豫安得全其樂乎故所至常蓄善藥有求者則與之而尤喜釀酒以飲客或曰子無病而多蓄藥不飲而多釀酒勞己以為人何哉豫笑曰病者得藥吾為之體輕飲者得酒吾為之酣適豈專以自為也亦未嘗不三復其言而仁其用心嗟乎古之大人君子之量何其弘也蓋士之生世唯當以濟人利物為事達則有達而濟人利物之事所謂執朝廷大政進賢退邪興利除害以澤天下是也窮則有窮而濟人利物之事所謂居閭里間傳道授學急難救疾化一鄉一邑是也要為有補於世有益於民者庶幾乎兼善之義顧豈以未得志也未得位也遽泛然忘斯世而棄斯民哉若夫醫者為切身一大事且有及物之功語曰人而無恆不可以作巫醫又曰子之所慎齋戰疾康子饋藥子曰丘未達不敢嘗余嘗論之是術也在吾道中雖名為方伎非聖人賢者所專精然舍而不學則於仁義忠孝有所缺蓋許世子止不先嘗藥春秋書以弒君故曰為人子者不可不知醫懼其忽於親之疾也況乎此身受氣於天地受形於父母自幼及老將以率其本然之性充其固有之心如或遇時行道使萬物皆得其所措六合於太和中以畢其為人之事而一旦有疾懵不知所以療之伏枕呻吟付之庸醫手而生死一聽焉亦未可以言智也故自神農黃帝雷公歧伯以來名卿才大夫往往究心於醫若漢之淳于意張仲景晉之葛洪殷浩齊之褚澄梁之陶弘景皆精焉唐陸贄斥忠州纂集方書而蘇沈二公良方至今傳世是則吾儕以從正講學余隙而於此乎搜研亦不為無用也余自幼多病數與醫者語故於醫家書頗嘗涉獵在淮陽時嘗手節本草一帙辨藥性大綱以為是書通天地間玉石草木禽獸蟲魚萬物性味在儒者不可不知又飲食服餌禁忌尤不可不察亦窮理之一事也後居大梁得間間趙公家素問善本其上有公標注夤緣一讀深有所得喪亂以來舊學蕪廢二書亦失去嘗謂他日安居講學論著外當留意攝生今歲遊平水會郡人張存惠魏卿介吾友弋君唐佐來言其家重刊證類本草已出及增入宋人寇宗奭衍義完焉新書求為序引因為書其後己酉中秋日雲中劉祁云泰和甲子下己酉歲初日辛卯刊畢
