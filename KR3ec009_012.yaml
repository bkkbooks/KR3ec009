body:
  text: 卷第十二己酉新增衍義桂味甘辛大熱有小毒主溫中利肝肺氣心腹寒熱冷疾霍亂轉筋頭痛腰痛出汗止煩止唾咳嗽鼻齆能墮胎堅骨節通血脈理疏不足宣導百藥無所畏久服神仙不老生桂陽二月八月十月採皮陰乾得人參麥門冬甘草大黃黃芩調中益氣得茈胡紫石英乾地黃療吐逆陶隱居云按本經唯有菌牡二桂而桂用體大同小異今俗用便有三種以半卷多脂者單名桂入藥最多所用悉與前說相應仙經乃並有三桂常服食以蔥涕合和雲母蒸化為水者正是此種爾今出廣州者好湘州始興桂陽縣即是小桂亦有而不如廣州者交州桂州者形段小多脂肉亦好經云桂葉如柏葉澤黑皮黃心赤齊武帝時湘州送樹以植芳林苑中今東山有桂皮氣粗相類而葉乖異亦能凌冬恐或是牡桂詩人多呼丹桂正謂皮赤爾北方今重此每食輒須之蓋禮所云薑桂以為芬芳唐本注菌桂葉似柿葉中有縱紋三道表裡無毛而光澤牡桂葉長尺許陶云小桂或言其葉小者陶引經云似柏葉驗之殊不相類不知此言從何所出今按桂有二種桂皮稍不同若菌桂老皮堅板無肉全不堪用其小枝薄卷及二三重者或名菌桂或名筒桂其牡桂嫩枝皮名為肉桂亦名桂枝其老者名木桂亦名大桂得人參等良本是菌桂剩出單桂條陶為深誤也今按陳藏器本草云菌桂牡桂桂心以上三色並同是一物按桂林桂嶺因桂為名今之所生不離此郡從嶺以南際海盡有桂樹唯柳象州最多味既辛烈皮又厚堅土人所採厚者必嫩薄者必老以老薄者為一色以厚嫩者為一色嫩既辛香兼又筒卷老必味淡自然板薄板薄者即牡桂也以老大而名焉筒卷者即菌桂也以嫩而易卷古方有筒桂字似菌字後人誤而書之習而成俗至於書傳亦復因循桂心即是削除皮上甲錯取其近里辛而有味臣禹錫等謹按蜀本注云按此有三種菌桂葉如柿葉牡桂葉似枇杷葉此乃云葉如柏葉蘇以桂葉無似柏葉者乃云陶為深誤剩出此條今據陶注云菌桂正圓如竹三重者良牡桂皮薄色黃多脂肉氣如木蘭味亦辛此桂則是半卷多脂者此云仙經有三桂以蔥涕合和雲母蒸化為水服之此則有三種明矣陶又云齊武帝時湘州得樹以植芳林苑中陶隱居雖是梁武帝時人實生自宋孝武建元三年歷齊為諸王侍讀故得見此樹而言也蘇恭但只知有二種亦不能細尋事蹟而云陶為深誤何臆斷之甚也抱朴子云桂可以竹瀝合餌之亦可以龜腦和服之藥性論云桂心君亦名紫桂殺草木毒忌生蔥味苦辛無毒主治九種心痛殺三蟲主破血通利月閉治軟腳痹不仁治胞衣不下除咳逆結氣壅痹止腹內冷氣痛不可忍主下痢治鼻息肉日華子云桂心治一切風氣補五勞七傷通九竅利關節益精明目暖腰膝破痃癖癥瘕消瘀血治風痹骨節攣縮續筋骨生肌肉圖經曰菌桂生交趾山谷牡桂生南海山谷桂生桂陽舊經載此三種之異性味功用亦別而爾雅但言梫木桂一種郭璞云南人呼桂厚皮者為木桂蘇恭以謂牡桂即木桂及單名桂者是也今嶺表所出則有筒桂肉桂桂心官桂板桂之名而醫家用之罕有分別者舊說菌桂正圓如竹有二三重者則今所謂筒桂也筒菌字近或傳寫之誤耳或云即肉桂也牡桂皮薄色黃少脂肉氣如木蘭味亦相類削去皮名桂心今所謂官桂疑是此也桂是半卷多脂者今所謂板桂疑是此也今觀賓宜韶欽諸州所圖上者種類亦各不同然皆題曰桂無復別名參考舊注謂菌桂葉似柿葉中有三道紋肌理緊薄如竹大枝小枝皮俱是筒與今賓州所出者相類牡桂葉狹於菌桂而長數倍其嫩枝皮半卷多紫與今宜州韶州者相類彼土人謂其皮為木蘭皮肉為桂心此又有黃紫兩色益可驗也桂葉如柏葉而澤黑皮黃心赤今欽州所出者葉密而細亦恐是其類但不作柏葉形為疑耳皮厚者名木桂即板桂是也蘇恭以牡桂與單名桂為一物亦未可據其木俱高三四丈多生深山蠻洞中人家園圃亦有種者移植於嶺北則氣味殊少辛辣固不堪入藥也三月四月生花全類茱萸九月結實今人多以裝綴花果作筵具其葉甚香可用作飲香尤佳二月八月採皮九月採花並陰乾不可近火中品又有天竺桂云生西胡國功用似桂不過烈今亦稀有故但附於此張仲景治傷寒用桂枝湯甲乙經治陰受病發痹內尉方用醇酒二十斗蜀椒一斗乾薑一斗桂一斗凡四物㕮咀著清酒中綿絮一斤細白布四丈皆並內酒中置馬矢熅中善封塗勿使泄氣五日五夜出布綿絮曝乾復漬之以盡其汁每漬必其日乃出布綿干之並用滓與絮復布為巾其布長六七尺為六七巾即用之生桑炭炙巾以尉寒痹所刺之處令熱入至於病所寒復炙巾以尉之三十遍而止汗出炙巾以拭身亦三十遍而止起步內無見風每刺必尉如此病已矣此所謂內尉也又治躄筋急亦以白酒和桂塗之續傳信方造桂漿法夏月飲之解煩渴益氣消痰桂末二大兩白蜜一升以水二斗先煎取一斗待冷入新瓷瓶中後下二物攪二三百轉令勻先以油單一重覆上加紙七重以繩封之每日去紙一重七日開之藥成氣香味美格韻絶高今人亦多作故並著其法雷公云凡使勿薄者要紫色厚者去上粗皮取心中味辛者使每斤大厚紫桂只取得五兩取有味厚處生用如末用即用重密熟絹並紙裹勿令犯風其州土只有桂草元無桂心用桂草煮丹陽木皮遂成桂心凡使即單搗用之聖惠方治風頭痛每欲天陰雨風先發者用桂心一兩為末以酒調如膏用敷頂上並額角又方治九種心痛妨悶用桂心一分為末以酒一大盞煎至半盞去滓稍熱服立效又方治寒疝心痛四肢逆冷全不欲食用桂心二兩去皮搗羅為散不計時候熱酒調下一錢匕又方治産後惡血衝心痛氣悶欲絶用桂心三兩搗羅為散狗膽汁和丸如櫻桃大不計時候用熱滴磨下二丸外臺祕要療小兒睡中遺尿不自覺桂末雄雞肝等分搗丸服如小豆大溫水下日三千金方治中風面目相引偏僻牙車急舌不可轉桂心以酒煮取汁故布蘸㩉病上正即止左喎㩉右右喎㩉左常用大效又方大治失音末桂著舌下漸咽汁又方治卒中惡心痛桂心八分㕮咀以水四升煮取一升分二服肘後方治卒心痛桂心八兩㕮咀水四升煮取一升分三服又方治心腹俱脹痛短氣欲死或已絶桂二兩切以水一升二合煮取八合去滓頓服無桂用乾薑亦得又方治中風四肢逆冷吐清水宛轉啼呼者取二兩㕮咀以水三升煮取二升去滓適寒溫盡服又方治反腰有血痛搗桂篩三升許以苦酒和塗痛上干復塗葛氏方治卒吐血桂屑方寸匕晝夜含二十許服亦療下血大神驗千金方同又方治産後腹中瘕痛末桂溫酒服方寸匕日三子母祕録同孫真人食忌治中風失音方桂一尺以水三升煎取一升服取汗又方治唾血取桂心搗作末以水下方寸匕梅師方蜀椒閉口者有毒誤食之便氣欲絶或下白沫身體冷急煎桂汁服之多飲冷水一二升忽食飲吐漿煎濃豉汁服之又方治卒外腎偏腫疼痛方桂心末和水調方寸匕塗之又方治産後血泄不禁止余血彌痛兼塊桂心乾薑等分為末空心酒調服方寸匕斗門方治中風失音用桂心一兩去其粗皮近人身體懷之至兩時辰許為末分為三服每服用水二盞煎取一盞服之瘥大妙聖惠方同姚和衆方治小兒臍腫取桂心炙令熱尉之日可四五度抱朴子云桂可以合蔥涕蒸作水亦可以竹瀝合餌之亦可以龜腦和而服之七年能步行水上長生不死又云趙他子服桂二十年足下毛生日行五百里力舉千斤衍義曰桂大熱素問云辛甘發散為陽故漢張仲景桂枝湯治傷寒表虛皆須此藥是專用辛甘之意也本草第一又云療寒以熱藥故知三種之桂不取菌桂牡桂者蓋此二種性止溫而已不可以治風寒之病獨有一字桂本經言甘辛大熱此正合素問辛甘發散為陽之說尤知菌牡二桂不及也然本經只言桂仲景又言桂枝者蓋亦取其枝上皮其木身粗厚處亦不中用諸家之說但各執己見終無證據今又之官桂不知緣何而立名慮後世為別物故書之又有桂心此則諸桂之心不若一字桂也牡桂味辛溫無毒主上氣咳逆結氣喉痹吐吸心痛脅風脅痛溫筋通脈止煩出汗利關節補中益氣久服通神輕身不老生南海山谷陶隱居云南海郡即是廣州今俗用牡桂狀似桂而扁廣殊薄皮色黃脂肉甚少氣如木蘭味亦類桂不知當是別樹為復猶是桂生有老宿者爾亦所未究唐本注云爾雅云梫音寢木桂古方亦用木桂或云牡桂即今木桂及單名桂者是也此桂花子與菌桂同唯葉倍長大小枝皮俱名牡桂然大枝皮肉理粗虛如木肉少味薄不及小枝皮肉多半卷中必皺起味辛美一名肉桂一名桂枝一名桂心出融州桂州交州甚良臣禹錫等謹按蜀本圖經云葉狹長於菌桂葉一二倍其嫩枝皮半卷多紫肉中皺起肌理虛軟謂之桂枝又名肉桂削去上皮名曰桂心藥中以此為善其厚皮者名曰木桂二月八月採皮曬乾之爾雅疏云梫一名木桂郭云今南人呼桂厚皮者為木桂桂樹葉似枇杷而大白華華而不著子叢生岩嶺枝葉冬夏常青間無雜木本草謂之牡桂是也藥性論云牡桂君味甘辛能去冷風疼痛圖經文具桂條下經驗後方治大人小兒吃雜果子多腹脹氣急方取肉桂碾末飯丸如緑豆大小兒熟水下五丸大人十丸未痊再服菌桂味辛溫無毒主百病養精神和顏色為諸藥先聘通使久服輕身不老面生光華媚好常如童子生交址桂林山谷岩崖間無骨正圓如竹立秋採陶隱居云交址屬交州桂林屬廣州而蜀都賦云菌桂臨崖俗中不見正圓如竹者唯嫩枝破捲成圓猶依桂用非真菌桂也仙經乃有用菌桂云三重者良則明非今桂矣必當別是一物應更研訪唐本注云菌者竹名古方用筒桂者是故云三重者良其筒桂亦有二三重卷者葉似柿葉中三道紋肌理緊薄如竹大枝小枝皮俱是菌然大枝皮不能重卷味極淡薄不入藥用今唯出韶州目禹錫等謹按蜀本圖經云葉似柿葉而尖狹光淨花白蕊黃四月開五月結實樹皮青黃薄卷若筒亦名筒桂厚硬味薄者名板桂又不入藥用三月七月採皮曬乾圖經文具桂條下列仙傳范蠡好食桂飲水討藥人世世見之又曰桂父象林人常服桂皮葉以龜腦和服之韓終採藥詩暗河之桂實大如栗得而食之後天而老別說云謹按諸家所說桂之異同幾不可用考今交廣商人所販及醫家見用唯陳藏器一說最近然筒厚實氣味重者宜入治臟及下焦藥輕薄者宜入治頭目發散藥故本經以菌桂養精神以牡桂利關節仲景傷寒論發汗用桂枝桂枝者枝條非身干也取真輕薄而能發散今又有一種柳桂及桂之嫩小枝條也尤宜入治上焦藥用也松脂味苦甘溫無毒主疽惡瘡頭瘍白禿疥瘙風氣安五臟除熱胃中伏熱咽乾消渴及風痹死肌煉之令白其赤者主惡痹久服輕身不老延年一名松膏一名松肪生太山山谷六月採松實味苦溫無毒主風痹寒氣虛羸少氣補不足九月採陰乾松葉味苦溫主風濕瘡生毛髮安五臟守中不飢延年臣禹錫等謹按日華子云松葉無毒松節溫主百節久風風虛腳痹疼痛松根白皮主辟穀不飢陶隱居云採煉松脂法並在服食方中以桑灰汁或酒煮軟挪內寒水中數十過白滑則可用其有自流出者乃勝於鑿樹及煮用膏也其實不可多得唯葉只是斷谷所宜細切如粟以水及面飲服之亦有陰乾搗為屑丸服者人患惡病服此無不瘥比來苦腳弱人釀松節酒亦皆愈松柏皆有脂潤又凌冬不凋理為佳物但人多輕忽近易之爾唐本注云松花名松黃拂取似蒲黃正爾酒服身輕療病云勝皮葉及脂其子味甚甘經直云味苦非也松取枝燒其上下承取汁名𣿉音詣主牛馬瘡疥佳樹皮緑衣名艾蒳合和諸香燒之其煙團聚青白可愛也臣禹錫等謹按藥性論松脂使味甘平殺蟲用之主耳聾牙有蚛孔少許咬之不落蟲自死能貼諸瘡膿血煎膏生肌止痛抽風蕭炳云又有五葉者一叢五葉如叉名五粒松道家服食絶粒子如巴豆新羅往往進之日華子云松脂潤心肺下氣除邪煎膏治瘻爛排膿又云松葉暖無毒灸罯凍瘡風濕瘡佳又云松節無毒治腳軟骨節風又云松根白皮味苦溫無毒補五勞益氣圖經曰松脂生泰山山谷今處處有之其用以通明如薰陸香顆者為勝道人服餌或合茯苓松柏實菊花作丸皆先煉治其法用大釜加水置甑用白茅藉甑底又加黃砂於茅上厚寸許可矣然後布松脂於上炊以桑薪湯減即添熱水常令滿候松脂盡入釜中乃出之投於冷水既凝又蒸如此三過其白如玉然後入藥亦可單服其實及根白皮古亦有服食法但今松實多作果品余不聞堪入藥其花上黃粉名松黃山人及時拂取作湯點之甚佳但不堪停久故鮮用寄遠燒其枝上下承取汁液名松𣿉音詣主牛馬瘡皮上緑衣名艾蒳香用合諸香燒之其煙不散方書言松為五粒字當讀為鬣音之誤也言每五鬣為一葉或有兩鬣七鬣者松歲久則實繁中原雖有然不及塞上有佳好也中品有墨條不載所出州郡然亦出於松故附見於此聖惠方絶谷升仙不食法取松實搗為膏酒調下三錢日三則不飢渴飲水勿食他物百日身輕日行五百里又方服松葉令人不老身生緑毛輕身益氣久服不已絶谷不飢渴松葉不以多少細切更研每日食前以酒調下二錢亦可粥汁服之初服稍難久自便矣又方治牙齦歷蟲齒根暗黑用松節燒灰揩之神效又方治一切瘻煉成松脂末填瘡孔令滿日三四度用之又方神仙餌松實用七月取松實過時即落難收去木皮搗如膏每服如雞子大日三服服及百日身輕三百日日行五百里絶谷久服升仙渴即飲水亦可以煉了松脂同服之外臺祕要集驗療齲齒取松脂鋭如錐紝齲孔內須臾齲蟲緣松脂出梅師方同又方治惡風疾松脂煉投冷水中二十遍蜜丸服二兩飢即服之日三鼻柱斷離者二百日瘥斷鹽及房室又方療歷節諸風百節痠痛不可忍松脂三十斤煉五十遍不能五十遍亦可二十遍用以煉酥三升溫和松脂三升熟攪令極稠旦空腹以酒服方寸匕日三數食麵粥為佳慎血腥生冷酢物果子一百日瘥又方松節酒主歷節風四肢疼痛如解落松脂二十斤酒五斗漬三七日服一合日五六服千金方治腳氣十二風痹不能行服更生散數劑及衆療不得力服此一劑更能行遠不過兩劑松葉酒松葉六十斤細銼㕮咀以水四石煮取四斗九升以釀五斗米如常法別煮松葉汁以漬米並饙飯泥釀封頭七日發澄飲之取醉得此酒力者甚衆又方治歷節風松葉搗取一升以酒三升浸七日服一合日三服又方治口喎青松葉一斤搗令汁出精酒一升浸二宿近火一宿初且半升漸至一升頭面汗即止又方治三年中風不效者松葉一斤細切之以酒一斗煮取三升頓服取汗出立瘥千金翼若齒黑以松末灰揩之末雄黃塗齦上百日神效梅師方治耳久聾松脂三兩煉巴豆一兩相和熟搗可丸通過以薄綿裹內耳孔中塞之日一度易孫尚藥治腳轉筋疼痛攣急者松節一兩細銼如米粒乳香一錢右件藥用銀石器內慢火炒令焦只留一二分性出火毒研細每服一錢至二錢熱木瓜酒調下應是筋病皆治之兵部手集療刺入肉疼悶百理不瘥方松脂流出如細乳頭香者敷瘡上以帛裹三五日當有根出不痛不癢不覺自落鬼遺方治疥癬松膠香研細約酌入少輕粉袞令勻凡疥癬上先用油塗了錯末一日便乾頑者三兩度傷寒類要治天行病闢溫方切松葉如米酒服方寸匕日三闢五年瘟抱朴子趙瞿病癩歷年醫不瘥家乃齎糧棄送于山穴中瞿自怨不幸悲嘆涕泣經月有仙人經穴見之哀之具問其詳瞿知其異人也叩頭自陳乞命於是仙人取囊中藥賜之教其服百餘日瘡愈顏色悅肌膚潤仙人再過視之瞿謝活命之恩乞遺其方仙人曰此是松脂彼中極多汝可煉服之長服身轉輕力百倍登危涉險終日不困年百歲齒不墮發不白夜臥常見有光大如鏡列仙傳偓佺好食松實能飛行健走及馬以松子遺堯堯不能服松者樠松也野人閒話伏虎尊師篇煉松脂法十斤松脂五度以水煮過令苦味盡取得後每一斤煉了松脂入四兩茯苓末每晨水下一刀圭即終年不食而復延齡身輕清爽衍義曰松黃一如蒲黃但其味差淡治産後壯熱頭痛頰赤口乾唇焦多煩燥渴昏悶不爽松花川芎當歸石膏蒲黃五物等同為末每服二錢水二合紅花二捻同煎七分去滓粥後溫溫細呷松子多海東來今關右亦有但細小味薄與柏子仁同治虛祕槐實味苦酸咸寒無毒主五內邪氣熱止涎唾補絶傷五痔火瘡婦人乳瘕子臟急痛以七月七日取之搗取汁銅器盛之日煎令可作丸大如鼠屎內竅中三易乃愈又墮胎久服明目益氣頭不白延年枝主洗瘡及陰囊下濕癢皮主爛瘡根主喉痹寒熱生河南平澤可作神燭景天為之使陶隱居云槐子以相連多者為好十月巳日採之新盆盛合泥百日皮爛為水核如大豆服之令腦滿發不白而長生今處處有此云七月取其子未堅故搗絞取汁唐本注云別録云八月斷槐大枝使生嫩孽煮汁釀酒療大風痿痹甚效槐耳味苦辛平無毒主五痔心痛婦人陰中瘡痛槐樹箘也當取堅如桑耳者枝炮尉止蠍毒臣禹錫等謹按爾雅云櫰槐大葉而黑守宮槐葉晝聶宵炕釋曰櫰槐一也大葉而黑名櫰不爾即名槐又曰槐葉晝合夜開者別名守宮槐聶合也炕張也藥性論云槐子臣主治大熱難産皮煮汁淋陰囊墜腫氣痛又云槐白皮味苦無毒能主治口齒風疳䘌血以煎漿水煮含之又煎淋浴男子陰疝卵腫陳藏器云槐實本功外殺蟲去風合房折取陰乾煮服味一如茶明目除熱淚頭腦心胸間熱風煩悶風眩欲倒心頭吐涎如醉漾漾如船車上者花堪染黃子上房七月收之染皂木為灰長毛髮日華子云槐子治丈夫女人陰瘡濕癢催生吞七粒又云槐皮草治中風皮膚不仁喉痹浸洗五痔並一切惡瘡婦人産門癢痛及湯火瘡煎膏止痛長肉消癰腫圖經曰槐實生河南平澤今處處有之其木有極高大者謹按爾雅槐有數種葉大而黑者名櫰槐晝合夜開者名守宮槐葉細而青緑者但謂之槐其功用不言有別四月五月開花六月七月結實七月七日採嫩實搗取汁作煎十月採老實入藥皮根採無時今醫家用槐者最多春採嫩枝煅為黑灰以揩齒去蚛燒青枝取瀝以塗癬取花之陳久者篩末飲服以治下血折取嫩房角作湯以當茗主頭風明目補腦煮白皮汁以治口齒及下血水吞黑子以變白髮木上耳取末服方寸匕治大便血及五痔脫肛等皆常用有殊效者葛洪著扁鵲明目使發不落方十月上巳日取槐子去皮內新罌中封口三七日初服一枚再二枚至十日十枚還從一枚始大良劉禹錫傳信方著硤州王及郎中槐湯灸痔法以槐枝濃煎湯先洗痔便以艾灸其上七壯以知為度及早充西川安撫使判官乘騾入駱谷及宿有痔疾因此大作其狀如胡瓜貫於腸頭熱如煻灰火至驛僵仆主郵吏云此病某曾患來須灸即瘥及命所使作槐湯洗熱瓜上令用艾灸至三五壯忽覺一道熱氣入腸中因大轉瀉先血後穢一時至痛楚瀉後遂失胡瓜所在登騾而馳雷公云凡採得後去單子並五子者只取兩子三子者凡使用銅錘捶之令破用烏牛乳浸一宿蒸過用食療主邪氣難産絶傷春初嫩葉亦可食主癮疹牙齒諸風疼外臺祕要療蛔蟲心痛取槐樹上木耳燒灰末如棗許正發和水服若不止飲熱水一升蛔蟲出千金方療胎赤眼取槐木枝如馬鞭大長二尺作二段齊頭麻油一匙置銅鉢中旦使童子一人以其木研之至瞑止令仰臥以塗向眼眥日三度瘥又方療痔七月七日採槐子熟搗絞取汁內銅器中盛宅中高門上曝之二十日以上煎成取鼠糞大納穀道中日三亦主瘻百種瘡又方古方明目黑髮槐子於牛膽中漬陰乾百日食後吞一枚十日身輕三十日白髮黑百日內通神又方治九種心痛當太歲上取新生槐枝一握去兩頭水三大升煮取一升頓服又方治鼻氣窒塞以水五升煮槐葉取三升下蔥豉調和再煎飲千金翼治蠼螋瘡槐白皮醋浸半日洗之及諸惡瘡肘後方治內瘻用槐白皮搗丸綿裹納下部中得效又方療腸痔每大便常下血槐樹上木耳取末飲服方寸匕日三服百一方治中風身直不得屈伸反復者取槐皮黃白者切之以酒或水六升煮取二升去滓適寒溫稍稍服之經驗方治野雞痔用槐柳枝煎湯洗痔上便以艾灸之七壯又方治下血槐花荊芥穗等分為末酒調下一錢匕梅師方治崩中或赤白不問年月遠近取槐枝燒灰食前酒下方寸匕又方治痔有蟲咬穀道癢或下膿血多取槐白皮濃煮汁安盆坐湯之虛其穀道令更暖良久欲大便當蟲出不過三度即愈如用末綿裹納下部食醫心鏡治野雞痔下血腸風明目方嫩槐葉一斤蒸如造炙法取葉碾作末如茶法煎呷之廣利方治妊娠難産令易方水吞槐子七枚即出廣濟方療牙齒疼痛取槐樹白皮一握切以酪一升煮去滓用鹽少許適寒溫含之日三易之必效方療陰瘡及濕癢槐樹北面不見日處一大握水二升煮取一升洗之三五遍冷復暖若涉遠恐衝風即以米粉粉之即效張文仲療腸痔方槐樹上耳搗末米飲服方寸匕日三又槐白皮一擔銼以水煮令濃脫衣入水中坐冷更易不過三用蟲出止傷寒類要大熱心悶者槐子燒末酒服方寸匕子母祕録日月未足而欲産者槐樹東枝令孕婦手把即易産産寶療崩中不止不間年月遠近方槐耳燒作灰為末以酒服方寸匕太清草木方槐者虛星之精以十月上巳日採子服之去百病長生通神衍義曰槐實只言實今當分為二實本出莢中若搗莢作煎者當言莢也莢中子大如豆堅而紫色已者實也今本條不析出莢與莢中子蓋其用各別皆疏導風熱槐膠主一切風化涎治肝臟風筋脈抽掣及急風口噤或四肢不收頑痹或毒風周身如蟲行或破傷風口眼喎斜腰脊強硬任作湯散丸煎雜諸藥用之亦可水煮和諸藥為丸及作下藥新定槐花味苦平無毒治五痔心痛眼赤殺臟藏蟲及熱治皮膚風並腸風瀉血赤白痢並炒服葉平無毒煎湯治小兒驚癇壯熱疥癬及疔腫皮莖同用新補見日華子圖經文具槐實條下簡要濟衆治婦人漏下血不絶槐花鵝不以多少燒作灰細研食前溫酒服二錢匕衍義曰槐花今染家亦用收時折其未開花煮一沸出之釜中有所澄下稠黃滓滲漉為餅染色更鮮明治腸風熱瀉血甚佳不可過劑枸杞味苦寒根大寒子微寒無毒主五內邪氣熱中消渴周痹風濕下胸脅氣客熱頭痛補內傷大勞噓吸堅筋骨強陰利大小腸久服堅筋骨輕身不老耐寒暑一名杞根一名地骨一名枸忌一名地輔一名羊乳一名卻暑一名仙人杖一名西王母杖生常山平澤及諸丘陵阪岸冬採根春夏採葉秋採莖實陰乾陶隱居云今出堂邑而石頭烽火樓下最多其葉可作羹味小苦俗諺云去家千里勿食籮摩枸杞此言其補益精氣強盛陰道也籮摩一名苦丸葉厚大作藤生摘之有白乳汁人家多種之可生啖亦蒸煮食也枸杞根實為服食家用其說甚美仙人之杖遠有旨乎臣禹錫等謹按爾雅疏云杞一名枸檵郭云今枸杞也詩四牡云集於苞杞陸機云一名苦杞一名地骨春生作羹茹微苦其莖似莓子秋熟正赤莖葉及子服之輕身益氣爾抱朴子云家柴一名托盧或名天精或名卻老或名地骨藥性論云枸杞臣子葉同說味甘平能補益精諸不足易顏色變白明目安神令人長壽葉和羊肉作羹益人甚除風明目若渴可煮作飲代茶飲之白色無刺者良與乳酪相惡發熱諸毒煩悶可單煮汁解之能消熱面毒又根皮細銼面拌熟煮吞之主治腎家風良又益精氣法取葉上蟲窠子曝乾為末入乾地黃中為丸益陽事主患眼風障赤膜昏痛取葉搗汁注眼中妙日華子云地仙苗除煩益志補五勞七傷壯心氣去皮膚骨節間風消熱毒散瘡腫即枸杞也圖經曰枸杞生常山平澤及丘陵阪岸今處處有之春生苗葉如石榴葉而軟薄堪食俗呼為甜菜其莖幹高三五尺作叢六月七月生小紅紫花隨便結紅實形微長如棗核其根名地骨春夏採葉秋採莖實冬採根謹按爾雅云杞枸檵郭璞云今枸杞也詩小雅四牡云集於苞杞陸機疏云一名苦杞一名地骨春生作羹茹微苦其莖似莓子秋熟正赤莖葉及子服之輕身益氣淮南枕中記著西河女子服枸杞法正月上寅採根二月上卯治服之三月上辰採莖四月上巳治服之五月上午採葉六月上未治服之七月上申採花八月上酉治服之九月上戌採子十月上亥治服之十一月上子採根十二月上醜治服之又有並花實根莖葉作煎及單笮子汁煎膏服之其功並等今人相傳謂枸杞與枸棘二種相類其實形長而枝無刺者真枸杞也圓而有刺者枸棘也枸棘不堪入藥而下品溲音搜疏條注李當之云子似枸杞冬月熟色赤味甘苦蘇恭云形似空疏木高丈許白皮其子七月八月熟似枸杞子味甘而兩兩相併今注云雖相似然溲疏有刺枸杞無刺以此為別是三物相似而二物又有刺溲疏亦有巨骨之名如枸杞謂之地骨當亦相類用之宜細辨耳或云溲疏以高大為別是不然也今枸杞極有高大者其入藥乃神良世傳蓬萊縣南丘村多枸杞高者一二丈其根蟠結甚固故其鄉人多壽考亦飲食其水土之品使然耳潤州州寺大井旁生枸杞亦歲久故土人目為枸杞井云飲其水甚益人溲疏生熊耳川穀及田野丘墟地四月採古今方書鮮見用者當亦難別耳又按枸杞一名仙人杖而陳藏器拾遺別有兩種仙人杖一種是枯死竹竿之色黑者一種是菜類並此為三物而同一名也陳子昂觀玉篇云余從補闕喬公北征夏四月次於張掖河洲草木無他異唯有仙人杖往往叢生豫昔嘗餌之此役也息意滋味戍人有薦嘉蔬者此物存焉因為喬公唱言其功時東萊王仲烈亦同旅聞之喜而甘心食之旬有五日行人有自謂知藥者謂喬公曰此白棘也仲烈遂疑曰吾亦怪其味甘喬公信是言乃譏豫豫因作觀玉篇按此仙人杖作菜茹者葉似苦苣白棘木類何因相似而致疑如此或曰喬公所謂白棘當是枸棘枸棘是枸杞之有針者而本經無白棘之別名又其味苦仙人杖味甘設疑為枸棘枸棘亦非甘物乃知草木之類多而難識使人惑疑似之言以真為僞失青黃甘苦之別而至於是宜乎子昂論著之詳也雷公云凡使根掘得後使東流水浸以物刷上土了然後待乾破去心用熟甘草湯浸一宿然後焙乾用其根若似物命形狀者上春食葉夏食子秋冬食根並子也食療寒無毒葉及子並堅筋能老除風補益筋骨能益人去虛勞根主去骨熱消渴葉和羊肉作羹尤善益人代茶法煮汁飲之益陽事能去眼中風癢赤膜搗葉汁點之良又取洗去泥和麵拌作飲煮熟吞之去腎氣尤良又益精氣聖惠方枸杞子酒主補虛長肌肉益顏色肥健人能去勞熱用生枸杞子五升好酒二斗研搦勿碎浸七日漉去滓飲之初以三合為始後即任性飲之外臺祕要同千金方治齒疼煮枸杞汁含之又方治肝虛或當風眼淚等新病方枸杞子取肥者二升搗破內絹袋置罐中以酒一斗浸訖密封勿泄氣三七日每旦飲之任性勿醉又方治虛勞客熱用枸杞根末調服有固疾人不得吃肘後方治大赫瘡此患急宜防毒氣入心腹飲枸杞汁至瘥又方療目熱生膚赤白眼搗枸杞汁洗目五七度又方犬食馬肉生狂方忽鼻頭燥眼赤不食避人藏身皆欲發狂便宜枸杞汁煮粥飼之即不狂若不肯食糜以鹽塗其鼻既舐之則欲食矣經驗方金髓煎枸杞子不計多少逐日旋採摘紅熟者去嫩蒂子揀令潔淨便以無灰酒於淨器浸之須是甕用酒浸以兩月為限用蠟紙封閉緊密無令透氣候日數足漉出於新竹器內盛貯旋於沙盆中研令爛細然後以細布濾過候研濾皆畢去滓不用即並前漬藥酒及濾過藥汁攪勻量銀鍋內多少升斗作番次慢火熬成膏切須不住手用物攪恐黏底不勻候稀稠得所待冷用淨瓶器盛之勿令泄氣每早辰溫酒下二大匙頭夜臥服之百日中身輕氣壯積年不廢可以羽化經驗後方治五勞七傷庶事衰弱枸杞葉半斤切粳米二合以豉汁中相和煮作粥以五味末蔥白等調和食之又方變白輕身枸杞子二升十月壬癸日採採時面東摘生地黃汁三升以好酒二升於瓷瓶內浸二十一日了開封添地黃汁同浸攪之卻以紙三重封其頭了更浸候至立春前三十日開瓶空心暖飲一杯至立春後髭鬢卻黑勿食蕪荑蔥服之耐老輕身無比孫真人備急方治滿口齒有血枸杞和根苗煎湯食後吃又治骨䐬風經驗後方同兵部手集療眼暴赤痛神效枸杞汁點眼立驗沈存中方陝西枸杞長一二丈其圍數寸無刺根皮如厚朴甘美異於諸處生子如櫻桃全少核曝乾如餅極爛有味外臺祕要療眼暴天行腫癢痛地骨皮三斤水三斗煮取三升絞去滓更納鹽一兩煎取二升敷目或加乾薑二兩治疽凡患癰疽惡瘡出膿血不止者取地骨皮不拘多少淨洗先刮上面粗皮留之再刮取細白穰取粗皮同地骨一處煎湯淋洗病令膿血淨以細穰貼之立效有一朝士腹脅間病疽經歲不瘥人燒灰敷貼之初淋洗出血一二升其家人輩懼欲止病者曰疽似少寬更淋之再用五升許血漸淡遂止以細穰貼之次日結痂遂愈別說云枸棘亦非甘物今按諸文所說名極多故使人疑然比物用甚衆花小而紅紫色採時七月上申日圖經所說實形長而枝無刺者真枸杞也此別是一種類必多根而致疑又用根去上浮粗皮一重近白者一重色微紫極薄陰乾治金瘡有神驗衍義曰枸杞當用梗皮地骨當用根皮枸杞子當用其紅實是一物有三用其皮寒根大寒子微寒亦三等此正是孟子所謂性由杞柳之杞後人徒勞分別又為之枸棘茲強生名耳凡杞未有無棘者雖大至有成架然亦有棘但此物小則多刺大則少刺還如酸棗及棘其實皆一也今人多用其子直為補腎藥是曾未考究經意當更量其虛實冷熱用之柏實味甘平無毒主驚悸安五臟益氣除風濕痹療恍惚虛損吸吸歷節腰中重痛益血止汗久服令人潤澤美色耳目聰明不飢不老輕身延年生太山山谷柏葉尤良柏葉味苦微溫無毒主吐血衄血痢血崩中赤白輕身益氣令人耐寒暑去濕痹止飢四時各依方面採陰乾柏白皮主火灼爛瘡長毛髮牡蠣及桂瓜子為之使畏菊花羊蹄諸石及面曲陶隱居云柏葉實亦為服餌所重服餌別有法柏處處有當以太山為佳並忌取冢墓上者雖四時俱有秋夏為好其脂亦入用此云惡曲人有以釀酒無妨恐酒米相和異單用也唐本注云柏枝節煮以釀酒主風痹歷節風燒取𣿉療瘑疥及癩瘡良今子仁唯出陝州宜州為勝太山無復採者臣禹錫等謹按蜀本圖經云此用偏葉者今所在皆有八月收子葉余採無時藥性論云柏子仁君惡菊花畏羊蹄草味甘辛能治腰腎中冷膀胱冷膿宿水興陽道益壽去頭風治百邪鬼魅主小兒驚癇又云側柏葉君與酒相宜止尿血味苦辛性澀能治冷風歷節疼痛日華子云柏子仁治風潤皮膚此是側柏子入藥微炒用又云柏葉灸罯凍瘡燒取汁塗頭黑潤鬢髮又云柏白皮無毒圖經曰柏實生泰山山谷今處處有之而乾州者最佳三月開花九月結子候成熟收採蒸曝乾春礧取熟仁子用其葉名側柏密州出者尤佳雖與他柏相類而其葉皆側向而生功效殊別採無時張仲景方療吐血不止者柏葉湯主之青柏葉一把乾薑三片阿膠一挺炙三味以水二升煮一升去滓別絞馬通汁一升相和合煎取一升綿濾一服盡之山東醫工亦多用側柏然云性寒止痛其方採葉入臼中濕搗令極爛如泥冷水調作膏以治大人及小兒湯湯火燒塗敷於傷處用帛子系定三兩日瘡當斂仍滅瘢又取葉焙乾為末與川黃連二味同煎為汁服之以療男子婦人小兒大腹下黑血茶腳色或膿血如澱色所謂蠱痢者治之有殊效又能殺五臟蟲道家多作柏葉湯常點益人古柏葉尤奇今益州諸葛孔明廟中有大柏木相傳是蜀世所植故人多采收以作藥其味甘香於常柏也雷公云凡使先以酒浸一宿至明漉出曬乾卻用黃精自然汁於日中煎手不住攪若天久陰即於鐺中著水用瓶器盛柏子仁著火緩緩煮成煎為度每煎三兩柏子仁用酒五兩浸干為度又云凡使勿用花柏葉並叢柏葉有子圓葉其有子圓葉成片如大片雲母葉葉皆側葉上有微赤毛若花柏葉其樹濃葉成朵無子叢柏葉其樹緑色不入藥中用若修事一斤先揀去兩畔並心枝了用糯泔浸七日後漉出用酒拌蒸一伏時卻用黃精自然汁浸了焙乾又浸又焙待黃精汁幹盡然後用之如修事一斤用黃精自然汁十二兩聖惠方治時氣瘴疫用社中西南柏樹東南枝取曝乾搗羅為末以水調下一錢匕日三四服肘後方同又方治大風疾令眉鬢再生用側柏葉九蒸九曝搗羅為末煉蜜和丸如梧桐子大日三服夜一服熟水下五丸十丸百日即生又方治憂恚嘔血煩滿少氣胸中疼痛用柏葉搗羅為散不計時候以粥飲調下二錢匕又方小兒躽啼驚癇腹滿不乳食大便青白色用柏子仁末溫水調下二錢經驗後方治霍亂轉筋先以暖物裹腳然後以柏樹木細銼煮湯淋之又方小兒洞下痢煮柏葉服之梅師方治中熱油及火燒瘡以柏白皮豬脂煎塗瘡上鬼遺方同孫真人食忌生髮方取側柏葉陰乾作末和油塗之孫真人枕中記採松柏法嘗以三月四月採新生松葉可長三四寸許並花蕊取陰乾細搗為末其柏葉取深山岩谷中採當年新生可長三四寸者陰乾細搗為末用白蜜丸如小豆大常以月一十五日日未出時燒香東向手持藥八十一丸以酒下服一年延十年命服二年延二十年命欲得長肌肉加大麻巨勝欲心力壯健者加茯苓人參此藥除百病益元氣添五臟六腑清明耳目強壯不衰老延年益壽神驗用七月七日露水丸之更佳服時乃咒曰神仙真藥體合自然服藥入腹天地同年咒訖服藥斷諸雜肉五辛最切忌慎之姚氏方治鼠瘻腫核痛未成膿以柏葉敷著腫上熬鹽著腫上尉令熱氣下即消抱朴子漢成帝時獵者於終南山見一人無衣服身皆生黑毛跳坑越澗如飛乃密伺其所在合圍取得乃是一婦人問之言我是秦之宮人關東賊至秦王出降驚走入山飢無所食泊欲餓死有一老公教我吃松柏葉實初時苦澀後稍便吃遂不復飢冬不寒夏不熱此女是秦人至成帝時三百餘載也列仙傳赤松子好食柏實齒落更生別說云謹按陶隱居說柏忌取冢墓上者今云乾州者最佳則乾州柏茂大者皆是乾陵所出他處皆無大者但取其州土所宜子實氣味豐美可也乾陵之柏異於他處其木未有無紋理者而其紋多為菩薩雲氣人物鳥獸狀極分明可觀有盜得一株徑尺者可直萬錢關陝人家多以為貴宜其子實最佳也又以其枝節燒油膏敷惡瘡久不瘥有蟲者牛馬畜産有瘡疥名為重病以敷之三五次無不愈也衍義曰柏取𣿉以療馬瘑疥今未見用松𣿉者老人虛祕柏子仁大麻子仁松子仁等分同研溶白蠟丸桐子大以少黃丹湯服二三十丸食前嘗官陝西每登高望之雖千萬株皆一一西指蓋此木為至堅之木不畏霜雪得木之正氣他木不逮也所以受金之正氣所制故一一向之茯苓味甘平無毒主胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便止消渴好睡大腹淋瀝膈中痰水水腫淋結開胸腑調臟氣伐腎邪長陰益氣力保神守中久服安魂養神不飢延年一名茯菟其有抱根者名茯神茯神平主闢不祥療風眩風虛五勞口乾止驚悸多恚怒善忘開心益智安魂魄養精神生太山山谷大松下二月八月採陰乾馬間為之使得甘草防風芍藥紫石英麥門冬共療五臟惡白蘞畏牡蒙地榆雄黃秦艽龜甲陶隱居云按藥無馬間或是馬莖聲相近故也今出郁州彼土人乃假研松作之形多小虛赤不佳自然成者大如三四升器外皮黑細皺內緊白形如鳥獸龜鱉者良作丸散者皆先煮之兩三沸乃切曝乾白色者補赤色者利俗用甚多仙經服食亦為至要云其通神而致靈和魂而煉魄明竅而益肌厚腸而開心調榮而理胃上品仙藥也善能斷谷不飢為藥無朽蛀嘗掘地得昔人所埋一塊計應三十許年而色理無異明其貞全不朽矣其有銜松根對度者為茯神是其次茯苓後結一塊也仙方唯雲茯苓而無茯神為療既同用之亦應無嫌唐本注云季氏本草云馬刀為茯苓使無名馬間者間字草書實似刀字寫人不識訛為間爾陶不悟云是馬莖謬矣今太山亦有茯苓白實而塊小而不復採用第一齣華山形極粗大雍州南山亦有不如華山者今注馬間當是馬藺二注皆恐非也臣禹錫等謹按蜀本圖經云生枯松樹下形塊無定以似人龜鳥形者佳今所在有大松處皆有唯華山最多範子云茯苓出嵩高三輔淮南子云下有茯苓上有菟絲注云茯苓千歲松脂也菟絲生其上而無根一名女蘿也典術云茯苓者松脂入地千歲為茯苓望松樹赤者下有之廣志云茯神松汁所作勝茯苓或曰松根茯苓貫著之生朱提漢陽縣藥性論云茯苓臣忌米醋能開胃止嘔逆善安心神主肺痿痰壅治小兒驚癇療心腹脹滿婦人熱淋赤者破結氣又云茯神君味甘無毒主驚癇安神定志補勞乏主心下急痛堅滿人虛而小腸不利加而用之其心名黃松節偏治中偏風口面喎斜毒風筋攣不語心神驚掣虛而健忘日華子云茯苓補五勞七傷安胎暖腰膝開心益智止健忘忌酸及酸物圖經曰茯苓生泰山山谷今泰華嵩山皆有之出大松下附根而生無苗葉花實作塊如拳在土底大者至數斤似人形龜形者佳皮黑肉有赤白二種或云是多年松脂流入土中變成或云假鬆氣於本根上生今東人採之法山中古松久為人斬伐者其枯折搓蘖枝葉不復上生者謂之茯苓拔見之即於四面丈餘地內以鐵頭錐刺地如有茯苓則錐固不可拔於是掘土取之其撥大者茯苓亦大皆自作塊不附著根上其抱根而輕虛者為茯神然則假氣而生者其說勝矣二月八月採者良皆陰乾史記龜策傳云伏靈在菟絲之下狀如飛鳥之形新雨已天清靜無風以夜捎或作燒菟絲去之即篝燭此地篝音溝籠也蓋然火而籠罩其上也火滅即記其處以新布四丈環置之明乃掘取入地四尺至七尺得矣此類今固不聞有之神仙方多單餌之其法取白茯苓五斤去黑皮搗篩以熟絹囊盛於三鬥米下蒸之米熟即止曝乾又蒸如此三過乃取牛乳二斗和合著銅器中微火煮加膏收之每食以竹刀割取隨性任飽服之則不飢如欲食先煮葵菜汁飲之任食無礙又茯苓蘇法云取白茯苓三十斤山之陽者甘美山之陰者味苦去皮薄切曝乾蒸之以湯淋去苦味淋之不止其汁當甜乃曝乾篩末用酒三石蜜三升相和內末其中並置大甕攪之百匝封之勿泄氣冬五十日夏二十五日穌自浮出酒上掠取之其味極甘美以作餅大如手掌空室中陰乾色赤如棗飢時食一枚酒送之終日不須食自飽此名神仙度世之法又服食法以合白菊花或合桂心或合術丸散自任皆可常服補益殊勝或云茯苓中有赤筋最能損目若久服者當先杵末水中飛澄熟挪去盡赤滓方可服若合他藥則不須爾凡藥有茯苓皆忌米醋舊說琥珀是千年茯苓所化一名江珠張茂先云今益州永昌出琥珀而無茯苓又云燒蜂窠所作三說張皆不能辨按南蠻地志云林邑多琥珀云是松脂所化又云楓脂為之彼人亦不復知地中有琥珀則旁無草木入土淺者五尺深者或八九尺大者如槲削去皮初如桃膠久乃堅凝其方人以為枕然古今相傳是松類故附於茯苓耳雷公云凡採得後去皮心神了搗令細於水盆中攪令濁浮者去之是茯苓筋若誤服之令人眼中童子並黑晴點小兼盲目甚記之聖惠方治面皯皰及産婦黑疱如雀卵色用白茯苓末蜜和敷之肘後方姚氏療䵟茯苓末白蜜和塗上滿七日即愈經驗後方養老延年服茯苓方華山挺子茯苓研削如棗許大令四方有角安於新瓷瓶內以好酒浸以三重紙封其頭後一百日開其色當如餳糖可日食一塊百日後肌體潤澤服一年後可夜視物久久食之腸化為筋可延年耐老面若童顏孫真人枕中記茯苓久服百日百病除二百日夜晝不眠二年後役使鬼神四年後玉女來侍抱朴子任子季服茯苓十八年玉女從之能隱能彰不食谷灸瘢滅面生光玉澤宋王微茯苓贊皓苓下居彤紛上薈中狀雞鳧具客龜蔡神侔少司保延幼艾終志不移柔紅可佩神仙服茯苓法白茯苓去皮酒浸十五日漉出為散每服三錢水調下日三衍義曰茯苓乃樵斫訖多年松根之氣所生此蓋根之氣味噎郁未絶故為是物然亦由土地所宜與不宜其津氣盛者方發泄於外結為蓋苓故不抱根而成物既離其本體則有苓之義茯神者其根但有津氣而不甚盛故只能伏結於本根既不離其本故曰茯神此物行水之功多益心脾不可闕也或曰松既樵矣而根尚能生物乎答曰如馬勃菌五芝木耳石耳之類皆生於枯木石糞土之上精英未淪安得不為物也其上有菟絲下有茯苓之說甚為輕信琥珀味甘平無毒主安五臟定魂魄殺精魅邪鬼消瘀血通五淋生永昌陶隱居云舊說云是松脂淪入地千年所化今燒之亦作鬆氣俗有琥珀中有一蜂形色如生博物志又云燒蜂窠所作恐非實此或當蜂為松脂所黏因墜地淪沒爾亦有煮毈雞子及青魚枕作者並非真唯以拾芥為驗俗中多帶之辟惡刮屑服療瘀血至驗仙經無正用唯曲晨丹所須以赤者為勝今並從外國來而出茯苓處永無不知出琥珀處復有茯苓與否今按陳藏器本草云琥珀止血生肌合金瘡和大黃鱉甲作散子酒下方寸匕下惡血婦人腹內血盡即止宋高祖時寧州貢琥珀枕碎以賜軍士敷金瘡漢書云出罽賓國初如桃膠凝乃成焉臣禹錫等謹按蜀本注云又據一說楓脂入地千年變為琥珀乃知非因燒蜂窠成也蜂窠既燒安有蜂形在其間不獨自松脂變也松脂獨變安有楓脂所成者核其事而言則琥珀之為物乃是木脂入地千年者所化也但余木不及楓松有脂而多經年歲故不自其下掘得也藥性論云琥珀君治百邪産血疹痛日華子云療蠱毒壯心明目摩翳止心痛癲邪破結症圖經曰文具茯苓條下海藥是海松木中津液初若桃膠後乃凝結溫主止血生肌鎮心明目破癥瘕氣塊産後血暈悶絶兒枕痛等並宜餌此方琥珀一兩鱉甲一兩京三稜一兩延胡索半兩沒藥半兩大黃六銖熬搗為散空心酒服三錢匕日再服校量神驗莫及産後即減大黃凡驗真假於手心熟磨吸得芥為真復有南珀不及舶上來者雷公云凡用紅松脂石珀水珀花珀物象珀醫珀琥珀紅松脂如琥珀只是濁太脆紋橫水珀多無紅色如淺黃多粗皮皺石珀如石重色黃不堪用花珀文似新馬尾松心紋一路赤一路黃物象珀其內自有物命動此使有有神妙醫珀其珀是衆珀之長故號曰醫珀琥珀如血色熱於布上拭吸得芥子者真也夫入藥中用水調側柏子末安於瓷鍋子中安琥珀於末中了下火煮從巳至申別有異光別搗如粉重篩用外臺祕要治魚鯁骨橫喉中六七日不出琥珀珠一物貫串著繩推令前入至鯁所又復推以牽弓出矣若水晶珠亦得更無堅物磨令滑用之又方療從高墜下若為重物所頓笮得瘀血刮琥珀屑酒服方寸匕取蒲黃二三匕服日四五服瘥鬼遺方治金瘡弓弩箭中悶絶無所識琥珀研如粉以童子小便調一錢三服瘥通典南蠻海南林邑國秦象郡林邑縣多出琥珀松脂淪入地下及旁不生草木深八九尺大如槲削去皮成焉初如桃膠凝成乃堅復光彩甚麗別說云謹按諸家所說茯苓琥珀雖小有異同皆云松脂入地所化但今産茯苓處未嘗有琥珀採茯苓時當尋大松摧折或因斫伐而根瘢不朽斫之津潤如生者則附近掘取之蓋松木折不再抽芽其根不死津液下流故生茯苓茯神因用治心腎通津液也若琥珀即是松樹枝節榮盛時為炎日所灼流脂出樹身外日漸厚大因墜土中其津潤歲久乃為土所滲泄而光瑩之體獨存今可拾芥尚有黏性故其中有蚊蟲之類此未入土時所黏著者二物皆自松出而所稟各異茯苓生成於陰者也琥珀生於陽而成於陰故皆治榮而安心利水也觀下條松脂所圖之形則可悉其理矣衍義曰琥珀今西戎亦有之其色差淡而明徹南方者色深而重濁彼土人多碾為物形若謂千年茯苓所化則其間有沾著蜾螺蜂蟻宛然完具者是極不然也地理志云林邑多琥珀實松脂所化耳此說為勝但土地有所宜不宜故有能化有不能化者張茂先又為燒蜂窠所作不知得於何處以手摩熱可以拾芥余如經醫烏兮切味甘平無毒古來相傳云松脂千年為茯苓又千年為琥珀又千年為醫然二物燒之皆有鬆氣為用與琥珀同補心安神破血尤善狀似玄玉而輕出西戎來而有茯苓處見無此物今西州南三百里磧中得者大則方尺黑潤而輕燒之腥臭高昌人名為木醫謂玄玉為石醫洪州土石間得者燒作鬆氣破血生肌與琥珀同見風拆破不堪為器量此二種及琥珀或非松脂所為也有此差舛今略論也新見唐本陳藏器蘇於琥珀注後出醫功狀按醫本功外小兒帶之辟惡磨滴目翳赤障等太平廣記梁四公子傳曰交河之間平磧中掘深一丈下有醫珀黑逾純漆或大如車輪末服之攻婦人小腸癥瘕諸疾榆皮味甘平無毒主大小便不通利水道除邪氣腸胃邪熱氣消腫性滑利久服輕身不飢其實尤良療小兒頭瘡痂疕花主小兒癇小便不利傷熱一名零榆生潁川山谷二月採皮取白曝乾八月採實並勿令中濕濕則傷人陶隱居云此即今榆樹剝取皮刮除上赤皮亦可臨時用之性至滑利初生莢仁以作糜羹令人多睡嵇公所謂榆令人瞑也斷谷乃屑其皮並檀皮服之即令人不飢唐本注云榆三月實熟尋即落矣今稱八月採實恐本經誤也今按陳藏器本草云榆莢主婦人帶下和牛肉作羹食之四月收實作醬似蕪荑殺蟲以陳者良嫩葉作羹食之壓丹石消水腫江東有刺榆無大榆皮入用不滑刺榆秋實故陶錯誤也臣禹錫等謹按爾雅疏云榆之類有十種葉皆相似皮及木理異爾而刺榆有針刺如柘其葉如榆瀹為蔬美滑於白榆詩云山有樞是也藥性論云榆白皮滑能主利五淋治不眠療齁取白皮陰乾後焙杵為末每日朝夜用水五合末二錢煎如膠服瘥孟詵云生皮主暴患赤腫以皮三兩搗和三年醋滓封之日六七易亦治婦人妒乳腫眼丹石人採葉生服一兩頓佳子作醬食能助肺殺諸蟲下氣令人能食消心腹間惡氣卒心痛食之良日華子云榆白皮通經脈涎敷癬圖經曰榆皮生潁川山谷今處處有之三月生莢仁古人採以為糜羹今無復食者唯用陳老實作醬耳然榆之類有十數種葉皆相似但皮及木理有異耳白榆先生葉卻著莢皮白色剝之刮去上粗皵中極滑白即爾雅所謂榆白粉也此皮入藥今孕婦滑胎方多用之小兒白禿發不生搗末苦酒調塗之刺榆有針刺如柘則古人所茹者云美於白榆爾雅所謂樞荎詩唐風云山有樞是也二月採皮取白曝乾四月採實並勿令中濕榆皮荒歲農人食之以當糧不損人食療生榆皮利小便主石淋又取葉煮食之時復食一頓尤良高昌人多搗白皮為末和菜菹食之甚美令人能食仙家長服服丹石人亦食之取利關節故也又榆仁可作醬食之亦甚香美有少辛味能助肺氣殺諸蟲下氣令人能食又心腹間惡氣內消之塵者尤良又塗諸瘡癬妙又卒患冷氣心痛食之瘥並主小兒癇小便不利外臺祕要治渴小便利非淋方榆皮二片去黑皮以水一斗煮取五升一服三合日三服千金方五色丹俗名油腫若犯多致死不可輕之以榆白皮末和雞子白敷之千金髓火灼爛瘡榆白皮熟嚼封之瘥備急方療身體暴腫滿榆皮搗屑隨多少雜米作粥食小便利子母祕録療妊娠胎死腹中或母病欲下胎榆白皮煮汁服二升又方小兒白禿瘡搗榆白皮末醋和塗之蟲當出楊氏産乳療身體及頭悉生瘡取榆白皮炒令黃搗為散以好苦酒和塗上又以綿裹覆上蟲出即瘥嵇叔夜養生論云榆令人瞑別說云謹按榆白皮焙乾為末婦人妊娠臨月日三服方寸匕令産極易産下兒身尚皆塗之信其驗也又濕搗治如糊用黏瓦石極有力京東西北人以石為碓觜每用此以膠之衍義曰榆皮今初春先生莢者是去上皺澀乾枯者將中間嫩處銼干磑為粉當歉歲農將以代食葉青嫩時收貯亦用以為羹茹嘉祐年過豐沛人闕食鄉民多食此酸棗味酸平無毒主心腹寒熱邪結氣聚四肢痠疼濕痹煩心不得眠臍上下痛血轉久泄虛汗煩渴補中益肝氣堅筋骨助陰氣令人肥健久服安五臟輕身延年生河東川澤八月採實陰乾四十日成惡防己陶隱居云今出東山間云即是山棗樹子似武昌棗而味極酸東人啖之以醒睡與此療不得眠正反矣唐本注云此即樲二棗實也樹大如大棗實無常形但大棗中味酸者是本經唯用實療不得眠不言用人今方用其人補中益氣自補中益肝以下此為酸棗仁之功能又於下品白棘條中復云用其實今醫以棘實為酸棗大誤今注陶云醒睡而經云療不得眠蓋其子肉味酸食之使不思睡核中仁服之療不得眠正如麻黃髮汗根節止汗也此乃棘實更非他物若謂是大棗味酸者全非也酸棗小而圓其核中仁微扁大棗仁大而長不類也臣禹錫等謹按蜀本圖經云今河東及滑州以其木為車軸及匙箸等木甚細理而硬所在有之八月採實曬乾藥性論云酸棗仁主筋骨風炒末作湯服之陳藏器云按酸棗既是棗中之酸更無他異此即真棗何復名酸既云其酸又云其小今棗中酸者未必即小小者未必即酸雖欲為棗生文展轉未離於棗若道棗中酸者棗條無令睡之功道棘子不酸今人有衆呼之目棗棘一也酸甜兩焉縱令以棗當之終其非也嵩陽了曰余家於滑臺今酸棗縣即滑之屬邑也其地名酸棗焉其樹高數丈徑圍一二尺木理極細堅而且重其樹皮亦細紋似蛇鱗其棗圓小而味酸其核微圓其仁稍長色赤如丹此醫之所重居人不易得今市之賣者皆棘子為之又云山棗樹如棘子如生棗里有核如骨其肉酸滑好食山人以當果五代史後唐刊石藥驗云酸棗仁睡多生使不得睡炒熟日華子云酸棗仁治臍下滿痛圖經曰酸棗生河東川澤今近京及西北州郡皆有之野生多在坡阪及城壘間似棗木而皮細其木心赤色莖葉俱青花似棗花八月結實紫紅色似棗而圓小味酸當月採實取核中仁陰乾四十日成爾雅辨棗之種類曰實小而酸曰樲棗孟子曰養其樲棗趙歧注所謂酸棗是也一說唯酸棗縣出者為真其木高數丈徑圍一二尺木理極細堅而且重邑人用為車軸及匕箸其皮亦細紋似蛇鱗其核仁稍長而色赤如丹亦不易得今市之貨者皆棘實耳用之尤宜詳辨也本經主煩心不得眠今醫家兩用之睡多生使不得睡炒熟生熟便爾頓異而胡洽治振悸不得眠有酸棗仁湯酸棗仁二升茯苓白朮人參甘草各二兩生薑六兩六物切以水八升煮取三升分四服深師主虛不得眠煩不可寧有酸棗仁二湯酸棗仁二升蝭母乾薑茯苓芎藭各二兩甘草一兩炙並切以水一斗先煮棗減三升後納五物煮取三升分服一方更加桂一兩二湯酸棗並生用療不得眠豈便以煮湯為熟乎雷公云酸棗仁凡使採得後曬乾取葉重拌酸棗仁蒸半日了去尖皮了任研用食療酸棗平主寒熱結氣安五臟療不得眠聖惠方治膽虛睡臥不安心多驚悸用酸棗仁一兩炒令香熟搗細為散每服二錢竹葉湯調下不計時候服又方治夜不眠睡用酸棗仁半兩炒黃研末以酒三合浸汁先以粳米三合煮作粥臨熟下棗仁汁更煮三五沸空心食之又方治骨蒸勞心煩不得眠臥用酸棗仁二兩水二大盞半研絞取汁下米二合煮粥候熟下地黃汁一合更漸煮過不計時候食之外臺祕要療齒蟲腐爛棘針二百枚即是棗樹棘朽落地者以水二升煎取一升含之日四五度即瘥又方療刺在仁肉中不出酸棗仁核燒末水服之立便得出簡要濟衆治膽風毒氣虛實不調昏沉睡多酸棗仁一兩生用金挺臘茶二兩以生薑汁塗炙令微焦搗羅為散每服二錢水七分煎六分無時溫服衍義曰酸棗微熱經不言用仁仍療不得眠天下皆有之但以土産宜與不宜嵩陽子曰酸棗縣即滑之屬邑其木高數丈味酸醫之所重今市人賣者皆棘子此說未盡殊不知小則為棘大則為酸棗平地則易長居崖塹則難生故棘多生崖塹上久不樵則成干人方呼為酸棗更不言棘徒以世人之意如此在物則曷若是也其實一本以其不甚為世所須及礙塞行路故成大木者少多為人樵去然此物才及三尺便開花結子但窠小者氣味薄木大者氣味厚又有此別今陝西臨潼山野所出者亦好亦土地所宜也並可取仁後有白棘條乃是酸棗未長大時枝上刺也及至長成其刺亦少實亦大故棗取大木刺取小窠也亦不必強分別爾柏木黃柏也味苦寒無毒主五臟腸胃中結熱黃疸腸痔止泄痢女子漏下赤白陰傷蝕瘡療驚氣在皮間肌膚熱赤起目熱赤痛口瘡久服通神根一名檀桓主心腹百病安魂魄不飢渴久服輕身延年通神生漢中山谷及永昌惡乾漆陶隱居云今出邵陵者輕薄色深為勝出東山者厚而色淺其根於道家入木芝品今人不知取服之又有一種小樹狀如石榴其皮黃而苦俗呼為子柏亦主口瘡又一種小樹多刺皮亦黃亦主口瘡唐本注云子柏一名山石榴子似女貞皮白不黃亦名小柏所在有今云皮黃恐謬矣按今俗用子柏皆多刺小樹名刺柏非小柏也今按陳藏器本草云柏皮主熱瘡疱起蟲瘡痢下血殺蛀蟲煎服主消渴臣禹錫等謹按蜀本圖經云黃柏樹高數丈葉似吳茱萸亦如紫椿皮黃其根如松下茯苓今所在有本出房商合等州山谷皮緊厚二三分鮮黃者上二月五月採皮曬乾藥性論云黃柏使平主男子陰痿治下血如雞鴨肝片及男子莖上瘡屑末敷之日華子云安心除勞治骨蒸洗肝明目多淚口乾心熱殺疳蟲治回心痛疥癬蜜炙治鼻洪腸風瀉血後分急熱腫痛身皮力微次於根圖經曰柏木黃柏也生漢中山谷及永昌今處處有之以蜀中者為佳木高數丈葉類茱萸及椿楸葉經冬不凋皮外白里深黃色根如松下茯苓作結塊五月六月採皮去皺粗曝乾用其根名檀桓淮南萬畢術曰柏令面悅取柏三寸土瓜三枚大棗七枚和膏湯洗面乃塗藥四五日光澤矣唐韋宙獨行方主卒消渴小便多黃柏一斤水一升煮三五沸渴即飲之恣意飲數日便止別有一種多刺而小細葉者名刺柏不入藥用又下品有小柏條木如石榴皮黃子赤如枸杞兩頭尖人銼以染黃今醫家亦稀用雷公云凡使用刀削上粗皮了用生蜜水浸半日漉出曬乾用蜜塗文武火炙令蜜盡為度凡修事五兩用蜜三兩外臺祕要口中及舌生瘡爛銼黃柏含之千金方治小兒重舌以黃柏苦竹瀝浸瀝點舌上肘後方咽喉卒腫食飲不通黃柏搗敷腫上冷復易之用苦酒和末佳又方傷寒時氣溫病毒攻手足腫疼痛欲斷亦治毒攻陰腫細銼黃柏五斤以水三升煮漬之傷寒類要同葛氏方男子陰瘡損爛水煮黃柏洗白蜜塗之又方卒喉痹取黃柏片切含之又黃柏一斤㕮咀酒一斗煮三沸去滓恣飲便愈又方食自死六畜肉中毒黃柏末服方寸匕未解再服之經驗方治嘔血黃柏好者以蜜塗之干杵為末和麥門冬熟水調下二錢匕立瘥梅師方治癰疽發背或髮乳房初起微赤不急治之即煞人搗黃柏末和雞子白塗之簡要濟衆治吐血熱極方黃柏二兩塗蜜於慢火上炙焦搗末每服二錢溫糯米飲調下十全博救治小兒熱瀉用黃柏削皮後焙杵為末用薄米飲為丸如粟大每服十丸米飲下深師方療傷寒熱病口瘡黃柏皮削去上粗皮取里好處薄削以崖蜜漬之一宿唯欲令濃含其汁良久吐更含若胸中熱有瘡時飲三五合尤佳聖惠方同子母祕録小兒臍瘡不合黃柏末塗之衍義曰柏木今用皮以蜜勻炙與青黛各一分同為末入生龍腦一字研勻治心脾熱舌頰生瘡當摻瘡上有涎即吐又張仲景柏皮湯無不驗傷寒論中已著楮實味甘寒無毒主陰痿水腫益氣充肌膚明目久服不飢不老輕身生少室山一名谷實所在有之八月九月採實曬乾四十日成葉味甘無毒主小兒身熱食不生肌可作浴湯又主惡瘡生肉樹皮主逐水利小便莖主癮疹癢單煮洗浴皮間白汁療癬陶隱居云此即今谷音構樹也仙方採搗取汁和丹用亦干服使人通神見鬼南人呼谷紙亦為楮紙武陵人作穀皮衣又甚堅好爾臣禹錫等謹按蜀本圖經云樹有二種取有子葉似葡萄者佳八月採實所在皆識也藥性論谷木皮亦可單用味甘平無毒能治水腫氣滿葉乾炒末搜面作䬪飥食之主水痢段成式酉陽雜俎云構谷田久廢必生構葉有瓣曰楮無曰構日華子云楮實壯筋骨助陽氣補虛勞助腰膝益顏色皮斑者是楮皮白者是谷又云楮葉涼無毒治刺風身癢此是斑谷樹又云谷樹汁敷蛇蟲蜂犬咬能合硃砂為團名曰五金膠漆圖經曰楮實生少室山今所在有之此有二種一種皮有斑花文謂之斑谷今人用為冠者一種皮無花枝葉大相類但取其葉似葡萄葉作瓣而有子者為佳其實初夏生如彈丸青緑色至六七月漸深紅色乃成熟八月九月採水浸去皮穰取中子曬乾仙方單服其實正赤時收取中子陰乾篩末水服二錢匕益久乃佳俗謂之谷一說谷田久廢必生構葉有瓣曰楮無曰構詩小雅云爰有樹檀其下唯谷陸機疏云幽州謂之谷桑或曰楮桑荊楊交廣謂之谷江南人績其皮以為布又搗以為紙長數丈光澤甚好又食其嫩芽以當菜茹主四肢風痹赤白下痢其葉主鼻洪小品云鼻衄數升不斷者取楮葉搗取汁飲三升不止再三飲神良久衄亦瘥紙亦入藥見劉禹錫傳信方治女子月經不絶來無時者取案紙三十張燒灰以清酒半升和調服之頓定如冬月即暖酒服蓐中血暈服之立驗已斃者去板齒灌之經一日亦活今楮紙用之最博或用其灰止金創出血甚效楮布不見有之醫方但貴楮實余亦稀用俚俗或取其木枝中白汁塗癬甚效楊炎南行方治瘴痢無問老少日夜百餘度者取干楮葉三兩熬搗為末煎烏梅湯服方寸匕日再服取羊肉裹末納穀道痢出即止雷公云凡使採得後用水浸三日將物攪旋投水浮者去之然後曬乾卻用酒浸一伏時了便蒸從巳至亥出焙令乾用聖惠方治癬濕癢用楮葉半斤細切搗爛敷癬上外臺祕要近效天行後兩脅脹滿臍下如水腫以谷枝汁隨意服愈又方有人虛肥積年氣上如水病面腫腳不腫谷楮葉八兩以水一斗煮取六升去滓內米煮粥吃又方點眼翳取楮白皮曝乾合作一繩子如叉股大燒作灰待冷細研如面每點於翳上日三五度漸消又方頭風白屑如麩糠方豎截楮木作枕六十日一易新者肘後方治卒風不得語銼谷枝葉酒煮熟皮中沫出隨多少飲之又方治少小鼻衄小勞輒出楮樹葉取汁飲三升不止四五飲良此方久衄亦瘥經驗後方煉穀子煎法取穀子五升六月六日採以水一石煮取五升去滓微火煎如餳即堪用廣利方治蠍螫人痛不止方谷樹白汁塗之立瘥子母祕録小兒赤白痢渴及得水吃又嘔逆方炙構葉令香黃以飲漿半升浸構葉使水緑色然後去葉以木瓜一個切納葉汁中煮三二沸去木瓜使暖細細服渴停抱朴子楮實赤者服之老者成少令人夜應徹視見鬼神道士梁頓年七十乃服之更少壯到百四十歲能夜出行及走馬楊堯輔說患人耽睡搗花谷葉服驗修真祕旨服楮實者輒為骨軟疾丹房鏡源構汁搜藥砂子乾漆味辛溫無毒有毒主絶傷補中續筋骨填髓腦安五臟五緩六急風寒濕痹療咳嗽消瘀血痞結腰痛女子疝瘕利小腸去蛔蟲生漆去長蟲久服輕身耐老生漢中川穀夏至後採干之半夏為之使畏雞子今又忌油脂陶隱居云今梁州漆最勝益州亦有廣州漆性急易燥其諸處漆桶上蓋里自然有乾者狀如蜂房孔孔隔者為佳生漆毒烈人以雞子和服之去蟲猶有齧腸胃者畏漆人乃致死外氣亦能使身肉瘡腫自別有療法仙方用蟹消之為水煉服長生臣禹錫等謹按蜀本注云按漆性並急凡取時須荏油解破淳者難得可重重別制試之上等清漆色黑如醫若鐵石者好黃嫩若蜂窠者不佳圖經云樹高二丈餘皮白葉似椿樗皮似槐花子若牛李木心黃六月七月刻取滋汁出金州者最善也藥性論云乾漆臣味辛咸能殺三蟲主女人經脈不通日華子云治敷尸勞除風入藥須搗碎炒熟不爾損人腸胃若是濕漆煎乾更好或毒發飲鐵漿並黃櫨汁及甘豆湯吃蟹並可制圖經曰乾漆生漆出漢中川穀今蜀漢金峽襄歙州皆有之木高三二丈皮白葉似椿花似槐子若牛李木心黃六月七月以竹筒釘入木中取之崔豹古今注曰以剛斧斫其皮開以竹管承之汁滴則成漆是也乾漆舊云用漆桶中自然乾者狀如蜂房孔孔隔者今多用筒子內乾者以黑如醫堅若鐵石為佳漆葉中藥見華他傳彭城樊阿少師事他求服食法他授以漆葉青黏散方云服之去三蟲利五臟輕身益氣使人頭不白阿從其言年五百餘歲漆葉所在有之青黏生豐沛彭城及朝歌一名地節一名黃芝主理五臟益精氣本出於迷人入山者見仙人服之以告他他以為佳語阿阿祕之近者人見阿之壽而氣力強盛怪之以問所服食阿因醉亂誤說人服多驗其後無復有人識青黏或云即黃精之正葉者神仙方乃有單服淳漆法傳於世云外臺祕要療蛔蟲心痛噁心吐水乾漆熬搗蜜和丸服十五丸日再服經驗方治婦人不曾生長血氣臟腑疼痛不可忍及治丈氣元氣小腸氣撮痛者並宜服二聖丸乾漆一兩為末濕漆一兩先將濕漆入銚子內熬如一食飯間以來住火與乾漆末一處拌和丸如半皂子大每服一丸溫酒吞下無時如元氣小腸膀胱氣痛牙關緊急但斡開牙關溫酒化一丸灌下必安怕漆人不可服簡要濟衆治九種心痛及腹脅積聚滯氣筒子乾漆二兩搗碎炒煙出細研醋煮麵糊和丸如梧桐子大每服五丸至七丸熱酒下醋湯亦得無時服杜壬治小兒胃寒蟲上諸證危惡與癇相似乾漆搗炒煙盡白蕪荑等分為細末米飲調下一字至一錢席延賞治女人經血不行及諸癥瘕等病室女萬瘕丸乾漆一兩為粗末炒令煙盡牛膝末一兩以生地黃汁一升入銀器中熬俟可丸丸如梧子大每服一丸加至三五丸酒飲下以通利為度抱朴子內篇淳漆不枯者服之通神長生法或以大蟹投其中或以雲母水或以玉水合之服九蟲悉下惡血從鼻出一年六甲行廚至也淮南子漆見蟹而不幹衍義曰乾漆苦濕漆藥中未見用凡用者皆乾漆耳其濕者在燥熱及霜冷時則難乾得陰濕雖寒月亦易干亦物之性也苦沾漬人以油治之凡驗漆唯稀者以物蘸起細而不斷斷而急收起又塗於干竹上蔭之速乾者並佳余如經五加皮味辛苦溫微寒無毒主心腹疝氣腹痛益氣療躃小兒不能行疽瘡陰蝕男子陰痿囊下濕小便餘瀝女人陰癢及腰脊痛兩腳疼痹風弱五緩虛羸補中益精堅筋骨強志意久服輕身耐老一名豺漆一名豺節五葉者良生漢中及冤句五月七月採莖十月採根陰乾遠志為之使畏蛇皮玄參陶隱居云今近道處處有東間彌多四葉者亦好煮根莖釀酒主益人道家用此作灰亦以煮石與地榆並有祕法臣禹錫等謹按蜀本圖經云樹生小叢赤蔓莖間有刺五葉生枝端根若荊根皮黃黑肉白骨硬今所在有之藥性論云五加皮有小毒能破逐惡風血四肢不遂賊風傷人軟腳䐴公對切腰主多年瘀血在皮肌治痹濕內不足主虛羸小兒三歲不能行用此便行走日華子云明目下氣治中風骨節攣急補五勞七傷葉治皮膚風可作蔬菜食圖經曰五加皮生漢中及冤句今江淮湖南州郡皆有之春生苗莖葉俱青作叢赤莖又似藤蔓高三五尺上有黑刺葉生五叉作簇者良四葉三葉者最多為次每一葉下生一刺三四月開白花結細青子至六月漸黑色根若荊根皮黃黑肉白骨堅硬五月七月採莖十月採根陰乾用蘄州人呼為木骨一說今所用乃有數種京師北地者大片類秦皮黃柏輩平直如板而色白絶無氣味療風痛頗效余不入用吳中乃剝野椿根為五加皮柔韌而無味殊為乖失今江淮間所生乃為真者類地骨輕脆芬香是也其苗莖有刺類薔薇長者至丈餘葉五出如桃花香氣如橄欖春時結實如豆粒而扁春青得霜乃紫黑吳中亦多俗名為追風使亦曰刺通剝取酒漬以療風乃不知其為五加皮也江淮吳中往往以為藩籬正似薔薇金櫻輩一如上所說但北間多不知用此種耳亦可以釀酒飲之治風痹四肢攣急陳藏器序五加皮花者治眼臃人搗末酒調服自正雷公曰今五加皮其樹本是白楸樹其上有葉如蒲葉者其葉三花是雄五葉花是雌剝皮陰乾陽人使陰陰人使陽外臺祕要治服諸藥石後或熱噤多向冷地臥又不得食諸熱面酒等方五加皮二兩以水四升煮取二升半候石發之時便服未定更服楊氏産乳療灶丹從兩腳赤如火燒五加葉根燒作灰五兩取煅鐵家槽中水和塗之東華真人煮石經舜常登蒼梧山曰厥金玉之香草朕用偃息正道此乃五加也又異名曰金鹽昔西域真人王屋山人王常言何以得長久何不食石蓄金鹽母何以得長壽何不食石用玉豉玉豉者即地榆也五加地榆皆是煮石而餌得長生之藥也昔尹公度聞孟綽子董士固共相與言曰寧得一把五加不用金玉滿車寧得一斤地榆安用明月寶珠魯定公母單服五加酒以致不死臨隱去佯托死時人自莫之梧耳張子聲楊建始王叔才於世彥等皆服此酒而房室不絶得壽三百年有子二十人世世有得服五加酒散而獲延年不死者不可勝計或只為散以代湯茶而餌之驗亦然也大王君謂五加云蓋天有五車之星精也金應五湖人應五德位應五方物應五車故青精入莖則有東方之液白氣入節則有西方之津赤氣入華則有南方之光玄精入根則有北方之飴黃煙入皮則有戊己之靈五神鎮生相轉育成用之者真仙服之者反嬰也牡荊實味苦溫無毒主除骨間寒熱通利胃氣止咳逆下氣生河間南陽冤句山谷或平壽都鄉高岸上及田野中八月九月採實陰乾得朮柏實青葙共療頭風防風為之使惡石膏陶隱居云河間冤句平壽並在北南陽在西論蔓荊即應是今作杖捶之荊而復非見其子殊細正如小麻子色青黃荊子實小大如此也牡荊子及出北方如烏豆大正圓黑仙術多用牡荊今人都無識之者李當之藥録乃注溲疏下云溲疏一名陽櫨一名牡荊一名空疏皮白中空時有節子似枸杞子赤色味甘苦冬月熟俗仍無識者當此實是真非人籬域陽櫨也按如此說溲疏主療與牡荊都不同其形類乖異恐乖實理而仙方用牡荊云能通神見鬼非唯其實乃枝葉並好又云有荊樹必枝枝相對此是牡荊有不對者即非牡荊既為牡則不應有子如此並莫詳虛實須更博訪及詳之爾唐本注云此即作棰杖荊是也實細黃色莖徑作樹不為蔓生故稱之為牡非無實之謂也按漢書郊祀志以牡荊莖為幡竿此則明蔓不堪為竿今所在皆有此荊既非本經所載按今生處乃是蔓荊將以附此條後陶為誤矣別録云荊葉味苦平無毒主久痢霍亂轉筋血淋下部瘡濕䘌薄腳主腳氣腫滿其根味甘苦平無毒水煮服主心風頭風肢體諸風解肌發汗有青赤二種以青者為佳出類聚方今人相承多以牡荊為蔓荊此極誤也今按陳藏器本草云荊木取莖截於火上燒以物承取瀝飲之去心悶煩熱頭風旋目眩心頭漾漾欲吐卒失音小兒心熱驚癇止消渴除痰唾令人不睡圖經曰牡荊生河間南陽冤句山谷或平壽都鄉高岸上及田野中今眉州蜀州及近京亦有之此即作棰杖者俗名黃荊是也枝莖堅徑作科不為蔓生故稱牡葉如篦麻更疏瘦花紅作穗實細而黃如麻子大或云即小荊也八月九月採實陰乾此有青赤二種以青者為佳謹按陶隱居登真隱訣云荊木之華葉通神見鬼精注云尋荊有三種直云荊木即是今可作棰杖者葉香亦有花子子不入藥方術則用牡荊牡荊子入藥北方人略無識其木者六甲陰符說一名羊櫨一名空疏理白而中虛斷植即生今羊櫨斫植亦生而花實微細藥家所用者天監三年上將合神仙飯奉敕論牡荊曰荊花白多子子粗大歷歷疏生不過三兩莖多不能圓或褊或異或多似竹節葉與余荊不殊蜂多采牡荊牡荊汁冷而甜余荊被燒則煙火氣苦牡荊體慢汁實煙火不入其中主治心風第一於時即遠近尋覓遂不值猶用荊葉今之所有者云崔元亮集驗方治腰腳蒸法取荊葉不限多少蒸令熟熱置於甕中其下著火溫之以病人置於葉中剩著葉蓋須臾當汗出藥中旋旋吃飯稍倦即止便以綿衣蓋避風仍進蔥豉酒及豆酒並得以瘥為度又取此荊莖條截於火上燒之兩頭以器承取瀝汁飲之主心悶煩熱頭風旋目眩心中漾漾欲吐卒失音小兒心熱驚癇止消渴除痰令人不睡聖惠方治濕瘑瘡方用荊枝燒瀝塗之效外臺祕要頭風頭痛取荊不限多少服集驗方同千金方療九竅出血方荊葉搗取汁酒和服二合又方治心虛驚悸不定羸瘦方荊瀝二升以火煎至一升六合分服四合日三夜一集驗方同千金翼治喉腫瘡方取荊瀝稍稍咽之肘後方療目卒痛燒荊木出黃汁敷之又方姚氏下赤白痢五六年者燒大荊如臂取瀝服五六合即得瘥又方蛇毒荊葉袋盛薄瘡腫上深師方療瘡方荊木燒取汁敷之瘥姚和衆小兒通耳方取蟲食荊子中白粉和油滴耳中日再之蔓荊實味苦辛微寒平溫無毒主筋骨間寒熱濕痹拘攣明目堅齒利九竅去白蟲長蟲主風頭痛腦鳴目淚出益氣久服輕身耐老令人光澤脂致音雉小荊實亦等惡烏頭石膏陶隱居云小荊即應是牡荊牡荊子大於蔓荊子而反呼為小荊恐或以樹形為言復不知蔓荊樹若高大爾唐本注云小荊實今人呼為牡荊子者是也其蔓荊子大故呼牡荊子為小荊實亦等者言其功用與蔓荊同也蔓荊苗蔓生故名蔓荊生水濱葉似杏葉而細莖長丈餘花紅白色今人誤以小荊為蔓荊遂將蔓荊子為牡荊子也臣禹錫等謹按蜀本注云今據陶匪唯不別蔓荊亦不知牡荊爾以理推之即蔓生者為蔓荊作樹生者為牡荊蔓生者大如梧子樹生者細如麻子則牡荊為小荊明矣圖經云蔓荊蔓生水濱苗莖蔓延春因舊枝而生小葉五月葉成如杏葉六月有花淺紅色蕊黃九月有實黑斑大如梧子而虛輕冬則葉凋藥性論云蔓荊子臣治賊風能長髭發日華子云利關節治赤眼癇疾注云海鹽亦有大如豌豆蒂有小輕軟蓋子六七八月採圖經曰蔓荊實舊不載所出州土今近京及秦隴明越州多有之苗莖高四尺對節生枝初春因舊枝而生葉類小楝至夏盛茂有花作穗淺紅色蕊黃白色花下有青萼至秋結實斑黑如梧子許大而輕虛八月九月採一說作蔓生故名蔓荊而今所有並非蔓也唐本注長鬚發雷公云凡使去蒂子下白膜一重用酒浸一伏時後蒸從巳至未出曬乾用衍義曰蔓荊實諸家所解蔓荊牡荊紛糾不一經既言蔓荊明知是蔓生即非高木也既言牡荊則自是木上生者況漢書郊祀志所言以牡荊莖為幡竿故知蔓荊即子大者是又何疑焉後條有欒荊此即便是牡荊也子青色如茱萸不合更立欒荊條故文中雲本草不載亦無別名但有欒花功用又別斷無疑焉注中妄稱石荊當之其說轉見穿鑿辛夷味辛溫無毒主五臟身體寒熱風頭腦痛面䵟溫中解肌利九竅通鼻塞涕出治面腫引齒痛眩冒身兀兀如在車船之上者生鬚髮去白蟲久服下氣輕身明目增年耐老可作膏藥用之去心及外毛毛射人肺令人咳一名辛矧一名候桃一名房木生漢中川穀九月採實曝乾芎藭為之使惡五石脂畏菖蒲蒲黃黃連石膏黃環陶隱居云今出丹陽近道形如桃子小時氣辛香即離騷所呼辛夷者唐本注云此是樹花未開時收之正月二月好採今見用者是其九月採實者恐誤其樹大連合抱高數仞葉大於柿葉所在皆有實臭不任藥也方云去毛用其心然難得而滋人面此用花開者易得而且香也今按陳藏器本草云辛夷今時所用者是未發花時如小桃子有毛未折時取之所云用花開者及在二月此殊誤爾此花江南地暖正月開北地寒二月開初發如筆北人呼為木筆其花最早南人呼為迎春臣禹錫等謹按蜀本圖經云樹高數仞葉似柿葉而狹長正月二月花似著毛小桃色白而帶紫花落而無子夏杪復著花如小筆又有一種三月花開四月花落子赤似相思子花葉與無子者同取花欲開者勝所在山谷皆有此二種今苑中有樹高三四丈花葉一如圖經所說但樹身徑二尺許去根三尺以來便有枝柯繁茂可愛正月二月花開紫白色花落復生葉至夏初還生花如小筆經秋歷冬葉花漸大如有毛小桃至來年正月二月始開初是興元府進來其樹才可三四尺有花無子謂之木筆花樹種經二十餘載方結實以此推之即是年歲淺者無子非有二種也其花開早晚應各隨其土風爾藥性論云辛夷臣能治面生䵟疱面脂用主光華日華子云通關脈明目治頭痛憎寒體噤瘙癢入藥微炙已開者劣謝者不佳圖經曰辛夷生漢中川穀今處處有之人家園庭亦多種植木高數丈葉似柿而長正月二月生花似著毛小桃子色白帶紫花落無子至夏復開花初出如筆故北人呼為木筆花又有一種枝葉並相類但歲一開花四月花落時有子如相思子或云都是一種經一二十年老者方結實耳其花開早晚亦隨南北節氣寒溫九月採實暴乾用或云用花蕊縮者良已開者劣謝者不佳雷公云凡用之去粗皮拭上赤肉毛了即以芭蕉水浸一宿漉出用漿水煮從巳至未出焙乾用若治眼目中患即一時去皮用向裡實者屈平九歌乘赤豹兮從文貍辛夷車兮結桂旗注辛夷香草也言山鬼出入乘赤豹從神貍結桂與辛夷以為車旗言有香潔也衍義曰辛夷先花後葉即木筆花也最先春以具花未開時其花苞有毛光長如筆故取象曰木筆有紅紫二本一本如桃花色者一本紫者今入藥當用紫色者仍須未開時收取入藥當去毛苞桑上寄生味苦甘平無毒主腰痛小兒背強巨兩切癰腫安胎充肌膚堅發齒長鬚眉主金瘡去痹女子崩中內傷不足産後余疾下乳汁其實明目輕身通神一名寄屑一名寓木一名宛童一名蔦音鳥又音吊生弘農川穀桑樹上三月三日採莖葉陰乾陶隱居云桑上者名桑上寄生爾詩人云施音異於松上方家亦有用楊上楓上者則各隨其樹名之形類猶是一般但根津所因處為異法生樹枝間寄根在皮節之內葉圓青赤厚澤易折旁自生枝節冬夏生四月花白五月實赤大如小豆今處處皆有以出彭城為勝俗呼為續斷用之按本經續斷別在上品藥主療不同豈只是一物市人混雜無識者服食方是桑檽與此又不同唐本注云此多生槲櫸柳水楊楓等樹上子黃大如小棗子唯虢州有桑上者子汁甚黏核大似小豆葉無陰陽如細柳葉而厚晚莖粗短江南人相承用為續斷殊不相關且寄生實九月始熟而黃今稱五月實赤大如小豆蓋陶未見也臣禹錫等謹按蜀本注云按諸樹多有寄生莖葉並相似云是烏鳥食一物子糞落樹上感氣而生葉如桔而厚軟莖如槐而肥脆今處處有方家唯須桑上者然非自採即難以別可斷莖而視之以色深黃者為驗圖經葉似龍膽而厚闊莖短似雞腳作樹形三月四月花黃赤色六月七月結子黃緑色如小豆以汁稠黏者良也藥性論云桑寄生臣能令胎牢固主懷妊漏血不止日華子云助筋骨益血脈採人多在櫸樹上收呼為桑寄生在桑上者極少縱有形與櫸樹上者亦不同次即楓樹上力同櫸樹上者黃色七月八月採圖經曰桑寄生出弘農山谷桑上今處處有之云是烏鳥食物子落枝節間感氣而生葉似桔而厚軟莖似槐枝而肥脆三四月生花黃白色六月七月結實黃色如小豆大三月三日採莖葉陰乾凡槲櫸柳水楊楓等上皆有寄生唯桑上者堪用然殊難辨別醫家非自採不敢用或云斷其莖而視之其色深黃並實中有汁稠黏者為真謹按爾雅寓木宛童郭璞云寄生一名蔦詩頍辨云蔦與女蘿陸機疏云葉似當盧子如覆盆赤黑甜美而中品有松蘿條即女蘿也詩所謂蔦與女蘿施於松上是也舊云生熊耳川穀松上五月採陰乾古方入吐膈藥今醫家鮮用亦不復採之但附於此雷公云凡使在樹上自然生獨枝樹是也採得後用銅刀和根枝莖細銼陰乾了任用勿令見火衍義曰桑寄生新舊書云今處處有之從官南北實處處難得豈歲歲窠斫摘踐之苦而不能生邪抑方宜不同也若以為鳥食物子落枝節間感氣而生則麥當生麥谷當生谷不當但生此一物也又有於柔滑細枝上生者如何得子落枝節間由是言之自是感造化之氣別是一物古人當日唯取桑上者實假其氣耳又云今醫家鮮用此極誤矣今醫家非不用也第以難得真桑上者嘗得真桑寄生下咽必驗如神向承乏吳山有求藥於諸邑者乃通令人搜摘卒不可得遂以實告甚不藥蓋不敢以僞藥罔人鄰邑有人僞以他木寄生送之服之逾月而死哀哉杜仲味辛甘平溫無毒主腰脊痛補中益精氣堅筋骨強志除陰下癢濕小便餘瀝腳中痠疼不欲踐地久服輕身耐老一名思仙一名思仲一名木綿生上虞山谷及上黨漢中二月五月六月九月採皮惡蛇蛻皮玄參陶隱居云上虞在豫州虞虢之虞非會稽上虞縣也今用出建平宜都者狀如厚朴折之多白絲為佳用之薄削去上皮橫理切令絲斷也臣禹錫等謹按蜀本圖經云生深山大谷樹高數丈葉似辛夷折其皮多白綿者好今所在大山皆有藥性論云杜仲味苦能治腎冷䐴公對切腰痛也腰病人虛而身強直風也腰不利加而用之日華子云暖治腎勞腰脊攣入藥炙用圖經曰杜仲生上虞山谷及上黨漢中今出商州成州峽州近處大山中亦有之木高數丈葉如辛夷亦類柘其皮類厚朴折之內有白絲相連二月五月六月九月採皮用江南人謂之檰初生葉嫩時採食主風毒腳氣及久積風冷腸痔下血亦宜乾末作湯謂之檰芽花實苦澀亦堪入藥木作屐亦主益腳篋中方主腰痛補腎湯杜仲一大斤五味子半大升二物切分十四劑每夜取一劑以水一大升浸至五更煎三分減一濾取汁以羊腎三四枚切下之再煮三五沸如作羹法空腹頓服用鹽酢和之亦得此亦見崔元亮海上方但崔方不用五味子耳雷公云凡使先須削去粗皮用酥蜜和作一兩炙之盡為度炙乾了細銼用凡修事一斤酥二兩蜜三兩二味相和令一處用也聖惠方治卒患腰腳疼痛補腎杜仲一兩去粗皮炙微黃銼以水二大盞煎至一盞去滓用羊腎二對細切去脂膜入藥中煮次入薤白七莖鹽花椒薑醋等如作羹吃空腹食之肘後方腰背痛杜仲一斤切酒二升漬十日服三合勝金方治婦人胎臟不安併産後諸疾宜服杜仲丸瓦上干於木臼中搗為末煮棗為丸如彈子大每服一丸爛嚼以糯米飲下楓香脂味辛苦平無毒主癮疹風癢浮腫齒痛一名白膠香其樹皮味辛平有小毒主水腫下水氣煮汁用之所在大山皆有唐本注云樹高大葉三角商洛之間多有五月斫樹為坎十一月採脂唐本先附臣禹錫等謹按蜀本楓香脂皮其三條主治稍異注云按王瓘廣軒轅本紀云黃帝殺蚩尤於黎山之丘擲其械於大荒之中宋山之上其械化為楓木之林爾雅楓欇欇似白楊而有歧其脂入地千年為琥珀圖經云樹高大木肌理硬葉三角而香爾雅疏云說文云楓木厚葉弱枝善搖一名欇欇郭云葉圓而歧有香今之楓香是也南方草木狀曰楓香樹子大如鴨卵二月花乃連著實八九月熟曝乾可燒唯九真郡有之陳藏器云楓皮本功外性澀止水痢蘇云下水腫水腫非澀藥所療蘇為誤爾又云有毒轉明其謬水煎止下痢為最日華子云楓皮止霍亂刺風冷風煎湯浴之圖經曰楓香脂舊不載所出州郡云所在大山皆有今南方及關陝多有之似白楊甚高大葉圓而作歧有三角而香二月有花白色乃連著實大如鴨卵八月九月熟曝乾可燒南方草木狀曰楓實唯九真有之用之有神乃難得之物其脂為白膠香五月斫為坎十一月採之其皮性澀止水痢水煎飲之爾雅謂楓為欇欇言天風則鳴欇欇也說文解字云楓木厚葉弱枝善搖漢宮殿中多植之至霜後葉丹可愛故騷人多稱之任昉述異記曰南中有楓子鬼楓木之老者為人形亦呼為靈楓蓋瘤癭也至今越巫有得之者以雕刻鬼神可致靈異下沉香條有楓香云療風癮疹癢毒與此相類即一物也簡要濟衆治吐血不止白膠香不以多少細研為散每服二錢新汲水調下陶隱居云楓樹上菌食之令人笑不止以地漿解之通典南蠻記楓脂為之琥珀在地上旁不生草木深忽八九尺大如槲削去皮成焉初如桃膠成乃堅宋齊丘化書云老楓化為羽人衍義曰楓香與松脂皆可亂乳香尤宜區別楓香微黃白色燒之尤見真僞兼能治風癮疹癢毒水煎熱炸洗女貞實味苦甘平無毒主補中安五臟養精神除百疾久服肥健輕身不老生武陵川穀立冬採陶隱居云葉茂盛凌冬不凋皮青肉白與秦皮為表裡其樹以冬生而可愛諸處時有仙經亦服食之俗方不復用市人亦無識者唐本注云女貞葉似枸骨及冬青樹等其實九月熟黑似牛李子陶云與秦皮為表裡誤矣然秦皮葉細冬枯女貞葉大冬茂殊非類也臣禹錫等謹按蜀本圖經云樹高數丈花細青白色採實曬乾今山南江南皆有之陳藏器云女貞似枸骨按枸骨樹如杜仲皮堪浸酒補腰腳令健枝葉燒灰淋取汁塗白癜風亦可作稠煎敷之木肌白似骨故云枸骨詩義疏云木杞其樹似栗一名枸骨理白滑其子為木虻子可合藥木虻在葉中卷葉如子羽化為虻非木子又云冬青其葉堪染緋子浸酒去風血補益木肌白有紋作象齒笏冬月青翠故名冬青江東人呼為凍生李雍又云出五臺山葉似椿子赤如郁李微酸性熱與此亦小有異同當是兩種冬青日華子云冬青皮涼無毒去血補益肌膚圖經曰女貞實生武凌川穀今處處有之山海經云泰山多真木是此木也其葉似枸骨及冬青木極茂盛凌冬不凋花細青白色九月而實成似牛李子立冬採實曝乾其皮可以浸酒或云即今冬青木也而冬青木肌理白紋如象齒道家取以為簡其實亦浸酒去風補血其葉燒灰面膏塗之治疸瘃殊效兼滅瘢疵又李雍云五臺山冬青葉似椿子如郁李微酸性熱與此小有同異當是別有一種耳又嶺南有一種女貞花極繁茂而深紅色與此殊異不聞中藥品也枸骨木多生江浙間木體白似骨故以名南人取以旋作合器甚佳詩小雅云南山有枸陸機云山木其狀如櫨一名枸骨理白可為函板者是此也皮亦堪浸酒補腰膝燒其枝葉為灰淋汁塗白癜風亦可作煎敷之木蘭味苦寒無毒主身大熱在皮膚中去面熱赤皰酒皶惡風癲疾陰下癢濕明耳目療中風傷寒及癰疽水腫去臭氣一名林蘭一名杜蘭皮似桂而香生零陵山谷及太山十二月採皮陰乾陶隱居云零陵諸處皆有狀如楠樹皮甚薄而味辛香今益州有皮厚狀如厚朴而氣味為勝今東人皆以山桂皮當之亦相類道家用合香亦好唐本注云木蘭似菌桂葉其葉氣味辛香不及桂也臣禹錫等謹按蜀本圖經云樹高數仞葉似菌桂葉有三道縱紋皮如板桂有縱橫紋今所在有三月四月採皮陰乾圖經曰木蘭生零陵山谷及泰山今湖嶺蜀川諸州皆有之木高數丈葉似菌桂葉亦有三道縱紋皮如板桂有縱橫紋香味劣於桂此與桂枝全別而韶州所生乃云與桂同是一種取外皮為木蘭中肉為桂心蓋是桂中之一種耳十一月十二月採陰乾用任昉述異記云木蘭川在潯陽江中多木蘭又七里洲中有魯班刻木蘭舟至今在洲中今詩家云木蘭舟出於此外臺祕要療面上皻䩅皯𪒟方木蘭皮一斤細切以三年酢漿漬之百日出於日中曬搗末漿水服方寸匕日三子母祕録療小兒重舌木蘭皮一尺廣四寸削去粗皮用醋一升漬取汁注重舌上蕤核味甘溫微寒無毒主心腹邪結氣明目目赤痛傷淚出目腫眥爛齆鼻破心下結痰痞氣久服輕身益氣不飢生函谷川谷及巴西陶隱居云今從北方來云出彭城間形如烏豆大圓而扁有紋理狀似胡桃桃核今人皆合殼用為分兩此乃應破取仁稱之醫方唯以療眼仙經以合守中丸也臣禹錫等謹按蜀本圖經云樹生葉細似枸杞而狹長花白子附莖生紫赤色大如五味子莖多細刺六月熟今出雍州五月六月採曬乾藥性論云蕤仁使一名曰堪能治鼻衄圖經曰蕤核生函谷川谷及巴西今河東亦有之其木高五七尺莖間有刺葉細似枸杞而尖長花白子紅紫色附枝莖而生類五味子六月成熟五月六月採實去核殼陰乾古今方唯用治眼劉禹錫傳信方所著法最奇云眼風淚癢或生翳或赤眥一切皆主之宣州黃連搗篩末蕤核仁去皮碾為膏緣此性稍濕末不得故耳與黃連等分和合取無蚛病干棗三枚割頭少許留之去卻核以二物滿填於中卻取所割下棗頭依前合定以少綿裹之唯薄綿為佳以大茶碗量水半碗於銀器中文武火煎取一雞子以來以綿濾待冷點眼萬萬不失前後試驗數十人皆應今醫家亦多用得效故附也雷公云凡使先湯浸去皮尖擘作兩片用芒硝木通草二味和蕤仁同水煮一伏時後瀝出去諸般藥取蕤仁研成膏任加減入藥中使每修事四兩用芒硝一兩木通草七兩陳藏器蕤子生熟足睡不眠丁香味辛溫無毒主溫脾胃止霍亂擁脹風毒諸腫齒疳䘌能發諸香其根部風熱毒腫生交廣南蕃二月八月採今注按廣州送丁香圖樹高丈餘葉似櫟葉花圓細黃色凌冬不凋醫家所用唯用根子如釘長三四分紫色中有粗大如山茱萸者俗呼為母丁香可入心腹之藥爾以舊本丁香根注中有不入心腹之用六字恐其根必是有毒故云不入心腹也又按陳藏器本草云丁香於其母丁香主變白以生薑汁研拔去白鬚塗孔中即異常黑也今附臣禹錫等謹按蜀本注云母丁香擊之則順理而折兩向療嘔逆甚驗藥性論云丁香臣能主冷氣腹痛日華子云治口氣反胃鬼疰蠱毒及療腎氣賁豚氣陰痛壯陽暖腰膝治冷氣殺酒毒消痃癖除冷勞圖經曰丁香出交廣南蕃今唯廣州有之木類桂高丈餘葉似櫟凌冬不凋花圓細黃色其子出枝蕊上如釘子長三四分紫色其中有粗大如山茱萸者謂之母丁香二八月採子及根又云盛冬生花子至次年春採之海藥按山海經云生東海及崑崙國二月三月花開紫白色至七月方始成實大者如巴豆為之母丁香小者實為之丁香主風疳䘌骨槽勞臭治氣烏髭發殺蟲療五痔辟惡去邪治奶頭花止五色毒痢正氣止心腹痛樹皮亦能治齒痛雷公云凡使有雄雌雄顆小雌顆大似檈棗核方中多使雌力大膏煎中用雄若欲使雄須去疔蓋乳子發人背癰也聖惠方治桑蠍蜇人用丁香末蜜調塗之千金方治乾霍亂不吐不下方丁香十四枚末以沸湯一升和之頓服不瘥更作服梅師方治乳頭裂破搗丁香末敷之又方治妒乳乳癰取丁香搗末水調方寸匕服又方治崩中晝夜不止取丁香二兩以酒二升取半分服外臺祕要方同簡要濟衆治傷寒咳噫不止及噦逆不定丁香一兩乾柿蒂一兩焙乾搗羅為散每服一錢煎人參湯下無時服衍義曰丁香日華子云治口氣此正是御史所含之香治胃寒及脾胃冷氣不和有大者名母丁香氣味尤佳為末縫紗囊如小指實末納陰中主陰冷病中病便已沉香微溫療風水毒腫去惡氣陶隱居云此香合香家要用不正入藥唯療惡核毒腫道方頗有用處唐本注云沉香青桂雞骨馬蹄煎香等同是一樹葉似桔葉花白子似檳榔大如桑椹紫色而味辛樹皮青色木似櫸柳臣禹錫等謹按陳藏器云沉香枝葉並似椿蘇云如桔恐未是也其枝節不朽最緊實者為沉香浮者為煎香以次形如雞骨者為雞骨香如馬蹄者為馬蹄香細枝未爛緊實者為青桂香其馬蹄雞骨只是煎香蘇乃重云深覺煩長並堪薰衣去臭余無別功又杜蘅葉一名馬蹄香即非此者與前香別也南越志云交州有蜜香樹欲取先斷其根經年後外皮朽爛木心與節緊黑沉水者為沉香浮水面平者為雞骨最粗者為棧香日華子云沉香味辛熱無毒調中補五臟益精壯陽暖腰膝去邪氣止轉筋吐瀉冷氣破症癖冷風麻痹骨節不任濕風皮膚癢心腹痛氣痢圖經曰沉香青桂香雞骨香馬蹄香棧香同是一本舊不著所出州土今唯海南諸國及交廣崖州有之其木類椿櫸多節葉似桔花白子似檳榔大如桑椹紫色而味辛交州人謂之蜜香欲取之先斷其積年老木根經年其外皮乾俱朽爛其木心與枝節不壞者即香也細枝緊實未爛者為青桂堅黑而沉水為沉香半浮半沉與水面平者為雞骨最粗者為棧香又云棧香中形如雞骨者為雞骨香形如馬蹄者為馬蹄香然今人有得沉香奇好者往往亦作雞骨形不必獨是棧香也其又粗不堪藥用者為生結黃熟香其實一種有精粗之異耳並採無時嶺表録異云廣管羅州多棧香如櫃柳其花白而繁皮堪作紙名為香皮紙灰白色有紋如魚子箋其理慢而弱沾水即爛不及楮紙亦無香氣又云與沉香雞骨黃熟雖同是一木而根干枝節各有分別者是也然此香之奇異最多品故相丁謂在海南作天香傳言之盡矣云四香凡四十二狀皆出於一本木體如白楊葉如冬青而小又敘所出之地云竇化高雷中國出香之地也比海南者優劣不侔甚矣既所稟不同復售者多而取者速是以黃熟不待其稍成棧沉不待似是蓋趨利戕賊之深也非同瓊管黎人非時不妄剪伐故木無夭札之患得必異香皆其事也又薰陸香形似白膠出天竺單于二國南方草木狀如薰陸出大秦國其木生於海邊沙上盛夏木膠出沙上夷人取得賣與賈客乳香亦其類也廣志云南波斯國松木脂有紫赤如櫻桃者名乳香蓋薰陸之類也今人無復別薰陸者通謂乳香為薰陸耳治腎氣補腰膝霍亂吐下沖惡中邪氣五疰治血止痛等藥及膏煎多用之然至黏難研用時以繒袋掛於窗隙間良久取研之乃不黏又雞舌香出崑崙及交愛以南枝葉及皮並似栗花如梅花子似棗核此雌者也雄者著花不實採花釀之以成香按諸書傳或云是沉香木花或云草花蔓生實熟貫之其說無定今醫家又一說云按三省故事尚書郎口含雞舌香以其奏事答對欲使氣芬芳也而方家用雞舌香療口臭者亦緣此義耳今人皆於乳香中時時得木實似棗核者以為雞舌香堅頑枯燥絶無氣味燒亦無香不知緣何得香名無復有芬芳也又葛稚川百一方有治暴氣刺心切痛者研雞舌香酒服當瘥今治氣藥借雞舌香名方者至多亦以雞舌香善療氣也或取以療氣及口臭則甚乖疏又何謂也其言有采花釀成香者今不復見果有此香海商亦當見之不應都絶京下老醫或有謂雞舌香與丁香同種花實叢生其中心最大者為雞舌香擊破有解理如雞舌此乃是母丁香療口臭最良治氣亦效蓋出陳氏拾遺亦未知的否千金療瘡癰連翹五香湯方用丁香一方用雞舌香以此似近之抱朴子云以雞舌黃連乳汁煎注之諸有百疹之在目愈而更加精明倍常又有詹糖香出交廣以南木似桔煎枝葉以為香往往以其皮及蠹屑和之難得淳好者唐方多用今亦稀見又下蘇合香條云生中臺川穀蘇恭云此香從西域及崑崙來紫色與真紫檀相似而堅實極芬香其香如石燒之灰白者好今不復見此等廣南雖有此而類蘇木無香氣藥中但用如膏油者極芬烈耳陶隱居以為是師子矢亦是指此膏油者言之耳然師子矢今內帑亦有之其臭極甚燒之可以辟邪惡固知非此也梁書云天竺出蘇合香是諸香汁煎之非自然一物也又云大秦國採得蘇合香先煎其汁以為香膏乃賣其滓與諸人是以展轉來達中國者不大香也然則廣南貨者其經煎煉之餘乎今用膏油乃其合治成者耳或云師子矢亦是西國草木皮汁所為胡人欲貴重之故飾其名耳又有檀香木如檀生南海消風熱腫毒主心腹痛霍亂中惡鬼氣殺蟲有數種黃白紫之異今人盛用之真紫檀舊在下品亦主風毒蘇恭云出崑崙盤盤國雖不生中華人間遍有之檀木生江淮及河朔山中其木作斧柯者亦檀香類但不香耳至夏有不生者忽然葉開當有大水農人候之以測水旱號為水檀又有一種葉亦相類高五六尺生高原地四月開花正紫亦名檀根如葛極主瘡疥殺蟲有小毒也海藥沉香按正經生南海山谷味苦溫無毒主心腹痛霍亂中惡邪鬼疰清人神並宜酒煮服之諸瘡腫宜入膏用當以水試乃知子細沒者為沉香浮者為檀似雞骨為雞骨香似馬蹄者為馬蹄香似牛頭者為牛頭香枝條細實者為青桂粗重者為箋香以上七件並同一樹梵云波律亦此香也雷公云沉香凡使須要不枯者如觜角硬重沉於水下為上也半沉者次也夫入丸散中用須候衆藥出即入拌和用之通典海南林邑國秦象郡林邑縣出沉香沉木土人斷之積以歲年朽爛而心節獨在置水中則沉故名曰沉香次不沉者曰棧香海南北嵩國出好棧香藿香及硫黃其藿香樹生千歲根本甚大伐之四五年木皆朽散唯中節堅貞芬香獨存取以為香楊文公談苑嶺南雷州及海外瓊崖山中多香樹山中夷民斫採賣與人其一樹出香三等曰沉香棧香黃熟香沉棧皆二品曰熟結生結熟結者樹自枯爛而得之生結者伐僕之久爛脫而剔取黃熟其破者為黃散香夷民以香樹為槽以飼雞狗別說云謹按沉香種類極多除掌氏補神注及圖經所載多件外又有如龍鱗麻葉竹葉之類不啻一二十品要之可入藥者唯沉而其中無空心者可用若雖沉水而有空心則是雞骨也謂中空而有朽路若雞骨中血眼而軟嫩也衍義曰沉香木嶺南諸郡悉有之傍海諸州尤多交干連枝岡嶺相接千里不絶葉如冬青大者合數人抱木性虛柔山民或以構茅廬或為橋梁或為鈑甑尤佳有香者百無一二蓋木得水方結多在折枝枯乾中或為沉或為煎或為黃熟自枯死者謂之水盤香今南恩高竇等州唯産生結香蓋山民入山見香木之曲干斜枝必以刀斫成坎經年得雨水所漬遂結香復以鋸取之刮去白木其香結為斑點遂名鷓鴣斑燔之極清烈沉之良者唯在瓊崖等州俗謂之角沉黃沉乃枯木中得者宜入藥用依木皮而結者謂之青桂氣尤清在土中歲久不待刓剔而成者謂之龍鱗亦有削之自卷咀之柔韌者謂之黃蠟沉尤難得也然經中只言療風水毒腫去惡氣余更無治療今醫家用以保和衛氣為上品藥須極細為佳今人故多與烏藥磨服走散滯氣獨行則勢弱與他藥相佐當緩取效有益無損余藥不可方也薰陸香木葉類棠梨南印度界阿吒釐國出今謂之西香南番者更佳此即今人謂之乳香為其垂滴如乳熔塌在地者謂之塌香皆一也薰陸香微溫療風水毒腫去惡氣伏尸陶隱居云此合香家要用不正入藥唐本注云形似白膠出天竺單于國臣禹錫等謹按南方草木狀云出大秦在海邊自有大樹生於沙中盛夏樹膠流出沙上夷人採取之賣與賈人注南方異物志同其異者唯云狀如桃膠圖經文具沉香條下唐本薰陸香微溫去惡氣惡瘡出天竺國及邯鄲似松脂黃白色天竺者多白邯鄲者夾緑色香不甚梅師方治齒蟲痛不可忍嚼薰陸香咽其汁立瘥雞舌香微溫療風水毒腫去惡氣療霍亂心痛陶隱居云此皆合香家要用不正入藥唐本注云雞舌樹葉及皮並似栗花如梅花子似棗核此雌樹也不入香用其雄樹雖花不實採花釀之以成香出崑崙及交愛以南臣禹錫等謹按藥性論云雞舌香使味辛無毒入吹鼻散子中用殺腦疳入諸香中令人身香齊民要術云俗人以其似丁子故為丁子香圖經文具沉香條下外臺祕要療齲齒方煮雞舌香汁含之瘥又方療唇舌忽生瘡雞舌香末以綿裹含之瘥抱朴子雞舌香黃連乳汁煎治目中之病應邵漢官侍中年老口臭帝賜雞舌香含之沈存中筆談子集靈苑方論雞舌香以為丁香母蓋出陳氏拾遺今細考之尚未然按齊民要術云雞舌香世以其似丁子故一名丁子香即今丁香是也日華子云雞舌香治口氣所以三省故事郎官口含雞舌香欲其奏事對答其氣芬芳此正謂丁香治口氣至今方書為然又古方五香連翹湯用雞舌香千金五香連翹湯無雞舌香卻有丁香此最為明驗新補本草又出丁香一條蓋不曾深考也今世所用雞舌香乃乳香中得之大如山茱萸銼開中如柿核略無氣味用以治疾殊乖謬藿香微溫療風水毒腫去惡氣療霍亂心痛臣禹錫等謹按南州異物志云藿香出海邊國形如都梁可著衣服中南方草木狀云味辛榛生吏民自種之五六月採曝之乃芬爾出交趾九真諸國日華子云味辛圖經曰藿香舊附五香條不著所出州土今嶺南郡多有之人家亦多種植二月生苗莖梗甚密作叢葉似桑而小薄六月七月採之曝乾乃芬香須黃色然後可收又金樓子及俞益期箋皆云扶南國人言衆香共是一木根便是梅檀節是沉水花是雞舌葉是藿香膠是薰陸詳本經所以與沉香等共條蓋義出於此然今南中所有乃是草類南方草木狀云藿香榛生吏民自種之正相符合也范曄和香方云零藿虛燥古人乃以合薰香本經主霍亂心痛故近世醫方治脾胃吐逆為最要之藥別說云謹按藿香圖經云二月生苗舊雖附五香條中今詳枝梗殊非木類恐當移入草部爾又雞舌香補注引藥性論及齊民要術圖經引三省故事及千金皆謂是母丁香又引抱朴子用入眼方則其說自相矛盾若藥性論謂入香中令人身香及為丁子香則可以為母丁香若抱朴子為可入眼則丁香恐非宜入眼若含香者則丁香含之口中熱臭不可近蓋嘗試之若以乳香中所揀者含之雖無香味卻得口中無臭以其無味故有諸淡利九竅之理諸方多用治小兒驚癇亦欲達九竅也又下條丁香注所說用丁香自當用母者然未知其果否也又薰陸乳香圖經有云今人無復別者今按西出天竺單于南出波斯等國西來者色黃白南來者色赤紫圖經稱木生海邊沙上盛夏木膠出則是日久相重疊者不成乳頭雜以土石其成乳者是新出未雜沙石也薰陸總名也乳者是薰陸之乳頭也今松脂楓脂中亦皆如是者多矣詹糖香微溫療風水毒腫去惡氣伏尸陶隱居云此香皆合香家要用不正入藥唯療惡核毒腫詹糖出晉安岑州上真淳者難得多以其皮及蠹蟲屎雜之唯軟者為佳餘香無真僞而有精粗爾唐本注云詹糖樹似桔煎枝為香似沙糖而黑出交廣以南云詹糖香治惡瘡去惡氣生晉安圖經文具沉香條下檀香陶隱居云白檀消熱腫臣禹錫等謹按陳藏器云主心腹霍亂中惡鬼氣殺蟲白檀樹如檀出海南日華子云檀香熱無毒治心痛霍亂腎氣腹痛濃煎服水磨敷外腎並腰腎痛處圖經文具沉香條下乳香微溫療風水毒腫去惡氣療風癮疹癢毒日華子云味辛熱微毒下氣益精補腰膝治腎氣止霍亂沖惡中邪氣心腹痛疰氣煎膏止痛長肉入丸散微炒殺毒得不黏陳藏器云蓋薰陸之類也其性溫療耳聾中風口噤婦人血氣能發酒理風冷止大腸泄澼療諸瘡令內消圖經文具沉香條下海藥云乳頭香謹按廣志云生南海是波斯松樹脂也紫赤如櫻桃者為上仙方多用辟穀兼療耳聾中風口噤不語善治婦人血氣能發粉酒紅透明者為上簡要濟衆催生方乳香一分黃明者細研為末取母豬血和令勻丸梧桐子大每服五丸酒下博濟方治子死腹中黃明乳香以端午日午時或歲除夜收豬心血相和研為丸如雞頭大以紅絹袋盛掛於門上如患者令酒磨下一丸又方治急慢驚風乳香半兩甘遂半兩同研細每服半錢用乳香湯調下或小便調妙靈苑方治甲疽胬肉裹甲膿血疼痛不瘥凡此疾須剔去肉中甲不治亦愈或已成瘡不瘥用此法乳香末膽礬燒研等分敷之肉消愈沈存中乳香即薰陸香也如乳頭者為乳香榻地者為榻香丹房鏡源乳香啞銅降真香出黔南伴和諸雜香燒煙直上天召鶴得盤旋於上海藥云徐表南州記云生南海山又云生大秦國味溫平無毒主天行時氣宅舍怪異並燒悉驗又按仙傳云燒之或引鶴降醮星辰燒此香甚為第一度籙燒之功力極驗小兒帶之能辟邪惡之氣也蘇合香味甘溫無毒主辟惡殺鬼精物溫瘧蠱毒癇痓去三蟲除邪令人無夢魘久服通神明輕身長年生中臺川穀陶隱居云俗傳云是師子屎外國說不爾今皆從西域來真者雖別亦不復入藥唯供合好香爾唐本注云此香從西域及崑崙來紫赤色與紫真檀相似堅實極芬香唯重如石燒之灰白者好云是師子屎此是胡人誑言陶不悟之猶以為疑也臣禹錫等謹按梁書云中天竺國出蘇合蘇合是諸香汁煎之非自然一物也又云大秦人採蘇合先煎其汁以為香膏乃賣其滓與諸人是以展轉來達中國不大香也陳藏器云按師子屎赤黑色燒之去鬼氣服之破宿血殺蟲蘇合香色黃白二物相似而不同人云師子屎是西國草木皮汁所為胡人將來欲人貴之飾其名爾圖經文具沉香條下唐本余除鬼魅金櫻子味酸澀平溫無毒療脾泄下痢止小便利澀精氣久服令人耐寒輕身方術多用云是今之刺梨子形似榲桲而小色黃有刺花白在處有之臣禹錫等謹按蜀本云術多用言是今之刺榆子形如榲桲而小今醫家用之甚驗雷公炮炙論云林檎向裡子名金櫻子與此同名而已醫方中亦用林檎子者日華子云金櫻花平止冷熱痢殺寸白蛔蟲等和鐵粉研拔白髮敷之再出黑者亦可染髮又云金櫻東行根平無毒治寸白蟲銼二兩入糯米三十粒水二升煎五合空心服須臾瀉下神驗又云皮平無毒炒止瀉血及崩中帶下圖經曰金櫻子舊不載所出州土云在處有之今南中州郡多有而以江西劍南嶺外者為勝叢生效野中大類薔薇有刺四月開白花夏秋結實亦有刺黃赤色形似小石榴十一月十二月採江南蜀中人熬作煎酒服云補治有殊效宜州所供云本草謂之營實其注稱白花者善即此也今校諸郡所述與營實殊別也洪州昌州皆能煮其子作煎寄至都下服食家用和雞頭實作水陸丹益氣補真甚佳孫真人食忌金櫻子煎經霜後以竹夾子摘取於大木臼中轉杵卻刺勿損之擘為兩片去其子以水淘洗過爛搗入大鍋以水煎不得絶火煎約水耗半取出澄濾過仍重煎似稀餳每服取一匙用暖酒一盞調服其功不可具載沈存中金櫻子止遺泄取其溫且澀世之用者待紅熟取汁熬膏大誤也紅熟則卻失本性今取半黃時採用妙衍義曰金櫻子經九月十月熟時採不爾復令人利八種海藥余藤黃謹按廣志云出鄂嶽等州諸山崖其樹名海藤花有蕊散落石上彼人收之謂沙黃就樹採者輕妙謂之臘草酸澀有毒主蚛牙蛀齒點之便落據今所呼銅黃謬矣蓋以銅藤語訛也按此與石淚採無異也畫家及丹灶家並時用之返魂香謹按漢書云漢武帝時西國進返魂香武王內傳云聚窟洞中上有返魂樹採其根於釜中以水煮候成汁方去滓重火煉之如漆候凝則香成也西國使云其香名有六帝曰六名何一名返又魂一名驚精一名回生一名震壇一名人馬精一名節死香燒之一豆許凡有疫死者聞香再活故曰返魂香也海紅豆謹按徐表南州記云生南海人家園圃中大樹而生葉圓有英微寒有小毒主人黑皮䵟𪒟花癬頭面遊風宜入面藥及藻豆近右蜀中種亦成也落雁木謹按徐表南州記云生南海山野中藤蔓而生四面如刀削代州雁門亦有藤蘿高丈餘雁過皆綴其中故曰落雁木又云雁銜至代州雁門皆放落而生以此為名蜀中雅州亦出味平溫無毒主風痛傷折腳氣腫腹滿虛脹以粉木同煮汁蘸洗並立效又主婦人陰瘡浮疱以椿木同煮之妙也圖經曰落雁木生雅州味甘性平無毒治産後血氣痛並折傷內損等疾其苗作蔓纏繞大木苗葉形色大都似茶無花實彼土人四月採苗入藥用䔋木謹按蜀記云生南中八郡樹高數十餘丈闊四五圍葉似飛鳥翼皮中亦有面彼人作餅食之廣志云作飯餌之輕滑美好白勝桄榔面味平溫無毒主補虛冷消食彼人呼為䔋面也柵木皮謹按廣志云生廣南山野郊漢爾雅注云柵木如桑樹味苦溫無毒主霍亂吐瀉小兒吐乳暖胃正氣並宜煎服無名木皮謹按徐表南州記云生廣南山谷大溫無毒主陰腎痿弱囊下濕癢並宜煎取其汁小浴極妙也其實號無名子波斯家呼為阿月渾狀若榛子味辛無毒主腰冷陰腎虛弱房中術使用者衆得木香山茱萸良也奴會子謹按拾遺云生西國諸戎大小如苦藥子味辛平無毒主治小兒無辜疳冷虛渴脫肛骨立瘦損脾胃不磨劉五娘方用為煎治孩子瘦損也二十六種陳藏器余乾陀木皮味平無毒主破宿血婦人血閉腹內血塊酒煎服之生安南皮厚堪染者葉如櫻桃海藥云按西域記云生西國彼人用染僧褐故名乾陀褐色也樹大皮厚味平溫主癥瘕氣塊溫腹暖胃止嘔逆並良也含水藤中水味甘平無毒主止渴潤五臟山行無水處斷之得水可飲清美去濕痹煩熱生嶺南葉似狗蹄煮汁服之主天行時氣搗葉敷中水爛瘡皮皸劉欣期交州記亦載之也海藥云謹按交州記云生嶺南及諸海山谷狀若葛葉似枸杞多在路行人乏水處便吃此藤故以為名主煩渴心躁天行疫氣瘴癘丹石發動亦宜服之皋蘆葉味苦平作飲止渴除痰不睡利水明目出南海諸山葉似茗而大南人取作當茗極重之廣州記曰新平縣出皋蘆皋蘆茗之別名也葉大而澀又南越志曰龍川縣出皋蘆葉似茗味苦澀土人為飲南海謂之過羅或曰物羅皆夷語也海藥云謹按廣州記云出新平縣狀若茶樹闊大無毒主煩渴熱悶下痰通小腸淋止頭痛彼人用代茶故人重之如蜀地茶也蜜香味辛溫無毒主臭除鬼氣生交州大樹節如沉香異物志云蜜香蟲名又云樹生千歲斫僕之四五歲乃往看已腐敗唯中節堅貞是也樹如椿按法華經注云木蜜香蜜也樹形似槐而香伐之五六年乃取其香圖經文具沉香條下海藥云謹按內典云狀若槐樹異物志云其葉如椿交州記云樹似沉香無異主辟惡去邪鬼尸注心氣生南海諸山中種之五六年便有香也阿勒勃味苦大寒無毒主心膈間熱風心黃骨蒸寒熱殺三蟲生佛逝國似皂莢圓長味甜好吃一名婆羅門皂莢也海藥云按異域記云主熱病及下痰殺蟲通經絡子療小兒疳氣凡用先炙令黃用鼠藤味甘溫無毒主丈夫五勞七傷腰腳痛冷陰痿小便數白益陽道除風氣補衰老好顏色取根及莖細銼濃煮服之訖取微汗亦浸酒和藥酒法性極溫服訖稍令人悶無苦生南海海畔山谷作藤繞樹莖葉滑淨似枸杞花白有節心虛苗頭有毛南人皆識其藤有鼠咬痕者良但須嚼咽其汁驗也海藥云謹按廣州記云生南海山谷藤蔓而生鼠愛食此故曰鼠藤咬處即人用入藥彼人食之如吃甘蔗美味甘美主腰腳風冷大補水臟好顏色長筋骨並銼濃煎服之亦取汁浸酒更妙浮爛羅勒味酸平無毒主一切風氣開胃補心除冷痹和調臟腑生康國似厚朴也靈壽木根皮味苦平止水作杖令人延年益壽生劍南山谷圓長皮紫漢書孔光年老賜靈杖顏注曰木似竹有節長不過八九尺圍可三四寸自然有合杖之制不須削理也綟木味甘溫無毒主風血羸瘦補腰腳益陽道宜浸酒生林漢山谷木紋側故曰綟木斑珠藤味甘溫無毒主風血羸瘦婦人諸疾浸酒服之生山谷中不凋子知珠而斑冬取之阿月渾子味辛溫澀無毒主諸痢去冷氣令人肥健生西國諸蕃云與胡榛子同樹一歲榛子二歲渾子也不雕木味苦溫無毒主調中補衰治腰腳去風氣卻老變白生太白山岩谷樹高二三尺葉似槐莖赤有毛如棠梨曼遊藤味甘溫無毒久服長生延年去久嗽出犍為牙門山谷如寄生著大樹春華色紫葉如柳張司空云蜀人謂之沉花藤亦云治癬龍手藤味甘溫無毒主偏風口喎手足癱緩補虛益陽去冷氣風痹斟酌多少雙醇酒浸近火令溫空心服之取汗出安荔浦山石上向陽者葉如龍手因以為名採之無時也放杖木味甘溫無毒主一切風血理腰腳輕身變白不老浸酒服之生溫括睦婺山中樹如木天蓼老人服之一月放杖故以為名也石松味苦辛溫無毒主人久患風痹腳膝疼冷皮膚不仁氣力衰弱久服好顏色變白不老浸酒良生天台山石上如松高一二尺也牛奶藤味甘溫無毒主荒年食之令人不飢取藤中粉食之如葛根令人發落牛好食之生深山大如樹震燒木主火驚失心煮服之又取掛門戶間大厭火災此霹靂木也木麻味甘無毒主老血婦人月閉風氣羸瘦癥瘕久服令人有子生江南山谷林澤葉似胡麻相對山人取以用釀酒也帝休主不愁帶之愁自銷矣生少室嵩高山山海經曰少室山有木名帝休其枝五衢黃花黑實服之不愁今嵩山應有此木人未識固可求之亦如萱草之忘憂也河邊木令飲酒不醉五月五日取七寸投酒中二遍飲之必能飲也檀桓味苦寒無毒主長生神仙去萬病末為散飲服方寸匕盡一枝有驗此百歲蘖之根如天門冬長三四尺別在一旁以小根綴之一名檀桓芝靈寶方亦云木蜜味甘平無毒止渴除煩潤五臟利大小便去膈上熱功用如蜜樹生南方枝葉俱可啖亦煎食如飴今人呼白石木蜜子名枳椇味甜本經云木蜜非此中汁如蜜也崔豹古今注云木蜜生南方合體甜軟可啖味如蜜老枝煎取倍甜止渴也朗榆皮味甘寒無毒主下熱淋利水道令人睡生山中如榆皮有滑汁秋生莢如北榆陶公只見榆作注為南土無榆也那耆悉味苦寒無毒主結熱熱黃大小便澀赤毒諸熱明目取汁洗目主赤爛熱障生西南諸國一名龍花也黃屑味苦寒無毒主心腹痛霍亂破血酒煎服之主酒疸目黃及野雞病熱痢下血水煮服之從西南來者並作屑染黃用之樹如檀
