body:
  text: 卷第四已酉新增衍義雄黃味苦甘平寒大溫有毒主寒熱鼠瘻惡瘡疽痔死肌療疥蟲𧈟瘡目痛鼻中息肉及絶筋破骨百節中大風積聚癖氣中惡腹痛鬼疰殺精物惡鬼邪氣百蟲毒勝五兵殺諸蛇虺毒解藜蘆毒悅澤人面煉食之輕身神仙餌服之皆飛人人腦中勝鬼神延年益壽保中不飢得銅可作金一名黃食石生武都山谷敦煌山之陽採無時陶隱居云煉服之法皆在仙經中以銅為金亦出黃白朮中晉末以來氐羌中紛擾此物絶不復通人間時有三五兩其價如金合丸皆用石門始興石黃之好者爾始以齊初涼州互市微有所得將至都下余最先見於使人陳典簽處撿獲見十餘片伊輩不識此是何等見有夾雌黃或謂是丹砂示吾吾乃示語並又屬覓於是漸漸而來好者作雞冠色不臭而堅實若黯黑及虛軟者不好也武都氐羌是為仇池宕昌亦有與仇池正同而小劣敦煌在涼州西數千里所出者未嘗得來江東不知當復云何此藥最要無所不入唐本注云出石門名石黃者亦是雄黃而通名黃食石而石門者最為劣爾宕昌武都者為佳塊方數寸明徹如雞冠或以為枕服之辟惡其青黑堅者不入藥用若火飛之而療瘡亦無嫌又云惡者名熏黃用熏瘡疥故名之無別熏黃也貞觀年中以宕州新出有得方數尺者但重脆不可全致之爾臣禹錫等謹按吳氏云雄黃神農苦山陰有丹雄黃生山之陽故曰雄是丹之雄所以名雄黃也水經云黃水出零陽縣西北連巫山溪出雄黃頗有神異採常以冬月祭祀鑿石深數丈方得故溪水取名焉抱朴子云雄黃當得武都山所出者純而無雜其赤如雞冠光明曄曄者乃可用耳其但純黃似雌黃色無光者不任作仙藥可以合理病藥耳藥性論云雄黃金苗也殺百毒又名黃石味辛有大毒能治尸疰闢百邪鬼魅殺蠱毒人佩之鬼神不能近入山林虎狼伏涉川濟毒物不敢傷蕭炳云雄黃君陳藏器云按石黃今人敲取中精明者為雄黃外黑者為熏黃主惡瘡殺蟲重瘡疥蟣蝨及和諸藥熏嗽其武都雄黃燒不臭熏黃中者燒則臭以此分別之蘇云通名未之是也日華子云雄黃微毒治疥癬風邪癲癇嵐瘴一切蛇蟲犬獸傷咬久服不飢通赤亮者為上驗之可以㶸蟲死者為真臭氣少細嚼口中含湯不激辣者通用圖經曰雄黃生武都山谷敦煌山之陽今階州山中有之形塊如丹砂明徹不夾石其色如雞冠者為真有青黑色而堅者名熏黃有形色似真而氣臭者名臭黃並不入服食藥只可療瘡疥耳其臭以醋洗之便可斷氣足以亂真用之尤宜細辨又階州接西戎界出一種水窟雄黃生於山岩中有水泉流處其石名青煙石白鮮石雄黃出其中其塊大者如胡桃小者如粟豆上有孔竅其色深紅而微紫體極輕虛而功用勝於常雄黃丹灶家尤所貴重或云雄黃金之苗也故南方近金坑冶處時或有之但不及西來者真好耳謹按雄黃治瘡瘍尚矣周禮瘍醫凡療瘍以五毒攻之鄭康成注云今醫方有五毒之藥作之合黃堥置石膽丹砂雄黃礜石磁石其中燒之三日三夜其煙上著以雞羽掃取之以注創惡肉破骨則盡出故翰林學士楊億常筆記直史館楊嵎年少時有瘍生於頰連齒輔車外腫若覆甌內潰出膿血不輟吐之痛楚難忍療之百方彌年不瘥人語之依鄭法合燒藥成注之創中少頃朽骨連兩牙潰出遂愈後便安寧信古方攻病之速也黃堥若今市中所貨有蓋瓦合也近世合丹藥猶用黃瓦鬲亦名黃堥事出於古也雷公云凡使勿用黑雞黃自死黃夾膩黃其臭黃真似雄黃只是臭不堪用時人以醋洗之三兩度便無臭氣勿誤用也次夾膩黃亦似雄黃其內一重黃一重石不堪用次有黑雞黃亦似雄黃如烏雞頭上冠也凡使要似鷓鴣鳥肝色為上凡修事無以甘草紫背天葵地膽碧稜花四件並細銼每件各五兩雄黃三兩下東流水入垍堝中煮三伏時漉出搗如粉水飛澄去黑者曬乾再研方入藥用其內有劫鐵石是雄黃中有又號赴矢黃能劫於鐵並不入藥用聖惠方治傷寒狐惑毒蝕下部肛外如𧈟痛癢不止以雄黃半兩先用瓶子一個口大者內入灰上如裝香火將雄黃燒之候煙出當病處熏之外臺祕要治骨蒸極熱以一兩和小便一升研如粉乃取黃理石一枚方圓可一尺以炭火燒之三食頃極熱灌雄黃汁於石上恐大熱不可近宜著一片薄毯置石上令患人脫衣坐石上冷停以衣被圍繞身勿令藥氣泄出經三五度瘥又方治箭毒搗為末敷之沸汁出愈亦療蛇咬毒千金方治婦人始覺有妊養胎轉女為男以一兩囊盛帶之又方治耳聾以雄黃硫黃等分為末綿裹塞耳中又方卒中鬼擊及刀兵所傷血漏腹中不出煩滿欲絶雄黃粉酒服一刀圭日三服化血為水又方治癥瘕積聚去三尸益氣延年卻老以雄黃二兩細研為末九度水飛過卻入新淨竹筒內盛以蒸餅一塊塞筒口蒸七度用好粉脂一兩為丸如緑豆大日三服酒下七丸十丸三年後道成益力不飢玉女來侍肘後方若血內漏者以雄黃末如大豆納瘡中又服五錢匕血皆化為水卒以小便服之經驗方治馬汗入肉雄黃白礬等分更用烏梅三個槌碎巴豆一個合研為細末以半錢匕油調敷患處斗門方闢魔以一塊帶頭上妙博濟方治偏頭痛至靈散雄黃細辛等分研令細每用一字以下左邊疼吹入右鼻右邊疼吹入左鼻立效續十全方治纏喉風雄黃一塊新汲水磨急灌吐下瘥集驗方治卒魘雄黃搗為末細篩以管吹入鼻孔中傷寒類要治小腹痛滿不得小便及療天行病雄黃細研蜜丸如棗核納溺孔中又方齒殺蟲以末如棗塞牙間抱朴子餌之法或以蒸煮或以酒服或以硝石化為水乃凝之或以豬脂裹蒸之於赤土下或以松脂和之或以三物煉之引之如布白如冰服之皆令人長生百病除三尸下瘢痕滅白髮黑墮齒生千日玉女來侍可使鬼神又云玉女常以黃玉為志大如黍米在鼻上是真玉女無此志者鬼試人也帶雄黃入山林即不畏蛇若蛇中人以少許末敷之登時愈蛇雖多品唯蝮蛇青蝰金蛇中人為至急不治一日即死人不曉治之方術者為二蛇中人即以刀急割瘡肉投地其肉沸如火炙須臾盡焦而人得活也此蛇七月八月毒盛之時不得齧人其毒不泄乃以牙刺大竹木即亦焦枯太平廣記劉無名成都人也志希延生謂古方草木之藥但愈疾得效見火輒為灰燼自不能固豈有延生之力哉乃入霧中山嘗遇人教服雄黃凡三十餘年一旦有二人赤巾朱服徑詣其室劉問何人對曰我泰山直事追攝子耳不知子以何術我已三日冥期迫促而無計近子將欲陰符譴責以稽延獲罪故見形相問劉曰余無他術但冥心至道不視聲利靜處幽山志希度世而已二使曰子之黃光照灼於頂逮高數尺得非雄黃之功乎今子三尸已去而積功未著大限既盡將及死期豈可苟免劉聞其語心魂憂迫不知所為二使謂之曰岷峨青城神仙之府可以求真師訪尋要道我聞鉛汞朱髓可致沖天此非高真上仙須得修煉之旨復入青城北崖之下見一洞行數里忽覺平博殆非人世遇神仙居其間云青城劉真人劉祈叩再三具述所值鬼使追攝之由願示要道以拔沉淪賜度生死之苦真人指一岩室使棲止其中復令齋心七日乃視其陽爐陰鼎柔金煉化水玉之方伏汞煉鉛成朱髓之訣狐剛子陰長生皆得此道亦名金夜九丹之經丹分三品以鉛為君以汞為臣八石為使黃牙為田君臣相得運火功全七日為輕水二七日變紫鋒三七日五彩具內赤上黃狀如窗塵復運火二年日周六百再經四時重履長至初則十月離胞胎已成初品即能幹汞成銀丸而服之可以祛疫二年之外服者延年益算白髮返黑三年之後服之刀圭散居名山周遊四海為初品地仙服之半劑變化萬端坐在立亡駕馭飛龍白日升天大都此藥經十六節已為中品便能使人長生藥成之日五金八石黃牙諸物與君臣二藥不相雜亂千日功畢名上品還丹謹而藏之勿示非人世有其人視形氣功行合道依而傳之劉受丹訣還霧中山築室修煉三年乃成開成二年猶駐於蜀自述無名傳以示後人入青城山去不知所終矣太上八帝玄變經小丹法用雄黃柏子拘魂制魄方柏子細篩去滓松脂十斤以和柏子雄黃各二斤色如赤李合藥臼中復搗如蒸藥一日如餌正坐北向平旦頓服五丸百日之後與神人交見明皇雜録有黃門奉使交廣回周顧謂曰此人腹中有蛟龍上驚問黃門曰卿有疾否曰臣馳馬大庾嶺時當大熱困且渴遂飲水覺腹中堅痞如石周遂以硝石及雄黃煮服之立吐一物長數寸大如指視之鱗甲具投之水中俄頃長數尺復以苦酒沃之如故以器覆之明日已生一龍矣上甚訝之唐書甄立言究習方書仕唐為太常丞有道人心腹滿煩彌二歲立言診曰腹有蠱誤食發而然令餌雄黃一劑少選吐一蛇如人小指唯無目燒之有發氣乃愈寶藏論雄黃若以草藥伏住者熟煉成汁胎色不移若將制諸藥成汁並添得者上可服食中可點銅成金下可變銀成金丹房鏡源雄黃千年化為黃金衍義曰雄黃非金苗今有金窟處無雄黃金條中言金之所生處處皆有雄黃豈處處皆得也別法治蛇咬焚之熏蛇遠去又武都者鐫磨成物形終不免其臭唐甄立言仕為太常丞有道人病心腹滿煩彌二歲診曰腹有蠱誤食發而然令餌雄黃一劑少選吐一蛇如拇指無目燒之有發氣乃愈此殺毒蟲之驗也石硫黃味酸溫大熱有毒主婦人陰蝕疽痔惡血堅筋骨除頭禿療心腹積聚邪氣冷癖在脅咳逆上氣腳冷疼弱無力及鼻衄惡瘡下部𧈟瘡止血殺疥蟲能化金銀銅鐵奇物生東海牧羊山谷中及太山河西山礬石液也陶隱居云東海郡屬北徐州而箕山亦有今第一齣扶南林邑色如鵝子初出殼名崑崙黃次出外國從蜀中來色深而煌煌然方用之療腳弱及痼冷甚良仙經頗用之所化奇物並是黃白朮及合丹法此云礬石液今南方則無礬石恐不必爾臣禹錫等謹案吳氏云硫黃一名石留黃神農黃帝雷公咸有毒醫和扁鵲苦無毒或生易陽或河西或五色黃是潘水石液也燒令有紫焰者八月九月採治婦人血結藥性論云石硫黃君有大毒以黑錫煎湯解之及食宿冷豬肉味甘太陽之精鬼焰居焉伏煉數般皆傳於作者能下氣治腳弱腰腎久冷除冷風頑痹又云生用治疥癬及療寒熱咳逆煉服主虛損泄精簫炳云硫黃臣日華子云石亭脂曾青為使畏細辛飛廉鐵壯陽道治痃癖冷氣補筋骨勞損風勞氣止嗽上氣及下部痔瘻惡瘡疥癬殺腹藏蟲邪魅等煎余甘子汁以御其毒也圖經曰石硫黃生東海牧羊山谷中及泰山河西山礬石液也今唯出南海諸蕃嶺外州郡或有而不甚佳以色如鵝子初出殼者為真謂之崑崙黃其赤色者名石亭脂青色者號冬結石半白半黑名神驚石並不堪入藥又有一種土硫黃出廣南及榮州溪澗水中流出其味辛性熱腥臭主治疥瘡殺蟲毒又可煎煉成汁以摸寫作器亦如鵝子黃色謹按古方書未有服餌硫黃者本經所説功用止於治瘡蝕攻積聚冷氣腳弱等而近世遂火煉治為常服丸散觀其制煉服食之法殊無本源非若乳石之有論議節度故服之其效雖緊而其患更速可不戒之海藥謹案廣州記云生崑崙日腳下顆塊瑩淨無夾石者良主風冷虛憊腎冷上氣腿膝虛羸長肌膚益氣力遺精痔漏老人風祕等並宜燒煉服仙方謂之黃硇砂能壞五金亦能造作金色人能制伏歸本色服而能除萬病如有發動宜以豬肉鴨羹余甘子湯並解之蜀中雅州亦出光膩甚好功力不及舶上來者雷公云凡使勿用青赤色及半白半青半赤半黑者自有黃色內瑩淨似物命者貴也凡用四兩先以龍尾蒿自然汁一鎰東流水三鎰紫背天葵汁一鎰粟遂子莖汁一鎰四件合之攪令勻一垍堝用六一泥固濟底下將硫黃碎之入於堝中以前件藥汁旋旋添入火煮之汁盡為度了再以百部末十兩柳蚛末二斤一簇草二斤細銼之以東流水並藥等同煮硫黃二伏時日滿去諸藥取出用熟甘草湯洗了入鉢中研二萬幣方用聖惠方治諸瘡胬肉如蛇出數寸用硫黃一兩細研於肉上薄塗之即便縮外臺祕要千金療小兒聤耳硫黃末以粉耳中日一夜一瘥止肘後方女子陰瘡末硫黃敷之經驗方大治元臟氣發久冷腹痛虛瀉應急大效玉粉丹生硫黃五兩青鹽一兩以上袞細研以蒸餅為丸如緑豆大每服五丸熱酒空心服以食壓之梅師方治陰生濕疱瘡取石硫黃研如粉敷瘡上日三度博濟方治陰陽二毒傷寒黑龍丹舶上硫黃一兩以柳木槌研三兩日巴豆一兩和殼記個數用二升鐺子一口先安硫黃鋪鐺底次安巴豆又以硫黃蓋之釅醋半升以來澆之盞子蓋合令緊密更以濕紙周回固濟縫勿令透氣縫紙干更以醋濕之文武火熬常著人守之候裡面巴豆作聲數已半為度即將鐺子離火便入臼中急搗令細再以米醋些子並蒸餅些小再搗令冷可丸如雞頭大若是陰毒用椒四十九粒蔥白二莖水一盞煎至六分服一丸陽毒用豆豉四十九粒蔥白二莖水一盞同煎吞一丸不得嚼破孫尚藥治氣虛傷冷暴作水瀉日夜三二十行腹痛不止夏月路行備急朝真丹硫黃二兩牛角研令極細枯白礬半兩同細研勻水浸蒸餅去水脈了和丸如梧桐子大硃砂為衣每服十五丸至二十丸米飲鹽湯下玉亟方王方平通靈王粉散洽腰膝暖水臟益顏色其功不可具載硫黃半斤桑柴灰五斗淋取汁煮三伏時以鐵匙抄於火上試之伏火即止候乾以大火煅之如未伏更煮以伏為度煅了研為散穿地坑一尺二寸投水於中待水清取水和硫黃水不得多於垍堝中煎熬令如膏及用鐵錢一面不著火上以細砂隔紙慢抄出硫黃於紙上滴之自然如玉色光彩射人此號為玉粉散細研要丸以飯丸如麻子大空心每日鹽湯下十丸散服亦鹽湯調兩字極有效驗余鄉人王昭遂合服之年九十顏貌如童夜視細字力倍常人太清服煉靈砂法石硫黃本出波斯國南明之境稟純陽火石之精氣而結成質性通流含其猛毒藥品之中號為將軍功能破邪歸正返滯還清挺立陽精消陰化魄丹房鏡源石硫黃可干汞訣曰此硫黃見五金而黑得水銀而赤又曰黃牙青霞子硫黃散癖衍義曰石硫黃今人用治下元虛冷元氣將絶久患寒泄脾胃虛弱垂命欲盡服之無不效中病當便已不可盡劑世人蓋知用而為福不知用久為禍此物損益兼行若俱棄而不用當倉猝之間又可缺乎或更以法制拒火而又常服者是亦弗思也在本經則不言如此服食但專治婦人不知者往往更以酒服其可得乎或臟中久冷服之先利如病熱危急可加丸數服少則不效仍如附子乾薑桂雌黃味辛甘平大寒有毒主惡瘡頭禿痂疥殺毒蟲蝨身癢邪氣諸毒蝕鼻中息肉下部𧈟瘡身面白駁散皮膚死肌及恍惚邪氣殺蜂蛇毒煉之久服輕身增年不老令人腦滿生武都山谷與雄黃同山生其陰山有金金精熏則生雌黃採無時陶隱居云今雌黃出武都仇池者謂為武都仇池黃色小赤扶南林邑者謂崑崙黃色如金而似雲母甲錯畫家所重依此言既有雌雄之名又同山之陰陽於合藥便當以武都為勝用之既稀又賤於崑崙者仙經無單有法唯以合丹砂雄黃共飛煉為丹爾金精是雌黃銅精是空青而服空青反勝於雌黃其義難了臣禹錫等謹按藥性論云雌黃君不入湯服圖經曰雌黃生武都山谷與雄黃同山其陰山有金金精熏則生雌黃今出階州以其色如金又似雲母甲錯可析者為佳其夾石及黑如鐵色者不可用或云一塊重四兩者析之可得千重此尤奇好也採無時雷公云凡使勿誤用夾石黃黑黃珀熟等雌黃一塊重四兩按乾寧記云指開拆得千層軟如爛金者上凡修事勿令婦人雞犬新犯淫人有患人不男人非形人曾是刑獄地臭穢以上並忌若犯觸者雌黃黑如鐵不堪用也及損人壽凡修事四兩用天碧枝和陽草粟遂子草各五兩三件干濕加一倍用瓷堝子中煮三伏時了其色如金汁一垛在堝底下用東流水猛投於中如此淘三度了去水取出試干卻於臼中搗篩過研如塵可用之聖惠方治烏癩瘡殺蟲用雌黃研如粉以醋並雞子黃打令勻塗於瘡上干即更塗又方治婦人久冷血氣攻心疼痛不止以葉子黃二兩細研醋一升煎似稠糊丸如小豆大每服無時醋湯下五丸又方治久心痛時發不定多吐清水不下飲食以雌黃二兩好醋二升慢火煎成膏用干蒸餅丸如梧桐子大每服七丸薑湯下百一方治小腹滿不得小便細末雌黃蜜丸如棗核大納一丸溺孔中令人半寸許以竹管注陰令緊嗍氣通之經驗方縮小便以顆塊雌黃一兩半研如粉乾薑半兩切碎入鹽四大錢同炒令乾薑色黃同為末干蒸餅入水為丸如緑豆大每服十丸至二十丸空心鹽湯下斗門方治肺勞咳嗽以雌黃一兩入瓦盒內不固濟坐盒子於地上用灰培之周匝令實可厚二寸以炭一斤簇定頂以火煅之三分去一退火待冷出研如面用蟾酥為丸如粟大每日空心杏仁湯下三丸瘥勝金方治久嗽暴嗽勞嗽金栗丸葉子雌一兩研細用紙筋泥固濟小盒子一個令乾勿令泥厚將藥入盒子內水調赤石脂封盒子口更以泥封之候乾坐盒子於地上上面以未入窯瓦坯子彈子大擁盒子令作一尖子上用炭十斤簇定頂上著火一尉斗籠起令火從上漸熾候火消三分去一看瓦坯通赤則去火候冷開盒子取藥當如鏡面光明紅色入乳鉢內細研湯浸蒸餅心為丸如粟米大每服三丸五丸甘草水服服後睡良久妙寶藏論雌黃伏住火胎色不移鞁熔成汁者點銀成金點銅成銀丹房鏡源黃背陰者雌也純柔者亦可干録舶上噀血者上湖南者次青者本性葉子上者可轉硫黃伏粉霜記之不可誤使青霞子云雌黃辟邪去惡衍義曰雌黃入藥最稀服石者宜審諦治外功多方士點化術多用亦未聞終始如何畫工或用之食鹽味鹹溫無毒主殺鬼蠱邪疰毒氣下部𧈟瘡傷寒寒熱吐胸中痰癖止心腹卒痛堅肌骨多食傷肺喜咳陶隱居云五味之中唯此不可缺有東海北海鹽及河東鹽池梁益鹽井交廣有南海鹽西羌有山鹽胡中有樹鹽而色類不同以河東者為勝東海鹽官鹽白草粒細北海鹽黃草粒粗以作魚鮓及咸菹乃言北勝而藏繭必用鹽官者蜀中鹽小淡廣州鹽鹹苦不知其為療體復有優劣否西方北方人食不耐咸而多壽少病好顏色東方南方人食絶欲咸而少壽多病便是損人則傷肺之效矣然以浸魚肉則能經久不敗以沾布帛則易致朽爛所施處各有所宜也今注唐本原在米部今移臣禹錫等謹按蜀本云多食令人失色膚黑損筋力也藥性論云鹽有小毒能殺一切毒氣鬼疰氣主心痛中惡或連腰臍者鹽如雞子大青布裹燒赤納酒中頓服當吐惡物主小兒卒不尿安鹽於臍中灸之面上五色瘡鹽湯綿浸拓瘡上日五六度易瘥又和槐白皮切蒸治腳氣又空心揩齒少時吐水中洗眼夜見小字良治婦人隱處疼痛者鹽青布裹尉之主鬼疰尸疰下部蝕瘡炒鹽布裹坐尉之兼主火灼瘡陳藏器云按鹽本功外除風邪吐下惡物殺蟲明目去皮膚風毒調和腑臟消宿物令人壯健人卒小便不通炒鹽納臍中即下陶公以為損人斯言不當且五味之中以鹽為主四海之內何處無之唯西南諸夷稍少人皆燒竹及木鹽當之日華子云暖水臟及霍亂心痛金瘡明目止風淚邪氣一切蟲傷瘡腫消食滋五味長肉補皮膚通大小便小兒疝氣並內腎氣以葛袋盛於戶口懸之父母用手拈抖盡即疾當愈圖經曰食鹽舊不著所出州郡陶隱居云有東海北海鹽及河東鹽池梁益有鹽井交廣有南海鹽西羌有山鹽胡中有木鹽而色類不同以河東者為勝河東鹽今解州安邑兩池所種鹽最為精好是也又有並州兩監末鹽乃刮鹼煎煉不甚佳其咸蓋下品所著滷鹼生河東鹽池者謂此也下品又有大鹽生邯鄲及河東池澤蘇恭云大鹽即河東印鹽人之常食者形粗於末鹽乃似今解鹽也解人取鹽於池旁耕地沃以池水每臨南風急則宿昔成鹽滿畦彼人謂之種鹽東海北海南海鹽者今滄密楚秀溫臺明泉福廣瓊化諸州官場煮海水作之以給民食者又謂之澤鹽醫方所謂海鹽是也其煮鹽之器漢謂之牢盆今或鼓鐵為之或編竹為之上下周以蜃灰廣丈深尺平底置於灶皆謂之鹽盤南越志所謂織篾為鼎和以牡蠣也然後於海濱掘地為坑上布竹木覆以蓬茅又積沙於其上每潮汐沖沙滷鹼淋於坑中水退則以火炬照之滷氣衝火皆滅因取海滷注盤中煎之頃刻而就管子曰齊有渠展之鹽伐菹薪煮海水徵積之十月始生至於正月成三萬是也菹薪謂以茅菹燃火也梁益鹽井者今歸州及西川諸郡皆有鹽井汲其水以煎作鹽如煮海之法但以食彼方之民耳西羌山鹽胡中水鹽者即下條云光明鹽生鹽州下品有戎鹽生胡鹽山及西羌北地酒泉福祿城東南角北海青南海赤者是也然羌胡之鹽種類自多陶注又云虜中鹽有九種白鹽食鹽常食者黑鹽柔鹽赤鹽駁鹽臭鹽馬齒鹽之類今人不能遍識醫家治眼及補下藥多用青鹽疑此即戎鹽而本經云北海青南海赤今青鹽從西羌來者形塊方稜明瑩而青黑色最奇北胡來者作大塊而不光瑩又多孔竅若蜂窠狀色亦淺於西鹽彼人謂之鹽枕入藥差劣北胡又有一種鹽作片屑如碎白石彼人亦謂之青鹽緘封於匣中與鹽枕並作禮贄不知是何色類又階州出一種石鹽生山石中不由煎煉自然成鹽色甚明瑩彼人甚貴之云即光明鹽也醫方所不用故不能盡分別也又通泰海州並有停戶刮鹼煎鹽輸官如並州末鹽之類以供給江湖極為饒衍其味乃優於並州末鹽也濱州亦有人戶煎煉草土鹽其色最粗黑不堪入藥但可啖馬耳又下有緑鹽條云以光明鹽硇砂赤銅屑釀之為塊緑色真者出焉耆國水中石下取之狀若扁青空青今不聞識此者醫方亦不用唐柳柳州纂救三死治霍亂鹽湯方云元和十一年十月得乾霍亂上不可吐下不可利出冷汗三大斗許氣即絶河南房偉傳此湯入口即吐絶氣復通其法用鹽一大匙熬令黃童子小便一升二物溫和服之少頃吐下即愈劉禹錫傳信方著崔中丞煉鹽黑丸方鹽一升搗末納粗瓷瓶中實築泥頭訖初以火燒漸漸加炭火勿令瓶破候赤徹鹽如水汁即去火其鹽冷即凝破瓶取之豉一升熬焦桃仁一大兩和麩熬令熟巴豆二大兩去心膜紙中熬令油出須生熟得所即少力生又損人四物各用研搗成熟藥稱量蜜和丸如梧子每服三丸皆平旦時服天行時氣豉汁及茶下並得服後多吃茶汁行藥力心痛酒下入口便止血痢飲下初變水痢後便止鬼瘧茶飲下骨熱白蜜湯下忌冷漿水合藥久則丸稍加令大凡服藥後吐痢勿怪服藥一日忌口兩日吐痢若多即煎黃連汁服止之平旦服藥至小食時以來不吐痢者或遇殺藥人即更服一兩丸投之其藥冬中合臘月尤佳瓷合子中盛貯以臘紙封之勿令泄氣清河崔能云合得一劑可救百人天行時氣卒急覓諸藥不得又恐過時或在道途或在村落無諸藥可求但將此藥一刀圭即敵大黃朴硝數兩曾試有效宜行於閭里間及所使輩若小兒女子不可服多被攪作耳唐方又有藥鹽法出於張文仲唐之士大夫多作之食療蠼螋尿瘡鹽三升水一斗煮取六升以綿浸湯掩瘡上又治一切氣及腳氣取鹽三升蒸候熱分裹近壁腳踏之令腳心熱又和槐白皮蒸用亦治腳氣夜夜與之良又以皂莢兩梃鹽半兩同燒令通赤細研夜夜用揩齒一月後有動者齒及血𧈟齒並瘥其齒牢固聖惠方治小兒臍風濕以鹽二兩豉二合相和爛搗捏作餅子如錢大安新瓦上炙令熱以尉臍上瘥亦用黃柏藥末敷之又方治肝風虛轉筋入腹以鹽半斤水煮少時熱漬之佳外臺祕要治胸心痰飲傷寒熱病瘴瘧須吐者以鹽末一大匙以水或暖湯送下須臾則吐吐不快明旦更服甚良又方治天行後兩脅脹滿小便澀熬鹽尉臍下又方主風身體如蟲行鹽一斗水一石煎減半澄清溫洗三五度治一切風千金方治齒齦宣露每旦捻鹽納口中以熱水含嗽齒百遍不過五日齒即牢密又方主逆生以鹽塗兒足底又可急搔爪之千金翼治諸瘡癬初生或始痛時以單方救不效嚼鹽塗之妙肘後方治中風但腹中切痛以鹽半斤熬令水盡著口中飲熱湯二升得吐愈又方齒疼齦間出血極驗以鹽末每夜厚封齒齦上有汁瀝盡乃臥其汁出時仍叩齒勿住不過十夜疼血止更久尤佳長慎豬肉油菜等又方卒得風覺耳中恍恍者急取鹽五升甑蒸使熱以耳枕之冷復易又方治耳卒疼痛以鹽蒸尉之又方手足忽生疣目以鹽敷疣上令牛舐之不過三度又方治金瘡中風煎鹽令熱以匙抄瀝取水熱瀉瘡上冷更著一日許勿住取瘥大效又方治赤白久下穀道疼痛不可忍宜服溫湯熬鹽尉之又炙枳實尉之妙經驗方治蚯蚓咬濃作鹽湯浸身數遍瘥浙西軍將張韶為此蟲所咬其形如大風眉須皆落每夕蚯蚓鳴於體有僧教以此方愈梅師方治心腹脹堅痛悶不安雖未吐下欲死以鹽五合水一升煎令消頓服自吐下食出即定不吐更服又方治金中經脈傷皮及諸大脈血出多心血冷則殺人宜炒鹽三撮酒調服之又方治蜈蚣咬人痛不止嚼鹽沃上及以鹽湯浸瘡極妙其蜈蚣有赤足者螫人黃足者痛甚又方治熱病下部有𧈟蟲生瘡熬鹽綿裹尉之不過三度瘥孫真人食忌主眯眼者以少鹽並豉置水視之立出又方主卒喉中生肉以綿裹箸頭柱鹽揩日六七度易又方主卒中尸遁其狀腹脹氣急衝心或塊起或牽腰脊者是服鹽湯取吐食醫心鏡鹽主殺鬼蠱氣下部𧈟瘡傷寒寒熱吐胸中痰癖止心腹卒痛堅肌骨黃帝云食甜瓜竟食鹽成霍亂又主大小腸不通取鹽和苦酒敷臍中干即易廣利方治氣淋臍下切痛以鹽和醋調下集驗方主毒箭以鹽貼瘡上灸鹽三十壯瘥範汪方主轉筋以鹽一升水一升半作湯洗漬之又方主目中淚出不得開即刺痛方以鹽如大豆許納目中習習去鹽以冷水數洗目瘥産寶方治妊娠心腹痛不可忍以一斤鹽燒令赤以三指取一撮酒服瘥子母祕録小兒撮口鹽豉臍上灸之後魏李孝伯傳鹽九種各有所宜白鹽主上所自食黑鹽治腹脹氣滿末之以酒服六銖素問咸傷血發渴之證丹房鏡源鹽消作汁拒火之力衍義曰食鹽素問曰咸走血故東方食魚鹽之人多黑色走血之驗故可知矣病嗽及水者宜全禁之北狄用以淹尸取其不壞也至今如此若中蚯蚓毒當以鹽洗沃亦宜湯化飲汁其燒剝金銀熔汁作藥仍須解州池鹽為佳齒縫中多出血常以鹽湯嗽即已益齒走血之驗也水銀味辛寒有毒主疥瘻痂瘍白禿殺皮膚中蝨墮胎除熱以敷男子陰陰消無氣殺金銀銅錫毒熔化還復為丹久服神仙不死一名汞生符陵平土出於丹砂畏磁石陶隱居云今水銀有生熟此云生符陵平土者是出硃砂腹中亦別出沙地皆青白色最勝出於丹砂者是今燒粗末硃砂所得色小白濁不及生者甚能消化金銀使成泥人以鍍物是也還復為丹事出仙經酒和日曝服之長生燒時飛著釜上灰名汞粉俗呼為水銀灰最能去蝨唐本注云水銀出於硃砂皆因熱氣未聞硃砂腹中自出之者火燒飛取人皆解法南人蒸取之得水銀雖少而硃砂不損但色少變黑爾今按陳藏器本草云水銀本功外利水道去熱毒入耳能食腦至盡入肉令百節攣縮倒陰絶陽人患瘡疥多以水銀塗之性滑重直入肉宜慎之昔北齊徐王療攣躄病以金物火炙尉之水銀得金當出蝕金候金色白者是也如此數度並瘥也臣禹錫等謹按廣雅云水銀謂之澒紅董切藥性論云水銀君殺金銅毒奼女也有大毒硃砂中液也此還丹之元母神仙不死之藥伏煉五金為泥生能墮胎主療疥等緣殺蟲日華子云水銀無毒治天行熱疾催生下死胎治惡瘡除風安神鎮心鍍金燒粉人多患風或大段使作須飲酒並肥豬肉及服鐵漿可御其毒圖經曰水銀生符陵平土今出秦州商州道州邵武軍而秦州乃來自西羌界經云出於丹砂者乃是山石中採粗次硃砂作爐置砂於中下承以水上覆以盎器外加火煅養則煙飛於上水銀溜於下其色小白濁陶隱居云符陵平土者是出硃砂腹中亦別出沙地皆青白色今不聞有此至於西羌來者彼人亦云如此燒煅但其山中所生極多至於一山自折裂人採得砂石皆大塊如升斗碎之乃可燒煅故西來水銀極多於南方者謹按廣雅水銀謂之澒丹灶家乃名汞蓋字亦通用耳其爐蓋上灰亦名汞粉是也又飛煉水銀為輕粉醫家下膈最為要藥服者忌血以其本出於丹砂故也雷公云凡使勿用草中取者並舊朱漆中者勿用經別藥制過者勿用在尸過者半生半死者其水銀若在硃砂中産出者其水銀色微紅收得後用胡蘆收之免遺失若先以紫背天葵並夜交藤自然汁二味同煮一伏時其毒自退若修十兩用前二味汁各七鎰和合煮足為度聖惠方誤吞銀環子叉子以半兩服之再服即出經驗後方治心風祕水銀一兩藕節八個先研藕節令細次入水銀同研成沙子丸如雞頭子大每服二丸磨刀水下一二服瘥梅師方治胎死腹中不出其母氣絶以水銀二兩吞之立出又方治難産以水銀二兩先煮之後服立瘥又方治痔穀道中蟲癢不止以水銀棗膏各二兩同研相和拈如棗形狀薄綿片裹納下部明日蟲出若痛者加粉三大分作丸漢武帝內傳曰封君達隴西人初服黃連五十餘年入烏峰山服水銀百餘年還鄉里如二十者常乘青牛故號青牛道士太清服煉靈砂法汞稟五陽神之靈精會符合為體故能輕飛玄化感遇萬靈丹房鏡源可以勾金可為湧泉匱蓋藉死水銀之氣也衍義曰水銀入藥雖各有法極須審慎有毒故也婦人多服絶娠今人治小兒驚熱涎潮往往多用經中無一字及此亦宜詳諦得鉛則凝得硫黃則結並棗肉研之則散別法煅為膩粉粉霜唾研斃蝨銅得之則明灌尸中則令尸後腐以金銀銅鐵置其上則浮得紫河車則伏唐韓愈云太學博士李干遇信安人方士柳賁能燒水銀為不死藥以鉛滿一鼎按中為空實以水銀蓋封四際燒為丹砂服之下血比四年病益急乃死余不知服食説自何世起殺人不可計而世慕尚之益至此其惑也在文書所記及耳聞傳者不説今直取目見親與之遊而以藥敗者六七公以為世誡工部尚書歸登自説既服水銀得病若有燒鐵杖自顛貫其下摧而為火射竅節以出狂痛號呼乞絶其茵席得水銀發且止唾血十數年以斃殿中御史李虛中疽發其背死刑部尚書李遜謂余曰我為藥誤遂死刑部侍郎李建一旦無病死工部尚書孟簡邀我於萬州屏人曰我得祕藥不可獨不死今遺子一器可用棗肉為丸服之別一年而病後有人至訊之曰前所服藥誤方且下之下則平矣病二歲卒東川節度御史大夫盧坦溺血肉痛不可忍乞死金吾將軍李道古以柳賁得罪食賁藥五十死海上此可為誡者也蘄不死乃速得死謂之智者不可也五穀三牲鹽醯果蔬人所常御人相厚勉必曰強食今惑者皆曰五穀令人夭當務減節臨死乃悔嗚呼哀也已今有水銀燒成丹砂醫人不曉研為藥衣或入藥中豈不違誤可不慎哉石膏味辛甘微寒大寒無毒主中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼産乳金瘡除時氣頭痛身熱三焦大熱皮膚熱腸胃中隔氣解肌發汗止消渴煩逆腹脹暴氣喘息咽熱亦可作浴湯一名細石細理白澤者良黃者令人淋生齊山山谷及齊盧山魯蒙山採無時雞子為之使惡莽草馬目毒公陶隱居云二郡之山即青州徐州也今出錢塘縣皆在地中雨後時時自出取之皆如棋子白徹最佳彭城者亦好近道多有而大塊用之不及彼仙經不須此唐本注云石膏方解石大體相似而以未破為異今市人皆以方解石代石膏未見有真石膏也石膏生於石旁其方解石不因石而生端然獨處大者如升小者若拳或在土中或生溪水其上皮隨土及水苔色破之方解大者方尺今人以此為石膏療風去熱雖同而解飢發汗不如真者臣禹錫謹按藥性論云石膏使惡巴豆畏鐵能治傷寒頭痛如裂壯熱皮如火燥煩渴解肌出毒汗主通胃中結煩悶心下急煩躁治唇口乾焦和蔥煎茶去頭痛蕭炳云石膏臣陳藏器云陶云出錢塘縣中按錢塘在平地無石膏陶為錯注蘇又注五石脂云五石脂中又有石膏似骨如玉堅潤服之勝鍾乳與此石膏乃是二物同名耳不可混而用之日華子云治天行熱狂下乳頭風旋心煩躁揩齒益齒通亮理如雲母者上又名方解石圖經曰石膏生齊山山谷及齊盧山魯蒙山今汾孟虢耀州興元府亦有之生於山石上色至瑩白其黃者不堪此石與方解石絶相類今難得真者用時唯取未破者以別之其方解石不附石而生端然獨處外皮有土及水苔色破之皆作方稜石膏自然明瑩如玉石此為異也採無時方解石舊出下品本經云生方山陶隱居以為長石一名方石療體相似疑是一物蘇恭云療熱不減石膏若然似可通用但主頭風不及石膏也又今南方醫家著一説云按本草石膏方解石大體相似但方解石不因石端然獨處又云今市人皆以方解石代石膏未見有真石膏也又陶隱居謂石膏皆在地中雨後時時自出取之皆如棋子此又不附石生也二説相反未知孰是今詳石膏既與方解石肌理形段剛柔皆同但以附石不附石豈得功力相異也但意今之所用石膏方解者自是方解石石膏乃別是一物爾今石膏中時時有瑩徹可愛有縱理而不方解者好事者或以為石膏然據本草又似長石又有議者以謂青石間往往有白脈貫徹類肉之有膏肪者為石膏此又本草所謂理石也然不知石膏定是何物今且依市人用方解石然博物者亦宜堅考其實也今密州九仙山東南隅地中出一種石青白而脆擊之內有火謂之玉火石彼土醫人常用之云味甘微辛溫療傷寒發汗止頭目昏眩痛功與石膏等彼土人或以當石膏故以附之雷公云凡使勿用方解石方解石雖白不透明其性燥若石膏出剡州茗山縣義情山其色瑩淨如水精性良善也凡使之先於石臼中搗成粉以夾物羅過生甘草水飛過了水盡令乾重研用之外臺祕要骨蒸亦曰內蒸所以言內者必外寒內熱附骨也其根在五臟六腑之中或皮燥而無光蒸盛之時四肢漸細足趺腫者石膏十分研如乳法和水服方寸匕日再以體涼為度肘後方葛氏療小便卒大數非淋令人瘦以石膏半斤搗碎水一斗煮取五升稍飲五合梅師方治熟油湯火燒瘡痛不可忍取石膏搗末細研用粉瘡愈子母祕録治乳不下以石膏三兩水二升煮之三沸三日飲令盡妙太上八帝玄變經石膏發汗丹房鏡源石膏桂州者可結汞別説云謹按陶説出錢塘山中雨後時時自出今錢塘人乃鑿山以取之甚多搗為末作齒藥貨用浙人呼為寒水石然入藥最勝他處者今既鑿山石而取乃是因石而生即石膏也陳藏器謂錢塘縣在平地無石膏乃知陳不識錢塘明矣衍義曰石膏二書紛辨不決未悉厥理詳本經原無方解石之文止緣唐本注石膏方解石大體相似因此一説後人遂惑經曰生齊山山谷及齊魯山魯蒙山採無時即知他處者為非今圖經中又以汾州者編入前後人都不詳經中所言細理白澤者良故知不如是則非石膏也下有理石條中經云如石膏順理而細又可明矣今之所言石膏方解石二者何等有順理細紋又白澤者有是則石膏也無是則非石膏也仍須是經中所言州土者方可入藥余皆偏見可略不取仲景白虎湯中服之如神新校正仲景傷寒論後言四月以後天氣熱時用白虎者是也然四方氣候不齊又歲中氣運不一方所既異雖其説甚雅當此之時亦宜兩審若傷寒熱病或大汗後脈洪大口舌躁頭痛大渴不已或著暑熱身痛倦怠白虎湯服之無不效金屑味辛平有毒主鎮精神堅骨髓通利五臟除邪毒氣服之神仙生益州採無時陶隱居云金之所生處處皆有梁益寧三州多有出水沙中作屑謂之生金辟惡而有毒不煉服之殺人建平晉安亦有金砂出石中燒熔鼓鑄為鍋雖被火亦未熟猶須更煉高麗扶南及西域外國成器皆煉熟可服仙經以醯蜜及豬肪牡荊酒輩煉餌柔軟服之神仙亦以合水銀作丹砂外醫方都無用者當是慮其有毒故也仙方名金為太真今注醫家所用皆煉熟金箔及以水煎金器取汁用之固無毒矣按陳藏器拾遺云嶺南人云生金是毒蛇屎此有毒常見人取金掘地深丈餘至紛子石石皆一頭黑焦石下有金大者如指小猶麻豆色如桑黃咬時極軟即是真金夫匠竊而吞者不見有毒其麩金出水沙中毯上掏取或鵝鴨腹中得之即便打成器物亦不重煉煎取金汁便堪鎮心此乃藏器傳聞之言全非按據皇朝收復嶺表詢其事於彼人殊無蛇屎之事入藥當必用熟金恐後人覽藏器之言惑之故此明辨臣禹錫等謹按藥性論云黃金屑金箔亦同主小兒驚傷五臟風癇失志鎮心安魂魄楊損之云百鍊者堪生者殺人水飲合膏飲之即不煉日華子云金平無毒畏水銀鎮心益五臟添精補髓調利血脈圖經曰金屑生益州銀屑生永昌陶隱居注云金之所生處處皆有梁益寧三州多有出水沙中作屑謂之生金而銀所出處亦與金同但皆生石中耳蘇恭以為銀之與金生不同處金又出水中陳藏器云生金是毒蛇屎常見人取金掘地深丈餘至紛子石石皆一頭黑焦石下有金大者如指小猶若麻豆色如桑黃咬時極軟即是真金麩金出水沙中毯上淘取或鵝鴨腹中得之今注以陳説為非是然今饒信南劍登州出金處採得金亦多端或有若山石狀者或有若米豆粒者若此類未經火皆可為生金其銀在礦中則與銅相雜土人採得之必以鉛再三煎煉方成故不得為生銀也故下別有生銀條云出饒州樂平諸坑生銀礦中狀如硬錫紋理粗錯自然者真今坑中所得乃在土石中滲溜成條若絲髮狀土人謂之老翁須似此者極難得方書用生銀必得此乃真耳金屑古方不見用者銀屑唯葛洪治癰腫五石湯用之今人彌不用唯作金銀箔入藥甚便又金石凌紅雪紫雪輩皆取金銀取汁此亦通用經煉者耳海藥云按廣州記云出大食國彼方出金最多凡是貨易並使金金性多寒生者有毒熟者無毒主癲癇風熱上氣咳嗽傷寒肺損吐血骨蒸勞極渴主利五臟邪氣補心併入箔於丸散服異志云金生麗水山海經説諸山出金極多不能備録蔡州出瓜子金雲南山出顆塊金在山石間採之黔南遂府吉州水中併産麩金又嶺表録異云廣州含洭縣有金池彼中居人忽有養鵝鴨常於屎中見麩金片遂多養收屎淘之日得一兩或半兩因而致富矣淮南子陽燧見日然而為火許慎注云陽燧金也取金杯無緣者熟磨令熱日中時日下以艾承氣則燃得火也太清服煉靈砂法金所稟於中宮陰已之魄性本剛服之傷損肌寶藏論凡金有二十件雄黃金雌黃金曾青金硫黃金土中金生鐵金熟鐵金生銅金石金砂子金土碌砂子金金母砂子金白錫金黑鉛金硃砂金以上十五件唯只有還丹金水中金瓜子金青麩金草砂金等五件是真金餘外並皆是假丹房鏡源楚金出漢江五溪或如瓜子形雜衆金帶青色若天生牙亦曰黃牙若制水銀硃砂成器為利術不堪食內有金氣毒也青霞子金液還丹論金未增年又黃金破冷除風衍義曰金屑不曰金而更加屑字者是已經磨屑可用之義如玉漿之義同二經不解屑為未盡蓋須烹煉煅屑為箔方可研屑入藥陶隱居云凡用銀屑以水銀和成泥若非煅屑成箔焉能以水銀和成泥也獨不言金屑亦其缺也生金有毒至於殺人仍為難解有中其毒者唯鷓鴣肉可解若不經煅屑則不可用顆塊金即穴山或至百十尺見伴金石其石褐色一頭如火燒黑之狀此定見金也其金色深赤黃麩金即在江沙水中淘汰而得其色淺黃此等皆是生金也得之皆當銷煉麩金耗折少塊金耗折多入藥當用塊金色既深則金氣足余更防罨製成及點化者如此焉得更有造化之氣也若本朝張永德字抱一並州人五代為潞帥淳化二年改並州初寓睢陽有書生鄰居臥病永德療之獲愈生一日就永德求汞五兩即置鼎中煮成中金永德懇求藥法生曰君當貴吾不吝此慮損君福煅工畢升言祥符年嘗在禁中為方士王捷煅金以鐵為金凡百餘兩為一餅輻解為八段謂之鴉嘴金初自治中出色尚黑由是言之如此之類乃是水銀及鐵用藥製成非造化所成功治焉得不差殊如惠民局合紫雪用金蓋假其自然金氣爾然惡錫又東南方金色深西南方金色淡土地所宜也入藥故不如色深者然得余甘子則體柔亦相感爾銀屑味辛平有毒主安五臟定心神止驚悸除邪氣久服輕身長年生永昌採無時陶隱居云銀之所出處亦與金同但皆是生石中煉餌法亦相似今醫方合鎮心丸用之不可正服爾為屑當以水銀研令消也永昌本屬益州今屬寧州仙經又有服煉法此當無正主療故不為本草所載古者名金為黃金銀為白金銅為赤金今銅有生熟煉熟者柔赤而本草並無用今銅青及大錢皆入方用並是生銅應在下品之例也唐本注云銀之與金生不同處金又兼出水中方家用銀屑當取見成銀箔以水銀消之為泥合硝石及鹽研為粉燒出水銀淘去鹽石為粉極細用之乃佳不得已磨取屑爾且銀所在皆有而以虢州者為勝此外多錫穢為劣高麗作貼者云非銀礦所出然色青不如虢州者又有黃銀本經不載俗云為器辟惡乃為瑞物臣禹錫等謹按藥性論云銀屑君銀箔同主定志去驚癇小兒癲疾狂走之病圖經文具金屑條下海藥云謹按南越志云出波斯國有天生藥銀波斯國用為試藥指環大寒無毒主堅筋骨鎮心明目風熱癲疾等併入箔於丸散服之又燒朱粉甕下多年沉積有銀號杯鉛銀光軟甚好與波斯銀功力相似只是難得今時燒煉家每一斤生鉛只煎得一二銖山海經云東北樂平郡黨少山出銀甚多黔中生銀體骨硬不堪入藥又按唐貞觀政要云十年有理書御史權萬紀奏曰宣饒二州諸山極有銀坑採之甚是利益太宗曰朕貴為天子無所乏少何假取呼是知彼處出銀也子母祕録始娠卒腰背痛如折銀一兩水三升煎取二升飲之太上八帝玄變經銀屑益壽青霞子金液還丹論銀破冷除風衍義曰銀屑金條中已解屑義銀本出於礦須煎煉而成故名熟銀所以於後別立生銀條也其用與熟銀大同世有術士能以硃砂而成者有鉛汞而成者有焦銅而成者不復更有造化之氣豈可更入藥既有此類不可不區別其生銀即是不自礦中出而特然自生者又謂之老翁須亦取像而言之耳然銀屑經言有毒生銀經言無毒釋者漏略不言蓋生銀已生髮於外無蘊郁之氣故無毒礦銀尚蘊蓄於石中鬱結之氣全未敷暢故言有毒亦惡錫生銀寒無毒主熱狂驚悸發癇恍惚夜臥不安譫語邪氣鬼祟服之明目鎮心安神定志小兒諸熱丹毒並以水磨服功勝紫雪出饒州樂平諸坑生銀礦中狀如硬錫紋理粗錯自然者真今附臣禹錫等謹按陳藏器云生銀味辛日華子云冷微毒畏石亭脂磁石治小兒中惡熱毒煩悶並水磨服忌生血又云硃砂銀冷無毒畏石亭脂磁石鐵延年益色鎮心安神止驚悸辟邪治中惡蠱毒心熱煎煩憂忘虛劣忌一切血圖經文具金屑條下雷公云金銀銅鐵氣凡使在藥中用時即渾安置於藥中借氣生藥力而已勿誤入藥中用消人脂也千金翼治身有赤疵常以銀揩令熱不久漸漸消抱朴子銀但不及金玉可以地仙也服之法麥漿化之亦可以朱草酒餌之亦可以龍膏餌煉之然日三服服輒大如彈丸然非清貧道士所能得也太清服煉靈砂法銀稟西方辛陰之神結精而為質性戾服之傷肝寶藏論云夫銀有一十七件真水銀銀白錫銀曾青銀土碌銀丹陽銀生鐵銀生銅銀硫黃銀砒霜銀雄黃銀雌黃銀鍮石銀唯有至藥銀山澤銀草砂銀母砂銀黑鉛銀五件是真外余則假銀坑內石縫間有生銀迸出如布線土人曰老翁須是正生銀也丹房鏡源銀生洛平盧氏縣褐色石打破內即白生於鉛坑中形如筍子此有變化之道亦曰自然牙亦曰生鉛又曰自然鉛可為利術不堪食鉛內銀性有毒可用結砂子衍義文具銀屑條下靈砂味甘性溫無毒主五臟百病養神安魂魄益氣明目通血脈止煩滿益精神殺精魅惡鬼氣久服通神明不老輕身神仙令人心靈一名二氣砂水銀一兩硫黃六銖細研先炒作青砂頭後入水火既濟爐抽之如束針紋者成就也惡磁石畏鹹水茅亭話楊子度餌猢猻靈砂輒會人語然可教好事者知之多以靈砂飼猢猻鸚鵡犬鼠等教之青霞子靈砂若草伏得住火成汁不折可療風冷用作母砂子匱為銀若把五金折不成汁不堪水銀粉味辛冷無毒畏磁石石黃通大腸轉小兒疳並瘰癧殺瘡疥癬蟲及鼻上酒齄風瘡瘙癢又名汞粉輕粉峭粉忌一切血新補見陳藏器及日華子圖經文具水銀條下經驗方治小兒吃泥䑋肚膩粉一分用沙糖搜和丸如麻子大空心米飲下一丸良久瀉出泥瘥孫用和治虛風不二散膩粉一兩用湯煎五度如茶腳慢火上焙乾麝香半兩細研如粉每服一字溫水調但是風臨時服半錢或一錢匕看虛實加減又方治血痢膩粉五錢定粉三錢同研勻用水浸蒸餅心少許和為丸如緑豆大每服七丸或十丸艾一枝水一盞煎湯下艾湯多亦妙衍義曰水銀粉下涎藥並小兒涎潮瘛瘲多用然不可常服及過多多則其損兼行若兼驚則尤須審慎蓋驚為心氣不足不可下下之裡虛驚氣入心不可治若其人本虛便須禁此一物慎之至也磁石味辛咸寒無毒主周痹臣禹錫等謹按蜀本注云凡痹隨血脈上下不能左右去者為周痹風濕肢節中痛不可持物洗洗酸痟除大熱煩滿及耳聾養腎臟強骨氣益精除煩通關節消癰腫鼠瘻頸核喉痛小兒驚癇煉水飲之亦令人有子一名玄石一名處石生泰山川穀及慈山山陰有鐵處則生其陽採無時柴胡為之使殺鐵毒惡牡丹莽草畏黃石脂陶隱居云今南方亦有好者能懸吸針虛連三四為佳殺鐵毒消金仙經丹方黃白朮中多用之臣禹錫等謹按蜀本注云吸鐵虛連十數針乃至一二斤刀器回轉不落南州異物志云漲海崎頭水淺而多磁石外徼人乘舶皆以鐵葉錮之至此關以磁石不得過吳氏云磁石一名磁君藥性論云磁石臣味鹹有小毒能補男子腎虛風虛身強腰中不利加而用之陳藏器云磁石毛味鹹溫無毒主補絶傷益陽道止小便白數治腰腳去瘡瘻長肌膚令人有子宜入酒出相州北山磁石毛鐵之母也取鐵如母之招子焉本經有磁石不言毛毛石功狀殊也又言磁石寒此彌誤也日華子云磁石味甘澀平治眼昏筋骨羸弱補五勞七傷除煩躁消腫毒小兒誤吞針鐵等即細末筋肉莫令斷與磁石同下之圖經曰磁石生泰山山谷及磁山山陰有鐵處則生其陽今磁州徐州及南海旁山中皆有之磁州者歲貢最佳能吸鐵虛連十數針或一二斤刀器回轉不落者尤真採無時其石中有孔孔中黃赤色其上有細毛性溫功用更勝謹按南州異物志云漲海崎頭水淺而多磁石徼外大舟以鐵葉錮之者至此多不得過以此言之海南所出尤多也按磁石一名玄石而此下自有玄石條云生泰山之陽山陰有銅銅者雌鐵者雄主療頗亦相近而寒溫銅鐵畏惡乃別蘇恭以為鐵液也是磁石中無孔光澤純黑者其功劣於磁石又不能懸針今北蕃以磁石作禮物其塊多光澤又吸針無力疑是此石醫方罕用雷公云凡使勿誤用玄中石並中麻石此石之二真相似磁石只是吸鐵不得中麻石心有赤皮粗是鐵山石也誤服之令人有惡瘡不可療夫欲驗者一斤磁石四面只吸鐵一斤者此名延年沙四面只吸得鐵八兩者號曰續採石四面只吸得五兩以來者號曰磁石若夫修事一斤用五花皮一鎰地榆一鎰故綿十五兩三件並細銼以槌於石上碎作二三十塊了將磁石於瓷瓶子中下草藥以東流水煮三日夜然後漉出拭乾以布裹之向大石上再槌令細了卻人乳鉢中研細如塵以水沉飛過了又研如粉用之聖惠方治小兒誤吞針用磁石如棗核大磨令光鑽作竅絲穿令含針自出外臺祕要療疔腫取磁石搗為粉釅醋和封之根即立出瘥錢相公篋中方療誤吞錢以磁石棗許大一塊含之立出鬼遺方治金瘡腸出欲入之磁石滑石各三兩為末以白米飲調方寸匕服日再服沈存中筆談磁石指南丹房鏡源磁石四兩協物上者伏丹砂養汞去銅暈軟硬汞堅頑之物服食不可長久多服必有大患青霞子磁石毛治腎之疾衍義曰磁石色輕紫石上皸澀可吸連針鐵俗謂之熁鐵石養益腎氣補填精髓腎虛耳聾目昏皆用之入藥須燒赤醋淬其玄石即磁石之黑色者也多滑淨其治體大同小異不可不分而為二也磨針鋒則能指南然常偏東不全南也其法取新纊中獨縷以半芥子許蠟綴於針腰無風處垂之則針常指南以針橫貫燈心浮水上亦指南然常偏丙位蓋丙為大火庚辛金受金其制故如是物理相感爾玄石味鹹溫無毒主大人小兒驚癇女子絶孕小腹冷痛少精身重服之令人有子一名玄水石一名處石生泰山之陽山陰有銅銅者雌黑者雄惡松脂柏實菌桂陶隱居云本經磁石一名玄石別録各一種今按其一名處石既同療體又相似而寒溫銅鐵及畏惡有異俗方既不復用之亦無識其形者不知與磁石相類否唐本注云此物鐵液也但不能拾針療體如經劣於磁石磁石中有細孔孔中黃赤色初破好者能連十針一斤鐵刀亦被回轉其無孔光澤純黑者玄石也不能吸針圖經文具磁石條下緑鹽味鹹苦辛平無毒主目赤淚出膚翳眵暗唐本注云以光明鹽硇砂赤銅屑釀之為塊緑色真者出焉耆國水中石下取之狀若扁青空青為眼藥之要唐本先附圖經文具食鹽條下海藥謹按古今録云波斯國在石上生味鹹澀主明目消翳點眼及小兒無辜疳氣方家少見用也按舶上將來為之石緑裝色久而不變中國以銅醋造者不堪入藥色亦不久後魏李孝伯云赤鹽臭鹽馬齒鹽駁鹽並非食鹽胡鹽治目痛以上自唐本注比並是緑鹽説凝水石味辛甘寒大寒無毒主身熱腹中積聚邪氣皮中如火燒煩滿水飲之除時氣熱盛五臟伏熱胃中熱煩滿止渴水腫小腹痹久服不飢一名白水石一名寒水石一名淩水石色如雲母可析者良鹽之精也生常山山谷又中水縣及邯鄲解巴豆毒畏地榆陶隱居云常山屬並州中水縣屬河間郡邯鄲即趙郡並屬冀州域此處地皆鹹鹵故云鹽精而碎之亦似朴硝此石末置水中夏月能為冰者佳唐本注此石有兩種有縱理橫理色清明者為佳或云縱理為寒水石橫理為凝水石今出同州韓城色青黃理如雲母為良出澄城者斜理紋色白為劣也臣禹錫等謹按吳氏云神農辛岐伯醫和扁鵲甘無毒季氏大寒或生邯鄲採無時如雲母色藥性論云寒水石能壓丹石毒風去心煩渴悶解傷寒勞復圖經曰凝水石即寒水石也生常山山谷又出中水縣及邯鄲今河東汾隰州及德順軍亦有之此有兩種有縱理者有橫理者色清明如雲母可析投置水中與水同色其水凝動者為佳或曰縱理者為寒水石橫理者為凝水石三月採又有一種冷油石全與此相類但投沸油鐺中油即冷者是也此石有毒若誤用之令腰以下不能舉雷公云凡使先須用生薑自然汁煮汁盡為度細研成粉用每修十兩用薑汁一鎰經驗方治小兒丹毒皮膚熱赤用寒水石半兩白土一分搗羅為末用米醋調敷之愈集驗方治風熱心躁口乾狂言渾身壯熱及中諸毒龍腦甘露丸寒水石半斤燒半日淨地坑內盆合四面濕土擁起候經宿取出入甘草末天竺黃各二兩龍腦二分糯米膏丸彈子大蜜水磨下傷寒類要治肉疸其人小便白以凝水石主之也丹房鏡源凝水石可作油衣可食制丹砂為匱伏玄精衍義曰凝水石又謂之寒水石紋理通徹人或磨刻為枕以備暑月之用入藥須燒過或市人燒入膩粉中以亂真不可不察也陶隱居言夏月能為冰者佳如此則舉世不能得似乎失言陽起石味鹹微溫無毒主崩中漏下破子臟中血癥瘕結氣寒熱腹痛無子陰陽痿不起補不足療男子莖頭寒陰下濕癢去臭汗消水腫久服不飢令人有子一名白石一名石生一名羊起石雲母根也生齊山山谷及琅邪或云山陽起山採無時桑螵蛸為之使惡澤瀉菌桂雷丸蛇蛻皮畏菟絲陶隱居云此所出即與雲母同而甚似雲母但厚實爾今用乃出益州與礬石同處色小黃黑即礬石雲母根未知何者是俗用乃稀仙經亦服之唐本注云此石以白色肌理似殷孽仍夾帶雲母緑潤者為良故本經一名白石今有用純黑如炭者誤矣雲母條中既云黑者名云膽又名地涿服之損人黑陽起石必為惡矣經言生齊山齊山在齊州歷城西北五六里採訪無陽起石陽起石乃齊山西北六七里盧山出之本經云或云山云盧字訛矣今泰山沂州唯有黑者其白者獨出齊州也臣禹錫等謹按吳氏云陽起石神農扁鵲酸無毒桐君雷公歧伯咸無毒季氏小寒或生泰山楊損之云不入湯藥性論云陽起石惡石葵忌羊血味甘平主補腎氣精乏腰疼膝冷濕痹能暖女子子宮久冷冷症寒瘕止月水不定蕭炳云陽起石臣南海藥譜云陽起石唯泰山所出黃者絶佳邢州鵲山白者亦好日華子云治帶下溫疫冷氣補五勞七傷合藥時燒後水淬用凝白者為上圖經曰陽起石生齊山山谷及琅邪或云山陽起山今唯出齊州他處不復有或云邢州鵲山亦有之然不甚好今齊州城西唯一土山石出其中彼人謂之陽起山其山常有溫暖氣雖盛冬大雪遍境獨此山無積雪蓋石氣熏蒸使然也山唯一穴官中常禁閉至初冬則州發丁夫遣人監視以之歲月積久其穴益深才鑿他石得之甚艱以色白肌理瑩明若狼牙者為上亦有夾他石作塊者不堪每歲採擇上供之余州中貨之不爾市賈無由得也貨者雖多而精好者亦難得舊説是雲母根其中猶夾帶雲母今不復見此色古服食方不見用者今補下藥多使之採無時丹房鏡源陽起石可為外匱青霞子陽起治腎之疾衍義曰陽起石如狼牙者佳其外色不白如薑石其大塊者亦內白治男子婦人下部虛冷腎氣乏絶子臟久寒須飛研用凡石藥冷熱皆有毒正宜斟酌孔公孽味辛溫無毒主傷食不化邪結氣惡瘡疽瘻痔利九竅下乳汁男子陰瘡女子陰蝕及傷食病常欲眠睡一名通石殷孽根也青黃色生梁山山谷木蘭為之使惡細辛陶隱居云梁山屬馮翊郡此即今鍾乳床也亦出始興皆大塊打破之凡鍾乳之類三種同一體從石室上汁溜積久盤結者為鍾乳床即此孔公孽也其以小巃嵸者為殷孽今人呼為孔公孽殷孽復溜輕好者為鍾乳雖同一類而療體為異貴賤懸殊此二孽不堪丸散人皆搗末酒漬飲之甚療腳弱其前諸療恐宜水煮為湯也按今三種同根而所生各處當是隨其土地為勝爾唐本注云此孽次於鍾乳如牛羊角者中尚孔通故名通石本經誤以為殷孽之根陶依本經以為今人之誤其實是也臣禹錫等謹按蜀本云凡鍾乳之類有五種一鍾乳二殷孽三孔公孽四石床五石花雖同一體而主療有異此二孽只可酒浸不堪入丸散藥用然甚療腳弱腳氣石花石床顯在後條吳氏云孔公孽神農辛歧伯咸扁鵲酸無毒色青黃藥性論云孔公孽忌羊血味甘有小毒主治腰冷膝痹毒風男女陰蝕瘡治人常欲多睡能使喉聲圓亮日華子云孔公孽味甘暖治癥結此即殷孽床也圖經文具石鐘乳條下青霞子孽輕身充肌殷孽味辛溫無毒主爛傷瘀血泄痢寒熱鼠瘻癥瘕結氣腳冷疼弱一名薑石鍾乳根也生趙國山谷又梁山及南海採無時惡防己畏術陶隱居云趙國屬冀州此即今人所呼孔公孽大如牛羊角長一二尺左右亦出始興唐本注云此即石堂下孔公孽根也盤結如薑故名薑石俗人乃以孔公孽為之誤爾臣禹錫等謹按日華子云殷孽治筋骨弱並痔瘻等疾及下乳汁圖經文具石鐘乳條下密陀僧味鹹辛平有小毒主久痢五痔金瘡面上瘢皯面膏藥用之唐本注云形似黃龍齒而堅重亦有白色者作理石紋出波斯國一名沒多僧並胡言也唐本先附臣禹錫等謹按蜀本注云五痔謂牡痔酒痔腸痔血痔氣痔日華子云味甘平無毒鎮心補五臟治驚癇嗽嘔及吐痰等圖經曰密陀僧本經不載所出州土注云出波斯國今嶺南閩中銀銅冶處亦有之是銀鉛腳其初採礦時銀銅相雜先以鉛同煎煉銀隨鉛出又採山木葉燒灰開地作爐填灰其中謂之灰池置銀鉛於灰上更加火大煅鉛滲灰下銀住灰上罷火候冷出銀其灰池感鉛銀氣置之積久成此物今之用者往往是此未必胡中來也形似黃龍齒而堅重者佳雷公云時呼密陀僧凡使搗令細於瓷堝中安置了用重紙袋盛柳蚛末焙密陀僧堝中次下東流水浸令滿著火煮一伏時足去柳末紙袋取密陀僧用聖惠方治皯𪒟斑點方用密陀僧二兩細研以人乳調塗面每夜用之又方赤白痢所下不多遍數不減用密陀僧三兩燒令黃色研如粉每服醋茶調下一錢匕日三服外臺祕要令面生光方以密陀僧用乳煎塗面佳兼治㾴鼻皰談氏小兒方療豆瘡瘢面黶以密陀僧細研水調夜塗之明旦洗去平復矣別説云今考市中所貨乃是用小瓷瓶實鉛丹煅成者塊大者尚有小瓶形狀銀冶所出最良而罕有貨者外國者未嘗見之通治口瘡最驗衍義曰密陀僧堅重椎破如金色者佳鐵精平微溫主明目化銅療驚悸定心氣小兒風癇陰㿉脫肛陶隱居云鐵落是染皂鐵漿生鐵是不被鑐鎗釜之類鋼鐵是雜煉生鍒作刀鐮者鐵精出煅灶中如塵紫色輕者為佳亦以摩瑩銅器用之唐本注云單言鐵者鍒鐵也鐵落是煅家燒鐵赤沸砧上煅之皮甲落者夫諸鐵療病並不入丸散皆煮取漿用之若以漿為鐵落鋼生之汁復謂何等落是鐵皮滋液黑於余鐵陶謂可以染皂云是鐵漿誤矣又鐵屑炒使極熱用投酒中飲酒療賊風痙又裹以尉腋療胡臭有險今按陳藏器本草云凡言鐵療病不入丸散皆煮漿用之按今針砂鐵精俱堪染皂鐵併入丸散臣禹錫等謹按陳藏器云鐵漿取諸鐵於器中以水浸之經久色青沫出即堪染帛成皂兼解諸物毒入腹服之亦鎮心明目主癲癇發熱急黃狂走六畜癲狂人為蛇犬虎狼毒惡蟲等齧服之毒不入內也又云鐵爇主惡瘡蝕𧈟金瘡毒物傷皮肉止風水不入入水不爛手足皸坼瘡根結筋瘰癧毒腫染髭發令永黑並及熱末凝塗之少當乾硬以竹木爇火於刀斧刃上燒之津出如漆者是也一名刀煙江東人多用之防水項邊癧子以桃核燒熏又云殺蟲立效又云淬鐵水味辛無毒主小兒丹毒飲一合此打鐵器時堅鐵槽中水又云針砂性平無毒堪染白為皂及和沒食子染須至黑飛為粉功用如鐵粉鍊鐵粉中亦別須之針是其真鋼砂堪用人多以雜和之謬也又云煅鑕下鐵屑味辛平無毒主鬼打鬼注邪氣水漬攪令沫出澄清去滓及暖飲一二盞又云刀刃味辛平無毒主蛇咬毒入腹者取兩刀於水中相磨飲其汁又兩刀於耳門上相磨敲作聲主百蟲入耳聞刀聲即自出也日華子云鐵屑治驚邪癲癇小兒客忤消食及冷氣並煎汁服之也又云得犁鑱尖浸水名為鐵精可制硃砂石亭脂水銀毒圖經文具鐵條下聖惠方陰脫鐵精羊脂二味攪令稠布裹炙熱尉推納之瘥又方食中有蠱毒令人腹內堅痛面目青黃淋露骨立病變無常用鐵精細研搗雞肝和為丸如梧桐子大食前後酒下五丸百一方産後陰下脫鐵精粉推納之又方地骨刺人毒痛以鐵精粉如大豆以管吹瘡內子母祕録療陰腫鐵精粉敷上姚和衆治小兒因痢肛門脫以鐵精粉敷之太清服煉靈砂法云鐵性堅服之傷肺鐵漿鐵注中陶為鐵落是鐵漿蘇云非也按鐵漿取諸鐵於器中以水浸之經久色青沫出即堪染皂兼解諸毒入腹服之亦鎮心主癲癇發熱急黃狂走六畜癲狂人為蛇犬虎狼毒刺惡蟲等齧服之毒不入內見陳藏器圖經文具鐵條下外臺祕要療膝瘡以鐵漿洗之隨手瘥頻為之妙梅師方治時氣病骨中熱生疱瘡豌豆瘡飲鐵漿瘥稱錘主賊風止産後血瘕腹痛及喉痹熱塞並燒令赤投酒中及熱飲之時人呼血瘕為兒枕産後即起痛不可忍無錘用斧今附臣禹錫等謹按陳藏器云稱錘味辛溫無毒日華子云銅稱錘平治難産並橫逆産酒淬服陳藏器云鐵杵無毒主婦人橫産無杵用斧並燒令赤投酒中飲之自然順生杵搗藥者是也又云故鋸無毒主誤吞竹木入喉咽出入不得者燒令赤漬酒中及熱飲並得日華子云鑰匙治婦人血噤失音沖惡以生薑醋小便煎服弱房人煎湯服亦得圖經文具鐵條下聖惠方治婦人血瘕痛用古稱錘或大斧或鐵杵以炭火燒赤內酒中五升以來稍稍飲之外臺祕要療妊娠卒下血燒稱錘令赤納酒中沸定出飲之千金方妊娠腹脹及産後下血燒令赤投酒中服産寶治胎衣不出燒鐵杵鐵錢令赤投酒飲之鐵華粉味鹹平無毒主安心神堅骨髓強志力除風邪養血氣延年變白去百病隨體所冷熱合和諸藥用棗膏為丸作鐵華粉法取鋼煅作葉如笏或團平面磨錯令光淨以鹽水灑之於醋甕中陰處埋之一百日鐵上衣生鐵華成矣刮取更細搗篩入乳鉢研如面和合諸藥為丸散此鐵之精華功用強於鐵粉也今附臣禹錫等謹按日華子云鐵胤粉止驚悸虛癇鎮五臟去邪氣強志壯筋骨治健忘冷氣心痛痃癖癥結脫肛痔瘻宿食等及敷竹木刺其所造之法與華粉同唯懸於醬瓿上就潤地及刮取霜時研淘去粗汁鹹味烘乾圖經文具鐵條下經驗後方治心虛風邪精神恍惚健忘以經使鏵鐵四斤於炭火內燒令通赤投於醋中如此七遍即堪打碎如棋子大以水二斗浸經二七日每於食後服小盞生鐵微寒主療下部及脫肛臣禹錫等謹按日華子云生鐵鏽煅後飛淘去粗赤汁烘乾用治癇疾鎮心安五臟能黑鬢髮治癬及惡瘡疥蜘蛛咬蒜摩生油敷並得今據解在鐵精條圖經文具鐵條下千金方治耳聾燒鐵令赤投酒中飲之仍以磁石塞耳肘後方治熊虎所傷毒痛煮生鐵令有味以洗之又方若被打瘀血在骨節及脅外不去以鐵一斤酒三升煮取一升服之集驗方治脫肛歷年不愈以生鐵三斤水一斗煮取五升出鐵以汁洗日再子母祕録治小兒得熛瘡一名爛瘡燒鐵淬水中二七遍以浴兒三二遍起作熛瘡漿鐵粉味鹹平無毒主安心神堅骨髓除百病變白潤肌膚令人不老體健能食久服令人身重肥黑合諸藥各有所主其造作粉飛煉有法文多不載人多取雜鐵作屑飛之令體重真鋼則不爾其針砂市人錯鍒鐵為屑和砂飛為粉賣之飛煉家亦莫辨也取鋼鐵為粉勝之今附圖經文具鐵條下鐵落味辛甘平無毒主風熱惡瘡瘍疽瘡痂疥氣在皮膚中除胸膈中熱氣食不下止煩去黑子一名鐵液可以染皂生牧羊平澤及祊城或析城採無時臣禹錫等謹按日華子云鐵液治心驚邪一切毒蛇蟲及蠶漆咬瘡腸風痔瘻脫肛時疾熱狂並染鬢髮今注解在鐵精條圖經文具鐵條下鋼鐵味甘無毒主金瘡煩滿熱中胸膈氣塞食不化一名跳鐵今注解在錢精條圖經文具鐵條鐵主堅肌耐痛臣禹錫等謹按詳定本草云作熟鐵日華子云鐵味辛平有毒畏磁石灰炭等能制石亭脂毒今注解在鐵精條圖經曰鐵本經云鐵落出牧羊平澤及祊城或析城諸鐵不著所出州郡亦當同處耳今江南西蜀有爐冶處皆有之鐵落者煅家燒鐵赤沸砧上打落細皮屑俗呼為鐵花是也初煉去礦用以鑄寫器物者為生鐵再三銷拍可以作鍱者為鑐鐵亦謂之熟鐵以生柔相雜和用以作刀劍鋒刃者為鋼鐵煅灶中飛出如塵紫色而輕虛可以瑩磨銅者為鐵精作針家磨鑢細末謂之針砂取諸鐵於器中水浸之經久色青沫出可以染皂者為鐵漿以鐵拍作段片置醋糟中積久衣生刮取之為鐵華粉入火飛煉者為鐵粉作鐵華粉自有法文多不載諸鐵無正入丸散者唯煮汁用之華粉則研治極細合和諸藥又馬銜稱錘車轄及杵鋸等皆燒以淬酒用之刀斧刃磨水作藥使並俗用有效故載之別説云謹按鐵漿即是以生鐵漬水服餌者日取飲旋添新水日久鐵上生黃膏則力愈勝令人肌體輕健唐太妃所服者乃此也若以染皂者為漿其酸苦臭澀安可近況為服食也石腦味甘溫無毒主風寒虛損腰腳疼痹安五臟益氣一名石飴餅生名山土石中採無時陶隱居云此石亦鍾乳之類形如曾青而白色黑斑軟易破今茅山東及西平山並有鑿土龕取之俗方不見用仙經有劉君導仙散用之又真誥曰李整採服療風痹虛損而得長生唐本注云隋時有化公者所服亦名石腦出徐州宋里山初在爛石中入土一丈以下得之大如雞卵或如棗許觸著即散如面黃白色土人號為握雪礜石云服之長生與李整相會今附下品條中臣禹錫等謹按蜀本云今注下品握雪礜石主療與此不同蘇妄引握雪礜石注為之圖經文具石鐘乳條下理石味辛甘寒大寒無毒主身熱利胃解煩益精明目破積聚去三蟲除榮衛中去來大熱結熱解煩毒止消渴及中風痿痹一名立制石一名肌石如石膏順理而細生漢中山谷及盧山採無時滑石為之使惡麻黃陶隱居云漢中屬梁州盧山屬青州今出寧州俗用亦稀仙經時須亦呼為長理石石膽一名立制今此又名立制疑必相亂類唐本注云此石夾兩石間如石脈打用之或在土中重疊而生皮黃赤肉白作針理紋全不似石膏漢中人取酒漬服之療癖令人肥悅市人或刮削去皮以代寒水石並以當礜石並是假偽今盧山亦無此物見出襄州西汛水側也圖經文具長石條下丹房鏡源長理石可食衍義曰理石如長石但理石如石膏順理而細其非順理而細者為長石治療亦不相遼珊瑚味甘平無毒主宿血去目中翳鼻衄末吹鼻中生南海唐本注云似玉紅潤中多有孔亦有無孔者又從波斯國及師子國來唐本先附臣禹錫等謹按日華子云鎮心止驚明目圖經曰珊瑚生南海注云又從波斯國及師子國來今廣州亦有云生海底作枝柯狀明潤如紅玉中多有孔亦有無孔者枝柯多者更難得採無時謹按海中經曰取珊瑚先作鐵網沉水底珊瑚貫中而生歲高三二尺有枝無葉因絞網出之皆摧折在網中故難得完好者不知今之取者果爾否漢積翠池中有珊瑚高一丈二尺一本三柯上有四百六十三條云是南越王趙他所獻夜有光景晉石崇家有珊瑚高六七尺今並不聞有此高大者陳藏器云珊瑚生石岩下剌刻之汁流如血以金投之為丸名金漿以玉投之為玉髓久服長生海藥按晉列傳云石崇金谷園珊瑚樹皮如花生蕊味甘平無毒主消宿血風癇等疾按其主治與金相似也錢相公篋中方治七八歲小兒眼有膚翳未堅不可妄敷藥宜點珊瑚散細研如粉每日少少點之三日立愈異物志云出波斯國為人間至貴之寶也衍義曰珊瑚治翳目今人用為點眼箸有一等紅油色有細縱紋可愛又一種如鉛丹色無縱紋為下入藥用紅油色者嘗一見一本高尺許兩枝直上分十餘歧將至其顛則交合連理仍紅潤有縱紋亦一異也波斯國海中有珊瑚洲海人乘大舶墮鐵網水底珊瑚初生盤石上白如菌一歲而黃三歲赤枝幹交錯高三四尺鐵發其根系網舶上絞而出之失時不取即腐石蟹味鹹寒無毒主青盲目淫膚翳及丁翳漆瘡生南海又云是尋常蟹爾年月深久水沫相著因化成石每遇海潮即飄出又一般入洞穴年深者亦然皆細研水飛過入諸藥相佐用之點目良今附臣禹錫等謹按日華子云石蟹涼解一切藥毒並蠱毒催生落胎療血暈消癰治天行熱疾等並熟水磨服也又云浮石平無毒止渴治淋殺野獸毒圖經曰石蟹出南海今嶺南近海州郡皆有之體質石也而都與蟹相似或云是海蟹多年水沫相著化而為石每海潮風飄出為人所得又一種入洞穴年深者亦然醋磨敷癰腫亦解金石毒採無時衍義曰石蟹直是今之生蟹更無異處但有泥與粗石相著凡用須去其泥並粗石只用蟹磨合他藥點目中須水飛又云浮石水飛治目中翳今皮作家用之磨皮上垢無出此石石蟹條中雲浮石平無毒止渴治淋殺野獸毒合於此條收入長石味辛苦寒無毒主身熱胃中結氣四肢寒厥利小便通血脈明目去翳眇下三蟲殺蠱毒止消渴下氣除脅肋肺間邪氣久服不飢一名方石一名土石一名直石理如馬齒方而潤澤玉色生長子山谷及太山臨淄採無時陶隱居云長子縣屬上黨郡臨淄縣屬青州俗方及仙經並無用此者唐本注云此石狀同石膏而厚大縱理而長紋似馬齒今均州遼阪山有之土人以為理石者是長石也圖經曰長石生長子山谷及泰山臨淄今唯潞州有之紋如馬齒方而潤澤玉色此石頗似石膏但厚大縱理而長為別耳採無時謹按本經理石長石二物二條其味與攻效亦別又云理石如石膏順理而細陶隱居云理石亦呼為長理石蘇恭云理石皮黃赤肉白作斜理不似石膏市人刮去皮以代寒水石並當礜石今靈寶丹用長理石為一物醫家相承用者乃似石膏與今潞州所出長石無異而諸郡無復出理石醫方亦不見單用往往呼長石為長理石又市中所貨寒水石亦有帶黃赤皮者不知果是理石否馬銜無毒主難産小兒癇産婦臨産時手持之亦煮汁服一盞此馬勒口鐵也本經馬條注中已略言之今附臣禹錫等謹按本經難産通用藥云馬銜平日華子云古舊鋌者好或作醫士針也今據本經馬條注中都無説馬銜之事不知此經所言何謂今姑存云圖經文具鐵條下聖惠方治馬喉痹喉中深腫連頰壯熱吐氣數者用馬銜一具水三大盞煎取一盞半分為三服礪石無毒主破宿血下石淋除癥結伏鬼物惡氣一名磨石燒赤熱投酒中飲之即今磨刀石取垽敷蠼螋溺瘡有效又不欲人踏之令人患帶下未知所由又有越砥石極細磨汁滴目除障暗燒赤投酒中破血瘕痛功狀極同名又相近應是礪矣禹貢注云砥細於礪皆磨石也新補見陳藏器石花味甘溫無毒酒漬服主腰腳風冷與殷孽同一名乳花唐本注云三月九月採之乳水滴水上散如霜雪者出乳穴堂中唐本先附臣禹錫等謹按日華子云石花治腰膝及壯筋骨助陽此即洞中石乳滴下凝結者圖經文具石鐘乳條下衍義曰石花白色圓如覆大馬杓上有百十枝每枝各槎牙分歧如鹿角上有細紋起以指撩之錚錚然有聲此石花也多生海中石上世亦難得家中有一本後又於大相國宮中見一本其體甚脆不禁觸擊本條所注皆非桃花石味甘溫無毒主大腸中冷膿血痢久服令人肌熱能食唐本注云出申州鐘山縣似赤石脂但舐之不著舌者為真唐本先附臣禹錫等謹按蜀本云令人肥悅能食南海藥譜云其狀亦似紫石英若桃花其潤且光而重目之可愛是也圖經曰桃花石本經不載所出州土注云出申州鐘山縣今信州亦有之形塊似赤石脂紫石英輩其色似桃花光潤而體重以舐之不著舌者為佳採無時陶隱居解赤石脂云用義陽者狀如豚腦色鮮紅可愛蘇恭以為非是即桃花石也久服肥人土人亦以療痢然則功用亦不相遠矣衍義曰桃花石有赤白兩等有赤地淡白點如桃花片者有淡白地有淡赤點如桃花片者人往往鐫磨為器用今人亦罕服食光明鹽味鹹甘平無毒主頭面諸風目赤痛多眵淚生鹽州五原鹽池下鑿取之大者如升皆正方光徹一名石鹽唐本先附臣禹錫等謹按蜀本注云亦呼為聖石圖經文具食鹽條下石床味甘溫無毒酒漬服與殷孽同一名乳床一名逆石唐本注云陶謂孔公孽即乳床非也二孽在上床花在下性體雖同上下有別鍾乳水下凝積生如筍狀漸長久與上乳相接為柱也出鍾乳堂中採無時唐本先附臣禹錫等謹按日華子云石筍即是石乳下凝滴長者與石花功同一名石床圖經文具石鐘乳條下膚青味辛咸平無毒主蠱毒及蛇菜肉諸毒惡瘡不可久服令人瘦一名推青一名推石生益州川穀陶隱居云俗方及仙經並無用此者亦相與不復識瑪瑙味辛寒無毒主辟惡尉目赤爛紅色似瑪瑙亦美石之類重寶也生西國玉石間來中國者皆以為器亦云瑪瑙珠是馬口中吐出多是胡人謬言以貴之耳新補見陳藏器陳藏器瑪瑙出日本國用砑木不熱為上砑木熱非真也衍義曰瑪瑙非石非玉自是一類有紅白黑色三種亦有其紋如纏絲者出西裔者佳彼土人小者碾為好玩之物大者碾為器今古方入藥絶可用此物西方甚重故佛經多言之其馬口吐出既知謬言不合編入太陰玄精味鹹溫無毒主除風冷邪氣濕痹益精氣婦人痼冷漏下心腹積聚冷氣止頭疼解肌其色青白龜背者良出解縣今附圖經曰太陰玄精出解縣今解池及通泰州積鹽倉中亦有之其色青白龜背者佳採無時解池又有鹽精味更鹹苦青黑色大者三二寸形似鐵鏵嘴三月四月採亦主除風冷無毒又名泥精蓋玄精之類也古方不見用者近世補藥及治傷寒多用之其著者治傷寒三日頭痛壯熱四肢不利正陽丹太陰玄精硝石硫黃各二兩硇砂一兩四物都細研入瓷瓶子中固濟以火半斤於瓶子周一寸熁之約近半日候藥青紫色住火待冷取出用臘月雪水拌令勻濕入瓷罐子中屋後北陰下陰乾又入地埋二七日取出細研以麵糊和為丸如雞頭實大先用熱水浴後以艾湯研下一丸以衣蓋汗出為瘥唐本余近地亦有色赤青白片大不佳沈存中雲大滷之地即生陰精石衍義曰太陰玄精石合他藥塗大風疾別有法陰證傷寒指甲面色青黑六脈沉細而疾心下脹滿結硬燥渴虛汗不止或時狂言四肢逆冷咽喉不利腹疼亦須佐他藥兼之圖經本草已有法唯出解州者良車轄無毒主喉痹及喉中熱塞燒令赤投酒中及熱飲之今附圖經文具鐵條下聖惠方治妊娠咳嗽以車釭一枚燒令赤投酒中候冷飲之外臺祕要治小兒大便失血車釭一枚燒令赤納水中服之南恩洲石蛇圖經曰石蛇出南海水旁山石間其形盤屈如蛇也無首尾內空紅紫色又似車螺不知何物所化大抵與石蟹同類功用亦相近尤能解金石毒以左盤者良採無時味鹹性平無毒衍義曰石蛇本經不收始自開寶本草添附其色如古牆上土盤結如楂梨大中空兩頭巨細一等無蓋不與石蟹同類蟹則真蟹也蛇非真蛇也今人用之絶少兗州黑羊石圖經曰黑羊石生兗州宮山之西味淡性熱解藥毒春中掘地採之以黑色有牆壁光瑩者為上兗州白羊石圖經曰白羊石生兗州白羊山味淡其性熟用即大熱生用即涼解衆藥毒春中掘地採之以白瑩者為良一種唐本余銀膏味辛大寒主熱風心虛驚癇恍惚狂走膈上熱頭面熱風衝心上下安神定志鎮心明目利水道治人心風健忘其法以白錫和銀箔及水銀合成之亦堪補牙齒缺落又當凝硬如銀合煉有法四十種陳藏器余天子藉田三推犁下土無毒主驚悸癲邪安神定魄強志入官不懼利見大官宜婚市王者所封五色土亦其次焉以前主病正爾水服余皆藏寶社壇四角土牧宰臨官自取以塗門戶主盜不入境今郡縣皆有社壇也土地主斂萬物毒人患發背者掘地為孔一頭旁通取風以穴大小可腫處仰臥穴上令癰入穴孔中吸之作三五個覺熱即易仍以物藉他處又人卒患急黃熱盛欲死者於沙土中掘坎斜埋患人令頭出土上灌之久乃出曾試有效當是土能收攝熱也又人患丹石發腫以腫處於濕地上臥尉之地熱易之市門土無毒主婦人易産取土臨月帶之又臨月産時取一錢匕末酒服之又捻為丸小兒於苦瓠中作白龍乞兒此法崔知悌方文多不録自然灰主白癜風癧瘍重淋取汁和醋先以布揩白癜風破敷之當為創勿怪能軟琉璃玉石如泥至易雕刻及浣衣令白洗惡瘡疥癬驗於諸灰生海中如黃土南中異物志云自然灰生南海畔可浣衣石得此灰即爛可為器今瑪瑙等形質異者先以此灰埋之令軟然後雕刻之也鑄鐘黃土無毒主卒心痛疰忤惡氣置酒中溫服之彌佳也戶垠下土無毒主産後腹痛末一錢匕酒中熱服之戶者門之別名也新注云和雄雀糞暖酒服方寸匕治吹奶效鑄鏵鋤孔中黃土主丈夫陰囊濕癢細末摸之亦去陰汗最佳瓷塸中里白灰主遊腫醋磨敷之瓷器物初燒時相隔皆以灰為泥然後燒之塸瓷也但看里有即收之彈丸土無毒主難産末一錢匕熱酒調服之大有功效也執日取天星上土和柏葉薰草以塗門戶方一尺盜賊不來抱朴子亦云有之大甑中蒸土一兩碩熱坐臥其上取病處熱徹汗遍身仍隨疾服藥和鼠壤用亦得蚡鼠壤堆上土苦酒和為泥敷腫極效又云鬼疰氣痛取土以秫米甘汁搜作餅燒令熱以物裹尉痛處凡蚡鼠是野田中尖嘴鼠也冢上土及磚石主溫疫五月一日取之瓦器中盛埋之著門外階下閣家不患時氣又正月朝早將物去冢頭取古磚一口將咒要斷一年無時疫懸安大門也桑根下土搜成泥餅敷風腫上仍灸三二十壯取熱通瘡中又人中惡風水肉腫一個瘥以土碗灸二百壯當下黃水即瘥也春牛角上土收置戶上令人宜田土蜂窠上細土主腫毒醋和為泥敷之亦主蜘蛛咬土蜂者在地土中作窠者是載鹽車牛角上土主惡瘡黃汁出不瘥漸胤者取土封之即止牛角謂是車邊脂角也好用驢溺泥土主蜘蛛咬先用醋泔汁洗瘡然後泥敷之黑驢彌佳浮汁洗之更好故鞋底下土主人適他方不伏水土刮取末和水服之不伏水土與諸病有異即其狀也鼠壤土主中風筋骨不遂冷痹骨節疼手足拘急風掣痛偏枯死肌多收取曝乾用之屋內墉下蟲塵土治惡瘡久不瘥干敷之亦油調塗之鬼屎主人馬反花瘡刮取和油塗之生陰濕地如屎亦如地錢黃白色寡婦床頭塵土主人耳上月割瘡和油塗之效也床四腳下土主猘犬咬人和成泥敷瘡上灸之一七壯瘡中得大毛者愈猘犬狂犬也瓦甑主魘寐不寤覆人面疾打破之覺好魘及無夢取火燒死者灰著枕中履中即止甘土無毒主去油垢水和塗之洗膩服如灰及主草葉諸菌毒熱湯末和之出安西及東京龍門土底澄取之二月上壬日取土泥屋四角大宜蠶也柱下土無毒主腹痛暴卒者末服方寸匕胡燕窠內土無毒主風瘙癮疹末以水和敷之又巢中草主卒溺血燒為灰飲服又主惡刺瘡及浸淫瘡繞身至心者死亦用之道中熱塵土主夏中熱暍死取土積死人心其死非為遇熱亦可以蓼汁灌之正月十五日燈盞令人有子夫婦共於富家局會所盜之勿令人知之安臥床下當月有娠仰天皮無毒主卒心痛中惡取人膏和作丸服之一七丸人膏者人垢汗也揩取仰天皮者是中庭內停汙水後乾地皮也取捲起者一名掬天皮亦主人馬反花瘡和油塗之佳蟻穴中出土取七枚如粒和醋搽狐刺瘡古磚熱燒之主下部久患白痢膿泄下以物裹上坐之入秋小腹多冷者亦用此古磚煮汁服之主噦氣又令患處尉之三五度瘥又主婦人帶下五色俱治之取黃磚石燒令微赤熱以面五味和作煎餅七個安磚上以黃瓜蔞敷面上又以布兩重患冷病人坐上令藥氣入腹如熏之有蟲出如蠶子不過三五度瘥富家中庭土七月丑日取之泥灶令人富勿令人知百舌鳥窠中土末和釅醋敷蚯蚓及諸惡蟲咬瘡豬槽上垢及土主難産取一合和麵半升烏豆二十顆煮取汁服之故茅屋上塵無毒主老嗽取多年煙火者拂取上塵和石黃款冬花婦人月經衣帶為末以水和塗於茅上待乾納竹筒子中燒一頭以口吸之入咽喉數數咽之無不瘥也諸土有毒怪曰羵羊掘土見之不可觸已出上土部土有氣觸之令人面黃色上氣身腫掘土處慎之多斷地脈古人所忌地有仰穴令人移也
