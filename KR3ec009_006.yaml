body:
  text: 卷第六已酉新增衍義黃精味甘平無毒補中益氣除風濕安五臟久服輕身延年不飢一名重樓一名菟竹一名雞格一名救窮一名鹿竹生山谷二月採根陰乾陶隱居云今處處有二月始生一枝多葉葉狀似竹而短根似萎蕤萎蕤根如荻根及菖蒲穊節而平直黃精根如鬼臼黃連大節而不平雖燥並柔軟有脂潤俗方無用此而為仙經所貴根葉華實皆可餌服酒散隨宜具在斷谷方中黃精葉乃與鉤吻相似唯莖不紫花不黃為異而人多惑之其類乃殊遂致死生之反亦為奇事唐本注云黃精肥地生者即大如拳薄地生者猶如拇指萎蕤肥根頗類其小者肌理形色都大相似今以鬼臼黃連為比殊無彷彿又黃精葉似柳及龍膽徐長卿輩而堅其鉤吻蔓生殊非比類今按別本注今人服用以九蒸九曝為勝而云陰乾者恐為爛壞臣禹錫等謹按抱朴子云一名垂珠服其花勝其實其實勝其根但花難得得其生花十斛干之才可得五六斗耳而服之日可三合非大有役力者不能辦也服黃精僅十年乃可得其益耳且以斷谷不及術術餌令人肥健可以負重涉險但不及黃精甘美易食凶年之時可以與老小代糧人食之謂為米脯也廣雅云黃精龍銜也永嘉記云黃精出嵩陽永寧縣藥性論云黃精君陳藏器云黃精陶云將鉤吻相似但一善一惡耳按鉤吻即野葛之別名若將野葛比黃精則二物殊不相似不知陶公憑何此說其葉偏生不對者為偏精功用不如正精蕭炳云黃精寒日華子云補五勞七傷助筋骨止飢耐寒暑益脾胃潤心肺單服九蒸九曝食之駐顏入藥生用圖經云黃精舊不載所出州郡但云生山谷今南北皆有之以嵩山茅山者為佳三月生苗高一二尺以來葉如竹葉而短兩兩相對莖梗柔脆頗似桃枝本黃末赤四月開細青白花如小豆花狀子白如黍亦有無子者根如嫩生薑黃色二月採根蒸過曝乾用今通八月採山中人九蒸九曝作果賣甚甘美而黃黑色江南人說黃精苗葉稍類鉤吻但鉤吻葉頭極尖而根細蘇恭注云鉤吻蔓生殊非比類恐南北所產之異耳初生苗時人多采為菜茹謂之筆菜味極美採取尤宜辨之隋羊公服黃精法云黃精是芝草之精也一名萎蕤一名仙人餘糧一名苟格一名菟竹一名垂珠一名馬箭一名白芨二月三月採根入地八九寸為上細切一石以水二石五斗煮去苦味漉出囊中壓取汁澄清再煎如膏乃止以炒黑豆黃末相和令得所捏作餅子如錢許大初服二枚日益之百日知亦焙乾篩末水服功與上等抱朴子云服黃精花勝其實花生十斛干之可得五六斗服之十年乃可得益又博物志云天老謂黃帝曰太陽之草名黃精餌之可以長生世傳華佗漆葉青黏散云青黏是黃精之正葉者書傳不載未審的否雷公云凡使勿用鉤吻真似黃精只是葉有毛鉤子二個是別認處若誤服害人黃精葉似竹葉凡採得以溪水洗淨後蒸從巳至子刀薄切曝乾用食療餌黃精能老不飢其法可取甕子去底釜上安置令得所盛黃精令滿密蓋蒸之令氣溜即曝之第二遍蒸之亦如此九蒸九曝凡生時有一碩熟有三四斗蒸之若生則刺人咽喉曝使干不爾朽壞其生者若初服只可一寸半漸漸增之十日不食能長服之只三尺五寸服三百日後盡見鬼神餌必昇天根葉花實皆可食之但相對者是不對者名偏精聖惠方神仙服黃精成地仙根莖不限多少細銼陰乾搗末每日淨水調服任意多少一年之周變老為少稽神錄臨川有士人虐所使婢婢乃逃入山中久之見野草枝葉可愛即拔取根食之甚美自是常食久而遂不飢輕健夜息大樹下聞草中動以為虎懼而上樹避之及曉下平地其身欻然凌空而去或自一峰之頂若飛鳥焉數歲其家人採薪見之告其主使捕之不得一日遇絕壁下以網三面圍之俄而騰上山頂其主異之或曰此婢安有仙骨不過靈藥服食遂以酒饌五味香美置往來之路觀其食否果來食食訖遂不能遠去擒之具述其故指所食之草即黃精也道臟神仙芝草經黃精寬中益氣五臟調良肌肉充盛骨體堅強其力倍多年不老顏色鮮明發白更黑齒落更生先下三尸蟲上屍好寶貨百日下中屍好五味六十日下下屍好五色三十日下爛出花實根三等花為飛英根為氣精博物志昔黃帝問天老曰天地所生豈有食之令人不死乎天老曰太陽之草名曰黃精餌之可以長生太陰之草名曰鉤吻不可食之入口立死人信鉤吻之殺人不信黃精之益壽不亦甚乎靈芝瑞草經黃芝即黃精也菖蒲味辛溫臣禹錫等謹按久風濕痹通用藥云菖蒲平無毒主風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出音聲主耳聾癰瘡溫腸胃止小便利四肢濕痹不得屈伸小兒溫瘧身積熱不解可作浴湯久服輕身聰耳目不忘不迷惑延年益心智高志不老一名昌陽生上洛池澤及蜀郡嚴道一寸九節者良露根不可用五月十二月採根陰乾秦皮秦艽為之使惡地膽麻黃陶隱居云上洛郡屬梁州嚴道縣在蜀郡今乃處處有生石磧上穊節為好在下濕地大根者名昌陽只主風濕不堪服食此藥甚去蟲並蚤蝨而今都不言之真菖蒲葉有脊一如劍刃四月五月亦作小釐華也東間溪側又有名溪蓀者根形氣色極似石上菖蒲而葉正如蒲無脊俗人多呼此為石上菖蒲者謬矣此只主咳逆亦斷蚤蝨爾不入服御用詩詠多雲蘭蓀正謂此也臣禹錫等謹按吳氏云菖蒲一名堯韭羅浮山記云山中菖蒲一寸二十節藥性論云菖蒲君味苦辛無毒治風濕𤸷痹耳鳴頭風淚下鬼氣殺諸蟲治惡瘡疥瘙石澗所生堅小一寸九節者上此菖蒲亦名昌陽日華子云除風下氣丈夫水臟女人血海冷敗多忘長智除煩悶止心腹痛霍亂轉筋治客風瘡疥澀小便殺腹臟蟲及蚤蝨耳痛作末炒承熱裹罯甚驗忌飴糖羊肉石菖蒲出宣州二月八月採取圖經曰菖蒲生上洛池澤及蜀郡嚴道今處處有之而池州戎州者佳春生青葉長一二尺許其葉中心有脊狀如劍無花實五月十二月採根陰乾今以五月五日收之其根盤屈有節狀如馬鞭大一根傍引三四根傍根節尤密一寸九節者佳亦有一寸十二節者採之初虛軟曝乾方堅實折之中心色微赤嚼之辛香少滓人多植於乾燥沙石土中臘月移之尤易活古方亦有單服者採得緊小似魚鱗者治擇一斤許以水及米泔浸各一宿又刮去皮切曝乾搗篩以糯米粥和勻更入熟蜜搜丸梧子大絺葛袋盛置當風處令乾每旦酒飲任下三十丸臨臥更服二十丸久久得效如本經所說又蜀人用治心腹冷氣搊痛者取一二寸捶碎同吳茱萸煎湯飲之良黔蜀蠻人亦常將隨行卒患心痛嚼一二寸熱湯或酒送亦效其生蠻谷中者尤佳人家移種者亦堪用但干后辛香堅實不及蠻人持來者此即醫方所用石菖蒲也又有水菖蒲生溪潤水澤中甚多葉亦相似但中心無脊採之干後輕虛多滓殊不及石菖蒲不堪入藥用但可搗末油調塗疥瘙今藥肆所貨多以兩種相雜尤難辨也雷公云凡使勿用泥昌夏昌其二件相似如竹根鞭形黑氣穢味腥不堪用凡使採石上生者根條嫩黃緊硬節稠長一寸有九節者是真也採得後用銅刀刮上黃黑硬節皮一重了用嫩桑枝條相拌蒸出曝乾去桑條銼用千金方日月未足而欲產者搗菖蒲根汁一二升灌喉中又方久服聰明益智甲子日取菖蒲一寸九節者陰乾百日為末服方寸匕日三服耳目聰明不忘又方治產後崩中下血不止菖蒲一兩半銼酒二盞煎取一盞去滓分三服食前溫服又方治好忘久服聰明益智七月七日取菖蒲酒服三方寸匕飲酒不醉好事者服而驗之不可犯鐵若犯之令人吐逆肘後方扁鵲云中惡與卒死鬼擊亦相類已死者為治皆參用此方搗菖蒲生根絞汁灌之立瘥屍厥之病卒死脈猶動聽其耳中如微語聲股間暖是也亦此方治之又人臥忽不寤勿以火照照之害人但痛齧其踵及足拇指甲際而唾其面即活又菖蒲末吹鼻中桂末納舌下又方耳聾菖蒲根一寸巴豆一粒去心二物合搗分作七丸綿裹塞耳日著一丸效又方卒胎動不安或腰痛胎轉搶心下血不止菖蒲根汁三升服之又方若下血不止菖蒲三兩酒五升煮取二升分三服經驗方治癰腫發背生菖蒲搗貼若瘡干搗末以水調塗之孫用和方同子母秘錄治胎動勞熱不安去血手足煩菖蒲搗取汁服二升分三服產書治產後下血不止菖蒲二兩以酒二升煮分作二服止夏禹神仙經菖蒲薄切令日乾者三斤以絹囊盛之玄水一斛清者玄水者酒也懸此菖蒲密封閉一百日出視之如綠菜色以一斗熟黍米納中封十四日間出飲酒則一切三十六種風有不治者悉效漢武帝內傳武帝上嵩山忽見仙人長可二丈問之曰吾九嶷山人也聞中嶽有石上菖蒲一寸九節食之長生故來採之忽然不見抱朴子南中多鹿每一雄遊牝百數至春羸瘦蓋遊牝多也及夏則唯食菖蒲一味卻肥當角解之時其茸甚痛獵人逢之其鹿不敢逸走伏而不動獵者先以繩系其茸截取之以其血未散然後斃鹿又韓叢服菖蒲十三年身上生毛日視書萬言皆誦之冬袒不寒又菖蒲須得石上一寸九節紫花尤善別說云謹按今陽羨山中生水石間者其葉逆水而生根鬚略無少泥土根葉極緊細一寸不啻九節入藥極佳今二浙人家以瓦石器種之旦暮易水則茂水濁及有泥滓則萎近方多稱用石菖蒲必此類也其池澤所生肥大節疏粗慢恐不可入藥唯可作果盤蓋氣味不烈而和淡爾衍義曰菖蒲世又謂之蘭蓀生水次失水則枯根節密者氣味足有人患遍身生熱毒瘡痛而不癢手足尤甚然至頸而止黏著衣被曉夕不得睡痛不可任有下俚教以菖蒲三斗銼日乾之椿羅為末布席上使病瘡人恣臥其間仍以被衣覆之既不黏著衣被又復得睡不五七日間其瘡如失後自患此瘡亦如此用應手神驗其石菖蒲根絡石而生者節乃密入藥須此等菊花味苦甘平無毒主風頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹療腰痛去來陶陶除胸中煩熱安腸胃利五脈調四肢久服利血氣輕身耐老延年一名節華一名日精一名女節一名女華一名女莖一名更生一名周盈一名傅延年一名陰成生雍州川澤及田野正月採根三月採葉五月採莖九月採花十一月採實皆陰乾朮枸杞根桑根白皮為之使陶隱居云菊有兩種一種莖紫氣香而味甘葉可作羹食者為真一種青莖而大作蒿艾氣味苦不堪食者名苦薏非真其華正相似唯以甘苦別之爾南陽酈縣最多今近道處處有取種之便得又有白菊莖葉都相似唯花白五月取亦主風眩能令頭不白仙經以菊為妙用但難多得宜常服之爾臣禹錫等謹按爾雅云鞠治薔注今之秋華菊藥性論云甘菊花使能治熱頭風旋倒地腦骨疼痛身上諸風令消散陳藏器云苦薏味苦破血婦人腹內宿血食之又調中止泄花如菊莖似馬蘭生澤畔似菊菊甘而薏苦語曰苦如薏是也又云白菊味苦染髭發令黑和巨勝茯苓蜜丸主風眩變白不老益顏色又靈寶方茯苓合為丸以成煉松脂和每服如雞子一丸令人好顏色不老主頭眩生平澤花紫白五月花抱朴子劉生丹法用白菊花汁和之楊損之云甘者入藥苦者不任日華子云菊花治四肢遊風利血脈心煩胸膈壅悶並癰毒頭痛作枕明目葉亦明目生熟並可食菊有兩種花大氣香莖紫者為甘菊花小氣烈莖青小者名野菊味苦然雖如此園蔬內種肥沃後同一體花上水益色壯陽治一切風並無所忌圖經曰菊花生雍州川澤及田野今處處有之以南陽菊潭者為佳初春布地生細苗夏茂秋花冬實然菊之種類頗多有紫莖而氣香葉厚至柔嫩可食者其花微小味甚甘此為真有青莖而大葉細作蒿艾氣味苦者華亦大名苦薏非真也南陽菊亦有兩種白菊葉大似艾葉莖青根細花白蕊黃其黃菊葉似茼蒿花蕊都黃然今服餌家多用白者南京又有一種開小花花瓣下如小珠子謂之珠子菊云入藥亦佳正月採根三月採葉五月採莖九月採花十一月採實皆陰乾用唐天寶單方圖載白菊云味辛平無毒元生南陽山谷及田野中穎川人呼為回蜂菊汝南名荼苦蒿上黨及建安郡順政郡併名羊歡草河內名地薇蒿諸郡皆有其功主丈夫婦人久患頭風眩悶頭髮乾落胸中痰結每風發即頭旋眼昏暗不覺欲倒者是其候也先灸兩風池各二七壯並服此白菊酒及丸永瘥其法春末夏初收軟苗陰乾搗末空腹取一方寸匕和無灰酒服之日再漸加三方寸匕若不欲飲酒者但和羹粥汁服之亦得秋八月合花收曝乾切取三大斤以生絹囊盛貯三大斗酒中經七日服之日三常令酒氣相續為佳今諸州亦有作菊花酒者其法得於此乎食療云甘菊平其葉正月採可作羹莖五月五日採花九月九日採並主頭風目眩淚出去煩熱利五臟野生苦菊不堪用聖惠方治頭風頭旋用九月九日菊花曝乾取家糯米一斗蒸熟用五兩菊花末搜拌如常醞法多用細面曲為候酒熟即壓之去滓每暖一小盞服外臺秘要治酒醉不醒九月九日真菊花末飲服方寸匕肘後方治疔腫垂死菊葉一握搗絞汁一升入口即活此神驗冬用其根食醫心鏡甘菊主頭風目眩胸中洶洶目淚出風痹骨肉痛切作羹煮粥並生食並得玉函方王子喬變白增年方甘菊三月上寅日採名曰玉英六月上寅日採名曰容成九月上寅日採名曰金精十二月上寅日採名曰長生長生者根莖是也四味並陰乾百日取等分以成日合搗千杵為末酒調下一錢匕以蜜丸如桐子大酒服七丸一日三服百日身輕潤澤服之一年發白變黑服之二年齒落再生服之三年八十歲老人變為童兒神效衍義曰菊花近世有二十餘種唯單葉花小而黃綠葉色深小而薄應候而開者是也月令所謂菊有黃花者也又鄧州白菊單葉者亦入藥余皆醫經不用專治頭目風熱今多收之作枕人參味甘微寒微溫無毒主補五臟安精神定魂魄止驚悸除邪氣明目開心益智療腸胃中冷心腹鼓痛胸脅逆滿霍亂吐逆調中止消渴通血脈破堅積令人不忘久服輕身延年一名人銜一名鬼蓋一名神草一名人微一名土精一名血參如人形者有神生上黨山谷及遼東二月四月八月上旬採根竹刀刮曝乾無令見風茯苓為之使惡溲疏反藜蘆陶隱居云上黨郡在冀州西南今魏國所獻即是形長而黃狀如防風多潤實而甘俗用不入服乃重百濟者形細而堅白氣味薄於上黨次用高麗高麗即是遼東形大而虛軟不及百濟百濟今臣屬高麗高麗所獻兼有兩種只應擇取之爾實用並不及上黨者其為藥切要亦與甘草同功而易蛀蚛音注仲唯納器中密封頭可經年不壞人參生一莖直上四五葉相對生花紫色高麗人作人參贊曰三椏五葉背陽向陰欲來求我椴單賈樹相尋椴樹葉似桐甚大陰廣則多生陰地採作甚有法今近山亦有但作之不好唐本注云陶說人參苗乃是薺苨桔梗不悟高麗贊也今潞州平州澤州易州檀州箕州幽州媯州並出蓋以其山連亙相接故皆有之也今注人參見用多高麗百濟者潞州太行山所出謂之紫團參亦用焉陶云俗用不入服非也臣禹錫等謹按藥性論云人參惡滷咸生上黨郡人形者上次出海東新羅國又出渤海主五臟氣不足五勞七傷虛損痿弱吐逆不下食止霍亂煩悶嘔噦補五臟六腑保中守神又云馬藺為之使消胸中痰主肺萎吐膿及癇疾冷氣逆上傷寒不下食患人虛而多夢紛紜加而用之蕭炳云人參和細辛密封經年不壞日華子云殺金石藥毒調中治氣消食開胃食之無忌圖經曰人參生上黨山谷及遼東今河東諸州及泰山皆有之又有河北榷場及閩中來者名新羅人參然俱不及上黨者佳其根形狀如防風而潤實春生苗多於深山中背陰近椴音賈漆下濕潤處初生小者三四寸許一椏五葉四五年後生兩椏五葉末有花莖至十年後生三椏年深者生四椏各五葉中心生一莖俗名百尺杆三月四月有花細小如粟蕊如絲紫白色秋後結子或七八枚如大豆生青熟紅自落根如人形者神二月四月八月上旬採根竹刮去土曝乾無令見風泰山出者葉稈青根白殊別江淮出一種土人參葉如匙而小與桔梗相似苗長一二尺葉相對生生五七節根亦如桔梗而柔味極甘美秋生紫花又帶青色春秋採根不入藥本處人或用之相傳欲試上黨人參者當使二人同走一與人參含之一不與度走三五里許其不含人參者必大喘含者氣息自如者其人參乃真也李絳兵部手集方療反胃嘔吐無常粥飲入口即吐困弱無力垂死者以上黨人參二大兩拍破水一大升煮取四合熱頓服日再兼以人參汁煮粥與啖李直方司勳徐郎中於漢南患反胃兩月餘諸方不瘥遂與此方當時便定瘥後十餘日發入京絳每與名醫持論此藥難可為儔也又雜他藥而其效最著者張仲景治胸痹心中痞堅留氣結胸胸滿脅下逆氣搶心治中湯主之人參朮乾薑甘草各三兩四味以水八升煮取三升每服一升日三如臍上築者為腎氣動去朮加桂四兩吐多者去朮加生薑三兩下多者復其術悸者加茯苓二兩渴者加朮至四兩半腹痛者加人參至四兩半寒者加乾薑至四兩半滿者去朮加附子一枚服藥後如食頃飲熱粥一升許微自溫勿發揭衣被此方晉宋以後至唐名醫治心腹病者無不用之或作湯或蜜丸或加減皆奇效胡洽治霍亂謂之溫中湯陶隱居百一方云霍亂余藥乃可難求而治中丸四順厚朴諸湯不可暫缺常須預合每至秋月常齎自隨唐石泉公王方慶雲治中丸以下四方不唯霍亂可醫至於諸病皆療並須預排比也其三方者治中湯四順湯厚朴湯也四順湯用人參附子炮乾薑甘草各二兩切以水六升煎取二升半分四服若下不止加龍骨二兩若痛加當歸二兩厚朴湯見厚朴條海藥云出新羅國所貢又有手腳狀如人形長尺余以杉木夾定紅線纏飾之味甘微溫主腹腰消食補養臟腑益氣安神止嘔逆平脈下痰止煩躁變酸水又有沙州參短小不堪採根用時去其蘆頭不去者吐人慎之雷公云凡使要肥大塊如雞腿並似人形者採得陰乾去四邊蘆頭並黑者銼入藥中夏中少使發心痃之患也外臺秘要治蜂蠍螫人方人參嚼以封之千金方開心肥健人人參一分豬肪十分酒拌和服一百日百日滿體髓溢日誦千言肌膚潤澤去熱風痰肘後方治卒上氣喘急鳴息便欲絕人參末服方寸匕日五六服經驗後方治大人小兒不進乳食和氣去痰人參四兩半夏一兩生薑汁熬一宿曝乾為末麵糊丸如綠豆大每服十丸食後生薑湯吞下又方治狗咬破傷風以人參不計多少桑柴火上燒令煙絕用盞子合研為末摻在瘡上立效勝金方治吐血以人參一味為末雞子清投新汲水調下一錢服之靈苑方治咳嗽上氣喘急嗽血吐血人參好者搗為末每服三錢匕雞子清調之五更初服便睡去枕仰臥只一服愈年深者再服忌腥咸鮓醬面等並勿過醉飽將息佳衍義曰人參今之用者河光榷場博易到盡是高麗所出率虛軟味薄不若潞州上黨者味厚體實用之有據土人得一窠則置於版上以色茸纏系根頗纖長不與榷場者相類根下垂有及一尺余者或十歧者其價與銀等稍為難得天門冬味苦甘平大寒無毒主諸曝風濕偏痹強骨髓殺三蟲去伏屍保定肺氣去寒熱養肌膚益氣力利小便冷而能補久服輕身益氣延年不飢一名顛勒生奉高山谷二月三月七月八月採根曝乾垣衣地黃為之使畏曾青陶隱居云奉高泰山下縣名也今處處有以高地大根味甘者為好張華博物志云天門冬逆捋有逆刺若葉滑者名絺休一名顛棘可以浣縑素白如絨音越紵類金城人名為浣草擘其根溫湯中挪之以浣衣勝灰此非門冬相似爾按如此說今人所採皆是有刺者本名顛勒亦粗相似以浣垢衣則淨桐君藥錄又云葉有刺蔓生五月花白十月實黑根連數十枚如此殊相亂而不復更有門冬恐門冬自一種不即是浣草耶又有百部根亦相類但苗異爾門冬蒸剝去皮食之甚甘美止飢雖曝乾猶脂潤難搗必須薄切曝於日中或火烘之也俗人呼苗為棘刺煮作飲乃宜人而終非真棘刺爾服天門冬禁食鯉魚唐本注云此有二種苗有刺而澀者無刺而滑者俱是門冬俗云顛刺浣草者形詺音瞑之雖作數名終是一物二根浣垢俱淨門冬浣草互名之也今按陳藏器本草云天門冬陶云百部根亦相類苗異爾按天門冬根有十餘莖百部多者五六十莖根長尖內虛味苦天門冬根圓短實潤味甘不同苗蔓亦別如陶所說乃是同類今人或以門冬當百部者說不明也臣禹錫等謹按爾雅云薔蘼門冬注云門冬一名滿冬虋音門抱朴子云或名地門冬或名莚門冬或名巔棘或名淫羊食或名管松其生高地根短味甜氣香者上其上水側下地者葉細似蘊而黃根長而味多苦氣臭者下亦可服食然善令人下氣為益又遲也服之百日皆丁壯兼倍快於朮及黃精也入山便可蒸若煮啖之取足以斷谷若有力可餌之亦作散並搗絞其汁作液以服散尤益藥性論云天門冬君主肺氣咳逆喘息促急除熱通腎氣療肺瘻生癰吐膿治濕疥止消渴去熱中風宜久服煮食之令人肌體滑澤除身中一切惡氣不潔之疾令人白淨蜀人使浣衣如玉和地黃為使服之耐老頭不白能冷補患人體虛而熱加而用之楊損之云服天門冬誤食鯉魚中毒浮萍解之日華子云貝母為使鎮心潤五臟益皮膚悅顏色補五勞七傷治肺氣並嗽消痰風痹熱毒遊風煩悶吐血去心用圖經曰天門冬生奉高山谷今處處有之春生藤蔓大如釵股高至丈餘葉如茴香極尖細而疏滑有逆刺亦有澀而無刺者其葉如絲杉而細散皆名天門冬夏生白花亦有黃色者秋結黑子在其根枝旁入伏後無花暗結子其根白或黃紫色大如手指長二三寸大者為勝頗與百部根相類然圓實而長一二十枚同撮二月三月七月八月採根四破之去心先蒸半炊間曝乾停留久仍濕潤入藥時重炕焙令燥洛中出者葉大幹粗殊不相類嶺南者無花余無它異謹按天門冬別名爾雅謂之蘼亡彼切一名虋與門同冬山海經云條谷之山其草多芍藥虋冬是也抱朴子及神仙服食方云天門冬一名顛棘在東嶽名淫羊食在中嶽名天門冬在西嶽名管松在北嶽名無不愈在南嶽名百部在京陸山阜名顛棘雖處處皆有其名各異其實一也在北嶽地陰者尤佳欲服之細切陰乾搗下篩酒調三錢匕日五六進之二百日知可以強筋髓駐顏色與煉成松脂同蜜丸益善服者不可食鯉魚此方以顛棘為別名而張茂先以為異類博物志云天門冬莖間有刺而葉滑者曰絺休一名顛棗根以浣縑素令白越人名為浣草似天門冬而非也凡服此先試浣衣如法者便非天門冬若如所說則有刺而葉滑便不中服然今所有往往是此類用者須詳之雷公云採得了去上皮一重便劈破去心用柳木甑燒柳木柴蒸一伏時灑酒令遍更添火蒸出曝去地二尺以來作小架上鋪天門葉將蒸了天門冬攤令乾用食療補虛勞治肺癆止渴去熱風可去皮心入蜜煮之食後服之若曝乾入蜜丸尤佳亦用洗面甚佳外臺秘要治風癲引脅牽痛發作則吐耳如蟬鳴天門冬去心皮曝乾搗篩酒服方寸匕若人久服亦能長生經驗後方服天門冬法不計多少去心皮為末每服方寸匕日三四服不絕甚益人以酒飲之又治癥瘕積聚去三尸輕身益氣延年耐老百病不侵孫真人枕中記天門冬末服方寸匕日三無問山中人間恆勿廢久服益若釀酒服之去癥瘕積聚風痰癲狂三蟲伏屍除瘟痹輕身益氣令人不飢百日還年耐老修真秘旨神仙服天門冬三十斤細切陰乾搗末每服三錢酒調下日五六服二百日後怡泰拘急者緩羸劣者強三百日身輕三年走及奔馬道馬八帝聖化經欲不畏寒取天門冬茯苓等分為末服方寸匕日再服大寒時單衣汗出抱朴子云杜紫微服天門冬御八十妾有男一百四十人日行三百里列仙傳赤頂子食天門冬齒落更生細發覆出神仙傳甘始者太原人服天門冬在人間三百餘年衍義曰天門冬麥門冬之類雖曰去心但以水漬漉使周潤滲入肌俟軟緩緩擘取不可浸出脂液其不知者乃以湯浸一二時柔即柔矣然氣味都盡用之不效乃曰藥不神其可得乎治肺熱之功為多其味苦但專泄而不專收寒多人禁服余如二經甘草國老味甘平無毒主五臟六腑寒熱邪氣堅筋骨長肌肉倍力金瘡尰時勇切解毒溫中下氣煩悶短氣傷臟咳嗽止渴通經脈利血氣解百藥毒為九土之精安和七十二種石一千二百種草久服輕身延年一名蜜甘一名美草一名蜜草一名蕗草生河西川穀積沙山及上郡二月八月除日採根曝乾十日成朮乾漆苦參為之使惡遠志反大戟芫花甘遂海藻四物陶隱居云河西上郡不復通市今出蜀漢中悉從汶山諸夷中來赤皮斷理看之堅實者是抱罕草最佳抱罕羌地名亦有火炙乾者理多虛疏又有如鯉魚腸者被刀破不復好青州間亦有不如又有紫甘草細而實乏時可用此草最為眾藥之主經方少不用者猶如香中有沉香也國老即帝師之稱雖非君為君所宗是以能安和草石而解諸毒也臣禹錫等謹按爾雅云蘦大苦注今甘草也蔓延生葉似荷青黃莖赤有節節有枝相當疏引詩唐風云采苓采苓首陽之巔是也藥性論云甘草君忌豬肉諸藥眾中為君治七十二種乳石毒解一千二百般草木毒調和使諸藥有功故號國老之名矣主腹中冷痛治驚癇除腹脹滿補益五臟制諸藥毒養腎氣內傷令人陰痿主婦人血瀝腰痛虛而多熱加而用之日華子云安魂定魄補五勞七傷一切虛損驚悸煩悶健忘通九竅利百脈益精養氣壯筋骨解冷熱入藥炙用圖經曰甘草生河西川穀積沙山及上郡今陝西河東州郡皆有之春生青苗高一二尺葉如槐葉七月開紫花似柰冬結實作角子如畢豆根長者三四尺粗細不定皮赤上有橫梁梁下皆細根也二月八月除日採根曝乾十日成去蘆頭及赤皮今云陰乾用今甘草有數種以堅實斷理者為佳其輕虛縱理及細韌者不堪唯貨湯家用之謹按爾雅云蘦大苦釋曰蘦一名大苦郭璞云甘草也蔓延生葉似荷青黃莖赤有節節有枝相當或云蘦似地黃詩唐風云采苓采苓首陽之巔是也蘦與苓通用首陽之山在河東蒲阪縣乃今甘草所生處相近而先儒所說苗葉與今全別豈種類有不同者乎張仲景傷寒論有一物甘草湯甘草附子甘草乾薑甘草瀉心等湯諸方用之最多又能解百毒為眾藥之要孫思邈論云有人中烏頭巴豆毒甘草入腹即定方稱大豆解百藥毒嘗試之不效乃加甘草為甘豆湯其驗更速又備急方云席辯刺史嘗言嶺南俚人解毒藥並是嘗用物畏人得其法乃言三百頭牛藥或言三百兩銀藥辯久住彼與之親狎乃得其實凡欲食先取甘草一寸炙熟嚼咽汁若中毒隨即吐出乃用都惏藤黃藤二物酒煎令溫常服毒隨大小溲出都惏藤者出嶺南高三尺余甚細長所謂三百兩銀藥也又常帶甘草十數寸隨身以備緩急若經含甘草而食物不吐者非毒也崔元亮海上方治發背秘法李北海云此方神授極奇秘以甘草三大兩生搗別篩末大麥面九兩於一大盤中相和攪令勻取上好酥少許別捻入藥令勻百沸水搜如餅劑方圓大於瘡一分熱敷腫上以油片及故紙隔令通風冷則換之已成膿水自出未成腫便內消當患腫著藥時常須吃黃耆粥甚妙又一法甘草一大兩微炙搗碎水一大升浸之器上橫一小刀子置露中經宿平明以物攪令沫出吹沫服之但是瘡腫發背皆可服甚效雷公云凡使須去頭尾尖處其頭尾吐人每用切長三寸銼劈破作六七片使瓷器中盛用酒浸蒸從巳至午出曝乾細銼使一斤用酥七兩塗上炙酥盡為度又先炮令內外赤黃用良外臺秘要救急瘦疾甘草三兩炙每旦以小便煮三四沸頓服之良百一方小兒初生未可與朱蜜取甘草一指節長炙碎以水二合煮取一合以纏綿點兒口中可得一蜆殼止兒當快吐胸中惡汁此後待兒飢渴更與之若兩服並不吐盡一合止得吐惡汁兒智惠無病又方中蠱者煮甘草服之當痰出若平生預服防蠱者宜熟炙甘草煮服之凡中蠱毒即內消不令吐痰神驗又方食牛羊肉中毒者煮甘草汁服之一二升當愈經驗方崔宣州衍傳赤白痢方甘草一尺炙擘破以淡漿水蘸三二度又以慢火炙之後用生薑去皮半兩二味以漿水一升半煎取八合服之立效梅師方治初得痢冷熱赤白芨霍亂甘草一兩炙豆蔻七個銼以水三升煎取一升分服孫真人食忌主一切傷寒甘草如中指長炙細銼取童子小便一升和煎取七合空心服日再服之廣利方治肺痿久咳嗽涕唾多骨節煩悶寒熱甘草十二分炙搗為末每日取小便三合甘草末一錢匕攪令散服御藥院治二三日咽痛可與甘草湯去滓日三服古今錄驗治陰下濕癢甘草一尺並切以水五升煮取三升漬洗之日三五度瘥金匱玉函菜中有水莨菪葉圓而光有毒誤食之令人狂亂狀若中風或吐甘草煮汁服之即解又方治誤飲饌中毒者未審中何毒卒急無藥可解只煎甘草薺苨湯服之入口便活又方治小兒撮口及發噤方用生甘草一分細銼以水一盞煎至六分去滓溫與兒服令吐痰涎後以乳汁點兒口中瘥又方治小兒中蠱欲死甘草半兩銼以水一盞煎五分去滓作二服當吐蠱出又方治小兒羸瘦惏惏方甘草二兩炙焦杵為末蜜丸如綠豆大每溫水下五丸日二服傷寒類要治傷寒三二日咽痛者與甘草二兩炙水三升煮取一升半服五合日三又方傷寒脈結代者心悸動方甘草二兩水三升煮取一半服七合日二姚和眾治小兒尿血甘草五分以水六合煎取二合去滓一歲兒一日服令盡淮南子甘草主生肌肉衍義曰甘草枝葉悉如槐高五六尺但葉端微尖而糙澀似有白毛實作角生如相思角作一本生子如小扁豆齒齧不破今出河東西界入藥須微炙不爾亦微涼生則味不佳乾地黃味甘苦寒無毒主折跌絕筋傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹主男子五勞七傷女子傷中胞漏下血破惡血溺血利大小腸去胃中宿食飽力斷絕補五臟內傷不足通血脈益氣力利耳目生者尤良生地黃大寒主婦人崩中血不止及產後血上薄心悶絕傷身胎動下血胎不落墮墜踠折瘀血留血衄鼻吐血皆搗飲之久服輕身不老一名地髓一名芐一名芑生咸陽川澤黃土地者佳二月八月採根陰乾得麥門冬清酒良惡貝母畏蕪荑陶隱居云咸陽即長安也生渭城者乃有子實實如小麥淮南七精散用之中間以彭城乾地黃最好次歷陽今用江寧板橋者為勝作乾者有法搗汁和蒸殊用工意而此直云陰乾色味乃不相似更恐以蒸為失乎大貴時乃取牛膝萎蕤作之人不能別仙經亦服食要用其華又善生根亦主耳暴聾重聽乾者黏濕作丸散用須烈日曝之既燥則斤兩大減一斤才得十兩散爾用之宜加量也今按陳藏器本草云乾地黃本經不言生干及蒸乾方家所用二物別蒸乾即溫補生干則平宣當依此以用之臣禹錫等謹按爾雅云芐地黃注云一名地髓江東呼芐音怙藥性論云乾地黃君能補虛損溫中下氣通血脈久服變白延年治產後腹痛主吐血不止又云生地黃忌三白味甘平無毒解諸熱破血通利月水閉絕不利水道搗敷心腹能消瘀血病人虛而多熱加而用之蕭炳云干生二種皆黑鬚發良藥日華子云乾地黃助心膽氣安魂定魄治驚悸勞劣心肺損吐血鼻衄婦人崩中血暈肋筋骨長志日乾者平火乾者溫功用同前又云生者水浸驗浮者名天黃半浮半沉者名人黃沉者名地黃沉有力佳半沉者次浮者劣煎忌鐵器圖經曰地黃生咸陽川澤黃土地者佳今處處有之以同州為上二月生葉布地便出似車前藥上有皺紋而不光高者及尺余低者三四寸其花似油麻花而紅紫色亦有黃花者其實作房如連翹子甚細而沙褐色根如人手指通黃色粗細長短不常二月八月採根蒸三二日令爛曝乾謂之熟地黃陰乾者是生地黃種之甚易根入土即生一說古稱種地黃宜黃土今不然大宜肥壤虛地則根大而多汁其法以葦蓆圓編如車輪徑丈餘以壤土實葦蓆中為壇壇上又以葦蓆實土為一級比下壇徑減一尺如此數級如浮屠也乃以地黃根節多者寸斷之蒔壇上層層令滿逐日以水灌之令茂盛至春秋分時自上層取之根皆長大而不斷折不被斸傷故也得根曝乾之熟乾地黃最上出同州光潤而甘美南方不復識但以生地黃草煙燻使乾黑洗之煤盡仍白也今干之法取肥地黃三二十斤淨洗更以揀去細根及根節瘦短者亦得二三十斤搗絞取汁投銀銅器中下肥地黃浸漉令浹飯上蒸三四過時時浸漉轉蒸訖又曝使汁盡其地黃當光黑如漆味甘如飴糖須瓷器內收之以其脂柔喜曝潤也又醫家欲辨精粗初採得以水浸有浮者名天黃不堪用半沉者名人黃為次其沉者名地黃最佳也神仙方服食地黃採取根淨洗搗絞取汁煎令小稠納白蜜更煎令可丸晨朝酒送三十丸如梧子日三亦入青州棗肉同丸又煎膏入干根末丸服又四月採其實陰乾篩末水服錢匕其效皆等其花名地髓花延年方有單服二法又治傷折金瘡為最要之藥肘後方療踠折四肢骨破碎及筋傷蹉跌爛搗生地黃熬之裹所傷處以竹簡編夾之遍急縛勿令轉動一日一夕可以十易則瘥崔元亮海上方治一切心痛無問新久以生地黃一味隨人所食多少搗絞取汁搜面作䬪飥或冷淘食良久當利出蟲長一尺許頭似壁宮後不復患矣昔有人患此病三年不瘥深以為恨臨終戒其家人吾死後當剖去病本果得蟲置於竹節中每所食皆飼之因食地黃䬪飥亦與之隨即壞爛由此得方劉禹錫傳信方亦紀其事云正元十年通事舍人崔抗女患心痛垂氣絕遂作地黃冷淘食之便吐一物可方一寸以來如蛤蟆狀無目足等微似有口蓋為此物所食自此遂愈食冷淘不用著鹽雷公云採生地黃去白皮瓷鍋上柳木甑蒸之攤令氣歇拌酒再蒸又出令乾勿令犯銅鐵器令人腎消並白髭發男損榮女損衛也食療地黃微寒以少蜜煎或浸食之或煎湯或入酒飲並妙生則寒主齒痛唾血折傷葉可以羹外臺秘要張文仲治骨蒸方生地黃一升搗取汁三度搗絞汁盡分再服若利即減之以身體涼為度千金方治牙齒根欲動脫生地黃細銼綿裹著齒上咂之漬齒根日三四並咽之十日大佳肘後方治耳中常鳴生地黃截塞耳數易之以瘥為度一云以紙裹微灰火中煨之用良百一方妊娠漏胎生地黃汁一升漬酒四合煮三五沸服之不止又服又方治猘犬咬人搗地黃汁飲之並塗瘡口百度止梅師方治墮損筋骨蹉跌骨碎破搗生地黃熨熱裹三日夜數易若血聚以針決之又方治吐血神效方生地黃汁一升二合白膠香二兩以瓷器盛入甑蒸令膠消服又方治乳癰搗生地黃汁敷之熱即易之無不見效也食醫心鏡主勞瘦骨蒸日晚寒熱咳嗽唾血生地黃汁二合煮白粥臨熟入地黃汁攪令勻空心食之博濟方治一切癰腫未破疼痛令內消以生地黃杵如泥隨腫大小攤於布上摻木香末於中又再攤地黃一重貼於腫上不過三五度孫兆方治鼻衄及膈上盛熱乾地黃龍腦薄荷等分為末冷水調下子母秘錄小兒患蠱毒痢生地黃汁一升二合分三四服立效產寶妊娠下血如月信通恐胎漏方乾地黃乾薑等分為末用酒調方寸匕抱朴子楚文子服地黃八年夜視有光手上車弩淮南子云地黃主屬骨衍義曰地黃葉如甘露子花如脂麻花但有細斑點北人謂之牛奶子花莖有微細短白毛經只言干生二種不言熟者如血虛勞熱產後虛熱老人中虛燥熱須地黃者生與生干常慮太寒如此之類故後世改用熟者蒸曝之法以細碎者洗出研取汁將粗地黃蒸出曝乾投汁中浸三二時又曝再蒸如此再過為勝亦不必多此等與干生二種功治殊別陶但云搗汁和蒸殊用工意不顯其法不注治療故須悉言耳術味苦甘溫無毒主風寒濕痹死肌痙巨井切疸止汗除熱消食主大風在身面風眩頭痛目淚出消痰水逐皮間風水結腫除心下急滿及霍亂吐下不止利腰臍間血益津液暖胃消穀嗜食作煎餌久服輕身延年不飢一名山薊一名山姜一名山連生鄭山山谷漢中南鄭二月三月八月九月採根曝乾防風地榆為之使陶隱居云鄭山即南鄭也今處處有以蔣山白山茅山者為勝十一月十二月正月二月採好多脂膏而甘仙經云亦能除惡氣弭災疹丸散煎餌並有法其苗又可作飲甚香美去水術乃有兩種白朮葉大有毛而作椏根甜而少膏可作丸散用赤朮葉細無椏根小苦而多膏可作煎用昔劉涓子挪取其精而丸之名守中金丸可以長生東境術大而無氣烈不任用今市人賣者皆以米粉塗令白非自然用時宜刮去之臣禹錫等謹按吳氏本草云術一名山芥一名天蘇爾雅云術山薊注今術似薊而生山中疏云生平地者即名薊生山中者名術抱朴子云術一名山精故神農藥經曰必欲長生常服山精藥性論云白朮君忌桃李雀肉菘菜青魚味甘辛無毒能主大風𤸷痹多年氣痢心腹脹痛破消宿食開胃去痰涎除寒熱止下泄主面光悅駐顏去䵟治水腫脹滿止嘔逆腹內冷痛吐瀉不住及胃氣虛冷痢日華子云術治一切風疾五勞七冷冷氣腹脹補腰膝消痰治水氣利小便止反胃嘔逆及筋骨弱軟痃癖氣塊婦人冷癥瘕溫疾山嵐瘴氣除煩長肌用米泔浸一宿入藥如常用又名吃力伽蒼者去皮圖經曰術生鄭山山谷漢中南鄭今處處有之以嵩山茅山者為佳春生苗青色無椏一名山薊以其葉似薊也莖作蒿干狀青赤色長三二尺以來夏開花紫碧色亦似刺薊花或有黃白花者入伏後結子至秋而苗枯根似姜而旁有細根皮黑心黃白色中有膏液紫色二月三月八月九月採曝乾乾溼並通用今八月採之服食家多單餌之或合白茯苓或合石菖蒲並搗末旦日水調服晚再進久久彌佳又斸取生術去土水浸再三煎如飴糖酒調飲之更善今茅山所制術煎是此法也陶隱居云昔者劉涓子挪取其精而丸之名守中金丸今傳其法乃是膏煎恐非真爾謹按術有二種爾雅云術山薊楊抱音孚薊釋曰此辨薊生山中及平地者名也生平地者名薊生山中名術陶注本草云白朮葉大而有毛甜而少膏赤朮細苦而多膏是也其生平地而肥大於眾者名楊抱薊今呼之馬薊然則楊抱即白朮也今白朮生杭越舒宣州高山崗上葉葉相對上有毛方莖莖端生花淡紫碧紅數色根作椏生二月三月八月九月採根曝乾以大塊紫花者為勝又名乞力伽凡古方云術者乃白朮也非謂今之術矣唐本云利小便及用苦酒漬之用拭面䵟𪒟極效聖惠方治雀目不計時月和蒼朮二兩搗羅為散每服一錢不計時候以好羊子肝一個用竹刀子批破摻藥在內麻繩纏定以粟米泔一大盞煮熟為度患人先熏眼藥氣絕即吃之簡要濟眾亦治小兒雀目外臺秘要療忽頭眩暈經久不瘥四體漸羸食無味好食黃土術三斤曲三斤搗篩酒和並丸如梧桐子大曝乾飲服二十丸忌桃李雀蛤日三服千金方治中風口噤不知人術四兩酒三升煮取一升頓服又方療煩悶白朮末水調服方寸匕經驗方烏髭鬢駐顏色壯筋骨明耳目除風氣潤肌膚久服令人輕健蒼朮不計多少用米泔水浸三兩日逐日換水候滿日取出刮去黑皮切作片子曝乾用慢火炒令黃色細搗末每一斤末用蒸過茯苓半斤煉蜜為丸如梧桐子大空心臥時溫熟水下十五丸別用術末六兩甘草末一兩拌和勻作湯點之下術丸妙忌桃李雀蛤及三白又方治內外障眼蒼朮四兩米泔浸七日逐日換水後刮去黑皮細切入青鹽一兩同炒黃色為度去鹽不用木賊二兩以童子小便浸一宿水淘焙乾同搗為末每日不計時候但飲食蔬菜內調下一錢匕服甚驗梅師方治心下有水白朮三兩澤瀉五兩銼以水三升煎取一升半分服集驗方治毒氣攻疰足脛久瘡不瘥白朮為細末鹽漿水洗瘡干貼二日一換可以負重涉險凶年與老少代糧人不能別之謂之米脯產寶產後中風寒遍身冷直口噤不識人方白朮四兩以酒三升煎取一升頓服荀子注列仙傳劉涓子齊人隱於岩山餌術能致風雨抱朴子內篇曰南陽文氏值亂逃壺山中飢困欲死有一人教之食術遂不飢數十年乃還鄉里顏色更少氣力轉勝故術一名山精神農藥經曰必欲長生常服山精異術術草者山之精也結陰陽之精氣服之令人長生絕谷致神仙梁庚肩吾答陶隱居齎術啟曰味重金漿芳逾玉液足使坐致延生伏深銘感衍義曰蒼朮其長如大小指肥實皮色褐氣味辛烈須米泔浸洗再換泔浸二日去上粗皮白朮粗促色微褐氣味亦微辛苦而不烈古方及本經只言術未見分其蒼白二種也只緣陶隱居言術有兩種自此人多貴白者今人但貴其難得唯用白者往往將蒼朮置而不用如古方平胃散之類蒼朮為最要藥功尤速殊不詳本草元無白朮之名近世多用亦宜兩審嵇康曰聞道人遺言餌朮黃精令人久壽亦無白字菟絲子味辛甘平無毒主續絕傷補不足益氣力肥健汁去面䵟養肌強陰堅筋骨主莖中寒精自出溺有餘瀝口苦燥渴寒血為積久服明目輕身延年一名菟蘆一名菟縷一名蓎蒙一名玉女一名赤網一名菟累音羸生朝鮮川澤田野蔓延草木之上色黃而細為赤網色淺而大為菟累九月採實曝乾得酒良薯蕷松脂為之使惡雚菌陶隱居云宜丸不宜煮田野墟落中甚多皆浮生藍紵麻蒿上舊言下有茯苓上生菟絲今不必爾其莖挪以浴小兒療熱痱音沸用其實先須酒漬之一宿仙經俗方並以為補藥臣禹錫等謹按呂氏春秋云或謂菟絲無根也其根不屬地茯苓是也抱朴子云菟絲之草下有伏菟之根無此菟則絲不得生於上然實不屬也又內篇云菟絲初生之根其形似兔掘取割其血以和丹服之立變化藥性論云菟絲子君能治男子女人虛冷添精益髓去腰疼膝冷久服延年駐悅顏色又主消渴熱中日華子云補五勞七傷治鬼交泄精尿血潤心肺苗莖似黃麻線無根株多附田中草被纏死或生一叢如席闊開花結子不分明如碎黍米粒八月九月以前採圖經曰菟絲子生朝鮮川澤田野今近京亦有之以冤句者為勝夏生苗如絲綜蔓延草木之上或云無根假氣而生六七月結實極細如蠶子土黃色九月收採曝乾得酒良其實有二種色黃而細者名赤網色淺而大者名菟累其功用並同謹按爾雅云唐蒙女蘿女蘿菟絲釋曰唐也蒙也女蘿也菟絲也一物四名而本經並以唐蒙為一名又詩云蔦與女蘿毛傳云女蘿菟絲也陸機云今合藥菟絲也而本經菟絲無女蘿之名別有松蘿條一名女蘿自是木類寄生松上者亦如菟絲寄生草上豈二物同名本經脫漏乎又書傳多雲菟絲無根其根不屬地今觀其苗初生才若絲遍地不能自起得他草梗則纏繞隨而上生其根漸絕於地而寄空中信書傳之說不謬矣然云上有菟絲下有茯苓茯苓抽則菟絲死又云菟絲初生之根其形似兔掘取割其血以和丹服之今人未見其如此者豈自一類乎仙方多單服者取實酒浸曝乾再浸又曝令酒盡篩末酒服久而彌佳兼明目其苗生研汁塗面斑神效雷公曰勿用天碧草子其樣真相似只是天碧草子味酸澀並黏不入藥用其菟絲子稟中和凝正陽氣受結偏補人衛氣助人筋脈一莖從樹感枝成又從中春上陽結實其氣大小受七鎰二兩全採得去粗薄殼了用苦酒浸二日漉出用黃精自然汁浸一宿至明微用火煎至干入臼中熱燒鐵杵一去三千餘杵成粉用苦酒並黃精自然汁與菟絲子相對用之肘後方治卒腫滿身面皆洪大菟絲子一升酒五升漬二三宿每服一升日三服又方治痔發痛如蟲齧菟絲子熬令黃黑末和雞子黃塗之亦治穀道中赤痛又方治面上粉刺搗菟絲子絞取汁塗之瘥經驗後方治丈夫腰膝積冷痛或頑麻無力菟絲子洗秤一兩牛膝一兩同浸於銀器內用酒過一寸五日曝乾為末將元浸酒再入少醇酒作糊搜和丸如梧桐子大空心酒下二十丸又方固陽丹菟絲子二兩酒浸十日水淘焙乾為末更入杜仲一兩蜜炙搗用薯蕷末酒煮為糊丸如梧桐子大空心用酒下五十丸子母秘錄治小兒頭瘡及女人面瘡菟絲湯洗產書治橫生菟絲子為末酒調下一錢匕米飲調亦得修真方神仙方菟絲子一斗酒一斗浸良久漉出曝乾又浸以酒盡為度每服二錢溫酒下日二服後吃三五匙水飯壓之至三七日加至三錢匕服之令人光澤三年老變為少此藥治腰膝去風久服延年衍義曰菟絲子附叢木中即便蔓延花實無綠葉此為草中之異其上有菟絲下有茯苓之說未必耳已於茯苓條中具言之牛膝為君味苦酸平無毒主寒濕痿痹四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎療傷中少氣男子陰消老人失溺補中續絕填骨髓除腦中痛及腰脊痛婦人月水不通血結益精利陰氣止發白久服輕身耐老一名百倍生河內川穀及臨朐二月八月十月採根陰乾惡螢火陸英龜甲畏白前陶隱居云今出近道蔡州者最長大柔潤其莖有節似牛膝故以為名也乃云有雌雄雄者莖紫色而節大為勝爾唐本注云諸藥八月以前採者皆日乾火干乃佳不爾䭂爛黑黯其十月以後至正月乃可陰乾臣禹錫等謹按藥性論云牛膝臣忌牛肉能治陰痿補腎填精逐惡血流結助十二經脈病人虛羸加而用之日華子云牛膝治腰膝軟怯冷弱被癥結排膿止痛產後心腹痛並血暈落死胎壯陽懷州者長白近道蘇州者色紫圖經曰牛膝生河內川穀及臨朐今江淮閩粵關中亦有之然不及懷州者為真春生苗莖高二三尺青紫色有節如鶴膝又如牛膝狀以此名之葉尖圓如匙兩兩相對於節上生花作穗秋結實甚細此有二種莖紫節大者為雄青細者為雌二月八月十月採根陰乾根極長大而柔潤者佳莖葉亦可單用葛洪治老瘧久不斷者取莖葉一把切以酒三升漬服令微有酒氣不即斷更作不過三劑止唐崔元亮海上方治瘧用水煮牛膝根未發前服今福州人單用土牛膝根淨洗切焙乾搗下篩酒煎溫服云治婦人血塊極效雷公云凡使去頭並塵土了用黃精自然汁浸一宿漉出細銼焙乾用之聖惠方治眼卒生珠管牛膝並葉搗絞取汁日三四度點之又方治氣濕痹腰膝痛用牛膝葉一斤切以米三合於豉汁中相和煮作粥和鹽醬空腹食之外臺秘要治勞瘧積久不斷者長生牛膝一握切以水六升煮取二升分二服未發前服臨發又一服千金方治婦人小戶嫁痛牛膝五兩酒三升煮取一升半去滓分作三服又方治風瘙癮疹牛膝末酒服方寸匕日三並主骨疽癩病及㾦㿔肘後方口中及舌上生瘡爛取牛膝酒漬含漸之無酒者空含亦佳又方治卒暴症腹中有如石刺晝夜啼呼牛膝二斤以酒一斗漬密封熱灰火中溫令味出服五合至一升量力服之又方治齒痛牛膝末著齒間含之又方凡痢下應先白後赤若先赤後白為腸蠱牛膝三兩搗碎以酒一升漬經一宿每服飲一兩杯日三服又方治小便不利莖中痛欲死兼治婦人血結腹堅痛牛膝一大把並葉不以多少酒煮飲之立愈經驗後方治消渴不止下元虛損牛膝五兩細銼為末生地黃汁五升浸晝曝夜浸汗盡為度蜜丸梧桐子大空心溫酒下三十丸久服壯筋骨駐顏色黑髮津液自完梅師方治竹木針在肉中不出取生牛膝莖搗末塗之即出又方治胞衣不出牛膝八兩葵子一兩以水九升煎取三升分三服又方治金瘡痛所生牛膝搗敷瘡上立瘥孫真人食忌治牙齒疼痛燒牛膝根灰致牙齒間又方治卒得惡瘡人不識者以牛膝根搗敷之衍義曰牛膝今西京作畦種有長三尺者最佳與蓯蓉酒浸服益腎竹木刺入肉嚼爛罨之即出茺蔚子味辛甘微溫微寒無毒主明目益精除水氣療血逆大熱頭痛心煩久服輕身莖主癮疹上音癮下音診癢可用浴湯一名益母一名益明一名大札一名貞蔚生海濱池澤五月採陶隱居云今處處有葉如荏方莖子形細長三稜方用亦稀唐本注云搗茺蔚莖敷疔腫服汁使疔腫毒內消又下子死腹中主產後血脹悶諸雜毒腫丹油等腫取汁如豆滴耳中主聤耳中虺蛇毒敷之良今按陳藏器本草云此草田野間人呼為郁臭草本功外苗子入面藥令人光澤亦搗苗敷乳癰惡腫痛者又搗苗絞汁服主浮腫下水兼惡毒腫又按別本注云其子狀如菥蓂子而稍粗大微有陳氣作煎及搗絞取汁服之下死胎也臣禹錫等謹按爾雅釋草注云萑今茺蔚也葉似荏方莖白華華生節間又名益母疏引劉歆曰萑臭穢臭穢即茺蔚也日華子云治產後血脹苗葉同功乃益母草子也節節生花如雞冠子黑色九月採圖經曰茺蔚子生海濱池澤今處處有之謹按毛詩云中谷有蓷他回切爾雅云萑音隹蓷郭璞云今茺蔚也葉似荏方莖白華華生節間陸機云韓詩及三蒼皆云益母也故曾子見之感恩劉歆亦謂蓷臭穢臭穢即茺蔚也今園圃及田野見者極多形色皆如郭說而苗葉上節節生花實似雞冠子黑色莖作四方稜五月採又云九月採實醫方中稀見用實者唐天后煉益母草澤面法五月五日採根苗具者勿令著土曝乾搗羅以水和之令極熟團之如雞子大再曝仍作一爐四旁開竅上下置火安藥中央大火燒一炊久即去大火留小火養之勿令絕經一復時出之瓷器中研治篩再研三日收之使如澡豆法廣濟方療小兒疳痢困垂死者取益母草煮食之取足瘥止甚佳韋丹治女子因熱病胎死腹中搗此草並苗令熟以少許暖水和絞取汁頓服良又主難產搗取汁七大合煎半頓服立下無新者以乾者一大握水七合煎服又名郁臭草又名苦低草亦主馬齧細切此草和醋炒敷之良聖惠方治婦人勒乳痛成癰益母為末木調塗乳上一宿自瘥生搗爛用之亦得又方治產後血不下益母搗絞汁每服一小盞入酒一合溫攪勻服外臺秘要治折傷內損有瘀血每天陰則痛兼治產婦諸疾神方三月採益母草一名負擔一名夏枯草洗擇令淨於箔上攤曝令水乾則用拔斷可長五寸以來勿用刀即置鍋中以水二碩以來令草上水深二三寸煎煮候益母爛水三分減二漉出草取五六斗汁瀉入盆中澄之半日以來以綿濾取清汁盆中滓澱盡棄之其清汁於小釜中慢火煎取一斗以來如稀餳每取梨許大暖酒和服之日再服以和羹粥並可如遠行不能稀煎去即更煉可丸得每服之七日內則疼痛漸瘳七日平復或有產婦惡露不盡及血暈一二服瘥其藥治風益心力無忌肘後方治一切產後血病並一切傷損益母草不限多少竹刀切洗淨銀器內煉成膏瓷器內封之並以酒服內損亦服孫真人治馬咬方益母草細切和醋炒封之食醫心鏡治小兒疳痢痔疾以益母草葉煮粥食之取汁飲之亦妙簡要濟眾新生小兒浴法益母草五兩銼水一斗煎十沸溫浴而不生瘡疥斗門方治癤子已破用益母搗敷瘡妙丹房鏡源燒益母灰用麵湯溲燒之遍治面上風刺亦制硫黃集驗方治婦人帶下赤白色益母草花開時採搗為末每服二錢食前溫湯調下子母秘錄治產後血暈心氣絕益母草研絞汁服一盞妙又方治小兒疳益母草絞汁稍稍服衍義曰茺蔚子葉至初春亦可煮作菜食凌冬不凋悴唐武后九燒此灰入緊面藥九燒之義已具冬灰條下女萎萎蕤味甘平無毒主中風暴熱不能動搖跌筋結肉諸不足心腹結氣虛熱濕毒腰痛莖中寒及目痛眥爛淚出久服去面黑䵟好顏色潤澤輕身不老一名熒一名地節一名王竹一名馬薰生泰山山谷及丘陵立春後採陰乾畏滷咸陶隱居云按本經有女萎無萎蕤別錄無女萎有萎蕤而為用正同疑女萎即萎蕤也唯名異爾今處處有其根似黃精而小異服食家亦用之今市人別用一種物根形狀如續斷莖味至苦乃言是女青根出荊州今療下痢方多用女萎而此都無止泄之說疑必非也萎蕤又主理諸石人服石不調和者煮汁飲之唐本注云女萎功用及苗蔓與萎蕤全別列在中品今本經朱書是女萎能效墨字乃萎蕤之效今以朱書為白字臣禹錫等謹按爾雅云熒委萎釋曰藥草也一名熒一名委萎葉似竹大者如箭竿有節葉狹長而表白里青根大如指長一二尺可啖藥性論云萎蕤君主時疾寒熱內補不足去虛勞客熱頭痛不安加而用之良陳藏器云女萎葳蕤二物同傳陶云同是一物但名異耳下痢方多用女萎而此都無止泄之說疑必非也按女萎蘇又於中品之中出之云主霍亂泄痢腸鳴正與陶註上品女萎相會如此即二萎功用同矣更非二物蘇乃剩出一條蘇又云女萎與萎蕤不同其萎蕤一名玉竹為其似竹一名地節為其有節魏志樊阿傳青黏一名黃芝一名地節此即萎蕤極似偏精本功外主聰明調血氣令人強壯和漆葉為散主五臟益精去三蟲輕身不老變白潤肌膚暖腰腳唯有熱不可服晉嵇紹有胸中寒痰每酒後苦唾服之得愈草似竹取根花葉陰乾昔華佗入山見仙人所服以告樊阿服之壽百歲也蕭炳云萎蕤補中益氣出均州日華子云除煩悶止渴潤心肺補五勞七傷虛損腰腳疼痛天行熱狂服食無忌圖經曰萎蕤生泰山山谷丘陵今滁州舒州及漢中皆有之葉狹而長表白里青亦類黃精莖稈強直似竹箭稈有節根黃多須大如指長一二尺或云可啖三月開青花結圓實立春後採根陰乾用之本經與女萎同條云是一物二名又云自是二物苗蔓與功用全別爾雅謂熒委萎上於為切下人垂切郭璞注云藥草也亦無女萎之別名疑別是一物且本經中品又別有女萎條蘇恭云即此女萎今本經朱書是女萎能效黑字是萎蕤之功觀古方書所用則似差別胡洽治時氣洞下䘌下有女萎丸治傷寒冷下結腸丸中用女萎治虛勞小黃耆酒云下痢者加女萎詳此數方所用乃似中品女萎緣其性溫主霍亂泄痢故也又主賊風手足枯痹四肢拘攣茵芋酒中用女萎及古今錄驗治身體癧瘍斑剝女萎膏乃似朱字女萎緣其主中風不能動搖及去皯好色故也又治傷寒七八日不解續命鱉甲湯治腳弱鱉甲湯並用萎蕤及延年方主風熱項急痛四肢骨肉煩熱萎蕤飲又主虛風熱發即頭熱萎蕤丸乃似此黑字萎蕤緣其主虛熱濕毒腰痛故也三者主治既別則非一物明矣然陳藏器以為更非二物是不然矣此女萎性平味甘中品女萎味辛性溫性味既殊安得為一物又云萎蕤一名地節極似偏精疑即青黏華佗所服漆葉青黏散是此也然世無復能辨者非敢以為信然耳雷公云凡使勿用鉤吻並黃精其二物相似萎蕤只是不同有誤疾人萎蕤節上有毛莖斑葉尖處有小黃點採得先用竹刀刮上節皮了洗淨卻以蜜水浸一宿蒸了焙乾用外臺秘要主發熱口乾小便澀萎蕤五兩煮汁飲之楊氏產乳療久痢脫肛不止取女萎切一升燒熏之防葵味辛甘苦寒無毒主疝瘕腸泄膀胱熱結溺不下咳逆溫瘧癲癇驚邪狂走療五臟虛氣小腹支滿臚脹口乾除腎邪強志久服堅骨髓益氣輕身中火者不可服令人恍惚見鬼一名梨蓋一名防慈一名爵離一名農果一名利茹一名方蓋生臨淄川穀及嵩高泰山少室三月三日採根曝乾陶隱居云北信斷今用建平間者云本與狼毒同根猶如三建今其形亦相似但置水中不沉爾而狼毒陳久亦不能沉矣唐本注云此藥上品無毒久服主邪氣驚狂之患其根葉似葵花子根香味似防風故名防葵採依時者亦能沉水令乃用枯朽狼毒當之極為謬矣此物亦稀有襄陽望楚山東及興州西方有之其興州採得乃勝南者為鄰蜀土也臣禹錫等謹按藥性論云防葵君有小毒能治疝氣痃癖氣塊膀胱宿水血氣瘤大如碗悉能消散治鬼瘧主百邪鬼魅精怪通氣圖經曰防葵生臨淄川穀及嵩高少室泰山蘇恭云襄陽望楚山東及興州西方有之其興州採得乃勝南者為鄰蜀土也今唯出襄陽諸郡不聞有之其葉似葵每莖三葉一本十數莖中發一干其端開花如蔥花景天輩而色白根似防風香味亦如之依時採者乃沉水陶隱居云與狼毒同根但置水不沉耳今乃用枯朽狼毒當之極為謬矣三月三日採六月開花即結實採根為藥陳藏器云按此二物一是上品而陶云防葵與狼毒根同但置水中不沉爾然此二物善惡不同形質又別陶既為此說後人因而用之防葵將以破堅積為下品之物與狼毒同功今古因循遂無甄別此殊誤也雷公云凡使勿誤用狼毒緣真似防葵而驗之有異效又不同切須審之恐誤疾人其防葵在蔡州沙土中生採得二十日便蚛用之唯輕為妙欲使先須揀去蚛末後用甘草湯浸一宿漉出曝乾用黃精自然汁一二升拌了土器中炒令黃精汁盡肘後方治癲狂疾防葵末溫酒服一刀圭至二三服身潤有小不仁為候茈柴字胡為君味苦平微寒無毒主心腹去腸胃中結氣飲食積聚寒熱邪氣推陳致新除傷寒心下煩熱諸痰熱結實胸中邪逆五臟間遊氣大腸停積水脹及濕痹拘攣亦可作浴湯久服輕身明目益精一名地熏一名山菜一名茹草葉一名芸蒿辛香可食生洪農川穀及冤句二月八月採根曝乾得茯苓桔梗大黃石膏麻子仁甘草桂以水一斗煮取四升入硝石三方寸匕療傷寒寒熱頭痛心下煩滿半夏為之使惡皂莢畏女菀藜蘆陶隱居云今出近道狀如前胡而強博物志云芸蒿葉似邪蒿春秋有白蒻音弱長四五寸香美可食長安及河內並有之此茈胡療傷寒第一用唐本注云茈是古柴字上林賦云茈姜及爾雅云藐音邈茈草並作茈字且此草根紫色今太常用茈胡是也又以木代系相承呼為茈胡且檢諸本草無名此者傷寒大小茈胡湯最為痰氣之要若以芸蒿根為之更作茨音大謬矣臣禹錫等謹按藥性論云茈胡能治熱勞骨節煩疼熱氣肩背疼痛宣暢血氣勞乏羸瘦主下氣消食主時疾內外熱不解單煮服良蕭炳云主痰滿胸脅中痞日華子云味甘補五勞七傷除煩止驚益氣力消痰止嗽潤心肺添精補髓天行溫疾熱狂乏絕胸脅氣滿健忘圖經曰柴胡生洪農山谷及冤句今關陝江湖間近道皆有之以銀州者為勝二月生苗甚香莖青紫葉似竹葉稍緊亦有似斜蒿亦有似麥門冬而短者七月開黃花生丹州結青子與他處者不類根赤色似前胡而強蘆頭有赤毛如鼠尾獨窠長者好二月八月採根曝乾張仲景治傷寒有大小柴胡及柴胡加龍骨柴胡加芒硝等湯故後人治寒熱此為最要之藥陳藏器陶云芸蒿是茈胡主傷寒蘇云紫薑作紫此草紫色上林賦云茈姜今常用茈胡是也雷公曰凡使莖長軟皮赤黃髭鬚出在平州平縣即今銀州銀縣也西畔生處多有白鶴綠鶴於此翔處是茈胡香直上云間若有過往聞者皆氣爽凡採得後去髭並頭用銀刀削上赤薄皮少許卻以粗布拭了細銼用之勿令犯火立便無效也孫尚藥治黃疸柴胡一兩去苗甘草一分上都細銼作一劑以水一碗白茅根一握同煎至七分絞去滓任意時時服一日盡別說云謹按柴胡唯銀夏者最良根如鼠尾長一二尺香味甚佳今雖不見於圖經俗亦不識其真故市人多以同華者代之然亦勝於他處者蓋銀夏地多沙同華亦沙苑所出也衍義曰茈胡本經並無一字治勞今人治勞方中鮮有不用者嗚呼凡此誤世甚多嘗原病勞有一種真臟虛損復受邪熱邪因虛而致勞故曰勞者牢也當須斟酌用之如經驗方中治勞熱青蒿煎丸用茈胡正合宜耳服之無不效熱去即須急已若或無熱得此愈甚雖至死人亦不怨目擊甚多日華子又謂補五勞七傷藥性論亦謂治勞乏羸瘦若此等病苟無實熱醫者執而用之不死何待註釋本草一字亦不可忽蓋萬世之後所誤無窮耳苟有明哲之士自可處治中下之學不肯考究枉致淪沒可不謹哉可不戒哉如張仲景治寒熱往來如瘧狀用柴胡湯正合其宜麥門冬為君味甘平微寒無毒主心腹結氣傷中傷飽胃絡脈絕羸瘦短氣身重目黃心下支滿虛勞客熱口乾燥渴止嘔吐愈痿蹶強陰益精消穀調中保神定肺氣安五臟令人肥健美顏色有子久服輕身不老不飢秦名羊韭齊名愛韭楚名馬韭越名羊蓍一名禹葭一名禹餘糧葉如韭冬夏長生生函谷川谷及堤阪肥土石間久廢處二月三月八月十月採陰乾地黃車前為之使惡款冬苦瓠畏苦參青蘘陶隱居云函谷即秦關而麥門冬異於羊韭之名矣處處有以四月採冬月作實如青珠根似穬麥故謂麥門冬以肥大者為好用之湯澤抽去心不爾令人煩斷谷家為要二門冬潤時並重既燥即輕一斤減四五兩爾今按陳藏器本草云麥門冬本經不言生者按生者本功外去心煮飲止煩熱消渴身重目黃寒熱體勞止嘔開胃下痰飲乾者入丸散及湯用之功如本經方家自有分別出江寧小潤出新安大白其大者苗如鹿蔥小者如韭葉大小有三四種功用相似其子圓碧久服輕身明目和車前子乾地黃為丸食後服之去溫瘴亦白明目夜中見光臣禹錫等謹按吳氏云一名馬韭一名虋音門火冬一名忍冬一名忍陵一名不死藥一名僕壘一名隨脂神農岐伯甘平黃帝桐君雷公甘無毒季氏甘小溫扁鵲無毒生山谷肥地葉如韭肥澤叢生採無時實青黃藥性論云麥門冬使惡苦芺畏木耳能治熱毒止煩渴主大水面目肢即浮腫下水治肺痿吐膿主泄精療心腹結氣身黑目黃心下苦支滿虛勞客熱日華子云治五勞七傷安魂定魄止渴肥人時疾熱狂頭痛止嗽圖經曰麥門冬生函谷川谷及堤阪肥土石間久廢處今所在有之葉青似莎草長及尺余四季不凋根黃白色有鬚根作連珠形似穬麥顆故名麥門冬四月開淡紅花如紅蓼花實碧而而圓如珠江南出者葉大者苗如鹿蔥小者如韭大小有三四種功用相似或云吳地者尤勝二月三月八月十月採陰乾亦堪單作煎餌之取新根去心搗熟絞取汁和白蜜銀器中重湯煮攪不停手候如飴乃成酒化溫服之治中益心悅顏色安神益氣令人肥健其力甚快又主金石藥發麥門冬去心六兩人參四兩甘草二兩炙三物下篩蜜丸如梧子日再飲下又崔元亮海上方治消渴丸云偶於野人處得神驗不可言用上元板蕎麥門冬鮮肥者二大兩宣州黃連九節者二大兩去兩頭尖三五節小刀子條理去皮毛了淨吹去塵更以生布摩拭秤之搗末以肥大苦瓠汁浸麥門冬經宿然後去心即於臼中搗爛即納黃連末臼中和搗候丸得即並手丸大如梧子食後飲下五十丸日再但服兩日其渴必定苦重者即初服藥每一服一百五十丸第二日服一百二十九第三日一百丸第四日八十丸第五日依本服丸若欲合藥先看天氣晴明其夜方浸藥切須淨處禁婦人雞犬見知如似可每日只服二十五丸服訖覺虛即取白羊頭一枚淨去毛洗了以水三大斗煮令爛去頭取汁可一斗以來細細服之亦不著鹽不過三劑平復衍義曰麥門冬根上子也治心肺虛熱並虛勞客熱亦可取苗作熟水飲獨活味苦甘平微溫無毒主風寒所擊金瘡止痛賁豚癇痓音熾女子疝瘕療諸賊風百節痛風無久新者久服輕身耐老一名羌活一名羌青一名護羌使者一名胡王使者一名獨搖草此草得風不搖無風自動生雍州川穀或隴西南安二月八月採根曝乾豚實為之使陶隱居云藥名無豚實恐是蠡實此州郡縣並是羌活羌活形細而多節軟潤氣息極猛烈出益州北部西川為獨活色微白形虛大為用亦相似而小不如其一莖直上不為風搖故名獨活至易蛀宜密器藏之唐本注云療風宜用獨活兼水宜用羌活臣禹錫等謹按藥性論云獨活君味苦辛能治中諸風濕冷奔喘逆氣皮肌苦癢手足攣痛勞損主風毒齒痛又云羌活君味苦辛無毒能治賊風失音不語多癢血癩手足不遂口面喎邪遍身𤸷痹日華子云羌活治一切風並氣筋骨拳攣四肢羸劣頭旋明目赤疼及伏梁水氣五勞七傷虛損冷氣骨節痠疼通利五臟獨活即是羌活母類也圖經曰獨活羌活出雍州川穀或隴西南安今蜀漢出者佳春生苗葉如青麻六月開花作叢或黃或紫結實時葉黃者是夾石上生葉青者是土脈中生此草得風不搖無風自動故一名獨搖草二月八月採根曝乾用本經云二物同一類今人以紫色而節密者為羌活黃色而作塊者為獨活一說按陶隱居云獨活生西川益州北部色微白形虛大用與羌活相似今蜀中乃有大獨活類桔梗而大氣味了不與羌活相類用之微寒而少效今又有獨活亦自蜀中來形類羌活微黃而極大收時寸解干之氣味亦芳烈小類羌活又有槐葉氣者今京下多用之極效驗意此為真者而市人或擇羌活之大者為獨活殊未為當大抵此物有兩種西川者黃色香如蜜隴西者紫色秦隴人呼為山前獨活古方但用獨活今方既用獨活而又用羌活茲為謬矣篋中方療中風才覺不問輕重便須吐涎然後次第治之吐法用羌活五大兩以水一大斗煎取五升去滓更入好酒半升和之以牛蒡子半升炒下篩令極細以前湯酒斟酌調服取吐如已昏眩即灌之更不可用下藥及繆針灸但用補治湯餌自瘥雷公云採得後細銼拌淫羊藿裛二日後曝乾去淫羊藿用免煩人心千金方治中風通身冷口噤不知人獨活四兩好酒一升煎取半升分溫再服肘後方治風齒疼頰腫獨活酒煮熱含之經驗後方治中風不語獨活一兩銼酒二升煎一升大豆五合炒有聲將藥酒熱投蓋良久溫服三合未瘥再服必效方治產後腹中絞刺疼痛羌活二兩酒二升煎取一升去滓為二服子母秘錄治中風腹痛或子腸脫出酒煎羌活取汁服小品方治產後風虛獨活湯主之又白蘚皮湯主之亦可與獨活合白蘚皮各三兩水三升煮取一升半分三服耐酒者可以酒水中煮之佳用白蘚亦同法又方治產後中風語澀四肢拘急羌活三兩為末每服五錢水酒各半盞煎去滓溫服經驗方同文潞公治牙齒風上攻腫痛獨活地黃各三兩末每服三錢水一盞前和滓溫服臥時再用升麻味甘苦平微寒無毒主解百毒殺百精老物殃鬼闢溫疫瘴氣邪氣蠱毒入口皆吐出中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡久服不夭輕身長年一名周麻生益州山谷二月八月採根曝乾陶隱居云舊出寧州者第一形細而黑極堅實頃無復有今唯出益州好者細削皮青綠色謂之雞骨升麻北部間亦有形又虛大黃色建平間亦有形大味薄不堪用人言是落新婦根不必爾其形自相似氣色非也落新婦亦解毒取葉挪作小兒浴湯主驚忤今按別本注云今嵩高出者色青功用不如蜀者臣禹錫等謹按藥性論云蜀升麻主治小兒風驚癇時氣熱疾能治口齒風腫疼牙根浮爛惡臭熱毒膿血除心肺風毒熱壅閉不通口瘡煩悶療癰腫豌豆瘡水煎綿沾拭瘡上主百邪鬼魅陳藏器云陶云人言升麻是落新婦根非也相似耳解毒取葉作小兒浴湯主驚按今人多呼小升麻為落新婦功用同於升麻亦大小有殊日華子云安魂定魄並鬼附啼泣遊風腫毒口氣疳䘌又名落新婦圖經曰升麻生益州川穀今蜀漢陝西淮南州郡皆有之以蜀川者為勝春生苗高三尺以來葉似麻葉並青色四月五月著花似粟穗白色六月以後結實黑色根紫如蒿根多須二月八月採日曝乾今醫家以治咽喉腫痛口舌生瘡解傷寒頭痛凡腫毒之屬殊效細銼一兩水一升煎煉取濃汁服之入口即吐出毒氣蜀人多用之楊炎南行方療熛疽湯用升麻又有升麻膏升麻㧺湯並療諸丹毒等石泉公王方慶嶺南方服乳石補壅法云南方養生治病無過丹砂其方用升麻末三兩研煉了光明砂一兩二物相合蜜丸如梧子每日食後服三丸又有七物升麻丸升麻犀角黃芩朴硝梔子大黃各二兩豉二升微熬同搗散蜜丸覺四肢大熱大便難即服三十丸取微利為知若四肢小熱於食上服二十丸非但闢瘴兼甚明目雷公曰採得了刀刮上粗皮一重了用黃精自然汁浸一宿出曝乾細銼蒸了曝乾用之聖惠方治小兒斑瘡及豆瘡心躁眠臥不安用川升麻一味不計多少細銼水一盞煎去滓取汁以綿沾汁洗拭瘡盤上外臺秘要比歲有病天行發斑瘡頭面及身須臾周匝狀如火燒瘡皆戴白漿隨決隨生不治數日必死治瘥後盤黯彌歲方減此惡毒之氣所為以水煮升麻綿沾洗之苦酒煮彌佳但躁痛難忍也千金翼治產後惡血不盡或經月半歲升麻三兩清酒五升煮取二升半分溫再服當吐下惡物極良肘後方喉痹升麻銼含之喉塞亦然梅師方治時行病發瘡升麻五兩以水蜜二味同煎三沸半服半敷瘡姚和眾小兒尿血蜀升麻五分水五合煎取一合去滓一歲兒一日服盡車前子味甘咸寒無毒主氣癃止痛利水道小便除濕痹男子傷中女子淋瀝不欲食養肺強陰益精令人有子明目療赤痛久服輕身耐老葉及根味甘寒主金瘡止血衄鼻瘀血血瘕下血小便赤止煩下氣除小蟲一名當道一名芣苢上音浮下音以一名蝦蟆衣一名牛遺一名勝舄生真定平澤丘陵阪道中五月五日採陰乾陶隱居云人家及路甚多其葉搗取汁服療泄精甚驗子性冷利仙經亦服餌之令人身輕能跳越岸谷不老而長生也韓詩乃言芣苢是木似李食其實宜子孫此為謬矣唐本注云今出開州者為最臣禹錫等謹按爾雅云芣苢馬舄馬舄車前注今車前草大葉長穗好生道邊江東呼為蝦蟆衣疏引陸機疏云馬舄一名車前一名當道喜在牛跡中生故曰車前當道也幽州人謂之牛舌草可鬻作茹大滑其子治婦人難產藥性論云車前子君味甘平能去風毒用中風熱毒風沖眼目赤痛瘴翳腦痛淚出壓丹石毒去心胸煩熱葉主泄精病治尿血能補五臟明目利小便通五淋蕭炳云車前養肝日華子云常山為使通小便淋澀壯陽治脫精心煩下氣圖經曰車前子生真定平澤丘陵道路中今江湖淮甸近京北地處處有之春初生苗葉布地如匙面累年者長及尺余如鼠尾花甚細青色微赤結實如葶藶赤黑色五月五日採陰乾今人五月採苗七月八月採實人家園圃中或種之蜀中尤尚北人取根日乾作紫菀賣之甚誤所用謹按周南詩云采采芣苢爾雅云芣苢馬舄馬舄車前郭璞云今車前草大葉當道長穗好生道邊江東人呼為蝦蟆衣陸機云馬舄一名車前一名當道喜在牛跡中生故曰車前當道也幽州人謂之牛舌草可鬻與煮同作茹大滑其子治婦人難產是也然今人不復有啖者其子入藥最多駐景丸用車前菟絲二物蜜丸食下服古今為奇方其葉今醫家生研水解飲之治衄血甚善雷公曰凡使須一窠有九葉內有蕊莖可長一尺二寸者和蕊葉根去土了稱有一鎰者力全堪用使葉勿使蕊莖使葉銼於新瓦上攤乾用之聖惠方治熱痢不止者搗車前葉絞取汁一盞入蜜一合煎溫分二服又方治久患內障眼車前子乾地黃麥門冬等分為末蜜丸如梧桐子大服屢試有效外臺秘要治陰癢痛車前子以水三升煮三沸去滓洗癢痛處又方治尿血車前草搗絞取汁五合空心服之百一方小便不通車前子草一斤水三升煎取一升半分三服又方治石淋車前子二升以絹囊盛水八升煮取三升不食盡服之須臾石下梅師方治妊娠患淋小便澀水道熱不通車前子五兩葵根切一升二件以水五升煎取一升半分三服子母秘錄治橫生不可出車前子末酒服二錢匕治瀉歐陽文忠公嘗得暴下國醫不能愈夫人云市人有此藥三文一貼甚效公曰吾輩臟腑與市人不同不可服夫人買之以國醫藥雜進之一服而瘥後公知之召賣藥者厚遺之問其方久之乃肯傳但用車前子一味為末米飲下二錢匕云此藥利水道而不動氣水道利則清濁分谷臟自止矣衍義曰車前陶隱居云其葉搗取汁服療泄精大誤矣此藥甘滑利小便走泄精氣經云主小便赤下氣有人作菜食小便不禁幾為所誤木香味辛溫無毒主邪氣闢毒疫溫鬼強志主淋露療氣劣肌中偏寒主氣不足消毒殺鬼精物溫瘧蠱毒行藥之精久服不夢寤魘寐輕身致神仙一名蜜香生永昌山谷陶隱居云此即青木香也永昌不復貢今皆從外國舶音白上來乃云大秦國以療毒腫消惡氣有驗今皆用合香不入藥用唯制蛀蟲丸用之常能煮以沐浴大佳爾唐本注云此有二種當以崑崙來者為佳出西胡來者不善葉似羊蹄而長大花如菊花其實黃黑所在亦有之今按別本注云葉似薯蕷而根大花紫色功效極多為藥之要用陶云不入藥用非也臣禹錫等謹按蜀本云今苑中種之花黃苗高三四尺葉長八九寸皺軟而有毛藥性論云木香君治女人血氣刺心心痛不可忍末酒服之治九種心痛積年冷氣痃癖症塊脹痛逐諸壅氣上衝煩悶治霍亂吐瀉心腹㽲刺隋書云樊子蓋為武威太守車駕西巡將入吐谷渾子蓋以彼多瘴氣獻青木香以御霧露南州異物志云青木香出天竺是草根狀如甘草蕭炳云青木香功用與此同又云崑崙船上來形如枯骨者良日華子云治心腹一切氣止瀉霍亂痢疾安胎健脾消食療羸劣膀胱冷痛嘔逆反胃圖經曰木香生永昌山谷今唯廣州舶上有來者他無所出陶隱居云即青木香也根窠大類茄子葉似羊蹄而長大花如菊實黃黑亦有葉如山芋而開紫花者不拘時月採根芽為藥以其形如枯骨者良江淮間亦有此種名土青木香不堪入藥用偽蜀王昶苑中亦嘗種之云苗高三四尺葉長八九寸皺軟而有毛開黃花恐亦是土木香種也續傳信方著張仲景青木香丸主陽衰諸不足用崑崙青木香六路訶子皮二十兩篩末沙糖和之駙馬都尉鄭某忘其名去沙糖加羚羊角十二兩白蜜丸如梧子空腹酒下三十丸日再其效甚速然用藥不類古方而云仲景者不知何從而得之邪按修養書云正月一日取五木煮湯以浴令人至老鬚髮黑徐鍇注云道家謂青木香為五香亦云五木道家多以此浴當是其義也又古方主癰疽五香湯中亦使青木香青木香名為五香信然矣海藥謹按山海經云生東海崑崙山雷公云凡使其香是蘆蔓根條左盤旋採得二十九日方硬如朽骨硬碎其有蘆頭丁蓋子色青者是木香神也外臺秘要治狐臭若股內陰下恆濕臭或作瘡青木香好醋浸致腋下夾之即愈傷寒類要天行熱病若發赤黑斑如㽿青木香二兩水二升煮取一升頓服之效孫尚藥治丈夫婦人小兒痢木香一塊方圓一寸黃連半兩上件二味用水半升同煎乾去黃連只薄切木香焙乾為末三服第一橘皮湯第二陳米飲第三甘草湯調下此方李景純傳有一婦人久患痢將死夢中觀音授此方服之遂愈別說云謹按木香今皆從外國來即青木香也陶說為得本在草部而圖經所載廣州一種乃是木類又載滁州海州者乃馬兜鈴根此山鄉俗名爾治療冷熱殊不相似此三種自當入一外類別名爾衍義曰木香專泄決胸腹間滯塞冷氣他則次之得橘皮肉豆蔻生薑相佐使絕佳效尤速又一種嘗自岷州出塞得生青木香持歸西洛葉如牛蒡但狹長莖高三四尺花黃一如金錢其根則青木香也生嚼之極辛香尤行氣薯蕷味甘溫平無毒主傷中補虛羸除寒熱邪氣補中益氣力長肌肉主頭面遊風風頭眼眩下氣止腰痛補虛勞羸瘦充五臟除煩熱強陰久服耳目聰明輕身不飢延年一名山芋秦楚名玉延鄭越名土薯音除生嵩高山谷二月八月採根曝乾紫芝為之使惡甘遂陶隱居云今近道處處有東山南江皆多掘取食之以充糧南康間最大而美服食亦用之唐本注云薯蕷日乾搗細篩為粉食之大美且愈疾而補此有兩種一者白而且佳一者青黑味亦不美蜀道者尤良臣禹錫等謹按吳氏云薯蕷一名諸署齊越名山羊一名修脆一名兒草神農甘小溫桐君雷公甘無毒或生臨朐鐘山始生赤莖細蔓五月華白七月實青黃八月熟落根中白皮黃類芋藥性論云薯蕷臣能補五勞七傷去冷風止腰疼鎮心神安魂魄開達心孔多記事補心氣不足患人體虛羸加而用之異苑云薯蕷野人謂之土薯若欲掘取嘿然則獲唱名便不可得人有植之者隨所種之物而像之也日華子云助五臟強筋骨長志安神主泄精健忘乾者功用同前圖經曰薯蕷生嵩高山山谷今處處有之以北都四明者為佳春生苗蔓延籬援莖紫葉青有三尖角似牽牛更厚而光澤夏開細白花大類棗花秋生實於葉間狀如鈴二月八月採根今人冬春採刮之白色者為上青黑者不堪曝乾用之法取粗根刮去黃皮以水浸末白礬少許摻水中經宿取淨洗去涎焙乾近都人種之極有息春取宿根頭以黃沙和牛糞作畦種苗生以竹梢作援援高不得過一二尺夏月頻溉之當年可食極肥美南中有一種生山中根細如指極緊實刮磨入湯煮之作塊不散味更珍美云食之尤益人過於家園種者又江湖閩中出一種根如薑芋之類而皮紫極有大者一枚可重斤余刮去皮煎煮食之俱美但性冷於北地者耳彼土人為單呼為薯音若殊亦曰山薯而山海經云景山北望少澤其草多薯藇音與薯蕷同郭璞注云根似芋可食今江南人單呼薯音儲語或用輕重耳據此注則薯蕷與薯乃一種南北之產或有不同故其形類差別然字音殊儲不同蓋相傳之訛也一名山芋食療治頭疼利丈夫助陰力和麵作餺飥則微動氣為不能制面毒也熟者和蜜或為湯煎或為粉並佳干之入藥更妙也雷公云凡使勿用平田生二三紀內者要經十紀者山中生皮赤四面有髭生者妙若採得用銅刀削去上赤皮洗去涎蒸用聖惠方補虛損益顏色用薯蕷於砂盆中細研然後下於銚中先以酥一大匙熬令香次旋添酒一盞煎攪令勻空心飲之食醫心鏡主下焦虛冷小便數瘦損無力生薯蕷半斤刮去皮以刀切碎研令細爛於鐺中著酒酒沸下薯蕷不得攪待熟著少鹽蔥白理添酒空腹飲三二杯妙衍義曰山藥按本草上一字犯英廟諱下一字曰蕷唐代宗名預故改下一字為藥今人遂呼為山藥如此則盡失當曰本名慮歲久以山藥為別物故書之此物貴生干方入藥其法冬月以布裹手用竹刀子剮去皮於檐下風逕處盛竹篩中不得見日色一夕干五分俟全乾收之唯風緊則干速所以用干之意蓋生濕則滑不可入藥熟則只堪啖亦滯氣余如經薏音薏苡音以仁味甘微寒無毒主筋急拘攣不可屈伸風濕痹下氣除筋骨邪氣不仁利腸胃消水種令人能食久服輕身益氣其根下三蟲一名解蠡一名屋菼音毯一名起實一名𧆐音感生真定平澤及田野八月採實採根無時陶隱居云真定縣屬常山郡近道處處有多生人家交阯者子最大彼土呼為稈音干珠馬援大取將還人讒以為真珠也實重累者為良用之取中仁今小兒病蛔蟲取根煮汁糜食之甚香而去蛔蟲大效今按陳藏器本草云薏苡收子蒸令氣餾曝乾磨取仁炊作飯及作面主不飢溫氣輕身煮汁飲之主消渴又按別本注云今多用梁漢者氣力劣於真定取青水色者良臣禹錫等謹按藥性論云能治熱風筋脈攣急能令人食主肺痿肺氣吐膿血咳嗽涕唾上氣昔馬援煎服之破五溪毒腫種於彼取仁甑中蒸使氣餾曝於日中使干挪之得仁矣孟詵云性平去幹濕腳氣大驗圖經曰薏苡仁生真定平澤及田野今所在有之春生苗莖高三四尺葉如黍開紅白花作穗子五月六月結實青白色形如珠子而稍長故呼意珠子小兒多以線穿如貫珠為戲八月採實採根無時今人通以九月十月採用其實中仁古方大抵心肺藥多用之韋丹治肺癰心胸甲錯者淳苦酒煮薏苡仁令濃微溫頓服之肺有血當吐愈廣濟方治冷氣薏苡仁飯粥法細舂其仁飲為飯氣味欲習如麥飯乃佳或煮粥亦好自任無忌根之入藥者葛洪治卒心腹煩滿又胸脅痛者銼根濃煮汁服三升乃定今人多取葉為飲香益中空膈甚勝其雜他藥用者張仲景治風濕身煩疼日晡劇者與麻黃杏仁薏苡仁湯麻黃三兩杏仁三十枚甘草薏苡仁各一兩四物以水四升煮取二升分溫再服又治胸痹偏緩急者薏苡仁附子散方薏苡仁十五兩大附子十枚炮二物杵末每服方寸匕日三陳藏器余主消渴煞蛔蟲根煮服墮胎雷公云凡使勿用𥽇米顆大無味其𥽇米時人呼為粳𥽇是也若薏苡仁顆小色青味甘咬著黏人齒夫用一兩以糯米二兩同熬令糯米熟去糯米取使若更以鹽湯煮過別是一般修制亦得外臺秘要治牙齒風痛薏苡根四兩水四升煮取二升含冷易之齦便生又方咽喉卒癰腫吞薏苡仁二枚又方蛔蟲攻心腹痛薏苡根二斤切水七升煮取三升先食盡服之蟲死盡出梅師方肺疾唾膿血取薏仁十兩杵碎以水三升煎取一升入酒少許服之食醫心鏡治筋脈拘攣久風濕痹下氣除骨中邪氣利腸胃消水腫久服輕身益氣力薏苡仁一升搗為散每服以水二升煮兩匙末作粥空腹食之後漢馬援傳馬援在交阯常餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實援欲以為種軍還載之一車衍義曰薏苡此李商隱太倉銘中所謂薏苡似珠不可不虞者也取仁用本經云微寒主筋急拘攣拘攣有兩等素問注中大筋受熱則縮而短縮短故攣急不伸此是因熱而拘攣也故可用薏苡仁若素問言因寒即筋急者不可更用此也凡用之須倍於他藥此物力勢和緩須倍加用即見效蓋受寒即能使人筋急受熱故使人筋攣若但熱而不曾受寒亦能使人筋緩受濕則又引長無力澤瀉味甘咸寒無毒主風寒濕痹乳難消水養五臟益氣力肥健補虛損五勞除五臟痞滿起陰氣止泄精消渴淋瀝逐膀胱三焦停水久服耳目聰明不飢延年輕身面生光能行水上扁鵲云多服病人眼一名水瀉一名及瀉一名芒芋一名鵠瀉生汝南池澤五月六月八月採根陰乾畏海蛤文蛤葉味鹹無毒主大風乳汁不出產難強陰氣久服輕身五月採實味甘無毒主風痹消渴益腎氣強陰補不足除邪濕久服面生光令人無子九月採陶隱居云汝南郡屬豫州今近道亦有不堪用唯用漢中南鄭青弋形大而長尾間必有兩歧為好此物易朽蠹常須密藏之葉狹長叢生諸淺水中仙經服食斷谷皆用之亦云身輕能步行水上唐本注云今汝南不復採用唯以涇州華州者為善也臣禹錫等謹按爾雅云蕍蕮疏云蕍一名蕮即藥草澤瀉也藥性論云澤瀉君味苦能主腎虛精自出治五淋利膀胱熱宣通水道日華子云治五勞七傷主頭旋耳虛鳴筋骨攣縮通小腸止遺瀝尿血催生難產補女人血海令人有子葉壯水臟下乳通血脈圖經曰澤瀉生汝南池澤今山東河陝江淮亦有之以漢中者為佳春生苗多在淺水中葉似牛舌草獨莖而長秋時開白花作叢似穀精草五月六月八月採根陰乾今人秋末採曝乾用此物極易朽蠹常須密藏之漢中出者形大而長尾間有兩歧最佳爾雅謂之蕍羊朱切一名蕮與舄同私夕切素問身熱解墮汗出如浴惡風少氣名曰酒風治之以澤瀉術各十分麋銜五分合以二指撮為後飯後飯者飯後藥先謂之後飯張仲景治雜病心下有支飲苦冒澤瀉湯主之澤瀉五兩術二兩水二升煎取半升分溫再服治傷寒有大小澤瀉湯五苓散輩皆用澤瀉行利停水為最要深師治支飲亦同用澤瀉術但煮法小別先以水二升煮二物取一升又以水一升煮澤瀉取五合合此二汁為再服病甚欲眩者服之必瘥仙方亦單服澤瀉一物搗篩取末水調日分服六兩百日體輕久而健行雷公曰不計多少細銼酒浸一宿漉出曝乾任用也經驗方常服澤瀉皂莢水煮爛焙乾為末煉蜜為丸如桐子大空盡以溫酒下十五丸至二十丸甚妙治腎臟風生瘡尤良衍義曰澤瀉其功尤長於行水張仲景曰水搐渴煩小便不利或吐或瀉五苓散主之方用澤瀉故知其用長於行水本經又引扁鵲云多服病人眼誠為行去其水張仲景八味丸用之者亦不過引接桂附等歸就腎經別無他意凡服澤瀉散人未有不小便多者小便既多腎氣焉得復實今人止泄精多不敢用遠志為君味苦溫無毒主咳逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力利丈夫定心氣止驚悸益精去心下膈氣皮膚中熱面目黃久服輕身不老好顏色延年葉名小草主益精補陰氣止虛損夢泄一名棘菀一名葽繞一名細草生泰山及冤句川穀四月採根葉陰乾得伏苓冬葵子龍骨良殺天雄附子毒畏真珠藜蘆蜚蠊齊蛤陶隱居云按藥名無齊蛤恐是百合冤句縣屬兗州濟陰郡今猶從彭城北蘭陵來用之打去心取皮今用一斤正得三兩皮爾市者加量之小草狀似麻黃而青遠志亦入仙方藥用唐本注云藥錄下卷有齊蛤即齊蛤元有不得言無今陶云恐是百合非也今注遠志莖葉似大青而小比之麻黃陶不識爾臣禹錫等謹按爾雅云葽繞棘菀注今遠志也似麻黃赤華葉銳而黃其上謂之小草藥性論云遠志畏蠐螬治心神健忘安魂魄令人不迷堅壯陽道主夢邪日華子云主膈氣驚魘長肌肉助筋骨婦人血噤失音小兒客忤服無忌圖經曰遠志生泰山及冤句川穀今河陝京西州郡亦有之根黃色形如蒿根苗名小草似麻黃而青又如蓽豆葉亦有似大青而小者三月開花白色根長及一尺四月採根葉陰乾今云曬乾用泗州出者花紅根葉俱大於它處商州者根又黑色俗傳夷門遠志最佳古方通用遠志小草今醫但用遠志稀用小草古今錄驗及範汪方治胸痹心痛逆氣膈中飲不下小草丸小草桂心蜀椒去汗乾薑細辛各三分附子二分炮六物合搗下篩和以蜜丸大如梧子先食米汁下三丸日三不知稍增以知為度禁豬肉冷水生蔥菜雷公曰遠志凡使先須去心若不去心服之令人悶去心了用熟甘草湯浸宿漉出曝乾用之也肘後方治人心孔愍塞多忘喜誤丁酉日密自至市買遠志著巾角中還為末服之勿令人知抱朴子內篇云陵陽仲子服遠志二十年有子三十七人開書所視便記而不忘龍膽味苦寒大寒無毒主骨間寒熱驚癇邪氣續絕傷定五臟殺蠱毒除胃中伏熱時氣溫熱熱泄下痢去腸中小蟲益肝膽氣止驚惕久服益智不忘輕身耐老一名陵遊生齊朐山谷及冤句二月八月十一月十二月採根陰乾貫眾為之使惡防葵地黃陶隱居云今出近道吳興為勝狀似牛膝味甚苦故以膽為名今按別本注云葉似龍葵味苦如膽因以為名臣禹錫等謹按藥性論云龍膽君能生小兒驚癇入心壯熱骨熱癰腫治時疾熱黃口瘡日華子云小豆為使治客忤疳氣熱病狂語及瘡疥明目止煩益智治健忘圖經曰龍膽生齊朐山谷及冤句今近道亦有之宿根黃白色下抽根十餘本類牛膝直上生苗高尺余四月生葉似柳葉而細莖如小竹枝七月開花如牽牛花作鈴鐸形青碧色冬後結子苗便枯二月八月十一月十二月採根陰乾俗呼為草龍膽浙中又有山龍膽草味苦澀取根細銼用生薑自然汁浸一宿去其性焙乾搗水煎一錢匕溫服之治四肢疼痛採無時候葉經霜雪不凋此同類而別種也古方治疸多用之集驗方谷疸丸苦參三兩龍膽一兩二物下篩牛膽和丸先食以麥飲服之如梧子五丸日三不知稍增刪繁方治勞疸同用此龍膽加至二兩更增梔子仁三七枚三物同篩搗丸以豬膽服如前法以飲下之其說云勞疸者因勞為名谷疸者因食而勞也雷公云採得後陰乾欲使時用銅刀切去髭土頭了銼於甘草湯中浸一宿至明漉出曝乾用勿空腹餌之令人溺不禁聖惠方治蛔蟲攻心如刺吐清水龍膽一兩去頭銼水二盞煮取一盞去滓隔宿不食平旦一頓服外臺秘要治卒下血不止龍膽一虎口以水五升煮取二升半分為五服瘥肘後方治卒心痛龍膽四兩酒三升煮取一升半頓服細辛味辛溫無毒主咳逆頭痛腦動百節拘攣風濕痹痛死肌溫中下氣破痰利水道開胸中除喉痹齆音甕鼻風癇癲疾下乳結汗不出血不行安五臟益肝膽通精氣久服明目利九竅輕身長年一名小辛生華陰山谷二月八月採根陰乾曾青棗根為之使得當歸芍藥白芷芎藭牡丹藁本甘草共療婦人得決明鯉魚膽青羊肝共療目痛惡狼毒山茱萸黃耆畏硝石滑石反藜蘆陶隱居云今用東陽臨海者形段乃好而辛烈不及華陰高麗者用之去其頭節人患口臭者含之多效最能除痰明目也臣禹錫等謹按範子云細辛出華陰色白者善吳氏云細辛一名細草神農黃帝雷公桐君辛小溫歧伯無毒季氏小寒如葵葉赤黑一根一葉相連藥性論云細辛臣忌生菜味苦辛治咳逆上氣惡風風頭手足拘急安五臟六腑添膽氣去皮風濕癢能止眼風淚下明目開胸中滯除齒痛主血閉婦人血瀝腰痛日華子云治嗽消死肌瘡肉胸中結聚忌貍肉圖經曰細辛生華山山谷今處處有之然它處所出者不及華州者真其根細而其味極辛故名之曰細辛二月八月採根陰乾用今人多以杜衡當之杜衡吐人用時須細辨耳杜衡春初於宿根上生苗葉似馬蹄形狀高三二寸莖如麥藁粗細每窠上有五七葉或八九葉別無枝蔓又於葉莖間罅內蘆頭上貼地生紫花其花似見不見暗結實如豆大窠內有碎子似天仙子苗葉俱青經霜即枯其根成窠有似飯帚密鬧細長四五寸微黃白色味辛江淮俗呼為馬蹄香以人多誤用故此詳述之雷公云凡使一一揀去雙葉服之害人須去頭土了用瓜水浸一宿至明漉出曝乾用之聖惠方治口臭及䘌齒腫痛細辛煮取濃汁熟含冷吐瘥外臺秘要治卒客忤停屍不能言細辛桂心等分納口中別說云謹按細辛非華陰者不得為細辛用若杜衡之類自應依本性於用爾又細辛若單用末不可過半錢匕多即氣悶塞不通者死雖死無傷近年關中或用此毒人者聞平涼獄中嘗治此故不可不記非本有毒但以不識多寡之用因以有此衍義曰細辛用根今唯華州者佳柔韌極細直深紫色味極辛嚼之習習如椒治頭面風痛不可缺也葉如葵葉赤黑非此則杜衡也杜衡葉形如馬蹄下故俗云馬蹄香蓋根似白前又似細辛襄漢間一種細辛極細而直色黃白乃是鬼督郵不可用石斛味甘平無毒主傷中除痹下氣補五臟虛勞羸瘦強陰益精補內絕不足平胃氣長肌肉逐皮膚邪熱痱音沸氣腳膝疼冷痹弱久服厚腸胃輕身延年定志除驚一名林蘭一名禁生一名杜蘭一名石蓫音逐生六安山谷水旁石上七月八月採莖陰乾陸英為之使惡凝水石巴豆畏殭蠶雷丸陶隱居云今用石斛出始興生石上細實桑灰湯沃之色如金形似蚱音窄蜢音猛髀者為佳近道亦有次宣城間生櫟樹上者名木斛其莖形長大而色淺六安屬廬江今始安亦出木斛至虛長不入丸散唯可為酒漬煮湯用爾俗方最以補虛療腳膝唐本注云作干石斛先以酒洗捋蒸炙成不用灰湯今荊襄及漢中江左又有二種一者似大麥累累相連頭生一葉而性冷一種大如雀髀名雀髀斛生酒漬服乃言勝乾者亦如麥斛葉在莖端其餘斛如竹節間生葉也臣禹錫等謹按藥性論云石斛君益氣除熱主治男子腰肢軟弱健陽逐皮肌風痹骨中久冷虛損補腎積精腰痛養腎氣益力日華子云治虛損劣弱壯筋骨暖水臟輕身益智平胃氣逐虛邪圖經曰石斛生六安山谷水旁石上今荊湖川廣州郡及溫台州亦有之以廣南者為佳多在山谷中五月生苗莖似竹節節節間出碎葉七月開花十月結實其根細長黃色七月八月採莖以桑灰湯沃之色如金陰乾用或云以酒洗捋蒸炙成不用灰湯其江南生者有二種一種似大麥累累相連頭生一葉名麥斛一種大如雀髀名雀髀斛唯生石上者勝亦有生櫟木上者名木斛不堪用雷公云凡使先去頭土了用酒浸一宿漉出於日中曝乾卻用酥蒸從巳至酉卻徐徐焙乾用石斛鎖涎澀丈夫元氣如斯修事服滿一鎰永無骨痛衍義曰石斛細若小草長三四寸柔韌折之如肉而實今人多以木斛渾行醫工亦不能明辨世又謂之金釵石斛蓋後人取象而言之然甚不經將木斛折之中虛如禾草長尺余但色深黃光澤而已真石斛治胃中虛熱有功巴戟天味辛甘微溫無毒主大風邪氣陰痿不起強筋骨安五臟補中增志益氣療頭面遊風小腹及陰中相引痛下氣補五勞益精利男子生巴郡及下邳山谷二月八月採根陰乾覆盆子為之使惡朝生雷丸丹參陶隱居云今亦用建平宜都者狀如牡丹而細外赤內黑用之打去心唐本注云巴戟天苗俗方名三蔓草葉以茗經冬不枯根如連珠多者良宿根青色嫩根白紫用之亦同連珠肉厚者為勝臣禹錫等謹按藥性論云巴戟天使能治男子夜夢鬼交泄精強陰除頭面中風主下氣大風血癩病人虛損加而用之日華子云味苦安五臟定心氣除一切風治邪氣療水腫又名不凋草色紫如小念珠有小孔子堅硬難搗圖經曰巴戟天生巴郡及下邳山谷今江淮河東州郡亦有之皆不及蜀州者佳葉似茗經冬不枯俗名三蔓草又名不凋草多生竹林內內地生者葉似麥門冬而厚大至秋結實二月八月採根陰乾今多焙之有宿根者青色嫩根者白色用之皆同以連珠肉厚者勝今方家多以紫色為良蜀人云都無紫色者彼方人採得或用黑豆同煮欲其色紫此殊失氣味尤宜辨之一說蜀中又有一種山律根正似巴戟但色白土人採得以醋水煮之乃紫以雜巴戟莫能辨也真巴戟嫩者亦白干時亦煮治使紫力劣弱不可用今兩種市中皆是但擊破視之其中而紫鮮潔者偽也真者擊破其中雖紫又有微白慘如粉色理小暗也雷公曰凡使須用枸杞子湯浸一宿待稍軟漉出卻用酒浸一伏時又漉出用菊花同熬令焦黃去菊花用布拭令乾用衍義曰巴戟天本有心干縮時偶自落或可以抽摘故中心或空非自有小孔子也今人慾要中間紫色則多偽以大豆汁沃之不可不察外堅難染故先從中間紫色有人嗜酒日須五七杯後患腳氣甚危或教以巴戟半兩糯米同炒米微轉色不用米大黃一兩銼炒同為末熟蜜為丸溫水服五七十丸仍禁酒遂愈白英味甘寒無毒主寒熱八疸消渴補中益氣久服輕身延年一名谷菜一名白草生益州山谷春採葉夏採莖秋採花冬採根陶隱居云諸方藥不用此乃有蔛音斛菜生水中人蒸食之此乃生山谷當非是又有白草葉作羹飲甚療勞而不用根華益州乃有苦菜土人專食之皆充健無病疑或是此唐本注云此鬼目草也蔓生葉似王瓜小長而五椏實圓若龍葵子生青熟紫黑煮汁飲解勞東人謂之白草陶云白草似識之而不的辨今按陳藏器本草云白英主煩熱風疹丹毒瘧瘴寒熱小兒結熱煮汁飲之一名鬼目爾雅云苻鬼目注似葛葉有毛子赤如耳璫珠若雲子熟黑誤矣又按別本注云今江東人夏月取其莖葉煮粥極解熱毒白蒿味甘平無毒主五臟邪氣風寒濕痹補中益氣長毛髮令黑療心懸少食常飢久服輕身耳目聰明不老生中山川澤二月採陶隱居云蒿類甚多而俗中不聞呼白蒿者方藥家既不用皆無復識之所主療既殊佳應更加研訪服食七禽散云白兔食之仙與前庵䕡子同法爾唐本注云爾雅蘩音煩皤音婆蒿即白蒿也此蒿葉粗於青蒿從初生至枯白於眾蒿欲似細艾者所在有之也今按別本注云葉似艾葉上有白毛粗澀俗呼為蓬蒿臣禹錫等謹按爾雅疏云蓬蒿可以為菹故詩箋云以豆薦蘩菹陸機云凡艾白色為皤蒿今白蒿春始生及秋香美可生食又可蒸一名遊胡北海人謂之旁勃故大戴禮夏小正傳曰蘩遊胡遊胡旁勃也孟詵云白蒿寒春初此蒿前諸草生搗汁去熱黃及心痛其葉生挪醋淹之為菹甚益人又葉乾為末夏日暴水痢以米飲和一匙空腹服之子主鬼氣末和酒服之良又燒淋灰煎治淋瀝疾圖經曰白蒿蓬蒿也生中山川澤今所在有之春初最先諸草而生似青蒿而葉粗上有白毛錯澀從初生至枯白於眾蒿頗似細艾二月採此爾雅所謂蘩音煩皤音婆蒿是也疏云蓬蒿可以為菹故詩箋云以豆薦蘩菹陸機云凡艾白色為皤蒿今白蒿春始生及秋香美可生食又可蒸一名遊胡北海人謂之旁勃故大戴禮夏小正云蘩遊胡遊胡旁勃也此草古人以為菹唐孟詵亦云生挪醋食今人但食蔞蒿不復食此或疑此蒿即蔞蒿而孟詵又別著蔞蒿條所說不同明是二物乃知古今食品之異也又今階州以白蒿為茵陳蒿苗葉亦相似然以入藥恐不可用也按蒿類亦多爾雅云蘩之醜秋蒿言春時各有種名至秋老成皆通呼為蒿也中品有馬先蒿云生南陽川澤葉如益母草花紅白八九月有實谷謂之虎麻亦名馬新蒿詩小雅所謂匪莪伊蔚是也陸機云蔚牡蒿牡蒿牡菣愆刃切也三月始生七月華似胡麻花而紫赤八月為角角似小豆角銳而長一名馬新蒿郭璞注爾雅蔚牡菣謂無子者而陸雲有子二說小異今當用有子者為正下品又有角蒿云葉似白蒿花如瞿麥紅赤可愛子似王不留行黑色作角七八月採又有茵陳蒿草蒿下自有條白蒿馬新蒿古方治癩疾多用之深師方云取白艾蒿十束如升大煮取汁以曲及米一如釀酒法候熟稍稍飲之但是惡疾遍體面目有瘡者皆可飲之又取馬新蒿搗末服方寸匕日三如更赤起服之一年都瘥平復角蒿醫方鮮有用者赤箭味辛溫主殺鬼精物蠱毒惡氣消癰腫下支滿疝音山下血久服益氣力長陰肥健輕身增年一名離母一名鬼督郵生陳倉川穀雍州及泰山少室三月四月八月採根曝乾陶隱居云陳倉屬雍州扶風郡按此草亦是芝類云莖赤如箭桿葉生其端根如人足又云如芋有十二子為衛有風不動無風自搖如此亦非俗所見而徐長卿亦名鬼督郵又復有鬼箭莖有羽其療並相似而益人乖異恐並非此赤箭唐本注云此芝類莖似箭桿赤色端有花葉遠看如箭有羽根皮肉汁與天門冬同唯無心脈去根五六寸有十餘子衛似芋其實似苦楝子核作五六稜中肉如面日曝則枯萎也得根即生啖音澹之無干服法也臣禹錫等謹按藥性論云赤箭無毒圖經曰赤箭生陳倉川穀雍州及泰山少室今江湖間亦有之然不中藥用其苗獨莖如箭桿葉生其端四月開花杆葉俱赤實似苦楝子核作五六稜中有肉如面日曝則枯萎其根大類天門冬唯無心脈耳去根五六寸有十餘子為衛似芋三月四月八月採根曝乾今三月四月採苗七月八月九月採根謹按此草有風不動無風則自搖抱朴子云按仙方中有合離草一名獨搖一名離母所以謂之合離離母者此草為物下根如芋魁有遊子十二枚周環之去大魁數尺雖相須而實不連但以氣相屬耳如菟絲之草下有伏菟之根無此菟則絲不得上亦不相屬也然則赤箭之異陶隱居已云此亦非俗所見菟絲之下有伏菟亦不復聞有見者殆其種類中時有神異者乃如此耳又陶蘇皆云赤箭是芝類而上有六芝條五芝皆以五色生於五嶽諸方所獻者紫芝生高夏山谷蘇雲芝多黃白稀有黑青者紫芝最多非五芝類但芝自難得縱獲一二豈得終久服邪今山中雖時復有之而人莫能識其真醫家絕無用者故州郡亦無圖上蓋祥異之物非世常有但附其說於此耳凡採藥時月皆先據本經而後著今土俗所宜且赤箭本經但云三月四月八月採根不言用苗而今方家乃並用根苗各有收採時月與本經參差不同難以兼著故但從今法其他藥有相類者亦同此比又按序例云凡採藥其根物多以二月八月採者謂春初津閏始萌未沖枝葉勢力淳濃故也至秋枝葉津潤歸流於下今即事驗之春寧宜早秋寧宜晚據此文意採根者須晚秋以後初春以前欲其苗梗枯落至未萌芽時氣味正完乃可採耳然其他藥類生長及枯死有早晚採之自隨其時不必拘以春秋也下又云花實莖葉乃各隨其所熟歲月亦有早晏不必都依本文是其義也他亦同此比別說云謹按今醫家見用天麻即是此赤箭根今補註與圖經所載乃別是一物中品之下又出天麻一目注云出鄆州考今之所出赤箭根苗乃自齊鄆而來者為上今翰林沈公括最為博識嘗解此一說云古方用天麻者不用赤箭用赤箭者即無天麻方中諸藥皆同而唯此名或別即是天麻赤箭本為一物併合用根也今中品之下所別出天麻一目乃與此赤箭所說都不相干即明別是一物爾然中品之下所為天麻者世所未嘗見用今就此赤箭根為天麻則與今所用不相違然赤箭則言苗用之有自表入里之功天麻則言根用之有自內達外之理根則抽苗徑直而上苗則結子成熟而落返從稈中而下至土而生似此粗可識其外內主治之理衍義曰赤箭天麻苗也然與天麻治療不同故後人分之為二經中言八月採根曝乾故知此即苗也庵音淹䕡音閭子味苦微寒微溫無毒主五臟瘀血腹中水氣臚脹留熱風寒濕痹身體諸痛療心下堅膈中寒熱周痹婦人月水不通消食明目久服輕身延年不老駏音巨驉音虛食之神仙生雍州川穀亦生上黨及道邊十月採實陰乾荊實薏苡為之使陶隱居云狀如蒿艾之類近道處處有仙經亦時用之人家種此闢蛇也臣禹錫等謹按藥性論云庵䕡使味辛苦益氣主男子陰痿不起治心腹脹滿能消瘀血日華子云治腰腳重痛膀胱疼明目及骨節煩痛不下食圖經曰庵䕡子生雍州川穀及上黨道邊今江淮亦有之春生苗葉如艾蒿高三二尺七月開花八月結實十月採陰乾今人通以九月採江南人家多種此闢蛇謹按本經久服輕身延年不老而古方書少有服食者唯入諸雜治藥中如胡洽療驚邪貍骨丸之類皆大方中用之孫思邈千金翼韋宙獨行方主踠折瘀血並單用庵䕡一物煮汁服之亦末服今人治打撲損亦多用此法飲散皆通其效最速服食方不見用者廣利方治諸瘀血不散變成癰搗生庵䕡蒿取汁一升服之菥蓂音錫覓子味辛微溫無毒主明目目痛淚出除痹補五臟益精光療心腹腰痛久服輕身不老一名蓂菥一名大蕺一名馬辛一名大薺生咸陽川澤及道旁四月五月採曝乾得荊實細辛良惡乾薑苦參陶隱居云今處處有之人乃言是大薺子俗用甚稀唐本注云爾雅云是大薺然驗其味甘而不辛也臣禹錫等謹按蜀本云似薺菜而細俗呼為老薺藥性論云菥蓂子苦參為使能治肝家積聚眼目赤腫陳藏器云菥蓂子本經一名大薺蘇引爾雅為注云大薺按大薺即葶藶非菥蓂也菥蓂大而褊葶藶細而圓二物殊別也圖經曰菥蓂子生咸陽川澤及道旁今處處有之爾雅云菥蓂大薺郭璞云似薺細葉俗呼之曰老薺蘇恭亦云是大薺又云然菥蓂味辛大薺味甘陳藏器以大薺當是葶藶非菥蓂菥蓂大而褊葶藶細而圓二物殊也而爾雅自有葶藶謂之蕇音典注云實葉皆似薺一名狗薺大抵二物皆薺類故人多不能細分乃爾致疑也四月五月採曝乾古今眼目方中多用之崔元亮海上方療眼熱痛淚不止以菥蓂子一物搗篩為末欲臥以銅箸點眼中當有熱淚及惡物出並去胬肉可三四十夜點之甚佳蓍實味苦酸平無毒主益氣充肌膚明目聰慧先知久服不飢不老輕身生少室山谷八月九月採實日乾唐本注云此草所在有之以其莖為筮陶誤用楮實為之本經云味苦楮實味甘其楮實移在木部也圖經曰蓍實生少室山谷今蔡州上蔡縣白龜祠旁其生如蒿作叢高五六尺一本一二十莖至多者三五十莖生便條直所以異於眾蒿也秋後有花出於枝端紅紫色形如菊八月九月採其實日乾入藥今醫家亦稀用其莖為筮以問鬼神知吉凶故聖人贊之謂之神物史記龜策傳曰龜千歲乃遊於蓮葉之上蓍百莖共一根又其所生獸無虎狼蟲無毒螫徐廣注曰劉向云龜千歲而靈蓍百年而一本生百莖又褚先生云蓍生滿百莖者其下必有神龜守之其上常有青雲覆之傳曰天下和平王道得而著莖長丈其叢生滿百莖方今世取蓍者不能中古法度不能得滿百莖長丈者取八十莖以上蓍長八尺即難得也人民好用卦者取滿六十莖以上長滿六尺者即可用矣今蔡州所上者皆不言如此然則此類其神物乎故不常有也赤芝味苦平主胸中結益心氣補中增智慧不忘久食輕身不老延年神仙一名丹芝生霍山陶隱居云南嶽本是衡山漢武帝始以小霍山代之非正也此則應生衡山也英公云安心神黑芝味鹹平主癃音隆利水道益腎氣通九竅聰察久食輕身不老延年神仙一名玄芝生常山唐本注云五芝經云皆以五色生於五嶽諸方所獻白芝未必華山黑芝又非常岳且紫芝多黃白稀有黑青者然紫芝最多非五芝類但芝自難得縱獲一二豈得終久服耶青芝味酸平主明目補肝氣安精魂仁恕久食輕身不老延年神仙一名龍芝生泰山英公云不忘強志白芝味辛平主咳逆上氣益肺氣通利口鼻強志意勇悍安魄久食輕身不老延年神仙一名玉芝生華山黃芝味甘平主心腹五邪益脾氣安神忠信和樂久食輕身不老延年神仙一名金芝生蒿山紫芝味甘溫主耳聾利關節保神益精氣堅筋骨好顏色久服輕身不老延年一名木芝生高夏山谷六芝皆無毒六月八月採薯蕷為之使得發良得麻子仁白瓜子牡桂共益人惡常山畏萹青茵陳蒿陶隱居云按郡縣無高夏名恐是山名爾此六芝皆仙草之類俗所稀見族種甚多形色環異並栽芝草圖中今俗所用紫芝此是朽樹木株上所生狀如木檽音軟名為紫芝蓋只療痔而不宜以合諸補丸藥也凡得芝草便正爾食之無餘節度故皆不云服法也臣禹錫等謹按爾雅云苬芝釋曰瑞草名也一歲三華一名苬一名芝論衡云芝生於土土氣和故芝草生瑞命記曰王者仁慈則芝草生是也抱朴子云赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黃者如紫金而皆光明洞徹如堅冰也又云木芝者松柏脂淪地千歲化為茯苓萬歲其上生小木狀似蓮花名曰木威喜芝夜視有光持之甚滑燒之不焦帶之闢兵藥性論云紫芝使畏發味甘平無毒主能保神益壽卷君免切柏味辛甘溫平微寒無毒主五臟邪氣女子陰中寒熱痛癥瘕血閉絕子止咳逆治脫肛散淋結頭中風眩痿蹶強陰益精久服輕身和顏色令人好容體一名萬歲一名豹足一名求股一名交時生常山山谷石間五月七月採陰乾陶隱居云今出近道叢生石土上細葉似柏卷屈狀如雞足青黃色用之去下近石有沙土處臣禹錫等謹按範子云卷柏出三輔吳氏云卷柏神農辛平桐君雷公甘建康記云建康出卷柏藥性論云卷柏君能治月經不通屍疰鬼疰腹痛去百邪鬼魅日華子云鎮心治邪啼泣除面皯頭風暖水臟生用破血炙用止血圖經曰卷柏生常山山谷間今關陝沂兗諸州亦有之宿根紫色多須春生苗似柏葉而細碎拳攣如雞足青黃色高三五寸無花子多生石上五月七月採陰乾去下近石有沙土處用之一種唐本余闢虺雷味苦大寒無毒主解百毒消痰祛大熱療頭痛闢瘟疫一名闢蛇雷其狀如粗塊蒼朮節中有眼四十六種陳藏器余藥王味甘平無毒解一切毒止鼻衄吐血祛煩躁苗莖青色葉摘之有乳汁搗汁飲驗兜木香燒去惡氣除病疫漢武帝故事西王母降上燒兜木香末兜木香兜渠國所獻如大豆塗宮門香聞百里關中大疾疫死者相枕燒此香疫則止內傳云死者皆起此則靈香非中國所致標其功用為眾草之首焉草犀根味辛平無毒主解諸藥毒嶺南及睦婺間如中毒草此藥及千金藤並解之亦主蠱毒溪毒惡刺虎狼蟲虺等毒天行瘧瘴寒熱咳嗽痰壅飛屍喉閉瘡腫小兒寒熱丹毒中惡注忤痢血等並煮汁服之其功用如犀故名草犀解毒為最生衢婺洪饒間苗高二三尺獨莖根如細辛研服更良生水中者名木犀也海藥云謹按廣州記云生嶺南及海中獨莖對葉而生如燈臺草若細辛平無毒主解一切毒氣虎狼所傷溪毒野蠱等毒並宜燒研服臨死者服之得活薇味甘寒無毒久食不飢調中利大小腸生水旁葉似萍爾雅曰薇垂也三秦記曰夷齊食之三年顏色不異武王誡之不食而死廣志曰薇葉似萍可食利人也海藥云謹按廣州記云生海池澤中爾雅注云薇水菜主利水道下浮腫潤大腸無風獨搖草帶之令夫婦相愛生嶺南頭如彈子尾若鳥尾兩片開合見人自動故曰獨搖草海藥云謹按廣志云生嶺南又云生大秦國性溫平無毒主頭面遊風遍身癢煮法淋蘸陶朱術云五月五日採諸山野往往亦有之零餘子味甘溫無毒主補虛強腰腳益腎食之不飢曬乾功用強於薯蕷有數此則是其一也一本云大如雞子小者如彈丸在葉下生百草花主百病長生神仙亦煮花汁釀酒服之異類云鳳剛者漁陽人也常採百花水漬封泥埋之百日煎為丸卒死者納口中即活胡剛服藥百餘歲入地肺山列仙傳云堯時赤松子服之得仙紅蓮花白蓮花味甘平無毒久服令人好顏色變白卻老生西國胡人將來至中國也旱藕味甘平無毒主長生不飢黑毛髮生太行如藕羊不吃草味苦辛溫無毒主一切風血補益攻諸病煮之亦浸酒生蜀川山谷葉細長在諸草中羊不吃者是萍蓬草根味甘無毒主補虛益氣力久食不飢厚腸胃生南方池澤大如荇花黃未開前如算袋根如藕饑年當谷也石蕊主長年不飢生泰山石上如花蕊為丸散服之今時無復有王隱晉書曰庾褒入林慮山食木實餌石蕊得長年也仙人草主小兒酢瘡煮湯浴亦搗敷之酢瘡頭小大硬小者此瘡或有不因藥而自瘥者當丹毒入腹必危可預飲冷藥以防之兼用此草洗瘡亦明目去膚翳挪汁滴目中生階庭間高二三寸葉細有雁齒似離鬲草北地不生也會州白藥主金瘡生膚止血碎末敷瘡上藥如白蘞出會州也救窮草食之可絕谷長生生地肺山大松樹下如竹出新道書地肺山高六千丈其下有之應可求也草豉味辛平無毒主惡氣調中益五臟開胃令人能食生巴西諸國草似韭豉出花中人食之陳思岌味辛平無毒主解諸藥毒熱毒丹毒癰腫天行壯熱喉痹蠱毒除風血補益以上並煮服之亦磨敷瘡上亦浸酒出嶺南一名千金藤一名石黃香今江東又有千金藤一名鳥虎藤與陳思岌所主頗有異同終非一物也陳思岌蔓生如小豆根及葉辛香也千里及味苦平小毒主天下疫氣結黃瘧瘴蠱毒煮服之吐下亦搗敷瘡蟲蛇犬等咬處藤生道旁籬落間有之葉細厚宣湖間有之孝文韭味辛溫無毒主腹內冷脹滿泄痢腸澼溫中補虛生塞北山谷如韭人多食之能行云昔後魏孝文帝所種以是為名又有山韭亦如韭生山間主毛髮又有石蒜生石間又有澤蒜根如小蒜葉如韭生平澤並溫補下氣又滑水源又有諸葛亮韭而長彼人食之是蜀魏時諸葛亮所種也倚待草味甘溫無毒主血氣虛勞腰膝疼弱風緩羸瘦無顏色絕傷無子婦人老血浸酒服之逐病拯疾故名倚待生桂州如安山谷葉圓高二三尺八月採取雞侯菜味辛溫無毒久食溫中益氣生嶺南顧廣州記曰雞侯菜似艾二月生宜雞羹故名之桃朱術取子帶之令婦人為夫所愛生園中細如芹花紫子作角以鏡向旁敲之則子自發五月五日收之也鐵葛味甘溫無毒主一切風血氣羸弱令人性健久服風緩及偏風並正生山南峽中葉似枸杞根如葛黑色也伏雞子根味苦寒無毒主解百藥毒諸熱煩悶急黃天行黃疸疽瘡瘧瘴中惡寒熱頭痛馬急黃及牛疫並水磨服生者尤佳亦敷癰腫與陳家白藥同功但霍亂諸冷不可服耳生四明天台葉圓薄似錢蔓延根作鳥形者良一名承露仙陳家白藥味苦寒無毒主解諸藥毒水研服之入腹與毒相攻必吐疑毒未止更服亦去心胸煩熱天行溫瘴出蒼梧陳家解藥用之故有陳家之號蔓及根並似土瓜緊小者良冬春採取一名吉利菜人亦食之與婆羅門白藥及赤藥功用並相似葉如錢根如防己出明山龍珠味苦寒無毒子主疔腫葉變白髮令人不睡李邕方云主諸熱毒石氣發動調中解煩生道旁子圓赤珠似龍葵但子熟時赤耳捶胡根味甘寒無毒主潤五臟止消渴除煩去熱明目功用如麥門冬生江南川穀蔭地苗如萱草根似天門冬用之去心甜藤味甘寒無毒去熱煩解毒調中氣令人肥健又主剝馬血毒入肉狂犬牛馬熱黃搗絞取汁和米粉作糗餌食之甜美止泄搗葉汁敷蛇咬瘡生江南山林下蔓如葛又有小葉尖長氣辛臭搗敷小兒腹除痞滿閃癖孟娘菜味苦小溫無毒主婦人腹中血結羸瘦男子陰囊濕癢強陽道令人健行不睡補虛去痔瘻瘰癧癭瘤作菜生四明諸山冬夏常有葉似升麻方莖山人取以為菜一名孟母菜一名厄菜吉祥草味甘溫無毒主明目強記補心力生西國胡人將來也地衣草味苦平無毒主明目崔知悌方云服之令人目明地上衣如草生濕處是郎耶草味苦平無毒主赤白久痢小兒大腹痞滿丹毒寒熱取根莖煮服之生山澤間三四尺葉作雁齒如鬼針苗地楊梅味辛平無毒主赤白痢取莖子煎服生江東溫濕地四五月有子似楊梅苗如蓑草也茅膏菜味甘平無毒主赤白久痢煮服之草高一尺生茅中葉有毛如油膩黏人手子作角中有小子也鏨菜味辛平無毒主破血產後腹痛煮汁服之亦搗碎敷疔瘡生江南國蔭地似益母方莖對節白花花中甜汁飲之如蜜益奶草味苦平無毒主五野雞病脫肛止血炙令香浸酒服之生永嘉山谷葉如澤蘭莖赤高二三尺也蜀胡爛味辛平無毒主冷氣心腹脹滿補腎除婦人血氣下痢殺牙齒蟲生安南似蘹香子雞腳草味苦平無毒主赤白久痢成疳生澤畔赤莖對葉如百合苗難火蘭味酸溫無毒主冷氣風痹開胃下食去腹脹久服明目生巴西胡國似菟絲子長少許蓼蕎味辛溫無毒主霍亂腹冷脹滿冷氣攻擊腹內不調產後血攻胸脅刺痛煮服之亦食其苗如蔥韭亦搗敷蛇咬瘡生高原如小蒜而長產後作羹食之良石薺寧味辛溫無毒主風冷氣並瘡疥瘙野雞漏下血煮汁服生山石上紫花細葉高一二尺山人並用之藍藤根味辛溫無毒上氣冷嗽煮服之生新羅國根如細辛七仙草主杖瘡搗枝葉敷之生山足葉尖細長甘家白藥味苦大寒小有毒主解諸藥毒與陳家白藥功用相似人吐毒物疑不穩水研服之即當吐之未盡又服此二物性冷與霍亂下痢相反出龔州以南甘家亦因人為號葉似車前生陰處根形如半夏嶺南多毒物亦多解物豈天資乎天竺乾薑味辛溫無毒主冷氣寒中宿食不消腹脹下痢腰背疼痃癖氣塊惡血積聚生婆羅門國似姜小黃一名胡乾薑池德勒味辛溫無毒主破冷氣消食生西國草根也胡國人用之
