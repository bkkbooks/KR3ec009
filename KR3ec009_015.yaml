body:
  text: 卷第十五己酉新增衍義發髲音被味苦溫小寒無毒主五癃關格不通利小便水道療小兒癇大人痓仍自還神化合雞子黃煎之消為水療小兒驚熱下痢陶隱居云李云是童男發神化之事未見別方今俗中嫗母為小兒作雞子煎用發雜熬良久得汁與兒服去痰熱療百病而用發皆取其父梳頭亂者爾不知此發髲審是何物且髲字書記所無或作蒜音人今呼斑發為蒜髮書家亦呼亂髮為鬈恐髲即舜音也童男之理未或全明唐本注云此發髲根也年久者用之神效即發字誤矣既有亂髮及頭垢則闕髲明矣又頭垢功劣於發髲猶去病用陳久者梳及船茹敗天翁蒲席皆此例甄立言作𩮀音總𩮀亦髲也字書無髲字但有發鬈鬈發美貌作丘權音有聲無質則髲為真者也臣禹錫等謹按蜀本云本經云仍自還神化李云神化之事未見別方按異苑云人發變為鱔魚神化之異應此者也日華子云發溫止血悶血運金瘡傷風血痢入藥燒灰勿令絶過煎膏長肉消瘀血也陳藏器云生人發掛果樹上烏鳥不敢來食其實又人逃走取其發於緯車上卻轉之則迷亂不知所適矣雷公云凡使之是男子年可二十以來無疾患顏貌紅白於頂心剪下者發是凡於丸散膏中先用苦參水浸一宿漉出入瓶子以火煅之令通赤放冷研用肘後方治石淋燒灰水服之良傷寒類要治黃取燒灰水服一寸匕日三衍義曰發髲與亂髮自是兩等發髲味苦即陳舊經年歲者如桔皮皆桔也而取其陳者狼毒麻黃吳茱萸半夏枳實之類皆須陳者謂之六陳入藥更良敗蒲亦然此用髲之義耳今人又謂之頭髲其亂髮條中自無用髲之義此二義甚明亦不必如此過謂搜索右以亂髮如雞子大無油器中熬焦黑就研為末以好酒一盞沃之何首烏末二錢同勻攪候溫灌之下咽過一二刻再灌治破傷風及沐發中風極效亂髮微溫主咳嗽五淋大小便不通小兒驚癇止血鼻衄燒之吹內立已陶隱居云此常人頭髮爾與發髲療體相似唐本注云亂髮灰療轉胞小便不通赤白痢哽噎鼻衄癰腫狐尿剌尸疰疔腫骨疽雜瘡古方用之也臣禹錫等謹按藥性論云亂髮使味苦能消瘀血關格不通利水道外臺祕要治霍亂煩躁燒亂髮如雞子大鹽湯三升和服之不吐再服千金方小兒驚啼燒亂髮灰酒調服之又方治無故遺血亂髮及爪甲燒灰酒服方寸匕肘後方治黃疸燒亂髮灰水調服一錢匕日三服祕方又方女勞疸身目皆黃發熱惡寒小腹滿急小便難由大熱大勞交接後入水所致亂髮如雞子大豬脂半斤煎令盡分二服經驗方孫真人催胎衣不下亂髮頭髲結撩喉口中又方孩子熱瘡亂髮一團梨許大雞子黃煮熟二物相和於銚子內炭火上熬初甚干少頃發焦遂有液出旋取置一瓷盞中以液盡為度取此液敷熱瘡上即以苦參粉粉之豫在朗州生子在蓐中便有熱瘡出於臀腿間初以他藥敷無益加劇蔓延半身狀候至重晝夜啼號不乳不睡豫閲本草見發髲云合雞子黃煎之消為水治小兒驚熱注云今俗中嫗母為小兒作雞子煎用發雜熬良久得汁令小兒服去痰熱治百病凡用發皆取梳頭亂者又檢雞子云治火瘡因而用之果驗以後用之無不瘥矣梅師方治鼻衄出血眩冒欲死燒亂髮細研水服方寸匕須臾更吹鼻中斗門方治汗血用頭髮灰一字吹入鼻中即止簡要濟衆治小兒重舌欲死以亂髮灰細研以半錢敷舌下日不住用之姚氏治食中誤吞發繞喉不出取己頭亂髮燒作灰服一錢匕水調又方治大小便不通燒亂髮末三指撮投半升水中一服孫真人同子母祕録治尸疰燒亂髮如雞子大為末水服之瘥又方治小兒驚口兩角生瘡燒亂髮和豬脂塗之又方治小兒斑瘡豌豆瘡發灰飲汁服三錢匕産書治大小便利血灰研如粉飲下方寸匕服氣精義方劉君安曰欲發不脫梳頭滿千遍蘇學士云亂髮露蜂房蛇蛻皮各燒灰每味取一錢匕酒調服治瘡口久不合神驗燒灰須略存性老唐云收自己亂頭髮洗淨干每一兩入椒五十粒泥封固入爐大火一煅如黑糟細研酒服一錢匕髭髮長黑衍義文具發髲條下人乳汁主補五臟令人肥白悅澤陶隱居云張蒼常服人乳故年百歲余肥白如瓠唐本注云別録云首生男乳療目赤痛多淚解獨肝牛肉毒合豉濃汁服之神效又取和雀屎去目赤胬肉臣禹錫等謹按蜀本云人乳味甘平無毒日華子云人乳冷益氣治瘦悴悅皮膚潤毛髮點眼止淚並療赤目使之明潤也聖惠方治卒中風不語舌根強硬陳醬五合三年者妙人乳汁五合二件相和研以生布絞取汁不計時候少少與服良久當語千金方治月經不通飲人乳汁三合金匱方啖蛇牛肉殺人何以知之啖蛇者毛髮向後順者是也食之欲死飲人乳汁一升立愈衍義曰人乳汁治目之功多何也人心生血肝藏血肝受血則能視蓋水入於經則其血乃成又曰上則為乳汁下則為月水故知乳汁則血也用以點眼豈有不相宜者血為陰故其性冷臟寒人如乳餅酪之類不可多食雖曰牛羊乳然亦不出乎陰陽造化爾西戎更以駝馬乳為酥酪老人患口瘡不能食飲人熱乳良頭垢主淋閉不通陶隱居云術云頭垢浮針以肥膩故爾今當用悅澤人者其垢可丸又主噎亦療勞復臣禹錫等謹按藥性論云頭垢治噎酸漿水煎膏用之立愈日華子云溫治中蠱毒及菌毒米飲或酒化下並得以吐為度外臺祕要傷寒病欲令不勞復頭垢燒水丸如梧桐子大飲服一丸千金方治百邪鬼魅水服頭垢一小豆大故膩頭巾無毒天行勞復渴浸取汁暖服一升又方主食自死鳥獸肝中毒取故頭巾垢一錢匕熱湯中煬服之三年頭𢄼主卒心痛沸湯取汁飲以頭𢄼於閒處碗覆之同時開愈頭𢄼即縛髻帛也肘後方犬咬人重發瘡以頭垢少許納瘡中以熱牛屎敷之葛稚川治緊唇以頭垢敷之梅師方治馬肝殺人取頭垢一分熟水調下錢相公篋中方治蜈蚣咬人以頭垢膩和苦參末酒調敷之劉涓子治竹木刺在肉中不出以頭垢塗之即出傷寒類要傷寒天行病後勞復含頭垢如棗核大一丸服氣精義云劉君安燒己發合頭垢等分合服如大豆許三丸名曰還精令頭不白人牙齒平除勞治瘧蠱毒氣入藥燒用齒垽溫和黑蝨研塗出箭頭並惡剌破癰腫葛稚川治乳癰取人牙齒燒灰細研酥調貼癰上李世績治箭頭不出及惡刺以齒垽和黑蝨研塗之耳塞溫治癲狂鬼神及嗜酒又名腦膏泥丸脂以上二種新分條見日華子人屎寒主療時行大熱狂走解諸毒宜用絶乾者搗末沸湯沃服之東向圊音青廁溺坑中青泥療喉痹消癰腫若已有膿即潰陶隱居云交廣俚音里人用焦銅為箭鏃射人才傷皮便死唯飲糞汁即瘥而射豬狗不死以其食糞故也時行大熱飲糞汁亦愈今近城寺別塞空罌口納糞倉中積年得汁甚黑而苦名為黃龍湯療溫病垂死皆瘥唐本注云人屎主諸毒卒惡熱黃悶欲死者新者最效須與水和服之其乾者燒之煙絶水漬飲汁名破棺湯主傷寒熱毒水漬飲彌善破疔腫開以新者封之一日根爛臣禹錫等謹按日華子云糞清冷臘月截淡竹去青皮浸滲取汁治天行熱狂熱疾中毒並惡瘡菌毒取汁服浸皂莢甘蔗治天行熱疾外臺祕要治小兒陰瘡燒灰敷之瘥又方治骨蒸熱非其人莫浪傳取屎乾者燒令外黑納水中澄清每旦服一小升薄晚小便服一小升以瘥為度既常服新作大坑燒二升夜以水三升漬之稍稍減服小便用童子者佳千金方治産後陰下脫人屎炒令赤以酒服方寸匕日三又方治山中樹木菌毒以糞汁服之又方治蛇咬以屎厚敷上後帛裹之即消又方治人癲狂不識人燒屎灰以酒服之又方治鬼舐頭取兒糞臘月豬脂和敷肘後方治發背欲死燒屎作灰醋和如泥敷腫處干即易良斗門方治熱病及時疾心躁狂亂奔走狀似癲癇言語不定久不得汗及時疾不知人事者以人中黃不以多少入大罐內以泥固濟大火煅半日去火候冷取出於地上以盆蓋之又半日許細研如面新汲水調下三錢或未退再作瘥姚氏方毒箭有三種交廣夷州用焦銅作箭鏃嶺北諸處以蛇毒螫物汁著筒中漬箭鏃此二種才傷皮便洪膿沸爛而死若中之便飲屎汁並以敷之亦可療唯此最妙又一種用射菵以塗箭鏃人中之亦困若著實處不死近腹亦宜急療今葛氏方是射菵者耳又方食鬱肉漏脯此並有毒燒屎灰酒服方寸匕傷寒類要治天行病六七日熱盛心煩狂見鬼者絞人屎汁飲數合又治溫病勞復及食勞燒屎灰酒服方寸匕博物志楓樹上生菌人食即令人笑不止飲土漿屎汁愈衍義曰人屎用干陳者為末於陰地淨黃土中作五六寸小坑將末三兩匙於坑中以新汲水調勻良久俟澄清與時行大熱狂渴須水人飲之愈今世俗謂之地清然飲之勿極意恐過多耳又治一切癰癤熱毒腫膿血未潰疼痛不任用乾末麝香各半錢同研細抄一豆大津唾貼瘡心醋面錢子貼定膿潰出去藥人溺療寒熱頭疼溫氣童男者尤良陶隱居云若人初得頭痛直飲人尿數升亦多愈合蔥豉作湯彌佳唐本注云尿主卒血攻心被打內有瘀血煎服之一服一升又主症積滿腹諸藥不瘥者服之皆下血片塊二十日即出也亦主久嗽上氣失聲尿坑中竹木主小兒齒不生正旦刮塗之即生日華子云小便涼止勞渴嗽潤心肺療血悶熱狂撲損瘀血運絶及困乏揩灑皮膚治皸裂能潤澤人蛇犬等咬以熱尿淋患處難産及胞衣不下即取一升用薑蔥各一分煎三兩沸乘熱飲便下吐血鼻洪和生薑一分絞汁並壯健丈夫小便一升乘熱頓飲瘥今按陳藏器本草云溺寒主明目益聲潤肌膚利大腸推陳致新去咳嗽肺痿鬼氣痓病彌久停臭者佳恐冷當以熱物和溫服久臭溺浸蜘蛛咬於大甕中坐浸仍取烏雞屎炒浸酒服不爾恐毒入口中涎及唾取平明未語者塗癬疥良楊氏産乳療傷胎血結心腹痛取童子小便日服二升瘥衍義曰人溺須童男者産後溫一杯飲壓下敗血惡物有飲過七日者過多恐久遠血臟寒令人髮帶病人亦不覺氣血虛無熱者尤不宜多服此亦性寒故治熱勞方中亦用溺白垽魚靳切療鼻衄湯火灼瘡唐本注云溺白垽燒研末主緊唇瘡臣禹錫等謹按日華子云人中白涼治傳尸熱勞肺痿心膈熱鼻洪吐血羸瘦渴疾是積尿垽入藥經驗方治血汗鼻衄五七日不住立效以人中白不限多少刮在新瓦上用火逼干研入麝香少許用酒下又方秋石還元丹大補暖悅色進食益下元久服去百疾強骨髓補精血開心益志煉人中白方男子小便十石更多不妨先榰大鍋灶一副於空屋內鍋上用深瓦甑接鍋口令高用紙筋杵石灰泥卻甑縫並鍋口勿令通風候乾下小便只可於鍋中及七八分以來灶下用焰火煮專令人看之若湧出即添冷小便些小勿令湧出候乾細研入好合子內如法固濟入炭爐中煅之旋取三二兩再研如粉煮棗瓤為丸如緑豆大每服五七丸漸至十五丸空心溫酒鹽湯下久服臍下常如火暖諸般冷疾皆愈久年冷勞虛憊甚者服之皆壯盛其藥末常近火收或時復養火三五日功效大也婦人月水解毒箭並女勞復新補見陶隱居陳藏器云經衣主金瘡血湧出取衣熱炙尉之又燒末敷虎狼傷瘡燒末酒服方寸匕日三主箭鏃入腹梅師方治丈夫熱病瘥後交接復發忽卵縮入腸腸中絞痛欲死燒女人月經赤衣為灰熟水調方寸匕服又方治剝馬被骨刺破毒欲死以月水敷瘡口立效孫真人治霍亂困篤取童女月經衣和血燒灰和酒服方寸匕又方治聚血兼箭鏃在胸喉燒婦人月經衣酒服又方治馬血入瘡中以婦人月經血塗之扁鵲云治陰陽易傷寒燒婦人月經衣熟水服方寸匕博物志交州夷人以焦銅為鏃毒藥塗於鏃鋒上中人即沸爛須臾骨壞以月水屎汁解之浣褌音昆汁解毒箭並女勞復亦善扶南國舊有奇術能令刀斫不入唯以月水塗刀便死此是汙穢壞神氣也人合藥所以忌觸之此既一種物故從屎溺之例新補見陶隱居人精和鷹屎亦滅瘢新補見陶隱居千金方去面上靨人精和鷹屎白敷之三日愈白蜜亦得肘後方治瘤人精一合半合亦得青竹筒盛火上燒炮之以器承取汗密置器中數敷瘤上良又方治湯火灼令不痛又速愈瑕痕以人精和鷹屎白日敷上痕自落孫真人治金瘡血出不止以精塗之懷妊婦人爪甲取細末置目中去翳障新補見陳藏器臣禹錫等謹按日華子云手爪甲平催生葛稚川治忍小便胞轉自取爪甲燒灰水服又方治婦人淋自取爪甲燒灰水服亦治尿血衍義曰人指甲治鼻衄細細刮取俟血稍定去瘀血於所衄鼻中搐之立愈獨不可備則衆人取之甚善衄藥並法最多或效或不效故須博採以備道途田野中用天靈蓋味鹹平無毒主傳尸尸疰鬼氣伏連久瘴勞瘧寒熱無時者此死人頂骨十字解者燒令黑細研曰飲和服亦合諸藥為散用之方家婉其名爾今附臣禹錫等謹按日華子云天靈蓋治肺痿乏力羸瘦骨蒸勞及鹽汗等入藥酥炙用陳藏器云彌腐爛者入用有一片如三指闊此骨是天生天賜蓋押一身之骨未合即未有只有囟門取得後用煻灰火罨一夜待腥穢氣出盡卻用童兒溺於瓷鍋子中煮一伏時滿漉出於屋下掘一坑可深一尺置天靈蓋於中一伏時其藥魂歸神妙陽人使陰陰人使陽外臺祕要治犬咬衆治不瘥毒攻人煩亂喚已作犬聲者燒灰為末以水服方寸匕以活止梅師方諸犬咬瘡不瘥吐白沫者為毒入心叫喚似犬聲以髑髏骨燒灰研以東流水調方寸匕別說云謹按天靈蓋神農本經人部唯發髲一物外余皆出後世醫家或禁術之流奇怪之論殊非仁人之用心世稱孫思邈有大功於世以殺命治命尚有陰責沉於是也近數見醫家用以治傳尸病未有一效者信本經不用未為害也殘忍傷神又不急於取效苟有可易仁者宜盡心焉苟不以是說為然決為庸人之所惑亂設云非此不可是不得已則宜以年深塵泥所漬朽者為良以其絶尸氣也人髭唐李績嘗疾醫診之云得須灰服之方止太宗遂自剪髭燒灰賜服之復令敷癰瘡立愈故白樂天云剪須燒藥賜功臣仁宗皇帝賜呂夷簡古人有語髭可治疾今朕剪髭與之合藥表朕意一十種陳藏器余人血主羸病人皮肉乾枯身上麩片起又狂犬咬寒熱欲發者並刺熱血飲之人肉治瘵疾人胞主血氣羸瘦婦人勞損面䵟皮黑腹內諸病漸瘦悴者以五味和之如𩚲䭔音甲餅也法與食之勿令知婦人胞衣變成水味辛無毒主小兒丹毒諸熱毒發寒熱不歇狂言妄語頭上無辜發立虛痞等此人産後時衣埋地下七八年化為水清澄如真水南方人以甘草升麻和諸藥物盛埋之三五年後撥去取為藥主天行熱病立效梅師方治草蠱其狀入咽刺痛欲死者取胞衣一具切曝乾為末熟水調一錢匕最療蛇蠱蜣螂草毒等婦人褌襠主陰易病當陰上割取燒末服方寸匕童女褌益佳若女患陰易即須男子褌也陰易病者人患時行病起後合陰陽便即相著甚於本病其候小便赤澀寒熱甚者是服此便通利不爾灸陰二七壯又婦人褌主胞衣不出覆井口立下取本婦人者即佳人膽主鬼氣尸疰伏連男子陰毛主蛇咬口含二十條咽其汁蛇毒不入腹內死人枕及席患疣拭之二七遍令爛去疣嘗有嫗人患滯冷積年不瘥徐嗣伯為診曰此尸疰也當以死人枕煮服之乃愈於是往古冢中取枕枕已一邊腐缺嫗服之即瘥張景年十五歲患腹脹面黃衆藥不能治以問徐嗣伯嗣伯曰此石蛔耳極難療當取死人枕煮服之得大蛔蟲頭堅如石者五六升病即瘥沈僧翼患眼痛又多見鬼物嗣伯曰邪氣入肝可覓死人枕煮服之竟可埋枕於故處如其言又愈王晏問曰三病不同皆用死人枕而俱瘥何也答曰尸疰者鬼氣也伏而未起故令人沉滯得死人枕治之魂氣飛越不復附體故尸疰自瘥石蛔者醫療既癖蛔蟲轉堅世間藥不能遣所以須鬼物馳之然後乃散故令煮死人枕服夫邪氣入肝故使眼痛而見魍魎須邪物以鉤之故用死人枕之氣因不去之故令埋於冢間也夫衣帶主難産臨時取五寸燒為末酒下褌帶最佳孫真人治金瘡未愈而交接血出不止取與交婦人衣帶二寸燒研末水服之衣中故綿絮主卒下血及金瘡出血不止取一握煮汁溫服之新綿一兩燒為黑末酒下主五野雞病新生小兒臍中屎主惡瘡食息肉除面印字盡候初生取胎中屎也初生臍主瘧燒為灰飲下之
