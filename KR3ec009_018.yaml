body:
  text: 卷第十八己酉新增衍義豚卵味甘溫無毒主驚癇癲疾鬼疰蠱毒除寒熱賁豚五癃邪氣攣縮一名豚顛陰乾藏之勿令敗懸蹄主五痔伏熱在腸腸癰內蝕臣禹錫等謹按五痔通用藥云豬懸蹄平藥對云微寒豬四足小寒主傷撻諸敗瘡下乳汁心主驚邪憂恚臣禹錫等謹按日華子云心治驚癇血癖邪氣腎冷和理腎氣通利膀胱臣禹錫等謹按孟詵云腎主人腎虛不可久食日華子云腎補水臟暖腰膝補膀胱治耳聾雖補腎又令人少子膽主傷寒熱渴臣禹錫等謹按大便不通通用藥云豬膽微寒肚主補中益氣止渴利臣禹錫等謹按惡瘡通用藥云豬肚微溫孟詵云肚主暴痢虛弱日華子云肚補虛損殺勞蟲止痢釀黃糯米蒸搗為丸甚治勞氣並小兒疳蛔黃瘦病齒主小兒驚癇五月五日取臣禹錫等謹按驚癇通用藥云豬齒平日華子云齒治小兒驚癇燒灰服並治蛇咬鬐膏生髮臣禹錫等謹按發禿通用藥云豬鬐膏微寒肪膏主煎諸膏藥解斑蝥芫青毒豭豬肉味酸冷療狂病凡豬肉味苦主閉血脈弱筋骨虛人肌不可久食病人金瘡者尤甚豬屎臣禹錫等謹按黃疸通用藥云豬屎寒主寒熱黃疸濕痹陶隱居云豬為用最多唯肉不宜食人有多食皆能暴肥此蓋虛肥故也其脂能悅皮膚作手膏不皸裂肪膏煎藥無不用之勿令水中臘月者歷年不壞頸下膏謂之負革肪入道家用其屎汁療溫毒熱食其肉飲酒不可臥秫稻穰中又白豬白蹄雜青者不可食之豬膏又忌烏梅唐本注云別録云豬耳中垢主蛇傷豬腦主風眩腦鳴及凍瘡血主賁豚暴氣中風頭眩淋瀝乳汁主小兒驚癇病乳頭亦主小兒驚癇及鬼毒去來寒熱五癃五臟主小兒驚癇發汗十二月上亥日取肪脂納新瓦器中埋亥地百日主癰疽名膒音甌同脂方家用之又一升脂著雞子白十四枚更良今按陳藏器本草云豬肉寒主壓丹石解熱宜肥熱人食之殺藥動風肝主腳氣空心切作生以薑醋進之當微泄若先痢即勿服膽主濕𧈟病下膿血不止乾嘔羸瘦多睡面黃者取膽和生薑汁釅醋半合灌下部手急捻令醋氣上至咽喉乃放手當下五色惡物及蟲子又主瘦病咳嗽取膽和小便生薑桔皮訶梨勒桃皮煮服又主大便不通取豬羊膽以葦筒著膽縛一頭納下部入三寸灌之入腹立下又主小兒頭瘡取膽汁敷之豬胰音夷主肺痿咳嗽和棗肉浸酒服之亦能主痃癖羸瘦又堪合膏練繒帛臘月豬脂殺蟲久留不敗豬黃主金瘡血痢野豬脂酒服下乳汁可乳五兒齒灰主蛇咬臣禹錫等謹按孟詵云大豬頭主補虛乏氣力去驚癇五痔下丹石又腸主虛渴小便數補下焦虛竭又云東行母豬糞一升宿浸去滓頓服治毒黃熱病日華子云豬涼微毒肉療水銀風並掘土土坑內惡氣久食令人虛肥動風氣又不可同牛肉煮食令人生寸白蟲又脂治皮膚風殺蟲敷惡瘡又腸止小便補下焦生血療賁豚氣及海外瘴氣又乳治小兒驚癇天吊大人豬雞癇病糞治天行熱病黃疸蠱毒東行牝豬者為良窠內有草治小兒夜啼安席下勿令母知大凡野豬肉食勝圈豢者圖經曰豚卵本經不著所出州土云一名豚顛陰乾藏之勿令敗謹按楊雄方言云豬燕朝鮮之間謂之豭關東西謂之彘或謂之豕南楚謂之豨音喜其子謂之豯音奚吳楊之間謂之豬子其實一種也今云豚卵當是豬子也之豬之屬為用最多唯肉不宜食食之多暴肥蓋風虛所致也心熱主血不足補虛劣不可多食能耗心氣又不與吳茱萸合食肺微寒能補肺得大麻人良不與白花菜合食令人氣滯發霍亂肝溫主冷泄久滑赤白乳婦赤白下方用子肝一葉薄批之搵著煨熟訶子末中微火炙又搵炙盡半兩末止空腹細嚼陳米飲送下亦主冷勞腹臟虛者脾主脾胃虛熱以陳桔皮紅生薑人參蔥白切拍之合陳米水煮如羹去桔皮空腹食之腎補虛壯氣消積滯冬月不可食損人真氣兼發虛壅肚主骨蒸熱勞血脈不行補羸助氣四季宜食張仲景有豬肚黃連丸是也骨髓寒主撲損惡瘡懸蹄主痔腸癰內蝕四蹄主行婦人乳脈滑肌膚去寒熱廣濟方載其法云婦人乳無汁者以豬蹄四枚治如食法以水二斗煮取一斗去蹄土瓜根通草漏蘆各三兩以汁煮取六升去滓納蔥白豉如常著少米煮作稀蔥豉粥食之食了或身體微微熱有少汗出佳乳未下更三兩劑大驗肪膏主諸惡瘡利血脈解風熱潤肺入膏藥宜臘月亥日取之腸臟主大小腸風熱宜食之胰寒主肺氣干脹喘急潤五臟去皴疱皯𪒟並肪膏並殺斑蝥地膽亭長等毒然男子多食之損陽崔元亮海上方著豬胰酒療冷痢久不瘥方云此是脾氣不足暴冷入脾舌上生瘡飲食無味縱吃食下還吐小腹雷鳴時時心悶干皮細起膝脛痠疼兩耳絶聲四肢沉重漸瘦劣重成鬼氣及婦人血氣不通逆飯憂煩常行無力四肢不舉丈夫痃癖兩肋虛脹變為水氣服之皆效驗此法出於傳尸方取豬胰一具細切與青蒿葉相和以無灰酒一大升微火溫之乘熱納豬胰中和蒿葉相共暖使消盡又取桂心一小兩別搗為末納酒中每日平旦空腹取一小盞服之午時夜間各再一服甚驗忌熱面油膩等食膽大寒主骨熱勞極傷寒及渴疾小兒五疳殺蟲齒主小兒驚癇燒灰服之屎主寒熱黃疸濕痹今人取端午日南行豬零合太一丹是也燖豬湯解諸毒蟲魘凡豬骨細少筋多膏大者有重百餘斤食物至寡故人畜養之甚易生息爾雅曰彘五尺為豟郭璞注云尸子曰大豕為豟今漁陽呼豬大者為豟是也又下野豬黃條主金瘡又云大寒有毒一名豪豬鬃間有毫如箭能射人陝洛江東諸山中並有之肉亦甘美多膏皆不可多食發風氣利大腸令人虛羸食療肉味苦微寒壓丹石療熱閉血脈虛人動風不可久食令人少子精發宿疹主療人腎虛肉發痰若患瘧疾人切忌食必再發又云江豬平肉酸多食令人體重今捕人作脯多皆不識但食少有腥氣又舌和五味煮取汁飲能健脾補不足之氣令人能食聖惠方治蛇入口併入七孔中割母豬尾頭瀝血滴口中即出又方治少陰病下痢咽痛胸滿心煩豬膚一斤以水一斗煮取五升去滓加白蜜一升粉五合熬香和勻相得溫分六服外臺祕要療毒熱病攻手足腫疼痛欲脫方豬膏和羊屎塗之亦佳又方療盲豬膽一枚微火上煎之可丸如黍米大納眼中食頃良又方治翳如重者取豬膽白皮曝乾合作小繩子如粗叉股大小燒作灰待冷便以灰點翳上不過三五度即瘥千金方治被打頭青腫炙豬肉熱拓之又貼豬肝千金翼老人令面光澤方大豬蹄一具洗淨理如食法煮漿如膠夜以塗面曉以漿水洗面皮急矣又方治發薄不生先以酢泔清淨洗禿處以生布揩令大熱臘月豬脂細研入生鐵煮沸三二度敷之遍生又方治漏方以臘月豬脂紙沾取納瘡孔中日五夜三又方治手足皴裂血出疼痛若冬月冒涉凍凌面目手足瘃壞及熱疼痛皆治取豬腦髓著熱酒中以洗之瘥肘後方治毒攻手足腫疼痛欲斷豬蹄一具合蔥煮去滓納少許鹽以漬之又方治卒腫病身面皆洪大生豬肝一具細切頓食之勿與鹽乃可用苦酒妙又方疸病有五有黃疸谷疸酒疸黑疸女勞疸黃汗身體四肢微腫胸滿不得汗汗出如黃柏汁由大汗出卒入水所致豬脂一斤令溫熱盡服之日三當下下則稍愈又方葛氏疥瘡豬膏煎芫花塗又方若女子陰中苦癢搔之痛悶取豬肝炙熱納陰中當有蟲著肝出又方療手足皴裂面出血痛方以酒挪豬胰洗並服又方小便不通豬膽大如雞子者納熱酒中服姚云亦療大便不通又方胞衣不出腹滿則殺人但多服脂佳又方小兒頭生白禿發不生臘月豬屎燒末敷之經驗方療男子水臟虛憊遺精盜汗往往夜夢鬼交取獖豬腎一枚以刀開去筋膜入附子末一錢匕以濕紙裹煨熟空心稍熱服之便飲酒一盞多亦甚妙三五服效經驗後方定喘化涎豬蹄甲四十九個淨洗控干每個指甲納半夏白礬各一字入罐子內封閉勿令煙出火煅通赤去火細研入麝香一錢匕人有上喘咳嗽用糯米飲下小兒半錢至妙又方陰痿羸瘦精髓虛弱四肢少力豬腎一對去脂膜切枸杞葉半斤用豉汁二大盞半相和煮作羹入鹽椒蔥空腹食之梅師方蜈蚣入耳以豬脂肉炙令香掩耳自出又方蟻子入耳以豬羊脂炙令香安耳孔自出又方治産後虛勞骨節疼痛汗出不止取豬腎造晞臛以蔥豉米如法食之又方治癰諸疽發背或髮乳房初起微赤不急治之即殺人母豬蹄兩隻通草六分以綿裹和煮作羹食之又方治熱病有𧈟上下蝕人豬膽一枚苦酒一合同煎三二沸滿口飲之蟲立死即愈孫真人食忌云不可常食豬肉白豬白蹄者不可食也又云臘月肪脂殺蟲可煎膏用之食醫心鏡主脾胃氣虛食即汗出豬肝一斤薄起於瓦上曝令熟乾搗篩為末煮白粥布絞取汁和衆手丸如梧桐子大空心飲下五十丸日五服又主脾胃氣冷吃食嘔逆下赤白痢如麵糊腰臍切痛豬腎一對研著胡椒桔皮鹽醬椒末等搜面似常法作餛飩熟煮空腹吃兩碗立瘥又主消渴日夜飲水數斗小便數瘦弱豬肚一枚淨洗以水五升煮令爛熟取二升以來去肚著少豉渴即飲之肉亦可吃又和米著五味煮粥食之佳又方水氣脹滿浮腫豬肝一具煮作羹任意下飯又主上氣咳嗽胸隔妨滿氣喘豬肉細切作䭔子於豬肺中煎食之又豬肪脂四兩煮百沸以來切和醬醋食之又治一切肺病咳嗽膿血不止豬胰一具削薄竹筒盛於煻火中炮令極熟食上吃之又理腫從足始轉上入腹豬肝一具細切先布綟更以醋洗蒜齏食之如食不盡三兩頓食亦可也又理浮腫脹滿不下食心悶豬肝一具洗切作臠著蔥白豉薑椒熟炙食之又以熟水煮單吃亦得又煮豬膂一雙切作生以蒜齏食之又理産後中風血氣驚邪憂悸氣逆豬心一枚切於豉汁中煮五味糝調和食之又治小兒驚癇發動無時豬乳汁三合以綿纏浸令兒吮之唯多尤佳又理肝臟壅熱目赤磣痛兼明目補肝氣用豬肝一具細起薄切以水淘漉出漉干即以五味醬醋食之又理狂病經久不瘥或歌或笑行走不休發動無時用豭豬肉一斤煮令熟細切作膾和醬醋食之或羹粥炒任性服之又補虛氣乏去驚癇豆牙豬頭一枚治如食法煮令極熟停冷作膾以五辣醋食之範汪療鼠瘻瘰癧取臘月豬膏調塗之傷寒類要療小兒寒熱及熱氣中人豬後蹄燒灰末以乳汁調一撮服之效又方療男子女人黃疸病醫不愈耳目悉黃食飲不消胃中脹熱生黃衣蓋胃中有干屎使病爾用煎豬脂一小升溫熱頓服之日三燥屎下去乃愈千金髓治胎孕九個月將産消息用豬肚一個依常法著蔥五味煮熟食之食不盡再食不與別人食子母祕録療吹奶惡寒壯熱豬肪脂以冷水浸拓之熱即易立效姚和衆小兒初生豬膽一枚以水七升煎取四升澄清浴兒令永無瘡疥談氏小兒方療豌豆瘡取肉爛煮取汁洗之干脯亦得禮記云豕望視而交接腥不可食又云食豚去腦麋脂味辛溫無毒主癰腫惡瘡死肌寒風濕痹四肢拘緩不收風頭腫氣通腠理柔皮膚不可近陰令痿一名官脂畏大黃臣禹錫等謹按孟詵云麋肉益氣補中治腰腳不與雉肉同食謹按肉多無功用所食亦微補五臟不足氣多食令人弱房髮腳氣骨除虛勞至良可煮骨作汁釀酒飲之令人肥白美顏色角味甘無毒主痹止血益氣力生南山山谷及淮海邊十月取陶隱居云今海陵間最多千百為群多牝少牡人言一牡輒交十餘牝交畢即死其脂墮土中經年人得之方好名曰遁脂酒服至良尋麋性乃爾淫快不應痿人陰一方言不可近陰令陰不痿此乃有理麋肉不可合蝦及生菜梅李果實食之皆病人其角刮取屑熬香酒服之大益人事出彭祖傳中唐本注云麋茸服之功力勝鹿茸煮為膠亦勝白膠言遊牝畢即死者此亦虛傳遍問山澤人不聞遊牝因致死者臣禹錫等謹按孟詵云其角補虛勞填髓理角法可五寸截之中破炙令黃香後末和酒空腹服三錢匕若卒心痛一服立瘥常服之令人赤白如花益陽道不知何因與肉功不同爾亦可煎作膠與鹿角膠同功茸甚勝鹿茸仙方甚重又丈夫冷氣及風筋骨疼痛作粉長服又於漿水中研為泥塗面令不皺光華可愛又常俗人以皮作靴熏腳氣陳士良云麋大熱日華子云角添精補髓益血脈暖腰膝悅色壯陽療風氣偏治丈夫勝鹿角按月令麋角屬陰夏至角解蓋一陰生也治腰膝不仁補一切血病也圖經文具第十七卷鹿茸條下肘後方葛氏療年少氣盛面主疱瘡塗麋脂即瘥經驗方治老人骨髓虛竭補益麋茸煎麋茸五兩去毛塗酥炙微黃為末以清酒二升於銀鍋中慢火熬成膏盛瓷器中每服半匙溫水調下空心食前服何君謨云按禮記月令仲夏鹿角解仲冬麋角解日華子謂麋角夏至解誤矣疏曰據熊氏云鹿是山獸夏至得陰氣而解角麋是澤獸故冬至得陽氣而解角今以麋為陰獸情淫而遊澤冬至陰方退故解角從陰退之象鹿是陽獸情淫而遊山夏至得陰而解角從陽退之象沈存中筆談麋茸利補陽鹿茸利補陰壯骨血堅陽道強骨髓茹茸太嫩長數寸破之如朽木端如瑪䭸紅玉者最善青麋大鹿也不如麂似獐有毒驢屎熬之主尉風腫瘻瘡屎汁主心腹卒痛諸疰忤尿主症癖胃反吐不止牙齒痛水毒牝驢尿主燥水䭸驢尿主濕水一服五合良燥水者畫體成字濕水者不成字乳主小兒熱急黃等多服使痢臣禹錫等謹按蜀本云味甘性冷利療消渴驢色類多以烏者為勝蕭炳云驢乳主熱黃小兒熱驚邪赤痢日華子云乳治小兒癇客忤天吊風疾尾下軸垢主瘧水洗取汁和麵如彈丸二枚作燒餅瘧未發前食一枚至發時食一枚療瘧無久新發無期者今按陳藏器本草云驢黑者溺及乳並主蜘蛛咬以物盛浸之瘡亦取驢溺處臭泥敷之亦佳蚰蜒入耳取驢乳灌耳中當消成水唐本先附臣禹錫等謹按孟詵云肉主風狂憂愁不樂能安心氣又頭燖去毛煮汁以漬曲醞酒去大風又生脂和生椒熟搗綿裹塞耳中治積年耳聾狂癲不能語不識人者和酒服三升良皮復患瘧人良又和毛煎令作膠治一切風毒骨節痛呻吟不止者消和酒服良又骨煮作湯浴漬身治歷節風又煮頭汁令服三二升治多年消渴無不瘥者又脂和烏梅為丸治多年瘧未發時服三十丸又頭中一切風以毛一斤炒令黃投一斗酒中漬三日空心細細飲使醉衣復臥取汗明日更依前服忌陳倉米麥面等日華子云驢肉涼無毒解心煩止風狂釀酒治一切風脂敷惡瘡疥及風腫頭汁洗頭風風屑皮煎膠食治一切風並鼻洪吐血腸風血痢及崩中帶下食療云卒心痛絞結連腰臍者取驢乳三升熱服之瘥外臺祕要治反胃昔幼年經患此疾每服食餅及羹粥等須臾吐出貞觀中許奉御兄弟及柴蔣等家時稱名醫奉敕令治罄竭所患竟不能療漸羸憊候絶朝夕忽有一衛士云服驢小便極驗日服二合後食唯吐一半晡時又服二合人定時食粥吐即便定迄至今日午時奏知之大內中五六人患反胃同服一時俱瘥此藥稍有毒服時不可過多盛取尿及熱服二合病深七日以來服之良後來療人並瘥又方斷酒用驢駒衣燒灰酒服之千金方治眼中息肉驢脂石鹽和勻注兩眥頭日夜三一月瘥又方治身體手足腫以脂和鹽敷之經驗方治飲酒過度欲至穿腸驢蹄硬處削下者以水濃煮汁冷飲之襄州散將樂小蠻得此方效又方蠍螫以驢耳垢敷之瘥崔給事傳食醫心鏡主中風頭眩心肺浮熱手足無力筋骨煩疼言語似澀一身動搖烏驢頭一枚燖洗如法蒸令極熟細切更於豉汁內煮著五味調點少酥食又主中風手足不隨骨節煩疼心躁口面喎斜取烏驢皮一領燖洗如法蒸令極熟切於豉汁中煮五味和再煮空心食之又主風狂憂愁不樂能安心氣驢肉一斤切於豉汁內煮五味和醃臘食之作粥及煮並得簡要濟衆治小兒解顱不合驢蹄不計多少燒灰研以生油和敷於頭骨縫上以瘥為度廣利方治心熱風癇黑驢乳食上暖服三大合日再服傷寒類要治黃百藥不瘥煮驢頭熟以薑齏啖之並隨多少飲汁衍義曰驢肉食之動風脂肥尤甚屢試屢驗日華子以謂止風狂治一切風未可憑也煎膠用皮者取其發散皮膚之外也仍須烏者用烏之意如用烏雞子烏蛇烏鴉之類其物雖治風然更取其水色蓋以制其熱則生風之義狐陰莖味甘有毒主女子絶産陰癢小兒陰頽卵腫五臟及腸味苦微寒有毒主蠱毒寒熱小兒驚癇雄狐屎燒之辟惡在木石上者是陶隱居云江東無狐皆出北方及益州間形似貍而黃亦善能為魅唐本注云狐肉及腸作臛食之主疥瘡久不瘥者腸主牛疫燒灰和水灌之乃勝獺鼻尖似小狗唯大尾全不似貍臣禹錫等謹按陰㿉通用藥云狐陰莖微寒孟詵云狐補虛煮炙食之又主五臟邪氣患蠱毒寒熱宜多服之日華子云狐暖無毒補虛勞治惡瘡疥隨臟而補頭尾灰治牛疫以水飲心肝生服治狐魅雄狐尾燒辟惡圖經曰狐舊不著所出州郡陶隱居注云江東無狐皆出北方及益州今江南亦時有京洛尤多形似黃狗鼻尖尾大北土作膾生食之甚暖去風補虛勞陰莖及五臟皆入藥肝燒灰以治風今人作狐肝散用之膽主暴亡續傳信方云臘月收雄狐膽若有人卒暴亡未移時者溫水微研灌入喉即活常須預備救人移時即治無及矣雄狐屎燒之辟惡在木石上者是也崔元亮海上方治五種心痛云肝心痛則顏色蒼蒼如死灰狀而喘息大用野狐糞二升燒灰薑黃三兩搗研為末空腹酒下方寸匕日再服甚效狐之類猯音湍似犬而矮尖喙黑足褐色與獾貉三種而大抵相類頭足小別郭璞注爾雅云猯一名獾乃是一物然方書説其形差別也猯肉主虛勞行風氣利臟腑殺蟲膏主上氣咳逆脂主尸疰胞主吐蠱毒獾肉主小兒疳瘦啖之殺蛔蟲貉肉主元臟虛劣及女子虛憊方書亦稀用之唐本余雄狐糞燒之去瘟疫病狐鼻尖似狗而黃長唯尾大善為魅雄狐糞在竹木間石上尖頭堅者是也食療肉溫有小毒主瘡疥補虛損及女子陰癢絶産小兒潰卵腫煮炙任食之良五臟邪氣服之便瘥空心服之佳腸肚微寒患瘡疥久不瘥作羹臛食之小兒驚癇及大人見鬼亦作羹臛食之良其狐魅狀候或叉手有禮見人或於靜處獨語或裸形見人或祗揖無度或多語成緊合口叉手坐禮度過常尿屎亂放此之謂也如馬疫亦同灌鼻中便瘥頭燒辟邪聖惠方治惡刺用狐唇杵和鹽封之千金方惡刺取狐屎灰臘月膏和封孔上又方治一切惡痿中冷息肉用正月狐糞不限多少乾末食前新汲水下一錢匕食醫心鏡治驚癇神情恍惚語言錯謬歌笑無度兼五臟積冷蠱毒寒熱狐肉一片及五臟治如食法豉汁中煮五味和作羹或作粥炙食並得京中以羊骨汁鯽魚替豉汁衍義曰狐今用肝治風皮兼毛用為裘者是也此獸多疑極審聽人智出之以多疑審聽而捕取捕者多用罝獺肝味甘有毒主鬼疰蠱毒卻魚鯁止久嗽燒服之臣禹錫等謹按藥性論云獺肝君味鹹微熱無毒能治上氣咳嗽勞損疾尸疰瘦病其骨治嘔噦不止藥對云獺肝平孟詵云獺肝主疰病相染一門悉患者以肝一具火炙末以水和方寸匕服之日再服謹按服之下水脹但熱毒風虛脹服之即瘥若是冷氣虛脹食益虛腫甚也只治熱不治冷不可一概爾日華子云獺肝治虛勞並傳尸勞疾肉療疫氣溫病及牛馬時行病煮屎灌之亦良陶隱居云獺有兩種有獱音賓獺形大頭如馬身似蝙蝠不入藥用此當取以魚祭天者其骨亦療食魚骨鯁有牛馬家可取屎收之多出溪岸邊其肉不可與兔肉雜食唐本注云別録云獺四足主手足皸裂今按陳藏器本草云獺主魚骨鯁不可出者取足於項下爬之亦煮汁食皮毛主水癊病者作褥及履屧著之並煮汁服屎主魚臍瘡研敷之亦主驢馬蟲顙細研灌鼻中臣禹錫等謹按日華子云獺肉平無毒治水氣脹滿熱毒風圖經曰獺舊不著所出土今江湖間多有之北土人亦馴養以為玩廣雅一名水狗然有兩種有獱音賓獱或作猵音頻獺形大頭如馬身似蝙蝠淮南子云養池魚者不畜獱獺許慎注云猵獺類是也入藥當以取魚祭天者其肉性寒主骨蒸熱勞血脈不行營衛虛滿及女子經絡不通血熱大小腸祕澀然消陽氣不益男子宜少食五臟及肉皆寒唯肝溫主傳尸勞極四肢寒瘧虛汗客熱亦主産勞諸畜肝皆葉數定唯此肝一月一葉十二月十二葉其間又有退葉用之須見形乃可驗不爾多偽也張仲景有治冷勞獺肝丸方又主鬼疰一門皆染者取肝一具火炙之水服方寸匕日再崔氏治九十種蠱疰及傳尸骨蒸伏連殗殜諸鬼毒癘疫等獺肝丸二方俱妙腎主益男子足主魚骨鯁項下爬亦煮汁飲之皮毛主水癊病屎主魚臍瘡膽主眼翳黑花飛蠅上下視物不明亦入點藥中食療患咳嗽者燒為灰酒服之肉性寒無毒煮汁治時疫及牛馬疫皆煮汁停冷灌之又若患寒熱毒風水虛脹即取水獺一頭剝去皮和五臟骨頭尾等炙令乾杵末水下方寸匕日二服十日瘥外臺祕要治魚骨鯁含水獺骨即下千金翼治鬼魅水服獺肝末日三服瘥經驗後方治折傷水獺一個用罐子納鹽泥固濟放干燒灰細末以黃米煮粥於傷處攤以水獺一錢末粥上糝便用帛子裹系立止疼痛肘後方尸疰鬼疰病者葛洪云是五尸之一疰又挾諸鬼邪為害其病變動乃有三十六種至九十九種大略使人寒熱淋瀝沉沉默默然不的知其所苦而無處不惡纍年積月漸就頓滯以至於死死後傳以旁人乃至滅門覺如此候者便宜急治獺肝一具陰乾杵末水服方寸匕日三未瘥再作姚云神效又方治腸痔大便常有血燒獺肝服一錢匕又方療牛疫疾獺屎二升湯淋取汁灌之古今録驗療重下下赤者取獺赤糞下白者取白糞燒末清旦空腹以飲服一小杯三旦飲之愈子母祕録易産令母帶獺皮酉陽雜俎云吳孫和寵鄧夫人嘗醉舞如意誤傷鄧頰血流啼叫彌苦命吳太醫合藥曰得白獺髓雜玉與琥珀屑當滅此痕和以百金購得白獺合膏琥珀太多及瘥不減左頰赤點如痣衍義曰獺四足俱短頭與身尾皆褊毛色若故紫帛大者身與尾長三尺余食魚居水中出水亦不死亦能休於大木上世謂之水獺嘗縻置大水甕中於其間旋轉如風水謂之成旋壠起四面高中心凹下觀者駭目皮西戎將以飾毳服領袖問之云垢不著如風霾翳目即就袖口拭目即出又毛端果不著塵亦一異也又本草序例言獺膽分杯嘗試之不驗唯塗於盞唇但使酒稍高於盞面分杯之事亦古今傳誤言也不可不正之肝用之有驗端音湍肉胞膏味甘平無毒主上氣乏氣咳逆酒和三合服之日二又主馬肺病蟲顙等病肉主久水脹不瘥垂死者作羹臛食之下水大效胞干之湯摩如雞卵許空腹服吐諸蠱毒今按陳藏器今草云猯脂主傳尸鬼氣疰忤銷於酒中服之亦殺馬漏脊蟲瘡服丹石人食之良一名獾豚極肥也唐本先附臣禹錫等謹按孟詵云猯主服丹石勞熱患赤白痢多時不瘥者可煮肉經宿露中明日空腹和醬食之一頓即瘥又瘦人可和五味煮食令人長脂肉肥白曾服丹石可時時服之丹石惡發熱服之妙食療肉平味酸骨主上氣咳嗽炙末酒和三合服之日二其嗽必瘥聖惠方治十種水不瘥垂死用猯肉半斤切粳米三合水三升蔥椒薑豉作粥食之食醫心鏡主肺痿上氣氣急煎成猯豬膏一合暖酒和服衍義曰猯肥矮毛微灰色頭連脊毛一道黑嘴尖黑尾短闊蒸食之極美貉形如小狐毛黃褐色野獸中猯肉最甘美仍益瘦人鼴音偃鼠味鹹無毒主癰疽諸瘻蝕惡瘡陰𧈟爛瘡在土中行五月取令乾燔之陶隱居云俗中一名隱鼠一名蚡扶粉切鼠形如鼠大而無尾黑色長鼻甚強常穿耕地中行討掘即得今諸山林中有獸大如水牛形似豬灰赤色下腳似象胸前尾上皆白有力而鈍亦名鼴鼠人長取食之肉亦似牛肉多以作脯其膏亦云主瘻乃云此是鼠王其精溺一滴落地輒成一鼠谷有鼠災年則多出恐非虛爾今按陳藏器本草云鼴鼠肉主風久食主瘡疥痔瘻膏堪摩諸惡瘡本經所説即是小於鼠在地中行者陶亦云形如鼠尾黑常穿耕地中討掘即得如經所言乃是今之蚡鼠小口尖者其鼴鼠是獸非鼠之儔大如牛前腳短皮入鞦轡用莊子云飲河滿腹者又隱鼠陰穿地而行見日月光則死於深山林木下土中有之主大瘻瘡陶又云此是鼠王其溺精一滴成一鼠災年則多是處皆有又能土中行今博訪山人無精溺成鼠事亦不能土中行此是人妄説陶聞而記爾既小蚡鼠亦是鼴鼠即是有二鼴鼠物異名同爾臣禹錫等謹按蜀本云行土中又五六月取燔之必是蚡鼠非鼴鼠也又其皮作腰帶鞓其形既大豈可行於土中並得而燔也蓋一名隱鼠隱鼴相近而誤之耳陳士良云鼴鼠寒圖經曰鼴音偃鼠舊不著所出州土云在土中行者今處處田壠間多有之一名蚡扶粉切鼠爾雅鼠屬蚡鼠是其一郭璞云地中行者化為鴽者皆為此也其形類鼠而肥多膏色黑口鼻尖大常穿地行旱歲則為田害肉性寒主風熱久積血脈不行結成瘡疽食之可消去小兒食之亦殺蛔蟲獸類中亦有一種名鼴鼠似牛而鼠首足黑色大者千斤多伏於水又能堰水放沫出滄州及胡中彼人取其肉食之皮可作鞦轡用是二物一名也又蟲魚部載牡鼠云微溫療踒折而近世醫方用其肉主骨蒸勞極四肢羸瘦殺蟲亦主小兒疳瘦去其骨以酒熬入藥脂主湯火瘡臘日取活鼠以油煎為膏療湯火瘡滅瘢疵極良糞主傷寒勞復張仲景傷寒論及古今名方多用之陶隱居云其屎兩頭尖尖耳衍義曰鼴鼠蚡鼠也其毛色如鼠今京畿田中甚多腳絶短但能行尾長寸許目極小項尤短兼易掘取或安竹弓射之用以飼鷹陶不合更引今諸山林中大如水牛形似豬灰赤色者也設使是鼠則孰能見其溺精成鼠也陶如此輕信但真醇之士不以無稽之言為妄矣今經云在土中行則蚡鼠無疑鼺音羸鼠主墮胎令産易生山都平谷陶隱居云鼺是鼯鼠一名飛生狀如蝙蝠大如鴟鳶毛紫色暗夜行飛生人取其皮毛以與産婦持之令兒易生又有水馬生海中是魚蝦類狀如馬形亦主易産今按陳藏器本草云陶云有水馬生海中主産按水馬婦人臨産帶之不爾臨時燒末飲服亦可手持之出南海形如馬長五六寸蝦類也南州異物志云婦人難産割裂而出者手握此蟲如羊之産也生物中羊産最易臣禹錫等謹按難産通用藥云鼺鼠微溫圖經曰鼺音羸鼠出山都平谷即飛生鳥也今湖嶺間山中多有之狀如蝙蝠大如鴟鳶毛紫色暗夜行飛生南人見之多以為怪捕取其皮毛以與産婦臨蓐持之令兒易生此但云執之而小品方乃入服藥其方取飛生一枚槐之故弩箭羽各十四枚合搗丸桐子大以酒服二丸令易産也又有一種水馬生南海中頭如馬形長五六寸蝦類也陳藏器云婦人將産帶之不爾臨時燒末飲服亦可手持之異魚圖云漁人布網罟此魚多挂網上收之曝乾以雌雄各一為對主難産及血氣藥亦用之衍義曰鼺鼠經中不言性味唯是於難産通用藥中雲鼺鼠微溫毛赤黑色長尾人捕得取皮為暖帽但向下飛則可亦不能致遠今關西山中甚有毛極密人謂之飛生者是也注中又引水馬首如馬身如蝦背傴僂身有竹節紋長二三寸今謂之海馬野豬黃味辛甘平無毒主金瘡止血生肉療癲癇水研如棗核日二服效唐本先附臣禹錫等謹按孟詵云野豬主補肌膚令人虛肥膽中有黃研如水服之治疰病其肉尚勝諸豬雌者肉美其冬月在林中食橡子肉色赤補五臟風氣其膏練令精細以二匙和一盞酒服日三服令婦人多乳服十日可供三四孩子齒作灰服主蛇毒膽治惡熱氣日華子云野豬主腸風瀉血炙食不過十頓膽中黃治鬼疰癇疾及惡毒風小兒疳氣客忤天吊脂悅色併除風腫毒瘡疥癬臘月陳者佳外腎和皮燒作灰不用絶過為末飲下治崩中帶下並腸風瀉血及血痢食療三歲膽中有黃和水服之主鬼疰癇病又其肉主癲癇補肌膚令人虛肥雌者肉美肉色赤者補人五臟不發風虛氣也其肉勝家豬也又膽治惡熱毒邪氣內不發病減藥力與家豬不同脂主婦人無乳者服之即乳下本來無乳者服之亦有青蹄者不可食食醫心鏡主久痔野雞下血不止肛邊痛豬肉二斤切著五味炙空心食作羹亦得衍義曰野豬黃在膽中治小兒諸癇疾京西界野豬甚多形如家豬但腹小腳長毛色褐作群行獵人唯敢射最後者射中前奔者則群豬散走傷人肉色赤如馬肉其味甘肉復軟微動風黃不常有間得之世亦少用食之尚勝家豬豺皮性熱主冷痹腳氣熟之以纏病上即瘥唐本先附臣禹錫等謹按孟詵云主疳痢腹中諸瘡煮汁飲之或燒灰和酒服之其灰敷𧈟齒瘡肉酸不可食消人脂肉損人神情日華子云有毒炙裹軟腳骨食之能瘦人食療云寒頭骨燒灰和酒灌解槽牛馬便馴良即更附人也聖惠方治噎病用狼喉結曝乾杵末入半錢於飯內食之妙外臺祕要云治瘰癧狼屎灰敷上子母祕録小兒夜啼狼屎中骨燒作末服如黍米許即定抱朴子云狼壽八百歲滿三百歲則善變人形膃肭臍味鹹無毒主鬼氣尸疰夢與鬼交鬼魅狐魅心腹痛中惡邪氣宿血結塊痃癖羸瘦等骨訥獸似狐而大長尾生西戎今附臣禹錫等謹按藥性論云膃肭臍君大熱此是新羅國海內狗外腎也連而取之主治男子宿症氣塊積冷勞氣羸瘦腎精衰損多色成腎勞瘦悴日華子云膃肭獸熱補中益氣腎暖腰膝助陽氣破癥結療驚狂癇疾及心腹疼破宿血圖經曰膃肭臍出西戎今東海旁亦有之云是新羅國海狗腎舊説是骨訥獸似狐而大長尾其皮上自有肉黃毛三莖共一穴今滄州所圖乃是魚類而豕首兩足其臍紅紫色上有紫斑點全不相類醫家亦兼用此云欲驗其真取置睡犬旁其犬忽驚跳若狂者為佳兼耐收蓄置密器中常濕潤如新採無時異魚圖云試膃肭臍者於臘月衝風處置盂水浸之不凍者為真也陳藏器云如爛骨從西蕃來骨肭獸似狐而大長尾臍似麝香黃赤色生突厥國胡人呼為阿慈勃他你海藥謹按臨海志云出東海水中狀若鹿形頭似狗長尾每遇日出即浮在水面崑崙家以弓矢而採之取其外腎陰乾百日其味甘香美大溫無毒主五勞七傷陰痿少力腎氣衰弱虛損背膊勞悶面黑精冷最良凡入諸藥先於銀器中酒煎後方合和諸藥不然以好酒浸炙入藥用亦得雷公云凡使先須細認其偽者多其海中有獸號曰水鳥龍海人採得殺之取腎將入諸處在藥中修合恐有誤其物自殊有一對其有兩重薄皮裹丸氣肉核皮上自有肉黃毛三莖共一穴年年蔭濕常如新兼將於睡著犬躡足置於犬頭其犬驀驚如狂即是真也若用須酒浸一日後以紙裹微微火上炙令香細銼單搗用也衍義曰膃肭臍今出登萊州藥性論以謂是海內狗外腎日華子又謂之獸今觀其狀非狗非獸亦非魚也但前即似獸尾即魚其身有短密淡青白毛腹脅下全白仍相間於淡青白毛上有深青黑點久則色復淡皮厚且韌如牛皮邊將多取以飾鞍韉其臍治臍腹積冷精衰脾腎勞極有功不待別試也似狐長尾之説蓋今人多不識麂音紀味甘平無毒主五痔病炸出以薑醋進之大有效又云多食能動人痼疾臣禹錫等謹按日華子云麂涼有毒能墮胎及發瘡癤疥頭骨為灰飲下主飛尸生東南山谷今附圖經曰麂音幾出東南山谷今有山林處皆有而均房湘漢間尤多實獐類也謹按爾雅麂與麂同大麇旄毛狗足釋曰麇亦獐也旄毛㺜音猱長毛也大獐毛長狗足者名麂南人往往食其肉然堅韌不及獐味美多食之則動痼疾其皮作履舄勝於衆皮頭亦入藥用採無時又有一種類麂而更大名麖音京不堪藥用山海經曰女幾之山其獸多麖麂是此拾遺云味辛主野雞病炸出作生以薑酢進食之大有效又云多食能動人痼疾頭骨為灰飲下之主飛尸生東南衍義曰麂獐之屬又小於獐但口兩邊有長牙好鬥則用其牙皮為第一無出其後者然多牙傷痕四方皆有山深處則頗多其聲如擊破鈸野駝脂無毒主頑痹風瘙惡瘡毒腫死肌筋皮攣縮踠損筋骨火炙摩之取熱氣入肉又以和米粉作煎餅食之療痔勿令病人知脂在兩峰內生塞北河西家駝為用亦可今附臣禹錫等謹按日華子云駱駝溫治風下氣壯筋力潤皮膚脂療一切風疾頑痹皮膚急及惡瘡腫毒漏爛並和藥敷之野者彌良圖經曰野駝出塞北河西今唯西北蕃界有之此中盡人家畜養生息者入藥不及野駝耳其脂在兩峰肉間其性溫治風下氣壯力潤皮膚人亦鮮食之又六畜毛蹄甲主鬼蠱毒寒熱驚癇癲痓狂走駱駝毛尤良陶隱居云六畜謂馬牛羊豬狗雞也騾驢亦其類毛蹄各出其身之品類中所主療不必盡同此矣蘇恭云駱駝毛蹄甲主婦人赤白下最善外臺祕要治痔取駱駝頷下毛燒作灰取半雞子大以酒和服之丹房鏡源云駝脂可柔金衍義曰野蛇生西北界等處家生者峰蹄最精人多煮熟糟啖糞為乾末搐鼻中治鼻衄此西番多用嘗進築於彼屢見之獼猴味酸平無毒肉主諸風勞釀酒彌佳頭角主瘴瘧作湯治小兒則闢驚鬼魅寒熱手主小兒驚癇口噤屎主蜘蛛咬肉為脯主久瘧皮主馬疫氣此物數種者都名禺屬取色黃尾長面赤者是人家養者肉及屎並不主病為其食息雜違其本真也唐慎微續添聖惠方治鬼瘧進退不定用猢猻頭骨一枚燒灰末空心溫酒調一錢匕臨發再服抱朴子云獼猴壽八百歲即變為猿猿壽五百歲變為玃玃壽一千歲變為蟾蜍敗鼓皮平主中蠱毒陶隱居云此用穿敗者燒作屑水和服之病人即喚蠱主姓名仍往令其呼取蠱便瘥白蘘荷亦然今移自草部圖經文具牛黃條下外臺祕要云治蠱取敗鼓皮廣五寸長一尺薔薇根五寸如足拇指大本元云莨菪根銼以水一升酒三升煮取二升服之當下蠱蟲即愈肘後方治中蠱毒諸方人有行蠱毒以病人者若中之當服藥如知蠱主姓便呼取以去也凡診法中蠱狀令人心腹切痛如有物咬或吐下血不即治之蝕人五臟盡即死矣欲知是蠱當令病人吐水沉者是浮者非亦有以蟲蛇合作蠱藥著飲食中使人得瘕病此一種一年死治之各自有藥江南山間人有此不可不信之梅師方治卒中蠱毒下血如鵝肝晝夜不絶臟腑壞敗待死知蠱姓名方破鼓皮燒灰服自呼名治之即去又欲知蠱毒主姓名取敗鼓皮少許燒末飲服病人須臾自當呼蠱主姓名楊氏産乳療中蠱毒取敗破鼓皮燒作末酒服方寸匕須臾當呼蠱姓名令本蠱主呼取蠱名即瘥聖惠方亦治小兒五種蠱毒衍義曰敗鼓皮黃牛皮為勝今不言是何皮蓋亦以驢馬皮為之者唐韓退之所謂牛溲馬勃敗鼓之皮俱收並蓄待用無遺者今用處亦少尤好煎膠專用牛皮始可入藥六畜毛蹄甲味鹹平有毒主鬼疰蠱毒寒熱驚癇癲痓狂走駱駝毛尤良陶隱居云六畜謂馬牛羊豬狗雞也騾驢亦其類駱駝方家並少用且馬牛羊雞豬狗毛蹄亦已各出其身之品類中所主療不必同此矣唐本注云駱駝毛蹄甲主婦人赤白帶下最善圖經文具野駝脂條下五種陳藏器余諸血味甘平主補人身血不足或因患血枯皮上膚起面無顏色者皆不足也並生飲之又解諸藥毒菌毒止渴除丹毒去煩熱食筋令人多力果然肉味鹹無毒主瘧瘴寒熱煮食之亦坐其皮為褥似猴人面毛如蒼鴨肋邊堪作褥南州異物志云交州有果然獸其名自呼如猿白質黑紋尾長過其頭鼻孔向天雨以尾塞鼻孔毛溫而細爾雅蜼仰鼻而長尾郭注與此相似也狨獸無毒主五野雞病取其脂敷瘡亦食其血肉亦坐其皮積久野雞病皆瘥也似猴而大毛長黃赤色生山南山谷中人將其皮作鞍褥狼筋如織絡袋子似筋膠所作大小如鴨卵人有犯盜者熏之當腳攣縮因之獲賊也或云是狼䏶下筋又云蟲所作未知孰是狼大如狗蒼色鳴聲諸孔皆涕諸肉有毒獸歧尾殺人鹿豹紋殺人羊心有孔殺人馬蹄夜目五月以後食之殺人犬懸蹄肉有毒殺人不可食米甕中肉殺人漏沾脯殺人肉中有有星如米殺人羊脯三月以後有蟲如馬尾有毒殺人脯曝不燥火燒不動入腹不消久置黍米甕中令人氣閉白馬鞍下肉食之損人五臟馬及鹿膳白不可食乳酪及大酢和食令人為血痢驢馬兔肉妊娠不可食乳酪煎魚膾瓜和食立患霍亂豬牛肉和食令人患寸白蟲諸肉煮熟不斂水食之成瘕食兔肉食乾薑令人霍亂市得野中脯多有射罔毒食諸肉過度還飲肉汁即消食腦立銷
