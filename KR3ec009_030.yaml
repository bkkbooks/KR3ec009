body:
  text: 卷第三十己酉新增衍義水英味苦性寒無毒元生永陽池澤及河海邊臨汝人呼為牛葒草河北信都人名水節河內連納黃呼為水棘劍南遂寧等郡名龍移草蜀郡人採其花合面藥淮南諸郡名海荏嶺南亦有土地尤宜莖葉肥大名海精木亦名魚津草所在皆有單服之療膝痛等其方雲水英主丈夫婦人無故兩腳腫滿連膝脛中痛屈伸急強者名骨風其疾不宜針刺及灸亦不宜服藥唯單煮此藥浸之不經五日即瘥數用神驗其藥春取苗夏採莖葉及花秋冬用根患前病者每日取五六斤以水一石煮取三斗及熱浸腳兼淋膝上日夜三四頻日用之以瘥為度若腫甚者即於前方加生椒目三升加水二大斗依前煮取汁將淋瘡腫隨湯消散候腫消即摩粉避風乃良忌油膩蒜生菜豬魚肉等麗春草味甘微溫無毒出檀嵎山在川穀檀嵎山在高密界河南淮陽郡穎川及譙郡汝南郡等並呼為龍芊草河北近山鄴郡名蘘蘭艾上黨紫團山亦有名定參草亦名仙女蒿今所在有甚療陰黃人莫能知唐天寶中因穎川郡楊正進名醫嘗用有效單服之主療黃疸等其方云麗春草療因將息傷熱變成陰黃通身壯熱小便黃赤眼如金色面又青黑心頭氣痛繞心如刺頭旋欲倒兼肋下有瘕氣及黃疸等經用有驗其藥春三月採花陰乾有前病者取花一升搗為散每平朝空腹取三方寸匕和生麻油一盞頓服之日唯一服隔五日再進以知為度其根療黃疸患黃疸者搗根取汁一盞空腹頓服之服訖須臾即利三兩行其疾立已一劑不能全愈隔七日更一劑永瘥忌酒面豬魚蒜粉酪等坐拿草生江西及滁州六月開紫花結實採其苗為藥土人用治打撲所傷兼壯筋骨治風痹江西北甚易得後因人用之有效今頗貴重神醫普救治風方中已有用者紫堇味酸微溫無毒元生江南吳興郡淮南名楚葵宜春郡名蜀堇豫章郡名苔菜晉陵郡名水卜菜唯出江淮南單服之療大小人脫肛等其方云紫堇草主大小人脫肛每天冷及吃冷食即暴痢不止肛則下脫久療不瘥者春間收紫堇花二斤曝乾搗為散加磁毛末七兩相和研令細塗肛上納入既納了即使人噀冷水於面上即吸入腸中每日一塗藥噀面不過六七度即瘥又以熱酒半升和散一方寸匕空腹服之日再漸加至二方寸匕以知為度若五歲以下小兒即以半杏子許散和酒令服之亦佳忌生冷陳倉米等杏葉草生常州味酸無毒主腸痔下血久不瘥者一名金盞草蔓生籬下葉葉相對秋後有子如雞頭實其中變生一小蟲子脫而能行中夏採花用水甘草生筠州味甘無毒治小兒風熱丹毒瘡與甘草同煎飲服春生苗莖青色葉如楊柳多生水際無花七月八月採彼土人多單使不入衆藥地柏生蜀中山谷河中府亦有之根黃狀如絲莖細上有黃點子無花葉三月生長四五寸許四月採曝乾用蜀中九月藥市多有貨之主臟毒下血神速其方與黃耆等分末之米飲服二錢蜀人甚神此方誠有效也紫背龍牙生蜀中味辛甘無毒彼土山野人云解一切蛇毒甚妙兼治咽喉中痛含咽之便效其藥冬夏長生採無時攀倒甑生宜州郊野味苦性寒主解利風壅熱盛煩渴狂躁春夏採葉研搗冷水浸絞汁服之甚效其莖葉如薄荷一名斑骨草一名斑杖絲佛甲草生筠州味甘寒微毒爛研如膏以貼湯火瘡毒多附石向陽而生有似馬齒莧細小而長有花黃色不結實四季皆有採無時彼土人多用百乳草生河中府秦州劍州根黃白色形如瓦松莖葉俱青有如松葉無花三月生苗四月長及五六寸許四時採其根曬乾用下乳亦通順血脈調氣甚佳亦謂之百蕊草撮石合草生眉州平田中苗莖高二尺以來葉似谷葉十二月萌芽生苗二月有花不結實其苗味甘無毒二月採之彼土人用療金瘡甚佳石莧生筠州多附河岸沙石上生味辛苦有小毒春生苗葉莖青高一尺以來葉如水柳而短八月九月採彼土人與甘草同服治齁䶎及吐風涎百兩金生戎州雲安軍河中府味苦性平無毒葉似荔枝初生背面俱青結花實後背紫面青苗高二三尺有杆如木凌冬不凋初秋開花青碧色結實如豆大生青熟赤根入藥採無時用之捶去心治壅熱咽喉腫痛含一寸許咽津河中出者根赤色如蔓荊莖細青色四月開碎黃花似星宿花五月採根長及一寸曬乾用治風涎小青生福州三月生花當月採葉彼土人以其葉生搗碎治癰瘡甚效曲節草生筠州味甘平無毒治發背瘡消癰腫拔毒四月生笛莖方色青有節七月八月著花似薄荷結子無用葉似劉寄奴而青軟一各蛇藍一名緑豆青一名六月冷五月六月採莖葉陰乾與甘草作末米汁調服獨腳仙生福州山林旁陰泉處多有之春生苗至秋冬而葉落其葉圓上青下紫其腳長三四寸夏採根葉連梗焙乾為末治婦人血塊酒煎半錢服之露筋草生施州株高三尺以來春生苗隨即開花結子四時不凋其子碧緑色味辛澀性涼無毒不拘時採其根洗淨焙乾搗羅為末用白礬水調貼蜘蛛並蜈蚣咬傷瘡紅茂草生施州又名地沒藥又名長生草四季枝葉繁盛故有長生之名大涼味苦春採根葉焙乾搗羅為末冷水調貼癰疽瘡腫見腫消生筠州味酸澀有微毒治狗咬瘡消癰腫春生苗葉莖紫色高一二尺葉似桑而光面青紫赤色採無時土人多以生苗葉爛搗貼瘡半天回生施州春生苗高二尺以來赤斑色至冬苗葉皆枯其根味苦澀性溫無毒土人夏月採之與雞翁藤野蘭根崖棕等四味洗淨去粗皮焙乾等分搗羅為末溫酒調服二錢匕療婦人血氣並五勞七傷婦人服忌羊血雞魚濕面丈夫服無所忌剪刀草生江湖及京東近水河溝沙磧中味甘微苦寒無毒葉如剪刀形莖杆似嫩蒲又似三稜苗甚軟其色深青緑每叢十餘莖內抽出一兩莖上分枝開小白花四瓣蕊深黃色根大者如杏小者如杏核色白而瑩滑五月六月七月採葉正月二月採根一名慈菰一名白地栗一名河鳧茨土人爛搗其莖葉如泥塗敷諸惡瘡腫及小兒遊瘤丹毒以冷水調此草膏化如糊以雞羽掃上腫便消退其效殊佳根煮熟味甚甘甜時人作果子常食無毒福州別有一種小異三月生花四時採根葉亦治癰腫龍牙草生施州株高二尺以來春夏有苗葉至秋冬而枯其根味辛澀溫無毒春夏採之洗淨揀擇去蘆頭焙乾不計分兩搗羅為末用米飲調服一錢匕治赤白痢無所忌苦芥子生秦州苗長一尺以來枝莖青色葉如柳開白花似榆莢其子黑色味苦大寒無毒明眼目治血風煩躁野蘭根出施州叢生高二尺以來四時有葉無花其根味微苦性溫無毒採無時彼土人取此並半天回雞翁藤崖棕等四味洗淨去粗皮焙乾等分搗羅為末溫酒調服二錢匕療婦人血氣並五勞七傷婦人服之忌雞魚濕面羊血丈夫無所忌都管草生施州及宜州四野味苦辣性寒主風癰腫毒赤疣以醋摩其根塗之亦治喉咽腫痛切片含之立愈其根似羌活頭歲長一節高一尺許葉似土當歸有重臺生二月八月採根陰乾施州生者作蔓又名香球蔓長丈餘赤色秋結紅實四時皆有採其根枝煎湯淋洗去風毒瘡腫小兒群生施州叢高一尺以來春夏生苗葉無花至冬而枯其根味辛性涼無毒採無時彼土人取此並左纏草二味洗淨焙乾等分搗羅為末每服一錢溫酒調下療淋疾無忌左纏草乃旋花根也菩薩草生江浙州郡近京亦有之味苦無毒中諸藥食毒者酒研服之又治諸蟲蛇傷飲其汁及研敷之良亦名尺二主婦人妊娠咳嗽搗篩蜜丸服之立效此草凌冬不凋秋中有花直出赤子似蒻頭冬月採根用仙人掌草生台州筠州味微苦而澀無毒多於石壁上貼壁而生如人掌故以名之葉細而長春生至冬猶青無時採彼土人與甘草浸酒服治腸痔瀉血不入衆使紫背金盤草生施州苗高一尺以來葉背紫無花根味辛澀性熱無毒採無時土人單用此物洗淨去粗皮焙乾搗羅溫酒調服半錢匕治婦人血氣能消胎氣孕婦不可服忌雞魚濕面羊血石逍遙草生常州味苦微寒無毒療攤緩諸風手足不遂其草冬夏常有無花實生亦不多採無時俗用搗為末煉蜜丸如梧子大酒服三十粒日三服百日瘥久服益血輕身初服微有頭疼無害胡堇草生密州東武山田中味辛滑無毒主五臟營衛肌肉皮膚中瘀血止疼痛散血絞汁塗金瘡枝葉似小堇菜花紫色似翹軺花一枝七葉花出三兩莖春採苗使時搗篩與松脂乳香花桑柴炭亂髮灰同熬如彈丸大如有打撲損筋骨折傷及惡癰癤腫破以熱酒摩一彈丸服之其疼痛立止無心草生商州及秦州性溫無毒主積血逐氣塊益筋節補虛損潤顏色療澼泄腹痛三月開花五月結實六七月採根苗陰乾用之千里光生筠州淺山及路旁味苦甘寒無毒葉似菊葉而長枝杆圓而青背有毛春生苗秋生莖葉有花黃色不結實花無用彼土人多與甘草煮作飲服退熱明目不入衆藥用九牛草生筠州山岡上味微苦有小毒解風勞治身體痛二月生苗獨莖高一尺葉似艾葉圓而長背有白毛面青五月採與甘草同煎服不入衆藥用刺虎生睦州味甘其葉凌冬不凋採無時彼土人以其根葉枝杆細銼焙乾搗羅為末暖酒調服一錢匕理一切腫痛風疾生瓜菜生資州平田陰畦間味甘微寒無毒治走疰攻頭面四肢及陽毒傷寒壯熱頭痛心神煩躁利胸膈俗用搗取自然汁飲之及生搗貼腫毒苗長三四寸作叢生葉青圓似白莧菜春生莖葉夏開紫白花結黑細實其味作生瓜氣故以為名花實無用建水草生福州其枝葉似桑四時常有彼土人取其葉焙乾碾末暖酒服治走疰風紫袍生信州春深發生葉如苦益菜至五月生花如金錢紫色彼方醫人用治咽喉口齒老鴉眼睛草生江湖間味甘性溫無毒治風補益男子元氣婦人敗血七月採子其葉入醋細研治小兒火焰丹消赤腫其根與木通胡荽煎湯服通利小便葉如茄子菜故名天茄子或云即漆姑草也漆姑即蜀羊泉已見本經人亦不能決識之天花粉生明州味苦寒無毒主消渴身熱煩滿大熱補氣安中續絶傷除腸中固熱八疸身面黃唇乾口燥短氣通月水止小便利十一月十二月採根用瓊田草生福州春生苗葉無花三月採根葉焙乾土人用治風生搗羅蜜丸服之石垂生福州山中三月有花四月採子焙乾生搗羅蜜丸彼人用治蠱毒甚佳紫金牛生福州味辛葉如茶上緑下紫實圓紅如丹朱根微紫色八月採去心曝乾頗似巴戟主時疾膈氣去風痰用之雞項草生福州葉如紅花葉上有刺青色亦名千針草根似小蘿蔔枝條直上三四月苗上生紫花八月葉凋十月採根洗焙乾碾羅為散服治下血拳參生淄州田野葉如羊蹄根似海蝦黑色五月採彼土人搗末淋炸腫氣根子生威州山中味苦辛溫主心中結塊久積氣攻臍下根入藥用採無時其苗葉花實並不入藥杏參生淄州田野主腹臟風壅上氣咳嗽根似小菜根五月內採苗葉彼土人多用之赤孫施生福州葉如浮萍草治婦人血結不通四時常有採無時每用一手搦淨洗細研暖酒調服之田母草生臨江軍性涼無花實二月採根用主煩熱及小兒風熱用之尤效鐵線生饒州味微苦無毒三月採根陰乾彼土人用療風消腫毒有效天壽根出臺州每歲土貢其性涼甚治胸膈煩熱彼土人常用有效百藥祖生天台山中苗葉冬夏常青彼土人冬採其葉入藥治風有效黃寮郎生天台山中苗葉冬夏常青彼土人採其根入藥治風有效催風使生天台山中苗葉冬夏常青彼土人秋採其葉入藥用治風有效陰地厥生鄧州順陽縣內鄉山谷味甘苦微寒無毒主療腫毒風熱葉似青蒿莖青紫色花作小穗微黃根似細辛七月採根苗用千里急生天台山中春生苗秋有花彼土人並其花葉採入藥用治眼有效地芙蓉生鼎州味辛平無毒花主惡瘡葉以敷貼腫毒九月採黃花了生信州春生青葉至三月而有花似辣菜花黃色至秋中結實採無時療咽喉口齒布里草生南恩州原野中味苦寒有小毒治皮膚瘡疥莖高三四尺葉似李而大至夏不花而實食之令人瀉不拘時採根割取皮焙乾為末油和塗瘡疥殺蟲香麻生福州四季常有苗葉而無花不拘時月採之彼土人以煎作浴湯去風甚佳半邊山生宜州溪澗味微苦辛性寒主風熱上壅喉咽腫痛及項上風癧以酒摩服二月八月九月採根其根狀似白朮而軟葉似苦蕒厚而光一名水苦蕒一名謝婆菜火炭母草生南恩州原野中味酸平無毒去皮膚風熱流注骨節癰腫疼痛莖赤而柔似細蓼葉端尖近梗方夏有白花秋實如菽青黑色味甘可食不拘時採葉搗爛於垍器中以鹽酒炒敷腫痛處經宿一易亞麻子出兗州威勝軍味甘微溫無毒苗葉俱青花白色八月上旬採其實用又名鴉麻治大風疾田麻生信州田野及溝澗旁春夏生青葉七月八月中生小莢子冬三月採葉療癰癤腫毒鳩鳥威生信州山野中春生青葉至九月而有花如蓬蒿菜花淡黃色不結實療癰癤腫毒採無時茆質汗生信州葉青花白七月採彼土人以治風腫行血有效地蜈蚣出江寧府村落間鄉人云水摩塗腫毒醫方鮮用地茄子生商州味微辛溫有小毒主中風痰涎麻痹下熱毒氣破堅積利膈消癰腫瘡癤散血墮胎三月開花結實五月六月採陰乾用圖經曰文附石蒜條下水麻生鼎州味辛溫有小毒其根名石蒜主敷貼腫毒九月採又金燈花其根亦名石蒜或去即此類也蕁麻生江寧府山野中村民云療蛇毒然有大毒人誤服之吐利不止山薑生衛州味辛平有小毒去皮間風熱可作淋炸湯又主暴冷及胃中逆冷霍亂腹痛開紫花不結子八月九月採根用馬腸根生秦州味苦辛寒有毒主蠱毒除風五月六月採根用其葉似桑性熱三月採以療瘡疥大木皮生施州其高下大小不定四時有葉無花其皮味苦澀性溫無毒採無時彼土人與苦桃皮櫻桃皮三味各去粗皮淨洗焙乾等分搗羅酒調服一錢匕療一切熱毒氣服食無忌崖棕生施州石崖上味甘辛性溫無毒苗高一尺以來四季有葉無花彼土醫人採根與半天回雞翁藤野蘭根等四味淨洗焙乾去粗皮等分搗羅溫酒調服二錢匕療婦人血氣並五勞七傷婦人服忌雞魚濕面丈夫服無所忌鵝抱生宜州山洞中味苦性寒主風熱上壅咽喉腫痛及解蠻箭藥毒篩末以酒調服之有效亦消風熱結毒赤腫用酒摩塗之立愈此種多生山林中附石而生作蔓葉似大豆根形似萊蔔大者如三升器小者如拳二月八月採根切片陰乾雞翁藤出施州有其苗蔓延大木有葉無花味辛性溫無毒採無時彼土人與半天回野蘭根崖棕四味淨洗去粗皮焙乾等分搗羅為末每服二錢用溫酒調下療婦人血氣並五勞七傷婦人服忌雞魚濕面羊血丈夫無忌紫金藤生福州山中春初單生葉青色至冬凋落其藤似枯條採其皮曬乾為末治丈夫腎氣獨用藤生施州四時有葉無花葉上有倒刺其皮味苦辛性熱無毒採無時彼土人取此並小赤藥頭二味洗淨焙乾各等分搗羅為末溫酒調一錢匕療心氣痛瓜藤生施州四時有葉無花其皮味甘性涼無毒採無時與刺豬苓二味洗淨去粗皮焙乾等分搗羅用甘草水調貼治諸熱毒惡瘡金稜藤生施州四時有葉無花其皮味辛性溫無毒採無時與續筋馬接腳三味洗淨去粗皮焙乾等分搗羅溫酒調服二錢匕治筋骨疼痛無所忌野豬尾生施州其苗纏木作藤生四時有葉無花味苦澀性涼無毒採無時彼土人取此並百藥頭二味洗淨去粗皮焙乾等分搗羅為末溫酒調下一錢匕療心氣痛解熱毒烈節生榮州多在林箐中生味辛溫無毒主肢節風冷筋脈急痛春生蔓苗莖葉俱似丁公藤而纖細無花實九月採莖曝乾以作浴湯佳杜莖山生宜州味苦性寒主溫瘴寒熱發歇不定煩渴頭疼心躁取其葉搗爛以新酒浸絞汁服之吐出惡涎甚效其苗高四五尺葉似苦蕒菜秋有花紫色實如枸杞子大而白血藤生信州葉如蔢𦽅葉根如大拇指其色黃五月採攻血治氣塊彼土人用之土紅山生福州及南恩州山野中味甘苦微寒無毒主骨節疼痛治勞熱瘴瘧大者高七八尺葉似枇杷而小無毛秋生白花如粟粒不實用其葉搗爛酒漬服之採無時福州生者作細藤似芙蓉葉其葉上青下白根如葛頭薄切用米泔浸二宿更用清水浸一宿取出切炒令黃色搗末每服一錢水一盞生薑一小片同煎服治勞瘴甚佳百稜藤生台州春生苗蔓延木上無花葉冬採皮入藥治盜汗彼土人用之有效祁婆滕生天台中其苗蔓延木上四時常有彼土人採其葉入藥治風有效含春藤生台州其苗蔓延木上冬夏常青彼土人採其葉入藥治風有效清風藤生天台山中其苗蔓延木上四時常有彼土人採其葉入藥治風有效七星草生江州山谷石上味微酸葉如柳而長作藤蔓延長二三尺其葉堅硬背上有黃點如七星採無時入烏鬚髮藥用之石南藤生天台山中其苗蔓延木上四時不凋彼土人採其葉入藥治腰疼石合草生施州其苗纏木作藤四時有葉無花其葉味甘性涼無毒採無時焙乾搗羅為末溫水調貼治一切惡瘡腫及斂瘡口馬接腳生施州作株大小不常四時有葉無花其皮味甘性溫無毒採無時彼土人取此並續筋金稜藤三味洗淨去粗皮焙乾等分搗羅為末溫酒調服一錢匕治筋骨疼痛續筋即蔙葍根也芥心草生淄州初生似臘謨草引蔓白色根黃色四月採苗葉彼土人搗末治瘡疥甚效棠球子生滁州三月開白花隨便結實有味酢而澀採無時彼土人用治痢疾及腰疼皆效他處亦有而不入藥用醋林子出邛州山野林箐中其木高丈餘枝條繁茂三月開花色白四出九月十月結子纍纍數十枚成朵生青熟赤略類櫻桃而蒂短味酸性溫無毒善療蛔咬心痛及痔漏下血並久痢不瘥尤治小兒疳蛔咬心心腹脹滿黃瘦下寸白蟲單搗為末酒調一錢匕服之甚效又土人多以鹽醋收藏以充果子食之生津液醒酒止渴不可多食令人口舌粗拆及熟採之陰乾和核同用其葉味酸夷獠人採得入鹽和魚膾食之勝用醋也天仙藤生江淮及浙東山中味苦溫微毒解風勞得麻黃則治傷寒發汗與大黃同服墮胎氣春生苗蔓延作藤葉似葛葉圓而小有毛白色四時不調根有須夏月採取根苗南人用之最多有名未用總一百九十四種二十六種玉石類青玉味甘無毒主婦人無子輕身不老長年一名珏玉生藍田陶隱居云張華云合玉漿用珏玉正縹白色不夾石者大者如升小者如雞子取穴中者非今作器物玉也出襄鄉縣舊穴中黃初中詔徵南將軍夏候尚求之白玉髓味甘平無毒主婦人無子不老延年生藍田玉石間玉英味甘主風瘙皮膚癢一名石鏡明白可作鏡生山竅十二月採璧玉味甘無毒主明目益氣使人多精生子合玉石味甘無毒主益氣療消渴輕身辟穀生常山中丘如彘肪紫石華味甘平無毒主渴去小腸熱一名茈石華生中牛山陰採無時白石華味辛無毒主疸消渴膀胱熱生液北鄉北邑山採無時黑石華味甘無毒主陰痿消渴去熱療月水不利生弗其勞山陰石間採無時黃石華味甘無毒主陰痿消渴膈中熱去百毒生液北山黃色採無時厲石華味甘無毒主益氣養神止渴除熱強陰生江南如石花採無時石肺味辛無毒主癘咳寒久痿益氣明目生水中狀如肺黑澤有赤紋出水即干陶隱居云今浮石亦療咳似肺而不黑澤恐非是石肝味酸無毒主身癢令人色美生常山色如肝石脾味甘無毒主胃寒熱益氣令人有子一名胃石一名膏石一名硝石生隱蕃山谷石間黑如大豆有赤紋色微黃而輕薄如棋子採無時石腎味鹹無毒主泄痢色如白珠封石味甘無毒主消渴熱中女子疽蝕生常山及少室採無時陵石味甘無毒主益氣耐寒輕身長年生華山其形薄澤碧石青味甘無毒主明目益精去白瘏音癬延年遂石味甘無毒主消渴傷中益氣生太山陰採無時白肌石味辛無毒主強筋骨止渴不飢陰熱不足一名肌石一名洞石生廣焦國卷音權山青石間龍石膏無毒主消渴益壽生杜陵如鐵脂中黃五羽石主輕身長年一名金黃生海水中蓬葭山上倉中黃如金石流青味酸無毒主療泄益肝氣明目輕身長年生武都山石間青白色石流赤味苦無毒主婦人帶下止血輕身長年理如石耆生山石間陶隱居云芝品中有石流丹又有石中黃子石耆味甘無毒主咳逆氣生石間色赤如鐵脂四月採紫加石味酸主痹血氣一名赤英一名石血赤無理生邯鄲山如爵茈二月採陶隱居云三十六水方呼為紫賀石終石味辛無毒主陰痿痹小便難益精氣生陵陰採無時一百三十二種草木類玉伯味酸溫無毒主輕身益氣止渴一名玉遂生石上如松高五六寸紫花用莖葉臣禹錫等謹按陳藏器云今之石松生石上高一二尺山人取根莖浸酒去風血除風瘙宜老伯應是柏字傳寫有誤文石味甘主寒熱心煩一名黍石生東郡山澤中水下五色有汁潤澤曼諸石味甘主益五臟氣輕身長年一名陰精六月七月出石上青黃色夜有光山慈石味苦平無毒主女子帶下一名爰茈生山之陽正月生葉如藜蘆莖有衣石濡主明目益精氣令人不飢渴輕身長年一名石芥臣禹錫等謹按陳藏器云生石之陰如屋遊垣衣之類得雨即展故名石濡早春青翠端開四葉山人名石芥性冷明目不飢渴石藝味甘無毒主目痛淋露寒熱溢血一名螫烈一名顧啄三月五月採莖葉陰乾臣禹錫等謹按爾雅云茢勃茢郭注云一名石藝石劇味甘無毒主渴消中路石味甘酸無毒主心腹止汗生肌酒痂益氣耐寒實骨髓一名陵石生草石上天雨獨干日出獨濡花黃莖赤黑三歲一實赤如麻子五月十月採莖葉陰乾曠石味甘平無毒主益氣養神除熱止渴生江南如石草敗石味苦無毒主渴痹越砥音旨味甘無毒主目盲止痛除熱瘙陶隱居云今細礪石出臨平者臣禹錫等謹按蜀本注云今據此在草木類中恐非細礪石也金莖味苦平無毒主金瘡內漏一名葉金草生澤中高處夏臺味甘主百疾濟絶氣陶隱居云此藥乃爾神奇而不復識用可恨也柒紫味苦主小腹痛利小腹破積聚長肌肉久服輕身長年生冤句二月七月採鬼目味酸平無毒主明目一名來甘實赤如五味十月採陶隱居云俗人今呼白草子赤為鬼目此乃相似也臣禹錫等謹按陳藏器云一名排風一名白幕爾雅云符鬼目注云葉似葛子如耳鐺赤色鬼蓋味甘平無毒主小兒寒熱癇一名地蓋生垣牆下叢生赤旦生暮死陶隱居云一名朝生疑是今鬼傘也臣禹錫等謹按陳藏器云鬼蓋名為鬼屋如菌生陰濕處蓋黑莖赤和醋敷腫毒馬脊腫人惡瘡杜正倫云鬼傘夏日得雨聚生糞堆見日消黑此物有小毒馬顛味甘有毒療浮腫不可多食馬唐味甘寒主調中明耳目一名羊麻一名羊粟生下濕地莖有節生根五月採臣禹錫等謹按陳藏器云生南土廢稻田中節節有根著土如結縷草堪飼馬云馬食如糖故曰馬唐煎取汁明目潤肺爾雅云馬唐馬飯也馬逢味辛無毒主癬蟲牛舌實味鹹溫無毒主輕身益氣一名彖尸生水中澤旁實大葉長尺五月採臣禹錫等謹按陳藏器云今東人呼田水中大葉如牛爾亦呼為牛耳菜羊乳味甘溫無毒主頭眩痛益氣長肌肉一名地黃三月採立夏後母死臣禹錫等謹按陳藏器云羊乳根似薺苨而圓大小如拳上有角節剖之有白汁人取根當薺苨三月採苗作蔓折有白汁羊實味苦寒主頭禿惡瘡疥瘙痂癬音癬生蜀郡犀洛味甘無毒主癃一名星洛一名泥洛鹿良味鹹臭主小兒驚癇賁豚痸瘲大人痓五月採菟棗味酸無毒主輕身益氣生丹陽陵地高尺許實如棗雀梅