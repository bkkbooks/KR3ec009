黃根葉並相似而細多毛生平澤功用亦同地黃李雍方用之地耳味甘無毒主明目益氣令人有子生丘陵如碧石青土齒味甘平無毒主輕身益氣長年生山陵地中狀如馬牙燕齒主小兒癇寒熱五月五日採酸惡主惡瘡去白蟲生水旁狀如澤瀉酸赭味酸主內漏止血不足生昌陽山採無時巴棘味苦有毒主惡疥瘡出蟲一名女木生高地葉白有刺根連數十枚巴朱味甘無毒主寒止血帶下生雒陽蜀格味苦平無毒主寒熱痿痹女子帶下癰腫生山陽如雚菌有刺纍根主緩筋令不痛臣禹錫等謹按陳藏器云苗如豆爾雅云攝虎纍注云江東呼虆為藤似葛而虛大今武豆也莢有毛一名巨荒千歲虆是也苗根味鹹平無毒主痹及熱中傷跌折生山陰谷中蔓草木上莖有刺實如椒臣禹錫等謹按陳藏器云茜字從西與苗字相似人寫誤為苗此即茜也參果根味苦有毒主鼠瘻一名百連一名烏蓼一名鼠莖一名鹿蒲生百餘根根有衣裹莖三月三日採根黃辨味甘平無毒主心腹疝瘕口瘡臍傷一名經辨良達主齒痛止渴輕身生山陰莖蔓延大如葵子滑小對廬味苦寒無毒主疥諸瘡久不瘳生死肌除大熱煮洗之八月採似庵䕡糞藍味苦主身癢瘡白禿漆瘡洗之生房陵委音威蛇音貽味甘平無毒主消渴少氣令人耐寒生人家園中大枝長鬚多葉而兩兩相值子如芥子麻伯味酸無毒主益氣出汗一名君莒一名衍草一名道止一名自死生平陵如蘭葉黑厚白裹莖實赤黑九月採根王明味苦主身熱邪氣小兒身熱以浴之生山谷一名王草類鼻味酸溫無毒主痿痹一名類重生田中高地葉如天名精美根五月採臣禹錫等謹按蜀本云可煮以洗病師系味甘無毒主癰腫惡瘡煮洗之一名臣堯一名臣骨一名鬼芭生平澤八月採逐折殺鼠益氣明目一名百合厚實生木間莖黃七月實黑如大豆陶隱居云又杜仲子亦名逐折並苦主咳逆上氣益肺氣安五臟一名蜮音或薰一名玉荊三月採陰乾父陛根味辛有毒以尉癰腫膚脹一名膏魚一名梓藻索干味苦無毒主易耳一名馬耳荊莖療灼爛八月十月採陰乾臣禹錫等謹按陳藏器云即今之荊樹也煮鬥堪染其洗灼瘡及熱焱瘡有效鬼麗音麗生石上挼奴和切之日柔為沐竹付味甘無毒主止痛除血祕惡味酸無毒主療肝邪氣一名杜逢唐夷味苦無毒主療踒折知杖味甘無毒療疝坔音地松味辛無毒主眩痹河煎味酸主結氣癰在喉頸者生海中八月九月採區余味辛無毒主心腹熱瘙臣禹錫等謹按蜀本作癃三葉味辛主寒熱蛇蜂螫人一名起莫臣禹錫等謹按蜀本一名赴魚一名三石一名當田生田中莖小黑白高三尺根黑三月採陰乾五母麻味苦有毒主痿痹不便下痢一名鹿麻一名歸澤麻一名天麻一名若一草臣禹錫等謹按蜀本無一字生田野五月採疥拍腹味辛溫無毒主輕身療痹五月採陰乾常吏之生臣禹錫等謹按蜀本云常更之生味苦平無毒主明目實有刺大如稻米救赦人者味甘有毒主疝痹通氣諸不足生人家宮室五月十月採曝乾丁公寄味甘主金瘡痛延年一名丁父生石間蔓延木上葉細大枝赤莖母大如磧黃有汁七月七日採臣禹錫等謹按陳藏器云丁公寄即丁公藤也城裡赤柱味辛平療婦人漏血白沃陰蝕濕痹邪氣補中益氣生晉平陽城東腐木味鹹溫主心腹痛止泄便膿血臣禹錫等謹按陳藏器云城東腐木即今之城東古木木在土中一名地至主心腹痛鬼氣城東者猶取東牆之土也杜正倫方云古城任木煮湯服主難産此即其類也芥味苦寒無毒主消渴止血婦人疾除痹一名梨葉如大青載味酸無毒主諸惡氣慶味苦無毒主咳嗽腂戶瓦切味甘無毒主益氣延年生山谷中白順理十月採一十五種蟲類雄黃蟲主明目闢兵不祥益氣力狀如蠮螉天社蟲味甘無毒主絶孕益氣如蜂大腰食草木葉三月採桑蠹蟲味甘無毒主心暴痛金瘡肉生不足臣禹錫等謹按陳藏器云桑蠹去氣桃蠹闢鬼皆隨所出而各有功又主小兒乳霍石蠹蟲主石癃小便不利生石中臣禹錫等謹按陳藏器云伊洛間水底石下有蟲如蠶解放絲連綴小石如繭春夏羽化作小蛾水上飛一名石下新婦行夜療腹痛寒熱利血一名負盤陶隱居云今小兒呼屁音屁盤或曰屁𧔪音頻蟲者也臣禹錫等謹按陳藏器云屁盤蟲一名負盤一名夜行蜚蠊又名負盤雖則相似終非一物戎人食之味極辛辣屁盤蟲有短翅飛不遠好夜中出門觸之氣出也蝸籬味甘無毒主燭館明目生江夏臣禹錫等謹按陳藏器云一名師螺小於田螺上有稜生溪水中寒汁主明目下水亦呼為螺麋魚味甘無毒主痹止血丹戩味辛主心腹積血一名飛龍生蜀都如鼠負青股蜚頭赤七月七日採扁前味甘有毒主鼠瘻癃利水道生山陵如牛虻翼赤五月八月採蚖類療痹內漏一名蚖短土色而紋蜚厲主婦人寒熱梗雞味甘無毒療痹益符療閉一名無舌地防令人不飢不渴生黃陵如濡居土中黃蟲味苦療寒熱生地上赤頭長足有角群居七月七日採唐本退二十種六種神農本經一十四種名醫別録薰草味甘平無毒主明目止淚療泄精去臭惡氣傷寒頭痛上氣腰痛一名蕙草生下濕地三月採陰乾脫節者良陶隱居云俗人呼燕草狀如茅而香者為薰草人家頗種之藥録云葉如麻兩兩相對山海經云薰草麻葉而方莖赤花而黑實氣如靡蕪可以已厲今市人皆用燕草此則非今詩書家多用蕙語而竟不知是何草尚其名而迷其實皆此類也臣禹錫等謹按藥性論云薰草亦可單用味苦無毒能治鼻中息肉鼻齆主泄精陳藏器云薰即蕙根此即是零陵香一名燕草姑活味甘溫無毒主大風邪氣濕痹寒痛久服輕身益壽耐老一名冬葵子生河東陶隱居云方藥亦無用此者乃有固活丸取是野葛一名爾此又名冬葵子非葵菜之冬葵子療體乖異唐本注云別録一名雞精也別羇味苦微溫無毒主風寒濕痹身重四肢疼酸寒邪厲節痛一名別枝一名別騎一名鱉羇生藍田川穀二月八月採陶隱居云方家時有用處今俗亦絶爾牡蒿味苦溫無毒主充肌膚益氣令人暴肥不可久服血脈滿盛生田野五月八月採陶隱居云方藥不復用唐本注云齊頭蒿也所在有之葉似防風細薄無光澤石下長卿味鹹平有毒主鬼疰精物邪惡氣殺百精蠱毒老魅注易亡走啼哭悲傷恍惚一名徐長卿生隴西池澤山谷陶隱居云此又名徐長卿恐是誤爾方家無用此處俗中皆不復識也麇俱倫切舌味辛微溫無毒主霍亂腹痛吐逆心煩生水中五月採陶隱居云生小小水中今人五月五日採干以療霍亂良也練石草味苦寒無毒主五癃破石淋膀胱中結氣利水道小便生南陽川澤陶隱居云一名爛石草又云即馬矢蒿弋共味苦寒無毒主驚氣傷寒腹痛羸瘦皮中有邪氣手足寒無色生益州山谷惡玉札蜚蠊菌音談草味鹹平無毒主養心氣除心溫溫辛痛浸淫身熱可作鹽生淮南平澤七月採礬石為之使臣禹錫等謹按藥性論云菌草亦可單用味苦無毒主遍生風瘡壯熱理石為之使五色符味苦微溫主咳逆五臟邪氣調中益氣明目殺蝨青符白符赤符黑符黃符各隨色補其臟白符一名女木生巴郡山谷陶隱居云方藥皆不復用今人並無識者臣禹錫等謹按吳氏云五色石脂一名青赤黃白黑符蘘音襄草味甘苦寒無毒主溫瘧寒熱酸嘶邪氣闢不祥生淮南山谷翹根味甘寒平有小毒主下熱氣益陰精令人面悅好明目久服輕身耐老以作蒸飲酒病人生嵩高平澤二月八月採陶隱居云方藥不復用俗無識者鼠姑味苦平寒無毒主咳逆上氣寒熱鼠瘻惡瘡邪氣一名𧸗音雪生丹水陶隱居云今人不識此鼠姑乃牡丹又名鼠姑罔知孰是船虹味酸無毒主下氣止煩滿可作浴湯藥色黃生蜀郡立秋取陶隱居云方藥不復用俗人無識者屈草味苦微寒無毒主胸脅下痛邪氣腸間寒熱陰痹久服輕身益氣耐老生漢中川澤五月採陶隱居云方藥不復用俗無識者赤赫味苦寒有毒主痂瘍惡敗瘡除三蟲邪氣生益州川穀二月八月採淮木味苦平無毒主久咳上氣傷中虛羸補中益氣女子陰蝕漏下赤白沃一名百歲城中木生晉陽平澤陶隱居云方藥亦不復用占斯味苦溫無毒主邪氣濕痹寒熱疽瘡除水堅積血症月閉無子小兒躄不能行諸惡瘡癰腫止腹痛令女人有子一名炭皮生太山山谷採無時陶隱居云解狼毒毒李云是樟樹上寄生樹大銜枝在肌肉今人皆以胡桃皮當之非是真也按桐君録云生上洛是木皮狀如厚朴色似桂白其理一縱一橫今市人皆削乃似厚朴而無正縱橫理不知此復是何物莫測真假何者為是也臣禹錫等謹按藥性論云占斯臣味辛平無毒能治血症通利月水主脾熱茱萸為之使主洗手足水爛瘡嬰桃味辛平無毒主止泄腸澼除熱調中益脾氣令人好色美志一名牛桃一名英豆實大如麥多毛四月採陰乾陶隱居云此非今果實櫻桃形乃相似而實乖異山間乃時有方藥亦不復用爾鴆直蔭切鳥毛有大毒入五臟爛殺人其口主殺蝮蛇毒一名䲰音運日生南海陶隱居云此乃是兩種鴆鳥狀如孔雀五色雜斑高大黑頸赤喙出交廣深山中䲰日鳥狀如黑傖雞其共禁大朽樹令反覓蛇吞之作聲似云同力故江東人呼為同力鳥並啖蛇人誤食其肉立即死鴆毛羽不可近人而並療蛇毒帶鴆喙亦闢蛇昔時皆用鴆毛為毒酒故名鴆酒頃來不復爾又云有物赤色狀如龍名海薑生海中亦大有毒甚於鴆羽也唐本注云此鳥商州以南江嶺間大有人皆諳識其肉腥有毒亦不堪啖云羽畫酒殺人此是浪證按玉篇引郭璞云鴆鳥大如雕長頸赤喙食蛇又説文廣雅淮南子皆一名運日䲰運同也問交廣人並云䲰日一名鴆鳥一名同力䲰日鳥外更無如孔雀者陶云如孔雀者交廣人誑也今新退一種彼子味甘溫有毒主腹中邪氣去三蟲蛇螫蠱毒鬼疰伏尸生永昌山谷陶隱居云方家從來無用此者古今諸醫及藥家了不復識又一名羆子不知其形何類也唐本注云此彼字當木旁作皮柀仍音披木實也誤入蟲部爾雅云柀一名杉葉似杉木如柏肌軟子名棐子陶於木部出之此條宜在果部中也今注陶隱居不識唐本注以為棐實今據木部下品自有棐實一條而彼子又在蟲魚部中雖同出永昌而主療稍別古今未辨兩注不明今移入於此卷末以俟識者
