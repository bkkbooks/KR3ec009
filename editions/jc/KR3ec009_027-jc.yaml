body:
  text: 卷第二十七己酉新增衍義冬葵子味甘寒無毒主五臟六腑寒熱羸瘦五癃利小便療婦人乳難內閉久服堅骨長肌肉輕身延年生少室山十二月採之黃芩為之使葵根味甘寒無毒主惡瘡療淋利小便解蜀椒毒葉為百菜主其心傷人陶隱居云以秋種葵覆養經冬至春作子謂之冬葵多入藥用至滑利能下石春葵子亦滑不堪余藥用根故是常葵爾葉尤冷利不可多食術家取此葵子微炒令熚音畢灹音吒散著濕地遍踏之朝種暮生遠不過宿又云取羊角馬蹄燒作灰散著於濕地遍踏之即生羅勒俗呼為西王母菜食之益人生菜中又有胡荽蕓薹白苣邪蒿並不可多食大都服藥通忌生菜爾佛家齋忌食薰渠不的知是何菜多言今蕓薹憎其臭矣唐本注云羅勒北人謂之蘭香避石勒諱故也又薰渠者婆羅門云阿魏是言此草苗根似白芷取根汁暴之如膠或截根曬乾並極臭西國持咒人禁食之常食中用之云去臭氣戎人重此猶俗中貴胡椒巴人重負蠜音樊等非蕓薹也臣禹錫等謹按藥性論云冬葵子臣滑平能治五淋主奶腫能下乳汁根治惡瘡小兒吞錢不出煮飲之即出神妙若患天行病後食之頓喪明又葉燒灰及搗干葉末治金瘡煮汁能滑小腸單煮汁主治時行黃病孟詵云葵冷主疳瘡生身面上汁黃者可取根作灰和豬脂塗之其性冷若熱食之令人熱悶甚動風氣久服丹石人時吃一頓佳也冬月葵菹汁服丹石人發動舌乾咳嗽每食後飲一盞便臥少時其子患瘡者吞一粒便作頭女人產時可煮頓服之佳若生時困悶以子一合水二升煮取半升去滓頓服之少時便產日華子云冬葵久服堅筋骨秋葵即是種早者俗呼為葵菜圖經曰冬葵子生少室山今處處有之其子是秋種葵覆養經冬至春作子者謂之冬葵子古方入藥用最多苗葉作菜茹更甘美大抵性滑利能宣導積壅服丹石人尤相宜煮汁單飲亦佳仍利小腸孕婦臨產煮葉食之則胎滑易產曝乾葉及燒灰同作末主金瘡根主惡瘡小兒吞錢煮汁飲之立出凡葵有數種有蜀葵爾雅所謂菺古田切戎葵者是也郭璞云如葵華如槿華戎蜀蓋其所自出因以名之花有五色白者主痎瘧及邪熱陰乾末服之午日取花挪手亦去瘧黃者主瘡癰乾末水調塗之立愈小花者名錦葵功用更強黃葵子主淋澀又令婦人易產又有終葵大莖小葉紫黃色吳人呼為繁露即下品落葵爾雅所謂終葵繁露者是也一名承露俗呼曰胡燕脂子可作婦人塗面及作口脂又有菟葵似葵而葉小狀若藜有毛汋而啖之甚滑爾雅所謂莃菟葵是也亦名天葵葉主淋瀝熱結皆有功效故並載之唐本注此即常食者葵根也左傳能衛其足者是也據此有數種多不入藥用食療主患腫未得頭破者三日後取葵子一百粒吞之當日瘡頭開又凡有難產若生未得者取一合搗破以水二升煮取一升以下只可半升去滓頓服之則小便與兒便出切須在意勿上廁昔有人如此立撲兒入廁中又細銼以水煎服一盞食之能滑小腸女人產時煮一頓食令兒易生天行病後食一頓便失目吞錢不出煮汁冷飲之即出無蒜勿食四季月食生葵令飲食不消化發宿疾又霜葵生食動五種留飲黃葵尤忌聖惠方小兒發斑散惡毒氣用生葵菜葉絞取汁少少與服之外臺秘要天行斑瘡須臾遍身皆戴白漿此惡毒氣永徽四年此瘡自西域東流於海內但煮葵菜葉以蒜齏啖之則止又方治消渴利葵根五大斤切以水五升煮取三升宿不食平旦一服三升又方治口吻瘡掘經年葵根燒灰敷之千金方小兒死腹中葵子末酒服方寸匕若口噤不開格口灌之藥下即活肘後方同又方治妊娠卒下血葵子一升水五升煮取二升分三服瘥又方妊娠患淋葵子一升水三升煮取二升分為二服無葵子用葵根一把肘後方大便不通十日至一月葵子三升水四升煮取一升去滓服不瘥更作又方治卒關格大小便不通支滿欲死葵子二升水四升煮取一升頓服納豬脂如雞子一丸則彌佳經驗後方治一切癰腫無頭以葵菜子一粒新汲水吞下須臾即破如要兩處破服兩粒要破處逐粒加之驗孫真人食忌葵能充脾氣又霜葵多食吐水葵合鯉魚食害人矣必效方治諸瘻先以泔清溫洗以綿拭水取葵菜微火暖貼之瘡引膿不過二三百葉膿盡即肉生忌諸雜魚蒜房室等子母秘錄小兒蓐瘡燒葵根末敷之產寶治妒乳及癰葵莖及子為末酒服方寸匕愈產書治倒生手足冷口噤以葵子炒令黃搗末酒服二錢匕則順衍義曰冬葵子葵菜子也四方皆有苗性滑利不益人患癰癤毒熱內攻未出膿者水吞三五枚遂作竅膿出莧實味甘寒大寒無毒主青盲白翳明目除邪利大小便去寒熱殺蛔蟲久服益氣力不飢輕身一名馬莧一名莫實細莧亦同生淮陽川澤及田中葉如藍十一月採陶隱居云李云即莧菜也今馬莧別一種布地生實至微細俗呼為馬齒莧亦可食小酸恐非今莧實其莧實當是白莧所以云細莧亦同葉如藍也細莧即是糠莧食之乃勝而並冷利被霜乃熟故云十一月採又有赤莧莖純紫能療赤下而不堪食藥方用莧實甚稀斷谷方中時用之唐本注云赤莧一名䕚音匱今莧實一名莫實疑莫字誤矣赤莧味辛寒無毒主赤痢又主射工沙蝨此是赤葉莧也馬莧一名馬齒草味辛寒無毒主諸腫瘻疣目搗揩之飲汁主反胃諸淋金瘡血流破血症癖小兒尤良用汁洗緊唇面皰馬汗射工毒塗之瘥今按陳藏器本草云忌與鱉同食今以鱉細銼和莧於近水濕處置之則變為生鱉紫莧殺蟲毒臣禹錫等謹按蜀本注云圖經說有赤莧白莧人莧馬莧紫莧五色莧凡六種唯人白二莧實入藥用按人莧小白莧大馬莧如馬齒赤莧味辛俱別有功紫及五色二莧不入藥孟詵云莧補氣除熱其子明目九月霜後採之葉亦動氣令人煩悶冷中損腹日華子云莧菜通九竅子益精圖經曰莧實生淮陽川澤及田中今處處有之即人莧也經云細莧亦同葉如藍是也謹按莧有六種有人莧赤莧白莧紫莧馬莧五色莧馬莧即馬齒莧也自見後條入藥者人白二莧俱大寒亦謂之糠莧亦謂之胡莧亦謂之細莧其實一也但人莧小而白莧大耳其子霜後方熟實細而黑主翳目黑花肝風客熱等紫莧莖葉通紫吳人用染菜瓜者諸莧中此無毒不寒兼主氣痢赤莧亦謂之花莧莖葉深赤爾雅所謂蕢赤莧是也根莖亦可糟藏食之甚美然性微寒故主血痢五色莧今亦稀有細莧俗謂之野莧豬好食之又名豬莧集驗方治眾蛇螫人取紫莧搗絞汁飲一升滓以水和塗瘡上又射工毒中人令寒熱發瘡偏在一處有異於常者取赤莧合莖葉搗絞汁飲一升日再瘥陳藏器云陶以馬齒與莧同類蘇亦於莧條出馬齒功用按此二物厥類既殊合從別品食療葉食動氣令人煩悶冷中損腹不可與鱉肉同食生鱉症又取鱉甲如豆片大者以莧菜封裹之置於土坑內上以土蓋之一宿盡變成鱉兒也又五月五日採莧菜和馬齒莧為末等分調與妊娠服之易產衍義曰莧實入藥亦稀苗又謂之人莧人多食之莖高而葉紅黃二色者謂之紅人莧可淹菜用胡荽味辛溫一云微寒微毒消穀治五臟補不足利大小腸通小腹氣拔四肢熱止頭痛療沙疹豌豆瘡不出作酒噴之立出通心竅久食人多忘發腋臭腳氣根發痼疾子主小兒禿瘡油煎敷之亦主蠱五痔及食肉中毒下血煮冷取汁服幷州人呼為香荽入藥炒用陳藏器胡荽防風注蘇云防風子似胡荽味辛溫消穀久食令人多忘發腋臭根發痼疾子主小兒禿瘡油煎敷之亦主蠱毒五野雞病及食肉中毒下血煮令子拆服汁石勒諱胡並汾人呼為香荽也食療平利五臟補筋脈主消穀能食若食多則令人多忘又食著諸毒肉吐下血不止頓痞黃者取淨胡荽子一升煮食腹破取汁停冷服半升一日一夜二服即止又狐臭䘌齒病人不可食疾更加久冷人食之腳弱患氣彌不得食又不得與斜蒿同食食之令人汗臭難瘥不得久食此是薰菜損人精神秋冬搗子醋煮熨腸頭出甚效可和生菜食治腸風熱餅裹食甚良外臺秘要主齒疼胡葈子五升應是胡荽子也以水五升煮取一升含之經驗後方治小兒胗豆欲令速出宜用胡荽三二兩切以酒二大盞煎令沸沃胡荽便以物合定不令泄氣候冷去滓微微從項以下噴一身令遍除面不噴孫真人食之令人多忘發痼疾胡臭䘌齒口氣臭金瘡兵部手集治孩子赤丹不止以汁敷之瘥譚氏方同必效方治蠱毒神驗以根絞汁半升和酒服之立下又治熱氣結殢經年數發以半斤五月五日採陰乾水七升煮取一升半去滓分服未瘥更服春夏葉秋冬莖根並用亦可預備之子母秘錄治肛帶出切一升燒以煙燻肛即入邪蒿味辛溫平無毒似青蒿細軟主胸膈中臭爛惡邪氣利腸胃通血脈續不足氣生食微動風氣作羹食良不與胡荽同食令人汗臭氣食醫心鏡治五臟邪氣厭谷者治脾胃腸澼大渴熱中暴疾惡瘡以煮令熟和醬醋食之同蒿平主安心氣養脾胃消水飲又動風氣燻人心令人氣滿不可多食羅勒味辛溫微毒調中消食去惡氣消水氣宜生食又療齒根爛瘡為灰用甚良不可過多食壅關節澀營衛令血脈不行又動風髮腳氣患啘取汁服半合定冬月用乾者煮之子主目翳及物入目三五顆致目中少頃當濕脹與物俱出又療風赤眵淚根主小兒黃爛瘡燒灰敷之佳北人呼為蘭香為石勒諱也此有三種一種堪作生菜一種葉大二十步內聞香一種似紫蘇葉陶隱居術家取羊角馬蹄燒作灰撒於濕地遍踏之即生羅勒俗呼為西王母菜食之益人外臺秘要治面上滅瘢方木蘭香一斤以三歲米醋浸令沒百日出曝乾為末以敷之用醋漿漬百日出曬乾末服方寸匕石胡荽寒無毒通鼻氣利九竅吐風痰不任食亦去翳熟挪納鼻中翳自落俗名鵝不食草以上五種新補見孟詵陳藏器蕭炳陳士良日華子蕪菁及蘆菔味苦溫無毒主利五臟輕身益氣可長食之蕪菁子主明目陶隱居云蘆菔是今溫菘其根可食葉不中啖蕪菁根乃細於溫菘而葉似菘好食西川唯種此而其子與溫菘甚相似小細爾俗方無用服食家亦煉餌之而不云蘆菔子恐不用也俗人蒸其根及作菹皆好但小熏臭爾又有𦯼根細而過辛不宜服之唐本注云蕪菁北人名蔓荊根葉及子乃是菘類與蘆菔全別至於體用亦殊今言蕪菁子似蘆菔或謂蘆菔葉不堪食兼言小薰體是江表不產二物斟酌注銘理喪其真爾其蔓荊子療黃疸利小便水煮三升取濃汁服主癥瘕積聚少飲汁主霍亂心腹脹末服主目暗其蘆菔別顯後條今按陳藏器本草云蕪菁主急黃黃疸及內黃腹結不通搗為末水絞汁服當得嚏鼻中出黃水及下痢仙經云長服可斷谷長生和油敷蜘蛛咬恐毒入肉亦搗為末酒服蔓荊園中無蜘蛛是其相畏也為油入面膏令人去黑䵟今並汾河朔間燒食其根呼為蕪根猶是蕪菁之號蕪菁南北之通稱也塞北種者名九英蔓荊根大並將為軍糧菘菜南土所種多是也臣禹錫等謹按爾雅云須薞蕪釋曰詩穀風云採葑採菲毛云葑須也先儒即以須葑蓯當之孫炎云須一名葑蓯郭注云薞蕪似羊蹄葉細味酢可食禮坊記注云葑蔓荊也陳宋之間謂之葑陸機云葑蕪菁幽州人謂之芥方言云蘴蕘蕪菁也陳楚謂之蘴齊魯謂之蕘關西謂之蕪菁趙魏之部謂之大芥蘴葑音同然則葑也須也蕪菁也蔓荊也薞蕪也蕘也芥也七者一物也孟詵云蔓荊消食下氣其子九蒸九曝搗為粉服之長生壓油塗頭能變蒜髮又研子入面脂極去皺又搗子水和服治熱黃結實不通少頃當瀉一切惡物沙石草發並出又利小便又女子妒乳腫取其根生搗後和鹽醋漿水煮取汁洗之五六度瘥又搗和雞子白封之亦妙蕭炳云蔓荊子別入丸藥用令人肥健尤宜婦人劉禹錫嘉話錄云諸葛亮所止令兵士獨種蔓荊者取其才出甲可生啖一也葉舒可煮食二也久居則隨以滋長三也棄不令惜四也回則易而採五也冬有根可斫而食六也比諸蔬屬其利不亦敷矣三蜀之人今呼蔓荊為諸葛菜江陵亦然日華子云蔓荊梗短葉大連地上生闊葉紅色者是蔓荊圖經曰蕪菁及蘆菔舊不著所出州土今南北皆通有之蕪菁即蔓荊也蘆菔即下萊菔音卜今俗呼蘿葍是也此二菜北土種之尤多蕪菁四時仍有春食苗夏食心亦謂之苔子秋食莖冬食根河朔尤多種亦可以備飢歲菜中之最有益者唯此耳常食之通中益氣令人肥健嘉話錄云諸葛亮所止令兵士獨種蔓荊者取其才出甲可生啖一也葉舒可煮食二也久居則隨以滋長三也棄不令惜四也回即易尋而採之五也冬有根可斫食六也比諸蔬屬其利不亦敷乎劉禹錫曰信矣三蜀江陵之人今呼蔓荊為諸葛菜是也其實夏秋熟時採之仙方亦單服用水煮三過令苦味盡曝乾搗篩水服二錢匕日三久增服可以辟穀又治發黃下小腸藥用之又主青盲崔元亮海上方云但瞳子不壞者療十得九愈蔓荊子六升一物蒸之看氣遍合甑下以釜中熱湯淋之乃曝令乾還淋如是三遍即取杵篩為末食上清酒服二寸匕日再塗面膏亦有用者又療乳癰痛寒熱者取蔓荊根並葉淨擇去土不用水洗以鹽搗敷乳上熱即換不過三五易之即瘥冬月無葉但空用根亦可切須避風耳南人取北種種之初年相類至二三歲則變為菘矣萊菔功用亦同然力猛更出其右斷下方亦用其根燒熟入藥尤能制面毒昔有婆羅門僧東來見食麥面者云此大熱何以食之又見食中有蘆菔云賴有此以解其性自此相傳食麵必啖蘆菔凡人飲食過度飽宜生嚼之佳子研水服吐風涎甚效此有大小二種大者肉堅宜蒸食小者白而脆宜生啖爾雅所謂葖蘆肥郭璞云紫花菘也俗呼溫菘似蕪菁大根一名葖俗呼雹突然則紫花菘溫菘皆南人所呼也吳人呼楚菘廣南人呼秦菘河朔蘆菔極有大者其說舊矣而江南有國時有得安州洪州信陽者甚大重至五六斤或近一秤亦一時種蒔之力也又今醫以治消渴其方出了子蘿蔔三枚淨洗簿切曝乾一味搗羅為散每服二錢煎豬肉湯澄清調下食後臨臥日三服漸增至三錢瘥食療溫下氣治黃疸利小便根主消渴治熱毒風腫食令人氣脹滿聖惠方治風疹入腹身體強舌乾躁硬用蔓荊子三兩為末每服溫酒下一錢匕外臺秘要治心腹脹蔓荊子一大合揀淨搗熟研水一升更和研濾取汁可得一盞頓服之少頃自得轉利或亦自吐腹中自寬或得汗愈又方陰黃汗染衣涕唾黃取蔓菁子搗末平旦以井花水服一匙日再加至兩匙以知為度每夜小便重浸少許帛子各書記日色漸退白則瘥不過服五升以來又方輕身益氣明目蕪菁子一升水九升煮令汁盡曬乾如此三度搗末水服方寸匕日三又方治瘭疽著手足肩背累累如米起色白刮之汁出復發熱蕪菁子熟搗帛裹敷之爛止千金方治頭禿蕪菁子末酢和敷之日三又方治血䵟面皺取子爛研入常用面脂中良又方常服明目洞視肥腸蕪菁子三升以苦酒三升煮令熟曬乾末下篩以井花水服方寸匕加至三匕日三無所忌肘後方治豌豆瘡蔓荊根搗汁挑瘡破敷在上三食頃根出又方犬咬人重發治之服蔓荊汁佳葛氏方卒腫毒起急痛蕪菁根大者削去上皮熟搗苦酒和如泥煮三沸急攪之出敷腫帛裹上日再三易經驗後方治虛勞眼暗採三月蔓荊花陰乾為末以井花水每空心調下二錢匕久服長生可夜讀書孫真人食忌治黃疸皮膚眼睛如金色小便赤生蔓荊子末熟水調下方寸匕日三又方主一切熱腫毒取生蔓荊根一握鹽花入少訖和搗敷腫上日三易集療男子陰腫如斗大核痛人所不能治者蕪菁根搗敷之兵部手集治奶癰疼痛寒熱敷救十餘人方蔓荊根葉淨擇去土不用洗以鹽搗敷乳上熱即換不過三五度冬無葉即用根切須避風傷寒類要神仙教子法立春後有庚子日溫蕪菁汁合家大小並服不限多少可理時疾又方急黃服蔓荊子油一盞頓服之臨時無油則蔓荊子杵汁水和之服亦得候顏色黃或精神急用之有效子母秘錄治妊娠小便不利蕪菁子末水服方寸匕日二楊氏產乳同抱朴子大醋煮蕪菁子令熟曬乾為末井花水服方寸匕日三盡一斗能夜視有所見荊楚歲時記採經霜者干之詩云我有旨蓄可以御冬衍義曰蕪菁蘆菔二菜也蘆菔即蘿蔔也蕪菁今世俗謂之蔓荊夏則枯當此之時蔬圃中複種之謂之雞毛菜食心正在春時諸菜之中有益無損於世有功採擷之餘收子為油根過食動氣河東太原所出極大他處不及也又出吐谷渾後於萊菔條中爾雅釋但名蘆菔今謂之蘿蔔是也則蕪菁條中不合更言及蘆菔二字顯見重複從爾雅為正瓜蒂味苦寒有毒主大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病在胸腹中皆吐下之去鼻中息肉療黃疸花主心痛咳逆生嵩高平澤七月七日採陰乾陶隱居云瓜蒂多用早青蒂此云七月採便是甜瓜蒂也人亦有用熟瓜蒂者取吐乃無異此只於論其蒂所主爾今瓜例皆冷利早青者尤甚熟瓜乃有數種除瓤食之不害人若覺多即入水自漬便即消永嘉有寒瓜甚大今每取藏經年食之亦有再熟瓜又有越瓜人作菹食之亦冷並非藥用爾今注甜瓜有青白二種入藥當用青瓜蒂前條白瓜子唐注云甘瓜子入腹內結聚破潰膿血最為腸胃脾內壅要藥正是此甜瓜子之功前條便以白瓜子為甘瓜子非也臣禹錫等謹按藥性論云瓜蒂使莖主鼻中息肉齆鼻和小豆丁香吹鼻治黃日華子云無毒治腦塞熱齆眼昏吐痰圖經曰瓜蒂即甜瓜蒂也生嵩高平澤今處處有之亦園圃所蒔舊說瓜有青白二種入藥當用青瓜蒂七月採陰乾方書所用多入吹鼻及吐膈散中莖亦主鼻中息肉齆鼻等葉主無發搗汁塗之即生花主心痛咳逆肉主煩渴除熱多食則動痼疾又有越瓜色正白生越中胡瓜黃色亦謂之黃瓜別無功用食之亦不益人故可略之雷公凡使勿用白瓜蒂要採取青綠色瓜待瓜氣足其瓜蒂自然落在蔓莖上採得未用時使榔榔葉裹於東牆有風處掛令吹乾用瓜子凡使勿用瓜子實恐誤採得後便於日中暴令內外干便杵用馬尾篩篩過成粉末了用其藥不出油其效力短若要出油生杵作膏用三重紙裹用重物覆壓之取無油用食療瓜蒂主身面四肢浮腫殺蠱去鼻中息肉陰黃黃疸及暴急黃取瓜蒂丁香各七枚小豆七粒為末吹黑豆許於鼻中少時黃水出瘥其子熱補中宜人瓜有毒止渴益氣除煩熱利小便通三焦壅塞氣多食令人陰下濕癢生瘡動宿冷病症癖人不可食之若食之飽脹入水自消多食令人惙惙虛弱腳手無力葉生搗汁生髮又補中打損折碾末酒服去瘀血治小兒疳龍魚河圖云瓜有兩鼻者殺人沉水者殺人食多腹脹可食鹽花成水聖惠方治時氣三日處忽覺心滿堅硬腳手心熱變黃不治殺人以瓜蒂七枚杵末如大豆許吹兩鼻中令黃水出殘末水調服之得吐黃水一二升瘥又方治鼻中息肉陳瓜蒂一分為末羊脂和少許敷息肉上日三經驗方治遍身如金色瓜蒂四十九個須是六月六日收者丁香四十九個用甘鍋子燒煙盡為度細研為末小兒用半字吹鼻內及揩牙大人只用一字吹鼻內立瘥經驗後方治大人小兒久患風癇纏喉風㗇嗽遍身風疹急中涎潮等此藥不大吐逆只出涎水小兒服一字瓜蒂不限多少細碾為末壯年一字十五巳下老怯半字早晨井花水下一食頃含沙糖一塊良久涎如水出年深涎盡有一塊如涎布水上如鑑矣涎盡食粥一兩日如吐多困甚即咽麝香湯一盞即止矣麝細研溫水調下昔天平尚書覺昏眩即服之取涎有效傷寒類要治急黃心上堅硬渴欲得水吃氣息喘粗眼黃但有一候相當則以瓜蒂二小合熬赤小豆二合為末暖漿水五合服方寸匕一炊久當吐不吐再服五分匕亦減之若吹鼻中兩三黑豆許黃水出歇又方治黃疸目黃不除瓜丁散瓜丁細末如大豆許納鼻中令病人深吸取鼻中黃水出衍義曰瓜蒂此即甜瓜蒂也去瓜皮用蒂約半寸許曝極干不限多少為細末量疾每用一二錢匕膩粉一錢匕以水半合同調勻灌之治風涎暴作氣塞倒臥服之良久涎自出或覺有涎用諸藥行化不下但如此服涎即出或服藥良久涎未出含沙糖一塊下咽即涎出此物甚不損人全勝石碌硇砂輩白冬瓜味甘微寒主除小腹水脹利小便止渴陶隱居云被霜後合取置經年破取核水洗燥乃擂取仁用之冬瓜性冷利解毒消渴止煩悶直搗絞汁服之今注此物經霜後皮上白如粉塗故云白冬瓜也前條即冬瓜子之功此乃說皮肉之效爾陶注為子仁非也臣禹錫等謹按藥性論云冬瓜練亦可單用味甘平汁止煩躁熱練壓丹石毒止熱渴利小腸能除消渴差五淋孟詵云冬瓜益氣耐老除胸心滿去頭面熱熱者食之佳冷者食之瘦人日華子云冬瓜冷無毒除煩治胸膈熱消熱毒癰腫切摩痱子甚良葉殺蜂可修事蜂兒並㶸腫毒及蜂疔藤燒灰可出繡點黯洗黑䵟並洗瘡疥濕穰亦可漱練白縑食療益氣耐老除心胸滿取瓜子七升下同白瓜條壓丹石又取瓜一顆和桐葉與豬肉食之一冬更不要與諸物食自然不飢長三四倍矣又煮食之練五臟為下氣故也欲得瘦輕健者則可長食之若要肥則勿食孟詵說肺熱消渴取濮瓜去皮每食後嚼吃三二兩五七度良千金方治小兒渴利單搗冬瓜汁飲之肘後方發背欲死方取冬瓜截去頭合瘡上瓜當爛截去更合之瓜末盡瘡已斂小矣即用膏養之小品方食魚中毒冬瓜汁最驗孫真人九月勿食被霜瓜食之令人成反胃病古今錄驗治傷寒後痢日久津液枯竭四肢浮腫口乾冬瓜一枚黃土泥厚裹五寸煨令爛熟去土絞汁服之兵部手集治水病初得危急冬瓜不限多少任吃神效無比子母秘錄小兒生一月至五個月乍寒乍熱炮冬瓜絞汁服楊氏產乳療渴不止燒冬瓜絞取汁細細飲之盡更作丹房鏡源冬瓜蔓灰煮汞及丹砂淬銅錫衍義曰白冬瓜一二斗許大冬月收為菜壓去汁蜜煎代果患發背及一切癰疸削一大塊置瘡上熱則易之分散熱毒氣甚良白瓜子味甘平寒無毒主令人悅澤好顏色益氣不飢久服輕身耐老主除煩滿不樂久服寒中可用面脂令面悅澤一名水芝一名白爪側絞切子生嵩高平澤冬瓜仁也八月採唐本注云經云冬瓜仁也八月採之以下為冬瓜仁說非謂冬瓜別名據經及下條瓜蒂並生嵩高平澤此即一物但以甘字似白字後人誤以為白也若其不是甘瓜何因一名白瓜此即甘瓜不惑且朱書論白瓜之效墨書說冬瓜之功功異條同陶為深誤按廣雅冬瓜一名地芝與甘瓜全別墨書宜附冬瓜科下瓜蒂與甘瓜共條別錄云甘瓜子主腹內結聚破潰膿血最為腸胃脾內壅要藥本草以為冬瓜但用蒂不雲子也今腸癰湯中用之俗人或用冬瓜子也又按本草云瓜子或云甘瓜子今此本誤作白字當改從甘也今按此即冬瓜子也唐注稱是甘瓜子謂甘字似白字後人誤以為白此之所言何孟浪之甚耶且本經云主令人悅澤別錄云可作面脂令人悅澤而又面脂方中多用冬瓜仁不見用甘瓜子按此即是冬瓜子明矣故陶於後條注中雲取核水洗燥乃檑取仁用之且此物與甘瓜全別其甘瓜有青白二種子色皆黃主療與白瓜子有異而冬瓜皮雖青經霜亦有白衣其中子白白瓜子之號因斯而得況陶居以別錄白冬瓜附於白瓜子之下白瓜子更不加註足明一物而不能顯辨爾別錄瓜字側絞切今以讀作瓜字唐注謬誤都不可憑臣禹錫等謹按蜀本注蘇云是甘瓜子也圖經云別有胡瓜黃赤無味今據此兩說俱不可憑矣本經云冬瓜仁也蘇注蓋以冬瓜色青乃云是甘瓜者且甘瓜自有青白二種只合云白甘瓜也今據本經云白瓜子即冬瓜仁無疑也按冬瓜雖色青而其中子甚白謂如白瓜子者猶如虫部有白龍骨焉人但看骨之白而不知龍之色也若以甘瓜子為之則甘瓜青白二種其子並黃色而千金面藥方只用冬瓜仁信蘇注為妄圖經難憑矣孟詵云取冬瓜仁七升以絹袋盛之投三沸湯中須臾出曝乾如此三度止又與清苦酒漬經一宿曝乾為末日服之方寸匕令人肥悅明目延年不老又取子三五升退去皮搗為丸空腹服三十丸令人白淨如玉日華子云冬瓜仁去皮膚風剝黑䵟潤肌膚圖經曰白瓜子即冬瓜仁也生嵩高平澤今處處有之皆園圃所蒔其實生苗蔓下大者如斗而更長皮厚而有毛初生正青綠經霜則白如塗粉其中肉及子亦白故謂之白瓜仁家多藏蓄彌年作菜果入藥須霜後合取置之經年破出核洗燥乃擂取仁用之亦堪單作服餌又有末作湯飲又作面藥並令人顏色光澤宗懍荊楚歲時記云七月採瓜犀以為面脂犀瓣也瓤亦堪作澡豆其肉主三消渴疾解積熱利大小腸壓丹石毒廣雅一名地芝是也皮可作丸服亦入面脂中功用與上等外臺秘要補肝散治男子五勞七傷明目白瓜子七升絹袋盛絞沸湯中三遍訖以酢五升漬一宿曝乾搗下篩酒服方寸匕日三久服瘥孫真人治多年損傷不瘥熬瓜子末溫酒服之衍義曰白瓜子實冬瓜仁也服食中亦稀用甜瓜寒有毒止渴除煩熱多食令人陰下濕癢生瘡動宿冷病發虛熱破腹又令人惙惙弱腳手無力少食即止渴利小便通三焦間擁塞氣兼主口鼻瘡臣禹錫等謹按日華子云無毒葉治人無發搗汁塗之即生圖經文具瓜蒂條下陳藏器序云甘瓜子止月經太過為末去油水調服千金方治口臭杵干甜瓜子作末蜜和丸每旦洗淨漱含一丸如棗核大亦用敷齒孫真人食忌患腳氣人勿食甜瓜其患永不除又五月甜瓜沉水者殺人又多食發黃疸病動冷疾令人虛羸解藥力兩蒂者殺人食醫心鏡治熱去煩渴甜瓜去皮食後吃之煮皮作羹亦佳衍義曰甜瓜暑月服之永不中暑氣多食未有不下利者貧下多食至深秋作痢為難治為其消損陽氣故也亦可以如白甜瓜煎漬收胡瓜葉味苦平小毒主小兒閃癖一歲服一葉以上斟酌與之生挪絞汁服得吐下根搗敷胡刺毒腫其實味甘寒有毒不可多食動寒熱多瘧病積瘀熱發疰氣令人虛熱上逆少氣發百病及瘡疥損陰血脈氣髮腳氣天行後不可食小兒切忌滑中生疳蟲不與醋同餐北人亦呼為黃瓜為石勒諱因而不改以上二種新補見千金方及孟詵陳藏器日華子圖經文具瓜蒂條下千金髓水病肚脹至四肢腫胡瓜一個破作兩片不出子以醋煮一半水煮一半俱爛空心頓服須臾下水孫真人主蛇咬取胡瓜敷之數易良越瓜味甘寒利腸胃止煩渴不可多食動氣發諸瘡令人虛弱不能行不益小兒天行病後不可餐又不得與牛乳酪及鮓同餐及空心食令人心痛今附臣禹錫等謹按陳藏器云越瓜大者色正白越人當果食之利小便去煩熱解酒毒宣泄熱氣小者糟藏之為灰敷口吻瘡及陰莖熱瘡圖經文具瓜蒂條下食療小兒夏月不可與食又發諸瘡令人虛弱冷中常令人臍下為症痛不止又天行病後不可食醫心鏡越瓜鮓久食益腸胃和飯作鮓並齏菹之並得白芥味辛溫無毒主冷氣色白甚辛美從西戎來子主射工及疰氣上氣發汗胸膈痰冷面黃生河東今附臣禹錫等謹按陳藏器云白芥生太原如芥而葉白為茹食之甚美日華子云白芥能安五臟功用與芥頗同子燒及服可辟邪魅圖經文具芥條下陳藏器云主冷氣子主上氣發汗胸膈痰冷面目黃赤亦入鎮宅用之外臺秘要治氣小芥子一升搗碎以絹袋盛好酒二升浸七日空心溫服三合日二服千金方治反胃吐食上氣小芥子曬乾為末酒服方寸匕又方三種射工即水弩子以芥子杵令熟苦酒和厚敷上半日痛即便止又方治遊腫諸癰以芥子末豬膽和如泥敷上日三易之肘後方治中風卒不得語以苦酒煮芥子敷頸一周以帛苞之一日一夕乃瘥芥味辛溫無毒歸鼻主除腎邪氣利九竅明耳目安中久食溫中陶隱居云似菘而有毛味辣好作菹亦生食其子可藏冬瓜又有莨音郎以作菹甚辣快唐本注云此芥有三種葉大粗者葉堪食子入藥用熨惡疰至良葉小子細者葉不堪食其子但堪為齏爾又有白芥子粗大白色如白粱米甚辛美從戎中來別錄云子主射工及疰氣發無當常處丸服之或搗為末醋和塗之隨手有驗臣禹錫等謹按蜀本圖經云一種葉大子白且粗名曰胡芥啖之及藥用最佳而人間未多用之孟詵云芥煮食之亦動氣生食發丹石不可多食日華子云除邪氣止咳嗽上氣冷氣疾子治風毒腫及麻痹醋研敷之撲損瘀血腰痛腎冷和生薑研微暖塗貼心痛酒醋服之圖經曰芥舊不著所出州土今處處有之似菘而有毛味極辛辣此所謂青芥也芥之種亦多有紫芥莖葉純紫多作齏者食之最美有白芥子粗大色白如粱米此入藥者最佳舊云從西戎來又云生河東今近處亦有其餘南芥旋芥花芥石芥之類皆菜茹之美者非藥品所須不復悉錄大抵南土多芥亦如菘類相傳嶺南無蕪菁有人攜種至彼種之皆變作芥言地氣暖使然耳續傳信方主腹冷夜起以白芥子一升炒熟勿令焦細研以湯浸蒸餅丸如赤小豆薑湯吞七丸甚效食療主咳逆下氣明目去頭面風大葉者良煮食之動氣猶勝諸菜生食發丹石其子微熬研之作醬香美有辛氣能通利五臟其葉不可多食又細葉有毛者殺人聖惠方治走注風毒疼痛用小芥子末和雞子白調敷之又方婦人中風口噤舌本縮用芥子一升細研以醋三升煎取一升用敷頷頰下立效外臺秘要治聾芥子搗碎以人乳調和綿裹塞耳瘥孫真人芥菜合兔肉食之成惡瘡廣濟方治瘻有九種不過此方取芥子搗碎以水及蜜和滓敷喉上下干易之子母秘錄小兒緊唇搗馬芥子汁令先揩唇血出敷之日七遍馬芥即刺芥也左傳季氏與郈氏鬥雞季氏金其距郈氏芥其羽注云施芥於羽令辛衍義曰芥似蕪菁葉上紋皺起色尤深綠為異子與苗皆辛子尤甚多食動風一品紫芥與此無異紫色可愛人多食之然亦動風又白芥子比諸芥稍大其色白入藥用萊菔音卜根味辛甘溫無毒散服及炮煮服食大下氣消穀去痰癖肥健人生搗汁服主消渴試大有驗唐本注云陶謂溫菘是也其嫩葉為生菜食之大葉熟啖消食和中根效在蕪菁之右今注俗呼為蘿蔔唐本先附臣禹錫等謹按蜀本圖經云名蘆卜生江北秦晉最多爾雅云葖蘆萉釋曰紫花菘也俗呼溫菘似蕪菁大根一名葖俗呼雹葖一名蘆菔今謂之蘿蔔是也蕭炳云蘿蔔根消食利關節理顏色練五臟惡氣制面毒凡人飲食過度生嚼咽之便消研如泥制面作餺飥佳飽食亦不發熱亦主肺嗽吐血酥煎食下氣孟詵云蘿蔔性冷利五臟輕身根服之令人白淨肌細日華子云蘿蔔平能消痰止咳治肺痿吐血溫中補不足治勞瘦咳嗽和羊肉鯽魚煮食之子水研服吐風痰醋研消腫毒不可以地黃同食圖經文具蕪菁條下孫真人久服澀營衛令人發早白食醫心鏡治消渴口乾蘿蔔絞汁一升飲之則定又方主積年上氣咳嗽多痰喘促唾膿血以子一合研煎湯食上服之又方下氣消穀去痰癖肥健作羹食之生絞汁服理消渴簡要濟眾治消渴獨勝散出子了蘿蔔三枚淨洗薄切曬乾為末每服二錢煎豬肉汁澄清調下食後並夜臥日三服勝金方治風痰以蘿蔔子為末溫水調一匙頭良久吐出涎沫如是攤緩風以此吐後用緊疏藥服疏後服和氣散瘥又方治肺疾咳嗽以子半升淘擇洗焙乾於銚子內炒令黃熟為末以沙糖丸如彈綿裹含之洞微志蘿蔔解面毒楊文公談苑江東居民歲課種藝初年種芋三十畝計省米三十斛次年種蘿蔔三十畝計益米三十斛可知蘿蔔消食也爾雅葖蘆萉郭璞注萉為菔蕪菁屬紫花大根俗呼雹葖更始敗掖庭中宮女數百人幽閉殿門內掘庭中蘆菔根食之今蘿蔔是也偏頭疼用生蘿蔔汁一蜆殼仰臥注之鼻左痛注左右痛注右左右俱注亦得神效衍義曰萊菔根即前條所謂蘆菔今人只謂之蘿蔔河北甚多登萊亦好服地黃何首烏人食之則令人髭發白世皆言草木中唯此下氣速者為其辛也不然如生薑芥子又辛也何止能散而已萊菔辛而又甘故有散緩而又下氣速也散氣用生薑下氣用萊菔菘音嵩味甘溫無毒主通利腸胃除胸中煩解酒渴陶隱居云菜中有菘最為常食性和利人無餘逆忤今人多食如似小冷而又耐霜雪其子可作油敷頭長髮塗刀劍令不鏽音秀其有數種猶是一類正論其美與不美爾服藥有甘草而食菘即令病不除唐本注云菘菜不生北土有人將子北種初一年半為蕪菁二年菘種都絕將蕪菁子南種亦二年都變土地所宜頗有此例其子亦隨色變但粗細無異爾菘子黑蔓荊子紫赤大小相似唯蘆菔子黃赤色大數倍復不圓也其菘有三種有牛肚菘葉最大厚味甘紫菘葉薄細味少苦白菘似蔓荊也臣禹錫等謹按陳藏器云去魚腥動氣發病姜能制其毒葉大多毛者是蕭炳云北人居南方不勝土地之宜遂病足尤宜忌菘菜又云消食下氣治瘴氣止熱氣嗽冬汁尤佳日華子云涼微毒多食發皮膚風瘙癢梗長葉瘦高者為菘葉闊厚短肥而痹及梗細者為蕪菁菜也陳士良云紫花菘平無毒行風氣去邪熱氣花可以糟下酒藏甚美爾雅云苞葖菜吳人呼楚菘廣南人呼秦菘此菘苔不毒宜食之圖經曰菘舊不載所出州土今南北皆有之與蕪菁相類梗長葉不光者為蕪菁梗短葉闊厚而肥痹者為菘舊說菘不生北土人有將子北土種之初一年半為蕪菁二年菘種都絕猶南人之種蕪菁而今京都種菘都類南種但肥厚差不及耳揚州一種菘葉圓而大或若萐啖之無滓絕勝他土者此所謂白菘也又有牛肚菘葉最大厚味甘疑今揚州菘近之紫菘葉薄細味小苦北土無有菘比蕪菁有小毒不宜多食然能殺魚腥最相宜也多食過度唯生薑可解其性食療溫治消渴又發諸風冷有熱人食之亦不發病即明其性冷本草云溫未解又消食亦少下氣九英菘出河西葉極大根亦粗長和羊肉甚美常食之都不見發病其冬月作菹煮作羹食之能消宿食下氣治嗽諸家商略性冷非溫恐誤也又北無菘菜南無蕪菁其蔓荊子細菜子粗也聖惠方治酒醉不醒用菘菜子二合細研井華水一盞調為二服食醫心鏡主通利腸胃除胸中煩熱解酒渴菘菜二斤煮作羹啜之止渴作齏菹食亦得傷寒類要闢溫病菘菜如粟米酒服方寸匕日三闢五年溫又方治發背杵地菘汁一升日再服以瘥止子母秘錄主小兒赤遊行於上下至心即死杵菘菜敷上衍義曰菘菜張仲景傷寒論凡用甘草皆禁菘菜者是此菘菜也葉如蕪菁綠色差淡其味微苦葉嫩稍闊不益中虛人食之覺冷苦菜味苦寒無毒主五臟邪氣厭於協切伏也谷胃痹腸澼渴熱中疾惡瘡久服安心益氣聰察少臥輕身耐老耐飢寒高氣不老一名荼草一名選一名遊冬生益州川穀山陵道旁凌冬不死三月三日採陰乾陶隱居云疑此即是今茗茗一名荼又令人不眠亦凌冬不凋而嫌其只生益州益州乃有苦菜正是苦𧄹音式爾上卷上品白英下已注之桐君錄云苦菜三月生扶疏六月花從葉出莖直黃八月實黑實落根復生冬不枯今茗極似此西陽武昌及廬江晉熙皆好東人正作青茗茗皆有浡飲之宜人凡所飲物有茗及木葉天門冬苗並菝葜皆益人余物並冷利又巴東間別有真茶火煏作卷結為飲亦令人不眠恐或是此俗中多煮檀葉及大皂李作茶並冷又南方有瓜蘆木亦似茗苦澀取其葉作屑煮飲汁即通夜不睡煮鹽人唯資此飲而交廣最所重客來先設乃加以香芼音耄輩唐本注云苦菜詩云誰謂荼苦又云堇荼如飴皆苦菜異名也陶謂之茗茗乃木類殊非菜流茗春採為苦荼音遲遐反非途音也按爾雅釋草云荼苦菜釋木云檟苦荼二物全別不得為例又顏氏家訓按易通卦驗玄圖曰苦菜生於寒秋經冬歷春得夏乃成一名遊冬葉似苦苣而細斷之有白汁花黃似菊此則與桐君略同今所在有之苦𧄹乃龍葵爾俗亦名苦菜非荼也臣禹錫等謹按蜀本圖經云春花夏實至秋復生花而不實經冬不凋陳藏器云苦𧄹味苦寒有小毒搗葉敷小兒閃癖煮汁服去暴熱目黃秘塞葉極似龍葵但龍葵子無殼苦𧄹子有殼蘇云是龍葵誤也人亦呼為小苦耽崔豹古今注云苦𧄹一名𧄹子有實形如皮弁子圓如珠月令王瓜生苦菜秀衍義曰苦菜四方皆有在北道則冬方雕斃生南方則冬夏常青此月令小滿節後所謂苦菜秀者是此葉如苦苣更狹其綠色差淡折之白乳汁出常常點瘊子自落味苦花與野菊相似春夏秋皆旋開花去中熱安心神荏子味辛溫無毒主咳逆下氣溫中補體葉主調中去臭氣九月採陰乾陶隱居云荏狀如蘇高大白色不甚香其子研之雜米作糜甚肥美下氣補益東人呼為䔡音魚以其似蘇字但除禾邊故也笮其子作油日煎之即今油帛及和漆所用者服食斷谷亦用之名為重油唐本注云別錄荏葉人常生食其子故不及蘇也今按陳藏本草云荏葉搗敷蟲咬及男子陰腫江東以荏子為油北土以大麻為油此二油俱堪油物若其和漆荏者為強爾臣禹錫等謹按孟詵云荏子其葉性溫用時搗之治男子陰腫生搗和醋封之女人綿裹內三四易蕭炳云又有大荏形似野荏高大葉大小荏一倍不堪食人收其子以充油絹帛與大麻子同其小荏子欲熟人採其角食之甚香美大荏葉不堪食日華子云荏調氣潤心肺長肌膚益顏色消宿食止上氣咳嗽去狐臭敷蛇咬子下氣止嗽補中填精髓食療主咳逆下氣其葉杵之治男子陰腫謹按子壓作油用亦少破氣多食發心悶溫補中益氣通血脈填精髓可蒸令熟烈曬乾之當口開春取米食之亦可休糧生食止渴潤肺梅師方治虺中人以荏葉爛杵豬脂和薄敷上黃蜀葵花治小便淋及催生又主諸惡瘡膿水久不瘥者作末敷之即愈近道處處有之春生苗葉與蜀葵頗相似葉尖狹多刻缺夏末開花淺黃色六七月採之陰乾用新定圖經文具冬葵條下經驗後方治臨產催產以黃蜀葵子焙乾為末井華水下三錢匕如無子以根細切煎汁令濃滑待冷服衍義曰黃蜀葵花與蜀葵別種非為蜀葵中黃者也葉心下有紫檀色摘之剔為數處就曬乾之不爾即浥爛瘡家為要藥子臨產時取四十九粒研爛用溫水調服良久產蜀葵味甘寒無毒久食鈍人性靈根及莖並主客熱利小便散膿血惡汁葉燒為末敷金瘡煮食主丹石發熱結搗碎敷火瘡又葉炙煮與小兒食治熱毒下痢及大人丹痢搗汁服亦可恐腹痛即暖飲之花冷無毒治小兒風疹子冷無毒治淋澀通小腸催生落胎療水腫治一切瘡疥並瘢疵土靨花有五色白者療痎瘧去邪氣陰乾末食之小花者名錦葵一名茙葵功用更強爾雅云菺戎葵釋曰菺一名戎葵郭曰蜀葵也似葵華如槿華戎蜀蓋其所自也因以名之新補見陳藏器日華子圖經文具冬葵條下聖惠方治婦人白帶下臍腹冷痛面色痿黃日漸虛困以白葵花一兩陰乾為末空心溫酒下二錢匕如赤帶下用赤花千金方治橫生倒產末葵花酒服方寸匕經驗後方治癰毒無頭杵蜀葵末敷之孫真人食之狗咬瘡不差又能鈍人情性衍義曰蜀葵四時取紅單葉者根陰乾治帶下排膿血惡物極驗龍葵味苦寒無毒食之解勞少睡去虛熱腫其子療疔腫所在有之唐本注云即關河間謂之苦菜者葉圓花白子若牛李子生青熟黑但堪煮食不任生啖唐本先附臣禹錫等謹按藥性論云龍葵臣能明目輕身子甚良其赤珠者名龍珠服之變白令黑耐老若能生食得苦者不食它菜十日後側有靈異不與蔥薤同啖孟詵云其味苦皆挪去汁食之圖經曰龍葵舊云所在有之今近處亦稀唯北方有之北人謂之苦葵葉圓似排風而無毛花白實若牛李子生青熟黑亦似排風子但堪煮食不任生啖其實赤者名赤珠服之變白令黑不與蔥薤同食根亦入藥用今醫以治發背癰疽成瘡者其方龍葵根一兩銼麝香一分研先搗龍葵根羅為末入麝香研令勻塗於瘡上甚善食療主疔腫患火丹瘡和土杵敷之尤良經驗方治癰無頭搗龍葵敷之食醫心鏡主解勞少睡去熱腫龍葵菜煮作羹粥食之並得苦耽苗子味苦寒小毒主傳屍伏連鬼氣疰忤邪氣腹內熱結目黃不下食大小便澀骨熱咳嗽多睡勞乏嘔逆痰壅痃癖痞滿小兒無辜癧子寒熱大腹殺蟲落胎去蠱毒並煮汁服亦生搗絞汁服亦研敷小兒閃癖生故墟垣塹間高二三尺子作角如撮口袋中有子如珠熟則赤色人有骨蒸多服之關中人謂之洛神珠一名王母珠一名皮弁草又有一種小者名苦𧄹新補苦苣味苦平一云寒除面目及舌下黃強力不睡折取莖中白汁敷疔腫出根又取汁滴癰上立潰碎莖葉敷蛇咬根主赤白痢及骨蒸並煮服之今人種為菜生食之久食輕身少睡調十二經脈利五臟霍亂後胃氣逆煩生搗汁飲之雖冷甚益人不可同血食一本作蜜食作痔疾苦苣即野苣也野生者又名𥚹苣今人家常食為白苣江外嶺南吳人無白苣嘗植野苣以供廚饌新補衍義曰苦苣搗汁敷疔瘡殊驗青苗陰乾以備冬月為末水調敷苜蓿味苦平無毒主安中利人可久食陶隱居云長安中乃有苜蓿園北人甚重此江南人不甚食之以無味故也外國復別有苜蓿草以療目非此類也唐本注云苜蓿莖葉平根寒主熱病煩滿目黃赤小便黃酒疸搗取汁服一升令人吐利即愈臣禹錫等謹按孟詵云患疸黃人取根生搗絞汁服之良又利五臟輕身洗去脾胃間邪氣諸惡熱毒少食好多食當冷氣入筋中即瘦人亦能輕身健人更無諸益日華子云涼去腹臟邪氣脾胃間熱氣通小腸食療彼處人採根作土黃耆也又安中利五臟煮和醬食之作羹亦得衍義曰苜蓿唐李白詩云天馬常銜苜蓿花是此陝西甚多飼牛馬嫩時人兼食之微甘淡不可多食利大小腸有宿根刈訖又生薺味甘溫無毒主利肝氣和中其實主明目目痛陶隱居云薺類又多此是今人可食者葉作菹羹亦佳詩云誰謂荼苦其甘如薺是也臣禹錫等謹按藥性論云薺子味甘平患氣人食之動冷疾主青盲病不見物補五臟不足其根葉燒灰能治赤白痢極效孟詵云薺子入治眼方中用不與面同食令人背悶服丹石人不可食陳士良云實亦呼菥蓂子主壅去風毒邪氣明目去障翳解熱毒久食視物鮮明四月八日收實良其花捋去席下闢蟲日華子云薺菜利五臟根療目疼聖惠方治暴赤眼疼能磣澀薺菜根汁點目中三種陳藏器余蕨葉似老蕨根如紫草按蕨味甘寒滑去暴熱利水道令人睡弱陽小兒食之腳弱不行生山間人作茹食之四皓食之而壽夷齊食蕨而夭固非良物搜神記曰郗鑑鎮丹徒二月出獵有甲士折一枝食之覺心中淡淡成疾後吐一小蛇懸屋前漸幹成蕨遂明此物不可生食之也食療寒補五臟不足氣壅經絡筋骨間毒氣令人腳弱不能行消陽事令眼暗鼻中塞發落不可食又冷氣人食之多腹脹毛詩陟彼南山言採其蕨又曰言採其薇是蕨薇俱可食伯夷叔齊采薇而食恐蕨非薇也今永康道江居民多以醋醃而食之翹搖味辛平無毒主破血止血生肌亦充生菜食之又生五種黃病絞汁服之生平澤紫花蔓生如勞豆詩義疏云苕饒幽州人謂之翹饒爾雅云柱天搖車也食療療五種黃病生搗汁服一升日二瘥甚益人利五臟明耳目去熱風令人輕健長食不厭煮熟吃佳若生吃令人吐水甘藍平補骨髓利五臟六腑利關節通經絡中結氣明耳目健人少睡益心力壯筋骨此者是西土藍闊葉可食治黃毒者作菹經宿漬色黃和鹽食之去心下結伏氣食醫心鏡甘藍菜作齏菹煮食並得壺居士隴西多種食之漢地少有多食令人少睡
