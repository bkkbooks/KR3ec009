body:
  text: 卷第十己酉新增衍義附子味辛甘溫大熱有大毒主風寒咳逆邪氣溫中金瘡破症堅積聚血瘕寒濕踒烏臥切躄攣膝痛腳疼冷弱不能行步腰脊風寒心腹冷痛霍亂轉筋下利赤白堅肌骨強陰又墮胎為百藥長生犍為山谷及廣漢冬月採為附子春採為烏頭地膽為之使惡蜈蚣畏防風黑豆甘草黃耆人參烏韭陶隱居云附子以八月上旬採八角者良凡用三建皆熱灰微炮令拆勿過焦唯姜附湯生用之俗方每用附子皆須甘草人參生薑相配者正制其毒故也今按陳藏器本草云附子醋浸削如小指納耳中去聾去皮炮令拆以蜜塗上炙之令蜜入內含之勿咽其汁主喉痹圖經文具側子條下陳藏器云附子無八角陶強名之古方多用八角附子市人所貨亦八角為名雷公云凡使先須細認勿誤用有烏頭烏喙天雄側子木鱉子烏頭少有莖苗長身烏黑少有旁尖烏喙皮上蒼有大豆許者孕八九個周圍底陷黑如烏鐵宜於武火中炮令皴坼即劈破用天雄身全矮無尖周匝四面有附孕十一個皮蒼色即是天雄宜炮皴拆後去皮尖底用不然陰制用並得側子只是附子旁有小顆附子如棗核者是宜生用治風疹神妙木鱉子只是諸喙附雄烏側中毗槵者號曰木鱉子不入藥中用若服令人喪目若附子底平有九角如鐵色一個個重一兩即是氣全堪用夫修事十兩於文武火中炮令皴坼者去之用刀刮上孕子並去底尖微細劈破於屋下午地上掘一坑可深一尺安於中一宿至明取出焙乾用夫欲炮者灰火勿用雜木火只用柳木最妙若陰制使即生去尖皮底了薄切用東流水並黑豆浸五日夜然後漉出於日中曬令乾用凡使須陰制去皮尖了每十兩用生烏豆五兩東流水六升聖惠方治疔瘡腫甚者用附子末醋和塗之干即再塗千金翼方同外臺秘要療偏風半身不遂冷癖疰附子一兩生用無灰酒一升上㕮咀納於酒中經一七日隔日飲之服一小合瘥千金翼治大風冷痰癖脹滿諸痹等病用大附子一枚重半兩者二枚亦得炮之酒漬春冬五日夏秋三日服一合以瘥為度日再服無所不治又方治口噤卒不開搗附子末納管中開口吹喉中瘥百一方治卒忤停屍不能言口噤不開生附子末置管中吹納舌下即瘥經驗方嘔逆翻胃用大附子一個生薑一斤細銼煮研如麵糊米飲下之經驗後方治大人久患口瘡生附子為末醋面調男左女右貼腳心日再換又方治熱病吐下水及下利身冷脈微發躁不止附子一枚去皮臍分作八片入鹽一錢水一升煎半升溫服立效斗門方治翻胃用附子一個最大者坐於磚上四面著火漸逼碎入生薑自然汁中又依前火逼干復淬之約生薑汁可盡半碗許搗羅為末用粟米飲下一錢不過三服瘥又方治元臟傷冷及開胃附子炮過去皮尖搗羅為未以水兩盞入藥二錢鹽蔥棗姜同煎取一盞空心服大去積冷暖下元肥腸益氣酒食無礙簡要濟眾治腳氣連腿腫滿久不瘥方黑附子一兩去皮臍生用搗為散生薑汁調如膏塗敷腫上藥干再調塗之腫消為度孫用和治大瀉霍亂不止附子一枚重七錢炮去皮臍為末每服四錢水兩盞鹽半錢煎取一盞溫服立止張文仲療眼暴赤腫磣痛不得開又淚出不止削附子赤皮末如蠶屎著眥中以定為度崔氏方療耳聾風牙關急不得開方取八角附子一枚酢漬之三宿令潤微削一頭納耳中灸上十四壯令氣通耳中即瘥孫兆口訣云治陰盛隔陽傷寒其人必躁熱而不欲飲水者是也宜服霹靂散附子一枚燒為灰存性為末蜜水調下為一服而愈此逼散寒氣然後熱氣上行而汗出乃愈又方治頭痛附子炮石膏煅等分為末入腦麝少許茶酒下半錢修真秘旨治頭風至驗以附子一個生去皮臍用綠豆一合同入銚子內煮豆熟為度去附子服豆即立瘥每個附子可煮五服後為末服之烏頭味辛甘溫大熱有大毒主中風惡風洗洗出汗除寒濕痹咳逆上氣破積聚寒熱消胸上痰冷食不下心腹冷疾臍間痛肩胛痛不可俯仰目中痛不可久視又墮胎其汁煎之名射罔殺禽獸射罔味苦有大毒療屍疰症堅及頭中風痹痛一名奚毒一名即子一名烏喙臣禹錫等謹按中蠱通用藥云射罔溫大熱烏喙音諱味辛微溫有大毒主風濕丈夫腎濕陰囊癢寒熱歷節制引腰痛不能行步癰腫膿結又墮胎生朗陵山谷正月二月採陰乾長三寸以上為天雄莽草為之使反半夏栝蔞貝母白蘞白芨惡藜蘆陶隱居云今採用四月烏頭與附子同根春時莖初生有腦形似烏鳥之頭故謂之烏頭有兩歧共蒂狀如牛角名烏喙喙即烏之口也亦以八月採搗笮莖取汁日煎為射罔獵人以敷箭射禽獸中人亦死宜速解之唐本注云烏喙即烏頭異名也此物同苗或有三歧者然兩歧者少縱夫雄附子有兩歧者仍依本名如烏頭兩歧即名烏喙天雄附子若有兩歧者復云何名之臣禹錫等謹按吳氏云烏頭一名莨一名千秋一名毒公一名果負一名耿子神農雷公桐君黃帝甘有毒正月始生葉厚莖方中空葉四四相當與蒿相似又云烏喙神農雷公桐君黃帝有毒十月採形如烏頭有兩歧相合如烏之喙名曰馬喙也所畏惡使盡與烏頭同爾雅云芨董草注即烏頭也江東呼為堇音靳崔實四民月令云三月可採烏頭藥性論云烏頭使遠志為之使忌豉汁味苦辛大熱有大毒能治惡風憎寒濕痹逆氣冷痰包心腸腹㽲痛痃癖氣塊益陽事中風洗洗惡寒除寒熱主胸中痰滿冷氣不下食治咳逆上氣治齒痛破積聚寒主強志又云烏喙使忌豉汁味苦辛大熱能治男子腎氣衰弱陰汗主療風溫濕邪痛治寒熱癰腫歲月不消者陳藏器云射罔本功外主瘻瘡瘡根結核瘰癧毒腫及蛇咬先取藥塗肉四畔漸漸近瘡習習逐病至骨瘡有熟膿及黃水出塗之若無膿水有生血及新傷肉破即不可塗立殺人亦如殺走獸敷箭鏃射之十步倒也日華子云土附子味㿌辛熱有毒生去皮搗濾汁澄清旋添曬乾取膏名為射罔獵人將作毒箭使用或中者以甘草藍青小豆葉浮萍冷水薺苨皆可御也圖經文具側子條下聖惠方治風腰腳冷痹疼痛用川烏頭三分去皮臍生搗羅釅醋調塗於故帛上敷之須臾痛止又方治久疥癬方用川烏頭七枚生用搗碎以水三大盞煎至一大盞去滓溫洗之外臺秘要治頭風頭痛臘月烏頭一升炒令黃末之絹袋盛酒三升浸溫服千金方治耳鳴如流水聲耳癢及風聲不治久成聾全烏頭一味掘得承濕削如棗核大塞耳旦易夜易不過三日愈又方治沙蝨毒以射罔敷之佳經驗方治一切冷氣去風痰定遍身疼痛益元氣強精力固精益髓令人少病川烏頭一斤用五升許大瓷缽子盛以童子小便浸逐日添注任令溢出浸二七日其烏頭通軟揀去爛壞者不用余以竹刀切破每個作四片卻用新汲井水淘七遍後浸之每日換七日通前浸二十一日取出焙乾其藥潔白搗羅為末酒煮麵糊丸綠豆大每服十丸空心鹽湯酒下少粥飯壓之如冷氣稍盛加丸數服之經驗後方治痢獨聖丸川烏頭一個好者柴灰火燒煙欲盡取出地上盞子合良久細研用酒蠟丸如大麻子每服三丸赤痢用黃連甘草黑豆煎湯放冷吞下如白用甘草黑豆煎湯放冷吞下如瀉及肚疼水吞下每於空心服之忌熱物梅師方治蛇虺螫人以射罔塗螫處頻易又方治婦人血風虛冷月候不勻或即腳手心煩熱或頭面浮腫頑麻川烏頭一斤清油四兩鹽四兩一處鐺內熬令裂如桑椹色為度去皮臍五靈脂四兩合一處為末入臼中搗令勻後蒸餅丸如梧桐子大空心溫酒鹽湯下二十丸亦治丈夫風疾又方補益元藏取飲食壯筋骨二虎丸烏頭附子各四兩釅醋浸三宿取出切作片子穿一小坑以炭火燒令通赤用好醋三升同藥傾入熱坑子內盆合之經一宿取出去砂土用好青鹽四兩研與前藥同炒令赤黃色杵為末醋麵糊丸如梧子大空心冷酒下十五丸鹽湯亦得婦人亦宜又方療癱緩風手足嚲曳口眼喎斜語言蹇澀履步不正神驗烏龍丹川烏頭去臍了五靈脂各五兩右為末入龍腦麝香研令細勻滴水丸如彈子大每服一丸先以生薑汁研化次暖酒調服之一日兩服空心晚食前服治一人只三十丸服得五七丸便覺抬得手移得步十丸可以自梳頭勝金方治蠍蜇烏頭末少許頭醋調敷之靈苑方治馬汗入瘡腫痛漸甚宜急療之遲則毒深難理以生烏頭末敷瘡口良久有黃水出立愈初虞世治陷甲割甲成瘡連年不瘥川烏頭尖黃柏等分為末洗了貼藥修真秘訣治瀉痢三神丸草烏頭三兩一兩生一兩熟炒一兩燒存性研為末以醋麵糊丸如綠豆大每服五丸空心服瀉用井花水赤痢甘草湯下白痢乾薑湯下赤白痢生薑甘草湯下孫兆口訣治陰毒傷寒手足逆冷脈息沉細頭疼腰重兼治陰毒咳逆等疾川烏頭乾薑等分上為粗散炒令轉色放冷再搗為細散每一錢水一盞鹽一撮煎取半盞溫服古今錄驗治癰攻腫若有息肉突出者烏頭五枚以苦酒三升漬三日洗之日夜三四度楊氏產乳療耳鳴無晝夜烏頭燒作灰菖蒲等分為末綿裹塞耳中日再用效也唐李寶臣為妭人置堇於液寶臣飲之即喑三日死唐武后置堇於食賀蘭氏食之暴死衍義曰烏頭烏喙天雄附子側子凡五等皆一物也只以大小長短似像而名之後世補虛寒則須用附子仍取其端平而圓大及半兩以上者其力全不僭風家即多用天雄亦取其大者以其尖角多熱性不肯就下故取敷散也此用烏頭附子之大略如此餘三等則量其材而用之其炮製之法經方已著天雄味辛甘溫大溫有大毒主大風寒濕痹歷節痛拘攣緩急破積聚邪氣金瘡強筋骨輕身健行療頭面風去來疼痛心腹結積關節重不能行步除骨間痛長陰氣強志令人武勇力作不倦又墮胎一名白幕生少室山谷二月採根陰乾遠志為之使惡腐婢陶隱居云今採用八月中旬天雄似附子細而長便是長者乃至三四寸許此與烏頭附子三種本並出建平故謂之三建今宜都佷山最好謂為西建錢塘間者謂之東建氣力劣弱不相似故曰西冰猶勝東白也其用灰殺之時有冰強巨兩切者不佳唐本注云天雄附子烏頭等並以蜀道綿州龍州出者佳余處縱有造得者力弱都不相似江南來者全不堪用陶以三物俱出建平故名之非也按國語置堇於肉注云烏頭也爾雅云芨堇音靳草郭注云烏頭苗也此物本出蜀漢其本名堇今訛為建遂以建平釋之又石龍芮葉似堇故名水堇今復為水莨赤作建音此豈復生建平耶檢字書又無莨字甄立言本草音義亦論之天雄附子側子並同用八月採造其烏頭四月上旬今云二月採恐非時也臣禹錫等謹按淮南子云天雄雄雞志氣益注云取天雄三枚納雄雞腸中搗生食之令人勇藥性論云天雄君忌豉汁大熱有大毒乾薑制用之能治風痰冷痹軟腳毒風能止氣喘促急殺禽蟲毒日華子云治一切風一切氣助陽道暖水臟補腰膝益精明目通九竅利皮膚調血脈四肢不遂破痃癖癥結排膿止痛續骨消瘀血補冷氣虛損霍亂轉筋背脊僂傴消風痰下胸膈水發汗止陰汗炮含喉痹凡丸散炮去皮臍用飲藥即和皮生使甚佳可以便驗又云天雄大長少角刺而虛烏喙似天雄而附子大短有角平穩而實烏頭次於附子側子小於烏頭連聚生者名為虎掌並是天雄一裔子母之類力氣乃有殊等即宿根與嫩者耳以上並忌豉汁圖經文具側子條下陳藏器天雄身全短無尖周匝四面有附子孕十一個皮蒼色即是天雄宜炮皴坼後去皮尖底用之不然陰制用並得別說云謹按此數條說前項悉備但天雄者始種烏頭而不生諸附子側子之類經年獨生長大者是也蜀人種之忌生此以為不利如養蠶而為白姜之類也側子味辛大熱有大毒主癰腫風痹歷節腰腳疼冷寒熱鼠瘻又墮胎陶隱居云此即附子邊角之大者脫取之昔時不用比來醫家以療腳氣多驗凡此三建俗中乃是同根而本經分生三處當各有所宜故也方云少室天雄朗陵烏頭皆稱本土今則無別矣少室山連嵩高朗陵縣屬豫州汝南郡今在北國唐本注云側子只是烏頭下共附子天雄同生小者側子與附子皆非正生謂從烏頭旁出也以小者為側子大者為附子今稱附子角為側子理必不然若當陽以下江左及山南嵩高齊魯間附子時復有角如大豆許夔州以上劍南所出者附子之角曾微黍粟持此為用誠亦難充比來京下皆用細附子有效未嘗取角若然方須八角附子應言八角側子言取角用不近人情也臣禹錫等謹按蜀本注云昔多不用今以療腳氣甚效按陶云側子即附子邊角之大者削取之蘇云只是烏頭不共附子同生小者為側子大者為附子殊無證據但云附子角小如黍粟難充於用故有此說今據附子邊果有角大如棗核及檳榔已來者形狀亦自是一顆仍不小則烏頭旁出附子附子旁出側子明矣似烏鳥頭為烏頭兩歧者為烏喙細長乃至三四寸者為天雄根旁如芋散生者名附子旁連生者名側子五物同出而異名苗高二尺許葉似石龍芮及艾其花紫赤其實紫黑今以龍州綿州者為佳作之法以生熟湯浸半日勿令滅氣出以白灰裛之數易使干又法以米粥及糟曲等並不及前法吳氏云側子一名莨神農歧伯有大毒八月採陰乾是附子角之大者畏惡與附子同藥性論云側子使能治冷風濕痹大風筋骨攣急圖經曰烏頭烏喙生朗陵山谷天雄生少室山谷附子側子生犍為山谷及廣漢今並出蜀土然四品都是一種所產其種出於龍州種之法冬至前先將肥腴陸田耕五七遍以豬糞糞之然後布種逐月耕耔至次年八月後方成其苗高三四尺以來莖作四稜葉如艾花紫碧色作穗實小紫黑色如桑椹本只種附子一物至成熟後有此四物收時仍一處造釀方成釀之法先於六月內踏造大小麥曲至收採前半月預先用大麥煮成粥後將上件曲造醋候熱淋去糟其醋不用太酸酸則以水解之便將所收附子等去根鬚於新潔甕內淹浸七日每日攪一遍日足撈出以彌疏篩攤之令生白衣後向慢風日中曬之百十日以透干為度若猛日曬則皺而皮不附肉其長三二寸者為天雄割削附子旁尖芽角為側子附子之絕小者亦名為側子元種者母為烏頭其餘大小者皆為附子以八角者為上如方藥要用須炮令裂去皮臍使之綿州彰明縣多種之唯赤水一鄉者最佳然收採時月與本經所說不同蓋今時所種如此其內地所出者與此殊別今亦稀用謹按本經冬採為附子春採為烏頭而廣雅云奚毒附子也一歲為萴與側同子二歲為烏喙三歲為附子四歲為烏頭五歲為天雄今一年種之便有此五物豈今人種蒔之法用力倍至故爾繁盛也雖然藥力當緩於歲久者耳崔氏治寒疝心腹脅引痛諸藥不可近者蜜煎烏頭主之以烏頭五枚大者去芒角及皮四破以白蜜一斤煎令透潤取出焙乾搗篩又以熟蜜丸冷鹽湯吞二十丸如梧子永除又法用煎烏頭蜜汁以桂枝湯五合解之飲三合不知加五合其知者如醉以為中病續傳信方治陰毒傷寒煩躁迷悶不主悟人急者用大附子一個可半兩者立劈作四片生薑一大塊立劈作三片如中指長糯米一撮三味以水一升煎取六合去滓如人體溫頓服厚衣覆之或汁出或不出候心神定即別服水解散太白通關散之類不得與冷水如渴更將滓煎與吃今人多用有效故詳著之陳藏器云側子冷酒調服治遍身風疹雷公云側子只是附子旁有小顆附子如棗核者是宜生用治風疹神妙也木鱉子只是諸喙附雄烏側中毗槵者號曰木鱉子不入藥用若服之令人喪目半夏味辛平生微寒熟溫有毒主傷寒寒熱心下堅下氣喉咽腫痛頭眩胸脹咳逆腹鳴止汗消心腹胸膈痰熱滿結咳嗽上氣心下急有痛堅痞時氣嘔逆消癰腫墮胎療痿黃悅澤面目生令人吐熟令人下用之湯洗令滑盡一名守田一名地文一名水玉一名示姑生槐里川穀五月八月採根曝乾射干為之使惡皂莢畏雄黃生薑乾薑秦皮龜甲反烏頭陶隱居云槐里屬扶風今第一齣青州吳中亦有以肉白者為佳不厭陳久用之皆先湯洗十許過令滑盡不爾戟人咽喉方中有半夏必須生薑者亦以制其毒故也唐本注云半夏所在皆有生平澤中者名羊眼半夏圓白為勝然江南者大乃徑寸南人特重之頃來互用功狀殊異問南人說苗乃是由跋陶注云虎掌極似半夏注由跋乃說鳶尾於此注中似說由跋三事混淆陶終不識臣禹錫等謹按蜀本云熟可以下痰又圖經云苗一莖莖端三葉有二根相重上小下大五月採則虛小八月採實大採得當以灰裛二日湯洗曝乾之藥性論云半夏使忌羊血海藻飴糖柴胡為之使有大毒湯淋十遍去涎方盡其毒以生薑等分制而用之能消痰涎開胃健脾止嘔吐去胸中痰滿下肺氣主咳結新生者摩塗癰腫不消能除瘤癭氣虛而有痰氣加而用之日華子云味㿌辛治吐食反胃霍亂轉筋腸腹冷痰瘧圖經曰半夏生槐里川穀今在處有之以齊州者為佳二月生苗一莖莖端出三葉淺綠色頗似竹葉而光江南者似芍藥葉根下相重生上大下小皮黃肉白五月八月內採根以灰裛二日湯洗曝乾一云五月採者虛小八月採者實大然以圓白陳久者為佳其平澤生者甚小名羊眼半夏又由跋絕類半夏而苗高近一二尺許根如雞卵大多生林下或云即虎掌之小者足以相亂半夏主胃冷嘔噦方藥之最要張仲景治反胃嘔吐大半夏湯半夏三升人參三兩白蜜一升以水一斗二升和揚之一百二十遍煮取三升半溫服一升日再亦治膈間支飲又主嘔噦谷不得下眩悸半夏加茯苓湯半夏一升生薑半斤茯苓三兩切以水七升煎取一升半分溫服之又主心下悸半夏麻黃丸二物等分篩末蜜丸大如小豆每服三丸日三其餘主寒厥赤丸四逆嘔吐附子粳米湯乃傷寒方用半夏一升洗去滑焙乾搗末小麥面一升合和以水搜令熟丸如彈丸以水煮令面熟則藥成初吞四五枚日二稍稍增至十五枚旋煮旋服覺病減欲更重合亦佳禁食餳與羊肉雷公云凡使勿誤用白傍芁子真似半夏只是咬著微酸不入藥用若修事半夏四兩用搗了白芥子末二兩頭醋六兩二味攪令濁將半夏投於中洗三遍用之半夏上有隙涎若洗不淨令人氣逆肝氣怒滿聖惠方治時氣嘔逆不下食用半夏半兩湯浸洗七遍去滑生薑一兩同銼碎以水一大盞煎至六分去滓分二服不計時候溫服又方治蠍瘻五孔皆相通半夏一分為末以水調敷之經驗後方正胃半夏二兩天南星二兩上以為末用水五升入罈子內與藥攪勻浸一宿去清水焙乾重碾令細每服水二盞藥末二錢姜三片同煎至八分溫服至五服效斗門方治胸膈壅滯去痰開胃用半夏淨洗焙乾搗羅為末以生薑自然汁和為餅子用濕紙裹於慢火中煨令香熟水兩盞用餅子一塊如彈丸大入鹽半錢煎取一盞溫服能去胸膈壅逆大壓痰毒及治酒食所傷其功極驗簡要濟眾治久積冷不下食嘔吐不止冷在胃中半夏五兩洗過為末每服二錢白麵一兩以水和搜切作棋子水煮麵熟為度用生薑醋調和服之古今錄驗治喉痹半夏末方寸匕雞子一枚頭開竅子去內黃白盛淳苦酒令小滿納半夏末著中攪和雞子內以環子坐之於炭上煎藥成置杯中稍暖咽之錢相公篋中方治蠍螫人取半夏以水研塗之立止深師方治傷寒病啘不止半夏熟洗乾末之生薑湯服一錢匕子母秘錄治小兒腹脹半夏少許洗搗末酒和丸如粟米大每服二丸生薑湯吞下不瘥加之日再服又若以火炮之為末貼臍亦佳又方治五絕一曰自縊二曰牆壁壓三曰溺水四曰魘魅五曰產乳凡五絕皆以半夏一兩搗篩為末丸如大豆納鼻中愈心溫者一日可治產書治產後運絕半夏一兩搗為末冷水和丸如大豆納鼻孔中即愈此是扁鵲法御藥院治膈壅風痰半夏不計多少酸漿浸一宿溫湯洗五七遍去惡氣日中曬乾搗為末漿水搜餅子日中干之再為末每五兩入生腦子一錢研勻以漿水濃腳丸雞頭大紗袋盛通風處陰乾每一丸好茶或薄荷湯下紫靈元君南嶽夫人內傳治卒死半夏末如大豆許吹鼻中衍義曰半夏今人唯知去痰不言益脾蓋能分水故也脾惡濕濕則濡而困困則不能制水經曰濕勝則瀉一男子夜數如廁或教以生薑一兩碎之半夏湯洗與大棗各三十枚水一升瓷瓶中慢火燒為熟水時時呷數日便已虎掌味苦溫微寒有大毒主心痛寒熱結氣積聚伏梁傷筋痿拘緩利水道除陰下濕風眩生漢中山谷及冤句二月八月採陰乾蜀漆為之使惡莽草陶隱居云近道亦有形似半夏但皆大四邊有子如虎掌今用多破之或三四片爾方藥亦不正用也唐本注云此藥是由跋宿者其苗一莖莖頭一葉枝丫音鴉脥古協切莖根大者如拳小者如雞卵都似扁柿四畔有圓牙看如虎掌故有此名其由跋是新根猶大於半夏二三倍但四畔無子牙爾陶云虎掌似半夏即由跋以由跋為半夏釋由跋苗全說鳶尾南人至今猶用由跋為半夏也臣禹錫等謹按蜀本圖經云其莖端有八九葉花生莖間根周圍有芽然若獸掌也吳氏云虎掌神農雷公苦無毒歧伯桐君辛有毒立秋九月採藥性論云虎掌使味甘不入湯服治風眩目轉主疝瘕腸痛主傷寒時疾強陰圖經曰虎掌生漢中山谷及冤句今河北州郡亦有之初生根如豆大漸長大似半夏而扁累年者其根圓及寸大者如雞卵周迴生圓芽二三枚或五六枚三月四月生苗高尺余獨莖上有葉如爪五六出分布尖而圓一窠生七八莖時出一莖作穗直上如鼠尾中生一葉如匙裹莖作房旁開一口上下尖中有花微青褐色結實如麻子大熟即白色自落布地一子生一窠九月苗殘取根以湯入器中漬五七日湯冷乃易日換三四遍洗去涎曝乾用之或再火炮今冀州人菜園中種之亦呼為天南星江州有一種草葉大如掌面青背紫四畔有芽如虎掌生三五葉為一本冬青治心痛寒熱積氣不結花實與此名同故附見之由跋主毒腫結熱陶隱居云本出始興今都下亦種之狀如烏翣而布地花紫色根似附子苦酒摩塗腫亦效不入余藥唐本注云由跋根尋陶所注乃是鳶尾根即鳶頭也由跋今南人以為半夏頓爾乖越非唯不識半夏亦不知由跋與鳶尾也今按陳藏器本草云半夏高一二尺生澤中熟地根如小指正圓所謂羊眼半夏也由跋苗高一二尺似苣蒻根如雞卵生林下所謂由跋也臣禹錫等謹按蜀本圖經云春抽一莖莖端直八九葉根圓扁而肉白圖經文具半夏條下右由跋一種古本所有政和監本脫漏不載今照依嘉祐監本補之於此鳶尾味苦平有毒主蠱毒邪氣鬼疰諸毒破癥瘕積聚大水下三蟲療頭眩殺鬼魅一名烏園生九疑山谷五月採陶隱居云方家云是射干苗無鳶尾之名主療亦異當別一種物方亦有用鳶頭者即應是其根療體相似而本草不顯之唐本注云此草葉似射干而闊短不抽長莖花紫碧色根似高良薑皮黃肉白有小毒嚼之戟人咽喉與射干全別人家亦種所在有之射干花紅抽莖長根黃有臼今陶云由跋正說鳶尾根莖臣禹錫等謹按蜀本云此草葉名鳶尾根名鳶頭亦謂之鳶根又圖經云葉似射干布地生黑根似高良薑而節大數個相連今所在皆有九月十月採根日乾圖經文具射干條下陳藏器云鳶尾主飛屍遊蠱著喉中氣欲絕者以根削去皮納喉中摩病處令血出為佳右鳶尾一種古本所有政和監本脫漏不載今照依嘉祐監本補之於此大黃將軍味苦寒大寒無毒主下瘀血血閉寒熱破癥瘕積聚留飲宿食盪滌腸胃推陳致新通利水穀調中化食安和五臟平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結一名黃良生河西山谷及隴西二月八月採根火干得芍藥黃芩牡蠣細辛茯芩療驚恚怒心下悸氣得硝石紫石英桃仁療女子血閉黃芩為之使無所畏陶隱居云今採益州北部汶山及西山者雖非河西隴西好者猶為紫地錦色味甚苦澀色至濃黑西川陰乾者勝北部日乾亦有火乾者皮小焦不如而耐蛀堪久此藥至勁利粗者便不中服最為俗方所重道家時用以去痰疾非養性所須也將軍之號當取其駿快矣唐本注云大黃性濕潤而易壞蛀火干乃佳二月八月日不烈恐不時燥即不堪矣葉子莖並似羊蹄但粗長而厚其根細者亦似宿羊蹄大者乃如碗長二尺作時燒石使熱橫寸截著石上爆之一日微燥乃繩穿眼之至干為佳幽並已此漸細氣力不如蜀中者今出宕州涼州西羌蜀地皆有其莖味酸堪生啖亦以解熱多食不利人陶稱蜀地者不及隴西誤矣今按陳藏器本草云大黃用之當分別其力若取和厚深沉能攻病者可用蜀中似牛舌片緊硬者若取瀉泄駿快推陳去熱當取河西錦紋者凡有蒸有生有熟不得一概用之臣禹錫等謹按蜀本云葉似蓖麻根如大芋旁生細根如牛蒡小者亦似羊蹄又云圖經云高六七尺莖脆藥性論云蜀大黃使去寒熱忌冷水味苦甘消食煉五臟通女子經候利水腫能破痰實冷熱結聚宿食利大小腸貼熱毒腫主小兒寒熱時疾煩熱蝕濃破留血日華子云通宣一切氣調血脈利關節泄壅滯水氣四肢冷熱不調溫瘴熱疾利大小便並敷一切瘡癤癰毒廓州馬蹄峽中者次圖經曰大黃生河西山谷及隴西今蜀川河東陝西州郡皆有之以蜀川錦文者佳其次秦隴來者謂之土蕃大黃正月內生青葉似蓖麻大者如扇根如芋大者如碗長一二尺旁生細根如牛蒡小者亦如芋四月開黃花亦有青紅似蕎麥花者莖青紫色形如竹二月八月採根去黑皮火干江淮出者曰土大黃二月開花結細實又鼎州出一種羊蹄大黃療疥瘙甚效初生苗葉如羊蹄累年長大即葉似商陸而狹尖四月內於押條上出穗五七莖相合花葉同色結實如蕎麥而輕小五月熟即黃色亦呼為金蕎麥三月採苗五月收實並陰乾九月採根破之亦有錦文日乾之亦呼為土大黃凡收大黃之法蘇恭云作時燒石使熱橫寸截著石上爆之一日微燥乃繩穿眼之至干今土蕃大黃往往作橫片曾經火爆蜀大黃乃作緊片如牛舌形謂之牛舌大黃二者用之皆等本經稱大黃推陳致新其效最神故古方下積滯多用之張仲景治傷寒用處尤多又有三物備急丸司空裴秀為散用療心腹諸疾卒暴百病其方用大黃乾薑巴豆各一兩須精新好者搗篩蜜和更搗一千杵丸如小豆服三丸老小斟量之為散不及丸也若中惡客忤心腹脹滿卒痛如錐刀刺痛氣急口噤停屍卒死者以暖水若酒服之若不下捧頭起灌令下喉須臾瘥未知更與三丸腹當鳴轉即吐下便愈若口已噤亦須折齒灌之藥入喉即瘥崔知悌療小兒無辜閃癖瘰癧或頭干黃聳或乍痢乍瘥諸狀多者皆大黃煎主之大黃九兩錦文新實者若微朽即不中用削去蒼皮乃秤搗篩為散以上好米醋三升和之置銅碗中於大鐺中浮湯上炭火煮之火不用猛又以竹木篦攪藥候任丸乃停於小瓷器中貯兒年三歲一服七丸如梧子日再服當以下青赤膿為度若不下膿或下膿少者稍稍加丸下膿若多丸又須減病重者或七八劑方盡根本大人小兒以意量之此藥唯下膿宿結不令兒利須禁食毒物食乳者乳母亦同忌法崔元亮海上方治腰腳冷風氣以大黃二大兩切如棋子和少酥炒令酥盡入藥中切不得令黃焦則無力搗篩為末每日空腹以水大三合入生薑兩片如錢煎十餘沸去姜取大黃末兩錢別置碗子中以薑湯調之空腹頓服如有餘薑湯徐徐呷之令盡當下冷膿及惡物等病即瘥止古人用毒藥攻病必隨人之虛實而處置非一切而用也姚僧垣初仕梁武帝因發熱欲服大黃僧垣曰大黃乃是快藥至尊年高不可輕用帝弗從幾至委頓元帝常有心腹疾諸醫咸謂宜用平藥可漸宣通僧垣曰脈洪而實此有宿妨非用大黃無差理帝從而遂愈以此言之今醫用一毒藥而攻眾病其偶中病便謂此方之神奇其差誤乃不言用藥之失如此者眾矣可不戒哉唐本云葉似蓖麻根如大芋旁生細根如牛蒡圖經云高六七尺莖脆味酸醒酒雷公云凡使細切內文如水旋斑緊重銼蒸從巳至未曬乾又灑臘水蒸從未至亥如此蒸七度曬乾卻灑薄蜜水再蒸一伏時其大黃擘如烏膏樣於日中曬乾用之為妙聖惠方治時氣發豌豆瘡用川大黃半兩微炒以水一大盞煎至七分去滓分為二服又方熱病狂語及諸黃用川大黃五兩銼炒微赤搗為散用臘月雪水五升煎如膏每服不計時候冷水調下半匙外臺秘要療癖方大黃十兩杵篩醋三升和勻白蜜兩匙煎堪丸如梧桐子大一服三十丸生薑湯吞下以利為度小者減之千金方治產後惡血衝心或胎衣不下腹中血塊等用錦紋大黃一兩杵羅為末用頭醋半升同熬成膏丸如梧桐子大患者用溫醋七分盞化五丸服之良久下亦治馬墜內損千金翼治婦人血癖痛大黃三兩搗篩以酒二升煮十沸頓服經驗後方解風熱疏積熱風壅消食化氣導血大解壅滯大黃四兩牽牛子四兩半生半熟為末煉蜜丸如梧子大每服茶下一十丸如要微動吃十五丸冬月中最宜服並不搜攪人梅師方治卒外腎偏腫疼痛大黃末和醋塗之干即易之斗門方治腰痛用大黃半兩更入生薑半兩同切如小豆大於鐺內炒令黃色投水兩碗至五更初頓服天明取下腰間惡血物用盆器盛如雞肝樣即痛止簡要濟眾治吐血川大黃一兩搗羅為散每服一錢以生地黃汁一合水半盞煎三五沸無時服廣利方治骨節熱積漸黃瘦大黃四分以童子小便五大合煎取四合去滓空腹分為兩服如人行四五里再服傷寒類要療急黃病大黃粗切二兩水三升半漬一宿平旦煎絞汁一升半納芒硝二兩絞服須臾當快利姚和眾治小兒腦熱常閉目大黃一分粗銼以水三合浸一宿一歲兒每日與半合服余者塗頂上干即更塗別說云謹按大黃收採時皆以火燒石爆干欲速貨賣更無生者用之不須更多炮炙少蒸煮之類也衍義曰大黃損益前書已具仲景治心氣不足吐血衄血瀉心湯用大黃黃芩黃連或曰心氣既不足矣而不用補心湯更用瀉心湯何也答曰若心氣獨不足由不當須吐衄也此乃邪熱因不足而客之故吐衄以苦泄其熱就以若補其心蓋兩全之有是證者用之無不效最虛實用藥葶藶味辛苦寒大寒無毒主癥瘕積聚積氣飲食寒熱破堅逐邪通利水道下膀胱水伏留熱氣皮間邪水上出面目浮腫身暴中風熱痱音沸癢利小腹久服令人虛一名丁歷一名蕇音典蒿一名大室一名大適生藁城平澤及田野立夏後採實陰乾得酒良榆皮為之使惡殭蠶石龍芮陶隱居云出彭城者最勝今近道亦有母則公薺子細黃至苦用之當熬今按此藥亦療肺壅上氣咳嗽定喘促除胸中痰飲臣禹錫等謹按蜀本云苗似薺苨春末生高二三尺花黃角生子黃細五月熟採子曝乾藥性論云葶藶臣味酸有小毒能利小便抽肺氣上喘息急止嗽爾雅云蕇亭歷注實葉皆似芥一名狗薺日華子云利小腸通水氣虛腫圖經曰葶藶生藁城平澤及田野今京東陝西河北州郡皆有之曹州者尤勝初春生苗葉高六七寸有似薺根白枝莖俱青三月開花微黃結角子扁小如黍粒微長黃色立夏後採實曝乾月令孟夏之月靡草死許慎鄭康成注皆云靡草薺葶藶之屬是也至夏則枯死故此時採之張仲景治肺癰喘不得臥葶藶大棗瀉肺湯主之葶藶炒黃色搗末為丸大如彈丸每服用大棗二十枚水三升煎之取二升然後納一彈丸更煎取一升頓服之支飲不得息亦主之崔知悌方療上氣咳嗽長引氣不得臥或遍體氣腫或單面腫或足腫並主之葶藶子三升微火熬搗篩為散以清酒五升漬之冬七日夏三日初服如桃許大日三夜一冬日二夜二量其氣力取微利一二為度如患急困者不得待日滿亦可以綿細絞即服其葶藶單莖向上葉端出角角粗且短又有一種苟芥草葉近根下作奇生角細長取時必須分別前件二種也又篋中方治嗽含膏丸曹州葶藶子一兩紙襯熬令黑知母一兩貝母一兩三物同搗篩以棗肉半兩別銷沙糖一兩半同入藥中和為丸大如彈丸每服以新綿裹一丸含之徐徐咽津甚者不過三丸今醫亦多用雷公云凡使勿用赤鬚子真相似葶藶子只是味微甘苦葶藶子入頂苦凡使以糯米相合於焙上微微焙待米熟去米單搗用聖惠方治上氣喘急遍身浮腫用甜葶藶一升隔紙炒令紫色搗令極細用生絹袋盛以清酒五升浸三日後每服抄一匙用粥飲調下日三四服又方治支飲久不瘥大腹水腫喘促不止用甜葶藶三兩隔紙炒令紫色搗如膏每服丸如彈子大以水一中盞入棗四枚煎至五分去滓非時服外臺秘要治食飲不得息葶藶子三兩熬令黃搗為末以水三升煮大棗三十枚得汁一升納藥中每服如棗大煎取七合頓服千金方治腹脹積聚癥瘕葶藶子一升熬以酒五升浸七日日服三合千金翼治頭風搗葶藶子以湯淋取汁洗頭上經驗方河東裴氏傳經效治水腫及暴腫葶藶三兩杵六千下令如泥即下漢防己末四兩取綠頭鴨就藥臼中截頭瀝血於臼中血盡和鴨頭更搗五千下丸如梧桐子患甚者空腹白湯下十丸稍可者五丸頻服五日止此藥利小便有效如神梅師方治遍身腫滿小便澀葶藶子二兩大棗二十枚以水一大升煎取一小升去棗納葶藶於棗汁煎丸如梧子飲下十丸又方治肺壅氣喘急不得臥葶藶子三兩炒大棗三十枚水三升煮棗取二升又煎取一升去滓並二服簡要濟眾治小兒水氣腹腫兼下痢膿血小便澀葶藶子半兩微炒搗如泥以棗肉和搗為丸如綠豆大每服五丸棗湯下空心晚後量兒大小加減服之續十全方治一切毒入腹不可療及馬汗用葶藶子一兩炒研以水一升浸湯服取下惡血崔氏治水氣葶藶三兩以物盛甑上蒸令熟即搗萬杵若丸得如梧桐子不須蜜和一服五丸漸加至七丸以得微利即佳不可多服令人不堪美食若氣發又服之得利氣下定即停此方治水氣無比蕭駙馬患水腫唯服此得瘥傷寒類要治腎癉唇乾以葶藶主之子母秘錄治小兒白禿葶藶搗末以湯洗汔塗上姚和眾治孩兒蛔蟲葶藶子一分生為末用以水三合煎取一合一日服盡衍義曰葶藶用子子之味有甜苦兩等其形則一也經既言味辛苦即甜者於復更入藥也大概治體皆以行水走泄為用故曰久服令人虛蓋取苦泄之義其理甚明藥性論所說盡矣但不當言味酸桔梗味辛苦微溫有小毒主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣利五臟腸胃補血氣除寒熱風痹溫中消穀療喉咽痛下蠱毒一名利如一名房圖一名白藥一名梗草一名薺苨生嵩高山谷及冤句二八月採根曝乾節皮為之使得牡蠣遠志療恚怒得硝石石膏療傷寒畏白芨龍眼龍膽陶隱居云近道處處有葉名隱忍二三月生可煮食之桔梗療蠱毒甚驗俗方用此乃名薺苨今別有薺苨能解藥毒所謂亂人參者便是非此桔梗而葉甚相似但薺苨葉下光明滑澤無毛為異葉生又不如人參相對者爾唐本注云人參苗似互加闊短莖圓有三四椏椏頭有五葉陶引薺苨亂人參謬矣且薺苨桔梗又有葉差互者亦有葉三四對者皆一莖直上葉既相亂唯以根有心無心為別爾臣禹錫等謹按藥性論云桔梗臣味苦平無毒能治下痢破血去積氣消積聚痰涎主肺氣氣促嗽逆除腹中冷痛主中惡及小兒驚癇日華子云下一切氣止霍亂轉筋心腹脹痛補五勞養氣除邪辟溫補虛消痰破癥瘕養血排膿補內漏及喉痹㿌毒以白粥解圖經曰桔梗生嵩高山谷及冤句今在處有之根如小指大黃白色春生苗莖高尺余葉似杏葉而長橢四葉相對而生嫩時亦可煮食之夏開花紫碧色頗似牽牛子花秋後結子八月採根細銼曝乾用葉名隱忍其根有心無心者乃薺苨也而薺苨亦能解毒二物頗相亂但薺苨葉下光澤無毛為異關中桔梗根苗頗似蜀葵根莖細青色葉小青色似菊花葉古方亦單用之古今錄驗療卒中蠱下血如雞肝者晝夜出血石余四臟皆損唯心未毀或鼻破待死者取桔梗搗屑以酒服方寸匕日三不能下藥以物拗口開灌之心中當煩須臾自定服七日止當食豬肝臛以補之神良集驗方療胸中滿而振寒脈數咽燥不渴時時出濁唾腥臭久久吐膿如粳米粥是肺癰治之以梧梗甘草各二兩炙以水三升煮取一升分再服朝暮吐膿血則瘥雷公云凡使勿用木梗真似桔梗咬之只是腥澀不堪凡使去頭上尖硬二三分以來並兩畔附枝子於槐砧上細銼用百合水浸一伏時漉出緩火熬令乾用每修事四兩用生百合五分搗作膏投於水中浸聖惠方治馬喉痹並毒氣壅塞用桔梗二兩去蘆頭銼以水三大盞煎至一盞去滓不計時分溫三服又方妊娠中惡心腹疼痛用桔梗一兩細銼水一中盞人生薑三片煎至六分去滓非時溫服外臺秘要治卒客忤停屍不能言者燒桔梗二兩末米飲服仍吞麝香如大豆許佳千金方治喉閉並毒氣桔梗二兩水三升煮取一升頓服又方鼻衄方桔梗為末水服方寸匕日四五亦止吐下血百一方若被打擊瘀血在腸內久不消時發動者取桔梗末熟水下刀圭經驗後方治骨䐬風牙疼腫桔梗為末棗穰和丸如皂子大綿裹咬之腫則荊芥湯漱之簡要濟眾治痰嗽喘急不定桔梗一兩半搗羅為散用童子小便半升煎取四合去滓溫服子母秘錄治小兒卒客忤死燒桔梗末三錢匕飲服杜壬治上焦有熱口舌咽中生瘡嗽有膿血桔梗一兩甘草二兩右為末每服二錢水一盞煎六分去滓溫服食後細呷之亦治肺壅梅師方治卒蠱毒下血如鵝肝晝夜不絕臟腑敗壞桔梗搗汁服七合佳衍義曰桔梗治肺熱氣奔促嗽逆肺癰排膿陶隱居云俗方用此乃名薺苨今別有薺苨所謂亂人參者便是非此桔梗也唐本注云陶引薺苨亂人參謬矣今詳之非也陶隱居所言其意只以根言之所以言亂人參唐本注卻以苗難之乃本注誤矣莨音浪菪音蕩子味苦甘寒有毒主齒痛出蟲肉痹拘急使人健行見鬼療癲狂風癇顛倒拘攣多食令人狂走久服輕身走及奔馬強志益力通神一名橫唐一名行唐生海濱川穀及雍州五月採子陶隱居云今處處有子形頗似五味核而極小唯入療癲狂方用尋此乃不可多食過劑爾久服自無嫌通神健行足為大益而仙經不見用今方家多作狼蓎今按陳藏器本草云莨菪子主痃癖安心定志聰明耳目除邪逐風變白性溫不寒取子洗曝乾隔日空腹水下一指捻勿令子破破即令人發狂亦用小便浸之令泣小便盡曝乾依前服之臣禹錫等謹按蜀本圖經云葉似王不留行菘藍等莖葉有細毛花白子殼作罌子形實扁細若粟米許青黃色所在皆有六月七月採子日乾藥性論云莨菪亦可單用味苦辛微熱有大毒生能瀉人見鬼拾針狂亂熱炒止冷痢主齒痛蚛牙孔子咬之蟲出石灰清煮一伏時掬出去芽曝乾以附子乾薑陳橘皮桂心厚朴為丸去一切冷氣積年氣痢甚溫暖熱發用錄豆汁解之焦炒碾細末治下部脫肛日華子云溫有毒甘草升麻犀角並能解之燒熏蚛牙及洗陰汗圖經曰莨菪子生海濱川穀及雍州今處處有之苗莖高二三尺葉似地黃王不留行紅藍等而三指闊四月開花紫色苗莢莖有白毛五月結實有殼作罌子狀如小石榴房中子至細青白色如米粒一名天仙子五月採子陰乾謹按本經云莨菪性寒後人多雲大熱而史記淳于意傳云淄川王美人懷子而不乳意飲以浪蕩藥一撮以酒飲之旋乳且不乳豈熱藥所治又古方主卒癲狂亦多單用莨菪不知果性寒邪小品載治癲狂方云取莨菪三升作末酒一升漬數日出搗之以向汁和絞去滓湯上煎令可丸服如小豆三丸日三當覺口面急頭中有蟲行額及手足有赤色處如此並是瘥候未知再服取盡神良又篋中方主腸風莨菪煎取莨菪實一升治之曝乾搗篩生薑半斤取汁二物相合銀鍋中更以無灰酒二升投之上火煎令如稠餳即旋投酒度用酒可及五升以來即止煎令可丸大如梧子每旦酒飲通下三丸增至五七丸止若丸時黏手則菟絲粉襯隔煎熬切戒火緊則藥易焦而失力矣初服微熱勿怪疾甚者服過三日當下利疾去利亦止絕有效雷公云凡使勿令使蒼冥子其形相似只是服無效時人多用雜之其蒼冥子色微赤若修事十兩以頭醋一鎰煮盡醋為度卻用黃牛乳汁浸一宿至明看牛乳汁黑即是莨菪子大毒曬乾別搗重篩用勿誤服沖人心大煩悶眼生暹火別說云謹按莨菪之功未見如所說而其毒有甚煮一二日而芽方生用者宜審之草蒿味苦寒無毒主疥瘙痂癢惡瘡殺蝨留熱在骨節間明目一名青蒿一名方潰生華陰川澤陶隱居云處處有之即今青蒿人亦取雜香菜食之唐本注云此蒿生挪敷金瘡大止血生肉止疼痛良今按陳藏器本草蒿主鬼氣屍疰伏連婦人血氣腹內滿及冷熱久痢秋冬用子春夏用苗並搗絞汁服亦曝乾為末小便中服如覺冷用酒煮又燒為灰紙八九重淋取汁和石灰去息肉黶子臣禹錫等謹按蜀本圖經云葉似茵陳蒿而背不白高四尺許四月五月採苗日乾江東人呼為𤜢蒿為其臭似𤜢北人呼為青蒿爾雅云蒿菣釋曰蒿一名菣詩小雅云食野之蒿陸機云青蒿也荊豫之間汝南汝陰皆云菣孫炎云荊楚之間謂蒿為菣郭云今人呼青蒿香中炙啖者為菣是也日華子云青蒿補中益氣輕身補勞駐顏色長毛髮發黑不老兼去蒜髮心痛熱黃生搗汁服並敷之瀉痢飯飲調末五錢匕燒灰和石灰煎治惡毒瘡並莖亦用又云子味甘冷無毒明目開胃炒用治勞壯健人小便浸用治惡疥癬風疹殺蝨煎洗又云臭蒿子涼無毒治勞下氣開胃止盜汗及邪氣鬼毒又名草蒿圖經曰草蒿即青蒿也生華陰川澤今處處有之春生苗葉極細嫩時人亦取雜諸香菜食之至夏高三五尺秋後開細淡黃花花下便結子如粟米大八九月間採子陰乾根莖子葉併入藥用乾者炙作飲香尤佳青蒿亦名方潰凡使子勿使葉使根勿使莖四者若同反以成疾得童子小便浸之良治骨蒸熱勞為最古方多單用者葛氏治金刃初傷取生青蒿搗敷上以帛裹創血止即愈崔元亮海上方療骨蒸鬼氣取童子小便五大斗澄過青蒿五斗八九月揀帶子者最好細銼二物相和納好大釜中以猛火煎取三大斗去滓淨洗釜令乾再瀉汁安釜中以微火煎可二大斗即取豬膽十枚相和煎一大斗半除火待冷以新瓷器盛每欲服時取甘草二三兩熟炙搗末以煎和搗一千杵為丸空腹粥飲下二十丸漸增至三十丸止雷公云凡使唯中為妙到膝即仰到腰即俯使子勿使葉使根勿使莖四件若同使翻然成痼疾採得葉不計多少用七歲兒童七個溺浸七日七夜後漉出曬乾用之食療云青蒿寒益氣長髮能輕身補中不老明目煞風毒搗敷瘡上止血生肉最早春便生色白者是自然香醋淹為菹益人治骨蒸以小便漬一兩宿干末為丸甚去熱勞又鬼氣取子為末酒服之方寸匕瘥燒灰淋汁和石灰煎治惡瘡瘢靨百一方治蜂螫人嚼青蒿敷瘡上即瘥斗門方治丈夫婦人勞瘦青蒿細銼水三斗童子小便五升同煎取二升半去滓入器中煎成膏丸如梧桐子大空心臨臥以溫酒吞下二十丸衍義曰草蒿今青蒿也在處有之得春最早人剔以為蔬根赤葉香今人謂之青蒿亦有所別也但一類之中又取其青色者陝西綏銀之間有青蒿在蒿叢之間時有一兩棵迥然青色土人謂之為香蒿莖葉與常蒿一同但常蒿色淡青此蒿色深青猶青故氣芬芳恐古人所用以深青者為勝不然諸蒿何嘗不青旋覆花味鹹甘溫微冷利有小毒主結氣脅下滿驚悸除水去五臟間寒熱補中下氣消胸上痰結唾如膠漆心脅痰水膀胱留飲風氣濕痹皮間死肉目中眵音嗤䁾音蔑利大腸通血脈益色澤一名戴椹一名金沸草一名盛椹其根主風濕生平澤川穀五月採花日乾二十日成陶隱居云出近道下濕地似菊花而大又別有旋葍根出河南來北國亦有形似芎藭唯合旋葍膏用之余無所入非此旋覆花根也唐本注云旋覆根在中品陶云苗似姜根似高良薑而細此是山姜證不是旋覆根今復道從北國來似芎藭芎藭與高良薑全彷彿爾臣禹錫等謹按蜀本圖經云旋覆花葉似水蘇花黃如菊今所在皆有六月至九月採花藥性論云旋覆花使味甘無毒主肋脅氣下寒熱水腫主治膀胱宿水去逐大腹開胃止嘔逆不下食爾雅云蕧盜庚注旋覆似菊疏蕧一名盜庚也蕭炳云旋平聲復用花葍音福旋徐願反用根日華子云無毒明目治頭風通血脈葉止金瘡血圖經曰旋覆花生平澤川穀今所在有之二月以後生苗多近水旁大似紅藍而無刺長一二尺以來葉如柳莖細六月開花如菊花小銅錢大深黃色上黨田野人呼為金錢花七月八月採花曝乾二十日成今近都人家園圃所蒔金錢花花葉並如上說極易繁盛恐即經旋覆也張仲景治傷寒汗下後心下痞堅噫氣不除有七物旋覆代赭湯雜治婦人有三物旋覆湯胡洽有除痰飲在兩脅脹滿等旋覆花丸用之尤多雷公云凡採得後去裹花蕊殼皮並蒂子取花蕊蒸從巳至午曬乾用外臺秘要救急續斷筋法取旋覆花草根淨洗土搗量瘡大小敷之日一二易以瘥為度又方破斫筋斷者以旋覆根搗汁瀝瘡中仍用滓封瘡上十五日即斷筋便續此方出蘇景中家獠奴用效經驗後方治中風及壅滯以旋覆花洗塵令淨搗末煉蜜丸如桐子大夜臥以茶湯下五丸至七丸十丸梅師方治金瘡止血搗旋覆花苗敷瘡上衍義曰旋覆花葉如大菊又如艾蒿八九月有花大如梧桐子花淡黃綠繁茂圓而覆下亦一異也其香過於菊行痰水去頭目風其味甘苦辛亦走散之藥也其旋花四月五月有花別一種非此花也第七卷已具之藜蘆味辛苦寒微寒有毒主蠱毒咳逆泄痢腸澼頭瘍疥瘙惡瘡殺諸蟲毒去死肌療噦逆喉痹不通鼻中息肉馬刀爛瘡不入湯一名蔥苒一名蔥菼音毯一名山蔥生泰山山谷三月採根陰乾黃連為之使反細辛芍藥五參惡大黃陶隱居云近道處處有根下極似蔥而多毛用之只剔取根微炙之臣禹錫等謹按蜀本圖經云葉似鬱金秦艽蘘荷等根若龍膽莖下多毛夏生冬凋枯今所在山谷皆有八月採根陰乾吳氏云藜蘆一名蔥葵一名豐蘆一名蕙葵神農雷公辛有毒歧伯咸有毒季氏大毒大寒扁鵲苦有毒大葉根小相連範子曰藜蘆出河東黃白者善藥性論云藜蘆使有大毒能主上氣去積年膿血泄痢治惡風瘡疥癬頭禿殺蟲圖經曰藜蘆生泰山山谷今陝西山南東西州郡皆有之三月生苗葉青似初出棕心又似車前莖似蔥白青紫色高五六寸上有黑皮裹莖似棕皮其花肉紅色根似馬腸根長四五寸許黃白色二月三月採根陰乾此有二種一種水藜蘆莖葉大同只是生在近水溪澗石上根鬚百餘莖不中入藥用今用者名蔥白藜蘆根鬚甚少只是三二十莖生高山者為佳均州土俗亦呼為鹿蔥此藥大吐上膈風涎暗風癇病小兒𪖲齁用錢匕一字則惡吐人又用通頂令人嚏而古經本草云療嘔逆其效未詳今萱草亦謂之鹿蔥其類全別主療亦不同耳雷公云凡採得去頭用糯米泔汁煮從巳至未出曬乾用之聖惠方治黑痣生於身面上用藜蘆灰五兩水一大碗淋灰汁於銅器中盛以重湯煮令如黑膏以針微撥破痣處點之良不過三遍神驗千金翼治牙疼納藜蘆末於牙孔中勿咽汁神效經驗後方治中風不語喉中如拽鋸聲口中涎沫取藜蘆一分天南星一個去浮皮於臍子上陷一個坑子納入陳醋二橡斗子四面用火逼令黃色同一處搗再研極細用生面為丸如赤豆大每服三丸溫酒下百一方治黃疸取藜蘆著灰中炮之小變色搗為末水服半錢匕小吐不過數服斗門方治疥癬用藜蘆細搗為末以生油塗敷之簡要濟眾治中風不省人事牙關緊急者藜蘆一兩去蘆頭濃煎防風湯浴過焙乾碎切炒微褐色搗為末每服半錢溫水調下以吐出風涎為效如人行三里未吐再服衍義曰藜蘆為末細調治馬疥癢鉤吻味辛溫有大毒主金瘡乳痓中惡風咳逆上氣水腫殺鬼疰蠱毒破症積除腳膝痹痛四肢拘攣惡瘡疥蟲殺鳥獸一名野葛折之青煙出者名固活甚熱不入湯生傅音附高山谷及會稽東野半夏為之使惡黃芩陶隱居云五符中亦云鉤吻是野葛言其入口則鉤人喉吻或言吻作挽字牽挽人腸而絕之核胡革切事而言乃是兩物野葛是根狀如牡丹所生處亦有毒飛鳥不得集之今人用合膏服之無嫌鉤吻別是一草葉似黃精而莖紫當心抽花黃色初生既極類黃精故以為殺生之對也或云鉤吻是毛莨此本及後說參錯不同未詳云何又有一物名陰命赤色著木懸其子生山海中最有大毒入口能立殺人唐本注云野葛生桂州以南村墟閭巷間皆有彼人通名鉤吻亦謂苗名鉤吻根名野葛蔓生人或誤食其葉者皆致死而羊食其苗大肥物有相伏如此若巴豆鼠食則肥也陶云飛鳥不得集之妄矣其野葛以時新採者皮白骨黃宿根似地骨嫩根如漢防己皮節斷者良正與白花藤根相類不深別者頗亦惑之其新取者折之無塵氣經年以後則有塵起根骨似枸杞有細孔者人折之則塵氣從孔中出今折枸杞根亦然經言折之青煙起者名固活為良此亦不達之言也凡黃精直生如龍膽澤漆兩葉或四五葉相對鉤吻蔓生葉如柿葉博物志云鉤吻葉似鳧葵並非黃精之類毛莨是有毛石龍芮何干鉤吻臣禹錫等謹按蜀本秦鉤吻主喉痹咽中塞聲變咳逆氣溫中一名除辛生寒石山二月八月採謹按鉤吻一名野葛者亦如徐長卿赤箭鬼箭等並一名鬼督郵鬼督郵自是一物今鉤吻一名野葛則野葛自有一種明矣且藥有名同而體異者極多非獨此也據陶注云鉤吻葉似黃精而莖紫當心抽花黃色者是蘇云野葛出桂州葉似柿葉人食之即死者當別是一物爾又云苗名鉤吻根名野葛亦非通論按今市人皆以葉似黃精者為鉤吻按雷公炮炙方云黃精勿令誤用鉤吻鉤吻葉似黃精而頭尖處有兩毛若鉤是也吳氏云秦鉤吻一名毒根神農辛雷公有毒殺人生南越山或益州葉如葛赤莖大如箭根黃正月採葛洪方云鉤吻與食芹相似而生處無他草其莖有毛誤食之殺人嶺表錄異云野葛毒草也俗呼為胡蔓草誤食之則用羊血解之陳藏器云人食其葉飲冷水即死冷水發其毒也彼人以野葛飼人勿與冷水至肥大以冷水飲之至死懸屍於樹汁滴地生菌子收之名菌藥烈於野葛胡蔓葉細長光潤雷公云凡使勿用地精苗莖與鉤吻同其鉤吻治人身上惡毒瘡效其地精熬人採得後細銼搗了研絞取自然汁入膏中用勿誤餌之黃帝問天老曰天地所生豈有食之死者乎天老曰太陰之精名曰鉤吻不可食之入口則死博物志云鉤吻毒桂心蔥葉涕解之射音夜干味苦平微溫有毒主咳逆上氣喉痹咽痛不得消息散結氣腹中邪逆食飲大熱療老血在心脾間咳唾言語氣臭散胸中熱氣久服令人虛一名烏扇一名烏蒲一名烏翣一名烏吹一名草姜生南陽川穀田野三月三日採根陰乾陶隱居云此即是烏翣根庭臺多種之黃色亦療毒腫方多作夜干字今射亦作夜音人言其葉是鳶尾而復又有鳶頭此蓋相似爾恐非烏翣者即其葉名矣又別有射干相似而花白莖長似射人之執竿者故阮公詩云射干臨層城此不入藥用根亦無塊唯有其質唐本注云射干此說者是其鳶尾葉都似射干而花紫碧色不抽高莖根似高良薑而肉白根即鳶頭陶說由跋都論此爾臣禹錫等謹按蜀本云射干微寒圖經云骯二三尺花黃實黑根多須皮黃黑肉黃赤今所在皆有二月八月採根去皮日乾用之陳藏器云射干鳶尾按此二物相似人多不分射干總有三物佛經云夜干貂尾此是惡獸似青黃狗食人郭云能緣木又阮公詩云夜干臨層城此即是樹今之射干殊高大者本草射干即人間所種為花卉亦名鳳翼葉如鳥翅秋生紅花赤點鳶尾亦人間多種苗低下於射干如鳶尾春夏生紫碧花者是也又注云據此猶錯夜乾花黃根亦黃色藥性論云射干使有小毒能治喉痹水漿不入能通女人月閉治疰氣消瘀血日華子云消痰破癥結胸膈滿腹脹氣喘痃癖開胃下食消腫毒鎮肝明目根潤亦有形似高良薑大小赤黃色淡硬五六七八月採圖經曰射音夜干生南陽山谷田野今在處有之人家庭砌間亦多種植春生苗高二三尺葉似蠻姜而狹長橫張疏如翅羽狀故一名烏翣謂其葉耳葉中抽莖似萱草而強硬六月開花黃紅色瓣上有細紋秋結實作房中子黑色根多須皮黃黑肉黃赤三月三日採根陰乾陶隱居云療毒腫方多作夜干今射亦作夜音又云別有射干相似而花白莖長似射人之執竿者故阮公詩云射干臨層城是也此不入藥用蘇恭射干此說是鳶尾葉都似射干而花紫碧色不抽高莖根似高良薑面肉白根即鳶頭也又按荀子云西方有木焉名曰射干莖長四寸生於高山之上而臨百仞之淵其莖非能長也所立者然也楊倞注云當是草而云木誤也今觀射干之形其莖梗疏長正如長竿狀得名由此耳而陶以夜音為疑且古字音呼固多相通若漢官僕射主射而亦音夜非有別義也又射干多生山崖之間其莖雖細小亦類木梗故荀子名木而蘇謂陶說為鳶尾鳶尾花亦不白其白者自是射干之類非鳶尾也鳶尾布地而生葉扁闊於射干蘇云花紫碧色根如高良薑者是也本經云生九嶷山谷今在處有大類蠻姜也五月採一云九月十月採根日乾雷公云凡使先以米泔水浸一宿漉出然後用堇竹葉煮從午至亥漉出日乾用之外臺秘要治喉痹射干一片含咽汁瘥肘後方治小兒疝發時腫痛如刺用生射干汁取下亦可丸服之衍義曰射干此乃荀子所說西方之木名曰射干者也注復引本草曰不合以射干為木殊不知五行只以水火木金土而言之故儒者以草木皆木也金鉛皆金也糞土皆土也灰火皆火也水池皆水也由是言之即非佛經所說火宅喻之獸及阮公所云臨層城者之木況本經亦曰一名草姜故知是草無疑今治肺氣喉痹為佳日華子曰大小似高良薑赤黃色此得之蛇全合是含字味苦微寒無毒主驚癇寒熱邪氣除熱金瘡疽痔鼠瘻惡瘡頭瘍療心腹邪氣腹痛濕痹養胎利小兒一名蛇銜生益州山谷八月採陰乾陶隱居云即是蛇銜蛇銜有兩種並生石上當用細葉黃花者處處有之亦生黃土地不必皆生石上也唐本注云全字乃是含字陶見誤本宜改為含含銜義同見古本草也今按陳藏器本草云蛇銜主蛇咬種之亦令無蛇今以草納蛇口中縱傷人亦不能有毒矣臣禹錫等謹按蜀本圖經云生石上及下濕地花黃白人家亦種之五月採苗生用藥性論云蛇銜臣有毒能治丹疹治小兒寒熱日華子云蛇含能治蛇蟲蜂虺所傷及眼赤止血㶸風疹癰腫莖葉俱用又名威蛇圖經曰蛇含生益州山谷今近外亦有之生土石上或下濕地蜀中人家亦種之一莖五葉或七葉此有兩種當用細葉黃色花者為佳八月採根陰乾古今錄驗方治赤疹用蛇銜草搗令極爛敷之瘥赤疹者由冷濕搏於肌中甚即為熱乃成赤疹得天熱則劇冷則減是也古今諸丹毒瘡腫方通用之又下有女青條云蛇銜根也生朱崖陶隱居蘇恭皆以為若是蛇銜根不應獨生朱崖或云是雀瓢即蘿摩之別名或云二物同名以相類故也醫家鮮用亦稀識別故但附著於此雷公云凡使勿用有蘖尖葉者號竟命草其葉別空只酸澀不入用若誤服之吐血不止速服知時子解之採得後去根莖只取葉細切曬乾勿令犯火肘後方治金瘡亦搗敷之佳又方治蜈蚣螫人蛇含草挪敷之斗門方治產後瀉痢用小龍牙根一握濃煎服之甚效蛇含是也抱朴子云蛇銜膏連已斷之指晉異苑云有田父見一蛇被傷又見蛇銜一草著其瘡上經日傷蛇乃去田父因取其草以治瘡皆驗遂名曰蛇銜草常山味苦辛寒微寒有毒主傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆療鬼蠱往來水脹洒洒惡寒鼠瘻一名互草生益州川穀及漢中八月採根陰乾畏玉札陶隱居云出宜都建平細實黃者呼為雞骨常山用最勝唐本注云常山葉似茗狹長莖圓兩葉相當三月生白花青萼五月結實青圓三子為房生山谷間高者不過三四尺臣禹錫等謹按蜀本圖經云樹高三四尺根似荊根黃色而破今出金州房州梁州五月六月採葉名蜀漆也藥性論云常山忌蔥味苦有小毒治諸瘧吐痰涎去寒熱用小麥竹葉三味合煮小兒甚良主瘧洒洒寒熱不可進多令人大吐治項下瘤癭蕭炳云得甘草吐瘧日華子云忌菘菜圖經文具蜀漆條下雷公云凡使春採根葉夏秋冬一時用使酒浸一宿至明漉出日乾熬搗少用勿令老人久病服之切忌也外臺秘要治瘧常山三兩以漿水三升浸經一宿煎取一升欲發前頓服然後微吐肘後方治瘧病常山三兩搗末以雞子白和丸如桐子大空腹三十丸衍義曰常山蜀漆根也亦治瘧吐痰如雞骨者佳蜀漆味辛平微溫有毒主瘧及咳逆寒熱腹中症堅痞結積聚邪氣蠱毒鬼疰療胸中邪結氣吐出之生江林山川穀及蜀漢中常山苗也五月採葉陰乾栝蔞為之使惡貫眾陶隱居云是常山苗而所出又異者江林山即益州江陽山名故是同處爾彼人採仍縈結作丸得時燥者佳唐本注云此草日微萎則把束曝使燥色青白堪用若陰乾便黑爛郁壞矣陶云作丸此乃梌餅非蜀漆也臣禹錫等謹按蜀本圖經云五月採日乾之藥性論云蜀漆使畏橐吾味苦有小毒常山苗也能主治瘴鬼瘧多時不瘥去寒熱瘧治溫瘧寒熱不可多進令人吐逆主堅症下肥氣積聚蕭炳云桔梗為使日華子云蜀漆治癥瘕又名雞尿草鴨尿草李含光云常山莖也八月九月採圖經曰蜀漆生江林山川穀及蜀漢常山苗也常山生益州山谷及漢中蜀漆根也江林山即益州江陽山名是同處耳今京西淮浙湖南州郡亦有之葉似茗而狹長兩兩相當莖圓有節三月生紅花青萼五月結實青圓三子為房苗高者不過三四尺根似荊黃色而海州出者葉似楸葉八月有花紅白色子碧色似山楝子而小五月採葉八月採根陰乾此二味為治瘧之最要張仲景蜀漆散用蜀漆雲母龍骨等分杵末患者至發前以漿水和半錢服之溫瘧加蜀漆半分臨發時服一錢匕今天台山出一種草名土常山苗葉極甘人用為飲香其味如蜜又名蜜香草性亦涼飲之益人非此常山也雷公云凡採得後和根苗臨用時即去根取莖並葉同拌甘草四兩細銼用拌水令濕同蒸臨時去甘草取蜀漆五兩細銼又拌甘草水勻又蒸了任用勿食木筍衍義曰蜀漆常山苗也治瘧多吐人其他亦未見所長此草也慮歲久人或別有異論故預云余如經甘遂味苦甘寒大寒有毒主大腹疝瘕腹滿面目浮腫留飲音癊宿食破症堅積聚利水穀道下五水散膀胱留熱皮中痞熱氣腫滿一名甘藁一名陵藁一名凌澤一名重澤一名主田生中山川穀二月採根陰乾瓜蒂為之使惡遠志反甘草陶隱居云中山在代郡先第一本出泰山江東比來用京口者大不相似赤皮者勝白皮者都下亦有名草甘遂殊惡蓋謂贗音雁偽之草非言草石之草也唐本注云所謂草甘遂者乃蚤休也療體全別真甘遂苗似澤漆草甘遂苗一莖莖六七葉如蓖麻鬼臼葉生食一升亦不能利大療癰疽蛇毒且真甘遂皆以皮赤肉白作連珠實重者良亦無皮白者皮白乃是蚤休俗名重臺也臣禹錫等謹按藥性論云京甘遂味苦能瀉十二種水疾能治心腹堅滿下水去痰水主皮肌浮腫日華子云京西者上汴滄吳者次形似和皮甘草節節切之圖經曰甘遂生中山川穀今陝西江東亦有之或云京西出者最佳汴滄吳者為次苗似澤漆莖短小而葉有汁根皮赤肉白作連珠又似和皮甘草二月採根節切之陰乾以實重者為勝又有一種草甘遂苗一莖莖端六七葉如蓖麻鬼臼葉用之殊惡生食一升亦不能下唐注云草甘遂即蚤休也蚤休自有條古方亦單用下水小品療妊娠小腹滿大小便不利氣急已服豬苓散不瘥者以甘遂散下之方泰山赤皮甘遂二兩搗篩以白蜜二兩和丸如大豆粒多覺心下煩得微下者日一服之下後還將豬苓散不得下日再服漸加可至半錢匕以微下為度中間將散也豬苓散見豬苓條中雷公云凡採得後去莖於槐砧上細銼用生甘草湯小薺苨自然汁二味攪浸三日其水如墨汁更漉出用東流水淘六七次令水清為度漉出於土器中熬令脆用之肘後方治卒腫滿身面皆洪大甘遂一分粉之豬腎一枚分為七臠入甘遂於中以火炙之令熟旦食至四五當覺腹脅鳴小便利楊氏產乳治腹滿大小便不利氣急甘遂二分為散分五服熟水下如覺心下煩得微利日一服衍義曰甘遂今唯用連珠者然經中不言此藥專於行水攻決為用入藥須斟酌白蘞味苦甘平微寒無毒主癰腫疽瘡散結氣止痛除熱目中赤小兒驚癇溫瘧女子陰中腫痛下赤白殺火毒一名菟核一名白草一名白根一名崑崙生衡山山谷二月八月採根曝乾代赭為之使反烏頭陶隱居云近道處處有之作藤生根如白芷破片以竹穿之日乾生取根搗敷癰腫亦效唐本注云此根似天門冬一株下有十許根皮赤黑肉白如芍藥殊不似白芷臣禹錫等謹按蜀本圖經云蔓生枝端有五葉今所在有之藥性論云白蘞使殺火毒味苦平有毒惡烏頭能主氣壅腫用赤小豆𦬣草為末雞子白調塗一切腫毒治面上疱瘡子治溫瘧主寒熱結壅熱腫日華子云止驚邪發背瘰癧腸風痔瘻刀箭瘡撲損溫熱瘧疾血痢湯火瘡生肌止痛圖經曰白蘞生衡山山谷今江淮州郡及荊襄懷孟商齊諸州皆有之二月生苗多在林中作蔓赤莖葉如小桑五月開花七月結實根如雞鴨卵三五枚同窠皮赤黑肉白二月八月採根破片曝乾今醫治風金瘡及面藥方多用之濠州有一種赤蘞功用與白蘞同花實亦相類但表裡俱赤耳聖惠方治疔瘡以水調白蘞末敷瘡上外臺秘要備急治湯火灼爛用白蘞末敷之肘後方治發背白蘞末敷並良衍義曰白蘞白芨古今服餌方少有用者多見於斂瘡方中二物多相須而行青葙子味苦微寒無毒主邪氣皮膚中熱風瘙身癢殺三蟲惡瘡疥蝨痔蝕下部䘌瘡子名草決明療唇口青一名草蒿一名萋蒿生平谷道旁三月採莖葉陰乾五月六月採子陶隱居云處處有似麥柵花其子甚細後又有草蒿別本亦作草藁今即主療殊相類形名又相似極多足為疑而實兩種也唐本注云此草苗高尺許葉細軟花紫白色實作角子黑而扁光似莧實而大生下濕地四月五月採荊襄人名為崑崙草搗汁單服大療溫癘甘䘌臣禹錫等謹按蜀本圖經云葉細軟長亦為蔓今所在下濕地有藥性論云青葙子一名草藁味苦平無毒能治肝臟熱毒沖眼赤障青盲翳腫主惡瘡疥瘙治下部蟲䘌瘡蕭炳云今主理眼有青葙子丸又有一種花黃名陶珠術苗相似日華子云治五臟邪氣益腦髓明耳目鎮肝堅筋骨去風寒濕痹苗止金瘡血圖經曰青葙子生平谷道旁今江淮州郡近道亦有之二月內生青苗長三四尺葉闊似柳細軟莖似蒿青紅色六月七月內生花上紅下白子黑光而扁有似莨菪根似蒿根而白直下獨莖生根六月八月採子又有一種花黃名陶珠術苗亦相似恐不堪用之雷公云凡用勿使思蓂子並鼠紬子其二件真似青葙子只是味不同其思蓂子味粗煎之有涎凡用先燒鐵臼杵單搗用之廣利方治鼻衄出血不止以青葙子汁三合灌鼻中三國志云魏略初平中有青牛先生常服青葙子年如五六十者人或識之謂其已百歲有餘爾衍義曰青葙子經中並不言治眼藥性論始言之能治肝臟熱毒沖眼赤障青盲蕭炳亦云理眼日華子云益腦髓明耳目鎮肝今人多用治眼殊不與經意相當雚音桓菌音郡味鹹甘平微溫有小毒主心痛溫中去長蟲白癬音蘚蟯音饒蟲蛇螫毒癥瘕諸蟲疽蝸去蛔蟲寸白惡瘡一名雚盧生東海池澤及渤海章武八月採陰乾得酒良畏雞子陶隱居云北來此亦無有形狀似菌云鸛屎所化生一名鸛菌單末之豬肉臛和食可以遣蛔蟲唐本注云雚菌今出渤海蘆葦澤中鹹鹵地自然有此菌爾亦非是鸛屎所化生也其菌色白輕虛表裡相似與眾菌不同療蛔蟲有效臣禹錫等謹按蜀本圖經云今出滄州秋雨以時即有天旱及霖即稀日乾者良藥性論云雚菌味苦能除腹內冷痛治白禿食療云菌子發五臟風壅經絡動痔病昏多睡背膊四肢無力又菌子有數般槐樹上生者良野田中者恐有毒殺人又多發冷氣外臺秘要治蛔蟲攻心如刺吐清汁雚蘆一兩杵末以羊肉臛和之旦頓服佳金匱玉函云菌仰卷及赤色不可食木耳青色及仰生者不可食之白芨味苦辛平微寒無毒主癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱音肥緩不收除白癬疥蟲一名甘根一名連及草生北山川穀又冤句及越山紫石英為之使惡理石畏李核杏仁陶隱居云近道處處有之葉似杜若根形似菱米節間有毛方用亦稀可以作糊唐本注云此物山野人患手足皸音軍拆嚼以塗之有效臣禹錫等謹按蜀本云反烏頭又圖經云葉似初生栟音並櫚音閭棕也及藜蘆莖端生一臺四月開生紫花七月實熟黃黑色冬凋根似菱三角白色角頭生芽今出申州二月八月採根用吳氏云神農苦黃帝辛李氏大寒雷公辛無毒莖葉如生薑藜蘆十月華直上紫赤根白連二月八月九月採藥性論云白芨使能治結熱不消主陰下痿治面上䵟疱令人肌滑日華子云味甘㿌止驚邪血邪癇疾赤眼癥結發背瘰癧腸風痔瘻刀箭瘡撲損溫熱瘧疾血痢湯火瘡生肌止痛風痹圖經曰白芨生北山川穀又冤句及越山今江淮河陝漢黔諸州皆有之生石山上春生苗長一尺許似栟櫚及藜蘆莖端生一臺葉兩指大青色夏開花紫七月結實至熟黃黑色至冬葉凋根似菱米有三角白色角端生芽二月七月採根今醫治金瘡不瘥及癰疸方中多用之經驗方治鼻衄不止甚者白芨為末津調塗山根上立止衍義白芨文具白蘞條下大戟味苦甘寒大寒有小毒主蠱毒十二水腹滿急痛積聚中風皮膚疼痛吐逆頸腋癰腫頭痛發汗利大小腸一名邛鉅生常山十二月採根陰乾反甘草陶隱居云近道處處皆有至猥賤也臣禹錫等謹按唐本云畏菖蒲蘆草鼠尿蜀本圖經云苗似甘遂高大葉有白汁花黃根似細苦參皮黃黑肉黃白五月採苗二月八月採根用爾雅云蕎邛鉅注云今本草大戟也藥性論云大戟使反芫花海藻毒用菖蒲解之味苦辛有大毒破新陳下惡血癖塊腹內雷鳴通月水善治瘀血能墮胎孕日華子云小豆為之使惡薯蕷瀉毒藥泄天行黃病溫瘧破癥結圖經曰大戟澤漆根也生常山今近道多有之春生紅芽漸長作叢高一尺以來葉似初生楊柳小團三月四月開黃紫花團圓似杏花又似蕪荑根似細苦參皮黃黑肉黃白色秋冬採根陰乾淮甸出者莖圓高三四尺花黃葉至心亦如百合苗江南生者葉似芍藥醫家用治隱疹風及風毒腳腫並煮水熱淋日再三便愈李絳兵部手集方療水病無問年月深淺雖復脈惡亦主之大戟當歸橘皮各一大兩切以水二大升煮取七合頓服利水二三斗勿怪至重不過再服便瘥禁毒食一年水下後更服永不作此方出張尚客雷公云凡使勿用附生者若服冷泄氣不禁即煎薺苨子湯解夫採得後於槐砧上細銼與細銼海芋葉拌蒸從巳至申去芋葉曬乾用之太上八帝玄變經大戟必瀉澤漆味苦辛微寒無毒主皮膚熱大腹水氣四肢面目浮腫丈夫陰氣不足利大小腸明目身輕一名漆莖大戟苗也生泰山川澤三月三日七月七日採莖葉陰乾小豆為之使惡薯蕷陶隱居云此是大戟苗生時摘葉有白汁故名澤漆亦能齧人肉臣禹錫等按蜀本圖經云五月採日乾用藥性論云澤漆使治人肌熱利小便日華子云冷微毒止瘧疾消痰退熱此即大戟花川澤中有莖梗小有葉花黃葉似嫩菜四五月採之圖經曰澤漆大戟苗也生秦山川澤今冀州鼎州明州及近道亦有之生時摘葉有白汁出亦能齧人故以為名然張仲景治肺咳上氣脈沉者澤漆湯主之澤漆三斤以東流水五斗煮取一斗五升然後用半夏半升紫參生薑白前各五兩甘草黃芩人參桂各三兩八物㕮咀之納澤漆汁中煎取五升每服五合日三至夜服盡唐本余有小毒逐水主蠱毒聖惠方治十種水氣用澤漆十斤於夏間取莖嫩葉入酒一斗研汁約二斗於銀鍋內慢火熬如稀餳即止瓷器內收每日空心溫酒調下一茶匙以愈為度茵芋味苦溫微溫有毒主五臟邪氣心腹寒熱羸瘦如瘧狀發作有時諸關節風濕痹痛療久風濕走四肢腳弱一名莞草一名卑共生泰山川穀三月三日採葉陰乾陶隱居云好者出彭城今近道亦有莖葉狀如莽草而細軟取用之皆連細莖方用甚稀淮以合療風酒散臣禹錫等謹按蜀本圖經云苗高三四尺葉似石榴短厚莖赤今出華州雍州四月採莖葉日乾藥性論云茵芋味苦辛有小毒能治五臟寒熱似瘧諸關節中風痹拘急攣痛治男子女人軟腳毒風治溫瘧發作有時日華子云治一切冷風筋骨怯弱羸顫入藥炙用出自海鹽形似石南樹生葉厚五六七月採圖經曰茵芋出泰山川穀今雍州絳州華州杭州亦有之春生苗高三四尺莖赤藥似石榴而短厚又似石南葉四月開細白花五月結實三月四月七月採葉連細莖陰乾用或云日乾胡洽治賊風手足枯痹四肢拘攣茵芋酒主之其方茵芋附子天雄烏頭秦艽女萎防風防己躑躅石南細辛桂心各一兩凡十二味切以絹袋盛清酒一斗漬之冬七日夏三日春秋五日藥成初服一合日三漸增之以微痹為度赭音者魁味甘平無毒主心腹積聚除三蟲生山谷二月採陶隱居云狀如小芋子肉白皮黃近道亦有唐本注云赭魁大者如斗小者如升藥似杜蘅蔓生草木上有小毒陶所說者乃土卵爾不堪藥用梁漢人名為黃獨蒸食之非赭魁也臣禹錫等謹按蜀本圖經云苗蔓延生葉似蘿摩根若菝葜皮紫黑肉黃赤大者輪囷如升小者若拳今所在有之據本經云無毒而蘇云有小毒又云陶說者梁漢人蒸食之則無毒明矣乃陶說為是也陳藏器云按土卵蔓生根如芋人以灰汁煮食之不聞有功也貫眾味苦微寒有毒主腹中邪熱氣諸毒殺三蟲去寸白破癥瘕除頭風止金瘡花療惡瘡令人泄一名貫節一名貫渠一名百頭一名虎卷一名扁苻一名伯萍一名樂藻此謂草鴟頭生玄山山谷及冤句少室山二月八月採根陰乾雚菌為之使陶隱居云近道亦有葉如大蕨其根形色毛芒全似老鴟頭故呼為草鴟頭臣禹錫等謹按爾雅云濼貫眾注葉圓銳莖毛黑布地冬不死一名貫渠廣雅云貫節蜀本云一名樂音洛藻又圖經云苗似狗脊狀如雉尾根直多枝皮黑肉赤曲者名草鴟頭療頭風用之今所在山谷陰處有之藥性論云貫眾使主腹熱赤小豆為使殺寸白蟲圖經曰貫眾生玄山山谷及冤句少室山今陝西河東州郡及荊襄間多有之而少有花者春生苗赤葉大如蕨莖稈三稜葉綠色似小雞瓴又名鳳尾草根紫黑色形如大瓜下有黑鬚毛又似老鴟爾雅云濼舒若切貫眾郭璞注云葉圓銳莖毛黑布地冬不死廣雅謂之貫節是也三月採根曬乾荊南人取根為末水調服一錢匕止鼻血有效蕘音饒花味苦辛寒微寒有毒主傷寒溫瘧下十二水破積聚大堅癥瘕盪滌腸胃中留癖飲食寒熱邪氣利水道療痰飲咳嗽生咸陽川穀及河南中牟六月採花陰乾陶隱居云中牟者平時唯從河上來形似蕪花而極細白色比來隔絕殆不可得唐本注云此藥苗似胡荽莖無刺花細黃色四月五月收與蕪花全不相似也臣禹錫等謹按蜀本圖經云苗高二尺許生崗原上今所在有之見用雍州者好藥性論云蕘花使治咳逆上氣喉中腫滿疰氣蠱毒痃癖氣塊下水腫等衍義曰蕘花今京洛間甚多張仲景傷寒論以蕘花治利者以其行水也水去則利止其意如此然今人用時當以意斟酌不可使過與不及也仍須是有是證者方可用牙子味苦酸寒有毒主邪氣熱氣疥瘙惡瘍瘡痔去白蟲一名狼牙一名狼齒一名狼子一名犬牙生淮南川穀及冤句八月採根曝乾中濕腐爛生衣者殺人蕪荑為之使惡地榆棗肌陶隱居云近道處處有之其根牙亦似根獸之牙齒也臣禹錫等謹按蜀本圖經云苗似蛇莓而厚大深綠色根萌芽若獸之牙今所在有之二月三月採牙日乾藥性論云狼牙使味苦能治浮風瘙癢殺寸白蟲煎汁洗惡瘡日華子云殺腹臟一切蟲止赤白痢煎服圖經曰牙子即狼牙子生淮南川穀及冤句今江東京東州郡多有之苗似蛇莓而厚大深綠色根黑若獸之齒牙故以名之三月八月採根日乾古方多用治蛇毒其法取獨莖狼牙搗臘月豬脂和以敷上立瘥又楊炎南行方云六月以前用葉以後用根生㕮咀以木葉裹之煻火炮令熱用熨瘡上冷即止張仲景治婦人陰瘡亦單用之聖惠方治陰瘡洗方用狼牙五兩細銼水五升煮至三升溫洗之外臺秘要範汪治寸白蟲方狼牙五兩搗末蜜丸如麻子宿不食明旦以漿水下一合服盡瘥又方治金瘡狼牙草莖葉熟搗敷貼之兼止血又方治婦人陰蝕若中爛傷狼牙三兩㕮咀以水四升煮去滓納苦酒如雞子一杯以綿濡湯瀝患處日四五即愈千金方治小兒陰瘡濃煮狼牙草洗之又治射工即水弩子也以狼牙葉冬取根搗令熟敷之及己味苦平有毒主諸惡瘡疥痂瘻蝕及牛馬諸瘡陶隱居云今人多用以合瘡疥膏甚驗唐本注云此草一莖莖頭四葉葉隙著白花好生山谷陰虛軟地根似細辛而黑有毒入口使人吐血今以當杜蘅非也疥瘙必須用之臣禹錫等謹按蜀本圖經云二月採根日乾之藥性論云及己亦可單用能治瘑疥日華子云主頭瘡白禿風瘙皮膚癢蟲可煎汁浸並敷羊躑躅味辛溫有大毒主賊風在皮膚中淫淫痛溫瘧惡毒諸痹邪氣鬼疰蠱毒一名玉支生太行山川穀及淮南山三月採花陰乾陶隱居云近道諸山皆有之花苗似鹿蔥羊誤食其葉躑躅而死故以為名不可近眼唐本注云玉支躑躅一名陶於梔子注云是躑躅子名玉支非也花亦不似鹿蔥正似旋葍花色黃者也今注其苗樹生高三四尺葉似桃葉花似山石榴臣禹錫等謹按蜀本圖經云樹生高二尺葉似桃葉花黃似瓜花三月四月採花日乾今所在有之藥性論云羊躑躅惡諸石及面不入湯服也圖經曰羊躑躅生太行山川穀及淮南山今所在有之春生苗似鹿蔥葉似紅花莖三四尺夏開花似凌霄山石榴旋葍輩而正黃色羊誤食其葉則躑躅而死故以為名三月四月採花陰乾今嶺南蜀道山谷遍生皆深紅色如錦繡然或云此種不入藥古大方多用躑躅如胡洽治時行赤散及治五嗽四滿丸之類及治風諸酒方皆雜用之又治百病風濕等魯王酒中亦用躑躅花今醫方挪腳湯中多用之南方治蠱毒下血有躑躅花散甚勝三種海藥余瓶香謹按陳藏器云生海山谷草之狀也味寒無毒主天行時氣鬼魅邪精等宜燒之又於水煮善洗水腫浮氣與土薑芥子等煎浴湯治風瘧甚驗色釵子股謹按陳氏云生嶺南及南海諸山每莖三十根狀似細辛味苦平無毒主解毒癰疽神驗忠萬州者佳草莖功力相似以水煎服緣嶺南多毒家家貯之宜南草謹按廣州記云生廣南山谷有莢長二尺許內有薄片似紙大小如蟬翼主邪小男女以緋絹袋盛一片佩之臂上辟惡止驚此草生南方故作南北字今人多以男女字非也宜男草者即萱草是二十五種陳藏器余藒音挈車香味辛溫主鬼氣去臭及蟲魚蛀蚛生彭城高數尺白花爾雅曰藒車䒗音乞輿郭注云香草也廣志云黃葉白花也海藥按廣志云生海南山谷陳氏云生徐州微寒無毒主霍亂辟惡氣裛衣甚好齊民要術云凡諸樹木蛀者煎此香冷淋之善闢蛀蚛也朝生暮落花主惡瘡疽䘌疥癰蟻瘻等並目干末和生油塗之生糞穢處頭如筆紫色朝生暮死小兒呼為狗溺臺又名鬼筆菌從地出者皆主瘡疥牛糞上黑菌尤佳更有燒作灰地經秋雨生菌重臺名仙人帽大主血沖洞根味苦平無毒主熱毒蛇犬蟲癰瘡等毒功用同陳家白藥苗蔓不相似嶺南恩州取根陰乾海藥謹按廣州記云生嶺南及海隅苗蔓如土瓜根相似味辛溫無毒主一切毒氣及蛇傷並取其根磨服之應是著諸般毒悉皆吐出井口邊草主小兒夜啼著母臥席下勿令母知豚耳草主溪毒射工絞取汁服滓敷瘡止血百一方豚耳多種未知何是菘菜白葉亦名豚耳顏氏家訓馬莧一名豚耳馬齒莧也又車前葉圓者亦名豚耳燈花末敷金瘡止血生肉令瘡黑今燭花落有喜事不爾得錢之兆也千金䥶草主蛇蠍蟲咬等毒取草搗敷瘡上生肌止痛生江南高二三尺也斷罐草主疔瘡合白牙荲恥六反羊啼菜也菜青苔半夏地骨皮蜂窠小兒發緋帛並等分作灰五月五日和諸藥末服一錢匕疔根出也狼杷草秋穗子並染皂黑人鬢髮令人不老生山道旁圖經曰狼杷草主療丈夫血痢不療婦人若患積年疳痢即用其根俗間頻服有效患血痢者取草二斤搗絞取汁一小升納白麵半雞子許和之調令勻空腹頓服之極重者不過三服若無生者但收取苗陰乾搗為散患痢者取散一方寸匕和蜜水半盞服之臣禹錫等謹按狼杷草出近世古方未見其用者雖陳藏器嘗言其黑人鬢髮令不老生道旁然未甚詳悉太宗皇帝御書記其主療甚為精至謹用書於本草圖經外類篇首云百草灰主腋臭及金瘡五月五日採露取之一百種陰乾燒作灰以井華水為團重燒令白以釅醋和為餅腋下挾之干即易當抽一身痛悶瘡出即止以水小便洗之不過三兩度又主金瘡止血生肌取灰和石灰團燒令白刮敷瘡上產死婦人塚上草主小兒醋瘡取之勿回顧作浴湯洗之不遇三度佳孝子衫襟灰敷面䵟靈床下鞋履主腳氣虻母草葉卷如實中有血蟲羽化為虻便能咬人生塞北草葉如葵以葉合和桂杵為末敷人馬山行無復虻來故蓑衣結燒為灰和油敷蠼螋溺瘡佳故炊帚主人面生白駁以月蝕夜和諸藥燒成灰和苦酒合為泥敷之天羅勒主溪毒挪碎敷之瘡上天羅勒生江南平地毛蓼主癰腫疽瘻瘰癧杵碎納瘡中引膿血生肌亦作湯洗瘡兼濯足治腳氣生山足似烏蓼葉上有毛冬根不死也蛇芮草主蛇虺及毒蟲等螫取根葉搗敷咬處當下黃水生平地葉似苦杖而小節赤高一二尺種之闢蛇又有一種草莖圓似苧亦敷蛇毒百一方東關有草狀如苧莖方節赤挪敷蛇毒如摘卻亦名蛇𦬣草二草總能主蛇未知何者的是又有鼠𦬣草如菖蒲出山石上取根藥鼠立死爾萬一藤主蛇咬杵篩以水和如泥敷癰上藤蔓如小豆生嶺南亦名萬吉螺黶草主癰腫風疹腳氣腫搗敷之亦煮湯洗腫處藤生石上似螺黶微有赤色背有少毛繼母草主惡瘡杵敷之生塞北川原有紫碧花花有角角上有刺蒿之類也亦名繼母藉甲煎味辛平無毒主甲疽瘡及雜瘡難瘥者蟲蜂蛇蠍所螫疼小兒頭瘡吻瘡耳後月蝕瘡並敷之合諸藥及美果花燒成灰和蠟成口脂所主與甲煎略同三年者治蟲雜瘡及口旁饞瘡甲疽等瘡金瘡小草味甘平無毒主金瘡止血長肌斷鼻中衄血取葉挪碎敷之又預和石灰杵為丸日乾臨時刮敷亦煮服斷血瘀及卒下血生江南落田野間下濕地高一二寸許如薺葉短春夏間有淺紫花長一粳米也鬼釵草味苦平無毒主蛇及蜘蛛咬杵碎敷之亦杵絞汁服生池畔葉有椏方莖子作釵腳著人衣如針北人呼為鬼針
