body:
  text: 卷第二十四己酉新增衍義胡麻味甘平無毒主傷中虛羸補五內益氣力長肌肉填髓腦堅筋骨療金瘡止痛及傷寒溫瘧大吐後虛熱羸困久服輕身不老明耳目耐飢渴延年以作油微寒利大腸胞衣不落生者摩瘡腫生禿髮一名巨勝一名狗蝨一名方莖一名鴻藏葉名青蘘生上黨川澤陶隱居云八谷之中唯此為良淳黑者名巨勝巨者大也是為大勝本生大宛故名胡麻又莖方名巨勝莖圓名胡麻服食家當九蒸九曝熬搗餌之斷谷長生充飢雖易得俗中學者猶不能常服而況余藥耶蒸不熟令人發落其性與茯苓相宜俗方用之甚少時以合湯丸爾唐本注云此麻以角作八稜者為巨勝四稜者名胡麻都以烏者良白者劣爾生嚼塗小兒頭瘡及浸淫惡瘡大效臣禹錫等謹按吳氏云胡麻一名方金神農雷公甘平無毒秋採青蘘一名夢神抱朴子云巨勝一名胡麻餌服之不老耐風濕廣雅云狗蝨巨勝藤苰胡麻也藥性論云葉搗汁沐浴甚良又牛傷熱搗汁灌之立瘥又患崩中血凝疰者生取一升搗納熱湯中絞取半升立愈巨勝者仙經所重白蜜一升子一升合之名曰靜神丸常服之治肺氣潤五臟其功至多亦能休糧填人骨髓甚有益於男子患人虛而吸吸加胡麻用陳藏器云花陰乾漬取汁溲麵至韌易滑陳士良云胡麻仁生嚼塗小兒頭瘡亦療婦人陰瘡初食利大小腸久食即否去陳留新日華子云胡麻補中益氣養五臟治勞氣產後羸困耐寒暑止心驚子利大小腸催生落胞逐風溫氣遊風頭風補肺氣潤五臟填精髓細研塗發令長白蜜蒸為丸服治百病葉作湯沐潤毛髮滑皮膚益血色圖經曰胡麻巨勝也生上黨川澤青蘘音箱巨勝苗也生中原川穀今並處處有之皆園圃所種稀復野生苗梗如麻而葉圓銳光澤嫩時可作蔬道家多食之謹按廣雅云狗蝨巨勝也藤苰胡麻也陶隱居云其莖方者名巨勝圓者名胡麻蘇恭云其實作角八稜者名巨勝六稜四稜者名胡麻如此巨勝胡麻為二物矣或云本生胡中形體類麻故名胡麻又八谷之中最為大勝故名巨勝如此似一物二名也然則仙方乃有服食胡麻巨勝二法功用小別疑本一物而種之有二如天雄附子之類故葛稚川亦云胡麻中有一葉兩莢者為巨勝是也食其實當九蒸曝熬搗之可以斷谷又以白蜜合丸曰靜神丸服之益肺潤五臟壓取油主天行熱秘腸結服一合則快利花陰乾漬汁溲麵至韌而滑葉可沐頭令髮長一說今人用胡麻葉如荏而狹尖莖方高四五尺黃花生子成房如胡麻角而小嫩葉可食甚甘滑利大腸皮亦可作布類大麻色黃而脆俗亦之黃麻其實黑色如韭子而粒細味苦如膽杵末略無膏油又世人或以為胡麻乃是今之油麻以其本出大宛而謂之胡麻也皆以烏者良白者劣本草注服胡麻油須生笮者其蒸炒作者正可食及然爾不入藥用又序例謂細麻即胡麻也形扁扁爾其方莖者名巨勝其說各異然胡麻今服食家最為要藥乃爾差誤豈復得效也新注云胡麻白大豆棗三物同九蒸九曝作團食令人不飢延年斷谷又合蒼耳子為散服之治風癩雷公云凡使有四件八稜者兩頭尖色紫黑者又呼胡麻並是誤也其巨勝有七稜色赤味澀酸是真又呼烏油麻作巨勝亦誤若修事一斤先以水淘浮者去之沉者漉出令乾以酒拌蒸從巳至亥出攤曬乾於臼中舂令粗皮一重盡拌小豆相對同炒小豆熟即出去小豆用之上有薄皮去留用力在皮殼也食療潤五臟主火灼山田種為四稜土地有異功力同休糧人重之填骨髓補虛氣聖惠方治五臟虛損羸瘦益氣力堅筋骨巨勝蒸曝各九遍每取二合用湯浸布裹挪去皮再研水濾取汁煎飲和粳米煮粥食之外臺秘要治手腳痠疼兼微腫烏麻五升熬碎之酒一升浸一宿隨多少飲之又方沸湯所淋火燒爛瘡杵生胡麻如泥厚封之千金方常服明目洞視胡麻一石蒸之三十遍末酒服每日一升又方治腰腳疼痛胡麻一升新者熬令香杵篩日服一小升計服一斗即永瘥酒飲羹汁蜜湯皆可服之佳又方治白髮還黑烏麻九蒸九曝末之以棗膏丸服之肘後方治陰癢生瘡嚼胡麻敷之又方治齒痛胡麻五升水一斗煮取五升含漱吐之莖葉皆可用之姚云神良不過二劑腫痛即愈經驗後方治暑毒救生散新胡麻一升微炒令黑色取出攤冷碾末新汲水調三錢又或丸如彈子新水化下凡著熱外不得以冷物逼外得冷即死梅師方治蚰蜒入耳胡麻杵碎以袋盛之為枕孫真人胡麻三升去黃黑者微熬令香杵為末下白蜜三升和調煎杵三百杵如梧桐子大丸旦服三十丸腸化為筋年若過四十以上服之效修真秘旨神仙服胡麻法服之能除一切痼病至一年面光澤不飢三年水火不能害行及奔馬久服長生上黨者尤佳胡麻三斗淨淘入甑蒸令氣遍出曬乾以水淘去沫卻蒸如此九度以湯脫去皮簸令淨炒令香杵為末蜜丸如彈子大每溫酒化下一丸忌毒魚生菜等丹房鏡源云巨勝煮丹砂梁簡文帝勸醫文胡麻止救頭痛今人云灰滌菜者恐未是蓋今之藜也又韓保云灰滌菜愈謬矣神仙傳魯支生篇魯女生服胡麻餌術絕谷八十餘年甚少壯一日行三百里走及獐鹿本事詩云胡麻好種無人種正是歸時君不歸俗傳云胡麻夫婦同種即生而茂熟故詩句不取他物唯以胡麻為興也續齊諧記漢明帝永平十五年中剡縣有劉晨阮肇二人入天台山採藥迷失道路忽逢一溪過之過遇二女以劉阮姓名呼之如舊識耳曰郎等來何晚耶遂邀之過家設胡麻飯以延之故唐詩有云御羹和石髓香飯進胡麻衍義曰胡麻諸家之說參差不一只是今脂麻更無他義蓋其種出於大宛故言胡麻今胡地所出者皆肥大其紋鵲其色紫黑故如此區別取油亦多故詩云松下飯胡麻此乃是所食之谷無疑與白油麻為一等如川大黃川當歸川升麻上黨人參齊州半夏之類不可與他土者更為二物蓋特以其地之所宜立名也是知胡麻與白油麻為一物嘗官於順安軍雄霸州之間備見之又二條皆言無毒治療大同今之用白油麻也不可一日缺也然亦不至於大寒宜兩審之青蘘音箱味甘寒無毒主五臟邪氣風寒濕痹益氣補腦髓堅筋骨久服耳目聰明不飢不老增壽巨勝苗也生中原川穀陶隱居云胡麻葉也甚肥滑亦可以沐頭但不知云何服之仙方並無用此法正當陰乾搗為丸散爾既服其實故不復假苗五符巨勝丸方亦云葉名青蘘本生大宛度來千年爾唐本注云青蘘本經在草部上品中既堪啖今從胡麻條下圖經文具胡麻條下食療生杵汁沐頭髮良牛傷熱亦灌之立愈衍義曰青蘘音箱即油麻葉也陶隱居注亦曰胡麻葉也胡地脂麻鵲色子頗大日華子云葉作湯沐潤毛髮乃是今人所取胡麻葉以湯浸之良久涎出湯遂稠黃色婦人用之梳髮由是言之胡麻與白油麻今之所謂脂麻者是矣青蘘即其葉無疑麻蕡音墳味辛平有毒主五勞七傷利五臟下血寒氣破積止痹散膿多食令見鬼狂走久服通神明輕身一名麻勃此麻花上勃勃者七月七日採良麻子味甘平無毒主補中益氣中風汗出逐水利小便破積血復血脈乳婦產後余疾長髮可為沐藥久服肥健不老神仙九月採入土者損人生太山川穀畏牡蠣白薇惡茯苓陶隱居云麻蕡即牡麻牡麻則無實今人作布及履用之麻勃方藥亦少用術家合人參服令逆知未來事其子中仁合丸藥並釀酒大善然而其性滑利麻根汁及煮飲之亦主瘀血石淋唐本注云蕡即麻實非花也爾雅云蕡枲實禮云苴麻之有枲者注云有子之麻為苴皆謂子爾陶以一名麻勃謂勃勃然如花者即以為花重出子條誤矣既以麻枲為米之上品今用花為之花豈為堪食乎根主產難衣不出破血壅脹帶下崩中不止者以水煮服之效漚麻汁主消渴搗葉水絞取汁服五合主蛔蟲搗敷蠍毒效今按陳藏器本草云麻子下氣利小便去風痹皮頑炒令香搗碎小便浸取汁服婦人倒產吞二七枚即正麻子去風令人心歡壓為油可以油物早春種為春麻子小而有毒晚春種為秋麻子入藥佳臣禹錫等謹按爾雅云黂枲實釋曰枲麻也黂麻子也儀禮注苴麻之有黂者又禹貢青州厥貢岱畎絲枲是也又曰荸麻釋曰苴麻之盛子者也一名荸一名麻母藥性論云麻花白麻是也味苦微熱無毒方用能治一百二十種惡風黑色遍身苦癢逐諸風惡血主女人經候不通䗪蟲為使又葉沐發長潤青麻湯淋瘀血主又下血不止麻青根一十七枚洗去土以水五升煮取三升冷分六服又云大麻仁使治大腸風熱結澀及熱淋又麻子二升大豆一升熬令香搗末蜜丸日二服令不飢耐老益氣子五升研同葉一握搗相和浸三日去滓沐發令白髮不生補下焦主治渴又子一升水三升煮四五沸去滓冷服半升日二服瘥陳士良云大麻仁主肺臟潤五臟利大小便疏風氣不宜多食損血脈滑精氣痿陽氣婦人多食髮帶疾日華子云大麻補虛勞逐一切風氣長肌肉益毛髮去皮膚頑痹下水氣及下乳止消渴催生治橫逆產圖經曰麻黂麻子生泰山川穀今處處有皆田圃所蒔績其皮以為布者麻蕡一名麻勃麻上花勃勃者七月七日採麻子九月採入土者不用陶隱居以麻蕡為牡麻牡麻則無實蘇恭以為蕡即實非花也又引爾雅蕡枲實及禮云苴麻之有蕡者皆謂蕡為子也謂陶重出子條為誤按本經麻蕡主七傷利五臟多食令人狂走觀古今方書用麻子所治亦爾又麻花非所食之物如蘇之論似當矣然朱字云麻蕡味辛麻子味甘此又似二物疑本草與爾雅禮記有稱謂不同者耳又古方亦有用麻花者云味苦主諸風及女經不利以䗪蟲為使然則蕡也子也花也其三物乎其葉與桐葉合搗浸水沐發令長潤皮青淋湯濯瘀血根煮汁冷服主下血不止今用麻仁極難去殼醫家多以水浸經三兩日令殼破曝乾新瓦上擂取白用農家種麻法擇其子之有斑紋者謂之雌麻云用此則結實繁它子則不然葛洪主消渴以秋麻子一升水三升煮三四沸飲汁不遇五升便瘥唐韋宙獨行方主踠折骨痛不可忍用大麻根及葉搗取汁一升飲之非時即煮乾麻汁服亦同亦主撾打瘀血心腹滿氣短皆效篋中方單服大麻仁酒治骨髓風毒疼痛不可運動者取大麻仁水中浸取沉者一大升漉出曝乾於銀器中旋旋炒直須慢火待香熟調勻即入木臼中令三兩人更互搗一二數令及萬杵看極細如白粉即止平分為十貼每用一貼取家釀無灰酒一大瓷湯碗以砂盆柳木棰子點酒研麻粉旋濾取白酒直令麻粉盡余殼即去之都合酒一處煎取一半待冷熱得所空腹頓服日服一貼藥盡全瘥輕者只於四五貼則見效大抵甚者不出十貼必失所苦耳其效不可勝紀雜它物而用者張仲景治脾約大便秘小便數麻子丸麻子二升芍藥半斤厚朴一尺大黃枳實各一斤杏仁一升六物熬搗篩蜜丸大如梧桐子以漿水飲下十丸食後服之日三不知益加之唐方七宣麻仁丸亦此類也唐本余主五勞麻子寒肥健人不老食療云微寒治大小便不通發落破血不飢能寒取汁煮粥去五臟風潤肺治關節不通發落通血脈治氣青葉甚長髮研麻子汁沐發即生長麻子一升白羊脂七兩蠟五兩白蜜一合和杵蒸食之不飢洞神經又取大麻日中服子末三升東行茱萸根銼八升漬之平旦服之二升至夜蟲下要見鬼者取生麻子菖蒲鬼臼等分杵為丸彈子大每朝向日服一丸服滿百日即見鬼也聖惠方治生眉毛用七月烏麻花陰乾為末生烏麻油浸每夜敷之又方主妊娠心痛煩悶用麻子一合研水一盞煎取六分去滓非時溫服外臺秘要治瘰癧七月七日出時收麻花五月五日收葉二件作炷子於癧上灸百壯又方治虛勞下焦虛熱骨節煩疼肌肉急小便不利大便數少吸吸口燥少氣淋石熱大麻仁五合研水二升煮去半分服四五劑瘥又方治嘔麻仁三兩杵熬以水研取汁著少鹽吃立效李諫議嘗用極妙千金方治發落不生令長麻子一升熬黑壓油以敷頭長髮妙又方治風癲及百病麻仁四升水六升猛火煮令牙生去滓煎取七升旦空心服或發或不發或多言語勿怪之但人摩手足須定凡進三劑愈又方主產後血不去麻子五升酒一升漬一宿明旦去滓溫服一升先食不瘥夜再服一升不吐不下不得與男子通一月將養如初肘後方葛氏大便不通研麻子相和為粥食又方治淋下血麻根十枚水五升煮取二升一服血止神驗又方大渴日飲數斗小便赤澀者麻子一升水三升煮三四沸取汁飲之無限日過九升麻子愈又方卒被毒箭麻仁數升杵飲汁瘥食醫心鏡治風水腹大臍腰重痛不可轉動冬麻子半升碎水研濾取汁米二合以麻子汁煮作稀粥著蔥椒薑豉空心食之又方主五淋小便赤少莖中疼痛冬麻子一升杵研濾取汁二升和米三合煮粥著蔥椒及熟煮空心服之又方主妊娠損動後腹痛冬麻子一升杵碎熬以水二升煮取汁熱沸分為三四服新續十全方令易產大麻根三莖水一升煎取半升頓服立產衣不下服之亦下子母秘錄產後穢汙不盡腹滿麻子三兩酒五升煮取二升分溫二服當下惡物又方治小兒赤白痢多體弱不堪大困重者麻子一合炒令香熟末服一錢匕蜜漿水和服立效又方治小兒疳瘡嚼麻子敷之日六七度周禮典枲職疏枲麻也案喪服傳云牡麻者枲麻也則枲是雄麻對苴是麻之有黃者也毛詩九月菽苴疏云謂採麻實以供羹食詩云桃之夭夭有蕡其實蕡即實也麻蕡則知麻實也非花也麻亦花而後有實也龍魚河圖曰歲暮夕四更中取二七豆子二七麻子家人頭少許發合麻子豆著井中祝敕並使其家竟年不遭傷寒闢五溫鬼衍義曰大麻子海東來者最勝大如蓮實如毛羅島其次出上郡北地大如豆南地者子小去殼法取麻子帛包之沸湯中浸湯冷出之垂井中一夜勿令著水次日日中曝乾就新瓦上挪去殼簸揚取仁粒粒皆完張仲景麻仁丸是用此大麻子胡麻油微寒利大腸胞衣不落生者摩瘡腫生禿髮陶隱居云麻油生笮者若蒸炒正可供作食及燃爾不入藥用也藥性論云胡麻生油塗頭生毛髮陳藏器云胡麻油大寒主天行熱秘腸內結熱服一合取利為度食油損聲令體重生油殺蟲摩惡瘡圖經文具胡麻條下食療云主喑啞塗之生毛髮野人閒話杜天師升遐篇以麻油敷兩足繒帛裹之可日行萬里白油麻大寒無毒治虛勞滑腸胃行風氣通血脈去頭浮風潤肌食後生啖一合終身不輟與乳母食其孩子永不病生若客熱可作飲汁服之停久者發霍亂又生嚼敷小兒頭上諸瘡良久食抽人肌肉生則寒炒則熱又葉搗和漿水絞去滓沐發去風潤髮其油冷常食所用也無毒發冷疾滑骨髓發臟腑渴困脾臟殺五黃下三焦熱毒氣通大小腸治蛔心痛敷一切瘡疥癬殺一切蟲取油一合雞子兩顆芒硝一兩攪服之少時即瀉治熱毒甚良治飲食物須逐日熬熟用經宿即動氣有牙齒並脾胃疾人切不可吃陳者煎膏生肌長肉止痛消癰腫補皮裂新補見孟詵及陳藏器陳士良日華子圖經曰油麻本經舊不著條然古醫方多用之無毒滑腸胃行風氣久食消人肌肉生則寒炒熟則熱仙方蒸以辟穀壓笮為油大寒發冷疾滑精髓發臟腑渴令人脾困然治癰疽熱病近效方婆羅門僧療大風疾並壓丹石熱毒熱風手腳不遂用硝石一大兩生烏麻油二大升合納鐺中以土墼蓋口以紙泥固濟勿令氣出細進火煎之其藥未熟時氣腥候香氣發即熟更以生油麻油二大升和合又微火煎之以意斟量得所即納不津器中服法患大風者用火為使在室中看作小紙屋子外燃火令患人在紙屋中發汗日服一大合病人力壯日二服服之三七日頭面疱瘡皆滅若服諸丹石藥熱發不得食熱物著厚衣臥厚床者即兩人共服一劑服法同前不用火為使忌風二七日若丹石發即不用此法但取一匙納口中待消咽汁熱除忌如藥法劉禹錫傳信方蚰蜒入耳以油麻油作煎餅枕臥須臾蚰蜒自出而瘥李元淳尚書在河陽日蚰蜒入耳無計可為半月後腦中洪洪有聲腦悶不可徹至以頭自擊門柱奏疾狀危極因發御藥以療之無瘥者其為受苦不念生存忽有人獻此方乃愈外臺秘要治胸喉間覺有症蟲上下偏聞蔥豉食香此是發蟲油煎蔥豉令香二日不食開口而臥將油蔥豉致口邊蟲當漸出徐徐以物引去之又方治傷寒三五日忽有黃則宜服此取生烏麻油一盞水半盞雞子白一枚和之熟攪令相勻一服令盡又方近效治嘔白油麻一大合清酒半升煎取三合看冷熱得所去油麻頓服之又方治小兒急疳瘡嚼油麻令爛敷之又方治發症欲得飲油一升香澤煎之大沙鑼貯安病人頭邊口鼻臨油上勿令得飲及敷之鼻面並令香氣叫喚取飲不得必當疲極眠睡發症當從口出煎油人等守視之並石灰一裹見症出以灰粉手捉取症抽出須臾抽盡即是發也初從腹出形如不流水中濃菜隨髮長短形亦如之無忌肘後方治卒心痛生油半合溫服瘥又方治豌豆瘡服油麻一升須利即不生百漿大效經驗後方治蚰蜒蜘蛛子咬人用油麻研敷之瘥孫真人同孫真人枕中記云麻油一升薤白三斤切納中油中微火煎之令薤黑去滓合酒服之半升三合百脈血氣充盛服金石人先宜服此方斗門方治產後脫腸不收用油五斤煉熟以盆盛後溫卻令產婦坐油盆中約一頓飯久用皂角炙令脆去粗皮為末少許吹入鼻中令作嚏立瘥神效博物志積油滿百石則生火武帝大始中武庫火災積油所致塞上方治心痛無問冷熱一合生麻服譚氏小兒方治小兒軟癤焦炒油麻從銚子中取乘熱嚼吐敷之止宋明帝宮人患腰痛牽心發則氣絕徐文伯視之曰發瘕以油灌之吐物如發引之長三尺頭已成蛇能動搖懸之滴盡唯一發衍義曰白油麻與胡麻一等但以其色言之此胡麻差淡亦不全白今人只謂之脂麻前條已具炒熟乘熱壓出油而謂之生油但可點照須再煎煉方謂之熟油始可食復不中點照亦一異也如鐵自火中出而謂之生鐵亦此義耳飴音貽糖味甘微溫主補虛乏止渴去血陶隱居云方家用飴糖乃云膠飴皆是濕糖如厚蜜者建中湯多用之其疑強及牽白者不入藥今酒麴糖用糵猶同是米麥而為中上之異糖當以和潤為優酒以醺亂為劣也臣禹錫等謹按蜀本圖經云飴即軟糖也北人謂之餳粳米粟米大麻白朮黃精枳音止椇音矩子等並堪作之唯以糯米作者入藥孟詵云餳糖補虛止渴健脾胃氣去留血補中白者以蔓荊汁煮頓服之日華子云益氣力消痰止嗽並潤五臟食療主吐血健脾凝強者為良主打損瘀血熬令焦和酒服之能下惡血又傷寒大毒嗽於蔓荊薤汁中煮一沸頓服之外臺秘要誤吞錢取飴糖一斤漸漸盡食之環及釵便出肘後方魚骨哽在喉中眾法不能去飴糖丸如雞子黃大吞之不出大作丸用妙衍義曰飴糖即餳是也多食動脾風今醫家用以和藥糯與粟米作者佳余不堪用蜀黍米亦可造不思食人少食之亦使脾胃氣和唐白樂天詩一碟較牙餳者是此灰藋味甘平無毒主惡瘡蟲蠶蜘蛛等咬搗碎和油敷之亦可煮食亦作浴湯去疥癬風瘙燒為灰口含及納齒孔中殺齒䘌甘瘡取灰三四度淋取汁蝕息肉除白癜風黑子面䵟著肉作瘡子炊為飯香滑殺三蟲生熟地葉心有白粉似藜而藜心赤莖大堪為杖亦殺蟲人食為藥不如白藋也新補見陳藏器雷公金鎖天時呼為灰藋是金鎖天葉撲蔓翠上往往有金星堪用也若白青色是忌女莖不入用也若使金鎖天葉莖高低二尺五寸妙也若長若短不中使凡用勿令犯水先去根曬乾用布拭上肉毛令盡細銼焙乾用之
