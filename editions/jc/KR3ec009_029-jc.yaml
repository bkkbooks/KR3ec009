body:
  text: 卷第二十九己酉新增衍義苦瓠味苦寒有毒主大水面目四肢浮腫下水令人吐生晉地川澤陶隱居云瓠與冬瓜氣類同輩而有上下之殊當是為其苦爾今瓠自忽有苦者如膽不可食非別生一種也又有瓠𤬏音婁亦是瓠類小者名瓢食之乃勝瓠凡此等皆利水道所以在夏月食之大理自不及冬瓜也唐本注云瓠與冬瓜瓠𤬏全非類例今此論性都是苦瓠𤬏爾陶謂瓠中苦者大誤矣瓠中苦者不入藥用冬瓜自依食前說瓠𤬏與瓠又須辨之此三物苗葉相似而實形有異瓠味皆甜時有苦者而似越瓜長者尺余頭尾相似其瓠𤬏形狀大小非一瓠夏中便熟秋末並枯瓠𤬏夏末始實秋中方熟取其為器經霜乃堪瓠與甜瓠𤬏體性相類但味甘冷通利水道止渴消熱無毒多食令人吐苦瓠𤬏為療一如經說然瓠苦者不堪啖無所主療不入方用而甜瓠𤬏與瓠子啖之俱勝冬瓜陶言不及乃是未悉此等元種各別非甘者變而為苦也其苦瓠瓤味苦冷有毒主水腫石淋吐呀嗽囊結疰蠱痰飲或服之過分令人吐利不止者宜以黍穰灰汁解之又煮汁漬陰療小便不通也今按陳藏器本草云苦瓠煎取汁滴鼻中出黃水去傷寒鼻塞黃疸又取一枚開口以水煮中攪取汁滴鼻中主急黃又取未破者煮令熱解開熨小兒閃癖臣禹錫等謹按蜀本注云陶云瓠小者名瓢按切韻瓢注云瓠也又語曰吾豈匏瓜也哉是則此為瓜匏之瓠也今據瓜匏之瓠非但不能療病亦少見有苦者謹按瓠固匏也但匏字合作瓟蓋音同字異爾且瓟似瓠可為飲器有甘苦二種甘者大苦者小則陶云小者名瓢是也今人以苦瓠療水腫甚效亦能令人吐此又與上說正同爾藥性論云苦瓠瓤使治水浮腫面目肢節腫脹下大水氣疾孟詵云瓠冷主消渴惡瘡又患腳氣及虛脹冷氣人不可食之尤甚又壓熱服丹石人方可食餘人不可輒食日華子云瓠無毒又云微毒除煩止渴治心熱利小腸潤心肺治石淋吐蛔蟲聖惠方治齲齒疼痛用葫蘆半升水五升煮取三升去滓含漱吐之莖葉亦可用不過二劑瘥又方治鼠瘻用瓠花曝乾為末敷之外臺秘要治卒患腫滿曾有人忽腳跌腫漸上至膝足不可踐地主大水頭面遍身大腫脹滿苦瓠白瓤實捻如大豆粒以麵裹煮一沸空心服七枚至午當出水一斗二日水自出不止大瘦乃瘥三年內慎口味也苦瓠須好者無靨翳細理研淨者不爾有毒不用千金方治眼暗取七月七日苦瓠瓤白絞取汁一合以酢一升古錢七文和漬微火煎之減半以沫納眼眥中神驗肘後方療中蠱毒吐血或下血皆如爛肝者苦瓠一枚水二升煮取一升服立吐即愈又方用苦酒一升煮令消服神驗孫真人甜瓠患腳腫氣及虛腫者食之永不瘥傷寒類要治黃疸苦胡蘆瓤如大棗許大以童子小便二合浸之三兩食頃取兩酸棗許分納兩鼻中病人深吸氣及黃水出良又方治黃疸以瓠子白瓤子熬令黃搗為末每服半錢匕日一服十日愈用瓠𤬏有吐者當先詳之丹房鏡源苦瓠煮汞葫蒜也味辛溫有毒主散癰腫䘌瘡除風邪殺毒氣獨子者亦佳歸五臟久食傷人損目明五月五日採陶隱居云今人謂葫為大蒜謂蒜為小蒜以其氣類相似也性最熏臭不可食俗入作齏以啖膾肉損性伐命莫此之甚此物唯生食不中煮以合青魚鮓食令人發黃取其條上子初種之成獨子葫明年則復其本也唐本注云此物煮為羹臛極俊美熏氣亦微下氣消穀除風破冷足為饌中之俊而注云不中煮自當是未經試爾今按陳藏器本草云大蒜去水惡瘴氣除風濕破冷氣爛痃癖伏邪惡宣通溫補無以加之初食不利目多食卻明久食令人血清使毛髮白療瘡癬生食去蛇蟲溪蠱等毒昔患痃癖者嘗夢人教每日食三顆大蒜初時依夢遂至瞑眩口中吐逆下部如火後有人教令取數片合皮截卻兩頭吞之名為內灸依此大效又魚骨鯁不出以蒜納鼻中即出獨顆者殺鬼去痛入用最良臣禹錫等謹按蜀本圖經云大蒜今出梁州者最美而少辛大者徑二寸涇陽者皮赤甚辣其餘並相似也孟詵云蒜久服損眼傷肝治蛇咬瘡取蒜去皮一升搗以小便一升煮三四沸通人即入漬損處從夕至暮初被咬未腫速嚼蒜封之六七易又蒜一升去皮以乳二升煮使爛空腹頓服之隨後飯壓之明日依前進服下一切冷毒風氣又獨頭者一枚和雄黃杏仁研為丸空腹飲下三丸靜坐少時患鬼氣者當汗出即瘥日華子云蒜健脾治腎氣止霍亂轉筋腹痛除邪闢溫去蠱毒療勞瘧冷風痃癖溫疫氣傅風拍冷痛蛇蟲傷惡瘡疥溪毒沙蝨並搗貼之熟醋浸之經年者良圖經曰葫大蒜也舊不著所出州土今處處有之人家園圃所蒔也每頭六七瓣初種一瓣當年便成獨子葫至明年則復其本矣然其花中有實亦葫瓣狀而極小亦可種之五月五日採謹按本經云主散癰腫李絳兵部手集方療毒瘡腫號叫臥不得人不別者取獨頭蒜兩顆細搗以油麻和厚敷瘡上干即易之頃年盧坦侍郎任東畿尉肩上瘡作連心痛悶用此便瘥後李僕射患腦癰久不瘥盧與此方便愈絳得此方傳救數人無不神效葛洪肘後方灸背腫令消法云取獨顆蒜橫截厚一分安腫頭上炷艾如梧桐子灸蒜上百壯不覺消數數灸唯多為善勿令大熱若覺痛即擎起蒜蒜焦更換用新者勿令損皮肉如有體幹不須灸洪嘗苦小腹下患一大腫灸之亦瘥每用灸人無不立效又今江寧府紫極宮刻石記其法云但是發背及癰疽惡瘡腫核等皆灸之其法與此略同其小別者乃云初覺皮肉間有異知是必作瘡者切大蒜如銅錢厚片安腫處灸之不計壯數其人被苦初覺痛者以痛定為準初不覺痛者灸至極痛而止前後用此法救人無不應者若是疣贅之類亦如此灸之便成痂自脫其效如神乃知方書之載無空言但患人不能以意詳之故不得盡應耳食療除風殺蟲外臺秘要治牙齒疼痛獨頭蒜煨之乘熱截用頭以熨痛上轉易之亦主蟲痛又方關格脹滿大小便不通獨頭蒜燒熟去皮綿裹納下部氣立通又方治金瘡中風角弓反張取蒜一大升破去心無灰酒四升煮令極爛並滓服一大升以來須臾得汗瘥千金方治暴痢搗蒜兩足下貼之又方治血氣逆心煩悶心痛生蒜搗汁服二升則瘥葛氏方丹者惡毒之瘡五色無常又發足踝者搗蒜厚敷之干即易之梅師方若腹滿不能服藥導之方取獨顆蒜煨令熟去皮綿裹納下部中冷即易又方治蜈蚣咬人痛不止獨頭蒜摩螫處痛止又方治射工毒以獨頭蒜切之厚三分以來貼瘡上灸之蒜上令熱氣射入瘥又方治蛇虺螫人以獨頭蒜酸草搗絞敷所咬處孫真人食忌正月之節食五辛以闢厲氣一曰蒜又食多白髮早食醫心鏡蒜齏著鹽醬搗食之蒜苗作羹煮食並得主下氣溫中消穀黃帝云合青魚鮓食之令人腹內生瘡腸中腫又成疝瘕多食生蒜傷肝氣令人面無顏色四八月勿食生蒜傷人神損膽氣簡要濟眾治鼻血不止服藥不應宜用蒜一枚去皮細研如泥攤一餅子如錢大厚一豆許左鼻血出貼左腳心右鼻血出貼右腳心如兩鼻血出即貼兩腳下立瘥血止急以溫水洗腳心子母秘錄治產後中風角弓反張不語大蒜三十瓣以水三升煮取一升拗口灌之瘥又方小兒白禿瘡凡頭上團團然白色以蒜揩白處早朝使之後魏李道念褚澄視之曰公有重病答曰舊有冷痰今五年矣澄診之曰非冷非熱當時食白瀹雞子過多令取蒜一頭煮之服藥乃吐一物如升涎唾裹之開看乃雞雛翅羽爪頭具全澄曰未盡更服藥再吐十三頭又華佗行道見車載一人病咽塞食不下呻吟佗曰餅店家蒜齏大酢三升飲之當自痊果吐大蛇一枚而愈衍義曰葫大蒜也其氣極葷然置臭肉中掩臭氣中暑毒人爛嚼三兩瓣以溫水送之下咽即知仍禁飲冷水又患暴下血以葫五七枚去梗皮量多少入豆豉搗為膏可丸即丸梧子大以米飲下五六十丸無不愈者又鼻衄爛研一顆塗兩足心下才止便拭去又將紫皮者橫切作片子厚一分初患瘡發於背脅間未辨癰疽者若陽滯於陰即為癰陰滯於陽即為疽癰即皮光赤疽即皮肉紋起不澤並以葫片復之用艾灸如已痛灸至不痛如不痛灸至痛初覺即便灸無不效者仍審度正於中心貼葫灸之世人往往不悟此瘡初見其瘡小不肯灸惜哉蒜小蒜也味辛溫有小毒歸脾腎主霍亂腹中不安消穀理胃溫中除邪痹毒氣五月五日採之陶隱居云小蒜生葉時可煮和食至五月葉枯取根名薍音亂子正爾啖之亦甚熏臭味辛性熱主中冷霍亂煮飲之亦主溪毒食之損人不可長服唐本注云此蒜與胡蔥相得主惡蛓毒山溪中沙蝨水毒大效山人俚獠時用之也臣禹錫等謹按蜀本圖經云小蒜野生小者一名萵一名蒚苗葉根子似葫而細數倍也爾雅云蒚山蒜釋曰說文云葷菜也一云菜之美者雲夢之葷菜生山中者名蒚孟詵云小蒜亦主諸蟲毒疔腫甚良不可常食日華子云小蒜熱有毒下氣止霍亂吐瀉消宿食治蠱毒敷蛇蟲沙蝨瘡三月不可食圖經曰蒜小蒜也舊不著所出州土今處處有之生田野中根苗皆如葫而極細小者是也五月五日採謹按爾雅蒚力的切山蒜釋曰說文云蒜葷菜也一云菜之美者雲夢之葷生山中者名蒚今本經謂大蒜為葫小蒜為蒜而爾雅說文所謂蒜葷菜者乃今大蒜也乃今小蒜也書傳載物之別名不同如此用藥不可不審也古方多用小蒜治霍亂煮汁飲之南齊褚澄用蒜治李道念雞瘕便瘥江南又有一種山蒜似大蒜臭山人以治積塊及婦人血瘕以苦醋摩服多效又有一種似大蒜而多瓣有葷氣彼人謂之莜子主腳氣宜煮與蓐婦飲之易產江北則無食療主霍亂消穀治胃溫中除邪氣五月五日採者上又去諸蟲毒疔腫毒瘡甚良不可常食肘後方治霍亂心腹脹滿氣未得吐下小蒜一升㕮咀以水三升煮取一升頓服又方毒蛇螫人杵小蒜飲汁以滓敷瘡上葛氏方水毒中人一名中溪一名中濕一名水病似射工而無物以小蒜三升㕮咀於湯中莫令大熱熱即無力捩去滓適寒溫以浴若身體發赤斑紋者無異食醫心鏡主霍亂腹中不安消穀理胃氣溫中除邪痹毒氣歸脾腎煎湯服之兵部手集治心痛不可忍十年五年者隨手效以小蒜釅醋煮頓服之取飽不用著鹽絳外家人患心痛十餘年諸藥不差服此更不發又方蛐蜒入耳小蒜汁理一切蟲入耳皆同治瘧用蒜不拘多少研極爛和黃丹少許以聚為度丸如雞頭大候乾每服一丸新汲水下面東服至妙廣韻張騫使大宛食之損目黃帝不可久食損人心力食小蒜啖生魚令人奪氣衍義曰蒜小蒜也又謂之蒚苗如蔥針根白大者如烏芋子兼根煮食之又謂之宅蒜華佗用蒜齏是此物胡蔥味辛溫中消穀下氣殺蟲久食傷神損性令人多忘損目明尤發痼疾患胡臭人不可食令轉甚其狀似大蒜而小形圓皮赤稍長而銳生蜀郡山谷五月六月採今附圖經文具蔥實條下雷公云凡使採得依文碎擘用綠梅子相對拌蒸一伏時去綠梅子於砂盆中研如膏新瓦器中攤曬乾用食療胡蔥平主消穀能食久食之令人多忘根發痼疾又食著諸毒肉吐血不止痿黃悴者取子一升洗煮使破取汁停冷服半升日一服夜一服血定止又患胡臭䘌齒人不可食轉極甚謹按利五臟不足氣亦傷絕血脈氣多食損神此是熏物耳孫真人四月勿食胡蔥令人氣喘多驚蓴味甘寒無毒主消渴熱痹陶隱居云蓴性寒又云冷補下氣雜鱧魚作羹亦逐水而性滑服食家不可多啖唐本注云蓴久食大宜人合鮒魚為羹食之主胃氣弱不下食者至效又宜老人此應在上品中三四月至七八月通名絲蓴味甜體軟霜降以後至十二月名瑰蓴味苦體澀取以為羹猶勝雜菜今按陳藏器本草云按此物溫病起食者多死為體滑脾不能磨常食發氣令關節急嗜睡若稱上品主腳氣腳氣論中令人食之此誤極深也常所居近湖湖中有蓴及藕年中大疫既飢人取蓴食之疫病瘥者亦死至秋大旱人多血痢湖中水竭掘藕食之闔境無他蓴藕之功於斯見矣臣禹錫等謹按蜀本圖經云生水中葉似鳧葵浮水上採莖堪啖花黃白子紫色三月至八月莖細如釵股黃赤色短長隨水深淺而名為絲蓴九月十月漸粗硬十一月萌在泥中粗短名瑰蓴體苦澀唯取汁味爾孟詵云蓴菜和鯽魚作羹下氣止嘔多食發痔雖冷而補熱食之亦擁氣不下甚損人胃及齒不可多食令人顏色惡又不宜和醋食之令人骨痿少食補大小腸虛氣久食損毛髮陳藏器云蓴雖水草性熱擁又云石蓴味甘平無毒下水利小便生南海石上南越志云似紫菜色青臨海異物志曰附石生是也日華子云絲蓴治熱疸厚腸胃安下焦補大小腸虛氣逐水解百藥毒並蠱氣晉書張翰每臨秋風思鱸魚蓴羹以下氣水芹音芹味甘平無毒主女子赤沃止血養精保血脈益氣令人肥健嗜食一名水英生南海池澤陶隱居云論芹主療合是上品末解何意乃在下其二月三月作英時可作菹及熟爚音藥食之又有渣音楂芹可為生菜亦可生啖俗中皆作芹字唐本注云芹花味苦主脈溢今按別本注云即芹菜也芹有兩種萩芹取根白色赤芹取莖葉並堪作菹及生菜味甘經云平其性大寒無毒又按陳藏器本草云水芹莖葉搗絞取汁去小兒暴熱大人酒後熱毒鼻塞身熱利大小腸莖葉根並寒子溫辛臣禹錫等謹按蜀本圖經云生水中葉似芎藭花白色而無實根亦白色爾雅云芹楚葵注今水中芹菜孟詵云水芹寒養神益力殺藥毒置酒醬中香美又和醋食之損齒生黑滑地名曰水芹食之不如高田者宜人余田中皆諸蟲子在其葉下視之不見食之與人為患高田者名白芹日華子云治煩渴療崩中帶下陳藏器云渣芹平主女子赤白沃止血養精神保血脈益氣嗜飲食利人口齒去頭中熱風和醋食之亦能滋人患鱉症不可食食療云寒養神益力令人肥健殺石藥毒聖惠方三月八月勿食芹菜恐病蛟龍瘕發則似癲面色青黃小腹脹狀如懷妊也食醫心鏡芹菜主益筋力去伏熱治五種黃病女子白沃漏下止血養精保血脈嗜食作齏菹及煮食並得金匱方春秋二時龍帶精入芹菜中人遇食之為病發時手青肚滿痛不可忍作蛟龍病服硬糖三二升日二度吐出如蜥蜴三二便瘥子母秘錄主小兒霍亂吐痢芹菜細切煮熟汁飲任性多少得止馬齒莧主目盲白翳利大小便去寒熱殺諸蟲止渴破癥結癰瘡服之長年不白和梳垢封疔腫又燒為灰和多年醋滓先炙疔腫以封之即根出生搗絞汁服當利下惡物去白蟲煎為膏塗白禿又主三十六種風結瘡以一釜煮澄清納蠟三兩重煎成膏塗瘡上亦服之子明目仙經用之今附臣禹錫等謹按蜀本云馬莧味酸寒無毒主諸腫瘻疣目屍腳陰腫胃反諸淋金瘡內流破血癖癥瘕汁洗去緊唇面皰解射工馬汗毒一名馬齒莧宜小兒食之又注云此有二種葉大者不堪用葉小者節葉間有水銀每十斤有八兩至十兩以來至難燥當以槐木捶碎之向日東作架曬之三兩日即干如隔年矣其莖無效不入藥用大抵此草能肥腸令人不思食孟詵云馬齒莧又主馬毒瘡以水煮冷服一升並塗瘡上濕癬白禿以馬齒膏和灰塗效治疳痢及一切風敷杖瘡良及煮一碗和鹽醋等空腹食之少時當出盡白蟲矣圖經曰馬齒莧舊不著所出州土今處處有之雖名莧類而苗葉與人莧輩都不相似又名五行草以其葉青梗赤花黃根白子黑也此有二種葉大者不堪用葉小者為勝云其節葉間有水銀每干之十斤中得水銀八兩至十兩者然至難燥當以木捶搗碎向日東作架曝之三兩日即干如經年矣入藥則去莖節大抵能肥腸令人不思食耳古方治赤白下多用之崔元亮海上方著其法云不問老稚孕婦悉可服取馬齒莧搗絞汁三大合和雞子白一枚先溫令熱乃下莧汁微溫取頓飲之不過再作則愈又治溪毒絞汁一升漸以敷瘡上佳又療多年惡瘡百方不瘥或痛走不已者並爛搗馬齒敷上不過三兩遍此方出於武元衡相國武在西川自苦脛瘡濛癢不可堪百醫無效及至京城呼供奉石濛等數人療治無益有廳吏上此方用之便瘥李絳紀其事云陳藏器云破痃癖止消渴又主馬惡瘡蟲此物至難死燥了致之地猶活雷公云凡使勿用葉大者不是馬齒草其內亦無水銀食療延年益壽明目患濕癬白禿取馬齒膏塗之若燒灰敷之亦良作膏主三十六種風可取馬齒一碩水可二碩蠟三兩煎之成膏亦治疳痢一切風又可細切煮粥止痢治腹痛聖惠方治馬咬人毒入心馬齒莧湯食之瘥又方治反花瘡用一斤燒作灰細研豬脂調敷之外臺秘要治癧馬齒菜陰乾燒灰臘月豬脂和以暖泔漬洗瘡拭乾敷之日三千金方治諸腋臭馬齒草杵以蜜和作團紙裹之以泥泥紙上厚半寸曬乾以火燒熟破取更以少許蜜和仍令熱先以生布揩之以藥夾腑下令極痛久忍然後以手巾勒兩臂即瘥又方治小兒臍瘡久不瘥者燒菜末敷之肘後方療豌豆瘡馬齒草燒灰敷瘡上根鬚臾逐藥出若不出更敷良食醫心鏡理腳氣頭面浮腫心腹脹滿小便澀少馬齒草和少粳米醬汁煮食之又方主氣不調作粥食之又方小兒血痢取生馬齒莧絞汁一大合和蜜一匙匕空心飲之又方主青盲白翳除邪氣利大小腸去寒熱馬齒莧實一大升搗為末每一匙煮蔥豉粥和攪食之煮粥及著米糝五味作羹亦得廣利方治小兒火丹熱如火繞腰即損杵馬齒菜敷之日二靈苑方治五毒蟲毛螫赤痛不止馬齒莧熟杵敷之產寶產後血痢小便不通臍腹痛生馬齒菜杵汁三合煎一沸下蜜一合攪服丹房鏡源馬齒灰煮丹砂結汞五色莧煮砂子衍義曰馬齒莧人多食之然性寒滑青黛條中已著茄子味甘寒久冷人不可多食損人動氣發瘡及痼疾一名落蘇處處有之根及枯莖葉主凍腳瘡可煮作湯漬之良苦茄樹小有刺其子以醋摩療癰腫根亦作浴湯生嶺南今附臣禹錫等謹按孟詵云落蘇平主寒熱五臟勞不可多食熟者少食無畏又醋摩之敷腫毒陳藏器云茄子味甘平無毒今人種而食者名落蘇嶺南野生者名苦茄足刺子小主瘴日華子云茄子治溫疾傳屍勞氣圖經曰茄子舊不著所出州土云處處有之今亦然段成式云茄者連莖之名字當革遐反今呼若伽未知所自耳茄之類有數種紫茄黃茄南北通有之青水茄白茄唯北土多有入藥多用黃茄其餘唯可作菜茹耳又有一種苦茄小株有刺亦入藥江南有一種藤茄作蔓生皮薄似葫蘆亦不聞中藥江南方有療大風熱痰取大黃老茄子不計多少以新瓶盛貯埋之土中經一年盡化為水取出入苦參末同丸如梧子食已及欲臥時酒下三十粒甚效又治墜撲內損散敗血止痛及惡瘡發背等重陽日收取茄子百枚去蒂四破切之硝石十一兩碎搗以不津瓶器大小約可盛納茄子者於器中先鋪茄子一重乃下硝石一重覆之如此令盡然後以紙三數重密密封之安置淨處上下以新磚撢復不犯地氣至正月後取出去紙兩重日中曝之逐日如此至二三月度已爛即開瓶傾出濾去滓別入新器中以薄綿蓋頭又曝直至成膏乃可用內損酒調半匙空腹飲之日再惡血散則痛止血愈矣諸瘡腫亦先酒飲半匙又用膏於瘡口四面塗之當覺冷如冰雪瘡干便瘥其有根本在膚腠者亦可內消若膏久乾硬即以飯飲化動塗之又治腰腳風血積冷筋急拘攣疼痛者取茄子五十斤細切淨洗訖以水五斗煮取濃汁濾去滓更入小鐺器中煎至一斗以來即入生粟粉同煎令稀稠得所取出搜和更入研了麝香硃砂粉同丸如梧子每旦日用秫米酒送三十丸近暮再服一月乃瘥男子女人通用皆驗陳藏器云平無毒醋摩敷癰腫莖葉枯者煮洗凍瘡今人種食之一名落蘇又嶺南有野生者名苦茄足刺亦主瘴食療云平主寒熱五臟勞不可多食動氣亦發痼疾熟者少食之無畏患冷人不可食又根主凍腳瘡煮湯浸之勝金方治磕撲損肌膚青腫方茄子留花種通黃極大者切作片如一指厚新瓦上焙乾為末欲臥酒調二錢匕一夜消盡無痕跡也靈苑方治腸風下血久不止茄蒂燒存性為末每服食前米飲調三錢匕衍義曰茄子新羅國出一種淡光微紫色蒂長味甘今其子已遍中國蔬圃中唯此無益並無所治只說損人後人雖有處治之法然終與本經相失圃人又植於暖處厚加糞壤遂於小滿前後求貴价以售既不以時損人益多不時不食於可忽也蘩蔞味酸平無毒主積年惡瘡不愈五月五日日中採乾用之陶隱居云此菜人以作羹五月五日採曝乾燒作屑療雜瘡有效亦雜百草取之不必只此一種爾唐本注云此草即是雞腸也俱非正經所出而二處說異多生濕地坑渠之側流俗通謂雞腸雅士總名蘩蔞爾雅物重名者並云一物兩名今按陳藏器本草云蘩蔞主破血產婦煮食之及下乳汁產後腹中有塊痛以酒炒絞取汁溫服又取曝乾為末醋煮為丸空腹服三十丸下惡血臣禹錫等謹按蜀本圖經云葉青花白採苗入藥藥性論云蘩蔞亦可單用味苦主治產後血塊炒熱和童子小便服良長服惡血盡出治惡瘡有神驗之功圖經曰蘩蔞音縷即雞腸草也舊不著所出州土今南中多生於田野間近京下濕地亦或有之葉似荇菜而小夏秋間生小白黃花其莖梗作蔓斷之有絲縷又細而中空似雞腸因得此名也本經作兩條而蘇恭以為一物二名謹按爾雅蔜五高切𦺋𧃒與縷同釋曰蔜一名𦺋𧃒一名蘩縷一名雞腸草實一物也今南北所生或肥瘠不同又其名多人不盡見者往往疑為二物也又葛氏治卒淋方云用雞腸及蘩𦎪若菟絲並可單煮飲如此又似各是一物也其用大概主血故婦人宜食之五月五日採陰乾用今口齒方燒灰以揩齒宣露然燒灰減力不若干作末有益矣範汪治淋用蘩蔞滿兩手水煮飲之亦可常飲食療不用令人長食之恐血盡或云薠蔞即藤也人恐白軟草是外臺秘要治淋取蘩蔞草滿兩手握水煮服之衍義曰蘩蔞雞腸草一物也今雖分之為二其雞腸草條中獨不言性味故知一物也雞腸草春開小花如綠豆大莖葉如園荽初生則直長大即覆地小戶收之為齏食之烏髭發雞腸草主毒腫止小便利陶隱居云人家園庭亦有此草小兒取挪汁以捋蜘蛛網至黏可掇蟬療蠼螋溺也唐本注云此草即蘩蔞是也剩出此條宜除之今按雞腸草亦在草部下品唐注以為剩出一條詳此主療相似其一物乎今移附蘩蔞之下臣禹錫等謹按蜀本云雞腸草平無毒小便利通用藥云雞腸草微寒爾雅云蔜𦺋𧃒釋曰蔜一名𦺋𧃒一名雞腸草藥性論云雞腸草亦可單用味苦洗手足水爛主遺尿治蠼螋尿瘡生挪敷三四度孟詵云雞腸草溫作灰和鹽療一切瘡及風丹遍身如棗大癢痛者搗封上日五六易之亦可生食煮作菜食益人去脂膏毒氣又燒敷疳䘌亦療小兒赤白痢可取汁一合和蜜服之甚良圖經文具蘩蔞條下食療溫作菜食之益人治一切惡瘡搗汁敷之五月五日者驗肘後方治發背欲死雞腸草敷良食醫心鏡主小便利以一斤於豉汁中煮調和作羹食之作粥亦得博物志蠼螋溺人影亦隨所著作瘡以汁敷之效白苣味苦寒一云平主補筋骨利五臟開胸膈擁氣通經脈止脾氣令人齒白聰明少睡可常食之患冷氣人食即腹冷不至苦損人產後不可食令人寒中小腹痛陳藏器云白苣如萵苣葉有白毛萵苣冷微毒紫色者入燒煉藥用余功同白苣新補見孟詵陳藏器蕭炳聖惠方治腎黃用萵苣子一合細研水大一盞煎至五分去滓非時服外臺秘要魚臍瘡其頭白似腫痛不可忍方先以針刺瘡上及四畔作孔以白苣汁滴孔中瘥肘後方治沙蝨毒敷萵苣菜汁瘥孫真人白苣不可共飴食生蟲丹房鏡源萵苣用硫黃種結砂子制硃砂衍義曰萵苣今菜中唯此自初生便堪生啖四方皆有多食昏人眼蛇亦畏之蟲入耳以汁滴耳中蟲出諸蟲不敢食其葉以其心置耳中留蟲出路蟲亦出有人自長立禁此一物不敢食至今目不昏落葵味酸寒無毒主滑中散熱實主悅澤人面一名天葵一名繁露陶隱居云又名承露人家多種之葉唯可𩚫音徵鮓性冷滑人食之為狗所齧作瘡者終身不瘥其子紫色女人以漬粉敷面為假色少入藥用今注一名藤葵俗呼為胡燕脂臣禹錫等謹按蜀本圖經云蔓生葉圓厚如杏葉子似五味子生青熟黑所在有之孟詵云其子悅澤人面藥中可用之取蒸曝乾和白蜜塗面鮮華立見食療其子令人面鮮華可愛取蒸烈日中曝乾挪去皮取仁細研和白蜜敷之甚驗食此菜後被狗咬即瘡不瘥也堇汁味甘寒無毒主馬毒瘡搗汁洗之並服之堇菜也出小品方萬畢方云除蛇蠍毒及癰腫唐本注云此菜野生非人所種俗謂之堇菜葉似蕺花紫色唐本先附臣禹錫等謹按爾雅云齧苦堇注今堇葵也葉似柳子如米汋之滑疏云齧一名苦堇可食之菜也內則云堇荁枌榆是也本草云味甘此苦者古人語倒猶甘草謂之大苦也孟詵云堇久食除心煩熱令人身重懈惰又令人多睡只可一二頓而已又搗敷熱腫良又殺鬼毒生取法半升服即吐出食療堇菜味苦主寒熱鼠瘻瘰癧生瘡結核聚氣下瘀血葉主霍亂與香茂同功蛇咬生研敷之毒即出矣又乾末和油煎成摩結核上三五度瘥丹房鏡源勒堇灰制硃砂硫黃蕺音戢味辛微溫主蠼音劬螋溺瘡多食令人氣喘陶隱居云俗傳言食蕺不利人腳恐由閉氣故也今小兒食之便覺腳痛唐本注云此物葉似蕎麥肥地亦能蔓生莖紫赤色多生濕地山谷陰處山南江左人好生食之關中謂之菹菜臣禹錫等謹按蜀本圖經云莖葉俱紫赤英有臭氣孟詵云蕺菜溫小兒食之三歲不行久食之發虛弱損陽氣消精髓不可食日華子云蕺菜有毒淡竹筒內煨敷惡瘡白禿圖經曰蕺菜味辛微溫主蠼螋溺瘡山谷陰處濕地有之作蔓生莖紫赤色葉如蕎麥而肥山南江左人好生食之然不宜多食令人氣喘發虛弱損陽氣消精髓素有腳弱病尤忌之一啖令人終身不愈關中謂之菹菜者是也古今方家亦鮮用之經驗方主背瘡熱腫取汁蓋之至瘡上開孔以歇熱毒冷即易之瘥馬芹子味甘辛溫無毒主心腹脹滿下氣消食調味用之香似桔皮而無苦味唐本注云生水澤旁苗似鬼針菾菜等花青白色子黃黑色似防風子唐本先附臣禹錫等謹按蜀本圖經云花若芹花子如防風子而扁大爾雅云茭牛蘄釋曰似芹可食菜也而葉細銳一名茭一名牛蘄一名馬蘄子入藥用孟詵云和醬食諸味良根及葉不堪食卒心痛子作末醋服日華子云馬芹嫩時可食子治卒心痛炒食令人得睡蕓薹味辛溫無毒主風遊丹腫乳癰唐本注云別錄云春食之能發膝痼疾此人間所啖菜也今按別本注云破癥瘕結血今俗方病人得吃蕓薹是宜血病也又按陳藏器本草云蕓薹破血產婦煮食之子壓取油敷頭令頭髮長黑又煮食主腰腳痹搗葉敷赤遊疹久食弱陽唐本先附臣禹錫等謹按孟詵云若先患腰膝不可多食必加極又極損陽氣發口瘡齒痛又能生腹中諸蟲道家特忌日華子云蕓薹涼治產後血風及瘀血胡臭人不可食衍義曰蕓薹不甚香經冬根不死闢蠹於諸菜中亦不甚佳雍菜味甘平無毒主解野葛毒煮食之亦生搗服之嶺南種之蔓生花白堪為菜雲南人先食雍菜後食野葛二物相伏自然無苦又取汁滴野葛苗當時菸死其相殺如此張司空云魏武帝啖野葛至一尺應是先食此菜也菠薐冷微毒利五臟通腸胃熱解酒毒服丹石人食之佳北人食肉面即平南人食魚鱉水米即冷不可多食冷大小腸久食令人腳弱不能行發腰痛不與鱔魚同食發霍亂吐瀉劉禹錫嘉話錄云菠薐本西國中有自彼將其子來如苜蓿葡萄因張騫而至也本是頗陵國將來語訛爾時多不知也苦蕒冷無毒治面目黃強力止困敷蛇蟲咬又汁敷疔腫即根出蠶蛾出時切不可取拗令蛾子青爛蠶婦亦忌食野苦蕒五六回拗後味甘滑於家苦蕒甚佳鹿角菜大寒無毒微毒下熱風氣療小兒骨蒸熱勞丈夫不可久食發痼疾損經絡血氣令人腳冷痹損腰腎少顏色服丹石人食之下石力也出海州登萊沂密州並有生海中又能解面熱莙薘平微毒補中下氣理脾氣去頭風利五臟冷氣不可多食動氣先患腹冷食必破腹莖灰淋汁洗衣白如玉色以上五種新補見孟詵陳藏器陳士良日華子東風菜味甘寒無毒主風毒壅熱頭疼目眩肝熱眼赤堪入羹臛煮食甚美生嶺南平澤莖高三二尺葉似杏葉而長極厚軟上有細毛先春而生故有東風之號今附
