body:
  text: 卷第十一己酉新增衍義何首烏味苦澀微溫無毒主瘰癧消癰腫療頭面風瘡五痔止心痛益血氣黑髭鬢悅顏色久服長筋骨益精髓延年不老亦治婦人産後及帶下諸疾本出順州南河縣今嶺外江南諸州皆有蔓紫花黃白葉如薯蕷而不光生必相對根大如拳有赤白二種赤者雄白者雌一名野苗一名交藤一名夜合一名地精一名陳知白春夏採臨用之以苦竹刀切米泔浸經宿曝乾木杵臼搗之忌鐵今附臣禹錫等謹按日華子云味甘久服令人有子治腹藏宿疾一切冷氣及腸風此藥有雌雄雄者苗葉黃白雌者赤黃色凡修合藥須雌雄相合吃有驗其藥本草無名因何首烏見藤夜交便即採食有功因以採人為名耳又名桃柳藤圖經曰何首烏本出順州南河縣嶺外江南諸州亦有今在處有之以西洛嵩山及南京柘城縣者為勝春生苗葉葉相對如山芋而不光澤其莖蔓延竹木牆壁間夏秋開黃白花似葛勒花結子有稜似蕎麥而細小才如粟大秋冬取根大者如拳各有五稜瓣似小甜瓜此有二種赤者雄白者雌採時乘濕以布帛拭去土後用苦竹刀切米泔浸一宿曝乾忌鐵以木臼杵搗之一云春採根秋採花九蒸九曝乃可服此藥本名交藤因何首烏服而得名何首烏者順州河南縣人祖能嗣本名田兒生而閹弱年五十八無妻子一日醉臥野中見田中藤兩本異生苗蔓相交久乃解解合三四田兒心異之掘根持問鄉人無能名者遂曝乾搗末酒服七日而思人道百日而舊疾皆愈十年而生數男後改名能嗣又與子庭服皆壽百六十歲首烏服藥亦年百三十歲唐元和七年僧文象遇茅山老人遂傳其事李翱因著方録云又敘其苗如木藁光澤形如桃柳葉其背偏獨單皆生不相對有雌雄者雌者苗色黃白雄者黃赤其生相遠夜則苗蔓交或隱化不見春末夏中初秋三時候晴明日兼雌雄採之烈日曝乾散服酒下良採時盡其根乘潤以布帛拭去泥土勿損皮密器貯之每月再曝凡服偶日二四六八日是服訖以衣覆汗出導引尤忌豬羊血其敘頗詳故載之經驗方何首烏新採者去皮土後用銅竹刀薄切片上甑如炊飯蒸下用瓷石鍋忌鐵旁更別燒一鍋常滿添水候藥甑氣上逐旋以熱水從上淋下勿令滿溢直候首烏絶無氣味然後取下一匙頭汁白湯亦可此是藥之精英與常不同治骨軟風腰膝疼行履不得遍身瘙癢首烏大而有花紋者同牛膝銼各一斤以好酒一升浸七宿曝乾於木臼內搗末蜜丸每日空心食前酒下三五十丸又方治諸處皮裡面痛首烏末薑汁調成膏痛處以帛子裹之用火炙鞋底尉之妙斗門方治瘰癧或破不破以至下胸前者皆治之用九真藤取其根如雞卵大洗生嚼常服又取葉搗覆瘡上數服即止其藥久服黑髮延年或取其頭獲之九數者服之乃仙矣其葉如杏其根亦類癧子用之如神又堪為利術伏沙子自有法一名何首烏又名赤葛王氏博濟治疥癬滿身作瘡不可治者何首烏艾等分以水煎令濃於盆內洗之甚能解痛生肌肉何首烏傳昔何首烏者順州南河縣人祖名能嗣父名延秀能嗣常慕道術隨師在山因醉夜臥山野忽見有藤二株相去三尺余苗蔓相交久而方解解了又交驚訝其異至旦遂掘其根歸問諸人無識者後有山老忽來示之答曰子既無嗣其藤乃異此恐是神仙之藥何不服之遂杵為末空心酒服一錢服數月似強健因此常服又加二錢服之經年舊疾皆愈發烏容少數年之內即有子名延秀秀生首烏首烏之名因此而得生數子年百餘歲發黑有李安期者與首烏鄉里親善竊得方服其壽至長遂敘其事何首烏味甘生溫無毒茯苓為使治五痔腰膝之病冷氣心痛積年勞瘦痰癖風虛敗劣長筋力益精髓壯氣駐顏黑髮延年婦人惡血痿黃産後諸疾赤白帶下毒氣入腹久痢不止其功不可具述一名野苗二名交藤三名夜合四名地精五名首烏本出虔州江南諸道皆有之苗葉有光澤又如桃李葉雄苗赤根遠不過三尺春秋可採日乾去皮為末酒下最良有疾即用茯苓湯下為使常杵末新瓷器盛服之忌豬肉血無鱗魚觸藥無力此藥形大如拳連珠其中有形鳥獸山嶽之狀珍也掘得去皮生吃得味甘甜休糧贊曰神效助道著在仙書雌雄相交夜合晝疏服之去谷日居月諸返老還少變安病軀有緣者遇傳之勿泄最爾自如明州刺史李遠傳録經驗何首烏所出順州南河縣韶州潮州恩州賀州廣州四會縣潘州以上出處為上雍州晉興縣桂州康州春州勒州高州循州以上所出次之其仙草五十年者如拳大號山奴服之一年髭鬢青黑一百年如碗大號山哥服之一年顏色紅悅一百五十年如盆大號山伯服之一年齒落重生二百年如斗栲栳大號山翁服之一年顏如童子行及奔馬三百年如三斗栲栳大號山精服之一年延齡純陽之體久服成地仙衍義曰何首烏兼黑髭鬢與羅卜相惡令人髭鬢早白治腸風熱多用商陸味辛酸平有毒主水脹疝瘕痹尉除癰腫殺鬼精物療胸中邪氣水腫痿痹腹滿洪直疏五臟散水氣如人形者有神一名䓪根一名夜呼生咸陽川穀陶隱居云近道處處有方家不甚乾用療水腫切生根雜生鯉魚煮作湯道家乃散用及煎釀皆能去尸蟲見鬼神其實亦入神藥花名䓪花尤良唐本注云此有赤白二種白者入藥用赤者見鬼神甚有毒但貼腫處用若服之傷人乃至痢血不已而死也今注商陸一名白昌一名當陸臣禹錫等謹按蜀本圖經云葉大如牛舌而厚脆有赤花者根赤白花者根白今所在有之二月八月採根日乾爾雅云蓫𧀫馬尾注廣雅曰馬尾商陸本草云別名𧀫今關西亦呼為𧀫江東呼為當陸釋文云如人形者有神藥性論云當陸使忌犬肉味甘有大毒能瀉十種水病喉痹不通薄切醋熬喉腫處處敷之瘥日華子云白章陸味苦冷得大蒜良通大小腸瀉蠱毒墮胎㶸腫毒敷惡瘡赤者有毒圖經曰商陸俗名章柳根生咸陽山谷今處處有之多生於人家園圃中春生苗高三四尺葉青如牛舌而長莖青赤至柔脆夏秋開紅紫花作朵根如蘆蔔而長八月九月內採根曝乾其用歸表古方術家多用之亦可單服五月五日採根竹𥰭盛掛屋東北角陰乾百日搗篩井華水調服云神仙所祕法喉中卒被毒氣攻痛者切根炙令熱隔布尉之冷輒易立愈其花主人心昏塞多忘喜誤取花陰乾百日搗末日暮水服方寸匕臥思念所欲事即於眼中自覺爾雅謂之蓫𧀫廣雅謂之馬尾易謂之莧陸皆謂此商陸也然有赤白二種花赤者根赤花白者根白赤者不入藥服食用白者又一種名赤菖苗葉絶相類不可用服之傷筋消腎須細辨之雷公云凡使勿用赤菖緣相似其赤菖花莖有消筋腎之毒故勿餌章陸花白年多後仙人採之用作脯可下酒也每修事先以銅刀刮去上皮了薄切以東流水浸兩宿然後漉出架甑蒸以豆葉一重了與章陸一重如斯蒸從午至亥出仍去豆葉曝乾了細銼用若無豆葉只用豆代之外臺祕要治水氣商陸根白者去皮切如小豆許一大盞以水三升煮取一以上爛即取粟米一大盞煮成粥仍空心服若一日兩度服即恐利多每日服一頓即微利不得雜食又方治瘰癧喉痹卒攻痛搗生章陸根捻作餅子置瘰癧上以艾炷於藥上灸三四壯千金髓治水氣浮腫白菖六兩取汁半合和酒半升看大小相度與服當利下水瘥又方卒暴症腫中有物如石痛刺啼呼若不治百日死多取商陸根搗汁或蒸之以布藉腹上安藥勿覆冷復易晝夜勿息經驗方治水疾樟柳去粗皮薄切曝乾為末用黃顙魚三頭大蒜三瓣緑豆一合以水一大碗同煮豆爛為度先將豆任意吃了卻以汁調藥末一錢匕其水化為清氣消梅師方治水腫不能服藥商陸一升羊肉六兩以水一斗煮取六升去滓和肉蔥豉作臛如常法食之商陸白者妙孫真人食忌主一切熱毒腫章陸根和鹽少許敷之日再易又方主瘡中毒切章陸根汁熱布裹尉之冷即易斗門方治腳軟用章柳根細切如小豆大煮令熟更入緑豆同爛煮為飯每日如此修事服餌以瘥為度其功最效張文仲治石癰堅如石不作膿者生章陸根搗擦之燥即易取軟為度威靈仙味苦溫無毒主諸風宣通五臟去腹內冷滯心膈痰水久積癥瘕痃癖氣塊膀胱宿膿惡水腰漆冷疼及療折傷一名能消久服之無溫疫瘧出商州上洛山及華山並平澤不聞水聲者良生先於衆草莖方數葉相對花淺紫根生稠密歲久益繁冬月丙丁戊己日採忌茗今附臣禹錫等謹按蜀本云九月末至十二月採陰乾余月並不堪採圖經曰威靈仙出商州上洛山及華山並平澤今陝西州軍等及河東河北京東江湖州郡或有之初生比衆草最先莖梗如叉股四稜葉似柳葉作層每層六七葉如車輪有六層至七層者七月內生花淺紫或碧白色作穗似莆臺子亦有似菊花頭者實青根稠密多須似谷每年亦朽敗九月採根陰乾仍以丙丁戊己日採以不聞水聲者佳唐正元中嵩陽子周君巢作威靈仙傳云先時商州有人重病足不履地者數十年良醫殫技莫能療所親置之道旁以求救者遇一新羅僧見之告曰此疾一藥可活但不知此土有否因為之入山求索果得乃威靈仙也使服之數日能步履其後山人鄧思齊知之遂傳其事崔元亮海上方著其法云採得陰乾月餘搗篩溫清酒和二錢匕空腹服之如人本性殺藥可加及六錢匕利過兩行則減之病除乃停服其性甚善不觸諸藥但惡茶及麵湯以甘草梔子代飲可也唐本云腰腎腳膝積聚腸內諸冷病積年不瘥者服之無不立效出商州洛陽縣九月末至十二月採陰乾余月並不堪採每年旁引年深轉茂根苗漸多經數年亦折敗千金方治腰腳痛威靈仙為末空心溫酒調下錢匕逐日以微利為度經驗方治大腸久冷威靈仙蜜丸桐子大於一更內生薑湯下十丸至二十丸又方治腰腳威靈仙一斤洗干好灑浸七日為末麵糊丸桐子大以浸藥酒下二十丸集驗方治腎臟風壅積腰膝沉重威靈仙末蜜和丸桐子大初服溫酒下八十丸平明微利惡物如青濃膠即是風毒積滯也如未利夜再服一百丸取下後吃粥藥補之一月仍常服溫補藥孫兆放杖丸同崔氏海上集威靈仙去衆風通十二經脈此藥朝服暮效疏宣五臟冷膿宿水變病微利不瀉人服此四肢輕健手足溫暖並得清涼時商州有人患重足不履地經十年不瘥忽遇新羅僧見云此疾有藥可理遂入山求之遣服數日平復後留此藥名而去此藥治丈夫婦人中風不語手足不隨口眼喎斜筋骨節風胎風頭風暗風心風風狂人傷寒頭痛鼻清涕服經二度傷寒即止頭旋目眩白瘕風極治大風皮膚風癢大毒又熱毒風瘡深治勞疾連腰骨節風繞腕風言語澀滯痰積宣通五臟腹內宿滯心頭痰水膀胱宿膿口中涎水好吃茶滓手足頑痹冷熱氣壅腰膝疼痛久立不得浮氣瘴氣憎寒壯熱頭痛尤甚攻耳成膿而聾又沖眼赤大小腸祕服此立通飲食即住黃疸黑疸面無顏色瘰癧遍項産後祕澀概腰痛曾經損墜心痛注氣隔氣冷氣攻衝腎臟風壅腹肚脹滿頭面浮腫注毒脾肺氣痰熱咳嗽氣急坐臥不安疥癬等瘡婦人月水不來動經多日血氣衝心陰汗盜汗鴉臭穢甚氣息不堪勤服威靈仙更用熱湯盡日頻洗朝以苦唾調藥塗身上內外每日一次塗之當得平愈孩子無辜令母含藥灌之痔疾祕澀氣痢絞結並皆治之威靈仙一味洗焙為末以好酒和令微濕入在竹筒內牢塞口九蒸九曝如干添酒重灑之以白蜜和為丸如桐子大每服二十至三十丸湯酒下衍義曰威靈仙治腸風根性快多服疏人五臟真氣牽牛子味苦寒有毒主下氣療腳滿水腫除風毒利小便陶隱居云作藤生花狀如藊豆黃色子作小房實黑色形如球子核比來服之以療腳滿氣急得小便利無不瘥此藥始出田野人牽牛易藥故以名之又有一種草葉上有三白點俗因以名三白草其根以療腳下氣亦甚有驗唐本注云此花似旋葍花作碧色又不黃不似扁豆其三白草有三黑點非白也古人祕之隱黑為白爾陶不見但聞而傳之謂實白點今注此藥蔓生花如鼓子花而稍大作碧色子有黃殼作小房實黑稍類蕎麥比來服之以療腳腫滿氣急利水道無不瘥者臣禹錫等謹按蜀本圖經云苗蔓生花碧色子若蕎麥三稜黑色九月以後收子所在有之藥性論云牽牛子使味甘有小毒能治痃癖氣塊利大小便除水氣虛腫落胎日華子云味苦㿌得青木香乾薑良取腰痛下冷膿瀉蠱毒藥並一切氣壅滯圖經曰牽牛子舊不著所出州土今處處有之二月種子三月生苗作藤蔓繞籬牆高者或三二丈其葉青有三尖角七月生花微紅帶碧色似鼓子花而大八月結實外有白皮里作球每球內有子四五枚如蕎麥大有三稜有黑白二種九月後收之又名金鈴段成式酉陽雜俎云盆甑草即牽牛子也秋節後斷之狀如盆甑其中子似龜蔓如山芋即此也雷公云草金零牽牛子是也凡使其藥秋末即有實冬收之凡用曬乾卻入水中淘浮者去之取沉者曬乾拌酒蒸從巳至未曬乾臨用舂去黑皮用食療云多食稍冷和山茱萸服之去水病聖惠方治水氣遍身浮腫氣促坐臥不得用牽牛子二兩微炒搗細末烏牛尿浸一宿平旦入蔥白一握煎十餘沸去滓空心分為二服水從小便中下肘後方治風毒腳氣若脛已滿捻之沒指者取牽牛子搗蜜丸如小豆大每服五丸生薑湯下取令小便利亦可止斗門方治風氣所攻臟腑積滯用牽牛子以童子小便浸一宿後長流水上洗半日卻用生絹袋盛掛於當風處令好乾每日鹽湯下三十粒極能搜風亦善消虛腫久服令人體清爽王氏博濟治三焦氣不順胸膈壅寒頭昏目眩涕唾痰涎精神不爽利膈丸牽牛子四兩半生半熟不蚛皂莢塗酥炙二兩為末生薑自然汁煮糊丸如桐子大每服二十丸荊芥湯下又方治産前滑胎牽牛子一兩赤土少許研令細每覺轉痛頻煎白榆皮湯調下一錢匕又方治男子婦人五般積氣成聚黑牽牛一斤生搗末八兩余滓於新瓦上炒令香熟放冷再搗取四兩熟末十二兩拌令勻煉蜜和丸如桐子大患積氣至重者三五十丸煎陳橘皮生薑湯下臨臥空心服之如二更至三更已來藥行時效應未動再與三十丸投之轉下積聚之物常服十丸至十五丸行氣甚妙小兒十五以下至七歲以上服五丸至七丸年及五十以上不請服簡要濟衆治大便澀不通牽牛子半生半熟搗為散每服二錢煎薑湯調下如未通再服改以熱茶調下量虛實無時候加減服衍義曰牽牛子諸家之說紛紛不一陶隱居尤甚言花狀如藊豆殊不相當花朵如鼓子花但碧色日出開日西合今注又謂其中子類喬麥亦非也蓋有如木猴梨子但黑色可微炒搗取其中粉一兩別以麩炒去皮尖者桃仁末半兩以熟蜜和丸如梧桐子溫水服三二十丸治大腸風祕壅熱結澀不可久服亦行脾腎氣故也萆音卑麻子味甘辛平有小毒主水症水研二十枚服之吐惡沫加至三十枚三日一服瘥則止又主風虛寒熱身體瘡癢浮腫尸疰惡氣笮取油塗之葉主腳氣風腫不仁搗蒸敷之唐本注云此人間所種者葉似大麻葉而甚大其子如蜱音卑又名萆麻今胡中來者莖赤樹高丈餘子大如皂莢核用之益良油塗葉炙熱尉囟音信上止衄尤驗也唐本先附臣禹錫等謹按蜀本圖經云樹生葉似大麻大數倍子殼有刺實大於巴豆青黃色斑夏用莖葉秋收子冬採根日乾胡中來者莖子更倍大所在有之又云葉似葎草而厚大莖赤有節如甘蔗日華子云治水脹腹滿細研水服壯人可五粒催生敷産人手足心産後速拭去瘡痍疥癩亦可研敷圖經曰萆麻子舊不著所出州郡今在處有之夏生苗葉似葎草而厚大莖赤有節如甘蔗高丈許秋生細花隨便結實殼上育刺實類巴豆青黃斑褐形如牛蜱故名夏採莖葉秋採實冬採根日乾胡中來者莖子更大崔元亮海上方治難産及胞衣不下取萆麻子七枚研如膏塗腳心底子及衣才下便速洗去不爾腸出即用此膏塗頂腸當自入雷公云凡使勿用黑天赤利子緣在地蔞上生是顆兩頭尖有毒藥中不用其萆麻子形似巴豆節節有黃黑斑點凡使先須和皮用鹽湯煮半日去皮取子研過用外臺祕要治半身不遂失音不語取萆麻子油一升酒一斗銅鉢盛油著酒中一日煮之令酒油熟服之又方治水氣取萆麻子去皮研令熟水解得三合清旦一頓服之盡日中當下青黃水千金方治嶺南腳氣從足至膝脛腫滿連骨疼者萆麻子葉切蒸薄裹二三易即消肘後方治一切毒腫疼痛不可忍者搗萆麻子敷之瘥又方産難取萆麻子二枚兩手各把一枚須臾立下經驗後方治風疾鼻榻萆麻不拘多少去皮拍為二斤用黃連等分捶碎二件用水一處浸七宿後空心日午臥時只用浸者水吞下一片水盡旋添勿令乾服兩月後吃大蒜豬肉試驗如不發動便是效也若發動時依前法再服直候不發如只腿脹用針出毒物纍有神效修直祕旨治小兒丹瘤萆麻子五個去皮研入面一匙水調塗之甚效杜壬治癘風手指攣曲節間痛不可忍漸至漸落方萆麻一兩去皮黃連一兩銼如豆以小瓶子入水一升同浸春夏三日秋冬五日後取萆麻子一枚擘破面東以浸藥水平旦時一服漸加至四五枚微利不妨瓶中水少更添忌動風食纍用得效又方治咽中瘡腫萆麻子一枚去皮朴硝一錢同研新汲水作一服連進二三服效初虞世治湯火傷神妙萆麻子蛤粉等分末研膏湯損用油調塗火瘡用水調塗衍義曰萆麻子作朵生從下旋旋開花而上從下結子宛如牛身之蜱取子妙熟去皮爛嚼臨睡服三二枚漸加至十數枚治瘰癧必效蒴藋味酸溫有毒主風瘙癮疹身癢濕痹可作浴湯一名堇草一名芨生田野春夏採葉秋冬採莖根陶隱居云田野墟村中甚多絶療風痹癢痛多用薄洗不堪入服亦有酒漬根稍飲之者唐本注云此陸英也剩出此條爾雅云芨堇草郭注云烏頭苗也檢三堇別名又無此者蜀人謂烏頭苗為堇草陶引此條不知所出處藥對及古方無蒴藋唯言陸英也今注蒴藋條唐本編在狼跋子之後而與陸英條注解並云剩出一條今詳陸英味苦寒無毒蒴藋味酸溫有毒既此不同難謂一種蓋其類爾今但移附陸英之下臣禹錫等謹按日華子云味苦涼有毒治瘑癩風痹並煎湯浸並葉用圖經文具陸英條下雷公云凡使之春用隔年花蕊夏用根秋冬並總用作煎只取根用銅刀細切於柳木臼中搗取自然汁緩緩於鍋子中煎如稀餳任用也外臺祕要治卒暴症腹中有物堅如石痛欲死取蒴藋根一小束洗瀝去水細擘以酒二升漬三宿暖溫服五合至一升日三若欲速得服於熱灰中溫令藥味出服之此方無毒已愈十六人神驗藥盡復作服之又方治腰痛方蒴藋葉火燎厚鋪床上趁熱臥眠於上冷復易之冬月取根舂碎熬及熱准前用並治風溫濕冷痹及産婦患傷冷腰痛不得動亦用又方治下部閉不通取蒴藋根一把搗汁水和絞去滓強人服一升數用之並治腳氣千金方治嶺南腳氣從足至膝脛腫骨疼者蒴藋根碎和酒醋共三分根一分合蒸熟封裹腫上二三日即消亦治不仁又方治頭風取蒴藋根二升酒二升煮服之梅師方治水腫坐臥不得頭面身體悉腫取蒴藋根刮去皮搗汁一合和酒一合暖空心服當微吐利又方治一切疹用煮蒴藋湯和少酒塗無不瘥姚氏方同孫真人食忌主卒腳腫漸上以蒴藋莖葉埋熱灰中令熱敷腫上瘥即易斗門方治瘧疾用蒴藋一大握炙令黃色以水濃煎一盞欲發前服張文仲治手足忽生疣目蒴藋赤子挪使壞疣目上令赤塗之瘥又方治熊傷人瘡蒴藋一大把銼碎以水一升漬須臾取汁飲余滓以封裹瘡子母祕録治小兒赤遊行於身上下至心即死蒴藋煎汁洗之衍義曰蒴藋與陸英既性味及出産處不同治療又別自是二物斷無疑焉況蒴藋花白子初青如緑豆顆每朵如盞面大又平生有一二百子十月方熟紅忌得言剩出此條孟浪之甚也天南星味苦辛有毒主中風除痰麻痹下氣破堅積消癰腫利胸膈散血墜胎生平澤處處有之葉似蒻葉根如芋二月八月採之今附臣禹錫等謹按陳藏器云天南星主金瘡傷折瘀血取根碎敷傷處生安東山谷葉如荷獨莖用根最良日華子云味辛烈平畏附子乾薑生薑罯撲損瘀血主蛇蟲咬疥癬惡瘡入藥炮用又名鬼蒟蒻圖經曰天南星本經不載所出州土云生平澤今處處有之二月生苗似荷梗莖高一尺以來葉如蒟蒻兩枝相抱五月開花似蛇頭黃色七月結子作穗似石榴子紅色根似芋而圓二月八月採根亦與蒟蒻根相類人多誤採莖斑花紫是蒟蒻一說天南星如本草所說即虎掌也小者名由跋後人採用乃別立一名爾今天南星大者四邊皆有子採時盡削去之又陳藏器云半夏高一二尺由跋高一二寸此正誤相反言也今由跋苗高一二尺莖似蒟蒻而無斑根如雞卵半夏高一二寸亦有盈尺者根如小指正圓也江南吳中又有白蒟蒻亦曰鬼芋根都似天南星生下平澤極多皆雜採以為天南星了不可辨市中所收往往是也但天南星小柔膩肌細炮之易裂差可辨爾古方多用虎掌不言天南星天南星近出唐世中風痰毒方中多用之續傳信方治風痛用天南星躑躅花並生時同搗羅作餅子甑上蒸四五過以絺葛囊盛之候要即取焙搗為末蒸餅丸如梧桐子溫酒下三丸腰腳骨痛空心服手臂痛食後服大良經驗方治急中風目暝牙噤無門下藥者有此末子以中指點末揩齒三二十揩大牙左右其口自開始得下藥名開開散天南星搗為末白龍腦二件各等分研自五月五日午時合患者只一字至半錢又方治小兒走馬疳蝕透損骨及小攻蝕必效方天南星一個當心作坑子安雄黃一塊在內用曲裹燒候雄黃作汁以盞子合定出火毒去曲研為末入麝香少許敷瘡驗又方治婦人一切風攻頭目痛天南星一個掘地坑子火燒令赤安於坑中以醋一盞以盞蓋之不令透氣候冷取出為末每服一字以酒調下重者半錢匕又方治驚風墜涎天南星一個重一兩換酒浸七伏時取出於新瓦上周回炭火炙令乾裂置於濕地去火毒用瓷器合盛之冷搗末用硃砂一分研同拌每服半錢荊芥湯調下每日空心午時進一二服勝金方治吐血天南星一兩銼如豆大以爐灰汁浸一宿取出洗淨焙乾搗末用酒磨自然銅下一錢愈十全博救方治咳嗽天南星一個大者炮令裂為末每服一大錢水一盞生薑三片煎至五分溫服空心日午臨臥時各一服集效方治吐瀉不止或取轉多四肢發厥虛風不省人事服此四肢漸暖神識便省回陽散天南星為末每服三錢入京棗三枚同煎八分溫服未省再服初虞世治破傷風入瘡強直防風天南星等分為末以醋調作靨貼上談氏方治小兒牙關不開天南星一個煨熱紙裹斜角未要透氣於細處剪雞頭大一竅子透氣於鼻孔中牙關立開羊蹄味苦寒無毒主頭禿疥瘙除熱女子陰蝕浸淫疽痔殺蟲一名東方宿一名連蟲陸一名鬼目一名蓄生陳留川澤陶隱居云今人呼名禿菜即是蓄音之訛詩云言採其蓄又一種極相似而味酸呼為酸摸根亦療疥也唐本注云實味苦澀平無毒主赤白雜痢根味辛苦有小毒萬畢方云療蟲毒今山野平澤處處有之臣禹錫等謹按蜀本圖經云生下濕地高者三四尺葉狹長莖節間紫赤花青白色子三稜夏中即枯又有一種莖葉俱細節間生子若茺蔚子療痢乃佳今所在有之日華子云羊蹄根治癬殺一切蟲腫毒醋摩貼葉治小兒疳蟲殺胡夷魚鮭魚檀胡魚毒亦可作菜食陳藏器云酸摸葉酸美小兒折食其英根主暴熱腹脹生搗絞汁服當下痢殺皮膚小蟲葉似羊蹄是山大黃一名當藥爾雅云須薞蕪注云似羊蹄而細味酸可食日華子云酸摸味酸涼無毒治小兒壯熱生山岡狀似羊蹄葉而小黃圖經曰羊蹄禿菜也生陳留川澤今所在有之生下濕地春生苗高三四尺葉狹長頗似萵苣而色深莖節間紫赤花青白成穗子三稜有若茺蔚夏中即枯根似牛蒡而堅實今人生採根醋摩塗癬速效亦煎作丸服之其方以新採羊蹄根不限多少搗研絞取汁一大升白蜜半斤同熬如稠餳煎更用防風末六兩搜和令可丸大如梧子用栝蔞甘草酒下三二十丸日二三次佳謹按詩小雅言蒙其蘧陸機云蘧今人謂之羊蹄似蘆蔔而莖赤可汋為茹滑而美也多啖令人下氣幽州人謂之蘧字或作蓄並恥六切又有一種極相類而葉黃味酢名酸摸爾雅所謂須蕵音孫蕪郭璞云蕵蕪似羊蹄葉細味酢可食一名蓨音條是也食療主癢不宜多食聖惠方治癧瘍風用羊蹄菜根於生鐵上以好醋磨旋旋刮取塗於患上未瘥更入硫黃少許同磨塗之又方治大便卒澀結不通用羊蹄根一兩銼水一大盞煎取六分去滓溫溫頓服外臺祕要治疥方搗羊蹄根和豬脂塗上或著鹽少許佳千金方喉痹卒不語羊蹄獨根者勿見風日及婦人雞犬以三年醋研和如泥生布拭喉令赤敷之千金翼治漏瘤瘡濕癬癢浸淫日廣癢不可忍搔之黃水出瘥後復發取羊蹄淨去土細切搗以大酢和淨洗敷上一時間以冷水洗之日一敷瘥若為末敷之妙斗門方治腸風痔瀉血羊蹄根葉爛蒸一碗來食之立瘥簡要濟衆治癬瘡久不瘥羊蹄根搗絞取汁用調膩粉少許如膏塗敷癬上三五遍即瘥如干即豬脂調和敷之衍義曰羊蹄經不言根圖經加根字處處有葉如菜中菠薐但無歧而色差青白葉厚花與子亦相似葉可潔擦䃋石器根取汁塗疥癬子謂之金蕎麥燒煉家用以制鉛汞又銼根研絞汁取三二匙水半盞煎一二沸溫溫空肚服治産後風祕殊驗菰根大寒主腸胃痼熱消渴止小便利陶隱居云菰根亦如蘆根冷利復甚也今按別本注云菰蔣草也江南人呼為茭草秣馬甚肥味甘無毒臣禹錫等謹按蜀本圖經云生水中葉似蔗荻久根盤厚夏月生菌細堪啖名菰菜三年以上心中生臺如藕白軟中有黑脈堪啖名菰首也爾雅云出隧蘧蔬釋曰菌類也一名出隧一名蘧蔬廣雅云朝生形如鬼蓋郭云似土菌生菰草中今江東啖之甜滑者氈氍毹者說文云菰蔣也張揖云氍毹毛席取其音同孟詵云菰菜利五臟邪氣酒渣面赤白癩癧瘍目赤等效然滑中不可多食熱毒風氣卒心痛可鹽醋煮食之又云茭首寒主心胸中浮熱風食之發冷氣滋人齒傷陽道令下焦冷滑不食甚好陳藏器云菰菜味甘無毒去煩熱止渴除目黃利大小便止熱痢雜鯽魚為羹開胃口解酒毒生江東池澤菰葑上如菌葑是菰根歲久浮在水上者主火燒瘡燒為灰和雞子白塗之呂氏春秋曰菜之美者越路之菌是也晉張翰見秋風起思之又云菰首生菰蔣草心至秋如小兒臂故云菰首煮食之止渴甘冷雜蜜食之發痼疾無別功更有一種小者擘肉如墨名烏郁人亦食之止小兒水痢日華子云茭首微毒多食發氣並弱陽葉利五臟食巴豆人不可食圖經曰菰根舊不著所出州土今江湖陂澤中皆有之即江南人呼為茭草者生水中葉如蒲葦輩刈以秣馬甚肥春亦生筍甜美堪啖即菰菜也又謂之茭白其歲久者中心生白臺如小兒臂謂之菰手今人作菰首非是爾雅所謂蘧蔬注云似土菌生菰草中正謂此也故南方人至今謂菌為菰亦緣此義也其臺中有墨者謂之茭郁其根亦如蘆根冷利更甚二浙下澤處菰草最多其根相結而生久則並土浮於水上彼人謂之菰葑刈去其葉便可耕蒔其苗有莖梗者謂之菰蔣草至秋結實乃雕胡米也古人以為美饌今飢歲人猶採以當糧西京雜記云漢太液池邊皆是雕胡紫籜緣節蒲叢之類菰之有米者長安人謂為雕胡葭蘆之米解葉者紫籜菰之有首者謂之緑節是也然則雕胡諸米今皆不貴大抵菰之種類皆極冷不可過食甚不益人唯服金石人相宜耳陳藏器云茭首主心胸中浮熱動氣不中食之發冷滋牙齒傷陽道令下焦冷不食為妙食療云若丹石熱發和鯽魚煮作羹食之三兩頓即便瘥耳外臺祕要治湯火所灼未成瘡取菰蔣根燒取灰用雞子黃和封之廣濟方治毒蛇齧方菰蔣草根灰取以封之其草似燕尾是子母祕録小兒風瘡久不瘥燒菰蔣節末以敷上衍義曰菰根蒲類四時取根搗絞汁用河朔邊人只以此苗飼馬曰菰蔣及作薦花如葦結青子細若青麻黃長几寸彼人收之合粟為粥食之甚濟飢此杜甫所謂願作冷秋菰者是也為其皆生水中及岸際多食令人利萹音褊蓄味苦平無毒主浸淫疥瘙疽痔殺三蟲療女子陰蝕生東萊山谷五月採陰乾陶隱居云處處有布地生花節間白葉細緑人亦呼為萹竹煮汁與小兒飲療蛔蟲有驗臣禹錫等謹按蜀本圖經云葉如竹莖有節細如叉股生下濕地今所在有二月八月採苗日乾爾雅云竹萹蓄釋云李巡云一物二名也孫炎引詩衛風云緑竹猗猗郭云似小藜赤莖節好生道旁可食又殺蟲陶注本草謂之萹竹是也藥性論云萹竹使味甘煮汁與小兒服主蛔蟲等咬心心痛面青口中沫出臨死者取十斤細銼以水一石煎去滓成煎如飴空心服蟲自下皆盡止主患痔疾者常取葉搗汁服效治熱黃取汁頓服一升多年者再服之根一握洗去土搗汁服之一升惡丹石毒發沖目腫痛又敷熱腫效圖經曰萹蓄亦名萹竹出東萊山谷今在處有之春中布地生道旁苗似瞿麥葉細緑如竹赤莖如叉股節間花出甚細微青黃色根如蒿根四月五月採苗陰乾謹按爾雅云竹萹蓄郭璞注云似小藜赤莖節好生道旁可食又殺蟲衛詩緑竹猗猗說者曰緑王芻也竹萹竹也即謂此萹蓄方書亦單用治蟲葛洪小兒蛔方煮汁令濃飲之即瘥食療云蛔蟲心痛面青口中沫出臨死取葉十斤細切以水三石三斗煮如餳去滓通寒溫空心服一升蟲即下至重者再服仍通宿勿食來日平明服之患痔常取萹竹葉煮汁澄清常用以作飰又患熱黃五痔搗汁頓服一升重者再服丹石發沖眼目腫痛取根一握洗搗以少水絞取汁服之若熱腫處搗根莖敷之外臺祕要治痔發疼痛搗萹竹汁服一升一兩服立瘥若未瘥再服效千金翼治外痔搗萹竹絞取汁搜面作餺飥空心吃日三度常吃肘後方惡瘡連痂癢痛搗萹竹封痂落即瘥食醫心鏡治小兒蟯蟲攻下部癢取萹竹葉一握切以水一升煎取五合去滓空腹飲之蟲即下用其汁煮粥亦佳又方治霍亂吐痢不止萹竹豉汁中以五味調和煮羹食之佳楊氏産乳治蠱狀如蝸牛食下部癢取萹竹一把水二升煮熟五歲兒空腹服三五合隔宿食明早服之尤佳狼毒味辛平有大毒主咳逆上氣破積聚飲食寒熱水氣脅下積癖惡瘡鼠瘻疽蝕鬼精蠱毒殺飛鳥走獸一名續毒生秦亭山谷及奉高二月八月採根陰乾陳而沉水者良大豆為之使惡麥名姜陶隱居云秦亭在隴西亦出宕昌乃言只有數畝地生蝮蛇食其根故為難得亦用泰山者今用出漢中及建平云與防葵同根類但置水中沉者便是狼毒浮者則是防葵俗用稀亦難得是療腹內要藥爾唐本注云此物與防葵都不同類生處又別狼毒今出秦州成州秦亭故在二州之界其泰山漢中亦不聞有且秦隴寒地原無復蛇復云數畝地生蝮蛇食其根謬矣今按別本注云與麻黃橘皮吳茱萸半夏枳實為六陳也又按狼毒葉似商陸及大黃莖葉上有毛根皮黃肉白以實重者為良輕者力劣秦亭在隴西奉高乃泰山下縣亦出宕昌及漢中建平舊經陶云與防葵同根以置水中浮者即是防葵沉者即是狼毒此不足為信假使防葵秋冬採者堅實得水皆沉狼毒春夏採者輕虛得水乃浮爾按此與防葵全別生處不同故不可將為比類臣禹錫等謹按蜀本圖經云根似玄參浮虛者為劣也藥性論云狼毒使味苦辛有毒治痰飲癥瘕亦殺鼠圖經曰狼毒生秦亭山谷及奉高今陝西州郡及遼石州亦有之苗葉似商陸及大黃莖葉上有毛四月開花八月結實根皮黃肉白二月八月採陰乾以陳而沉水者良葛洪治心腹相連常脹痛者用狼毒二兩附子半兩搗篩蜜丸如桐子大一日服一丸二日二丸三日三丸再一丸至六日又三丸自一至三常服即瘥千金療惡疾以狼毒秦艽分兩等搗末酒服方寸匕日二常服之瘥聖惠方治乾癬積年生痂搔之黃水出每逢陰雨即癢用狼毒末塗之集效方治臟腑內一切蟲病川狼毒杵末每服一大錢用餳一皂子大沙糖少許以水同化臨臥空腹服之服時先吃微緊食藥一服來日早取下蟲效豨音喜蘞音豨味苦寒有小毒主熱䘌煩滿不能食生搗汁服三四合多則令人吐唐本注云葉似酸漿而狹長花黃白色一名火蘞田野皆識之今按別本注云三月四月採苗葉曝乾唐本先附臣禹錫等謹按蜀本圖經云高二尺許子青黃夏採葉用所在下濕地有之圖經曰豨蘞俗呼火杴草本經不著所出州郡今處處有之春生苗葉似芥菜而狹長紋粗莖高二三尺秋初有花如菊秋末結實頗似鶴蝨夏採葉曝乾用近世多有單服者云甚益元氣蜀人服之法五月五日六月六日九月九日採其葉去根莖花實淨洗曝乾入甑中層層灑酒與蜜蒸之又曝如此九過則已氣味極香美熬搗篩蜜丸服之云治肝腎風氣四肢麻痹骨間疼腰膝無力者亦能行大腸氣諸州氣說皆云性寒有小毒與本經意同唯文州高郵軍云性熱無毒服之補虛安五臟生毛髮兼主風濕瘡肌肉頑痹婦人久冷尤宜服用之去粗莖留枝葉花實蒸曝兩說不同豈單用葉乃寒而有毒並枝花實則熱而無毒乎抑系土地所産而然邪成訥云江陵府節度使進豨蘞丸方臣有弟欣年三十一中風床枕五年百醫不瘥有道人鍾針者因睹此患曰可餌豨蘞丸必愈其藥多生沃壤高三尺許節葉相對其葉當夏五月以來收每去地五寸剪刈以溫水洗泥土摘其葉及枝頭凡九蒸九曝不必大燥但取蒸為度仍熬搗為末丸如桐子大空心溫酒或米飲下二三十丸服至二千丸所患忽加不得憂慮是藥攻之力服至四千丸必得復故五千丸當夏丁壯臣依法修合與欣服果如其言鍾針又言此藥與本草所述功效相異蓋出處盛在江東彼土人呼豬為豨呼臭為蘞氣緣此藥如豬蘞氣故以為名但經蒸曝蘞氣自泯每當服後須吃飯三五匙壓之五月五日採者佳奉宣付醫院詳録張詠云知益州進豨蘞丸表臣因換龍興觀掘得一碑內說修養氣術並藥方二件依方差人訪問採覓其草頗有異金稜銀線素根紫荄對節而生蜀號火杴莖葉頗同蒼耳誰知至賤之中乃有殊常之效臣自吃至百服眼目輕明即至千服髭鬢烏黑筋力校健效驗多端臣本州有都押衙羅守一曾因中風墜馬失音不語臣與十服其病立痊又和尚智嚴年七十忽患偏風口眼喎邪時時吐涎臣與十服亦便得瘥今合一百劑差職員史元奏進馬鞭草主下部䘌瘡陶隱居云村墟陌甚多莖似細辛花紫色葉微似蓬蒿也唐本注云苗似狼牙及茺蔚抽三四穗紫花似車前穗類鞭鞘故名馬鞭都不似蓬蒿也今按陳藏器本草云馬鞭草主症癖血瘕久瘧破血作煎如糖酒服若云似馬鞭鞘亦未近之其節生紫花如馬鞭節臣禹錫等謹按蜀本云味苦微寒無毒又圖經云生濕地花白色抽三四穗以七月八月採苗日乾所在皆有之藥性論云馬鞭草亦可單用味苦有毒生搗水煎去滓成煎如飴空心酒服一匕主破腹中惡血皆下殺蟲良日華子云味辛涼無毒通月經治婦人血氣肚脹月候不勻似益母草莖圓並葉用圖經曰馬鞭草舊不載所出州土今衡山廬山江淮州郡皆有之春生苗似狼牙亦類益母而莖圓高三二尺抽三四穗子七月八月採苗葉日乾用葉甘苦微寒有小毒或云子亦通用古方多用之葛氏治卒大腹水病用馬鞭草鼠尾草各十斤水一石煮取五斗去滓再煎令稠厚以粉和丸一服二三大豆許加四五豆神良聖惠方治白癩用馬鞭草不限多少為末每服食前用荊芥薄荷湯調下一錢匕又方治婦人月水滯澀不快通結成瘕塊肋脹大欲死用馬鞭草根苗五斤銼細水五斗煎至一斗去滓別於淨器中熬成膏每食前溫酒調下半匙外臺祕要治蠼螋尿馬鞭草爛搗以封之干復更易瘥千金方食魚膾及生肉住胸膈不化必成癥瘕搗馬鞭草汁飲之一升生薑水亦得即消又方治喉痹躁腫連頰吐氣數者名馬喉痹馬鞭草一握勿見風截去兩頭搗取汁服之集驗方治男子陰腫大如升核痛人所不能治者搗馬鞭草塗之苧根寒主小兒赤丹其漬苧汁療渴陶隱居云即今績苧爾又有山苧亦相似可入用也唐本注云別録云根安胎貼熱丹毒腫有效漚苧汁主消渴也今按陳藏器本草云苧破血漬貯與産婦溫服之將苧麻與産婦枕之止血暈産後腹痛以苧安腹上則止蠶咬人毒入肉取苧汁飲之今以苧近蠶種則蠶不生也臣禹錫等謹按蜀本注云苗高丈以來南人剝其皮為布二月八月採江左山南皆有之藥性論云苧麻根使味甘平主懷妊安胎日華子云味甘滑冷無毒治心膈熱漏胎下血産前後心煩悶天行熱疾大渴大狂服金石藥人心熱罯毒箭蛇蟲咬圖經曰苧根舊不載所出州土今閩蜀江浙多有之其皮可以績布苗高七八尺葉如楮葉面青背白有短毛夏秋間著細穗青花其根黃白而輕虛二月八月採又有一種山苧亦相似謹按陸機草木疏云苧一科數十莖宿根在地中至春自生不須栽種荊楊間歲三刈官令諸園種之歲再刈便剝取其皮以竹刮其表厚處自脫得里如筋者煮之用緝今江浙閩中尚復如此孕婦胎損方所須又主白丹濃煮水俗之日三四瘥韋宙療癰疽發背初覺未成膿者以苧根葉熟搗敷上日夜數易之腫消則瘥矣聖惠方治妊娠胎動欲墜腹痛不可忍者用苧根二兩銼銀五兩酒一盞水一大盞同煎去滓不計時候分溫作二服外臺祕要備急治白丹苧根三斤小豆四升以水二三斗煮以浴三四遍浸洗妙肘後方丹者惡毒之瘡五色無常苧根三升水三半煮浴每日塗之又方治動不安取苧根如足大指者一尺㕮咀以水五升煮取三升去滓服斗門方治五種淋用苧麻根兩莖打碎以水一碗半煎取半碗頻服即通大妙梅師方治諸癰疽發背或髮乳房初起微赤不急治之即死速消方搗苧根敷之數易又方治妊娠忽下黃汁如膠或如小豆汁苧根切二升去黑皮以銀一斤水九升煎取四升每服入酒半升或一升煎藥取一升分作二服衍義曰苧根如蕁麻花如白楊而長成穗生每一朵凡數十穗青白色白頭翁味苦溫無毒有毒主溫瘧狂易音羊寒熱癥瘕積聚癭氣逐血止痛療金瘡鼻衄一名野丈人一名胡王使者一名奈何草生高山山谷及田野四月採陶隱居云處處有近根處有白茸狀似人白頭故以為名方用亦療毒痢唐本注云其葉似芍藥而大抽一莖莖頭一花紫色似木堇花實大者如雞子白毛汁余皆披下似纛頭正似白頭老翁故名焉今言近根有白茸陶似不識太常所貯蔓生者乃是女萎其白頭翁根甚療毒痢似續斷而遍今按別本注云今處處有其苗有風則靜無風而搖與赤箭獨活同也又云驗此草叢生狀如白薇而柔細稍長葉生莖頭如杏葉上有細白毛近根者有白茸舊經陶注則未述其莖葉唐注又云葉似芍藥實大如雞子白毛寸余此皆誤矣臣禹錫等謹按蜀本圖經云有細毛不滑澤花蕊黃今所在有之二月採花四月採實八月採根皆日乾藥性論云白頭翁使味甘苦有小毒止腹痛及赤毒痢治齒痛主項下瘤癧又云胡王使者味苦有毒主百骨節痛豚實為使日華子云得酒良治一切風氣及暖腰膝明目消贅子功用同上莖葉同用圖經曰白頭翁生嵩山山谷今近京州郡皆有之正月生苗作叢狀如白薇而柔細稍長葉生莖端上有細白毛而不滑澤近根有白茸正似白頭老翁故名焉根紫色深如蔓菁二月三月開紫花黃蕊五月六月結實其苗有風則靜無風而搖與赤箭獨活同七月八月採根陰乾用今俗醫用合補下藥服之大驗亦沖人外臺祕要治陰㿗白頭翁根生者不限多少搗之隨偏腫處以敷之一宿當作瘡二十日愈肘後方小兒禿取白頭翁根搗敷一宿或作瘡二十日愈衍義曰白頭翁生河南洛陽界及新安土山中性溫止腹痛暖腰膝唐本注及藥性論甚詳陶隱居失於不審宜其排叱也新安縣界兼山野中屢嘗見之正如唐本注所說至今本處山中人賣白頭翁丸言服之壽考又失古人命名之意甘蕉根大寒主癰腫結熱陶隱居云本出廣州今都下東間並有根葉無異唯子不堪食爾根搗敷熱腫甚良又有五葉莓生人籬援間作藤俗人呼為籠草取其根搗敷癰癤亦效唐本注云五葉即烏蘞草也其甘蕉根味甘寒無毒搗汁服主産後血脹悶敷腫去熱毒亦效嶺南者子大味甘冷不益人北間但有花汁無實今注此藥本出廣州然有數種其子性冷不益人故不備載按此花葉與芭蕉相似而極大子形圓長及生青熟黃南人皆食之而多動氣疾其根搗敷熱腫尤良臣禹錫等謹按蜀本圖經云俗為芭蕉多生江南葉長丈許闊二尺余莖虛軟根可生用不入方藥藥性論云甘蕉君搗敷一切癰腫上干即更上無不瘥者日華子云生芭蕉根治天行熱狂煩悶消渴患癰毒並金石發熱悶口乾人並綾汁服及梳頭長益發腫毒遊風風疹頭痛並研罯敷又云芭蕉油冷無毒治頭風熱並女人發落止煩渴及湯火瘡圖經曰甘蕉根舊不著所出州郡陶隱居云本出廣州江東並有根葉無異唯子不堪食今出二廣閩中川蜀者有花閩廣者實極美可啖他處雖多而作花者亦少近歲都下往往種之其盛皆芭蕉也蕉類亦多此云甘蕉乃是有子者葉大抵與芭蕉相類但其捲心中抽稈作花初生大萼如倒垂菡萏有十數層層皆作瓣漸大則花出瓣中極繁盛紅者如火炬謂之紅蕉白者如蠟色謂之水蕉其花大類象牙故謂之牙蕉其實亦有青黃之別品類亦多食之大甘美亦可曝乾寄遠北土得之以為珍果閩人灰理其皮令錫滑績以為布如古之錫衰焉其根極冷搗汁以敷腫毒蓐婦血妨亦可飲之又芭蕉根性亦相類俚醫以治時疾狂熱及消渴金石發動躁熱並可飲其汁又芭蕉油治暗風癇病涎作暈悶欲倒者飲之復吐便瘥極有奇效取之用竹筒插皮中如取漆法食療主黃疸子生食大寒止渴潤肺發冷病蒸熟曝之令口開春取仁食之性寒通血脈填骨髓百一方發背欲死芭蕉搗根塗上子母祕録治小兒赤遊行於上下至心即死搗芭蕉根汁煎塗之衍義曰芭蕉三年以上即有花自心中出一莖只一花全如蓮花葉亦相似但其色微黃緑從下脫葉花心但向上生常如蓮樣然未嘗見其花心剖而視之亦無蕊悉是葉但花頭常下垂每一朵自中夏開直到中秋後方盡凡三葉開則三葉脫落北地惜其種人故少用縷其苗為布取汁婦人塗發令黑余說如經蘆根味甘寒主消渴客熱止小便利陶隱居云當掘取甘辛者其露出及浮水中者並不堪用也唐本注云此草根療嘔逆不下食胃中熱傷寒患者彌良其花名蓬蕽音農水煮汁服主霍亂大善用有驗也臣禹錫等謹按藥性論云蘆根使無毒能解大熱開胃治噎噦不止日華子云治寒熱時疾煩悶妊孕人心熱並瀉痢人渴圖經曰蘆根舊不載所出州土今在處有之生下濕陂澤中其狀都似竹而葉抱莖生無枝花白作穗若茅花根亦若竹根而節疏二月八月採日乾用之當極取水底甘辛者其露出及浮水中者並不堪用謹按爾雅謂蘆根為葭華郭璞云蘆葦也葦即蘆之成者謂蒹為薕與廉同蒹似萑音桓而細長高數尺江東人呼為薕藡與荻同者謂菼他敢切為薍五患切薍似葦而小中實江東呼為烏蓲音丘者或謂之荻荻至秋堅成即謂之萑其華皆名苕徒雕切其萌筍皆名䀵音綣若然所謂蘆葦通一物也所謂薕今作蒹者是也所謂菼人以當薪爨者是也今人罕能別蒹菼與蘆葦又北人以葦與蘆為二物水旁下濕所生者皆名葦其細不及指人家池圃所植者為蘆其稈差大深碧色者謂之碧蘆亦難得然則本草所用蘆今北地謂葦者皆可通用也古方多單用葛洪療嘔噦切根水煮頓服一升必效方以童子小便煮服不過三升瘥其蓬茸主卒得霍亂氣息危急者取一把煮濃汁頓服二升瘥兼主魚蟹中毒服之尤佳其筍味小苦堪食法如竹筍但極冷耳唐本余生下濕地莖葉似竹花若荻花二月八月採根日乾用之雷公云凡使須要逆水蘆其根逆水生並黃泡肥厚者味甘採得後去節須並上赤黃了細銼用聖惠方治食馬肉中毒癢痛蘆根五兩切以水八升煮取二升分為三服千金方治乾嘔噦若手足厥冷蘆根三斤濃煮汁飲之肘後方食鱸魚肝鯸鮧魚中毒銼蘆根煮汁一二升飲之梅師方食狗肉不消心下堅或䐜脹口乾忽發熱妄語煮蘆根飲之金匱玉函方治五噎心膈氣滯煩悶吐逆不下食蘆根五兩銼以水三大盞煮取二盞去滓不計時溫服鬼臼味辛溫微溫有毒主殺蠱毒鬼疰精物辟惡氣不祥逐邪解百毒療咳嗽喉結風邪煩惑失魄妄見去目中膚翳殺大毒不入湯一名爵犀一名馬目毒公一名九臼一名天臼一名解毒生九真山谷及冤句二月八月採根畏垣衣陶隱居曰鬼臼如射干白而味甘溫有毒主風邪鬼疰蠱毒九臼相連有毛者良一名九臼生山谷八月採陰乾又似鉤吻今馬目毒公如黃精根臼處似馬眼而柔潤鬼臼似射干術輩有兩種出錢塘近道者味甘上有叢毛最勝出會稽吳興者乃大味苦無叢毛不如略乃相似而乖異毒公今方家多用鬼臼少用毒公不知此郍復頓樂乖越也唐本注云此藥生深山岩石之陰葉如萆麻重樓輩生一莖莖端一葉亦有兩歧者年長一莖莖枯為一臼假令生來二十年則有二十臼豈唯九臼耶根肉皮須並似射干今俗用皆是射干及江南別送一物非真者今荊州當陽縣硤州遠安縣襄州荊山縣山中並有之極難得也臣禹錫等謹按蜀本圖經云花生莖間赤色今出硤州襄州深山二月八月採根日乾用之藥性論云鬼臼使味苦能主尸疰殗殜勞疾傳尸瘦疾主辟邪氣逐鬼圖經曰鬼臼生九真山谷及冤句今江寧府滁舒商齊杭襄峽州荊門軍亦有之多生深山岩石之陰葉似萆麻重樓輩初生一莖莖端一葉亦有兩歧者年長一莖莖枯為一臼二十年則二十臼也花生莖間赤色三月開後結實根肉皮須並似射干俗用皆是射干當細別之七月八月採根曝乾用古方治五尸鬼疰百毒惡氣方用之一說鬼臼生深山陰地葉六出或五出如雁掌莖端一葉如傘蓋旦時東向及暮則西傾蓋隨日出沒也花紅紫如荔枝正在葉下常為葉所蔽未常見日一年生一葉既枯則為一臼及八九年則八九臼矣然一年一臼生而一臼腐蓋陳新相易也故俗又名曰害母草如芋魁烏頭輩亦然新苗生則舊苗死前年之魁腐矣而本草注謂全似射干今射干體狀雖相似然臼形淺溥大異鬼臼鬼臼如八九天南星側比相疊而色理正如射干要者當使人求苗採之市中不復有也角蒿味辛苦平有小毒主甘濕䘌諸惡瘡有蟲者唐本注云葉似白蒿花如瞿麥紅赤可愛子似王不留行黑色作角七月八月採唐本先附臣禹錫等謹按蜀本圖經云葉似蛇床青蒿等子角似蔓菁實黑細秋熟所在皆有之陳藏器云𦾰蒿味辛溫無毒主破血下氣煮食之似小薊生高岡宿根先於白草一名莪蒿爾雅云莪蘿注𦾰蒿也釋曰詩小雅云菁菁者莪陸機云莪蒿也一名蘿蒿生澤田漸洳處葉似邪蒿而細科生三月中莖可食又可蒸香美味頗似蔞蒿是也雷公云凡使勿用紅蒿並邪蒿二味真似角蒿只是上香角短採得並於槐砧上細銼用之外臺祕要凡齒齦宣露多是疳角蒿取灰夜塗齦上使慎油膩沙糖干棗切忌之千金方治口中瘡久不瘥入胸中並生瘡角蒿灰塗之一宿動口中若有汁吐之宮氣方治小兒口瘡角蒿灰貼瘡妙衍義曰角蒿莖葉如青蒿開淡紅紫花花大約徑三四分花罷結角子長二寸許微彎苗與角治口齒絶勝馬兜鈴味苦寒無毒主肺熱咳嗽痰結喘促血痔瘻瘡生關中藤繞樹而生子狀如鈴作四五瓣今附臣禹錫等謹按藥性論云馬兜鈴平能主肺氣上急坐息不得主咳逆連連不可日華子云治痔瘻瘡以藥於瓶中燒熏病處入藥炙用是土青木香獨行根子越州七八月採圖經曰馬兜鈴生關中今河東河北江淮夔浙州郡亦有之春生苗如藤蔓葉如山芋葉六月開黃紫花頗類枸杞花七月結實棗許大如鈴作四五瓣其根名雲南根似木香小指大赤黃色亦名土青木香七月八月採實曝乾主肺病三月採根治氣下膈止刺痛雷公云凡使採得後去葉並蔓了用生綃袋盛於東屋角畔懸令乾了劈作片取向裡子去隔膜並令盡用子勿令去革膜不盡用之並皮聖惠方治五種蠱毒用兜鈴根三兩為末分為三貼以水一盞煎五分去滓頻服當吐蠱出未快再服以快為度又方草蠱術正因方及嶺南人若行此毒人人咽刺痛欲死者用兜鈴苗一兩為末以溫水調下一錢匕即消化蠱出效外臺祕要崔氏蛇蠱食飲中得之咽中如有物咽不下吐不出悶心熱服兜鈴即吐出又服麝香一錢匕即吐蠱毒簡要濟衆治肺氣喘嗽兜鈴二兩只用裡面子去卻殼酥半兩入碗內拌和勻慢火炒乾甘草一兩炙二味為末每服一錢水一盞煎六分溫呷或以藥末含咽津亦得衍義曰馬兜鈴蔓生附木而上葉脫時鈴尚垂之其狀如馬項鈴故得名然熟時則自折坼間有子全者採得時須八九月間治肺氣喘急仙茅味辛溫有毒主心腹冷氣不能食腰腳風冷攣痹不能行丈夫虛勞老人失溺無子益陽道久服通神強記助筋骨益肌膚長精神明目一名獨茅根一名茅瓜子一名婆羅門參仙茅傳云十斤乳石不及一斤仙茅表其功力爾生西域又大庾嶺亦云忌鐵及牛乳二月八月採根今附臣禹錫等謹按日華子云治一切風氣延年益壽補五勞七傷開胃下氣益房事彭祖單服法以米泔浸去赤汁出毒後無妨損圖經曰仙茅生西域及大庾嶺今蜀川江湖兩浙諸州亦有之葉青如茅而軟復稍闊面有縱理又似棕櫚至冬盡枯春初乃生三月有花如梔子黃不結實其根獨莖而直旁有短細根相附肉黃白外皮稍粗褐色二月八月採根曝乾用衡山出者花碧五月結黑子謹按續傳信方敘仙茅云主五勞七傷明目益筋力宣而復補本西域道人所傳開元元年婆羅門僧進此藥明皇服之有效當時禁方不傳天寶之亂方書流散上都不空三藏始得此方傳與李勉司徒路嗣恭尚書齊杭給事張建封僕射服之皆得力路公久服金石無效及得此藥其益百倍齊給事守縉雲日少氣力風繼作服之遂愈八九月時採得竹刀子刮去黑皮切如豆粒米泔浸兩宿陰乾搗篩熟蜜丸如梧子每旦空肚酒飲任使下二十丸禁食牛乳及黑牛肉大減藥力也續傳信方僞唐筠州刺史王顏所著皆因國書編録其方當時盛行故今江南但呼此藥為婆羅門參海藥云生西域粗細有筋或如筆管有節紋理其黃色多涎梵云呼為阿輸乾陀味甘微溫有小毒主風補暖腰腳清安五臟強筋骨消食久服輕身益顏色自武城來蜀中諸州皆有葉似茅故名曰仙茅味辛平宣而復補無大毒有小熱有小毒主丈夫七傷明耳目益筋力填骨髓益陽不倦用時竹刀切糯米泔浸雷公云凡採得後用清水洗令淨刮上皮於槐砧上用銅刀切豆許大卻用生稀布袋盛於烏豆水中浸一宿取出用酒濕拌了蒸從巳至亥取出曝乾勿犯鐵斑人須鬢羊桃味苦寒有毒主熛熱身暴赤色風水積聚惡瘍除小兒熱去五臟五水大腹利小便益氣可作浴湯一名鬼桃一名羊腸一名萇楚一名御弋一名銚音姚弋生山林川穀及生田野二月採陰乾陶隱居云山野多有甚似家桃又非山桃子小細苦不堪啖花甚赤詩云隰有萇楚者即此也方藥亦不復用唐本注云此物多生溝渠隍塹之間人取煮以洗風癢及諸瘡腫極效劍南人名細子根也臣禹錫等謹按蜀本圖經云生平澤中葉花似桃子細如棗核苗長弱即蔓生不能為樹今處處有多生溪澗今人呼為細子根似牡丹療腫爾雅云萇楚銚弋郭云今羊桃也釋云葉似桃花白子如小麥亦似桃陸機云葉長而狹華紫赤色其枝莖弱過一尺引蔓於草上今人以為汲灌重而善沒不如楊柳也近下根刀切其皮著熱灰中脫之可韜筆管也陳藏器云味甘無毒主風熱羸老浸酒服之生蜀川川穀中草高一尺葉長小亦云羊桃根也肘後方治傷寒毒攻手足痛煮羊桃汁漬之雜鹽豉尤好鼠尾草味苦微寒無毒主鼠瘻寒熱下痢膿血不止白花者主白下赤花者主赤下一名葝音勍一名陵翹生平澤中四月採葉七月採花陰乾陶隱居云田野甚多人採作滋染皂又用療下瘻當濃煮取汁今可丸服之今人亦用作飲臣禹錫等謹按蜀本圖經云所在下濕地有之葉如蒿莖端夏生四五穗穗若車前有赤白二種花七月採苗日乾用之爾雅云葝鼠尾釋曰可以染皂草也一名鼠尾陳藏器云鼠尾草平主諸痢煮汁服亦末服紫花莖葉堪染皂一名烏草又名水青也圖經曰鼠尾草舊不載所出州土云生平澤中今所在有之唯黔中人採為藥苗如蒿夏生莖端作四五穗穗若車前花有赤白二色爾雅謂葝鼠尾云可以染皂草也四月採葉七月採花陰乾古治痢多用之姚氏云濃煮汁如薄飴飲五合日三赤下用赤花白下用白花瘥聖惠方治久赤白痢不瘥羸瘦用鼠尾草搗為末每服一錢不計時候以粥飲調下女青味辛平有毒主蠱毒逐邪惡氣殺鬼溫瘧闢不祥一名雀瓢蛇銜根也生朱崖八月採陰乾陶隱居云若是蛇銜根不應獨生朱崖俗用是草葉別是一物未詳孰是術云帶此屑一兩則疫癘不犯彌宜識真者唐本注云此草即雀瓢也葉似蘿摩兩葉相對子似瓢形大如棗許故名雀瓢根似白薇生平澤莖葉並臭其蛇銜根都非其類又別録云葉嫩時似蘿摩圓端大莖實黑莖葉汁黃白亦與前說相似若是蛇銜根何得苗生益州根在朱崖相去萬里余也別録云雀瓢白汁主蟲蛇毒即女青苗汁也臣禹錫等謹按藥性論云女青使味苦無毒能治溫瘧寒熱蛇銜為使圖經文具蛇銜條下肘後方闢瘟病正月上寅日搗女青末三角縫囊盛系前帳中大吉子母祕録治小兒卒腹皮青黑赤不能喘息即急用此方並治吐痢卒死用女青末納口中酒服亦治大人紫靈南君南嶽夫人內傳治卒死搗女青屑一錢安喉中以水或酒送下立活也胡麻鞋底水煮汁服之解紫石英發毒又主霍亂吐下不止及解食牛馬肉毒腹脹吐痢不止者今按陳藏器本草云故麻鞋底主消渴煮汁服之鞋綱繩如棗大婦人內衣有血者手大鉤頭棘針二七枚三物並燒作灰以豬脂調敷狐刺瘡出蟲唐本先附臣禹錫等謹按陳藏器云破草鞋和人亂髮燒作灰醋和敷小兒熱毒遊腫陳藏器云取麻鞋尖頭二七為灰歲朝井華水服之又主遺溺又故麻鞋底燒令赤投酒煮粟谷汁中服之主霍亂轉筋外臺祕要近效尿床取麻鞋綱帶及鼻根等唯不用底須七量以水七升煮取二升分再服之又方治蜈蚣螫人麻鞋履底炙以揩之即瘥千金方肛脫出以炙麻履底令人頻按永瘥又故麻鞋底鱉頭各一枚燒鱉頭搗為末敷肛門將履底按入即不出也經驗方治鼻塞燒麻鞋灰吹鼻中立通一名千里馬麻鞋名也廣利方治鼻衄血鞋𩍥作灰吹鼻孔中立效劉寄奴草味苦溫主破血下脹多服令人痢生江南唐本注云莖似艾蒿長三四尺葉似蘭草尖長子似稗而細一莖上有數穗葉互生今按別本注云昔人將此草療金瘡止血為要藥産後余疾下血止痛極效唐本先附臣禹錫等謹按蜀本圖經云葉似菊高四五尺花白實黃白作穗蒿之類也今出越州夏收苗日乾之日華子云劉寄奴無毒治心腹痛下氣水脹血氣通婦人經脈癥結止霍亂水瀉又名劉寄奴六七八月採圖經曰劉寄奴草生江南今河中府孟州漢中亦有之春生苗莖似艾蒿上有四稜高三二尺以來葉青似柳四月開碎小黃白花形如瓦松七月結實似黍而細一莖上有數穗互生根淡紫色似萵苣六月七月採苗花子通用也雷公云採得後去莖葉只用實凡使先以布拭上薄殼皮令淨拌酒蒸從巳至申出曝乾用之經驗方治湯火瘡至妙劉寄奴搗末先以糯米漿雞翎掃湯著處後摻藥末在上並不痛亦無痕大凡湯著處先用鹽末摻之護肉不壞然後藥末敷之骨碎補味苦溫無毒主破血止血補傷折生江南根著樹石上有毛葉如庵䕡江西人呼為胡孫姜一名石庵䕡一名骨碎布今附臣禹錫等謹按藥性論云骨碎補使能主骨中毒氣風血疼痛五勞六極口手不收上熱下冷悉能主之陳藏器云骨碎補似石葦而一根余葉生於木嶺南虔吉亦有本名猴姜開元皇帝以其主傷折補骨碎故作此名耳日華子云猴姜平治惡瘡蝕爛肉殺蟲是樹上寄生草苗似姜細長圖經曰骨碎補生江南今淮浙陝西夔路州郡亦有之根生大木或石上多在背陰處引根成條上有黃毛及短葉附之又有大葉成枝面青緑色有黃點背青白色有赤紫點春生葉至冬干黃無花實唯根入藥採無時削去毛用之本名胡孫姜唐明皇以其主折傷有奇效故作此名蜀人治閃折筋骨傷損取根搗篩煮黃米粥和之裹傷處良又用治耳聾削作細條火炮乘熱塞耳亦入婦人血氣藥用又名石毛薑雷公云凡使採得後先用銅刀刮去上黃赤毛盡便細切用蜜拌令潤架柳甑蒸一日後出曝乾用又乾寧記云去毛細切後用生蜜拌蒸從巳至亥准前曝乾搗末用炮豬腎空心吃治耳鳴亦能止諸雜痛靈苑方治虛氣攻牙齒痛血出牙齦癢痛骨碎補二兩細銼炒令黑色杵末依常盥漱後揩齒根下良久吐之臨臥用後睡點之無妨衍義曰骨碎補苗不似姜姜苗如葦梢此物苗每一大葉兩邊小葉槎牙兩相對葉長有尖瓣余如經連翹味苦平無毒主寒熱鼠瘻瘰癧癰腫惡瘡癭瘤結熱蠱毒去白蟲一名異翹一名蘭華一名折根一名軹一名三廉生泰山山谷八月採陰乾陶隱居云處處有今用莖連花實也唐本注云此物有兩種大翹小翹大翹葉狹長如水蘇花黃可愛生下濕地著子似椿實之未開者作房翹出衆草其小翹生岡原之上葉花實皆似大翹而小細山南人並用之今京下唯用大翹子不用莖花也臣禹錫等謹按蜀本云連翹微寒圖經云苗高三四尺今所在下濕地有採實日乾用之爾雅云連異翹釋曰連一名異翹郭云一名連苕又名連草藥性論云連翹使一名旱蓮子主通利五淋小便不通除心家客熱日華子云通小腸排膿治瘡癤止痛通月經所在有獨莖梢開三四黃花結子內有房瓣子五月六月採圖經曰連翹生泰山山谷今近京及河中江寧府澤潤淄兗鼎嶽利州南康軍皆有之有大翹小翹二種生下濕地或山岡上葉青黃而狹長如榆葉水蘇輩莖赤色高三四尺許花黃可愛秋結實似蓮作房翹出衆草以此得名根黃如蒿根八月採房陰乾其小翹生岡原之上葉花實皆似大翹而細南方生者葉狹而小莖短才高一二尺花亦黃實房黃黑內含黑子如粟粒亦名旱蓮草南人用花葉中品鱧腸亦名旱蓮人或以此當旱蓮非也爾雅謂之連一名異翹一名連苕又名連草今南中醫家說云連翹蓋有兩種一種似椿實之未開者殼小堅而外完無跗萼剖之則中解氣甚芬馥其實才干振之皆落不著莖也一種乃如菡萏殼柔處有跗萼抱之無解脈亦無香氣干之雖久著莖不脫此甚相異也今如菡萏者江南下澤間極多如椿實者乃自蜀中來用之亦勝江南者據本草言則蜀中來者為勝然未見其莖葉如何也集驗方洗痔以連翹煎湯洗訖刀上飛緑礬入麝香貼之衍義曰連翹亦不至翹出衆草下濕地亦無泰山山谷間甚多今只用其子折之其間片片相比如翹應以此得名爾治心經客熱最勝尤宜小兒續隨子味辛溫有毒主婦人血結月閉癥瘕痃癖瘀血蠱毒鬼疰心腹痛冷氣脹滿利大小腸除痰飲積聚下惡滯物莖中白汁剝人面皮去䵟𪒟生蜀郡及處處有之苗如大戟一名拒冬一名千金子今附臣禹錫等謹按蜀本云積聚痰飲不下食嘔逆及腹內諸疾研碎酒服之不過三顆當下惡物日華子云宣一切宿滯治肺氣水氣敷一切惡瘡疥癬單方日服十粒瀉多以酸漿水並薄醋粥吃即止一名菩薩豆千兩金葉汁敷白癜面皯圖經曰續隨子生蜀郡及處處有之今南中多有北土差少苗如大戟初生一莖莖端生葉葉中復出數莖相續花亦類大戟自葉中抽稈而生實青有殼人家園亭中多種以為飾秋種冬長春秀夏實故又名拒冬實入藥採無時下水最速然有毒損人不可過多崔元亮海上方治蛇咬腫毒悶欲死用重臺六分續隨子七顆去皮二物搗篩為散酒服方寸匕兼唾和少許敷咬處立瘥莖中白汁剝人面去䵟𪒟甚效斗門方治水氣用聯步一兩去殼研以紙裹用物壓出油重研末分作七服每治一人只可一服丈夫生餅子酒下婦人荊芥湯下凡五更服之至晚自止後以厚朴湯補之頻吃益善仍不用吃鹽醋一百日瘥聯步續隨子是也敗蒲席平主筋溢惡瘡陶隱居云燒之蒲席唯船家用狀如蒲帆爾人家所用席皆是莞音官草而薦多是蒲方家有用也唐本注云席薦一也皆人臥之以得人氣為佳也青齊間人謂蒲薦為蒲席亦曰蒲蓋音合謂藁作者為薦爾山南江左機上織者為席席下重厚者為薦如經所說當以人臥久者為佳不論薦席也臣禹錫等謹按藥性論云敗蒲席亦可單用主破血從高墜下損瘀在腹刺痛此蒲合臥破敗者良取以蒲黃赤芍藥當歸大黃朴硝煎服血當下陳藏器云編薦索主霍亂轉筋燒作黑灰服二指撮酒服佳聖惠方治霍亂轉筋垂死敗蒲席一握細切漿水一盞煮汁溫溫頓服外臺祕要治墜下瘀血在腹肚取蒲灰二錢酒服千金方五色丹俗名遊腫若犯多致死不可輕之蒲席燒灰和雞子白塗之勝金方治婦人血奔以舊敗蒲席燒灰酒調下二錢匕山豆根味甘寒無毒主解諸藥毒止痛消瘡腫毒人及馬急黃髮熱咳嗽殺小蟲生劍南山谷蔓如豆今附圖經曰山豆根生劍南山谷今廣西亦有以忠萬州者佳苗蔓如豆根以此為名葉青經冬不凋八月採根用今人寸截含以解咽喉腫痛極妙廣南者如小槐高尺余石鼠食其根故嶺南人捕石鼠破取其腸胃曝乾解毒攻熱甚效經驗方備急治一切疾患山豆根方右用山大豆根不拘多少依下項治療一名解毒二名黃結三名中藥患蠱毒密遣人和水研已禁聲服少許不止再服患禿瘡以水研敷瘡上患喉痛含一片細咽津患五種痔水研服患齒痛含一片於痛處患麩豆等瘡水研服少許患頭風搗末油調塗之患赤白痢搗末蜜丸空心煎水下二十丸三服自止患腹脹滿喘悶搗末少許煎水調一盞瘥患瘡癬搗末臘月豬脂調塗之患頭上白屑搗末油浸塗如是孩兒即乳汁調半錢患中宿冷蟲寸白蟲每朝空心熱酒調三錢其蟲自出患五般急黃空心以水調二錢患盞氣酒下二錢患霍亂橘皮湯下三錢患熱腫水研濃汁塗干即更塗女人患血氣腹腫以末三錢熱酒不空心服之卒患腹痛水研半盞入口瘥蜘蛛咬唾和塗之狗咬蚍蜉瘡蛇咬並水研敷之三白草味甘辛寒有小毒主水腫腳氣利大小便消痰破癖除積聚消疔腫生池澤畔唐本注云葉如水葒亦似蕺又似菝葜葉上有三黑點高尺許根如芹根黃白色而粗大今按陳藏器本草云三白草搗絞汁服令人吐逆除胸膈熱疾亦主瘧及小兒痞滿按此草初生無白入夏葉端半白如粉農人候之蒔田三葉白草便秀故謂之三白若云三黑點古人祕之據此即為未識妄為之注爾其葉如薯蕷亦不似水葒唐本先附臣禹錫等謹按蜀本圖經云出襄州二月八月採根用之䕡音閭茹音如味辛酸寒微寒有小毒主蝕惡肉敗瘡死肌殺疥蟲排膿惡血除大風熱氣善忘不樂去熱痹破癥瘕除息肉一名屈據一名離婁生代郡川穀五月採根陰乾黑頭者良甘草為之使惡麥門冬陶隱居云今第一齣高麗色黃初斷時汁出凝黑如漆故云漆頭次出近道名草䕡茹色白皆燒鐵爍頭令黑以當漆頭非真也葉似大戟花黃二月便生根亦療瘡臣禹錫等謹按蜀本圖經云葉有汁根如蘿蔔皮黃肉白所在有之圖經曰䕡茹生代郡川穀今河陽淄齊州亦有之二月生苗葉似大戟而花黃色根如蘿蔔皮赤黃肉白初斷時汁出凝黑如漆三月開淺紅花亦淡黃色不著子陶隱居謂出高麗者此近之也四月五月採根陰乾漆頭者良又有一種草䕡茹色白採者燒鐵爍頭令黑以當漆頭非真也然古方有用兩種者姚僧垣治癰疽生臭惡肉以白䕡茹散敷之看肉盡便停但敷諸膏藥若不生肉又敷黃耆散惡肉仍不盡者可以漆頭赤皮䕡茹為散用半錢匕和白䕡茹三錢匕合敷之瘥是赤白皆可用也聖惠方治緩疽用䕡茹一兩搗為散不計時候溫水調下二錢匕傷寒類要治傷寒毒攻咽喉腫真䕡茹爪甲大納口中嚼汁咽當微覺為佳素問注云䕡茹主散惡血衍義曰䕡茹治疥馬疥尤善服食方用者至少蛇莓音每汁大寒主胸腹大熱不止陶隱居云園野亦多子赤色極似莓而不堪啖人亦無服此為藥者療溪毒射工傷寒大熱甚良臣禹錫等謹按蜀本圖經云生下濕處莖端三葉花黃子赤若覆盆子撮似敗醬二月八月採根四月五月收子所在有之日華子云味甘酸冷有毒通月經㶸瘡腫敷蛇蟲咬食療云主胸胃熱氣有蛇殘不得食主孩子口噤以汁灌口中死亦再活肘後方治毒攻手足腫痛蛇莓汁服三合日三水漬烏梅令濃納崖蜜飲之傷寒類要治天行熱甚口中生瘡飲蛇莓自然汁搗絞一斗煎取五升稍稍飲之衍義曰蛇莓今田野道旁處處有之附地生葉如覆盆子但光潔而小微有皺紋花黃比蒺藜花差大春末夏初結紅子如荔枝色余如經金星草味苦寒無毒主癰疽瘡毒大解硫黃及丹石毒發背癰腫結核用葉和根酒煎服之先服石藥悉下又可作末冷水服及塗發背瘡腫上殊效根碎之浸油塗頭大生毛髮西南州郡多有之而以戎州者為上喜生陰中石上淨處及竹箐中不見日處或大木下或古屋上此草唯單生一葉色青長一二尺至冬大寒葉背生黃星點子兩行相對如金色因得金星之名其根盤屈如竹根而細折之有筋如豬馬鬃陵冬不凋無花實五月和根採之風乾用新定圖經曰金星草生關陝川蜀及潭婺諸州皆有之又名金釧草味苦性寒無毒葉青多生背陰石上淨處或竹箐中少日色處或生大木下及背陰多年瓦屋上初出深緑色葉長一二尺至深冬背上生黃星點子兩兩相對色如金因以為名無花實陵冬葉不凋其根盤屈如竹根而細折之有筋如豬鬃五月和根採之風乾解硫黃及石毒治發背癰腫結核用葉半斤和根銼以酒五升銀器中煎取二升五更初頓服丹石毒悉下又搗末冷水服方寸匕及塗發背瘡上亦效彼人用之往往皆驗根又主生毛髮捶碎浸油塗頭良南人多用此草末以水一升煎取半更入酒半升再煎數沸溫服取下毒黑汁未下再服但是瘡毒皆可服之然性至冷服後下利須補治乃平復老年不可輒服經驗方治五毒發背金星草和根淨洗慢火焙乾稱四兩入生甘草一錢搗末分作四服每服用酒一升以來煎三二沸後更以冷酒三二升相和入瓶器內封卻時時飲服忌生冷油膩毒物衍義曰金星草丹石毒發於背及一切癰腫每以根葉一分用酒一大盞煎汁服不唯下所服石藥兼毒去瘡愈如不欲酒將末一二錢新汲水調服以知為度葎草味甘苦寒無毒主五淋利小便止水痢除瘧虛熱渴煮汁及生汁服之生故墟道傍唐本注云葉似萆麻而小薄蔓生有細刺俗名葛葎蔓古方亦時用之今按別本注又云來莓草四月五月採莖葉曝乾唐本先附臣禹錫等謹按蜀本圖經云蔓生葉似大麻花黃白子若大麻子俗名葛勒蔓夏採葉用所在墟野處多有之圖經曰葎草舊不著所出州土云生故墟道旁今處處有之葉如萆麻而小薄蔓生有細刺花黃白子亦類麻子四月五月採莖葉曝乾用俗名葛葎蔓又名葛勒蔓唐韋宙獨行方主癩遍體皆瘡者用葎草一擔以水二石煮取一石以漬瘡不過三作乃愈而本經亦闕主瘡功用又韋丹主膏淋搗生汁三升酢二合相和空腹頓服當溺如白汁又主久痢成疳取干蔓搗篩量多少管吹穀道中不過三四瘥已若神衍義曰葎草葛勒蔓也治傷寒汗後虛熱銼研取生汁飲一合愈鶴蝨味苦平有小毒主蛔蟯蟲用之為散以肥肉臛汁服方寸匕亦丸散中用生西戎唐本注云子似蓬蒿子而細合葉莖用之胡名鵠蝨今按別本注云心痛以淡醋和半匕服之立瘥出波斯者為勝今上黨亦有力勢薄于波斯者唐本先附臣禹錫等謹按日華子云涼無毒殺五臟蟲止瘧及敷惡瘡上圖經曰鶴蝨生西戒今江淮衡湘間皆有之春生苗葉皺似紫蘇大而尖長不光莖高二尺許七月生黃白花似菊八月結實子極尖細干即黃黑色採無時南人呼其葉為火杴謹按豨葵音杴即火杴也雖花實相類而別是一物不可雜用也殺蟲方中此為最要古今録驗療蛔咬心痛取鶴蝨十兩搗篩蜜和丸如梧子以蜜湯空腹吞四十丸日增至五十丸慎酒肉韋云患心痛十年不瘥於雜方內見合服便愈李絳兵部手集方治小兒蛔蟲齧心腹痛亦單用鶴蝨細研以肥豬肉汁下五歲一服二分蟲出便止余以意增減外臺祕要延年治蛔蟲吐水心痛鶴蝨三兩為末蜜丸平旦漿水服二十丸千金方治蟲咬心痛鶴蝨一兩為末空心溫醋下蟲當出沈存中筆談地菘即天名精鶴蝨是實地菘味鹹主金瘡止血解惡蟲蛇螫毒挪以敷之生人家及路旁陰處所在有之高二三寸葉似菘葉而小今附臣禹錫等謹按本經草部上品天名精唐注云南人名為地菘又尋所主功狀與此正同及據陳藏器解紛合陶蘇二說亦以天名精為地菘則今此條不當重出雖陳藏器拾遺別立地菘條此乃藏器自成一書務多條目爾解紛拾遺亦自差互後人即不當仍其謬而重有新附也今補注立例無所刊削故且存而注之陳藏器似天門冬苗出江南外臺祕要治惡瘡搗地菘汁服之日三四服瘥聖惠方治風毒瘰癧赤腫地菘搗敷瘰癧上干易之燕麥味甘平無毒主女人産不出煮汁飲之一名蘥一名燕麥生故墟野林下葉似麥今注苗似小麥而弱實似穬麥而細生嶺南在處亦有唐本先附外臺祕要治齒䘌並蟲積年不瘥從少至老方雀麥一名牡栳草俗名牛星草一味苦瓠葉三十枚淨洗取草剪長二寸廣一寸厚五分以瓠葉作五裹子以三年酢漬之至日中以兩裹火中炮令熱納口中齒外邊尉之冷更易取銅器貯水水中解裹洗之即有蟲長三分老者黃色少者白色多即三二十枚少即一二十枚此一方甚妙子母祕録妊娠胎死腹中若胞衣不下上搶心雀麥一把水五升煮二升汁服衍義曰雀麥今謂之燕麥其苗與麥同但穗細長而疏唐劉夢得所謂菟葵燕麥動搖春風者也甑帶灰主腹脹痛脫肛煮汁服主胃反小便失禁不通及淋中惡尸疰金瘡刃不出今按別本注云江南以蒲為甑帶取久用者燒灰入藥味辛溫無毒甑帶久被蒸氣故能散氣通氣以灰封金瘡止血止痛出刃唐本先附臣禹錫等謹按蜀本云取用久敗爛者也外臺祕要治眯目水服灰一錢匕又方小兒大便失血甑帶灰塗乳上與飲之瘥肘後方治草芒沙石類不出方甑帶灰調飲之即出子母祕録治小兒夜啼甑帶懸戶上又方治小兒臍風瘡久不瘥燒甑帶灰敷上赤地利味苦平無毒主赤白冷熱諸痢斷血破血帶下赤白生肌肉所在山谷有之唐本注云葉似蘿摩蔓生根皮赤黑肉黃赤二月八月採根日乾唐本先附臣禹錫等謹按蜀本圖經云蔓生繞草木上花子皆青色根若菝葜皮紫赤色也圖經曰赤地利舊不載所出州土云所在山谷有之今唯出華山春夏生苗作蔓繞草木上莖赤葉青似蕎麥葉七月開白花亦如蕎麥根若菝葜皮黑肉黃赤八月內採根曬乾用亦名山蕎麥此下又有赤車使者條云似香葇蘭香葉莖赤根紫赤色生溪谷之陰出襄州八月九月採根日乾古方治大風濕痹等赤車使者酒主之今人稀用亦鮮有識之者因附見於此雷公云凡採得後細銼用藍葉並根並銼唯赤地利細銼了用生絹袋盛同蒸一伏時去藍曝乾用聖惠方治火燒瘡滅瘢方用赤地利二兩搗末生油調塗之外臺祕要治小兒面及身上生瘡如火燒赤地利搗末粉之良烏韭味甘寒無毒主皮膚往來寒熱利小腸膀胱氣療黃疸金瘡內塞補中益氣好顏色生山谷石上陶隱居云垣衣亦名烏韭而為療異非是此種類也唐本注云此物即石衣也亦曰石苔又名石發生岩石陰不見日處與卷柏相類也今按陳藏器本草云烏韭燒灰沐發令黑生大石及木間陰處青翠茸茸者似苔而非苔也臣禹錫等謹按日華子云石衣澀冷有毒垣衣為使燒灰沐頭長髮此即是陰濕處山石上苔長者可四五寸又名烏韭蘇雲石苔非也白附子主心痛血痹面上百病行藥勢生蜀郡三月採陶隱居云此物乃言出芮芮久絶俗無復真者今人乃作之獻用唐本注云此物本出高麗今出涼州已西形似天雄本經出蜀郡今不復有涼州者生沙中獨莖似鼠尾草葉生穗間臣禹錫等謹按蜀本云味甘辛溫又圖經云葉細周匝生於穗間出砂磧下濕地日華子云無毒主中風失音一切冷風氣面皯瘢疵入藥炮用新羅出者佳海藥云按南州記云生東海又新羅國苗與附子相似大溫有小毒主治疥癬風瘡頭面痕陰囊下濕腿無力諸風冷氣入面脂皆好也紫葛味甘苦寒無毒主癰腫惡瘡取根皮搗為末醋和封之生山谷中不入方用唐本注云苗似葡萄根紫色大者徑二三寸苗長丈許唐本先附臣禹錫等謹按蜀本圖經云蔓生葉似櫻薁根皮肉俱紫色所在山谷有之今出雍州三月八月採根皮曬乾日華子云味苦滑冷主癱緩攣急並熱毒風通小腸紫葛有二種此即是藤生者圖經曰紫葛舊不載所出州土云生山谷今唯江寧府台州有之春生冬枯似葡萄而紫色長丈許大者徑二三寸葉似櫻薁根皮俱紫色三月八月採根皮曬乾經效方治産後血氣衝心煩渴紫葛三兩以水二升煎取一升去滓呷之又方治金瘡生肌破血補損用紫葛二兩細銼以順流水三大盞煎取一盞半去滓食前分溫三服酒煎亦妙獨行根味辛苦冷有毒主鬼疰積聚諸毒熱腫蛇毒水摩為泥封之日三四立瘥水煮一二兩取汁服吐蠱毒唐本注云蔓生葉似蘿摩其子如桃李枯則頭四開懸草木上其根扁長尺許作葛根氣亦似漢防己生古堤城旁山南名為土青木香療疔腫大效一名兜零根今按別本注云不可多服吐痢不止唐本先附臣禹錫等謹按蜀本圖經云蔓生葉似蘿摩而圓且澀花青白色子名馬兜零十月以後頭開四系若囊中實似榆莢二月八月採根曬乾所在平澤草木叢林中有日華子云無毒治血氣衍義曰獨行根苗蔓生子則馬兜鈴也根扁其嗅稍似葛根細搗水調敷疔腫後有馬兜鈴條豬膏莓音每味辛苦平無毒主金瘡止痛斷血生肉除諸惡瘡消浮腫搗封之湯漬散敷並良唐本注云葉似蒼耳莖圓有毛生下濕地所在皆有一名虎膏一名狗膏生平澤今按別本注云又療虎及狗咬瘡至良唐本先附臣禹錫等謹按蜀本圖經云葉似蒼耳兩枝相對莖葉俱有毛黃白色五月六月採苗曬乾之陳藏器云豬膏草有小毒主久瘧痰癊生搗絞汁服得吐出痰亦碎敷蜘蛛咬蟲蠶咬蠼螋溺瘡似荏葉有毛蘇云無毒誤耳鹿藿味苦平無毒主蠱毒女子腰腹痛不樂腸癰瘰癧瘍氣生汶山谷陶隱居云方藥不復用人亦罕識葛根之苗又一名鹿藿唐本注云此草所在有之苗似豌豆有蔓而長大人取以為菜亦微有豆氣名為鹿豆也臣禹錫等謹按蜀本圖經云山人謂之鹿豆亦堪生啖今所在有五月六月採苗曬乾之爾雅云蔨鹿藿其實莥釋曰蔨一名鹿藿其實名莥郭云鹿豆也葉似大豆根黃而香蔓延生梁簡文帝勸醫文鹿藿止救頭痛之疴蚤音早休味苦微寒有毒主驚癇搖頭弄舌熱氣在腹中癲疾癰瘡陰蝕下三蟲去蛇毒一名蚩休生山陽川穀及冤句唐本注云今謂重樓者是也一名重臺南人名草甘遂苗似王孫鬼臼等有二三層根如肥大菖蒲細肌脆白醋摩療癰腫敷蛇毒有效臣禹錫等謹按蜀本圖經云葉似鬼臼牡蒙輩年久者二三重根似紫參皮黃肉白五月採根曬乾用之日華子云重臺根冷無毒治胎風搐手足能吐瀉瘰癧根如尺二蜈蚣又如肥紫菖蒲又名蚤休螫休也圖經曰蚤休即紫河車也俗呼重樓金線生山陽川穀及冤句今河中河陽華鳳文州及江淮間亦有之苗葉似王孫鬼臼等作二三層六月開黃紫花蕊赤黃色上有金絲垂下秋結紅子根似肥姜皮赤肉白四月五月採根曬乾用衍義曰蚤休無旁枝止一莖挺生高尺余顛有四五葉葉有歧似虎杖中心又起莖亦如是生葉唯根入藥用石長生味鹹苦微寒有毒主寒熱惡瘡大熱闢鬼氣不祥下三蟲一名丹草生咸陽山谷陶隱居云俗中雖時有采者方藥亦不復用近道亦有是細細草葉花紫色爾南中多生石岩下葉似蕨而細如龍鬚草大黑如光漆高尺余不與余草雜也唐本注云今市人用𪕌音零筋草為之葉似青葙莖細徑紫色今太常用者是也臣禹錫等謹按藥性論云石長生皮臣亦云石長生也味酸有小毒治疥癬逐諸風治百邪鬼魅唐本餘下三蟲謂長蟲赤蟲蟯蟲也苗高尺許用莖葉五月六月採烏蘞音斂莓味酸苦寒無毒主風毒熱腫遊丹蛇傷搗敷並飲汁唐本注云蔓生葉似白蘞生平澤今按別本注云四月五月採陰乾唐本先附臣禹錫等謹按蜀本云或生人家籬牆間俗呼為籠草取根搗以敷癰腫多效又圖經云蔓生莖端五葉花青白色俗呼為五葉莓葉有五丫子黑一名烏蘞草即烏蘞莓是也陶云五葉莓生人家籬牆間搗敷瘡腫蛇蟲咬處陸英味苦寒無毒主骨間諸痹四肢拘攣疼酸膝寒痛陰痿短氣不足腳腫生熊耳川穀及冤句立秋採唐本注云此即蒴藋是也後人不識浪出蒴藋條此葉似芹及接骨花亦一類故芹名水英此名陸英接骨樹名木英此三英也花葉並相似臣禹錫等謹按藥性論云陸英一名蒴藋味苦辛有小毒能捋風毒腳氣上衝心煩悶絶主水氣虛腫風瘙皮肌惡癢煎取湯入少酒可俗之妙圖經曰陸英生熊耳川穀及冤句蒴藋不載所出州土但云生田野今所在有之春抽苗莖有節節間生枝葉大似水芹及接骨春夏採葉秋冬採根莖或云即陸英也本經別立一條陶隱居亦以為一物蘇恭云藥對及古方無蒴藋唯言陸英明非別物今注以性味不同疑非一種謂其類耳然亦不能細別再詳陸英條不言所用蒴藋條云用葉根莖蓋一物而所用別故性味不同何以明之蘇恭云此葉似芹及接骨花亦一類故芹名水英此名陸英接骨名木英此三英花葉並相似又按爾雅云華荂音敷也華荂榮也木謂之華草謂之榮不榮而實者為之秀榮而不實者謂之英然則此物既有英名當是其花耳故本經云陸英立秋採立秋正是其花時也又葛氏方有用蒴藋者有用蒴藋根者有用葉者三用各別正與經載三時所採者相會謂陸英為花無疑也預知子味苦寒無毒殺蟲療蠱治諸毒傳云取二枚綴衣領上遇蠱毒物則聞其有聲當便知之有皮殼其實如皂莢子去皮研服之有效今附臣禹錫等謹按日華子云盍合子溫治一切風補五勞七傷其功不可備述並治痃癖氣塊天行溫疾消宿食止煩悶利小便催生解毒藥中惡失音發落敷一切蛇蟲蠶咬雙仁者可帶單方服治一切病每日取仁二七粒患者服不過三千粒永瘥又名仙沼子聖知子預知子聖先子圖經曰預知子舊不載所出州土今淮蜀漢黔壁諸州有之作蔓生依大木上葉緑有三角面深背淺七月八月有實作房初生青至熟深紅色每房有子五七枚如皂莢子斑褐色光潤如飛蛾舊說取二枚綴衣領上遇蠱毒物則側側有聲當便知之故有此名今蜀人極貴重云亦難得採無時其根味苦性極冷其效愈於子山民目為聖無憂冬月採陰乾石臼內搗下篩凡中蠱毒則水煎三錢匕溫服立已葫蘆巴主元臟虛冷氣得附子硫黃治腎虛冷腹脅脹滿面色青黑得蘹香子桃仁治膀胱氣甚效出廣州並黔州春生苗夏結子子作細莢至秋採今人多用嶺南者新定今據廣州所供圖畫收附草部下品之末而或者云葫蘆巴蕃蘿蔔子也當附蘆蔔之次此世俗相傳之謬未知審的不可依據至如舊說蘇合香師子屎豈可附於獸部又補骨脂徐表南州記云是韭子也亦不附於菜部今之所附亦其比也圖經曰葫蘆巴生廣州或云種出海南諸蕃蓋其國蘆蔔子也舶客將種蒔於嶺外亦生然不及蕃中來者真好春生苗夏結子作莢至秋採之今醫方治元臟虛冷氣為最要然本經不著唐以前方亦不見者蓋是出甚近也與附子茴香硫黃桃仁尤相宜兼治膀胱冷氣衍義曰葫蘆巴本經云得蘹香子桃仁治膀胱氣甚效嘗合唯桃仁麩炒各等分半以酒糊丸半為散每服五七十丸空心食前鹽酒下散以熱米飲調下與丸子相間空心服日各一二服弓弩弦主難産胞衣不出陶隱居云難産取弓弩弦以縛腰及燒弩牙令赤納酒中飲之皆取發放快速之義也臣禹錫等謹按藥性論云弓弩弦微寒藥對云平聖惠方耳中有物不可出用弓弩弦長三寸打散一頭塗好膠柱著耳中物處停之令相著徐徐引出但取蔥管鬥於耳門內吸之即出為妙千金方治婦人始覺有孕要轉女為男取弓弩弦一枚縫袋盛帶婦人左臂續十全方弓弩弦燒灰為末用酒服二錢匕主易生産寶論云滑胎易産弓弩弦縛心下立産房室經憂妊娠欲得男女覺有孕未滿月以弓弩弦為帶縛腰中滿三月解卻轉女為男宮中祕法不傳出木賊味甘微苦無毒主目疾退翳膜又消積塊益肝膽明目療腸風止痢及婦人月水不斷得牛角䚡麝香治休息痢歷久不瘥得禹餘糧當歸芎藭療崩中赤白得槐鵝桑耳腸風下血服之效又與槐子枳實相宜主痔疾出血出秦隴華成諸郡近水地苗長尺許叢生每根一稈無花葉寸寸有節色青凌冬不凋四月採用之新定圖經曰木賊生秦隴同華間味微苦無毒主明目療風止痢所生山谷近水地有之獨莖苗如箭笴無葉長一二尺青色經冬不枯寸寸有節採無時今醫用之最多其治腸痔多年不瘥下血不止方木賊枳殼各二兩乾薑一兩大黃一分四味並銼一處於銚子內炒黑色存三分性搗羅溫粟米飲調食前服二錢匕甚效廣利方治瀉血不止木賊十二分切以水一升八合煎取八合去滓空心溫分二服如人行五里再服衍義曰木賊細銼微微炒搗為末沸湯點二錢食前服治小腸膀胱氣緩緩服必效藎音燼草味苦平無毒主久咳上氣喘逆久寒驚悸痂疥白禿瘍氣殺皮膚小蟲可以染黃作金色生青衣川穀九月十月採畏鼠婦陶隱居云青衣在益州西唐本注云此草葉似竹而細薄莖亦圓小生平澤溪澗之側荊襄人煮以染黃色極鮮好洗瘡有效俗名緑蓐草爾雅云所謂王芻者也臣禹錫等謹按爾雅疏云緑鹿蓐也今呼鴟腳莎詩衛風云瞻彼淇澳緑竹猗猗是也藥性論云藎草使治一切惡瘡蒲公草味甘平無毒主婦人乳癰腫水煮汁飲之及封之立消一名拘耨草唐本注云葉似苦苣花黃斷有白汁人皆啖之唐本先附臣禹錫等謹按蜀本圖經云花如菊而大莖葉斷之俱有白汁堪生食生平澤田園中四月五月採之圖經曰蒲公草舊不著所出州土今處處平澤田園中皆有之春初生苗葉如苦苣有細刺中心抽一莖莖端出一花色黃如金錢斷其莖有白汁出人亦啖之俗呼為蒲公英語訛為僕公罌是也水煮汁以療婦人乳癰又搗以敷瘡皆佳又治惡刺及狐尿刺摘取根莖白汁塗之唯多塗立瘥止此方出孫思邈千金方其序云余以貞觀五年七月十五日夜以左手中指背觸著庭木至曉遂患痛不可忍經十日痛日深瘡日高大色如熟小豆色嘗聞長者之論有此方遂依治之手下則愈痛亦除瘡亦即瘥未十日而平復楊炎南行方亦著其效云梅師方治産後不自乳兒畜積乳汁結作癰取蒲公草搗敷腫上日三四度易之衍義曰蒲公草今地丁也四時常有花花罷飛絮絮中有子落處即生所以庭院間亦有者蓋因風而來也穀精草味辛溫無毒主療喉痹齒風痛及諸瘡疥飼馬主蟲顙毛焦等病二月三月於谷田中採之一名戴星草花白而小圓似星故有此名爾今附臣禹錫等謹按日華子云涼喂飼馬肥二三月于田中生白花者結水銀成沙子圖經曰穀精草舊不載所出州土今處處有之春生於穀田中葉稈俱青根花並白色二月三月內採花用一名戴星草以其葉細花白而小圓似星故以名爾又有一種莖梗差長有節根微赤出秦隴間古方稀用今口齒藥多使之陳藏器云味甘平亦入馬藥用之白花細葉集驗方治偏正頭痛穀精草一兩為末用白麵調攤紙花子上貼痛處干又換牛扁音褊味苦微寒無毒主身皮瘡熱氣可作浴湯殺牛蝨小蟲又療牛病生桂陽川穀陶隱居云今人不復識此牛疫代代不無用之既要牛醫家應用而亦無知者唐本注云此藥似三堇石龍芮等根如秦艽而細生平澤下濕地田野人名為牛扁療牛蝨甚效太常貯名扁特或名扁毒臣禹錫等謹按蜀本圖經云葉似石龍芮附子等今出寧州二月八月採根曬乾圖經曰牛扁出桂陽川穀今潞州寧州亦有之葉似三堇石龍芮等根如秦艽而細多生平澤下濕地二月八月採以曬乾今亦稀用按本經云殺牛蝨小蟲蘇恭注云太常貯名扁特今潞州只一種名便特六月有花八月結實採其根搗末油調殺蟣蝨根苗主療大都相似疑此即是牛扁但扁便不同豈聲近而字訛乎今以附之苦芺音襖微寒主面目通身漆瘡陶隱居云處處有之傖士莖切人取莖生食之五月五日採曝乾燒作灰以療金瘡甚驗唐本注今人以為漏蘆非也臣禹錫等謹按蜀本圖經有云子若貓薊莖圓無刺五月採苗堪生啖所在下濕地有之藥性論云苦芺草亦可單用味苦無毒日華子云冷治丹毒食療云苦芺微寒生食治漆瘡五月五日採曝乾作灰敷面目通身漆瘡不堪多食爾酢漿草味酸寒無毒主惡瘡瘑瘻搗敷之殺諸小蟲生道旁唐本注云葉如細萍叢生莖頭有三葉一名醋母草一名鳩酸草今按別本注云生陰濕處俗為小酸茅食之解熱渴四月五月採陰乾唐本先附臣禹錫等謹按蜀本圖經云葉似水萍兩葉並大葉同枝端黃色實黑生下濕地夏採葉用之圖經云酢漿草俗呼為酸漿舊不載所出州土云生道旁今南中下濕地及人家園圃中多有之北地亦或有生者葉如水萍叢生莖端有三葉葉間生細黃花實黑夏月採葉用初生嫩時小兒多食之南人用揩鍮石器令白如銀昨葉何草味酸平無毒主口中乾痛水穀血痢止血生上黨屋上如蓬初生一名瓦松夏採曬乾唐本注云葉似蓬高尺余遠望如松栽生年久瓦屋上今按別本注云今處處有皆入藥用生眉發膏為要爾唐本先附臣禹錫等謹按蜀本圖經云六月七月採苗曬乾之聖惠方治頭風白屑用瓦松曝乾燒灰淋汁熱洗頭不過六七度蒻音弱頭味辛寒有毒主癰腫風毒摩敷腫上搗碎以灰汁煮成餅五味調和為茹食性冷主消渴生戟人喉出血生吳蜀葉似由跋半夏根大如碗生陰地雨滴葉下生子一名蒟蒻又有斑杖苗相似至秋有花直出生赤子其根敷癰腫毒甚好根如蒻頭毒猛不堪食今附臣禹錫等謹按日華子云斑杖者虎杖之別名即前條虎杖是也圖經文具天南星條下夏枯草味苦辛寒無毒主寒熱瘰癧鼠瘻頭瘡破症散癭結氣腳腫濕痹輕身一名夕句一名乃東一名燕面生蜀郡川穀四月採土瓜為之使唐本注云此草生平澤葉似旋覆首春即生四月穗出其花紫白似丹參花五月便枯處處有之圖經曰夏枯草生蜀郡川穀今河東淮浙州郡亦有之冬至後生葉似旋覆三月四月開花作穗紫白色似丹參花結子亦作穗至五月枯四月採簡要濟衆治肝虛目睛疼冷淚不止筋脈痛及眼羞明怕日補肝散夏枯草半兩香附子一兩共為末每服一錢臘茶調下無時候服衍義曰夏枯草今又謂之郁臭自秋便生經冬不瘁春開白花中夏結子遂枯古方九燒灰合緊面藥初生嫩時作菜食之須浸洗淘去苦水治瘰癧鼠漏燕蓐草無毒主眠中遺溺不覺燒令黑研水進方寸匕亦主噦氣此燕窠中草也新補見陳藏器日華子千金方治婦人無故尿血胡燕窠中草燒末用酒服半錢亦治丈夫孫真人食忌主卒患腰惡瘡若先發於心已有汁者以胡燕窠末和水塗之治不可遲遍身即害人死鴨跖草味苦大寒無毒主寒熱瘴瘧痰飲疔腫肉症澀滯小兒丹毒發熱狂癇大腹痞滿身面氣腫熱痢蛇犬咬癰疽等毒和赤小豆煮下水氣濕痹利小便生江東淮南平地葉如竹高一二尺花深碧有角如鳥嘴北人呼為雞舌草亦名鼻斫草吳人呼為跖跖斫聲相近也一名碧竹子花好為色新補見陳藏器日華子山慈菰根有小毒主癰腫瘡瘻瘰癧結核等醋摩敷之亦剝人面皮除皯䵴生山中濕地一名金燈花葉似車前根如慈菰零陵間又有團慈菰根似小蒜所主與此略同新補見藏器及日華子經驗方貼瘡腫以山慈菰一名鹿蹄草取莖葉搗為膏入蜜貼瘡口上候清血出效苘音頃實味苦平無毒主赤白冷熱痢散服飲之吞一枚破癰腫唐本注云一作字人取皮為索者也今按別本注云今人作布及索檾麻也實似大麻子熱結癰腫無頭吞之則為頭易穴九月十月採實陰乾唐本先附臣禹錫等謹按蜀本圖經云樹生高四尺葉似苧花黃實殼如蜀葵子黑古方用根八月採實圖經曰苘實舊不載所出州土今處處有之北有種以績布及打繩索苗高四五尺或六七尺葉似苧而薄花黃實帶殼如蜀葵中子黑色九月十月採實陰乾用古方亦用根楊氏産乳治赤白痢黃麻子一兩炒令香熟為末以蜜漿下一錢不過再服赤車使者味辛苦溫有毒主風冷邪疰蠱毒症瘕五臟積氣唐本注云苗似香葇蘭香葉莖赤根紫赤色生溪谷之陰出襄州八月九月採根曬乾唐本先附臣禹錫等謹按蜀本圖經云根紫如茜根生荊州襄州山谷二月八月採藥性論云赤車使者有小毒能治惡風冷氣服之悅澤皮肌好顏色雷公云赤車使者元名小錦枝凡使並粗搗用七歲童子小便拌了蒸令乾更曬每修事五兩用小兒溺一溢為度狼跋子有小毒主惡瘡蝸疥殺蟲魚陶隱居云出交廣形扁扁爾搗以雜米投水中魚無大小皆浮出而死人用苦酒摩療疥亦效唐本注云此今京下呼黃環子為之亦謂度谷一名就葛陶云出交廣今交廣送入太常正是黃環子非余物爾今按別本注云味苦寒藤生花紫色屋遊味甘寒主浮熱在皮膚往來寒熱利小腸膀胱氣生屋上陰處八月九月採陶隱居云此瓦屋上青苔衣剝取煮服之今按別本注云無毒主小兒癇熱時氣煩悶止渴臣禹錫等謹按蜀本圖經云古瓦屋北陰青苔衣也地錦草味辛無毒主通流血脈亦可用治氣生近道田野出滁州者尤良莖葉細弱蔓延於地莖赤葉青紫色夏中茂盛六月開紅花結細實取苗子用之絡石注有地錦是藤蔓之類雖與此名同而其類全別新定圖經曰地錦草生滁州及近道田野中味辛無毒主通流血脈亦治氣其苗葉細弱作蔓遍地莖赤葉青赤中夏茂盛六月開紅花細實今醫家取苗子用之本經絡石條注中有地錦與此同名而別是一類也經驗方治藏毒赤白地錦草採得後洗曝乾為末米飲下一錢立效敗船茹音如平主婦人崩中吐痢血不止陶隱居云此是大䡢步典切月翕他盍切刮竹茹以挰直萌切漏處者取干煮之亦燒作屑服之千金方治婦人遺尿不知出時船故茹為末酒調服三錢子母祕録治無故遺血溺船中故竹茹乾末酒服三錢匕日三服燈心草味甘寒無毒根及苗主五淋生煮服之生江南澤地叢生莖圓細而長直人將為席敗席煮服更良今附經驗方治小兒夜啼用燈心燒灰塗乳上與吃勝金方治破傷多用燈心草爛嚼和唾貼之用帛裹血立止又方治小蟲蟻入耳挑不出者以燈心浸油釣出蟲衍義曰燈心草陝西亦有蒸熟干則拆取中心穰然燈者是謂之熟草又有不蒸但生干剝取者為生草入藥宜用生草五毒草味酸平無毒根主癰疽惡瘡毒腫赤白遊疹蟲蠶蛇犬咬並醋摩敷瘡上亦搗莖葉敷之恐毒入腹亦煮服之生江東平地花葉如蕎麥根緊硬似狗脊一名五蕺一名蛇罔又別有蠶罔草如苧麻與蕺同名也新補見陳藏器鼠麴草味甘平無毒調中益氣止泄除痰壓時氣去熱嗽雜米粉作糗食之甜美生平岡熟地高尺余葉有白毛黃花荊楚歲時記云三月三日取鼠曲汁蜜和為粉謂之龍舌䉽以壓時氣山南人呼為香茅取花雜櫸皮染褐至破猶鮮江西人呼為鼠耳草新補見陳藏器日華子列當味甘溫無毒主男子五勞七傷補腰腎令人有子去風血煮及浸酒服之生山南岩石上如藕根初生掘取陰乾亦名栗當一名草蓯蓉今附食醫心鏡主興陽事栗當二斤一名列當搗篩畢以酒一斗浸經宿遂性飲之馬勃味辛平無毒主惡瘡馬疥一名馬庀生園中久腐處陶隱居云俗人呼為馬𥧔勃紫色虛軟狀如狗肺彈之粉出敷諸瘡用之甚良也臣禹錫等謹按蜀本圖經云此馬庀菌也虛軟如紫絮彈之紫塵出生濕地及腐木上夏秋採之衍義曰馬勃此唐韓退之所謂牛溲馬勃俱收並蓄者也有大如斗者小亦如升杓去膜以蜜揉拌少以水調呷治喉閉咽痛屐音劇屟音燮鼻繩灰水服主噎哽心痛胸滿今按別本注云屐屟江南有之北人不識以桐木為屐及屟也用蒲為蒵用麻穿其鼻也久著腳者堪入藥用唐本先附臣禹錫等謹按蜀本圖經云取著經久遠欲爛斷者水服之良質汗味甘溫無毒主金瘡傷折瘀血內損補筋肉消惡血下血氣女人産後諸血結腹痛內冷不下食並酒消服之亦敷病處出西蕃如凝血蕃人煎甘草松淚柳乳地黃並熱血成之今附陳藏器云蕃人試藥取兒斷一足以藥納口中以足踏之當時能走者至良水蓼主蛇毒搗敷之絞汁服止蛇毒入內心悶水煮漬捋腳消氣腫唐本注云葉似蓼莖赤味辛生下濕水旁今按別本注云生於淺水澤中故名水蓼其葉大於家蓼水挪食之勝於蓼子唐本先附臣禹錫等謹按日華子云水蓼味辛冷無毒集驗方治腳痛先以水蓼煮湯令溫熱得所頻頻淋洗瘡干自安衍義曰水葒子不以多少微炒一半餘一半生用同為末好酒調二錢日三服食後夜臥各一服治瘰癧破者亦治水蓼大率與水紅相似但枝低爾今造酒取以水浸汁和麵作曲變假其辛味蕕草味甘大寒無毒主濕痹消水氣合赤小豆煮食之勿與鹽主腳氣頑痹虛腫小腹急小便赤澀搗葉敷毒腫又絞取汁服之主消渴生水田中似結縷葉長馬食之爾雅云蕕蔓於注云生水中江東人呼為莤證俗云蕕水草也新補見陳藏器衍義曰蕕草爾雅曰莤音猶蔓於左傳亦曰一薰一蕕十年尚猶有臭者是此草敗芒箔無毒主産婦血滿腹脹痛血渴惡露不盡月閉止好血下惡血去鬼氣疰痛癥結酒煮服之亦燒為末酒下彌久著煙者佳今東人作箔多草為之爾雅云芒似茅可以為索新補見陳藏器狗舌草味苦寒有小毒主蠱疥瘙瘡殺小蟲唐本注云葉似車前無紋理抽莖花黃白細叢生渠塹濕地今按別本注云疥瘙風瘡並皆有蟲為末和塗之即瘥四月五月採莖曝乾唐本先附海金沙主通利小腸得梔子馬牙硝硼砂共療傷寒熱狂出黔中郡七月收採生作小株才高一二尺收時全科於日中曝之令小干紙襯以杖擊之有細沙落紙上旋收之且曝且擊以沙盡為度用之或丸或散新定圖經曰海金沙生黔中山谷湖南亦有初生作小株高一二尺七月採得日中曝令乾以紙襯擊取其沙落紙上旋曝旋擊沙盡乃止主通利小腸亦入傷寒狂熱藥今醫治小便不通臍下滿悶方海金沙一兩臘麵茶半兩二味搗碾令細每服三錢煎生薑甘草湯調下服無時未通再服萱草根涼無毒治沙淋下水氣主酒疸黃色通身者取根搗絞汁服亦取嫩苗煮食之又主小便赤澀身體煩熱一名鹿蔥花名宜男風土記云懷妊婦人佩其花生男也新補見陳藏器日華子圖經曰萱草俗謂之鹿蔥處處田野有之味甘而無毒主安五臟利心志令人好歡樂無憂輕身明目五月採花八月採根用今人多采其嫩苗及花跗作菹云利胸膈甚佳嵇康養生論云合歡蠲忿萱草忘憂衍義曰萱草根洗淨研汁一大盞生薑汁半盞相和時時細呷治大熱衄血格注草味辛苦溫有大毒主蠱疰諸毒疼痛等生齊魯山澤唐本注云葉似蕨根紫色若紫草根一株有二寸許二月八月採根五月六月採苗曬乾唐本先附唐本余注云圖經出齊州兗州山谷間雞窠中草主小兒白禿瘡和白頭翁花燒灰臘月豬脂敷之瘡先以酸泔洗然後塗之又主小兒夜啼安席下勿令母知新補見陳藏器日華子千金方治産後遺尿故雞窠中草燒作末酒下二錢匕瘥雞冠子涼無毒止腸風瀉血赤白痢婦人崩中帶下入藥炒用新補見陳藏器日華子地椒味辛溫有小毒主淋炸腫痛可作殺蛀蠱藥出上黨郡其苗覆地蔓生莖葉甚細花作小朵色紫白因舊莖而生新定草三稜根味甘平溫無毒療産後惡血通月水血結墮胎破積聚癥瘕止痛利氣一名雞爪三稜生蜀地二月八月採今附合明草味甘寒無毒主暴熱淋小便赤澀小兒瘛病明目下水止血痢搗絞汁服生下濕地葉如四出花向夜即葉合新補見陳藏器鹿藥味甘溫無毒主風血去諸冷益老起陽浸酒服之生姑臧以西苗根似黃精根鹿好食今附敗天公平主鬼疰精魅陶隱居云此人所戴竹笠之敗者也取上竹燒酒服之一十一種陳藏器余毛茛鉤吻注陶云鉤吻或是毛茛蘇云毛茛是有毛石龍芮也百一方云菜中有水茛葉圓而光有毒生水旁蟹多食之蘇云又注似水茛無毛其毛茛似龍芮而有毒也蔭命鉤吻注陶云有一物名陰命赤色著木懸其子生海中有毒又云海姜生海中赤色狀如龍芮亦大毒應是此也今無的識之者毒菌地漿注陶云山中多有毒菌地漿解之地生者為菌木生者為檽江東人呼為菌爾雅云中馗菌注云地菌子也或云地雞亦云獐頭夜中光者有毒煮不熟者有毒煮訖照人無影者有毒有惡蟲鳥從下過者有毒欲爛無蟲者有毒冬春無毒及秋夏有毒者為蛇過也草禹餘糧注陶公云南人又呼平澤中一藤如菝葜為餘糧言禹採此當糧根如盞連綴半在土上皮如茯苓肉赤味澀人取以當谷不飢調中止泄健行不睡云昔禹會諸侯棄糧於地化為此草故名餘糧今多生海畔山谷鼠蓑草莎草注陶云別有鼠蓑草治體異此有名無用條有蓑草味苦寒主溫瘧寒熱酸斯利氣生淮南山谷即此也廉姜杜若注陶云若似廉按廉姜熱主胃中冷吐水不下食似姜生嶺南劍南人多食之草石蠶蟲石蠶注陶云今俗用草根黑色按草石蠶生高山石上根如箸上有毛節如蠶葉似卷柏山人取浸酒除風破血主溪毒煮食之本經從蟲部出復有蟲石蠶已出拾遺漆姑草杉木注陶云葉細多生石間按漆姑草如鼠跡大生階墀間陰處氣辛烈主漆瘡挪碎敷之熱更易亦主溪毒瘡蘇云此蜀羊泉羊泉是大草非細者乃同名耳麂目豆蔻注陶云麂目小冷按麂目云出嶺南如麂目食之發冷痰余別無功梨豆蚺蛇注陶云蛇膽如梨豆生江南蔓如葛子如皂莢子作貍首文故名梨豆爾雅云慮涉子人炒食之一名虎涉別無功諸草有毒瓜兩蒂兩鼻害人瓜瓠正苦有毒檐溜滴著菜有毒堇黃花害人芹赤葉害人菰首蜜食下痢生蔥不得雜白犬肉食之令人九竅流血食戎葵並鳥肉令人面無顏色食葵發狂犬咬食葫蔥青魚令人腹生蟲薤不得和牛肉食成癥瘕痼疾婦人妊娠食乾薑令胎肉消生蔥和雞子食變嗽蓼齏食生食令氣奪乏令陰痿九月食霜下瓜血必冬發三月不得食陳菹夏熱病發惡瘡瓠牛踐苗子即苦
