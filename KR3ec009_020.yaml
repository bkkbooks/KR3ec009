body:
  text: 卷第二十己酉新增衍義上品石蜜味甘平無毒微溫主心腹邪氣諸驚癇痓安五臟諸不足益氣補中止痛解毒除衆病和百藥養脾氣除心煩食飲不下止腸澼肌中疼痛口瘡明耳目久服強志輕身不飢不老延年神仙一名石飴生武都山谷河源山谷及諸山石中色白如膏者良陶隱居云石蜜即崖蜜也高山岩石間作之色青赤味小酸食之心煩其蜂黑色似虻又木蜜呼為食蜜懸樹枝作之色青白樹空及人家養作之者亦白而濃厚味美凡蜂作蜜皆須人小便以釀諸花乃得和熟狀似作飴須糵也又有土蜜於土中作之色青白味酸今出晉安檀崖者多土蜜云最勝出東陽臨海諸處多木蜜出於潛懷安諸縣多崖蜜亦有雜木及人家養者例皆被添殆無淳者必須親自看取之乃無雜爾且又多被煎煮其江南向西諸蜜皆是木蜜添雜最多不可為藥用道家丸餌莫不須之仙方亦單煉服之致長生不老也唐本注云上蜜出氐羌中並勝前說者陶以未見故以南土為證爾今京下白蜜如凝酥甘美耐久全不用江南者說者今自有以水牛乳煎沙糖作者亦名石蜜此既蜂作宜去石字後條蠟蜜宜單稱爾今按陳藏器本草云蜜主牙齒疳䘌唇口瘡目膚赤障殺蟲臣禹錫等謹按陳藏器云按尋常蜜亦有木中作者亦有土中作者北方地燥多在土中南方地濕多在木中各隨土地所宜而生其蜜一也崖蜜別是一蜂如陶所說出南方岩嶺間生懸崖上蜂大如虻房著岩窟以長竿刺令蜜出承取之多者至三四石味酸色緑入藥用勝於凡蜜蘇恭是荊襄間人地無崖險不知之者應未博聞今雲石蜜正是岩蜜也宜改為岩字甘蔗石蜜別出本經張司空云遠方山郡幽僻處出蜜所著巉巖石壁非攀緣所及唯于山頂籃輿自懸掛下遂得采取蜂去余蠟著石鳥雀群飛來啄之盡至春蜂歸如故人亦占護其處宣州有黃連蜜色黃味苦主目熱蜂銜黃連花作之西京有梨花蜜色白如凝脂亦梨花作之各逐所出藥性論云白蜜君治卒心痛及赤白痢水作蜜漿頓服一碗止又生薑汁蜜各一合水和頓服之又常服面如花紅神仙方中甚貴治口瘡浸大青葉含之圖經曰蜜本經作石蜜蘇恭云當去石字生武都山谷河源山谷及諸山中今川蜀江南嶺南皆有之蠟白蠟生武都山谷出於蜜房木石間今處處有之而宣歙唐鄧伊洛間尤多石蜜即崖蜜也其蜂黑色似虻作房於岩崖高峻處或石窟中人不可到但以長竿刺令蜜出以物承之多者至三四石味酸色緑入藥勝於它蜜張司空云遠方山郡幽僻僻出蜜所著絶巖石壁非攀緣所及唯于山頂籃輿自垂掛下遂得采取蜂去余蠟著石有鳥如雀群飛來啄之殆盡至春蜂歸如舊人亦占護其處謂之蜜塞其鳥謂之靈雀其蜜即今之石蜜也食蜜有兩種一種在山林木上作房一種人家作窠檻收養之其蜂甚小而微黃蜜皆濃厚而味美又近世宣州有黃連蜜色黃味小苦雍洛間有梨花蜜如凝脂亳州太清宮有檜花蜜色小赤南京柘城縣有何首烏蜜色更赤並以蜂採其花作之各隨其花色而性之溫涼亦相近也蠟蜜脾底也初時香嫩重煮治乃成藥家應用白蠟更須煎煉水中煬十數過即白古人荒歲多食蠟以度飢欲啖當合大棗咀嚼即易爛也劉禹錫傳信方云甘少府治腳轉筋兼暴風通身水冷如癱緩者取蠟半斤以舊帛絁絹並得約闊五六寸看所患大小加減闊狹先銷蠟塗於帛上看冷熱但不過燒人便承熱纏腳仍須當腳心便著襪裹腳待冷即便易之亦治心躁驚悸如覺是風毒兼裹兩手心食療微溫主心腹邪氣諸驚癇補五臟不足氣益中止痛解毒能除衆病和百藥養脾氣除心煩悶不能飲食治心肚痛血刺腹痛及赤白痢則生搗地黃汁和蜜一大匙服即下又長服之面如花色仙方中甚貴此物若覺熱四肢不和即服蜜漿一碗甚良又能止腸澼除口瘡明耳目久服不飢又點目中熱膜家養白蜜為上木蜜次之崖蜜更次又治癩可取白蜜一斤生薑二斤搗取汁先稱銅鐺令知斤兩即下蜜於鐺中消之又稱知斤兩下薑汁於蜜中微火煎令薑汁盡稱蜜斤兩在即休藥已成矣患三十年癩者平旦服棗許大一丸一日三服酒飲任下忌生冷醋滑臭物功用甚多世人衆委不能一一具之雷公云凡煉蜜一斤只得十二兩半或一分是數若火少火過並用不得外臺祕要比歲有病天行發斑瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨決隨生不即療數日必死瘥後瘡瘢黯一歲方滅此惡毒之氣世人云建武中南陽擊虜仍呼為虜瘡諸醫參詳療之方取好蜜通摩瘡上以蜜煎升麻數數拭之又方陰頭生瘡以蜜煎甘草塗之瘥肘後方丹者惡毒之瘡五色無常蜜和乾薑末敷之葛氏方目生珠管以蜜塗目中仰臥半日乃可洗之生蜜佳又方食諸魚骨鯁雜物鯁以好蜜匕抄稍稍服之令下又方誤吞錢煉服二升即出矣又方湯火灼已成瘡白蜜塗之以竹中白膜貼上日三度梅師方治年少發白拔去白髮以白蜜塗毛孔中即生黑者發不生取梧桐子搗汁塗上必生黑者又方肛門主肺肺熱即肛塞腫縮生瘡白蜜一升豬膽一枚相和微火煎令可丸丸長三寸作挺塗油納下部臥令後重須臾通泄又方治中熱油燒外痛以白蜜塗之孫真人食忌云七月勿食生蜜若食則暴下發霍亂又方治面䵟取白蜜和茯苓末塗之七日便瘥矣食醫心鏡主噫不下食取崖蜜含微微咽下廣利方同傷寒類要陽明病自汁者若小便自利此為津液內竭雖爾不可攻之當須自欲大便宜蜜煎導以通之取蜜七合於銅器中微火煎可丸捻作一挺如指許大得令以納穀道中須臾必通矣産書治産後渴蜜不計多少煉過熟水溫調服即止衍義曰石蜜嘉祐本草石蜜收蟲魚部中又見果部新書取蘇恭說直將石字不用石蜜既自有本條煎煉亦自有法今人謂之乳糖則蟲部石蜜自是差誤不當更言石蜜也本經以謂白如膏者良由是知石蜜字乃白蜜字無疑去古既遠亦文字傳寫之誤故今人尚言白沙蜜蓋經久則陳白而沙新收者唯稀而黃次條蜜蠟故須別立目蓋是蜜之房攻治亦別至如白蠟又附於蜜蠟之下此又誤矣本草是續上文敘蜜蠟之用及注所出州土不當更分之為二何者白蠟本條中蓋不言性味只是言其色白爾既有黃白二色今只言白蠟是取蠟之精英者在黃蠟直置而不言黃則蠟陳白則蠟新亦是蜜取陳蠟取新也唐注云除蜜字為佳今詳之蜜字不可除除之即不顯蠟自何處來山蜜多石中或古木中有經三二年或一得而取之氣味醇厚人家窠檻中蓄養者則一歲春秋二取之取之既數則蜜居房中日少氣味不足所以不逮陳白者日月足也雖收之才過夏亦酸壞若龕於井中近水處則免湯火傷塗之痛止仍搗薤白相和雖無毒多食亦生諸風蜂子味甘平微寒無毒主風頭除蠱毒補虛羸傷中心腹痛大人小兒腹中五蟲口吐出者面目黃久服令人光澤好顏色不老輕身益氣大黃蜂子主心腹脹滿痛乾嘔輕身益氣土蜂子主癰腫嗌音益喉也痛一名蜚零生武都山谷畏黃芩芍藥牡蠣陶隱居云前直云蜂子即應是蜜蜂子也取其未成頭足時炒食之又酒漬以敷面令面悅白黃蜂則人家屋上者及𤬈音候𤬏蜂也今按陳藏器本草云蜂子主丹毒風疹腹內留熱大小便澀去浮血婦人帶下下乳汁此即蜜房中白如蛹者其穴居者名土蜂最大螫人至死其子亦大白功用同蜜蜂子也臣禹錫等謹按陳藏器云按土蜂赤黑色燒末油和敷蜘蛛咬瘡此物能食蜘蛛亦取其相伏也日華子云樹蜂土蜂蜜蜂涼有毒利大小便治婦人帶下病等又有食之者須以冬瓜及苦蕒生薑紫蘇以制其毒也圖經曰蜂本經有蜂子黃蜂土蜂而土蜂下云生武都山谷今處處皆有之蜂子即蜜蜂子也在蜜脾中如蛹而白色大黃蜂子即人家屋上作房及大木間𤬈音候𤬏音婁蜂子也嶺南人亦作饌食之蜂並黃色比蜜蜂更大土蜂子即穴土居者其蜂最大螫人或至死凡用蜂子並取頭足未成者佳謹按嶺表録異載宣歙人取蜂子法大蜂結房于山林間大如巨鍾其中數百層土人採時須以草衣蔽體以捍其毒螫復以煙火熏散蜂母乃敢攀緣崖木斷其蒂一房蜂子或五六斗至一石以鹽炒曝乾寄入京洛以為方物然房中蜂子三分之一翅足已成則不堪用詳此木上作房蓋𤬈𤬏類也而今宣城蜂子乃掘地取之似土蜂也故郭璞注爾雅土蜂云今江東呼大蜂在地中作房者為土蜂啖其子即馬蜂荊巴間呼為蟺音憚又注木蜂云似土蜂而小在木上作房江東人亦呼木蜂人食其子然則二蜂子皆可食久矣大抵蜂類皆同科其性效不相遠矣禮記曰爵鷃蜩範注云蜩蟬也範蜂也蜜蠟味甘微溫無毒主下痢膿血補中續絶傷金瘡益氣不飢耐老白蠟療久泄澼後重見白膿補絶傷利小兒久服輕身不飢生武都山谷生於蜜房木石間惡芫花齊蛤陶隱居云此蜜蠟爾生於蜜中故謂蜜蠟蜂皆先以此為蜜跖音只煎蜜亦得之初時極香軟人更煮煉或加少醋酒便黃赤以作燭色為好今藥家皆應用白蠟但取削之於夏月日曝百日許自然白卒用之亦可煬納水中十餘過亦白俗方唯以合療下丸而仙經斷谷最為要用今人但嚼食方寸者亦一日不飢也唐本注云除蜜字為佳蜜已見石蜜條中也臣禹錫等謹按藥性論云白蠟使味甘平無毒主妊孕婦人胎動漏下血不絶欲死以蠟如雞子大煎消三五沸美酒半斤投之服之瘥主白髮鑷去消蠟點孔中即生黑者和松脂杏仁棗肉茯苓等分合成食後服五十丸便不飢功用甚多又云主下痢膿血圖經文具石蜜條下葛氏方治犬咬人重發療之火炙蠟灌入瘡中又方治狐尿刺入腫痛用熱蠟著瘡中又煙燻之令汁出即便愈千金翼療伐指以蠟松膠相和火炙籠伐指即瘥經驗方湖南押衙顏思退傳頭風掣疼蠟二斤鹽半斤相和於鏭羅中熔令相入捏作一兜鍪勢可合腦大小搭頭至額頭痛立止集驗方治雀目如神黃蠟不以多少器內熔成汁取出入蛤粉相和得所成球每用以刀子切下二錢以豬肝二兩批開摻藥在內麻繩扎定水一碗同入銚子內煮熟取出乘熱熏眼至溫冷並肝食之日二以平安為度姚和衆治小兒腳凍如有瘡即濃煎蠟塗之衍義文具石蜜條下牡蠣味鹹平微寒無毒主傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠瘻女子帶下赤白除留熱在關節營衛虛熱去來不定煩滿止汗心痛氣結止渴除老血澀大小腸止大小便療泄精喉痹咳嗽心脅下痞熱久服強骨節殺邪鬼延年一名蠣蛤一名牡蛤生東海池澤採無時貝母為之使得甘草牛膝遠志蛇床良惡麻黃吳茱萸辛荑陶隱居云是百歲雕所化以十一月採為好去肉二百日成今出東海永嘉晉安皆好道家方以左顧者是雄故名牡蠣右顧則牝蠣爾生著石皆以口在上舉以腹向南視之口邪向東則是或云以尖頭左顧者未詳孰是例以大者為好又出廣州南海亦如此但多右顧不用爾丹方以泥釜皆除其甲口只取朏朏如粉處爾俗用亦如之彼海人皆以泥煮鹽釜耐水火而不破漏今按陳藏器本草云牡蠣搗為粉粉身主大人小兒盜汗和麻黃根蛇床子乾薑為粉去陰汗肉煮食主虛損婦人血氣調中解丹毒肉於薑醋中生食之主丹毒酒後煩熱止渴天生萬物皆有牝牡唯蠣是鹹水結成塊然不動陰陽之道何從而生經言牡者應是雄者臣禹錫等謹按蜀本云又有蟲雩音樗蠣形短不入藥用圖經云海中蚌屬以牡者良今萊州昌陽縣海中多有二月三月採之藥性論云牡蠣君主治女子崩中止盜汗除風熱止痛治溫瘧又和杜仲服止盜汗末蜜丸服三十丸令人面光白永不值時氣主鬼交精出病人虛而多熱加用之並地黃小草孟詵云牡蠣火上炙令沸去殼食之甚美令人細肌膚美顏色又藥家比來取左顧者若食之即不揀左右也可長服之海族之中唯此物最貴北人不識不能表其味爾段成式酉陽雜俎云牡蠣言牡非謂雄也圖經曰牡蠣生東海池澤今海旁皆有之而南海閩中及通泰間尤多此物附石而生塊礧相連如房故名蠣房讀如阿房之房一名蠔山晉安人呼為蠔莆初生海邊才如拳石四面漸長有一二丈者嶄岩如山每一房內有蠔肉一塊肉之大小隨房所生大房如馬蹄小者如人指面每潮來則諸房皆開有小蟲入則合之以充腹海人取之皆鑿房以烈火逼開之挑取其肉而其殼左顧者雄右顧者則牝蠣耳或曰以尖頭為左顧大抵以大者為貴十一月採左顧者入藥南人以其肉當食品其味尤美好更有益兼令人細肌膚美顏色海族之最可貴者也海藥云按廣州記云出南海水中主男子遺精虛勞乏損補腎正氣止盜汗去煩熱治傷熱疾能補養安神治孩子驚癇久服身輕用之炙令微黃色熟後研令極細入丸散中用雷公云有石牡蠣石魚蠣真海牡蠣石牡蠣者頭邊背大小甲沙石真似牡蠣只是圓如龜殼海牡蠣使得只是丈夫不得服令人無髭真牡蠣火煅白炮並用醫試之隨手走起可認真是萬年珀號曰醫用之妙凡修事先用二十個東流水鹽一兩煮一伏時後入火中燒令通赤然後入鉢中研如粉用也肘後方大病瘥後小勞便鼻衄牡蠣十分石膏五分搗末酒服方寸匕日三四亦可蜜丸如梧子大服之經驗方治一切渴大牡蠣不計多少於臘日端午日黃泥裹煅通赤放冷取出為末用活鯽魚煎湯調下一錢匕小兒服半錢匕只兩服瘥又方治一切丈夫婦人瘰癧經效牡蠣用炭一稱煅通赤取出於濕地上用紙襯出火毒一宿取四兩玄參三兩都搗羅為末以麵糊丸如梧桐子早晚食後臨臥各三十丸酒服藥將服盡癧子亦除根本又方除盜汗及陰汗牡蠣為末有汗處粉之勝金方治甲疽弩肉裹甲膿血疼痛不瘥牡蠣頭厚處生研為末每服二錢研殿花酒調下如癰盛已潰者以末敷之仍更服藥並一日三服初虞世治瘰癧發頸項破未破甚效如神牡蠣四兩甘草二兩為末每服一大錢食後臘茶同點日二又方治水㿗偏大上下不定疼痛牡蠣不限多少鹽泥固濟炭三斤煅令火盡冷取二兩乾薑一兩炮又為細末用冷水調稀稠得所塗病處小便大利即愈集驗方治癰一切腫未成膿拔毒牡蠣白者為細末水調塗干更塗傷寒類要療髓疽日䀽深嗜臥牡蠣澤瀉主之衍義曰牡蠣須燒為粉用兼以麻黃根等分同搗研為極細末粉盜汗及陰汗本方使生者則自從本方左顧經中本不言只從陶隱居說其酉陽雜俎已言牡蠣言牡非為雄也且如牡丹豈可更有牝丹也今則合於地人面向午位以牡蠣頂向天視之口牝口在左者為左顧此物本無目如此焉得更有顧盼也龜甲味鹹甘平有毒主漏下赤白破癥瘕痎音皆瘧五痔陰蝕濕痹四肢重弱小兒囟音信不合頭瘡難燥女子陰瘡及驚恚氣心腹痛不可久立骨中寒熱傷寒勞復或肌體寒熱欲死以作湯良久服輕身不飢益氣資智亦使人能食一名神屋生南海池澤及湖水中採無時勿令中濕中濕即有毒惡沙參蜚蠊陶隱居云此用水中神龜長一尺二寸者為善厭可以供卜殼可以充藥亦入仙方用之當炙生龜溺甚療久嗽亦斷瘧肉作羹臛大補而多神靈不可輕殺書家載之甚多此不具說也唐本注云龜取以釀酒主大風緩急四肢拘攣或久癱緩不收攝皆瘥臣禹錫等謹按蜀本注圖經云江河湖水龜也湖州江州交州者皆骨白而厚色分明並堪卜其入藥者得便堪用今所在皆有肉亦堪釀酒也蕭炳云殼主風腳弱炙之末酒服藥性論云龜甲畏狗膽無毒燒灰治小兒頭瘡不燥骨帶入山令人不迷血治脫肛灰亦治脫肛日華子云卜龜小者腹下可卜鑽遍者名敗龜治血麻痹入藥酥炙用又名敗將圖經文具秦龜條下食療云溫味酸主除溫瘴氣風痹身腫踒折又骨帶入山林中令人不迷路其食之法一如鱉法也其中黑色者常啖蛇不中食之其殼亦不堪用其甲能主女人漏下赤白崩中小兒囟不合破癥瘕痎瘧療五痔陰蝕濕痹女子陰隱瘡及骨節中寒熱煮汁浴漬之良又以前都用水中龜不用啖蛇龜五月五日取頭乾末服之亦令人長遠入山不迷又方卜師處鑽了者塗酥炙細羅酒下二錢療風疾肘後方治卒得咳嗽生龜三枚治如食法去腸以水五升煮取三升以漬曲釀米四升如常法熟飲二升令盡此則永斷經驗方治産後産前痢敗龜一枚用米醋炙搗為末米飲調下孫真人云治小兒龜背以龜尿摩胸背上瘥孫真人食忌十二月勿食龜肉損命不可輒食殺人子母祕録令子易産燒龜甲末酒服方寸匕抱朴子云千歲靈龜五色具焉其雄額上兩骨起似角以羊血浴之乃剔取其甲炙搗服方寸匕日三盡一具衍義文具秦龜條下秦龜味苦無毒主除濕痹氣身重四肢關節不可動搖生山之陰土中二月八月取陶隱居云此即山中龜不入水者形大小無定方藥不甚用龜類雖多入藥正有兩種爾又有鴦龜小狹長尾乃言療蛇毒以其食蛇故也用以卜則吉凶正反帶秦龜前臛乃到切骨令人入山不迷廣州有蟕子夷切蠵以規切其血甚療俚人毒箭傷唐本注云𪚻龜腹折見蛇則呷而食之荊楚之間謂之呷蛇龜也秦龜即蟕蠵是更無別也今按陳藏器本草云龜溺主耳聾滴耳中瘥臣禹錫等謹按蜀本圖經云今江南嶺南並有冬月藏土中春夏秋即遊溪谷今據爾雅攝龜即小龜也腹下曲折能自開閉好食蛇江東呼為陵龜即夾蛇龜也又靈龜出涪陵郡大甲可以卜似玳瑁即蟕蠵龜也一名靈蠵能鳴今蘇言秦龜即蟕蠵非為通論且陶注蟕蠵但療箭毒則與本經主治不同又陶注秦龜即山中龜不入水者而云秦龜應以地名為別故也陳藏器云蘇云秦龜即是蟕蠵按蟕蠵生海水中生山陰者非蟕蠵矣今秦龜是山中大龜如碑下者食草根竹筍深山谷有之卜人取以占山澤漢書十朋有山龜即是此也揭取甲亦如蟕蠵堪飾器物陳土良云𪚻龜腹下橫折秦人呼蟕蠵山龜是也肉寒有毒主筋脈凡撲損便取血作酒食肉生研厚塗立效日華子云蟕蠵平微毒治中刀箭悶絶刺血飲便瘥皮甲名鼊皮治血疾若無生血煎汁代之亦可寶裝飾物又云夾蛇龜小黑中心折者無用不可食肉可生搗罯敷蛇毒圖經曰秦龜山中龜不入水者是也生山之陰土中或云秦以地稱云生山之陰者是秦地山陰也今處處有之龜甲水中神龜也生南海池澤及湖水中今江湖間並皆有之山中龜其形大小無定大者有如碑跌食草根竹萌冬月藏土中至春而出遊山谷中今市肆間人或畜養為玩至冬而埋土穴中然藥中稀用卜人亦取以占山澤揭取其甲亦堪飾器物爾雅所謂山龜者豈是此歟水中龜其骨白而厚色至分明所以供卜人及入藥用以長一尺二寸為善爾雅亦有水龜又一種𪚻龜小狹長尾腹下有橫折見蛇則呷而食之江東人謂之陵龜即爾雅所謂小龜也亦入藥用能療蛇毒又一種蟕子夷切蠵以規切大甲可以卜即爾雅所謂靈龜也陶蘇以此為秦龜按嶺表録異云蟕蠵俗謂之茲夷蓋山龜之大者人立背上可負而行潮循間甚多鄉人取殼以生得全者為貴初用木楔其肉龜被楚毒鳴吼如牛聲動山谷工人以其甲通明黃色者煮拍陷玳瑁為器今所謂龜筒者是也據此乃別是一種山龜未必是此秦龜也其入藥亦以生脫者為上凡龜之類甚多而時人罕復遍識蓋近世貨幣所不用而知卜術者亦稀唯醫方時用龜甲故爾弗貴矣方書中又多用敗龜取鑽灼之多者一名漏天機一說入藥須用神龜神龜底殼當心前有一處四方透明如琥珀色者是矣其頭方殼圓腳短者為陽龜形長頭尖腳長者為陰龜陰人用陽陽人用陰今醫家亦不復如此分別也又藥中用龜尿最難得孫光憲北夢瑣言載其說云道士陳釗言龜之性妒而與蛇交或雌蛇至有相趁鬥噬力小者或至斃採時取雄龜於瓷碗中或小盤中置之於後以鑑照龜既見鑒中影往往淫發而失尿急以物收取又以紙炷火上熁熱以點其尻亦致失尿然不及鑑照之快也陳藏器蟕蠵秦龜注陶云廣州有蟕蠵其血主俚人毒箭按蟕蠵人被毒箭傷煩悶欲死者剖取血敷傷處此是焦銅及螯汁毒南人多養用之似龜生海邊有甲紋堪為物飾海藥云謹按正經云生在廣州山谷其殼味帶苦治婦人赤白漏下破積症頑風冷痹關節氣壅或經卜者更妙凡甲炙令黃然後入藥中抱朴子蠳龜啖蛇南從皆帶蠳龜之尾以闢蛇蛇中人刮此物以敷之其瘡亦使愈衍義曰秦龜即生於秦者秦地山中多老龜極大而壽龜甲即非只秦地有四方皆有之但取秦地所出大者為勝今河北獨流釣臺甚多取龜筒治療亦入衆藥只此二種各逐本條以其靈於物方家故用以補心然甚有驗珍珠寒無毒主手足皮膚逆臚鎮心綿裹塞耳主聾敷面令人潤澤好顏色粉點目中主膚翳障膜今附臣禹錫等謹按藥性論云珍珠君治眼中翳障白膜七寶散用磨翳障亦能墜痰日華子云珍珠子安心明目駐顏色也圖經曰珍珠本經不載所出州土今出廉州北海亦有之生珠牡俗謂之珠母珠牡蚌類也按嶺表録異廉州邊海中有洲島島上有大池謂之珠池每歲刺史親監珠戶入池採老蚌割取珠以充貢池雖在海上而人疑其底與海通池水乃淡此不可測也土人採小蚌肉作脯食之往往得細珠如米者乃知此池之蚌隨大小皆有珠矣而今取珠牡云得之海旁不必是珠池中也其北海珠蚌種類小別人取其肉或有得珠者但不常有其珠亦不甚光瑩藥中不堪用又蚌屬中有一種似江珧者其腹亦有珠皆不及南海者奇而且多入藥須用新完未經鑽綴者為佳海藥云謹按正經云生南海石決明産出也主明目除面䵟止泄合知母療煩熱消渴以左纏根治兒子麩豆瘡入眼蜀中西路女瓜亦出珍珠是蚌蛤産光白甚好不及舶上彩耀欲穿須得金剛鑽也為藥須久研如粉面方堪服餌研之不細傷人腑腑雷公云須取新淨者以絹袋盛之然後用地榆五花皮五方草三味各四兩細銼了又以牡蠣約重四五斤以來先置於平底鐺中以物四向搘令穩然後著珍珠於上了方下銼了三件藥籠之以漿水煮三日夜勿令火歇日滿出之用甘草湯淘之令淨後於臼中搗令細以絹羅重重篩過卻更研二丸下了用凡使要不傷破及鑽透者方可用也外臺祕要療子死腹中方珍珠二兩為末酒調服盡立出千金方治兒胞衣不出苦酒服珍珠末一兩又方難産取珍珠末一兩和酒服之立出肘後方卒忤停尸不能言珍珠末以雞冠血和丸小豆大以三四粒納口中又方主鎮安魂魄珠蜜方煉珍珠如大豆以蜜一蜆殼和一服與一豆許日三大宜小兒矣抱朴子珍珠徑寸以上可服服之可以長久酪漿漬之皆化如水銀亦可以浮石水蜂窠鱟化包彤蛇黃合之可以引長三四尺丸服之絶谷得長生衍義曰珍珠小兒驚熱藥中多用河北壙濼中亦有圍及寸者色多微紅珠母與廉州珠母不相類但清水急流處其色光白水濁及不流處其色暗余如經玳瑁寒無毒主解嶺南百藥毒俚人刺其血飲以解諸藥毒大如帽似龜甲中有紋生嶺南海畔山水間今附臣禹錫等謹按陳士良云玳瑁身似龜首觜如鸚鵡肉平主諸風毒行氣血去胸膈中風痰鎮心脾逐邪熱利大小腸通婦人經脈甲殼亦似肉同療心風邪解煩熱日華子云破癥結消癰毒止驚癇等疾圖經曰玳瑁生嶺南山水間今亦出廣南蓋龜類也唯腹背甲皆有紅點斑紋其大者有如盤入藥須生者乃靈帶之亦可以闢蠱毒凡遇飲食有毒則必自搖動死者則不能神矣昔唐嗣薛王之鎮南海海人有獻生玳瑁者王令揭取上甲二小片繫於左臂欲以闢毒玳瑁甚被楚毒復養於使宅後池伺其揭處復生還遣送舊處並無傷矣今人多用雜龜筒作器皿皆殺取之又經煮拍生者殊不易得頃有自嶺表罷官得生玳瑁畜養且久攜以北歸北人多有識者又有一種𪓟鼊亦玳瑁之類也其形如笠四足縵胡無指其甲有黑珠紋彩亦好但薄而色淺不任作器唯堪貼飾耳今人謂之鼊皮不入藥用陳藏器云大如扇似龜甲有紋余並同楊氏産乳療中蠱毒生玳瑁以水磨如濃飲服一盞即解衍義曰玳瑁治心經風熱生者入藥蓋性味全也既入湯火中即不堪用為器物者矣與生熟犀其義同桑螵蛸味鹹甘平無毒主傷中疝瘕陰痿益精生子女子血閉腰痛通五淋利小便水道又療男子虛損五臟氣微夢寐失精遺溺久服益氣養神一名蝕疣音尤生桑枝上螳螂子也二月三月採蒸之當火炙不爾令人泄得龍骨療泄精畏旋覆花陶隱居云俗呼螳螂為䖨音石螂逢樹便産以桑上者為好是兼得桑皮之津氣市人恐非真皆令合枝斷取之爾僞者亦以膠著桑枝之上也臣禹錫等謹按蜀本圖經云此物多在小桑樹上叢荊棘間並螳螂卵也三月四月中一枝出小螳螂數百枚以熱漿水浸之一伏時焙乾於柳木灰中炮令黃色用之藥性論云桑螵蛸臣畏戴椹主男子腎衰漏精精自出患虛冷者能止之止小便利火炮令熱空心食之虛而小便利加而用之圖經云桑螵蛸螳螂子也本經不載所出州土今在處有之螳螂逢木便産一枚出子百數多在小木荊棘間桑上者兼得桑皮之津氣故以為佳而市之貨者多非真須連枝折之為驗然僞者亦能以膠著桑枝上入藥不宜也三月四月採蒸過收之亦火炙不爾則令人泄一法採得便以熱漿水浸一伏時焙乾更於柳木灰中炮令黃用之爾雅云莫貉戶各切螳螂蛑郭璞云螳螂有斧蟲江東呼為石螂又云不過蟷丁郎切蠰息詳切蟷蠰螳螂別名也其子蜱音裨蛸音蕭一名䗚普莫切蟭音焦蟷蠰卵也古今方漏精及主風藥中多用之雷公云凡使勿用諸雜樹上生者螺螺不入藥中用凡採覓須桑樹東畔枝上者採得去核子用沸漿水浸淘七遍令水遍沸於瓷鍋中熬令乾用勿亂別修事卻無效也經驗方治底耳方用桑螵蛸一個慢火炙及八分熟存性細研入麝香一字為末摻在耳內每用半字如神效如有膿先用綿包子拈去次後摻藥末入在耳內産書治妊娠小便數不禁桑螵蛸十二枚搗為散分作兩服米飲下楊氏産乳同又方療小便不通及胞轉桑螵蛸搗末米飲服方寸匕日三衍義曰桑螵蛸自採者真市中所售者恐不得盡皆桑上者蜀本圖經浸炮之法不若略蒸過為佳鄰家有一男子小便日數十次如稠米泔色亦白心神恍惚瘦瘁食減以女勞得之今服此桑螵蛸散未終一劑而愈安神魂定心忐治健忘小便數補心氣桑螵蛸遠志菖蒲龍骨人參茯神當歸龜甲醋炙以上各一兩為末夜臥人參湯調下二錢如無桑上者即用余者仍須以炙桑白皮佐之量多少可也蓋桑白皮行水意以接螵蛸就腎經用桑螵蛸之意如此然治男女虛損益精陰痿夢失精遺溺疝瘕小便白濁腎衰不可闕也石決明味鹹平無毒主目障翳痛青盲久服益精輕身生南海陶隱居云俗云是紫貝定小異亦難得又云是鰒步角切魚甲附石生大者如手明耀五色內亦含珠人今皆水漬紫貝以尉眼頗能明此一種本亦附見在決明條甲既是異類今為副品也唐本注云此物是鰒魚甲也附石生狀如蛤唯一片無對七孔者良今俗用者紫貝全別非此類也今注石決明生廣州海畔殼大者如手小者如三兩指其肉南人皆啖之亦取其殼以水漬洗眼七孔九孔者良十孔以上者不佳謂是紫貝及鰒魚甲並誤矣臣禹錫等謹按蜀本云石決明寒又注云鰒魚主咳嗽啖之明目又圖經云今出萊州即墨縣南海內三月四月採之日華子云石決明涼明目殼磨障翳亦名九孔螺也圖經曰石決明生南海今嶺南州郡及萊州皆有之舊說或以為紫貝或以鰒魚甲按紫貝即今人砑螺古人用以為貨幣者殊非此類鰒魚王莽所食者一邊著石光明可愛自是一種與決明相近耳決明殼大如手小者三兩指海人亦啖其肉亦取其殼漬水洗眼七孔九孔者良十孔者不佳採無時海藥云主青盲內障肝肺風熱骨蒸勞極並良凡用先以麵裹熟煨然後磨去其外黑處並粗皮了爛搗之細羅於乳鉢中再研如面方堪用也雷公云凡使即是珍珠母也先去上粗皮用鹽並東流水於大瓷器中煮一伏時了漉出拭乾搗為末研如粉卻入鍋子中再用五花皮地榆阿膠三件更用東流水於瓷器中如此淘之三度待乾再研一萬匝方入藥中用凡修事五兩以鹽半分取則第二度煮用地榆五花皮阿膠各十兩服之十兩永不得食山桃令人喪目也勝金方治小腸五淋石決明去粗皮甲搗研細右件藥如有軟硬物淋即添朽木細末熟水調下二錢匕服衍義曰石決明經云味鹹即是肉也人採肉以供饌及干致都下北人遂為珍味肉與殼兩可用方家宜審用之然皆治目殼研水飛點磨外障翳登萊州甚多海蛤味苦咸平無毒主咳逆上氣喘息煩滿胸痛寒熱療陰痿一名魁蛤生東海蜀漆為之使畏狗膽甘遂芫花唐本注云此物以細如巨勝潤澤光淨者好有粗如半杏仁者不入藥用亦謂為豚耳蛤粗惡不堪也今按別本注云雁腹中出者極光潤主十二水滿急痛利膀胱大小腸粗者如半片郁李仁不任用亦名豚耳臣禹錫等謹按蜀本圖經云今萊州即墨縣南海沙湍中四月五月採淘沙取之當以半天河煮五十刻然後以枸杞子汁和䈽竹筒盛蒸一伏時勿用遊波蟲骨似海蛤而面上無光誤食之令人狂眩用醋蜜解之即愈吳氏云海蛤神農苦歧伯甘扁鵲咸大節頭有紋紋如磨齒採無時蕭炳云止消渴潤五臟治服丹石人有瘡藥性論云海蚧亦白海蛤臣亦名紫薇味鹹有小毒能治水氣浮腫下小便治嗽逆上氣主治項下瘤癭日華子云治嘔逆陰痿胸脅脹急腰痛五痔婦人崩中帶下病此即鮮蛤子雁食後糞中出有紋彩者為文蛤無紋彩者為海蛤鄉人又多將海岸邊爛蛤殼被風濤打磨瑩滑者僞作之圖經曰海蛤文蛤並生東海今登萊滄州皆有之陶隱居以細如巨勝潤澤光淨者為海蛤云經雁食之從糞中出過數多故有光澤也以大而有紫斑紋者為文蛤陳藏器以為海蛤是海中爛殼久為風波濤洗自然圓淨此有大小而久遠者為佳不必雁腹中出也文蛤是未爛時殼猶有紋理者此乃新舊不同正一物而二名也然海蛤難得真爛久者海人多以它蛤殼經風濤摩蕩瑩滑者僞作之殊無力又有一種遊波骨極類海蛤但少瑩澤誤食之令人狂眩用醋蜜解之則愈本經海蛤一名魁蛤又別有魁蛤條云形正圓兩頭空表有紋乃別是一種也按說文曰千歲燕化為海蛤魁蛤即是伏翼所化故一名伏老並採無時張仲景傷寒論曰病在陽應以汗解反以冷水潠之若水灌之其熱被卻不得去彌更益煩皮上粟起意欲水反不渴者文蛤散主之文蛤五兩一味搗篩以沸湯和一方寸匕服湯用五合此方醫家多用殊效雷公云凡使勿用遊波菌骨其蟲骨真似海蛤只是無面上光其蟲骨誤餌之令人狂走擬投水時人為之犯鬼心狂並不是緣曾誤餌此蟲骨若服著只以醋解之立瘥凡修事一兩於漿水中煮一伏時後卻以地骨皮柏葉二味又煮一伏時後出於東流水中淘三遍拭乾細搗研如粉然後用凡一兩用地骨皮二兩並細銼以東流水淘取用之衍義曰海蛤文蛤陳藏器所說是今海中無雁豈有食蛤糞出者若蛤殼中有肉時尚可食肉既無焉得更有糞中過數多者必為其皆無廉稜乃有是說殊不知風浪日夕淘汰故如是治傷寒汗不溜搐卻手腳海蛤川烏頭各一兩穿山甲二兩為末酒糊和丸大一寸許捏扁置所患足心下擘蔥白蓋藥以帛纏定於暖室中取熱水浸腳至膝上久則水溫又添熱水候遍身汗出為度凡一二日一次浸腳以知為度文蛤味鹹平無毒主惡瘡蝕五痔咳逆胸痹腰痛脅急鼠瘻大孔出血崩中漏下生東海表有紋取無時陶隱居云海蛤至滑澤云從雁屎中得之二三十過方為良今人多取相摝令磨蕩似之爾文蛤小大而有紫斑此既異類而同條若別之則數多今以為附見而在副品限也凡有四物如此唐本注云文蛤大者圓三寸小者圓五六分若今婦人以置胭脂者殊非海蛤之類也夫天地間物無非天地間用豈限其數為正副耶今按陳藏器本草云海蛤主水癊取二兩先研三日漢防己棗肉杏仁二兩葶藶子六兩熬研成脂為丸一服十丸利下水臣禹錫等謹按蜀本圖經云背上有斑紋者今出萊州掖縣南海中三月中旬採蕭炳云出密州陶隱居云按海蛤是海中爛殼久在泥沙風波淘漉自然圓淨有大有小以小者久遠為佳亦非一一從雁腹中出也文蛤是未爛時殼猶有紋者此乃新舊為名二物元同一類假如雁食蛤殼豈擇紋與不紋蘇恭此言殊為未達至如爛蜆蚌殼亦有所主與生不同陶云副品正其宜矣說文曰千歲燕化為海蛤一名伏老伏翼化為今亦生子滋長也圖經文具海蛤條下千金翼治急疳蝕口鼻數日盡欲死燒文蛤灰臘月脂和塗之衍義文具海蛤條下魁蛤味甘平無毒主痿痹泄痢便膿血一名魁陸一名活東生東海正圓兩頭空表有紋取無時陶隱居云形似紡軖音狂小狹長外有縱橫紋理云是老蝙蝠化為用之至少而本經海蛤一名魁蛤與此為異也臣禹錫等謹按蜀本圖經云形圓長似大腹檳榔兩頭有孔今出萊州圖經文具海蛤條下食療寒潤五臟治消渴開關節服丹石人食之使人免有瘡腫及熱毒所生也蠡音禮魚味甘寒無毒主濕痹面目浮腫下大水療五痔有瘡者不可食令人瘢音盤白一名鮦音銅魚生九江池澤取無時陶隱居云今皆作鱧字舊言是公蠣蛇所變然亦有相生者至難死猶有蛇性合小豆白煮以療腫滿甚效唐本注云別録云腸及肝主久敗瘡中蟲諸魚灰並主哽噎也臣禹錫等謹按孟詵云鱧魚下大小便擁塞氣又作膾與腳氣風氣人食之效又以大者洗去泥開肚以胡椒末半兩切大蒜三兩顆納魚腹中縫合並和小豆一升煮之臨熟下蘿蔔三五顆如指大切蔥一握煮熟空腹服之並豆等強飽盡食之至夜即泄氣無限三五日更一頓下一切惡氣又十二月作醬良也日華子云鱧魚腸以五味炙貼痔瘻及蚛骭良久蟲出即去之諸魚中唯此膽甘可食圖經曰蠡通作鱧字魚生九江池澤今處處有之陶隱居以為公蠣蛇所變至難死猶有蛇性謹按爾雅鱧鯇郭璞注云鱧鮦音同也釋者曰鱧鯇也詩小雅云魚麗於罶魴鱧毛傳云鱧鯇也正義云諸本或作鱧䱰音重也陸機謂鯇即鱧魚也似鱧狹而厚今京東人猶呼䱰魚其實一類也據上所說則似今俗間所謂黑鱧魚者亦至難死形近蛇類浙中人多食之然本經著鱧魚主濕痹下水而黑鱧魚主婦人妊娠千金方有安胎單用黑鱧魚湯方而本經不言有此功用恐是漏落耳肝腸亦入藥諸魚膽苦唯此膽味甘可食為異也又下鮑魚條據陶蘇之說乃似今漢沔間所作淡乾魚味辛而臭者蘇又引李當之本草亦言胸中濕者良其以暴魚不以鹽外雖干而魚肥故中濕也中濕則彌臭矣一說鮑魚自是一種形似小鱅魚生海中氣最臭秦始皇取置車中者是也此說雖辨亦無的據素問治血枯雀卵丸飲鮑魚汁以利腸中外臺祕要療患腸痔每大便常有血鱧魚膾姜齏食之佳任性多少瘥忌冷毒物又方療痔鱧魚腸三具炙令香以綿裹納穀道中一食頃蟲當出魚腸數易之盡三枚瘥食醫心鏡治十種水氣病不瘥垂死鱧魚一頭重一斤以上右熟取汁和冬瓜蔥白作羹食之又方治野雞病下血不止腸疼痛鱧魚一頭如食法作膾蒜齏食之靈苑方治急喉閉逡巡不救者蠡魚膽臘月收陰乾為末每服少許點患處藥至即瘥病深則水調灌之衍義曰蠡魚今人謂之黑鯉魚道家以謂頭有星為厭世有知之者往往不敢食又發故疾亦須忌爾今用之療病亦只取其一端耳鮧音夷又音題魚味甘無毒主百病陶隱居云此是鯷音題也今人皆呼慈音即是鮎乃兼切魚作臛食之云補又有鱯魚相似而大又有鮠五回切魚亦相似黃而美益人其合鹿肉及赤目赤須無鰓者食之並殺人又有人魚似鯷而有四足聲如小兒食之療瘕疾其膏燃之不消耗始皇驪山冢中用之謂之人膏也荊州臨沮青溪至多此魚唐本注云鮧魚一名鮎魚一名鯷魚主水浮腫利小便也臣禹錫等謹按蜀本圖經云有三種口腹俱大者名鱯音護背青而口小者名鮎口小背黃腹白者名鮠一名河豚三魚堪為臛美而且補陳士良云鮧魚暖圖經曰鮧音夷又音題魚舊不著所出州土今江浙多有之大首方口背青黑無鱗多涎其類有三陶隱居云即鯷音題魚也鯷即鮎乃兼切魚也又有鱯音護魚相似而大鮠五回切魚亦相似色黃而美三種形性皆相類而小不同也鮎亦名鰋詩小雅云魚麗於罶鰋鱧傳云鰋鮎也爾雅釋魚鰋鮎郭璞注云今鰋額白魚鮎別名鯷江東通呼鮎為鮧是也今江浙多食之不可與牛肝合食令人患風多噎涎主三消取生魚涎溲黃連末作丸飯後烏梅煎飲下五七丸渴便頓減鱯四季不可食又不可與野豬肉合食令人吐瀉鮠秦人呼為䲚魚能動痼疾不可與野雞野豬肉合食令人患癩此三魚大抵寒而有毒非食品之佳味也食療鮎與鱯大約相似主諸補益無鱗有毒勿多食赤目赤須者並殺人也千金翼治刺傷中毒水燒魚目灰塗之衍義曰鮧魚形少類獺有四足腹重墜如囊身微紫色嘗剖之中有三小蟹又有四五小石塊如指面許小魚五七枚然無鱗與鮎鮠相類今未見用者鯽魚主諸瘡燒以醬汁和塗之或取豬脂煎用又主腸癰頭灰臣禹錫等謹按藥對云頭溫主小兒頭瘡口瘡重舌目翳一名鮒音父魚合蓴作羹主胃弱不下食作膾主久赤白痢唐本先附臣禹錫等謹按蜀本云鯽魚味甘溫止下痢多食亦不宜人又注云形亦似鯉色黑而體促肚大而脊隆所在池澤皆有之孟詵云鯽魚平胃氣調中益五臟和蓴作羹食良又鯽魚與䲙其狀頗同味則有殊䲙是節化鯽是稷米化之其魚腹上尚有米色寬大者是鯽背高腹狹小者是䲙其功不及鯽魚子調中益肝氣爾日華子云鯽魚平無毒溫中下氣補不足作膾療腸澼水穀不調及赤白痢燒灰以敷惡瘡良又釀白礬燒灰治腸風血痢頭燒灰療嗽又云子不宜與豬肉同食圖經曰鯽魚本經不載所出州土今所在池澤皆有之似鯉魚色黑而體促肚大而脊隆亦有大者至重二三斤性溫無毒諸魚中最可食或云稷米所化故其腹尚有米色又有一種背高腹狹小者名䲙魚功用亦與鯽同但力差劣耳又黔州有一種重唇石鯽魚亦其類也陳藏器云頭主咳嗽燒為末服之肉主虛羸五味熟煮食之膾亦主赤白痢及五野雞病食療食之平胃氣調中益五臟和蓴作羹良作膾食之斷暴下痢和蒜食之有少熱和薑醬食之有少冷又夏月熱痢可食之多益冬月中則不治也骨燒為灰敷䘌瘡上三五度瘥謹按其子調中益肝氣凡魚生子皆黏在草上及土中寒冬月水過後亦不腐壞每到五月三伏時雨中便化為魚食鯽魚不得食沙糖令人成疳蟲丹石熱毒發者取茭首和鯽魚作羹食一兩頓即瘥聖惠方治小兒腦疳鼻癢毛髮作穗面黃羸瘦益腦用鯽魚膽滴於鼻中連三五日甚效外臺祕要治患腸痔大便常有血食鯽魚羹及隨意任作飽食孫真人同千金方小兒頭無發燒鯽魚末醬汁和敷之梅師方鯽魚不可合豬肝食孫真人治牙齒疼取鯽魚納鹽花於肚中燒作灰末敷之即瘥又方主惡核腫不散取鮮鯽魚杵敷之又方主腳氣及上氣取鯽魚一尺長者作膾食一兩頓瘥食醫心鏡治脾胃氣冷不能下食虛弱無力鶻突羹鯽魚半斤細切起作膾沸豉汁熱投之著胡椒乾薑蒔蘿桔皮等末空心食之集驗方熱病瘥後百日食五辛者必目暗鯽魚作臛熏之子母祕録治小兒面上忽生瘡黃水出鯽魚頭燒末和醬清汁敷日易之又方小兒丹鯽魚肉細切五合小豆搗屑二合和更杵如泥和水敷之楊氏産乳療妊娠時行傷寒鯽魚一頭燒作灰酒服方寸匕汗出瘥傷寒類要同又方中風寒熱腹中絞痛以干鯽魚一頭燒作末三指撮以苦酒服之溫復取汗良衍義曰鯽魚開其腹納藥燒之治齒鱔音善魚味甘大溫無毒主補中益血療沈音審唇五月五日取頭骨燒之止痢陶隱居云鱔是荇芩根化作之又云是人發所化今其腹中自有子不必盡是變化也性熱作臛食之亦補而時行病起食之多復又喜令人霍亂凡此水族魚蝦之類甚多其有名者已注在前條雖皆可食而甚損人故不入藥用又有食之反能致病者今條注如後說凡魚頭有白色如連珠至脊上者腹中無膽者頭中無鰓者並殺人魚汁不可合鸕鷀肉食之鯽魚不可合猴雉肉食之鰍音秋鱔不可合白犬血食之鯉魚子不可合豬肝食之鯽魚亦爾青魚䲙不可合生胡荽及生葵並麥醬食之蝦無須及腹下通黑及煮之反白皆不可食生蝦膾不可合雞肉食之亦損人又有鯆音脯魮音秕亦益人尾有毒療齒痛又有䱀烏郎切䰲乙八切魚至能醒酒鯸音候鮧魚有毒不可食唐本注云別録云干鱔頭主消渴食不消去冷氣除痞疹其穿魚繩主竹木屑入目不出穿鮑魚繩亦主眯目去刺煮汁洗之大良也今按陳藏器本草云鱔魚主濕痹氣補虛損婦人産後淋瀝血氣不調羸瘦止血除腹中冷氣腸鳴也臣禹錫等謹按蜀本圖經云似鰻鱺魚而細長亦似蛇而無鱗有青黃二色生水岸泥窟中所在皆有之孟詵云鱔魚補五臟逐十二風邪患惡氣人常作臛空腹飽食便以衣蓋臥少頃當汗出如白膠汗從腰腳中出候汗盡暖五木湯浴須慎風一日更三五日一服並治濕風陳藏器云血主癬及瘻斷取血塗之夏月於淺水中作窟如蛇冬蟄夏出宜臛食之證俗音鱔魚音善字或作鱔諸書皆以鱣為鱔本經以鱣為鱔仍足魚字殊為誤也風土記云鱔魚夏出冬螫亦以氣養和實時節也顏氏家訓云後漢書鸛雀銜三鱔魚音善多假借作鱣魏武四時食制鱔鱣魚大如五斗軀長一丈即鱣魚也若如此長大鸛雀不能勝一況三頭乎是鱔魚明矣今宜作鱔字作臛當重煮之不可以桑薪煮之亦蛇類也聖惠方治婦人乳結硬疼用鱔魚皮燒灰末空心暖酒調二錢匕衍義曰鱔魚腹下黃世謂之黃鱔此尤動風氣多食令人霍亂屢見之向在京師鄰舍一郎官因食黃鱔遂致霍亂吐利幾至委頓又有白鱔稍粗大色白二者皆亡鱗大者長尺余其形類蛇但不能陸行然皆動風江陵府西有湖曰西湖每歲夏秋沮河水漲即湖水滿溢冬即復涸土人於乾土下撅得之每及二三尺則有往來鱔行之路中有泥水水涸又下水至復出鮑魚味辛臭溫無毒主墜墮腿吐猥切蹶音厥踠折瘀血血痹在四肢不散者女子崩中血不止勿令中咸陶隱居云所謂鮑魚之肆言其臭也俗人呼為䱒音裛魚字似鮑又言鹽䱒之以成故也作藥當用少鹽臭者不知正何種魚爾乃言穿貫者亦入藥方家自少用之今此鮑魚乃是鱅音慵魚長尺許合完淡干之而都無臭氣要自療漏血不知何者是真唐本注云此說云味辛又言勿令中咸此是鰎居𥂕切魚非鮑魚也魚去腸肚繩穿淡暴使干故辛而不咸李當之本草亦言胸中濕者良鮑魚肥者胸中便濕又云穿貫繩者彌更不惑鮑魚破開鹽裛不曝味鹹不辛又完淹令濕非獨胸中且鰎魚亦臭臭與鮑別鮑鰎二魚雜魚並用鮑似尸臭以無鹽也鰎臭差微有鹽故也鰎魚沔州復州作之余處皆不識爾今注今考其實止血須淡干勿令中咸入別方藥用則以鹽裛之爾臣禹錫等謹按蜀本圖經注云十月後取魚去腸繩穿淡者之凡魚皆堪食不的取一色也據陶注作藥當用少鹽不知正何種魚爾又據本經云勿令中咸是知入藥當少以鹽䱒成之有鹽則中咸而不臭鹽少則味辛而臭矣古人云與不善人居如入鮑魚之肆謂惡人之行知鮑魚之臭也考其實則今荊楚淡魚頗臭而微辛方家亦少用舊云沔州復州作之余皆不出審陶注及圖經與本經即所在皆可作之也又據鮧魚有口小背黃腹白者為鮑魚而療治與鮧魚同補益主百病今圖經既不的取一色可淡干此之為是也圖經文具蠡魚條下子母祕録妊娠中風寒熱腹中絞痛不可針灸乾魚一枚燒末酒服方寸匕取汗鯉魚膽味苦寒無毒主目熱赤痛青盲明目久服強悍益志氣肉味甘主咳逆上氣黃疸止渴生者主水腫腳滿下氣臣禹錫等謹按大腹水腫通用藥云鯉魚寒藥對云平陳士良云無毒骨主女子帶下赤白齒主石淋生九江池澤取無時陶隱居云鯉魚最為魚之主形既可愛又能神變乃至飛越山湖所以琴高乘之山上水中有鯉不可食又鯉鮓不可合小豆藿食之其子合豬肝食之亦能害人爾唐本注云鯉魚骨主陰蝕哽不出血主小兒丹腫及瘡皮主癮疹腦主諸癇腸主小兒肌瘡今按陳藏器本草云鯉魚肉主安胎胎動懷妊身腫煮為湯食之破冷氣痃癖氣塊橫關伏梁作膾以濃蒜齏食之膽主耳聾滴耳中目為灰研敷刺瘡中風水疼腫汁出即愈諸魚目並得臣禹錫等謹按藥性論云鯉魚膽亦可單用味大苦點眼治赤腫翳痛小兒熱腫塗之蜀漆為使魚燒灰末治咳嗽糯米煮粥孟詵云鯉魚白煮食之療水腫腳滿下氣腹有宿瘕不可食又修理可去脊上兩筋及黑血毒故也又天行病後不可食再發即死其在沙石中者毒多在腦中不得食頭日華子云鯉魚涼有毒肉治咳嗽療腳氣破冷氣痃癖懷孕人胎不安用絹裹鱗和魚煮羹熟後去鱗食之驗脂治小兒癇疾驚忤膽治障翳等腦髓治暴聾煮粥服良諸溪澗中者頭內有毒不計大小並三十六鱗也圖經曰鯉魚生九江池澤今處處有之即赤鯉魚也其脊中鱗一道每鱗上皆有小黑點從頭數至尾無大小皆三十六鱗古語云五尺之鯉與一寸之鯉大小雖殊而鱗之數等是也又崔豹古今注釋鯉魚有三種兗州人謂赤鯉為玄駒謂白鯉為白驥黃鯉為黃雉蓋諸魚中此為最佳又能神變故多貴之今人食品中以為上味其膽肉骨齒皆入藥古今方書並用之胡洽治中風腳弱短氣腹滿有鯉魚湯方最勝脂血目睛腦髓亦單使治疾唯子不可與肝同食又齒主石淋古今録驗著其方云鯉魚齒一升篩末以三歲苦酒和分三服宿不食旦服一分日中服一分暮服一分瘥赤鯉魚鱗亦入藥唐方多用治産婦腹痛燒灰酒調服之兼治血氣雜諸藥用之陳藏器云鯉魚從脊當中數至尾無大小皆有三十六鱗亦其成數也食療膽主除目中赤及熱毒痛點之良肉白煮食之療水腫腳滿下氣腹中有宿瘕不可食害人久服天門冬人亦不可食刺在肉中中風水腫痛者燒鯉魚眼睛作灰納瘡中汁出即可謹按魚血主小兒丹毒塗之即瘥魚鱗燒煙絶研酒下方寸匕破産婦滯血脂主諸癇食之良腸主小兒腹中瘡鯉魚鮓不得和豆藿葉食之成瘦其魚子不得合豬肝食之凡修理可去脊上兩筋及黑血毒故也炙鯉魚切忌烟不得令熏著眼損人眼光三兩日內必見驗也又天行病後不可食再發即死其在砂石中者有毒多在腦中不得食頭聖惠方治水氣利小便除浮腫用鯉魚一頭重一斤者治如食法修事食之外臺祕要古今録驗療魚鯁骨橫喉中六七日不出取鯉魚鱗皮合燒作屑以水服之則出未出更服又方療水病腫鯉魚一頭極大者去頭尾及骨唯取肉以水二斗赤小豆一大升和魚肉煮可取二升以上汁生布絞去滓頓服盡如不能盡分為二服後服溫令暖服訖當下利利盡即瘥又方療瘻鯉魚腸切作五段火上炙之洗瘡拭乾以腸封之冷則易自暮至旦干止覺癢開看蟲出瘥又方凡腫已潰未潰者燒鯉魚作灰酢和塗之一切腫上以瘥為度又方療卒淋鯉魚齒燒灰酒服方寸匕千金方治暴痢小鯉魚一枚燒為末米飲服之大人小兒俱服得又方小兒咽腫喉痹以鯉魚膽二七枚和灶底土以塗咽喉立瘥肘後方療雀目鯉魚膽及腦敷之燥痛即明食醫心鏡主上氣咳嗽胸膈妨滿氣喘鯉魚一頭切作膾以薑醋食之蒜齏亦得又方主肺咳嗽氣喘促鯉魚一頭重四兩去鱗紙裹火炮去刺研煮粥空腹吃之子母祕録療妊娠傷寒鯉魚一頭燒末酒服方寸匕令汗出兼治乳無汁産書下乳汁燒鯉魚一頭研為末酒調下一錢匕禮記食魚去乙魚目旁有骨名乙如象乙字食之令人鯁衍義曰鯉魚至陰之物也其鱗故三十六陰極則陽復所以素問曰魚熱中王叔和曰熱即生風食之所以多發風熱諸家所解並不言日華子云鯉魚涼今不取直取素問為正萬一風家更使食魚則是貽禍無窮矣八種食療余時魚平補虛勞稍發疳痼黃賴魚一名䱀䰲醒酒亦無鱗不益人也比目魚平補虛益氣力多食稍動氣鱭魚發疥不可多食鯸鮧魚有毒不可食之其肝毒煞人緣腹中無膽頭中無鰓故知害人若中此毒及鱸魚毒者便銼蘆根煮汁飲解之又此魚行水之次或自觸著物即自怒氣脹浮於水上為鴉雛所食孫真人食忌魚勿食肝殺人鯮魚平補五臟益筋骨和脾胃多食宜人作鮓尤佳曝乾甚香美不毒亦不發病黃魚平有毒發諸氣病不可多食亦發瘡疥動風不宜和蕎麥同食令人失音也魴魚調胃氣利五臟和芥子醬食之助肺氣去胃家風消穀不化者作膾食助脾氣令人能食患疳痢者不得食作羹臛食宜人其功與鯽魚同二十三種陳藏器余鱘魚味甘平無毒主益氣補虛令人肥健生江中背如龍長一二丈鼻上肉作脯名鹿頭一名鹿肉補虛下氣子如小豆食之肥美殺腹內小蟲食療有毒主血淋可煮汁飲之其味雖美而發諸藥毒鮓世人雖重尤不益人服丹石人不可食令人少氣發一切瘡疥動風氣不與干筍同食發癱緩風小兒不與食結癥瘕及嗽大人久食令人卒心痛並使人卒患腰痛鱁鯷上逐下題魚白主竹木入肉經久不出者取白敷瘡上四邊肉爛即出刺一名鰾毗眇切海藥云謹按廣州記云生南海無毒主月蝕瘡陰瘡痿瘡並燒灰用經驗方治嘔血鰾膠長八寸闊二寸炙令黃刮二錢以來用甘蔗節三十五個取自然汁調下文鰩魚余招反無毒婦人臨月帶之令易産亦可臨時燒為黑末酒下一錢匕出南海大者長尺許有翅與尾齊一名飛魚群飛水上海人候之當有大風吳都賦云文鰩夜飛而觸網是也牛魚無毒主六畜疾疫作干脯搗為末以水灌之即鼻中黃涕出亦可置病牛處令其氣相熏生東海頭如牛也海豚魚味鹹無毒肉主飛尸蠱毒瘴瘧作脯食之一如水牛肉味小腥耳皮中肪摩惡瘡疥癬痔瘻犬馬瘑疥殺蟲生大海中候風潮出形如豚鼻中聲腦上有孔噴水直上百數為群人先取得其子系著水中母自來就而取之其子如蠡魚子數萬為群常隨母而行亦有江豚狀如豚鼻中為聲出沒水上海中舟人候之知大風雨又中有曲脂堪摩病及樗博即明照讀書及作即暗俗言懶婦化為此也杜父魚主小兒差頽差頽核大小也取魚擘開口咬之七下生溪澗下背有刺大頭闊口長二三寸色黑斑如吹砂而短也海鷂魚齒無毒主瘴瘧燒令黑末服二錢匕魚似鷂有肉翅能飛上石頭一名石蠣一名邵陽魚齒如石版生東海鮠魚一作魤並音五禾反鮎屬又五回反味甘平無毒不腥主膀胱水下開胃作膾白如雪隋朝吳都進鮠魚乾膾取快曝乾瓶盛臨食以布裹水浸良久灑去水如初膾無異魚生海中大如石首圖經文具鮧魚條下鮹魚味甘平無毒主五野雞痔下血瘀血在腹似馬鞭尾有兩歧如鞭鞘故名之出江湖鱣魚肝無毒主惡瘡疥癬勿以鹽炙食郭注爾雅云鱣魚長二三丈顏氏家訓曰鱣魚純灰色無紋古書云有多用鱣魚字為鱔既長二三丈則非鱔魚明矣本經又以鱔為鼉此誤深矣今明鱑魚體有三行甲上龍門化為龍也石鮅音必魚味甘平有小毒主瘡疥癬出南海方山澗中長一寸背裡腹下赤南人取之作鮓魚鮓味甘平無毒主癬和柳葉搗碎熱炙敷之又主馬瘑瘡取酸臭者和糝及屋上塵敷之瘑似疥而大凡鮓皆發瘡疥可合殺蟲瘡藥用之魚脂主牛疥狗瘡塗之立愈脂是和灰泥船者腥臭為佳又主症取銅器盛二升作大火炷脂上燃之令暖徹於症上尉之以紙籍腹上晝夜勿息火良膾味甘溫蒜齏食之溫補去冷氣濕痹除膀胱水喉中氣結心下酸水腹內伏梁冷痃結癖疝氣補腰腳起陽道鯽魚膾主腸澼水穀不調下利小兒大人丹毒風眩鯉魚膾主冷氣氣塊結在心腹並宜蒜齏進之魚膾以菰菜為羹吳人謂之金羹玉膾開胃口利大小腸食膾不欲近夜食不消兼飲冷水腹內為蟲時行病起食膾令人胃弱又不可同乳酪食之令人霍亂凡羹以蔓荊煮之蔓荊去魚腥又萬物腦能消毒所以食膾食魚頭羹也昌候魚味甘平無毒腹中子有毒令人痢下食其肉肥健益氣力生南海如鯽魚身正圓無硬骨作炙食之至美一名昌鼠也鯇魚無毒主喉閉飛尸取膽和暖水攪服之鯇音患似鯉生江湖間納喉中飛尸上此膽至苦䲅魚肝及子有大毒入口爛舌入腹爛腸肉小毒人亦食之煮之不可近鐺當以物懸之一名鶘夷魚以物觸之即嗔腹如氣球亦名嗔魚腹白背有赤道如印魚目得合與諸魚不同江海中並有之海中者大毒江中者次之人欲收其肝子毒人則當反被其噬為此人皆不録唯有橄欖木及魚茗木解之次用蘆根烏蓲草根汁解之此物毒疾非藥所及橄欖魚茗已出木部魚虎有毒背上刺著人如蛇咬皮如蝟有刺頭如虎也生南海亦有變為虎者䱋魚音拱鯤子鰍魚鰍同音鼠尾魚地青魚鯆魮魚鯆魮普胡反音毗邵陽魚尾刺人者有大毒三刺中之者死二刺者困一刺者可以救候人溺處釘之令人陰腫痛拔去即愈海人被其刺毒煮魚簄竹及海獺皮解之以上魚並生南海總有肉翅尾長二尺刺在尾中逢物以尾撥之食其肉而去其刺其鯆魮魚已在本經鱔魚注中鯢魚鰻鱺注陶云鰻鱺能上樹蘇云鯢魚能上樹非鰻鱺也按鯢魚一名王鮪在山溪中似鮎有四腳長尾能上樹天旱則含水上山葉覆身鳥來飲水因而取之伊洛間亦有聲如小兒啼故曰鯢魚一名鱯魚一名人魚膏燃燭不滅秦始皇冢中用之陶注鮎魚條云人魚即鯢魚也諸魚有毒者魚目有睫殺人目得開合殺人逆鰓殺人腦中白連珠殺人無鰓殺人二目不同殺人連鱗者殺人白鬐殺人腹下丹字殺人魚師大者有毒食之殺人水龜無毒主難産産婦戴之亦可臨時燒末酒下出南海如龜長二三尺兩目在側旁瘧龜無毒主老瘧發無時者亦名㾬瘧下俚人呼為妖瘧燒作灰飲服一二錢匕當微利取頭燒服彌佳亦候發時煮為沸湯坐中浸身亦懸安病人臥處生高山石下身偏頭大觜如鶚鳥亦呼為鶚龜
