body:
  text: 卷第二十五己酉新增衍義生大豆味甘平塗癰腫煮汁飲殺鬼毒止痛逐水脹除胃中熱痹傷中淋露下瘀血散五臟結積內寒殺烏頭毒久服令人身重炒為屑味甘主胃中熱去腫除痹消穀止腹脹生太山平澤九月採惡五參龍膽得前胡烏喙杏仁牡蠣良今按陳藏器本草云大豆炒令黑煙未斷及熱投酒中主風痹癱緩口噤産後諸風食罷生服半兩去心胸煩熱熱風恍惚明目鎮心溫補久服好顏色變白去風不忘煮食寒下熱氣腫壓丹石煩熱汁解諸藥毒消腫大豆炒食極熱煮食之及作豉極冷黃卷及醬平牛食溫馬食冷一體之中用之數變臣禹錫等謹按蜀本注云煮食之主溫毒水腫陳藏器云穭音呂豆味甘溫無毒炒令黑及熱投酒中漸漸飲之去賊風風痹婦人産後冷血堪作醬生田野小黑爾雅云戎菽一名驢豆一名䬪豆孟詵云大豆寒和飯搗塗一切毒腫療男女陰腫以綿裹納之殺諸藥毒謹按煮飲服之去一切毒氣除胃中熱痹腸中淋露下淋血散五臟結積內寒和桑柴灰汁煮之下水鼓腹脹其豆黃主濕痹膝痛五臟不足氣胃氣結積益氣潤肌膚末之收成煉豬膏為丸服之能肥健人又卒失音生大豆一升青竹算子四十九枚長四寸闊一分和水煮熟日夜二服瘥又每食後淨磨拭吞雞子大令人長生初服時似身重一年以後便覺身輕又益陽道日華子云黑豆調中下氣通關脈制金石藥毒治牛馬溫毒圖經曰大豆黃卷及生大豆生泰山平澤今處處有之黃卷是以生豆為蘖待其芽出便曝乾取用方書名黃卷皮今蓐婦藥中用之大豆有黑白二種黑者入藥白者不用其緊小者為雄豆入藥尤佳豆性本平而修治之便有數等之效煮其汁甚涼可以壓丹石毒及解諸藥毒作腐則寒而動氣炒食則熱投酒主風作豉極冷黃卷及醬皆平牛食之溫馬食之涼一體而用別大抵宜作藥使耳殺烏頭毒尤勝仙方修制黃末可以辟穀度飢歲然多食令人體重久則如故矣古方有紫湯破血去風除氣防熱産後兩日尤宜服之烏豆五升選擇令淨清酒一斗半炒豆令煙向絶投於酒中看酒赤紫色乃去豆量性服之可日夜三盞如中風口噤即加雞屎白二升和熬投酒中神驗江南人作豆豉自有一種刀豆甚佳古今方書用豉治病最多葛洪肘後方云療傷寒有數種庸人不能分別今取一藥兼療若初覺頭痛肉熱脈洪起一二日便作此加減蔥豉湯蔥白一虎口豉一升綿裹以水三升煮取一升頓服取汗若不汗更作加葛根三兩水五升煮取二升分再服必得汗即瘥不汗更作加麻黃三兩去節諸名醫方皆用此更有加減法甚多今江南人凡得時氣必先用此湯服之往往便瘥唐本云煮食之主溫毒水腫復有白大豆不入藥用也食療云微寒主中風腳弱産後諸疾若和甘草煮湯飲之去一切熱毒氣善治風毒腳氣煮食之主心痛筋攣膝痛脹滿殺烏頭附子毒大豆黃屑忌豬肉小兒不得與炒豆食之若食了忽食豬肉從必壅氣致死十有八九十歲以上不畏千金方治頭項強不得顧視蒸大豆一升令變色納囊中枕之又方治喉痹卒不語煮大豆汁含之又方從高墜下頭破腦出血中風口噤豆一升熬去腥勿使太熱杵末蒸之氣遍令甑下盆中以酒一升淋之溫服一升覆取汗敷膏瘡上又方中惡大豆二七枚雞子黃酒半升和頓服又方治身腫浮烏豆一升水五升煮取三升汁去滓納酒五升更取三升分溫三服不瘥再合服之又方治頭風頭痛大豆三升炒令無聲先以盛一斗二升瓶一隻盛九升清酒乘豆熱即投於酒中密泥封之七日溫服之又方治口喎大豆麵三升炒令焦酒三升淋取汁頓服日一服又方令髮鬢烏黑醋煮大豆黑者去豆煎令稠敷發又方被打頭青腫豆黃末敷之肘後方治卒風不得語煮豆煎汁如飴含之亦濃煮飲之佳又方治脅痛如打豆半升熬令焦酒一升煮之令沸熟取醉又方從早夜連時不得眠暮以新布火炙以尉目並蒸大豆更番囊盛枕枕冷後更易熱終夜常枕熱豆即立愈證如前又方治消渴得效取烏豆置牛膽中陰乾百日吞之即瘥又方治腰脅卒痛背痛大豆二升酒三升煮取二升頓服佳又方礬石中毒豆汁解之良又方陰癢汗出嚼生大豆黃敷之佳經驗方治小兒大人多年牙齒不生用黑豆三十粒牛糞火內燒令煙盡細研入麝香少許一處研勻先以針挑不生齒處令血出用末少許揩不得見風忌酸鹼物又方治秋夏之交露坐夜久腹中痞如群石在腹方大豆半升生薑八分水二升煎取一升以來頓服瘥又方治赤痢臍下痛黑豆茱萸子二件搓摩吞咽之宜良又方治破傷風神效黑豆四十個硃砂二十文同研為末以酒半盞以上調一字下食醫心鏡治風毒攻心煩躁恍惚大豆半升淨淘以水二升煮取七合去滓食後服又方大豆末理胃中熱去身腫除痹消穀止脹大豆一升熬令熟杵末飲服之又方主妊娠腰中痛大豆一升以酒三升煮取七合去滓空心服之又方治産後風虛五緩六急手足頑痹頭旋眼眩血氣不調大豆一升炒令熟熱投三升酒中密封隨性飲之廣利方治腳氣衝心煩悶亂不識人大豆一升水三升濃煮取汁頓服半升如未定可更服半升即定又方治蛇咬方取黑豆葉銼杵敷之日三易良傷寒類要闢溫病以新布盛大豆一斗納井中一宿出服七粒佳子母祕録主産後中風困篤或背強口噤或但煩熱苦渴或身頭皆重或身癢極嘔逆直視此皆虛熱中風大豆三升熬令極熟候無聲器盛以酒五升沃之熱投可得二升盡服之溫覆令少汗出身潤即愈産後得依常稍服之以防風氣又消結血又方治小兒斑瘡豌豆瘡熟煮大豆取汁服之佳又方治小兒湯火瘡水煮大豆汁塗上易瘥無斑又方治小兒尿灰瘡黑豆皮熟嚼敷之楊氏産乳療有孕月數未足子死腹中不出母欲悶絶取大豆三升以醋煮濃汁三升頓服立出産書治産後猶覺有餘血水氣者宜服豆淋酒黑豆五升熬之令煙絶出於瓷器中以酒一升淬之又方治胞衣不下以大豆大半升醇酒三升煮取折半分三服博物志云左元亮荒年法擇大豆粗細調勻必生熟挪之令有光暖氣徹豆則納先下食一日以冷水頓服訖其魚肉菜果不得復經口渴即飲水慎不可暖飲初小困十數月後體力壯健不復思食抱朴內篇云相國張公文蔚莊在東都柏坡莊內有鼠狼穴養四子為蛇所吞鼠狼雄雌情切乃於穴外坌土恰容蛇頭俟其出穴果入所坌處出頭度其回轉不及當腰咬斷而劈蛇腹銜出四子尚有氣置於穴外銜豆葉嚼而敷之皆活衍義曰生大豆有緑褐黑三種亦有大小兩等其大者出江浙湖南北黑小者生他處今用小者力更佳炒熟以棗肉同搗之為麨代糧又治産後百病血熱並中風疾痱止痛背強口噤但煩熱瘛瘲若渴身背腫劇嘔逆大豆五升急水淘淨無灰酒一斗熬豆令微煙出傾入酒瓶中沃之經一日以上服酒一升取瘥為度如素不飲酒即量多少服若口噤即加獨活半斤微微捶破同沃仍增酒至一鬥二升暑月旋作恐酸壞又可磑為腐食之赤小豆味甘酸平無毒主下水排癰腫膿血寒熱熱中消渴止泄利小便吐逆卒疝下脹滿陶隱居云大小豆共條猶如蔥薤義也以大豆為蘖芽生便乾之名為黃卷用之亦熬服食所須煮大豆主溫毒水腫殊效復有白大豆不入藥小豆性逐津液久服令人枯燥矣唐本注云別録云葉名藿止小便數去煩熱今按陳藏器本草云赤小豆和桑根白皮煮食之主濕氣痹腫小豆和通草煮食之當下氣無限名脫氣丸驢食腳輕人食體重臣禹錫等謹按蜀本注云病酒熱飲汁即愈藥性論云赤小豆使味甘能消熱毒癰腫散惡血不盡煩滿治水腫皮肌脹滿搗薄塗癰腫上主小兒急黃爛瘡取汁令洗之不過三度瘥能令人美食末與雞子白調塗熱毒癰腫瘥通氣健脾胃陳士良云赤小豆微寒縮氣行風抽肌肉久食瘦人堅筋骨療水氣解小麥熱毒日華子云赤豆粉治煩解熱毒排膿補血脈解油衣黏綴甚妙葉食之明目圖經曰赤小豆舊與大豆同條蘇恭分之今江淮間尤多種蒔主水氣腳氣方最急用其法用此豆五合葫一頭生薑一分並碎破商陸根一條切同水煮豆爛湯成適寒溫去葫等細嚼豆空腹食之旋旋啜汁令盡腫立消便止韋宙獨行方療水腫從腳起入腹則殺人亦用赤小豆一斗煮令極爛取汁四五升溫漬膝以下若已入腹但服小豆勿雜食亦愈李絳兵部手集方亦著此法云曾得效昔有人患腳氣用此豆作袋置足下朝夕展轉踐踏之其疾遂愈亦主丹毒小品方以赤小豆末和雞子白如泥塗之塗之不已逐手即消也其遍體者亦遍塗如上法又諸腫毒欲作癰疽者以水和塗便可消散毒氣今人往往用之有效食療云和鯉魚爛煮食之甚治腳氣及大腹水腫別有諸治具在魚條中散氣去關節煩熱令人心孔開止小便數緑赤者並可食暴痢後氣滿不能食煮一頓服之即愈千金方主産後不能食煩滿方小豆三七枚燒作屑篩冷水頓服之佳肘後方闢溫病取小豆新布囊盛之置井中三日出舉家服男十枚女二十枚又方治腸痔大便常血小豆一升苦酒五升煮豆熟出干復納法酒中候酒盡止末酒服方寸匕日三度又方舌上忽出血如簪孔小豆一升杵碎水三升和攪取汁飲又方産後心悶目不開生赤小豆杵末東流水服方寸匕不瘥更服梅師方治熱毒下血或因食熱物發動以赤小豆杵末水調下方寸匕又方治婦人乳腫不得消小豆莽草等分為末苦酒和敷之佳孫真人云赤白豆合魚鮓食之成消渴小豆醬合魚鮓食之成口瘡食醫心鏡理腳腫滿轉上入腹殺人豆一升水五升煮令極熟去豆適寒溫浸腳冷即重暖之又方主小便數小豆葉一斤於豉汁中煮調和作羹食之煮粥亦佳廣利方治小兒火丹熱如火繞腰即損人救急杵赤小豆末和雞子白敷之干即易必效方治水穀痢小豆一合和蠟三兩頓服愈又方治卒下血小豆一升搗碎水三升絞汁飲之小品治疽初作以小豆末醋敷之亦消産寶治難産方赤小豆生吞七枚出若是女二七枚佳産書云下乳汁煮赤小豆取汁飲即下修真祕旨云理淋方椎赤小豆三合慢火炒熟為末煨蔥一莖細銼暖酒調二錢匕服男子女人熱淋血淋並療衍義曰赤小豆食之行小便久則虛人令人黑瘦枯燥關西河北京東西多食之花治宿酒渴病大豆黃卷味甘平無毒主濕痹筋攣膝痛五臟胃氣結積益氣止毒去黑皯潤澤皮毛圖經文具生大豆條下唐本注云以大豆為蘖芽生便乾之名為黃卷用亦服食食療云卷蘖長五分者破婦人惡血良食醫心鏡理久風濕痹筋攣膝痛除五臟胃氣結聚益氣止毒去黑痣面䵟潤皮毛宜取大豆黃卷一升熬令香為末空心暖酒下一匙酒味苦甘辛大熱有毒主行藥勢殺百邪惡毒氣陶隱居云大寒凝海唯酒不冰明其性熱獨冠群物藥家多須以行其勢人飲之使體弊神昏是其有毒故也昔三人晨行觸霧一人健一人病一人死健者飲酒病者食粥死者空腹此酒勢辟惡勝於作食唐本注云酒有葡萄秫黍粳粟曲蜜等作酒醴以曲為而葡萄蜜等獨不用曲飲葡萄酒能消痰破癖諸酒醇醨不同唯米酒入藥用臣禹錫等謹按陳藏器云酒本功外殺百邪去惡氣通血脈厚腸胃潤皮膚散石氣消憂發怒宣言暢意書曰若作酒醴爾唯曲糵蘇恭乃廣引葡萄蜜等為之此乃以僞亂真殊非酒本稱至於入藥更亦不堪凡好酒欲熟皆能候風潮而轉此是合陰陽矣又云諸米酒有毒酒漿照人無影不可飲酒不可合乳飲之令人氣結白酒食牛肉令腹內生蟲酒後不得臥黍穰食豬肉令人患大風凡酒忌諸甜物又云甜糟味鹹溫無毒主溫中冷氣消食殺腥去草菜毒藏物不敗糅物能軟潤皮膚調腑臟三歲以下有酒以物承之堪磨風瘙止嘔噦及煎煮魚菜取臘月酒糟以黃衣和粥成之孟詵云酒味苦主百邪毒行百藥當酒臥以扇扇或中惡風久飲傷神損壽謹按中惡疰忤熱暖姜酒一碗服即止又通脈養脾氣扶肝陶隱居云大寒凝海唯酒不冰量其熱性故也久服之厚腸胃化筋初服之時甚動氣痢與百藥相宜只服丹砂人飲之即頭痛吐熱又服丹石人胸背急悶熱者可以大豆一升熬令汗出簸去灰塵投二升酒中久時頓服之少頃即汗出瘥朝朝服之甚去一切風婦人産後諸風亦可服之又熬雞屎如豆淋酒法作名曰紫酒卒不語口偏者服之甚效昔有人常服春酒令人肥白矣陳士良云凡服食丹砂北庭石亭脂鐘乳石諸石生薑並不可長久以酒下遂引石藥氣入四肢滯血化為癰疽日華子云酒通血脈厚腸胃除風及下氣又云社壇余胙酒治孩兒語遲以少許吃吐酒噴屋四角闢蚊子又云糟罯撲損瘀血浸洗凍瘡及敷蛇蜂可毒又云糟下酒暖開胃下食暖水臟溫腸胃消宿食御風寒殺一切蔬菜毒多食微毒食療云紫酒治角弓風姜酒主偏風中惡桑椹酒補五臟明耳目蔥豉酒解煩熱補虛勞蜜酒療風疹地黃牛膝虎骨仙靈脾通草大豆牛蒡枸杞等皆可和釀作酒在別方蒲桃子釀酒益氣調中耐飢強志取藤汁釀酒亦佳狗肉汁釀酒大補外臺祕要治水下或不下則滿溢下之則虛竭虛竭還腹十無一活以桑椹並心皮兩物細銼重煮煎取四斗以釀米四升釀酒一服一升又方治痔下部齧方掘地作小坑燒令赤酒沃中杵吳茱萸三升納中極熱板覆開小孔子以下部坐上冷乃下不過三度良又方治牛馬六畜水穀疫病酒和麝香少許灌之千金方斷酒方以酒七升著瓶中硃砂半兩細研著酒中緊閉塞瓶口安豬圈中任豬搖動經七日頓飲之又方正月一日酒五升淋碓頭杵下取飲又方治耳聾酒三升漬牡荊子一升碎之浸七日去滓任性飲盡三十年聾瘥肘後方鬼擊之病得之無漸卒著人如刀刺狀胸脅腹內癘結切痛不可抑按或吐血鼻血出或下血一名鬼排以淳酒吹兩鼻內又方中風體角弓反張四肢不隨煩亂欲死清酒五升雞屎白一升杵末合和之搗千遍乃飲大人服一升日三少小五合瘥又方人體上先有瘡因乘馬馬汗馬毛入瘡中或為馬氣所蒸皆致腫痛煩熱入腹則殺人多飲醇酒以醉即愈經驗後方孫真人催産以鐵器燒赤淬酒吃便令分解梅師方治虎傷人瘡但飲酒常令大醉當吐毛出又方治産後有血心煩腹痛清酒一升生地黃汁和煎二十沸分三服孫真人空腹飲酒醉必患嘔逆又方治風癬暖酒以蜜中攪之飲一杯即瘥又方治腰膝疼痛久不已糟底酒摩腰腳及痛處筋攣處廣利方治蛇咬瘡暖酒淋洗瘡上日三易兵部手集治蜘蛛遍身成瘡取上好春酒飲醉使人翻不得一向臥恐酒毒腐人須臾蟲於肉中小如米自出傷寒類要天行病毒攻手足疼痛欲斷作坑令深三尺大小容足燒令中熱以酒灌坑中著屐踞坑上衣壅勿令泄氣衍義曰酒呂氏春秋曰儀狄造酒戰國策曰帝女儀狄造酒進之於禹然本草中已著酒名信非儀狄明矣又讀素問首言以妄為常以酒為漿如此則酒自黃帝始非儀狄也古方用酒有醇酒春酒社壇余胙酒糟下酒白酒清酒好酒美酒葡萄酒秫黍酒粳酒蜜酒有灰酒新熟無灰酒地黃酒今有糯酒煮酒小豆麴酒香藥麴酒鹿頭酒羔兒等酒今江浙湖南北又以糯米粉入衆藥和合為曲曰餅子酒至於官務中亦用四夷酒更別中國不可取以為法今醫家所用酒正宜斟酌但飲家唯取其味不顧入藥如何爾然久之未見不作疾者蓋此物損益兼行可不慎歟漢賜丞相上樽酒糯為上稷為中粟為下者今入藥佐使專以糯米用清水白麵曲所造為正古人造麴未見入諸藥合和者如此則功力和厚皆勝余酒今人又以麥糵造者蓋止是醴爾非酒也書曰若作酒醴爾為曲糵酒則須用曲醴故用糵蓋酒與醴其氣味甚相遼治療豈不殊也粟米味鹹微寒無毒主養腎氣去胃脾中熱益氣陳者味苦主胃熱消渴利小便陶隱居云江東所種及西間皆是其粒細於粱米熟舂令白亦以當白粱呼為白粱粟陳者謂經三五年者或呼為粢音咨米以作粉尤解煩悶服食家亦將食之唐本注云粟類多種而並細於諸粱北土常食與粱有別陶云當白粱又云或呼為粢粢則是稷稷乃穄音祭之異名也其米泔汁主霍亂卒熱心煩渴飲數升立瘥臭泔止消渴尤良米麥麨味甘苦寒無毒主寒中除熱渴解煩硝石氣蒸米麥熬磨作之一名糗也臣禹錫等謹按孟詵云粟米陳者止痢甚壓丹石熱顆粒小者是今人間多不識耳粱米粒粗大隨色別之南方多畬田種之極易舂粒細香美少虛怯只為灰中種之又不鋤治故也得北田種之若不鋤之即草翳死若鋤之即難舂都由土地使然耳但取好地肥瘦得所由熟犁又細鋤即得滑實陳藏器云粉解諸毒主卒得鬼打水攪服之亦主熱腹痛鼻衄並水煮服之粳粟總堪為粉粟強浸米至敗者損人又云泔主霍亂新研米清水和濾取汁服亦主轉筋入腹胃冷者不宜多食酸泔洗皮膚瘡疥服主五野病及消渴下澱酸者殺蟲及惡瘡和臭樗皮煎服主疳痢樗皮一名武目樹又云糗一名𪍑昌少切味酸寒和水服之解煩熱止泄實大腸壓石熱止渴河東人以麥為之粗者為干糗糧東人以粳米為之炒乾磨成也陳士良云粳粟米五穀中最硬得漿水即易化解小麥虛熱圖經文具青粱米條下千金方治反胃食即吐搗粟米作粉和水丸如梧桐子大七枚爛煮納醋中細吞之得下便已面亦得用之良醫心鏡主脾胃氣弱食不消化嘔逆反胃湯飲不下粟米半升杵如粉水和丸如梧子煮令熟點少鹽空心和汁吞下又方主消渴口乾粟米炊飯食之良又方主胃中熱消渴利小便以陳粟米炊飯食兵部手集治孩子赤丹不止研粟米敷之姚和衆小孩初生七日助穀神以導達腸胃研粟米煮粥飲厚薄如乳每日研與半粟谷子母祕録治小兒重舌用粟哺之産寶方粢米粉熬令黑以雞子白和如泥以塗帛上貼之帛作穴以泄癰毒氣易之效博物志云雁食足重不能飛丹房鏡源云禾草灰抽錫暈衍義曰粟米利小便故益脾胃秫米味甘微寒止寒熱利大腸療漆瘡陶隱居云此人以作酒及煮糖者肥軟易消方藥不正用唯嚼以塗漆瘡及釀諸藥醪唐本注云此米功用是稻秫也今大都呼粟糯為秫稻秫為糯矣北土亦多以粟秫釀酒而汁少於黍米粟秫應用別功但本草不載凡黍稷粟秫粳糯此三谷之秈音仙秫也臣禹錫等謹按顏師古刊謬正俗云今之所謂秫米者似黍米而粒小者耳亦堪作酒孟詵云秫米其性平能殺瘡疥毒熱擁五臟氣動風不可常食北人往往有種者代米作酒耳又生搗和雞子白敷毒腫良根煮作湯洗風又米一石曲三斗和地黃一斤茵陳蒿一斤炙令黃一依釀酒法服之治筋骨攣急日華子云無毒犬咬凍瘡並嚼敷圖經文具黍米條下聖惠方治食鴨肉成病胸滿面赤不下食用秫米汁服一中盞肘後方卒得浸淫瘡有汁多發於心不早治周身則殺人熬秫米令黃黑杵以敷之梅師方治妊娠忽下黃水如膠或如小豆汁秫米黃耆各一兩細銼以水七升煎取三升分服食醫心鏡主寒熱利大腸治漆瘡秫米飯食之良衍義曰秫米初搗出淡黃白色經久色如糯用作酒者是此米亦不堪為飯最黏故宜酒粳米味甘苦平無毒主益氣止煩止泄陶隱居云此即人常所食米但有白赤小大異族四五種猶同一類也前陳廩米亦是此種以廩軍人故曰廩爾唐本注云傳稱食廩為祿廩倉也前陳倉米曰廩字誤作廩即廩軍米也若廩軍新米亦為陳乎臣禹錫等謹按蜀本云斷下痢和胃氣長肌肉溫中孟詵云粳米平主益氣止煩泄其赤則粒大而香不禁水停其黃緑即實中又水漬有味益人都大新熟者動氣經再年者亦發病江南貯倉人皆多收火稻其火稻宜人溫中益氣補下元燒之去芒春舂米食之即不發病耳又云倉粳米炊作乾飯食之止痢又補中益氣堅筋通血脈起陽道北人炊之甕中水浸令酸食之暖五臟六腑氣久陳者蒸作飯和醋封毒腫立瘥又研服之去卒心痛白粳米汁主心痛止渴斷熱毒痢若常食乾飯令人熱中唇口乾不可和蒼耳食之令人卒心痛即急燒倉米灰和蜜漿服之不爾即死不可與馬肉同食之發痼疾日華子云補中壯筋骨補腸胃圖經文具稻米條下食療云淮泗之間米多京都襄州土粳米亦香堅實又諸處雖多但充飢而已外臺祕要蛟龍子生在芹菜上食之入腹變成龍子須慎之餳粳米杏仁乳餅煮粥食之三升日三服吐出蛟龍子有兩頭開皇元年賈橋有人吐出蛟龍大驗無所忌肘後方若遇荒年谷貴無盡以充糧應須藥濟命者粳米一升酒三升漬之出曝乾之又漬酒次出稍食之渴飲闢三十日足一斗三升闢周年又方小兒新生三日應開腸胃助穀神碎米濃作汁飲如乳酪與兒大豆許數合飲之頻與三豆許二七日可與哺慎不得取次與雜藥紅雪少少得也食醫心鏡止煩斷下利平胃氣溫中長肌粳米飯及粥食之衍義曰粳米白晚米為第一早熟米不及也平和五臟補益胃氣其功莫逮然稍生則復不益脾過熟則佳青粱米味甘微寒無毒主胃痹熱中消渴止泄痢利小便益氣補中輕身長年陶隱居云凡云粱米皆是粟類唯其牙頭色異為分別爾青粱出此今江東少有汜音泛勝之書云粱是秫粟今俗用則不爾唐本注云青粱殼穗有毛粒青米亦微青而細於黃白粱也穀粒似青稞而少粗夏月食之極為清涼但以味短色惡不如黃白粱故人少種之此谷早熟而收少也作餳清白勝余米臣禹錫等謹按孟詵云青粱米以純苦酒一斗漬之三日出百蒸百曝好裹藏之遠行一餐十日不飢重餐四百九十日不飢又方以米一斗赤石脂三斤合以水漬之令足相淹置於暖處二三日上青白衣搗為丸如李大日服三丸不飢謹按靈寶五符經中白鮮米九蒸九曝作辟穀糧此文用青粱米未見有別出處其米微寒常作飯食之澀於黃白米體性相似日華子云健脾治泄精醋拌百蒸百曝可作糗糧圖經曰粱米有青粱黃粱白粱皆粟類也舊不著所出州土陶隱居云青粱出北方黃粱出青冀州白梁處處皆有蘇恭云黃梁出蜀漢商浙間亦種之今唯京東西河陝間種時皆白粱耳青黃乃稀有青粱殼穗有毛粒青米亦微青而細於黃白米也黃粱穗大毛長殼米俱粗於白粱而收子少不耐水旱襄陽有竹根者是也白粱穗亦大毛多而長殼粗扁長不似粟圓也大抵人多種粟而少種粱以其損地力而收穫少而諸粱食之比他谷最益脾胃性亦相似耳粟米比粱乃細而圓種類亦多功用則無別矣其泔汁及米粉皆入藥近世作英粉乃用粟米浸纍日令敗研澄取之今人用去痱瘡尤佳外臺祕要主消渴煮汁飲之瘥食醫心鏡主胃脾熱中除渴止痢利小便益氣力補中輕身長年以粱米炊飯食之衍義曰青黃白粱米此三種食之不及黃粱青白二種性皆微涼獨黃粱性甘平豈非得土之中和氣多邪今黃白二種西洛間農家多種為飯尤佳余用則不相宜然其粒尖小於他谷收實少故能種者亦稀白色者味淡黍米味甘溫無毒主益氣補中多熱令人煩陶隱居云荊郢州及江北皆種此其苗如蘆而異於粟粒亦大粟而多是秫今人又呼秫粟為黍非也北人作黍飯方藥釀黍米酒則皆用秫黍也又有穄米與黍米相似而粒殊大食不宜人言發宿病唐本注云黍有數種已備注前條今此通論丹黑黍米爾亦不似蘆雖似粟而非粟也穄即稷也其釋後條臣禹錫等謹按孟詵云黍米性寒患鱉瘕者以新熟赤黍米淘取泔汁生服一升不過三兩度愈謹按性寒有少毒不堪久服昏五臟令人好睡仙家重此作酒最勝餘糧又燒為灰和油塗杖瘡不作瘢止痛不得與小兒食之令不能行若與小貓犬食之其腳便踻曲行不正緩人筋骨絶血脈食療云合葵菜食之成痼疾於黍米中藏干脯通食禁云牛肉不得和黍米白酒食之必生寸白蟲千金方治人六畜天行時氣病豌豆瘡方濃煮黍穰汁洗之一莖是穄穰則不瘥瘡若黑者杵蒜封之亦可煮乾蕓薹洗之又方小兒鵝口不能飲乳以黍米汁敷之又方妊娠尿血黍穰莖燒灰酒服方寸匕肘後方食苦瓠中毒煮黍穰汁解之飲數升止又方治湯火所灼未成瘡黍米女曲等分各熬令焦杵下以雞子白敷之經驗方治四十年心痛不瘥黍米淘汁溫服隨多少孫真人黍米肺之谷也肺病宜食主益氣又方黍宜脈不可久食之成癇食醫心鏡益氣安中補不足宜脈不可久食多熱令人煩悶白黍飯食之丹黍米味苦微溫無毒主咳逆霍亂止泄除熱止煩渴陶隱居云此即赤黍米也亦出北間江東時有種而非土所宜多入神藥用又黑黍名秬供釀酒祭祀用之臣禹錫等謹按爾雅云秬黑黍秠一稃二米釋曰按詩生民云誕降嘉種維秬維秠李巡云黑黍一名秬黍秬即墨黍之大名也秬是黑黍中一稃有二米者別名為秬若然秬秠皆黑黍矣而春官鬯人注云釀秬為酒秬如黑黍一秠二米言如者以黑黍一米者多秬為正二米則秬中之異故言如以明秬有二等則一米者亦可為汁又云藘即皮其稃亦皮也秠稃古今語之異耳漢和帝時任城縣生黑黍或三四實實二米得黍三斛八斗是也日華子云赤黍米溫下氣止咳嗽除煩止渴退熱不可合蜜並葵同食圖經曰丹黍米舊不載所出州土陶隱居云出北間江東亦時有種而非土所宜今京東西河陝間皆種之然有二種種米黏者為秫可以釀酒不黏者為黍可食如稻之有粳糯耳謹按爾雅云虋赤苗秬黑黍秠一稃二米釋者引生民詩云誕降嘉種維秬維秠維糜與虋同維芑虋即嘉穀赤苗者李巡云秬即黑黍之大者名也秠是黑黍中一稃有二米者別名為秠若然秬秠皆黑黍矣周禮鬯人注亦以一秠二米者為秬一米者為黑黍後漢和帝時任城縣生黑黍或三四實實二米得三斛八斗是也古之定律以上黨黑牡黍之中者纍之以生律度量衡後之人取此黍定之終不能說協律一說秬黍之中者乃一稃二米之黍也此黍得天地中和之氣乃生蓋不常有有則一穗皆同二米米粒皆勻無大小得此然後可以定鐘律古今所以不能協聲律者以無此黍也他黍則不然地有腴瘠歲有凶穰則米之大小不常何由知其中者此說為信然矣今上黨民間或值豐歲往往得二米者皆如此說但稀闊而得之故不以充貢耳北人謂秫為黃米亦謂之黃糯釀酒比糯稻差劣也食醫心鏡主除煩熱止泄痢並渴丹黍米飯食之傷寒類要傷寒後男子陰易米三兩煮薄飲酒和飲之發汗出愈隨人加減子母祕録小兒鵝口不乳丹黍米汁敷上衍義曰丹黍米黍皮赤其米黃唯可為糜不堪為飯黏著難解然亦動風白粱米味甘微寒無毒主除熱益氣陶隱居云今處處有襄陽竹根者最佳所以夏月作粟餐亦以除熱唐本注云白粱穗大多毛且長諸粱都相似而白粱谷粗扁長不似粟圓也米亦白而大食之香美為黃粱之亞矣陶云竹根竹根乃黃粱非白粱也然粱雖粟類細論則別謂作粟餐殊乖的稱也臣禹錫等謹按孟詵云白粱米患胃虛並嘔吐食及水者用米汁二合生薑汁一合服之性微寒除胸膈中客熱移五臟氣續筋骨此北人長食者是亦堪作粉圖經文具青粱米條下千金方主霍亂不吐白粱米五合水一升和之頓服如粥食肘後方手足忽發疣取粱粉鐵鐺熬令赤以塗之以衆人唾和塗上厚一寸即消食醫心鏡治虛熱益氣和中止煩滿以白粱米炊飯食之衍義文已具青粱米條下黃粱米味甘平無毒主益氣和中止泄陶隱居云黃粱出青冀州此間不見有爾唐本注云黃粱出蜀漢商浙間亦種之穗大毛長穀米俱粗於白粱而收子少不耐水旱食之香美逾於諸粱人號為竹根黃而陶注白粱云襄陽竹根者是此乃黃粱非白粱也臣禹錫等謹按日華子云去客風治頑痹圖經文具青粱米條下外臺祕要小兒面身生瘡如火燒以一升末蜜水和敷之瘥為度又方治霍亂煩燥以黃粱米粉半升水一升半和絞如白飲頓服糯米亦得肘後方治霍亂吐下後大渴多飲則殺人黃粱米五升水一斗煮取三升清澄稍稍飲之食醫心鏡主益氣和中止泄痢去當風臥濕遇冷所中等病以作飲食之兵部手集治孩子赤丹不止土番黃米粉雞子白和敷之衍義文已具青粱米條下糵米味苦無毒主寒中下氣除熱陶隱居云此是以米為糵爾非別米名也末其米脂和敷面亦使皮膚悅澤為熱不及麥糵也唐本注云糵者生不以理之名也皆當以可生之物為之陶稱以米為糵其米豈更能生乎只當取糵中之米爾按食經稱用稻糵稻即穬谷之名明非米作臣禹錫等謹按日華子云糵米溫能除煩消宿食開胃又名黃子可作米醋唐本余取半生者作之衍義曰糵米此則粟糵也今穀神散中用之性又溫於大麥糵舂杵頭細糠主卒噎陶隱居云食卒噎不下刮取含之即去亦是舂搗義爾天下事理多有相影響如此也今移自草部臣禹錫等謹按日華子云平治噎煎湯呷聖惠方治膈氣咽喉噎塞飲食不下用碓觜上細糠蜜丸如彈子大非時含一丸咽津子母祕録令易産以糠燒末服方寸匕丹房鏡源糠火力倍常莊子云瞽者愛其子不免以糠枕枕之以損其目衍義文已附陳廩米條下小麥味甘微寒無毒主除熱止躁渴咽乾利小便養肝氣止漏血唾血以作曲溫消穀止痢以作面溫不能消熱止煩陶隱居云小麥合湯皆完用之熱家療也作面則溫明穬麥亦當如此今服食家啖面不及大穬麥猶勝於米爾唐本注云小麥湯用不許皮坼云坼則溫明面不能消熱止煩也小麥曲止痢平胃主小兒癇消食痔又有女曲黃蒸女曲完小麥為之一名䴷音桓子黃蒸磨小麥為之一名黃衣並消食止泄痢下胎破冷血也今按陳藏器本草云小麥秋種夏熟受四時氣足自然兼有寒溫面熱麩冷宜其然也河渭以西白麥面涼以其春種闕二時氣使之然也臣禹錫等謹按蜀本云以作麨微寒主消渴止煩以作曲止痢平胃主小兒癇消食痔蕭炳云麥醬和鯉魚食之令人口瘡藥性論云小麥臣有小毒能殺腸中蛔蟲熬末服陳藏器云麩味甘寒無毒和麵作餅止泄利調中去熱健人蒸熱袋盛尉人馬冷失腰腳和醋蒸抱所傷折處止痛散血人作面第三磨者涼為近麩也小麥皮寒肉熱又云麥苗味辛寒無毒主酒疸目黃消酒毒暴熱麥苗上黑黴名麥奴主熱煩解丹石天行熱毒又云面味甘溫補虛實人膚體厚腸胃強氣力性擁熱小動風氣又云女曲一名䴷子按䴷子與黃蒸不殊黃蒸溫補消諸生物北人以小麥南人以粳米皆六七月作之蘇又云磨破之謂當完作之亦呼為黃衣塵緑者佳孟詵云小麥平服之止渴又作面有熱毒多是陳裛之色作粉補中益氣和五臟調脈又炒粉一合和服斷下痢又性主傷折和醋蒸之裹所傷處便定重者再蒸裹之甚良日華子云面養氣補不足助五臟久食實人又云麥黃暖溫中下氣消食除煩麩涼治時疾熱瘡湯火瘡爛撲損傷折瘀血醋炒貼罯麥苗涼除煩悶解時疾狂熱消酒毒退胸膈熱患黃疸人絞汁服並利小腸作齏吃甚益顏色圖經曰麥有大麥小麥秬麥蕎麥舊不著所出州土蘇云大麥出關中今南北之人皆能種蒔屑之作面平胃止渴消食水漬之生芽為糵化宿食破冷氣止心腹脹滿今醫方用之最多穬麥有二種一種類小麥一種類大麥皆比大小麥差大凡麥秋種冬長春秀夏實具四時中和之氣故為五穀之貴大小麥地暖處亦可春種之至夏便收然比秋種者四氣不足故有毒小麥性寒作面則溫而有毒作曲則平胃止利其皮為麩性復寒調中去熱亦猶大豆作醬豉性便不同也蕎麥實腸胃益氣力然不宜多食亦能動風氣令人昏眩也藥品不甚用之食療云平養肝氣煮飲服之良又云面有熱毒者為多是陳黦之色又為磨中石末在內所以有毒但杵食之即良又宜作粉食之補中益氣和五臟調經絡續氣脈聖惠方治煩熱少睡多渴用小麥作飯水淘食之又方主婦人乳癰不消右用白麵半斤炒令黃色用醋煮為糊塗於乳上即消外臺祕要治痢色白不消者為寒下方好麵炒上一味搗篩煮米粥納面方寸匕又云此療瀉百行師不救者千金方治黃疸取小麥苗杵絞取汁飲六七合晝夜三四飲之三四日便愈又方治火瘡熬面入梔子仁末和油敷已成瘡者篩白糖灰粉之或摻瘥肘後方主食過飽煩悶但欲臥而腹脹熬面令微香杵服方寸匕以大麥生面佳無面以糵亦得又方一切傷折寒食蒸餅不限多少末酒服之驗經驗方治鼻衄以冷水調麵漿服之立瘥又方治吹奶以水調面煮如糊欲熟即投無灰酒一盞共攪之極熱令如稀粥可飲即熱吃仍令人徐徐按之藥行即瘥梅師方治頭上皮虛腫薄如蒸餅狀如裹木以口嚼敷之瘥孫真人麥心之谷也心病宜食主除熱止渴利小便養心氣又方治酒黃取小麥三升杵和少水取汁服五合又方治黃疸皮膚眼睛如金色小便赤取小麥杵取汁服一合食醫心鏡主消渴口乾小麥用炊作飯及煮粥食之兵部手集治嘔噦面醋和作彈丸二三十個以沸湯煮別盛漿水二斗以來彈丸湯內漉出於漿中看外熱氣稍減乘熱吞三兩個其噦定即不用吞余者加至七八丸尚未定晚後飯前再作吞之鬼遺方治金瘡腹腸出不能納之小麥五升水九升煮取四升去滓綿濾使極冷令人含噀之瘡腸漸漸入冷噀其背不宜多人見不欲旁人語又不須令病人知腸不即入取病人臥席四角合病人舉搖稍須臾便腸自入十日中食不飽數食須使少勿使驚即殺人別說云謹按小麥即今人所磨為面日常食者八九月種夏至煎熟一種春種作面不及經年者良大麥今以粒皮似稻者為之作飯滑飼馬良穬麥今以似小麥而大粒色青黃作面脆硬食多脹人京東西河北近京又呼為黃顆關中又有一種青顆比近道者粒微小色微青專以飼馬未見入藥用然大麥穬麥二種其名差互今之穬麥與小麥相似而差大宜為之大麥今之大麥不與小麥相似而其皮礦脆宜為之穬麥用此恐傳記因俗而差之爾不可不審也衍義曰小麥暴淋煎湯飲為面作糊入藥水調治人中暑馬病肺卒熱亦以水調灌愈生嚼成筋可以黏禽蟲大麥味鹹溫微寒無毒主消渴除熱益氣調中又云令人多熱為五穀長蜜為之使陶隱居云今稞麥一名牟音牟麥似穬麥唯皮薄爾唐本注云大麥出關中即青稞麥是形似小麥而大皮厚故謂大麥殊不似穬麥也大麥面平胃止渴消食療脹臣禹錫等謹按藥性論云大麥糵使味甘無毒能消化宿食破冷氣去心腹脹滿孟詵云大麥久食之頭髮不白和針沙沒石子等染髮黑色暴食之亦稍似腳弱為下氣及腰腎故久服甚宜人熟即益人帶生即冷損人陳士良云大麥補虛劣壯血脈益顏色實五臟化穀食久食令人肥白滑肌膚為面勝小麥無躁熱又云糵微暖久食消腎不可多食日華子云麥糵溫中下氣開胃止霍亂除煩消痰破癥結能催生落胎圖經文具小麥條下陳藏器云不動風氣調中止泄令人肥健大麥穬麥本經前後兩出蘇云青稞麥是大麥本經有條粳一稻二米亦如大穬兩麥蘇云稻是谷之通名則穬是麥之皮號麥之穬猶米之與稻本經於米麥條中重出皮殼兩件者但為有殼之與無殼也蘇云大麥是青稞穬麥是大麥如此則與米注不同自相矛盾愚謂大麥是麥米穬麥是麥谷與青稞種子不同青稞似大麥天生皮肉相離秦隴以西種之今人將當本麥米黍之不能分也聖惠方治妊娠欲去胎以麥糵二兩水一盞半煎至一盞分溫三服外臺祕要治妊娠得病去胎方麥糵一升和蜜一升服之即下神驗孫真人麥芒入目煮大麥汁洗之兵部手集治産後腹中鼓脹不通轉氣急坐臥不安供奉輔太初與崔家方以麥糵末一合和酒服食良久通轉崔郎中雲神驗傷寒類要治諸黃杵苗汁服之又方蠼螋尿瘡嚼大麥以敷之日三上衍義曰大麥性平涼有人患纏喉風食不能下將此面作稀糊令咽之既滑膩容易下咽以助胃氣三伏中朝延作麨以賜臣下作糵造餳曲味甘大暖療臟腑中風氣調中下氣開胃消宿食主霍亂心膈氣痰逆除煩破癥結及補虛去冷氣除腸胃中塞不下食令人有顏色六月作者良陳久者入藥用之當炒令香六畜食米脹欲死者煮曲汁灌之立消落胎並下鬼胎又神麯使無毒能化水穀宿食症氣健脾暖胃新補見陳藏器孟詵蕭炳陳士良日華子雷公云曲凡使搗作末後掘地坑深二尺用物裹納坑中至一宿明出焙乾用千金方治産後運絶曲末水服方寸匕不瘥更服即瘥又方治小腹堅大如盤胸中滿能食而不消曲末服方寸匕日三肘後方治赤白痢下水穀食不消以曲熬粟米粥服方寸匕日四五止又方妊娠卒胎動不安或腰痛胎轉搶心下血不止生曲半餅碎末水和絞取汁服三升古今録驗治狐刺取曲末和獨頭蒜杵如帽簪頭納瘡孔中蟲出愈子母祕録妊娠胎動上迫心痛如折以生曲半餅碎水和絞取汁服傷寒類要治傷寒飲食勞復以曲一餅煮取汁飲之楊氏産乳療胎上迫心痛兼下血取曲半餅搗碎水和絞取汁梁簡文帝勸醫文麥曲止河魚之腹疾賈相公進過牛經牛生衣不下取六月六曲末三合酒一升灌便下蜀本云溫消穀止痢平胃主小兒癇消食痔穬麥味甘微寒無毒主輕身除熱久服令人多力健行以作糵溫消食和中陶隱居云此是今馬所食者性乃熱而云微寒恐是作屑與合殼異也服食家並食大穬二麥令人輕健唐本注云麥性寒陶云性熱非也復云作屑與合殼異此皆江東少有故斟酌言之臣禹錫等謹按蕭炳云穬麥補中不動風氣先患冷氣人即不相當大麥之類西川人種食之山東河北人正月種之名春穬形狀與大麥相似孟詵云穬麥主輕身補中不動疾日華子云作餅食不動氣若暴食時間似動氣多食即益人圖經文具小麥條下蕎麥味甘平寒無毒實腸胃益氣力久食動風令人頭眩和豬肉食之患熱風脫人眉須雖動諸病猶挫丹石能煉五臟滓穢續精神作飯與丹石人食之良其飯法可蒸使氣餾於烈日中曝令口開使舂取仁作飯葉作茹食之下氣利耳目多食即微泄燒其穰作灰淋洗六畜瘡並驢馬躁蹄新補見陳藏器孟詵蕭炳陳士良日華子圖經文具小麥條下孫真人蕎麥合豬羊肉食成風癩兵部手集孩子赤丹不止蕎麥麵醋和敷之瘥又方治小兒油丹赤腫蕎麥麵醋和敷之良楊氏産乳瘡熱油赤腫取蕎麥麵醋和塗之丹房鏡源蒿麥灰煮粉霜扁豆味甘微溫主和中下氣葉主霍亂吐下不止陶隱居云人家種之於籬援其莢蒸食甚美無正用取其豆者葉乃單行用之患寒熱病者不可食唐本注云此北人名鵲豆以其黑而白間故也臣禹錫等謹按孟詵云豆療霍亂吐痢不止末和醋服之下氣又吐痢後轉筋生搗葉一把以少酢浸汁服之立瘥其豆如緑豆餅食亦可藥性論云白扁豆亦可單用主解一切草木毒生嚼及煎湯服取效日華子云平無毒補五臟葉敷蛇蟲咬圖經曰扁豆舊不著所出州土今處處有之人家多種於籬援間蔓延而上大葉細花花有紫白二色莢生花下其實亦有黑白二種白者溫而黑者小冷入藥當用白者主行風氣女子帶下兼殺一切草木及酒毒亦解河豚毒花亦主女子赤白下乾末米飲和服葉主吐痢後轉筋生搗研以少酢浸取汁飲之立止黑色者亦名鵲豆以其黑間而有白道如鵲羽耳食療云微寒主嘔逆久食頭不白患冷氣入勿食其葉治瘕和醋煮理轉筋葉汁醋服效衍義曰扁豆有黑白鵲三等皆於豆脊有白路白者治霍亂筋轉豉味苦寒無毒主傷寒頭痛寒熱瘴氣惡毒煩躁滿悶虛勞喘吸兩腳疼冷又殺六畜胎子諸毒陶隱居云豉食中之常用春夏天氣不和蒸炒以酒漬服之至佳依康伯法先以醋酒溲蒸曝燥以麻油和又蒸曝之凡三過乃末椒乾薑屑合和以進食勝今作油豉也患腳人常將其酒浸以滓敷腳皆瘥好者出襄陽錢塘香美而濃取中心者彌善臣禹錫等謹按藥性論云豆豉得䤈良殺六畜毒味苦甘主下血痢如刺者豉一升水漬才令相淹煎一兩沸絞汁頓服不瘥可再服又傷寒暴痢腹痛者豉一升薤白一握切以水三升先煮薤納豉更煮湯色黑去豉分為二服不瘥再服熬末能止汗主除煩躁治時疾熱病發汗又治陰莖上瘡痛爛豉一分蚯蚓濕泥二分水研和塗上干易禁熱食酒菜蒜又寒熱風胸中瘡生者可搗為丸服良陳藏器云蒲州豉味鹹無毒主解煩熱熱毒寒熱虛勞調中發汗通關節殺腥氣傷寒鼻塞作法與諸豉不同其味烈陝州又有豉汁經年不敗大除煩熱入藥並不如今之豉心為其無鹽故也孟詵云豉能治久盜汗患者以一升微炒令香清酒三升漬滿三日取汁冷暖任人服之不瘥更作三兩劑即止日華子云治中毒藥蠱氣瘧疾骨蒸並治犬咬圖經文具大豆黃卷條下食療云陝府豉汁甚勝於常豉以大豆為黃蒸每一斗加鹽四升椒四兩春三日夏兩日冬五日即成半熟加生薑五兩既潔且精勝埋於馬糞中黃蒸以好豉心代之聖惠方治口舌生瘡胸膈疼痛用焦豉細末含一宿便瘥外臺祕要治蟲刺螫人方好豉心以足為限但覺刺即熟嚼豉以敷之少頃見豉中毛即瘥不見又嚼敷之晝夜勿絶見毛為度千金方治酒病豉蔥白各半升水二升煮取一升頓服又方治喉痹卒不語煮豉汁一升服覆取汗亦可末桂著舌下漸咽又方治被毆傷瘀血聚腹滿豉一升水三升煮三沸分服不瘥再作又方四肢骨破及筋傷蹉跌以水二升豉三升漬之攪取汁飲止心悶又方蠼螋尿瘡杵豉敷之又方治發背癰腫已潰未潰方香豉三升少與水和熟搗成泥可腫處作餅子厚三分以上有孔勿覆孔上布豉餅以艾烈其上灸之使溫溫而熱勿令破肉如熱痛即急易之患當減快得分穩一日二度灸之如先有瘡孔中汁出即瘥肘後方中緩風四肢不收者豉三升水九升煮取三升分為三服日二作亦可酒漬飲之葛氏方治重下此即赤白痢也熬豉令小焦搗服一合日三無比又豉熬令焦水一升淋取汁令服冷則酒淋日三服有驗又方各上出血如針孔取豉三升水三升煮之沸去滓服一升日三梅師方治傷寒汗出不解已三四日胸中悶吐方豉一升鹽一合水四升煎取一升半分服當吐又方闢溫疫法熬豉和白朮浸酒常服之又方治傷寒服藥搶心煩熱以豉一升梔子十四枚銼水三升煎取一升分三服孫真人治頭風痛以豉湯洗頭避風即瘥食醫心鏡主風毒腳膝攣急骨節痛豉心五升九蒸九曝以酒一斗取浸經宿空心隨性緩飲之又方小兒寒熱惡氣中人以濕豉為丸如雞子大以摩腮上及手足心六七遍又摩心臍上旋旋祝之了破豉丸看有細毛棄道中即瘥勝金方治小兒頭上生惡瘡以黃泥聚豉煨熟冷後取出豆豉為末以蓴菜油敷之瘥王氏博濟治臟毒下血不止用豉大蒜等分一處杵勻丸如梧子大每服鹽湯下三十丸血痢亦治簡要濟衆主傷寒後毒氣攻手足及身體虛腫豉酒方豉五合微炒以酒一升半同煎五七沸任性稍熱服之姚和衆治小兒丹毒破作瘡黃水出焦炒豉令煙絶為末油調敷之傷寒類要治傷寒熱病後攻目生翳者燒豉二七枚末以管吹之子母祕録華他安胎豉汁服之妙又方治墮胎血下盡煩滿豉一升水三升三沸煮末鹿角服方寸匕楊氏産乳療惡瘡熬豉為末敷之不過三四次茆亭客話蝦蟆小者有毒主人小便閉澀臍下憋疼痛至死者以生豉一合投新汲水半碗浸令水濃頓飲之愈緑豆味甘寒無毒主丹毒煩熱風疹藥石發動熱氣奔豚生研絞汁服亦煮食消腫下氣壓熱解石用之勿去皮令人小壅當是皮寒肉平圓小緑者佳又有稙音陟豆苗子相似主霍亂吐下取葉搗絞汁和少醋溫服子亦下氣今附臣禹錫等謹按孟詵云緑豆平諸食法作餅炙食之佳謹按補益和五臟安精神行十二經脈此最為良今人食皆撻去皮即有少擁氣若愈病須和皮故不可去又研汁煮飲服之治消渴又去浮風益氣力潤皮肉可長食之日華子云緑豆冷益氣除熱毒風厚腸胃作枕明目治頭風頭痛白豆平無毒補五臟益中助十二經脈調中暖腸胃葉利五臟下氣嫩者可作菜食生食之亦佳可常食新補見孟詵及日華子孫真人食忌白豆味鹹腎之谷腎病宜食煞鬼氣
