body:
  text: 卷第二十三己酉新增衍義上品豆蔻味辛溫無毒主溫中心腹痛嘔吐去口臭氣生南海陶隱居云味辛烈者為好甚香可常含之其五和糝素感切中物皆宜人廉姜溫中下氣益智熱枸音矩櫞音沿溫甘蕉麂音幾目並小冷爾唐本注云豆蔻苗似山姜花黃白苗根及子亦似杜若枸櫞性冷陶云溫誤爾今注此草豆蔻也下氣止霍亂臣禹錫等謹按蜀本圖經云苗似杜若春花在穗端如芙蓉四房生於莖下白色花開即黃根似高良薑實若龍眼而無鱗甲中如石榴子莖葉子皆味辛而香十月收今苑中亦種之藥性論云草豆蔻可單用能主一切冷氣陳藏器云山姜味辛溫去惡氣溫中中惡霍亂心腹冷痛功用如姜南人食之根及苗並如姜而大作樟木臭又有㺐子姜黃色緊辛辣破血氣殊強此姜又云枸櫞生嶺南大葉甘桔屬也子大如盞味辛酸性溫皮去氣除心頭痰水無別功日華子云豆蔻花熱無毒下氣止嘔逆除霍亂調中補胃氣消酒毒又云山姜花暖無毒調中下氣消食殺酒毒圖經曰豆蔻即草豆蔻也生南海今嶺南皆有之苗似蘆葉似山薑杜若輩根似高良薑花作穗嫩葉卷之而生初如芙蓉穗頭深紅色葉漸展花漸出而色漸淡亦有黃白色者南人多采以當果實尤貴其嫩者並穗入鹽同淹治疊疊作朵不散落又以木槿花同浸欲其色耳其作實者若龍眼子而鋭皮無鱗甲中子若石榴瓣候熟採之曝乾根苗微作樟木氣其山姜花莖葉皆姜也但根不堪食足與豆蔻花相亂而微小耳花生葉間作穗如麥粒嫩紅色南人取其未大開者謂之含胎花以鹽水淹藏入甜糟中經冬如琥珀色香辛可愛用其膾醋最相宜也又以鹽殺治曝乾者煎湯服之極能除冷氣止霍亂消酒食毒甚佳雷公云凡使須去蒂並向裡子後取皮用茱萸同於鏊上緩炒待茱萸微黃黑即去茱萸取草豆蔻皮及子杵用之千金方治心腹脹滿短氣以草豆蔻一兩去皮為末以木瓜生薑湯下半錢海藥云豆蔻生交趾其根似益智皮殼小厚核如石榴辛且香蒳草樹也葉如芄蘭而小三月採其葉細破陰乾之味近苦而有甘衍義曰豆蔻草豆蔻也氣味極辛微香此是對肉豆蔻而名之若作果則味不和不知前人之意編入果部有何意義性溫而調散冷氣力甚速花性熱淹置京師然味不甚美微苦必為能消酒毒故為果花干則色淡紫藕實莖味甘平寒無毒主補中養神益氣力除百疾久服輕身耐老不飢延年一名水芝丹一名蓮生汝南池澤八月採陶隱居云此即今蓮子八月九月取堅黑者干搗破之花及根併入神仙用今云莖恐即是根不爾不應言甘也宋帝時太官作血䘓音勘庖人削藕皮誤落血中遂皆散不凝醫乃用藕療血多效也唐本注云別録云藕主熱渴散血生肌久服令人心歡臣禹錫等謹按蜀本圖經云此生水中葉名荷圓徑尺余爾雅云荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中的的中薏是也爾雅釋曰芙蕖其總名也別名芙蓉江東人呼荷菡萏蓮花也的蓮實也薏中心也郭云蔤莖下白蒻在泥中者今江東人呼荷華為芙蓉北方人便以藕為荷亦以蓮為荷蜀人以藕為茄或用其母為華名或用根子為母葉號此皆名相錯習俗傳誤失其正體也陸機疏云蓮青皮里白子為的的中有青為薏味甚苦故俚語云苦如薏是也藥性論云藕汁亦單用味甘能消瘀血不散節搗汁主吐血不止口鼻並皆治之孟詵云藕生食之主霍亂後虛渴煩悶不能食其産後忌生冷物惟藕不同生冷為能破血故也又蒸食甚補五臟實下焦與蜜同食令人腹臟肥不生諸蟲亦可休糧仙家有貯石蓮子及干藕經千年者食之到妙矣又云蓮子性寒主五臟不足傷中氣絶利益十二經脈血氣生食微動氣蒸食之良又熟去心為末蠟蜜和丸日服三十丸令人不飢此方仙家用爾又雁腹中者空腹食十枚身輕能登高涉遠雁食糞于田野中經年尚生又或於山岩之中止息不逢陰雨經久不壞又諸鳥猿猴不食藏之石室內有得三百餘年者逢此食永不老矣其房荷葉皆破血陳藏器云藕實蓮也本功外食之宜蒸生則脹人腹中薏令人吐食當去之經秋正黑者名石蓮入水必沉惟煎鹽滷能浮之石蓮山海間經百年不壞取得食之令發黑不老藕本功外消食止泄除煩解酒毒壓食及病後熱渴又云荷鼻味苦平無毒主安胎去惡血留好血血痢煮服之即荷葉蒂也又葉及房主血脹腹痛産後胎衣不下酒煮服之又主食野菌毒水煮服之鄭玄雲芙蕖之莖曰荷的中薏食之令人霍亂陳士良云蓮子心生取為末以米飲調下三錢療血渴疾産後渴疾服之立愈日華子云藕溫止霍亂開胃消食除煩止悶口乾渴疾止怒令人喜破産後血悶生研服亦不妨搗罾金瘡並傷折止暴痛蒸煮食大開胃節冷解熱毒消瘀血産後血悶合地黃生研汁熱酒並小便服並得又云蓮子溫並石蓮益氣止渴助心止痢治腰痛治泄精安心多食令人喜又名蓮的蓮子心止霍亂又云蓮花暖無毒鎮心輕身益色駐顏入香甚妙忌地黃蒜又云荷葉止渴落胞殺菌毒併産後口乾心肺燥煩悶入藥炙用之圖經曰藕實莖生汝南池澤今處處有之生水中其葉名荷謹按爾雅及陸機疏謂荷為芙蕖江東呼荷其莖茄其葉蕸加遐二音或作葭其本蔤土筆切莖下白蒻音若在泥中者其花未發為菡萏已發為芙蓉其實蓮蓮謂房也其根藕幽州人謂之光旁至深益大如人臂其中的蓮中子謂青皮白子也中有青長二分為薏中心苦者是也凡此數物今人皆以中藥藕生食其莖主霍亂後虛渴煩悶不能食及解酒食毒花鎮心益顏色入香尤佳荷葉止渴殺菌毒今婦人藥多有用荷葉者葉中蒂謂之荷鼻主安胎去惡血留好血實主益氣其的至秋表皮黑而沉水者謂之石蓮陸機云可磨為豉如米飯輕身益氣令人強健醫人炒末以止痢治腰痛又治噦逆以實仁六枚炒赤黃色研末冷熟水半盞和服便止惟苦薏不可食能令霍亂大抵功用主血多效乃因宋太官作血䘓庖人削藕皮誤落血中遂散不凝自此醫家方用主血也聖惠方治時氣煩渴用生藕汁一中盞入生蜜一合令勻分為二服又方治食蟹中毒以生藕汁或煮乾蒜汁或冬瓜汁並佳又方治撲打墜損惡血攻心悶亂疼痛以火乾荷葉五斤燒令煙盡細研食前以童子熱小便一小盞調三錢匕日三服又方益耳目補中聰明強志蓮實半兩去皮心細研先煮令熟次以粳米三合作粥候熟入蓮實攪勻食之千金方治墜馬積血心腹唾血無數干藕根末酒服方寸匕日三肘後方令易産蓮花一葉書人字吞之立産經驗後方主吐血咯血以荷葉焙乾為末米湯下二錢匕梅師方治産後余血不盡奔上衝心煩悶腹痛以生藕汁二升飲之孫真人蓮子不去心食成霍亂食醫心鏡藉實味甘平無毒主補中養神益氣力除百病久服令人歡心止渴去熱輕身耐老不飢延年其根止熱渴破留血生肌久服令人悅澤矣救急方治産後血不盡疼悶心痛荷葉熬令香為末煎水下方寸匕集驗方治漆瘡取蓮葉乾者一斤水一斗煮取五升洗瘡上日再瘥詩疏的五月中生蓮脆至秋表皮黑的成可食可摩以為飯如粟飯輕身養氣令人強健又可為粥唐書姜撫言服常春藤使曰發還須則長生可致藤生太湖最良終南往往有之不及也帝遣使者至太湖多取以賜中朝老臣又言終南山有旱藕餌之延年狀類葛粉帝作湯餅賜大臣右驍衛將軍甘守誠能訂藥石曰常春者千歲藟也旱藕牡蒙也方家久不用撫易名以神之太清諸草木方七月七日採蓮花七分八月八日採根八分九月九日採實九分陰乾搗篩服方寸匕令人不老華山記華山頂有池生千葉蓮花服之羽化衍義曰藕實就蓬中乾者為石蓮子取其肉於砂盆中干擦去浮上赤色留青心為末少入龍腦為湯點寧心志清神然亦有粉紅千葉白千葉者皆不實如此是有四等也其根惟白蓮為佳今禁中又生碧蓮亦一瑞也桔柚味辛溫無毒主胸中瘕熱逆氣利水穀下氣止嘔咳除膀胱留熱停水五淋利小便主脾不能消穀氣衝胸中吐逆霍亂止泄去寸白久服去臭下氣通神輕身長年一名桔皮生南山川穀生江南十月採陶隱居云此是說其皮功爾以東桔為好西江亦有而不如其皮小冷療氣乃言勝桔北人亦用之並以陳者為良其肉味甘酸食之多痰恐非益也今此雖用皮既是果類所以猶宜相從柚子皮乃可服而不復入藥用此應亦下氣唐本注云柚皮厚味甘不如桔皮味辛而苦其肉亦如桔有甘有酸酸者名胡甘今俗人或謂橙為柚非也按呂氏春秋云果之美者有云夢之柚郭璞云柚似橙而大於桔孔安國云小曰桔大曰柚皆為甘也今注自木部今移臣禹錫等謹按藥性論云桔皮臣味苦辛能治胸膈間氣開胃主氣痢消痰涎治上氣咳嗽陳藏器云桔柚本功外中實冷酸者聚痰甜者潤肺皮堪入藥子非宜人其類有朱柑乳柑黃柑石柑沙柑桔類有朱桔乳桔塌桔山桔黃淡子此輩皮皆去氣調中實總堪食就中以乳柑為上本經合入果部宜加實字入木部非也嶺南有柚大如冬瓜孟詵云桔止泄痢食之下食開胸膈痰實結氣下氣不如皮穰不可多食止氣性雖溫止渴又干皮一斤搗為末蜜為丸每食前酒下三十丸治下焦冷氣又取陳皮一斤和杏仁五兩去皮尖熬加少蜜為丸每日食前飲下三十丸下腹臟間虛冷氣腳氣衝心心下結硬悉主之日華子云桔味甘酸止消渴開胃除胸中隔氣又云皮暖消痰止嗽破癥瘕痃癖又云核治腰痛膀胱氣腎冷炒去殼酒服良桔囊上筋膜治渴及吐酒炒煎湯飲甚驗也又云柚子無毒治妊孕人吃食少並口淡去胃中惡氣消食去腸胃氣解酒毒治飲酒人口氣圖經曰桔柚生南山川穀及江南今江浙荊襄湖嶺皆有之木高一二丈葉與枳無辨刺出於莖間夏初生白花六月七月而成實至冬而黃熟乃可啖舊說小者為桔大者為柚又云柚似橙而實酢大於桔孔安國注尚書厥包桔柚郭璞注爾雅柚條皆如此說又閩中嶺外江南皆有柚比桔黃白色而大襄唐間柚色青黃而實小皆味酢皮厚不堪入藥今醫方乃用黃桔青桔兩物不言柚豈青桔是柚之類乎然黃桔味辛青桔味苦本經二物通云味辛又云一名桔皮又云十月採都是今黃桔也而今之青桔似黃桔而小與舊說大小苦辛不類則別是一種耳收之並去肉曝乾黃桔以陳久者入藥良古今方書用之最多亦有單服者取陳皮搗末蜜和丸食前酒吞三十丸梧子大主下焦積冷亦可並杏子仁合丸治腸間虛冷腳氣衝心心下結硬者悉主之而青桔主氣滯下食破積結及膈氣方用之與黃桔全別凡桔核皆治腰及膀胱腎氣炒去皮酒服之良肉不宜多食令人痰滯又乳柑橙子性皆冷並其類也多食亦不宜人今人但取其核作塗面藥余亦稀用故不悉載又有一種枸音矩亦音鉤櫞音沿如小瓜狀皮若橙而光澤可愛肉甚厚切如蘿蔔雖味短而香氛大勝柑桔之類置衣笥中則數日香不歇古作五和糝素感切所用陶隱居云性溫宜人今閩廣江西皆有彼人但謂之香櫞子或將至都下亦貴之雷公曰凡使勿用柚皮皺子皮其二件用不得凡修事須去白膜一重細銼用鯉魚皮裹一宿到明出用其桔皮年深者最妙肘後方治猝失聲聲咽不出桔皮五兩水三升煮取一升去滓頓服又方治食魚中毒濃煮桔皮飲汁經驗後方治膈下冷氣及酒食飽滿常服青桔皮四兩鹽一兩分作四分一分無用湯浸青桔皮一宿漉出去穰又用鹽三分一處拌和勻候良久銚子內炒微焦為末每服一錢半茶末半錢水一盞煎至七分放溫常服不用入茶煎沸湯點亦妙又方治婦人産後氣逆以青桔皮為末蔥白童子小便煎服之食醫心鏡云主胸中伏熱下氣消痰化食桔皮半兩微熬作末如茶法煎呷之又方治猝食噎以陳皮一兩湯浸去穰焙為末以水一大盞煎取半盞熱服又方治吹奶不癢不痛腫硬如石以青桔皮二兩湯浸去穰焙為末非時溫酒下神驗孫尚藥方治諸吃噫桔皮二兩湯浸去瓤銼以水一升煎之五合通熱頓服更加枳殼一兩去瓤炒同煎之服效集驗方治腰痛不可忍桔子仁炒研為末每服一錢酒一盞煎至七分和滓空心服列子吳楚有大木名柚碧樹而冬生實丹而味酸食皮汁止憤厥之疾尚書注小曰桔大曰柚揚州者為善故錫貢也衍義曰桔柚自是兩種故曰一名桔皮是元無柚字也豈有兩等之物而治療無一字別者即知柚一字為誤後人不深求其意謂柚字所惑妄生分別亦以過矣且青桔與黃桔治療尚別矧柚為別種也郭璞云柚似橙而大於桔此即是識桔柚者也今若不如此言之恐後世亦以柚皮為桔皮是貽無窮之患矣去古既遠後之賢者亦可以意逆之耳桔惟用皮與核皮天下甚所須也仍湯浸去穰余如經與注核皮二者須自收為佳有人患氣嗽將期或教以桔皮生薑焙乾神麯等分為末丸桐子大食後夜臥米飲服三五十丸兼舊患膀胱緣服此皆愈然亦取其陳皮入藥此六陳中一陳也腎疰腰痛膀胱氣痛微炒核去殼為末酒調服愈大棗味甘平無毒主心腹邪氣安中養脾助十二經平胃氣通九竅補少氣少津液身中不足大驚四肢重和百藥補中益氣強力除煩悶療心下懸腸澼久服輕身長年不飢神仙一名干棗一名美棗一名良棗八月採曝乾三歲陳核中仁燔音煩之味苦主腹痛邪氣生棗味甘辛多食令人多寒熱羸瘦者不可食葉覆麻黃能令出汗生河東平澤殺烏頭毒陶隱居云舊雲河東猗氏縣棗特異今青州出者形大核細多膏甚甜郁州互市亦得之而鬱州者亦好小不及爾江東臨沂金城棗形大而虛少脂好者亦可用南棗大惡殆不堪啖道家方藥以棗為佳餌其皮利肉補虛所以合湯皆擘之也唐本注云別録云棗葉散服使人瘦久即嘔吐揩熱痱瘡良臣禹錫等謹按孟詵云干棗溫主補津液強志三年陳者核中仁主惡氣卒疰忤又療耳聾鼻塞不聞音聲香臭者取大棗十五枚去皮核萆麻子三百顆去皮二味和搗綿裹塞耳鼻日一度易三十餘日聞聲及香臭先治耳後治鼻不可並塞之又方巴豆十粒去殼生用松脂同搗綿裹塞耳又云洗心腹邪氣和百藥毒通九竅補不足氣生者食之過多令人腹脹蒸煮食補腸胃肥中益氣第一青州次蒲州者好諸處不堪入藥小兒患秋痢與蟲棗食良日華子云干棗潤心肺止嗽補五臟治虛勞損除腸胃癖氣和光粉燒治疳痢牙齒有病人切忌啖之凡棗亦不宜合生蔥食又云棗葉溫無毒治小兒壯熱煎湯浴和葛粉裛痱子佳及治熱瘤也圖經曰大棗干棗也生棗並生河東今近北州郡皆有而青晉絳州者特佳江南出者堅燥少脂謹按棗之類最多郭璞注爾雅棗壺棗云今江東呼棗大而鋭上者為壺壺猶瓠也邊腰棗云子細腰今謂之鹿盧棗櫅子兮切白棗云即今棗子白乃熟樲酸棗云木小實酢者遵羊棗云實小而圓紫黑色今俗呼之為羊矢棗洗大棗云今河東猗氏縣出大棗子如雞卵蹶泄苦棗云子味苦者皙無實棗云不著子者還味稔而審切棗云還味短味也而酸棗自見別條其餘種類非一今園圃皆種蒔之亦不能盡別其名又其極美者則有水菱棗御棗之類皆不堪入藥蓋肌實輕虛暴服之則枯敗惟青州之種特佳雖晉絳大實亦不及青州者之肉厚也並八月採曝乾南郡人煮而後曝及干皮薄而皺味更甘於它棗謂之天蒸棗然不堪入藥又有仲思棗大而長有一二寸者正紫色細紋小核味甘重北齊時有仙人仲思得之因以為名隋大業中信都郡嘗獻數顆近世稀復有之又廣州有一種波斯棗木無旁枝直聳三四丈至巔四向共生十餘枝葉如棕櫚彼土亦呼為海棕木三五年一著子都類北棗但瘥小耳舶商亦有攜本國生者至南海與此地人食之云味極甘似此中天蒸棗之類然其核全別兩頭不尖雙卷而圓如小塊紫礦種之不生疑亦蒸熟者近亦少有將來者食療云棗和桂心白瓜仁松樹皮為丸久服香身並衣亦香軟棗溫多食動風發冷風並咳嗽聖惠方令發易長東行棗根三尺橫安甑上蒸之兩頭汗出收之敷發即長又方治傷中筋脈急上氣咳嗽用棗二十枚去核以酥四兩微火煎入棗肉中泣盡酥常含一枚微微咽之外臺祕要痔發疼痛肥大棗一枚剝去皮取水銀掌中以唾研令極熟敷棗瓤上納下部瘥肘後方主下部蟲癢蒸大棗取膏以水銀和捻長三寸以綿裹宿納下部中明日蟲皆出梅師治妊娠四五月忽腹絞痛以棗十四枚燒令焦為末以小便服孫真人云脾病宜食又方生棗食之令人氣滿脹作寒熱服氣精義云常含棗核受氣令口行津液佳令人受氣生津液何晏九州論曰安平好棗中山好栗魏郡好杏河內好稻真定好梨吳氏本草棗主調中益脾氣令人好顏色美志氣神異經曰北方荒中有棗林焉其高五丈敷張枝條一里余子長六七寸圍過其長熟赤如朱干之不縮氣味甘潤殊於常棗食之可以安軀益氣力衍義曰大棗今先青州次晉州此二等可曬曝入藥益脾胃為佳餘隻可充食用又御棗甘美輕脆後衆棗熟以其甘故多生蟲今人所謂撲落酥者是又有牙棗先衆棗熟亦甘美但微酸尖長只二等止堪啖不堪收曝今人將干棗去核於鐺鍋中微火緩逼干為末量多少入生薑末為湯點服調和胃氣又將煮棗肉和治脾胃丸藥尤佳又青州棗去皮核焙乾為棗圈達都下為奇果仲思棗味甘溫無毒主補虛益氣潤五臟去痰嗽冷氣久服令人肥健好顏色神仙不飢形如大棗長一二寸正紫色細紋小核味甘重北齊時有仙人仲思得此棗因以為名隋大業中信都郡獻數顆又有千年棗生波斯國亦稍溫補非此之儔也今附臣禹錫等謹按爾雅云棗壺棗邊要棗櫅白棗樲酸棗楊徹齊棗遵羊棗洗大棗煮填棗蹶泄苦棗皙無實棗還味稔棗釋曰壺棗者棗形似壺也郭云今江東呼棗大而鋭上者為壺壺猶瓠也邊大而腰細者名邊要棗郭云子細腰今謂之鹿盧棗棗子白熟者名櫅實小而味酢者名樲棗遵一名羊棗郭云實小而圓紫黑色今俗呼之為羊矢棗洗最大之棗名也郭云今河東猗氏縣出大棗子如雞卵蹶泄者味苦之棗名也皙者無實之棗名也還味者短味也徹煮並未詳陳士良云苦棗大寒無毒棗中苦者是也人多不食主傷寒熱伏在臟腑狂蕩煩滿大小便祕澀取肉煮研為蜜丸藥佳今處處有葡萄味甘平無毒主筋骨濕痹益氣倍力強志令人肥健耐飢忍風寒久食輕身不老延年可作酒逐水利小便生隴西五原敦煌山谷陶隱居云魏國使人多齎來狀如五味子而甘美可作酒云用其藤汁殊美好北國人多肥健耐寒蓋食斯乎不植淮南亦如桔之變於河北矣人說即此間櫻於庚切薁於六切恐如彼之枳類桔耶唐本注云櫻薁與葡萄相似然櫻薁是千歲虆葡萄作酒法總收取子汁釀之自成酒櫻薁山葡萄並堪為酒陶云用藤汁為酒謬矣臣禹錫等謹按蜀本圖經云蔓生苗葉似櫻薁而大子有紫白二色又有似馬乳者又有圓者皆以其形為名又有無核者七月八月熟子釀為酒及漿別有法謹按櫻薁是山葡萄亦堪為酒孟詵云葡萄不問土地但收之釀酒皆得美好或云子不堪多食令人猝煩悶眼暗根濃煮汁細細飲之止嘔噦及霍亂後噁心妊孕人子上衝心飲之即下其胎安藥性論云葡萄君味甘酸除腸間水氣調中治淋通小便段成式酉陽雜俎云葡萄有黃白黑三種成熟之時子實通側也圖經曰葡萄生隴西五原敦煌山谷今河東及近京州郡皆有之苗作藤蔓而極長大盛者一二本綿被山谷間花極細而黃白色其實有紫白二色而形之圓鋭亦二種又有無核者皆七月八月熟取其汁可以釀酒謹按史記云大宛以葡萄為酒富人藏酒萬餘石久者十數歲不敗張騫使西域得其種而還種之中國始有蓋北果之最珍者魏文帝詔群臣說葡萄云醉酒宿醒掩露而食甘而不飴酸而不酢冷而不寒味長汁多除煩解悁他方之果寧有匹之者今大原尚作此酒或寄至都下猶作葡萄香根苗中空相通圃人將貨之欲得厚利暮溉其根而晨朝水浸子中矣故俗呼其苗為木通逐水利小腸尤佳今醫家多暴收其實以洽時氣發瘡疹不出者研酒飲之甚效江東出一種實細而味酸謂之櫻薁子衍義曰葡萄先朝西夏持師子來獻使人兼齎葡萄遺州郡比中國者皆相似最難乾不幹不可收仍酸澌不可食李白所謂胡人歲獻葡萄酒者是此瘡疱不出食之盡出多食皆昏人眼波斯國所出大者如雞卵栗味鹹溫無毒主益氣厚腸胃補腎氣令人耐飢生山陰九月採陶隱居云今會嵇最豐諸暨音既栗形大皮厚不美剡時冉切及始豐皮薄而甜相傳有人患腳弱往栗樹下食數升便能起行此是補腎之義然應生啖之若餌服故宜蒸曝之唐本注云栗作粉勝於菱芡音儉嚼生者塗瘡上療筋骨斷音段碎疼痛腫瘀血有效其皮名扶搗為散蜜和塗肉令急縮毛殼療火丹療毒腫實飼孩兒令齒不生樹白皮水煮汁主溪毒臣禹錫等謹按蜀本圖經云樹高二三丈葉似櫟花青黃色似胡桃花實大者如拳小如桃李又有板栗佳栗二樹皆大又有茅栗似板栗而細其樹雖小然葉與諸栗不殊惟春生夏花秋實冬枯今所在有之孟詵云栗子生食治腰腳蒸炒食之令氣擁患風水氣不宜食又樹皮主疸瘡毒謹按宜日中曝乾食即下氣補益不爾猶有木氣不補益就中吳栗大無味不如北栗也其上薄皮研和蜜塗面展皺又殼煮汁飲之止反胃消渴今所食生栗可於熱灰火中煨令汗出食之良不得通熱熱則擁氣生即發氣故火煨殺其木氣耳陳士良云栗有數種其性一類三顆一球其中者栗榍也理筋骨風痛日華子云栗榍生食破冷痃癖日生吃七個又生嚼罯可出箭頭亦罯惡刺並敷瘰癧腫毒痛樹皮煎汁治沙蝨溪毒殼煮治瀉血圖經曰栗舊不著所出州土但云生山陰今處處有之而兗州宣州者最勝木極類櫟花青黃色似胡桃花實有房匯若拳中子三五小者若桃李中子惟一二將熟則罅拆子出凡栗之種類亦多詩云樹之莘音榛栗陸機疏云栗五方皆有之周秦吳揚特饒吳越被城表裡皆栗惟濮陽及范陽栗甜美味長他方者悉不及也倭韓國諸島上栗大如雞子亦短味不美桂陽有莘而叢生實大如杏子中仁皮子形色與栗無異也但差小耳又有奧栗皆與栗同子圓而細或云即莘也今此色惟江湖有之又有茅栗佳栗其實更小而木與栗不殊但春生夏花秋實冬枯為異耳栗房當心一子謂之栗楔治血尤效今衡山合活血丹用之果中栗最有益治腰腳宜生食之仍略曝乾去其木氣惟患風水氣不宜食以其味鹹故也殼煮汁飲止反胃及消渴木皮主瘡毒醫家多用外臺祕要治小兒疳瘡栗子嚼敷之肘後方丹者惡毒之瘡五色無常治之煮栗皮有刺者洗之佳又方治熊虎爪甲所傷嚼栗敷之經驗後方治腎虛腰腳無力生栗袋盛懸干每日平明吃十餘顆次吃豬腎粥孫真人云栗味鹹腎病宜食勝金方治馬汗入肉血瘡用栗肉嚼敷之衍義曰栗欲干莫如曝欲生收莫如潤沙中藏至春末夏初尚如初收摘小兒不可多食生者難化熟即滯氣隔食生蟲往往致小兒病人亦不知所謂補腎氣者以其味鹹又滯其氣爾湖北路有一種栗頂圓末尖謂之旋栗圖經引詩言莘音榛栗者謂其象形也蓬藟力軌切味酸咸平無毒主安五臟益精氣長陰令堅強志倍力有子又療暴中風身熱大驚久服輕身不老一名覆盆一名陵虆一名陰虆生荊山平澤及冤句陶隱居云李云即是人所食莓音茂爾今注是覆盆苗莖也陶言蓬藟是根名乃昌容所服以易顏者蓋根苗相近爾李云莓也按切韻莓是覆盆草也又藟者藤也今據蓬藟之名明其藤蔓也唐本注云蓬藟覆盆一物異名本謂實而非根此亦誤矣亦如蜀漆與常山異條芎藭與蘼蕪各用今此附入果部者蓋其子是覆盆也臣禹錫等謹按陳士良云諸家本草皆說是覆盆子根今觀採取之家按草木類所說自有蓬藟似蠶莓子紅色其葉似野薔薇有刺食之酸甘恐諸家不識誤說是覆盆也圖經曰蓬藟覆盆苗莖也生荊山平澤及冤句覆盆子舊不著所出州土今並處處有之而秦吳地尤多苗短不過尺莖葉皆有刺花白子赤黃如半彈丸大而下有莖承如柿蒂狀小兒多食其實五月採其苗葉採無時江南人謂之莓然其地所生差晚三月始有苗八九月花開十月而實成功用則同古方多用亦榨其子取汁合膏塗發不白挪葉絞汁滴目中去膚赤有蟲出如絲線便效昌容服之以易顏其法四五月候甘實成採之曝乾搗篩水服三錢匕安五臟益精強志倍力輕體不老久久益佳崔元亮海上方著此三名一名西國草一名畢㮙伽一名覆盆子治眼暗不見物冷淚浸淫不止及青盲天行目暗等取西國草曬曝乾搗令極爛薄綿裹之以飲男乳汁中浸如人行八九里久用點目中即仰臥不過三四日視物如少年禁酒油面陳藏器云變白不老佛說云蘇蜜那花點燈正言此花也榨取汁合成膏塗發不白食其子令人好顏色葉挪絞取汁汁滴目中去膚赤有蟲出如絲線其類有三種四月熟甘美如覆盆子者是也余不堪入藥今人取茅莓當覆盆誤矣唐本余耐寒濕好顏色衍義曰蓬藟非覆盆也自別是一種雖枯敗而枝梗不散今人不見用此即賈山策中所言者是此也覆盆子味甘平無毒主益氣輕身令發不白五月採陶隱居云蓬藟是根名方家不用乃昌容所服以易顏者也覆盆是實名李云是莓子乃似覆盆之形而以津汁為味其核微細藥中用覆盆子小異此未詳孰是唐本注云覆盆蓬藟一物異名本謂實非根也李云莓子近之矣其根不入藥用然生處不同沃地則子大而甘瘠地則子細而酸此乃子有甘酸根無酸味陶景以根酸子甘將根入果重出子條殊為孟浪今注蓬藟乃覆盆之苗也覆盆乃蓬藟之子也陶注唐注皆非今用覆盆子補虛續絶強陰健陽悅澤肌膚安和臟腑溫中益力療勞損風虛補肝明目臣禹錫等謹按蜀本注李云是蓬藟子也陶云蓬藟子津味與覆盆子小異而云未審乃慎之至也蘇云覆盆蓬藟一物也而云剩出此條者亦非也今據蓬藟即莓也按切韻莓音茂其子覆盆也又按藟者藤也今此云覆盆子則不言其蔓藤也前云蓬藟則不言其子實也猶如芎藭與蘼蕪異條附子與烏頭殊用藥性論云覆盆子臣微熱味甘辛能主男子腎精虛竭女子食之有子主陰痿能令堅長孟詵云覆盆子味酸五月於麥田中得之良採得及烈日曬乾免爛不堪江東亦有名懸鉤子大小形異氣味功力同北土即無懸鉤南地無覆盆是土地有前後生非兩種物耳陳藏器云榨取汁合成膏塗發不白食其子令人好顏色葉挪絞取汁滴目中去膚赤有蟲出如絲線陳士良云蓬藟似蠶莓大覆盆小其苗各別日華子云莓子安五臟益顏色養精氣長髮強志療中風身熱及驚又有樹莓即是覆盆子圖經文具蓬藟條下雷公云凡使用東流水淘去黃葉並皮蒂盡了用酒蒸一宿以東流水淘兩遍又曬乾方用為妙也衍義曰覆盆子長條四五月紅熟秦州甚多永興華州亦有及時山中人採來賣其味酸甘外如荔枝櫻桃許大軟紅可愛失採則就枝生蛆益腎臟縮小便服之當覆其溺器如此取名食之多熱收時五六分熱便可採烈日曝仍須薄綿蒙之今人取汁作煎為果仍少加蜜或熬為稀湯點服治肺虛寒採時著水則不堪煎芰單伎實味甘平無毒主安中補五臟不飢輕身一名菱音陵陶隱居云廬江間最多皆取火燔以為米充糧今多蒸曝蜜和餌之斷谷長生水族中又有菰音孤首性冷恐非上品被霜後食之令陰不強又不可雜白蜜食令生蟲也唐本注云芰作粉極白潤宜人臣禹錫等謹按蜀本圖經云生水中葉浮水上其花黃白色實有二種一四角一兩角孟詵云菱實仙家蒸作粉蜜和食之可休糧水族之中此物最不能治病又云令人藏冷損陽氣痿莖可少食多食令人腹脹滿者可暖酒和姜飲一兩盞即消矣圖經曰芰菱實也舊不著所出州土今處處有之葉浮水上花黃白色花落而實生漸向水中乃熟實有二種一種四角一種兩角兩角中又有嫩皮而紫色者謂之浮菱食之尤美江淮及山東人曝其實仁以為米可以當糧道家蒸作粉蜜漬食之以斷谷水果中引物最治病解丹石毒然性冷不可多食食療神仙家用發冷氣人含吳茱萸咽其津液消其腹脹矣周禮疏屈到嗜芰即菱角也衍義曰芰今世俗謂之菱角所在有煮熟取仁食之代糧不益脾又有水菱亦芰也但大而脆可生食和合治療未聞其用有人食生芰多則利及難化是亦性冷橙子皮味苦辛溫作醬醋香美散腸胃惡氣消食去胃中浮風氣其瓤味酸去噁心不可多食傷肝氣又以瓤洗去酸汁細切和鹽蜜煎成煎食之去胃中浮風其樹亦似桔樹而葉大其形圓大於桔而香皮厚而皺八月熟今附臣禹錫等謹按陳士良云橙子暖無毒行風氣發虛熱療癭氣發瘰癧殺魚蟲毒不與獱肉同食發頭旋噁心圖經文具桔柚條下食療溫去噁心胃風取其皮和鹽貯之又瓤去惡氣和鹽蜜細細食之衍義曰橙子皮今人只為果或取皮合湯待賓未見入藥宿酒未醒食之速醒櫻桃味甘主調中益脾氣令人好顏色美志陶隱居云此即今朱櫻味甘酸可食而所主又與前櫻桃相似恐醫家濫載之未必是今者爾又胡頽子凌冬不凋子亦應益人或云寒熱病不可食唐本注云葉搗敷蛇毒絞葉汁服防蛇毒內攻臣禹錫等謹按孟詵云櫻桃熱益氣多食無損又云此名櫻非桃也不可多食令人發暗風東行根療寸白蛔蟲陳士良云櫻桃平無毒日華子云櫻桃微毒多食令人吐圖經曰櫻桃舊不著所出州土今處處有之而洛中南都者取勝其實熟時深紅色者謂之朱櫻正黃明者謂之蠟櫻極大者有若彈丸核細而肉厚尤難得也食之調中益氣美顏色雖多無損但發虛熱耳惟有暗風人不可啖啖之立發共葉可搗敷蛇毒亦絞汁服東行根亦殺寸白蛔蟲其木多陰最先百果而熟故古多貴之謹按書傳引吳普本草曰櫻桃一名朱茱一名麥甘酣今本草無此名乃知有脫漏多矣又爾雅云楔吉點切荊桃郭璞云今之櫻桃而孟詵以為櫻非桃類未知何據食療云溫多食有所損令人好顏色美志此名櫻桃俗名李桃亦名奈桃者是也甚補中益氣主水穀痢止泄精東引根治蛔蟲司馬相如賦山朱櫻即櫻桃也禮記謂之含桃爾雅謂之荊桃衍義曰櫻桃孟詵以為櫻非桃類然非桃類蓋以其形肖桃故曰櫻桃又何疑焉謂如木猴梨胡桃之類亦取其相似爾古謂之含桃可薦宗廟禮云先薦寢廟者是此唐王維詩云才是寢園春薦後非干御苑鳥銜殘小兒食之才過多無不作熱此果在三月末四月初間熟得正陽之氣先諸果熟性故熱今西洛一種紫櫻至熟時正紫色皮裡間有細碎黃點此最珍也今亦上供朝廷藥中不甚須雞頭實味甘平無毒主濕痹腰脊膝痛補中除暴疾益精氣強志令耳目聰明久服輕身不飢耐老神仙一名雁喙實一名芡音儉生雷澤池澤八月採陶隱居云此即今蒍音葦子形上花似雞冠故名雞頭仙方取此並蓮實合餌能令小兒不長正爾食之亦當益人唐本注云此實去皮作粉與菱音陵粉相似益人勝菱臣禹錫等謹按蜀本圖經云此生水中葉大如荷皺而有刺花子若拳大形似雞頭實若石榴皮青黑肉白如菱米也孟詵云雞頭作粉食之甚炒是長生之藥與小兒食不能長大故駐年耳生食動風冷氣蒸之於烈日曬之其皮即開亦可舂作粉陳士良云此種雖生於水而有軟根名䓈菜主小腹結氣痛宜食日華子云雞頭開胃助氣根可作蔬菜食圖經曰雞頭實生雷澤今處處有之生水澤中葉大如荷皺而有刺俗謂之雞頭盤花下結實其形類雞頭故以名之其莖𦵸之嫩者名花𦵸人採以為菜茹八月採實服餌家取其實並中子搗爛曝乾再搗下篩熬金櫻子煎和丸服之云補下益人謂之水陸丹經傳謂其子為芡經驗後方治益精氣強志意聰利耳目以雞頭實三合煮令熟去殼研如膏入粳米一合煮粥空心食之淮南子云雞頭已瘻頸疾幽人謂之雁頭莊子徐無鬼篇有雞雍疏云雞雍雞頭草也服之延年周禮加邊之實菱芡栗脯衍義曰雞頭實今天下皆有之河北沿溏濼居人採得舂去皮搗仁為粉蒸泄作餅可以代糧食多不益脾胃氣兼難消化中品梅實味酸平無毒主下氣除熱煩滿安心肢體痛偏枯不仁死肌去青黑痣惡疾止下痢好唾口乾生漢中川穀五月採火干陶隱居云此亦是今烏梅也用當去核微熬之傷寒煩熱水漬飲汁生梅子及白梅亦應相似今人多用白梅和藥以點痣蝕惡肉也服黃精人云禁食梅實唐本注云別録云梅根療風痹出土者殺人梅實利筋脈去痹臣禹錫等謹按藥性論云梅核仁亦可單用味酸無毒能除煩熱蕭炳云今人多用煙燻為烏梅孟詵云烏梅多食損齒又刺在肉中嚼白梅封之刺即出又大便不通氣奔欲死以烏梅十顆置湯中須臾挪去核杵為丸如棗大納下部少時即通謹按擘破水漬以少蜜相和止渴霍亂心腹不安及痢赤治瘧方多用之陳藏器云梅實本功外止渴令人膈上熱烏梅去痰主瘧瘴止渴調中除冷熱痢止吐逆梅葉搗碎湯洗衣易脫也嵩陽子云清水揉梅葉洗蕉葛衣經夏不脆余試之驗日華子云梅子暖止渴多啖傷骨蝕脾胃令人發熱根葉煎濃湯治休息痢並霍亂又云白梅暖無毒治刀箭止血研敷之又云烏梅暖無毒除勞治骨蒸去煩悶澀腸止痢消酒毒治偏枯皮膚麻痹去黑點令人得睡又入建茶乾薑為丸止休息痢大驗也圖經曰梅實生漢中川穀今襄漢川蜀江湖淮嶺皆有之其生實酢而損齒傷骨發虛熱不宜多食之服黃精人尤不相宜其葉煮濃汁服之已休息痢根主風痹出土者不可用五月採其黃實火熏干作烏梅主傷寒煩熱及霍亂躁渴虛勞瘦羸産婦氣痢等方中多用之南方療勞瘧劣弱者用烏梅十四枚豆豉二合桃柳枝各一虎口握甘草三寸長生薑一塊以童子小便二升煎七合溫服其餘藥使用之尤多又以鹽殺為白梅亦入除痰藥中用又下有楊梅條亦生江南嶺南其木若荔枝而葉細陰厚其實生青熟紅肉在核上無皮殼南人淹藏以為果寄至北方甚多今醫方鮮用故附於此聖惠方主傷寒下部生䘌瘡用烏梅肉三兩炒令燥杵為末煉蜜丸如梧桐子大以石榴根皮煎湯食前下十丸又方治痰厥頭痛以十個取肉鹽二錢酒一中盞合煎至七分去滓非時溫服吐即佳又方治痢下積久不瘥腸垢已出以二十個水一盞煎取六分去滓食前分為二服肘後方同又方治瘡中新努肉出杵肉以蜜和捻作餅子如錢許大厚以貼瘡瘥為度外臺祕要治下部蟲齧杵梅桃葉一斛蒸之令極熱納小器中大布上坐蟲死肘後方治心腹俱脹痛短氣欲死或已絶烏梅二七枚水五升煮一沸納大錢二七枚煮取二升半強人可頓服羸人可分之再服又方治傷寒以三十枚去核以豉一升苦酒三升煮取一升半去滓服又方治手指忽腫痛名為伐指以烏梅仁杵苦酒和以指清之須臾瘥葛氏治赤白痢下部疼重以二十枚打碎水二升煮取一升頓服又方治折傷以五斤去核飴五升合煮稍稍食之漸漸自消經驗方治馬汗入肉用烏梅和核爛杵為末以頭醋和為膏先將瘡口以針刺破但出紫血有紅血出用帛拭乾以膏敷上以帛系定梅師治傷寒四五日頭痛壯熱胸中煩痛烏梅十四個鹽五合水一升煎取一半服吐之簡要濟衆治消渴止煩悶以烏梅肉二兩微炒為末每服二錢水二盞煎取一盞去滓入豉二百粒煎至半盞去滓臨臥時服鬼遺方治一切瘡肉出以烏梅燒為灰杵末敷上惡肉立盡極炒吳氏本草梅核明目益氣不飢毛詩疏云梅曝乾為臘羹臛齏中又含可以香口魏文帝與軍士失道大渴而無水遂下令曰前有梅林結子甘酸可以止渴衍義曰梅實食梅則津液泄水生木也津液泄故傷齒腎屬水外為齒故也王叔和曰膀胱腎合為津府此語雖鄙然理存焉熏之為烏梅曝乾藏密器中為白梅木瓜實味酸溫無毒主濕痹邪氣霍亂大吐下轉筋不止其枝亦可煮用陶隱居云山陰蘭亭尤多彼人以為良果最療轉筋如轉筋時但呼其名及書上作木瓜字皆愈亦不可解俗人柱木瓜杖云利筋脛又有榠音冥楂音揸大而黃可進酒去痰又楂子澀斷痢禮云楂梨曰欑之鄭公不識楂乃云是梨之不臧者然古亦以楂為果今則不入例爾臣禹錫等謹按蜀本注其樹枝狀如奈花作房生子形似栝蔞火幹甚香爾雅云楙木瓜注云實如小瓜酢可食然多食亦不益人又爾雅注楂似梨而酢澀陳藏器云木瓜本功外下冷氣強筋骨消食止水痢後渴不止作飲服之又腳氣衝心取一顆去子煎服之嫩者更佳又止嘔逆心膈痰唾又云按榠楂一名蠻楂本功外食之去噁心其氣辛香致衣箱中殺蟲魚食之止心中酸水水痢楂子本功外食之去噁心酸咽止酒痰黃水小於榲桲而相似北土無之中都有鄭注禮云楂梨之不臧者為無功也孟詵云木瓜謹按枝葉煮之飲亦治霍亂不可多食損齒及骨又臍下絞痛木瓜一兩片桑葉七片大棗三枚碎之以水二升煮取半升頓服之瘥又云楂子平損齒及筋不可食亦主霍亂轉筋煮汁食之與木瓜功稍等余無有益人處江外常為果食日華子云木瓜止吐瀉賁豚及腳氣水腫冷熱痢心腹痛療渴嘔逆痰唾等根治腳氣又云榠楂平無毒消痰解酒毒及治咽酸煨食止痢浸油梳頭治發赤並白圖經曰木瓜舊不著所出州土陶隱居云山陰蘭亭尤多今處處有之而宣城者為佳其木狀若奈花生於春末而深紅色其實大者如瓜小者如拳爾雅謂之楙郭璞云實如小瓜酢可食不可多亦不益人宣州人種蒔尤謹遍滿山谷始實成則鏃紙花薄其上夜露日曝漸而變紅花紋如生本州以充上貢焉又有一種榠楂木葉花實酷類木瓜陶云大而黃可進酒去痰者是也欲辨之看蒂間別有重蒂如乳者為木瓜無此者為榠楂也木瓜大枝可作杖策之云利筋脈根葉者湯淋足脛可以已蹶又截其木干之作桶以濯足尤益道家以榠楂生壓汁合和甘松玄參末作濕香云甚爽神雷公云凡使勿誤用和圓子蔓子土伏子其色樣外形真似木瓜只氣味效並向裡子各不同若木瓜皮薄微赤黃香甘酸不澀調營衛助穀氣向裡子頭尖一面方是真木瓜若和圓子色微黃蒂核粗子小圓味澀微咸傷人氣蔓子顆小亦似木瓜味絶澀不堪用土伏子似木瓜味絶澀子如大樣油麻又苦澀不堪用若餌之令人目澀目赤多赤筋痛凡使木瓜勿令犯鐵用銅刀削去硬皮並子薄切於日中曬卻用黃牛乳汁拌蒸從巳至未其木瓜如膏煎卻於日中薄攤曬乾用也食療云主嘔啘風氣又吐後轉筋煮汁飲之甚良腳膝筋急痛煮木瓜令爛研作漿粥樣用裹痛處冷即易一宿三五度熱裹便瘥煮木瓜時入一半酒同煮之毛詩投我以木瓜報之以瓊琚注云木瓜楙木也可食之木衍義曰木瓜得木之正故入筋以鉛霜塗之則失醋味受金之制故如是今人多取西京大木瓜為佳其味和美至熟止青白色入藥絶有功勝宣州者味淡此物入肝故益筋與血病腰腎腳膝無力此物不可闕也柿味甘寒無毒主通鼻耳氣腸澼不足陶隱居云柿有數種云今烏柿火熏者性熱斷下又療狗齧瘡火煏皮逼切者亦好曬乾者性冷粗心柿尤不可多食令人腹痛生柿彌冷又有椑音卑色青唯堪生啖性冷復甚於柿散石熱家啖之亦無嫌不入藥用唐本注云別録云火柿主殺毒療金瘡火瘡生肉止痛軟熟柿解酒熱毒療金瘡火瘡生肉止痛軟熟柿解酒熱毒止口乾壓胃間熱臣禹錫等謹按孟詵云柿寒主補虛勞不足謹按乾柿厚腸胃澀中健脾胃氣消宿血又紅柿補氣續經脈氣又醂柿澀下焦健脾胃氣消宿血作餅及糕與小兒食治秋痢又研柿先煮粥欲熟即下柿更三兩沸與小兒飽食並奶母吃亦良又乾柿二斤酥一斤蜜半斤先和酥蜜鐺中消之下柿煎十數沸不津器貯之每日空腹服三五枚療男子女人脾虛腹肚薄食不消化面上黑點久服甚良陳藏器云柿本功外曬乾者溫補多食去面皯除腹中宿血剡縣火乾者名烏柿人服藥口苦及欲吐逆食少許立止蒂煮服之止噦氣黃柿和米粉作糗蒸與小兒食之止下痢飲酒食紅柿令人心痛直至死亦令易醉陶云解酒毒失矣日華子云柿冷潤心肺止渴澀腸療肺痿心熱嗽消痰開胃亦治吐血又云乾柿平潤聲喉殺蟲火柿性暖功用同前圖經曰柿舊不著所出州土今南北皆有之柿之種亦多黃柿生近京州郡紅柿南北通有朱柿出華山似紅柿而皮薄更甘珍椑音卑柿出宣歙荊襄閩廣諸州但可生啖不堪干諸柿食之皆美而益人椑柿更壓丹石毒耳其乾柿火乾者謂之烏柿出宣州越州性甚溫人服藥口苦欲逆食少許當止兼可斷下曬乾者為白柿入藥微冷又黃柿可和米粉作糗小兒食之止痢又以酥蜜煎乾柿食之主脾虛薄食柿蒂煮飲亦止噦木皮主下血不止曝乾更焙篩末米飲和二錢匕服之不以上衝下脫兩服可止又有一種小柿謂之軟棗俚俗曝乾貨之謂之牛奶柿至冷不可多食凡食柿不可與蟹同令人腹痛大瀉其枯葉至滑澤古人取以臨書俗傳柿有七絶一壽二多陰三無鳥巢四無蟲蠹五霜葉可玩六嘉實七落葉肥火聖惠方治耳聾鼻塞以乾柿三枚細切粳米三合豉少許煮粥空心食之産寶治産後或患妊逆氣亂心煩乾柿一個碎之以水十分煮熱呷衍義曰柿有著蓋柿於蒂下別生一重又牛心柿如牛之心蒸餅柿如今之市買蒸餅華州有一等朱柿比諸品中最小深紅色又一種塔柿亦大於諸柿性皆涼不至大寒食之引痰極甘故如是去皮掛大木株上使風日中自干食之多動風火乾者味不佳生則澀以溫水養之需澀去可食逮至自然紅爛澀亦自去干則性平芋味辛平有毒主寬腸胃充肌膚滑中一名土芝陶隱居云錢塘最多生則有毒蘞音杴不可食性滑下石服餌家所忌種芋三年不採成梠音呂芋又別有野芋名老芋形葉相似如一根並殺人人不識而食之垂死者他人以土漿及糞汁與飲之得活矣唐本注云芋有六種有青芋紫芋真芋白芋連禪芋野芋其青芋細長毒多初煮要須灰汁易水煮熟乃堪食爾白芋真芋連禪芋紫芋毒少並正爾蒸煮啖之又宜冷啖療熱止渴其真白連禪三芋兼肉作羹大佳蹲鴟之饒蓋謂此也野芋大毒不堪啖也臣禹錫等謹按孟詵云芋白色者無味紫色者破氣煮汁飲之止渴十月後曬乾收之冬月食不發病他時月不可食又和鯽魚鯉魚作臛良久食令人虛勞無力又煮汁洗膩衣白如玉亦可浴去身上浮風慎風半日陳藏器云芋本功外食之令人肥白小者極滑吞之開胃及腸閉産後煮食之破血飲其汁止血渴芋有八九種功用相似野芋生溪澗非人所種者根葉相類爾取根醋摩敷蟲瘡疥癬入口毒人又有天荷亦相似而大也日華子云芋冷破宿血去死肌其中有數種有芽芋紫芋園圃中種者可食余者有大毒不可容易食姜芋辛辣以生薑煮又換水煮方可食和魚煮甚下氣調中補虛葉裹開了癰瘡毒止痛又云芋葉冷無毒除煩止瀉療妊孕心煩迷悶胎動不安又鹽研敷蛇蟲咬並癰腫毒及罯敷毒箭圖經曰芋本經不著所出州土陶隱居注云錢塘最多今處處有之閩蜀淮甸尤殖此種類亦多大抵性效相近蜀川出者形圓而大狀若蹲鴟謂之芋魁彼人蒔之最盛可以當糧食而度饑年左思三都賦所謂徇蹲鴟之沃則以為濟世陽丸是也江西閩中出者形長而大葉皆相類其細者如卵生於大魁旁食之尤美不可過多乃有損也凡食芋並須圓圃蒔者其野芋有大毒不可輒食食則殺人唯土漿及糞汁解之說文解字云齊人謂芋為梠陶云種芋三年不採成莒二音相近蓋南北之呼不同耳古人亦單用作藥唐韋宙獨行方療癖氣取生芋子一斤壓破酒五升漬二七日空腹一杯神良唐本云多食動宿冷其葉如荷葉而長根類於薯蕷而圓圖經云其類雖多葉蓋相似葉大如扇廣尺余白芋毒微青芋多子真芋連禪芋紫芋並毒少而根俱不堪生啖蒸煮冷啖大治煩熱止渴今畿縣遍有諸山南江左唯有青白紫三芋而已食療煮汁俗之去身上浮氣浴了慎風半日許史記蜀卓氏云汶山之下沃野有蹲鴟至死不飢注蹲鴟大芋也沈存中筆談處士劉湯隱居王屋山嘗於齊中見一大蜂罥於蛛網蛛縛之為蜂所螫墜地俄頃蛛鼓腹欲裂徐徐行入草齧芋梗微破以瘡就齧處磨之良久腹漸消輕躁如故自後人有為蜂螫者挪芋梗敷之則愈衍義曰芋所在有之江浙二川者最大而長京洛者差圓小而唯東西京者佳他處味不及也當心出苗者為芋頭四邊附芋頭而生者為芋子八九月以後可食至時掘出置十數日卻以好土勻埋至春猶好生則辛而涎多食滯氣困脾唐杜甫詩曰園收芋栗不全貧者是此以梗擦蜂螫處愈烏芋味苦甘微寒無毒主消渴痹熱溫中益氣一名藉姑一名水萍二月生葉如芋三月三日採根曝乾陶隱居云今藉姑生水田中葉有丫烏牙切狀如澤瀉不正似芋其根黃似芋子而小煮之亦可啖疑其有烏者根極相似細而美葉乖異狀如莧草呼為𦽏茨恐此也唐本注云此草一名槎牙一名茨茹音孤主百毒産後血悶攻心欲死産難衣不出搗汁服一升生水中葉似錍普兮切箭鏃澤瀉之類也千金方云下石淋臣禹錫等謹按孟詵云茨茹不可多食吳人常食之令人患腳又髮腳氣癱緩風損齒令人失顏色皮肉乾燥卒食之令人嘔水又云𦽏茨冷下丹石消風毒除胸中實熱氣可作粉食明耳目止渴消疸黃若先有冷氣不可食令人腹脹氣滿小兒秋食臍下當痛日華子云𦽏茨無毒消風毒除胸胃熱治黃疸開胃下食服金石藥人食之良又云茨茹冷有毒葉研敷蛇蟲咬多食發虛熱及腸風痔瘻崩中帶下瘡癤煮以生薑御之佳懷孕人不可食又名燕尾草及烏芋矣圖經曰烏芋今鳧茨也舊不著所出州土苗似龍鬚而細正青色根黑如指大皮厚有毛又有一種皮薄無毛者亦同田中人並食之亦以作粉食之厚人腸胃不飢服丹石人尤宜蓋其能解毒耳爾雅謂之芍衍義曰烏芋今人謂之葧臍皮厚色黑肉硬白者謂之豬葧臍皮薄澤色淡紫肉軟者謂之羊葧臍正二月人採食之此二等藥罕用荒歲人多采以充糧枇杷葉味苦平無毒主卒啘不止下氣陶隱居云其葉不暇煮但嚼食亦瘥人以作飲則小冷唐本注云用葉須火炙布拭去毛不爾射人肺令咳不已又主咳逆不下食今注實味甘寒無毒多食發痰熱臣禹錫等謹按蜀本圖經云樹高丈餘葉大如驢耳背有黃毛子梂生如小李黃色味甘酸核大如小栗皮肉薄冬花春實四月五月熟凌冬不凋生江南山南今處處有孟詵云枇杷溫利五臟久食亦發熱黃子食之潤肺熱上焦若和熱炙肉及熱麵食之令人患熱毒黃病藥性論云枇杷葉使味甘能主胃氣冷嘔噦不止日華子云枇杷子平無毒治肺氣潤五臟下氣止吐逆並渴疾又云葉療婦人産後口乾圖經曰枇杷葉舊不著所出州郡今襄漢吳蜀閩嶺皆有之木高丈餘葉作驢耳形皆有毛其木陰密婆娑可愛四時不凋盛冬開白花至三四月而成實故謝瞻枇杷賦云稟金秋之青條抱東陽之和氣肇寒葩之結霜成炎果乎纖露是也其實作梂如黃梅皮肉甚薄味甘中核如小栗四月採葉曝乾治肺氣主渴疾用時須火炙布拭去上黃毛去之難盡當用粟杆作刷刷之乃盡人以作飲則小冷其木白皮止吐逆不下食雷公云凡使採得後稱濕者一葉重一兩乾者三葉重一兩者是氣足堪用使粗布拭上毛令盡用甘草湯洗一遍卻用綿再拭令乾每一兩以酥一分炙之酥盡為度食療卒嘔啘不止不欲食又煮汁飲之止渴偏理肺及肺風瘡胸面上瘡孫真人咳嗽以葉去毛煎湯服之衍義曰枇杷葉江東西湖南北二川皆有之以其形如枇杷故名之治肺熱嗽有功花白最先春也子大如彈丸四五月熟色若黃杏微有毛肉薄性亦平與葉不同有婦人患肺熱久嗽身如炙肌瘦將成肺癆以枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黃減半各如常制治訖同為末蜜丸如櫻桃大食後夜臥各含化一丸未終一劑而愈荔枝子味甘平無毒止渴益人顏色生嶺南及巴中其樹高一二丈葉青陰凌冬不凋形如松子殼朱若紅羅紋肉青白若水精甘美如蜜四五月熟百鳥食之皆肥矣今附圖經曰荔枝子生嶺南及巴中今泉福漳嘉蜀渝涪州興化軍及二廣州郡皆有之其品閩中第一蜀川次之嶺南為下扶南記云此木以荔枝為名者以其結實時枝弱而蒂牢不可摘取以刀斧劙音利取其枝故以為名耳其木高二三丈自徑尺至於合抱頗類桂木冬青之屬葉蓬蓬然四時榮茂不凋其木性至堅徑工人取其根作阮咸槽及彈棋局木之大者子至百斛其花青白狀若冠之蕤纓實如松花之初生者殼若羅紋初青漸紅肉淡白如肪玉味甘而多汁五六月盛熟時彼方皆燕會其下以賞之賓主極量取啖雖多亦不傷人小過度則飲蜜漿一杯便解荔枝始傳於漢世初唯出嶺南後出蜀中蜀都賦所云旁梃龍目側生荔枝是也蜀中之品在唐尤盛白居易圖序論之詳矣今閩中四郡所出特奇而種類僅至三十餘品肌肉甚厚甘香瑩白非廣蜀之比也福唐歲貢白曝荔枝並蜜煎荔枝肉俱為上方之珍果白曝須佳實乃堪其市貨者多用雜色荔枝入鹽梅曝之成而皮深紅味亦少酸殊失本真凡經曝皆可經歲好者寄至都下及關峽河外諸處味猶不歇百果流布之盛皆不及此又有焦核荔枝味更甜美或云是木生背陽結實不完就者白曝之尤佳又有緑色蠟色皆其品之奇者本土亦自難得其蜀嶺荔枝初生亦小酢肉薄不堪曝花及根亦入藥崔元亮海上方治喉痹腫痛以荔枝花並根共十二分以水三升煮去滓含細細咽之瘥止陳藏器味酸子如卵廣州記云荔枝精者子如雞卵大殼朱肉白核如雞舌香廣志曰荔枝冬青實如雞子核黃黑似熟蓮子實白如肪脂甘而多汁美極益人也海藥云謹按廣州記云生嶺南及波斯國樹似青木香味甘酸主煩渴頭重心躁背膊勞悶並宜食之嘉州以下渝州並有其實熟甘美荔枝熟人未採則百蟲不敢近人才採之烏鳥蝙蝠之類無不殘傷故採荔枝者日中而衆採之荔枝子一日色變二日味變三日色味俱變古詩云色味不逾三日變員安宇荔枝詩云香味三日變今瀘渝人食之多則發熱瘡食療微溫食之通神益智健氣及顏色多食則發熱衍義曰荔枝藥品中今未見用唯崔元亮方中收之果實中為上品多食亦令人發虛熱此物喜雙實尤可愛本朝有蔡君謨荔枝譜其說甚詳唐杜牧詩云二騎紅塵妃子笑無人知是荔枝來此是川蜀荔枝亦可生置之長安也以核熳火中燒存性為末新酒調一枚末服治心痛及小腸氣乳柑子味甘大寒主利腸胃中熱毒解丹石止暴渴利小便多食令人脾冷發痼癖大腸泄又有沙柑青柑山柑體性相類唯山柑皮療咽喉痛效余者皮不堪用其樹若桔樹其形似桔而圓大皮色生青熟黃赤未經霜時尤酸霜後甚甜故名柑子生嶺南及江南今附臣禹錫等謹按蕭炳云出西戎者佳日華子云冷無毒皮炙作湯可解酒毒及酒渴多食發陰汗圖經文具桔柚條下陳藏器産後肌浮柑皮為末酒下聖惠方治酒毒或醉昏悶煩渴要易醒方取柑皮二兩焙乾為末以三錢匕水一中盞煎三五沸入鹽如茶法服妙食療寒堪食之其皮不任藥用食多令人肺燥冷中發痃癖經驗後方獨醒湯柑子皮去瓤不計多少焙乾為末入鹽點半錢衍義曰乳柑子今人多作桔皮售於人不可不擇也柑皮不甚苦桔皮極苦至熟亦苦若以皮緊慢分別桔與柑又緣方宜各不同亦互有緊慢者脾腎冷人食其肉多致臟寒或泄利石蜜乳糖也味甘寒無毒主心腹熱脹口乾渴性冷利出益州及西戎煎煉沙糖為之可作餅塊黃白色唐本注云用水牛乳米粉和煎乃得成塊西戎來者佳江左亦有殆勝蜀者云用牛乳汁和沙糖煎之並作餅堅重今注此石蜜其實乳糖也前卷已有石蜜之名故注此條為乳糖唐本先附臣禹錫等謹按孟詵云石蜜治目中熱膜明目蜀中波斯者良東吳亦有並不如兩處者此皆煎甘蔗汁及牛乳汁則易細白耳和棗肉及巨勝末丸每食後含一兩丸潤肺氣助五臟津圖經文具甘蔗條下衍義曰石蜜川浙最佳其味厚其他次之煎煉成以鉶象物達京都至夏月及久陰雨多自消化土人先以竹葉及紙裹外用石灰埋之仍不得見風遂免今人謂乳糖其作餅黃白色者今人又謂之捻糖易消化入藥至少甘蔗音柘味甘平無毒主下氣和中助脾氣利大腸陶隱居云今出江東為勝廬陵亦有好者廣州一種數年生皆如大竹長丈餘取汁以為沙糖甚益人又有荻蔗節疏而細亦可啖也今按別本注云蔗有兩種赤色名崑崙蔗白色名荻蔗出蜀及嶺南為勝並煎為沙糖今江東甚多而劣於蜀者亦甚甘美時用煎為稀沙糖也今會稽作乳糖殆勝於蜀去煩止渴解酒毒臣禹錫等謹按蜀本圖經云葉似荻高丈許有竹荻二蔗竹蔗莖粗出江南荻蔗莖細出江北霜下後收莖笮其汁為沙糖煉沙糖和牛乳為石蜜並好日華子云冷利大小腸下氣痢補脾消痰止渴除心煩熱作沙糖潤心肺殺蟲解酒毒臘月窖糞坑中患天行熱狂人絞汁服甚良也圖經曰甘蔗舊不著所出州土陶隱居云今江東者為勝廬陵亦有好者廣州一種數年生皆如大竹長丈餘今江浙閩廣蜀川所生大者亦高丈許葉有二種一種似荻節疏而細短謂之荻蔗一種似竹粗長榨其汁以為沙糖皆用竹蔗泉福吉廣州多榨之煉沙糖和牛乳為石蜜即乳糖也唯蜀川作之荻蔗但堪啖或云亦可煎稀糖商人販貨至都下者荻蔗多而竹蔗少也食療主補氣兼下氣不可共酒食發痰外臺祕要主發熱口乾小便澀取甘蔗去皮盡令吃之咽汁若口痛搗取汁服之肘後方主卒乾嘔不息甘蔗汁溫令熱服半升日三又以生薑汁一升服並瘥梅師方主胃反朝食暮吐暮食朝吐旋旋吐者以甘蔗汁七升生薑汁一升二味相和分為三服食醫心鏡理正氣止煩渴和中補脾利大腸解酒毒削甘蔗去皮食後吃之張協都蔗賦云挫斯蔗而療渴若漱醴而含蜜衍義曰甘蔗今川廣湖南北二浙江東西皆有自八九月已堪食收至三四月方酸壞石蜜沙糖糖霜皆自此出唯川浙者為勝沙糖味甘寒無毒功體與石蜜同而冷利過之笮音詐甘蔗汁煎作蜀地西戎江東並有之唐本先附臣禹錫等謹按孟詵云沙糖多食令人心痛不與鯽魚同食成疳蟲又不與葵同食生流澼又不與筍同食使筍不消成症身重不能行履耳圖經文具甘蔗條下食療云主心熱口乾多食生長蟲消肌肉損齒發疳䘌不可長食之子母祕録治腹緊白糖以酒二升煮服不過再瘥衍義曰沙糖又次石蜜蔗汁清故費煎煉致紫黑色治心肺大腸熱兼啖駝馬今醫家治暴熱多以此物為先導小兒多食則損齒土製水也及生蟯蟲裸蟲屬土故因甘遂生椑音卑柿味甘寒無毒主壓石藥發熱利水解酒熱久食令人寒中去胃中熱生江淮南似柿本而青黑閒居賦云梁候烏椑之柿是也今附臣禹錫等謹按日華子云椑柿止渴潤心肺除腹臟冷熱作漆甚妙不宜與蟹同食令人腹疼並大瀉矣圖經文具柿條下下品桃核仁味苦甘平無毒主瘀血血閉瘕邪氣殺小蟲止咳逆上氣消心下堅除卒暴擊血破癥瘕通月水止痛七月採取仁陰乾桃花殺疰惡鬼令人好顏色味苦平無毒主除水氣破石淋利大小便下三蟲悅澤人面三月三日採陰乾桃梟味苦微溫主殺百鬼精物療中惡腹痛殺精魅五毒不祥一名桃奴一名梟景是實著樹不落實中者正月採之桃毛主下血瘕寒熱積聚無子帶下諸疾破堅閉刮取毛用之臣禹錫等謹按本經月閉通用藥云桃毛平桃蠹殺鬼辟邪惡不祥食桃樹蟲也莖白皮味苦辛無毒除邪鬼中惡腹痛去胃中熱葉味苦辛平無毒主除尸蟲出瘡中蟲膠煉之主保中不飢忍風寒實味酸多食令人有熱生太山川穀陶隱居云今處處有京口者亦好當取解核種之為佳又有山桃其仁不堪用桃仁作酪乃言冷桃膠入仙家用三月三日採花亦供丹方所須方言服三樹桃花盡則面色如桃花人亦無試之者服術人云禁食桃也唐本注云桃膠味苦平無毒主下石淋破血中惡疰忤花主下惡氣消腫滿利大小腸臣禹錫等謹按藥性論云桃仁使桃符主中惡孟詵云桃仁溫殺三蟲止心痛又女人陰中生瘡如蟲咬疼痛者可生搗葉綿裹納陰中日三四易瘥又三月三日收花曬乾杵末以水服二錢匕小兒半錢治心腹痛又禿瘡收未開花陰乾與桑椹赤者等分作末以豬脂和先用灰汁洗去瘡痂即塗藥又云桃能發丹石不可食之生者尤損人又白毛主惡鬼邪氣膠亦然又桃符及奴主精魅邪氣符煮汁飲之奴者丸散服之桃仁每夜嚼一顆和蜜塗手面良日華子云桃熱微毒益色多食令人生熱樹上自乾者治肺氣腰痛除鬼精邪氣破血治心痛酒摩暖服之又云桃葉暖治惡氣小兒寒熱客忤桃毛療崩中破癖氣桃蠹食之肥悅人顏色也圖經曰桃核仁並花實等生泰山今處處皆有之京東陝西出者尤大而美大都佳果多是圃人以他木接根上栽之遂至肥美殊失本性此等藥中不可用之當以一生者為佳七月採核破之取仁陰乾今都下市賈多取炒貨之云食之亦益人然亦多雜接實之核為不堪也千金方桃仁煎療婦人産後百病諸氣取桃仁一千二百枚去雙仁尖皮熬搗令極細以清酒十斗半研如麥粥法以極細為佳納小項瓷瓶中密以面封之納湯中煮一伏時藥成溫酒和服一匙日再其花三月三日採陰乾太清卉木方云酒漬桃花飲之除百疾益顏色崔元亮海上方治面上瘡黃水出並眼瘡一百五日收取桃花不計多少細末之食後以水半盞調服方寸匕日三甚良其實已干著木上經冬不落者名桃梟正月採之以中實者良胡洽治中惡毒氣蠱疰有桃奴湯是此也其實上毛刮取之以治女子崩中食桃木蟲名桃蠹食之悅人顏色莖白皮中惡方用之葉多用作湯導藥標嫩者名桃心尤勝張文仲治天行有支太醫桃葉湯熏身法水一石煮桃葉取七斗以為鋪席自圍衣被蓋上安桃湯於床簀下乘熱自熏停少時當雨汗汗遍去湯待歇速粉之並灸大椎則愈陳廩丘蒸法經云連發汗汗不出者死可蒸之如中風法以問張苗苗曾有疲極汗出臥單簟中冷但苦寒倦四日凡八過發汗汗不出燒地桃葉蒸之則得大汗被中敷粉極燥便瘥後用此發汗得出蒸發者燒地良久掃除去火可以水小灑取蠶砂若桃葉柏葉糠及麥麩皆可取用易得者牛馬糞亦可用但臭耳取桃葉欲落時可益收干之以此等物著火處令厚二三寸布席坐上溫復用此汗出若過熱當審細消息大熱者重席汗出周身便止溫粉粉之勿令過此法舊云出阮河南也桃皮亦主病集驗肺熱悶不止胸中喘急悸客熱往來欲死不堪服藥泄胸中喘氣用桃皮芫花各一升二物以水四升煮取一升五合去滓以故布手巾納汁中薄胸溫四肢不盈數刻即歇又必效方主蠱毒用大戟桃白皮東引者以大火烘之斑蝥去足翅熬三物等分搗篩為散以冷水服半方寸匕其毒即出不出更一服蠱並出此李饒州法云奇效若以酒中得則以酒服以食中得以飲服之桃膠入服食藥仙方著其法取膠二十斤絹袋盛櫟木灰汁一石中煮三五沸並袋出掛高處候乾再煮如此三度止曝乾篩末蜜和空腹酒下梧桐子大二十丸久服當仙去又主石淋古今録驗著其方云取桃木膠如棗大夏以冷水三合冬以湯三合和為一服日三當下石石盡即止其實亦不可多食喜令人熱發雷公云凡使須擇去皮渾用白朮烏豆二味和桃仁同於坩堝子中煮一伏時後漉出用手擘作兩片其心黃如金色任用之花勿使千葉者能使人鼻衄不止目黃凡用揀令淨以絹袋盛於檐下懸令乾去塵了用鬼髑髏勿使干桃子其鬼髑髏只是千葉桃花結子在樹上不落者干然於十一月內採得可為神妙凡修事以酒拌蒸從巳至未焙乾以銅刀切焙取肉用聖惠方補心虛治健忘令耳目聰明用戊子日取東引桃枝二寸枕之千金翼同又方治伏梁氣在心下結聚不散用桃奴三兩為末空心溫酒調二錢匕又方治小兒中蠱毒令腹內堅痛面目青黃淋露骨立病變無常方以桃樹寄生二兩末如茶點服日四五服外臺祕要治霍亂腹痛吐痢取桃葉三升切以水五升煮取一升三合分溫二服又方治虛熱渴桃膠如彈丸含之佳又方治骨蒸桃仁一百二十枚去皮雙仁留尖杵和為丸平旦井花水頓服令盡服訖量性飲酒令醉仍須吃水能多最精隔日又服一劑百日不得食肉又方治偏風半身不遂及癖疰方桃仁一千七百枚去雙仁尖皮以好酒一斗三升浸經二十一日出曬乾杵令細作丸每服二十丸還將桃酒服之又方治三蟲絞葉取汁一升飲又方酒漬桃花飲之除百病好容色又桃仁服之長生千金方治風項強不得顧視穿地作坑燒令通赤以水灑之令冷納生桃葉鋪其席下臥之令項在藥上以衣著項邊令氣上蒸病人汗出良久瘥又方治喉閉煮桃皮汁三升服之又方治産後遍身如粟粒熱如火者以桃仁研臘月豬脂調敷上日易又方治少小聤耳桃仁熟末以縠裹塞耳又方人有食桃病時已晚無復校就桃樹間得梟桃燒服之暫吐病即愈千金翼延年去風令光潤桃仁五合去皮用粳米飯漿研之令細以漿水杵取汁令桃仁盡即休微溫用洗面極妙又方以五月五日取東向桃枝日未出時作三寸木人著衣帶中令人不忘肘後方尸注鬼注病者葛云即是五尸之一注又挾諸鬼邪為祟其病變動及有三十六種至九十九種大略使人寒淋瀝沉沉默默不的知其所苦而無處不惡纍年積月漸就頓滯以至於死死後復傳旁人乃至滅門覺如此候者便宜急治桃仁五十枚碎研以水煮取四升一服盡當吐吐病不盡三兩日不吐再服也又方卒心痛東引桃枝一把切以酒一升煎取半升頓服大效又方治卒心痛桃仁七枚去皮尖熟研水一合頓服良亦可治三十年患又方治卒得咳嗽桃仁三升去皮杵著器中密封之蒸一次曬乾絹袋盛以納二斗酒中六七日可飲四五合稍增至一升葛氏卒中瘑瘡瘑瘡常對在兩腳杵桃葉以苦酒和敷皮亦得又方治小兒卵禿杵桃仁敷之亦治婦人陰腫瘙癢又方治腸痔大腸常血杵桃葉一斛蒸之納小口器中以下部拓上坐蟲自出又方治胎下血不出取桃樹上幹不落桃子燒作灰和水服瘥又産後陰腫痛燒桃仁敷之又方下部瘡已塊洞者桃皮葉杵水漬令濃去滓著盆中漬之有蟲出梅師方治諸蟲入耳取桃葉熟挪塞兩耳出又方治熱病後下部生瘡濃煮桃白皮如稀餳納少許熊膽研以綿蘸藥納下部瘡上又方治狂狗咬人取桃白皮一握水三升煎取一升服孫真人桃味辛肺病宜食又桃味酸無毒多食令人有熱又方主大小腸並不通桃葉取汁和服半升冬用桃樹皮又方主卒患瘰癧子不痛方取樹皮貼上灸二七壯又方主卒得惡瘡不識者取桃皮作屑納瘡中又方凡人好魘桃仁熬去皮尖三七枚以小便下之又方備急鬼疰心痛桃仁一合爛研煎湯吃食醫心鏡主上氣咳嗽胸隔痞滿氣喘桃仁三兩去皮尖以水一升研取汁和粳米二合煮粥食之又方主傳尸鬼氣咳嗽痃癖注氣血氣不通日漸消瘦桃仁一兩去皮尖杵碎以水一升半煮汁著米煮粥空心食之又方凡風勞毒腫疼攣痛或牽引小腹及腰痛桃仁一升去尖皮者熬令黑煙出熱研搗如脂膏以酒三升攪令相和一服取汗不過三瘥傷寒類要治黃疸身眼皆如金色不可使婦人雞犬見取東引桃根切細如箸若叉股以下者一握以水一大升煎取一小升適溫空腹頓服後三五日其黃離離如薄雲散唯服最後瘥百日方平復身黃散後可時時飲一盞清酒則眼中易散不飲則散遲忌食熱面豬魚等肉此是徐之才家祕方又方治天行䘌下部生瘡濃煎桃枝如糖以納下部中若口中生瘡含之又方治溫病令不相染方桃樹蟲矢末水服方寸匕又方凡天時疫癘者常以東行桃枝細銼煮浴佳又方小兒傷寒若得時氣桃葉三兩杵和水五升煮十沸取汁日五六遍淋之後燒雄鼠糞二枚服妙子母祕録治陰腫桃仁搗敷之又方小兒瘡初起膘漿似火瘡一名爛瘡杵桃仁面脂敷上又方小兒濕癬桃樹青皮為末和醋敷上崔氏主鬼疰心腹痛不可忍取東引桃枝削去蒼皮取白皮一握水二升煮取半升服令盡瘥如未定再服修真祕旨食桃訖入水浴令人成淋病抱朴子桃膠以桑灰漬之服百病愈又服之身輕有光明在晦夜之地數月斷谷荊楚歲時記謝道通登羅浮山見數童子以朱書桃板貼戶上道通還以紙寫之貼戶上鬼見畏之宋王微桃飴越地通天液首化玉體貌定仙人知暍日胡不蔭年宋齊丘化書李接桃而本強者其實毛周禮戎右掌戎車之兵革使詔贊王鼓傳王命於陳中會同充革車盟則以王敦闢盟遂役之贊牛耳桃茢注鬼所畏也茢苕帚所以掃不祥毛詩園有桃其實之淆今深山大谷之民熟以為飯典術曰桃者五木之精也今之作桃符著門上厭邪氣此仙木也家語孔子侍坐於哀公賜之桃與黍焉哀公曰請用孔子先黍而後食桃左右皆掩口而笑公曰黍者所以雪桃非為食之也東京賦云度朔作梗守以鬱壘神荼副焉對操索葦注上古有神荼與鬱壘兄弟二人桃樹下閲百鬼無道理者縛以葦索而飼虎今人作桃符板云左神荼右鬱壘者以此治瘧用桃仁一百個去皮尖於乳鉢中細研成膏不得犯生水候成膏入黃丹三錢丸如梧桐子大每服三丸當發日面北用溫酒吞下如不飲酒井花水亦得五月五日午時合忌雞犬婦人見衍義曰桃核仁桃品亦多京畿有油桃光小於衆桃不益脾有小點斑而光如塗油山中一種正是月令中桃始華者但花多子少不堪啖唯堪取仁唐文選謂山桃發紅萼者是矣又太原有金桃色深黃西京有崑崙桃肉深紫紅色此二種尤甘又餅子桃如今之香餅子如此數種入藥唯以山中自生者為正蓋取走泄為用不取肥好者如傷寒八九日間發熱如狂不解小腹滿痛有瘀血用桃仁三十個湯去皮尖麩炒赤色別研虻蟲三十枚去翅水蛭二十枚各炒川大黃一兩同為末再與桃仁同搗令勻煉蜜丸如小豆大每服二十丸桃仁湯下利下瘀血惡物便愈未利再服杏核仁味甘苦溫冷利有毒主咳逆上氣雷鳴喉痹下氣産乳金瘡寒心賁豚驚癇心下煩熱風氣去來時行頭痛解肌消心下急殺狗毒五月採之其兩仁者殺人可以毒狗花味苦無毒主補不足女子傷中寒熱痹厥逆實味酸不可多食傷筋骨生晉山川穀得火良惡黃芩黃耆葛根解錫毒畏蘘草陶隱居云處處有藥中多用之湯浸去尖皮熬令黃臣禹錫等謹按藥性論云杏仁能治腹痹不通發汗主溫病治心下急滿痛除心腹煩悶療肺氣咳嗽上氣喘促入天門冬煎潤心肺可和酪作湯益潤聲氣宿即動冷氣孟詵云杏熱面皯者取仁去皮搗和雞子白夜臥塗面明早以暖清酒洗之人患卒啞取杏仁三分去皮尖熬別杵桂一分和如泥取李核大綿裹含細細咽之日五夜三謹按心腹中結伏氣杏仁桔皮桂心訶梨勒皮為丸空心服三十丸無忌又燒令煙盡研如泥綿裹納女人陰中治蟲疽陳藏器云杏仁本功外殺蟲燒令煙未盡細研如脂物裹納䘌齒孔中亦主産門中蟲瘡癢不可忍者去人及諸畜瘡中風取仁去皮熬令赤和桂末研如泥綿裹如指大含之利喉咽去喉痹痰唾咳嗽喉中熱結生瘡杏酪濃煎如膏服之潤五臟去痰嗽生熟吃俱得半生半熟殺人日華子云杏熱有毒不可多食傷神圖經曰杏核仁生晉川山谷今處處有之其實亦數種黃而圓者名金杏相傳云種出濟南郡之分流山彼人謂之漢帝杏今近都多種之熟最早其扁而青黃者名木杏味酢不及金杏杏子入藥今以東來者為勝仍用家園種者山杏不堪入藥五月採破核去雙仁者古方有單服杏仁修治如法自朝蒸之至午而止便以慢火微烘至七日乃收貯之每旦腹空時不約多少任意啖之積久不止駐顏延年云是夏姬法然杏仁能使人血溢少誤之必出血不已或至委頓故近人少有服者又有杏酥法主風虛除百病搗爛杏仁一石以好酒二石研濾取汁一石五斗入白蜜一斗五升攪勻封於新甕中勿泄氣三十日看酒上酥出即掠取納瓷器中貯之取其酒滓團如梨大置空屋中作格安之候成飴脯狀旦服一枚以前酒下其酒任性飲之杏花干之亦入藥杏枝主墮傷取一握水一大升煮半下酒三合分再服大效其實不可多食傷神損筋骨劉禹錫傳信方治嗽補肺丸杏仁二大升山者不中揀卻雙仁及陳臭以童子小便一斗浸之春夏七日秋冬二七日並皮尖於砂盆子中研細濾取汁煮令魚眼沸候軟如麵糊即成仍時以柳篦攪勿令著底後即以馬尾羅或粗布下之日暴通丸即丸服之時食前後總須服三十丸五十丸任意茶酒下忌白水粥只是為米泔耳自初浸至成當以紙蓋之以畏塵土也如無馬羅即以粗布袋下之如取棗穰法雷公云凡使須以沸湯浸少時去皮膜去尖擘作兩片用白火石並烏豆杏仁三件於鍋子中下東流水煮從巳至午其杏仁色褐黃則去尖然用每修一斤用白火石一斤烏豆三合水旋添勿令闕免反血為妙也食療云主熱風頭痛又燒令煙盡去皮以亂髮裹之咬於所患齒下其痛便止熏諸蟲出並去風便瘥重者不過再服外臺祕要治偏風半身不遂兼失音不語生吞杏仁七枚不去皮尖日別從一七漸加至七七枚七七日周而復始食後即以竹瀝下之任意多少日料一升取盡又方治耳聾以杏仁七枚去皮拍碎為三分以綿裹於中著顆鹽如小豆許以器盛於飯甑中蒸之候飯熟出裹令患人側臥和綿捻一裹以油汁滴入耳中久又一裹依前法千金方治咳嗽旦夕加重增寒壯熱少喜多嗔忽進退面色不潤積漸少食狀若肺脈強緊浮者杏仁半斤去皮尖入於瓶內童子小便二斗浸七日了漉出去小便以暖水淘過於沙盆內研成泥別入瓷瓶中以小便三升煎之如膏量其輕重食上熟水下一錢匕婦人室女服之更妙又方主卒中風頭面腫杵杏仁如膏敷之又方治一切風虛常惡頭痛欲破者杏仁去皮尖干曝為末水九升研濾如作粥法緩火煎令如麻腐起取和羹粥酒納一匙服之每食前不限多少服七日後大汗出慎風冷豬魚雞蒜大酢一劑後諸風減瘥春夏恐酢少作服之秋九月後煎之此法神妙可深祕之又方治鼻中生瘡杵杏仁乳汁和敷之又方治頭面風眼瞤鼻塞眼暗冷淚杏仁三升為末水煮四五沸洗頭冷汗盡三度瘥又方治破傷風腫厚敷杏仁膏燃燭遙炙又方治疳蟲蝕鼻生瘡燒杏核壓取油敷之又方治喉痹杏仁熬熟杵丸如彈子含咽其汁為末帛裹含之亦得又方治痔穀道痛取杏仁熬熏杵膏敷之又方治小兒大人咳逆上氣杏仁三升去皮尖炒令黃杵如膏蜜一升分為三分納杏仁杵令得所更納一分杵如膏又納一分杵熟止先食含之咽汁又方治諸牙齦疼杏仁一百枚去皮尖兩仁以鹽方寸匕水一升煮令沫出含之未盡吐卻更含之三度瘥肘後方治穀道赤痛熬杏仁杵作膏敷之良又方箭鏑及諸刀刃在喉咽胸膈諸隱處不出杵杏仁敷之梅師方治食狗肉不消心下堅或脹口乾忽發熱妄語方杏仁一升去皮水三升煎沸去滓取汁為三服下肉為度又方主耳中汁出或痛有膿水熬杏仁令赤黑為末薄綿裹納耳中日三四度易之或亂髮裹塞之亦妙又方狗咬去皮尖杵敷之研汁飲亦佳矣孫真人方欲好聲杏仁一升熬去皮尖酥一兩蜜少許為丸如梧桐子大空心米湯下十五丸又方杏味苦心病宜服又方杏核仁傷筋損神其仁作湯如白沫不解食之令氣壅身熱食醫心鏡主氣喘促浮腫小便澀杏仁一兩去尖皮熬研和米煮粥極熟空心吃二合又方主五痔下血不止去尖皮及雙仁水三升研濾取汁煎減半投米煮粥停冷空心食之又方能下氣主嗽除風去野雞病杏仁一兩去皮尖雙仁捶碎水三升研濾取汁於鐺中煎以杓攪勿住水候三分減二冷呷之不熟及熱呷即令人吐勝金方治久患肺氣喘急至效杏仁去皮尖二兩童子小便浸一日一換夏月一日三四換浸半月取焙乾爛研令極細每服一棗大薄荷一葉蜜一雞頭大水一中盞同煎取七分食後溫服甚者不過三劑瘥永不發動忌腥物廣利方治眼築損胬肉出生杏仁七枚去皮細嚼吐於掌中及熱以綿裹箸頭將點胬肉上不過四五度瘥子母祕録治小兒臍赤腫杏仁杵如脂納體中相和敷臍腫上必效方治金瘡中風角弓反張以杏仁碎之蒸令溜絞取脂服一小升兼以瘡上摩效又方治狐尿刺螫痛杏仁細研煮一兩沸承熱以浸螫處數數易之塞上方治墜馬撲損瘀血在內煩悶取東引杏枝三兩細銼微熬好酒二升煎十餘沸去滓分為二服空心如人行三四里再服傷寒類要治溫病食勞以杏仁五兩酢二升煎取一升服之取汗瘥産寶方治卒不得小便杏仁二七枚去皮尖炒黃米飲服之瘥潞公藥准治咽喉癢痛失音不語杏仁桂心各一兩同研勻用半熟蜜和如櫻桃大新綿裹非時含此咽津大效修真祕旨云杏不用多食令人目盲又方服杏仁者往往二三年或瀉或臍中出物皆不可治左慈祕訣杏金丹本出渾皇子亦名草金丹方服之壽二千二百年不死只是以杏仁成丹輕重如金軟而可食因此立名從三皇后有得法者服之無有不得力奚仲呂望彭祖皆煉之彭祖曰寧可見此方不用封王寧可見此藥不用封候老子曰草金丹是衆仙祕要服皆得力只為作之者難世俗之人皆不信有神驗將聖人妄說作之者不肯精心潔淨浪有惡物觸犯藥即不成徒勞損廢又何益矣其造不得盲聾喑啞大病及噁心人女人小人知見丹亦不成丹成無忌只是夏姬服之壽年七百乃仙去煉草金丹法從寅月修杏樹人罕到者良又以寅月鑺斫樹下地間圖陽氣通暢至二月草生以鋤除草恐損地力至三月離樹五步作畦壠淘成擬引天之暴雨以須遠栽棘遍欄勿使人跡畜獸踐踏只亢旱即泉源水灑潤其樹下初春有霜雪即樹下燒火以救之恐損花苞萼至五月杏熟收取當月旬內自落者去核取仁六斗以熱湯退皮去雙仁取南流水三石和研取汁兩石八斗去滓並小美者亦得取新鐵釜受三石以來作灶須具五嶽三臺形用硃砂圖畫之其灶通四腳去地五寸著鐐不得絶稠恐下灰不得其釜用酥三斤以糠火及炭然釜少少磨三斤酥盡即納汁釜中釜上安盆盆上鑽孔用箏弦懸車轄至釜底其孔以紙纏塞勿令泄氣初著糠火併干牛糞火一日三動車轄以袞其汁五日有露液生十日白霜起又三日白霜盡即金花出若見此候即知丹霜成開盆用炭火炙乾以雄雞翎掃取以棗肉和為丸如梧桐子大釜中獨角成者為上其釜口次也丹滓亦能治冷疾服丹法如人吃一斗酒醉即吃五升吃一升者只吃半升下藥取滿日空心暖酒服三丸至七日宿疾除愈聲喑盲攣跛疝氣野雞癭氣風癇痃氣瘡腫萬病皆除愈頭白卻黑齒落更生張先師云二兩為一劑一劑延八十年兩劑延二百四十年三劑通靈不死若為天仙一萬年永忌房室若為地仙五千年三年忌房室若為人仙一千五百年百日忌房室陳居士上表十月以後泥爐造為雷息之時亦不用車馬轟闐聲何以十月造天雷二月起八月息初造丹時祭五嶽神仙地祗亦取童子看火候二十四氣五星五行陰陽十二時取此氣候用火丹乃成矣聖所服皆致長生久壽世人不能常服或言此藥無效若精氣確志必就神仙長年矣衍義曰杏核仁犬傷人量所傷大小爛嚼沃破處以帛系定至瘥無苦又湯去皮研一升以水一升半翻覆絞取稠汁入生蜜四兩甘草一莖約一錢銀石器中熳火熬成稀膏瓷器盛食後夜臥入少酥沸湯點一匙匕服治肺燥喘熱大腸祕潤澤五臟如無上證更入鹽點尤佳杏實本經別無治療日華子言多食傷神有數種皆熱小兒尤不可食多致瘡癰及上膈熱曬蓄為乾果其深赭色核大而褊者為金杏此等須接其他皆不逮也如山杏輩只可收仁又有白杏至熟色青白或微黃其味甘淡而不酸安石榴味甘酸無毒主咽燥渴損人肺不可多食酸實殼療下痢止漏精東行根療蛔蟲寸白陶隱居云石榴以花赤可愛故人多植之尤為外國所重入藥唯根殼而已其味有甜醋藥家用醋者子為服食者所忌臣禹錫等謹按蜀本圖經云子味甘酸其酸者尤能止痢藥性論云石榴皮使味酸無毒能治筋骨風腰腳不遂行步攣急疼痛主澀腸止赤白下痢一方取汁止目淚下治漏精根青者入染須方用陳藏器云石榴本功外東引根及皮主蛔蟲煎服子止渴花葉乾之為末和鐵丹服之一年變毛髮色黑如漆鐵丹飛鐵為丹亦鐵粉之屬是也孟詵云石榴溫多食損齒令黑皮炙令黃杵末以棗肉為丸空腹三丸日二服治赤白痢腹痛者取醋者一枚並子搗汁頓服段成式酉陽雜俎云石榴甜者謂之天漿能理乳石毒圖經曰安石榴舊不著所出州土或云本生本域陸機與弟云書云張騫為漢使外國十八年得塗林安石榴是也今處處有之一名丹若廣雅謂之若榴木不甚高大枝柯附干自地便生作叢種極易息折其條盤土中便生花有黃赤二色實亦有甘酢二種甘者可餐酢者入藥多食其實則損人肺東行根並殼入殺蟲及染鬚髮口齒等藥其花百葉者主心熱吐血及衄血等干之作末吹鼻中立瘥崔元亮海上方療金瘡刀斧傷破血流以石灰一升石榴花半斤搗末取少許敷上捺少時血斷便瘥又治寸白蟲取醋石榴根切一升東南引者良水二升三合煮取八合去滓著少米作稀粥空腹食之即蟲下又一種山石榴形頗相類而絶小不作房生青齊間甚多不入藥但蜜漬以當果或寄京下甚美雷公云凡使皮葉根勿令犯鐵若使石榴殼不計乾溼先用漿水浸一宿至明漉出其水如墨汁若使枝根葉並用漿水浸一宿方可用肘後方治赤白痢下水穀宿食不消者為寒可療酸石榴皮燒赤為末服方寸匕百一方治疔腫以針刺四畔用榴末著瘡上以面圍四畔灸以痛為度納末敷上急裹經宿連根自出經驗方治腸滑久痢神妙無比以石榴一個劈破炭火簇燒令煙盡急取出不令作白灰用瓷碗蓋一宿出火毒為末用醋石榴一瓣水一盞煎湯服二錢瀉亦治孫真人云食之損肺又方治耳聾法以八九月取石榴一開上作孔如球子大留靨子納米醋滿石榴中卻以靨子蓋之然後搜麵裹卻石榴無令醋出煻灰火中燒面熟藥成入少黑李子仙沼子末取水滴點耳內不得輒轉腦中痛勿驚如此三夜又點別耳依前法佳又方糞前有血令人面色黃石榴皮杵末茄子枝湯下斗門方治女子血脈不通用根東生者取一握炙乾濃煎一大盞服之瘥婦人赤白帶下同治廣利方治吐血衄血以百葉石榴花作末吹在鼻中瘥十全方治寸白蟲以醋石榴東引根一握淨洗細銼用水三升煎取半碗以下去滓五更初溫服盡至明取下蟲一大團永絶根本一日吃粥補古今録驗治冷熱不調或下帶水或赤白青黃者酸石榴子五枚合殼舂絞取二升汁每服五合至二升盡即斷小兒以意服之二三合衍義曰安石榴有酸淡兩種旋開單葉花旋結實實中子紅孫枝甚多秋後經雨則自坼裂道家謂之三尸酒云三尸得此果則醉河陰縣最多又有一種子白瑩徹如水晶者味亦甘謂之水晶石榴唯酸石榴皮合斷下藥仍須老木所結及收之陳久者佳微炙為末以燒粟米飯為丸梧桐子大食前熱米飲下三十至五十丸以知為度如寒滑加附子赤石脂各一倍梨味甘微酸寒多食令人寒中金瘡乳婦尤不可食陶隱居云梨種復殊多並皆冷利俗人以為快果不入藥用食之多損人也唐本注云梨削貼湯火瘡不爛止痛易瘥又主熱嗽止渴葉主霍亂吐痢不止煮汁服之今按別本注云梨有數種其消梨味甘寒無毒主客熱中風不語又療傷寒熱發解石熱氣驚邪嗽消渴利大小便又有青梨茅梨等並不任用又有桑梨唯堪蜜煮食主口乾生不益人冷中不可多食臣禹錫等謹按孟詵云梨除客熱止心煩不可多食又卒咳嗽以一顆刺作五十孔每孔納以椒一粒以麵裹於熱火灰中煨令熟出停冷去椒食之又方去核納酥蜜麵裹燒令熟食之又取梨肉納酥中煎停冷食之又搗汁一升酥一兩蜜一兩地黃汁一升緩火煎細細含咽凡治嗽皆須待冷喘思定後方食熱食之反傷矣令嗽更極不可救如此者可作羊肉湯餅飽食之便臥少時又胸中痞塞熱結者可多食好生梨即通卒暗風失音不語者生搗汁一合頓服之日再服止日華子云梨冷無毒消風療咳嗽氣喘熱狂又除賊風胸中熱結作漿吐風痰圖經曰梨舊不著所出州土今處處皆有而種類殊別醫家相承用乳梨鵝梨乳梨出宣城皮厚而肉實其味極長鵝梨出近京州郡及北都皮薄而漿多味差短於乳梨其香則過之咳嗽熱風痰實藥多用之其餘水梨消梨紫煤梨赤梨甘棠御兒梨之類甚多俱不聞入藥也梨葉亦主霍亂吐下煮汁服亦可作煎治風徐王效驗方主小兒腹痛大汗出名曰寒疝濃煮梨葉七合以意消息可作三四服飲之大良崔元亮海上方療嗽單驗方取好梨去核搗取汁一茶碗著椒四十粒煎一沸去滓即納黑餳一大兩消訖細細含咽立定又治卒患赤目胬肉坐臥痛者取好梨一顆搗絞取汁黃連三枝碎之以綿裹漬令色變仰臥注目中又有紫花梨療心熱唐武宗有此疾百醫不效青城山邢道人以此梨絞汁而進帝疾遂愈後復求之苦無此梨常山忽有一株因緘實以進帝多食之解煩躁殊效歲久木枯不復有種者今人不得而用之又江寧府信州出一種小梨名鹿梨葉如茶根如小拇指彼處人取其皮治瘡癬及疥癩云甚效八月採近處亦有但採其實作干不聞入藥食療云金瘡及産婦不可食大忌聖惠方治小兒心臟風熱昏懵躁悶不能食用梨三枚切以水二升煮取汁一升去滓入粳米一合煮粥食之梅師方治霍亂心痛利無汗方取梨葉枝一大握水一升煎取一升服又云正月二月勿食梨錢相公療蠼螋尿瘡黃水出嚼梨汁敷之干即易又方小兒寒疝腹痛大汗出濃煮梨葉汁七合頓服以意消息可作三四度飲之又方治中水毒取梨葉一把熟杵以酒一盞攪服之北夢鎖言有一朝士見梁奉御診之曰風疾已深請速歸去朝士復見鄜州馬醫趙鄂者復診之言疾危與梁所說同矣曰只有一法請官人試吃消梨不限多少咀齕不及絞汁而飲到家旬日唯吃消梨頓爽矣莊子譬猶楂梨桔柚耶其味相反而皆可於口魏文詔曰真定郡梨甘若蜜脆若菱可以解煩渴衍義曰梨多食則動脾少則不及病用梨之意須當斟酌唯病酒煩渴人食之甚佳終不能卻疾林檎味酸甘溫不可多食發熱澀氣令人好睡發冷痰生瘡癤脈閉不行其樹似奈樹其形圓如奈六月七月熟今在處有之今附臣禹錫等謹按孟詵云林檎主止消渴陳士良云此有三種大長者為奈圓者林檎夏熟小者味澀為梣秋熟日華子云林檎無毒下氣治霍亂肚痛消痰圖經曰林檎舊不著所出州土今在處有之或謂之來禽木似奈實比奈差圓六七月熟亦有甘酢二種甘者早熟而味脆美酢者差晚須熟爛乃堪啖病消渴者宜食之亦不可多反令人心中生冷痰今俗間醫人亦干之入治傷寒藥謂之林檎散食療云溫主谷痢泄精東行根治白蟲蛔蟲消渴好睡不可多食又林檎味苦澀平無毒食之閉百脈食醫心鏡治水痢以十枚半熟者以水一升煎取一升和林檎空心食子母祕録治小兒痢林檎構子杵取汁服以意多與服之瘥又方小兒閃癖頭髮堅黃瘰癧羸瘦杵林檎末以和醋敷上癖和移處就敷之李核仁味苦平無毒主僵仆躋瘀血骨痛根皮大寒主消渴止心煩逆奔氣實味苦除痼熱調中陶隱居云李類又多京口有麥李麥秀時熟小而甜脆核不入藥今此用姑熟所出南居李解核如杏子者為佳凡實熟食之皆好不可合雀肉食又不可臨水上啖之李皮水煎含之療齒痛佳今按別本注云李類甚多有緑李黃李紫李朱李水李並堪食味極甘美其中仁不入藥用有野李味苦名郁李子核仁入藥用之臣禹錫等謹按爾雅云休無實李痤接慮李駁赤李釋曰李之無實者名休郭云一名趙李痤接慮李郭云今之麥李與麥同熟因名云李之子赤者名駁藥性論云李核仁臣治女子小腹腫滿主踒折骨疼肉傷利小腸下水氣除腫滿又云李根皮使苦李者入用味鹹治腳下氣主熱毒煩躁根煮汁止消渴孟詵云李主女人卒赤白下取李樹東面皮去皴皮炙令黃香以水三升煮汁去滓服之日再驗謹按生子亦去骨節間勞熱不可多食臨水食令人發痰瘧又牛李有毒煮汁使濃含之治䘌齒脊骨有疳蟲可後灌此汁更空腹服一盞其子中仁主鼓脹研和麵作餅子空腹食之少頃當瀉矣日華子李溫無毒益氣多食令人虛熱又云李樹根涼無毒主赤白痢濃煎服華平無毒治小兒壯熱痁疾驚癇作浴湯圖經曰李核仁舊不著所出州土今處處有之李之類甚多見爾雅者有休無實李李之無實者一名趙李痤祖和切接慮李即今之麥李細實有溝道與麥同熟故名之駁赤李其子赤者是也又有青李緑李赤李房陵李朱仲李馬肝李黃李散見書傳美其味之可食陶隱居云皆不入藥用用姑熟所出南居李解核如杏子者為佳今不復識此醫家但用核若杏子形者根皮亦入藥用崔元亮海上方治面䵟黑子取李核中仁去皮細研以雞子白和如稀餳塗至晚每以淡漿洗之後塗胡粉不過五六日有效慎風孫真人肝病宜食食醫心鏡李味酸無毒主除固熱調中黃帝云李不可和蜜食食之損五臟衍義曰李核仁其窠大者高及丈今醫家少用實合漿水食令人霍亂澀氣而然今畿小窯鎮一種最佳堪入貢又有御李子如櫻桃許大紅黃色先諸李熟此李品甚多然天下皆有之所以比賢士大夫盛德及天下者如桃李無處不芬芳也別本注云有野李味苦名郁李子核仁入藥此自是郁李仁別是一種在木部中第十四卷非野李也楊梅味酸溫無毒主去痰止嘔噦消食下酒干作屑臨飲酒時服方寸匕止吐酒多食令人發熱其樹若荔枝樹而葉細陰青其形似水楊子而生青熟紅肉在核上無皮殼生江南嶺南山谷四月五月採今附臣禹錫等謹按孟詵云楊梅和五臟能滌腸胃除煩憒惡氣切不可多食甚能損齒及筋亦能治痢燒灰服之日華子云楊梅熱微毒療嘔逆吐酒皮根煎湯洗惡瘡疥癩忌生蔥圖經文具梅實條下陳藏器止渴張司空云地瘴無不生楊梅者信然矣食療溫和五臟腹胃除煩憒惡氣去痰實亦不可久食損齒及筋也甚能下痢又燒為灰亦斷下痢甚酸美小有勝白梅又白梅未乾者常含一枚咽其液亦通利五臟下少氣若多食之損人筋骨其酸醋之物自是土使然若南方人北居杏亦不食北地人南住梅乃啖多豈不是地氣鬱蒸令人煩憒好食斯物也經驗後方主一切傷損不可者瘡止血生肌無瘢痕絶妙和鹽核杵之如泥成挺子竹筒中收遇破即填小可即敷之此藥之功神聖宋齊丘化書梅接杏而本強者其實甘胡桃味甘平無毒食之令人肥健潤肌黑髮取瓤燒令黑末斷煙和松脂研敷瘰癧瘡又和胡粉為泥拔白鬚發以納孔中其毛皆黑多食利小便能脫人眉動風故也去五痔外青皮染髭及帛皆黑其樹皮止水痢可染褐仙方取青皮壓油和詹糖香塗毛髮色如漆生北土云張騫從西域將來其木春斫皮中出水承取沐頭至黑今附臣禹錫等謹按孟詵云胡桃不可多食動痰飲除風令人能食不得並漸漸食之通經脈潤血脈黑鬢髮又服法初日一顆五日加一顆至二十顆止之常服骨肉細膩光潤能養一切老痔疾日華子云潤肌肉益發食酸齒䘌細嚼解之圖經曰胡桃生北土今陝洛間多有之大株厚葉多陰實亦有房秋冬熟時採之性熱不可多食補下方亦用之取肉合破故紙搗篩蜜丸朝服梧桐子大三十丸又療壓撲損傷搗肉和酒溫頓服便瘥崔元亮海上方療石淋便中有石子者胡桃肉一升細米煮漿粥一升相和頓服即瘥實上青皮染髮及帛皆黑其木皮中水春斫取沐頭至黑此果本出羌胡漢張騫使西域還始得其種植之秦中後漸生東土故曰陳倉胡桃薄皮多肌陰平胡桃大而皮脆急捉則碎江表亦嘗有之梁沈約集有謝賜樂遊園胡桃啓乃其事也今京東亦有其種而實不佳南方則無孫真人食動疾吐水梅師方治火燒瘡取胡桃穰燒令黑杵如指敷瘡上衍義曰胡桃發風陝洛之間甚多外有青皮包之胡桃乃核也核中穰為胡桃肉須如此說用時須以湯剝去肉上薄皮過夏至則不堪食有人患酒楂風鼻上赤將桔子核微炒為末每用一錢匕研胡桃肉一個同以溫酒調服以知為度獼猴桃味酸甘寒無毒止暴渴解煩熱冷脾胃動泄闢壓丹石下石淋熱壅反胃者取汁和生薑汁服之一名藤梨一名木子一名獼猴梨生山谷藤生著樹葉圓有毛其形似雞卵大其皮褐色經霜始甘美可食枝葉殺蟲煮汁飼狗療瘑也今附陳藏器味鹹溫無毒主骨節風癱緩不隨長年變白野雞肉痔病調中下氣皮中作紙藤中汁至滑下石淋主胃閉取汁和生薑汁服之佳食療候熟收之取瓤和蜜煎作膏去人煩熱久食亦得令人冷能止消渴衍義曰獼猴桃今永興軍南山甚多食之解實熱過多則令人臟寒泄十月爛熟色淡緑生則極酸子繁細其色如芥子枝條柔弱高二三丈多附木而生淺山旁道則有存者深山則多為猴所食海松子味甘小溫無毒主骨節風頭眩去死肌變白散水氣潤五臟不飢生新羅如小栗三角其中仁香美東夷食之當果與中土松子不同今附臣禹錫等謹按日華子云松子逐風痹寒氣虛螺少氣補不足潤皮膚肥五臟東人以代麻腐食用海藥云去皮食之甚香美與雲南松子不同雲南松子似巴豆其味不厚多食發熱毒松子味甘美大溫無毒主諸風溫腸胃久服輕身延年不老味與卑占國偏桃仁相似其偏桃仁用與北桃仁無異是也奈味苦寒多食令人臚音閭脹病人尤甚陶隱居云江南乃有而北國最豐皆作脯不宜人有林檎相似而小亦恐非益人也今注有小毒主耐飢益心氣臣禹錫等謹按孟詵云奈主補中焦諸不足氣和脾卒患食後氣不通生搗汁服之日華子云奈冷無毒治飽食多肺壅氣脹圖經文具林檎條下食醫心鏡奈子味苦寒澀無毒主忍飢益心氣多食虛脹庵羅果味甘溫食之止渴動風氣天行病後及飽食後俱不可食之又不同大蒜辛物食令人患黃病樹生狀若林檎而極大今附臣禹錫等謹按陳士良云微寒無毒主婦人經脈不通丈夫營衛中血脈不行久食令人不飢葉似茶葉可以作湯療渴疾衍義曰庵羅果西洛甚多亦梨之類也其狀亦梨先諸梨熟七夕前後已堪啖色黃如鵝梨才熟便鬆軟入藥絶希用橄音敢欖音覽味酸甘溫無毒主消酒療鯸音侯鮐音怡毒人誤食此魚肝迷悶者可煮汁服之必解其木作楫撥著魚皆浮出故知物有相畏如此也核中仁研敷唇吻燥痛其樹似木槵子樹而高端直其形似生訶子無稜瓣生嶺南八月九月採又有一種名波斯橄欖色類亦相似其形核作二瓣可以蜜漬食之生雍州今附臣禹錫等謹按孟詵云橄欖主鯸鮐毒汁服之中此魚肝子毒人立死唯此木能解生嶺南山谷樹大數圍實長寸許其子先生者向下後生者漸高八月熟蜜藏極甜日華子云橄欖開胃下氣止渴圖經曰橄欖生嶺南今閩廣諸郡皆有之木似木槵而高且端直可愛秋晚實成南人尤重之咀嚼之滿口香久不歇生啖及煮飲並解諸毒人誤食鯸鮐肝至迷悶者飲其汁立瘥山野中生者子繁而木峻不可梯緣但刻其根下方寸許納鹽於中一夕子皆落木亦無損其枝節間有脂膏如桃膠南人採得並其皮葉煎之如黑餳謂之欖糖用膠船著水益干牢於膠漆雍州又有一種波斯橄欖與此無異但其核作三瓣可蜜漬食之陳藏器云樹大圓實長寸許南方人以為果生實味酸南州異物志曰橄欖子緣海浦嶼間生實大如軸頭皆反垂向下實先生者向下後生者漸高南方草木狀曰橄欖子大如棗八月熟生交趾海藥謹按異物志云生南海浦嶼間樹高丈餘其實如棗二月有花生至八月乃熟甚香橄欖木高大難採以鹽擦木身則其實自落衍義曰橄欖味澀食久則甘嚼汁咽治魚鯁榲桲味酸甘微溫無毒主溫中下氣消食除心間醋水去臭闢衣魚生北土似楂子而小今附臣禹錫等謹按陳士良云發毒熱祕大小腸聚胸中痰壅不宜多食澀血脈日華子云除煩渴治氣圖經曰榲桲舊不著所出州土今關陝有之沙苑出者更佳其實大抵類楂但膚慢而多毛味尤甘治胸膈中積食去醋水下氣止渴欲臥啖一兩枚而寢生熟皆宜楂子處處有之孟州特多亦主霍亂轉筋並煮汁飲之可敵木瓜常食之亦去心間醋痰皮搗末敷瘡止黃水實初熟時其氣氛馥人將致衣笥中亦香陳藏器云樹如林檎花白緑色衍義曰榲桲食之須淨去上浮毛不爾損人肺花亦香白色諸果中唯此多生蟲少有不蚛者圖經言欲臥啖一兩枚而寢如此恐太多痞塞胃脘榛子味甘平無毒主益氣力寬腸胃令人不飢健行生遼東山谷樹高丈許子如小栗軍行食之當糧中土亦有鄭注禮云榛似栗而小關中鄜坊甚多今附臣禹錫等謹按日華子云新羅榛子肥白人止飢調中開胃甚驗圖經文具栗條下一十三種陳藏器余靈床上果子主人夜臥讝語食之瘥也無漏子味甘溫無毒主溫中益氣除痰嗽補虛損好顏色令人肥健生波斯國如棗一云波斯棗海藥云樹若栗木其實如橡子有三角消食止咳嗽虛羸悅人久服無損也都角子味酸澀平無毒久食益氣止泄生南方樹高丈餘子如卵徐表南方記云都角樹二月花花連著實也海藥云謹按徐表南州記云生廣南山谷二月開花至夏末結實如卵主益氣安神遺泄痔溫腸久服無所損也文林郎味甘無毒主水痢去煩熱子如李或如林檎生渤海間人食之云其樹從河中浮來拾得人身是文林郎因以此為名也海藥云又南山亦出彼人呼榲桲是味酸香微溫無毒主水瀉腸虛煩熱並宜生食散酒氣也木葳子味酸平無毒主心中惡水水氣生嶺南山谷樹葉似楝子如橄欖而堅亦似棗也摩廚子味甘香平無毒主益氣潤五臟久服令人肥健生西域及南海子如瓜可為茹異物志云木有摩廚生自斯調厥汁肥潤其澤如膏馨香穓射可以煎熬彼州之人仰以為儲斯調國名也海藥云謹按異物志云生西域二月開花四月五月結實如瓜許益氣安神養血生肌久服健人也懸鉤根皮味苦平無毒主子死腹中不下破血殺蟲毒卒下血婦人赤帶下久患痢不問赤白膿血腹痛並濃煮服之子如梅酸美人食之醒酒止渴除痰唾去酒毒莖上有刺如鉤生江淮林澤取莖燒為末服之亦主喉中塞也鉤栗味甘平主不飢厚腸胃令人肥健子似栗而圓小生江南山谷樹大數圍冬月不凋一名巢鉤子又有雀子小圓黑味甘久食不飢生高山子小圓黑又有櫧音諸子小於橡子味苦澀止泄痢破血食之不飢令健行木皮葉煮取汁與産婦飲之止血皮樹如栗冬月不凋生江南子能除惡血止渴也石都念子味酸小溫無毒主痰嗽噦氣生嶺南樹高丈餘葉如白楊花如蜀葵正赤子如小棗蜜漬為粉甘美益人隋朝植於西苑也君遷子味甘平無毒主止渴去煩熱令人潤澤生海南樹高丈餘子中有汁如乳汁吳都賦云平仲君遷海藥云謹按劉斯交州記云其實中有乳汁甜美香好微寒無毒主消渴煩熱鎮心久服輕身亦得悅人顏色也韶子味甘溫無毒主暴痢心腹冷生嶺南子如栗皮肉核如荔枝廣志云韶葉似栗有刺斫皮納白脂如豬味甘酸亦云核如荔枝也棎子味甘澀平無毒生食主水痢熟者和蜜食之去嗽子似梨生江南吳都賦云棎榴御霜是也諸果有毒桃杏仁雙有毒五月食未成核果令人發癰癤及寒熱又秋夏果落地為惡蟲緣食之令人患九漏桃花食之令人患淋李仁不可和雞子食之患內結不消
