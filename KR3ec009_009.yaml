body:
  text: 卷第九己酉新增衍義艾葉味苦微溫無毒主灸百病可作煎止下痢吐血下部䘌瘡婦人漏血利陰氣生肌肉闢風寒使人有子一名冰臺一名醫草生田野三月三日採曝乾作煎勿令見風陶隱居云搗葉以灸百病亦止傷血汁又殺蛔蟲苦酒煎葉療癬甚良唐本注云別録云艾生寒熟熱主下血衄血膿血痢水煮及丸散任用臣禹錫等謹按藥性論云艾葉使能止崩血安胎止腹痛醋煎作煎治癬止赤白痢及五臟痔瀉血煎葉主吐血實主明目療一切鬼氣初生取作乾菜食之又除鬼氣炒艾作餛飩吞三五枚以飯壓之良長服止冷痢又心腹惡氣取葉搗汁飲又搗末和乾薑末為丸一服三十丸飯壓日再服治一切冷氣鬼邪毒氣最去惡氣孟詵云艾實與乾薑為末蜜丸消一切冷氣田野人尤與相當日華子云止霍亂轉筋治心痛鼻洪並帶下及患痢人後分寒熱急痛和蠟並訶子燒熏神驗艾實暖無毒壯陽助水臟腰膝及暖子宮圖經曰艾葉舊不著所出州土但云生田野今處處有之以復道者為佳云此種灸百病尤勝初春布地生苗莖類蒿而葉背白以苗短者為佳三月三日五月五日採葉曝乾經陳久方可用俗間亦生搗葉取汁飲止心腹惡氣古方亦用熟艾拓金瘡又中風掣痛不仁不隨並以干艾斛許揉團之納瓦甑中並下塞諸孔獨留一目以痛處著甑目下燒艾一時久知矣又治癩取干艾隨多少以浸面釀酒如常法飲之覺痹即瘥近世亦有單服艾者或用蒸木瓜丸之或作湯空腹飲之甚補虛羸然亦有毒其毒發則熱氣衝上狂躁不能禁至攻眼有瘡出血者誠不可妄服也食療云乾者並煎者金瘡崩中霍亂止胎漏春初採為可干餅子入生薑煎服止瀉痢三月三日可採作煎甚治冷若患冷氣取熟艾麵裹作餛飩可大如彈許又治百惡氣取其子和乾薑搗作末蜜丸如梧子大空心三十丸服以飯三五匙壓之日再服其鬼神速走出頗消一切冷血田野之人與此方相宜也又産後瀉血不止取干艾葉半兩炙熟老生薑半兩濃煎湯一服便止妙外臺祕要治霍亂吐下不止艾一把水三升煮取一升頓服又方治諸骨鯁生艾蒿數升水酒共一斗煮取四升稍稍飲之良肘後方鬼擊之病得之無漸卒著人如刀刺狀胸脅腹內㽲刺切痛不可抑按或即吐血鼻中出血下血一名鬼排以熟艾如雞子三枚水五升煎取二升頓服之又方治卒心痛白熟艾成熟者一升以水三升煮取一升去滓頓服若為客氣所中者當吐蟲物又方治傷寒及時氣溫病頭痛壯熱脈盛干艾葉三升以水一斗煮取一升去滓頓服取汗又方治病人齒無色舌上白或喜睡不知痛癢處或下痢急治下部不曉此者但攻其上不以為意下部生蟲食其肛爛見五臟便死燒艾於管中熏下部令煙入更入少雄黃良葛氏方治蛔蟲或心如刺口吐清水搗生艾取汁宿勿食但取肥香脯一方寸片先吃令蟲聞香然後即飲一升當下蛔又方妊娠卒胎動不安或但腰痛或胎轉搶心或下血不止艾葉一雞子大以酒四升煮取二升分為二服良經驗方治喉痹青艾和莖葉一握用醋搗敷痹上若冬月取干艾亦得李亞傳又方王峽州傳野雞痔病方用槐柳湯洗便以艾灸其上七壯以知為度王及郎中充西川安撫判官乘騾入洛谷數日而痔病因是大作如胡苽貫於腸頭其熱如煻煨火至一驛僵仆無計有主郵者云須灸即瘥及命所使為槐柳湯熱洗苽上因用艾灸三五壯忽覺一道熱氣盛入腸中因大轉瀉鮮血穢物一時出至楚痛瀉後遂失胡苽所在孫真人糞後有血濃煎艾葉生薑汁三合服斗門方治火眼用艾燒令煙起以碗蓋之候煙上碗成煤取下用溫水調化洗火眼即瘥更入黃連甚妙又方治癲癇用艾於陰囊下穀道正門當中間隨年歲灸之勝金方治中風口喎以葦筒子長五寸一頭刺於耳內四面以面密封塞不透風一頭以艾灸之七壯患右灸左患左灸右耳痛亦灸得初虞世治婦人崩中連日不止熟艾雞子大阿膠炒為末半兩乾薑一錢銼右以水五盞先煮艾姜至二盞半入膠消揚溫分三服空腹服一日盡兵部手集治發背頭末成瘡及諸熱腫以濕紙拓上先干處是熱氣衝上欲作瘡子便灸之如先疼痛灸即不痛即以痛為度錢相公篋中方治誤吞錢取艾蒿一把細銼用水五升煎取一升頓服便下傷寒類要治婦人妊娠七月若傷寒壯熱赤斑變為黑斑溺血用艾葉如雞子大酒三升煮取一外半分為二服又方䘌蟲蝕下部以泥作罌以竹筒如指大一頭坐罌缸中一頭納下部孔中以雞子大艾一團燒之以泥作罌口吹之常令艾煙燻下部強人可益久良子母祕録胎動上迫心痛取艾葉如雞子大以頭醋四升煎取二升分溫服又方治倒産子死腹中艾葉半斤酒四升煮取一升服又方小兒黃爛瘡燒艾葉灰敷上荊楚歲時記端午四民踏百草採艾以為人懸之戶上穰毒氣又宗士炳之孫常以端午日雞未鳴時採似人者縛用灸有驗衍義曰艾葉干搗篩去青滓取白入石硫黃為硫黃艾灸家用得米粉少許可搗為末入服食藥入硫黃別有法惡實味辛平主明目補中除風傷根莖療傷寒寒熱汗出中風面腫消渴熱中逐水久服輕身耐老生魯山平澤陶隱居云方藥不復用唐本注云魯山在鄧州東北其草葉大如芋子殼似栗狀實細長如茺蔚子根主牙齒疼痛勞瘧腳緩弱風毒癰疽咳嗽傷肺肺壅疝瘕積血主諸風癥瘕冷氣吞一枚出癰疽頭別録名牛蒡一名鼠黏草今按陳藏器本草云惡實根蒸曝乾不爾令人欲吐浸酒去風又主惡瘡子名鼠黏上有芒能綴鼠味苦主風毒腫諸瘻根可作茹食之葉亦搗敷杖瘡不膿避風臣禹錫等謹按藥性論云牛蒡亦可單用味甘無毒能主面目煩悶四肢不健通十二經脈洗五臟惡氣可常作菜食之令人身輕子研末投酒中浸三日每日服三二盞任性飲多少除諸風去丹石毒主明目利腰腳又食前吞三枚熟挪下散諸結節筋骨煩熱毒又根細切如豆面拌作飯食之消脹壅又莖葉煮汁釀酒良又取汁夏月多浴去皮間習習如蟲行風洗了慎風少時又能拓一切腫毒用根葉入少許鹽花搗圖經曰惡實即牛蒡子也生魯山平澤今處處有之葉如芋而長實似葡萄核而褐色外殼如栗球小而多刺鼠過之則綴惹不可脫故謂之鼠黏子亦如羊負來之比根有極大者作菜茹尤益人秋後採子入藥用根葉亦可生搗入少鹽花以拓腫毒又冬月採根蒸曝之入藥劉禹錫傳信方療暴中風用緊細牛蒡根取時須避風以竹刀或荊刀刮去土用生布拭了搗絞取汁一大升和灼然好蜜四大合溫分為兩服每服相去五六里初服得汗汗出便瘥此方得之嶽鄂鄭中丞鄭頃年至潁陽因食一頓熱肉便中暴風外甥盧氏為潁陽尉有此方當時便服得汗隨瘥神效又篋中方風頭及腦掣痛不可禁者摩膏主之取牛蒡莖葉搗取濃汁二升合無灰酒一升鹽花一匙頭煻火煎令稠成膏以摩痛處風毒散自止亦主時行頭痛摩時須極力令作熱乃速效冬月無苗用根代之亦可雷公云凡使採之淨揀勿令有雜子然後用酒拌蒸待上有薄白霜重出卻用布拭上然後焙乾別搗如粉用食療雲根作脯食之良熱毒腫搗根及葉封之杖瘡金瘡取葉貼之永不畏風又癱緩及丹石風毒石熱發毒明耳目利腰膝則取其子末之投酒中浸經三日每日欲三兩盞隨性多少欲散支節筋骨煩熱毒則食前取子三七粒熟挪吞之十服後甚良細切根如小豆大拌麵作飯煮食尤良又皮毛間習習如蟲行煮根汁浴之夏浴慎風卻入其子炒過末之如茶煎三匕通利小便聖惠方治時氣餘熱不退煩躁發渴四肢無力不能飲食用根搗絞取汁不計時候服一小盞效外臺祕要治喉痹牛蒡子六分馬藺子八分搗為散每空心暖水服方寸匕漸加至一匕半日再服經驗方治風熱閉塞咽喉遍身浮腫以牛蒡子一合半生半熟杵為末熱酒調下一錢匕立瘥孫真人食忌主天行以生牛蒡根搗取汁五大合空腹分為兩服服訖取桑葉一大把炙令黃水一升煮取五合去滓頓服暖覆取汗無葉用枝食醫心鏡治熱攻心煩躁恍惚以牛蒡根搗汁一升食後分為三服良斗門方治頭面忽腫熱毒風內攻或手足頭面赤腫觸著痛用牛蒡子根一名蝙蝠刺洗淨爛研酒煎成膏攤在紙上貼腫處仍熱酒調下一服腫止痛減王氏博濟治瘡疱將出以牛蒡子炒令熟杵為末每服一錢入荊芥二穗水一盞同煎至七分放溫服如瘡疹已出更服亦妙初虞世治皮膚風熱遍身生癮疹牛蒡子浮萍等分以薄荷湯調下二錢日二服衍義曰惡實是子也今謂之牛蒡未去萼時又謂之鼠黏子根謂之牛菜疏風壅涎唾多咽膈不利微炒同入荊芥穗各一兩甘草炙半兩同為末食後夜臥湯點二錢服當緩取效子在萼中萼上有細鉤多至百十謂之芒則誤矣根長一二尺粗如拇指煮爛為菜水萍味辛酸寒無毒主暴熱身癢下水氣勝酒長鬚發止消渴下氣以沐浴生毛髮久服輕身一名水花一名水白一名水蘇生雷澤池澤三月採曝乾陶隱居云此是水中大萍爾非今浮萍子藥録云五月有花白花即非今溝渠所生者楚王渡江所得非斯實也唐本注云水萍者有三種大者名蘋水中又有荇菜亦相似而葉圓水上小浮萍主火瘡今按陳藏器本草云水萍有三種大者曰蘋葉圓闊寸許葉下有一點如水沫一名芣菜曝乾與栝蔞等分以人乳為丸主消渴搗絞取汁飲主蛇咬毒入腹亦可敷熱瘡小萍子是溝渠間者末敷面䵟搗汁服之主水腫利小便又人中毒取萍子曝乾末酒服方寸匕又為膏長髮本經雲水萍應是小者臣禹錫等謹按爾雅云蘋蓱其大者蘋注水中浮蓱江東謂之薸陸機毛詩義疏云其粗大者謂之蘋小者曰薸季春始生可糝蒸為茹又可苦酒淹以就酒日華子云治熱毒風熱疾熱狂㶸腫毒湯火瘡風疹圖經曰水萍生雷澤地澤今處處溪澗水中皆有之此是水中大萍葉圓闊寸許葉下有一點如水沫一名芣菜爾雅謂之蘋其大者曰蘋是也周南詩云於以採蘋陸機云海中浮蘋粗大者謂之萍季春始生可糝蒸以為茹又可用苦酒淹以按酒三月採曝乾蘇恭云此有三種大者曰蘋中者荇菜即下鳧葵是也小者水上浮蘋即溝渠間生者是也大蘋今醫方鮮用浮萍俗醫用治時行熱病亦堪發汗其有功其方用浮萍草一兩四月十五日者麻黃去節根桂心附子炮裂去臍皮各半兩四物搗細篩每服二錢以水一中盞入生薑半分煎至六分不計時候和滓熱服汗出乃瘥又治惡疾遍身瘡者取水中浮萍濃煮汁漬浴半日多效此方甚奇古也聖惠方治少年面上起細疱挪浮萍庵之亦可飲少許汁良也又方發背初得毒腫焮熱赤爛搗和雞子清貼之良千金方治中水毒手足指冷即是或至膝肘以浮萍日乾服方寸匕瘥千金翼治小便不利膀胱水氣流滯以浮萍日乾末服方寸匕日一二服良孫真人食忌五月取浮萍陰乾燒煙去蚊子又主消渴以浮萍汁服之子母祕録熱毒浮萍搗汁敷之令遍高供奉採萍時曰歌不在山不在岸採我之時七月半選甚癱風與緩風此小微風都不算豆淋酒內下三丸鐵幞頭上也出汗王瓜味苦寒無毒主消渴內痹瘀血月閉寒熱痠疼益氣愈聾療諸邪氣熱結鼠瘻散癰腫留血婦人帶下不通下乳汁止小便數不禁逐四肢骨節中水療馬骨刺人瘡一名土瓜生魯地平澤田野及人家垣牆間三月採根陰乾陶隱居云今土瓜生籬院間亦有子熟時赤如彈丸大根今多不預干臨用時乃掘取不堪入大方正單行小小爾禮記月令云王瓜生此之謂也鄭玄雲菝葜殊為繆矣唐本注云此物蔓生葉似栝蔞圓無叉缺子如梔子生青熟赤但無稜爾根似葛細而多糝北間者纍纍相連大如棗皮黃肉白苗子相似根狀不同試療黃疸破血南者大勝也今按陳藏器本草云王瓜主蠱毒小兒閃癖痞滿並瘧取根及葉搗絞汁服當吐下宜少進之有小毒故也臣禹錫等謹按爾雅云鉤藈姑釋曰鉤一名藈姑郭云鉤藪也一名王瓜實如瓝瓜正赤味苦藥性論云土瓜根使平一名王瓜子主蠱毒治小便數遺不禁日華子云王瓜子潤心肺治黃病生用肺痿吐血腸風瀉血赤白痢炒用又云土瓜根通血脈天行熱疾酒黃病壯熱心煩悶吐痰痰瘧排膿熱勞治撲損消瘀血破症癖落胎圖經曰王瓜生魯地平澤田野及人家垣牆間今處處有之月令四月王瓜生即此也葉似栝蔞圓無叉缺有刺如毛五月開黃花花下結子如彈丸生青熟赤根似葛細而多糝謂之土瓜根北間者其實纍纍相連大如棗皮黃肉白苗葉都相似但根狀不同耳三月採根陰乾均房間人呼為老鴉瓜亦白菟瓜謹按爾雅曰蔩羊善切菟瓜郭璞注云似土瓜而土瓜自謂之藈與睽同菰與姑同又名鉤菰蓋菟瓜別是一種也又云芴音物菲亦謂之土瓜自別是一物詩所謂採葑採菲者非此土瓜也大凡物有異類同名甚多不可不辨也葛氏療面上痱瘰子用之仍得光潤皮急以土瓜根搗篩漿水勻和入夜先漿水洗面敷藥旦復洗之百日光華射人小兒四歲發黃生搗絞汁三合與飲不過三飲已聖惠方治黑疸多死宜急治用瓜根一斤搗絞汁六合頓服當有黃水隨小便出如未出更服之外臺祕要治蠱土瓜根大如拇指長三寸切以酒半升漬一宿一服當吐下肘後方治黃疸變成黑疸醫所不能治土瓜根汁頓服一小升平旦服食後須病汗當小便出愈不爾再服又方治小便不通及關格方生土瓜根搗取汁以少水解之筒中吹下部取通産書下乳汁土瓜根為末酒服一錢一日三次衍義曰王瓜體如栝蔞其殼徑寸一種長二寸許上微圓下尖長七八月間熟紅赤色殼中子如螳螂頭者今人又謂之赤雹子其根即土瓜根也於細根上又生淡黃根三五相連如大指許根與子兩用紅子同白土子治頭風地榆味苦甘酸微寒無毒主婦人乳痓痛七傷帶下病止痛除惡肉止汗療金瘡止膿血諸瘻惡瘡熱瘡消酒除消渴補絶傷産後內塞可作金瘡膏生桐柏及冤句山谷二月八月採根曝乾得發良惡麥門冬陶隱居云今近道處處有葉似榆而長初生布地而花子紫黑色如豉故名玉豉一莖長直上根亦入釀酒道方燒作灰能爛石也乏茗時用葉作飲亦好今按別本注云今人止冷熱痢及疳痢熱極效臣禹錫等謹按藥性論云地榆味苦平能治産後余瘀疹痛七傷治金瘡止血痢蝕膿蕭炳云今方用共樗皮同療赤白痢日華子云排膿止吐血鼻洪月經不止血崩産前後諸血疾赤白痢並水瀉濃煎止腸風但是平原川澤皆有獨莖花紫七八月採圖經曰地榆生桐柏及冤句山谷今處處有之宿根三月內生苗初生布地莖直高三四尺對分出葉葉似榆少狹細長作鋸齒狀青色七月開花如椹子紫黑色根外黑裡紅似柳根二月八月採曝乾葉不用山人乏茗時採此葉作飲亦好古斷下方多用之葛氏載徐平療下血二十年者取地榆鼠尾草各三兩水二升煮半頓服不斷水漬屋塵飲一小杯投之不過重作乃愈小兒疳痢亦單煮汁如飴糖與服便已又毒蛇螫人搗新根取汁飲兼以漬瘡良崔元亮海上方赤白下骨立者地榆一斤水三升煮取一升半去滓再煎如稠餳絞濾空腹服三合日再唐本注云主帶下十二病孔氏音義云一曰多赤二曰多白三曰月水不通四曰陰蝕五曰子臟堅六曰子門僻七曰合陰陽患痛八曰小腹寒痛九曰子門閉十曰子宮冷十一曰夢與鬼交十二曰五臟不定用葉作飲代茶甚解熱聖惠方治婦人漏下赤白不止令人黃瘦虛竭以地榆三兩細銼米醋一升煮十餘沸去滓食前稍熱服一合亦治吐血千金翼伐指逆腫單煮地榆作湯漬之半日愈肘後方部虎犬咬人地榆根末服方寸匕日一二服敷瘡尤佳葛氏毒蛇螫人搗地榆根絞取汁飲兼以漬瘡梅師方治猘犬咬人煮地榆飲之兼末敷瘡上服方寸匕日三服忌酒若治瘡已瘥者搗生韭汁飲之一二升齊民要術地榆汁釀酒治風痹補腦三洞要録地榆草銼一升稻米一升白玉屑一升三物取白露汁二升置銅器中煮米熟絞取汁玉屑化為水名曰玉液以藥納杯美醴中所謂神玉漿也衍義曰地榆性沉寒入下焦熱血痢則可用若虛寒人及水瀉白痢即未可輕使大小薊根味甘溫主養精保血大薊主女子赤白沃安胎止吐血衄鼻令人肥健五月採陶隱居云大薊是虎薊小薊是貓薊葉並多刺相似田野甚多方藥不復用是賤之故大薊根甚療血亦有毒唐本注云大小薊葉欲相似功力有殊並無毒亦非虎貓薊也大薊生山谷根療癰腫小薊生平澤俱能破血小薊不能消腫也今按陳藏器本草云小薊破宿血止新血暴下血血痢金瘡出血嘔血等絞取汁溫服作煎和糖合金瘡及蜘蛛蛇蠍毒服之亦佳臣禹錫等謹按藥性論云大薊亦可單用味苦平止崩中血下生取根搗絞汁服半升許多立定日華子云小薊根涼無毒治熱毒風並胸膈煩悶開胃下食退熱補虛損苗去煩熱生研汁服小薊力微只可退熱不似大薊能補養下氣又云大薊葉涼治腸癰腹臟瘀血血暈撲損可生研酒並小便任服惡瘡疥癬鹽研罯敷又名刺薊山牛蒡圖經曰小薊根本經不著所出州土今處處有之俗名青刺薊苗高尺余葉多刺心中出花頭如紅藍花而青紫色北人呼為千針草當二月苗初生二三寸時並根作茹食之甚美四月採苗九月採根並陰乾入藥亦生搗根絞汁飲以止吐血衄血下血皆驗大薊根苗與此相似但肥大耳而功力有殊破血之外亦療癰腫小薊專主血疾陳藏器云薊門以薊為名北方者勝也食療云小薊根主養氣取生根葉搗取自然汁服一盞立佳又取葉煮食之除風熱根主崩中又女子月候傷過搗汁半升服之金瘡血不止挪葉封之夏月熱煩悶不止搗葉取汁半升服之立瘥聖惠方治心熱吐血口乾用刺薊葉及根搗絞取汁每服一小盞頓服又方乳石發動壅熱心悶吐血以生刺薊搗取汁每服三合入蜜少許攪勻服之外臺祕要治鼻窒塞下通小薊一把水二升煮取一升去滓分服曾有人陰冷漸漸冷氣入陰囊腫滿恐死夜疼悶不得眠煮大薊根汁服立瘥梅師方治卒吐血及瀉鮮血取小薊葉搗絞取汁溫服簡要濟衆治九竅出血以刺薊一握絞取汁以酒半盞調和頓服之如無清汁只搗乾者為末冷水調三錢匕又方治小兒浸淫瘡疼痛不可忍發寒熱刺薊末新水調敷瘡上干即易之衍義曰大小薊皆相似花如髻但大薊高三四尺葉皺小薊高一尺許葉不皺以此為異小薊山野人取為蔬甚適用雖有微芒亦不能害人海藻味苦咸寒無毒主癭瘤氣頸下核破散結氣癰腫癥瘕堅氣腹中上下鳴下十二水腫療皮間積聚暴潰留氣熱結利小便一名落首一名藫生東海池澤七月七日採曝乾反甘草陶隱居云生海島上黑色如亂髮而大少許葉大都似藻葉又有石帆狀如柏療石淋又有水松狀如松療溪毒今按陳藏器本草云此物有馬尾者大而有葉者本經及注海藻功狀不分馬尾藻生淺水如短馬尾細黑色用之當浸去咸大葉藻生深海中及新羅葉如水藻而大本經云主結氣癭瘤是也爾雅云綸音閞似綸組似組正為二藻也海人取大葉藻正在深海底以繩繫腰沒水下刈得旋繫繩上五月以後當有大魚傷人不可取也臣禹錫等謹按爾雅云藻海藻注藥草也一名海蘿如亂髮生海中藥性論云海藻臣味鹹有小毒主闢百邪鬼魅治氣疾急滿療疝氣下墜疼痛核腫去腹中雷鳴幽幽作聲孟詵云海藻主起男子陰氣常食之消男子潰疾南方人多食之傳於北人北人食之倍生諸病更不宜矣陳藏器云馬藻大寒搗敷小兒赤白遊疹火焱熱瘡搗絞汁服去暴熱熱痢止渴生水上如馬齒相連又云石帆高尺余根如漆上漸軟作交羅紋生海底煮汁服主婦人血結月閉石淋又云水松葉如松丰茸食之主水腫亦生海底吳都賦云石帆水松是也日華子云石帆平無毒紫色梗大者如箸見風漸硬色如漆多人飾作珊瑚裝圖經曰海藻生東海池澤今出登萊諸州海中凡水中皆有藻周南詩云於以採藻於沼於沚是也陸機云藻水草生水底有二種一種葉如雞蘇莖如箸長四五尺一種莖如叉股葉如蓬蒿謂之聚藻扶風人謂之藻聚為發聲也二藻皆可食熟挪其腥氣米麵糝蒸為茹甚佳美荊揚人饑荒以當穀食今謂海藻者乃是海中所生根著水底石上黑色如亂髮而粗大少許葉類水藻而大謂之大葉藻本經云主癭瘤是也海人以繩繫腰沒水下刈得之旋繫繩上又有一種馬尾藻生淺水中狀如短馬尾細黑色此主水癊下水用之陶隱居云爾雅所謂綸似綸組似組東海有之今青苔紫菜皆似綸昆布亦似組恐即是此也而陳藏器乃謂綸組正謂此二藻也謹按本經海藻一名藫而爾雅謂藫為石衣又謂𧂇徒南切名海薻與藻同是海藻自有此二名而注釋皆以為藥草謂綸組乃別草若然隱居所云似近之藏器之說亦未可的據又注釋以石衣為水苔一名石發石發即陟釐也色類似苔而粗澀為異又云藫葉似䪥音薤而大生海底且陟釐下自有條味性功用與海藻全別又生江南池澤乃是水中青苔古人用以為紙亦青黃色今注以為石發是也然則藫與𧂇皆是海藻之名石發別是一類無疑也昆布今亦出登萊諸州功用乃與海藻相近也陶又云凡海中菜皆療癭瘤結氣青苔紫菜輩亦然又有石帆如柏主石淋水松如松主溪毒吳都賦所謂草則石帆水松劉淵林注云石帆生海嶼石上草類也無葉高尺許其華離樓相貫連死則浮水中人於海邊得之稀有見其生者水松藥草生水中出南海交趾是也紫菜附石生海上正青取干之則紫色南海有之東海又有一種海帶似海藻而粗且長登州人取干之柔韌可以系束物醫家用下水速於海藻昆布之類石發今人亦干之作菜以齏臛啖之尤美青苔可以作脯食之皆利人苔之類又有井中苔生廢井中並井藍皆主熱毒又上有垣衣條云生古垣牆陰蘇恭云即古牆北陰青苔衣也生石上者名昔邪屋上生者名屋遊大抵主療略同陸龜蒙苔賦云高有瓦松卑有澤葵散岩竇者曰石發補空田者曰垣衣在屋曰昔邪在藥曰陟釐是也瓦松生古瓦屋上若松子作層澤葵鳧葵也雖曰異類而皆感瓦石而生故陸推類而云耳今人罕復用之故但附見於此瓦松即下條昨葉何草也廣志謂之蘭香段成式云或言構木上多松栽土木氣泄則生瓦松然亦不必爾今醫家或用作女子行經絡藥陟釐古方治虛冷下痢最要範汪治腹中留飲有海藻丸又有癭酒方用海藻一斤絹袋盛以清酒二升浸春夏二日秋冬三日一服兩合日三酒盡更合飲之如前滓曝乾末服方寸匕日三不過兩劑皆瘥廣濟療氣膀胱急妨宜下氣昆布臛法高麗昆布一斤白米泔浸一宿洗去鹹味以水一斗煮令向熱擘長三寸闊四五分仍取蔥白一握二寸切斷擘之更煮令昆布極爛仍下鹽酢豉糝調和一依臛法不得令咸酸以生薑橘皮椒末等調和宜食粱米粳米飯海藻亦依此法極下氣大效無所忌海藥云主宿食不消五鬲痰壅水氣浮腫腳氣賁豚氣並良雷公凡使先須用生烏豆並紫背天葵和海藻三件同蒸一伏時候日乾用之肘後方治頷下瘰癧如梅李宜速消之海藻一斤酒二升漬數日稍稍飲之又方治頸下卒結囊欲成癭海藻一斤洗去咸酒浸飲之澤蘭味苦甘微溫無毒主乳婦內衄中風余疾大腹水腫身面四肢浮腫骨節中水金瘡癰腫瘡膿産後金瘡內塞一名虎蘭一名龍棗一名虎蒲生汝南諸大澤旁三月三日採陰乾防己為之使陶隱居云今處處有多生下濕地葉微香可煎油或生澤旁故名澤蘭亦名都梁香可作浴湯人家多種之而葉小異今山中又有一種甚相似莖方葉小強不甚香既云澤蘭又生澤旁故山中者為非而藥家乃採用之唐本注云澤蘭莖方節紫色葉似蘭草而不香今京下用之者是陶云都梁香乃蘭草爾俗名蘭香煮以洗浴亦生澤畔人家種之花白紫萼莖圓殊非澤蘭也陶注蘭草復云名都梁香並不深識也臣禹錫等謹按吳氏云澤蘭一名水香神農黃帝歧伯桐君酸無毒季氏溫生下地水旁葉如蘭二月生香赤節四葉相值枝節間藥性論云澤蘭使味苦辛主産後腹痛頻産血氣衰冷成勞瘦羸又治通身面目大腫主婦人血瀝腰痛日華子澤蘭通九竅利關脈養血氣破宿血消癥瘕産前産後百病通小腸長肉生肌消撲損瘀血治鼻洪吐血頭風目痛婦人勞瘦丈夫面黃四月五月採作纏把子圖經曰澤蘭生汝南諸大澤旁今荊徐隨壽蜀梧州河中府皆有之根紫黑色如粟根二月生苗高二三尺莖稈青紫色作四稜葉生相對如薄荷微香七月開花帶紫白色萼通紫色亦似薄荷花三月採苗陰乾荊湖嶺南人家多種之壽州出者無花子此與蘭草大抵相類但蘭草生水旁葉光潤陰小紫五六月盛而澤蘭生水澤中及下濕地葉尖微有毛不光潤方莖紫節七月八月初採微辛此為異耳今婦人方中最急用也又有一種馬蘭生水澤旁頗似澤蘭而氣臭味辛亦主破血補金創斷下血陳藏器以為楚詞所喻惡草即是也北人呼為紫菊以其花似菊也又有一種山蘭生山側似劉寄奴葉無丫不對生花心微黃赤亦能破血皆可用雷公云凡使須要別識雄雌其形不同大澤蘭形葉皆圓根青黃能生血調氣與榮合小澤蘭回別採得後看葉上斑根鬚尖此藥能破血通久積凡修事大小澤蘭須細銼之用絹袋盛懸於屋南畔角上令乾用子母祕録治小兒蓐瘡嚼澤蘭心封上衍義曰澤蘭按補注云葉如蘭今蘭葉如麥門冬稍闊而長及一二尺無枝梗殊不與澤蘭相似澤蘭才出土便分枝梗葉如菊但尖長若取香嗅則稍相類既謂之澤蘭又曰生汝南大澤旁則其種本別如蘭之說誤矣昆布味鹹寒無毒主十二種水腫癭瘤聚結氣瘻瘡生東海陶隱居云今唯出高麗繩把索之如卷麻作黃黑色柔韌可食爾雅云綸音閞似輪組似組東海有之今青苔紫菜皆似綸此昆布亦似組恐即是也凡海中菜皆療癭瘤結氣青苔紫菜輩亦然乾薹性熱柔苔甚冷也今按陳藏器本草云昆布主陰潰含之咽汁生南海葉如手大如薄葦紫色臣禹錫等謹按藥性論云昆布臣有小毒利水道去面腫治惡瘡鼠瘻陳藏器云紫菜味甘寒主下熱煩氣多食令人腹痛發氣吐白沫飲少熱醋消之蕭炳云海中菜有小螺子損人不可多食圖經文具海藻條下唐本注云又有石帆狀如柏治石淋又有水松狀如松治溪毒陳藏器云主頽卵腫煮汁咽之生南海葉如手干紫赤色大似薄葦陶云出新羅黃黑色葉柔細陶解昆布乃是馬尾海藻也新注云如癭氣取末蜜丸含化自消也海藥云謹按異志生東海水中其草順流而生新羅者黃黑色葉細胡人採得搓之為索陰乾舶上來中國性溫主大腹水腫諸浮氣並癭瘤氣結等良雷公云凡使先弊甑箅同煮去鹹味焙細銼用每修事一斤用甑箅大小十個同昆布細銼二味各一處下東流水從巳煮至亥水旋添勿令少食療云下氣久服瘦人無此疾者不可食海島之人愛食為無好菜只食此物服久病亦不生遂傳說其功於北人北人食之病皆生是水土不宜爾又云紫菜下熱氣多食脹人若熱氣塞咽喉煮汁飲之此是海中之物味猶有毒性凡是海中菜所以有損人矣聖惠方治癭氣結核㿔㿔腫硬昆布一兩洗去咸搗為散每以一錢綿裹於好醋中浸過含咽津藥味盡再含之外臺祕要治頷下卒結囊漸大欲成癭以昆布海藻等分為末蜜丸含如杏核大稍稍咽汁千金翼治五癭昆布一兩並切如指大酢漬含咽汁愈防己味辛苦平溫無毒主風寒溫瘧熱氣諸癇除邪利大小便療水腫風腫去膀胱熱傷寒寒熱邪氣中風手腳攣急止泄散癰腫惡結諸蝸疥癬蟲瘡通腠理利九竅一名解離紋如車輻理解者良生漢中川穀二月八月採根陰乾殷孽為之使殺雄黃毒惡細辛畏萆薢陶隱居云今出宜都建平大而青白色虛軟者好黯黑冰強者不佳服食亦須之是療風水家要藥爾唐本注云防己本出漢中者作車輻解黃實而香其青白虛軟者名木防己都不任用陶謂之佳者蓋未見漢中者爾臣禹錫等謹按藥性論云漢防己君味苦有小毒能治濕風口面喎斜手足疼散留痰主肺氣嗽喘又云木防己使畏女菀滷咸味苦辛能治男子肢節中風毒風不語主散結氣癰腫溫瘧風水腫治膀胱蕭炳云木防己出華州圖經曰防己生漢中川穀今黔中亦有之但漢中出者破之紋作車輻解黃實而香莖梗甚嫩苗葉小類牽牛折其莖一頭吹之氣從中貫如木通類它處者青白虛軟又有腥氣皮皺上有丁足子名木防己二月八月採陰乾用木防己雖今不入藥而古方亦通用之張仲景治傷寒有增減木防己湯及防己地黃五物防己黃耆六物等湯深師療膈間支滿其人喘滿心下痞堅面黧黑其脈沉緊得之數十日吐下之乃愈木防己湯主之木防己二兩石膏二枚雞子大碎綿裹桂心二兩人參四兩四物以水六升煮取二升分再服虛者便愈實者三日復發汗至三日復不愈者宜去石膏加芒硝三合以水六升煮三味取二升去滓納芒硝分再服微下利則愈禁生蔥孫思邈療遺溺小溲澀亦用三物木防己湯陳藏器云如陶所注即是木防己用體小同按木漢二防己即是根苗為名漢主水氣木主風氣宣通作藤著木生吹氣通一頭如通草雷公云凡使勿使木條以其木條已黃腥皮皺上有丁足子不堪用夫使防己要心花紋黃色者然細銼又銼車前草根相對同蒸半日後出曬去車前草根細銼用之肘後方服雄黃中毒防己汁解之防己實焙乾為末如茶法煎服俗用治脫肛初虞世方治肺痿咯血多痰防己葶藶等分為末糯米飲調下一錢天麻味辛平無毒主諸風濕痹四肢拘攣小兒風癇驚氣利腰膝強筋力久服益氣輕身長年生鄆州利州泰山嶗山諸山五月採根曝乾葉如芍藥而小當中抽一莖直上如箭稈莖端結實狀若續隨子至葉枯時子黃熟其根連一二十枚猶如天門冬之類形如黃瓜亦如蘆蔔大小不定彼人多生啖或蒸煮食之今多用鄆州者佳今附臣禹錫等謹按別注又云主諸毒惡氣支滿寒疝下血今處處有之時人多用焉莖似箭稈赤色故莖名赤箭也藥性論云赤箭脂一名天麻又名定風草味甘平能治冷氣𤸷痹攤緩不遂語多恍惚多驚失志陳藏器云天麻寒主熱毒癰腫搗莖葉敷之亦取子作飲去熱氣生平澤似馬鞭草節節生紫花花中有子如青葙子日華子云味甘暖助陽氣補五勞七傷鬼疰蠱毒通血脈開竅服無忌圖經曰天麻生鄆州利州泰山嶗山諸山今京東京西湖南淮南州郡亦有之春生苗初出若芍藥獨抽一莖直上高三二尺如箭稈狀青赤色故名赤箭脂莖中空依半以上貼莖微有尖小葉梢頭生成穗開花結子如豆粒大其子至夏不落卻透虛入莖中潛生土肉其根形如黃瓜連生一二十枚大者有重半斤或五六兩其皮黃白色名白龍皮肉名天麻二月三月五月八月內採初取得乘潤刮去皮沸湯略煮過曝乾收之蒿山衡山人或取生者蜜煎作果食之甚珍雷公云凡使勿用御風草緣與天麻相似只是葉莖不同其御風草根莖葉皆白有青點使御風草根勿使天麻二件若同用即令人有腸結之患修事天麻十兩用蒺藜子一鎰緩火熬焦熟後便先安置天麻十兩於瓶中上用火熬過蒺藜子蓋內外便用三重紙蓋並系從巳至未時又出蒺藜子再入熬炒准前安天麻瓶內用炒了蒺藜子於中依前蓋又隔一伏時後出如此七遍瓶盛出後用布拭上氣汗用刀劈焙之細銼單搗然用御風草修事法亦同天麻別說云謹按赤箭條下所說甚詳今就此考之尤為分明詳此圖經之狀即赤箭苗之未長大者二說前後自不同則所為紫花者又不知是何物也若依赤箭條後用之為是衍義曰天麻用根須別藥相佐使然後見其功仍須加而用之人或蜜漬為果或蒸煮食用天麻者深思之則得矣苗則赤箭也阿魏味辛平無毒主殺諸小蟲去臭氣破症積下惡氣除邪鬼蠱毒生西蕃及崑崙唐本注云苗葉根莖酷似白芷搗根汁日煎作餅者為上截根穿曝乾者為次體性極臭而能止臭亦為奇物也唐本先附臣禹錫等謹按蕭炳云今人日煎蒜白為假者真者極臭而去臭為奇物今下細蟲極效段成式酉陽雜俎云阿魏出伽闍郍國即北天竺也伽闍郍呼為形虞亦出波斯國波斯呼為阿虞載樹長八九尺皮色青黃三月生葉葉形似鼠耳無花實斷其枝汁出如飴久乃堅凝名阿魏拂林國僧彎所說同摩伽陀僧提婆言取其汁和米豆屑合成阿魏日華子云阿魏熱治傳尸破症癖冷氣闢溫治瘧兼主霍亂心腹痛腎氣溫瘴御一切菌菜毒圖經曰阿魏出西蕃及崑崙今唯廣州有之舊說苗葉根極似白芷搗根汁日煎作餅者為上截根穿曝乾者為次今廣州出者云是木膏液滴釀結成二說不同謹按段成式酉陽雜俎云阿魏木生波斯國呼為阿虞木長八九尺皮色青黃三月生葉似鼠耳無花實斷其枝汁出如飴久乃堅凝名阿魏或云取其汁和米豆屑合釀而成乃與今廣州所上相近耳海藥云謹按廣志云生石崑崙國是木津液如桃膠狀其色黑者不堪其狀黃散者為上其味辛溫善主於風邪鬼注並心腹中冷服餌又云南長河中亦有阿魏與舶上來者滋味相似一般只無黃色雷公云凡使多有訛僞其有三驗第一驗將半銖安於熟銅器中一宿明沾阿魏處白如銀永無赤色第二驗將一銖置於五斗草自然汁中一夜至明如鮮血色第三驗將一銖安於柚樹上樹立干便是真凡使先於淨鉢中研如粉了於熱酒器上裛過任入藥用千金翼尸疰惡氣阿魏治之神效別說云謹按阿魏補注圖經所說合在木部今二浙人家亦種枝葉香氣皆同而差淡薄但無汁膏爾高良薑大溫主暴冷胃中冷逆霍亂腹痛陶隱居云出高良郡人腹痛不止但嚼食亦效形氣與杜若相似而葉如山姜唐本注云生嶺南者形大虛軟江左者細緊味亦不甚辛其實一也今相與呼細者為杜若大者為高良薑此非也今按陳藏器本草云高良薑味辛溫下氣益聲好顏色煮作飲服之止痢及霍亂又按別本注云二月三月採根曝乾味辛苦大熱無毒臣禹錫等謹按藥性論云高良薑使能治腹內久冷胃氣逆嘔吐治風破氣腹冷氣痛去風冷痹弱療下氣冷逆衝心腹痛吐瀉日華子云治轉筋瀉痢反胃嘔食解酒毒消宿食圖經曰高良薑舊不載所出州土陶隱居云出高良郡今嶺南諸州及黔蜀皆有之內郡雖有而不堪入藥春生莖葉如姜苗而大高一二尺許花紅紫色如山姜二月三月採根曝乾古方亦單用治忽心中惡口吐清水者取根如骰子塊含之咽津逡巡即瘥若臭亦含咽更加草豆蔻同為末煎湯常飲之佳聖惠方治霍亂吐利腹痛等疾高良薑一兩銼水三大盞煎取二盞半去滓下粳米二合煮粥食之外臺祕要備急霍亂吐利方火炙高良薑令焦香每用五兩打破以酒一升煮三四沸頓服亦治腹痛氣惡蘇恭云凡患腳氣每旦任意飽食午後少食日晚不食如飢可食豉粥若瞑不消欲致霍亂者即以高良薑一兩打碎以水三升煮取一升頓服盡即消待極飢乃食一碗薄粥其藥唯極飲之良若卒無高良薑母姜一兩代之以清酒一升煮令極熟去滓食之雖不及高良薑亦大效矣十全方治心脾痛以高良薑細銼微炒杵末米飲調下一錢匕立止百部根微溫臣禹錫等謹按蜀本云微寒主咳嗽上氣陶隱居云山野處處有根數十相連似天門冬而苦強亦有小毒火炙酒漬飲之療咳嗽亦主去蝨煮作湯洗牛犬蝨即去博物志云九真有一種草似百部但長大爾懸火上令乾夜取四五寸短切含咽汁勿令人知主暴嗽甚良名為嗽藥疑此是百部恐其土肥潤處是以長大爾今按陳藏器本草云百部根火炙浸酒空腹飲去蟲蠶咬兼疥癬瘡臣禹錫等謹按藥性論云百部使味甘無毒能治肺家熱上氣咳逆主潤益肺日華子云味苦無毒治疳蛔及傳尸骨蒸勞殺蛔蟲寸白蟯蟲並治一切樹木蛀蚛燼之亦可殺蠅蠓又名婆婦草一根三十來莖圖經曰百部根舊不著所出州土今江湖淮陝齊魯州郡皆有之春生苗作藤蔓葉大而尖長頗似竹葉面青色而光根下作撮如芋子一撮乃十五六枚黃白色二月三月八月採曝乾用古今方書治嗽多用葛洪主卒嗽以百部根生薑二物各絞汁合煎服二合張文仲單用百部根酒漬再宿大溫服一升日再千金方療三十年嗽以百部根二十斤搗絞取汁煎之如飴服方寸匕日三驗唐本云微寒有小毒雷公云凡使採得後用竹刀劈破去心皮花作數十條於檐下懸令風吹待土乾後卻用酒浸一宿漉出焙乾細銼用忽一窠自有八十三條者號曰地仙苗若修事餌之可千歲也外臺祕要治誤吞錢百部根四兩酒一升漬一宿溫服一升日再服續十全方治暴嗽百部藤根搗自然汁和蜜等分沸湯煎成膏咽之抱朴子百部根理咳嗽及殺蝨蘹音懷香子味辛平無毒主諸瘻霍亂及蛇傷唐本注云葉似老胡荽極細莖粗高五六尺叢生今注一名茴香子亦主膀胱腎間冷氣及盲腸氣調中止痛嘔吐唐本先附臣禹錫等謹按藥性論云蘹香亦可單用味苦辛和諸食中甚香破一切臭氣又卒噁心腹中不安取莖葉煮食之即瘥川中多食之日華子云得酒良治乾溼腳氣並腎勞疝氣開胃下食治膀胱痛陰疼入藥炒圖經曰蘹香子亦名茴香本經不載所出今交廣諸蕃及近郡皆有之入藥多用蕃舶者或云不及近處者有力三月生葉似老胡荽極疏細作叢至五月高三四尺七月生花頭如傘蓋黃色結實如麥而小青色北人呼為土茴香茴聲近故云耳八九月採實陰乾今近地人家園圃種之甚多古方療惡毒癰腫或連陰髀間疼痛急攣牽入少腹不可忍一宿則殺人者用茴香苗葉搗取汁一升服之日三四用其滓以貼腫上冬中根亦可用此外國方永嘉以來用之起死神效食療云國人重之云有助陽道用之未得其方法也生搗莖葉汁一合投熱酒一合服之治卒腎氣衝脅如刀刺痛喘息不得亦甚理小腸氣孫真人云治瘴瘧渾身熱連背項蕤茴香子搗取汁服經驗後方治脾胃進食茴香二兩生薑四兩同搗令勻淨器內濕紙蓋一宿次以銀石器中文武火炒令黃焦為末酒丸如梧子大每服十丸至十五丸茶酒下食醫心鏡茴香治霍亂闢熱除口氣臭煮作羹及生食並得衍義曰蘹香子今人只呼為茴香治膀胱冷氣及瘇痛亦調和胃氣唐本注似老胡荽此誤矣胡荽葉如蛇床蘹香徒有葉之名但散如絲髮特異諸草枝上時有大青蟲形如蠶治小腸氣甚良款冬花味辛甘溫無毒主咳逆上氣善喘喉痹諸驚癇寒熱邪氣消渴喘息呼吸一名橐吾一名顆東一名虎鬚一名菟奚一名氐冬生常山山谷及上黨水旁十一月採花陰乾杏仁為之使得紫菀良惡皂莢硝石玄參畏貝母辛夷麻黃黃耆黃芩黃連青葙陶隱居云第一齣河北其形如宿蓴未舒者佳其腹裡有絲次出高麗百濟其花乃似大菊花次亦出蜀北部宕昌而並不如其冬月在冰下生十二月正月旦取之唐本注云今出雍州南山溪水及華州山谷澗間葉似葵而大叢生花出根下臣禹錫等謹按爾雅云菟奚顆凍釋曰藥草也郭云款凍也紫赤華生水中藥性論云款冬花君主療肺氣心促急熱乏勞咳連連不絶涕唾稠黏治肺瘻肺癰吐膿日華子云潤心肺益五臟除煩補勞劣消痰止嗽肺瘻吐血心虛驚悸洗肝明目及中風等疾十一十二月雪中出花圖經曰款冬花出常山山谷及上黨水旁今關中亦有之根紫色莖青紫葉似萆薢十二月開黃花青紫萼去土一二寸初出如菊花萼通直而肥實無子則陶隱居所謂出高麗百濟者近此類也又有紅花者葉如荷而鬥直大者容一升小者容數合俗呼為蜂鬥葉又名水斗葉則唐注所謂大如葵而叢生者是也十一月採花陰乾或云花生於冰下正月旦採之郭璞注爾雅顆凍云紫赤花生水中冰水字近疑一有誤而傅咸款冬賦序曰余曾逐禽登於北山於時仲冬之月也冰凌盈谷積雪被崖顧見款冬煒然始敷華豔當是生於冰下為正也本經主咳逆古今方用之為治嗽之最崔知悌療久嗽熏法每旦取款冬花如雞子許少蜜拌花使潤納一升鐵鐺中又用一瓦碗鑽一孔孔內安一小竹筒筆管亦得其筒稍長作碗鐺相合及插筒處皆面埿之勿令漏氣鐺下著炭少時款冬煙自從筒出則口含筒吸取煙咽之如胸中少悶須舉頭即將指頭捻筒頭勿使漏煙氣吸烟使盡止凡如是五日一為之待至六日則飽食羊肉餺飥一頓永瘥雷公云凡採得須去向里裹花蕊殼並向裡實如粟零殼者並枝葉用以甘草水浸一宿卻取款冬花葉相伴裛一夜臨用時即干曬去兩件拌者葉了用衍義曰款冬花百草中唯此不顧冰雪最先春也世又謂之鑽凍雖在冰雪之下至時亦生芽春時人或採以代蔬入藥須微見花者良如已芬芳則都無力也今人又多使如箸頭者恐未有花爾有人病嗽多日或教以然款冬花三兩枚於無風處以筆管吸其煙滿口則咽之數日效紅藍花味辛溫無毒主産後血暈口噤腹內惡血不盡絞痛胎死腹中並酒煮服亦主蠱毒下血堪作燕脂其苗生搗碎敷遊腫其子吞數顆主天行瘡子不出其燕脂主小兒聤耳滴耳中生梁漢及西域一名黃藍博物志云黃藍張騫所得今倉魏地亦種之今附圖經曰紅藍花即紅花也生梁漢及西域今處處有之人家場圃所種冬而布子於熟地至春生苗夏乃有花下作梂匯多刺花蕊出梂上圃人承露採之採已復出至盡而罷梂中結實白顆如小豆大其花曝乾以染真紅及作燕脂主産後血病為勝其實亦同葉頗似藍故有藍名又名黃藍博物志云張騫所得也張仲景治六十二種風兼腹內血氣刺痛用紅花一大兩分為四分以酒一大升煎強半頓服之不止再服又一方用紅藍子一升搗碎以無灰酒一大升八合拌了曝令乾重搗篩蜜丸如桐子大空腹酒下四十丸正元廣利方治女子中風血熱煩渴者以紅藍子五大合微熬搗碎旦日取半大匙以水一升煎取七合去滓細細咽之又崔元亮海上方治喉痹壅塞不通者取紅藍花搗絞取汁一小升服之以瘥為度如冬月無濕花可浸乾者濃絞取汁如前服之極驗但咽喉塞服之皆瘥亦療婦人産運絶者唐本注云治口噤不語血結産後諸疾堪染紅外臺祕要治一切腫方以紅花熟爛搗取汁服之不過再三服便瘥服之多少量腫大小而進之簡要濟衆産後血暈心悶氣絶紅花一兩搗為末分作兩服酒二中盞煎取一盞並服如口噤斡開灌之子母祕録同産寶療産後中風煩渴紅花子五合微熬研碎以一匙水一升煎取七合徐徐呷之近效方治血暈絶不識人煩悶者紅花三兩新者佳無灰酒半升童子小便半升煮取一大盞去滓候冷頓服之新汲水煮之亦良牡丹味辛苦寒微寒無毒主寒熱中風瘛音契瘲音縱痙驚癇邪氣除症堅瘀血留舍腸胃安五臟療癰瘡除時氣頭痛客熱五勞勞氣頭腰痛風噤癲疾一名鹿韭一名鼠姑生巴郡山谷及漢中二月八月採根陰乾畏菟絲子陶隱居云今東間亦有色赤者為好用之去心按鼠婦亦名鼠姑而此又同殆非其類恐字誤唐本注云牡丹生漢中劍南所出者苗似羊桃夏生白花秋實圓緑冬實赤色凌冬不凋根似芍藥肉白皮丹出江劍南土人謂之牡丹亦名百兩金京下謂之吳牡丹者是真也今俗用者異於此別有臊氣也臣禹錫等謹按藥性論牡丹能治冷氣散諸痛治女子經脈不通血瀝腰疼蕭炳云今出合州者佳白者補赤者利出和州宣州者並良日華子云除邪氣悅色通關腠血脈排膿通月經消撲損瘀血續筋骨除風痹落胎下胞産後一切女人冷熱血氣此便是牡丹花根巴蜀渝合州者上海鹽者次服忌蒜圖經曰牡丹生巴郡山谷及漢中今丹延青越滁和州山中皆有之花有黃紫紅白數色此當是山牡丹其莖便枯燥黑白色二月於梗上生苗葉三月開花其花葉與人家所種者相似但花只五六葉耳五月結子黑色如雞頭子大根黃白色可五七寸長如筆管大二月八月採銅刀劈去骨陰乾用此花一名木芍藥近世人多貴重圃人欲其花詭異皆秋冬移接培以壤土至春盛開其狀百變故其根性殊失本真藥中不可用此品絶無力也牡丹主血乃去瘀滯正元廣利方療因傷損血瘀不散者取牡丹皮八分合虻蟲二十一枚熬過同搗篩每旦溫酒和散方寸匕服血當化為水下雷公云凡使採得後日干用銅刀劈破去骨了細銼如大豆許用清酒拌蒸從巳至未出日乾用外臺祕要治蠱毒方取牡丹根搗為末服一錢匕日三服良肘後方下部生瘡已決洞者服牡丹方寸匕日三服衍義曰牡丹用其根上皮花亦有緋者如西洛潛溪緋是也今禁苑又有深碧色者唯山中單葉花紅者為佳家椑子次之若移枝接者不堪用為其花葉既多發奪根之氣也何以知之今千葉牡丹初春留花稍多來年花枝並葉便瘦多是開不成市人或以枝梗皮售於人其乖殊甚京三稜味苦平無毒主老癖癥瘕結塊俗傳昔人患症癖死遺言令開腹取之得病塊乾硬如石紋理有五色人謂異物竊取削成刀柄後因以刀刈三稜柄消成水乃知此可療症癖也黃色體重狀若鯽魚而小又有黑三稜狀似烏梅而稍大有須相連蔓延體輕為療體並同今附臣禹錫等謹按日華子云味甘澀涼治婦人血脈不調心腹痛落胎消惡血補勞通月經治氣脹消撲損瘀血産後腹痛血暈並宿血不下圖經曰京三稜舊不著所出地土今河陝江淮荊襄間皆有之春生苗高三四尺似茭蒲葉皆三稜五六月開花似莎草黃紫色霜降後採根削去皮須黃色微苦以如小鯽魚狀體重者佳多生淺水旁或陂澤中其根初生成塊如附子大或有扁者旁生一根又成塊亦出苗其不出苗只生細根者謂之雞爪三稜又不生細根者謂之黑三稜大小不常其色黑去皮即白河中府又有石三稜根黃白色形如叉股葉緑色如蒲苗高及尺葉上亦有三稜四月開花白色如紅蓼花五月採根亦消積氣下品別有草三稜條云生蜀地即雞瓜三稜也其實一類故附見於此一說三稜生荊楚字當作荊以著其地本經作京非也今世都不復有三稜所用皆淮南紅蒲根也泰州尤多舉世皆用之雖太醫不以為謬蓋流習既久用根者不識其苗採藥者莫究其用因緣差失不復更辨今三稜荊襄江淮水澤之間皆有葉如莎草極長莖三稜如削大如人指高五六尺莖端開花大體皆如莎草而大生水際及淺水中苗下即魁其旁有根橫貫一根則連數魁魁上發苗採時斷其苗及橫根形扁長如鯽魚者三稜也根末將盡一魁未發苗小圓如烏梅者黑三稜也又根之端鉤屈如爪者為雞爪三稜皆皮黑肌白而至輕三者本一物但力有剛柔各適其用因其形為名如烏頭烏喙雲母雲華之類本非兩物也今人乃妄以鳧茨香附子為之又本草謂京三稜形如鯽魚黑三稜如烏梅而輕今紅蒲根至堅重刻削而成莫如形體又葉扁莖圓不復有三稜處不知何緣名三稜也今三稜皆獨旁引二根無直下根其形大體多亦如鯽魚陳藏器云本經無傳三稜總有三四種但取根似烏梅有須相連蔓如綖作漆色蜀人織為器一名䔷者是也外臺祕要治癥瘕及主鼓脹滿以三稜草切一石水五石煮一石去滓更煎取三斗汁銅器中重釜煎如稠糖出納密器中旦服一匕酒一盞服之日二每服恆令酒氣相續又方下乳汁取京三稜三個以水二碗煎取一碗洗奶取汁為度極妙子母祕録治小兒氣癖取三稜汁作羹粥以米麵為之與奶母食每日取一棗大與小兒吃亦得作粥與癇熱食之治小兒十歲以下及新生百日無問癇熱無辜痃癖等皆理之祕妙不可具言大效薑黃味辛苦大寒無毒主心腹結積疰忤下氣破血除風熱消癰腫功力烈於鬱金唐本注云葉根都似鬱金花春生於根與苗並出夏花爛無子根有黃青白三色其作之方法與鬱金同爾西戎人謂之蒁藥其味辛少苦多與鬱金同唯花生異爾唐本先附臣禹錫等謹按陳藏器云薑黃真者是經種三年以上老薑能生花花在根際一如蘘荷根節緊硬氣味辛辣種姜處有之終是難得性熱不冷本經云寒誤也破血下氣西蕃亦有來者與鬱金蒁藥相似如蘇所附即是蒁藥而非薑黃蘇不能分別二物也又云蒁味苦溫主惡氣疰忤心痛血氣結積蘇云薑黃是蘹又云鬱金是胡蒁夫如此則三物無別遞相連名總稱為蒁功狀則合不殊今蒁味苦色青薑黃味辛溫無毒色黃主破血下氣溫不寒鬱金味苦寒色赤主馬熱病三物不同所用各別日華子云薑黃熱無毒治癥瘕血塊癰腫通月經治撲損瘀血消腫毒止暴風痛冷氣下食海南生者即名蓬莪朮江南生者即為薑黃圖經曰薑黃舊不載所出州郡今江廣蜀川多有之葉青緑長一二尺許闊三四寸有斜紋如紅蕉葉而小花紅白色至中秋漸凋春末方生其花先生次方生葉不結實根盤屈黃色類生薑而圓有節或云真者是經種三年以上老薑能生花花在根際一如蘘荷根節堅硬氣味辛辣種姜處有之八月採根片切曝乾蜀人以治氣脹及産後敗血攻心甚驗蠻人生啖云可以祛邪辟惡謹按鬱金薑黃蒁藥三物相近蘇恭不細辨所說乃如一物藏器解紛云蒁味苦色青薑黃味辛溫色黃鬱金味苦寒色赤主馬熱病三物不同所用全別又劉淵林注吳都賦姜匯非一云姜匯大如螺氣猛近於臭南土人搗之以為齏荾一名廉姜生沙石中姜類也其味大辛而香削皮以黑梅並鹽汁漬之乃成也始安有之據此廉姜亦是其類而自是一物耳都下近年多種姜往往有薑黃生賣乃是老薑市人買生啖之云治氣為最醫家治氣藥大方中亦時用之千金翼瘡癬初生或始痛癢以薑黃敷之妙經驗後方治心痛薑黃一兩桂穰三兩為末醋湯下一錢匕蓽茇味辛大溫無毒主溫中下氣補腰腳殺腥氣消食除胃冷陰疝痃癖其根名蓽茇沒主五勞七傷陰汗核腫生波斯國此藥叢生莖葉似蒟醬子緊細味辛烈於蒟醬今附臣禹錫等謹按日華子云治霍亂冷氣心痛血氣陳藏器云畢勃沒味辛溫無毒主冷氣嘔逆心腹脹滿食不消寒疝核腫婦人內冷無子治腰腎冷除血氣生波斯國似柴胡黑硬蓽茇根也圖經曰蓽茇出波斯國今嶺南有之多生竹林內正月發苗作叢高三四尺其莖如箸葉青圓闊二三寸如桑面光而厚三月開花白色在表七月結子如小指大長二寸以來青黑色類椹子九月收採灰殺曝乾南人愛其辛香或取葉生茹之黃牛乳煎其子治氣痢神良謹按唐太宗實録云貞觀中上以氣痢久未痊服它名醫藥不應因詔訪求其方有衛士進乳煎蓽茇法御用有效劉禹錫亦記其事云後纍試年長而虛冷者必效海藥云謹按徐表南州記本出南海長一指赤褐色為上復有蓽茇短小黑味不堪舶上者味辛溫又主老冷心痛水瀉虛痢嘔逆醋心産後泄痢與阿魏和合良亦滋食味得訶子人參桂心乾薑治臟腑虛冷腸鳴泄痢神效陳藏器云蒟醬注蘇云蓽茇叢生子細味辛烈於蒟醬按蓽茇溫中下氣補腰腳煞腥氣消食除胃冷陰疝痃癬根名蓽茇沒主五勞七傷陰汗核腫已出拾遺生波斯國胡人將來此調食用之唐本注今人以調食味雷公云凡使先去挺用頭醋浸一宿焙乾以刀刮去皮粟子令淨方用免傷人肺令人上氣聖惠方治冷痰飲噁心用蓽茇一兩搗為末於食前清粥飲調半錢服經驗後方治偏頭疼絶妙蓽茇為末令患者口中含溫水左邊疼令左鼻吸一字右邊疼令右鼻吸一字效衍義曰蓽茇走腸胃中冷氣嘔吐心腹滿痛多服走泄真氣令人腸虛下重蒟音矩醬味辛溫無毒主下氣溫中破痰積生巴蜀唐本注云蜀都賦所謂流味於番禺者蔓生葉似王瓜而厚大味辛香實似桑椹皮黑肉白西戎亦時將來細而辛烈或謂二種交州愛州人云蒟醬人家多種蔓生子長大謂苗為浮留藤取葉合檳榔食之辛而香也又有蓽茇叢生子細味辛烈於蒟醬此當信也今注渝瀘等州出焉唐本先附圖經曰蒟音矩醬生巴蜀今夔川嶺南皆有之昔漢武使唐蒙曉諭南越南越食蒙以蒟醬蒙問所從來答曰西北牂牁江廣數里出番禺城下武帝感之於是開牂牁越嶲也劉淵林注蜀都賦云蒟醬緣木而生其子如桑椹熟時正青長二三寸以蜜藏而食之辛香溫調五臟今云蔓生葉似王瓜而厚大實皮黑肉白其苗為浮留藤取葉合檳榔食之辛而香也兩說大同小異然則淵林所云乃蜀種如此今說是海南所傳耳今唯貴蓽茇而不尚蒟醬故鮮有用者海藥云謹按廣州記云波斯國文實狀若桑椹紫褐色者為上黑者是老不堪黔中亦有形狀相似滋味一般主咳逆上氣心腹蟲痛胃弱虛瀉霍亂吐逆解酒食味近多黑色少見褐色者也雷公云凡使採得後以刀刮上粗皮便搗用生薑自然汁拌之蒸一日了出日乾每修事五兩用生薑汁五兩蒸乾為度食療溫散結氣治心腹中冷氣亦名土蓽茇嶺南蓽茇尤治胃氣疾巴蜀有之齊民要術子下氣消穀蘿摩子味甘辛溫無毒主虛勞葉食之功同於子陸機云一名芄蘭幽州謂之雀瓢唐本注云按雀瓢是女青別名葉蓋相似以葉似女青故兼名雀瓢今按陳藏器本草云蘿摩條中白汁主蜘蛛蠶咬折取汁點瘡上此汁爛絲煮食補益按陶注枸杞條云敷腫東人呼為白環藤生籬落間折有白汁一名雀瓢此注又云雀瓢是女青然女青終非白環二物相似不能分別唐本先附臣禹錫等謹按爾雅云雚芄蘭釋曰雚一名芄蘭郭璞云雚芄蔓生斷之有白汁可啖如此注則以雚芄一名蘭或傳寫誤芄衍字外臺祕要治白癜風以蘿摩草白汁敷上揩令破再敷三度瘥梅師方治丹火毒遍身赤腫不可忍以蘿摩草搗絞取汁敷之或搗敷上隨手消青黛味鹹寒無毒主解諸藥毒小兒諸熱驚癇發熱天行頭痛寒熱並水研服之亦摩敷熱瘡惡腫金瘡下血蛇犬等毒從波斯國來及太原並廬陵南康等染澱亦堪敷熱惡腫蛇虺螫毒染甕上池沫紫碧色者用之同青黛功今附臣禹錫等謹按藥性論云青黛君味甘平能解小兒疳熱消瘦殺蟲陳藏器云青黛並雞子白大黃敷瘡癰蛇虺等圖經文具藍實條下梅師方治傷寒發碗豆瘡未成膿方以波斯青黛大棗許冷水研服宮氣方疳痢羸瘦毛焦方歌曰孩兒雜病變成疳不問強羸女與男恰似脊旁多變動還如瘦疾困耽耽又歌曰煩熱毛焦鼻口乾皮膚枯槁四肢攤腹中時時更下痢青黃赤白一般般眼澀面黃鼻孔赤穀道開張不欲看忽然瀉下成疳澱又卻濃涕一團團唇焦嘔逆不乳哺壯熱增寒不安腹中有病須醫藥何須祈禱信神盤此方便是青黛散孩兒百病服來看初虞世治諸蟲毒所傷青黛雄黃等分同研為末新汲水調下二錢匕太平廣記青黛殺惡蟲物化為水衍義曰青黛乃藍為之有一婦人患臍下腹上下連二陰遍滿生濕瘡狀如馬瓜瘡他處並無熱癢而痛大小便澀出黃汁食亦減身面微腫醫作惡瘡治用鰻鱺魚松脂黃丹之類藥塗上瘡愈熱痛愈甚治不對故如此問之此人嗜酒貪淡喜魚蟹發風等物急令用溫水洗拭去膏藥尋以馬齒莧四兩爛研細入青黛一兩再研勻塗瘡上即時熱減痛癢皆去仍服八正散日三服分敗客熱每塗藥得一時久藥已乾燥又再塗新濕藥凡如此二日減三分之一五日減三分之二自此二十日愈既愈而問曰此瘡何緣至此曰中下焦蓄風熱毒氣若不出當作腸癰內痔仍常須禁酒及發風物然不能禁酒後果然患內痔鬱金味辛苦寒無毒主血積下氣生肌止血破惡血血淋尿血金瘡唐本注云此藥苗似薑黃花白質紅末秋出莖心無實根黃赤取四畔子根去皮火干之生蜀地及西戎馬藥用之破血而補胡人謂之馬蒁嶺南者有實似小豆蔻不堪啖唐本先附臣禹錫等謹按藥性論云鬱金單用亦可治女人宿血氣心痛冷氣結聚溫醋摩服之亦啖馬藥用治脹痛圖經曰鬱金本經不載所出州土蘇恭云生蜀地及西戎胡人主謂之馬蒁今廣南江西州郡亦有之然不及蜀中者佳四月初生苗似薑黃花白質紅末秋出莖心無實根黃赤取四畔子根去皮火干之古方稀用今小兒方及馬醫多用之謹按許慎說文解字云郁芳草也十葉為貫百二十貫築以煮之為郁郁今鬱林郡也木部中品有鬱金香云生大秦國二月三月有花狀如紅藍其花即香也陳氏云為百草之英既云百草之英乃是草類又與此同名而在木部非也今人不復用亦無辨之者故但附於此耳經驗方治尿血不定以一兩搗為末蔥白一握相和以水一盞煎至三合去滓溫服日須三服經驗後方治風痰鬱金一分藜蘆十分各為末和令勻每服一字用溫漿水一盞先以少漿水調下余者水漱口都服便以食壓之孫用和治陽毒入胃下血頻疼痛不可忍鬱金五個大者牛黃一皂莢子別細研二味同為散每服用醋漿水一盞同煎三沸溫服丹房鏡源云灰可用結砂子說文曰芳草也十葉為貫百草貫築以煮之為郁從臼門缶鬯彡其飾也一曰郁鬯百草之華遠方郁人所貢芳草合釀之以降神周禮郁人凡祭祀之裸用郁鬯衍義曰鬱金不香今人將染婦人衣最鮮明然不耐日炙染成衣則微有鬱金之氣蘆薈味苦寒無毒主熱風煩悶胸膈間熱氣明目鎮心小兒癲癇驚風療五疳殺三蟲及痔病瘡瘻解巴豆毒一名訥會一名奴會俗呼為象膽蓋以其味苦如膽故也生波斯國似黑餳今附臣禹錫等謹按藥性論云蘆薈亦可單用殺小兒疳蛔主吹鼻殺腦疳除鼻癢南海藥譜云樹脂也本草不細委之謂是象膽殊非也兼治小兒諸熱圖經曰蘆薈出波斯國今唯廣州有來者其木生山野中滴脂淚而成採之不拘時月俗呼為象膽以其味苦而云耳蘆薈治濕癢搔之有黃汁者劉禹錫著其方云余少年曾患癬初在頸項間後延上左耳遂成濕瘡用斑蝥狗膽桃根等諸藥徒令以蜇其瘡轉盛偶於楚州賣藥人教用蘆薈一兩研炙甘草半兩末相和令勻先以溫漿水洗癬乃用舊干帛子拭乾便以二味合和敷之立干便瘥神奇又治䘌齒崔元亮海上方云取蘆薈四分杵末先以鹽揩齒令先淨然後敷少末於上妙也雷公云凡使勿用雜膽其象膽幹了上有青竹紋斑並光膩微微甘勿使和衆藥搗此藥先搗成粉待衆藥末出然後入藥中此物是胡人殺得白象取膽干入漢中是也馬先蒿味苦平無毒主寒熱鬼疰中風濕痹女子帶下病無子一名馬屎蒿生南陽川澤陶隱居云方云一名爛石草主惡瘡方藥亦不復用唐本注云此葉大如茺蔚花紅白色實八月九月熟俗謂之虎麻是也一名馬新蒿所在有之茺蔚苗短小子夏中熟而初生二種極相似也今按別本注云近道處處有三月八月採莖葉陰乾臣禹錫等謹按爾雅云蔚牡菣釋曰蔚即蒿之雄無子者又曰蔚一名牡菣詩蓼莪云匪莪伊蔚陸機云牡蒿也三月始生七月華華似胡麻華而紫赤八月為角角似小豆角鋭而長一名馬新蒿是也圖經文具第六卷中白蒿條下聖惠方治大風癩疾骨肉疽敗百節疼酸眉鬢墮落身體習習癢痛以馬先蒿細銼炒為末每空心及晚食前溫酒調下二錢匕外臺祕要治癩馬先蒿一名馬矢蒿搗末服方寸匕日三服如更赤起一年都瘥延胡索味辛溫無毒主破血産後諸病因血所為者婦人月經不調腹中結塊崩中淋露産後血暈暴血衝上因損下血或酒摩及煮服生奚國根如半夏色黃今附臣禹錫等謹按日華子云除風治氣暖腰膝破症癖撲損瘀血落胎及暴腰痛海藥云生奚國從安東道來味苦甘無毒主腎氣破産後惡露及兒枕與三稜鱉甲大黃為散能散氣通經絡蛀蚛成末者使之唯良偏主産後病也聖惠方治産後穢汙不盡腹滿方延胡索末和酒服一錢立止又方治墮落車馬筋骨疼痛不止用延胡索一兩搗羅為散不計時候以豆淋酒調下二錢匕勝金方治膜外氣及氣塊方延胡索不限多少為末豬胰一具切作塊子炙熟蘸藥末食之産書治産後心悶手腳煩熱氣力欲絶血暈連心頭硬及寒熱不禁延胡索熬搗為末酒服一錢匕拾遺序云延胡索止心痛酒服肉豆蔻味辛溫無毒主鬼氣溫中治積冷心腹脹痛霍亂中惡冷疰嘔沫冷氣消食止泄小兒乳霍其形圓小皮紫緊薄中肉辛辣生胡國胡名迦拘勒今附臣禹錫等謹按藥性論云肉豆蔻君味苦辛能主小兒吐逆不下乳腹痛治宿食不消痰飲日華子云調中下氣止瀉痢開胃消食皮外絡下氣解酒毒治霍亂味珍力更殊圖經曰肉豆蔻出胡國今唯嶺南人家種之春生苗花實似豆蔻而圓小皮紫緊薄中肉辛辣六月七月採續傳信方治脾泄氣痢等以蔻二顆米醋調麵裹之置灰火中煨令黃焦和麵碾末更以炒了檔子末一兩相和又焦炒陳廩米為末每用二錢匕煎作飲調前二物三錢匕旦暮各一便瘥陳藏器云大舶來即有中國無海藥云謹按廣志云生秦國及崑崙味辛溫無毒主心腹蟲痛脾胃虛冷氣並冷熱虛泄赤白痢等凡痢以白粥飲服佳霍亂氣並以生薑湯服良雷公云凡使須以糯米作粉使熱湯搜裹豆蔻於煻灰中炮待米糰子焦黃熟然後出去米其中有子取用勿令犯銅聖惠方治冷痢腹痛不能食肉豆蔻一兩去皮以醋麵裹煨令面熟為度搗為散非時粥飲下一錢匕衍義曰肉豆蔻對草豆蔻言之去殼只用肉肉油色者佳枯白味薄瘦虛者下等亦善下氣多服則泄氣得中則和平其氣補骨脂味辛大溫無毒主五勞七傷風虛冷骨髓傷敗腎冷精流及婦人血氣墮胎一名破故紙生廣南諸州及波斯國樹高三四尺葉小似薄荷其舶上來者最佳今附臣禹錫等謹按藥性論云婆固脂一名破故紙味苦辛能主男子腰疼膝冷囊濕逐諸冷痹頑止小便利腹中冷日華子云興陽事治冷勞明耳目南蕃者色赤廣南者色緑入藥微炒用又名胡韭子圖經曰補骨脂生廣南諸州及波斯國今嶺外山阪間多有之不及蕃舶者佳莖高三四尺葉似薄荷花微紫色實如麻子圓扁而黑九月採或去胡韭子也胡人呼若婆固脂故別名破故紙今人多以胡桃合服此法出於唐鄭相國自敘云豫為南海節度年七十有五越地卑濕傷於內外衆疾俱作陽氣衰絶服乳石補益之藥百端不應元和七年有訶陵國舶主李摩訶知豫病狀遂傳此方並藥豫初疑而未服摩訶稽顙固請遂服之經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸京録方傳之破故紙十兩淨擇去皮洗過搗篩令細用胡桃瓤二十兩湯浸去皮細研如泥即入前末更以好蜜和攪令勻如飴糖盛於瓷器中旦日以暖酒二合調藥一匙服之便以飯壓如不飲人以暖熟水調亦可服彌久則延年益氣悅心明目補添筋骨但禁食藝臺羊血余無忌此物本自外蕃隨海舶而來非中華所有蕃人呼為補骨鴟語訛為破故紙也續傳信方載其事其義頗詳故並録之海藥云惡甘草雷公云凡使性本大燥毒用酒浸一宿後漉出卻用東流水浸三日夜卻蒸從巳至申出日乾用經驗後方治腰疼神妙用破故紙為末溫酒下三錢匕又方治男子女人五勞七傷下元久冷烏髭鬢一切風病四肢疼痛駐顏壯氣補骨脂一斤酒浸一宿放干卻用烏油麻一升和炒令麻子聲絶即播去只取補骨脂為末醋煮麵糊丸如梧子大早辰溫酒鹽湯下二十丸零陵香味甘平無毒主惡氣疰心腹痛滿下氣令體香和諸香作湯丸用之得酒良生零陵山谷葉如羅勒南越志名燕草又名薰草即香草也山海經云薰草麻葉方莖氣如蘼蕪可以止癘即零陵香也今附臣禹錫等謹按陳藏器云薰草明目止淚療泄精去邪惡氣傷寒頭疼一名蕙草生下濕地三月採陰乾脫節者良按薰草即蕙根也葉如麻兩兩相對此即是零陵香也日華子云治血氣腹脹酒煎服莖葉圖經曰零陵香生零陵山谷今湖嶺諸州皆有之多生下濕地葉如麻兩兩相對莖方氣如蘼蕪常以七月中旬開花至香古所謂薰草是也或云蕙草亦此也又云其莖葉謂之蕙其根謂之薰三月採脫節者良今嶺南收之皆作窟灶以火炭焙乾令黃色乃佳江淮間亦有土生者作香亦可用但不及湖嶺者芬薰耳古方但用薰草而不用零陵香今合香家及面膏澡豆諸法皆用之都下市肆貨之甚多唐本注生水山間可和諸香煮汁飲之亦宜合衣中香海藥云謹按山海經生廣南山谷陳氏云地名零陵故以地為名味辛溫無毒主風邪衝心牙車腫痛虛勞疳䘌凡是齒痛煎含良得升麻細辛善不宜多服令人氣喘衍義曰零陵香至枯乾猶香人藥絶可用婦人浸油飾發香無以加此即蕙草是也縮沙蜜味辛溫無毒主虛勞冷泄宿食不消赤白泄痢腹中虛痛下氣生南地苗似廉姜形如白豆蔻其皮緊厚而皺黃赤色八月採今附臣禹錫等謹按藥性論云縮沙蜜君出波斯國味苦辛能主冷氣腹痛止休息氣痢勞損消化水穀溫暖脾胃治冷滑下痢不禁虛羸方曰熬末以羊子肝薄切用末逐片糝瓦上焙乾為末入乾薑末飯為丸日二服五十丸又方炮附子末乾薑厚朴陳橘皮等分為丸日二服四十丸陳藏器云縮沙蜜味酸主上氣咳嗽奔豚鬼疰驚癇邪氣似白豆蔻子嵩陽子曰止痢味辛香日華子云治一切氣霍亂轉筋心腹痛能起酒香味圖經曰縮沙蜜生南地今唯嶺南山澤間有之苗莖似高良薑高三四尺葉青長八九寸闊半寸以來三月四月開花在根下五六月成實五七十枚作一穗狀似益智皮緊厚而皺如栗文外有刺黃赤色皮間細子一團八漏可四十餘粒如黍米大微黑色七月八月採海藥云今按陳氏生西海及西戎諸國味辛平咸得訶子鱉甲豆蔻白蕪荑等良多從安東道來孫尚藥治婦人妊娠偶因所觸或墜高傷打致胎動不安腹中痛不可忍者縮沙不計多少尉斗內盛慢火炒令熱透去皮用仁搗羅為末每服二錢用熱酒調下須臾覺腹中胎動處極熱即胎已安神效蓬莪朮味苦辛溫無毒主心腹痛中惡疰忤鬼氣霍亂冷氣吐酸水解毒飲食不消酒研服之又療婦人血氣丈夫奔豚生西戎及廣南諸州子似干椹葉似蘘荷術在根下並生一好一惡惡者有毒西戎人取之先放羊食羊不食者棄之今附臣禹錫等謹按陳藏器云一名蓬莪黑色二名蒁黃色三名波殺味甘有大毒藥性論云蓬莪朮亦可單用能治女子血氣心痛破痃癖冷氣以酒醋摩服效日華子云得酒醋良治一切氣開胃消食通月經消瘀血止撲損痛下血及內損惡血等此即是南中薑黃根也圖經曰蓬莪朮生西戎及廣南諸州今江浙或有之三月生苗在田野中其莖如錢大高二三尺葉青白色長一二尺大五寸以來頗類蘘荷五月有花作穗黃色頭微紫根如生薑而術在根下似雞鴨卵大小不常九月採削去粗皮蒸熟曝乾用此物極堅硬難搗治用時熱灰火中煨令透熟乘熱入臼中搗之即碎如粉古方不見用者今醫家治積聚諸氣為最要之藥與京三稜同用之良婦人藥中亦多使雷公云凡使於砂盆中用醋磨令盡然後於火畔吸令乾重篩過用十全博救方治小兒氣候止疼蓬莪朮炮候熱搗為末用一大錢熱酒調下孫用和正元散治氣不接續氣短兼治滑泄及小便數王丞相服之有驗蓬莪朮一兩金鈴子去核一兩右件為末更入硼砂一錢煉過研細都和勻每服二錢鹽湯或溫酒調下空心服積雪草味苦寒無毒主大熱惡瘡癰疽浸淫赤熛皮膚赤身熱生荊州川穀陶隱居云方藥亦不用想此草當寒冷爾唐本注云此草葉圓如錢大莖細徑蔓延生溪澗側搗敷熱腫丹毒不入藥用荊楚人以葉如錢謂為地錢草徐儀藥圖名連錢草生處亦稀今按陳藏器本草云積雪草主暴熱小兒丹毒寒熱腹內熱結搗絞汁服之又按別本注云今處處有併入藥用生陰濕地八月九月採苗葉陰乾臣禹錫等謹按藥性論云連錢草亦可單用能治瘰癧鼠漏寒熱時節來往日華子云味苦辛以鹽挪貼消腫毒並風疹疥癬圖經曰積雪草生荊州川穀今處處有之葉圓如錢大莖細而徑蔓延生溪澗之側荊楚人以葉如錢謂為地錢草徐儀藥圖名連錢草八月九月採苗葉陰乾用段成式酉陽雜俎云地錢葉圓莖細有蔓一曰積雪草一曰連錢草謹按天寶單行方云連錢草味甘平無毒元生咸陽下濕地亦生臨淄郡濟陽郡池澤中甚香俗間或云圓葉似薄荷江東吳越丹陽郡極多彼人常充生菜食之河北柳城郡盡呼為海蘇好近水生經冬不死咸洛二京亦有或名胡薄荷所在有之單服療女子小腹痛又云女子忽得小腹中痛月經初來便覺腰中切痛連脊間如刀錐所刺忍不可堪者衆醫不別謂是鬼疰妄服諸藥終無所益其疾轉增審察前狀相當即用此藥其藥夏五月正放花時即採取曝乾搗篩為散女子有患前件病者取二方寸匕和好醋二小合攪令勻平旦空腹頓服之每日一服以知為度如女子先冷者即取前件藥五兩加桃仁二百枚去尖皮熬搗為散及蜜為丸如梧子大每日空腹飲及酒下三十丸日再服以疾愈為度忌麻子蕎麥陳藏器云東人呼為連錢生陰處蔓延地葉如錢衍義曰積雪草今南方多有生陰濕地不必荊楚形如水荇而小面亦光潔微尖為異今人謂之連錢草蓋取象也葉葉各生搗爛貼一切熱毒癰疽等秋後收之蔭干為末水調敷白前味甘微溫臣禹錫等謹按蜀本云微寒無毒主胸脅逆氣咳嗽上氣陶隱居云此藥出近道似細辛而大色白易折主氣嗽方多用之唐本注云此藥葉似柳或苡芫花苗高尺許生洲渚沙磧之上根白長於細辛味甘俗以酒漬服主上氣不生近道俗名石藍又名嗽藥今用蔓生者味苦非真也今按別本注云二月八月採根曝乾根似牛膝白薇臣禹錫等謹按藥性論云白前臣味辛兼主一切氣日華子云治賁豚腎氣肺氣煩悶及上氣圖經曰白前舊不載所出州土陶隱居云出近道今蜀中及淮浙州郡皆有之似細辛而大色白易折亦有葉似柳或似蕪花苗者並高尺許生洲渚沙磧之上根白長於細辛亦似牛膝白薇輩今用蔓生者味苦非真也二月八月採根曝乾深師療久咳逆上氣體腫短氣脹滿晝夜倚壁不得臥常作水雞聲者白前湯主之白前二兩紫菀半夏洗各三兩大戟七合切四物以水一斗漬一宿明旦煮取三升分三服禁食羊肉餳大佳唐本云微寒主上氣衝喉中呼吸欲絶雷公云凡使先用生甘草水浸一伏時後漉去頭須了焙乾任入藥中用梅師方治久患㗇呷咳嗽喉中作聲不得眠取白前搗為末溫酒調二錢匕服衍義曰白前保定肺氣治嗽多用白而長於細辛但粗而脆不似細辛之柔以溫藥相佐使則尤佳余如經薺苨味甘寒主解百藥毒陶隱居云根莖都似人參而葉小異根味甜絶能殺毒以其與毒藥共處而毒皆自然歇不正入方家用也今按別本注云根似桔梗以無心為異無毒二月八月採根曝乾臣禹錫等謹按爾雅云苨菧苨釋曰苨一名菧苨郭云薺苨也日華子云薺苨殺蠱毒治蛇蟲咬熱狂溫疾罯毒箭圖經曰薺苨舊不載所出州土今川蜀江浙皆有之春生苗莖都似人參而葉小異根似桔梗根但無心為異潤州尤多人家收以為果菜或作脯啖味甚甘美二月八月採根曝乾古方解五石毒多生服薺苨汁良又小品方療蠱取薺苨根搗末以飲服方寸匕立瘥食療云丹石發動取根食之尤良千金翼封疔腫取生薺苨根汁一合去滓敷不過三食醫心鏡薺苨主利肺氣和中明目止痛蒸切作羹粥食之齏菹亦得金匱玉函方鉤吻葉與芹葉相似誤食之殺人薺苨八兩水六升煮取三升為兩服解之朝野僉載野豬中毒藥箭多食此物出別說云今多以蒸壓褊亂人參但味淡爾衍義曰薺苨今陝州採為脯別有法甚甘美兼可寄遠古人以謂薺苨似人參者是此解藥毒甚驗白藥味辛溫無毒主金瘡生肌出原州唐本注云三月苗生葉似苦苣四月抽赤莖花白根皮黃八月葉落九月枝折採根日乾今按別本注云解野葛生金巴豆藥毒刀斧折傷能止血痛乾末敷之唐本先附臣禹錫等謹按藥性論云白藥亦可單用味苦能治喉中熱塞噎痹不通胸中隘塞咽中常痛腫脹日華子云白藥冷消痰止嗽治渴並吐血喉閉消腫毒又云翦草涼無毒治惡瘡疥癬風瘙根名白藥圖經曰白藥出原州今夔施江西嶺南亦有之三月生苗似苦苣葉四月而赤莖長似葫蘆蔓六月開白花八月結子亦名苽蔞九月採根以水洗切碎曝乾名白藥子江西出者葉似烏臼子如緑豆至八月其子變成赤色施州人取根並野豬尾二味洗淨去粗皮焙乾等分停搗篩酒調服錢匕療心氣痛解熱毒甚效又諸瘡癰腫不散者取生根爛搗敷貼干則易之無生者用末水調塗之亦可崔元亮海上方治一切天行取白藥研如面漿水一大盞空腹頓服之便仰臥一食頃候心頭悶亂或噁心腹內如車鳴癘刺痛良久當有吐利數行勿怪欲服藥時先令煮漿水粥於井中懸著待冷若吐利過度即吃冷粥一碗止之不吃即困人經驗後方治妊娠傷寒護胎以白藥子不拘多少為末用雞子清調攤於紙花上可碗來大貼在臍下胎存生處於即以溫水潤之衍義曰白藥今為治馬肺熱藥有效葒音紅草味鹹微寒無毒主消渴去熱明目益氣一名鴻䕵音纈如馬蓼而大生水旁五月採實陶隱居云此類甚多今生下濕地極似馬蓼甚長大詩稱隰有游龍注云葒草郭景純云即籠古也今按別本注云此即水紅也以為湯浸療腳氣臣禹錫等謹按爾雅云紅籠古其大者蘬疏引陸機云一名馬蓼葉大而赤白色生水澤中高丈餘郭云俗呼葒草為籠鼓語轉耳圖經曰葒草即水紅也舊不著所出州郡云生水旁今所在下濕地皆有之似蓼而葉大赤白色高丈餘爾雅云紅籠古其大者蘬丘追切鄭詩云隰有游龍是也陸機云一名馬蓼本經云似馬蓼而大若然馬蓼自是一種也五月採實今亦稀用但取根莖作湯捋腳氣耳陳藏器云作湯浸水氣惡瘡腫佳唐本注云有毛花紅白除惡瘡腫腳氣煮濃汁漬之多瘥衍義文具水蓼條下莎草根味甘微寒無毒主除胸中熱充皮毛久服利人益氣長鬚眉一名薃音號一名侯莎其實名緹生田野二月八月採陶隱居云方藥亦不復用離騷云青莎雜樹繁草靃音髓靡音美古人為詩多用之而無識者乃有鼠蘘療體異此唐本注云此草根名香子一名雀頭香大下氣除胸腹中熱所在有之莖葉都似三稜根若附子周匝多毛交州者最勝大者如棗近道者如杏仁許荊襄人謂之莎草根合和香用之圖經曰莎草根又名香附子舊不著所出州土但云生田野今處處有之或云交州者勝大如棗近道者如杏仁許苗莖葉都似三稜根若附子周匝多毛今近道生者苗葉如薤而瘦根如箸頭大二月八月採謹按天寶單方圖載水香稜功狀與此頗相類但味差不同其方云水香稜味辛微寒無毒性澀元生博平郡池澤中苗名香稜根名莎結亦名草附子河南及淮南下濕地即有名水莎隴西謂之地藾根蜀郡名續根草亦名水巴戟今涪都最饒名三稜草用莖作鞋履所在皆有單服治肺風又云其藥療丈夫心肺中虛風及客熱膀胱間連脅下時有氣妨皮膚瘙癢癮疹飲食不多日漸瘦損常有憂愁心忪少氣等並春收苗及花陰乾入冬採根切貯於風涼處有患前病者取苗二十餘斤銼以水二石五斗煮取一石五斗於浴斛中浸身令汗出五六度浸兼浴其肺中風皮膚癢即止每載四時常用則癮疹風永瘥其心中客熱膀胱間連脅下氣妨常日憂愁不樂兼心忪者取根二大斤切熬令香以生絹袋盛貯於三大斗無灰清酒中浸之春三月浸一日即堪服冬十月後即七日近暖處乃佳每空腹服一盞日夜三四服之常令酒氣相續以知為度若不飲酒即取根十兩加桂心五兩蕪荑三兩和搗為散以蜜和為丸搗一千杵丸如梧子大每空腹以酒及姜蜜湯飲汁等下二十丸日再服漸加至三十丸以瘥為度雷公云凡採得後陰乾於石臼中搗勿令犯鐵用之切忌爾衍義曰莎草其根上如棗核者又謂之香附子亦入印香中亦能走氣今人多用雖生於莎草根然根上或有或無有薄皸皮紫黑色非多毛也刮去皮則色白若便以根為則誤矣其味苦蓽澄茄味辛溫無毒主下氣消食皮膚風心腹間氣脹令人能食療鬼氣能染髮及香身生佛誓國似梧桐子及蔓荊子微大亦名毗陵茄子今附臣禹錫等謹按日華子云治一切氣並霍亂瀉肚腹痛腎氣膀胱冷圖經曰蓽澄茄生佛誓國今廣州亦有之春夏生葉青滑可愛結實似梧桐子及蔓荊子微大八月九月採之今醫方脾胃藥中多用又治傷寒咳癔日夜不定者其方以蓽澄茄三分高良薑三分二物搗羅為散每服二錢水六分煎十餘沸入少許醋攪勻和滓如茶熱呷海藥云謹按廣志云生諸海嫩胡椒也青時就樹採摘造之有柄粗而蒂圓是也其味辛苦微溫無毒主心腹卒痛霍亂吐瀉痰癖冷氣古方偏用染髮不用治病也雷公云凡使採得後去柄及皺皮了用酒浸蒸從巳至酉出細杵任用也胡黃連味苦平無毒主久痢成疳傷寒咳嗽溫瘧骨熱理腰腎去陰汗小兒驚癇寒熱不下食霍亂下痢生胡國似干楊柳心黑外黃一名割孤露澤今附圖經曰胡黃連生胡國今南海及秦隴間亦有之初生似蘆干似楊柳枯枝心黑外黃不拘時月收採今小兒藥中多用之又治傷寒勞復身熱大小便赤如血色者胡黃連一兩山梔子二兩去皮入蜜半兩拌和炒令微焦二味搗羅為末用豬膽汁和丸如梧桐子大每服用生薑二片烏梅一個童子小便三合浸半日去滓食後暖小便令溫下十丸臨臥再服甚效唐本云大寒主骨蒸勞熱補肝膽明目治冷熱泄痢益顏色厚腸胃治婦人胎蒸虛驚治三消五痔大人五心煩熱出波斯國生海畔陸地八月上旬採惡菊花玄參白蘚皮解巴豆毒服之忌豬肉令人漏精以人乳浸點目甚良苗若夏枯草根頭似鳥觜折之肉似鸜鵒眼者良孫尚藥治小兒盜汗潮熱往來南蕃胡黃連柴胡等分羅極細煉蜜和丸如雞頭大每服二丸至三丸銀器中用酒少許化開更入水五分重湯煮三二十沸放溫食後和滓服別說云謹按胡黃連折之塵出如煙者為真船底苔冷無毒治鼻洪吐血淋疾以炙甘草並豉汁濃煎湯旋呷又主五淋取一團鴨子大煮服之又水中細苔主天行病心悶搗絞汁服新補見孟詵陳藏器日華子陳藏器云主五淋取一鴨卵大塊水煮服之聖惠方治乳石發動小便淋澀不通心神悶亂用船底青苔如半雞子大以水一大盞煎至五分去滓溫服日三四服子母祕録小兒赤遊行於體上下至心即死水中苔搗末敷上良紅豆蔻味辛溫無毒主腸虛水瀉心腹攪痛霍亂嘔吐酸水解酒毒不宜多服令人舌粗不思飲食云是高良薑子其苗如蘆葉似姜花作穗嫩葉卷而生微帶紅色生南海諸谷今附臣禹錫等謹按藥性論云紅豆蔻亦可單用味苦辛能治冷氣腹痛消瘴霧氣毒去宿食溫腹腸吐瀉痢疾海藥云擇嫩者加入鹽纍纍作朵不散落須以朱槿染令色深善醒於醉解酒毒此外無諸要使也蒔蘿味辛溫無毒主小兒氣脹霍亂嘔逆腹冷食不下兩肋痞滿生佛誓國如馬芹子辛香亦名慈謀勒今附臣禹錫等謹按日華子云健脾開胃氣溫腸殺魚肉毒補水臟及壯筋骨治腎氣圖經曰蒔蘿出佛誓國今嶺南及近道皆有之三月四月生苗花實大類蛇床而香辛六月七月採實今人多以和五味不聞入藥用海藥云謹按廣州記云生波斯國馬芹子即黑色而重蒔蘿子即褐色而輕主膈氣消食溫胃善滋食味多食無損即不可與阿魏同合奪其味爾艾蒳香味甘溫無毒去惡氣殺蟲主腹冷泄痢廣志曰出西國似細艾又有松樹皮緑衣亦名艾納可以和合諸香燒之能聚其煙青白不散而與此不同也今附臣禹錫等謹按古藥府詩云行胡從何方列國持何來氍毺𣯚𣰆五木香迷迭艾蒳與都梁是也陳藏器云主癬闢蛀海藥云謹按廣志云生剽國溫平主傷寒五泄主心腹注氣下寸白止腸鳴燒之闢溫疫合螫窠浴腳氣甚良甘松香味甘溫無毒主惡氣卒心腹痛滿兼用合諸香叢生葉細廣志云甘松香出姑臧今附臣禹錫等謹按日華子云治心腹脹下氣作浴湯令人身香圖經曰甘松香出姑臧今黔蜀州郡及遼州亦有之叢生山野葉細如茅草根極繁密八月採作湯浴令人體香陳藏器云叢生葉細出涼州海藥云謹按廣志云生源州苗細引蔓而生又陳氏云主黑皮䵟𪒟風疳齒䘌野雞痔得白芷附子良合諸香及裛衣妙也垣衣味酸無毒主黃疸心煩咳逆血氣暴熱在腸胃金瘡內塞久服補中益氣長肌好顏色一名昔邪一名烏韭一名垣嬴一名天韭一名鼠韭生古垣牆陰或屋上三月三日採陰乾陶隱居云方藥不甚用俗中少見有者離騷亦有昔邪或云即是天蒜爾唐本注云此即古牆北陰青苔衣也其生石上者名昔邪一名烏韭江南少牆陶故云少見本經載之屋上者名屋遊在下品形並相似為療略同別録云主暴風口噤金瘡酒漬服之效臣禹錫等謹按日華子云垣衣冷又云地衣冷微毒治卒心痛中惡以人垢膩為丸服七粒此是陰濕地被日曬起苔蘚是也並生油調敷馬反花瘡良圖經曰文具海藻條下陟釐音離味甘大溫無毒主心腹大寒溫中消穀強胃氣止泄痢生江南池澤陶隱居云此即南人用作紙者方家唯合斷下藥用之唐本注云此物乃水中苔今取以為紙名苔紙青黃色體澀小品方云水中粗苔也範東陽方云水中石上生如毛緑色者藥對云河中側梨側梨陟釐聲相近也王子年拾遺云張華撰博物志上晉武帝嫌繁命削之賜華側理紙萬張子所云陟釐紙也此紙以水苔為之溪人語訛謂之側理也今按別本注云此即石發也色類似苔而粗澀為異且水苔性冷陟釐甘溫明其陟釐與苔全異池澤中石上名陟釐浮水中者名苔爾衍義曰陟釐今人事治音池為苔脯堪啖京城市中甚多然治渴疾仍須禁食鹽余方家亦罕用鳧葵味甘冷無毒主消渴去熱淋利小便生水中即荇音杏菜也一名接余唐本注云南人名豬蓴堪食有名未用條中載也今按別本注云即荇菜也生水中菜似蓴莖澀根極長江南人多食云是豬蓴全為誤也豬蓴與絲蓴並一種以春夏細長肥滑為絲蓴至冬短為豬蓴亦呼為龜蓴比與鳧葵殊不相似也南人搗汁服之療寒熱也唐本先附臣禹錫等謹按日華子云豬蓴解蠱毒毒藥絲蓴已見蓴條解之今據唐本注云有名未用條中載也而尋有名未用條中即無鳧葵豬蓴蓋經開寶詳定已刪去也圖經曰鳧葵即荇菜也舊不著所出州土云生水中今處處池澤皆有之葉似蓴莖澀根甚長花黃色水中極繁盛謹按爾雅莕謂之接余其葉謂之苻郭璞以為叢生水中葉圓在莖端長短隨水深淺江東人食之詩周南所謂參差荇菜是也陸機云白莖葉紫赤色正圓徑寸余浮在水上根在水底大如叉股上青下白煮其白莖以苦酒浸脆美可以按酒今人不食醫方亦鮮用女菀味辛溫無毒主風寒洗洗霍亂泄痢腸鳴上下無常處驚癇寒熱百疾療肺傷咳逆出汗久寒在膀胱支滿飲酒夜食發病一名白菀一名織女菀一名茆音柳生漢中川穀或山陽正月二月採陰乾畏滷鹼陶隱居云比來醫方都無復用之市人亦少有便是欲絶別復有白菀似紫菀非此之別名也唐本注云白菀即女菀更無別者有名未用中浪出一條無紫菀時亦用之功效相似也臣禹錫等今據有名未用中無白菀者蓋唐修本草時刪去爾衍義曰女菀一名白菀或者謂為二物非也唐刪去白菀之條甚合宜陶能言不能指說性狀余從經中所說甚明今直取經王孫味苦平無毒主五臟邪氣寒濕痹四肢疼酸膝冷痛療百病益氣吳名白功草楚名王孫齊名長孫一名黃孫一名黃昏一名海孫一名蔓延生海西川穀及汝南城郭垣下陶隱居云今方家皆呼名黃昏又云牡蒙市人亦少識者唐本注云小品述本草牡蒙一名王孫藥對有牡蒙無王孫此則一物明矣又主金瘡破血生肌肉止痛赤白痢補虛益氣除腳腫發陰陽也臣禹錫等謹按蜀本注云葉似及己而大根長尺余皮肉亦紫色土馬鬃治骨熱敗煩熱毒壅衄鼻所在背陰古牆垣上有之歲多雨則茂盛世人或便以為垣衣非也垣衣生垣牆之側此物生垣牆之上比垣衣更長大抵苔之類也以其所附不同故立名與主療亦異在屋則謂之屋遊瓦苔在牆垣則謂之垣衣土馬鬃在地則謂之地衣在井則謂之井苔在水中石上則謂之陟釐土馬鬃近世常用而諸書未著故附新定條焉新定蜀羊泉味苦微寒無毒主頭禿惡瘡熱氣疥瘙痂癬蟲療齲齒女子陰中內傷皮間實積一名羊泉一名羊飴生蜀郡川穀陶隱居云方藥亦不復用彼土人時有采識者唐本注云此草俗名漆姑葉似菊花紫色子類枸杞子根如遠志無心有糝苗主小兒驚兼療漆瘡生毛髮所在平澤皆有之今按別本注云今處處有生陰濕地三月四月採苗葉陰乾之菟葵味甘寒無毒主下諸石五淋止虎蛇毒唐本注云苗如石龍芮葉光澤花白似梅莖紫色煮汁極滑堪啖爾雅釋草一名莃所在平澤皆有田間人多識之今按別本注云蛇虎毒諸瘡搗汁飲之及塗瘡能解毒止痛六月七月採莖葉曝乾唐本先附臣禹錫等謹按爾雅云莃菟葵注頗似葵而小葉狀如藜有毛汋啖之滑疏汋煮也圖經文具第二十七卷冬葵條下衍義曰菟葵緑葉如黃蜀葵花似拗霜甚雅形如至小者初開單葉蜀葵有檀心色如牡丹姚黃蕊則蜀葵也唐劉夢得還京云唯菟葵燕麥動搖春風者是也蔛草味甘寒無毒主暴熱喘息小兒丹腫一名蔛榮生水旁唐本注云葉圓似澤瀉而小花青白亦堪啖所在有之今按別本注云江南人用蒸魚食之甚美五月六月採莖葉曝乾唐本先附鱧腸味甘酸平無毒主血痢針灸瘡發洪血不可止者敷之立已汁塗發眉生速而繁生下濕地唐本注云苗似旋覆一名蓮子草所在坑渠間有之今按別本注云二月八月採陰乾唐本先附臣禹錫等謹按蕭炳云作膏點鼻中添腦日華子云排膿止血通小腸長鬚發敷一切瘡並蠶瘑圖經曰鱧腸即蓮子草也舊不載所出州郡但云生下濕地今處處有之南方尤多此有二種一種葉似柳而光澤莖似馬齒莧高一二尺許花細而白其實若小蓮房蘇恭云苗似旋覆者是也一種苗梗枯瘦頗似蓮花而黃色實亦作房而圓南人謂之蓮翹者二種摘其苗皆有汁出須臾而黑故多作烏髭發藥用之俗謂之旱蓮子三月八月採陰乾亦謂之金陵草見孫思邈千金月令云益髭發變白為黑金陵草煎方金陵草一稱六月以後收採揀擇無泥土者不用洗須青嫩不雜黃葉乃堪爛搗研新布絞取汁又以紗絹濾令滓盡納通油器鉢盛之日中煎五日又取生薑一斤絞汁白蜜一斤合和日煎中以柳木篦攪勿停手令勻調又置日中煎之令如稀餳為藥成矣每旦日及午後各服一匙以溫酒一盞化下如欲作丸日中再煎令可丸大如梧子依前法酒服三十丸及時多合製為佳其效甚速爵床味鹹寒無毒主腰脊痛不得著床俯仰艱難除熱可作浴湯生漢中川穀及田野唐本注云此草似香葇葉長而大或如荏且細生平澤熟田近道旁甚療血脹下氣又主杖瘡汁塗立瘥俗名赤眼老母草今按別本注云今人名為香蘇井中苔及萍大寒主漆瘡熱瘡水腫井中藍殺野葛巴豆諸毒陶隱居云廢井中多生苔萍及磚土間生雜草菜藍既解毒在井中者彌佳不應復別是一種名井中藍井底泥至冷亦療湯火灼瘡井華水又服煉法用之臣禹錫等謹按蜀本云井中苔及萍味苦日華子云無毒圖經文具海藻條下茅香花味苦溫無毒主中惡溫胃止嘔吐療心腹冷痛苗葉可煮作浴湯辟邪氣令人身香生劍南道諸州其莖葉黑褐色花白即非白茅香也今附臣禹錫等謹按陳藏器云茅香味甘平生安南如茅根日華子云白茅香花塞鼻洪敷久不合灸瘡罯刀箭瘡止血並痛煎湯止吐血鼻衄圖經曰茅香花生劍南道諸州今陝西河東京東州郡亦有之三月生苗似大麥五月開白花亦有黃花者或有結實者亦有無實者並正月二月採根五月採花八月採苗其莖葉黑褐色而花白者名白茅香也陳藏器白茅香味甘平無毒主惡氣令人身香美煮服之主腹內冷痛生安南如茅根作浴用之海藥云謹按廣志云生廣南山谷味甘平無毒主小兒遍身瘡疱以桃葉同煮浴之合諸名香甚奇妙尤勝舶上來者肘後方治熱淋取白茅根四斤銼之以水一斗五升煮取五升令冷仍暖飲之日三服又方諸竹木刺在肉中不出取白茅根燒末脂膏和塗之亦治因風致腫衍義曰茅草花白根如茅但明潔而長皆可作浴湯同藁本尤佳仍入印香中合香附子用馬蘭味辛平無毒主破宿血養新血合金瘡斷血痢蠱毒解酒疸止鼻衄吐血及諸菌毒生搗敷蛇咬生澤旁如澤蘭氣臭楚詞以惡草喻惡人北人見其花呼為紫菊以其花似菊而紫也又山蘭生山側似劉寄奴葉無丫不對生花心微黃赤亦大破血下俚人多用之新補見陳藏器及日華子圖經文具澤蘭條下使君子味甘溫無毒主小兒五疳小便白濁殺蟲療瀉痢生交廣等州形如梔子稜瓣深而兩頭尖亦似訶梨勒而輕俗傳始因潘州郭使君療小兒多是獨用此物後來醫家因號為使君子也今附圖經曰使君子生交廣等州今嶺南州郡皆有之生山野中及水岸其葉青如兩指頭長二寸春莖作藤如手指三月生花淡紅色久乃深紅有五瓣七八月結子如拇指長一寸許大類梔子而有五稜其殼青黑色內有仁白色七月採實衍義曰使君子紫黑色四稜高瓣深今經中謂之稜瓣深似令人難解秋末冬初人將入鼎澧其味如椰子肉經不言用仁為復用皮今按文味甘即是用肉然難得仁蓋絶小今醫家或兼用殼乾薹味鹹寒一云溫主痔殺蟲及霍亂嘔吐不止煮汁服之又心腹煩悶者冷水研如泥飲之即止又發諸瘡疥下一切丹石殺諸藥毒不可多食令人痿黃少血色殺木蠹蟲納木孔中但是海族之流皆下丹石新補見孟詵陳藏器日華子百脈根味甘苦微寒無毒主下氣止渴去熱除虛勞補不足酒浸若水煮丸散兼用之出肅州巴西唐本注云葉似苜蓿花黃根如遠志二月八月採根日乾唐本先附白豆蔻味辛大溫無毒主積冷氣止吐逆反胃消穀下氣出伽古羅國呼為多骨形如芭蕉葉似杜若長八九尺冬夏不凋花淺黃色子作朵如葡萄其子初出微青熟則變白七月採今附圖經曰白豆蔻出伽古羅國今廣州宜州亦有之不及蕃舶者佳苗類芭蕉葉似杜若長八九尺而光滑冬夏不凋花淺黃色子作朵如葡萄生青熟白七月採張文仲治胃氣冷吃食即欲得吐以白豆蔻子三枚搗篩更研細好酒一盞微溫調之並飲三兩盞佳又有治嘔吐白朮等六物湯亦用白豆蔻大抵主胃冷即宜服也地筍溫無毒利九竅通血脈排膿治血止鼻洪吐血産後心腹痛一切血病肥白人産婦可作蔬菜食甚佳即澤蘭根也新補出陳藏器及日華子海帶催生治婦人及療風亦可作下水藥出東海水中石上比海藻更粗柔韌而長今登州人干之以苴束器物新定陀得花味甘溫無毒主一切風血浸酒服生西國胡人將來胡人採此花以釀酒呼為三勒漿今附翦草涼無毒治惡瘡疥癬風瘙根名白藥新分條見日華子圖經曰翦草生潤州味苦平有毒主諸瘡疥痂瘻蝕及牛馬諸瘡二月三月採曝乾用陳藏器翦草味甚苦平無毒主蟲瘡疥癬浸酒服之生山澤間葉如茗而細江東用之治勞瘵方云婺台州皆有唯婺州者可用狀如茜草又如細辛每用一斤淨洗為末入生蜜二斤和為膏以器皿盛之不得犯鐵器九蒸九曝日一蒸曝病人五更起面東坐不得語令匙抄藥如粥服之每服四兩服已良久用稀粟米飲壓之藥冷服粥飲亦不可太熱或吐或下皆不妨如久病肺損咯血只一服愈尋常咳嗽血妄行每服一匙可也有一貴人其國封病瘵其尊人嘗以此方畀之九日而藥成前一夕病者夢人戒令翌日勿亂服藥次日將服之為屋上土墜器中不可服再合即成又將服之為籍覆器又不得食又再合未就而夫人卒矣此藥之異如此若小小血妄行一啜而愈矣一十種陳藏器余迷迭香味辛溫無毒主惡氣令人衣香燒之去鬼魏略云出大秦國廣志云出西海海藥云味平不治疾燒之祛鬼氣合羌活為丸散夜燒之闢蚊蚋此外別無用矣故魚網主鯁以網覆鯁者頸瘥如煮汁飲之骨當下矣故繳腳布無毒主天行勞復馬駿風黑汗洗汁飲帶垢者佳江中採出蘆蘆令夫婦和同用之有法此江中出波蘆也蝨建草味苦無毒去蟣蝨挪取汁沐頭盡死人有誤吞蝨成病者搗絞汁服一小合亦主諸蟲瘡生山足濕地莖葉似山丹微赤高一二尺又有水竹葉如竹葉而短小生水中亦云去蝨人取水竹葉生食含生草主婦人難産口中含之立産亦咽其汁葉如卷柏而大生靺羯國其葉煮之不熱無毒兔肝草味甘平無毒主金瘡止血生肉解丹石發熱初生細軟似兔肝一名雞肝與蘩蔞同名石芒味甘平無毒主人畜為虎狼等傷恐毒入肉者取莖雜葛根濃煮服之亦取汁生高山如芒節短江西人呼為折草六月七月生穗如荻也蠶菵草味辛平無毒主蠶及諸蟲如蠶類咬人恐毒入腹煮汁服之生搗敷瘡生濕地如蓼大莖赤花白東土亦有之問荊味苦平無毒主結氣瘤痛上氣氣急煮服之生伊洛間洲渚苗似木賊節節相接亦名接續草
