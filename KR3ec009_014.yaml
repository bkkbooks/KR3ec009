body:
  text: 卷第十四己酉新增衍義巴豆味辛溫生溫熟寒有大毒主傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹水脹蕩練五臟六腑開通閉塞利水穀道去惡肉除鬼毒蠱疰邪物殺蟲魚療女子月閉爛胎金瘡膿血不利丈夫陰殺斑蝥毒可練餌之益血脈令人色好變化與鬼神通一名巴椒生巴郡川穀八月採陰乾用之去心皮芫花為之使惡蘘草畏大黃黃連藜蘆陶隱居云出巴郡似大豆最能瀉人新者佳用之皆去心皮乃稱又熬令黃黑別搗如膏乃和丸散爾道方亦有練餌法服之乃言神仙人吞一枚便欲死而鼠食之三年重三十斤物性乃有相耐如此爾唐本注云樹高丈餘葉似櫻桃葉頭微赤十二月葉漸凋至四月落盡五月葉漸生七月花八月結實九月成十月採其子三枚共蒂各有殼裹出眉州嘉州者良今按陳藏器本草云巴豆主症癖痃氣痞滿腹內積聚冷氣血塊宿食不消痰飲吐水取青黑大者每日空腹服一枚去殼勿令白膜破乃作兩片並四邊不得有缺損吞之以飲壓令下少間腹內熱如火痢出惡物雖痢不虛若久服亦不痢白膜破者棄之生南方樹大如圍極高不啻一丈也臣禹錫等謹按藥性論云巴豆使中其毒用黃連汁大豆汁解之忌蘆筍醬豉冷水得火良殺斑蝥蛇虺毒能主破心腹聚結氣治十種水腫痿痹大腹能落胎日華子云通宣一切病泄壅滯除風補勞健脾開胃消痰破血排膿消腫毒殺腹臟蟲治惡瘡息肉及疥癩疔腫凡合丸散炒不如去心膜煮五度換水各煮一沸圖經曰巴豆出巴郡川穀今嘉眉戎州皆有之木高一二丈葉如櫻桃而厚大初生青後漸黃赤至十二月葉漸凋二月復漸生至四月舊葉落盡新葉齊生即花發成穗微黃色五六月結實作房生青至八月熟而黃類白豆蔻漸漸自落即收之一房共有三瓣一瓣有實一粒一房共實三粒也戎州出者殼上有縱紋隱起如線一道至兩三道彼土人呼為金線巴豆最為上等它處亦稀有雷公云凡使巴之與豆及剛子須在仔細認勿誤用殺人巴顆小緊實色黃豆即顆有三稜色黑若剛子顆小似棗核兩頭尖巴與豆即用剛子勿使凡修事巴豆敲碎以麻油並酒等可煮巴豆了研膏後用每修事一兩以酒麻油各七合盡為度聖惠方治中風口喎巴豆七枚去皮爛研喎左塗右手心喎右塗左手心仍以暖水一盞安向手心須臾即便正洗去藥並頻抽掣中指又方治牙疼用巴豆一粒煨至黃熟去殼用蒜一瓣切一頭作蓋剜去中心可安巴豆在內以蓋子合之用綿裹隨患處左右塞耳中外臺祕要文仲方主唯腹大動搖水聲皮膚黑名曰水蠱巴豆九十枚去心皮熬令黃杏仁六十枚去皮尖熬令黃二味搗丸如小豆大水下一丸以利為度勿飲酒千金方主大人小兒風瘙癮疹心迷悶方巴豆二兩槌破以水七升煮取三升以帛染拭之又方治寒癖宿食久飲不消大便祕巴豆仁一升清酒五升煮三日三夜研令大熟合酒微火煎之丸如胡豆大每服一丸水下欲吐者服二丸又方治喉痹已死有餘氣者巴豆去皮針線穿咽入喉中牽出千金翼治小兒身腫並手足腫兼癮疹巴豆五十枚去皮心以水二升煎取一升用綿於湯中隨手拭之經驗方鄭獬侍御傳治氣痢巴豆一兩去皮心熬細研取熟豬肝和丸空心米飲下量力加減服之牛肝尤佳如食素人以蒸餅丸服又方治耳卒聾巴豆一粒蠟裹針刺令通透用塞耳中又方治箭鏃入骨不可拔取巴豆微熬與蜣螂同研塗所傷處斯須痛定微癢忍之待極癢不可忍便撼動箭鏃即拔之立出夏候鄲云初在潤州得方箭鏃出後速以生肌膏敷之説者云兼治瘡鄲得方後至洪州旅舍主人妻患背瘡呻吟鄲遽用此方試之愈勝金治喉閉纏喉風巴豆兩粒紙緊角可通得入鼻用刀子切斷兩頭殼子將針穿作孔子納鼻中久即瘥十全方治疥瘡巴豆十粒火炮過黃色去皮膜右順手研如面入酥少許膩粉少許同研勻爪破以竹篦子點藥不得落眼裡及外腎上如熏匽著外腎以黃丹塗甚妙初虞方治藥毒祕效巴豆去皮不出油馬牙硝等分合研成膏冷水化一彈子許服瘥賈相公進過牛經牛有卒疫動頭打肋者以巴豆兩個去皮搗末生油二兩淡漿水半升灌之瘥蜀椒味辛溫大熱有毒主邪氣咳逆溫中逐骨節皮膚死肌寒濕痹痛下氣除六腑寒冷傷寒溫瘧大風汗不出心腹留飲宿食腸澼下痢泄精女子字乳余疾散風邪瘕結水腫黃疸鬼疰蠱毒殺蟲魚毒久服之頭不白輕身增年開腠理通血脈堅齒髮調關節耐寒暑可作膏藥多食令人乏氣口閉者殺人一名巴椒一名蓎音唐藙音毅生武都川穀及巴郡八月採實陰乾杏仁為之使畏款冬陶隱居云出蜀都北部人家種之皮肉厚腹裡白氣味濃江陽晉原及建平間亦有而細赤辛而不香力勢不如巴郡巴椒有毒不可服而此為一名恐不爾又有秦椒黑色在中品中凡用椒皆炙微熬之令汗出謂為汗椒令有勢力椒目冷別入藥用不得相雜唐本注云椒目味苦寒無毒主水腹脹滿利小便今椒出金州西城者陽善臣禹錫等謹按爾雅疏云檓者大椒之別名郭云今椒樹叢生實大者名為檓詩唐風云椒聊且陸機云椒樹似茱萸有針刺葉堅而滑蜀人作茶吳人作茗皆合煮其葉以為香今成皋諸山間有椒謂之竹葉椒其樹亦如蜀椒少毒熱不中合藥也可著飲食中又用蒸雞豚最佳香東海諸島上亦有椒樹枝葉皆相似子長不圓甚香其味似桔皮島上獐鹿食此椒葉其肉自然作椒桔香藥性論云蜀椒使畏雄黃又名陸撥有小毒能治冷風頑頭風下淚腰腳不遂虛損留結破血下諸石水能治嗽主腹內冷而痛除齒痛又云椒目使治十二種水氣味苦辛有小毒主和巴豆菖蒲松脂以蠟溶為筒子納耳中抽腎氣虛耳中如風水鳴或如打鐘磬之聲卒暴聾一日一易若神驗日華子云漢椒破癥結開胃治天行時氣溫疾産後宿血治心腹氣壯陽療陰汗暖腰膝縮小便椒目主膀胱急又云椒葉熱無毒治賁豚伏梁氣及內外腎釣並霍亂轉筋和共及蔥研以醋湯拌罯並得圖經曰蜀椒生武都川穀及巴郡今歸峽及蜀川陝洛間人家多作園圃種之高四五尺似茱萸而小有針刺葉堅而滑可煮飲食甚辛香四月結子無花但生於葉間如小豆顆而圓皮紫赤色八月採實焙乾此椒江淮及北土皆有之莖實都相類但不及蜀中者皮肉厚腹裡白氣味濃烈耳服食方單服椒紅補下宜用蜀椒也韋宙獨行方治諸瘡中風者生蜀椒一升取少面合搜裹椒勿令漏氣分作兩裹於煻灰火中燒熟及熱出之刺頭作孔當瘡上罯著使椒氣射入瘡中冷則易之須臾瘡中出水及遍體出汗即瘥施州又有一種崖椒彼土人四季採皮入藥云味辛性熱無毒主肺氣上喘兼咳嗽並野薑篩末酒服錢匕甚效忌鹽下又有蔓椒條云生雲中川穀及丘冢間採莖根煮釀酒陶隱居云俗呼為樛似椒檔音黨小不香耳今亦無復分別或云即金椒是也檔子出閩中江東其木似樗莖間有刺子辛辣如椒主遊蠱飛尸及腹冷南人淹藏以作果品或以寄遠吳越春秋云越以甘蜜丸檔與黨同報吳增封之禮然則檔之相贈尚矣雷公云一名南椒凡使須去目及閉口者不用其椒子先須酒拌令濕蒸從巳至午放冷密蓋除向下火四畔無氣後取出便入瓷器中盛勿令傷風用也食療云溫粒大者主上氣咳嗽久風濕痹又患齒痛醋煎含之又傷損成瘡中風以麵裹作餛飩灰中炮之使熟斷開口封其瘡上冷易熱者三五度易之亦治傷損成弓風又去久患口瘡去閉口者以水洗之以面拌煮作粥空心吞之三五匙飯壓之再服瘥又椒溫辛有毒主風邪腹痛痹寒溫中去齒痛堅齒髮明目止嘔逆滅瘢生毛髮出汗下氣通神去老益血利五臟治生産後諸疾下乳汁久服令人氣喘促十月勿食及閉口者大忌子細黑者是秦椒白色也聖惠方治因熱取涼睡有蛇入口中挽不出用刀破蛇尾納生椒三二粒裹著須臾即出外臺祕要治瘡腫生椒末面釜下土末之以大醋和敷之千金方有人陰冷漸漸冷氣入陰囊腫滿恐死日夜疼悶不得眠取生椒擇之令淨以布帛裹著丸囊令厚半寸須臾熱氣大通日再易之取消瘥肘後方治金瘡中風蜀椒量瘡口大小用面作餛飩煻火中炮令熟開一孔當瘡上掩之引風出可作數枚以差替換之妙又方蛇毒以閉口椒並葉搗敷之止孫真人云十月勿食椒食之損氣傷心令人多忘又方治心腹俱痛以布裹椒薄注上火尉令椒汗出良斗門方治腹內虛冷久服駐顏用生椒擇去不拆者除其黑子用四十粒以漿水浸經一宿盡令口合空心新汲水下去積年冷暖臟腑久服則能駐顏黑髮明目令人思飲食妙勝金方治好食生茶用椒末不限多少以糊丸如梧子大茶下十丸深師方治手足皴裂椒四合水煮之去滓漬之半食頃出令燥須臾復浸干塗羊豬髓腦極妙姚和衆治小兒水瀉奶疳椒一分去目為末酥調之少少敷腦上日可三度談氏治小兒水瀉椒紅散及人年五十以上患瀉用椒二兩醋二升煮醋盡慢火焙乾為末瓷器貯之每服二錢匕酒或米飲下之又方治漆瘡漢椒湯洗之即愈援神契椒薑御瘟補益聰明衍義曰蜀椒須微炒使汗出又須去附紅黃殼去殼之法先微炒乘熱入竹筒中以梗舂之播取紅如未盡更揀更舂以盡為度凡用椒須如此其中子謂之椒目治盜汗尤功將目微炒搗為極細末用半錢匕以生豬上唇煎湯一合調臨睡服無不效蓋椒目能行水又治水蠱皂莢味辛咸溫有小毒主風痹死肌邪氣風頭淚出利九竅殺精物療腹脹滿消穀除咳嗽囊結婦人胞不落明目益精可為沐藥不入湯生雍州川穀及魯鄒縣如豬牙者良九月十月採莢陰乾柏實為之使惡麥門冬畏空青人參苦參陶隱居云今處處有長尺二者良俗人見其皆有蟲孔而未嘗見蟲形皆言不可近令人惡病殊不爾其蟲狀如草菜上青蟲莢微欲黑便出所以難見爾但取青莢生者看自知之唐本注云此物有三種豬牙皂莢最下其形曲戾薄惡全無滋潤洗垢不去其尺二寸者粗大長虛而無潤若長六七寸圓厚節促直者皮薄多肉味濃大好臣禹錫等謹按藥性論云皂莢使主破堅症腹中痛能墮胎又曰將皂莢於酒中取盡其精於火內煎之成膏塗帛貼一切腫毒兼能止疼痛陳藏器云鬼皂莢作浴湯去風瘡疥癬挪葉去衣垢沐頭長髮生江南澤畔如皂莢高一二尺日華子云皂莢通關節除頭風消痰殺勞蟲治骨蒸開胃及中風口噤入藥去皮子以酥炙用圖經曰皂莢出雍州川穀及魯鄒縣今所在有之以懷孟州者為勝木極有高大者此有三種本經云形如豬牙者良陶注云長尺二者良唐注云長六寸圓厚節促直者皮薄多肉味濃大好今醫家作疏風氣丸煎多用長皂莢治齒及取積藥多用豬牙皂莢所用雖殊大抵性味不相遠九月十月採莢陰乾用張仲景治雜病方咳逆上氣唾濁但坐不得臥皂角丸主之皂莢杵末一物以蜜丸大如梧子以棗膏和湯服一丸日三夜一服崔元亮海上方療腹脹滿欲瘦病者豬牙皂角相續量長一尺微火煨去皮子搗篩蜜丸大如梧子欲服藥先吃煮羊肉兩臠呷汁三兩口後以肉汁下藥十丸以快利為度覺得力更服以利清水即停瘥後一月以來不得食肉及諸油膩又治熱勞以皂莢長一尺續成者亦可須無孔成實者以土酥一大兩微微塗於火上緩炙之不得令酥下待酥盡即搗篩蜜丸如梧子大每日空腹飲下十五丸漸增至二十丸重者不過兩劑瘥其初生嫩葉芽以為蔬茹更益人核中白肉亦入治肺藥又炮核取中黃心嚼餌之治膈痰吞酸又米醋熬嫩刺針作濃煎以敷瘡癬有奇效雷公云凡使須要赤膩肥並不蚛者然用新汲水浸一宿了用銅刀削上粗皮用酥反復炙酥盡為度然出捶之去子搗篩皂莢一兩酥二分子收得揀取圓滿堅硬不蛀者用瓶盛下水於火畔煮待泡熟剝去硬皮一重了取向里白嫩肉兩片去黃其黃消人腎氣將白兩片用銅刀細切於日中乾用聖惠方治時氣三日頭痛煩熱用皂角燒作灰為末非時新汲水一中盞生薑汁蜜各少許和二錢服之先用暖水淋浴後服藥須臾汗出愈外臺祕要治卒中風口喎以皂角五兩去皮為末以三年大醋和右喎塗左左喎塗右干更敷之瘥又方齲齒方搗皂角去皮炙為末塗齒上吐之又方溺死一宿者尚活搗皂角紙裹納下部須臾出水即活千金方齆鼻炙皂角末如小豆以竹管吹鼻中又方鬼魘不悟皂莢末刀圭起死人又方難産吞皂角子二枚立瘥肘後方卒腫滿身面洪用皂角剝炙令黃銼三升酒一斗漬合器煮令沸服一升日三服頻作又方小兒身上惡瘡先以皂角水洗拭乾以少油麻搗爛敷焦即瘥經驗方治食氣遍身黃腫氣喘食不得心胸滿悶不蛀皂角去皮及子塗好醋炙令焦為末一錢匕巴豆七枚去油膜二件以淡醋及研好墨為丸如麻子大每服三丸食後陳桔皮湯下日三服隔一日增一丸以利為度如常服消酒食梅師方治霍亂轉筋皂莢末吹一小豆鼻中得嚏便瘥又方治卒外腎偏疼皂莢和皮為末水調敷之良孫真人治咳嗽皂莢燒研碎二錢匕豉湯下之又方治大小便不通關格不利燒皂莢細研粥飲下三錢立通又方傷寒無問陰陽神驗方以皂角一挺肥者燒令赤為末以水五合和頓服陰陽傷寒以酒和服又方治腰腳不覆地取子一千二百個淨洗令乾少酥熬令香為末蜜丸如梧子大空心以蒺藜子酸棗子湯下三十丸又方治卒死以末吹入鼻中又方治誤食物落鼻中及入眼不出吹皂角取嚏又方人好魘以末吹鼻中斗門方治卒頭痛以皂角末吹入鼻中令嚏則止簡要濟衆治中風口噤不開涎潮吐方用皂角一挺去皮塗豬脂炙令黃色為末每服一錢匕非時溫酒服如氣實脈盛調二錢匕如牙關不開用白梅揩齒口開即灌藥以吐出風涎瘥博濟方治皂莢水並惡水入口內熱痛不止以皂莢子燒存性一分沙糖半兩先殺研皂子令細續入沙糖勻和如膏含之十全方治牙疼用豬牙皂角鹽等分燒為末揩疼處良靈苑方治急喉閉逡巡不救方以皂莢去皮子生半兩為末每服少許以箸頭點腫處更以醋調藥末厚敷項下須臾便破少血出即愈孫尚藥治卒中風昏昏若醉形體昏悶四肢不收或倒或不倒或口角似利微有涎出斯須不治便為大病故傷人也此證風涎潮於上膈痹氣不通宜用救急稀涎散豬牙皂角四挺須是肥實不蚛削去黑皮晉礬一兩光明通瑩者二味同搗羅為細末再研為散如有患者可服半錢重者三字匕溫水調灌下不大嘔吐只是微微涎稀冷出或一升二升當時惺惺次緩而調治不可便大段吐之恐過傷人命纍經效不能盡述感應神仙傳崔言者職隸左親騎軍一旦得疾雙眼昏咫尺不辨人物眉發自落鼻梁崩倒肌膚有瘡如癬皆為惡疾勢不可救因為洋州駱穀子歸寨使遇一道流自谷中出不言名姓授其方曰皂角刺一二斤為灰蒸久曬研為末食上濃煎大黃湯調一錢匕服一旬鬢髮再生肌膚悅潤愈眼目倍常明得此方後卻入山不知所之又鐵砧以煅金銀雖百十年不壞以槌皂莢則一夕破碎衍義曰皂莢其子炒舂去赤皮仁將骨浸軟煮熟以糖漬之可食甚疏導五臟風熱壅其莢不蚛肥者微炙為末一兩入生白礬末半兩膩粉半兩風涎潮塞氣不通水調灌一二錢但過咽則須吐涎凡用白礬者分隔下涎也又暑中濕熱時或久雨合蒼朮燒闢溫疫邪濕氣訶梨勒味苦溫無毒主冷氣心腹脹滿下食生交愛州唐本注云樹似木梡音患花白子形似梔子青黃色皮肉相著水摩或散服之唐本先附臣禹錫等謹按蕭炳云訶梨勒苦酸下宿物止腸澼久泄赤白痢波斯舶上來者六路黑色肉厚者良藥性論云訶梨勒使亦可單用味苦甘能通利津液主破胸膈結氣止水道黑髭發日華子云消痰下氣除煩治水調中止瀉痢霍亂賁豚腎氣肺氣喘急消食開胃腸風瀉血崩中帶下五膈氣懷孕未足月人漏胎及胎動欲生脹悶氣喘並患痢人後分急痛併産後陰痛和蠟燒熏及熱煎湯熏通手後洗圖經曰訶梨勒生交愛州今嶺南皆有而廣州最盛株似木梡花白子似梔子青黃色皮肉相著七月八月實熟時採六路者佳嶺南異物志云廣州法性寺佛殿前有四五十株子極小而味不澀皆是六路每歲州貢只以此寺者寺有古井木根蘸水水味不咸每子熟時有佳客至則院僧煎湯以延之其法用新摘訶子五枚甘草一寸皆碎破汲木下井水同煎色若新茶今其寺謂之乾明舊木猶有六七株古井亦在南海風俗尚貴此湯然煎之不必盡如昔時之法也訶梨勒主痢本經不載張仲景治氣痢以訶梨勒十枚麵裹煻灰火中煨之令面黃熟去核細研為末和粥飲頓服又長服方訶梨勒陳桔皮厚朴各三大兩搗篩蜜丸大如梧子每服二十丸至三十丸唐劉禹錫傳信方云豫曾苦赤白下諸藥服遍久不瘥轉為白膿令狐將軍傳此法用訶梨勒三枚上好者兩枚炮取皮一枚生取皮同末之以沸漿水一兩合服之淡水亦得若空水痢加一錢匕甘草末若微有膿血加二匕若血多加三匕皆效又取其核入白蜜研注目中治風赤澀痛神良其子未熟時風飄墮者謂之隨風子曝乾收之彼人尤珍貴益小者益佳治痰嗽咽喉不利含三數枚殊勝海藥云按徐表南州記云生南海諸國味酸澀溫無毒主五鬲氣結心腹虛痛赤白諸痢及嘔吐咳嗽並宜使皮其主嗽肉炙治眼澀痛方家使陸路訶梨勒即六稜是也按波斯將訶梨勒大腹等舶上用防不虞或遇大魚放涎滑水中數里不通船也遂乃煮此洗其涎滑尋化為水可量治氣功力者乎大腹訶子性焦者是近鐺下故中國種不生故梵云訶梨恆雞謂唐言天堂未並只此也雷公云凡使勿用毗梨勒庵梨勒榔精勒雜路勒若訶梨勒紋只有六路或多或少並是雜路勒毗路勒個個毗雜路勒皆圓露紋或八露至十三路號曰榔痙或多或少並是雜路勒毗路勒個個毗雜路勒皆圓露紋或八露至十三路號曰榔精勒多澀不入用凡修事先於酒內浸然後蒸一伏時其訶梨勒以刀削路細銼焙乾用之外臺祕要治一切風痰風霍亂食不消大便澀訶梨三枚搗取皮和酒頓服三五度良又方治風熱沖項熱悶訶梨一枚以大者芒硝同於醋中攪令消摩敷熱處經驗方治嗽氣嗽久者亦主之生訶梨一枚含之咽汁瘥後口爽不知食味卻煎檳榔湯一碗服之立便有味此知連州銀坑官成密方廣濟方治嘔逆不能食訶梨勒皮二兩去核熬為末蜜和丸如梧桐子大空心服二十丸日二服孫真人治常患氣以訶梨三枚濕紙裹煨紙干即剝去核細嚼以生乳一升下之日三服又方治一切氣宿食不消訶梨一枚入夜含之至明嚼咽集驗方蜀沙門傳水痢以訶梨勒三顆麵裹炮赤去面取訶梨勒皮搗為末飯和為丸米飲空腹下三七丸已百人見效子母祕録治小兒霍亂訶梨一枚末沸湯研一半頓服未瘥再服食醫心鏡下氣消食並茶青色訶梨一枚打碎為末銀器中水一大升煎三兩沸後下訶梨更煎三五沸候如麴塵色著少鹽服廣異記云高仙芝大食得訶梨勒長五寸初置抹肚中便覺腹中痛因大利十餘行初為訶梨為祟待欲棄之後問大食長老云此物人帶一切病消利者出惡物耳仙芝甚保天寶末被誅遂失所在金光明經流水長者子除病品云熱病下藥服訶梨勒衍義曰訶梨勒氣虛人亦宜緩緩煨熟少服此物雖澀腸而又泄氣蓋其味苦澀柳華味苦寒無毒主風水黃疸面熱黑痂疥惡瘡金瘡一名柳絮葉主馬疥痂瘡取煎煮以洗馬疥立愈又療心腹內血止痛實主潰癰逐膿血子汁療渴生琅邪川澤陶隱居云柳即今水楊柳也花熟隨風狀如飛雪陳元方以為譬當用其未舒時子亦隨花飛正應水漬汁爾柳花亦宜貼灸瘡皮葉療漆瘡唐本注云柳與水楊全不相似水楊葉圓闊而赤枝條短硬柳葉狹長青緑枝條長軟此論用柳不載水楊水楊亦有療能本草不録樹枝及木中蟲屑枝皮味苦寒無毒主痰熱淋可為吐湯煮洗風腫癢酒煮含主齒痛木中蟲屑可為浴湯主風瘙癢癮疹大效此人間柳樹是也陶雲水楊非也臣禹錫等謹按藥性論云苦柳華使主止血治濕痹四肢攣急膝痛陳藏器云柳絮本經以絮為花花即初發時黃蕊子為飛絮以絮為花其誤甚矣江東人通名楊柳北人都不言楊楊樹葉短柳樹枝長日華子云葉治天行熱病疔瘡傳尸骨蒸勞湯火瘡毒入腹熱悶服金石藥人發大熱悶並下水氣煎膏續筋骨長肉止痛牙痛煎含枝煎汁可消食也圖經曰柳華葉實生琅邪川澤今處處有之俗所謂楊柳者也本經以絮為華陳藏器云華即初發黃蕊也子乃飛絮也採無時其枝皮及根亦入藥葛洪治癰疽腫毒妒乳等多用之韋宙獨行方主疔瘡及反花瘡並煎柳枝葉作膏塗之今人作浴湯膏藥齒牙藥亦用其枝為最要之藥按楊柳異類今人謂柳為楊柳非也説文楊蒲柳也柳小楊也其類非一蒲柳其枝徑韌可為箭笴左傳所謂董澤之蒲又謂之雚符即上條水楊是也今河北沙地多生此又生水旁葉粗而白木理微赤白杞柳鄭詩云無伐我樹杞陸機云杞柳也其木人以為車轂共山淇水旁魚國汶水旁純生杞也又孟子云告子曰以人性為仁義猶以杞柳為杯棬是也今人取其細條火逼令柔韌屈作箱篋河朔尤多又下有赤柳木生河西沙地皮赤葉細即是今所謂柳柳者又名春柳爾雅曰柳河柳郭璞云今河旁赤莖小楊陸機詩疏云皮正赤如絳一名雨師枝葉似松是也其木中脂一名柳乳醫方稀用故附於此陳藏器云絮主止血治小兒一日五日寒熱煎柳枝浴外臺祕要治黃疸柳枝以水一斗煮取濃汁半升服令盡肘後方治乳癰二三日種痛不瘥但堅紫色者用煎柳根皮法云熬令溫尉腫一宿愈又方湯火灼成瘡柳皮燒灰以粉塗之又方取柳白皮細切以豬脂煎取汁敷之孫真人治牙齒疼柳枝一握細銼入少鹽花漿水煎含之甚妙集驗方治腫柳枝如腳指大長三尺二十枚水煮令極熱以故布裹腫處取湯熱洗之即瘥子母祕録小兒丹煩柳葉一斤水一斗煮取三升去滓拓洗赤處日七八度斗門方治耳痛有膿不出及癰已結聚柳根細切熟槌封之以帛掩燥即易之又方治耳卒風毒腫起用柳蠹樹上蟲糞以水化取清水調白礬少許滴入耳中甚妙又方治卒風毒腫氣急痛以柳白皮一斤銼以酒煮令熱帛裹尉腫上冷再煮易之甚妙也古今録驗治齒痛以楊柳白皮卷如指許大含嚼之以汁漬痛齒根數過即瘥也又方治牙齒風齲以柳枝銼一升大豆一升合炒豆炮盡於瓷器盛之清酒三升漬之經三日含之頻吐丹房鏡源云柳膠結砂子別説云謹按絮貼灸瘡良飛入池沼於陰暗處為浮萍嘗以器盛水置絮其中數日覆之即成又多積可以杆作氈以代羊毛極柔軟宜與小兒臥益佳以性涼也衍義曰柳華經曰味苦即是初生有黃蕊者也及其華干絮方出又謂之柳絮收之貼灸瘡及為茵褥絮之下連小黑子因風而起得水濕處便生如地疔之類多不因種植於人家庭院中自然生出蓋亦如柳絮兼子而飛陳藏器之説是然古人以絮為花陶隱居亦曰花隨風狀如飛雪誤矣經中有實及子汁諸家不解今人亦不見用注釋氏謂柳為尼俱律陀木其子極細如人妄因極小妄果至大是知小黑子得因風而起楝實味苦寒有小毒主溫疾傷寒大熱煩狂殺三蟲疥瘍利小便水道根微寒療蛔蟲利大腸生荊山山谷陶隱居云處處有俗人五月五日皆取葉佩之云辟惡其根以苦酒摩塗疥甚良煮汁作糜食之去蛔蟲唐本注云此有兩種有雄有雌雄者根赤無子有毒服之多使人吐不能止時有至死者雌者根白有子微毒用當取雌者臣禹錫等謹按藥性論云楝實亦可單用主人中大熱狂失心躁悶作湯浴不入湯服日華子云楝皮苦微毒治遊風熱毒風疹惡瘡疥癩小兒壯熱並煎湯浸洗服食須是生子者雌樹皮一兩可入五十粒糯米煎煮殺毒瀉多以冷粥止不瀉者以熱蔥粥發無子雄樹能吐瀉殺人不可誤服圖經曰楝實即金鈴子也生荊山山谷今處處有之以蜀川者為佳木高丈餘葉密如槐而長三四月開花紅紫色芬香滿庭間實如彈丸生青熟黃十二月採實其根採無時此種有雌雄雄者很赤無子有大毒雌者根白有子微毒當用雌者俗間謂之苦楝子韋宙獨行方主蟯蟲攻心如刺口吐清水取根銼水煮令濃赤黑色以汁合米煮作糜隔宿勿食來旦從一匕為始少時復食一匕半糜便下蟯驗雷公云凡採得後曬乾酒拌浸令濕蒸待上皮軟剝去皮取肉去核勿單用其核碎槌用漿水煮一伏時了用如使肉即不使核使核即不使肉又花落子謂之石茱萸外臺祕要方治長蟲楝實淳苦酒中漬宿以綿裹塞穀道中三寸許日易之千金方治小兒蛔蟲楝木皮削上蒼皮以水煮汁飲量大小進又方蠼螋瘡楝樹枝皮燒灰和豬膏敷之又方治小兒禿瘡及諸惡瘡肘後方治瘻若著口裹東行楝根細銼水煮濃汁含之數口吐勿咽經驗方小兒殺蟲定疼痛抵聖散以苦楝二兩白蕪荑半兩為末水一盞末一錢煎取二分放冷待發時服之又方治臟毒小血以苦楝子炒令黃為末蜜丸米飲下十丸至二十丸甚妙又方治丈本臟氣傷膀胱連小腸等氣金鈴子一百個湯溫浸過去皮巴豆二百個槌微破麩二升同於銅鐺內炒金鈴子赤熟為度放冷取出去核為末每服三錢非時熱酒醋湯調並得其麩巴豆不用也斗門方治蛔蟲咬心用苦楝治皮煎一大盞服下又方治五種蟲以楝皮去其蒼者焙乾為末米飲下二錢匕又方治癮疹楝皮濃煎浴荊楚歲時記云風俗通獬豸食楝又云蛟龍裹楝椿木葉味苦有毒主洗瘡疥風疽水煮藥汁用之皮主疳𧈟樗木根葉尤良唐本注云二樹形相似樗木疏椿木實為別也今按陳藏器本草云樗木味苦有小毒皮主赤白久痢口鼻中疳蟲去疥𧈟主鬼疰傳尸蠱毒下血根皮去鬼氣取一握細切以童兒小便二升豉一合宿浸絞取汁煎一沸三五日一度服葉似椿北人呼為山椿江東人呼為虎目葉脫處有痕如白樗散木也唐本先附臣禹錫等謹按藥性論云樗白皮使味苦微熱無毒能治赤白痢腸滑痔疾瀉血不住蕭炳云樗皮主疳痢得地榆同療之根皮尤良俗呼為虎眼樹本經椿木殊不相似孟詵云椿溫動風熏十二經脈五臟六腑多食令人神昏血氣微又女子血崩及産後血不止月信來多可取東引細根一大握洗之以水一大升煮分再服便斷亦止赤帶下又椿俗名豬椿療小兒疳痢可多煮汁後灌之又取白皮一握倉粳米五十粒蔥白一握甘草三寸炙豉兩合以水一升煮取半升頓服之小兒以意服之枝葉與皮功用皆同日華子云樗皮溫無毒止瀉及腸風能縮小便入藥蜜炙用圖經曰椿木樗木舊並不載所出州土今南北皆有之二木形干大抵相類但椿木實而葉香可啖樗木疏而氣臭膳夫亦能熬去其氣北人呼樗為山椿江東人呼為鬼目葉脫處有痕如樗蒱子又如眼目故得此名其木最為無用莊子所謂吾有大木人謂之樗其本擁腫不中繩墨小枝曲拳不中規矩立於途匠者不顧是也並採無時爾雅云栲山樗郭璞注云栲似樗色小白生山中因名亦類漆也俗語云櫄樗栲漆相似如一詩唐風云山有栲陸機疏云山樗與田樗無異葉似差狹耳吳人以其葉為茗許慎以栲讀為糗今人言栲失其聲耳然則樗類之別種也樗根煮汁主下血及小兒疳痢亦取白皮和倉粳米蔥白甘草豉同煎飲食服血痢便斷唐劉禹錫著樗根餛飩法云每至立秋前後即患痢或是水穀痢兼腰疼等取樗根一大兩搗篩以好面捻作餛飩子如皂莢子大清水煮每日空腹服十枚並無禁忌神良食療云主疳痢殺蛔蟲又名臭椿若和豬肉熱面頻食則中滿蓋壅經脈也雷公云椿木根凡使根不近西頭者上及不用莖葉只用根採出拌生蔥蒸半日出生蔥細銼用袋盛挂屋南畔陰乾用偏利溺澀也肘後方治小兒頭生白禿發不生出椿楸桃葉心取汁敷之大效子母祕録經驗方治臟毒亦白痢香椿淨洗刷剝取皮曬乾為末飲下一錢立效治小兒疳椿白皮曬乾二兩為末淘粟米去泔研濃汁糊和丸如梧子大十歲三四丸量數加減一丸納竹筒中吹入鼻中三度瘥服丸以飲下楊氏産乳療疳痢困重樗白皮搗面拌作小顆子日曬少時又拌凡三過水煮至熟加鹽醋酒亦得頻服多少量兒大小又方近效療久痢及疳痢揀樗根白皮不限多少常取土際不用見狗及風細切搗如泥取面捻作餛飩子如小棗大勿令破熟煮吞七枚重者不過七服皆空肚忌油膩熱面毒物又方疳痢曉夜無度者取樗根濃汁一雞子殼許和粟米泔一雞子許灌下部再度即瘥其驗如神小孩減用之甚妙衍義曰椿木葉椿樗皆臭但一種有花結子一種無花不實世以無花不實木身大其干端直者為椿椿用木葉其有花而莢木身小干多迂矮者為樗樗用根葉莢故曰未見椿上有莢者唯樗木上有又有樗雞故知古人命名曰不言椿雞而言樗雞者以顯有雞者為樗無雞者為椿其義甚明用椿木葉樗木根葉莢者宜依此推究洛陽一女子年四十六七耽飲無度多食魚蟹攝理之方蔑如也後以食啖過常蓄毒在臟日夜二三十瀉大便與膿血雜下大腸連肛門痛不堪任醫以止血痢藥不效又以腸風藥則益甚蓋腸風則有血而無膿凡如此已半年餘氣血漸弱食漸減肌肉漸瘦稍服熱藥則腹愈痛血愈下服稍涼藥即泄注氣贏粥食愈減服溫平藥則病不知如此將期歲醫告術窮垂命待盡或有人教服人參散病家亦不敢主當謾與服之才一服知二服減三服膿血皆定自此不拾服其疾遂愈後問其方云治大腸風虛飲酒過度挾熱下痢膿血疼痛多日不瘥樗根白皮一兩人參一兩為末每用二錢匕空心以溫酒調服如不飲酒以溫米飲代忌油膩濕面青菜果子甜物雞豬魚蒜等郁李仁味酸平無毒主大腹水腫面目四肢浮腫利小便水道根主齒齦腫齲丘禹切齒堅齒去白蟲一名爵李一名車下李一名棣生高山川穀及丘陵上五月六月採根陶隱居云山野處處有子熟赤色亦可啖之臣禹錫等謹按蜀本云甚甘香有少澀味也又圖經云樹高五六尺葉花及樹並似大李唯子小若櫻桃甘酸爾雅疏云常棣一名棣郭云今山中有棣樹子如櫻桃可食詩小雅云常棣之華陸機云許慎曰白棣樹也如李而小如櫻桃正白今官園種之又有赤棣樹亦似白棣葉如刺榆葉而微圓子正赤如郁李而小五月始熟關西天水隴西多有之藥性論云郁李仁臣味苦辛能治腸中結氣關格不通根治齒痛宣結氣破結聚日華子云郁李仁通泄五臟膀胱急痛宣腰胯冷膿消宿食下氣又云根涼無毒治小兒熱發作湯浴風蚛牙濃煎含之圖經曰郁李仁本經不載所出州土但云生高山川穀及丘陵上今處處有之木高五六尺枝條花葉皆若李唯子小若櫻桃赤色而味甘酸核隨子熟六月採根並實取核中仁用陸機草木疏云唐棣即奧李也一名雀梅亦曰車下李所在山中皆有其華或白或赤六月中成實如李子可食今近京人家園圃植一種枝莖作長條花極繁密而多葉亦謂之郁李不堪入藥用韋宙獨行方療腳氣浮腫心腹滿大小便不通氣急喘息者以郁李仁十二分搗碎水研取汁薏苡仁搗碎如粟米取三合以汁煮米作粥空腹餐之佳必效方療癖取車下李仁微湯退去皮及並仁者與乾麵相拌搗之為餅如猶乾和淡水如常搜面作餅大小一如病人掌為二餅微炙使黃勿令至熟空腹食一枚當快利如不利更食一枚或飲熱粥汁以利為度若至午後痢不止即以醋飯止之利後當虛病未盡者量力一二日更進一服以病盡為限小兒亦以意量之不得食酪及牛馬肉等無不效但病重者李仁與面相半輕者以意減之病減之後服者亦任量力纍試神驗雷公云凡採得先湯浸然削上尖去皮令淨用生蜜浸一宿漉出陰乾研如膏用食療云氣結者酒服仁四十九粒更瀉尤良又破癖氣能下四肢水外臺祕要張文仲齲齒以郁李根白皮切水煮濃汁含之冷即易吐出蟲姚和衆治小兒多熱不痊後熟湯研郁李仁如杏酪一日服二合又方治卒心痛郁李仁三七枚爛嚼以新汲水下之飯溫湯尤妙須臾痛止卻煎薄鹽湯熱呷之楊氏産乳療身體腫滿水氣急臥不得郁李仁一大合搗為末和麥面搜作餅子與吃入口即大便通利氣便瘥衍義曰郁李仁其子如御李子至紅熟堪啖微澀其仁湯去皮研極爛入生龍腦點赤目陝西甚多根煎湯泄風蚛牙莽草味辛苦溫有毒主頭風癰腫乳癰疝瘕除結氣疥瘙殺蟲魚療喉痹不通乳難頭風癢可用沐勿令入眼一名葞一名春草生上谷山谷及冤句五月採葉陰乾陶隱居云今東間處處皆有葉青新烈者良人用搗以和米納水中魚吞即死浮出人取食之無妨莽草字亦作菵音罔字今俗呼為菵草也臣禹錫等謹按爾雅云葞春草釋曰藥草也今俗呼為菵草郭云一名芒草者所見本異也藥性論云菵草臣能治風疽疝氣腫墜凝血治瘰癧除濕風不入湯服主頭瘡白禿殺蟲與白蘞赤小豆為末雞子白調如糊㶸毒腫干即更易上日華子云治皮膚麻痹並濃煎湯淋風蚛牙痛喉痹亦濃煎汁含後淨漱口圖經曰莽草亦曰菵草出上谷及冤句今南中州郡及蜀川皆有之木若石南而葉稀無花實五月七月採葉陰乾一説藤生繞木石間古方治風毒痹厥諸酒皆用菵草今醫家取其葉煎湯熱含少頃間吐之以治牙齒風蚛甚效此木也而爾雅釋草云菵春草釋曰藥草莽草也郭璞云一名芒草菵音近故爾然謂之草者乃蔓生者是也唐本余治難産雷公云凡使採得後便取葉細銼又生甘草水蓼二味並細銼之用生稀絹袋盛毒木葉於甑中上甘草水蓼同蒸一日去諸藥二件取出曬乾用之勿用尖有孿生者聖惠方治牙齒蚛孔疼痛及有蟲用菵草為末綿裹納蚛孔中或於痛處咬之低頭吐津勿咽之疼痛便定又方治瘰癧發腫而堅結成核用菵草一兩為末雞子白和敷於帛上貼之日二易之便瘥肘後方治癰瘡未潰菵草末雞子白塗紙厚貼上燥復易得痛良又風齒疼頰腫用五兩水一斗煮取五升熱含漱吐之一日盡梅師方治齒腫痛菵草郁李仁各四兩水六升煎取二升去滓熱含冷吐周禮翦氏掌除蠹物以菵草熏之則死衍義曰莽草今人呼為菵草濃煎湯淋泄皮膚麻痹本經一名春草諸家皆謂為草今居木部圖經亦然今世所用者皆木葉也如石南枝梗干則皺揉之其嗅如椒爾雅釋草云菵春草釋曰今莽草也與本經合今當具言之石南條中陶隱居注云似菵草凌冬不凋誠木無疑無食子味苦溫無毒主赤白痢腸滑生肌肉出西戎唐本注云生沙磧間樹似柳今注一名沒石子出波斯國主小兒疳𧈟能黑髭發治陰瘡陰汁溫中和氣唐本先附臣禹錫等謹按藥性論云無食子使治大人小兒大腹冷滑痢不禁段成式酉陽雜俎云無石子出波斯國波斯呼為摩賊樹高六七丈圍八九尺葉似桃而長三月開花白色心微紅子圓如彈丸初青熟乃黃白蟲蝕成孔者入藥用其樹一年生無食子一年生跋屢大如指長三寸上有殼中仁如粟黃可啖之海藥謹按徐表南州記云波斯國大小如藥子味溫平無毒主腸虛冷痢益血生精烏髭發和氣安神治陰毒痿燒灰用張仲景使治陰汗取燒灰先以微溫浴了即以帛微裛後敷灰囊上甚良波斯每食以代果番胡呼為沒食子今人呼墨食子轉謬矣雷公云墨石子凡用勿令銅鐵並被火驚者顆小紋細上無栨米者妙用漿水於砂盆中或硬青石上研令盡卻焙乾研了用勿搗能為烏犀色千金方治急疳蝕口鼻者沒石子為末吹下部即瘥子母祕録治産後痢沒石子一個燒為末和酒服方寸匕冷即酒服熱即飲下宮氣方治小兒久痢不效沒石子二個切熬令黃色研作餛飩食之衍義曰無石子今人合他藥染髭黃藥根味苦平無毒主諸惡腫瘡瘻喉痹蛇犬咬毒取根研服之亦含亦塗藤生高三四尺根及莖似小桑生嶺南今附臣禹錫等謹按日華子云黃藥涼治馬一切疾圖經曰黃藥根生嶺南今夔峽州郡及明越秦隴州山中亦有之以忠萬州者為勝藤生高三四尺根及莖似小桑十月採根秦州出者謂之紅藥子葉似蕎麥枝梗赤色七月開白花其根初採濕時紅赤色曝乾即黃開州興元府又産一種苦藥子大抵與黃藥相類主五臟邪氣治肺壓熱除煩躁亦入馬藥用春採根曝乾又下有藥實根條云生蜀郡山谷蘇恭云即藥子也用其核仁本經誤載根字疑即黃藥之實然云生葉似杏花紅白色子肉味酸此為不同今亦稀用故附於此孫思邈千金月令療忽生癭疾一二年者以萬州黃藥子半斤須緊重者為上如輕虛即是他州者力慢須用一倍取無灰酒一斗投藥其中固濟瓶口以粳火燒一復時停騰待酒冷即開患者時時飲一盞不令絶酒氣經三五日後常須把鏡自照覺消即停飲不爾便令人項細也劉禹錫傳信方亦著其效云得之雍州從事張岧岧目擊有效復己試其驗如神其方並同有小異處惟燒酒候香氣出外瓶頭有津出即止不待一宿火仍不得太猛酒有灰經驗方治咯血黃藥漢防己各一兩為末每服一錢匕水一盞小麥二十粒同煎食後溫服斗門方治癭氣用黃藥子一斤浸洗淨酒一斗浸之每日早晚常服一盞忌一切毒物及不得喜怒但以線子逐日度癭知其效簡要濟衆治鼻衄不止黃藥子為末每服二錢匕煎薄膠湯下良久以新汲水調面末一匙頭服之又方敷瘡藥黃藥子四兩為末以冷水調敷瘡上干即旋敷之兵部手集治鼻衄出血兩頭不止謂之血汗王郎中得方以新汲水摩黃藥子一碗勿令絶稀頓服立瘥衍義曰黃藥亦治馬心肺熱有功雷丸味苦咸寒微寒有小毒主殺三蟲逐毒氣胃中熱利丈夫不利女子作摩膏除小兒百病逐邪氣惡風汗出除皮中熱結積蠱毒白蟲寸白自出不止久服令人陰痿一名雷矢一名雷實赤者殺人生石城山谷及漢中土中八月採根曝乾荔實厚朴為之使惡葛根陶隱居云今出建平宜都間纍纍相連如丸本經云利丈夫別録云久服陰痿於事相反唐本注云雷丸竹之苓也無有苗蔓皆零無相連者今出房州金州今注此物性寒本經云利丈夫不利女子別録云久服令陰痿者於事相反按此則疏利男子元氣不疏利女子臟氣其義顯矣臣禹錫等謹按範子云雷矢出漢中色白者善吳氏云雷丸神農苦黃帝歧伯桐君甘有毒扁鵲甘無毒季氏大寒藥性論云雷丸君惡蓄根味苦有小毒能逐風芫花為使主癲癇狂走殺蛔蟲日華子云入藥炮用雷公云凡使用甘草水浸一宿了銅刀刮上黑皮破作四五片又用甘草湯浸一宿後蒸從巳至未出曬乾卻以酒拌如前從巳至未蒸曬乾用經驗前方下寸白蟲雷丸一味水浸軟去皮切焙乾為末每有疾者五更初先食炙肉少許便以一錢匕藥稀粥調半錢服之服時須六衙及上半月日蟲乃下槲音斛若味甘苦平無毒主痔止血療血痢止渴取脈炙用之皮味苦水煎濃汁除蠱及瘻俗用甚效唐本先附臣禹錫等謹按藥性論云槲皮亦可單用主治惡瘡煎湯洗之良日華子云槲皮味澀能吐瘰癧澀五臟圖經曰槲若本經不載所出州土今處處山林多有之木高丈餘若即葉也與櫟相類亦有鬥但小不中用耳不拘時採其葉並皮用葛洪洗諸敗爛瘡乳瘡並用此皮切三升水一斗煮五升春夏冷用秋冬溫用洗瘡洗畢乃敷諸膏謂之赤龍皮湯又治毒攻下部生瘡者槲皮合櫸煮汁如飴糖以導之千金翼方療蠱毒以槲木北陰白皮一大握長五寸以水三升煮取一升空腹分服即吐蠱出也聖惠方治冷淋小腸不利莖中急痛用槲葉搗末每服三錢水一盞蔥白七寸煎六分去滓食前溫服又方治螻蛄瘻用槲葉燒灰細研以泔別浸槲葉取洗瘡拭之納少許灰於瘡中孫真人備急方孩子淋疾槲葉三片煎湯服一雞子小便當時下簡要濟衆治吐血槲葉不拘多少搗末每服二錢水一盞煎取五七分和滓服又方若鼻中外查瘤膿血槲葉灰先以泔清煮榆葉取汁洗拭乾納灰瘡中良子母祕録治小兒及大人赤白痢新槲皮一斤去黑皮細切以水一斗煎取五升去滓更煎如膏和酒服立愈衍義曰槲若亦有鬥但不及櫟木雖堅而不堪充材葉微炙炒槐花減槲葉之半同為末米飲調服治初得腸風及血痔熱多者尤佳亦堪為炭但不及櫟木白楊樹皮味苦無毒主毒風腳氣腫四肢緩弱不隨毒氣遊易音翼在皮膚中痰癖等酒漬服之取葉圓大蒂小無風自動者今按陳藏器本草云白楊去風痹宿血折傷血瀝在骨肉間痛不可忍及皮膚風瘙腫雜五木為湯捋浸損處北土極多人種墟墓間樹大皮白或云葉無風自動此是栘音移楊非白楊也唐本先附臣禹錫等謹按日華子云味酸冷治撲損瘀血並須酒服煎膏可續筋骨非尋常楊柳並松楊樹葉如梨者是也圖經曰白楊舊不載所出州土今處處有之北土尤多人種於墟墓間株大葉圓如梨皮白木似楊故名白楊採其皮無時此下又有水楊條經云葉圓闊而赤枝條短梗多生水岸旁其形如楊柳相似以生水岸故名水楊爾雅所謂旄澤柳其云生水旁形如楊柳即今蒲楊是也楊柳之類亦多崔豹古今注曰白楊葉圓青楊葉長柳葉亦長細栘時題切楊圓葉弱蒂微風則大搖一名高飛一曰獨搖蒲柳生水邊葉似青楊亦曰蒲楊亦日栘柳亦曰蒲栘焉水楊即蒲楊也枝莖徑韌音刃作矢用又有赤楊霜降葉赤材理亦赤也然今人鮮能分別之余並見柳華條必效方療腹滿癖堅如石積年不損者取白楊木東南枝去蒼皮護風細銼五升熬令黃以酒五升淋訖即以絹袋盛滓還納酒中密封再宿每服一合日三雷公云凡使以銅刀刮粗皮蒸從巳至未出用布袋盛於屋東挂乾用外臺祕要治口吻瘡以嫩枝於鐵上燒作灰脂敷之千金方治妊娠下痢白楊皮一斤水一斗煮取二升分三服梅師方治牙疼白楊皮醋煎含之孫真人主口瘡以白楊枝漿水煎和鹽含之衍義曰白楊陝西甚多永耀間居人修蓋多此木也然易生根斫木時碎札入土即下根故易以繁植非止墟墓間於人家舍前後及夾道往往植之土地所宜爾風才至葉如大雨聲葉梗故如是又謂無風自動則無此事嘗官永耀間熟見之但風微時當風徑者其葉孤絶處則往往獨搖以其蒂細長葉重大微風雖過故往來卒已時勢使然也其葉面青光背白木身微白故曰白楊非如粉之白桄音光榔音郎子味苦平無毒主宿血其木似栟櫚堅硬斫其內有面大者至數槲食之不飢其皮堪作綆生嶺南山谷今附圖經曰桄榔生嶺南山谷今二廣州郡皆有之人家亦植於庭除間其木似栟櫚而堅硬斫其間有面大者至數石食之不飢其皮至柔堅韌可以作綆其子作穗生木端不拘時月採之嶺表録異云桄榔木枝葉並茂與棗檳榔等小異然葉下有須如粗馬尾廣人採之以織巾子其須尤宜鹹水浸漬即粗脹而韌故人以此縛舶不用釘線木性如竹紫黑色有紋理工人解之以制博奕局又其木剛作草鈠鋤利如鐵中石更利唯中蕉椰致敗耳陳藏器云華陽國志云郡少谷取桄榔面以牛酪食之臨海志曰桄榔木作草鈠鋤利如鐵中石更利唯中蕉根破之物之相伏如此其中有似米粉中作餅餌食之得飽有權木皮中亦有白粉如白米干搗之水淋屑者可作麵餅吳都賦云文欀根橿是也又有莎木面溫補久服不飢長生嶺南山谷大者四五圍面數槲土人取次為餅蜀志曰莎木高大生山膚嶺南中八郡志曰莎水皮出面大者百槲色黃鳩人部落食之廣志曰樹多枝葉如鳥翼其面色白樹收面不過一槲搗篩如面則不磨屑為飯海藥云謹按嶺表録云生廣南山谷樹身皮葉與蕃棗檳榔等小異然葉下有發如粗馬尾廣人用織巾子木皮內有面食之極有補益虛贏乏損腰腳無力久服輕身辟穀録異云桄榔蓋以此也蘇方木味甘咸平無毒主破血産後血脹悶欲死者水煮苦酒煮五兩取濃汁服之效唐本注云此人用染色者出南海崑崙來交州愛州亦有樹似庵羅葉若榆葉而無澀抽條長丈許花黃子生青熟黑今按陳藏器本草云蘇方寒主霍亂嘔逆及人常嘔吐用水煎服之破血當以酒煮為良唐本先附臣禹錫等謹按日華子云治婦人血氣心腹痛月候不調及蓐勞排膿止痛消癰腫撲損瘀血女人失音血噤赤白痢並後分急痛雷公云凡使去上粗皮並節了若有中心紋橫如紫角者號曰木中尊色其效倍常百等須細銼了重搗拌細條梅枝蒸從巳至申出陰乾用肘後方治血運蘇方三兩細銼水五升煮取二升分再服瘥若無蘇方取緋衣煮汁服亦得海藥云謹按徐表南海記生海畔葉似絳木若女楨味平無毒主虛勞血癖氣壅滯産後惡露不安怯起衝心腹中攪痛及經絡不通男女中風口噤不語宜此法細研乳頭香細末方寸匕酒煎蘇方去滓調服立吐惡物瘥櫸樹皮大寒主時行頭痛熱結在腸胃陶隱居云山中處處有皮似檀槐葉如櫟槲人亦多識用之削取里皮去上甲煎服之夏日作飲去熱唐本注云此樹所在皆有多生溪澗水側葉似樗而狹長樹大者連抱高數仞皮極粗厚殊不似檀俗人取煮汁以療水及斷痢取嫩葉挪貼火爛瘡有效臣禹錫等謹按日華子云櫸樹皮味苦無毒下水氣止熱痢安胎主妊娠人腹痛又云葉冷無毒治腫爛惡瘡鹽搗罯又云山櫸樹皮平無毒治熱毒風㶸腫毒鄉人採葉為甜茶雷公云凡使勿用三四年者無力用二十年以來者心空其樹只有半邊向西生者是斧剝下去上粗皮細銼蒸從巳至末出焙乾用櫸牛凡採得用銅刀取作兩片去兩翅用紙袋盛於舍東挂待乾用肘後方治毒氣攻手足腫疼以樹皮和槲皮合煮汁如飴糖以樺皮濃煮汁絞飲之衍義曰櫸木皮今人呼為櫸柳然葉謂柳非柳謂槐非槐木最大者高五六十尺合二三從抱湖南北甚多然亦下材也不堪為器用嫩皮取以緣栲栳與箕唇桐葉味苦寒無毒主惡蝕瘡著陰皮主五痔殺三蟲療賁豚氣病花主敷豬瘡飼豬肥大三倍生桐柏山谷陶隱居云桐樹有四種青桐葉皮青似梧而無子梧桐色白葉似青桐而有子子肥亦可食白桐與岡桐無異唯有花子爾花二月舒黃紫色禮云桐始華者也岡桐無子是作琴瑟者今此云花便應是白桐白桐堪作琴瑟一名椅桐人家多植之唐本注云古本草桐花飼豬肥大三倍今云敷瘡恐誤矣豈有故破傷豬敷桐花者臣禹錫等謹按爾雅疏云櫬一名梧郭云今梧桐詩大雅云梧桐生矣於彼朝陽是也又曰桐木一名榮郭云即梧桐與櫬梧一也藥性論云白桐皮能治五淋沐發去頭風生髮滋潤日華子云桐油冷微毒敷惡瘡疥及宣水腫塗鼠咬處能闢鼠圖經曰桐生桐柏山谷今處處有之其類有四種舊注云青桐枝葉俱青而無子梧桐皮白葉青而有子子肥美可食白桐有華與子其華二月舒黃紫色一名椅桐又名黃桐則藥中所用華葉者是也岡桐似白桐唯無子即是作琴瑟者陸機草水疏云白桐宜為琴瑟雲南牂牁人績以為布似毛布是作琴瑟宜岡桐白桐二種也又曰梓實桐皮曰椅今人云梧桐也爾雅謂之櫬又謂之榮是白桐梧桐二種俱有椅名也或曰梧桐以知日月正閏生十二葉一邊有六葉從下數一葉為一月至上十二葉有閏十三葉小余者視之則知閏何月也故曰梧桐不生則九州異或云今南人作油者乃岡桐也此桐亦有子頗大於梧子耳江南有赬桐秋開紅花無實有紫桐花如百合實堪糖煮以啖嶺南有刺桐葉如梧桐花側敷如掌枝幹有刺花色深紅主金瘡止血殊效又梧桐白皮亦主痔刪繁方療腸中生痔肛門邊有核者豬懸蹄青龍五生膏中用之其膏敷瘡並酒服之子母祕録治癰瘡疽痔瘻惡瘡小兒丹用皮水煎敷衍義曰桐葉經注不指定是何桐致難執用今具四種桐各有治療條其狀列於後一種白桐可斫琴者葉三杈開白花亦不結子藥性論云皮能治五淋沐發去頭風生髮一種荏桐早春先開淡紅花狀如鼓子花成筒子子或作桐油日華子云桐油冷微毒一種梧桐四月開淡黃小花一如棗花枝頭出絲墮地成油沾漬衣履五六月結桐子今人收炒作果動風氣此是月令清明之日桐始華者一種岡桐無花不中作琴體重胡椒味辛大溫無毒主下氣溫中去痰除臟腑中風冷生西戎形如鼠李子調食用之味甚辛辣唐本先附臣禹錫等謹按日華子云調五臟止霍亂心腹冷痛壯腎氣及主冷痢殺一切魚肉鱉菌毒海藥云謹按徐表南州記生南海諸國去胃口氣虛冷宿食不消霍亂氣逆心腹卒痛冷氣上衝和氣不宜多服損肺一云向陰者澄茄向陽者胡椒也雷公云凡使只用內無皺殼者用力大漢椒使殼胡椒使子每修揀了於石糟中碾碎成粉用食療云治五臟風冷冷氣心腹痛吐清水酒服之佳亦宜湯服若冷氣吞三七枚孫真人治霍亂以胡椒三四十粒以飲吞之段成式酉陽雜俎云胡椒出摩伽陀國呼為昧履支其苗蔓生莖極柔弱長寸半有細條與葉齊條上結子兩兩相對其葉晨開暮合合則裹其子於葉中形似漢椒至辛辣六月採今作胡盤肉食皆用之也衍義曰胡椒去胃中寒痰吐水食已即吐甚驗過劑則走氣大腸寒滑亦用須各以他藥佐之釣樟音草根皮主金瘡止血陶隱居云出桂陽邵陵諸處亦呼作鳥樟方家少用而俗人多識此刮根皮屑以療金瘡斷血易合甚驗又有一草似狼牙氣辛臭名地菘人呼為劉㦎音獲草五月五日採干作屑亦主療金瘡言劉㦎昔採用之爾唐本注云釣樟生郴州山谷樹高丈餘葉似楠音南葉而尖長背有赤毛若枇杷葉八月九月採根皮曬乾也臣禹錫等謹按蕭炳云俗人取莖葉置門上闢天行時疾別録云似烏藥取根摩服治霍亂日華子云溫無毒治賁豚腳氣水腫煎服並將皮煎湯洗瘡痍風瘙疥癬陳藏器云樟材味辛溫無毒主惡氣中惡心腹痛鬼注霍亂腹脹宿食不消常吐酸臭水酒煮服之無藥處用之江東艟船多是樟木斫取札用之彌辛烈者佳亦作浴湯治腳氣除疥癬風癢作履除腳氣縣名豫章因木為名也千金藤主一切血毒諸氣霍亂中惡天行虛勞瘧瘴痰嗽不利癰腫蛇犬毒藥石發癲癇悉主之生北地者根大如指色黑似漆生南土者黃赤如細辛今附陳藏器有數種南北名模不同大略主痰相似或是皆近於藤主一切毒氣其中霍亂中惡天行虛勞瘴瘧痰嗽不利腫疸大毒藥石發癲雜疹悉主之生北地者根大如指色似漆生南土者黃赤如細辛舒廬間有一種藤似本蓼又有烏虎藤繞樹冬青亦名千金藤又江西山林間有草生葉頭有癭子似鶴膝葉如柳亦名千金藤似荷葉只錢許大亦呼為千金藤一名古藤主痢及小兒大腹千金者以貴為名豈俱一物亦狀異而功名同南北所用若取的稱未知孰是其中有草今併入木部草部亦重載也海藥云謹按廣州記云生嶺南山野陳氏云呼為石黃香味苦平無毒主天行時氣能治蠱野諸毒癰腫發背並宜煎服浸酒治風輕身也南燭枝葉味苦平無毒止泄除睡強筋益氣力久服輕身長年令人不飢變白去老取莖葉搗碎漬汁浸粳米九浸九蒸九曝米粒緊小正黑如醫珠袋盛之可適遠方日進一合不飢益顏色堅筋骨能行取汁炊飯名烏飯亦名烏草亦名牛筋言食之健如牛筋也色赤名文燭生高山經冬不凋今附臣禹錫等謹按日華子云黑飯草益腸胃搗汁浸蒸曬乾服又名南燭也圖經曰南燭本經不載所出州土云生高山今唯江東州郡有之株高三五尺葉類苦楝而小凌冬不凋冬生紅子作穗人家多植庭除間俗謂之南天燭不拘時採其枝葉用亦謂之南燭草木謹按陶隱居登真隱訣載太極真人青精乾石䭀飯法䭀音迅䭀之為言飧也謂以酒蜜藥草輩飧搜而曝之也亦作䭀凡內外諸書並完此字唯施於今飯之名耳云其種是木而似草故號南燭草木一名猴藥一名男續一名後草一名唯那木一名草木之王生嵩高少室抱犢雞頭山江左吳越至多土人名之曰猴菽或曰染菽粗與真名相倣佛也此木至難長初生三四年狀若菘菜之屬亦頗似梔子二三十年乃成大株故曰木而似草也凡有八名各從其邦域所稱而正號是南燭也其子如茱萸九月熟酸美可食葉不相對似茗而圓厚味小酢冬夏常青枝莖微紫大者亦高四五丈而甚肥脆易摧折也作飯法以生白粳米一斛五斗更舂治淅取一斛二斗木葉五斤燥者用三斤亦可雜莖皮益嘉煮取汁極令清冷以潚米米釋炊之潚即溲字也今課其時月從四月生新葉至八月末色皆深九月至三月用宿葉色皆淺可隨時進退其斤兩寧小多合採軟枝莖皮於石臼中搗碎假令四五月中作可用十許斤熟舂以斛二斗湯漬染得一斛以九斗淹斛二斗米比來正爾用水漬一二宿不必隨湯煮漬米令上可走蝦周時乃漉而炊之初漬米正作緑色既得蒸便如紺若一過汁漬不得好色亦可淘去更以新汁漬之灑濩皆用此汁當令飯作正青色乃止向所餘汁一斗以共三過灑飯預作高格曝令乾當三過蒸曝每一燥輒以青汁搜令浥浥耳日可服二升勿復血食亦以填胃補髓消滅三蟲上元寶經曰子服草木之王氣與神通子食青燭之津命不復殞此之謂也今茅山道士亦作此飯或以寄遠重蒸過食之甚香甘也孫思邈千金月令南燭煎益髭發及容顏兼補暖方三月三日採葉並蕊子入大淨瓶中干盛以童子小便浸滿瓶固濟其口置間處經一周年取開每日一兩次溫酒服之每酒一盞調煎一匙極有效驗聖惠方治一切風疾若能久服輕身明目黑髭駐顏用南燭樹春夏取枝葉秋冬取根皮揀擇細銼五斤水五斗慢火煎取二斗去滓別於淨鍋中慢火煎如稀餳以瓷瓶盛溫酒下一匙日三服又方治小兒誤吞銅鐵物在咽喉內不下用南燭根燒細研熟水調一錢下之無患子皮有小毒主浣垢去面皯喉痹研納喉中立開又主飛尸子中仁燒令香辟惡氣其子如漆珠生山谷大樹一名噤婁一名桓今附臣禹錫等謹按段成式酉陽雜俎云昔有神巫曰瑤氍能符劾百鬼擒鬼以無患木擊殺之世人競取此木為器用卻鬼因曰無患日華子云無患子皮平陳藏器云有小毒主浣垢去面皯喉閉飛尸研納喉中立開子中仁燒令香辟邪惡氣子黑如漆珠子深山大樹一名噤婁一名桓桓患字聲訛也博物志云桓葉似柳子核堅正黑可作香纓用辟惡氣浣垢古今注云程稚問木曰無患何也答曰昔有神巫曰瑤氍能符劾百鬼得鬼則以此木為棒棒殺之世人相以為器用猒鬼故曰無患也纂文云無患名噤婁實好去垢今僧家貫之為念珠紅底為也纂文無患木名也實可以去垢核黑如醫問櫨木曰無患何也答曰昔有神巫曰無患此木能作符劾百鬼則以此木為棒殺之世人相傳以此木為衆鬼所惡競取為器用以厭鬼故號無患衍義曰無患子今釋子取以為念珠出佛經唯取紫紅色小者佳今入藥絶少西洛亦有之梓白皮味苦寒無毒主熱去三蟲療目中疾葉搗敷豬瘡飼豬肥大三倍生河內山谷陶隱居云此即梓樹之皮梓亦有三種當用拌素不腐者葉療手腳火爛瘡桐葉及此以肥豬之法末見應在商丘子養豬經中唐本注云此二樹花葉取以飼豬並能肥大且易養今見李氏本草博物志但云飼豬使肥今云敷豬瘡並訛矣別録云皮主吐逆胃反去三蟲小兒熱瘡身頭熱煩蝕瘡湯浴之並封敷嫩葉主爛瘡臣禹錫等謹按爾雅云椅梓釋曰別二名也郭云即楸詩鄘風云椅桐梓漆陸機云梓者楸之疏理白色而生子者為梓梓實桐皮曰椅則大同而小別也蕭炳云樹似桐而葉小花紫日華子云煎湯洗小兒壯熱一切瘡疥皮膚瘙癢梓樹皮有數般唯楸梓佳余即不堪圖經曰梓白皮生河內山谷今近道皆有之木似桐而葉小花紫爾雅云椅梓郭璞注云即楸也詩鄘風云椅桐梓漆陸機云梓者楸之疏理白色而生子者為梓梓實桐皮曰椅大同而小別也又一種鼠梓一名楰亦楸之屬也江東人謂之虎梓詩小雅云北山有楰陸機云其枝葉木理如楸山楸之異者今人謂苦楸是也鼠李一名鼠梓或云即此也然鼠花之實都不相類恐別一物而名同也梓之入藥當用有子者為使楸梓宮寺及人家園亭多植之崔元亮集驗方療毒腫不問硬軟取楸葉十重薄腫上即以舊帛裹之日三易當重重有毒氣為水流在葉中如冬月取干葉鹽水浸良久用之或取根皮銼爛搗敷之皆效又療上氣咳嗽腹滿贏頓者楸葉三斗以水三斗煮三十沸去滓煎堪丸如棗大以竹筒納下部中立愈篋中方楸葉一味為煎療瘰癧瘻瘡神方秋分前後平旦令人持囊袋枝上旋摘葉納袋中稱取十五斤水一石淨釜中煎取三斗又別換鍋煎取七八升又換鍋煎取二升即成煎納不津器中凡患者先取麻油半合蠟一分酥一栗子許同消如面脂又取杏仁七粒生薑少許同研令細米粉二錢同入膏中攪令勻先塗瘡上經二日來乃拭卻即以篦子勻塗楸煎滿瘡上仍用軟帛裹卻二日一度拭卻更上新藥不過五六上已作頭便生肌平復未穴者即內消瘥後須將慎半年以來採葉及煎合時禁孝子婦女僧人雞犬見之橡實味苦微溫無毒主下痢厚腸胃肥健人其殼為散及煮汁服亦主痢並堪染用一名杼鬥槲櫟皆有鬥以櫟為勝所在山谷中皆有唐本先附臣禹錫等謹按爾雅云栩杼釋曰栩一名杼郭云柞樹詩唐風云集於苞栩陸機云今柞櫟也徐州人謂櫟為杼或謂為栩其子為皂或言皂鬥其殼為汁可以染皂今京洛及河內言杼鬥謂櫟為杼五方通語也日華子云櫟樹皮平無毒治水痢消瘰癧除惡瘡橡斗子澀腸止瀉煮食可止飢御歉歲殼止腸風崩中帶下冷熱瀉痢並染鬚髮入藥並搗炒焦用圖經曰橡實櫟木子也本經不載所出州土云所在山谷皆有今亦然木高二三丈三四月開黃花八九月結實其實為皂鬥槲櫟皆有鬥而以櫟為勝不枸時採其皮並實用爾雅云櫟其實梂釋曰櫟似樗之木也梂盛實之房也其實橡也有梂匯自裹詩秦風云山有苞櫟陸機云秦人謂柞櫟為櫟又唐風云集於苞栩陸機云今柞櫟也徐州人謂櫟為杼或謂之栩今京洛及河內謂櫟亦為杼五方通語也然則柞櫟也杼也栩也皆橡櫟之通名也雷公云凡使去粗皮一重取橡實蒸從巳至末出銼作五片用之食療云主止痢不宜多食孫真人枕中記云橡子非果非谷而最益人服食未能斷谷啖之尤佳無氣而受氣無味而受味消食止痢令人強健不極衍義曰橡實櫟木子也葉如栗葉在處有但堅而不堪充材亦木之性也山中以椿人為糧然澀腸木善為炭他木皆不及其殼椹染皂若曾經雨水者其色淡不若不經雨水者槲亦有殼但少而不及櫟木所實者石南味辛苦平有毒主養腎氣內傷陰衰利筋骨皮毛療腳弱五臟邪氣除熱女子不可久服令思男實殺蠱毒破積聚逐風痹一名鬼目生華陰山谷二月四月採葉八月採實陰乾五加皮為之使陶隱居云今廬江及東間皆有之葉狀如枇杷葉方用亦稀唐本注云葉似菵草凌冬不凋以葉細者為良關中者好為療風邪丸散之要其江山以南者長大如枇杷葉無氣味殊不任用今醫家不復用實臣禹錫等謹按蜀本云終南斜谷近石處甚饒今市人多以瓦韋為石韋以石韋為石南不可不審之藥性論云石南臣主除熱惡小薊無毒能添腎氣治軟腳煩悶疼殺蟲能逐諸風雖能養腎內令人陰痿圖經曰石南生華陰山谷今南北皆有之生於石上株極有高大者江湖間出葉如枇杷葉有小刺凌冬不凋春生白花成簇秋結細紅實關隴間出者葉似莽草青黃色背有紫點雨多則並生長及二三寸根橫細紫色無花實葉至茂密南北人多移以植庭宇間陰翳可愛不透日氣入藥以關中葉細者良二月四月採葉四月採實陰乾魏王花木記曰南方石南木取皮中作魚羹和之尤美今不聞用之下有楠材條其木頗似石南而更高大葉差小其材中梁柱今醫方亦稀用之衍義曰石南葉狀如枇杷葉之小者但背無毛光而不皺正二月間開花冬有二葉為花苞苞既開中有十五餘花大小如椿花甚細碎每一苞約彈許大成一球一花六葉一朵有七八球淡白緑色葉末微淡赤色花既開蕊滿花但見蕊不見花花才罷去年緑葉盡脫落漸生新葉治腎衰腳弱最相宜但京洛河北河東山東頗少人以此故少用湖南北江東西二浙甚多故多用南實今醫家絶可用木天蓼味辛溫有小毒主癥結積聚風勞虛冷生山谷中唐本注云作藤蔓葉似柘花白子如棗許無定形中瓤似茄子味辛啖之以當薑蓼其苗藤切以酒浸服或以釀酒去風冷症癖大效所在皆有今出安州申州今按陳藏器本草云木天蓼今時所用出鳳州樹高如冬青不凋出深山人云多服損壽以其逐風損氣故也不當以藤天蓼為注既云木蓼豈更藤生自有藤蓼爾唐本先附臣禹錫等謹按藥性論云天蓼子使味苦辛微熱無毒能治中賊風口面喎斜主冷痃癖氣塊女子虛勞圖經曰木天蓼味辛溫有小毒主癥結積聚風勞虛冷生山谷中木高二三丈三月四月開花似柘花五月採子子作球形似茼其球子可藏作果啖之亦治諸冷氣蘇恭云作藤蔓生者自是藤天蓼也又有一種小天蓼生天目山四明山木如梔子冬不凋然則天蓼有三種雖其狀不同而體療甚相似也聖惠方治風立有奇效用木天蓼一斤去皮細銼以生絹袋盛好酒二斗浸之春夏一七日秋冬二七日後開每空心日午初夜各溫飲一盞老幼臨時加減若長服日只每朝一盞黃環味苦平有毒主蠱毒鬼疰鬼魅邪氣在臟中除咳逆寒熱一名凌泉一名大就生蜀郡山谷三月採根陰乾鳶尾為之使惡茯苓防己陶隱居云似防己亦作車輻理解蜀都賦云青珠黃環者或云是大戟花定非也用甚稀市人鮮有識者唐本注云此物襄陽巴西人謂之就葛作藤生根亦葛類所云似防己作車輻解者近之人取葛根誤得食之吐痢不止用土漿解乃瘥此真黃環也余處亦稀唯襄陽大有本經用根今云大戟花非也其子作角生似皂莢花實與葛同時矣今園庭種之大者莖徑六七寸所在有之謂其子名狼跋子今太常科劍南來者乃雞屎葛根非也臣禹錫等謹按藥性論云黃環使惡乾薑大寒有小毒治上氣急寒熱及百邪益智子味辛溫無毒主遺精虛漏小便餘瀝益氣安神補不足安三焦調諸氣夜多小便者取二十四枚碎入鹽同煎服有奇驗按山海經云生崑崙國今附臣禹錫等謹按陳藏器云止嘔噦廣志云葉似蘘荷長丈餘其根上有小枝高八九尺無葉萼子叢生大如棗中瓣黑皮白核小者名益智含之攝涎穢出交趾圖經曰益智子生崑崙國今嶺南州郡往往有之葉似蘘荷長丈餘其根旁生小枝高七八寸無葉花萼作穗生其上如棗許大皮白中仁黑仁細者佳含之攝涎唾採無時盧循為廣州刺史遺劉裕益智粽裕答以續命湯是此也齊民要術云益智子鬲涎穢顧微廣州記云益智葉如蘘荷莖如竹箭子從心出一枝有十子子肉白滑四破去之或外皮蜜煮為粽味辛溲音搜疏味辛苦寒微寒無毒主身皮膚中熱除邪氣止遺溺通利水道除胃中熱下氣可作浴湯一名巨骨生熊耳川穀及田野故丘墟地四月採漏蘆為之使陶隱居云李云溲疏一名楊櫨一名牡荊一名空疏皮白中空時時有節子似枸杞子冬月熟色赤味甘苦末代乃無識者此實真也非人籬援之楊櫨也李當之此説於論牡荊乃不為大乖而濫引溲疏恐斯誤矣又云溲疏與空疏亦不同掘耳疑應作熊耳熊耳山名都無掘耳之號唐本注云溲疏形似空疏樹高丈許白皮其子八九月熟色赤似枸杞子味苦必兩兩相併與空疏不同空疏一名楊櫨子為莢不似溲疏今注溲疏枸杞雖則相似然溲疏有刺枸杞無刺以此為別爾臣禹錫等謹按藥性論云溲疏使圖經文具枸杞條下鼠李主寒熱瘰癧瘡其皮味苦微寒無毒主除身皮熱毒一名牛李一名鼠梓一名椑音卑生田野採無時唐本注云此藥一名趙李一名皂李一名烏槎樹皮主諸瘡寒熱毒痹子主牛馬六畜瘡中蟲或生搗敷之或和脂塗皆效子味苦採取曬乾九蒸酒漬服三合日再能下血及碎肉除疝瘕積冷氣大良皮子俱有小毒臣禹錫等謹按日華子云味苦涼微毒治水腫皮主風痹圖經曰鼠李即烏巢子也本經不載所出州土但云生田野今蜀川多有之枝葉如李子實若五味子色醫黑其汁紫色味甘苦實熟時採曬乾九蒸酒漬服能下血其皮採無時一名牛李劉禹錫傳信方主大人口中疳瘡併發背萬不失一用山李子根亦名牛李子薔薇根野外者佳各細切五升以水五大斗煎至半日以來汁濃即於銀銅器中盛之重湯煎至一二升看稍稠即於瓷瓶子中盛少少溫含咽之必瘥忌醬醋油膩熱面大約不宜食肉如患發背重湯煎令極稠和如膏以帛塗之瘡上神效襄州軍事柳岸妻竇氏患口疳十五年齒盡落齦亦斷壞不可近用此方遂瘥食療云微寒主腹脹滿其根有毒煮濃汁含之治𧈟齒並疳蟲蝕人脊骨者可煮濃汁灌之良其肉主脹滿谷脹和麵作餅子空心食之少時當瀉其煮根汁亦空心服一盞治脊骨疳衍義曰鼠李即牛李子也木高七八尺葉如李但狹而不澤子於條上四邊生熟則紫黑色生則青葉至秋則落子尚在枝是處皆有故經不言所出處今關陝及湖南江南北甚多木皮與子兩用椰子皮味苦平無毒止血療鼻衄吐逆霍亂煮汁服之殼中肉益氣去風漿服之主消渴塗頭益發令黑生安南樹如棕櫚子殼可為器交州記曰椰子中有漿飲之得醉今附臣禹錫等謹按日華子云皮入藥炙用圖經曰椰子出安南今嶺南州郡皆有之木似桄榔無枝條高數丈葉在木末如束蒲實大如瓠垂於枝間如挂物實外有粗皮如棕包次有殼圓而且堅里有膚至白如豬肪厚半寸許味亦似胡桃膚里有漿四五合如乳飲之冷而氛醺人多取殼為器甚佳不拘時月採其根皮用南人取其肉糖飴漬之寄至北中作果味甚佳也陳藏器理水廣志曰汁有餘清如水美如蜜可食之海藥云謹按交州記云生南海狀若海棕實名椰子大如碗許大外有粗皮如大腹子豆蔻之類內有漿似酒飲之不醉主消渴吐血水腫去風熱雲南者亦好武侯討雲南時並令將士剪除椰樹不令小邦有此異物多食動氣也衍義曰椰子開之有汁如乳蒸甘香自別是一種氣味中又有一塊瓤形如瓜蔞上有細壠起亦白色但微虛紋若婦人裙褶其味如其汁又著殼一重白肉剮取之皆可與瓤糖煎為果汁色如白酒其味如瓤然謂之酒者好事者當日強名之取其殼為酒器如酒中有毒則酒沸起今人皆漆其里則全失用椰子之意枳音止椇音矩味甘平無毒主頭風小腹拘急一名木蜜其木皮溫無毒主五痔和五臟以木為屋屋中酒則味薄此亦奇物唐本注云其樹徑尺木名白石葉如桑柘其子作房似珊瑚核在其端人皆食之唐本先附臣禹錫等謹按蜀本云字或單作枸音矩云木名出蜀近酒能薄酒味江南人呼謂之木蜜也圖經文具接骨木條下食療云多食發蛔蟲昔有南人修舍用此誤有一片落在酒甕中其酒化為水味荊楚歲時記云詩有椇羞廣雅枳椇實如珊瑚十一月採是白石木子山中多有之鹽荷裹一冬儲備又以闢蟲毒小天蓼味甘溫無毒主一切風虛贏冷手足疼痹無論老幼輕重浸酒及煮汁服之十許日覺皮膚間風出如蟲行生天目山四明山樹如梔子冬不凋野獸食之更有木天蓼出山南大樹今市人貨之云久服促壽當是其逐風損氣故也本經有木天蓼即是此也蘇注云藤生子辛與木又異應是復有藤天蓼江淮南山間有木天蓼作藤著樹葉如梨光而薄子如棗辛甘大主風血贏痹腰腳疼冷取皮釀酒即是蘇引為天蓼注者夫如是則有三天蓼俱能逐風其中優劣小者最為勝今附圖經文具木天蓼條下小柏味苦大寒無毒主口瘡疳𧈟殺諸蟲去心腹中熱氣一名山石榴唐本注云其樹枝葉與石榴無別但花異子細黑圓如牛李子爾生山石間所在皆有襄陽峴山東者為良陶於柏木附見二種其一是此陶云皮黃其樹乃皮白今太常所貯乃葉多刺者名白剌柏非小柏也今注陳藏器本草云凡是柏木皆皮黃今既不黃而自然非柏小蘖如石榴皮黃子赤如枸杞子兩頭尖人銼枝以染黃若雲子黑而圓恐是別物非小柏也唐本先附圖經文具柏木條下莢蒾音迷味甘苦平無毒主三蟲下氣消穀唐本注云葉似木槿及似榆作小樹其子如溲疏兩兩相併四四相對而色赤味甘煮樹枝汁和作粥甚美以飼小兒殺蛔蟲不入方用陸機草木疏名擊迷一名羿先蓋檀榆之類也所在山谷有之今按陳藏器本草云莢蒾主六畜瘡中蛆煮汁作粥灌之蛆立出皮堪為索生北土山林間唐本先附紫荊木味苦平無毒主破宿血下五淋濃煮服之今人多於庭院間種者花豔可愛今附臣禹錫等謹按陳藏器云紫珠寒主解諸毒物癰疽喉痹飛尸蠱毒腫下瘻蛇虺蟲蠶狂犬等毒並煮汁服亦煮汁洗瘡腫除血長膚一名紫荊樹似黃荊葉小無丫非田氏之荊也至秋子熟正紫圓如小珠生江東林澤間有之日華子云紫荊木通小腸皮梗同用花功用亦同圖經曰紫荊舊不著所生州郡今處處有之人多於庭院間種植木似黃荊葉小無丫花深紫可愛或云田氏之荊也至秋子熟如小珠名紫珠江東林澤間尤多衍義曰紫荊木春開紫花甚細碎共作朵生出無常處或生於木身之上或附根土之下直出花花罷葉出光緊微圓園圃間多植之紫真檀味鹹微寒主惡毒風毒陶隱居云俗人摩以塗風毒諸腫亦效然不及青木香又主金瘡止血亦療淋用之唐本注云此物出崑崙盤盤國也雖不生中華人間遍有之也臣禹錫等謹按日華子云紫真檀無毒陳藏器云檀樹如檀出海南本功外心腹痛霍亂中惡鬼氣殺蟲外臺祕要止血止痛至妙凡裹縛瘡用故布帛不寬不急如系衣帶即好千金方治一切腫以紫檀細碎大醋和敷腫上梅師方治金瘡止血急刮真紫檀末敷之烏臼木根皮味苦微溫有毒主暴水癥結積聚生山南平澤唐本注云樹高數仞葉似梨杏花黃白子黑色今按陳藏器本草云烏臼葉好染皂子多取壓為油塗頭令黑變白為燈極明服一合令人下痢去陰下水唐本先附臣禹錫等謹按日華子云烏臼根皮涼治頭風通大小便以慢火炙令脂汁盡黃干後用又云子涼無毒壓汁梳頭可染髮炒作湯下水氣斗門方治大便不通用烏臼木方停一寸來劈破以水煎取小半盞服之立通不用多吃其功神聖兼能取水衍義曰烏臼葉如小杏葉但微薄而緑色差淡子八九月熟初青後黑分為三瓣取子出油然燈及染髮南藤味辛溫無毒主風血補衰老起陽強腰腳除痹變白逐冷氣排風邪亦煮汁服亦浸酒冬月用之生依南樹故號南藤莖如馬鞭有節紫褐色一名丁公藤生南山山谷南史解叔謙雁門人母有疾夜於庭中稽顙祈告聞空中雲得丁公藤治即瘥訪醫及本草皆無至宜都山中見一翁伐木云是丁公藤療風乃拜泣求得之及漬酒法受畢失翁所在母疾遂愈今附圖經曰南藤即丁公藤也生南山山谷今出泉州榮州生依南木故名南藤苗如馬鞭有節紫褐色葉如杏葉而尖採無時此下又有千金藤云生北地者根大如指色黑似漆生南土者黃赤如細辛又有榼藤子生廣南山林間木如通草藤三年方熟紫黑色一名象豆今醫家並稀用故但附於其類陳藏器雲氣味辛烈亦磨服之變白不老出藍田八月採曬乾用鹽麩子味酸微寒無毒除痰飲瘴瘧喉中熱結喉痹止渴解酒毒黃疸飛尸蠱毒天行寒熱痰嗽變白生毛髮取子干搗為末食之嶺南人將以防瘴樹白皮主破血止血蠱毒血痢殺蛔蠱並煎服之根白皮主酒疸搗碎米泔浸一宿平旦空腹溫服一二升葉如椿生吳蜀山谷子秋熟為穗粒如小豆上有鹽似雪食之酸鹹止渴一名叛奴鹽今附臣禹錫等謹按陳藏器云子主頭風白屑效日華子云鹽麩葉上球子治中蠱毒毒藥消酒毒根用並同陳藏器云蜀人為之酸桶博物志云酸桶七月出穗蜀人謂之主音穗上有鹽著可為羹亦謂之酢桶矣吳人謂之為鹽也杉材微溫無毒主療漆瘡陶隱居云削作柿煮以洗漆瘡無不即瘥又有鼠查生去地高尺余許煮以洗漆多瘥又有漆姑葉細細多生石邊亦療漆瘡其雞子及蟹並是舊方唐本注云杉材木水煮汁浸捋腳氣腫滿服之療心腹脹痛去惡氣其鼠查漆姑有別功列出下品臣禹錫等謹按日華子云味辛治風毒賁豚霍亂止氣並煎湯服並淋洗須是油杉及臭者良圖經曰杉材舊不載所出州土今南中深山中多有之木類松而徑直葉附枝生若剌針爾雅云柀音彼煔與杉同郭璞注云煔似松生江南可以為船及棺材作柱埋之不腐也又人家常用作桶板甚耐水醫師取其節煮汁浸捋腳氣殊效唐柳柳州纂救三死方云元和十二年二月得腳氣夜半痞絶脅有塊大如石且死因大寒不知人三日家人號哭榮陽鄭洵美傳杉木湯服半食頃大下三下氣通塊散杉木節一大升桔葉切一大升北地無葉可以皮代之大腹檳榔七枚合子碎子童子小便三大升共煮取一大升半分兩服若一服得快利即停後服以前三死真死矣會有教者皆得不死恐他人不幸有類余病故傳焉又杉菌出宜州生積年杉木上若菌狀云味苦性微溫主心脾氣疼及暴心痛採無時斗門方治霍亂用黃杉木劈開作片一握以水濃煎一盞服之瘥衍義曰杉其干端直大抵如松冬不凋但葉闊成枝廬山有萬杉寺即此杉也作屑煮汁浸洗腳氣腫滿今處處有接骨木味甘苦平無毒主折傷續筋骨除風癢齲齒可作浴湯唐本注云葉如陸英花亦相似但作樹高一二丈許木輕虛無心斫枝插便生人家亦種之一名木蒴藋所在皆有之唐本先附臣禹錫等謹按陳藏器云接骨木有小毒根皮主痰飲下水腫及痰瘧煮服之當痢下及吐不可多服葉主瘧小兒服三葉大人服七葉並生搗絞汁服得吐為度本經云無毒誤也圖經曰接骨木舊不著所出州土今近京皆有之木高一二丈許花葉都類陸英水芹輩故一名木蒴藋其木輕虛無心斫枝插土便生人家亦種之葉主瘧研絞其汁飲之得吐乃瘥大人七葉小兒三葉不可過多也又上有枳椇條云其木徑尺木名白石葉如桑柘其子作房似珊瑚核在其端人多食之即詩小雅所謂南山有枸是也陸機云枸枝枸也木似白楊所在山中皆有枝枸不直啖之甘美如飴八九月熟謂之木蜜本從南方來能敗酒若以為屋柱則一屋之酒皆薄産書云治産後心悶手腳煩熱氣力欲絶血暈連心頭硬及寒熱不禁接骨木破之如算子一握以水一升煎取半升分溫兩服或小便數惡血不止服之即瘥此木煮之三遍其力一般此是起死人方楓音風柳皮味辛大熱有毒主風齲齒痛出原州唐本注云葉似槐莖赤根黃子六月熟緑色而細剝取莖皮用之唐本先附陳藏器云性澀止水痢蘇云下水腫腫非澀藥所治有殊蘇為誤矣又云有毒轉明其謬水煎止痢為最梅師方治中熱遊及水燒除外痛以柳白皮燒為末敷之兼治炙瘡亦同妙斗門方治白虎風所患不已積年久治無效痛不可忍者用腦麝不限多少細銼焙乾浸酒常服以醉為度即瘥今之寄生楓樹上者方堪用其葉亦可制砒霜粉尤妙矣赤爪側絞切木味苦寒無毒主水痢風頭身癢生平陸所在有之實味酸冷無毒汁服主水痢沐頭及洗身上瘡癢一名羊梂一名鼠查唐本注云小樹生高五六尺葉似香葇子似虎掌爪大如小林檎赤色出山南申安隨等州唐本先附陳藏器云陶注於松條中鼠查一名羊梂即赤爪也煮汁洗漆瘡效爾雅云櫟其實梂有梂草自裹其子房生為梂又爪木一名羊梂一名鼠查梂此乃名同耳梂似小查而赤人食之生高原樺木皮味苦平無毒主諸黃疸濃煮汁飲之良堪為燭者木似山桃取脂燒闢鬼今附臣禹錫等謹按陳藏器云晉中書令王珉傷寒身驗方中作㯸字濃煮汁冷飲主傷寒時行熱毒瘡特良今之豌豆瘡也靈苑方治乳痛癰初發腫痛結硬欲破膿令一服瘥以北來真樺皮無灰酒服方寸匕就之臥及覺已瘥衍義曰樺木皮燒為黑灰合他藥治肺風毒及取皮上有紫黑花勻者裹鞍弓鐙榼藤子味澀甘平無毒主蠱毒五痔喉痹及小兒脫肛血痢並燒灰服瀉血宜服一枚以刀剜內瓤熬研為散空腹熱酒調二錢不過三服必效又宜入澡豆善除皯𪒟其殼用貯丹藥經載不壞按廣州記云生廣南山林間樹如通草藤也三年方始熟紫黑色一名象豆今附臣禹錫等謹按日華子云治飛尸入藥炙用圖經文具南藤條下衍義曰榼藤子紫黑色微光大一二寸圓扁治五痔有功燒成黑灰微存性米飲調服人多剔去肉作藥瓢垂腰間棐音匪實味甘無毒主五痔去三蟲蠱毒鬼疰生永昌陶隱居云今山東陽諸郡食其子療寸白蟲唐本注云此物是蟲部中彼子也爾雅云柀杉也其樹大連抱高數仞葉似杉其木如柏作松理肌細軟堪為器用也今注彼子與此殊類既未知所用退入有名無用臣禹錫等謹按孟詵云平多食一二升佳不發病令人能食消穀助筋骨行營衛明目輕身食療云治寸白蟲日食七顆七日滿其蟲皆化為水外臺祕要治白蟲棐子一百枚去皮只然啖之能食盡佳不然啖五十枚亦得經宿蟲消下衍義曰棐實大如橄欖殼色紫褐而脆其中子有一重粗黑衣其仁黃白色嚼久漸甘美五痔人常如果食之愈過多則滑腸欒荊味辛苦溫有小毒主大風頭面手足諸風癲癇狂痙濕痹寒冷疼痛俗方大用之而本草不載亦無別名但有欒花功用又別非此花也唐本注云按其莖葉都似石南干亦反捲經冬不死葉上有細黑點者真也今雍州所用者是而洛州乃用石荊當之非也唐本先附臣禹錫等謹按藥性論云欒荊子君惡石膏味甘辛微熱無毒能治四肢不遂主通血脈明目益精光決明為使圖經曰欒荊舊不著所出州郡今生東海及淄州汾州性溫味苦有小毒苗葉主大風頭面手足諸風癲狂痙痹冷病蘇恭云莖葉都似石南干亦自反經冬不凋葉上有細黑點者真也今諸郡所上者枝莖白葉小圓而青色頗似榆葉而長冬夏不枯六月開花花有紫白二種子似大麻四月採苗葉八月採子與柏油同熬塗駝畜瘡疥或淋炸藥中用之亦名頑荊衍義曰欒荊即前所謂牡荊也不合更立此條況本經元無欒荊已具蔓荊實條中扶栘木皮味苦平有小毒去風血腳氣疼痹踠損瘀血痛不可忍取白皮火炙酒浸服之和五木皮煮作湯捋腳氣疼腫殺瘃陟玉切蟲風瘙燒作灰置酒中令味正經時不敗生江南山谷樹大十數圍無風葉動華反而後合詩云棠棣之華偏其反而鄭注云棠棣栘也亦名栘楊崔豹云栘楊圓葉弱蒂微風大搖新補見陳藏器木鱉子味甘溫無毒主折傷消結腫惡瘡生肌止腰痛除粉刺皯𪒟婦人乳癰肛門腫痛藤生葉有五花狀如薯蕷葉青色面光花黃其子似栝蔞而極大生青熟紅肉上有刺其核似鱉故以為名出郎州及南中七八月採之今附臣禹錫等謹按日華子云醋摩消腫毒圖經云木鱉子出郎州及南中今湖嶺諸州及杭越全嶽州亦有之春生苗作蔓葉有五花狀如山芋青色面光四月生黃花六月結實似栝蔞而極大生青熟紅肉上有刺其核似鱉故以為名每一實有核三四十枚八月九月採嶺南人取嫩實及苗葉作茹蒸食之孫用和治痔方以木鱉子三枚去皮杵碎砂盆內研如泥以百沸湯一大碗以上入盆器內坐上熏之至通手即洗一日不過三二次衍義曰木鱉子蔓生歲一枯葉如蒲桃實如大栝蔞熟則紅黃色微有刺不能刺人今荊南之南皆有之九月十月熟實中之子曰木鱉子但根不死春旋生苗其子一頭尖者為雄凡植時須雌雄相合麻縷纏定及其生也則去其雄者方結實藥實根味辛溫無毒主邪氣諸痹疼酸續絶傷補骨髓一名連木生蜀郡山谷採無時唐本注云此藥子也當今盛用胡名那綻出通州渝州本經用根恐誤載根字子味辛平無毒主破血止痢消腫除蠱疰蛇毒樹生葉似杏花紅白色子肉味酸甘用其核仁圖經文具黃藥條下釣藤微寒無毒主小兒寒熱十二驚癇陶隱居云出建平亦作吊藤字唯療小兒不入余方唐本注云出梁州葉細長莖間有刺若釣鉤者是臣禹錫等謹按蜀本云味苦藥性論云釣藤臣味甘平能主小兒驚啼瘛瘲熱擁日華子云治客忤胎風圖經曰釣藤本經不載所出州土蘇恭云出梁州今亦興元府有之葉細莖長節間有刺若釣鉤三月採字或作吊葛洪治小兒方多用之其赤湯治卒得癇用吊藤甘草炙各二分水五合煮取二合服如小棗大日五夜三大良又廣濟及崔氏方療小兒驚癇諸湯飲皆用吊藤皮衍義曰釣藤中空二經不言之長八九尺或一二丈者湖南北江南江西山中皆有小人有以穴隙間致酒甕中盜取酒以氣吸之酒既出涓涓不斷專治小兒驚熱欒華味苦寒無毒主目痛淚出傷眥消目腫生漢中川穀五月採決明為之使唐本注云此樹葉似木槿而薄細花黃似槐而小長大子殼似酸漿其中有實如熟豌豆圓黑堅硬堪為數珠者是也五月六月花可收南人取合黃連作煎療目赤爛大效花以染黃色甚鮮好圖經曰欒華生漢中川穀今南方及都下園圃中或有之葉似木槿而薄細花黃似槐而稍長大子殼似酸漿其中有實如熟豌豆圓黑堅堪為數珠者五月採其花亦可染黃南人取以合黃連作煎療目赤爛甚效衍義曰欒華今長安山中亦有其子即謂之木欒子攜至京都為數珠未見其入藥蔓椒味苦溫無毒主風寒濕痹歷節疼除四肢厥氣膝痛一名豕椒一名豬椒一名彘椒一名狗椒生雲中川穀及丘冢間採莖根煮釀酒陶隱居云山野處處有俗呼為樛似椒檔音黨小不香爾一名豨椒可以蒸病出汗也圖經文具蜀椒條下食療主賊風攣急感藤味甘平無毒調中益氣主五臟通血氣解諸熱止渴除煩悶治腎釣氣如木防己生江南山谷如雞卵大斫藤斷吹氣出一頭其汁甘美如蜜葉生研敷蛇蟲咬瘡一名甘藤甘感聲近又名甜藤也新補見陳藏器日華子赤柳木無毒主剝驢馬血入肉毒取火炙用尉之亦可煮汁浸之其木中脂一名柳乳入合質汗用之生河西沙地皮赤色葉細今附臣禹錫等謹按爾雅疏云柳一名河柳郭云今河旁赤莖小楊陸機云生水旁皮正赤如絳一名雨師枝葉似松日華子云赤柳木溫圖經文具柳華條下衍義曰赤柳木又謂之三春柳以其一年三秀也花肉紅色成細穗河西者戎人取滑枝為鞭京師亦甚多突厥白味苦主金瘡生肉止血補腰續筋出突厥國色白如灰乃雲石灰共諸藥合成之夷人以合金瘡中國用之今醫家見用經效者潞州出焉其根黃白色狀似茯苓而虛軟苗高三四尺春夏葉如薄荷花似牽牛而紫上有白稜二月八月採根曝乾今附賣子木味甘微咸平無毒主折傷血內溜續絶補骨髓止痛安胎生山谷中唐本注云其葉似柿出劍南邛州唐本先附臣禹錫等謹按今渠州歲貢作買子木圖經曰賣子木本經不載所出州土注云出劍南邛州今唯渠州有之每歲土貢謂之買子木株高五七尺木徑寸許春生嫩枝條葉尖長一二寸俱青緑色枝梢淡紫色四五月開碎花百十枝圍簇作大朵焦紅色隨花便生子如椒目在花瓣中黑而光潔每株花裁三五大朵耳五月採其枝葉用雷公云凡採得後粗搗用酥炒令酥盡為度然入用每一兩用酥二分為度婆羅得味辛溫無毒主冷氣塊溫中補腰骨破痃癖可染髭發令黑樹如柳子如萆音卑麻生西國今附海藥云謹按徐氏云生西海波斯國似中華柳樹也方家多用甘露藤味甘溫無毒主風血氣諸病久服調中溫補令人肥健好顏色止消渴潤五臟除腹內諸冷生嶺南藤蔓如箸一名肥藤人服之得肥也新補見陳藏器日華子大空味辛苦平有小毒主三蟲殺蟣蝨生山谷中取根皮作末油和塗蟣蝨皆死唐本注云根皮赤葉似楮小圓厚作小樹抽條高六七尺出襄州山谷所在亦有秦隴人名為獨空唐本先附椿莢主大便下血今近道處處有之夏中生莢樗之有花者無莢有莢者無花常生臭樗上未見椿上有莢者然世俗不辨椿樗之異故俗中名此為椿莢其實樗莢耳新定衍義文具椿木條下水楊葉嫩枝味苦平無毒主久痢赤白搗和水絞取汁服一升日二大效今注水楊葉圓闊而赤枝條短硬多生水岸旁樹與楊柳相似既生水岸故名水楊也唐本先附圖經文具白楊條下楊櫨木味苦寒有毒主疽瘻惡瘡水煮葉汁洗瘡立瘥生籬垣間一名空疏所在皆有唐本先附檔子味辛辣如椒主遊蠱飛尸著喉口者刺破以子揩之令血出當下涎沫煮汁服之去暴冷腹痛食不消殺腥物木高大莖有刺新補見陳藏器圖經文具蜀椒條下楠材微溫主霍亂吐下不止陶隱居云削作柿煮服之窮無他藥用此臣禹錫等謹按日華子云味辛熱微毒治轉筋衍義曰楠材今江南等路造船場皆此木也緣木性堅而善居水久則多中空為白蟻所穴柘木味甘溫無毒主補虛損取白皮及東行根白皮煮汁釀酒主風虛耳聾勞損虛羸瘦腰腎冷夢與人交接泄精者取汁服之無刺者良木主婦人崩中血結及主瘧疾兼堪染黃新補見陳藏器日華子衍義曰柘木里有紋亦可旋為器葉飼蠶曰柘蠶葉梗然不及桑葉東行根及皮煮汁釀酒治風虛耳聾有驗余如經柞木皮味苦平無毒治黃疸病皮燒末服方寸匕生南方葉細今之作梳者是新補見陳藏器日華子黃櫨味苦寒無毒除煩熱解酒疸目黃煮服之亦洗湯火漆瘡及赤眼堪染黃生商洛山谷葉圓木黃川界甚有之新補見陳藏器日華子楊氏産乳治漆瘡煎黃櫨水汁洗之最良棕櫚子平無毒澀腸止瀉痢腸風崩中帶下及養血皮平無毒止鼻洪吐血破症治崩中帶下腸風赤白痢入藥燒灰用不可絶過新補見陳藏器日華子圖經曰棕櫚亦曰栟櫚出嶺南及西川江南亦有之木高一二丈旁無枝條葉大而圓歧生枝端有皮相重被於四旁每皮一匝為一節二旬一採轉復生上六七月生黃白花八九月結實作房如魚子黑色九月十月採其皮木用山海經曰石脆一作翠之山其木多棕是也衍義曰棕櫚木今人旋為器皮燒為黑灰治婦人血露及吐血仍佐之他藥每歲剮取棕皮不爾束死花如魚子泄熟淹為果木槿平無毒止腸風瀉血又主痢後熱渴作飲服之令人得睡入藥炒用取汁度絲使得易絡花涼無毒治腸風瀉血赤白痢炒用作湯代茶吃治風新補見陳藏器日華子衍義曰木槿如小葵花淡紅色五葉成一花朝開暮斂花與枝兩用湖南北人家多種植為籬障余如經芫花味辛苦溫微溫有小毒主咳逆上氣喉鳴喘咽腫短氣蠱毒鬼瘧疝瘕癰腫殺蟲魚消胸中痰水喜音戲唾水腫五水在五臟皮膚及腰痛下寒毒肉毒久服令人虛一名去水一名毒魚一名杜芫其根名蜀桑根療疥瘡可用毒魚生淮源川穀三月日採花陰乾決明為之使反甘草陶隱居云近道處處有用之微熬不可近眼臣禹錫等謹按蜀本圖經云苗高二三尺葉似白前及柳葉根皮黃似桑根正月二月花發紫碧色葉未生時收曬乾三月即葉生花落不堪用也藥性論云芫花使有大毒能治心腹脹滿去水氣利五臟寒痰涕唾如膠者主通利血脈治惡瘡風痹濕一切毒風如肢攣急不能行步能瀉水腫脹滿日華子云療嗽瘴瘧所在有小樹子在陂澗旁三月中盛花淺紫色圖經曰芫花生淮源川穀今在處有之宿根舊枝莖紫長一二尺根入土深三五寸白色似榆根春生苗葉小而尖似楊柳枝葉二月開紫花頗似紫荊而作穗又似藤花而細三月三日採陰乾其花須未成蕊蒂細小未生葉時收之葉生花落即不堪用吳普本草云芫花一名敗華一名兒草一名黃大戟二月生葉加厚則黑華有紫赤白者三月實落盡葉乃生是也而今絳州出者花黃謂之黃芫花漢太倉公淳于意治臨淄女子薄吾蟯音饒瘕蟯瘕為病腹大上膚黃粗循之戚戚然意飲以芫花一撮即出蟯可數升病遂愈張仲景治太陽中風吐下嘔逆者可攻十棗湯主之芫花熬甘遂大戟三物等分停各篩末取大棗十枚水一升半煮取八合去渣納諸藥強人一錢匕贏人半匕溫服之不下明旦更加半匕下後藤粥自養病懸飲者亦主之胡洽治水腫及支飲澼飲加大黃甘草並煎五物各一兩棗十枚同煮如法一方又加芒硝一兩湯成下之又千金方凝雪湯療天行毒病七八日熱積聚胸中煩亂欲死起人死㩉方取芫花一斤以水三升煮取一升半漬故布薄胸上不過再三薄熱則除當溫四肢護厥逆也吳普又云芫花根一名赤芫根神農辛雷公苦有毒生邯鄲八月九月採陰乾久服令人泄右方亦入藥用古今録驗療暴中冷傷寒鼻塞喘嗽喉中啞塞失音聲者取芫花一虎口切曝乾令病人以薦自縈就裹舂芫花根令飛楊入其七孔中當眼淚出口鼻皆羅刺畢畢耳勿住令芫根盡則止病必於此瘥經驗方治痔瘻有頭方用芫花入土根不限多少以淨水洗卻入木臼搗用少許水絞取汁於銀銅器內慢火煎成膏將絲線於膏內度過系痔系時微痛候心躁落時以紙拈子入膏藥於竅內永除根本未落不得使水三國志魏初平中有青牛先生常服芫花年如五六十人或親識之謂其已百餘歲矣二十六種陳藏器余栟櫚木皮味苦澀平無毒燒作灰主破血止血初生子黃白色作房如魚子有小毒破血但戟人喉未可輕服皮作繩入土千歲不爛昔有人開冢得之索已生根此木類嶺南有虎散桄榔冬葉蒲葵椰子檳榔多羅等皆相似各有所用栟櫚一名棕櫚即今川中棕櫚海藥云謹按徐表南州記云生嶺南山谷平溫主金瘡疥癬生肌止血並宜燒灰使用其實黃白色有大毒不堪服食也楸木皮味苦小寒無毒主吐逆殺三蟲及皮膚蟲煎膏黏敷惡瘡疽瘻癰腫疳野雞病除膿血生肌膚長筋骨葉搗敷瘡腫亦煮湯洗膿血冬取干葉湯揉用之範汪方諸腫癰潰及內有刺不出者取楸葉十重貼之生山谷間亦植園林以為材用與梓樹本同末異若柏葉之有松身蘇敬以二木為一誤也其分析在解紛條中矣圖經文具梓白皮條下海藥云微溫主消食澀腸下氣及上氣咳嗽並宜入面藥聖惠方治頭極癢不痛出瘡用楸葉不限多少少搗絞汁塗之又方治炙瘡多時不瘥癢痛出黃水用楸葉或根皮搗羅為末敷瘡上即瘥外臺祕要療癰腫煩困生楸葉十重貼之布帛裹緩急得所日三易止痛消腫食膿血良無比勝於衆藥冬以先收乾者臨時鹽湯沃潤用之又主患癰破下膿訖著甕藥塞瘡孔瘡痛煩悶困極方楸葉十重去甕藥下怗之以布帛裹緩急得所日再三易之痛悶即止此法大良無比勝於衆法主癰疽潰後及凍瘡有剌不出甚良冬無楸葉當早收之臨時以鹽湯沃之令擇日亦佳薄削楸白皮用之亦得又方療口吻瘡楸枝皮白濕貼上數易千金翼治小兒頭髮不生取楸葉中心搗絞塗之肘後方治瘻煎楸枝作煎淨洗瘡子孔中大效子母祕録治小兒頭上瘡發不生楸葉搗汁塗瘡上發即生兼白禿沒離梨味辛平無毒主上氣下食生西南諸國以毗梨勒上有毛少許也海藥云微溫主消食澀腸下氣及上氣咳嗽並宜入面藥柯樹皮味辛平有小毒主大腹水病取白皮作煎令可丸如梧桐子大平旦三丸須臾又一丸一名木奴南人用作大船者也海藥云謹按廣志云生廣南山谷臨海志云是木奴樹主浮氣採皮以水煮去滓復煉候凝結丸得為度每朝空心飲下三丸浮氣水腫並從小便出故波斯家用為船舫也敗扇主蚊子新造屋柱下四隅埋之蚊永不入燒為末和粉粉身上主汗彌敗者佳免去王切根一作秸味辛平小毒主水癊取根白皮煮汁服之一盞當下水如病已困取根搗碎坐其取氣水自下又能爛人牙齒齒有蟲者取片子許大納孔中當自爛落生以南山谷高丈許直上無枝莖上有刺山人折取頭茹食之亦治冷氣一名吻頭橉良刃切木灰味甘溫小毒主卒心腹癥瘕堅滿痃癖燒為白灰淋取汁以釀酒酒熟漸漸從半合溫服增至一二盞即愈此灰入染家用生江南深山大樹樹有數種取葉厚大白花者入藥自余用染灰一名橝音潭灰本經汗於病者床下灰之勿令病人知也郢桐皮而郢切味甘溫無毒主爛絲葉搗封蛇蟲蜘蛛咬皮為末服之亦主蠶咬毒入肉者雞犬食欲死煮汁灌之絲爛即瘥樹似青桐葉有丫生山谷人取皮以漚絲也竹肉味鹹溫有大毒主殺三蟲毒邪氣破老血灰汁煮三度煉訖然後依常菜茹食之煉不熟者戟人喉出血手爪盡脫生苦竹枝上如雞子似肉臠應別有功人未盡識之一名竹實也桃竹筍味苦有小毒主六畜瘡中蛆搗碎納之蛆盡出亦如皂李葉能殺蛆蟲南人謂之黃筍灰汁煮可食不爾戟人喉其竹叢生醜類非一張鼎食療云慈竹夏月逢雨滴汁著地生蓐似鹿角色白取洗之和薑醬食之主一切赤白痢極驗罌子桐子有大毒壓為油毒鼠主死摩疥癬蟲瘡毒腫一名虎子桐似梧桐生山中馬瘍木根皮有小毒主惡瘡疥癬有蟲者為末和油塗之出江南山谷樹如櫪也木細辛味苦溫有毒主腹內結積癥瘕大便不利推陳去惡破冷氣未可輕服令人利下至困生終南山冬月不凋苗如大戟根似細辛百家箸主狂狗咬乞取煎汁飲之又燒箸頭為灰敷吻上燕口瘡樳木皮葉煮洗蛇咬亦可作屑敷之樳大木也出江南也刀鞘無毒主鬼打卒得取二三寸燒末服水下之此是長刀鞘也腰刀彌佳芺音夭樹有大毒主風痹偏枯筋骨攣縮癱瘓皮膚不仁疼冷等取枝葉搗碎大甑中蒸令熱鋪著床上展臥其中冷更易骨節間風盡出當得大汗補藥及羹粥食之慎風冷勞復生江南深山葉長厚冬月不凋山人總識之丹桎木皮主癧瘍風取一握去上黑打碎煎如糖塗風上桎木似杉木生江南深山結殺味香主頭風去白屑生髮入膏藥用之生西國樹花胡人將香油敷頭也杓打人身上結筋二下筋散矣車家雞棲木無毒主失音不語雜方云作灰服一升立效也檀秦皮注蘇云檀似秦皮按檀樹取其皮和榆皮食之可斷谷爾雅云檀苦荼其葉堪為飲樹體細堪作斧柯至夏有不生者忽然葉開當有大水農人候之以則水旱號為水檀又有一種葉如檀高五六尺生高原花四月開色正紫亦名檀根如葛極主瘡疥殺蟲有小毒也爾雅無檀苦荼唯言檟苦荼郭注樹小似梔子冬生葉可煮作羹今早採者為荼晚採者為茗一名菽蜀人呼名之苦荼前面已有茗苦荼又引爾雅疑此誤矣石荊欒荊注蘇云用當欒荊非也按石荊似荊而小生水旁作灰汁沐頭生髮廣濟方云一名水荊主長髮是也木黎蘆漏蘆注陶云漏蘆一名鹿驪生山南人用苗北人用根功在本經木梨蘆有毒非漏蘆樹生如茱萸樹高三尺有毒殺蟲山人以瘡疥用之爪蘆苦菜注陶云又有爪蘆木似茗取葉煎飲通夜不寐按此木一名皋蘆而葉大似茗味苦澀南人煮為飲止渴明目除煩不睡消痰和水當茗用之廣州記曰新平縣出皋蘆葉大而澀南越志云龍川縣有皋蘆葉似茗土人謂之過羅諸木有毒合口椒有毒椒白色有毒木耳惡蛇蟲從下過有毒生楓木上者令人笑不止採歸色變者有毒夜中視光有毒欲爛不生蟲者有毒並生搗冬瓜蔓主之也
