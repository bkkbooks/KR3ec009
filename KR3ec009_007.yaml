body:
  text: 卷第七己酉新增衍義藍實味苦寒無毒主解諸毒殺蟲蚑音其小兒鬼也疰鬼螫毒久服頭不白輕身其葉汁殺百藥毒解狼毒射罔毒其莖葉可以染青生河內平澤陶隱居云此即今染䌝音禁碧所用者至解毒人卒不能得生藍汁乃浣䌝布汁以解之亦善以汁塗五心又止煩悶尖葉者為勝甚療蜂螫毒唐本注云藍實有三種一種圍徑二寸許厚三四分出嶺南云療腫毒太常名此草為木藍子如陶所引乃是菘藍其汁抨普更切為澱音殿者按經所用乃是蓼藍實也其苗似蓼而味不辛者此草汁療熱毒諸藍非比且二種藍今並堪染菘藍為澱唯堪染青其蓼藍不堪為澱唯作碧色爾臣禹錫等謹按蜀本圖經云葉似水蓼花紅白色子若蓼子而大黑色今所在下濕地有人皆種之爾雅云葴馬藍注今大葉冬藍也疏今為澱者是也藥性論云藍實君味甘能填骨髓明耳目利五臟調六腑利關節治經絡中結氣使人健少睡益心力藍汁止心煩躁解蠱毒日華子云吳藍味苦甘冷無毒治天行熱狂疔瘡遊風熱毒腫毒風疹除煩止渴殺疳解毒藥毒箭金瘡血悶蟲蛇傷毒刺鼻洪吐血排膿寒熱頭痛赤眼産後血暈解金石藥毒解狼毒射罔毒小兒壯熱熱疳陳藏器云蘇云菘藍造澱按澱多是槐藍蓼藍作者入藥勝槐藍澱寒敷熱瘡解諸毒滓敷小兒禿瘡熱腫初作上沫堪染如青黛解毒小兒丹熱和水服之藍有數種蓼藍最堪入藥甘藍北人食之去熱黃也又云青布味鹹寒主解諸物毒天行煩毒小兒寒熱丹毒並水漬取汁飲燒作黑灰敷惡瘡經年不瘥者及灸瘡止血令不中風水和蠟熏惡瘡入水不爛熏嗽殺蟲熏虎狼咬瘡出水毒又於器中燒令煙出以器口燻人中風水惡露等瘡行下得惡汁知痛癢瘥又入諸膏藥療疔腫狐刺等惡瘡又浸汁和生薑煮服止霍亂真者入用假者不中圖經曰藍實生河內平澤今處處有之人家蔬圃中作畦種蒔三月四月生苗高三二尺許葉似水蓼花紅白色實亦若蓼子而大黑色五月六月採實按藍有數種有木藍出嶺南不入藥有菘藍可以為澱者亦名馬藍爾雅所謂葴馬藍是也有蓼藍但可染碧而不堪作澱即醫方所用者也又福州有一種馬藍四時俱有葉類苦益菜土人連根採之焙搗下篩酒服錢匕治婦人敗血甚佳又江寧有一種吳藍二三月內生如蒿狀葉青花白性寒去熱解毒止吐血此二種雖不類而俱有藍名又古方多用吳藍者或恐是此故並附之後漢趙歧作藍賦其序云余就醫偃師道經陳留此境人皆以種藍染紺為業藍田彌望黍稷不殖至今近京種藍特盛云藍汁治蟲豸傷咬劉禹錫傳信方著其法云取大藍汁一碗入雄黃麝香二物隨意看多少細研投藍汁中以點咬處若是毒者即並細服其汁神異之極也昔張薦員外在劍南為張廷賞判官忽被斑蜘蛛咬項上一宿咬處有二道赤色細如箸繞項上從胸前下至心經兩宿頭面腫疼如數升碗大肚漸腫幾至不救張相素重薦因出家財五百千並薦家財又數百千募能療者忽一人應召云可治張相初甚不信欲驗其方遂令目前合藥其人云不惜方當療人性命耳遂取大藍汁一瓷碗取蜘蛛投之藍汁良久方出得汁中甚困不能動又別搗藍汁加麝香末更取蜘蛛投之至汁而死又更取藍汁麝香復加雄黃和之更取一蜘蛛投汁中隨化為水張相及諸人甚異之遂令點於咬處兩日內悉平愈但咬處作小瘡痂落如舊又中品著青黛條云從胡國來及太原廬陵南康等染澱亦堪敷熱毒等染甕上池沫紫碧色者同青黛功聖惠方治時氣熱毒心神煩躁用藍澱半大匙以新汲水一盞服又方治小兒中蠱下血欲死搗青藍汁頻頻服半合千金方治唇上生瘡連年不瘥以八月藍葉一斤搗取汁洗不過三日瘥又方治自縊死以藍汁灌之又極須安定其心徐緩解慎勿割斷繩抱取心下猶溫者刺雞冠血滴著口中即活也男雌女雄又方熊傷人瘡燒青布熏瘡口毒出仍煮葛根令濃汁以洗瘡日十度並搗葛根為散煮葛根汁服方寸匕日五服瘥又方治鱉症藍葉一斤搗以水三升絞取汁服一升日二千金翼治急疳蝕鼻口數日欲死取藍澱敷之令遍日十度夜四度瘥肘後方治人身體重小腹急熱上衝胸頭重不能舉眼中生䁾膝脛拘急欲死取藍一把水五升鼠屎兩頭尖者二七枚煮取二升盡服之溫覆取汗葛氏方新被毒箭搗藍青絞汁飲並敷瘡上如無藍可漬青布絞汁飲之亦以治瘡中又方中水毒搗藍青汁以少水和敷頭面身上令匝又方服藥過劑煩悶及中毒煩悶欲死搗藍取汁服數升無藍浣清絹取汁飲亦佳又方食杏仁中毒藍子汁解之梅師方治虎傷人瘡取青布緊卷作纏燒頭納竹筒中射瘡口令煙燻入瘡中佳又方治上氣咳嗽呷呀息氣喉中作聲唾黏以藍實葉水浸良久搗絞取汁一升空腹頻服須臾以杏仁研取汁煮粥食之一兩日將息依前法更服吐痰盡方瘥子母祕録治小兒赤痢搗青藍汁二升分四服又方治小兒丹藍澱敷熱即易廣五行記永徽中絳州僧病噎不下食告弟子吾死之後便可開吾胸喉視有何物言終而卒弟子依言而開視胸中得一物形似魚而有兩頭遍體是肉鱗弟子致器中跳躍不止戲以諸味皆隨化盡時夏中藍盛作澱有一僧以澱致器中此蟲遂繞器中走須臾化為水矣衍義曰藍實即大藍實也謂之蓼藍非是爾雅所説是解諸藥等毒不可闕也實與葉兩用注不解實只解藍葉為未盡經所説盡矣藍一本而有數色刮竹青緑雲碧青藍黃豈非青出於藍而青於藍者也生葉汁解藥毒此即大葉藍又非蓼藍也蓼藍即堪揉汁染翠碧花成長穗細小淺紅色芎藭味辛溫無毒主中風入腦頭痛寒痹筋攣緩急金瘡婦人血閉無子除腦中冷動面上遊風去來目淚出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脅風痛溫中內寒一名胡窮一名香果其葉名蘼蕪生武功川穀斜谷西嶺三月四月採根曝乾得細辛療金瘡止痛得牡蠣療頭風吐逆白芷為之使陶隱居云今唯出歷陽節大莖細狀如馬銜謂之馬銜芎藭蜀中亦有而細人患齒根血出者含之多瘥苗名蘼蕪亦入藥別在下説俗方多用道家時須爾胡居土云武功去長安二百里正長安西與扶風狄道相近斜谷是長安西嶺下去長安一百八十里山連接七百里唐本注云今出秦州其人間種者形塊大重實多脂潤山中採者瘦細味苦辛以九月十月採為佳今云三月四月虛惡非時也陶不見秦地芎藭故云唯出歷陽歷陽出者今不復用臣禹錫等謹按蜀本圖經云苗似芹胡荽蛇床輩叢生花白今出秦州者為善九月採根乃佳吳氏云芎藭神農黃帝岐伯雷公辛無毒扁鵲酸無毒季氏生溫熟寒或生胡無桃山陰或泰山葉香細青黑文赤如藁本冬夏叢生五月華赤七月實黑莖端兩葉三月採根有節似馬銜狀藥性論云芎藭臣能治腰腳軟弱半身不遂主胞衣不出治腹內冷痛日華子云畏黃連治一切風一切氣一切勞損一切血補五勞壯筋骨調衆脈破癥結宿血養新血長肉鼻洪吐血及溺血痔瘻腦癰發背瘰癧癭贅瘡疥及排膿消瘀血圖經曰芎藭生武功山谷斜谷西嶺蘼蕪芎藭苗也生雍州川澤及冤句今關陝蜀川江東山中多有之而以蜀川者為勝其苗四五月間生葉似芹胡荽蛇床輩作叢而莖細淮南子所謂夫亂人者若芎藭之與藁本蛇床之與蘼蕪是也其葉倍香或蒔於園庭則芬馨滿徑江東蜀川人採其葉作飲香云可以已泄瀉七八月開白花根堅瘦黃黑色三月四月採曝乾一云九月十月採為佳三月四月非時也關中出者俗呼為京芎並通用唯貴形塊重實作雀腦狀者謂之雀腦芎此最有力也蘼蕪一名蘄古芹字古方切古方單用芎藭含咀以主口齒疾近世或蜜和作指大丸欲寢服之治風痰殊佳聖惠方治婦人崩中下血晝夜不止以芎藭一兩銼酒一大盞煎至五分去滓入生地黃汁二合煎三兩沸食前分二服千金方治崩中晝夜不止芎藭八兩清酒五升煎取二升半分三服不耐者徐徐進之經驗後方治頭風化痰川芎不計分量用淨水洗浸薄切片子日乾或焙杵為末煉蜜為丸如小彈子大不拘時茶酒嚼下一丸斗門方治偏頭疼用京芎細銼酒浸服之佳靈苑方治婦人經絡住經三個月驗胎法川芎生為末空心濃煎艾湯下一匙頭腹內微動者是有胎也續十全方治胎忽因倒地忽舉動擎重促損腹中不安及子死腹中以芎藭為末酒服方寸匕須臾一二服立出又方風齒敗口臭但含芎藭御藥院方真宗賜高公相國去痰清目進飲食生犀丸川芎十兩緊小者粟米泔浸三日換切片子日乾為末作兩料每料入麝腦各一分生犀半兩重湯煮蜜杵為丸小彈子大茶酒嚼下一丸痰加硃砂半兩膈雍加牛黃一分水飛鐵粉一分頭目昏眩加細辛一分口眼喎斜加炮天南星一分春秋注云麥曲鞠窮所以御濕簡文帝勸醫文麥曲芎藭才止河魚之腹衍義曰芎藭今出川中大塊其里色白不油色嚼之微辛甘者佳他種不入藥止可為末煎湯沐浴此藥今人所用最多頭面風不可闕也然須以他藥佐之沈括云豫一族子舊服芎藭醫鄭叔熊見之云芎藭不可久服多令人曝死後族子果無疾而卒又朝士張子通之妻病腦風服芎藭甚久亦一旦暴亡皆目見者此蓋單服耳若單服既久則走散真氣既使他藥佐使又不久服中病便已則烏能至此也蘼蕪味辛溫無毒主咳逆定驚氣辟邪惡除蠱毒鬼疰去三蟲久服通神主身中老風頭中久風風眩一名薇蕪一名茳蘺芎藭苗也生雍州川澤及冤句四月五月採葉曝乾陶隱居云今出歷陽處處亦有人家多種之葉似蛇床而香騷人藉以為譬方藥用甚稀唐本注云此有二種一種似芹葉一種如蛇床香氣相似用亦不殊爾臣禹錫等謹按爾雅云蘄苣蘼蕪注香草葉小如萎狀疏引郭云如萎蔫之狀圖經曰蘼蕪説文已具芎藭條下廣志曰蘼蕪香草魏武帝以藏衣中管子曰五沃之土生蘼蕪郭璞贊曰蘼蕪香草亂之蛇床不隕其貴自烈以芳黃連味苦寒微寒無毒主熱氣目痛眥傷泣出明目腸澼腹痛下痢婦人陰中腫痛五臟冷熱久下泄澼膿血止消渴大驚除水利骨調胃厚腸益膽療口瘡久服令人不忘一名王連生巫陽川穀及蜀郡泰山二月八月採黃芩龍骨理石為之使惡菊花芫花玄參白蘚畏款冬勝烏頭解巴豆毒陶隱居云巫陽在建平今西間者色淺而虛不及東陽新安諸縣最勝臨海諸縣者不佳用之當布裹挪去毛令如連珠俗方多療下痢及渴道方服食長生唐本注云蜀道者粗大節平味極濃苦療渴為最江東者節如連珠療痢大善今澧州者更勝今注醫家見用宣州九節堅重相擊有聲者為勝臣禹錫等謹按蜀本圖經云苗似茶花黃叢生一莖生三葉高尺許冬不凋江左者節高若連珠蜀都者節下不連珠今秦地及杭州柳州者佳藥性論云黃連臣一名支連惡白殭蠶忌豬肉惡冷水殺小兒疳蟲點赤眼昏痛鎮肝去熱毒蕭炳云今出宣州絶佳東陽亦有歙州處州者次陳藏器云主羸瘦氣急日華子云治五勞七傷益氣止心腹痛驚悸煩躁潤心肺長肉止血並瘡疥盜汗天行熱疾豬肚蒸為丸治小兒疳氣圖經曰黃連生巫陽川穀及蜀郡泰山今江湖荊夔州郡亦有而以宣城者為勝施黔者次之苗高一尺以來葉似甘菊四月開花黃色六月結實似芹子色亦黃二月八月採根用生江左者根若連珠其苗經冬不凋葉如小雉尾草正月開花作細穗淡白微黃色六七月根緊始堪採古方以黃連為治痢之最胡洽方載九盞湯主下痢不問冷熱赤白谷滯休息久下悉主之以黃連長三寸三十枚稱重一兩半龍骨如棋子四枚重四分附子大者一枚乾薑一兩半膠一兩半並切先以水五合著銅器中去火三寸煎沸便下著生土上沸止又上水五合如此九上九下納諸藥著火上沸輒下著土上沸止又復九上九下度可得一升頓服即止又香連丸亦主下痢近世盛行其法以宣連青木香分兩停同搗篩白蜜丸如梧子空腹飲下二三十丸日再如神其久冷人即用煨熟大蒜作丸此方本出李絳兵部手集方嬰孺用之亦效又治目方用黃連多矣而羊肝丸尤奇異取黃連末一大兩白羊子肝一具去膜同於砂盆內研令極細衆手拈為丸如梧子每食以暖漿水吞二七枚連作五劑瘥但是諸眼目疾及障翳青盲皆主之禁食豬肉及冷水劉禹錫云有崔承元者因官治一死罪囚出活之囚後數年以病自致死一旦崔為內障所苦喪明逾年後半夜嘆息獨坐時聞階除間悉窣之聲崔問為誰曰是昔所蒙活者囚今故報恩至此遂以此方告訖而沒崔依此合服不數月眼復明因傳此方於世又今醫家洗眼湯以當歸芍藥黃連等分停細切以雪水或甜水煎濃汁乘熱洗冷即再溫洗甚益眼目但是風毒赤目花翳等皆可用之其説云凡眼目之病皆以血脈凝滯使然故以行血藥合黃連治之血得熱即行故乘熱洗之用者無不神效雷公云凡使以布拭上肉毛然後用漿水浸二伏時漉出於柳木火中焙乾用若服此藥得十兩不得食豬肉若服至三年不得食豬肉一生也外臺祕要治卒心痛黃連八兩一味㕮咀以水七升煮取五升絞去滓寒溫飲五合日三服又方治目卒癢目痛末黃連乳汁浸點眥中止千金方治大熱毒純血痢宣連六兩以水七升煮取三升半夜露星月下平旦空腹頓服之少臥將息肘後方治眼淚出不止濃汁漬綿干拭目又方赤痢熱下久不止黃連末雞子白丸飲服十丸三十丸即瘥又方治卒消渴小便多搗黃連絹篩蜜和服三十丸治渴延年又方赤白痢下令人下部疼重故名重下出膿血如雞子白日夜數十行絞臍痛治之黃連一升酒五升煮取一升半分再服當小絞痛經驗方治暴赤白痢如鵝鴨肝者痛不忍黃連黃芩各一兩以水二升煎取一升分三服熱吃冷即凝矣梅師方傷寒病發豌豆瘡未成膿方黃連四兩水三升煎取一升去滓分服斗門方治痔疾有頭如雞冠者用黃連末敷之即瘥更加赤小豆末尤良簡要濟衆小兒吐血不止以一兩去須搗為散每服一錢水七分入豉二十粒同煎至五分去滓溫服量兒大小加減進博濟方治久患脾泄神聖香黃散宣連一兩生薑四兩一處以慢火炒令薑乾脆色深去薑取連搗末每服二錢匕空心臘茶清下甚者不過二服瘥勝金方治眼黃連丸宣連不限多少捶碎用新汲水一大碗浸至六十日後用綿濾過取汁入元碗內卻於重湯上熬不住以匙蕩攪候乾為度即穿地坑子可深一尺以瓦鋪底將熟艾四兩坐在瓦上以火然如灸法然後以藥碗覆上四畔封泥開孔令煙出盡即止取出刮下丸如小豆大每服十丸甜竹葉湯下又方治久痢纍醫不瘥黃連一兩為末以雞子白和為餅炙令如紫肝色杵為末以漿水三升慢火煎成膏白痢加酒半盞同煎每服半合溫米飲調下食前服廣利方治骨節熱積漸黃瘦黃連四分碎切以童子小便五大合浸經宿微煎三四沸去滓食上分兩服如人行四五里再服杜壬治氣痢瀉裡急後重神妙方宣連一兩乾薑半兩各為末每用連二錢薑半錢和勻空心溫酒下子母祕録因驚舉重胎動出血取黃連末酒服方寸匕日三服孫尚藥同又方小兒赤白痢多時體弱不堪宣連濃煎和蜜服日六七服量其大小每煎三分水減二分頻服又方小兒耳後月蝕瘡末黃連敷之又方小兒鼻下兩道赤者名曰𧈟亦名赤鼻疳鼻以米泔洗敷黃連末日三四度佳姚和衆小兒方小兒食土取好土濃煎黃連汁搜之日乾與服抱朴子乳汁煎之治目中百病宋王微黃連贊黃連味苦左右相因斷涼滌暑闡命輕身縉雲昔御飛蹕上旻不行而至吾聞其人梁江淹黃連頌黃連上草丹砂之次御孽闢妖長靈久視驂龍行天馴馬匝地鴻飛以儀順道則利衍義曰黃連今人多用治痢蓋熱以苦燥之義下俚但見腸虛滲泄微似有血便即用之更不知止又不顧寒熱多少但以盡劑為度由是多致危困若氣實初病熱多血利服之便止仍不必盡劑也或虛而冷則不須服余如經絡石味苦溫微寒無毒主風熱死肌癰傷口乾舌焦癰腫不消喉舌腫不通水漿不下大驚入腹除邪氣養腎主腰髖音寬痛堅筋骨利關節久服輕身明目潤澤好顏色不老延年通神一名石鯪音陵一名石蹉一名略石一名明石一名領石一名懸石生泰山川穀或石山之陰或高山岩石上或生人間正月採杜仲牡丹為之使惡鐵落畏貝母菖蒲陶隱居云不識此藥仙俗方法都無用者或云是石類既云或生人間則非石猶如石斛等系石以為名爾唐本注云此物生陰濕處冬夏常青實黑而圓其莖蔓延繞樹石側若在石間者葉細厚而圓短繞樹生者葉大而薄人家亦種之俗名耐冬山南人謂之石血療産後血結大良以其苞絡石木而生故名絡石別録謂之石龍藤主療蝮蛇瘡絞取汁洗之服汁亦去蛇毒心悶刀斧傷諸瘡封之立瘥今按陳藏器本草云絡石煮汁服之主一切風變白宜老在石者良在木者隨木有功生山之陰與薜荔相似更有木蓮石血地錦等十餘種藤並是其類大略皆主風血暖腰腳變白不衰若呼石血為絡石殊誤爾石血葉尖一頭赤絡石葉圓正青臣禹錫等謹按蜀本圖經云生木石間凌冬不凋葉似細橘蔓延木石之陰莖節著處即生根鬚包絡石旁花白子黑今所在有六月七月採莖葉日乾藥性論云絡石君惡鐵精殺孽毒味甘平主治喉痹陳藏器云地錦味甘溫無毒主破老血産後血結婦人瘦損不能飲食腹中有塊淋瀝不盡赤白帶下天行心悶並煎服之亦浸酒生淮南林下葉如鴨掌藤蔓著地節處有根亦緣樹石冬月不死山人産後用之一名地噤蘇恭注曰絡石石血亦此類也又云扶芳藤味苦小溫無毒主一切血一切氣一切冷去百病久服延年變白不老山人取楓樹上者為附楓藤亦如桑上寄生大主風血一名滂藤隋朝稠禪師作青飲進煬帝以止渴生吳郡採之忌冢墓間者取莖葉細銼煎為煎性冷以酒浸服藤苗小時如絡石薜荔夤緣樹木三五十年漸大枝葉繁茂葉圓長二三寸厚若石葦生子似蓮房中有細子一年一熟子亦入用房破血一名木蓮打破有白汁停久如漆採取無時也又云土鼓藤味苦子味甘溫無毒主風血羸老腹內諸冷血閉強腰腳變白煮服浸酒服生林薄間作蔓繞草木葉頭尖子熟如珠碧色正圓小兒取藤於地打用鼓聲李雍名為常春藤日華子云木蓮藤汁敷白癜癧瘍及風惡疥癬又云常春藤一名龍鱗薜荔圖經曰絡石生泰山川穀或石山之陰或高山岩上或生人間今在處有之宮寺及人家亭圃山石間種以為飾葉圓如細橘正青冬夏不凋其莖蔓延莖節著處即生根鬚包絡石上以此得名花白子黑正月採或云六月七月採莖葉日乾以石上生者良其在木上者隨木性而移薜荔木蓮地錦石血皆其類也薜荔與此極相類但莖葉粗大如藤狀近人用其葉治背癰乾末服之下利即愈木蓮更大如絡石其實若蓮房能壯陽道尤勝地錦葉如鴨掌蔓著地上隨節有根亦緣木石上石血極與絡石相類但葉頭尖而赤耳雷公云凡採得後用粗布揩葉上莖蔓上毛了用熟甘草水浸一伏時出切日乾任用外臺祕要治喉痹咽喉寒喘息不通須臾欲絶神驗以絡石草二兩水一升煎取一大盞去滓細細吃須臾即通背癰圖經云薜荔治背癰晟頃寓宜興縣張渚鎮有一老舉人聚村學年七十餘忽一日患發背村中無他醫藥急取薜荔葉爛研絞汁和蜜飲數升以其滓敷瘡上後以他藥敷貼遂愈醫者云其本蓋得薜荔之力乃知圖經所載不妄蒺藜子味苦辛溫微寒無毒主惡血破癥結積聚喉痹乳難身體風癢頭痛咳逆傷肺肺痿止煩下氣小兒頭瘡癰腫陰㿉可作摩粉其葉主風癢可煮以浴久服長肌肉明目輕身一名旁通一名屈人一名止行一名豺羽一名升推一名即藜一名茨生馮翊平澤或道旁七月八月採實曝乾烏頭為之使陶隱居云多生道上而葉布地子有刺狀如菱而小長安最饒人行多著木屐今軍家乃鑄鐵作之以布敵路亦呼蒺藜易云據於蒺藜言其凶傷詩云牆有茨不可掃也以刺梗穢也方用甚稀爾今按別本注云本經云溫別録云寒此藥性宣通久服不冷而無壅熱則其溫也臣禹錫等謹按爾雅云茨蒺藜注布地蔓生細葉子有三角刺人藥性論云白蒺藜子君味甘有小毒治諸風癧瘍破宿血療吐膿主難産去躁熱不入湯用日華子云治奔豚腎氣肺氣胸膈滿催生並墮胎益精療腫毒及水臟冷小便多止遺瀝泄精溺血入藥不計丸散並炒去刺用圖經曰蒺藜子生馮翊平澤或道旁七月八月採實曝乾又冬採黃白色類軍家鐵蒺藜此詩所謂牆有茨者郭璞注爾雅云布地蔓生細葉子有三角刺人是也又一種白蒺藜今生同州沙苑牧馬草地最多而近道亦有之緑葉細蔓綿布沙上七月開花黃紫色如豌豆花而小九月結實作莢子便可採其實味甘而微腥褐緑色與蠶種子相類而差大又與馬薸子酷相類但馬薸子微大不堪入藥須細辨之今人多用然古方云蒺藜子皆用有刺者治風明目最良神仙方亦有單餌蒺藜云不問黑白但取堅實者舂去刺用兼主痔漏陰汗及婦人髮乳帶下葛洪治卒中五尸搗蒺藜子蜜丸服如胡豆二枚日三愈雷公云凡使採後淨揀擇了蒸從午至酉出日乾於木臼中舂令皮上刺盡用酒拌再蒸從午至酉出日乾用聖惠方治鼻塞多年不聞香臭水出不止以蒺藜二握當道車碾過以水一大盞煮取半盞仰臥先滿口含飯以汁一合灌鼻中不過再灌之嚏出一兩個息肉似赤蛹蟲即瘥外臺祕要治急引腰脊痛搗末蜜和丸酒服如胡豆大二丸日三服又方補肝散治三十年失明蒺藜子七月七日收陰乾搗散食後水服方寸匕又方治腫蒺藜子一升熬令黃搗篩以麻油和如泥炒令焦黑以塗故布上剪如腫大勿開頭㧺上又方治蛔蟲攻心如刺吐清汁七月七日採蒺藜子陰乾作灰先食服方寸匕日三又方治一切疔腫蒺藜子一升作灰以釅酢和封頭上如破塗之佳又方備急小兒蠼螋瘡繞身匝即死以蒺藜搗葉敷之無葉用子亦可千金方塗瘡腫蒺藜蔓洗三寸截之以水五升煮取二升去滓納銅器中又煮取一升納小器中如稠糖下取敷瘡腫上又方治遍身風癢生瘡疥以蒺藜子苗煮湯洗之立瘥千金翼同梅師方治難産礙胎在腹中如已見兒並胞衣不出胎死蒺藜子貝母各四兩為末米湯下一匙相去四五里不下再服孫真人食忌治白癜風以白蒺藜子生搗為末作湯服之神仙祕旨云服蒺藜子一碩當七八月熟時收日乾舂去刺然後杵為末每服二錢新汲水調下日三服勿令中絶斷谷長生服之一年以後冬不寒夏不熱服之二年老者復少發白復黑齒落重生服之三年身輕長生衍義曰蒺藜有兩等一等杜蒺藜即今之道旁布地而生或生牆上有小黃花結芒刺此正是牆有茨者花收摘蔭干為末每服三二錢飯後以溫酒調服治白癜風又一種白蒺藜出同州沙苑收馬處黃紫花作莢結子如羊內腎補腎藥今人多用風家唯用刺蒺藜黃耆味甘微溫無毒主癰疽久敗瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病婦人子臟風邪氣逐五臟間惡血補丈夫虛損五勞羸瘦止渴腹痛泄痢益氣利陰氣生白水者冷補其莖葉療渴及筋攣癰腫疽瘡一名戴糝一名戴椹一名獨椹一名芰草一名蜀脂一名百本生蜀郡山谷白水漢中二月十月採陰乾惡龜甲陶隱居云第一齣隴西叨陽色黃白甜美今亦難得次用黑水宕昌者色白肌膚粗新者亦甘溫補又有蠶陵白水者色理勝蜀中者而冷補又有赤色者可作膏貼用消癰腫俗方多用道家不須唐本注云此物葉似羊齒或如蒺藜獨莖或作叢生今出原州及華原者最良蜀漢不復採用之臣禹錫等謹按蜀本圖經云葉似羊齒草獨莖枝扶疏紫花根如甘草皮黃肉白長二三尺許今原州者好宜州寧州亦佳藥性論云黃耆一名王孫治發背內補主虛喘腎衰耳聾療寒熱生隴西者下補五臟蜀白水赤皮者微寒此治客熱用之蕭炳云出原州華原穀子山花黃日華子云黃耆惡白蘚皮助氣壯筋骨長肉補血破症癖瘰癧癭贅腸風血崩帶下赤白痢産前後一切病月候不勻消渴痰嗽並治頭風熱毒赤目等藥中補益呼為羊肉又云白水耆涼無毒排膿治血及煩悶熱毒骨蒸勞功次黃耆赤水耆涼無毒治血退熱毒余功用並同上木耆涼無毒治煩排膿力微於黃耆遇闕即倍用之圖經曰黃耆生蜀郡山谷白水漢中今河東陝西州郡多有之根長二三尺以來獨莖作叢生枝稈去地二三寸其葉扶疏作羊齒狀又如蒺藜苗七月中開黃紫花其實作莢子長寸許八月中採根用其皮折之如綿謂之綿黃耆然有數種有白水耆有赤水耆有木耆功用並同而力不及白水耆木耆短而理橫今人多以苜蓿根假作黃耆折皮亦似綿頗能亂真但苜蓿根堅而脆黃耆至柔韌皮微黃褐色肉中白色此為異耳唐許裔宗初仕陳為新蔡王外兵參軍時柳太后感風不能言脈沉而口噤裔宗曰既不能下藥宜湯氣熏之藥入腠理周時可瘥乃造黃耆防風湯數斛置於床下氣如煙霧其夕便得語藥力熏蒸其效如此因附著之使善醫者知所取法焉雷公云凡使勿用木耆草真相似只是生時葉短並根橫先須去頭上皺皮了蒸半日出後用手擘令細於槐砧上銼用聖惠方治肺壅得吐以黃耆二兩杵為細末每服三錢水一中盞煎至六分溫服日三四服又方治緩疽以一兩杵散不計時候溫水調下二錢匕外臺祕要主甲疽瘡腫爛生腳指甲邊赤肉出時瘥時發者以黃耆二兩䕡茹三兩苦酒浸一宿以豬脂五合微火上煎取三合絞去滓以封瘡上日三兩度其肉即消肘後方治酒疸心懊痛足脛滿小便黃飲酒發赤黑黃斑由大醉當風入水所致黃耆二兩木蘭一兩為末酒服方寸匕日三服梅師方補肺排膿以黃耆六兩銼碎以水三升煎取一升去滓服初虞世治陷甲生入肉常有血疼痛黃耆當歸等分為末貼瘡上若有惡肉更研少硫黃末同貼孫用和治腸風瀉血黃耆黃連等分右為末麵糊丸如緑豆大每服三十丸米飲下席延賞治虛中有熱咳嗽膿血口舌咽乾又不可服涼藥好黃耆四兩甘草一兩為末每服三錢如茶點羹粥中亦可服別説云謹按黃耆本出綿上為良故名綿黃耆今圖經所繪憲水者即綿上地相鄰爾若以謂柔韌如綿即謂之綿黃耆然黃耆本皆柔韌若偽者但以乾脆為別爾衍義曰防風黃耆世多相須而用唐許嗣嗣本羊晉切犯廟諱今改為嗣宗為新蔡王外兵參軍王太后病風不能言脈沉難對醫告術窮嗣宗曰餌液不可進即以黃耆防風煮湯數十斛置床下氣如霧重薄之是夕語肉蓯蓉味甘酸咸微溫無毒主五勞七傷補中除莖中寒熱痛養五臟強陰益精氣多子婦人癥瘕除膀胱邪氣腰痛止痢久服輕身生河西山谷及代郡雁門五月五日採陰乾陶隱居云代郡雁門屬並州多馬處便有言是野馬精落地所生生時似肉以作羊肉羹補虛乏極佳亦可生啖芮芮河南間至多今第一齣隴西形扁廣柔潤多花而味甘次出北國者形短而少花巴東建平間亦有而不如也唐本注云此注論草蓯蓉陶未見肉者今人所用亦草蓯蓉刮去花用代肉爾本經有肉蓯蓉功力殊勝比來醫人時有用者臣禹錫等謹按蜀本圖經云出肅州祿福縣沙中三月四月掘根切取中央好者三四寸繩穿陰乾八月始好皮如松子鱗甲根長尺余其草蓯蓉四月中旬採長五六寸至一尺以來莖圓紫色採取壓令扁日乾原州秦州靈州皆有之吳氏云肉蓯蓉一名肉鬆蓉神農黃帝咸雷公酸季氏小溫生河西山陰地長三四寸叢生或代郡二月至八月採藥性論云肉蓯蓉臣益髓悅顏色延年治女人血崩壯陽日御過倍大補益主赤白下補精敗面黑勞傷用蓯蓉四兩水煮令爛薄切細研精羊肉分為四度五味以米煮粥空心服之日華子云治男絶陽不興女絶陰不産潤五臟長肌肉暖腰膝男子泄精尿血遺瀝帶下陰痛據本草云即是野馬精餘瀝結成採訪人方知勃落樹下並土塹上此即非馬交之處陶説誤耳又有花蓯蓉即是春抽苗者力較微耳圖經曰肉蓯蓉生河西山谷及代郡雁門今陝西州郡多有之然不及西羌界中來者肉厚而力緊舊説是野馬遺瀝落地所生今西人云大木間及土塹垣中多生此非遊牝之所而乃有則知自有種類耳或凝其初生於馬瀝後乃滋殖如茜根生於人血之類是也皮如松子有鱗甲苗下有一細扁根長尺余三月採根採時掘取中央好者以繩穿陰乾至八月乃堪用本經云五月五日採五月恐已老不堪故多三月採之西人多用作食品啖之刮去鱗甲以酒淨洗去黑汁薄切合山芋羊肉作羹極美好益人食之勝服補藥又有一種草蓯蓉極相類但根短莖圓紫色比來人多取刮去花壓令扁以代肉者功力殊劣耳又下品有列當條云生山南岩石上如藕根初生掘取陰乾亦名草蓯蓉性溫補男子疑即是此物今人鮮用故少有辨之者因附見於此陳藏器序云強筋健髓蓯蓉鱔魚為末黃精酒丸服之力可十倍此説出干寧記雷公云凡使先須用清酒浸一宿至明以棕刷刷去沙土浮甲盡劈破中心去白膜一重如竹絲草樣是此偏隔人心前氣不散令人上氣不出凡使用先須酒浸並刷草了卻蒸從午至酉出又用酥炙得所衍義曰肉蓯蓉圖經以謂皮如松子有鱗子字當為殼於義為允又曰以酒淨洗去黑汁作羹黑汁既去氣味皆盡然嫩者方可作羹老者苦入藥少則不效防風味甘辛溫無毒主大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痹煩滿脅痛脅風頭面去來四肢攣急字乳金瘡內痙久服輕身葉主中風熱汗出一名銅藝一名茴草一名百枝一名屏風一名蕳根一名百蜚生沙苑川澤及邯鄲琅邪上蔡二月十月採根曝乾得澤瀉藁本療風得當歸芍藥陽起石禹餘糧療婦人子臟風殺附子毒惡乾薑藜蘆白蘞芫花陶隱居云郡縣無名沙苑今第一齣彭城蘭陵即近琅邪者郁州互市亦得之次出襄陽義陽縣界亦可用即近上蔡者唯實而脂潤頭節堅如蚯蚓頭者為好俗用療風最要道方時用唐本注云今出齊州龍山最善淄州兗州青州者亦佳葉似牡蒿附子苗等別録云叉頭者令人發狂叉尾者發痼疾子似胡荽而大調食用之香而療風更優也沙苑在同州南亦出防風輕虛不如東道者陶云無沙苑誤矣襄陽義陽上蔡元無防風陶乃妄注爾臣禹錫等謹按蜀本圖經云葉似牡蒿白花八月九月採根藥性論云防風臣花主心腹痛四肢拘急行履不得經脈虛羸主骨節間疼痛段成式酉陽雜俎云青州防風子可亂蓽茇日華子云治三十六般風男子一切勞劣補中益神風赤眼止淚及癱緩通利五臟關脈五勞七傷羸損盜汗心煩體重能安神定志勻氣脈圖經曰防風生沙苑川澤及邯鄲上蔡今京東淮浙州郡皆有之根土黃色與蜀葵根相類莖葉俱青緑色莖深而葉淡似青蒿而短小初時嫩紫作菜茹極爽口五月開細白花中心攢聚作大房似蒔蘿花實似胡荽而大二月十月採根曝乾關中生者三月六月採然輕虛不及齊州者良又有石防風出河中府根如蒿根而黃葉青花白五月開花六月採根曝乾亦療頭風眩痛又宋亳間及江東出一種防風其苗初春便生嫩時紅紫色彼人以作菜茹味甚佳然云動風氣本經云葉主中風熱汗出與此相反恐別是一種耳經驗後方治破傷風防風天南星等分為末每服二三匙童子小便五升煎至四升服愈即止又方治崩中防風去蘆頭炙赤色為末每服二錢以麵糊酒調下更以麵糊酒投之此藥纍經有效衍義文具黃耆條下蒲黃味甘平無毒主心腹膀胱寒熱利小便止血消瘀血久服輕身益氣力延年神仙生河東池澤四月採陶隱居云此即蒲釐力之切花上黃粉也伺其有便拂取之甚療血仙經亦用此臣禹錫等謹按藥性論云蒲黃君通經脈止女子崩中不住主痢血止鼻衄治尿血利水道日華子云蒲黃治撲血悶排膿瘡癤婦人帶下月候不勻血氣心腹痛妊孕人下血墜胎血暈血症兒枕急痛小便不通腸風瀉血遊風腫毒鼻洪吐血下乳止泄精血痢此即是蒲上黃花入藥要破血消腫即生使要補血止血即炒用蒲黃篩下後有赤滓名為萼炒用甚澀腸止瀉血及血痢圖經曰蒲黃生河東池澤香蒲蒲黃苗也生南海池澤今處處有之而泰州者為良春初生嫩葉未出水時紅白色茸茸然周禮以為菹謂其始生取其中心入地大如匕柄白色生啖之甘脆以苦酒浸如食筍大美亦可以為鮓今人罕復有食者至夏抽梗於叢葉中花抱梗端如武士捧杵故俚俗謂蒲捶亦謂之蒲釐花黃即花中蕊屑也細若金粉當其欲開時有便取之市廛間亦採以蜜搜作果食貨賣甚益小兒醫家又取其粉下篩後有赤滓謂之蒲萼入藥以澀腸已泄殊勝雷公云凡使勿用松黃並黃蒿其二件全似只是味跙及吐人凡欲使蒲黃須隔三重紙焙令色黃蒸半日卻焙令乾用之妙千金方治重舌舌上生瘡涎出以蒲黃敷之不過三度瘥又方治丈夫陰下濕癢蒲黃末敷之三四良肘後方治腸痔每大便常血水服蒲黃方寸匕日三服良葛氏方忍小便久致胞轉以蒲黃裹腰腎令頭致地三度通又方若血內漏者蒲黃二兩水服方寸匕立止梅師方治産後血不下蒲黃三兩水三升煎取一升頓服孫真人食忌主卒吐血以水服蒲黃一升簡要濟衆治吐血唾血蒲黃一兩搗為散每服三錢溫酒或冷水調妙又方治小兒吐血不止蒲黃細研每服半錢用生地黃汁調下量兒大小加減進之塞上方治鼠奶痔蒲黃末空心溫酒下方寸匕日三服又方治墜傷朴損瘀血在內煩悶蒲黃末空心熱酒調下三錢匕服子母祕録治日月未足而欲産者蒲黃如棗許大以井花水服又方治脫肛腸出蒲黃和豬脂敷上日三五度楊氏産乳療母勞熱胎動下血手足煩躁蒲黃根絞汁服一二升産寶治産後下血虛羸逮死蒲黃二兩水二升煎取八合頓服又方治産後妒乳並癰腫蒲黃草熟杵敷腫上日二度易之並煎葉汁飲之亦佳食之亦得並瘥催生蒲黃地龍陳橘皮等分地龍洗去土於新瓦上焙令微黃各為末三處貼之如經日不産各抄一錢匕新汲水調服立産此常親用之甚妙衍義曰蒲黃處處有即蒲槌中黃粉也今京師謂槌為蒲棒初得黃細羅取萼別貯以備他用將蒲黃水調為膏擘為塊人多食之以解心臟虛熱小兒尤嗜涉月則燥色味皆淡須蜜水和然不可多食令人自利不益極虛人香蒲味甘平無毒主五臟心下邪氣口中爛臭堅齒明目聰耳久服輕身耐老一名睢七餘切一名醮生南海池澤陶隱居云方藥不復用俗人無採彼土人亦不復識者江南貢菁茅一名香茅以供宗廟縮酒或云是薰草又云是燕麥此蒲亦相類爾唐本注云此即甘蒲作薦者春初生用白為菹亦堪蒸食山南名此蒲為香蒲謂菖蒲為臭蒲陶隱居所引菁茅乃三脊茅也其燕麥薰草香茅野俗皆識都不為類此並非例也蒲黃即此香蒲花是也圖經曰文具蒲黃條下續斷味苦辛微溫無毒主傷寒補不足金瘡癰傷折跌續筋骨婦人乳難崩中漏血金瘡血內漏止痛生肌肉及踠傷惡血腰痛關節緩急久服益氣力一名龍豆一名屬折一名接骨一名南草一名槐生常山山谷七月八月採陰乾地黃為之使惡雷丸陶隱居云按桐君藥録云續斷生蔓延葉細莖如荏大根本黃白有汁七月八月採根今皆用莖葉節節斷皮黃皺狀如雞腳者又呼為桑上寄生恐皆非真時人又有接骨樹高丈餘許葉似蒴藋音朔濯皮主療金瘡有此接骨名疑或是而廣州又有一藤名續斷一名諾藤斷其莖器承其汁飲之療虛損絶傷用沐頭又長髮折枝插地即生恐此又相類李云是虎薊與此大乖而虎薊亦自療血爾唐本注云此藥所在山谷皆有今俗用者是葉似苧而莖方根如大薊黃白色陶注者非也臣禹錫等謹按蜀本圖經云葉似苧莖方兩葉對花紅白色根如大薊一株有五六枝藥性論云續斷君主絶傷去諸溫毒能通宣經脈日華子云助氣調血脈補五勞七傷破癥結瘀血消腫毒腸風痔瘻乳癰瘰癧撲損婦人産前後一切病面黃虛腫縮小便止泄精尿血胎漏子宮冷又名大薊山牛蒡圖經曰續斷生常山山谷今陝西河中興元府舒越晉州亦有之三月以後生苗稈四稜似苧麻葉亦類之兩兩相對而生四月開花紅白色似益母花根如大薊赤黃色七月八月採謹按範汪方云續斷即是馬薊與小薊葉相似但大於小薊耳葉似旁翁菜而小厚兩邊有刺刺人其花紫色與今越州生者相類而市之貨者亦有數種少能辨其粗良醫人用之但以節節斷皮黃皺者為真雷公云凡使勿用草茆根緣真似續斷若誤用服之令人筋軟採得後橫切銼之又去向里硬筋了用酒浸一伏時焙乾用外臺祕要治淋取生續斷絞取汁服之馬薊根是子母祕録治産後心悶手足煩熱猒猒氣欲絶血暈心頭硬乍寒乍熱增寒忍不禁續斷皮一握銼以水三升煎取一升分三服溫服如人行三二里再服無所忌此藥救産後垂死漏蘆味苦咸寒大寒無毒主皮膚熱惡瘡疽痔濕痹下乳汁止遺溺熱氣瘡癢如麻豆可作浴湯久服輕身益氣耳目聰明不老延年一名野蘭生喬山山谷八月採根陰乾陶隱居云喬山應是黃帝所葬處乃在上郡今出近道亦有療諸瘻疥此久服甚益人而服食方罕用之今市人皆取苗用之俗中取根名鹿驪力支切根苦酒摩以療瘡疥唐本注云此藥俗名莢蒿莖葉似白蒿花黃生莢長似細麻如箸許有四五瓣七月八月後皆黑異於衆草蒿之類也常用其莖葉及子未見用根其鹿驪山南謂之木藜蘆有毒非漏蘆也今按別本注云漏蘆莖箸大高四五尺子房似油麻房而小江東人取其苗用勝於根江寧及上黨者佳陶注云根名鹿驪唐注云山南人名木藜蘆皆非也漏蘆自別爾臣禹錫等謹按蜀本圖經云葉似角蒿今曹兗州下濕地最多六月七月採莖日乾之黑於衆草藥性論云漏蘆君能治身上熱毒風生惡瘡皮肌瘙癢癮疹陳藏器云按漏蘆南人用苗北土多用根樹生如茱萸樹高二三尺有毒殺蟲山人洗瘡疥用之日華子云連翹為使治小兒壯熱通小腸泄精尿血風赤眼乳癰發背瘰癧腸風排膿補血治撲損續筋骨敷金瘡止血長肉通經脈花苗並同用俗呼為鬼油麻形並氣味似干牛蒡頭上有白花子圖經曰漏蘆生喬山山谷今京東州郡及秦海州皆有之舊説莖葉似白蒿有莢花黃生莢端莖若箸大其子作房類油麻房而小七八月後皆黑異於衆草今諸郡所圖上唯單州者差相類沂州者花葉頗似牡丹秦州者花似單葉寒菊紫色五七枝同一稈幹上海州者花紫碧如單葉蓮花花萼下及根旁有白茸裹之根黑色如蔓菁而細又類蔥本淮甸人呼為老翁花三州所生花雖別而葉頗相類但秦海州者葉更作鋸齒狀耳一物而殊類若此醫家何所適從當依舊説以單州出者為勝六月七月採莖苗日乾八月採根陰乾南方用苗北土多用根又此下有飛廉條云生河內川澤一名漏蘆與苦芺烏老切相類唯葉下附莖有皮起似箭羽又多刻缺花紫色生平澤又有一種生山岡上葉頗相似而無疏缺且多毛莖亦無羽根直下更旁枝生則肉白皮黑中有黑脈日乾則黑如玄參經云七月八月採花陰乾用蘇恭云用莖葉及療疳蝕殺蟲有驗據此所説與秦州海州所謂漏蘆者花葉及根頗相近然彼人但謂之漏蘆今醫家罕有用飛廉者既未的識故不復分別但附其説於下雷公云凡使勿用獨漏緣似漏蘆只是味苦酸誤服令人吐不止須細驗夫使漏蘆細銼拌生甘草相對蒸從巳至申去甘草淨揀用聖惠方治小兒無辜疳肚脹或時瀉痢冷熱不調以漏蘆一兩杵為散每服以豬肝一兩散子一錢匕鹽少許以水煮熟空心頓服外臺祕要治蛔蟲漏蘆杵以餅臛和方寸匕服之營實味酸溫微寒無毒主癰疽惡瘡結肉跌筋敗瘡熱氣陰蝕不瘳利關節久服輕身益氣根止泄痢腹痛五臟客熱除邪逆氣疽癩諸惡瘡金瘡傷撻生肉復肌一名薔薇一名薔麻一名牛棘一名牛勒一名薔蘼一名山棘生零陵川穀及蜀郡八月九月採陰乾陶隱居云營實即是薔薇子以白花者為良根亦可煮釀酒莖葉亦可煮作飲臣禹錫等謹按蜀本圖經云即薔薇也莖間多刺蔓生子若杜棠子其花有百葉八出六出或赤或白者今所在有之葛洪治金創方用薔薇灰末一方寸匕日三服之藥性論云薔薇使味苦子治頭瘡白禿主五臟客熱日華子云白薔微根味苦澀冷無毒治熱毒風癰疽惡瘡牙齒痛治邪氣通血經止赤白痢腸風瀉血惡瘡疥癬小兒疳蟲肚痛野白者用良雷公云今薔薇也凡採得去根並用粗布拭黃毛了用刀於槐砧上細銼用漿水拌令濕蒸一宿至明出日乾用外臺祕要治鯁及刺不出薔薇根末水服方寸匕日三又方治折箭刺入肉膿囊不出堅慘及鼠僕服十日鯁刺皆穿皮出又方治少小睡中遺尿不自覺以根隨多少銼以酒飲之千金方治口瘡久不瘥及胸中並生瘡三年以上不瘥以根濃煮汁服之稍稍咽效冬取根夏取莖葉用之又方治壅熱口中及舌生瘡爛銼根濃煮汁含漱之冬用根皮夏用枝葉又方諸癰腫發背及癰癤已潰爛疼痛薔薇殼更炙尉之即愈又方治小兒疳痢行數暴多生薔薇根洗淨切以適多少濃煎汁稍稍飲之瘥肘後方治口瘡以根避風打去土煮濃汁溫含冷易聖惠同天名精味甘寒無毒主瘀血血瘕欲死下血止血利小便除小蟲去痹除胸中結熱止煩渴遂水大吐下久服輕身耐老一名麥句薑一名蛤蟆藍一名豕首一名天門精一名玉門精一名彘顱一名蟾蜍蘭一名覲生平原川澤五月採垣衣為之使陶隱居云此即今人呼為豨音喜蘞音杴亦名豨首夏月搗汁服之以除熱病味至苦而云甘恐或非是唐本注云鹿活草是也別録一名天蔓菁南人名為地菘味甘辛故有薑稱狀如藍故名蛤蟆藍香氣似蘭故名蟾蜍蘭主破血生肌止渴利小便殺三蟲除諸毒腫疔瘡瘻痔金瘡內射身癢癮疹不止者揩之立已其豨蘞苦而臭名精乃辛而香全不相類也臣禹錫等謹按蜀本圖經云地菘也小品方名天蕪菁一名天蔓菁聲並相近夏秋抽條頗似薄荷花紫白色味辛而香其葉似山南菘菜爾雅云茢薽豕首釋曰藥名也一名麥句薑郭云江東豨首可以炒蠶蛹者三蒼云炒熬也藥性論云麥句薑使味辛治瘡止血及鼻衄不止陳藏器云天名精本經一名麥句薑蘇云鹿活草也別録云一名天蔓菁南人呼為地菘與蔓菁相似故有此名爾雅云大鞠蘧麥注云麥句薑蘧麥即今之瞿麥然終非麥句薑爾雅注錯如此陶公注釣樟條云有一草似狼牙氣辛臭名為地菘人呼為劉燼草主金瘡言劉燼昔曾用之異苑云青州劉燼宋元嘉中射一獐剖五臟以此草塞之蹶然而起燼怪而拔草便倒如此三度燼密録此草種之主折傷多愈因以名焉既有活鹿之名雅與獐事相會陶蘇兩説俱是地菘功狀既同定非二物圖經曰天名精生平原川澤今江湖間皆有之夏秋抽條頗如薄荷花紫白色葉如菘菜而小故南人謂之地菘香氣似蘭故名蟾蜍蘭狀如藍故名蛤蟆藍其味甘辛故名麥句薑一名豕首爾雅所謂茢音列薽音真豕首是也江東人用此以炒音炒蠶蛹五月採此草既名地菘下品又有地菘條決明子味鹹苦甘平微寒無毒主青盲目淫膚赤白膜眼赤痛淚出療唇口青久服益精光輕身生龍門川澤石決明生豫章十月十日採陰乾百日蓍實為之使惡大麻子陶隱居云龍門乃在長安北今處處有葉如茳芒子形似馬蹄呼為馬蹄決明用之當搗碎又別有草決明是萋音妻蒿子在下品中也臣禹錫等謹按唐本云石決明是蚌蛤類形似紫貝附見別出在魚獸條中皆主明目故並有決明之名俗方唯以療眼也道術時須蜀本圖經云葉似苜蓿而闊大夏花秋生子作角實似馬蹄俗名馬蹄決明今出廣州桂州十月採子陰乾爾雅云薢茩芵茪釋曰藥草決明也郭云葉黃鋭赤華實如山茱萸或曰菱也關西謂之薢茩藥性論云決明臣利五臟常可作菜食之又除肝家熱朝朝取一匙挪令淨空心吞之百日見夜光陳藏器云茳芏是江離子芏字音吐草也似莞生海邊可為席又與決明葉不類本草決明注又無好事者更詳之陶云決明葉如茳芏按茳芏性平無毒火炙作飲極香除痰止渴令人不睡調中生道旁葉小於決明隋稠禪師作五色飲以為黃飲進煬帝嘉之日華子云馬蹄決明助肝氣益精水調末塗消腫毒協太陽穴治頭痛又貼腦心止鼻洪作枕勝黑豆治頭風明目也圖經曰決明子生龍門川澤今處處有之人家園圃所蒔夏初生苗高三四尺許根帶紫色葉似苜蓿而大七月有花黃白色其子作穗如青緑豆而鋭十月十日採陰乾百日按爾雅薢茩芵茪釋曰藥草決明也郭璞注云葉黃鋭赤華實如山茱萸關西謂之薢茩與此種頗不類又有一種馬蹄決明葉如江豆子形似馬蹄故得此名又萋蒿子亦謂之草決明未知孰為入藥者然今醫家但用子如緑豆者其石決明是蚌蛤類當在蟲獸部中食療云平葉主明目利五臟食之甚良子主肝家熱毒氣風眼赤淚每日取一匙挪去塵埃空腹水吞之百日後夜見物光也外臺祕要治積年失明不識人決明子二升杵散食後以粥飲服方寸匕千金方治肝毒熱取決明作菜食之衍義曰決明子苗高四五尺春亦為蔬秋深結角其子生角中如羊腎今湖南北人家園圃所種甚多或在村野或成段種蜀本圖經言葉似苜蓿而闕大甚為允當丹參味苦微寒無毒主心腹邪氣腸鳴幽幽如走水寒熱積聚破症除瘕止煩滿益氣養血去心腹痼疾結氣腰脊強腳痹除風邪留熱久服利人一名郤蟬草一名赤參一名木羊乳生桐柏山川穀及泰山五月採根曝乾畏鹹水反藜蘆陶隱居云此桐柏山是淮水源所出之山在義陽非江東臨海之桐柏也今近道處處有莖方有毛紫花時人呼為逐馬酒漬飲之療風痹道家時有用處時人服多眼赤故應性熱今云微寒恐為謬矣唐本注云此藥冬採良夏採虛惡臣禹錫等謹按蜀本圖經云葉似紫蘇有細毛花紫亦似蘇花根赤大者如指長尺余一苗數根今所在皆有九月十月採根藥性論云丹參臣平能治腳弱疼痹主中惡治百邪鬼魅腹痛氣作聲音鳴吼能定精蕭炳云酒浸服之治風軟腳可逐奔馬故名奔馬草曾用有效日華子云養神定志通利關脈治冷熱勞骨節疼痛四肢不遂排膿止痛生肌長肉破宿血補新生血安生胎落死胎止血崩帶下調婦人經脈不勻血邪心煩惡瘡疥癬癭贅腫毒丹毒頭痛赤眼熱溫狂悶又名山參圖經曰丹參生桐柏山川穀及泰山今陝西河東州郡及隨州亦有之二月生苗高一尺許莖稈方稜青色葉生相對如薄荷而有毛三月開花紅紫色似蘇花根赤大如指長亦尺余一苗數根五月採曝乾又云冬月採者良夏月採者虛惡聖惠方治寒疝小腹及陰中相引痛白汗出欲死以丹參一兩杵為散每服熱酒調下二錢匕佳千金方治落胎身下有血丹參十二兩以酒五升煮取三升溫服一升日三服梅師方治中熱油及火燒除外痛丹參八兩細銼以水微調取羊脂二斤煎三上三下以敷瘡上肘後方同茜根味苦寒無毒主寒濕風痹黃疸補中止血內崩下血膀胱不足踒跌蠱毒久服益精氣輕身可以染絳一名地血一名茹藘一名茅搜一名茜生喬山川穀二月三月採根曝乾畏鼠姑陶隱居云此則今染絳茜草也東間諸處乃有而少不如西多今俗道經方不甚服用此當以其為療少而豐賤故也詩云茹藘在阪者是臣禹錫等謹按蜀本圖經云染緋草葉似棗葉頭尖下闊莖葉俱澀四五葉對生節間蔓延草木上根紫赤色今所在有八月採根爾雅云茹藘茅搜疏引陸機云一名地血齊人謂之茜徐州人謂之牛蔓藥性論云茜根味甘主治六極傷心肺吐血瀉血用之陳藏器云茜根主蠱煮汁服之今之染緋者字亦作茜周禮庶氏掌除蠱毒以嘉草攻之嘉草蘘荷與茜主蠱為最也日華子云味醶止鼻洪帶下産後血暈乳結月經不止腸風痔瘻排膿治瘡癤泄精尿血撲損瘀血酒煎服殺蠱毒入藥銼炒用圖經曰茜根一作茜生喬山山谷今近處皆有之染緋草也許慎説文解字以為人血所生葉似棗葉而頭尖下闊三五對生節間其苗蔓延草木上根紫色陸機草木疏云茹藘茅搜茜草也齊人謂之茜徐州人謂之牛蔓二月三月採根曝乾今圃人或作畦種蒔故貨殖傳云卮茜千石亦比千乘之家言地利之厚也醫家用治蠱毒尤勝周禮庶氏掌除蠱毒以嘉草攻之干寶以嘉草為蘘荷陳藏器以為蘘荷與茜主蠱之最也雷公云凡使勿用赤柳草根真似茜根只是味酸澀不入藥中用若服令人患內障眼速服甘草水解之即毒氣散凡使茜根用銅刀於槐砧上銼日乾勿犯鐵並鉛簡要濟衆治吐血不定茜草一兩生搗羅為散每服二錢水一中盞煎至七分放冷食後服之良傷寒類要治心疸煩心心中熱茜根主之又方治中蠱毒或吐下血如爛肝茜草根蘘荷葉根各三兩切以水四升煮取二升去滓適寒溫頓服即愈飛廉味苦平無毒主骨節熱脛重痠疼頭眩頂重皮間邪風如蜂螫針刺魚子細起熱瘡癰疽痔濕痹止風邪咳嗽下乳汁久服令人身輕益氣明目不老可煮可干一名漏蘆一名天薺一名伏豬一名飛輕一名伏菟一名飛雉一名木禾生河內川澤正月採根七月八月採花陰乾得烏大良惡麻黃陶隱居云處處有極似苦芺烏老切唯葉下附莖輕有皮起似箭羽葉又多刻缺花紫色俗方殆無用而道家服其枝莖可得長生又入神枕方今既別有漏蘆則非此別名爾唐本注云此有兩種一是陶證生平澤中者其生山岡上者葉頗相似而無疏缺且多毛莖亦無羽根直下更無旁枝生則肉白皮黑中有黑脈日乾則黑如玄參用葉莖及根療疳蝕殺蟲與平澤者俱有驗今俗以馬薊以苦芺為漏蘆並非是也臣禹錫等謹按蜀本圖經云葉似苦芺莖似軟羽紫花子毛白今所在平澤皆有五月六月採日乾藥性論云飛廉使味苦咸有毒主留血蕭炳云小兒疳痢為散以漿水下之大效雷公云凡使勿用赤脂蔓與飛廉形狀相似只赤脂蔓見酒色便如血色可表之凡修事先刮去粗皮了杵用苦酒拌之一夜至明漉出日乾細杵用之千金翼治疳𧈟食口齒及下部飛廉蒿燒灰搗篩以兩錢匕著痛處甚痛忍之若不痛非疳也下部蟲如馬尾大相纏出無數十日瘥二十日平復五味子味酸溫無毒主益氣咳逆上氣勞傷羸瘦補不足強陰益男子精養五臟除熱生陰中肌一名會及一名玄及生齊山山谷及代郡八月採實陰乾蓯蓉為之使惡萎蕤勝烏頭陶隱居云今第一齣高麗多肉而酸甜次出青州翼州味過酸其核並似豬腎又有建平者少肉核形不相似味苦亦良此藥多膏潤烈日曝之乃可搗篩道方亦須用唐本注云五味皮肉甘酸核中辛苦都有鹹味此則五味具也本經云味酸當以木為五行之先也其葉似杏而大蔓生木上子作房如落葵大如櫻子一出蒲州及藍田山中今注今河中府歲貢焉臣禹錫等謹按蜀本圖經云莖赤色蔓生花黃白生青熟紫味甘者佳八月採子日乾爾雅云菋荎藸注五味也蔓生子叢在莖頭疏云一名菋一名荎藸藥性論云五味子君能治中下氣止嘔逆補諸虛勞令人體悅澤除熱氣病人虛而有氣兼嗽加用之日華子云明目暖水臟治風下氣消食霍亂轉筋痃癖奔豚冷氣消水腫反胃心腹氣脹止渴除煩熱解酒毒壯筋骨圖經曰五味子生齊山山谷及代郡今河東陝西州郡尤多而杭越間亦有春初生苗引赤蔓於高木其長六七尺葉尖圓似杏葉三四月開黃白花類小蓮花七月成實如豌豆許大生青熟紅紫爾雅云菋荎藸注云五味也蔓生子叢莖端疏云一名菋一名荎藸今有數種大抵相近而以味甘者為佳八月採陰乾用一説小顆皮皺泡者有白色鹽霜一重其味酸咸苦辛甘味全者真也千金月令五月宜服五味湯取五味子一大合以木杵臼細搗之置小瓷瓶中以百沸湯投之入少蜜即密封頭置火邊良久湯成堪飲雷公云凡小顆皮皺泡者有白撲鹽霜一重其味酸咸苦辛甘味全者真也凡用以銅刀劈作兩片用蜜浸蒸從巳至申卻以漿水浸一宿焙乾用抱朴子移門子服五味子十六年面色如玉女入水不沾入火不灼衍義曰五味子今華州之西至秦州皆有之方紅熟時採得蒸爛研濾汁去子熬成稀膏量酸甘入蜜再上火待蜜熟俟冷器中貯作湯肺虛寒人可化作湯時時服作果可以寄遠本經言溫今食之多致虛熱小兒益甚藥性論以謂除熱氣日華子云謂暖水臟又曰除煩熱後學至此多惑今即用之治肺虛寒則更不取除煩熱之説補下藥亦用之入藥生曝不去子旋花味甘溫無毒主益氣去面皯黑色媚好其根味辛主腹中寒熱邪氣利小便久服不飢輕身一名筋根花一名金沸一名美草生豫州平澤五月採陰乾陶隱居云東人呼為山薑南人呼為美草根似杜若亦似高良薑腹中冷痛煮服甚效作丸散服之辟穀止飢近有人從南還遂用此術與人斷谷皆得半年百日不飢不瘦但志淺嗜深不能久服爾其葉似薑花赤色殊辛美子狀如豆蔻此旋花之名即是其花也今山東甚多唐本注云此即生平澤旋葍音福是也其根似筋故一名筋根旋徐兗切花陶所證真山薑爾陶復於下品旋葍注中雲此根出河南北國來根似芎藭唯膏中用今復道似高良美二説自相矛盾且此根味甘山薑味辛都非此類其旋葍膏療風逐水只用花言根亦無妨然不可以杜若亂之也又將旋葍花名金沸作此別名非也別録云根主續筋也今按陳藏器本草云旋花本功外取根食之不飢又取根苗搗絞汁服之主丹毒小兒毒熱根主續筋骨合金瘡陶注誤而唐注是也臣禹錫等謹按蜀本圖經云旋葍花根也蔓生葉似薯蕷而多狹長花紅白色根無毛節蒸煮堪啖味甘美根名筋根今所在川澤皆有二月八月採根日乾蕭炳云旋徐元切復音伏用花葍音福旋徐願反用根今云旋覆根即葍旋誤矣圖經曰旋徐願切花生豫州平澤今處處皆有之蘇恭云此即平澤所生旋葍音福是也其根似筋故一名筋根別録云根主續筋故南人皆呼為續筋根苗作叢蔓葉似山芋而狹長花白夏秋生遍田野根無毛節蒸煮堪啖甚甘美五月採花陰乾二月八月採根日乾花今不見用者下品有旋徐元切復花與此殊別人疑其相近殊無謂也救急方續斷筋法取旋葍草根淨洗去土搗量瘡大小敷之日一二易之乃瘥止一名肫腸草俗謂鼓子花也黔南出一種旋花粗莖大葉無花不作蔓恐別是一物也衍義曰旋花蔓生今河北京西關陝田野中甚多最難鋤艾治之又生世又謂之鼓之花言其形肖也四五月開花亦有多葉者其根寸截置土下頻灌溉方涉旬苗已生蜀本圖經是矣蘭草味辛平無毒主利水道殺蠱毒闢不祥除胸中痰癖久服益氣輕身不老通神明一名水香生大吳池澤四月五月採陶隱居云方藥俗人並不復識用大吳即應是吳國爾太伯所居故呼大吳今東間有煎澤草名蘭香亦或是此也生濕地李云是今人所種似都梁香草唐本注云此是蘭澤香草也八月花白人間多種之以飾庭池溪水澗旁往往亦有陶云不識又言煎澤草或稱李云都梁香近之終非的識也今按別本注云葉似馬蘭故名蘭草俗呼為燕尾香時人皆煮水以浴療風故又名香水蘭陶云煎澤草唐注云蘭澤香並非也臣禹錫等謹按蜀本圖經云葉似澤蘭尖長有歧花紅白色而香生下濕地陳藏器云蘭草與澤蘭二物同名陶公竟不能知蘇亦強有分別按蘭草本功外主惡氣香澤可作膏塗發生澤畔葉光潤陰小紫五月六月採陰乾婦人和油澤頭故云蘭澤李云都梁是也蘇注蘭草云八月花白人多種於庭池此即澤蘭非蘭草也澤蘭葉尖微有毛不光潤方莖紫節初採微辛干亦辛入産後補虛用之已別出中品之下蘇乃將澤蘭注於蘭草之中殊誤也廣志云都梁香出淮南亦名煎澤草盛洪之荊州記曰都梁縣有山山下有水清淺其中生蘭草因名為都梁亦因山為號也衍義曰蘭草諸家之説異同是曾未的識故無定論葉不香唯花香今江陵鼎澧州山谷之間頗有山外平田即無多生陰地生於幽谷益可驗矣葉如麥門冬而闊且韌長及一二尺四時常青花黃中間葉上有細紫點有春芳者為春蘭色深秋芳者為秋蘭色淡秋蘭稍難得二蘭移植小檻中置座右花開時滿室盡香與他花香又別唐白樂天有種蘭不種艾之詩正謂此蘭矣今未見用者本經蘇注八月花白此即澤蘭也忍冬味甘溫無毒主寒熱身腫久服輕身長年益壽十二月採陰乾陶隱居云今處處皆有似藤生凌冬不凋故名忍冬人唯取煮汁以釀酒補虛療風仙經少用此既長年益壽甚可常採服凡易得之草而人多不肯為之更求難得者是貴遠賤近庸人之情乎唐本注云此草藤生繞覆草木上苗莖赤紫色宿者有薄白皮膜音莫之其嫩莖有毛葉似胡豆亦上下有毛花白蕊紫今人或以絡石當之非也今按陳藏器本草云忍冬主熱毒血痢水痢濃煎服之小寒本條云溫非也臣禹錫等謹按藥性論云忍冬亦可單用味辛主治腹脹滿能止氣下澼肘後方飛尸者遊走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸喪聞哀哭便作風尸者淫躍四肢不知痛之所在每發昏恍得風雪便作沉尸者纏骨結臟衝心脅每發絞切遇寒冷便作尸注者舉身沉重精神錯雜常覺昏廢每節氣至則輒致大惡此一條別有治後尉也忍冬莖葉銼數斛煮令濃取汁煎之服如雞子一枚日二三服蛇床子味苦辛甘平無毒主婦人陰中腫痛男子陰痿濕癢除痹氣利關節癲癇惡瘡溫中下氣令婦人子臟熱男子陰強久服輕身好顏色令人有子一名蛇粟一名蛇米一名虺床一名思益一名繩毒一名棗棘一名牆蘼生臨淄川穀及田野五月採實陰乾惡牡丹巴豆貝母陶隱居云近道田野墟落間甚多花葉正似蘼蕪唐本注云爾雅一名盱音籲臣禹錫等謹按蜀本圖經云似小葉芎藭花白子如黍粒黃白色生下濕地今所在皆有出揚州襄州者良採子曝乾爾雅云盱虺床注蛇床也一名馬床藥性論云蛇床仁君有小毒治男子女人虛濕痹毒風𤸷痛去男子腰疼浴男女陰去風冷大益陽事主大風身癢煎湯浴之瘥療齒痛及小兒驚癇日華子云治暴冷暖丈夫陽氣助女人陰氣撲損瘀血腰跨疼陰汗濕癬四肢頑痹赤白帶下縮小便凡合藥服食即挪去皮殼取仁微炒殺毒即不辣作湯洗病則生使圖經曰蛇床子生臨淄川穀及田野今處處有之而揚州襄州者勝三月生苗高三二尺葉青碎作叢似蒿枝每枝上有花頭百餘結同一窠似馬芹類四五月開白花又似散水子黃褐色如黍米至輕虛五月採實陰乾爾雅謂之盱一名虺床雷公云凡使須用濃藍汁並百部草根自然汁二味同浸三伏時漉出日乾卻用生地黃汁相拌蒸從午至亥日乾用此藥只令陽氣盛數號曰鬼考也千金方治産後陰下脫蛇床子絹袋盛蒸尉之亦治陰戶痛又方治小兒癬瘡杵蛇床末和豬脂塗之金匱方溫中坐藥蛇床子散方蛇床子仁為末以白粉少許和令勻相得如棗大綿裹納之自然溫矣地膚子味苦寒無毒主膀胱熱利小便補中益精氣去皮膚中熱氣散惡瘡疝瘕強陰久服耳目聰明輕身耐老使人潤澤一名地葵一名地麥生荊州平澤及田野八月十月採實陰乾陶隱居云今田野間亦多皆取莖苗為掃帚子微細入補丸散用仙經不甚須唐本注云地膚子田野人名為地麥草葉細莖赤多出熟田中苗極弱不能勝舉今云堪為掃帚恐人未識之別録云搗絞取汁主赤白痢洗目去熱暗雀盲澀痛苗灰主痢亦善北人亦名涎衣草臣禹錫等謹按蜀本圖經云葉細莖赤初生薄地花黃白子青白色今所在有藥性論云地膚子君一名益明與陽起石同服主丈夫陰痿不起補氣益力治陰卵㿉疾去熱風可作湯沐浴日華子云治客熱丹腫又名落帚子色青似一眠起蠶沙矣圖經曰地膚子生荊州平澤及田野今蜀川關中近地皆有之初生薄地五六寸根形如蒿莖赤葉青大似荊芥三月開黃白花八月九月採實陰乾用神仙七精散云地膚子星之精也或曰其苗即獨掃也一名鴨舌草陶隱居謂莖苗可為掃帚者蘇恭云苗極弱不能勝舉二説不同而今醫家便以為獨掃是也密州所上者其説益明雲根作叢生每窠有二三十莖莖有赤有黃七月開黃花其實地膚也至八月而秸𦾮成可採正與此地獨掃相類若然恐西北所出者短弱故蘇注云爾其葉味苦寒無毒主大腸泄瀉止赤白痢和氣澀腸胃解惡瘡毒三四月五月採外臺祕要治目痛及眯忽中傷因有熱暝者取地膚子白汁注目中又方療手足煩疼地膚草三兩水四升煮取二升半分三服日一劑肘後方治積年久疢腰痛有時發動六月七月取地膚子乾末酒服方寸匕日五六服子母祕録治妊娠患淋小便數去少忽熱痛酸索手足疼煩地膚子十二兩初以水四升煎取二升半分溫三服楊氏産乳療小便數多或熱痛酸楚手足煩疼地膚草三兩以水四升煮取二升半分三服千歲虆力軌切汁味甘平無毒主補五臟益氣續筋骨長肌肉去諸痹久服輕身不飢耐老通神明一名虆蕪生泰山川穀陶隱居云作藤生樹如葡萄葉如鬼桃蔓延木上汁白今俗人方藥都不復識用此仙經數處須之而遠近道俗咸不識此非甚是異物正是未研訪尋識之爾唐本注云即櫻音纓薁音隩藤汁也此藤有得千歲者莖大如碗冬唯葉凋莖終不死藤汁味甘子味甘酸苗似葡萄其莖主噦於月切逆大善傷寒後嘔噦更良今按陳藏器本草云千歲虆陶云藤生樹如葡萄葉如鬼桃蔓延木上汁白人不復識仙方或須唐本注即云櫻薁藤得千歲者汁甘子酸按櫻薁是山蒲桃斫斷藤吹氣出一頭如通草以水浸吹取氣滴目中去熱翳赤障更無甘汁本經云汁甘明非櫻薁也千歲虆似葛蔓葉下白子赤條中有白汁草木疏云一名苣荒連蔓而生子赤可食毛詩云葛虆注云似葛之草也此藤大者盤薄故云千歲虆謂櫻薁者深是妄言臣禹錫等謹按蜀本圖經云今處處有取汁用當在夏秋也日華子云味甘酸止渴悅色年多大者佳莖葉同用又名櫻薁藤圖經曰千歲虆生泰山川穀作藤生蔓延木上葉如葡萄而小四月摘其莖汁白而甘五月開花七月結實八月採子青黑微赤冬唯凋葉此即詩云葛虆者也蘇恭謂是櫻薁藤深為謬妄陶隱居陳藏器説最得之衍義曰千歲虆唐開元末訪隱民薑撫已幾百歲召至集賢院言服常春藤使白髮還鬒則長生可致藤生太湖終南往往有之帝遣使多取以賜老臣詔天下使自求之擢撫銀青光祿大夫號沖和先生又言終南山有旱藕餌之延年狀類葛粉帝取之作湯餅賜大臣右驍騎將軍甘守誠曰常春者千歲虆也旱藕者牡蒙也方家久不用撫易名以神之民間以酒漬藤飲者多暴死乃止撫內慚請求藥牢山遂逃去今書之以備世疑景天味苦酸平無毒主大熱火瘡身熱煩邪惡氣諸蠱毒痂疕匹幾切寒熱風痹諸不足花主女人漏下赤白輕身明目久服通神不老一名戒火一名火母一名救火一名據火一名慎火生太山川穀四月四日七月七日採陰乾陶隱居云今人皆盆盛養之於屋上云以闢火葉可療金瘡止血以洗浴小兒去煩熱驚氣廣州城外有一樹云大三四圍呼為慎火樹江東者甚細小方用亦稀其花入服食衆藥之名此最為麗今注皇朝收復嶺表得廣州醫官問其事曾無慎火成樹者蓋陶之誤爾臣禹錫等謹按蜀本圖經云慎火草葉似馬齒莧而大藥性論云景天君有小毒能治風疹惡癢主小兒丹毒及治發熱驚疾花能明目日華子云景天冷治心煩熱狂赤眼頭痛寒熱遊風丹腫女人帶下圖經曰景天生泰山山谷今南北皆有之人家多種於中庭或以盆盎植於屋上云以闢火謂之慎火草春生苗葉似馬齒而大作層而上莖極脆弱夏中開紅紫碎花秋後枯死亦有宿根者四月四日七月七日採其花並苗葉陰乾攻治瘡毒及嬰孺風疹在皮膚不出者生取苗葉五大兩和鹽三大兩同研絞取汁以熱手摩塗之日再但是熱毒丹瘡皆可如此用之外臺祕要治癮疹以慎火草一斤搗絞取汁敷上熱炙摸之再三即瘥千金方治小兒丹發慎火草生一握搗絞汁以拭之㩉上日十遍夜三四遍談氏小兒方同子母祕録治産後陰下脫慎火草一斤陰乾酒五升煮取汁分溫四服又方治小兒赤遊行於體上下至心即死搗生景天敷瘡上楊氏産乳療煙火丹發以背起或兩脅及兩足赤如火景天草真珠末一兩搗和如泥塗之又方療蟄火丹從頭起慎火草搗和苦酒塗之衍義曰景天陶隱居既云今人皆盆盛養之於屋上即知是草藥又言廣州城外有一株云可三四圍呼為慎火木既曰云即非親見是也蓋是傳聞亦非誤耳乃陶之輕聽也然極易種但折生枝置土中頻澆溉旬日便下根濃研取汁塗火心瘡其驗干為末水調掃遊風赤瘇赬熱者茵陳蒿味苦平微寒無毒主風濕寒熱邪氣熱結黃疸通身發黃小便不利除頭熱去伏瘕久服輕身益氣耐老面白悅長年白兔食之仙生太山及丘陵坡岸上五月及立秋採陰乾陶隱居云今處處有似蓬蒿而葉緊細莖冬不死春又生唯入療黃疸用仙經云白蒿白兔食之仙而今茵陳乃云此恐是誤爾今按陳藏器本草云茵陳本功外通關節去滯熱傷寒用之雖蒿類苗細經冬不死更因舊苗而生故名因陳後加蒿字也今又詳此非菜中茵陳也臣禹錫等謹按蜀本圖經云葉似青蒿而背白今所在皆有採苗陰乾藥性論云茵陳蒿使味苦辛有小毒治眼目通身黃小便赤日華子云石茵陳味苦涼無毒治天行時疾熱狂頭痛頭旋風眼冬瘴瘧女人癥瘕並閃損乏絶又名茵陳蒿山茵陳本出和州及南山嶺上皆有圖經曰茵陳蒿生泰山及丘陵坡岸上今近道皆有之而不及泰山者佳春初生苗高三五寸似蓬蒿而葉緊細無花實秋後葉枯莖稈經冬不死至春更因舊苗而生新葉故名茵陳蒿五月七月採莖葉陰乾今謂之山茵陳江寧府又有一種茵陳葉大根粗黃白色至夏有花實階州有一種名白蒿亦似青蒿而背白本土皆通入藥用之今南方醫人用山茵陳乃有數種或著其説云山茵陳京下及北地用者如艾蒿葉細而背白其氣亦如艾味苦干則色黑江南所用莖葉都似家茵陳而大高三四尺氣極芬香味甘辛俗又名龍腦薄荷吳中所用乃石香葇也葉至細色黃味辛甚香烈性溫誤作解脾藥服之大令人煩以本草論之但有茵陳蒿而無山茵陳本草注云茵陳蒿葉似蓬蒿而緊細今京下北地用為山茵陳者是也大體世方用山茵陳療腦痛解傷寒發汗行肢節滯氣化痰利膈治勞倦最要詳本草正經唯療黃疸利小便與世方都不應今試取京下所用山茵陳為解肌發汗藥灼然少效江南山茵陳療傷寒腦痛絶勝此見諸醫議論謂家茵陳亦能解肌下膈去胸中煩方家少用但可研作飲服之本草所無自出俗方茵陳蒿復當別是一物主療自異不得為山茵陳此説亦未可據但以功較之則江南者為勝以經言之則非本草所出醫方所用且可計較功效本草之義更當考論爾雷公云凡使須用葉有八角者採得陰乾去根細銼用勿令犯火千金方治遍身風癢生瘡疥茵陳不計多少煮濃汁洗之立瘥食醫心鏡茵陳主除大熱黃疸傷寒頭痛風熱瘴癘利小便切煮羹生食之亦宜人衍義曰茵陳蒿張仲景治傷寒熱甚發黃者身面悉黃用之極效又一僧因傷寒後發汗不徹有留熱身面皆黃多熱期年不愈醫作食黃治之治不對病不去問之食不減尋與此藥服五日病減三分之一十日減三分之二二十日病悉去方用山茵陳山梔子各三分秦艽升麻各四錢末之每用三錢水四合煎及二合去滓食後溫服以知為度然此藥以茵陳蒿為本故書之杜若味辛微溫無毒主胸脅下逆氣溫中風入腦戶頭腫痛多涕淚出眩倒目䀮䀮莫郎切止痛除口臭氣久服益精明目輕身令人不忘一名杜衡一名杜蓮一名白連一名白芩一名若芝生武陵川澤及冤句二月八月採根曝乾得辛夷細辛良惡柴胡前胡陶隱居云今處處有葉似薑而有文理根似高良薑而細味辛香又絶似旋覆根殆欲相亂葉小異爾楚詞云山中人兮芳杜若此者一名杜衡今復別有杜衡不相似唐本注云杜若苗似廉薑生陰地根似高良薑全少辛味陶所注旋覆根即真杜若也臣禹錫等謹按蜀本圖經云苗似山薑花黃赤子赤色大如棘子中似豆蔻今出硤州嶺南者甚好範子計然云杜衡杜若出南郡漢中大者大善圖經曰杜若生武陵川澤及冤句今江湖多有之葉似薑花赤色根似高良薑而小辛味子如豆蔻二月八月採根曝乾用謹按此草一名杜衡而中品自有杜衡條杜衡爾雅所謂土滷者也杜若廣雅所謂楚衡者也其類自別然古人多相雜引用九歌云採芳洲兮杜若又離騷云雜杜衡與芳芷王逸輩皆不分別但云香草也古方或用而今人罕使故亦少有識之者雷公云凡使勿用鴨喋草根真相似只是味效不同凡修事採得後刀刮上黃赤皮了細銼用二三重絹作袋盛陰乾臨使以蜜浸一夜至明漉出用爾雅一曰杜若土滷香草也沙參味苦微寒無毒主血積驚氣除寒熱補中益肺氣療胃痹心腹痛結熱邪氣頭痛皮間邪熱安五臟補中久服利人一名知母一名苦心一名志取一名虎鬚一名白參一名識美一名文希生河內川穀及冤句般陽續山二月八月採根曝乾惡防己反藜蘆陶隱居云今出近道叢生葉似枸杞根白實者佳此沙參並人參是為五參其形不盡相類而主療頗同故皆有參名又有紫參正名牡蒙在中品唐本注云紫參牡蒙各是一物非異名也今沙參出華州為善臣禹錫等謹按蜀本圖經云花白色根若葵根藥性論云沙參臣能去皮肌浮風疝氣下墜治常欲眠養肝氣宣五臟風氣日華子云補虛止驚煩益心肺並一切惡瘡疥癬及身癢排膿消腫毒圖經曰沙參生河內川穀及冤句般陽續山今出淄齊潞隨州而江淮荊湖州郡或有之苗長一二尺以來叢生崖壁間葉似枸杞而有叉牙七月開紫花根如葵根箸許大赤黃色中正白實者佳二月八月採根曝乾南土生者葉有細有大花白瓣上仍有白黏膠此為小異古方亦單用葛洪卒得諸疝小腹及陰中相引痛如絞自汗出欲死者搗篩末酒服方寸匕立瘥白兔藿味苦平無毒主蛇虺蜂蠆猘狗菜肉蠱毒鬼疰風疰諸大毒不可入口者皆消除之又去血可末著痛上立消毒入腹者煮飲之即解一名白葛生交州山谷陶隱居云此藥療毒莫之與敵而人不復用殊不可解都不聞有識之者想當似葛爾須別廣訪交州人未得委悉唐本注云此草荊襄間山谷大有苗似蘿摩葉圓厚莖俱有白毛與衆草異蔓生山南俗謂之白葛用療毒有效而交廣又有白花藤生葉似女貞莖葉俱無毛花白根似野葛云大療毒而交州用根不用苗則非藿也用葉苗者真矣二物療治並如經説各自一物下條載白花藤也臣禹錫等謹按蜀本圖經云蔓生葉圓若蓴今襄州北汝州南岡上有五月六月採苗日乾海藥云主風邪熱極宜煮白兔藿飲之干則搗末敷諸毒妙徐長卿味辛溫無毒主鬼物百精蠱毒疫疾邪惡氣溫瘧久服強悍輕身益氣延年一名鬼督郵生泰山山谷及隴西三月採陶隱居云鬼督郵之名甚多今俗用徐長卿者其根正如細辛小短扁扁爾氣亦相似今狗脊散用鬼督郵當取其強悍宜腰腳所以知是徐長卿而非鬼箭赤箭唐本注云此藥葉似柳兩葉相當有光潤所在川澤有之根如細辛微粗長而有臊昔刀切氣今俗用代鬼督郵非也鬼督郵別有本條在下臣禹錫等謹按蜀本圖經云苗似小麥兩葉相對三月苗青七月八月著子似蘿摩子而小九月苗黃十月凋生下濕川澤之間今所在有之八月採日乾圖經曰徐長卿生泰山山岩谷及隴西今淄齊淮泗間亦有之三月生青苗葉似小桑兩兩相當而有光潤七八月著子似蘿摩而小九月苗黃十月而枯根黃色似細辛微粗長有臊氣三月四月採一名別仙蹤雷公云凡採得粗杵拌少蜜令遍用磁器盛蒸三伏時日乾用石龍芻味苦微寒微溫無毒主心腹邪氣小便不利淋閉風濕鬼疰惡毒補內虛不足痞滿身無潤澤出汗除莖中熱痛殺鬼疰惡毒氣久服補虛羸輕身耳目聰明延年一名龍鬚一名草續斷一名龍珠一名龍華一名懸莞一名草毒九節多味者良生梁州山谷濕地五月七月採莖曝乾陶隱居云莖青細相連實赤今出近道水石處似東陽龍鬚以作席者但多節爾唐本注云別録云一名方賓主療蛔蟲及不消食爾今按別本注云別録云微溫今之服用能除熱蓋不溫也臣禹錫等謹按蜀本圖經云莖如綖叢生俗名龍鬚草今人以為席者所在有之八月九月採根曝乾陳藏器云按龍鬚作席彌敗有垢者取方尺煮汁服之主淋及小便卒不通今出汾州亦處處有之薇銜味苦平微寒無毒主風濕痹歷節痛驚癇吐舌悸氣賊風鼠痿癰腫暴症逐水療痿蹶久服輕身明目一名糜銜一名承膏一名承肌一名無心一名無顛生漢中川澤及冤句邯鄲七月採莖葉陰乾得秦皮良陶隱居云俗用亦少唐本注云此草叢生似茺蔚及白頭翁其葉有毛莖赤療賊風大效南人謂之吳風草一名鹿銜草言鹿有疾銜此草瘥又有大小二種楚人猶謂大者為大吳風草小者為小吳風草也今按陳藏器本草云婦人服之絶産無子臣禹錫等謹按蜀本圖經云葉似茺蔚叢生有毛黃花根赤黑也陳藏器云一名無心草非草無心者南人名吳風草方藥不用之素問云黃帝曰有病者身熱解墮汗出如浴惡風少氣此為何病岐伯曰病名酒風帝曰治之奈何歧伯曰以澤瀉術各十分麋銜五分合以三指撮為後飯雲實味辛苦溫無毒主泄痢腸澼殺蟲蠱毒去邪惡結氣止痛除寒熱消渴花主見鬼精物多食令人狂走殺精物下水燒之致鬼久服輕身通神明益壽一名員實一名雲英一名天豆生河間川穀十月採曝乾陶隱居云今處處有子細如葶藶子而小黑其實亦類莨菪燒之致鬼未見其法術唐本注云雲實大如黍及大麻子等黃黑似豆故名天豆叢生澤旁高五六尺葉如細槐亦如苜蓿枝間微刺俗謂苗為草雲母陶云似葶藶非也臣禹錫等謹按蜀本圖經云葉似細槐花黃白其莢如大豆實青黃色大若麻子今所在平澤中有五月六月採實圖經曰雲實生河間川穀高五六尺葉如槐而狹長枝上有刺苗名臭草又名羊石子草花黃白色實若麻子大黃黑色俗名馬豆十月採曝乾用今三月四月採苗五月六月採實實過時即枯落治瘧藥中多用之雷公云凡使採得後粗搗相對拌渾顆橡實蒸一日後出用王不留行味苦甘平無毒主金瘡止血逐痛出刺除風痹內寒止心煩鼻衄癰疽惡瘡瘻乳婦人難産久服輕身耐老增壽生泰山山谷二月八月採陶隱居云今處處有人言是蓼子亦不爾葉似酸漿子似菘子而多入癰瘻方用之臣禹錫等謹按蜀本圖經云葉似菘藍等花紅白色子殼似酸漿實圓黑似菘子如黍粟今所在有之三月收苗五月收子曬乾藥性論云王不留行能治風毒通血脈日華子云治發背遊風風疹婦人血經不勻及難産根苗花子並通用又名禁宮花剪金花圖經曰王不留行生泰山山谷今江浙及並河近處皆有之苗莖俱青高七八寸以來根黃色如薺根葉尖如小匙頭亦有似槐葉者四月開花黃紫色隨莖而生如松子狀又似豬藍花五月內採苗莖曬乾用俗間亦謂之剪金草河北生者葉圓花紅與此小別張仲景治金瘡八物王不留行散小瘡粉其中大瘡但服之産婦亦服正元廣利方療諸風痙有王不留行湯最效雷公云凡採得拌渾蒸從巳至未出卻下漿水浸一宿至明出焙乾用之梅師方治竹木針刺在肉中不出疼痛以王不留行為末熟水調服方寸匕即出鬼督郵味辛苦平無毒主鬼疰卒忤中惡心腹邪氣百精毒溫瘧疫疾強腰腳益膂力一名獨搖草唐本注云苗唯一莖葉生莖端若傘音傘根如牛膝而細黑所在有之有必叢生今人以徐長卿代之非也唐本先附臣禹錫等謹按蜀本云徐長卿赤箭之類亦一名為鬼督郵但主治不同宜審用也又圖經云莖似細箭桿高二尺以下葉生莖端狀傘蓋根橫而不生須花生葉心黃白色二月八月採根所在皆有雷公云凡採並細銼了搗用生甘草水煮一伏時漉出用也白花藤味苦寒無毒主解諸藥菜肉中毒酒漬服之主虛勞風熱生嶺南交州廣州平澤唐本注云苗似野葛而白花根皮厚肉白其骨柔於野葛唐本先附臣禹錫等謹按蜀本圖經云葉有細毛蔓生花白根似牡丹骨柔皮白而厚味苦用根不用苗凌冬不凋雷公云凡使勿用菜花藤緣真似白花藤只是味不同菜花藤酸澀不堪用其白花藤味甘香採得後去根細銼陰乾用之五種唐本余留軍待味辛溫無毒主肢節風痛筋脈不遂折傷瘀血五緩攣痛生劍州山谷其葉似楠木而細長採無時地不容味苦大寒無毒主解蠱毒止煩熱闢瘴癘利喉閉及痰毒一名解毒子生山西谷採無時圖經曰地不容生戎州味苦大寒無毒蔓生葉青如杏葉而大厚硬凌冬不凋無花實根黃白色外皮微粗褐纍纍相連如藥實而圓大採無時能解蠱毒闢瘴氣治咽喉閉塞鄉大亦呼為解毒子獨用將軍味辛無毒主治毒腫奶癰解毒破惡血生林野採無時節節穿葉心生苗其葉似楠根並採用山胡椒味辛大熱無毒主心腹痛中冷破滯所在有之似胡椒顆粒大如黑豆其色黑俗用有效燈籠草味苦大寒無毒主上氣咳嗽風熱明目所在有之八月採枝幹高三四尺有花紅色狀若燈籠內有子紅色可愛根莖花實併入藥使一十種陳藏器余人肝藤主解諸毒藥腫遊風腳手軟痹並研服之亦煮服之亦敷病上生嶺南葉三丫花紫色一名承露仙又有伏雞子亦名承靈仙葉圓與此名同物異海藥云廣志云生嶺南山石間引蔓而生主蟲毒及手腳不遂等風生研服楊氏産乳療中蠱毒人肝藤以清水磨一彈丸飲之不過三兩服越王余算味鹹平無毒主下水破結氣生南海水中如竹算子長尺許異苑曰晉安有越王余算葉白者似骨黑者似角云是越王行海作籌有餘棄水中而生海藥云謹按異苑記云昔晉安越王因渡南海將黑角白骨算籌所餘棄水中故生此遂名算味鹹溫主水腫浮氣結聚宿滯不消腹中虛鳴並宜煮服之石蓴味甘平無毒下水利小便生南海中水石上南越志云似紫菜色青臨海異物志曰附石生也海藥云主風祕不通五鬲氣並小便不利臍下結氣宜煮汁飲之胡人多用治耳疾海根味苦小溫無毒主霍亂中惡心腹痛鬼氣注忤飛尸喉痹蠱毒癰疽惡腫赤白遊疹蛇咬犬毒酒及水磨服敷之亦佳生會稽海畔山谷莖赤葉似馬蓼根似菝葜而小也海人極用之海藥云胡人採得蒸而用之余並同寡婦薦主小兒吐痢霍亂取二七莖煮飲之自經死繩主卒發癲狂燒為末服三指撮三年陳蒲煮服之亦佳刺蜜味甘無毒主骨熱痰嗽痢暴下血開胃止渴除煩生交河沙中草頭有刺上有毛毛中生蜜一名草蜜胡人呼為給勃羅骨路支味辛平無毒主上氣浮腫水氣嘔逆婦人崩中余血症瘕殺三蟲生崑崙國苗似凌霄藤根如青木香安南亦有一名飛滕長松味甘溫無毒主風血冷氣宿疾溫中去風草似松葉上有脂山人服之生關內山谷中合子草有小毒子及葉主蠱毒螫咬搗敷瘡上蔓生岸旁葉尖花白子中有兩片如合了
