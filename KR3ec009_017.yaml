body:
  text: 卷第十七己酉新增衍義白馬莖味鹹甘平無毒主傷中脈絕陰不起強志益氣長肌肉肥健生子小兒驚癇陰乾百日臣禹錫等謹按藥性論云白馬莖使味鹹能主男子陰痿堅長房中術偏要孟詵云白莖益丈夫陰氣陰乾者末和蓯蓉蜜丸空心酒下四十丸日再百日見效眼主驚癇腹滿瘧疾當殺用之臣禹錫等謹按驚癇通用藥云馬眼平懸蹄主驚邪瘛瘲乳難辟惡氣鬼毒蠱疰不祥止衄血內漏齲齒生雲中平澤臣禹錫等謹按藥對及齒痛通用藥云馬懸蹄平孟詵云懸蹄主驚癇白馬蹄療婦人瘻下白崩赤馬蹄療婦人赤崩臣禹錫等謹按崩中通用藥云馬蹄甲平藥訣云馬蹄味甘熱無毒孟詵云赤馬蹄主闢溫瘧齒主小兒驚癇臣禹錫等謹按日華子云馬齒水磨治驚癇鬐頭膏主生髮臣禹錫等謹按發禿落通用藥云馬鬐膏平鬐毛主女子崩中赤白心主喜忘臣禹錫等謹按孟詵云患痢人不得食肺主寒熱小兒莖痿臣禹錫等今詳莖痿非小兒之疾二字必誤肉味辛苦冷主熱下氣長筋強腰脊壯健強志輕身不飢臣禹錫等謹按孟詵云肉有小毒不與倉米同食必卒得惡十有九死不與姜同食生氣嗽其肉多著浸洗方煮得爛熟兼去血盡始可煮炙肥者亦然不爾毒不出陳士良云馬肉有大毒日華子云此肉只堪煮餘食難消不可多食食後以酒投之皆須好清水搦洗三五遍即可煮食之懷娠人及患痢人並不可食忌蒼耳生薑又鬃燒灰止血並敷惡瘡脯療寒熱痿痹屎名馬通微溫主婦人崩中止渴及吐下血鼻衄金創止血臣禹錫等謹按孟詵云患疔腫中風疼痛者炒驢馬糞熨瘡滿五十遍極效男子患未可及新瘥後合陰陽垂至死取白馬糞五升絞取汁好器中盛停一宿一服三合日夜二服頭骨主喜眠令人不睡臣禹錫等謹按好眠通用藥云馬頭骨微寒日華子云頭骨治多睡作枕枕之燒灰敷頭耳瘡佳溺味辛微寒主消渴破症堅積聚男子伏梁積疝婦人瘕疾銅器承飲之陶隱居云東行白馬蹄下土作方術知女人外情馬色類甚多以純白者為良其口眼蹄皆白俗中時有兩三爾小小用不必爾馬肝及鞍下肉舊言殺人食駿馬肉不飲酒亦殺人白馬青蹄亦不可食禮云馬黑脊而斑臂亦不可食馬骨傷人有毒人體有瘡馬汗馬氣馬毛亦並能為害唐本注云別錄云馬毛主小兒驚癇白馬眼主小兒鬾母帶之屎中慄主金創小兒客忤寒熱不能食絆繩主小兒癇並洗之今按陳藏器本草云馬肉及血有小毒食之當飲美酒即解婦人懷妊不得食馬驢騾為其十二月胎騾又不產馬頭骨水上流浸之則無水蜞音其又埋安午地令宜蠶凡收白馬莖當以遊牝時力勢正強者生取得為良馬牙燒作灰唾和緋帛貼疔腫上根出屎絞取汁主傷寒時疾服之當吐下亦主產後諸血氣及時行病起合陰陽垂死者並溫服之用馬屎及溺當以白者最良臣禹錫等謹按蜀本注云諸筋肉非十二月採者並宜火干之孟詵云惡刺瘡取黑馬尿熱漬當愈數數洗之日華子云尿洗頭瘡白禿圖經文具羖羊角條下雷公云要馬無病嫩身如銀春收者最妙臨用以銅刀劈破作七片將生羊血拌蒸半日出曬乾以粗布拭上皮並干羊血了細銼用也又馬自死肉不可食五月勿食傷神食療白馬黑頭食令人癲白馬自死食之害人肉冷有小毒主腸中熱除下氣長筋骨赤馬蹄闢溫又食諸馬肉心悶飲清酒即解濁酒即加又刺瘡取黑駁馬尿熱浸當蟲出患杖瘡並打損瘡中風疼痛者炒馬驢濕糞分取半替換熱熨之冷則易之滿五十過極效又小兒患頭瘡燒馬骨作灰和醋敷亦治身上瘡白禿瘡以駁馬不乏者尿數數暖之十遍瘥又白馬脂五兩封瘡上稍稍封之白禿者發即生又馬汗入人瘡毒氣攻作膿心懣欲絕者燒粟擀草作灰濃淋作濃灰汁熱煮蘸瘡於灰汁中須臾白沫出盡即瘥白沫者是毒氣也此方嶺南新有人曾得力凡生馬血入人肉中多隻三兩日便腫連心則死有人剝馬被骨傷手指血入肉中一夜致死又臆𦣛次驢𦣛也蹄無夜眼者勿食又黑脊而斑不可食患瘡疥人切不得食加增難瘥赤馬皮臨產鋪之令產母坐上催生聖惠方治頭赤禿用白馬蹄燒灰末以臘月豬脂和敷之外臺秘要剝馬被骨刺破中毒欲死取剝馬腹中糞及馬尿洗以糞敷之大驗絞糞汁飲之效又方治毒熱攻手足腫疼痛欲脫水煮馬糞汁漬之又方治小兒夜啼不已馬骨末敷乳上飲止千金方小兒卒客忤取馬屎三升燒令煙絕以酒三斗煮三沸去滓浴兒又方治肉症思肉不已食訖復思白馬尿三升空心飲當吐肉肉不出即死又方治齒齲切白馬懸蹄塞之不過三度瘥肘後方若病人齒無色舌上白或喜睡眠憒憒不知痛癢處或下痢可急治下部不曉此者但攻其上不以下為意下部生蟲蟲食其肛門爛見五臟便死燒馬蹄作灰末豬膽和敷綿上導下部日數度瘥又方闢溫疫馬蹄屑二兩縫囊帶之男左女右又方背瘡大驗取白馬齒燒作灰先以針刺瘡頭開即以灰封以濕面周腫處後以釅醋洗去灰根出又方治齒痛馬夜眼如米大納孔中或綿裹著蟲孔中納之即瘥永斷根源又方治人嗜眠喜睡馬頭骨燒灰末水服方寸匕日三夜一梅師方治吐血不止燒白馬糞研以水絞取汁服一升又方馬咬人或刺破瘡及馬汗入瘡毒痛取馬糞燒灰為末研敷瘡上及馬尿洗瘡佳食醫心鏡治馬癇動發無時筋脈不收周痹肌肉不仁野馬肉一斤細切於豉汁中煮著五味蔥白調和作醃臘食之作羹粥及白煮吃妙簡要濟眾治小兒中馬毒客忤取馬尾於兒面前燒令兒咽煙氣每日燒之瘥為度集驗方治天行䘌瘡燒蹄灰以豬脂和敷日五六用兵部手集多年惡瘡不瘥或痛癢生釁爛研馬糞並齒敷上不過三兩遍良武相在蜀自脛有瘡癢不可忍得此方便瘥又方治豌豆瘡馬肉爛煮汁洗干脯亦得劉涓子治被打腹中瘀血白馬蹄燒煙盡取灰末酒服方寸匕日三夜一亦治婦人血病塞上廣利方同又方馬病疥不可食生寸白蟲子母秘錄產後寒熱心悶極脹及百病馬通絞取汁一盞以酒和服之瘥產寶療乳腫以馬溺塗之立愈巢氏病源白馬尿治鱉瘕出搜神記禮記馬黑脊而斑臂漏不可食前漢轅固與黃任爭論於上前上曰食肉毋食馬肝未為不知味也注馬肝有毒食之殺人秦穆公亡善馬歧下蜀人共得食之吏欲法之公曰君子無以畜害人吾聞食善馬肉不飲酒傷人皆賜酒漢志文成食馬肝而死又韋莊又玄集序云食馬留肝丹房鏡源馬脂柔五金糞養一切藥力鹿茸味甘酸溫微溫無毒主漏下惡血寒熱驚癇益氣強志生齒不老療虛勞洒洒如瘧羸瘦四肢痠疼腰脊痛小便利泄精溺血破留血在腹散石淋癰腫骨中熱疽臣禹錫等謹按藥性論鹿茸君味苦辛主補男子腰腎虛冷腳膝無力夜夢鬼交精溢自出女人崩中漏血炙末空心溫酒服方寸匕又主赤白帶下入散用孟詵云鹿茸主益氣不可以鼻嗅其茸中有小白蟲視之不見入人鼻必為蟲顙藥不及也日華子云鹿茸補虛羸壯筋骨破瘀血殺鬼精安胎下氣酥炙入用養骨安胎下氣殺鬼精物不可近陰令痿久服耐老四月五月解角時取陰乾使時燥麻勃為之使唐本注云鹿茸夏收陰乾百不收一縱得一干臭不任用破之火干大好臣禹錫等謹按藥性論云鹿骨味甘微熱無毒角味鹹無毒主惡瘡癰腫逐邪惡氣留血在陰中除小腹血急痛腰脊痛折傷惡血益氣七月採杜仲為之使臣禹錫等謹按癰疽通用藥云鹿角溫微溫孟詵云角錯為屑白蜜五升淹之微火熬令小變曝乾更搗篩服之令人輕身益氣強骨髓補絕傷又婦人夢與鬼交者鹿角末三指一撮和清酒服即出鬼精又女子胞中余血不盡欲死者以清酒和鹿角灰服方寸匕日三夜一甚效又小兒以煮小豆汁和鹿角灰安重舌下日三度日華子云角療患瘡癰腫熱毒等醋摩敷脫精尿血夜夢鬼交並治之水摩服小兒重舌鵝口瘡炙熨之髓味甘溫主丈夫女子傷中絕脈筋急痛咳逆以酒和服之良臣禹錫等謹按藥性論云鹿髓無毒日華子云髓治筋骨弱嘔吐地黃汁煎作膏填骨髓蜜煮壯陽令有子腎平主補腎氣臣禹錫等謹按日華子云腎補中安五臟壯陽氣作酒及煮粥服肉溫補中強五臟益氣力生者療口僻割薄之陶隱居云野肉之中獐鹿可食生則不膻腥又非辰屬八卦無主而兼能溫補於人即生死無尤故道家許聽為脯過其餘肉雖牛羊雞犬補益充肌膚於亡魂皆為愆責並不足啖凡肉脯炙之不動及見水而動及曝之不燥並殺人又茅屋漏脯藏脯密器中名為郁脯並不可食唐本注云頭主消渴煎之可作膠服之彌善筋主勞損續絕骨主虛勞可為酒主風補虛髓脂主癰腫死肌溫中四肢不隨風頭通腠理一云不可近陰角主貓鬼中惡心腹疰痛血主狂犬傷鼻衄折傷陰痿補虛止腰痛齒主留血氣鼠瘻心腹痛不可近丈夫陰臣禹錫等謹按孟詵云鹿頭肉主消渴夜夢見物又蹄肉主腳膝疼痛肉主補中益氣力又生肉主中風口偏不正以生椒同搗敷之專看正即速除之九月以後正月以前堪食之也日華子云肉無毒補益氣助五臟生肉貼偏風左患右貼右患左貼頭肉治煩懣多夢蹄治腳膝酸又血治肺痿吐血及崩中帶下和酒服之良圖經曰鹿茸並角本經不載所出州土今有山林處皆有之四月角欲生時取其茸陰乾以形如小紫茄子者為上或云茄子茸太嫩血氣猶未具不若分岐如馬鞍形者有力茸不可嗅其氣能傷人鼻七月採角鹿年歲久者其角堅好煮以為膠入藥彌佳今醫家多貴麋茸麋角力緊於鹿本經自有麋脂角條在下品鹿髓可作酒唐方多有其法近世有服鹿血酒云得於射生者因採捕入山失道數日飢渴將委頓唯獲一生鹿刺血數升飲之飢渴頓除及歸遂覺血氣充盛異常人有效其服餌刺鹿頭角間血酒和飲之更佳其肉自九月以後正月以前宜食之它月不可食其腦入面膏雷公云凡使先以天靈蓋作末然後鋸解鹿茸作片子以好羊脂拌天靈蓋末塗之於鹿茸上慢火炙之令內外黃脆了用鹿皮一片裹之安室上一宿其藥魂歸也至明則以慢火焙之令脆方搗作末用之每五兩鹿茸用羊脂三兩炙盡為度又製法用黃精自然汁浸兩日夜了漉出焙令乾細搗用免渴人也鹿角使之勝如麋角其角要黃色緊重尖好者緣此鹿食靈草所以異其眾鹿其麋角頂根上有黃色毛若金線兼旁生小尖也色蒼白者上注乾寧記云其鹿與游龍相戲乃生此異爾採得角了須全戴者並長三寸鋸解之以物盛於急水中浸之一百日滿出用刀削去粗皮一重了以物拭水垢令淨然後用醋煮七日旋旋添醋勿令火歇戌時不用著火只從子時至戌時也日足其角白色軟如粉即細搗作粉卻以無灰酒煮其膠陰乾削了重研篩過用每修事十兩以無灰酒一鎰煎乾為度也食療云謹按肉九月後正月前食之則補虛羸瘦弱利五臟調血脈自外皆不食發冷痛角主癰疽瘡腫除惡血若腰脊痛折傷多取鹿角並截取尖錯為屑以白蜜淹浸之微火熬令小變色曝乾搗篩令細以酒服之輕身益力強骨髓補陽道角燒飛為丹服之至妙但於瓷器中或瓦器中寸截用泥裹大火燒之一日如玉粉亦可炙令黃末細羅酒服之益人若欲作膠者細破寸截以饙水浸七日令軟方煮也骨溫主安胎下氣殺鬼精可用浸酒凡是鹿白臆者不可食聖惠方治腎氣虛損耳聾用鹿腎一對去脂膜切於豉汁中入粳米二合和煮粥入五味之法調和空腹食之作羹及酒並得外臺秘要療鯁取鹿筋漬之索緊令大如彈丸持筋端吞之候至鯁處徐除引之鯁著筋出又方治消腎小便數鹿角一具炙令焦搗篩酒服方寸匕漸漸加至一匕半又方治蠼螋尿瘡燒鹿角末以苦酒調塗之千金方治小兒瘧用生鹿角細末先發時便以乳調一字服又方治竹木刺入肉皮中不出燒鹿角末以水和塗立出久者不一夕百一方若男女喜夢與鬼交通致恍惚者方截鹿角屑三指撮日二服酒下食療同又方丹者惡毒之瘡五色無常燒鹿角和豬脂敷之又方胎死得效方鹿角屑二三方寸匕煮蔥豉湯和服之立出又方主諸風腳膝疼痛不可踐地鹿蹄四隻燖洗如法熟煮了取肉於豉汁中著五味煮熟空腹食之又方主腎臟虛冷腰脊痛如錐刺不能動搖鹿角屑二大兩熬令微黃搗末空腹暖酒一杯投鹿角末方寸匕服之日三兩服梅師方治人面目卒得赤黑丹如疥狀不急治遍身即死燒鹿角末豬膏和塗之又方治卒腰痛暫轉不得鹿角一枚長五寸酒二升燒鹿角令赤納酒中浸一宿飲之又方治髮乳房初起微赤不急治之即殺人鹿角以水磨濁汁塗腫上赤即隨手消孫真人食忌鹿肉解藥毒不可久食蓋常食解毒草也斗門方治骨鯁用鹿角為末含津嚥下妙續千金方治腰膝疼痛傷敗鹿茸不限多少塗酥炙紫色為末溫酒調下一錢匕古今錄驗療妖魅貓鬼病人不肯言鬼方鹿角屑搗散以水服方寸匕即言實也又方治小兒噦鹿角粉大豆末等分相和乳調塗奶上飲兒兵部手集療妒乳硬欲結膿令消取鹿角於右上磨取白汁塗干又塗不得手近並以人嗍卻黃水一日許即散深師方療五癭取鹿厭以家酒漬炙乾納酒中更炙令香含咽汁味盡更易十具愈又方治馬鞍瘡鹿角灰酢和塗之子母秘錄療煩悶腹痛血不盡鹿角燒末豉汁服方寸匕日二服漸加至三錢匕楊氏產乳療腰痛鹿角屑熬令黃赤研酒服方寸匕日五六服產寶治娠卒腰痛方以鹿角截五寸燒令爛赤納酒一大升中浸之冷又燒赤又浸如此數過細研空心酒調鹿角末方寸匕服姚和眾治小兒重舌鹿角末細篩塗舌下日三度抱朴子云鹿壽千歲五百歲變白壺居士鹿性多驚烈多別良草恆食名物諸草不食處必山崗產婦下澤饗神用其肉者以其性別清淨故也凡餌藥之人久食鹿肉服藥必不得力所以鹿恆食解毒草能制諸藥耳名草者葛花菜鹿蔥白藥苗白蒿水芹甘草齊頭蒿山蒼耳薺苨又五月勿食鹿傷神衍義曰鹿茸他獸肉多屬十二辰及八卦昔黃帝立子醜等為十二辰以名月又以名獸配十二辰屬故獐鹿肉為肉中第一者避十二辰也味亦勝他肉三祀皆以鹿臘其義如此茸最難得不破及不出卻血者蓋其力盡在血中獵時多有損傷故也茸上毛先薄以酥塗勻於烈焰中急灼之若不先以酥塗恐火焰傷茸俟毛淨微炙入藥今人亦能將麻茸偽為之不可不察也頭亦可釀酒然須作漿時稍益蔥椒角為膠別有法按月令冬至一陽生麋角解夏至一陰生鹿角解各逐陰陽分合如此解落今人用麋鹿茸作一種殆疏矣凡麋鹿角自生至堅完無兩月之久大者二十餘斤其堅如石計一晝夜須生數兩凡骨之類成長無速於此雖草木至易生亦無能及之豈可與凡骨血為比麋茸利補陽鹿茸利補陰凡用茸無須太嫩唯長四五寸茸端如馬瑙紅者最佳須佐以他藥則有功牛角䚡下閉血瘀血疼痛女人帶下血燔之味苦無毒臣禹錫等謹按蜀本云沙牛角䚡味苦溫無毒主下閉瘀血女子帶下下血燒以為灰暖酒服之藥性論云黃牛角䚡灰臣味苦甘無毒性澀能止婦人血崩不止赤白帶下止冷痢瀉血水牛角療時氣寒熱頭痛臣禹錫等謹按藥對云水牛角平藥決云水牛角味苦冷無毒髓補中填骨髓久服增年髓味甘溫無毒主安五臟平三焦溫骨髓補中續絕益氣止泄痢消渴以酒服之臣禹錫等謹按孟詵云黑牛髓和地黃汁白蜜等分作煎服治瘦病膽可丸藥膽味苦大寒除心腹熱渴利口焦燥益目精陶隱居云此朱書牛角䚡髓其膽本經附出牛黃條中此以類相從耳非上品之藥今拔出隨例在此不關件數猶是黑書別品之限也臣禹錫等謹按藥性論云青牛膽君無毒主消渴利大小腸臘月牯牛膽中盛黑豆一百粒後一百日開取食後夜間吞二七枚鎮肝明目黑豆盛浸不計多少心主虛忘肝主明目腎主補腎氣益精齒主小兒牛癇肉味甘平無毒主消渴止啘泄安中益氣養脾胃自死者不良屎寒主水腫惡氣用塗門戶著壁者燔之主鼠瘻惡瘡臣禹錫等謹按孟詵云烏牛糞為上又小兒夜啼取干牛糞如手大安臥席下勿令母知子母俱吉黃犍牛烏牯牛溺主水腫腹脹腳滿利小便陶隱居云此牛亦𤚩牛為勝青牛最良水牛為可充食爾自死謂疫死肉多毒青牛腸不可共犬肉犬血食之令人成病也唐本注云別錄云牛鼻中木卷療小兒癇草卷燒之為屑主小兒鼻下瘡耳中垢主蛇傷惡蛓毒臍中毛主小兒久不行白牛懸蹄主婦人崩中漏赤白屎主霍亂屎中大豆主小兒癇婦人產難特牛莖主婦人漏下赤白無子烏牛膽主明目及疳濕以釀槐子服之彌佳腦主消渴風眩齒主小兒驚癇尿主消渴黃疸水腫腳氣小理不通也今按陳藏器本草云牛肉平消水腫除濕氣補虛令人強筋骨壯健鼻和石燕煮汁服主消渴肝和腹內百葉作生薑醋食之主熱氣水氣丹毒壓丹石發熱解酒勞五臟主人五臟黃牛肉小溫補益腰腳獨肝者有大毒食之痢血至死北人牛瘦多以蛇從鼻灌之則為獨肝也水牛則無之以前二色牛肉自死者發痼疾痃癖令人成疰病落崖死者良黃牛乳生服利人下熱氣冷補潤肌止渴和蒜煎三五沸食之主冷氣痃癖羸瘦凡服乳必煮一二沸停冷啜之熱食則壅不欲頓服欲得漸消與酸物相反令人腹中結症凡以乳及溺屎去病者黑牛強於黃牛酥堪合諸膏摩風腫踠跌血瘀醍醐更佳性滑以物盛之皆透唯雞子殼及葫蘆盛之不出屎熱灰敷炙瘡不瘥者水牛黃牛角䚡及在糞土中爛白者燒為黑灰末服主赤白痢口中涎主反胃又取老牛涎沫如棗核大置水中服之終身不噎口中齝醜之反草絞取汁服止噦本經不言黃牛烏牛水牛但言牛牛有數種南人以水牛為牛北人以黃牛烏牛為牛牛種既殊入用亦別也臣禹錫等謹按大腹水腫通用藥云黃牛溺寒蜀本云黃犍牛溺味苦辛微溫無毒孟詵云牛者稼穡之資不多屠殺自死者血脈已絕骨髓已竭不堪食黃牛發藥動病黑牛尤不可食黑牛尿及屎只入藥又頭蹄下熱風患冷人不可食其肝醋煮食之治瘦日華子云水牛肉冷微毒角煎治熱毒風並壯熱角䚡燒焦治腸風瀉血痢崩中帶下水瀉涎止反胃嘔吐治噎要取即以水洗口後鹽塗之則重吐出黃牛肉溫微毒益腰腳大都食之發藥毒動病不如水牛也唯酥乳佳骨髓溫無毒治吐血鼻洪崩中帶下腸風瀉血並水瀉燒灰用圖經文具第十六卷中牛黃條下食療云肚主消渴風眩補五臟以醋煮食之肝治痢腎主補腎髓安五臟平三焦溫中久服增年以酒送之和地黃汁白蜜作煎服之治瘦病恐是牛脂也糞主霍亂煮飲之又婦人無乳汁取牛鼻作羹空心食之不過三兩日有汁下無限若中年壯盛者食之良又宰之尚不堪食非論自死者其牛肉取三斤爛切將啖解槽咬人惡馬只兩啖後頗甚馴良若三五頓後其馬獰豚不堪騎十二月勿食傷神外臺秘要大病後不足病虛勞補虛取七歲以下五歲以上黃牛乳一升水四升煎取一升如人飢稍稍飲不得多十日服不住佳又方必效治上吐下利者為濕霍亂黃牛屎半升水一升煮三兩沸和牛屎濾過取汁服半升則止牛子屎亦得又方治久患氣脹烏牛尿空心溫服一升日一服氣散則止千金方鼻中生瘡黑牛耳垢敷之良又方治痔臘月牛脾一具熟食之盡瘥勿與鹽醬未瘥再作又方主喉痹燒牛角末酒服方寸匕又方五色丹名油腫若犯多致死不可輕之以屎敷之干即易千金翼主症癖及主鼓脹滿黑牛尿一升微火煎如稠糖空心飲服一大棗許當轉病出隔日更服之又方治甘蟲蝕鼻生瘡取烏牛耳中垢敷之良肘後方治傷寒時氣毒攻手足腫疼痛欲斷牛肉裹腫處止外臺秘要同又方風毒腳氣若經已滿捻之沒指但勤飲烏牸牛溺二三升使小便利漸漸消當以銅器取新者為佳純黃者亦可用又方癰腫未成膿取牛耳中垢封之愈又方治鼠瘻腫核痛若已有瘡口膿血出者以熱屎敷之日三經驗方痔漏張用方犍牛兒膽蝟膽各一個用膩粉五十文麝香二十文將蝟膽汁膩粉麝香和勻入牛膽內懸於檐前四十九日熟旋取為丸如大麥用紙拈送入瘡內後追出惡物是驗瘡口漸合生面蓋瘡內一遍出惡物經驗後方治冷痢沙角䚡燒灰粥飲調下兩錢梅師方治卒陰腎痛燒牛屎末和酒敷之干即易又方治霍亂吐痢不止心煩四肢逆冷黃牛屎一升以水二升煎取一升以綿濾過去滓頓服又方治水腫小便澀黃牛尿飲一升日至夜小便澀利差小者從少起勿食鹽孫真人云主癰發數處取牛糞燒作灰以雞子白和敷之干即易食醫心鏡主水浮氣腫腹肚脹滿小便澀少水牛蹄一隻湯洗去毛如食法隔夜煮令爛熟取汁作羹蹄切空心飽食又主水氣大腹浮腫小便澀少水牛尾滌洗去毛細切作腤𦽅極熟吃之煮食亦佳又牛肉一斤熟蒸以薑醋空心食水牛皮爛煮熟蒸切於豉汁中食之又烏犍牛尿半升空心飲之利小便又牛盛熱時卒死其腦食之生腸癰集驗方治淋取牛耳中毛燒取半錢水服瘥孫用和方治赤白帶下牛角䚡燒令煙斷附子以鹽水浸泡七度去皮右件等分搗羅為末每空心酒下二錢匕兵部手集治水病初得危急烏牛尿每服一合瘥塞上方主鼠奶痔牛角䚡燒作灰末空心酒服方寸匕姚氏方卒得淋取牛尾燒灰水服半錢瘥又方湯火燒灼瘡單敷濕屎立痛止常日用良又方治毒蛇螫人牛耳垢敷之佳子母秘錄治血氣逆心煩悶滿心痛燒水牛角末酒服方寸匕又方小兒白禿瘡頭上瘡團團白色以牛屎敷之產書主難產牛糞中大豆一枚擘作兩片一片書父一片書子卻合以少水吞之立產耳珠先生固牙齒法良殺牛齒三十枚固濟瓶中煅令通赤取細研為末水一盞末二錢匕煎令熱含浸牙齒冷即吐卻永堅牢或有損動者末揩之禮記牛夜鳴則㾞不可食丹房鏡源云牛屎抽銅暈衍義曰牛角䚡此則黃牛角䚡用尖燒為黑灰微存性治婦人血崩大便血及冷痢又白水牛鼻干濕皆可用治偏風口喎斜以火炙熱於不患處一邊熨之漸正羖羊角味鹹苦溫微寒無毒主青盲明目殺疥蟲止寒泄辟惡鬼虎狼止驚悸療百節中結氣風頭痛及蠱毒吐血婦人產後余痛燒之殺鬼魅闢虎狼久服安心益氣輕身生河西川穀取無時勿使中濕濕即有毒菟絲為之使唐本注云此羊角以青羝為佳余不入藥用也臣禹錫等謹按藥性論云羚羊角使治產後惡血煩悶燒灰酒服之又主輕身治小兒驚癇又曰青羊角亦大寒日華子云牯羊角退熱治山瘴溪毒燒之去蛇羊髓味甘溫無毒主男女傷中陰氣不足利血脈益經氣以酒服之青羊膽主青盲明目唐本注云羊膽療疳濕時行熱熛瘡和醋服之良臣禹錫等謹按目翳通用藥云青羊膽平藥性論云青羊肝服之明目膽點眼中主赤障白膜風淚主解蠱毒羊肺補肺主咳嗽唐本注云羊肺療渴止小便數並小豆葉煮食之良羊心止憂恚膈氣臣禹錫等謹按日華子云心有孔者殺人羊腎補腎氣益精髓唐本注云羊腎合脂為羹療勞痢甚效蒜齏食之一升療癥瘕臣禹錫等謹按日華子云腎補虛耳聾陰弱壯陽益胃止小便治虛損盜汗羊齒主小兒羊癇寒熱三月三日取羊肉味甘大熱無毒主緩中字乳余疾及頭腦大風汗出虛勞寒冷補中益氣安心止驚唐本注云羊肉熱病瘥後食之發熱殺人臣禹錫等謹按孟詵云羊肉溫主風眩瘦病小兒驚癇丈夫五勞七傷臟氣虛寒河西羊最佳河東羊亦好縱驅至南方筋力自勞損安能補益人肚主補胃小便數以肥肚作羹食三五度瘥又云羊肉患天行及瘧人食發熱困重致死日華子云羊肉治腦風並大風開胃肥健頭涼治骨蒸腦熱頭眩明目小兒驚癇脂治遊風並黑䵟羊骨熱主虛勞寒中羸瘦羊屎燔之主小兒泄痢腸鳴驚癇陶隱居云羖羊角方藥不甚用其餘皆入湯煎羊有三四種最以青色者為勝次則烏羊其䍲羺羊及虜中無角羊正可啖食之為藥不及都下者其乳髓則肥好也羊肝不可合豬肉及梅子小豆食之傷人心大病人唐本注云羊屎煮湯下灌療大人小兒腹中諸疾疳濕大小便不通燒之熏鼻主中惡心腹刺痛熏瘡療諸瘡中毒痔瘻等骨蒸彌良羊肝性冷療肝風虛熱目赤暗無所見生食子肝七枚神效羊頭療風眩瘦疾小兒驚癇骨療同羊血主女人中風血虛悶產後血暈悶絕者生飲一升即活今按陳藏器本草云羊乳補虛與小兒含之主口瘡不堪充藥為其膻故羊五臟補人五臟肝主明目薄切曬乾為末和決明子蓼子並炒香搗篩為丸每日服之去盲暗皮作臛食之去風屎燒灰沐髮長黑和雁肪塗頭生髮臣禹錫等謹按孟詵云羊毛醋煮裹腳治轉筋角灰主鬼氣下血日華子云牯羊糞燒灰理聤耳並罯刺圖經曰羖羊角出河西川穀今河東陝西及近都州郡皆有之此青羝羊也余羊則不堪取無時勿使中濕濕則有毒羊齒骨及五臟皆溫平而主疾唯肉性大熱時疾初愈百日內不可食食之當復發及令人骨蒸也羊屎方書多用近人取以納鯽魚腹中瓦缶固濟燒灰以塗髭發令易生而黑甚效乳療蜘蛛咬遍身生絲者生飲之即愈劉禹錫傳信方載其效云貞元十一年余至奚吏部宅坐客有崔員外因話及此崔云目擊有人為蜘蛛咬腹大如有妊遍身生絲其家棄之乞食於道有僧教吃羊乳未幾而疾平胃主虛羸張文仲有主久病瘦羸不生肌肉水氣在脅下不能飲食四肢煩熱者羊胃湯方羊胃一枚術一升並切以水二斗煮取九升一服一升日三三日盡更作兩劑乃瘥肉多入湯劑胡洽羊肉湯療寒勞不足產後及身腹中有激痛方當歸四兩生薑五兩羊肉一斤三味以水一斗二升煮肉取七升去肉納諸藥煮取三升一服七合日三夜一又有大羊肉湯療婦人產後大虛心腹絞痛厥逆氣息乏少皆今醫家通用者又有青羊脂丸主疰病相易者皆大方也羊之種類亦多而羖羊亦有褐色黑白色者毛長尺余亦謂之羖䍽羊北人引大羊以此羊為群首又孟詵云河西羊最佳河東羊亦好縱有驅至南方筋力自勞損安能補人然今南方亦有數種羊唯淮南州郡或有佳者可亞大羊江浙羊都少味而發疾閩廣山中出一種野羊彼人謂之羚羊其皮厚硬不堪多食肉頗肥軟益人兼主冷勞山嵐瘧痢婦人赤白下然此羊多啖石香薷故腸臟頗熱亦不宜多食也謹按本經云羊肉甘而素問云羊肉苦兩說不同蓋本經以滋味言而素問以物性解羊性既熱熱則歸火故配於苦麥與杏薤性亦熱並同配於苦也又下條有白馬陰莖眼蹄白馬懸蹄赤馬蹄齒鬐頭膏鬐毛心肺肉脯頭骨屎溺及牡狗陰莖膽心腦齒四蹄白狗血肉屎中骨本經並有主治唯白馬莖眼懸蹄用出雲中平澤者余無所出州土今醫方多用馬通即馬屎也及狗膽其餘亦稀使故但附見於此下食療角主驚邪明目闢鬼安心益氣燒角作灰治鬼氣並漏下惡血羊肉妊娠人勿多食頭肉平主緩中汗出虛勞安心止驚宿有冷病人勿多食主熱風眩疫疾小兒癇兼補胃虛損及丈夫五勞骨熱熱病後宜食羊頭肉肚主補胃病虛損小便數止虛汗肝性冷治肝風虛熱目赤暗痛熱病後失明者以青羊肝或子肝薄切水浸敷之極效生子肝吞之尤妙主目失明取羖羊肝一斤去脂膜薄切以未著水新瓦盆一口揩令淨鋪肝於盆中置於炭火上爆令脂汁盡候極干取決明子半升蓼子一合炒令香為末和肝杵之為末以白蜜漿下方寸匕食後服之日三加至三匕止不過二劑目極明一年服之妙夜見文字並諸物其羖羊即骨歷羊是也常患眼痛澀不能視物及看日光並燈火光不得者取熟羊頭眼睛中白珠子二枚於細石上和棗汁研之取如小麻子大安眼睛上仰臥日二夜二不過三四度瘥羊心補心肺從三月至五月其中有蟲如馬尾毛長二三寸以來須割去之不去令人痢又取皮去毛煮羹補虛勞煮作臛食之去一切風治腳中虛風羊骨熱主治虛勞患宿熱人勿食髓酒服之補血主女人風血虛悶頭中髓發風若和酒服則迷人心便成中風也羊屎黑人毛髮主箭鏃不出糞和雁膏敷毛髮落三宿生白羊黑頭者勿食之令為患腸癰一角羊不可食六月勿食羊傷神謹按南方羊都不與鹽食之多在山中吃野草或食毒草若此羊一二年間亦不可食食必病生爾為其來南地食毒草故也若南地人食之即不憂也今將北羊於南地養三年之後猶亦不中食何況於南羊能堪食乎蓋土地各然也聖惠方治風心煩恍惚腹中痛或時悶絕而復甦用羖羊角屑微炒搗羅為散不計時候溫酒調下一錢匕又方治硫黃忽發氣悶用羊血服一合效外臺秘要崔氏療傷寒手足疼欲脫取羊屎煮汁以灌之瘥止亦療時疾陰囊及莖熱腫亦可煮黃柏等洗之併除傷寒之疾又方治小兒疳羊膽二個和漿水灌下部豬膽亦得又方救急治天行後嘔逆不下食食入即出取羊肝如食法作生淡食不過三度即止又方療氣癭方羊厭一具去脂含汁盡去之日一具七日含便瘥止千金方療尿床方羊肚盛水令滿系兩頭熟煮開取水頓服之即瘥又方治目赤及翳羊眼睛曝乾為末敷兩目又方療目𥇀𥇀青羊肝內銅器內煮以麵餅復面上上鑽兩孔如人眼止以目向上熏之不過兩度又方治小兒口中涎出取白羊屎納口中又方治發不生以羊屎灰淋取汁洗之三日一洗不過十度即生又方治被打頭青腫貼新羊肉於腫上又方闢蛇法蛇到燒羖羊角令有煙出蛇即去矣又方治木刺入肉中不出痛取干羊屎燒灰和豬脂調塗不覺自出又方治卒驚悸九竅血皆溢出取新屠羊血熱飲二升瘥肘後方治白禿以羊肉如作脯法炙令香及熱以拓上不過三四日瘥又方治眼暗熱病後失明以羊膽敷之旦暮時各一敷之又方治誤吞釘並箭金針錢等物多食肥羊肉肥脂諸般肥肉等自裹之必得出外臺秘要同又方療面目身卒得赤斑或癢或瘭子腫起不即始之日甚殺人羖羊角燒為灰研令極細以雞子清和塗之甚妙又方療面多皯𪒟如雀卵色以羖羊膽一枚酒二升合煮三沸以塗拭之日三度瘥經驗後方治五勞七傷陽氣衰弱腰腳無力羊腎蓯蓉羹法羊腎一對去脂膜細切肉蓯蓉一兩酒浸一宿刮去皴皮細切相和作羹蔥白鹽五味等如常法事治空腹食之梅師方治產後余血攻心或下血不止心悶面青身冷氣欲絕新羊血一盞飲之三兩服妙又方目暗黃昏不見物者以青羊肝切淡醋食之煮亦佳孫真人食忌羊蹄筋膜中珠子食之令人癲羊一角者害人食醫心鏡主風眩羸瘦小兒驚癇丈夫五勞手足無力羊頭一枚燖洗如法蒸令熟切以五味調和食之又主腎勞損精竭炮羊腎一雙去脂細切於豉汁中以五味米糅如常法作羹食作粥亦得又治產後大虛羸瘦無力腹肚痛冷氣不調又腦中風汗自出白羊肉一斤切如常法調和醃臘食之又治風胎瘦病五勞七傷虛驚悸白羊頭一枚燖如食法煮令及熟切於豉汁中五味調和食之又治脾胃氣冷食入口即吐出羊肉半斤去脂膜切作生以蒜齏五辣醬醋空腹食又主下焦虛冷小便數瘦兼無力羊肺一具細切納少羊肉作羹食之煮粥亦得又主下焦虛冷腳膝無力陽事不行補益羊腎一個熟煮和半大兩煉成乳粉空腹食之甚有效又益腎氣強陽道白羊肉半斤去脂膜切作生以蒜齏食之三日一度甚妙又主腎臟虛冷腰脊轉動不得羊脊骨一具嫩者捶碎爛煮和蒜齏空腹食之兼飲酒少許妙又理目熱赤痛如隔紗縠看物不分明宜補肝氣益睛青羊肝一具細起薄切以水洗漉出瀝乾以五味醬醋食之又理風眩瘦疾小兒驚癇兼丈夫五勞七傷羊頭一枚治如食法煮令熟作膾以五辣醬臘食之兵部手集療無故嘔逆酸水不止或吐三五口食後如此方羊屎十顆好酒兩合煎取一合頓服即愈如未定更服看大小加減服之六七歲即五顆子母秘錄療產後寒熱心悶極脹百病羖羊角燒末酒服方寸匕未瘥再服姚和眾治小孩食土方候市人合時買市中羊肉一斤以繩系之令人著地拽至家以水洗炒炙依料與兒吃如未吃食即煮汁喂禮記羊冷毛而毳膻不可食周成王人獻四角羊丹房鏡源羊脂柔銀軟銅羚羊角縮賀賀錫也衍義曰羚羊角出陝西河東謂之羖䍽羊尤狠健毛最長而厚此羊可入藥如要食不如無角白大羊本草不言者亦有所遺爾又同華之間有臥沙細肋其羊有角似羖羊但低小供饌在諸羊之上張仲景治寒疝用生薑羊肉湯服之無不驗又一婦人產當寒月寒氣入產門臍下脹滿手不敢犯此寒疝也醫將治之以抵當湯謂其有瘀血嘗教之曰非其治也可服張仲景羊肉湯少減水二服遂愈牡狗陰莖味鹹平無毒主傷中陰痿不起令強熱大生子除女子帶下十二疾一名狗精六月上伏取陰乾百日臣禹錫等謹按日華子云犬陰治絕陽及婦人陰瘻膽主明目痂瘍惡瘡臣禹錫等謹按鼻衄血通用藥云狗膽平藥性論云狗膽亦可單用味苦有小毒主鼻齆鼻中息肉孟詵云膽去眼中膿水又白犬膽和通草桂為丸服令人隱形青犬尤妙日華子云膽主撲損瘀血刀箭瘡心主憂恚氣除邪臣禹錫等謹按日華子云心治狂犬咬除邪氣風痹療鼻衄及下部瘡腦主頭風痹下部䘌瘡鼻中息肉齒主癲癇寒熱卒風痱伏日取之臣禹錫等謹按癲癇通用藥云狗齒平日華子云齒理小兒客忤燒入用頭骨主金瘡止血臣禹錫等謹按金瘡通用藥云狗頭骨平蜀本云余骨主補虛小兒驚癇止下痢藥性論云狗頭骨使燒灰為末治久痢勞痢和乾薑莨菪焦炒見煙為丸白飲空心下十丸極效日華子云頭骨燒灰用亦壯陽黃者佳四腳蹄煮飲之下乳汁臣禹錫等謹按下乳汁通用藥云狗四足平白狗血味鹹無毒主癲疾發作臣禹錫等謹按癲癇通用藥及藥對云白狗血溫日華子云血補安五臟肉味鹹酸溫主安五臟補絕傷輕身益氣臣禹錫等謹按孟詵云犬肉益陽事補血脈厚腸胃實下焦填精髓不可炙食恐成消渴但和五味煮空腹食之不與蒜同食必頓損人若去血則力少不益人瘦者多是病不堪食日華子云犬肉暖無毒補胃氣壯陽暖腰膝補虛勞益氣力屎中骨主寒熱小兒驚癇陶隱居云白狗烏狗入藥用白狗骨燒屑療諸瘡瘻及妒乳癰腫黃狗肉大補虛不及牡者牡者父也又呼為犬言腳上別有一懸蹄者是也白狗血合白雞肉白鵝肝白羊肉烏雞肉蒱子羹等皆病人不可食犬春月目赤鼻燥欲狂猘者不宜食唐本注云別錄云狗骨灰主下痢生肌敷馬瘡烏狗血主產難橫生血上搶心者下頷骨主小兒諸癇陰卵主婦人十二疾為灰服之毛主產難白狗屎主疔瘡水絞汁服主諸毒不可入口者今按陳藏器本草云狗正黃色者肉溫補宜腰腎起陽道骨煎為粥熱補令婦人有子乳汁主青盲取白犬生子目未開時乳汁注目中療十年盲狗子目開即瘥膽塗惡瘡腎主婦人產後腎勞如瘧者婦人體熱用豬腎體冷即用犬腎肝心主狂犬咬以敷瘡上屎主瘭疽徹骨癢者當燒作灰塗瘡勿令病者知又屎和臘月豬脂敷瘻瘡又敷溪毒疔腫出根頸下毛主小兒夜啼絳袋盛系著兒兩手狗肝主腳氣攻心作生薑醋進之當泄先泄勿服之臣禹錫等謹按藥對云屎中骨平日華子云犬黃者大補益余色微補古言薯蕷涼而能補犬肉暖而不補雖有此言服終有益然奈穢甚不食者眾圖經文具羖羊角條下唐本余牡狗陰莖並同白狗血主女人生子不出納酒中服之主下痢卒風痱伏日取之主補虛小兒驚癇止下痢食療牡狗陰莖補髓肉溫主五臟補七傷五勞填骨髓大補益氣力空腹食之黃色牡者上白黑色者次女人妊娠勿食又上伏日採膽以酒調服之明目去眼中膿水又主惡瘡痂癢以膽汁敷之止膽敷惡瘡能破血有中傷因損者熱酒調半個服瘀血盡下又犬傷人杵生杏仁封之瘥比來去血食之卻不益人也肥者血亦香美即何要去血去血之後都無效矣犬自死舌不出者食之害人九月勿食犬肉傷神聖惠方治眼癢急赤澀用犬膽汁注目中又方治附骨疽及魚眼瘡用狗頭燒煙燻之又方治婦人赤白帶下久不止用狗頭燒灰為細散每日空心及食前溫酒調下一錢匕外臺秘要療食魚肉等成癥結在腹並諸毒氣方狗糞五升燒末之綿裹酒五升漬再宿取清分十服日再以後日三服使盡隨所食癥結即便出矣又方療腰痛取黃狗皮炙裹腰痛處取暖徹為度頻即瘥也徐伯玉方同又方治馬鞍瘡狗牙灰酢和敷之又五月五日取牡狗糞燒灰數敷之良又方治發背神驗牡狗白糞半升覺欲作腫時以暖水一升絞取汁分再服仍以滓敷上每日再為之瘥止千金翼方治產後煩悶不能食白犬骨一味燒研以水服方寸匕葛氏方治久下痢經時不止者此成休息療之取犬骨炙令黃焦搗飲服方寸匕日三服即愈又方治小兒卒得癇刺取白犬血一棗許含之又塗身上又方療猘犬咬人仍殺所咬犬取腦敷之後不復發百一方鬼擊之病得之無漸卒著如刀刺狀胸脅腹內絞急切痛不可抑按或即吐血衄血下血一名鬼排斷白犬頭取熱血一升飲之又方卒得瘑瘡常對在兩腳塗白犬血立愈經驗方治血氣搊撮不可忍者黑狗膽一個半乾半濕割開以篦子挑丸如綠豆大蛤粉滾過每服五丸燒生鐵淬酒下其痛立止經驗後方治婦人產後血不定奔四肢並違墮狗頭骨灰以酒調下二錢匕甚效梅師方食鬱肉漏脯中毒燒犬屎末酒服方寸匕聖惠方同又方治熱油湯火燒瘡痛不可忍取狗毛細剪以烊膠和毛敷之至瘡落漸瘥食醫心鏡治脾胃冷弱腸中積冷脹滿刺痛肥狗肉半斤以米鹽豉等煮粥頻吃一兩頓又方下痢臍下切痛狗肝一具洗細切米一升稀調煮粥空腹點三兩合蒜吃椒蔥鹽醬任性著之又治浮腫小便澀少精肥狗肉五斤熟蒸空腹服之又主氣水鼓脹浮腫狗肉一斤細切和米煮粥空腹吃作羹臛吃亦佳子母秘錄療小兒桃李鯁狗頭煮湯摩頭上瘥楊氏產乳妊娠不得食狗肉令兒無聲魏志河內太守劉勳女病左膝瘡癢華佗視之以繩系犬後足不得行斷犬腹取膽向瘡口須臾有蟲若蛇從瘡上出長三尺病愈丹房鏡源白狗糞煮錫羚羊角味鹹苦寒微寒無毒主明目益氣起陰去惡血注下闢蠱毒惡鬼不祥安心氣常不魘寐療傷寒時氣寒熱熱在肌膚溫風注毒伏在骨間除邪氣驚夢狂越僻謬及食噎不通久服強筋骨輕身起陰益氣利丈夫生石城山川穀及華陰山採無時陶隱居云今出建平宜都諸蠻中及西域多兩角一角者為勝角甚多節蹙蹙園繞別有山羊角長極長唯一邊有節節亦疏大不入藥用爾雅名羱羊而羌夷云只此名羚羊角甚能陟峻短角者乃是山羊爾亦未詳其正唐本注云爾雅云羚大羊羊如牛大其角堪為鞍橋一名羱羊俗名山羊或名野羊善鬥至死又有山驢大如鹿皮堪靴用有兩角角大小如山羊角前言其一邊有蹙文又疏慢者是此也陶不識謂山羊誤矣二種並不入藥而俗人亦用山驢角者今用細如人指長四五寸蹙紋細者南山商浙間大有今出梁州直州洋州亦貢之今按陳藏器本草云羚羊角主溪毒及驚悸煩悶臥不安心胸間惡氣毒瘰癧肉主蛇咬惡瘡山羊山驢羚羊三種相似醫工所用但信市人遂令湯丸或致乖舛且羚羊角有神夜宿取角掛樹不著地但取角彎中深銳緊小猶有掛痕者即是真慢無痕者非作此分別余無它異真角耳邊聽之集集鳴者良陶云一角者謬也臣禹錫等謹按藥性論云羚羊角臣味甘能治一切熱毒風攻注中惡毒風卒死昏亂不識人散產後血衝心煩悶燒末酒服之主小兒驚癇治山瘴能散惡血燒灰治噎塞不通孟詵云羚羊北人多食南人食之免為蛇蟲所傷和五味子炒之投酒中經宿飲之治筋骨急強中風又角主中風筋攣附骨疼痛生摩和水塗腫上及惡瘡良又卒熱悶屑作末研和少蜜服亦治熱毒痢及血痢圖經曰羚羊角出石城山谷及華陰山今秦隴龍蜀金商州山中皆有之戎人多捕得來貨其形似羊也青而大其角長一二尺有節如人手指握痕又至堅勁今入藥者皆用此角謹按爾雅云羚大羊羱音元如羊郭璞注云羚似羊而大角圓銳好在山崖間羱似吳羊而大角角橢出西方許慎注說文解字云羚大羊而細角陶隱居以角多節蹙蹙圓繞者為羚羊而角極長唯一邊有節節亦疏大者為山羊山羊即爾雅所謂羱羊也唐注以一邊有蹙文又疏慢者為山驢角云時人亦用之又以細如人指長四五寸蹙紋細者為堪用陳藏器云羚羊夜宿以角桂木不著地但取角彎中深銳緊小猶有掛痕者是觀今市貨者與爾雅所謂羱羊陶注所謂山羊唐注所謂山驢大都相似今人相承用之以為羱羊其細角長四五寸如人指多節蹙蹙園繞者其間往往彎中有磨角成痕處京師極多詳本草及諸家所出此乃是真羱羊而世多不用不知其所以然者何也又陳藏器謂真角耳邊聽之集集鳴者良今牛羊諸角但殺之者聽之皆有聲不必專羚角也自死角則無聲矣雷公凡所用亦有神羊角其神羊角長有二十四節內有天生木胎此角有神力可抵千牛之力也凡修事之時勿令單用不復有驗須要不拆原對以繩縛之將鐵錯子錯之旋旋取用勿令犯風錯未盡處須三重紙裹恐力散也錯得了即單搗搗盡背風頭重篩過然入藥中用之若更研萬匝了用之更妙免刮人腸也食療傷寒熱毒下血末服之即瘥又療疝氣外臺秘要治噎羚羊角屑不拘多少自在末之飲服方寸匕亦可以角摩噎上良千金方療產後心悶不識人汗出羚羊角燒末以東流水服方寸匕未瘥再服肘後方血氣逆心煩滿燒羚羊角若水羊角末水服方寸匕子母秘錄治胸脅痛及腹痛熱滿燒羚羊角末水服方寸匕又方治小兒洞下痢羊角中骨燒末飲服方寸匕產寶令易產羚羊角一枚刮尖為末以酒調方寸匕衍義曰羚羊角今皆取有掛痕者陳藏器取耳邊聽之集集鳴者良亦強出此說未嘗遍試也今將他角附耳皆集集有聲不如有掛痕一說盡矣然多偽為之不可不察也犀角味苦酸咸寒微寒無毒主百毒蠱疰邪鬼瘴氣殺鉤吻鴆羽蛇毒除邪不迷惑魘寐療傷寒溫疫頭痛寒熱諸毒氣久服輕身駿健生永昌山谷及益州松脂為之使惡雚菌雷丸陶隱居云今出武陵交州寧州諸遠山犀有二角以額上者為勝又有通天犀角上有一白縷直上至端此至神驗或云是水犀角出水中漢書所云駭雞犀者以置米中雞皆驚駭不敢啄又置屋中烏鳥不敢集屋上又云通天犀者夜露不濡以此知之凡犀見成物皆被蒸煮不堪入藥唯生者為佳雖是犀片亦是已經煮炙況用屑乎又有牸犀其角甚長紋理亦似犀不堪藥用唐本注云牸是雌犀紋理細膩斑白分明俗謂斑犀服用為上然充藥不如雄犀也今按陳藏器本草云犀肉主諸蠱蛇獸咬毒功用劣於角本經有通天犀且犀無水陸二種並以精粗言之通天者腦上角千歲者長且銳白星徹端能出氣通天則能通神可破水駭雞故曰通天抱朴子曰通天犀有白理如線者以盛米雞即駭矣其真者刻為魚銜入水水開三尺其鼻角一名奴角一名食角臣禹錫等謹按陳藏器云爾雅云兕似牛一角犀似豕三角復云多似象復如豕三角陶據爾雅而言不知三角之誤也又曰雌者是兕而形不同未知的實藥性論云牯犀角君味甘有小毒能辟邪精鬼魅中惡毒氣鎮心神解大熱散風毒能治發背癰疽瘡腫化膿作水主療時疾熱如火煩悶毒入心中狂言妄語日華子云犀角味甘辛治心煩止驚安五臟補虛勞退熱消痰解山瘴溪毒鎮肝明目治中風失音熱毒風時氣發狂圖經曰犀角出永昌山谷及益州今出南海者為上黔蜀者次之犀似牛豬首大腹痹腳腳有三蹄色黑好食棘其皮每一孔皆生三毛頂一角或云兩角或云三角謹按郭璞爾雅注云犀三角一在頂上一在額上一在鼻上鼻上者即食角也小而不橢音墮亦有一角者嶺表錄異曰犀有二角一在額上為兕犀一在鼻上為胡帽犀牯犀亦有二角皆為毛犀而今人多傳一角之說此數種俱有粟紋以紋之粗細為貴賤角之貴者有通天花紋犀有此角必自惡其影常飲濁水不欲照見也其紋理絕好者則有百物之形或云犀之通天者是其病理不可知也紋有倒插者有正插者有腰鼓插者其倒插者一半以下通正插者一半以上通腰鼓插者中斷不通其類極多足為奇異故波斯呼象牙為白暗犀角為黑暗言難識別也犀中最大者墮羅犀一株有重七八斤者云是牯犀額角其花多作撒豆斑色深者堪帶胯斑散而色淺者但可作器皿耳或曰兕是犀之雌者未知的否凡犀入藥者有黑白二種以黑者為勝其角尖又勝方書多言生犀相承謂未經水火中過者是或謂不然蓋犀有捕得殺而取者為生犀有得其蛻角者為退犀亦猶用鹿角法耳唐相段文昌門下醫人吳士皋因職於南海見舶主言海人取犀牛之法先於山路多植木如豬羊棧其犀以前腳直常依木而息多年植木爛犀忽倚之即水折犀倒久不能起因格殺而取其角又云犀每自退角必培土埋之海人知處即潛作木寓角而易之再三不離其處時復有得者若直取之則犀去於別山退藏不可尋也未知今之取犀角果如此否海藥謹按異物志云山東海水中其牛樂聞絲竹彼人動樂牛則出來以此採之有鼻角頂角鼻角為上大寒無毒主風毒攻心毷氉熱悶擁毒赤痢小兒麩豆風熱驚癇並宜用之凡犀屑了以紙裹於懷中良久合諸色藥物絕為易搗又按通天犀胎時見天上物命過並形於角上故云通天犀也欲驗於月下以水盆映則知通天矣正經云是山犀少見水犀五溪記云山犀者食於竹木小便即竟日不盡夷獠家以弓矢而採故曰黔犀又劉孝標言犀墮角里人以假角易之未委虛實雷公曰凡使勿用奴犀牸犀病水犀孿子犀下角犀淺水犀無潤犀要使烏黑肌粗皺坼裂光潤者上凡修治之時錯其屑入臼中搗令細再入缽中研萬匝方入藥中用之婦人有妊勿服能消胎氣凡修治一切角大忌鹽也食療此只是山犀牛未曾見人得水犀取其角此兩種者功亦同也其生角寒可燒成灰治赤痢研為末和水服之又主卒中惡心痛諸飲食中毒及藥毒熱毒筋骨中風心風煩悶皆瘥又以水磨取汁與小兒服治驚熱鼻上角尤佳肉微溫味甘無毒主瘴氣百毒蠱疰邪鬼食之入山林不迷失其路除客熱頭痛及五痔諸血痢若食過多令人煩即取麝香少許和水服之即散也聖惠方治雉肉作臛食之吐下用生犀角末方寸匕新汲水調下即瘥外臺秘要服藥過劑及中毒煩悶欲死燒犀角末水服方寸匕千金方有蠼螋蟲尿人影著處便令人體病瘡其狀如粟粒累累一聚滲痛身中忽有處燥痛如芒刺亦如刺蟲所螫後細瘡㿔作叢如茱萸子狀也四畔赤中央有白膿如黍粟亦令人皮急舉身惡寒壯熱極者連起竟腰脅胸也治之法初得磨犀角塗之止肘後方臥忽不寤若火照之則殺人但痛齧其踵又足拇指甲際而多唾其面即活犀角枕佳或以青木香內枕中並帶廣利方治孩子驚癇不知人迷悶嚼舌仰目者犀角末半錢匕水二大合服之立效抱朴子鄭君言但習閉氣至千息久久則能居水中一日許得真通天犀角三寸以上者刻為魚銜之入水水常為開方三尺可得氣息水中又通天犀赤理如綖自本徹末以角盛米著地群雞不敢啄輒驚故南人名為駭雞犀是故有蟲毒之鄉於他家飲食即以角攪之白沫竦起即為有毒無沫即無毒也朝野僉載鴆食水處有犀牛不濯角其水物食之必死為鴆食蛇之故也晉溫嶠過牛渚磯水深不可測世云其下多怪物嶠遂燬犀角而照之須臾見水族復火奇形異狀或乘馬車著赤衣者嶠其夜夢人謂己曰與君幽明自別何意相照也意甚惡之未旬而卒太平廣記通天犀為之駭雞犀以角煮毒藥為湯皆生白沫無復毒勢李司封宗易嘗言石駙馬保吉知陳州其州廨一皆新之每毀舊屋則坐於下風塵自分去人皆驚怪之蓋其所服帶闢塵犀也歸田錄人氣粉犀衍義曰犀角凡入藥須烏色未經湯水浸煮者故曰生犀川犀及南犀紋皆細烏犀尚有顯紋者露黃犀紋絕少皆不及西番所出紋高兩腳顯也物像黃外黑者為正透物像黑外黃者為倒透蓋以烏為正以形象肖物者為貴既曰通犀又須紋頭顯黃黑分明透不脫有兩腳滑潤者為第一鹿取茸犀取尖其精銳之力盡在是矣犀角尖磨服為佳若在湯散則屑之西蕃者佳虎骨主除邪惡氣殺鬼疰毒止驚悸主惡瘡鼠瘻頭骨尤良臣禹錫等謹按鬼疰屍疰及惡瘡通用藥並藥對云虎骨平藥性論云虎骨臣殺犬咬毒味辛微熱無毒治筋骨毒風攣急屈伸不得走疰疼痛主屍疰腹痛治溫瘧療傷寒溫氣膏主狗齧瘡爪辟惡魅肉主噁心欲嘔益氣力陶隱居云俗方熱食虎肉壞人齒信自如此虎頭作枕辟惡魘以置戶上闢鬼鼻懸戶上令生男骨雜朱畫符療邪須療齒痛爪以懸小兒臂辟惡鬼唐本注云別錄云屎主惡瘡其眼睛主癲其屎中骨為屑主火瘡牙主丈夫陰瘡及疽瘻鼻主癲疾小兒驚癇今按陳藏器本草云虎威令人有威帶之臨官佳無官為人所憎威有骨如乙字長一寸在脅兩旁破肉取之尾端亦有不如脅者膽主小兒驚癇肉及皮主瘧骨煮汁浴小兒去瘡疥鬼疰驚癇屎主鬼氣眼光主驚邪辟惡鎮心凡虎夜視以一目放光一目看物獵人候而射之弩箭才及目光隨墮地得之者如白石是也臣禹錫等謹按孟詵云肉食之入山虎見有畏闢三十六種精魅又眼睛主瘧病辟惡小兒熱驚悸膽主小兒疳痢驚神不安研水服之骨煮湯浴去骨節風毒膏納下部治五痔下血日華子云肉味酸平無毒治瘧又睛鎮心及小兒驚啼疳氣客忤圖經曰虎骨並睛爪本經不載所出州土今有山林處皆有之骨用頭及脛色黃者佳睛亦多偽須自獲者乃真爪並指骨毛存之以系小兒臂上辟惡鬼兩脅間及尾端皆有威如乙字長一二寸許此數物皆用雄虎者勝凡鹿虎之類多是藥箭射殺者不可入藥蓋藥毒浸漬骨肉間猶能傷人也李絳兵部手集方有虎骨酒法治臂脛痛不計深淺皆效用虎脛骨二大兩粗搗熬黃羚羊角一大兩屑新芍藥二大兩切細三物以無灰酒浸之春夏七日秋冬倍日每旦空腹飲一杯冬中速要服即以銀器物盛火爐中暖養之三兩日即可服也又崔元亮海上方治腰腳不隨取虎腰脊骨一具細銼訖又以斧於石上更捶碎又取前兩腳全骨如前細捶之兩件並於鐵床上以文炭火勻炙翻轉候待脂出甚則投濃美無灰酒中密封春夏一七日秋冬三七日每日空腹隨飲性多則多飲性少則少飲未飯前三度溫飲之大戶以酒六七斗止小戶二斗止患十年以上者不過三劑七年以下者一劑必瘥忌如藥法又一方虎脛骨五六寸以來淨刮去肉膜等塗酥炙令極黃熟細搗絹袋子盛以酒一斗置袋子於瓷瓶中然後以煻火微煎至七日後任情吃之當微利便瘥雷公云虎睛凡使須知採人問其源有雌有雄有老有嫩有殺得者唯有中毒自死者勿使卻有傷人之患夫用虎睛先於生羊血中浸一宿漉出微微火上焙之干搗成粉候眾藥出取合用之食療又主腰膝急疼煮作湯浴之或和醋浸亦良主筋骨風急痛脛骨尤妙又小兒初生取骨煎湯浴其孩子長大無病又和通草煮汁空腹服半升覆蓋臥少時汗即出治筋骨節急痛切忌熱食損齒小兒齒生未足不可與食恐齒不生又正月勿食虎肉聖惠方治歷節風百節疼痛不可忍用虎頭骨一具塗酥炙黃捶碎絹袋盛用清酒二斗浸五宿隨性多少暖飲之妙外臺秘要療鯁取虎骨為末水服方寸匕又方療肛門凸出方燒虎骨末水服方寸匕日三服良千金翼療熛疽著手足肩背累累如米起色白刮之汁出愈而復發虎屎白者以馬尿和之曝乾燒灰粉之經驗後方白虎風走注疼痛兩膝熱腫虎脛骨塗酥炙黑附子炮裂去皮臍各一兩為末每服溫酒調下二錢匕日再服又方治小兒驚癇掣瘲以虎睛細研水調灌之良大小加減服之梅師方治猘犬咬人發狂如犬刮虎牙虎頭骨末酒服方寸匕服之瘥勝金方治大腸痔漏並脫肛以虎脛骨兩節蜜二兩炙令赤搗末蒸餅丸如桐子大每服凌晨溫酒下二十丸隔夜先和大腸後方服此藥集驗方療月蝕瘡虎頭骨二兩搗碎同豬脂一升熬以骨黃取塗瘡上張文仲治痢久下經時不愈者此名休息取大蟲骨炙令黃焦搗末飲服方寸匕日三即愈又方療卒魘以虎頭骨為枕葛稚川方同子母秘錄小兒辟惡氣以水煮虎骨湯浴兒數數作楊氏產乳療小兒驚癇以虎睛一豆許火炙為末水和服之又方療禿瘡取虎膏塗之姚和眾治小兒夜啼取大蟲眼睛一隻為散以竹瀝調少許與吃又方小兒頭瘡不瘥大蟲脂消令凝每日三四度塗之抱朴子虎壽千歲五百歲毛色變白衍義曰虎骨頭脛與脊骨入藥肉微咸陳藏器所注乙骨之事及射之目光墮地如白石之說必得之於人終不免其所誣也人或問曰風從虎何也風木也虎金也木受金制焉得不從故呼嘯則風生自然之道也所以治風攣急屈伸不得走疰癲疾驚癇骨節風毒等乃此義爾兔頭骨平無毒主頭眩痛癲疾臣禹錫等謹按日華子云頭骨和毛髓燒為丸催生落胎併產後余血不下骨主熱中消渴臣禹錫等謹按藥性論云兔骨味甘日華子云兔骨治瘡疥刺風鬼疰腦主凍瘡肝主目暗臣禹錫等謹按孟詵云肝主明目和決明子作丸服之又主丹石人上衝眼暗不見物可生食之一如服羊子肝法日華子云肝明目補勞治頭旋眼疼肉味辛平無毒主補中益氣陶隱居云兔肉為羹亦益人妊娠不可食令子唇缺其肉不可合白雞肉食之面發黃合獺肉食之令人病遁屍唐本注云兔皮毛合燒為灰酒服主產難後衣不出及余血搶心脹欲死者極驗頭皮主鬼疰毒氣在皮中針刺者又云主鼠瘻膏主耳聾今按陳藏器本草云兔寒平主熱氣濕痹毛燒灰主炙瘡不瘥骨主久疥醋摩敷之肉久食弱陽令人色痿與姜同食令人心痛頭主難產燒灰末酒下兔竅有五六穴子從口出今懷妊忌食其肉者非為缺唇亦緣口出臣禹錫等謹按藥性論云臘月肉作醬食去小兒豌豆瘡臘毛煎湯洗豌豆瘡及毛敷良孟詵云八月至十一月可食服甘石人相宜大都損陽事絕血脈日華子云肉治渴健脾生吃壓丹毒圖經曰兔舊不著所出州土今處處有之為食品之上味兔竅乃有六七穴子從口出故妊娠者禁食之頭骨主頭眩痛癲疾腦主凍瘡肝主目暗肉補中益氣然性冷多食損元氣不可合雞肉食之髓及膏並主耳聾毛煎湯洗豌豆瘡毛燒灰主炙瘡久不瘥皮毛及頭並燒灰酒服主難產衣不出必效方療天行嘔吐不下食取臘月兔頭並皮毛燒令煙盡擘破作黑灰搗羅之以飲汁服方寸匕則下食不瘥更服燒之勿令火耗頻用皆效無比崔元亮海上方療消渴羸瘦小便不禁兔骨和大麥苗煮汁服極效又一方用兔一隻剝去皮爪五臟等以水一斗半煎使爛骨肉相離漉出骨肉斟酌五升汁便澄濾令冷渴即服之極重者不過三兔又下有筆頭灰主小便不通及數而難淋瀝陰腫中惡脫肛筆並取年久者燒灰水服之食療兔頭骨並同肉味酸謹按八月至十月其肉酒炙吃與丹石人甚相宜注以性冷故也大都絕人血脈損房事令人痿黃肉不宜與薑桔同食之令人卒患心痛不可治也又兔死而眼合者食之殺人二月食之傷神又兔與生薑同食成霍亂聖惠方手足皸裂成瘡兔腦髓生塗之外臺秘要必效療婦人帶下取兔皮燒令煙絕搗為末酒服方寸匕以瘥為度肘後方療大人小兒卒得月蝕瘡於月望夕取兔屎及內蝦蟆腹中合燒為灰末以敷瘡上瘥百一方火燒已破方取兔腹下白毛燒膠以塗毛上貼瘡立瘥待毛落即瘥經驗方催生丹兔頭二個臘月內取頭中髓塗於淨紙上令風吹乾通明乳香二兩碎入前干兔髓同研來日是臘今日先研俟夜星宿下安棹子上時果香茶同一處排定須是潔淨齋戒焚香望北帝拜告云大道弟子某修合救世上難生婦人藥願降威靈佑助此藥速令生產禱告再拜用紙貼同露之更燒香至來日日未出時以豬肉和丸如雞頭大用紙袋盛貯透風懸每服一丸醋湯下良久未產更用冷酒下一丸即產此神仙方絕驗梅師方兔肉合乾薑拌食之令人霍亂食醫心鏡消渴飲水不知足兔頭骨一具以水煮取汁飲之博濟方治產前滑胎臘月兔頭腦髓一個攤於紙上令勻候乾剪作符子於面上書生字一個覺母陣痛時用母釵子股上夾定燈焰上燒灰盞盛煎丁香酒調下勝金方治發腦發背及癰疽熱癤惡瘡等臘月兔頭細銼入瓶內密封唯久愈佳塗帛上厚封之熱痛敷之如冰頻換瘥集驗方治痔疾下血痛疼不止以玩月砂不限多少熳火熬令黃色為末每二錢入乳香半錢空心溫酒調下日三四服瘥砂即兔子糞是也子母秘錄療產後陰下脫燒兔頭末敷之抱朴子兔壽千歲五百歲毛色變白又云兔血和女丹服之有神女二人來侍可役使之禮記食兔去尻沈存中契丹北境有跳兔形皆兔但前足寸余後足幾尺行即用後足跳一躍數尺止則蹶然仆地生於契丹慶州之地予使虜日捕得數兔持歸爾雅所謂蹶兔亦曰蛩蛩巨驢也衍義曰兔有白毛者全得金之氣也入藥尤功余兔至秋深時則可食金氣全也才至春夏其味變取四腳肘後毛為逐食飼雕鷹至次日卻吐出其意欲腹中逐盡脂肥使飢急捕逐速爾然作醬必使五味既患豌豆瘡又食此則發毒太甚恐斑爛損人貍骨味甘溫無毒主風疰屍疰鬼疰毒氣在皮中淫躍如針刺者心腹痛走無常處及鼠瘻惡瘡頭骨尤良臣禹錫等謹按藥性論云貍骨臣亦可單用頭骨炒末治噎病不通食飲孟詵云骨主痔病作羹臛食之不與酒同食其頭燒作灰和酒服二錢匕主痔又食野鳥肉中毒燒骨灰服之瘥炙骨和麝香雄黃為丸服治痔及瘻瘡糞燒灰主鬼瘧日華子云骨治遊風惡瘡頭骨最妙糞燒灰主寒熱瘧疾肉療諸疰臣禹錫等謹按蜀本云肉療鼠瘻日華子云貍肉治遊風等病又貍頭燒灰酒服治一切風陰莖主月水不通男子陰頹燒之以東流水服之陶隱居云貍類甚多今此用虎貍無用貓者貓貍亦好其骨至難別自取乃可信又有貍色黃而臭肉亦主鼠瘻及貍肉作羹如常食法並佳唐本注云貍屎灰主寒熱鬼瘧發無期度者極驗家貍亦好一名貓也今按陳藏器本草云風貍溺主諸色風人取養之食果子以籠之溺如乳甚難得似兔而短在高樹候風而吹至彼樹出邕州以南圖經曰貍骨及肉本經不載所出州土今處處有之其類甚多以虎斑紋者堪用貓斑者不佳皆當用頭骨華佗方有貍骨散治屍疰肉主痔可作羹臛食之南方有一種香貍人以作膾生若北地狐生法其氣甚香微有麝氣邕州以南又有一種風貍似兔而短多棲息高木候風而吹過他木其溺主風然甚難取人久養之始可得食療屍疰腹痛痔瘻炙之令香末酒服二錢十服後見驗頭骨最妙治屍疰邪氣燒為灰酒服二錢亦主食野鳥肉物中毒腫也再服之即瘥五月收者糞極神妙正月勿食傷神聖惠方治瘰癧腫硬痛疼痛疼時久不瘥用貍頭蹄骨等並塗酥炙令黃搗羅為散每日空心粥飲調下一錢匕外臺秘要治痔發疼痛貍肉作羹食之良作脯食之不過三頓瘥此肉甚妙肘後方治鼠瘻腫核痛若已有瘡口膿血出者取貓一物理作羹如食法空心進之食醫心鏡治蠍螫人痛不止以貓兒屎塗螫處日三易即差子母秘錄療小兒鬼舐方貍屎燒灰和臘月豬脂塗上千金方同淮南方貍頭治鼠瘻鼠齧人瘡貍愈之禮記食貍去正脊衍義曰貍骨形類貓其紋有二一如連錢者一如虎紋者此二色貍皆可入藥其肉味與狐不相遠江西一種牛尾貍其尾如牛人多糟食未聞入藥孟詵云骨理痔病作羹臛食之然則骨如何作羹臛臛音郝肉羹也炙骨和麝香雄黃為丸服治痔及瘻瘡甚效獐骨微溫主虛損泄精臣禹錫等謹按藥性論云獐骨味甘無毒肉溫補益五臟臣禹錫等謹蜀本云獐肉味甘孟詵云肉亦同麋釀酒道家名為白脯唯獐鹿是也余者不入又其中往往得香栗子大不能全香亦治惡病其肉八月至十一月食之勝羊肉自十二月至七月食動氣也又若瘦惡者食發痼疾也日華子云獐肉無毒髓益氣力悅澤人面陶隱居云俗云白肉是獐言白膽易驚怖也又呼為麋居筠切麋肉不可合鵠肉食成症痼也今按陳藏器本草云麋主人心粗豪取心肝曝乾為末酒下一具便即小膽若小心食之則轉祛不知所為道家名白脯者麋鹿是也臣禹錫等謹按日華子云骨補虛損益精髓悅顏色臍下有香治一切虛損圖經曰獐骨及肉本經不載所出州土今陂澤淺草中多有之亦呼為麋獐之甚多麋其總名也有有牙者有無牙者用之皆同然其牙不能噬齧崔豹古今注曰獐有牙而不能噬鹿有角而不能觸是也其肉自八月以後至十一月以前食之勝羊肉十二月至七月食之動氣道家以獐鹿肉羞為白脯言其無禁忌也唐方有獐骨酒及獐髓煎並補下其腦亦入面膏食療道家用供養星辰者蓋為不管十二屬不是腥膩也外臺秘要主瘤病獐鹿二種肉剖如厚脯炙令熱拓淹可四炙四易痛攪出膿便愈不除更炙新肉用之良子母秘錄主乳無汁獐肉臛食勿食婦人知豹肉味酸平無毒主安五臟補絕傷輕身益氣久服利人陶隱居云豹至稀有為用亦鮮唯尾可貴唐本注云陰陽神豹尾及車駕滷薄豹尾名可尊重真豹尾有何可貴未審陶據奚理今按陳藏器本草云豹主鬼魅神邪取鼻和狐鼻煮服之亦主狐魅也臣禹錫等謹按孟詵云肉食之令人志性粗多時消即定久食令人耐寒暑脂可合生發膏朝塗暮生頭骨燒灰淋汁去白屑日華子云肉微毒壯筋骨強志氣令人猛健圖經曰豹肉本經不載所出州土今河洛唐郢間或有之頭骨燒灰沐頭去風屑脂可合生發藥朝塗而暮生謹按豹有數種有赤豹詩云赤豹黃羆陸機疏云尾赤而紋黑謂之赤豹有玄豹山海經云幽都之山有玄虎玄豹有白豹爾雅云貘音與貊同白豹郭璞注云似熊小頭痹腳黑白駁能舐食銅鐵及竹骨節強直中實少髓皮闢濕人寢其皮可以驅溫癘或曰豹白色者別名貘唐世多畫貘作屏白居易有贊序之不知入藥果用何類古今醫方鮮有用者今黔蜀中時有貘象鼻犀目牛尾虎足土人鼎釜多為所食頗為山居之患亦捕以為藥其齒骨極堅以刀斧椎煅鐵皆碎落火亦不能燒人得之詐為佛牙佛骨以誑俚俗食療補益人食之令人強筋骨志性粗疏食之即覺也少時消即定久食之終令人意氣粗豪唯令筋健能耐寒暑正月食之傷神衍義曰豹肉毛赤黃其紋黑如錢而中空比比相次此獸猛捷過虎故能安五臟補絕傷輕身又有土豹毛更無紋色亦不赤其形亦小此各自有種非能變為虎也聖人假喻而已恐醫家未喻故書之筆頭灰年久者主小便不通小便數難陰腫中惡脫肛淋瀝燒灰水服之唐本先附自草部今移臣禹錫等謹按藥性論云筆頭灰微寒亦可單用燒灰治男子交婚之夕莖痿取灰酒服之良其筆是使乏者圖經文具兔頭骨條下外臺秘要若小便不通數而微腫方取陳久筆頭一枚燒為灰和水服之勝金方催產治難產聖妙寸金散方敗筆頭一枚燒為灰細研為末研生藕汁一盞調下立產若產母虛弱及素有冷疾者恐藕冷動氣即於銀器內重湯暖過後服範汪方治喉中腫痛不得飲食燒筆頭灰漿飲下方寸匕四種陳藏器余犢子臍屎主卒九竅中出血燒末服之方寸匕新生未食草者預取之黃犢為上姚氏方人有九竅四肢指歧間血出乃暴驚所為取新生犢子未食草者臍屎曬乾燒末水服方寸匕日四五頓瘥人云口鼻出血亦良靈貓陰味辛溫無毒主中惡鬼氣飛屍蠱毒心腹卒痛狂邪鬼神如麝用之功似麝生南海山谷如貍自為牝牡亦云蛉貍異物志云靈貍一體自為陰陽刳其水道連囊以酒灑陰乾其氣如麝若雜真香罕有別者用之亦如麝焉震肉無毒主小兒夜驚大人因驚失心亦作脯與食之此畜為天雷所霹靂者是狒狒亦作𥝃同扶沸反無毒飲其血令人見鬼也亦堪染緋發可為頭髲出西南夷如猴宋孝建中獠子以西波屍地高城郡安西縣主簿韋文禮進雌雄二頭宋帝曰吾聞狒狒能負千鈞若既力如此何能致之彼土人丁鑾進曰狒狒見人喜笑則上唇掩其目人以釘釘著額任其奔馳候死而取之發極長可為頭髲血堪染靴其毛一似獼猴人面紅赤色作人言馬聲或作鳥字善知生死飲其血使人見鬼帝聞而欣然命工圖之亦出山海經爾雅云狒狒如人被髮迅走食人亦曰梟羊彼俗亦謂之山都郭景純有贊文繁不載脯帶脂者薄割火上炙熱於人肉敷癬上蟲當入脯中候其少頃揭卻須臾更三五度瘥
