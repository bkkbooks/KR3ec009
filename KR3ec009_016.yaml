body:
  text: 卷第十六己酉新增衍義龍骨味甘平微寒無毒主心腹鬼疰精物老魅咳逆泄痢膿血女子漏下癥瘕堅結小兒熱氣驚癇療心腹煩滿四肢痿枯汗出夜臥自驚恚怒伏氣在心下不得喘息腸癰內疽陰蝕止汗縮小便溺血養精神定魂魄安五臟白龍骨療夢寐泄精小便泄精臣禹錫等謹按泄精通用藥云白龍骨平微寒齒主小兒大人驚癇癲疾狂走心下結氣不能喘息諸痙殺精物小兒五驚十二癇身熱不可近大人骨間寒熱又殺蠱毒得人參牛黃良畏石膏臣禹錫等謹按驚邪通用藥及藥對云龍齒平角主驚癇瘛尺曳切瘲子用切身熱如火腹中堅及熱泄久服輕身通神明延年生晉地川穀及太山岩水岸土穴中死龍處採無時畏乾漆蜀椒理石陶隱居云今多出梁益間巴中亦有骨欲得脊腦作白地錦文舐之著舌者良齒小強猶有齒形角強而實又有龍腦肥軟亦斷痢云皆是龍蛻非實死也比來巴中數得龍胞吾自親見形體具存云療産後余疾正當末服之唐本注云龍骨今並出晉地生硬者不好五色具者良其青黃赤白黑亦應隨色與腑臟相會如五芝五石英五石脂等輩而本經不論莫知所以臣禹錫等謹按藥對云龍角平吳氏云龍骨色青白者善又云齒神農季氏大寒藥性論云龍骨君忌魚有小毒逐邪氣安心神止冷痢及下膿血女子崩中帶下止夢泄精夜夢鬼交治尿血虛而多夢紛紜加而用之又云龍齒君鎮心安魂魄齒角俱主小兒大熱日華子云龍骨健脾澀腸胃止瀉痢渴疾懷孕漏胎腸風下血崩中帶下鼻洪吐血止汗又云龍齒澀涼治煩悶癲癇熱狂闢鬼魅圖經曰龍骨並齒角出晉地川穀及泰山岩水岸土穴中死龍處今河東州郡多有之或云是龍蛻實非死骨得脊腦作白地錦文舐之著舌者良齒小強猶有齒形角強而實採無時李肇國史補云春水時至魚登龍門蛻其骨甚多人採以為藥而有五色者本經云出晉地龍門又是晉地豈今所謂龍骨者乃此魚之骨乎或云骨有雄雌細紋而廣者是雌粗紋而狹者是雄凡入藥五色具者尤佳黃白色者次黑色者下皆不得經落不淨處則不堪用骨齒醫家常用角亦稀使唯深師五邪丸用龍角又云無角用齒千金方治心有兼用龍齒龍角者韋丹療心熱風癇取爛龍角濃研取汁食上服二大合日再然則龍角有爛者此物大抵世所稀有孫光憲北夢瑣言云石晉時鎮州接邢臺界嘗鬥殺一龍鄉豪有曹寬者見之取其雙角角前有一物如藍色紋如亂錦人莫之識曹寬未經年為寇所殺鎮師俄亦被誅又云海上人言龍每生二卵一為吉吊吉吊多與鹿遊或於水邊遺瀝值流槎則黏著木枝如蒲槌狀其色微青黃復似灰色號紫梢花坐湯多用之延齡至寶方治聾無問年月者取吉吊脂每日點半杏仁許入耳中便瘥云此物福建州甚不為難得其脂須琉璃瓶子盛更以樟木合重貯之不爾則透氣失之矣又篋中方女經積年不通必治之用龍胎瓦松景天三物各少許都以水兩盞煎取一盞去滓分溫二服少頃腹中轉動便下龍胎古今方不見用者人亦鮮識本方注云此物出蜀中山澗大水中大類乾魚鱗投藥煎時甚腥臊方家稀所聞見雖並非要藥然昔人曾用世當有識者因附於此以示廣記耳雷公云剡州生者倉州太原者上其骨細紋廣者是雌骨粗紋狹者是雄骨五色者上白色者中黑色者次黃色者稍得經落不淨之處不用婦人採得者不用夫使先以香草煎湯浴過兩度搗研如粉用絹袋子盛粉末了以燕子一隻擘破腹去腸安骨末袋於燕腹內懸於井面上一宿至明去燕子並袋子取骨粉重研萬下其效神妙但是丈夫服空心益腎藥中安置圖龍骨氣入腎臟中也聖惠方治小兒臍瘡久不瘥用龍骨燒灰細研敷之外臺祕要療傷寒已八九日至十餘日大煩渴熱盛而三焦有瘡𧈟者多下或張口吐舌呵籲目爛口鼻生瘡吟語不識人除熱毒止痢龍骨半斤碎以水一斗煮取四升沉之井底令冷服五合漸漸進之恣意飲尤宜老少千金方婦人無故尿血龍骨一兩以酒調方寸匕空心日三又方治好忘久服聰明益智龍骨虎骨遠志等分右三味為末食後酒服方寸匕日三服肘後方治熱病不解而下痢欲死龍骨半斤搗研水一斗煮取五升候極冷稍稍飲得汗即愈又方治老瘧末龍骨方寸匕先發一時酒一升半煮取三沸及熱盡服溫復取汗即效又方若久下痢經時不止者此成休息龍骨四兩如小豆大碎以水五升煮取二升半令冷分為五服又以米飲和為丸服十丸經驗方暖精氣益元陽白龍骨遠志等分為末煉蜜為丸如梧桐子大空心臥時冷水下三十丸梅師方治失精暫睡即泄白龍骨四分韭子五合右件為散子空心酒調方寸匕服又方治熱病後下痢膿血不止不能食白龍骨末米飲調方寸匕服又方治鼻衄出血多眩冒欲死龍骨研細吹入鼻耳中凡衄者並吹廣利方治鼻中衄血及咯吐血不止五色龍骨作末吹一江豆許於鼻中立止又方治心熱風癇爛龍角濃研汁食上服二合日再服姚氏方治小便出血末龍骨二方寸匕水調溫服之日二服瘥姚和衆治小兒因痢脫肛白龍骨粉撲之楊文公談苑澤州山中多龍骨蓋龍蛻於土中崖崩多得之體骨頭角皆全衍義曰龍骨諸家之説紛然不一既不能指定終是臆度西京穎陽縣民家忽崖壞得龍骨一副肢體頭角悉具不知其蛻也其斃也若謂蛻斃則是有形之物而又生不可得見死方可見謂其化也則其形獨不能化然西域記中所説甚詳但未敢據憑萬物所稟各異造化不可盡知莫可得而詳矣孔子曰君子有所不知蓋闕如也妄亂穿鑿恐誤後學治精滑及大腸滑不可闕也麝香味辛溫無毒主辟惡氣殺鬼精物溫瘧蠱毒癇痓去三蟲療諸凶邪鬼氣中惡心腹暴痛脹急痞滿風毒婦人産難墜胎去面𪒟音孕目中膚翳久服除邪不夢寤魘寐通神仙生中臺川穀及益州雍州山中春分取之生者益良陶隱居云麝形似獐常食柏葉又啖蛇五月得香往往有蛇皮骨故麝香療蛇毒今以蛇蛻皮裹麝香彌香則是相使也其香正在麝陰莖前皮內別有膜裹之今出隨郡義陽晉熙諸蠻中者亞之出益州者形扁仍以皮膜裹之一子真香分糅汝收切作三四子刮取血膜雜以余物大都亦有精粗破看一片毛共在裹中者為勝彼人以為志若於諸羌夷中得者多真好燒當門沸良久即好今唯得活者自看取之必當全真爾生香人云是精溺凝作之殊不爾麝夏月食蛇蟲多至寒香滿入春患急痛自以腳剔音揚出之著屎溺中復之皆有常處人有遇得乃至一斗五升也用此香乃勝殺取者帶麝非但香亦辟惡以真者一子置頸間枕之辟惡夢及尸疰鬼氣臣禹錫等謹按抱朴子云闢蛇法入山以麝香丸著足爪中皆有效又麝香及野豬皆啖蛇故以厭之藥性論云麝香臣禁食大蒜味苦辛除百邪魅鬼疰心痛小兒驚癇客忤鎮心安神以當門子一粒丹砂相似細研熟水灌下止小便利能蝕一切癰瘡膿入十香丸令人百毛九竅皆香療鬼疰腹痛段成式酉陽雜俎云水麝臍中唯水瀝一滴於鬥水中用灑衣衣至敗其香不歇每取以針刺之捻以真雄黃則合香氣倍於肉麝天寶初虞人獲詔養之日華子云辟邪氣殺鬼毒蠱氣瘧疾催生墮胎殺臟腑蟲制蛇蠶咬沙蝨溪瘴毒吐風痰納子宮暖水臟止冷帶疾圖經曰麝香出中臺山谷及益州雍州山中今陝西益利河東諸路山中皆有之而秦州文州諸蠻中尤多形似獐而小其香正在陰前皮內別有膜裹之春分取之生者益良此物極難得真蠻人採得以一子香刮取皮膜雜內余物裹以四足膝皮共作五子而土人買得又復分糅一為二三其偽可知唯生得之乃當全真耳蘄光山中或時亦有然其香絶小一子才若彈丸往往是真香蓋彼人不甚能作偽爾一説香有三種第一生香麝子夏食蛇蟲多至寒則香滿入春急痛自以爪剔出之落處遠近草木皆焦黃此極難得今人帶真香過園中瓜果皆不實此其驗也其次臍香乃捕得殺取者又其次心結香麝被大獸捕逐驚畏失心狂走巔墜崖谷而斃人有得之破心見血流出作塊者是也此香乾燥不可用又有一種水麝其香更奇好臍中皆水瀝一滴於鬥水中令濯衣其衣至弊而香不歇唐天寶初虞人常獲一水麝詔養於囿中每取以針刺其臍捻以真雄黃則其創復合其香氣倍於肉麝近歲不復聞有之爾雅謂麝為麝父雷公云凡使多有偽者不如不用其香有三等一者名遺香是麝子臍閉滿其麝自於石上用蹄尖彈臍落處一里草木不生並焦黃人若收得此香價與明珠同也二名月𣍿香採得甚堪用三名心結香被大獸驚心破了因茲狂走雜諸群中遂亂投水被人收得擘破見心流在脾上結作一大幹血塊可隔山澗早聞之香是香中之次也凡使麝香並用子日開之不用苦細研篩用之也食療作末服之闢諸毒熱殺蛇毒除驚怖恍惚蠻人常食似獐肉而腥氣蠻人云食之不畏蛇毒故也臍中有香除百病治一切惡氣疰病研了以水服之經驗後方治瘧又方治鼠咬人麝香封上用帛子系之廣利方治中惡客忤垂死麝香一錢重研和醋二合服之即瘥又方治小兒客忤項強欲死麝香少許細研乳汁調塗口中又方治蠶咬人麝香細研蜜調塗之瘥又方治小兒驚啼發歇不定用真好麝香研細每服清水調下一字日三服量兒大小服續十全方令易産麝香一錢研水調之服立瘥楊氏産乳療中水氣已服藥未平除宜單服麝香如大豆三枚細研奶汁調分為四五服楊文公談苑公常言商汝山多群麝所遺糞常就一處雖遠逐食必還走之不敢遺迹他所慮為人獲人反以是求得必掩群而取之麝絶愛其臍每為人所逐勢急即投岩舉爪剔裂其香就縶而死猶拱四足保其臍李商隱詩云投岩麝退香許渾云尋麝採生香狐剛子粉圖云將麝香一臍安於枕閣中枕之亦能除邪辟惡衍義曰麝每糞時須聚於一所人見其所聚糞及有遺麝氣遂為人獲亦物之一病爾此獵人云余如經牛黃味苦平有小毒主驚癇寒熱熱盛狂痓除邪逐鬼療小兒百病諸癇熱口不開大人狂癲又墮胎久服輕身增年令人不忘生晉地平澤於牛得之即陰乾百日使時燥無令見日月光人參為之使得牡丹菖蒲利耳目惡龍骨地黃龍膽蜚蠊畏牛膝陶隱居云舊云神牛出入鳴吼者有之伺其出角上以盆水承而吐之即墮落水中今人多皆就膽中得之多出梁益一子如雞子黃大相重迭藥中之貴莫復過此一子及三二分好者值五六千至一萬唐本注云牛黃今出萊州密州淄州青州嶲州戎州牛有黃者必多吼喚喝迫而得之謂之生黃最佳黃有三種散黃粒如麻豆慢黃若雞卵中黃糊在肝膽圓黃為塊形有大小並在肝膽中多生於𤚩音秦特牛其吳牛未聞有黃也臣禹錫等謹按藥性論云牛黃君惡常山畏乾漆味甘能辟邪魅安魂定魄小兒夜啼主卒中惡吳氏云牛黃無毒牛出入呻者有之夜光走角中牛死入膽中如雞子黃日華子云牛黃涼療中風失音口噤婦人血噤驚悸天行時疾健忘虛乏圖經曰牛黃出晉地平澤今出登萊州它處或有不甚佳凡牛有黃者毛皮光澤眼如血色時復鳴吼又好照水人以盆水承之伺其吐出乃喝迫即墮水中既得之陰乾百日一子如雞子黃大其重迭可揭折輕虛而氛香者佳然此物多偽今人試之皆揩摩手甲上以透甲黃者為真又云此有四種喝迫而得者名生黃其殺死而在角中得者名角中黃心中剝得者名心黃初在心中如漿汁取得便投水中沾水乃硬如碎蒺藜或皂莢子是也肝膽中得之者名肝黃大抵皆不及喝迫得者最勝凡牛之入藥者水牛𤚩牛黃牛取乳及造酥酪醍醐等然性亦不同水牛乳涼𤚩牛乳溫其肉皆寒也其自死者皆不可食其酥以合諸膏摩風腫踠跌血瘀則牛酥為強醍醐尤佳又有底野迦是西戎人用諸膽和合作之狀似久壞丸藥赤黑色今南海或有之又中品有牛角䚡用水牛黃牛久在糞土中爛白者主赤白下燒灰末服之沙牛角䚡主下閉血瘀女子帶下並燒灰酒服崔元亮海上方治喉痹腫塞欲死者取沙牛角燒刮取灰細篩和酒服棗許大水調亦得又小兒飲乳不快覺似喉痹者亦取此灰塗乳上咽下即瘥黃牛膽以丸藥今方臘日取其汁和天南星末卻內皮中置當風處逾月取以合涼風丸殊有奇效黃犍牛烏牯牛溺並主水腫利小便楊炎南行方療腳氣小腹脹小便澀取烏特牛溺一升一日分服腹消乃止下水腫取黃犍牛溺一飲三升不覺更加服老小減半亦可牛屎燒灰敷灸瘡不瘥者口中涎主反胃老牛涎沫主噎口中齝日知切草絞汁主噦自余齒髓心肝腎食之皆有益方書鮮用又馬乳驢乳羊乳大抵功用相近而驢馬乳冷利羊乳溫補馬乳作酪彌佳耳又下條敗鼓皮主蠱毒古方亦單用燒灰服之並牛之類用之者稀故但附於其末雷公云凡使有四件第一是生神黃賺得者次有角黃是取之者又有心黃是病死後識者剝之擘破取心其黃在心中如濃黃醬汁採得便投於水中黃沾水復硬如碎蒺藜子許如豆者硬如帝珠子次有肝黃其牛身上光眼如血色多玩弄好照水自有夜光恐懼人或有人別採之可有神妙之事凡用須先單搗細研如塵卻絹裹又用黃嫩牛皮裹安於井面上去水三四尺以來一宿至明方取用之聖惠方初生兒至七日口噤以牛黃少許細研淡竹瀝調下一字灌之更以豬乳點口中瘥又方治小兒腹痛夜啼用牛黃如小豆大乳汁化服又臍下書田字瘥廣利方治孩子驚癇不知迷悶嚼舌仰目牛黃一大豆研和蜜水服之姚和衆治小孩初生三日去驚邪辟惡氣牛黃一大豆許細研以赤蜜酸棗許熟研以綿蘸之令兒吮之一日令盡衍義曰牛黃亦有駱駝黃皆西戎所出也駱駝黃極易得醫家當審別考而用之為其形相亂也黃牛黃輕鬆自然微香以此為異蓋又有犛音毛牛黃堅而不香熊脂味甘微寒微溫無毒主風痹不仁筋急五臟腹中積聚寒熱羸瘦頭瘍白禿面皯皰食飲吐嘔久服強志不飢輕身長年生雍州山谷十一月取陶隱居云此脂即是熊白是背上膏寒月則有夏月則無其腹中肪及身中膏煎取可作藥而不中啖今東西諸山縣皆有之自是非易得物爾痼疾不可食熊肉令終身不除愈唐本注云熊膽味苦寒無毒療時氣熱盛變為黃疸暑月久痢疳𧈟心痛疰忤腦療諸聾血療小兒客忤脂長髮令黑悅澤人面酒煉服之瘥風痹凡言肓者皆脂消以後之名背上不得言膏左傳義云膏肓者乃是鬲肓文誤有此名陶言背膏同於舊説也臣禹錫等謹按藥性論云熊膽臣惡防己地黃主小兒五疳殺蟲治惡疥又云熊脂君能治面上皯𪒟及治瘡日華子云熊白涼無毒治風補虛損殺勞蟲脂強心腦髓去白禿風屑療頭旋併發落掌食可御風寒此是八珍之數膽治疳瘡耳鼻瘡及諸疳疾圖經曰熊脂並膽出雍州山谷今雍洛河東及懷衛山中皆有之熊形類犬豕而性輕捷好攀緣上高木見人則顛倒自投地而下冬多入穴而藏蟄始春而出脂謂之熊白十一月取之須其背上者寒月則有夏月則無其腹中肪及它處脂煎煉亦可作藥而不中啖膽陰乾用然亦多偽欲試之取粟顆許滴水中一道若線不散者為真其足蹯為食珍之貴古人最重之然臑之難熟多食之令人耐寒腦髓作油摩頭可去白屑有痼疾者不可食熊令人終身不愈熊惡鹽食之則死雷公云凡收得後煉過就器中安生椒每一斤熊脂入生椒十四個煉了去脂革並椒入瓶中收任用食療熊脂微寒甘滑冬中凝白時取之作生無以偕也脂入拔白髮膏中用極良脂與豬脂相和燃燈煙入人目中令失光明緣熊脂煙損人眼光肉平味甘無毒主風痹筋骨不仁若腹中有積聚寒熱者食熊肉永不除瘥其骨煮湯浴之主歷節風亦主小兒客忤膽寒主時氣盛熱疳𧈟小兒驚癇十月勿食傷神小兒驚癇瘛瘲熊膽兩大豆許和乳汁及竹瀝服並得去心中涎良聖惠方治小兒疳瘡蟲蝕鼻用熊膽半分湯化調塗於鼻中熊掌得酒醋水三件煮熟即嗔大如皮球食之耐風寒外臺祕要療蛔心痛熊膽如大豆和水服大效又方五十年痔不瘥塗熊膽取瘥乃止神效一切方不及千金翼療發黃熊脂塗發梳之散頭入床底伏地一食頃即出便盡黑不過一升脂驗食醫心鏡療腳氣風痹不仁五緩筋急熊肉半斤於豉汁中和薑椒蔥白鹽醬作醃臘空腹食之又方主中風心肺風熱手足不隨及風痹不任筋脈五緩恍惚煩躁熊肉一斤切如常法調和作醃臘空腹食之斗門方治水弩射人用熊膽塗之更以雄黃同用酒磨服之即愈楊氏産乳療白禿瘡及發中生癬取熊白敷之抱朴子熊壽五百歲能化為狐貍象牙無毒主諸鐵及雜物入肉刮取屑細研和水敷瘡上及雜物刺立出齒主癇病屑為末炙令黃飲下肉味淡不堪啖多食令人體重主禿瘡作灰和油塗之膽主目疾和乳滴目中胸前小橫骨令人能浮水作灰酒服之身有百獸肉皆自有分段唯鼻是其本肉余並雜肉今附臣禹錫等謹按日華子云象牙平治小便不通生煎服之小便多燒灰飲下膽明目及治疳蹄底似犀可作帶南海藥諸云象膽以清水和塗瘡腫上並瘥又口臭每夜和水研少許綿裹貼齒根上每夜含之平明暖水洗口如此三五度瘥圖經曰象牙舊不著所出州郡爾雅云南方之美者有梁山之犀象焉今多出交趾潮循州亦有之彼人捕得爭食其肉云肥脆堪作炙或曰象有十二種肉配十二辰屬唯鼻是其肉又膽不附肝隨月在諸肉間淳化中上苑一馴象斃太宗命取膽不獲使問徐鉉鉉曰當在前左足既而剖足果得又問其故鉉曰象膽隨四時今其斃在春故知左足也世敷荊蠻山中亦有野象蓋左氏傳所謂楚師燧象以奔吳軍是其事也然楚粵之象皆青唯西竺弗林大食諸國乃多白象樊綽雲南記平居誨于闐行程記皆言其事象牙主諸物刺人肉刮取屑細研和水敷瘡上刺立出咽中刺則水調飲之舊牙梳屑尤佳齒及肉目睛等醫方亦或有用者陳藏器云肉味鹹酸不堪啖膽主目疾和乳滴目中序云象膽揮黏海藥謹按內典云象出西國有二牙四牙者味寒主風癇熱骨蒸勞諸瘡等並皆宜生屑入藥琥珀竹膏真珠犀角牛黃等良西域重之用飾床座中國貴之以為笏崑崙諸國有象生於山谷每遇解牙人不可取崑崙以白木削為牙而用易之酉陽雜俎云生紋理必國富又云龍與象六十歲骨方足肘後方治箭並金折在肉中細刮象牙屑以水和敷上即出簡要濟衆主小兒誤為諸骨及魚骨刺入肉不出水煮白梅肉爛研後調象牙末厚敷有刺處自軟太平廣記安南有象能知人曲直有鬥訟者行立而嗅之有理者則過無理者以鼻卷之擲空數丈以牙接而刺之以水洗牙飲之愈疾象膽隨四時在四腿春在前左夏在前右如龜定體鼻端有爪可拈針肉有十二般唯鼻是本肉胸前小骨灰之酒服可令人能浮水出沒食其肉令人體重古訓云象孕五歲始産衍義曰象牙取口兩邊各出一牙下垂夾鼻者非口內食齒齒別入藥今為象笏者是牙也白膠味甘平溫無毒主傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎療吐血下血崩中不止四肢痠疼多汗淋露折音舌跌音迭傷損久服輕身延年一名鹿角膠生雲中煮鹿角作之得火良畏大黃陶隱居云今人少復煮作唯合角弓猶言用此膠爾方藥用亦稀道家時須之用白膠法先以米沈汁漬七日令軟然後煮煎之如作阿膠爾又一法即細銼角與一片干牛皮角即消爛矣不爾相厭百年無一熟也唐本注云麋角鹿角但煮濃汁重煎即為膠矣何至使爛也求爛亦不難當是末見煮膠謬為此説也臣禹錫等謹按藥性論云白膠又名黃明膠能主男子腎臟氣氣衰虛勞損婦人服之令有子能安胎去冷治漏下赤白主吐血圖經文具阿膠條下食療敷腫四邊中心留一孔子其腫即頭自開也治咳嗽不瘥者黃明膠炙令半焦為末每服一錢匕人參末二錢匕用薄豉湯一盞八分蔥少許入銚子煎一兩沸後傾入盞遇咳嗽時呷三五口後依前溫暖卻準前咳嗽時吃之也又止吐血咯血黃明膠一兩切作小片子炙令黃新綿一兩燒作灰細研每服一錢匕新米飲調下不計年歲深遠並宜食後臥時服外臺祕要療虛勞尿精干膠三兩炙搗末酒二升和溫服又方治凡腫已潰未潰者以膠一片水漬令軟納納然腫之大小貼當頭上開孔若已潰還合者膿當被膠急撮之膿皆出盡未有膿者腫當自消矣又方療尿血膠三兩炙以水二升煮取一升四合分再服又方補虛勞益髓長肌悅顏色令人肥健鹿角膠炙搗為末以酒服方寸匕日三服千金方治耳中有物不可出以麻繩剪令頭散敷好膠著耳中物上黏之令相著徐徐引之令出肘後方妊娠卒下血以酒煮膠二兩消盡頓服斗門方治肺破出血忽嗽血不止者用海犀膏一大片於火上炙令焦黃色後以酥塗之又炙再塗令通透可碾為末用湯化三大錢匕放冷服之即血止水膠是也大驗又方治湯火瘡用水煎膠令稀稠得所待冷塗瘡談氏小兒方療小兒面上瘡豆子瘢法黃明膠慢火炙為末溫酒調服一錢匕出者服之無瘢未出服之瀉下又治小兒火燒瘡滅瘢痕黃明膠小雞翎掃之阿膠味甘平微溫無毒主心腹內崩勞極灑灑音蘚如瘧狀腰腹痛四肢痠疼女子下血安胎丈夫小腹痛虛勞羸瘦陰氣不足腳痠不能久立養肝氣久服輕身益氣一名敷致膠生東平郡煮牛皮作之出東阿畏大黃得火良陶隱居云出東阿故曰阿膠也今東都下亦能作之用皮亦有老少膠則有清濁凡三種清薄者畫用厚而清者名為盆覆膠作藥用之皆火炙丸散須極燥入湯微炙爾濁黑者可膠物不入藥用用一片鹿角即成膠不爾不成也今按陳藏器本草云阿井水煎成膠人間用者多非真也凡膠俱能療風止泄補虛驢皮膠主風為最臣禹錫等謹按藥性論云阿膠君主堅筋骨益氣止痢薯蕷為之使圖經曰阿膠出東平郡煮牛皮作之出東阿故名阿膠今鄆州皆能作之以阿縣城北井水作煮為真造之阿井水煎烏驢皮如常煎膠法其井官禁真膠極難得都下貨者甚多恐非真尋方書所説所以勝諸膠者大抵以驢皮得阿井水乃佳耳廣濟方療攤緩風及諸風手腳不遂腰腳無力者驢皮膠炙令微起先煮蔥豉粥一升別貯又以水一升煮香豉二合去滓內膠更煮六七沸膠煬如餳頓服之及暖吃前蔥豉粥任意多少如冷吃令人嘔逆頓服三四劑即止禁如藥法又膠之止泄得蠟黃連尤佳續傳信方著張仲景調氣方云治赤白痢無問遠近小腹㽱痛不可忍出入無常下重痛悶每發麵青手足俱變者黃連一兩去毛好膠手許大碎蠟如彈子大三味以水一大升先煎膠令散次下蠟又煎令散即下黃連末攪相和分為三服唯須熱吃冷即難吃神妙此膠功用皆謂今之阿膠也故陳藏器云諸膠皆能療風止泄補虛而驢皮膠主風為最又今時方家用黃明膠多是牛皮本經阿膠亦用牛皮是二皮亦通用然今牛皮膠製作不甚精但以膠物者不堪藥用之當以鹿角所煎者而鹿角膠本經自謂之白膠云出雲中今處處皆得其法可以作之但功倍勞於牛膠故鮮有真者非自制造恐多偽耳雷公云凡使先於豬脂內浸一宿至明出於柳木火上炙待泡了細碾用聖惠方治妊娠尿血用阿膠炒令黃燥為散每食前以粥飲調下二錢匕梅師方妊娠無故卒下血不止取阿膠三爾炙搗末酒一升半煎令消一服愈又一方以阿膠二兩搗末生地黃半斤搗取汁以清酒三升絞汁分三服楊氏産乳療妊娠血痢阿膠二兩以酒一升半煮取一升頓服宋王微桃飴贊云阿膠續氣羊乳溫補寒冷虛乏陶隱居云牛乳羊乳實為補潤故北人皆多肥健唐本注云北人肥健不啖咸腥方土使然何關飲乳陶以未達故屢有此言臣禹錫等謹按藥性論云羊乳臣味甘無毒潤心肺治消渴孟詵云羊乳治卒心痛可溫服之日華子云羊乳利大腸含療口瘡小兒驚癇疾陳藏器補虛小兒含之主口瘡不堪入藥為其膻食療補肺腎氣和小腸亦主消渴治虛勞益精氣合脂作羹食補腎虛亦主女子與男子中風蚰蜒入耳以羊乳灌耳中即成水又主小兒口中爛瘡取羖羊生乳含五六日瘥外臺祕要主小兒噦羊乳一升煎減半分五服牛乳亦得千金方小兒舌腫羊乳汁飲之瘥又方主幹嘔取羊乳一杯空心飲之千金翼漆瘡羊乳敷之經驗方治蜘蛛咬遍身生絲羊乳一件飲之正元十年崔員外從質云目擊有人被蜘蛛咬腹大如孕婦其家棄之乞食於道有僧遇之教飲羊乳未幾日而平牛乳微寒補虛羸止渴陶隱居云𤚩牛為佳不用新飲者唐本注云水牛乳造石蜜須之言作酪濃厚味勝𤚩牛𤚩牛乳性平生飲令人痢熟飲令人口乾微似溫也臣禹錫等謹按蜀本云牛乳味甘無毒孟詵云牛乳寒患熱風人宜服之日華子云黃牛乳髓冷潤皮膚養心肺解熱毒圖經文具牛黃條下陳藏器黃牛乳生服利人下熱氣冷補潤膚止渴和酥煎三五沸食之去冷氣痃癖羸瘦凡服乳必煮一二沸停冷啜之熱食即壅不欲頓服欲得漸消與酸物相反令人腹中結症凡以乳及溺屎去病黑牛勝黃牛食療患冷氣人不宜服之烏牛乳酪寒主熱毒止渴除胸中熱聖惠方主小兒煩熱噦方以牛乳二合薑汁一合銀器中慢火煎過五六沸一歲兒飲半合量兒大小加減服之孫真人合生魚食作瘕食醫心鏡主消渴口乾牛乳微寒補虛羸廣利方消渴心脾中熱下焦虛冷小便多漸羸瘦生牛羊乳渴即飲之三四合太平廣記貞觀中太宗苦於氣痢衆醫不效詔問殿廷左右有能治其疾者當重賞之有術士進以乳汁煎蓽茇服之立瘥酥音蘇微寒補五臟利大腸主口瘡陶隱居云酥出外國亦從益州來本是牛羊乳所為作之自有法佛經稱乳成酪酪成酥酥成醍醐醍醐色黃白作餅甚甘肥亦時至江南唐本注云酥掏吐刀切酪作之其性猶與酪異今通言功是陶之未達然酥有牛酥羊酥而牛酥勝羊酥其犛音茅牛復優於家牛也臣禹錫等謹按蜀本云酥味甘孟詵云寒主胸中熱補五臟利腸胃日華子云牛酥涼益心肺止渴嗽潤毛髮除肺痿心熱並吐血圖經文具牛黃條下陳藏器酥堪合諸膏摩風腫踠跌血瘀食療寒除胸中熱補五臟利腸胃水牛酥功同寒與羊酪同功羊酥真者勝牛酥聖惠方主蜂螫人以酥敷之愈又方主惡蟲咬以酥和鹽敷之酪味甘酸寒無毒主熱毒止渴解散發利除胸中虛熱身面上熱瘡肌瘡唐本注云按牛羊馬水牛乳並爾言驢乳尤冷不堪作酪也臣禹錫等謹按日華子云牛酪冷止煩渴熱悶心膈熱痛圖經文具牛黃條下食療寒主熱毒止渴除胃中熱患冷人勿食羊乳酪千金翼療丹癮疹方酪和鹽熱煮以摩之手下消孫真人食忌患痢人不可食廣利方療蚰蜒入耳以牛酪灌耳中須臾蟲出入腹即飲酪二升自消為黃水陳藏器濕酪止渴味酸寒無毒主馬黑汗和水灌之瘥為度乾酪強於濕酪牛者為上醍醐味甘平無毒主風邪痹氣通潤骨髓可為摩藥性冷利功優於酥生酥中唐本注云此酥之精液也好酥一石有三四升醍醐熟抨普利切煉貯器中待凝穿中至底便津出得之陶云黃白為餅此乃未達之言唐本先附臣禹錫等謹按蜀本云一説在酥中盛冬不凝盛夏不融者是也日華子云醍醐止驚悸心熱頭疼明目敷腦頂心圖經文具牛黃條下陳藏器性滑以物盛之皆透唯雞子殼及其葫瓢盛之不出雷公云是酪之漿凡用以綿重濾過於銅器中沸三兩沸了用食療平主風邪通潤骨髓性冷利乃酥之本精液也聖惠方治中風煩熱皮膚瘙癢用醍醐四兩每服酒調下半匙食醫心鏡治一切肺病咳嗽膿血不止好酥五斤熔三遍停取凝當出醍醐服一合瘥又方主補虛去風濕痹醍醐二大兩暖酒一杯和醍醐一匙服之衍義曰醍醐作酪時上一重凝者為酪面酪面上其色如油者為醍醐熬之即出不可多得極甘美雖如此取之用處亦少唯潤養瘡痂最相宜馬乳止渴陶隱居云今人不甚服當緣難得也唐本注云馬乳與驢乳性同冷利止渴療熱馬乳作酪彌應酷冷江南乏馬乳今俱合是冷委言之驢乳療微熱黃小兒中熱驚熱服之亦利胡言馬酪性溫飲之消肉多以物類自相制伏不拘冷熱也臣禹錫等謹按蜀本云馬乳味甘又消渴通用藥云馬乳冷藥性論云馬乳無毒陳藏器味甘治熱性冷利孫真人合生魚食則作瘕食醫心鏡馬乳飲之止渴乳腐微寒潤五臟利大小便益十二經脈微動氣細切如豆面拌醋漿水煮二十餘沸治赤白痢小兒患服之彌佳新補見孟詵及蕭炳底野迦味辛苦平無毒主百病中惡客忤邪氣心腹積聚出西戎唐本注云彼人云用諸膽作之狀似久壞丸藥赤黑色胡人時將至此甚珍貴試用有效唐本先附五種陳藏器余蔡苴機屎主蛇虺毒兩頭麋屎也出永昌郡取屎以敷瘡博物志云蔡余義獸似鹿兩頭其胎中屎四時取之未知今有此物否蔡苴機余義也范曄後漢書云雲陽縣有神鹿兩頭能食毒草華陽國志曰此鹿出雲陽郡熊舍山即此余義也諸朽骨主骨蒸多取淨洗刮卻土氣於釜中煮之取桃柳枝各五斗煮枯棘針三斗煮減半去滓以酢漿水和之煮三五沸將出令患者散發正坐以湯從頂淋之唯熱為佳若心悶可進少冷飯當得大汗去惡氣汗乾可粉身食豉粥羸者少與又東牆腐骨醋磨塗痕得滅及除癧瘍風瘡癬白爛東牆牆之東最向陽也烏氈無毒主火燒生瘡令不著風水止血除賊風燒為灰酒下二錢匕主産後血下不止久臥吸人脂血令人無顏色上氣海獺味鹹無毒主人食魚中毒魚骨傷人痛不可忍及鯁不下者取皮煮汁服之海人亦食其肉似獺大如犬腳下有皮如人胼拇毛著水不濡海中魚獺海牛海馬海驢等皮毛在陸地皆候風潮猶能毛起博物志有此説也土撥鼠味甘平無毒主野雞瘻瘡肥美煮食之宜人生西蕃山澤穴土為窠形如獺夷人掘取食之魏略云大秦國出闢毒鼠近似此也
