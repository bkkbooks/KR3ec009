body:
  text: 卷第二十六己酉新增衍義醋味酸溫無毒主消癰腫散水氣殺邪毒陶隱居云醋酒為用無所不入逾以逾良亦謂之醯以有苦味俗呼為苦酒丹家又加余物謂為華池左味但不可多食之損人肌臟唐本注云醋有數種此言米醋若蜜醋麥醋曲醋桃醋葡萄大棗櫻薁音燠等諸雜果醋及糠糟等醋會意者亦極酸烈只可啖之不可入藥也臣禹錫等謹按陳藏器云醋破血運除症塊堅積消食殺惡毒破結氣心中酸水痰飲多食損筋骨然藥中用之當取二三年米酢良蘇云萄萄大棗皆堪作酢緣渠是荊楚人土地儉嗇果敗猶取以釀醋糟醋猶不入藥況於果乎孟詵云醋多食損人胃消諸毒氣能治婦人産後血氣運取美清醋熱煎稍稍含之即愈又人口有瘡以黃柏皮醋漬含之即愈又牛馬疫病和灌之服諸藥不可多食不可與蛤肉同食相反又江外人多為米醋北人多為糟醋發諸藥不可同食研青木香服之止卒心痛血氣等又大黃塗腫米醋飛丹用之日華子云醋治産後婦人並傷損及金瘡血運下氣除煩破癥結治婦人心痛助諸藥力殺一切魚肉菜毒又云米醋功用同醋多食不益男子損人顏色食療治痃癖醋煎大黃生者甚效用米醋佳小麥醋不及糟多妨忌大麥醋微寒余如小麥也氣滯風壅手臂腳膝痛炒醋糟裹之三兩易當瘥人食多損腰肌臟外臺祕要治轉筋取古綿以釅醋浸甑中蒸及熱用裹病人腳冷更易勿停瘥止又方治風毒腫白虎病以三年釅醋五升熱煎三五沸切蔥白二三升煮一沸許漉出布帛熱裹當病上尉之瘥為度又方癧瘍風酢磨硫黃敷之止又方主狐臭以三年釅醋和石灰敷之千金方治耳聾以醇酢微火煎附子削令尖塞耳效又方治鼻血出不止以酢和胡粉半棗許服又方治舌腫以酢和釜底墨厚敷舌上下脫皮更敷須臾即消若洗決出血汁竟知彌佳又方蠼螋尿以酢和粉敷之又方治霍亂心腹脹痛煩滿短氣未得吐下飲好苦酒三升小老羸者可飲一二升又方治身體手足卒腫大醋和蚯蚓屎敷之又方治單服硫黃髮為癰以醋和豉研如膏敷癰上燥則易之肘後方治癰已有膿當壞以苦酒和雀尿敷癰頭上如小豆大即穿又方齒痛漱方大醋一升煮枸杞白皮一升取半升含之即瘥又方治面多䵟𪒟或似雀卵色者苦酒漬術常以拭面即漸漸除之經驗後方治汗不溜瘦卻腰腳並耳聾米醋浸荊三稜夏浸四日冬浸六日杵為末醋湯調下三錢匕食醫心鏡醋主消癰腫散水氣殺邪氣扁鵲云多食醋損人骨能理諸藥毒熱又方治蠍螫人以醋磨附子敷之錢相公篋中方治百節蚰蜒並蟻入耳以苦醋注之起行即出又方治蜈蚣蜘蛛毒以醋磨生鐵敷之北夢瑣言云有少年眼中常見一鏡子趙卿診之曰來晨以魚膾奉候及期延於闑內從容久飢候客退方得攀接俄而臺上施一甌芥醋更無他味少年飢甚聞芥醋香輕啜之逡巡再啜遂覺胸中豁然眼花不見卿雲君吃魚膾膾太多芥醋不快故權誑而愈其疾也又云孫光憲家婢抱小兒不覺落炭火上便以醋泥敷之無痕子母祕録治妊娠月未足胎死不出醋煮大豆服三升死兒立便分解如未下再服又云醋二升格口灌之丹房鏡源米醋煮四黃化諸藥丹砂膽礬味蜀本酢酒有數種此米酢也衍義曰醋酒糟為之乞鄰者是此物然有米醋麥醋棗醋米醋最釅入藥多用穀氣全也故勝糟醋産婦房中常得醋氣則為佳酸益血也磨雄黃塗蜂蠆亦取其收而不散也今人食酸則齒軟謂其水生木水氣弱木氣盛故如是造靴皮須得此而紋皺故如其性收斂不負酸收之說稻米味苦主溫中令人多熱大便堅陶隱居云道家方藥有俱用稻米粳米此則是兩物矣云稻米白如霜又江東無此皆通呼粳為稻爾不知其色類復云何也唐本注云稻者穬谷通名爾雅云稌音渡稻也粳者不糯之稱一曰秈汜勝之云粳稻秫稻三月種粳稻四月種秫稻即並稻也今陶為二事深不可解也今按李含光音義云按字書解粳字云稻也解粳字云稻屬也不黏解粢音慈字云稻餅也明稻米作粢蓋糯米爾其細糠白如霜粒大小似粳米但體性黏殢為異然今通呼粳糯谷為稻所以惑之新舊注殆是臆說今此稻米即糯米也又按粳粳二字同音蓋古人常分別二米為殊爾臣禹錫等謹按爾雅云稌稻釋曰別二名也郭云今沛國呼稌詩周頌云豐年多黍多稌禮記內則云牛宜稌豳風七月云十月獲稻是一物也說文云沛國為稻為糯粳稌屬也字林云糯黏稻也粳稻不黏者然粳糯甚相類黏不黏為異耳依說文稻即糯也江東呼糯及亂切顏師古刊謬正俗云本草所謂稻米者今之糯米耳陶以糯為秫不識稻是糯故說之不曉許氏說文解字曰秫稷之黏者稻稌也沛國謂稻為稌又急就篇云稻黍秫稷左太衝蜀都賦云粳稻漠漠益知稻即糯共粳並出矣然後以稻是有芒之谷故於後或通呼粳糯總謂之稻孔子曰食夫稻周官有稻人之職漢置稻田使者此並指屬稻糯之一色所以後人混糯不知稻本是糯耳陳藏器云糯米性微寒妊身與雜肉食之不利子作糜食一斗主消渴久食之令人身軟黍米及糯飼小貓犬令腳屈不能行緩人筋故也又云稻穰主黃病身作金色煮汁浸之又稻穀芒炒令黃細研作末酒服之孟詵云糯米寒使人多睡發風動氣不可多食又霍亂後吐逆不止清水研一碗飲之即止陳士良云糯米能行營衛中血積久食發心悸及癰疽瘡癤中痛不可合酒共食醉難醒解芫菁毒蕭炳云糯米擁諸經絡氣使四肢不收發風昏昏主痔疾駱駝脂作煎餅服之空腹與服勿令病人知日華子云糯米涼無毒補中益氣止霍亂取一合以水研服煮粥稻穩治蠱毒濃煎汁服稻稈治黃病通身煮汁服圖經曰稻米有粳與粳同稻有糯稻舊不載所出州土今有水田處皆能種之粳糯既通為稻而本經以粳為粳米糯為稻米者謹按爾雅云稌音渡稻釋曰別二名也郭璞云沛國呼稌詩頌云多黍多稌禮記內則云牛宜稌豳詩云十月獲稻是一物也說文解字云沛國謂稻為糯粳稌屬也字林云糯黏稻也粳稻不黏者今人呼之者如字林所說也本經稱號者如說文所說也前條有陳廩米即粳米以廩軍人者是也入藥最多稻稈灰亦主病見劉禹錫傳信方云湖南李從事治馬墜撲損用稻稈燒灰用新熟酒未壓者和糟入鹽和合淋前灰取汁以淋痛處立瘥直至背損亦可淋用好糟淋灰亦得不必新壓酒也糯米性寒作酒則熱糟乃溫平亦如大豆與豉醬不同之類耳唐本云無毒外臺祕要治渴方糯米二升淘取泔飲訖則定若不渴不須一方渴者服當飽研糯米取白汁恣飲之以瘥為度梅師方治霍亂心悸熱心煩渴以糯米水清研之冷熟水混取米泔汁任意飲之孫真人糯米味甘脾之谷脾病宜食益氣止泄食醫心鏡糯米飯食之主溫中令人多熱利大便簡要濟衆治鼻衄不止服藥不應獨聖散糯米微炒黃為末每服二錢新汲水調下靈苑方治金瘡水毒及竹木簽刺癰疽熱毒等糯三升揀去粳米入瓷盆內於端午前四十九日以冷水浸之一日兩度換水輕以手淘轉逼去水勿令攪碎浸至端午日取出陰乾生絹袋盛掛通風處旋取少許炒令焦黑碾為末冷水調如膏藥隨大小裹定瘡口外以絹帛包定更不要動直候瘡愈若金瘡誤犯生水瘡口作膿洪腫漸甚者急以藥膏裹定一二食久其腫處已消更不作膿直至瘡合若癰疽毒瘡初發才覺焮腫赤熱急以藥膏貼之明日揭看腫毒一夜便消喉閉及咽喉腫痛痄腮並用藥貼項下及腫處竹木簽刺者臨臥貼之明日看其刺出在藥內若貼腫處干即換之常令濕為妙唯金瘡及水毒不可換恐傷動瘡口傷寒類要治天行熱病手腫欲脫者以稻穰灰汁漬之佳楊氏産乳療霍亂心煩悶亂渴不止糯米三合以水五升細研和蜜一合研濾取汁分兩服博物志馬食谷足重不行衍義曰稻米今造酒者是此水田米皆謂之稻前既言粳米即此稻米乃糯稻無疑溫故可以為酒酒為陽故多熱又令人大便堅非糯稻孰能與於此西域記天竺國土溽熱稻歲四熟亦可驗矣稷米味甘無毒主益氣補不足陶隱居云稷米亦不識書多雲黍與稷相似又有稌音渡亦不知是何米詩云黍稷稻粱禾麻菽麥此即八谷也俗人莫能證辨如此谷稼尚弗能明而況芝英乎按汜勝之種植書有黍即如前說無稷有稻猶是粳谷粱是秫禾即是粟董仲舒云禾是粟苗麻是胡麻枲是大麻菽是大豆大豆有兩種小豆一名答丁合切有三四種麥有大小穬穬即宿麥亦謂種麥如此諸谷之限也菰米一名雕胡可作餅又漢中有一種名枲粱粒如粟而皮黑亦可食釀為酒甚消玉又有烏禾生野中如稗步賣切荒年代糧而殺蟲煮以沃地螻蚓皆死稗亦可食凡此之類復有數種爾唐本注云呂氏春秋云飯之美者有陽山之穄高誘曰關西謂之麋異州謂之䵖音撁廣雅云䵖穄也禮記云祭宗廟稷曰明粢穆天子傳云赤烏之人獻穄百載音在說文云稷五穀長田正也自商以來周棄主之此官名非谷號也又按先儒以為粟類或言粟之上者爾雅云粢稷也傳云粢盛解云黍稷為粢汜勝之種植書又不言稷陶云八谷者黍稷稻粱禾麻菽麥俗人尚不能辨況芝英乎即有稷禾明非粟也本草有稷不載穄稷即穄也今楚人謂之稷關中謂之糜呼其米為黃米與黍為仙秫故其苗與黍同類陶引詩云稷恐與黍相似斯並得之矣儒家但說其義而不知其實也尋鄭玄注禮王瓜云是菝葜謂祖為梨之不臧者周官瘍人主祝藥云祝當為注義如附著此尺有所短爾臣禹錫等謹按陳藏器云雕胡是菰蔣草米古今所貴雕胡性冷止渴內則云魚宜菰枲粱按枲粱亦粱之類消玉未聞按糜穄一物性冷塞北最多廣雅云穄也如黍黑色稗有二種一黃白一紫黑其紫黑者芑有毛北人呼為烏禾又云五穀燒作灰爇主惡瘡疥癬蟲瘻疽螫毒塗之和松脂雄黃燒灰更良作法如甲煎為之孟詵云稷益諸不足山東多食服丹石人發熱食之熱消也發三十六種冷病氣八谷之中最為下苗黍乃作酒此乃作飯用之殊途不與瓠子同食令冷病發發即黍釀汁飲之即瘥日華子云稷米冷治熱壓丹石毒多食發冷氣能解苦瓠毒不可與川附子同服圖經曰稷米今所謂穄米也舊不著所出州土今出粟米處皆能種之書傳皆稱稷為五穀之長五穀不可遍祭故祀其長以配社呂氏春秋云飯之美者有陽山之穄高誘云關西謂之糜冀州謂之䵖音撁皆一物也廣雅解云如黍黑色稗有二種一黃白一紫黑其紫黑者其芑有毛北人呼為烏禾是也今人不甚珍此唯祠事則用之農家種之以備他谷之不熟則為糧耳食療黍之莖穗人家有作提拂以將掃地食苦瓠毒煮汁飲之即止又破提掃煮取汁浴之去浮腫又和小豆煮汁服之下小便外臺祕要治腳氣衝心悶洗腳漬腳湯以糜穰一石納釜中多煮取濃汁去滓納椒目一斗更煎十餘沸漬腳三兩度如冷溫漬洗瘥食醫心鏡益氣力安中補不足利胃宜脾稷米飯食之良曹子建七啓芳菰精稗注云菰稗草名其實如細米可以為飯衍義曰稷米今謂之穄米先諸米熟又其香可愛故取以供祭祀然發故疾只堪為飯不黏著其味淡腐婢味辛平無毒主痎音皆瘧寒熱邪氣泄痢陰不起止消渴病酒頭痛生漢中即小豆花也七月採陰乾陶隱居云花用異實故其類不得同品方家都不用之今自可依其所主以為療也但未解何故有腐婢之名本經不云是小豆花後醫顯之爾未知審是否今海邊有小樹狀似梔子莖條多曲氣作腐臭土人呼為腐婢用療瘧有效亦酒漬皮療心腹恐此當是真若爾此條應在木部下品卷中唐本注云腐婢山南相承以為葛花本經云小豆花陶復稱海邊小樹未知孰是然葛花消酒大勝豆花葛根亦能消酒小豆全無此效校量葛豆二花葛為真也今按別本注云小豆花亦有腐氣經云病酒頭痛即明其療同矣葛根條中見其花並小豆花乾末服方寸匕飲酒不知醉唐注證葛花是腐婢非也陶雲海邊有小樹土人呼為腐婢其如經稱小豆花是腐婢二家所說證據並非臣禹錫等謹按藥性論云赤小豆花名腐婢能消酒毒明目散氣滿不能食煮一頓服之又下水氣並治小兒丹毒熱腫圖經曰腐婢小豆花也生漢中今處處有之陶隱居以為海邊有小木狀似梔子氣作臭腐土人呼為腐婢疑是此蘇恭云山南相承呼為葛花是也今注云小豆花亦有腐氣按本經云主病酒頭痛海邊小木自主瘧及心腹痛葛花不言主酒病注云並小豆花末服方寸匕飲酒不知醉然則三物皆有腐婢名是異類同名耳本經此比甚多也一說赤小豆花亦主酒病外臺祕要治渴小便利復非淋小豆藿一把搗取汁頓服食醫心鏡主痎瘧寒熱邪氣泄痢陰氣不足止渴及病酒頭痛以小豆花於豉中煮五味調和作羹食之別說云謹按腐婢今既收在此乃是小豆花設有別物同名自從所說不必多辨外臺小豆治失血尤多功用殊勝醬味鹹酸冷利主除熱止煩滿殺百藥熱湯及火毒陶隱居云醬多以豆作純麥者少今此當是豆者亦以久久者彌好又有肉醬魚醬皆呼為醢不入藥用唐本注云又有榆仁醬亦辛美利大小便蕪荑醬大美殺三蟲雖有少臭亦辛好也臣禹錫等謹按日華子云醬無毒殺一切魚肉菜蔬菌毒並治蛇蟲蜂蠆等毒食療主火毒殺百藥發小兒無辜小麥醬不如豆又榆仁醬亦辛美殺諸蟲利大小便心腹惡氣不宜多食又蕪荑醬功力強於榆仁醬多食落髮獐雉兔及鱧魚醬皆不可多食為陳久故也聖惠方治飛蛾入耳醬汁灌入耳即出又擊銅器於耳旁千金方治指掣痛以醬清和蜜任多少溫敷之愈肘後方湯火燒灼未成瘡豆醬汁敷之楊氏産乳妊娠不得豆醬合雀肉食之令兒面黑衍義曰醬聖人以謂不得即不食意欲五味和五臟悅而受之此亦安樂之一端陳廩米味鹹酸溫無毒主下氣除煩渴調胃止泄陶隱居云此今久入倉陳赤者湯中多用之人以作醋勝於新粳米也臣禹錫等謹按陳士良云陳倉米平胃口止泄瀉暖脾去憊氣宜作湯食日華子云陳倉米補五臟澀腸胃陳藏器云和馬肉食之發痼疾凡熱食即熱冷食即冷假以火氣也體自溫平吳人以粟為良漢地以粳為善亦猶吳紵鄭縞蓋貴遠賤近之義焉確論其功粟居前也食療炊作乾飯食之止痢補中益氣堅筋骨通血脈起陽道又毒腫惡瘡久陳者蒸作飯和酢封腫上立瘥卒心痛研取汁服之北人炊之於甕中水浸令酸食之暖五臟六腑之氣食醫心鏡除煩熱下氣調胃止泄痢作飯食之衍義曰陳廩米今經與諸家注說皆不言是粳米為復是粟米然粳粟二米陳者性皆冷頻食之令人自利與經所說稍戾煎煮亦無膏膩入藥者今人多用新粟米至如舂杵頭細糠又復不言新陳粳粟然皆不及新稻粟二糠陳則是氣味已腐敗罌子粟味甘平無毒主丹石發動不下食和竹瀝煮作粥食之極美一名象谷一名米囊一名御米花紅白色似嚆音哮箭頭中有米亦名囊子今附臣禹錫等謹按陳藏器云罌子粟嵩陽子曰其花四葉有淺紅暈子也圖經曰罌子粟舊不著所出州土今處處有之人家園庭多蒔以為飾花有紅白二種微腥氣其實作瓶子似嚆音哮箭頭中有米極細種之甚難圃人隔年糞地九月布子涉冬至春始生苗極繁茂矣不爾種之多不出出亦不茂俟其瓶焦黃則採之主行風氣驅逐邪熱治反胃胸中痰殢及丹石發動說可合竹瀝作粥大佳然性寒利大小腸不宜多食食過度則動膀胱氣耳南唐食醫方療反胃不下飲食罌粟粥法白罌粟米二合人參末三大錢生山芋五寸長細切研三物以水一升二合煮取六合入生薑汁及鹽花少許攪勻分二服不計早晚食之亦不妨別服湯丸衍義曰罌子粟其花亦有多葉者其子一罌數千萬粒大小如葶藶子其色白隔年種則佳研子以水煎仍加蜜為罌粟湯服石人甚宜飲一十一種陳藏器余師草實味甘平無毒主不飢輕身出東海州島似大麥秋熟一名禹餘糧非石之餘糧也海藥其實如球子八月收之彼常食之物主補虛羸乏損溫腸胃止嘔逆久食健人一名然谷中國人未曾見也寒食飯主滅瘢痕有舊瘢及雜瘡並細研敷之飯灰主病後食勞外臺祕要治蛟龍瘕寒食餳三升每服五合一日三服遂吐出蛟龍有兩頭及尾也菵米味甘寒無毒主利腸胃益氣力久食不飢去熱益人可為飯生水田中苗子似小麥而小四月熟爾雅云皇守田似燕麥可食一名守氣也狼尾草子作黍食之令人不飢似茅作穗生澤地廣志云可作黍爾雅云孟狼尾今人呼為狼茅子蒯草子亦堪食如粳米苗似茅胡豆子味甘無毒主消渴勿與鹽煮食之苗似豆生野田間米中往往有之東牆味甘平無毒益氣輕身久服不飢堅筋骨能步行生河西苗似蓬子似葵可為飯魏書曰東牆生焉九月十月熟廣志曰東牆之子似葵青色並涼間有之河西人語貸我東牆償爾田粱牆疾羊切麥苗味辛寒無毒主蠱煮取汁細絹濾服之穩與本反即芒秕也糟筍中酒味鹹平無毒主噦氣嘔逆小兒乳和少牛乳飲之亦可單服少許磨癧瘍風此糟筍節中水也社酒噴屋四壁去蚊子納小兒口中令速語此祭祀社余者酒也蓬草子作飯食之無異粳米儉年食之也寒食麥仁粥有小毒主咳嗽下熱氣調中和杏仁作之佳也千金方治蛟龍病寒食強餳開皇六年有人正月食芹得之其病發似癇面色青黃服寒食強餳二升日三吐出蛟龍有兩頭大驗
